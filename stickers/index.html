<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unnecessary Bengali Stickers</title>
    <link
      rel="icon"
      type="image/x-icon"
      href="https://arkadeep.com/assets/media/A_thumbnail.png"
    />
    <meta
      name="description"
      content="Niche Bengali phrases on cats & dogs — stickers nobody asked for, so I made them."
    />

    <!-- Open Graph / Social Sharing -->
    <meta property="og:title" content="Unnecessary Bengali Stickers" />
    <meta
      property="og:description"
      content="Niche Bengali phrases on cats & dogs — stickers nobody asked for, so I made them."
    />
    <meta property="og:image" content="preview.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="1171" />
    <meta property="og:type" content="website" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Unnecessary Bengali Stickers" />
    <meta
      name="twitter:description"
      content="Niche Bengali phrases on cats & dogs — stickers nobody asked for, so I made them."
    />
    <meta name="twitter:image" content="preview.jpg" />

    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="site-header" id="siteHeader">
      <div class="header-inner">
        <h1 id="headerTitle"></h1>
        <p class="tagline" id="headerTagline"></p>
        <div class="header-buttons" id="headerButtons">
          <button id="btnHowToUse">How to use?</button>
          <button id="btnWhenToUse">When to use?</button>
        </div>
      </div>
    </header>

    <section class="starred-section" id="starredSection">
      <div class="section-label">★ starred</div>
      <div class="starred-gallery" id="starredGallery"></div>
    </section>

    <main class="gallery-wrap">
      <div class="gallery" id="gallery"></div>
    </main>

    <div class="bottom-actions" id="bottomActions"></div>

    <footer class="site-footer">
      made with <span class="heart">&#10084;</span> in antarctica
    </footer>

    <!-- Sticker fullscreen modal -->
    <div class="modal" id="modal">
      <button class="close-btn" id="closeBtn" aria-label="Close"></button>
      <div class="modal-content">
        <img
          class="modal-img"
          id="modalImg"
          src=""
          alt="Sticker fullscreen view"
        />
        <div class="modal-actions" id="modalActions">
          <button class="btn-star-modal" id="modalStarBtn">☆ Star</button>
          <button class="btn-hide-modal" id="modalHideBtn">✕ Hide</button>
          <button class="btn-download" id="modalDownloadBtn">↓ Save</button>
        </div>
      </div>
    </div>

    <!-- Info text modal -->
    <div class="info-modal" id="infoModal">
      <button class="close-btn" id="infoCloseBtn" aria-label="Close"></button>
      <div class="info-modal-content">
        <h2 id="infoModalTitle"></h2>
        <div class="info-modal-body" id="infoModalBody"></div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
