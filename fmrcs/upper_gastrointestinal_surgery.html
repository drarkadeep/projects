ic": "Upper gastrointestinal bleeding", "stem_html": "Which of the following variables is not included in the Rockall score?", "options": [{"label_html": "Congestive cardiac failure", "is_correct": false}, {"label_html": "Liver failure", "is_correct": false}, {"label_html": "Systolic blood pressure &lt; 100mmHg", "is_correct": false}, {"label_html": "Aspirin usage", "is_correct": true}, {"label_html": "Age", "is_correct": false}], "correct_index": 3, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Patients should have their Rockall score calculated following endoscopy for upper GI haemorrhage<br><br><b>Mnemonic for Rockall score<\/b><br>ABCDE <br>A: Age <br>B: Blood pressure drop (Shock) <br>C: Co-morbidity <br>D: Diagnosis <br>E: Evidence of bleeding<\/div>Rockall Score<br><br>Applies to upper gastrointestinal bleeding<br><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Variable<\/b><\/th><th><b>\tScore 0<\/b><\/th><th><b>\tScore 1<\/b><\/th><th><b>\tScore 2\t<\/b><\/th><th><b>Score 3<\/b><\/th><\/tr><\/thead><tbody><tr><td>Age<\/td><td>\t&lt;60<\/td><td>\t60-79\t<\/td><td>&gt;80\t<\/td><td><\/td><\/tr><tr><td>Shock<\/td><td>\tNone\t<\/td><td>Pulse &gt;100\t<\/td><td>Hypotension (systolic &lt;100mmHg)\t<\/td><td><\/td><\/tr><tr><td>Co-Morbidity\t<\/td><td>Nil or minimal\t<\/td><td><\/td><td>\tMajor organ disease  e.g. IHD, CCF<\/td><td>Renal or liver failure, metastatic cancer<\/td><\/tr><tr><td>Diagnosis<\/td><td>\tMallory-Weiss<\/td><td>\tAll<\/td><td>GI Cancer\t<\/td><td><\/td><\/tr><tr><td>Evidence of Bleeding<\/td><td>\tNone\t<\/td><td>\t<\/td><td>Clot, Blood, spurting vessel\t<\/td><td><\/td><\/tr><\/tbody><\/table><\/div><br>Score &lt;3 = Good prognosis (mortality approx. 2%)<br><br>Score &gt;8= High mortality (Mortality approx. 40%)"}, {"number": 44, "topic": "Upper gastrointestinal bleeding", "stem_html": "A 35 year old man is admitted with an episode of collapse and passage of malaena. He has been suffering from post prandial abdominal pain for 5 weeks and this is most marked several hours after eating. What is the most likely cause?", "options": [{"label_html": "Anterior duodenal ulcer", "is_correct": false}, {"label_html": "Posterior duodenal ulcer", "is_correct": true}, {"label_html": "Oesophageal varices", "is_correct": false}, {"label_html": "Dieulafoy lesion", "is_correct": false}, {"label_html": "Carcinoma of the stomach", "is_correct": false}], "correct_index": 1, "explanation_html": "Patients with duodenal ulcers will usually have a history of epigastric pain that occurs several hours after eating. The pain is often improved by eating food. They are most frequently located in the first part of the duodenum. Anteriorly sited ulcers may perforate and result in peritonitis, posteriorly sited ulcers may erode the gastroduodenal artery and present with haematemesis and/ or malaena."}, {"number": 45, "topic": "Upper gastrointestinal bleeding", "stem_html": "A 72 year old man is admitted with an episode of brisk haematemesis. Following resuscitation an upper GI endoscopy is performed and a prominent blood vessel is identified in the sub mucosa approximately 6 cm from the O-G junction on the lesser curve of the stomach. What is the most likely explanation for the bleeding?", "options": [{"label_html": "Gastric cancer", "is_correct": false}, {"label_html": "Portal gastropathy", "is_correct": false}, {"label_html": "Dieulafoy lesion", "is_correct": true}, {"label_html": "Linitis plastica", "is_correct": false}, {"label_html": "Gastritis", "is_correct": false}], "correct_index": 2, "explanation_html": "These small arterial lesions are a rare cause of bleeding and are characterised by a single large tortuous arteriole in the sub mucosa. Extra gastric lesions may occur."}, {"number": 46, "topic": "Upper gastrointestinal bleeding", "stem_html": "A 72 year old man is admitted with an episode of brisk haematemesis. Following resuscitation an upper GI endoscopy is performed and a prominent blood vessel is identified in the sub mucosa approximately 6 cm from the O-G junction on the lesser curve of the stomach. What is the most likely explanation for the bleeding?", "options": [{"label_html": "Gastric cancer", "is_correct": false}, {"label_html": "Portal gastropathy", "is_correct": false}, {"label_html": "Dieulafoy lesion", "is_correct": true}, {"label_html": "Linitis plastica", "is_correct": false}, {"label_html": "Gastritis", "is_correct": false}], "correct_index": 2, "explanation_html": "These small arterial lesions are a rare cause of bleeding and are characterised by a single large tortuous arteriole in the sub mucosa. Extra gastric lesions may occur."}, {"number": 47, "topic": "Upper gastrointestinal bleeding", "stem_html": "A 56 year old man is admitted with a profuse upper gastro intestinal haemorrhage. He is relatively malnourished and has evidence of gynaecomastia. An upper GI endoscopy is performed and views are limited because of the extensive amount of blood present. What is the most likely underlying cause?", "options": [{"label_html": "Boerhaave's perforation", "is_correct": false}, {"label_html": "Mallory Weiss tear", "is_correct": false}, {"label_html": "Oesophageal varices", "is_correct": true}, {"label_html": "Oesophageal cancer", "is_correct": false}, {"label_html": "Oesophagitis", "is_correct": false}], "correct_index": 2, "explanation_html": "Patients presenting with gastrointestinal bleeding and evidence of established liver disease may have portal hypertension and develop variceal haemorrhage. The patient may have evidence of jaundice, gynaecomastia, spider naevia, caput medusae and ascites. The bleeding is usually profuse and painless."}, {"number": 48, "topic": "Upper gastrointestinal bleeding", "stem_html": "A 53 year old man presents with dyspepsia. At upper GI endoscopy he has a punched out ulcer on the lesser curve of the stomach. It measures approximately 2cm in diameter and is seen to penetrate muscle with fibrosis present at the base. What is the most likely diagnosis?", "options": [{"label_html": "Curlings ulcer", "is_correct": false}, {"label_html": "Cushings ulcer", "is_correct": false}, {"label_html": "Chronic ulcer", "is_correct": true}, {"label_html": "Adenocarcinoma", "is_correct": false}, {"label_html": "Gastric lymphoma", "is_correct": false}], "correct_index": 2, "explanation_html": "Fibrosis is usually a sign of chronic ulcer. It should be biopsied carefully, a proton pump inhibitor started and re endoscopy should occur at 6 weeks."}, {"number": 49, "topic": "Upper gastrointestinal bleeding", "stem_html": "A 70 year old lady presents with an upper gastrointestinal haemorrhage. This surprises the surgical team as she has been taking a proton pump inhibitor at high dose since a recent admission with epigastric pain. At endoscopy, the duodenum is found to contain multiple ulcers. What is the most likely explanation?", "options": [{"label_html": "Infection with helicobacter pylori", "is_correct": false}, {"label_html": "Gastrinoma", "is_correct": true}, {"label_html": "Duodenal lymphoma", "is_correct": false}, {"label_html": "Adenocarcinoma of the duodenum", "is_correct": false}, {"label_html": "Alcoholism", "is_correct": false}], "correct_index": 1, "explanation_html": "Gastrinomas are typically the source of gastrin in Zollinger Ellison syndrome."}, {"number": 50, "topic": "Upper gastrointestinal bleeding", "stem_html": "Which of the following strategies is not employed in the management of acutely bleeding oesophageal varices?", "options": [{"label_html": "Endoscopic sclerotherapy", "is_correct": false}, {"label_html": "Intravenous vasopressin", "is_correct": false}, {"label_html": "Intravenous beta blockers", "is_correct": true}, {"label_html": "Endoscopic rubber band ligation of varices", "is_correct": false}, {"label_html": "Insertion of Sengstaken Blakemore tube", "is_correct": false}], "correct_index": 2, "explanation_html": "Intravenous beta blockers are not typically used to manage an acute event, their value lies in prophylaxis by lowering portal venous pressure."}, {"number": 51, "topic": "Upper gastrointestinal bleeding", "stem_html": "A 63 year old man undergoes an upper GI endoscopy and adrenaline injection for a large actively bleeding duodenal ulcer. He remains stable for 6 hours and the nurses then call because he has passed 400ml malaena and has become tachycardic (pulse rate 120) and hypotensive (Bp 80/40). What is the best option?", "options": [{"label_html": "Reassure that blood trapped in the upper portion of the gastrointestinal system will pass and that this episode will resolve with phosphate enema", "is_correct": false}, {"label_html": "Perform a repeat upper GI endoscopy", "is_correct": false}, {"label_html": "Perform a laparotomy and under-running of the ulcer", "is_correct": true}, {"label_html": "Administer tranexamic acid and intravenous proton pump inhibitors", "is_correct": false}, {"label_html": "Insert a Minnesota tube", "is_correct": false}], "correct_index": 2, "explanation_html": "The decision as to how best to manage patients with re-bleeding is difficult. Whilst it is tempting to offer repeat endoscopy, this intervention is best used on those with small ulcers. Large posteriorly sited duodenal ulcers are at high risk for re-bleeding and the timeframe of this event suggests that primary endoscopic haemostasis was inadequate. Surgery thus represents the safest way forward."}, {"number": 52, "topic": "Upper gastrointestinal bleeding", "stem_html": "A 45 year old man has a 4 week history of epigastric discomfort which is relieved by eating. He develops haematemesis and undergoes an upper GI endoscopy. An actively bleeding ulcer is noted in the first part of the duodenum. What is the best management?", "options": [{"label_html": "Whipples procedure", "is_correct": false}, {"label_html": "Truncal vagotomy and drainage", "is_correct": false}, {"label_html": "Distal gastrectomy", "is_correct": false}, {"label_html": "Injection with tranexamic acid", "is_correct": false}, {"label_html": "Injection with adrenaline", "is_correct": true}], "correct_index": 4, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Current guidance is that bleeding peptic ulcers should be treated with dual therapeutic modalities. Adrenaline injection should be augmented with an additional therapy such as endoscopic clipping where this is available. <\/div>Bleeding duodenal ulcers will usually undergo adrenaline injection. This may be augmented by the placement of endoscopic clips or heat therapy with endoscopic heater probes. Following these interventions patients should receive a proton pump inhibitor infusion. Those who re-bleed, may require surgery. For ulcers in this location, laparotomy, duodenotomy and under-running of the ulcer is usually performed."}], "note_html": "Patients may present with the following:<br><ul><li>Haematemesis and/ or malaena<\/li><li>Epigastric discomfort<\/li><li>Sudden collapse<\/li><\/ul><br>The extent to which these will occur will depend upon the source. Mortality is higher in patients presenting with haematemesis than malaena alone.<br><br><b>Oesophageal bleeding<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Cause<\/b><\/td><td><b>\tPresenting features<\/b><\/td><\/tr><tr><td>Oesophagitis\t<\/td><td>Small volume of fresh blood, often streaking vomit. Malaena rare. Often ceases spontaneously. Usually history of antecedent GORD type symptoms.<\/td><\/tr><tr><td>Cancer<\/td><td>\tUsually small volume of blood, except as pre terminal event with erosion of major vessels. Often associated symptoms of dysphagia and constitutional symptoms such as weight loss. May be recurrent until malignancy managed.<\/td><\/tr><tr><td>Mallory Weiss Tear<\/td><td>\tTypically brisk small to moderate volume of bright red blood following bout of repeated vomiting. Malaena rare. Usually ceases spontaneously.<\/td><\/tr><tr><td>Varices\t<\/td><td>Usually large volume of fresh blood. Swallowed blood may cause malaena.  Often associated with haemodynamic compromise. May stop spontaneously but re-bleeds are common until appropriately managed.<\/td><\/tr><\/tbody><\/table><\/div><br><b>Gastric Bleeding<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Cause<\/b><\/td><td><b>\tPresenting features<\/b><\/td><\/tr><tr><td>Gastric cancer\t<\/td><td>May be frank haematemesis or altered blood mixed with vomit. Usually prodromal features of dyspepsia and may have constitutional symptoms. Amount of bleeding variable but erosion of major vessel may produce considerable haemorrhage.<\/td><\/tr><tr><td>Dieulafoy Lesion\t<\/td><td>Often no prodromal features prior to haematemesis and malaena, but this arteriovenous malformation may produce quite considerable haemorrhage and may be difficult to detect endoscopically.<\/td><\/tr><tr><td>Diffuse erosive gastritis\t<\/td><td>Usually haematemesis and epigastric discomfort. Usually there is an underlying cause such as recent NSAID usage. Large volume haemorrhage may occur with considerable haemodynamic compromise.<\/td><\/tr><tr><td>Gastric ulcer<\/td><td>\tSmall low volume bleeds more common so would tend to present as iron deficiency anaemia. Erosion into a significant vessel may produce considerable haemorrhage and haematemesis.<\/td><\/tr><\/tbody><\/table><\/div><br><b>Duodenum<\/b><br>Most common cause of major haemorrhage is a posteriorly sited duodenal ulcer. However, ulcers at any site in the duodenum may present with haematemesis, malaena and epigastric discomfort. The pain of duodenal ulcer is slightly different to that of gastric ulcers and often occurs several hours after eating. Peri ampullary tumours may bleed but these are rare. In patients with previous abdominal aortic aneurysm surgery aorto-enteric fistulation remains a rare but important cause of major haemorrhage associated with high mortality.<br><br><b>Management<\/b><br><ul><li>Admission to hospital careful monitoring, cross match blood, check FBC, LFTs, U+E and Clotting (as a minimum)<\/li><li>Patients with on-going bleeding and haemodynamic instability are likely to require O negative blood pending cross matched blood<\/li><li>Early control of airway is vital (e.g. Drowsy patient with liver failure)<\/li><li>Patients with suspected varices should receive terlipressin prior to endoscopy<\/li><li>Ideally all patients admitted with upper gastrointestinal haemorrhage should undergo Upper GI endoscopy within 24 hours of admission. In those who are unstable this should occur immediately after resuscitation or in tandem with it. The endoscopy department is a potentially dangerous place for unstable patients and it may be safer to perform the endoscopy in theatre with an anaesthetist present.<\/li><li>Varices should be banded or subjected to sclerotherapy. If this is not possible owing to active bleeding then a Sengstaken- Blakemore tube (or Minnesota tube) should be inserted. This should be done with care; gastric balloon should be inflated first and oesophageal balloon second. Remember the balloon will need deflating after 12 hours (ideally sooner) to prevent necrosis. Portal pressure should be lowered by combination of medical therapy +/- TIPSS.<\/li><li>Patients with erosive oesophagitis / gastritis should receive a proton pump inhibitor.<\/li><li>Mallory Weiss tears will typically resolve spontaneously<\/li><li>Identifiable bleeding points should receive combination therapy of injection of adrenaline and either a thermal or mechanical treatment. All who have received intervention should receive a continuous infusion of a proton pump inhibitor (IV omeprazole for 72 hours) to reduce the re-bleeding rate. <\/li><li>Patients with diffuse erosive gastritis who cannot be managed endoscopically and continue to bleed may require gastrectomy<\/li><li>Bleeding ulcers that cannot be controlled endoscopically may require laparotomy and ulcer underruning<\/li><\/ul><br><b>Indications for surgery<\/b><br><ul><li>Patients &gt; 60 years<\/li><li>Continued bleeding despite endoscopic intervention <\/li><li>Recurrent bleeding <\/li><li>Known cardiovascular disease with poor response to hypotension <\/li><\/ul><br><b>Surgery<\/b><br><b>Duodenal ulcer<\/b><br>Laparotomy, duodenotomy and under running of the ulcer. If bleeding is brisk then the ulcer is almost always posteriorly sited and will have invaded the gastroduodenal artery. Large bites using 0 Vicryl are taken above and below the ulcer base to occlude the vessel.  The duodenotomy should be longitudinal but closed transversely to avoid stenosis. <br><br><b>For gastric ulcer<\/b><br>Under-running of the bleeding site <br>Partial gastrectomy-antral ulcer<br>Partial gastrectomy or under running the ulcer- lesser curve ulcer (involving left gastric artery)<br>Total gastrectomy if bleeding persists<br><br><br><b>Summary of Acute Upper GI bleeding recommendations:<\/b><br>The need for admission and timing of endoscopic intervention may be predicted by using the Blatchford score. This considers a patients Hb, serum urea, pulse rate and blood pressure. Those patients with a score of 0 are low risk, all others are considered high risk and require admission and endoscopy. <br>The requirement for pre endoscopic proton pump inhibition is contentious. In the UK the National Institute of Clinical Excellence guidelines suggest the pre endoscopic PPI  therapy is unnecessary. Whilst it is accepted that such treatment has no impact on mortality or morbidity a Cochrane review of this practice in 2007 did suggest that it reduced the stigmata of recent haemorrhage at endoscopy. As a result many will still administer PPI to patients prior to endoscopic intervention. <br>Following endoscopy it is important to calculate the Rockall score for patients to determine their risk of rebleeding and mortality. A score of 3 or less is associated with a rebleeding rate of 4% and a very low risk of mortality and identifies a group of patients suitable for early discharge. <br><br><b>References<\/b><br>1. http://www.sign.ac.uk/guidelines/fulltext/105/index.html<br>2. Joint Advisory Group on Endoscopy (JAG) Guidelines - http://www.thejag.org.uk<br>3. NICE Guideline: Management of acute upper GI bleeding. July 2012."}, {"name": "Zollinger - Ellison syndrome", "questions": [{"number": 53, "topic": "Zollinger - Ellison syndrome", "stem_html": "A 34 year old woman presents with recurrent peptic ulceration. She is on proton pump inhibitors and previously received Helicobacter pylori eradication therapy three months ago. Which of the following is likely to be raised on venous blood testing?", "options": [{"label_html": "Secretin", "is_correct": false}, {"label_html": "Cholecystokinin", "is_correct": false}, {"label_html": "Gastrin", "is_correct": true}, {"label_html": "Amylase", "is_correct": false}, {"label_html": "Histamine", "is_correct": false}], "correct_index": 2, "explanation_html": "It is likely that this patient has an MEN I type gastrinoma (female, young age). As such, the serum gastrin levels are likely to be elevated."}], "note_html": "- Gastrin-secreting tumor (gastrinoma) of pancreas or duodenum. Acid hypersecretion causes recurrent ulcers in duodenum and jejunum. Presents with abdominal pain (peptic ulcer disease, distal ulcers), diarrhoea (malabsorption)<br><ul><li>75% are sporadic and the 25% associated with MEN I<\/li><li>Mean age of presentation is 50 years (earlier in MEN I)<\/li><li>60% are malignant<\/li><li>They are typically found in the gastrinoma triangle. This is formed by the junction of cystic duct and CBD, junction of D2 and D3, junction of neck and body of pancreas.<\/li><li>Imaging is with triple phase CT and endoscopic USS<\/li><li>Serum sampling of serum gastrin levels will show these to be elevated. A secretin stimulation test is sometimes performed as gastrin levels will remain elevated following administration of secretin which usually suppresses gastrin.<\/li><li>Treatment is with resection.<\/li><\/ul>"}]}</script>
  <script>
    const quizData = JSON.parse(document.getElementById("quiz-data").textContent);
    const app = document.getElementById("app");
    const modeButtons = Array.from(document.querySelectorAll("[data-mode-button]"));
    const topicActionButtons = Array.from(document.querySelectorAll("[data-topic-action]"));

    const state = {
      mode: "solve",
      answers: new Map(),
      questionRefs: [],
    };

    function buildTopic(topic, questionOffset) {
      const details = document.createElement("details");
      details.className = "topic";
      details.open = true;

      const summary = document.createElement("summary");
      summary.innerHTML = `
        <div>
          <h2 class="topic-title">${topic.name}</h2>
        </div>
        <div class="topic-meta">
          <span>${topic.questions.length} questions</span>
          <span class="chevron" aria-hidden="true">></span>
        </div>
      `;

      const body = document.createElement("div");
      body.className = "topic-body";

      if (topic.note_html) {
        const notes = document.createElement("details");
        notes.className = "topic-notes";

        const notesSummary = document.createElement("summary");
        notesSummary.innerHTML = `
          <span class="topic-notes-title">Notes</span>
          <span class="chevron" aria-hidden="true">></span>
        `;

        const notesBody = document.createElement("div");
        notesBody.className = "topic-notes-body rich-text";
        notesBody.innerHTML = topic.note_html;

        notes.appendChild(notesSummary);
        notes.appendChild(notesBody);
        body.appendChild(notes);
      }

      topic.questions.forEach((question, indexInTopic) => {
        const globalIndex = questionOffset + indexInTopic;
        body.appendChild(buildQuestionCard(question, globalIndex));
      });

      details.appendChild(summary);
      details.appendChild(body);
      return details;
    }

    function buildQuestionCard(question, questionIndex) {
      const card = document.createElement("article");
      card.className = "question-card is-hidden";
      card.dataset.questionIndex = String(questionIndex);

      const label = document.createElement("p");
      label.className = "question-label";
      label.textContent = `Question ${question.number}`;

      const stem = document.createElement("div");
      stem.className = "stem rich-text";
      stem.innerHTML = question.stem_html;

      const options = document.createElement("div");
      options.className = "options";

      const optionButtons = question.options.map((option, optionIndex) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "option";
        button.dataset.optionIndex = String(optionIndex);
        button.innerHTML = option.label_html;
        button.addEventListener("click", () => {
          if (state.mode !== "solve") {
            return;
          }
          state.answers.set(questionIndex, optionIndex);
          applyQuestionState(questionIndex);
        });
        options.appendChild(button);
        return button;
      });

      const explanation = document.createElement("div");
      explanation.className = "explanation rich-text";
      explanation.innerHTML = `<span class="explanation-label">Explanation</span>${question.explanation_html}`;

      card.appendChild(label);
      card.appendChild(stem);
      card.appendChild(options);
      card.appendChild(explanation);

      state.questionRefs[questionIndex] = {
        card,
        explanation,
        optionButtons,
        question,
      };

      applyQuestionState(questionIndex);
      return card;
    }

    function applyQuestionState(questionIndex) {
      const ref = state.questionRefs[questionIndex];
      if (!ref) {
        return;
      }

      const { card, optionButtons, question } = ref;
      const selectedIndex = state.answers.get(questionIndex);
      const hasSelection = selectedIndex !== undefined;
      const isReview = state.mode === "review";
      const showExplanation = isReview || hasSelection;

      card.classList.toggle("is-hidden", !showExplanation);

      optionButtons.forEach((button, optionIndex) => {
        button.classList.remove("correct", "incorrect", "neutral-revealed");

        if (isReview) {
          button.disabled = true;
          if (optionIndex === question.correct_index) {
            button.classList.add("correct");
          } else {
            button.classList.add("neutral-revealed");
          }
          return;
        }

        button.disabled = false;
        if (!hasSelection) {
          return;
        }

        if (optionIndex === question.correct_index) {
          button.classList.add("correct");
        } else if (optionIndex === selectedIndex) {
          button.classList.add("incorrect");
        } else {
          button.classList.add("neutral-revealed");
        }
      });
    }

    function renderApp() {
      if (!quizData.topics.length) {
        const empty = document.createElement("div");
        empty.className = "empty-state";
        empty.textContent = "No questions were found in this JSON file.";
        app.replaceChildren(empty);
        return;
      }

      const wrapper = document.createElement("div");
      wrapper.className = "topic-list";

      let questionOffset = 0;
      quizData.topics.forEach((topic) => {
        wrapper.appendChild(buildTopic(topic, questionOffset));
        questionOffset += topic.questions.length;
      });

      app.replaceChildren(wrapper);
    }

    function setMode(mode) {
      state.mode = mode;
      modeButtons.forEach((button) => {
        const isActive = button.dataset.modeButton === mode;
        button.classList.toggle("active", isActive);
        button.setAttribute("aria-pressed", String(isActive));
      });

      state.questionRefs.forEach((_, index) => applyQuestionState(index));
    }

    function setAllTopics(open) {
      document.querySelectorAll(".topic").forEach((topic) => {
        topic.open = open;
      });
    }

    modeButtons.forEach((button) => {
      button.addEventListener("click", () => setMode(button.dataset.modeButton));
    });

    topicActionButtons.forEach((button) => {
      button.addEventListener("click", () => {
        setAllTopics(button.dataset.topicAction === "expand");
      });
    });

    renderApp();
    setMode("solve");
  </script>
</body>
</html>
