of 1 per 1,000,000 per year<\/li><li>90% of lesions are benign<\/li><li>Most tumours less than 2cm in size<\/li><li>Between 5 and 10% have MEN type 1<\/li><li>75% of patients with MEN 1 will develop pancreatic islet cell tumours<\/li><\/ul><br><b>Typical features of insulinoma<\/b><br><div class=\"alert alert-warning\">Symptomatic hypoglycaemia during fasting<br>Concomitant blood glucose of less than 3mmol/L<br>Relief of hypoglycaemia by use of glucose<\/div><br><b>Testing<\/b><br>When neuroglycopenic symptoms occur blood is taken for serum insulin levels, serum glucose, C-peptide and pro insulin concentrations. The plasma insulin concentration is &gt;10 micro U/ml in patients with the disorder.<br><br><b>Tumour localisation<\/b><br><ul><li>USS (25% accuracy), endoscopic USS better (75% accuracy)<\/li><li>CT scanning (pancreatic protocol=40% accuracy)<\/li><li>Malignant insulinomas are larger and diagnostic accuracy with MRI is nearly 100% in such cases<\/li><li>Somatostatin receptor scintigraphy (50% accuracy)<\/li><\/ul><br><b>Treatment<\/b><br>Since the majority of tumours are benign; the blind segmental resection of the pancreas (e.g. Whipples) cannot be justified, this may be considered acceptable for malignant lesions. The best approach at laparotomy is to corroborate pre operative imaging with intraoperative ultrasonography to identify the lesion. Tumours may be close of the pancreatic duct and this must be appreciated by the operating surgeon. The perioperative use of octreotide reduces the amount of pancreatic drainage, but not overall complications. <br><br><b>Glucagonoma<\/b><br>Glucagonomas originate in the alpha 2 cells of the pancreas. Symptoms are generally related to hormone overproduction and include diabetes, hypoaminoacidemia, normochromic and normocytic anemia, and necrolytic migratory erythema (NME), which is the most characteristic clinical sign (as opposed to symptom) of this pathology. <br><br><b>Diagnosis<\/b><br>Serum measurement of glucagon levels (a level of greater than 1000pg/ml is diagnostic)<br>Imaging with CT scanning of the chest/ abdomen and pelvis<br>Endoscopic USS may be used<br>Combined CT/MRI can accurately localise the lesion in 95% of cases<br><br><b>Treatment<\/b><br>In most cases, disease is metastatic at presentation and therapy with chemotherapy is undertaken, doxorubicin and 5FU have both been used. The biological agent, sunitinib, has also been used. Where the lesion is small, resection may be undertaken, this is usually similar to the resections performed for adenocarcinoma. <br><br><b>Somatostatinoma<\/b><br>Somatostatinomas are rare neuroendocrine tumors that arise from the pancreas or the gastrointestinal tract and are characterized by excessive secretion of somatostatin hormone by tumor cells of D-cell origin. They are frequently associated with a classic clinical pentad of diabetes mellitus, cholelithiasis, weight loss, steatorrhea and diarrhea, and hypochlorhydria and achlorhydria.<br><br>They are rare tumours with an approximate incidence of 1 per 40 million. Over 90% are sporadic. Most are malignant and 85% of patients will have metastatic disease at presentation. <br><br>The tumours are, however, slow growing so reasonable 5 year survival figures are seen even when metastatic disease is present. In those resected without metastatic disease, 5 year survival figures of 100% are reported. <br><br>Diagnosis is based on serum measurements of somatostatin. Imaging is with CT and MRI. Endoscopic USS is also useful. As with all pancreatic malignancies, biopsy is not routinely performed unless the patient is not going to have a definitive resection. <br><br>Chemotherapy is sometimes used as a treatment and 5FU and doxorubicin are typically the agents of choice.<br><br><b>Gastrinomas<\/b><br>Gastrinomas are typically located near the head of the pancreas, they are tumours of borderline biological behaviour but do progress over time. They are typically associated with Zollinger Ellison syndrome (think ulcers refractory to PPI=check gastrin levels). They are usually treated with surgical excision."}, {"name": "Parathyroid glands and disorders of calcium metabolism", "questions": [{"number": 45, "topic": "Parathyroid glands and disorders of calcium metabolism", "stem_html": "A 60 year old man presents with recurrent renal stones. He is found to have a calcium of 2.72 (elevated) and a PTH of 12 (elevated). What is the most appropriate long term management plan?", "options": [{"label_html": "Neck exploration and parathyroidectomy", "is_correct": true}, {"label_html": "CT scanning of the neck", "is_correct": false}, {"label_html": "MRI scanning of the neck", "is_correct": false}, {"label_html": "Medical treatment alone", "is_correct": false}, {"label_html": "External beam radiotherapy to the neck", "is_correct": false}], "correct_index": 0, "explanation_html": "This patient has primary hyperparathyroidism and nephrolithiasis, which is an indication for parathyroidectomy."}, {"number": 46, "topic": "Parathyroid glands and disorders of calcium metabolism", "stem_html": "A 60 year old man presents with recurrent renal stones. He is found to have a calcium of 2.72 (elevated) and a PTH of 12 (elevated). What is the most appropriate long term management plan?", "options": [{"label_html": "Neck exploration and parathyroidectomy", "is_correct": true}, {"label_html": "CT scanning of the neck", "is_correct": false}, {"label_html": "MRI scanning of the neck", "is_correct": false}, {"label_html": "Medical treatment alone", "is_correct": false}, {"label_html": "External beam radiotherapy to the neck", "is_correct": false}], "correct_index": 0, "explanation_html": "This patient has primary hyperparathyroidism and nephrolithiasis, which is an indication for parathyroidectomy."}, {"number": 47, "topic": "Parathyroid glands and disorders of calcium metabolism", "stem_html": "An 82 year old woman from a nursing home is admitted to the orthopaedic ward with a hip fracture. She is acutely confused and agitated. Her Calcium is 2.95 (elevated) and her PTH is 12 (elevated). What is the best course of action?", "options": [{"label_html": "Administration of intravenous dextrose", "is_correct": false}, {"label_html": "Administration of intravenous crystalloid", "is_correct": true}, {"label_html": "Sestamibi scan", "is_correct": false}, {"label_html": "Administration of intravenous colloid", "is_correct": false}, {"label_html": "Emergency parathyroidectomy", "is_correct": false}], "correct_index": 1, "explanation_html": "Whilst she may have an underlying parathyroid lesion, resuscitation should occur first. Initially, this should be with crystalloid."}, {"number": 48, "topic": "Parathyroid glands and disorders of calcium metabolism", "stem_html": "A 72 year old woman with back pain and chronic renal failure has the following blood test results:<br><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><\/th><th><\/th><th>Reference range<\/th><\/tr><\/thead><tbody><tr><td>Ca<sup>2+<\/sup><\/td><td>2.03<\/td><td>2.15-2.55 mmol/l<\/td><\/tr><tr><td>Parathyroid hormone<\/td><td>10.4<\/td><td>1-6.5 pmol/l<\/td><\/tr><tr><td>Phosphate<\/td><td>0.70<\/td><td>0.6-1.25 mmol/l<\/td><\/tr><\/tbody><\/table><\/div><br>What is the most likely diagnosis?", "options": [{"label_html": "Hypoparathyroidism", "is_correct": false}, {"label_html": "Primary hyperparathyroidism", "is_correct": false}, {"label_html": "Secondary hyperparathyroidism", "is_correct": true}, {"label_html": "Tertiary hyperparathyroidism", "is_correct": false}, {"label_html": "Pseudohypoparathyroidism", "is_correct": false}], "correct_index": 2, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">PTH is a phosphate thrashing hormone so whenever there is elevated PTH phosphate will be low<\/div>In relation to secondary hyperparathyroidism; there is a HIGH PTH and the Ca<sup>2+<\/sup> is NORMAL or LOW. In secondary hyperparathyroidism there is hyperplasia of the parathyroid glands in response to chronic hypocalcaemia (or hyperphosphataemia) and is a normal physiological response.  Calcium is released from bone, kidneys and the gastrointestinal system."}, {"number": 49, "topic": "Parathyroid glands and disorders of calcium metabolism", "stem_html": "A 44 year old lady presents with a pathological fracture of the left femur. She has previously undergone a renal transplant for end stage renal failure. Her blood test results are as follows:<br><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th>Serum Ca<sup>2+<\/sup><\/th><th>2.80<\/th><\/tr><\/thead><tbody><tr><td>PTH<\/td><td>88pg/ml<\/td><\/tr><tr><td>Phosphate<\/td><td>0.30<\/td><\/tr><\/tbody><\/table><\/div><br>A surgeon decides to perform a parathyroidectomy on the basis of these results. When the glands are assessed histologically, which of the appearances is most likely to be identified?", "options": [{"label_html": "Metaplasia the gland", "is_correct": false}, {"label_html": "Hypertrophy of the gland", "is_correct": false}, {"label_html": "Hyperplasia of the gland", "is_correct": true}, {"label_html": "Parathyroid carcinoma", "is_correct": false}, {"label_html": "Necrosis of the parathyroid gland", "is_correct": false}], "correct_index": 2, "explanation_html": "This is likely to be a case of tertiary hyperparathyroidism (high Calcium, high PTH, low phosphate). Therefore the glands will be hyperplastic. Hypertrophy is not correct as this implies an increase in size without an increase in cellularity. This mistake has cost many candidates marks in the MRCS exams over the years!"}], "note_html": "<b>Hyperparathyroidism<\/b><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Disease type<\/b><\/th><th><b>Hormone profile<\/b><\/th><th><b>Clinical features<\/b><\/th><th><b>Cause<\/b><\/th><\/tr><\/thead><tbody><tr><td>Primary hyperparathyroidism<\/td><td><ul><li>PTH (Elevated)<\/li><li>Ca<sup>2+<\/sup> (Elevated)<\/li><li>Phosphate (Low)<\/li><li>Urine calcium : creatinine clearance ratio &gt; 0.01<\/li><\/ul><\/td><td><li>May be asymptomatic if mild<\/li><li>Recurrent abdominal pain (pancreatitis, renal colic)<\/li><li>Changes to emotional or cognitive state<\/li><\/td><td>Most cases due to solitary adenoma (80%), multifocal disease occurs in 10-15% and parathyroid carcinoma in 1% or less<\/td><\/tr><tr><td>Secondary hyperparathyroidism<\/td><td><ul><li>PTH (Elevated)<\/li><li>Ca<sup>2+<\/sup> (Low or normal)<\/li><li>Phosphate (Elevated)<\/li><li>Vitamin D levels (Low)<\/li><\/ul><\/td><td><li>May have few symptoms<\/li><li>Eventually may develop bone disease, osteitis fibrosa cystica and soft tissue calcifications<\/li><\/td><td>Parathyroid gland hyperplasia occurs as a result of low calcium, almost always in a setting of chronic renal failure<\/td><\/tr><tr><td>Tertiary hyperparathyroidism<\/td><td><ul><li>Ca<sup>2+<\/sup> (Normal or high)<\/li><li>PTH (Elevated)<\/li><li>Phosphate levels (Decreased or Normal)<\/li><li>Vitamin D (Normal or decreased)<\/li><li>Alkaline phosphatase (Elevated)<\/li><\/ul><\/td><td><li>Metastatic calcification<\/li><li>Bone pain and / or fracture<\/li><li>Nephrolithiasis<\/li><li>Pancreatitis<\/li><\/td><td>Occurs as a result of ongoing hyperplasia of the parathyroid glands after correction of underlying renal disorder, hyperplasia of all 4 glands is usually the cause<\/td><\/tr><\/tbody><\/table><\/div><br><b>Differential diagnoses<\/b><br>It is important to consider the rare but relatively benign condition of benign familial hypocalciuric hypercalcaemia, caused by an autosomal dominant genetic disorder. Diagnosis is usually made by genetic testing and concordant biochemistry (urine calcium : creatinine clearance ratio &lt;0.01-distinguished from primary hyperparathyroidism).<br><br><b>Treatment<\/b><br><br><b>Primary hyperparathyroidism<\/b><br><b>Indications for surgery<\/b><br><ul><li>Elevated serum Calcium &gt; 1mg/dL above normal<\/li><li>Hypercalciuria &gt; 400mg/day<\/li><li>Creatinine clearance &lt; 30% compared with normal<\/li><li>Episode of life threatening hypercalcaemia<\/li><li>Nephrolithiasis<\/li><li>Age &lt; 50 years<\/li><li>Neuromuscular symptoms<\/li><li>Reduction in bone mineral density of the femoral neck, lumbar spine, or distal radius of more than 2.5 standard deviations below peak bone mass (T score lower than -2.5)<\/li><\/ul><br><b>Secondary hyperparathyroidism<\/b><br><i>Usually managed with medical therapy.<\/i><br><br><i>Indications for surgery in secondary (renal) hyperparathyroidism<\/i>:<br><ul><li>Bone pain<\/li><li>Persistent pruritus<\/li><li>Soft tissue calcifications<\/li><\/ul><br><b>Tertiary hyperparathyroidism<\/b><br><i>Allow 12 months to elapse following transplant as many cases will resolve<\/i><br>The presence of an autonomously functioning parathyroid gland may require surgery. If the culprit gland can be identified then it should be excised. Otherwise total parathyroidectomy and re-implantation of part of the gland may be required.<br><br><b>References<\/b><br>1. Insogna K. Primary Hyperparathyroidism. <i> N Engl J Med<\/i>.  2018 Sep 13;379(11):1050-1059.<br><br>2. van der Plas W Y <i> et al<\/i>. Secondary and Tertiary Hyperparathyroidism: A Narrative Review. <i>Scand J Surg<\/i>. 2020 Dec;109(4):271-278."}, {"name": "Phaeochromocytoma and adrenal lesions", "questions": [{"number": 50, "topic": "Phaeochromocytoma and adrenal lesions", "stem_html": "A 43 year old lady with hypertension is suspected of having a phaeochromocytoma. Which of the following investigations is most likely to be beneficial in this situation?", "options": [{"label_html": "Dexamethasone suppression test", "is_correct": false}, {"label_html": "Urinary 5-Hydroxyindoleacetic Acid (5-HIAA)", "is_correct": false}, {"label_html": "Histamine provocation test", "is_correct": false}, {"label_html": "Tyramine provocation test", "is_correct": false}, {"label_html": "Urinary metanephrines measurement", "is_correct": true}], "correct_index": 4, "explanation_html": "Urinary metanephrine measurements are not completely specific but constitute first line assessment and more accurate than urinary VMA measurements. Stimulation tests of any sort are not justified in first line assessments."}, {"number": 51, "topic": "Phaeochromocytoma and adrenal lesions", "stem_html": "Which statement relating to phaeochromocytoma is untrue?", "options": [{"label_html": "They are tumours of chromaffin cells in the adrenal medulla.", "is_correct": false}, {"label_html": "They are bilateral in 10% of cases.", "is_correct": false}, {"label_html": "When located in an extra adrenal location have a higher incidence of malignancy.", "is_correct": false}, {"label_html": "May be associated with an elevated urinary VMA.", "is_correct": false}, {"label_html": "Up to 40% may have a blood pressure within the normal range.", "is_correct": true}], "correct_index": 4, "explanation_html": "Normotension is seen in around 10% cases. The remainder show a degree of hypertension."}, {"number": 52, "topic": "Phaeochromocytoma and adrenal lesions", "stem_html": "A 19 year old lady is admitted to ITU with severe meningococcal sepsis. She is on maximal inotropic support and a CT scan of her chest and abdomen is performed. The adrenal glands show evidence of diffuse haemorrhage. What is the most likely explanation?", "options": [{"label_html": "Waterhouse- Friderichsen syndrome", "is_correct": true}, {"label_html": "Nelsons syndrome", "is_correct": false}, {"label_html": "Walker - Warburg syndrome", "is_correct": false}, {"label_html": "Spontaneous bleed into a malignant lesion", "is_correct": false}, {"label_html": "Spontaneous bleed into a cyst", "is_correct": false}], "correct_index": 0, "explanation_html": "Waterhouse - Friderichsen syndrome is defined as adrenal gland failure due to bleeding into the adrenal glands. It is caused by severe bacterial infection (most commonly the meningococcus Neisseria meningitidis).<br><br>The bacterial infection leads to massive hemorrhage into one or (usually) both adrenal glands. It is characterised by overwhelming bacterial infection meningococcemia leading to massive blood invasion, organ failure, coma, haemodynamic shock, disseminated intravascular coagulation with widespread purpura, rapidly developing adrenocortical insufficiency and death.<br><br>Note the scenarios relating to spontaneous bleeding related to a unilateral process and cannot therefore be the correct answer."}, {"number": 53, "topic": "Phaeochromocytoma and adrenal lesions", "stem_html": "A 34 year old lady is admitted with recurrent episodes of non-specific abdominal pain. On each admission all blood investigations are normal, as are her observations. On this admission a CT scan was performed. This demonstrates a 1.5cm nodule in the right adrenal gland. This is associated with a lipid rich core. Urinary VMA is within normal limits. Other hormonal studies are normal. What is the most likely diagnosis?", "options": [{"label_html": "Malignant adrenal adenoma", "is_correct": false}, {"label_html": "Phaeochromocytoma", "is_correct": false}, {"label_html": "Metastatic lesion", "is_correct": false}, {"label_html": "Benign non functional adenoma", "is_correct": true}, {"label_html": "Benign functional adenoma", "is_correct": false}], "correct_index": 3, "explanation_html": "This is typical for a benign non functional adenoma. Benign adenomas often have a lipid rich core that is readily identifiable on CT scanning. In addition the nodules are often well circumscribed."}, {"number": 54, "topic": "Phaeochromocytoma and adrenal lesions", "stem_html": "A 38 year old man is noted to have a blood pressure of 175/110 on routine screening. On examination there are no physical abnormalities of note. CT scanning shows a left sided adrenal mass. Plasma metanephrines are elevated. What is the most likely cause?", "options": [{"label_html": "Benign adrenal adenoma", "is_correct": false}, {"label_html": "Metastatic lesion", "is_correct": false}, {"label_html": "Phaeochromocytoma", "is_correct": true}, {"label_html": "Adrenal cyst", "is_correct": false}, {"label_html": "Conn's syndrome", "is_correct": false}], "correct_index": 2, "explanation_html": "Hypertension in a young patient without any obvious cause should be investigated. Urinary VMA and plasma metanephrines are typically elevated."}], "note_html": "<b>Phaeochromocytoma<\/b><br>Neuroendocrine tumour of the chromaffin cells of the adrenal medulla. Hypertension and hyperglycaemia are often found.<br><ul><li>10% of cases are bilateral.<\/li><li>10% occur in children.<\/li><li>11% are malignant (higher when tumour is located outside the adrenal).<\/li><li>10% will not be hypertensive.<\/li><\/ul><br>Familial cases are usually linked to the Multiple endocrine neoplasia syndromes (considered under its own heading).<br><br>Most tumours are unilateral (often right sided) and smaller than 10cm.<br><br><b>Diagnosis<\/b><br>Urine and plasma metanephrine levels.<br><br>CT and MRI scanning are both used to localise the lesion.<br><br><b>Treatment<\/b><br>Patients require medical therapy first. An irreversible alpha adrenoreceptor blocker should be given, although minority may prefer reversible blockade(1). Labetolol may be co-administered for cardiac chronotropic control. Isolated beta blockade should not be considered as it will lead to unopposed alpha activity. <br><br>These patients are often volume depleted and will often require moderate volumes of intra venous normal saline perioperatively.<br><br>Once medically optimised the phaeochromocytoma should be removed. Most adrenalectomies can now be performed using a laparoscopic approach(2). The adrenals are highly vascular structures and removal can be complicated by catastrophic haemorrhage in the hands of the inexperienced. This is particularly true of right sided resections where the IVC is perilously close. Should the IVC be damaged a laparotomy will be necessary and the defect enclosed within a Satinsky style vascular clamp and the defect closed with prolene sutures. Attempting to interfere with the IVC using any instruments other than vascular clamps will result in vessel trauma and make a bad situation much worse.<br><br><b>Incidental adrenal lesions<\/b><br>Adrenal lesions may be identified on CT scanning performed for other reasons(3). Factors suggesting benign disease on CT include(4):<br><ul><li>Size less than 3cm<\/li><li>Homogeneous texture<\/li><li>Lipid rich tissue<\/li><li>Thin wall to lesion<\/li><\/ul><br>All patients with incidental lesions should be managed jointly with an endocrinologist and full work up as described above. Patients with functioning lesions or those with adverse radiological features (Particularly size &gt;3cm) should proceed to surgery.<br><br> <br><b>References<\/b><br>1.  Weingarten TN, Cata JP, O'Hara JF, Prybilla DJ, Pike TL, Thompson GB, <i>et al<\/i>. Comparison of two preoperative medical management strategies for laparoscopic resection of pheochromocytoma. Urology. 2010 Aug;76(2):508 e6-11.<br><br>2. Nguyen PH, Keller JE, Novitsky YW, Heniford BT, Kercher KW. Laparoscopic approach to adrenalectomy: review of perioperative outcomes in a single center. Am Surg. 2011 May;77(5):592-6.<br><br>3. Ng VW, Ma RC, So WY, Choi KC, Kong AP, Cockram CS, <i>et al<\/i>. Evaluation of functional and malignant adrenal incidentalomas. Arch Intern Med. 2010 Dec 13;170(22):2017-20.<br><br>4. Muth A, Hammarstedt L, Hellstrom M, Sigurjonsdottir HA, Almqvist E, Wangberg B. Cohort study of patients with adrenal lesions discovered incidentally. Br J Surg. 2011 May 27."}, {"name": "Primary hyperparathyroidism", "questions": [{"number": 55, "topic": "Primary hyperparathyroidism", "stem_html": "A 38 year old lady presents with a recent episode of renal colic. As part of her investigations the following results are obtained:<br><div class=\"table-responsive\"><table class=\"tb\"><tbody><tr><td>Corrected Calcium<\/td><td>3.84 mmol/l<\/td><\/tr><tr><td>PTH<\/td><td>88pg/ml (increased)<\/td><\/tr><\/tbody><\/table><\/div>Her serum urea and electrolytes are normal.<br>What is the most likely diagnosis?", "options": [{"label_html": "Carcinoma of the bronchus", "is_correct": false}, {"label_html": "Secondary hyperparathyroidism", "is_correct": false}, {"label_html": "Primary hyperparathyroidism", "is_correct": true}, {"label_html": "Tertiary hyperparathyroidism", "is_correct": false}, {"label_html": "Carcinoma of the breast", "is_correct": false}], "correct_index": 2, "explanation_html": "In this situation the <i>most likely <\/i>diagnosis is primary hyperparathyroidism. The question mentions that serum urea and electrolytes are normal, which makes tertiary hyperparathyroidism unlikely."}, {"number": 56, "topic": "Primary hyperparathyroidism", "stem_html": "Brown tumours of bone are associated with which of the following?", "options": [{"label_html": "Hyperthyroidism", "is_correct": false}, {"label_html": "Hypothyroidism", "is_correct": false}, {"label_html": "Hyperparathyroidism", "is_correct": true}, {"label_html": "Hypoparathyroidism", "is_correct": false}, {"label_html": "Osteopetrosis", "is_correct": false}], "correct_index": 2, "explanation_html": "Brown tumors are tumors of bone that arise in settings of excess osteoclast activity, such as hyperparathyroidism, and consist of fibrous tissue, woven bone and supporting vasculature, but no matrix. They are radiolucent on x-ray. The osteoclasts consume the trabecular bone that osteoblasts lay down and this front of reparative bone deposition followed by additional resorption can expand beyond the usual shape of the bone, involving the periosteum thus causing bone pain. They appear brown because haemosiderin is deposited at the site."}, {"number": 57, "topic": "Primary hyperparathyroidism", "stem_html": "Brown tumours of bone are associated with which of the following?", "options": [{"label_html": "Hyperthyroidism", "is_correct": false}, {"label_html": "Hypothyroidism", "is_correct": false}, {"label_html": "Hyperparathyroidism", "is_correct": true}, {"label_html": "Hypoparathyroidism", "is_correct": false}, {"label_html": "Osteopetrosis", "is_correct": false}], "correct_index": 2, "explanation_html": "Brown tumors are tumors of bone that arise in settings of excess osteoclast activity, such as hyperparathyroidism, and consist of fibrous tissue, woven bone and supporting vasculature, but no matrix. They are radiolucent on x-ray. The osteoclasts consume the trabecular bone that osteoblasts lay down and this front of reparative bone deposition followed by additional resorption can expand beyond the usual shape of the bone, involving the periosteum thus causing bone pain. They appear brown because haemosiderin is deposited at the site."}, {"number": 58, "topic": "Primary hyperparathyroidism", "stem_html": "A 28 year old man presents with musculoskeletal pain. He undergoes a radiological assessment and his x-rays demonstrate widespread osteopaenia with well circumscribed lucent areas. Which of the following imaging modalities is most likely to demonstrate the cause?", "options": [{"label_html": "Transrectal USS of the prostate gland", "is_correct": false}, {"label_html": "USS of the neck", "is_correct": true}, {"label_html": "CT scan of the kidney with contrast", "is_correct": false}, {"label_html": "MRI of the pancreas", "is_correct": false}, {"label_html": "Small bowel MRI scan", "is_correct": false}], "correct_index": 1, "explanation_html": "The description provided would fit with bone lesions that are seen in hyperparathyroidism and this would account for the generalised osteopaenia. Malignancies of the prostate present in older adults and the lesions are different. A GI cause may cause malabsorption but not create lucent areas. Renal tumours are often very hypervascular but there is not osteopaenia."}], "note_html": "In exams, primary hyperparathyroidism is stereotypically seen in elderly females with an unquenchable thirst and an inappropriately normal or raised parathyroid hormone level. It is most commonly due to a solitary adenoma<br><br>Causes of primary hyperparathyroidism <br><ul><li>80%: solitary adenoma<\/li><li>15%: hyperplasia<\/li><li>4%: multiple adenoma<\/li><li>1%: carcinoma<\/li><\/ul><br>Features - 'bones, stones, abdominal groans and psychic moans'<br><ul><li>Polydipsia, polyuria<\/li><li>Peptic ulceration/constipation/pancreatitis <\/li><li>Bone pain/fracture<\/li><li>Renal stones<\/li><li>Depression<\/li><li>Hypertension<\/li><\/ul><br>Associations<br><ul><li>Hypertension<\/li><li>Multiple endocrine neoplasia: MEN I and II<\/li><\/ul><br>Investigations<br><ul><li>Raised calcium, low phosphate<\/li><li>PTH may be raised or normal<\/li><li>Technetium-MIBI subtraction scan<\/li><\/ul><br>Treatment<br><ul><li>Parathyroidectomy, if imaging suggests target gland then a focused approach may be used<\/li><\/ul>"}, {"name": "Thyroglossal cysts", "questions": [{"number": 59, "topic": "Thyroglossal cysts", "stem_html": "An 8 year old boy presents with a lump in his neck. On examination, he is found to have a lump in the midline of the neck immediately below the hyoid which moves on tongue protrusion. What is the most likely diagnosis?", "options": [{"label_html": "Benign lymphadenopathy", "is_correct": false}, {"label_html": "Malignant lymphadenopathy", "is_correct": false}, {"label_html": "Thyroglossal cyst", "is_correct": true}, {"label_html": "Branchial cyst", "is_correct": false}, {"label_html": "Dermoid cyst", "is_correct": false}], "correct_index": 2, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Thyroglossal cysts are the commonest midline cysts in the neck found in children<\/div>Both dermoid and thyroglossal cysts are often located in the midline. Dermoid cysts are usually found above the hyoid and do not move on swallowing. Thyroglossal cysts lie below the hyoid and move on tongue protrusion.."}, {"number": 60, "topic": "Thyroglossal cysts", "stem_html": "A 30 year old lady is found to have a thyroglossal cyst that has been recently infected and the patient requests treatment. What is the most appropriate course of action?", "options": [{"label_html": "Surgical treatment with resection of cyst, associated track, central portion of the hyoid and wedge of tongue muscle behind the hyoid", "is_correct": true}, {"label_html": "Excision of the cyst alone with ligation of the track", "is_correct": false}, {"label_html": "Laying open of the track and excision of the cyst", "is_correct": false}, {"label_html": "Phenolisation of the cyst", "is_correct": false}, {"label_html": "Marsupialisation of the cyst", "is_correct": false}], "correct_index": 0, "explanation_html": "Recurrence following attempted resection of thyroglossal cysts is very common. Complete excision of the cyst and its track and origin is mandatory (Sistrunks procedure)."}], "note_html": "The commonest midline neck mass in children is a congenital cyst of the thyroglossal duct. Embryologically, the cyst can arise at any point along the route of the thyroglossal duct, extending from the foramen caecum to the thyroid gland. <br>They are typically located below the hyoid and moves both on swallowing and tongue protrusion. Whilst most cysts are asymptomatic, associated infection may result in pain and swelling. <br>The usual treatment is excision of the cyst and track, this is a called a Sistrunk procedure."}, {"name": "Thyroid disease", "questions": [{"number": 61, "topic": "Thyroid disease", "stem_html": "A 34 year old female presents with a thyroid nodule. She has a family history of thyroid disease and both her sisters have undergone total thyroidectomies. Her past medical history includes hypertension which has been difficult to manage. What is the most likely underlying thyroid lesion?", "options": [{"label_html": "Papillary thyroid cancer", "is_correct": false}, {"label_html": "Follicular adenoma", "is_correct": false}, {"label_html": "Medullary thyroid cancer", "is_correct": true}, {"label_html": "Anaplastic thyroid cancer", "is_correct": false}, {"label_html": "Lymphoma of the thyroid", "is_correct": false}], "correct_index": 2, "explanation_html": "This is a typical scenario for medullary carcinoma in which a phaeochromocytoma may also be present. It may be inherited in an autosomal dominant fashion and affected family members may be offered prophylactic thyroidectomy."}, {"number": 62, "topic": "Thyroid disease", "stem_html": "A 46 year old man is admitted to hospital with a femoral shaft fracture that occurred suddenly whilst he was out walking his dog. On examination, there is no neurovascular deficit distal to the fracture site. He has a large firm nodule in the left lobe of the thyroid, there is no associated lymphadenopathy. What is the most likely underlying cause?", "options": [{"label_html": "Papillary thyroid cancer", "is_correct": false}, {"label_html": "Follicular thyroid cancer", "is_correct": true}, {"label_html": "Thyroid gland lymphoma", "is_correct": false}, {"label_html": "Anaplastic thyroid cancer", "is_correct": false}, {"label_html": "Medullary thyroid cancer", "is_correct": false}], "correct_index": 1, "explanation_html": "Follicular carcinomas may metastasise haematogenously (often to bone) where they may give rise to pathological fractures as in this case."}, {"number": 63, "topic": "Thyroid disease", "stem_html": "An 18 year old female presents with 3 nodules in the right lobe of the thyroid. Clinically she is euthyroid and there is associated cervical lymphadenopathy. She has no family history of thyroid disease. What is the most likely cause?", "options": [{"label_html": "Follicular thyroid cancer", "is_correct": false}, {"label_html": "Follicular thyroid adenoma", "is_correct": false}, {"label_html": "Papillary thyroid cancer", "is_correct": true}, {"label_html": "Hashimotos thyroiditis", "is_correct": false}, {"label_html": "Toxic nodular goitre", "is_correct": false}], "correct_index": 2, "explanation_html": "Papillary thyroid cancers are the most common type of thyroid cancer and are the more common in females (M:F=1:3). Papillary tumours are more likely to develop lymphatic spread than follicular tumours."}, {"number": 64, "topic": "Thyroid disease", "stem_html": "A 52 year old lady presents to the surgical clinic with a goitre. She is taking medication for an underlying psychiatric disorder. Which of the drugs listed below is most likely to be responsible?", "options": [{"label_html": "Haloperidol", "is_correct": false}, {"label_html": "Imipramine", "is_correct": false}, {"label_html": "Amytryptiline", "is_correct": false}, {"label_html": "Lithium", "is_correct": true}, {"label_html": "Venlafaxine", "is_correct": false}], "correct_index": 3, "explanation_html": "A significant proportion of patients who take lithium treatment will develop a goitre and a number will become clinically hypothyroid. For this reason, monitoring of thyroid function tests is necessary during lithium therapy."}, {"number": 65, "topic": "Thyroid disease", "stem_html": "A 43 year old lady has undergone a total thyroidectomy for multinodular goitre. You are called to see her because of respiratory distress. On examination she has a marked stridor, her wound seems healthy but there is a swelling within the operative site. What is the most likely explanation for this problem?", "options": [{"label_html": "Bilateral superior laryngeal nerve injury", "is_correct": false}, {"label_html": "Hypocalcaemic tetany", "is_correct": false}, {"label_html": "Anxiety", "is_correct": false}, {"label_html": "Contained haematoma", "is_correct": true}, {"label_html": "Unilateral recurrent laryngeal nerve injury", "is_correct": false}], "correct_index": 3, "explanation_html": "In this setting a contained haematoma is the most likely cause. This will impair venous return resulting in laryngeal oedema and respiratory compromise."}, {"number": 66, "topic": "Thyroid disease", "stem_html": "A 42 year old lady is investigated for symptoms of irritability and altered bowel habit. On examination she is noted to have a smooth enlargement of the thyroid gland. As part of her investigations thyroid function tests are requested, these are as follows:<br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>TSH<\/b><\/th><th>0.1 mug/l<\/th><\/tr><\/thead><tbody><tr><td><b>Free T4<\/b><\/td><td>35 pmol/l<\/td><\/tr><\/tbody><\/table><\/div>The most likely underlying diagnosis is:", "options": [{"label_html": "Multinodular goitre", "is_correct": false}, {"label_html": "Follicular carcinoma of the thyroid gland", "is_correct": false}, {"label_html": "Graves disease", "is_correct": true}, {"label_html": "Pregnancy", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 2, "explanation_html": "TSH receptor antibodies will cause stimulation of the thyroid to synthesise T4. However, this will have a negative feedback effect on the pituitary causing decrease in TSH levels.<br>Where hyperthyroidism occurs secondary to pregnancy the TSH is typically elevated."}], "note_html": "Patients may present with a number of different manifestations of thyroid disease. They can be broadly sub classified according to whether they are euthyroid or have clinical signs of thyroid dysfunction. In addition it needs to be established whether they have a mass or not.<br><br><b>Assessment<\/b><br><ul><li>History<\/li><li>Examination including USS<\/li><li>If a nodule is identified then it should be sampled ideally via an image guided fine needle aspiration<\/li><li>Radionucleotide scanning is of limited use<\/li><\/ul><br><b>Thyroid Tumours<\/b><br><ul><li>Papillary carcinoma <\/li><li>Follicular carcinoma<\/li><li>Anaplastic carcinoma<\/li><li>Medullary carcinoma<\/li><li>Lymphoma's<\/li><\/ul><br><br><b>Multinodular goitre<\/b><br><ul><li>One of the most common reasons for presentation<\/li><li>Provided the patient is euthyroid and asymptomatic and no discrete nodules are seen, they can be reassured. <\/li><li>In those with compressive symptoms surgery is required and the best operation is a total thyroidectomy. <\/li><li>Sub total resections were practised in the past and simply result in recurrent disease that requires a difficult revisional resection.<\/li><\/ul><br><b>Endocrine dysfunction<\/b><br><ul><li>In general these patients are managed by physicians initially. <\/li><li>Surgery may be offered alongside radio iodine for patients with Graves disease that fails with medical management or in patients who would prefer not to be irradiated (e.g. pregnant women).<\/li><li>Patients with hypothyroidism do not generally get offered a thyroidectomy. Sometimes people inadvertently get offered resections during the early phase of Hashimotos thyroiditis, however, with time the toxic phase passes and patients can simply be managed with thyroxine.<\/li><\/ul> <br><b>Complications following surgery<\/b><br><ul><li>Anatomical such as recurrent laryngeal nerve damage.<\/li><li>Bleeding. Owing to the confined space haematoma's may rapidly lead to respiratory compromise owing to laryngeal oedema.<\/li><li>Damage to the parathyroid glands resulting in hypocalcaemia.<\/li><\/ul><br><b>Further sources of information<\/b><br>1. http://www.acb.org.uk/docs/TFTguidelinefinal.pdf- Association of Clinical Biochemistry guidelines for thyroid function tests.<br><br>2. British association of endocrine surgeons website- http://www.baets.org.uk"}, {"name": "Thyroid function tests", "questions": [{"number": 67, "topic": "Thyroid function tests", "stem_html": "A 52 year old woman presents with an acutely ischaemic right arm. She is found to have fast atrial fibrillation. Her blood results reveal a free T4 level of 20 and a TSH of &lt; 0.01. What is the most likely diagnosis?", "options": [{"label_html": "Poor compliance with thyroid medication", "is_correct": false}, {"label_html": "Thyrotoxicosis", "is_correct": true}, {"label_html": "Multinodular goitre", "is_correct": false}, {"label_html": "Sick euthyroid syndrome", "is_correct": false}, {"label_html": "Hashimotos thyroiditis", "is_correct": false}], "correct_index": 1, "explanation_html": "The diagnosis is thyrotoxicosis. An elevated T4 and a low TSH should indicate this diagnosis. Remember atrial fibrillation and its complications i.e acute ischaemic limbs can be precipitated by hyperthyroid disorders."}, {"number": 68, "topic": "Thyroid function tests", "stem_html": "A 52 year old woman presents with an acutely ischaemic right arm. She is found to have fast atrial fibrillation. Her blood results reveal a free T4 level of 20 and a TSH of &lt; 0.01. What is the most likely diagnosis?", "options": [{"label_html": "Poor compliance with thyroid medication", "is_correct": false}, {"label_html": "Thyrotoxicosis", "is_correct": true}, {"label_html": "Multinodular goitre", "is_correct": false}, {"label_html": "Sick euthyroid syndrome", "is_correct": false}, {"label_html": "Hashimotos thyroiditis", "is_correct": false}], "correct_index": 1, "explanation_html": "The diagnosis is thyrotoxicosis. An elevated T4 and a low TSH should indicate this diagnosis. Remember atrial fibrillation and its complications i.e acute ischaemic limbs can be precipitated by hyperthyroid disorders."}, {"number": 69, "topic": "Thyroid function tests", "stem_html": "A 42 year old woman presents with a goitre. On examination the goitre feels 'lumpy'. The blood results reveal a TSH of 12 and a free T4 of 2. Antithyroid peroxidase antibodies are high. What is the most likely cause?", "options": [{"label_html": "Multinodular goitre", "is_correct": false}, {"label_html": "Graves disease", "is_correct": false}, {"label_html": "Hashimoto's", "is_correct": true}, {"label_html": "Sick euthyroid syndrome", "is_correct": false}, {"label_html": "Poor compliance with thyroid medication", "is_correct": false}], "correct_index": 2, "explanation_html": "Hashimotos usually presents in women aged between 30- 50 years. They are normally associated with a goitre. To differentiate from hypothyroidism, the antithyroid peroxidase antibodies will be elevated."}], "note_html": "The interpretation of thyroid function tests is usually straightforward:<br><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Disorder<\/b><\/th><th><b>TSH<\/b><\/th><th><b>Free T4<\/b><\/th><th><\/th><\/tr><\/thead><tbody><tr><td>Thyrotoxicosis (e.g. Graves' disease)<\/td><td>Low<\/td><td>High<\/td><td>In T3 thyrotoxicosis the free T4 will be normal<\/td><\/tr><tr><td>Primary hypothyroidism (primary atrophic hypothyroidism)<\/td><td>High<\/td><td>Low<\/td><td><\/td><\/tr><tr><td>Secondary hypothyroidism<\/td><td>Low<\/td><td>Low<\/td><td>Replacement steroid therapy is required prior to thyroxine<\/td><\/tr><tr><td>Sick euthyroid syndrome*<\/td><td>Low**<\/td><td>Low<\/td><td>Common in hospital inpatients<\/td><\/tr><tr><td>Poor compliance with thyroxine<\/td><td>High<\/td><td>Normal / high<\/td><td><\/td><\/tr><tr><td>Steroid therapy<\/td><td>Low<\/td><td>Normal<\/td><td><\/td><\/tr><\/tbody><\/table><\/div><br><br>*now referred to as non-thyroidal illness<br><br>**TSH may be normal in some cases"}, {"name": "Thyroid gland disorders-cancer", "questions": [{"number": 70, "topic": "Thyroid gland disorders-cancer", "stem_html": "A 73 year old lady presents with a mass in her neck. For many years she had worked as a radiographer. Imaging is highly suggestive of thyroid gland malignancy. Which of the tumour types listed below represents the most likely underlying diagnosis?", "options": [{"label_html": "Follicular thyroid cancer", "is_correct": false}, {"label_html": "Medullary thyroid cancer", "is_correct": false}, {"label_html": "Papillary thyroid cancer", "is_correct": true}, {"label_html": "Anaplastic thyroid cancer", "is_correct": false}, {"label_html": "Thyroid gland lymphoma", "is_correct": false}], "correct_index": 2, "explanation_html": "Non therapeutic irradiation of the neck is most closely linked to papillary gland cancer."}], "note_html": "Thyroid cancer is a relatively rare condition and overall will comprise approximately 1-2% of all solid tumours in a 1 year period. They are classified as being papillary, follicular, anaplastic, lymphoma and sarcomatous. <br><br><b>Presenting features<\/b><br><ul><li>Typically presents as a discrete nodule or mass<\/li><li>Lymph node or haematogenous metastasis may be present<\/li><li>Locally advanced disease may invade/ compress adjacent structures with symptoms of dysphagia, dyspnoea or speech changes arising from nerve involvement<\/li><\/ul><br><b>Key points in the history<\/b><br><ul><li>Pattern of symptom onset<\/li><li>Any association with pain (cancers are usually painless)<\/li><li>Patients age (cancers most common in those aged &gt;60 years)<\/li><li>History of radiation exposure is significant as this increases the risk<\/li><li>Family history of endocrine disease (MEN I/II)<\/li><\/ul><br><b>Examination<\/b><br><ul><li>Adequate exposure of the neck<\/li><li>Assess peripheral stigmata of thyroid status (most cancers occur in euthyroid patients)  <\/li><li>Any overt stigmata of MEN<\/li><li>Is the mass visible?<\/li><li>Palpate the patient's neck stood behind them<\/li><li>Palpate the mass whilst asking the patient to swallow to determine its relationship to the thyroid<\/li><li>Examine carefully for palpable neck nodes<\/li><li>Attempts to elicit Pembertons sign by having the patient elevate their arms may be useful in establishing the presence of a sub sternal goitre<\/li><\/ul><br><b>Diagnosis<\/b><br><ul><li>In all cases a USS must be performed<\/li><li>Where a lesion is identified an FNAC is the usual first line management<\/li><li>FNAC cannot accurately diagnose follicular lesions or lymphoma<\/li><li>Staging is with chest x-ray and sometimes bone scans. Where an adverse prognosis is suspected CT scanning is usually performed.<\/li><\/ul><br><b>Lesions<\/b><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Lesion<\/b><\/th><th><b>Common features<\/b><\/th><\/tr><\/thead><tbody><tr><td>Follicular adenoma<\/td><td><ul><li>Usually present as a solitary thyroid nodule<\/li><li>Malignancy can only be excluded on formal histological assessment<\/li><\/ul><\/td><\/tr><tr><td>Papillary carcinoma<\/td><td><ul><li>Usually contain a mixture of papillary and colloidal filled follicles<\/li><li>Histologically tumour has papillary projections and pale empty nuclei<\/li><li>Seldom encapsulated<\/li><li>Lymph node metastasis predominate<\/li><li>Haematogenous metastasis rare<\/li><li>Account for 60% of thyroid cancers<\/li><\/ul><\/td><\/tr><tr><td>Follicular carcinoma<\/td><td><ul><li>May appear macroscopically encapsulated, microscopically capsular invasion is seen. Without this finding the lesion is a follicular adenoma.<\/li><li>Vascular invasion predominates<\/li><li>Multifocal disease rare<\/li><li>Account for 20% of all thyroid cancers<\/li><\/ul><\/td><\/tr><tr><td>Anaplastic carcinoma<\/td><td><ul><li>Most common in elderly females<\/li><li>Local invasion is a common feature<\/li><li>Account for 10% of thyroid cancers<\/li><li>Treatment is by resection where possible, palliation may be achieved through isthmusectomy and radiotherapy. Chemotherapy is ineffective.<\/li><\/ul><\/td><\/tr><tr><td>Medullary carcinoma<\/td><td><ul><li>Tumours of the parafollicular cells (C Cells)<\/li><li>C cells derived from neural crest and not thyroid tissue<\/li><li>Serum calcitonin levels often raised<\/li><li>Familial genetic disease accounts for up to 20% cases<\/li><li>Both lymphatic and haematogenous metastasis are recognised, nodal disease is associated with a very poor prognosis.<\/li><\/ul><\/td><\/tr><\/tbody><\/table><\/div><br><b>Management<\/b><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid2\"><thead><tr><th><b>Lesion<\/b><\/th><th><b>Usual management<\/b><\/th><\/tr><\/thead><tbody><tr><td>Lymphoma<\/td><td>Chemotherapy<\/td><\/tr><tr><td>Anaplastic cancer<\/td><td>Local debulking surgery, palliative radiotherapy<\/td><\/tr><tr><td>Papillary thyroid cancer<\/td><td>Hemithyroidectomy (T1 disease) or total thyroidectomy and central compartmental nodal dissection (T2 or greater)<\/td><\/tr><tr><td>Follicular thyroid cancer<\/td><td>Total thyroidectomy<\/td><\/tr><tr><td>Follicular adenoma<\/td><td>Hemithyroidectomy (the diagnosis is based on resected tissue analysis)<\/td><\/tr><tr><td>Medullary thyroid cancer<\/td><td>Total thyroidectomy<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Thyroiditis", "questions": [{"number": 71, "topic": "Thyroiditis", "stem_html": "A 46-year-old woman is referred to endocrine surgery for a possible thyroidectomy.  She has a tender neck swelling. Blood results are as follows:<br><br><div class=\"table-responsive\"><table class=\"tb\"><tbody><tr><td>TSH<\/td><td>&lt;0.1 mU/l<\/td><\/tr><tr><td>T4<\/td><td>188 nmol/l<\/td><\/tr><tr><td>&nbsp;<\/td><\/tr><tr><td>Hb<\/td><td>14.2 g/dl<\/td><\/tr><tr><td>Plt<\/td><td>377 * 10^9/l<\/td><\/tr><tr><td>WBC<\/td><td>6.4 * 10^9/l<\/td><\/tr><tr><td>&nbsp;<\/td><\/tr><tr><td>ESR<\/td><td>65 mm/hr<\/td><\/tr><\/tbody><\/table><\/div><br>Technetium thyroid scan shows decreased uptake globally<br><br>What is the most likely diagnosis?", "options": [{"label_html": "Sick thyroid syndrome", "is_correct": false}, {"label_html": "Acute bacterial thyroiditis", "is_correct": false}, {"label_html": "Hashimoto's thyroiditis", "is_correct": false}, {"label_html": "Subacute thyroiditis", "is_correct": true}, {"label_html": "Toxic multinodular goitre", "is_correct": false}], "correct_index": 3, "explanation_html": "This patient does not need surgery!  Subacute thyroiditis is suggested by the tender goitre, hyperthyroidism and raised ESR. The globally reduced uptake on technetium thyroid scan is also typical.  This should resolve without any active intervention."}, {"number": 72, "topic": "Thyroiditis", "stem_html": "A 36-year-old woman who presented with a goitre is diagnosed with autoimmune thyroiditis. Which one of the following types of thyroid cancer is she predisposed to developing?", "options": [{"label_html": "Anaplastic", "is_correct": false}, {"label_html": "Lymphoma", "is_correct": true}, {"label_html": "Medullary", "is_correct": false}, {"label_html": "Follicular", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 1, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Hashimoto's thyroiditis is associated with thyroid lymphoma<\/div>Rarely, a patient with Hashimotos thyroiditis may develop a lymphoma of the thyroid gland. The exact aetiology of thyroid gland lymphoma is unknown. Hashimotos thyroiditis is a definite risk factor. It is possible that the lymphoma may represent the expansion of a clone of immortalised intrathyroidal lymphocytes. Lymphoma of the gland is characterised by rapid thyroid growth despite T4 therapy. Whilst adenocarcinoma of the thyroid may occur in association with thyroiditis there are no studies, to date, showing a correlation between these two conditions. The commonest sequelae of thyroiditis is hypothyroidism."}, {"number": 73, "topic": "Thyroiditis", "stem_html": "A 52 year old woman with known Hashimotos thyroiditis presents with a neck swelling. She describes it as rapidly increasing in size over 3 months and she complains of dysphagia to solids. On examination, there is an asymmetrical swelling of the thyroid gland. What is the most likely diagnosis?", "options": [{"label_html": "Anaplastic thyroid cancer", "is_correct": false}, {"label_html": "Follicular thyroid cancer", "is_correct": false}, {"label_html": "Papillary thyroid cancer", "is_correct": false}, {"label_html": "Lymphoma", "is_correct": true}, {"label_html": "Toxic adenoma", "is_correct": false}], "correct_index": 3, "explanation_html": "Thyroid lymphoma (Non Hodgkin's B cell lymphoma) is rare. It should be considered in patients with a background of Hashimoto's thyroiditis and a rapid growth in size of the thyroid gland. Diagnosis can be made with core needle biopsy; however an incisional biopsy may be needed. Radiotherapy is the main treatment option."}], "note_html": "<b>Sub acute thyroiditis<\/b><br>Subacute thyroiditis (also known as De Quervain's thyroiditis) is thought to occur following viral infection and typically presents with hyperthyroidism<br><br>Features<br><ul><li>Hyperthyroidism<\/li><li>Painful goitre<\/li><li>Raised ESR<\/li><li>Globally reduced uptake on iodine-131 scan<\/li><\/ul><br>Management<br><ul><li>Usually self-limiting - most patients do not require treatment<\/li><li>Thyroid pain may respond to aspirin or other NSAIDs<\/li><li>In more severe cases steroids are used, particularly if hypothyroidism develops<\/li><\/ul><br><b>Hashimotos thyroiditis<\/b><br>Hashimotos thyroiditis is an immunological disorder in which lymphocytes become sensitised to thyroidal antigens. The three most important antibodies include; thyroglobulin, TPO and TSH-R. During the early phase of Hashimotos the the thyroglobulin antibody is markedly elevated and then declines. <br><br>Features<br><ul><li>Goitre and either euthyroid or mild hypothyroidism<\/li><li>Progressive hypothyroidism (and associated symptoms)<\/li><\/ul><br>Management<br><ul><li>During the hyperthyroid phase of illness beta blockers may manage symptoms<\/li><li>As hypothyroidism develops patients may require thyroxine<\/li><\/ul>"}]}</script>
  <script>
    const quizData = JSON.parse(document.getElementById("quiz-data").textContent);
    const app = document.getElementById("app");
    const modeButtons = Array.from(document.querySelectorAll("[data-mode-button]"));
    const topicActionButtons = Array.from(document.querySelectorAll("[data-topic-action]"));

    const state = {
      mode: "solve",
      answers: new Map(),
      questionRefs: [],
    };

    function buildTopic(topic, questionOffset) {
      const details = document.createElement("details");
      details.className = "topic";
      details.open = true;

      const summary = document.createElement("summary");
      summary.innerHTML = `
        <div>
          <h2 class="topic-title">${topic.name}</h2>
        </div>
        <div class="topic-meta">
          <span>${topic.questions.length} questions</span>
          <span class="chevron" aria-hidden="true">></span>
        </div>
      `;

      const body = document.createElement("div");
      body.className = "topic-body";

      if (topic.note_html) {
        const notes = document.createElement("details");
        notes.className = "topic-notes";

        const notesSummary = document.createElement("summary");
        notesSummary.innerHTML = `
          <span class="topic-notes-title">Notes</span>
          <span class="chevron" aria-hidden="true">></span>
        `;

        const notesBody = document.createElement("div");
        notesBody.className = "topic-notes-body rich-text";
        notesBody.innerHTML = topic.note_html;

        notes.appendChild(notesSummary);
        notes.appendChild(notesBody);
        body.appendChild(notes);
      }

      topic.questions.forEach((question, indexInTopic) => {
        const globalIndex = questionOffset + indexInTopic;
        body.appendChild(buildQuestionCard(question, globalIndex));
      });

      details.appendChild(summary);
      details.appendChild(body);
      return details;
    }

    function buildQuestionCard(question, questionIndex) {
      const card = document.createElement("article");
      card.className = "question-card is-hidden";
      card.dataset.questionIndex = String(questionIndex);

      const label = document.createElement("p");
      label.className = "question-label";
      label.textContent = `Question ${question.number}`;

      const stem = document.createElement("div");
      stem.className = "stem rich-text";
      stem.innerHTML = question.stem_html;

      const options = document.createElement("div");
      options.className = "options";

      const optionButtons = question.options.map((option, optionIndex) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "option";
        button.dataset.optionIndex = String(optionIndex);
        button.innerHTML = option.label_html;
        button.addEventListener("click", () => {
          if (state.mode !== "solve") {
            return;
          }
          state.answers.set(questionIndex, optionIndex);
          applyQuestionState(questionIndex);
        });
        options.appendChild(button);
        return button;
      });

      const explanation = document.createElement("div");
      explanation.className = "explanation rich-text";
      explanation.innerHTML = `<span class="explanation-label">Explanation</span>${question.explanation_html}`;

      card.appendChild(label);
      card.appendChild(stem);
      card.appendChild(options);
      card.appendChild(explanation);

      state.questionRefs[questionIndex] = {
        card,
        explanation,
        optionButtons,
        question,
      };

      applyQuestionState(questionIndex);
      return card;
    }

    function applyQuestionState(questionIndex) {
      const ref = state.questionRefs[questionIndex];
      if (!ref) {
        return;
      }

      const { card, optionButtons, question } = ref;
      const selectedIndex = state.answers.get(questionIndex);
      const hasSelection = selectedIndex !== undefined;
      const isReview = state.mode === "review";
      const showExplanation = isReview || hasSelection;

      card.classList.toggle("is-hidden", !showExplanation);

      optionButtons.forEach((button, optionIndex) => {
        button.classList.remove("correct", "incorrect", "neutral-revealed");

        if (isReview) {
          button.disabled = true;
          if (optionIndex === question.correct_index) {
            button.classList.add("correct");
          } else {
            button.classList.add("neutral-revealed");
          }
          return;
        }

        button.disabled = false;
        if (!hasSelection) {
          return;
        }

        if (optionIndex === question.correct_index) {
          button.classList.add("correct");
        } else if (optionIndex === selectedIndex) {
          button.classList.add("incorrect");
        } else {
          button.classList.add("neutral-revealed");
        }
      });
    }

    function renderApp() {
      if (!quizData.topics.length) {
        const empty = document.createElement("div");
        empty.className = "empty-state";
        empty.textContent = "No questions were found in this JSON file.";
        app.replaceChildren(empty);
        return;
      }

      const wrapper = document.createElement("div");
      wrapper.className = "topic-list";

      let questionOffset = 0;
      quizData.topics.forEach((topic) => {
        wrapper.appendChild(buildTopic(topic, questionOffset));
        questionOffset += topic.questions.length;
      });

      app.replaceChildren(wrapper);
    }

    function setMode(mode) {
      state.mode = mode;
      modeButtons.forEach((button) => {
        const isActive = button.dataset.modeButton === mode;
        button.classList.toggle("active", isActive);
        button.setAttribute("aria-pressed", String(isActive));
      });

      state.questionRefs.forEach((_, index) => applyQuestionState(index));
    }

    function setAllTopics(open) {
      document.querySelectorAll(".topic").forEach((topic) => {
        topic.open = open;
      });
    }

    modeButtons.forEach((button) => {
      button.addEventListener("click", () => setMode(button.dataset.modeButton));
    });

    topicActionButtons.forEach((button) => {
      button.addEventListener("click", () => {
        setAllTopics(button.dataset.topicAction === "expand");
      });
    });

    renderApp();
    setMode("solve");
  </script>
</body>
</html>
