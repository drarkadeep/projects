<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Breast And Endocrine Surgery</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f1e8;
      --bg-accent: #ebe4d4;
      --surface: rgba(255, 252, 246, 0.92);
      --surface-strong: #fffdf7;
      --border: #d9cfbd;
      --text: #23313a;
      --text-soft: #5f6c73;
      --accent: #496a58;
      --accent-strong: #2f5341;
      --correct-bg: #e0f3e6;
      --correct-border: #77b487;
      --wrong-bg: #fbe0df;
      --wrong-border: #dc7a73;
      --note-bg: #f3eee2;
      --shadow: 0 18px 40px rgba(76, 59, 37, 0.08);
      --radius-lg: 22px;
      --radius-md: 16px;
      --radius-sm: 12px;
      --page-width: 960px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: "Avenir Next", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.72), transparent 32%),
        linear-gradient(180deg, #f8f4eb 0%, #f3ede0 100%);
      line-height: 1.65;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.14), transparent 18%, transparent 82%, rgba(255, 255, 255, 0.14)),
        repeating-linear-gradient(
          180deg,
          rgba(73, 106, 88, 0.015) 0,
          rgba(73, 106, 88, 0.015) 1px,
          transparent 1px,
          transparent 18px
        );
    }

    a {
      color: var(--accent-strong);
    }

    img {
      max-width: 100%;
      height: auto;
      border-radius: 14px;
    }

    .score-badge,
    .badge.rounded-pill.bg-danger {
      display: none !important;
    }

    .page {
      width: min(100% - 24px, var(--page-width));
      margin: 0 auto;
      padding: 18px 0 48px;
    }

    .topbar {
      margin-bottom: 18px;
      padding: 18px;
      background: rgba(255, 252, 246, 0.9);
      border: 1px solid rgba(217, 207, 189, 0.86);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .topbar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .eyebrow {
      margin: 0 0 4px;
      font-size: 0.76rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-soft);
    }

    .title {
      margin: 0;
      font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
      font-size: clamp(1.5rem, 2vw + 1rem, 2.35rem);
      line-height: 1.08;
      font-weight: 700;
    }

    .meta {
      margin: 8px 0 0;
      color: var(--text-soft);
      font-size: 0.96rem;
    }

    .mode-switch {
      display: inline-flex;
      padding: 6px;
      border-radius: 999px;
      background: var(--bg-accent);
      border: 1px solid var(--border);
      gap: 6px;
      flex-shrink: 0;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
      flex-wrap: wrap;
    }

    .topic-actions {
      display: inline-flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .utility-button {
      appearance: none;
      border: 1px solid var(--border);
      background: var(--surface-strong);
      color: var(--text);
      font: inherit;
      font-weight: 700;
      border-radius: 999px;
      padding: 10px 14px;
      cursor: pointer;
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .utility-button:hover {
      transform: translateY(-1px);
      border-color: #c7bba9;
      box-shadow: 0 8px 18px rgba(70, 54, 34, 0.07);
    }

    .utility-button:focus-visible {
      outline: 3px solid rgba(73, 106, 88, 0.22);
      outline-offset: 2px;
    }

    .mode-button {
      appearance: none;
      border: 0;
      background: transparent;
      color: var(--text-soft);
      font: inherit;
      font-weight: 700;
      border-radius: 999px;
      padding: 10px 16px;
      min-width: 92px;
      cursor: pointer;
      transition: transform 0.18s ease, background 0.18s ease, color 0.18s ease, box-shadow 0.18s ease;
    }

    .mode-button:hover {
      transform: translateY(-1px);
      color: var(--text);
    }

    .mode-button.active {
      background: var(--surface-strong);
      color: var(--accent-strong);
      box-shadow: 0 8px 18px rgba(73, 106, 88, 0.14);
    }

    .topic-list {
      display: grid;
      gap: 18px;
    }

    .topic {
      background: rgba(255, 252, 246, 0.78);
      border: 1px solid rgba(217, 207, 189, 0.9);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .topic[open] {
      background: rgba(255, 252, 246, 0.9);
    }

    .topic > summary {
      list-style: none;
      cursor: pointer;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      user-select: none;
    }

    .topic > summary::-webkit-details-marker {
      display: none;
    }

    .topic-title {
      margin: 0;
      font-size: 1.08rem;
      font-weight: 800;
      letter-spacing: 0.01em;
    }

    .topic-meta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--text-soft);
      font-size: 0.94rem;
    }

    .chevron {
      display: inline-block;
      transition: transform 0.2s ease;
      color: var(--accent);
      font-weight: 700;
    }

    .topic[open] > summary .chevron {
      transform: rotate(90deg);
    }

    .topic-notes {
      background: rgba(243, 238, 226, 0.62);
      border: 1px solid #e3d9c8;
      border-radius: var(--radius-md);
      overflow: hidden;
    }

    .topic-notes > summary {
      list-style: none;
      cursor: pointer;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      user-select: none;
    }

    .topic-notes > summary::-webkit-details-marker {
      display: none;
    }

    .topic-notes-title {
      font-size: 0.95rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-soft);
    }

    .topic-notes[open] > summary .chevron {
      transform: rotate(90deg);
    }

    .topic-notes-body {
      padding: 0 16px 16px;
      color: var(--text);
    }

    .topic-body {
      padding: 0 16px 16px;
      display: grid;
      gap: 14px;
    }

    .question-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 18px;
      box-shadow: 0 10px 24px rgba(70, 54, 34, 0.05);
    }

    .question-label {
      margin: 0 0 10px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-soft);
      font-size: 0.88rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 800;
    }

    .stem {
      font-size: 1rem;
    }

    .stem > *:first-child,
    .explanation > *:first-child {
      margin-top: 0;
    }

    .stem > *:last-child,
    .explanation > *:last-child {
      margin-bottom: 0;
    }

    .options {
      margin-top: 16px;
      display: grid;
      gap: 10px;
    }

    .option {
      width: 100%;
      text-align: left;
      border: 1px solid #d8d0c2;
      background: #fffdf8;
      color: var(--text);
      border-radius: var(--radius-sm);
      padding: 14px 15px;
      font: inherit;
      line-height: 1.45;
      cursor: pointer;
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
    }

    .option:hover {
      transform: translateY(-1px);
      border-color: #c7bba9;
      box-shadow: 0 8px 18px rgba(70, 54, 34, 0.07);
    }

    .option:focus-visible {
      outline: 3px solid rgba(73, 106, 88, 0.22);
      outline-offset: 2px;
    }

    .option.correct {
      background: var(--correct-bg);
      border-color: var(--correct-border);
      box-shadow: inset 0 0 0 1px rgba(119, 180, 135, 0.2);
    }

    .option.incorrect {
      background: var(--wrong-bg);
      border-color: var(--wrong-border);
      box-shadow: inset 0 0 0 1px rgba(220, 122, 115, 0.2);
    }

    .option.neutral-revealed {
      background: #faf6ee;
      border-color: #d8d0c2;
      color: #5f676a;
    }

    .option[disabled] {
      cursor: default;
      opacity: 1;
    }

    .explanation {
      margin-top: 14px;
      padding: 14px 16px;
      background: var(--note-bg);
      border: 1px solid #e3d9c8;
      border-radius: 14px;
      color: var(--text);
    }

    .question-card.is-hidden .explanation {
      display: none;
    }

    .explanation-label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-soft);
      font-weight: 800;
    }

    .empty-state {
      padding: 28px 22px;
      background: var(--surface);
      border: 1px dashed var(--border);
      border-radius: var(--radius-lg);
      color: var(--text-soft);
    }

    .rich-text table {
      width: 100%;
      border-collapse: collapse;
      margin: 12px 0;
      overflow: hidden;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.68);
    }

    .rich-text td,
    .rich-text th {
      border: 1px solid #ddd2bf;
      padding: 10px 12px;
      vertical-align: top;
    }

    .rich-text ul,
    .rich-text ol {
      padding-left: 20px;
      margin: 10px 0;
    }

    .rich-text center {
      display: block;
      text-align: center;
    }

    .rich-text .table-responsive {
      overflow-x: auto;
    }

    @media (max-width: 720px) {
      .page {
        width: min(100% - 16px, var(--page-width));
        padding-top: 10px;
      }

      .topbar {
        padding: 14px;
        border-radius: 18px;
      }

      .topbar-inner {
        flex-direction: column;
        align-items: stretch;
      }

      .controls {
        justify-content: stretch;
      }

      .topic-actions {
        width: 100%;
      }

      .utility-button {
        flex: 1 1 0;
      }

      .mode-switch {
        width: 100%;
        justify-content: stretch;
      }

      .mode-button {
        flex: 1 1 50%;
      }

      .topic > summary {
        padding: 16px;
        align-items: flex-start;
      }

      .topic-meta {
        font-size: 0.88rem;
      }

      .topic-body {
        padding: 0 12px 12px;
      }

      .question-card {
        padding: 15px;
      }

      .option {
        padding: 13px 14px;
      }
    }
  </style>
</head>

  <script id="quiz-data" type="application/json">{"title": "Breast And Endocrine Surgery", "topics": [{"name": "Abberations of normal development and involution- breast", "questions": [{"number": 1, "topic": "Abberations of normal development and involution- breast", "stem_html": "A 20 year old lady presents with a lump in the upper outer aspect of her right breast. On examination, she has a firm mobile mass in the upper outer quadrant of her right breast. What is the most likely underlying disease process?", "options": [{"label_html": "Atypical ductal hyperplasia", "is_correct": false}, {"label_html": "Breast cyst", "is_correct": false}, {"label_html": "Duct ectasia", "is_correct": false}, {"label_html": "Fibroadenoma", "is_correct": true}, {"label_html": "Fat necrosis", "is_correct": false}], "correct_index": 3, "explanation_html": "Fibroadenomas account for 60% of discrete breast lesions in the 18-25 year age group. They are mobile lesions. Core biopsy should be performed in lesions measuring more than 4cm in diameter."}, {"number": 2, "topic": "Abberations of normal development and involution- breast", "stem_html": "A 48 year old lady presents with discomfort in the right breast. On examination, she has a discrete, soft, fluctuant area in the upper outer quadrant of her right breast. A mammogram is performed and a halo sign is seen by the radiologist. What is the most likely explanation for this process?", "options": [{"label_html": "Breast cyst", "is_correct": true}, {"label_html": "Fibroadenoma", "is_correct": false}, {"label_html": "Radial scar", "is_correct": false}, {"label_html": "Atypical ductal hyperplasia", "is_correct": false}, {"label_html": "Ductal carcinoma in situ", "is_correct": false}], "correct_index": 0, "explanation_html": "Lesions such as breast cysts compress the underlying fat and produce a radiolucent area (halo sign). If symptomatic, these cysts should be aspirated."}, {"number": 3, "topic": "Abberations of normal development and involution- breast", "stem_html": "A 55 year old women presents with nipple discharge. On examination, she has a slit like retraction of the nipple in the centre of this area is a small amount of cheese like material. No discrete mass lesion is palpable in the underlying breast. What is the commonest underlying cause?", "options": [{"label_html": "Invasive lobular carcinoma", "is_correct": false}, {"label_html": "Duct ectasia", "is_correct": true}, {"label_html": "Fibroadenoma", "is_correct": false}, {"label_html": "Phyllodes tumour", "is_correct": false}, {"label_html": "Inflammatory carcinoma", "is_correct": false}], "correct_index": 1, "explanation_html": "Duct ectasia is a common alteration in the breast that occurs with aging. As the ducts shorten and dilate a degree of symmetrical slit like retraction occurs. A small amount of cheese like discharge may occur."}, {"number": 4, "topic": "Abberations of normal development and involution- breast", "stem_html": "A 55 year old woman presents with nipple discharge. On examination, she has a slit like retraction of the nipple in the centre of this area is a small amount of cheese like material. No discrete mass lesion is palpable in the underlying breast. Which of the factors listed below is most strongly associated with developing this condition?", "options": [{"label_html": "BRCA 1 positivity", "is_correct": false}, {"label_html": "Smoking", "is_correct": true}, {"label_html": "Alcoholism", "is_correct": false}, {"label_html": "Obesity", "is_correct": false}, {"label_html": "Type II diabetes mellitus", "is_correct": false}], "correct_index": 1, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Smoking is a major risk factor for duct ectasia<\/div>"}], "note_html": "<b>Fibroadenoma<\/b><br>Under the age of 25 years the breast is usually classified as undergoing development. Lobular units are being formed and a dense stroma is formed within the breast tissue. This may result in the development of fibroadenomas. <br>As a group, fibroadenomas account for 13% of all palpable breast lesions. However, in women aged 18-25 they constitute up to 60% of all palpable breast lesions. The are classified as juvenile, common and giant. The former occur in early adolescence and the latter are characterised by a size greater than 4cm. In young females with small fibroadenomas (less than 3cm on imaging) a policy of watchful waiting without biopsy may be adopted. A size of greater than 4cm attracts a recommendation for core biopsy to exclude a phyllodes tumour. The natural history of fibroadenomas is that 10% will increase in size, 30% regress and the remainder stay the same. This does not apply during pregnancy and lactation when they may increase in size substantially and subsequently sequester milk. <br>Some women may wish to have their fibroadenomas excised, they can usually be shelled out through a circumareolar incision. Smaller lesions may be removed using a mammotome. <br><br><b>Breast cysts<\/b><br>Palpable cysts constitute 15% of all breast lumps. They occur most frequently in perimenopausal females and are caused by distended and involuted lobules. <br>They may be readily apparent on clinical examination as soft, fluctuant swellings. It is important to exclude the presence of an underlying mass lesion. On imaging they will usually show a 'halo appearance' on mammography. Ultrasound will confirm the fluid filled nature of the cyst. Symptomatic cysts may be aspirated and following aspiration the breast re-examined to ensure that the lump has gone. <br><br><b>Duct ectasia<\/b><br>As women progress through the menopause the breast ducts shorten and dilate. In some women this may cause a cheese like nipple discharge and slit like retraction of the nipple. No specific treatment is required."}, {"name": "Benign breast lesions", "questions": [{"number": 5, "topic": "Benign breast lesions", "stem_html": "A 45 year old lady presented with a 2cm mobile breast mass. A mammogram is indeterminate (M3), USS shows benign changes (U2), clinical examination is also indeterminate (P3). What is the next most appropriate course of action?", "options": [{"label_html": "Re-assure and discharge", "is_correct": false}, {"label_html": "Fine needle aspiration cytology", "is_correct": false}, {"label_html": "Excision biopsy", "is_correct": false}, {"label_html": "Image guided core biopsy", "is_correct": true}, {"label_html": "Wide local excision", "is_correct": false}], "correct_index": 3, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Core biopsy Vs fine needle aspiration cytology<br>Core biopsy is preferred over FNAC by most surgeons. The reason for this is that FNAC often yielded inadequate tissue for assessment. When FNAC demonstrated benign changes, it had to be repeated at least once to confirm this. If it yielded cells that were indeterminate, then a core biopsy was needed. A core biopsy removes many of these stages and is thus more reliable.<\/div>All discrete breast lumps, including those that seem benign, should have a confirmed histological diagnosis. In this case, a core biopsy has not yet been performed. This may yield a diagnosis that is concordant with imaging findings. In which case, this concludes the investigative process (if benign). If it remains unclear, excision biopsy will be needed."}, {"number": 6, "topic": "Benign breast lesions", "stem_html": "A 64 year old obese female presents with a breast lump. She was hit on the breast by a cricket ball when playing with her grandson. What is the most likely explanation?", "options": [{"label_html": "Invasive ductal carcinoma", "is_correct": false}, {"label_html": "Ductal carcinoma in situ", "is_correct": false}, {"label_html": "Fat necrosis", "is_correct": true}, {"label_html": "Fibrocystic disease", "is_correct": false}, {"label_html": "Duct ectasia", "is_correct": false}], "correct_index": 2, "explanation_html": "An obese, post menopausal woman, with a history of trauma points towards fat necrosis. Trauma causes inflammation of fat cells, leading to formation of a lump. Mammography, USS and biopsy are usually needed to differentiate it from breast malignancy."}, {"number": 7, "topic": "Benign breast lesions", "stem_html": "A 21 year old female notices a bloody discharge from the nipple. She is otherwise well. On examination, there are no discrete lesions to feel and mammography shows dense breast tissue but no mass lesion. What is the most likely cause?", "options": [{"label_html": "Intraductal papilloma", "is_correct": true}, {"label_html": "Breast abscess", "is_correct": false}, {"label_html": "Duct ectasia", "is_correct": false}, {"label_html": "Fat necrosis", "is_correct": false}, {"label_html": "Cyst of Montgomery's gland", "is_correct": false}], "correct_index": 0, "explanation_html": "Intraductal papillomata are the commonest cause of blood stained nipple discharge in younger women. There is seldom any palpable mass. An ultrasound is required and possibly a galactogram."}, {"number": 8, "topic": "Benign breast lesions", "stem_html": "An 18 year old female notices a non tender mobile breast lump. Clinically, there is a smooth lump which is not tethered to the skin. What is the likely cause?", "options": [{"label_html": "Fibroadenoma", "is_correct": true}, {"label_html": "Atypical ductal hyperplasia", "is_correct": false}, {"label_html": "DCIS", "is_correct": false}, {"label_html": "Lobular carcinoma", "is_correct": false}, {"label_html": "Lipoma", "is_correct": false}], "correct_index": 0, "explanation_html": "Also called a breast 'mouse' due to its mobility. It is a benign condition arising from the breast lobule. May enlarge in pregnancy."}], "note_html": "<div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Lesion<\/b><\/th><th><b>Features<\/b><\/th><th><b>Treatment<\/b><\/th><\/tr><\/thead><tbody><tr><td>Fibroadenoma<\/td><td><ul><li>Develop from a whole lobule<\/li><li>Mobile, firm breast lumps<\/li><li>12% of all breast masses<\/li><li>Over a 2 year period up to 30% will get smaller<\/li><li>No increase in risk of malignancy<\/li><\/ul><\/td><td>If &gt;3cm surgical excision is usual, Phyllodes tumours should be widely excised (mastectomy if the lesion is large)<\/td><\/tr><tr><td>Breast cyst<\/td><td><ul><li>7% of all Western females will present with a breast cyst<\/li><li>Usually presents as a smooth discrete lump (may be fluctuant)<\/li><li>Small increased risk of breast cancer (especially if younger)<\/li><\/ul><\/td><td>Cysts should be aspirated, those which are blood stained or persistently refill should be biopsied or excised<\/td><\/tr><tr><td>Sclerosing adenosis, (radial scars and complex sclerosing lesions)<\/td><td><ul><li>Usually presents as a breast lump or breast pain<\/li><li>Causes mammographic changes which may mimic carcinoma<\/li><li>Cause distortion of the distal lobular unit, without hyperplasia (complex lesions will show hyperplasia)<\/li><li>Considered a disorder of involution, no increase in malignancy risk<\/li><\/ul><\/td><td>Lesions should be biopsied, excision is not mandatory<\/td><\/tr><tr><td>Epithelial hyperplasia<\/td><td><ul><li>Variable clinical presentation ranging from generalised lumpiness through to discrete lump<\/li><li>Disorder consists of increased cellularity of terminal lobular unit, atypical features may be present<\/li><li>Atypical features and family history of breast cancer confers greatly increased risk of malignancy<\/li><\/ul><\/td><td>If no atypical features then conservative, those with atypical features require either close monitoring or surgical resection<\/td><\/tr><tr><td>Fat necrosis<\/td><td><ul><li>Up to 40% cases usually have a traumatic aetiology<\/li><li>Physical features usually mimic carcinoma<\/li><li>Mass may increase in size initially<\/li><\/ul><\/td><td>Imaging and core biopsy<\/td><\/tr><tr><td>Duct papilloma<\/td><td><ul><li>Usually present with nipple discharge<\/li><li>Large papillomas may present with a mass<\/li><li>The discharge usually originates from a single duct<\/li><li>No increase risk of malignancy<\/li><\/ul><\/td><td>Microdochectomy<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Blood testing in thyroid disease", "questions": [{"number": 9, "topic": "Blood testing in thyroid disease", "stem_html": "Which of the blood tests listed below is most likely to be abnormal in a 33 year old lady who presents with a recently diagnosed goitre and a diagnosis of Hashimotos thyroiditis is suspected?", "options": [{"label_html": "TSH receptor antibodies", "is_correct": false}, {"label_html": "Thyroid peroxidase antibodies", "is_correct": true}, {"label_html": "Thyroglobulin antibodies", "is_correct": false}, {"label_html": "Antibodies to parafollicular c cells", "is_correct": false}, {"label_html": "Calcitonin", "is_correct": false}], "correct_index": 1, "explanation_html": "Antibodies to thyroid peroxidase are found in most patients with Graves disease or Hashimotos thyroiditis."}, {"number": 10, "topic": "Blood testing in thyroid disease", "stem_html": "A 20 year old lady has undergone a total thyroidectomy for a well differentiated papillary carcinoma. She attends clinic and is well and the surgeon wishes to screen for disease recurrence. Which of these blood tests is most likely to be helpful?", "options": [{"label_html": "Calcitonin", "is_correct": false}, {"label_html": "Antibodies to TSH receptor", "is_correct": false}, {"label_html": "Antibodies to parafollicular c cells", "is_correct": false}, {"label_html": "Thyroid peroxidase antibodies", "is_correct": false}, {"label_html": "Thyroglobulin levels", "is_correct": true}], "correct_index": 4, "explanation_html": "Thyroglobulin, the major constituent of colloid and precursor of thyroid hormones may be elevated in those with metastatic or recurrent thyroid cancer. Results may be erroneous in those with other thyroid disorders."}], "note_html": "<div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Assay<\/b><\/th><th><b>Usage<\/b><\/th><\/tr><\/thead><tbody><tr><td>Thyroid peroxidase (microsomal) antibodies<\/td><td><ul><li>Found in autoimmune disease affecting the thyroid (Hashimotos 100%) and Graves (70%)<\/li><\/ul><\/td><\/tr><tr><td>Antibodies to TSH receptor<\/td><td><ul><li>Individuals with Graves disease (95%)<\/li><\/ul><\/td><\/tr><tr><td>Thyroglobulin<\/td><td><ul><li>Not useful for clinically distinguishing between different types of thyroid disease, may be used as part of thyroid cancer follow up<\/li><\/ul><\/td><\/tr><tr><td>Calcitonin<\/td><td><ul><li>Released from the parafollicular cells<\/li><li>Usually found in patients with medullary carcinoma of the thyroid<\/li><\/ul><\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Breast cancer", "questions": [{"number": 11, "topic": "Breast cancer", "stem_html": "A 43 year old lady has recently undergone a wide local excision and sentinel lymph node biopsy for carcinoma of the breast. Of the factors listed below, which will provide the most important prognostic information?", "options": [{"label_html": "Mitotic number", "is_correct": false}, {"label_html": "Grade", "is_correct": false}, {"label_html": "Nodal status", "is_correct": true}, {"label_html": "Size", "is_correct": false}, {"label_html": "Oestrogen receptor status", "is_correct": false}], "correct_index": 2, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Nodal status is the single most important prognostic factor in breast cancer.<\/div>Nodal status is important because it serves as a marker of tumour metastatic potential. This translates to survival advantages of up to 40% at five years. Both grade and size are of secondary importance as they both less concerning in the absence of nodal involvement."}, {"number": 12, "topic": "Breast cancer", "stem_html": "A 32 year old Indian lady presents with a diffuse swelling of the left breast. She has a 4 month old child. Clinically, she has jaundice and there is erythema of the left breast. Which of the following lesions is most likely?", "options": [{"label_html": "Phyllodes tumour", "is_correct": false}, {"label_html": "Radial scar", "is_correct": false}, {"label_html": "Invasive ductal carcinoma", "is_correct": false}, {"label_html": "Invasive lobular carcinoma", "is_correct": false}, {"label_html": "Inflammatory carcinoma", "is_correct": true}], "correct_index": 4, "explanation_html": "Inflammatory breast cancers have an aggressive nature. Dissemination occurs early and is more resistant to adjuvant treatments than other types of breast cancer. Often occurs in pregnancy or lactation."}, {"number": 13, "topic": "Breast cancer", "stem_html": "A 32 year old Indian lady presents with a diffuse swelling of the left breast. She has a 4 month old child. Clinically, she has jaundice and there is erythema of the left breast. Which of the following lesions is most likely?", "options": [{"label_html": "Phyllodes tumour", "is_correct": false}, {"label_html": "Radial scar", "is_correct": false}, {"label_html": "Invasive ductal carcinoma", "is_correct": false}, {"label_html": "Invasive lobular carcinoma", "is_correct": false}, {"label_html": "Inflammatory carcinoma", "is_correct": true}], "correct_index": 4, "explanation_html": "Inflammatory breast cancers have an aggressive nature. Dissemination occurs early and is more resistant to adjuvant treatments than other types of breast cancer. Often occurs in pregnancy or lactation."}, {"number": 14, "topic": "Breast cancer", "stem_html": "A 72 year old female presents with a painless breast lump. Clinically, she has a 4cm diameter irregular breast mass, with no other palpable masses.<br>What is the most likely lesion?", "options": [{"label_html": "Invasive ductal carcinoma", "is_correct": true}, {"label_html": "Ductal carcinoma in situ", "is_correct": false}, {"label_html": "Lobular carcinoma in situ", "is_correct": false}, {"label_html": "Invasive lobular carcinoma", "is_correct": false}, {"label_html": "Atypical ductal hyperplasia", "is_correct": false}], "correct_index": 0, "explanation_html": "A post menopausal woman is more likely to have a ductal carcinoma and they tend to occur at a single focus within the breast."}, {"number": 15, "topic": "Breast cancer", "stem_html": "A 72 year old woman presents with 2 breast lumps. She has a history of breast cancer in the opposite breast 5 years ago. What is the most likely underlying lesion?", "options": [{"label_html": "Invasive ductal carcinoma", "is_correct": false}, {"label_html": "Mucinous breast carcinoma", "is_correct": false}, {"label_html": "Comedo type ductal carcinoma in situ", "is_correct": false}, {"label_html": "Invasive lobular carcinoma", "is_correct": true}, {"label_html": "Cribriform ductal carcinoma in situ", "is_correct": false}], "correct_index": 3, "explanation_html": "This is likely to be an invasive lobular carcinoma, mainly due to the multifocal lesions and the history of previous breast cancer in the opposite breast."}, {"number": 16, "topic": "Breast cancer", "stem_html": "A 74 year old woman presents with an erythematous rash originating in the nipple. It is spreading to the surrounding areolar area and the associated normal tissue. What is the most likely cause?", "options": [{"label_html": "Nipple eczema", "is_correct": false}, {"label_html": "Pagets disease of the nipple", "is_correct": true}, {"label_html": "Fibroadenosis", "is_correct": false}, {"label_html": "Invasive lobular carcinoma", "is_correct": false}, {"label_html": "Radial scar", "is_correct": false}], "correct_index": 1, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">In most patients with Pagets disease, an underlying mammary carcinoma will be found.<\/div>Paget's is associated with DCIS or invasive carcinoma. Unlike eczema of the nipple which predominantly affects the areolar region, Pagets will usually affect the nipple first and then spread to the areolar area. Diagnosis is made by punch biopsy."}, {"number": 17, "topic": "Breast cancer", "stem_html": "A 53 year old woman presents with a bloody nipple discharge. On mammography, there is calcification behind the nipple areolar complex. A core biopsy shows background benign change, but cells that show comedo necrosis which have not breached the basement membrane are also seen. Which of the lesions below is most likely?", "options": [{"label_html": "Fibrocystic disease of the breast", "is_correct": false}, {"label_html": "Ductal carcinoma in situ", "is_correct": true}, {"label_html": "Invasive ductal carcinoma", "is_correct": false}, {"label_html": "Atypical ductal hyperplasia", "is_correct": false}, {"label_html": "Lobular carcinoma in situ", "is_correct": false}], "correct_index": 1, "explanation_html": "Comedo necrosis is a feature of high nuclear grade ductal carcinoma in situ. It has a high risk of being associated with foci of invasion."}, {"number": 18, "topic": "Breast cancer", "stem_html": "A 53 year old lady undergoes a mastectomy to remove a breast cancer. Microscopic analysis of the tumour shows a pronounced lymphocytic infiltrate. Which of the tumour types listed below is most often associated with this finding?", "options": [{"label_html": "Invasive ductal carcinoma", "is_correct": false}, {"label_html": "Tubular breast cancer", "is_correct": false}, {"label_html": "Medullary breast cancer", "is_correct": true}, {"label_html": "Mucinous breast cancer", "is_correct": false}, {"label_html": "Adenoid cystic carcinoma of the breast", "is_correct": false}], "correct_index": 2, "explanation_html": "Medullary breast cancer is a breast cancer of special type. Histologically, it is characterised by a marked lymphocytic infiltrate. Many of the breast cancers of special type (which comprise less than 5% of all breast cancers) have a very good prognosis. These special type cancers include; medullary, tubular, mucinous, adenoid cystic,"}], "note_html": "- Commoner in the older age group<br><ul><li><b>Invasive ductal carcinomas<\/b> are the most common type. Some may arise as a result of <b>ductal carcinoma in situ (DCIS)<\/b>. There are associated carcinomas of special type e.g. Tubular that may carry better prognosis. <\/li><li>The pathological assessment involves assessment of the tumour and lymph nodes, sentinel lymph node biopsy is often used to minimise the morbidity of an axillary dissection. <\/li><li>Treatment, typically this is either wide local excision or mastectomy. There are many sub types of both of these that fall outside of the MRCS. Some key rules to bear in mind. <\/li><li>Whatever operation is contemplated the final cosmetic outcome does have a bearing. A woman with small breasts and a large tumour will tend to fare better with mastectomy, even if clear pathological and clinical margins can be obtained. Conversely a women with larger breasts may be able to undergo breast conserving surgery even with a relatively large primary lesion (NB tumours &gt;4cm used to attract recommendation for mastectomy). For screen detected and impalpable tumour image guidance will be necessary.<\/li><li>Reconstruction is always an option following any resectional procedure. However, its exact type must be tailored to age and co-morbidities of the patient. The main operations in common use include latissimus dorsi myocutaneous flap and sub pectoral implants. Women wishing to avoid a prosthesis may be offered TRAM or DIEP flaps.<\/li><\/ul><br><b>Surgical options<\/b><br><b>Mastectomy vs Wide local excision<\/b><br><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Mastectomy<\/b><\/th><th><b>Wide Local Excision<\/b><\/th><\/tr><\/thead><tbody><tr><td>Multifocal tumour<\/td><td>Solitary lesion<\/td><\/tr><tr><td><i>Central tumour<\/i><\/td><td>Peripheral tumour<\/td><\/tr><tr><td>Large lesion in small breast<\/td><td>Small lesion in large breast<\/td><\/tr><tr><td>DCIS &gt;4cm<\/td><td>DCIS &lt;4cm<\/td><\/tr><tr><td>Patient Choice<\/td><td>Patient choice<\/td><\/tr><\/tbody><\/table><\/div><br><i>Central lesions may be managed using breast conserving surgery where an acceptable cosmetic result may be obtained, this is rarely the case in small breasts<\/i><br><br><i>A compelling indication for mastectomy, a larger tumour that would be unsuitable for breast conserving surgery<\/i><br><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb069b.jpg\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb069.jpg\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Mastectomy\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb069b.jpg\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center><br>Whatever surgical option is chosen the aim should be to have a local recurrence rate of 5% or less at 5 years [1].<br><br><b>Nottingham Prognostic Index<\/b><br>The Nottingham Prognostic Index can be used to give an indication of survival. In this system the tumour size is weighted less heavily than other major prognostic parameters.<br><br>Calculation of <b>NPI<\/b><br><b>Tumour Size<\/b> x 0.2 + <b>Lymph node score<\/b>(From table below)+<b>Grade score<\/b>(From table below).<br><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid2\"><thead><tr><th>  <br><b>Score<\/b><\/th><th><b>Lymph nodes involved<\/b><\/th><th><b>Grade<\/b><\/th><\/tr><\/thead><tbody><tr><td>1<\/td><td>0<\/td><td>1<\/td><\/tr><tr><td>2<\/td><td>1-3<\/td><td>2<\/td><\/tr><tr><td>3<\/td><td>&gt;3<\/td><td>3<\/td><\/tr><\/tbody><\/table><\/div><br><b>Prognosis<\/b><br><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid3\"><thead><tr><th><b>Score<\/b><\/th><th><b>Percentage 5 year survival<\/b><\/th><\/tr><\/thead><tbody><tr><td>2.0 to 2.4<\/td><td>93%<\/td><\/tr><tr><td>2.5 to 3.4<\/td><td>85%<\/td><\/tr><tr><td>3.5 to 5.4<\/td><td>70%<\/td><\/tr><tr><td>&gt;5.4<\/td><td>50%<\/td><\/tr><\/tbody><\/table><\/div><br>This data was originally published in 1992. It should be emphasised that other factors such as vascular invasion and receptor status also impact on survival and are not included in this data and account for varying prognoses often cited in the literature.<br><br><b>References<\/b><br>For guidance on how breast cancer is managed in the United Kingdom visit the Association of Breast Surgery website (www.https://associationofbreastsurgery.org.uk/)."}, {"name": "Breast cancer management", "questions": [{"number": 19, "topic": "Breast cancer management", "stem_html": "A 44 year old lady presents with a mass lesion in the upper outer quadrant of the left breast. On clinical examination she has a 2cm mass lesion which on core biopsy is demonstrated to have invasive ductal carcinoma. An FNA of a bulky axillary lymph node contains malignant cells. What is the correct course of action?", "options": [{"label_html": "Wide local excision and axillary node clearance", "is_correct": true}, {"label_html": "Radical mastectomy and axillary node clearance", "is_correct": false}, {"label_html": "Simple mastectomy and sentinel node biopsy", "is_correct": false}, {"label_html": "Wide local excision and sentinel node biopsy", "is_correct": false}, {"label_html": "Excision biopsy and sentinel node biopsy", "is_correct": false}], "correct_index": 0, "explanation_html": "Although the primary lesion is small enough for breast conserving surgery, the presence of overt axillary lymph node metastasis will attract a recommendation for axillary node clearance. Note that an excision biopsy is not appropriate for malignant cases."}, {"number": 20, "topic": "Breast cancer management", "stem_html": "A 39 year old lady presents with a mass lesion in her right breast. Clinical examination, biopsy and imaging confirm a 2.5 cm lesion in the upper inner quadrant of her right breast and a 1.5 cm lesion at the central aspect of the same breast. Her axilla shows lymphadenopathy and a fine needle aspirate from the node shows malignant cells. What is the best course of action?", "options": [{"label_html": "Simple mastectomy and axillary node clearance", "is_correct": true}, {"label_html": "Wide local excisions of the two lesions and axillary node clearance", "is_correct": false}, {"label_html": "Simple mastectomy and sentinel node biopsy", "is_correct": false}, {"label_html": "Wide local excisions of the two lesions and sentinel node biopsy", "is_correct": false}, {"label_html": "Radical mastectomy and axillary node clearance", "is_correct": false}], "correct_index": 0, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Multifocal breast cancer is best treated with mastectomy<\/div>A combination of established axillary disease and multifocal invasive lesions attracts an indication for mastectomy and axillary clearance. A radical mastectomy is less frequently indicated in modern surgical practice, disease that is locally advanced is often best downstaged using medical therapy, rather than embarking on the operations for breast cancer that were first popularised over 100 years ago."}, {"number": 21, "topic": "Breast cancer management", "stem_html": "A 44 year old lady presents with a mass in the upper outer quadrant of her right breast. Imaging, histology and clinical examination confirm a 1.5cm malignant mass lesion with no clinical evidence of axillary nodal disease. What is the most appropriate treatment?", "options": [{"label_html": "Radical chemoradiotherapy alone", "is_correct": false}, {"label_html": "Excision biopsy and sentinel node biopsy", "is_correct": false}, {"label_html": "Wide local excision and sentinel node biopsy", "is_correct": true}, {"label_html": "Mastectomy and axillary node sampling", "is_correct": false}, {"label_html": "Wide local excision and axillary node sampling", "is_correct": false}], "correct_index": 2, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Small peripheral breast cancers are well suited to breast conserving surgical techniques.<\/div>A small peripheral lesion such as this would usually be suitable for breast conserving surgery. Since imaging and clinical examination is not suspicious for axillary disease, a sentinel lymph node biopsy should be performed. Axillary node sampling is a procedure that become obsolete with the introduction of sentinel node biopsy."}, {"number": 22, "topic": "Breast cancer management", "stem_html": "A 56 year old woman has undergone a wide local excision and axillary node sample. The histology shows a 2.5cm invasive ductal carcinoma grade 1 which is completely excised. None of the axillary lymph nodes show evidence of metastatic disease. What is the most appropriate course of action?", "options": [{"label_html": "Arrange routine surgical follow up", "is_correct": false}, {"label_html": "Completion mastectomy", "is_correct": false}, {"label_html": "Radiotherapy to breast and axilla", "is_correct": false}, {"label_html": "Administration of tamoxifen", "is_correct": false}, {"label_html": "Radiotherapy to breast alone", "is_correct": true}], "correct_index": 4, "explanation_html": "This woman has a good prognosis. In younger women, DXT following breast conserving surgery is still the standard of care. In some older patients, it may be omitted."}, {"number": 23, "topic": "Breast cancer management", "stem_html": "A 28 year old female presents with a painless lump in the upper outer quadrant of her left breast. Imaging using ultrasound is indeterminate (U3). Two core biopsies have now been performed and both show normal breast tissue (B1). What is the most appropriate course of action?", "options": [{"label_html": "Arrange for imaging surveillance at 3 monthly intervals", "is_correct": false}, {"label_html": "Undertake a wide local excision of the lump", "is_correct": false}, {"label_html": "Reassure the patient and discharge", "is_correct": false}, {"label_html": "Undertake an excision biopsy of the lump", "is_correct": true}, {"label_html": "Arrange for a breast CT scan", "is_correct": false}], "correct_index": 3, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Wide local excision and excision biopsy are different procedures.<\/div>The imaging and biopsy results are not concordant. At this stage an excision biopsy is the safest option. CT scanning is seldom helpful in breast surgery."}, {"number": 24, "topic": "Breast cancer management", "stem_html": "A 28 year old female presents with a painless lump in the upper outer quadrant of her left breast. Imaging using ultrasound is indeterminate (U3). Two core biopsies have now been performed and both show normal breast tissue (B1). What is the most appropriate course of action?", "options": [{"label_html": "Arrange for imaging surveillance at 3 monthly intervals", "is_correct": false}, {"label_html": "Undertake a wide local excision of the lump", "is_correct": false}, {"label_html": "Reassure the patient and discharge", "is_correct": false}, {"label_html": "Undertake an excision biopsy of the lump", "is_correct": true}, {"label_html": "Arrange for a breast CT scan", "is_correct": false}], "correct_index": 3, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Wide local excision and excision biopsy are different procedures.<\/div>The imaging and biopsy results are not concordant. At this stage an excision biopsy is the safest option. CT scanning is seldom helpful in breast surgery."}, {"number": 25, "topic": "Breast cancer management", "stem_html": "A 35 year old woman has undergone a wide local excision. The histology shows an invasive lobular carcinoma present at 3 of the resection margins. Cavity shavings taken at the original operation are also involved. Sentinel node biopsy was negative. What is the most appropriate course of action?", "options": [{"label_html": "Arrange for re-excision of margins", "is_correct": false}, {"label_html": "Arrange for breast radiotherapy alone", "is_correct": false}, {"label_html": "Arrange for completion mastectomy alone", "is_correct": true}, {"label_html": "Arrange for radical radiotherapy to the breast and axilla", "is_correct": false}, {"label_html": "Arrange for completion mastectomy and axillary node clearance", "is_correct": false}], "correct_index": 2, "explanation_html": "This patient has an extensive disease process and lobular cancers are notorious for being multifocal. In this case a mastectomy is the safest next step. Radiotherapy is not appropriate in this setting as the margins are not clear."}], "note_html": "- Surgery is performed in most patients suffering from breast cancer. <br><ul><li>Chemotherapy may be used to downstage tumours and allow breast conserving surgery. Hormonal therapy may also be used for the same purposes. <\/li><li>Radiotherapy is given to most patients who have undergone breast conserving surgery (some older patients receiving hormone treatment and who have small low grade tumours may safely avoid DXT.<\/li><li>Therapeutic mammoplasty is an option for some patients but requires symmetrizing surgery in most cases.<\/li><li>Patients who have undergone mastectomy may be offered a reconstructive procedure either in conjunction with their primary resection or as a staged procedure at a later date. <\/li><\/ul><br><b>Surgical options<\/b><br><b>Mastectomy vs Wide local excision<\/b><br><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Mastectomy<\/b><\/td><td><b>Wide Local Excision<\/b><\/td><\/tr><tr><td>Multifocal tumour<\/td><td>Solitary lesion<\/td><\/tr><tr><td><i>Central tumour<\/i><\/td><td>Peripheral tumour<\/td><\/tr><tr><td>Large lesion in small breast<\/td><td>Small lesion in large breast<\/td><\/tr><tr><td>DCIS &gt;4cm<\/td><td>DCIS &lt;4cm<\/td><\/tr><tr><td>Patient Choice<\/td><td>Patient choice<\/td><\/tr><\/tbody><\/table><\/div><br><i>Central lesions may be managed using breast conserving surgery, where an acceptable cosmetic result may be obtained, this is rarely the case in small breasts<\/i><br><br><b>Axillary disease<\/b><br><ul><li>As a minimum, all patients with invasive breast cancer should have their axilla staged. In those who do not have overt evidence of axillary nodal involvement this can be undertaken using sentinel lymph node biopsy.<\/li><li>Patients with a positive sentinel lymph node biopsy or who have imaging and cytological or histological evidence of axillary nodal metastasis should undergo axillary node clearance or axillary irradiation.<\/li><li>Axillary node clearance is associated with the development of lymphoedema, increased risk of cellulitis and frozen shoulder.<\/li><\/ul>"}, {"name": "Breast imaging", "questions": [{"number": 26, "topic": "Breast imaging", "stem_html": "A 55 year old lady undergoes a screening mammogram. Which of the appearances below would least associated with a potential underlying malignancy?", "options": [{"label_html": "Popcorn calcification", "is_correct": true}, {"label_html": "Intraductal calcification", "is_correct": false}, {"label_html": "Micro calcification clusters", "is_correct": false}, {"label_html": "Amorphous calcifications", "is_correct": false}, {"label_html": "Pleomorphic calcifications", "is_correct": false}], "correct_index": 0, "explanation_html": "Macrocalcification changes in the breast are usually the result of a benign disease process such as fibroadenoma (where popcorn calcification is seen). Micro calcifications are more concerning and are more strongly associated with sinister underlying lesions such as DCIS. Many terms are used to describe these such as amorphous and pleomorphic."}], "note_html": "Breast imaging is undertaken with a combination of USS and mammography in most women presenting with a palpable lump. In younger patients, the denser breasts encountered in this group may make mammography less informative. <br><br>In women who present with breast implants with a palpable lump, the imaging of choice remains the same. However, specialized imaging techniques may be needed to obtain optimal mammographic views. Where there are specific concerns about a breast implant, rather than a lump, the imaging modality of choice is MRI scanning.<br>MRI scanning may be beneficial in screening younger patients with a family history and also in patients with lobular cancers who are being considered for breast conserving surgery."}, {"name": "Complications following thyroid surgery", "questions": [{"number": 27, "topic": "Complications following thyroid surgery", "stem_html": "A 53 year old lady has recently entered the UK from the far East and she undergoes a thyroidectomy for a very large multinodular goitre with retrosternal extension. The operation is relatively straightforward otherwise. The patient is returned to the recovery area and suddenly becomes profoundly dyspnoeic and hypoxic. On examination, the wound is healthy and dry and the drain empty. What is the most likely cause?", "options": [{"label_html": "Contained haematoma", "is_correct": false}, {"label_html": "Unilateral recurrent laryngeal nerve injury", "is_correct": false}, {"label_html": "Unilateral superior laryngeal nerve injury", "is_correct": false}, {"label_html": "Tracheomalacia", "is_correct": true}, {"label_html": "Hypocalcaemia", "is_correct": false}], "correct_index": 3, "explanation_html": "With long standing very large goitre, there is a risk of tracheomalacia. In the UK this is very rarely seen. However, patients from other countries can have enourmous goitres and this then becomes a concern. The fact that the wound is satisfactory makes a bleed less likely and whilst total thyroidectomy can be a risk factor for hypocalcaemia, this is a little early."}, {"number": 28, "topic": "Complications following thyroid surgery", "stem_html": "A 48 year old lady undergoes a redo thyroidectomy for a multinodular goitre. 24 hours post operatively she develops oculogyric crises and diffuse muscle spasm. What is the most appropriate course of action?", "options": [{"label_html": "Arrange a CT scan of the head", "is_correct": false}, {"label_html": "Administration of intravenous magnesium", "is_correct": false}, {"label_html": "Administration of intravenous calcium", "is_correct": true}, {"label_html": "Return the patient to theatre for wound exploration", "is_correct": false}, {"label_html": "Call an anaesthetist to paralyse and ventilate the patient", "is_correct": false}], "correct_index": 2, "explanation_html": "She has most likely developed hypocalcaemic tetany and will require immediate calcium supplementation."}], "note_html": "The major immediate risk following thyroidectomy is haemorrhage. A tension haematoma deep to the cervical fascia is usually the result of reactionary haemorrhage from an arterial source. This results in the development of laryngeal oedema and airway compromise. The treatment is by urgent wound decompression of all layers prior to return to theatre for haemostasis. Sub cutnaeous haematomas and seromas may accumulate under skin flaps and can often be managed conservatively or by simple aspiration. <br><br>In patients with longstanding large goitres there is the risk of tracheomalacia. This is characterised by the development of flacidity of the tracheal cartilage. This can result in airway compromise. In the normal situation the tracheal diameter increases slightly during inspiration and narrows during expiration. In tracheomalacia these processes are exaggerated and the trachea may collapse in expiration resulting in stridor. In the  immediate situation an endotracheal tube will need to be inserted. <br><br>Recurrent laryngeal nerve injury is recognised following thyroid surgery and may be unilateral or bilateral depending upon the procedure performed. The risk is 1.8% at one month which declines to 0.5% at three months following first time explorations. It is rare for nerve injury alone to result in airway compromise. However, it may occur when nerve injury is associated with minor degrees of laryngeal oedema (such as following intubation). <br><br>Hypoparathyroidism is a recognised complication following thyroid surgery and damage to the blood supply to the parathyroid glands is probably the commonest cause. The incidence of permanent hypoparathyroidism is in the region of 1 to 3%. It can present dramatically in the first 2-5 post operative days. In the emergency setting treatment is with intravenous calcium gluconate. Oral calcium carbonate is used in the longer term."}, {"name": "Complications of breast surgery", "questions": [{"number": 29, "topic": "Complications of breast surgery", "stem_html": "A 56 year old lady undergoes a mastectomy as treatment for multifocal ductal carcinoma in situ. Two weeks post operatively she attends the clinic and complains of a diffuse swelling at the surgical site. On examination she has a large, fluctuant area underlying the mastectomy skin flaps. She is otherwise well. What is the most likely cause?", "options": [{"label_html": "Abscess", "is_correct": false}, {"label_html": "Seroma", "is_correct": true}, {"label_html": "Haematoma", "is_correct": false}, {"label_html": "Disease recurrence", "is_correct": false}, {"label_html": "Arteriovenous malformation", "is_correct": false}], "correct_index": 1, "explanation_html": "Seromas are very common after breast surgery. The exposed raw surfaces created during the elevation of the skin flaps are a common cause. Treatment usually involves percutaneous drainage under aseptic conditions."}], "note_html": "Breast surgery may be associated with the following complications:<br><ul><li>Long thoracic nerve injury. This may occur during the axillary dissection and result in winging of the scapula.<\/li><li>Intercostobrachial nerve injury. These nerves traverse the axilla. When they are divided (which they often are) the patient will notice an area of parasthesia in the armpit.<\/li><li>Injury to the thoracodorsal trunk. This nerve and vessels supply latissimus dorsi. If they are damaged the functional effects are not too serious, the greatest setback is that a latissimus dorsi flap cannot be used for reconstruction purposes.<\/li><li>Infections. Cellulitis of the chest wall and arm may be a major problem if axillary nodal clearance is undertaken. Infections may run a protracted course and require polytherapy for treatment.<\/li><li>Lymphoedema. Usually complicates axillary node clearance or irradiation. Treatment is with manual lymphatic drainage and compression sleeves. <\/li><li>Seroma. This is an accumulation of fluid at the site of surgery. The fluid is usually straw coloured and may re-accumulate despite drainage. Most will resolve with time. <\/li><\/ul>"}, {"name": "Familial breast cancer", "questions": [{"number": 30, "topic": "Familial breast cancer", "stem_html": "A 35 year old lady with a family history of breast cancer is found to have a BRCA 1 mutation and TP53 mutation. What is the most appropriate surveillance strategy?", "options": [{"label_html": "Three yearly breast MRI scanning", "is_correct": false}, {"label_html": "Annual Mammography and USS", "is_correct": false}, {"label_html": "Annual breast MRI scans", "is_correct": true}, {"label_html": "Three yearly breast MRI scans and annual mammography", "is_correct": false}, {"label_html": "Three yearly breast MRI scans and annual ultrasound", "is_correct": false}], "correct_index": 2, "explanation_html": "Young females at very high risk of breast cancer should undergo annual MRI."}], "note_html": "The general population risk of breast cancer in the UK is 11%. <br>Women with a moderate risk of breast cancer have a risk of breast cancer between 17% and under 30%<br>Women with high risk of breast cancer have risks in excess of 30%.<br>All women who have a faulty BRCA1, BRCA2 or TP53 gene are at high risk.<br><br><b>Family history and risk<\/b><br>The following indicate high family history risk (and referral for genetics)<br>Female breast cancers only<br>1 first degree relative<br>Under 40<br>OR<br>2 first degree relatives<br>Any age<br>OR<br>1 first and 1 second-degree relative<br>Any age<br>OR<br>3 first degree relatives<br>Any age<br>OR<br>3 second-degree relatives<br>Any age<br><br><b>Drug treatment<\/b><br>Premenopausal women at high risk can be offered tamoxifen<br>Post menopausal women at high risk can be offered anastrazole.<br>Where drug treatment is given, the period of dosage should not exceed 5 years.<br><br><b>Surgery<\/b><br>Women at high risk of developing breast cancer can be offered a risk reducing bilateral mastectomy (with reconstruction if wished). Drug treatments as outlined above can be used whilst patients are considering surgical options."}, {"name": "Gynaecomastia", "questions": [{"number": 31, "topic": "Gynaecomastia", "stem_html": "A 45 year old man is referred to the breast clinic with gynaecomastia. He takes the drugs listed below. Which is least likely to be the cause of his symptoms?", "options": [{"label_html": "Spironolactone", "is_correct": false}, {"label_html": "Carbimazole", "is_correct": true}, {"label_html": "Chlorpromazine", "is_correct": false}, {"label_html": "Cimetidine", "is_correct": false}, {"label_html": "Methyldopa", "is_correct": false}], "correct_index": 1, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Mnemonic for drugs causing gynaecomastia: DISCO<br><br>D igitalis<br>I soniazid<br>S pironolactone<br>C imetidine<br>O estrogen<br><br>Mnemonic for causes of gynaecomastia: METOCLOPRAMIDE<br><br>M etoclopramide<br>E ctopic oestrogen<br>T rauma skull/tumour breast, testes<br>O rchitis<br>C imetidine, Cushings<br>L iver cirrhosis<br>O besity<br>P araplegia<br>R A<br>A cromegaly<br>M ethyldopa<br>I soniazid<br>D igoxin<br>E thionamide<\/div>Carbimazole is not associated with gynaecomastia. Note the question asks for the least likely cause."}, {"number": 32, "topic": "Gynaecomastia", "stem_html": "A 19 year old male presents with bilateral gynaecomastia, poor vision and nipple discharge. Which of the following blood tests is most likely to be abnormal?", "options": [{"label_html": "Oestrogen", "is_correct": false}, {"label_html": "Testosterone", "is_correct": false}, {"label_html": "β HCG", "is_correct": false}, {"label_html": "Prolactin", "is_correct": true}, {"label_html": "Calcitonin", "is_correct": false}], "correct_index": 3, "explanation_html": "A combination of nipple discharge, gynaecomastia and poor vision may well be associated with a prolactinoma. The poor vision results from compression of the optic chiasm resulting in bi temporal hemianopia."}], "note_html": "Gynaecomastia describes an abnormal amount of breast tissue in males and is usually caused by an increased oestrogen:androgen ratio. It is important to differentiate the causes of galactorrhoea (due to the actions of prolactin on breast tissue) from those of gynaecomastia<br><br><b>Causes of gynaecomastia<\/b><br><br><ul><li>physiological: normal in puberty<\/li><li>syndromes with androgen deficiency: Kallman's, Klinefelter's<\/li><li>testicular failure: e.g. Mumps<\/li><li>liver disease<\/li><li>testicular cancer e.g. Seminoma secreting HCG<\/li><li>ectopic tumour secretion<\/li><li>hyperthyroidism<\/li><li>haemodialysis<\/li><li>drugs: see below<\/li><\/ul><br><b>Drug causes of gynaecomastia<\/b><br><br><ul><li>spironolactone (most common drug cause)<\/li><li>cimetidine<\/li><li>digoxin<\/li><li>cannabis<\/li><li>finasteride<\/li><li>oestrogens, anabolic steroids<\/li><\/ul><br>Very rare drug causes of gynaecomastia<br><ul><li>tricyclics <\/li><li>isoniazid<\/li><li>calcium channel blockers<\/li><li>heroin<\/li><li>busulfan<\/li><li>methyldopa<\/li><\/ul><br><b>Treatment options<\/b><br><ul><li>identify and manage any overt underlying cause<\/li><li>liposuction provides the best cosmetic outcome<\/li><\/ul>"}, {"name": "Hyperthyroidism", "questions": [{"number": 33, "topic": "Hyperthyroidism", "stem_html": "A 33 year old lady attends the clinic with a 3 month history of palpitations and irritability. Her thyroid function, PTH and calcium are measured:<br><b>Thyroid function<\/b><br><div class=\"table-responsive\"><table class=\"tb\"><tbody><tr><td>Free T4<\/td><td>40 pmol/L<\/td><\/tr><tr><td>TSH<\/td><td>&lt; 0.1 miu/L<\/td><\/tr><tr><td>Free T3<\/td><td>25 p mol/L (normal 3.5-7.7 p mol/L)<\/td><\/tr><tr><td>PTH<\/td><td>10pg/ml (normal 10-55pg/ml)<\/td><\/tr><tr><td>Ca<\/td><td>2.12 mmol/L<\/td><\/tr><\/tbody><\/table><\/div>(Normal values listed in reference range link)<br>What is the most likely diagnosis?", "options": [{"label_html": "Hypothyroidism", "is_correct": false}, {"label_html": "Hyperthyroidism", "is_correct": true}, {"label_html": "Hypoparathyroidism", "is_correct": false}, {"label_html": "Hyperparathyroidism", "is_correct": false}, {"label_html": "Euthyroid", "is_correct": false}], "correct_index": 1, "explanation_html": "Elevated T4 and suppressed TSH makes this the most likely diagnosis. The PTH level is normal."}, {"number": 34, "topic": "Hyperthyroidism", "stem_html": "A 52 year old woman presents with a neck swelling. Her GP reports that her TSH value is low at 0.01. A scintigraphy demonstrates a hot nodule. What is the most likely diagnosis?", "options": [{"label_html": "Graves disease", "is_correct": false}, {"label_html": "Toxic adenoma", "is_correct": true}, {"label_html": "Papillary thyroid cancer", "is_correct": false}, {"label_html": "Hashimotos thyroiditis", "is_correct": false}, {"label_html": "De Quervains thyroiditis", "is_correct": false}], "correct_index": 1, "explanation_html": "This lady has thyrotoxicosis (low TSH) and a hot solitary nodule indicating a toxic adenoma. Thyroid cancer rarely causes thyrotoxicosis or hot nodules."}, {"number": 35, "topic": "Hyperthyroidism", "stem_html": "A 52 year old woman presents with a neck swelling. Her GP reports that her TSH value is low at 0.01. A scintigraphy demonstrates a hot nodule. What is the most likely diagnosis?", "options": [{"label_html": "Graves disease", "is_correct": false}, {"label_html": "Toxic adenoma", "is_correct": true}, {"label_html": "Papillary thyroid cancer", "is_correct": false}, {"label_html": "Hashimotos thyroiditis", "is_correct": false}, {"label_html": "De Quervains thyroiditis", "is_correct": false}], "correct_index": 1, "explanation_html": "This lady has thyrotoxicosis (low TSH) and a hot solitary nodule indicating a toxic adenoma. Thyroid cancer rarely causes thyrotoxicosis or hot nodules."}, {"number": 36, "topic": "Hyperthyroidism", "stem_html": "A 63 year old man is recovering following a protracted stay on the intensive care unit recovering from an anastomotic leak following a difficult trans hiatal oesophagectomy. His progress is slow, and the intensive care doctors receive the following thyroid function test results:<br><div class=\"table-responsive\"><table class=\"tb\"><tbody><tr><td>TSH<\/td><td>1.0 mU/L<\/td><\/tr><tr><td>Free T4<\/td><td>8 micrograms/ dl (normal 4-11)<\/td><\/tr><tr><td>T3<\/td><td>1.0 micrograms/ dl  (1.2-3.1 normal)<\/td><\/tr><\/tbody><\/table><\/div>What is the most likely interpretation of these results and findings?", "options": [{"label_html": "Hyperthyroidism", "is_correct": false}, {"label_html": "Anxiety state", "is_correct": false}, {"label_html": "Sick euthyroid", "is_correct": true}, {"label_html": "Normal euthyroid", "is_correct": false}, {"label_html": "Hypothyroidism", "is_correct": false}], "correct_index": 2, "explanation_html": "Sick euthyroid syndrome is caused by systemic illness. With this, the patient may have an apparently low total and free T4 and T3, with a normal or low TSH. Note that the levels are only mildly below normal."}, {"number": 37, "topic": "Hyperthyroidism", "stem_html": "A 58 year old woman presented to the Emergency Department with a large fluctuant swelling the site of a recent insect bite. She is anxious, tachycardic, and pyrexial. An ECG shows atrial fibrillation. She is noted to have a goitre. The swelling at the site of the bite requires surgical drainage. Which of the following classes of drug would be most appropriate as part of her preoperative preparation for surgery?", "options": [{"label_html": "Alpha 1 adrenoceptor agonist", "is_correct": false}, {"label_html": "Alpha 2 adrenoceptor agonist", "is_correct": false}, {"label_html": "Alpha adrenoceptor blocker", "is_correct": false}, {"label_html": "Beta adrenoceptor agonist", "is_correct": false}, {"label_html": "Beta adrenoceptor blocker", "is_correct": true}], "correct_index": 4, "explanation_html": "The issue here is an interplay between sepsis and thyroid disease. A degree of rate control is required to facilitate anaesthesia and this is best achieved with beta blockade in this particular setting."}], "note_html": "Causes of hyperthyroidism include:<br><ul><li>Diffuse toxic goitre (Graves Disease)<\/li><li>Toxic nodular goitre<\/li><li>Toxic nodule<\/li><li>Rare causes<\/li><\/ul><br><b>Graves disease<\/b><br>Graves disease is characterised by a diffuse vascular goitre that appears at the same time as the clinical manifestations of hyperthyroidism. It is commonest in younger females and may be associated with eye signs. Thyrotoxic symptoms will predominate. Up to 50% of patients will have a familial history of autoimmune disorders. The glandular hypertrophy and hyperplasia occur as a result of the thyroid stimulating effects of the TSH receptor antibodies.<br><br><b>Toxic nodular goitre<\/b><br>In this disorder the goitre is present for a long period of time prior to the development of clinical symptoms. In most goitres the nodules are inactive and in some cases it is the internodular tissue that is responsible for the hyperthyroidism. <br><br><b>Toxic nodule<\/b><br>Overactive, autonomously functioning nodule. It may occur as part of generalised nodularity or be a true toxic adenoma. The TSH levels are usually low as the autonomously functioning thyroid tissue will exert a negative feedback effect. <br><br><b>Signs and symptoms<\/b><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Symptoms<\/b><\/th><th><b>Signs<\/b><\/th><\/tr><\/thead><tbody><tr><td>Lethargy<\/td><td>Tachycardia<\/td><\/tr><tr><td>Emotionally labile<\/td><td>Agitation<\/td><\/tr><tr><td>Heat intolerance<\/td><td>Hot, moist palms<\/td><\/tr><tr><td>Weight loss<\/td><td>Exopthalmos<\/td><\/tr><tr><td>Excessive appetite<\/td><td>Thyroid goitre and bruit<\/td><\/tr><tr><td>Palpitations<\/td><td>Lid lag/retraction<\/td><\/tr><\/tbody><\/table><\/div><br><b>Diagnosis<\/b><br>The most sensitive test for diagnosing hyperthyroidism is plasma T3 (which is raised). Note in hypothyroidism the plasma T4 and TSH are the most sensitive tests.  A TSH level of &lt;0.5U/L suggests hyperthyroidism. TSH receptor antibodies may be tested for in the diagnosis of Graves.<br><br><b>Treatment<\/b><br>First line treatment for Graves disease is usually medical and the block and replace regime is the favored option. Carbimazole is administered at higher doses and thyroxine is administered orally. Patients are maintained on this regime for between 6 and 12 months. Attempts are then made to wean off medication. Where relapse then occurs the options are between ongoing medical therapy, radioiodine or surgery."}, {"name": "Management of thyroid disease", "questions": [{"number": 38, "topic": "Management of thyroid disease", "stem_html": "A 48 year old lady with thyrotoxicosis is referred to the clinic, she was poorly controlled on carbimazole and has received orbital radiotherapy for severe proptosis. This has improved matters but she relapsed on stopping her carbimazole. What would be the best intervention to consider at this stage?", "options": [{"label_html": "Administration of radio-iodine", "is_correct": false}, {"label_html": "Sub total thyroidectomy", "is_correct": false}, {"label_html": "External beam irradiation to the thyroid", "is_correct": false}, {"label_html": "Hemithyroidectomy", "is_correct": false}, {"label_html": "Total thyroidectomy", "is_correct": true}], "correct_index": 4, "explanation_html": "The recurrence of symptoms following medical therapy attracts a recommendation for definitive treatment. Since radio-iodine can worsen eye signs, this is not a wise choice. Surgery in the form of a total thyroidectomy would be curative."}, {"number": 39, "topic": "Management of thyroid disease", "stem_html": "A 59 year old man is referred with symptoms of dysphagia. On examination, he has a large goitre and on imaging there is significant retrosternal extension and features of a multinodular goitre. What is the most appropriate course of action?", "options": [{"label_html": "Total thyroidectomy", "is_correct": true}, {"label_html": "Sub total thyroidectomy", "is_correct": false}, {"label_html": "Thyroid lobectomy", "is_correct": false}, {"label_html": "Radio-iodine", "is_correct": false}, {"label_html": "Conservative management", "is_correct": false}], "correct_index": 0, "explanation_html": "Sub total thyroidectomy is no longer routinely undertaken in this group."}, {"number": 40, "topic": "Management of thyroid disease", "stem_html": "A 30 year old woman, with a recent diagnosis of Graves disease, underwent incision and drainage of a pilonidal abscess three hours ago. She has become agitated, confused and is noted to be jaundiced and sweaty. Her temperature is 39 <sup>o<\/sup>C, pulse 152 beats / minute and blood pressure 95/60 mmHg. An ECG shows an irregular ventricular rate with absent p waves. After resuscitation what is the most appropriate next step in management?", "options": [{"label_html": "Bile acid sequestrants and glucocorticoids", "is_correct": false}, {"label_html": "Bile acid sequestrants and iodides", "is_correct": false}, {"label_html": "Beta adrenoceptor blockers and thionamides", "is_correct": true}, {"label_html": "Beta adrenoceptor blockers and iodides", "is_correct": false}, {"label_html": "Thionamides and thyroidectomy", "is_correct": false}], "correct_index": 2, "explanation_html": "In the first instance, control of cardiac rate and administration of antithyroid drugs are typically used. Development of jaundice in people with a thyrotoxic storm is well described and the aetiology multifactorial."}], "note_html": "Management of thyroid disease<br><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Lesion<\/b><\/th><th><b>Management<\/b><\/th><\/tr><\/thead><tbody><tr><td>Large multinodular goitre<\/td><td>Surgery for pressure symptoms. Total thyroidectomy is treatment of choice<\/td><\/tr><tr><td>Toxic nodule<\/td><td>Hemithyroidectomy<\/td><\/tr><tr><td>Follicular lesion (THY 3f)<\/td><td>Hemithyroidectomy to establish diagnosis<\/td><\/tr><tr><td>Papillary thyroid cancer<\/td><td>Total thyroidectomy and central compartment nodal dissection (extended lymphadenectomy as required)<\/td><\/tr><tr><td>Follicular thyroid cancer<\/td><td>Total thyroidectomy (usually completion as already had hemithyroidectomy)<\/td><\/tr><tr><td>Anaplastic thyroid cancer<\/td><td>Palliative radiotherapy<\/td><\/tr><tr><td>Medullary thyroid cancer<\/td><td>Total thyroidectomy and central compartment nodal dissection (screen for other MEN tumours)<\/td><\/tr><tr><td>Lymphoma of the thyroid<\/td><td>Consider core biopsy<\/td><\/tr><tr><td>Persistent refilling cysts<\/td><td>Injection sclerotherapy and surgery if this fails<\/td><\/tr><tr><td>Graves disease with significant eye signs<\/td><td>Total thyroidectomy<\/td><\/tr><tr><td>Graves disease without significant eye signs<\/td><td>Patient choice radioiodine Vs surgery<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Non malignant breast disease", "questions": [{"number": 41, "topic": "Non malignant breast disease", "stem_html": "A 32 year old woman presents with a tender breast lump. She has a 2 month old child. Clinically, there is a tender, fluctuant mass of the breast. What is the most likely explanation for this process?", "options": [{"label_html": "Duct ectasia", "is_correct": false}, {"label_html": "Intraductal papilloma", "is_correct": false}, {"label_html": "Breast abscess", "is_correct": true}, {"label_html": "Breast cancer", "is_correct": false}, {"label_html": "Fibroadenoma", "is_correct": false}], "correct_index": 2, "explanation_html": "This lady is likely to be breast feeding and is at risk of mastitis. This may lead to an abscess if not treated. <i>Staphylococcus aureus<\/i> is usually the causative organism."}, {"number": 42, "topic": "Non malignant breast disease", "stem_html": "A 53 year old lady presents with a creamy nipple discharge. On examination, she has discharge originating from multiple ducts and associated nipple inversion. What is the most likely cause?", "options": [{"label_html": "Ductal papilloma", "is_correct": false}, {"label_html": "Duct ectasia", "is_correct": true}, {"label_html": "DCIS", "is_correct": false}, {"label_html": "LCIS", "is_correct": false}, {"label_html": "Tuberculosis", "is_correct": false}], "correct_index": 1, "explanation_html": "Duct ectasia is common during the period of breast involution that occurs during the menopausal period. As the ducts shorten they may contain inspissated material. The discharge will often discharge from several ducts."}, {"number": 43, "topic": "Non malignant breast disease", "stem_html": "A 52 year old lady presents with an episode of nipple discharge. It is usually clear in nature. On examination, the discharge is seen to originate from a single duct and although it appears clear, when the discharge is tested with a labstix it is shown to contain blood. Imaging and examination shows no obvious mass lesion. Which of the following lesions is most likely?", "options": [{"label_html": "Duct ectasia", "is_correct": false}, {"label_html": "DCIS", "is_correct": false}, {"label_html": "Intraductal papilloma", "is_correct": true}, {"label_html": "Fat necrosis", "is_correct": false}, {"label_html": "Breast abscess", "is_correct": false}], "correct_index": 2, "explanation_html": "Intraductal papilloma usually cause single duct discharge. The fluid is often clear, although it may be blood stained. If the fluid is tested with a labstix (little point in routine practice) then it will usually contain small amounts of blood. A microdochectomy may be performed."}], "note_html": "<b>Duct ectasia<\/b><br><ul><li>Mammary duct ectasia may be seen in up to 25% of normal female breasts<\/li><li>Patients usually present with nipple discharge, which may be from single or multiple ducts (usually present age &gt;50 years)<\/li><li>The discharge is often thick and green<\/li><li>Duct ectasia is a normal variant of breast involution and is not the same condition as periductal mastitis<\/li><li>Mass develops behind nipple<\/li><\/ul><br><b>Periductal mastitis<\/b><br><ul><li>Present at younger age than duct ectasia<\/li><li>May present with features of inflammation, abscess or mammary duct fistula<\/li><li>Strongly associated with smoking<\/li><li>Usually treated with antibiotics, abscess will require drainage<\/li><li>Mass develops around nipple<\/li><\/ul><br><b>Intraductal papilloma<\/b><br><ul><li>Growth of papilloma in a single duct<\/li><li>Usually presents with clear or blood stained discharge originating from a single duct<\/li><li>No increase in risk of malignancy<\/li><\/ul><br><b>Breast abscess<\/b><br><ul><li>Lactational mastitis is common<\/li><li>Infection is usually with <i>Staphylococcus aureus<\/i><\/li><li>On examination there is usually a tender fluctuant mass<\/li><li>Treatment is with antibiotics and ultrasound guided aspiration<\/li><li>Overlying skin necrosis is an indication for surgical debridement, which may be complicated by the development of a subsequent mammary duct fistula.<\/li><\/ul><br><b>Tuberculosis<\/b><br><ul><li>Rare in western countries, usually secondary TB<\/li><li>Affects women later in child bearing period<\/li><li>Chronic breast or axillary sinus is present in up to 50% cases<\/li><li>Diagnosis is by biopsy culture and histology<\/li><\/ul>"}, {"name": "Pancreatic endocrine tumours", "questions": [{"number": 44, "topic": "Pancreatic endocrine tumours", "stem_html": "A 50 year old male presents with recurrent episodes of abdominal pain and diarrhoea. Blood tests reveal mild iron deficiency anaemia and an upper GI endoscopy demonstrates multiple ulcers in the first part of the duodenum. What is the most likely diagnosis?", "options": [{"label_html": "Insulinoma", "is_correct": false}, {"label_html": "Adenocarcinoma", "is_correct": false}, {"label_html": "Glucagonoma", "is_correct": false}, {"label_html": "Gastrinoma", "is_correct": true}, {"label_html": "Squamous cell carcinoma", "is_correct": false}], "correct_index": 3, "explanation_html": "Diarrhoea, abdominal pain and multiple ulcers should raise the suspicion of Zollinger Ellison syndrome caused by gastrinoma."}], "note_html": "<b>Insulinoma<\/b><br><ul><li>Insulin producing tumours of the pancreatic β cells<\/li><li>Incidence
