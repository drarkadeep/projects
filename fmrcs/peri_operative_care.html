ith either 0.15% or 0.3% potassium are the fluids of choice", "is_correct": false}, {"label_html": "Hourly intraoperative blood glucose measurements are required", "is_correct": false}, {"label_html": "Insulin infusions are only required in patients who will miss more than two meals or who are nil by mouth for greater than 12 hours", "is_correct": true}, {"label_html": "Blood glucose levels persistently greater than 12 should initiate a change in therapy", "is_correct": false}], "correct_index": 3, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Insulin should not be stopped in patients with type 1 diabetes and omission of more than one meal will usually require a variable rate insulin infusion<\/div>Type 1 diabetics who take insulin should have this continued through the perioperative period.<br>Fluid guidelines in diabetics differ and are not well covered in NPSA fluid guidelines."}], "note_html": "Elective and emergency patients require different preparation.<br><br><b>Elective cases<\/b><br><ul><li>Consider pre admission clinic to address medical issues.<\/li><li>Blood tests including FBC, U+E, LFT's, Clotting, Group and Save<\/li><li>Urine analysis<\/li><li>Pregnancy test<\/li><li>Sickle cell test<\/li><li>ECG/ Chest x-ray<\/li><\/ul><br>Exact tests to be performed will depend upon the proposed procedure and patient fitness.<br><br>Risk factors for development of deep vein thrombosis should be assessed and a plan for thromboprophylaxis formulated.<br><br><b>Diabetes<\/b><br>Diabetic patients have greater risk of complications.<br>Poorly controlled diabetes carries high risk of wound infections. <br>Patients with diet or tablet controlled diabetes may be managed using a policy of omitting medication and checking blood glucose levels regularly. Diabetics who are poorly controlled or who take insulin may require a intravenous sliding scale. Potassium supplementation should also be given.<br>Diabetic cases should be operated on first.<br><br><b>Emergency cases<\/b><br>Stabilise and resuscitate where needed.<br>Consider whether antibiotics are needed and when and how they should be administered.<br>Inform blood bank if major procedures planned particularly where coagulopathies are present at the outset or anticipated (e.g. Ruptured AAA repair)<br>Don't forget to consent and inform relatives.<br><br><b>Special preparation<\/b><br>Some procedures require special preparation:<br><ul><li>Thyroid surgery; vocal cord check.<\/li><li>Parathyroid surgery; consider methylene blue to identify gland.<\/li><li>Sentinel node biopsy; radioactive marker/ patent blue dye.<\/li><li>Surgery involving the thoracic duct; consider administration of cream.<\/li><li>Pheochromocytoma surgery; will need alpha and beta blockade.<\/li><li>Surgery for carcinoid tumours; will need covering with octreotide.<\/li><li>Colorectal cases; bowel preparation (especially left sided surgery)<\/li><li>Thyrotoxicosis; lugols iodine/ medical therapy.<\/li><\/ul>"}, {"name": "Proactive care of older people undergoing surgery (POPS)", "questions": [{"number": 44, "topic": "Proactive care of older people undergoing surgery (POPS)", "stem_html": "In relation to operating in the elderly which statement is false?", "options": [{"label_html": "A 30 minute increment in operation length is associated with increase in mortality in patients over the age of 80", "is_correct": false}, {"label_html": "Hypoalbuminaemia is associated with increased mortality", "is_correct": false}, {"label_html": "Statins given preoperatively reduce perioperative cardiac events", "is_correct": false}, {"label_html": "Elevated brain (or B-type) natriuretic peptide (BNP) levels before undergoing non cardiac surgery is associated with high risk of cardiac mortality and all cause mortality", "is_correct": false}, {"label_html": "Beta blockers should be stopped acutely prior to surgery due to risk of perioperative hypotension", "is_correct": true}], "correct_index": 4, "explanation_html": "Beta blockers should not be stopped acutely prior to surgery as there may be a rebound effect associated with increased complications.<br><br>Brain natriuretic peptide is a neurohormone synthesized in the cardiac ventricles.  Levels have been used to assess prognosis in heart failure and acute coronary syndromes.  Preoperative elevated brain natriuretic peptide levels identify patients undergoing non cardiac surgery at high risk of cardiac mortality and all cause mortality. <br><br>All patients with peripheral vascular disease should take statins prior to vascular surgery as studies have shown a 50% risk reduction and a reduction in perioperative cardiac events.<br><br><i>Reference<\/i><br>1. Dernellis J, Panaretou M.  Assessment of cardiac risk before non-cardiac surgery: brain natriuretic peptide in 1590 patients.  Heart 2006;92:1645-1650 <br>2. Poldermans, D <i>et al<\/i> Fluvastatin and Perioperative Events in Patients Undergoing Vascular Surgery.  NEJM 2009; 361:980-989"}], "note_html": "<ul><li>Comprehensive geriatric assessment <\/li><li>MDT assessment preoperatively<\/li><li>Main predictors of complications are co-morbidities cardiac disease and reduced functional capacity - preoperative assessment is the key to preventing adverse postoperative outcomes<\/li><li>Patients screened for risk factors (albumin &lt;30, co morbidities)<\/li><li>Management plan made and disseminated to all involved<\/li><li>Patients education: pain relief, post op exercises, nutrition<\/li><\/ul><br>Outcomes:<br><ul><li>Fewer postoperative medical complications<\/li><li>Reduced length of stay by 4.5 days<\/li><\/ul><br><b>References<\/b><br>Proactive care of older people undergoing surgery (POPS)<br>Danielle Harari <i>et al.<\/i><br>Age and Ageing 2007 36(2):190-196"}, {"name": "Pyrexia- post operative", "questions": [{"number": 45, "topic": "Pyrexia- post operative", "stem_html": "A 63 year old man is recovering following an open extended right hemicolectomy for carcinoma of the colonic splenic flexure. Two days post operatively he develops a persistent pyrexia. What is the least likely cause?", "options": [{"label_html": "Ileus", "is_correct": true}, {"label_html": "Aspiration pneumonia", "is_correct": false}, {"label_html": "Anastomotic leak", "is_correct": false}, {"label_html": "Wound infection", "is_correct": false}, {"label_html": "Urinary tract infection", "is_correct": false}], "correct_index": 0, "explanation_html": "An ileus in itself is seldom a cause of a pyrexia. It may serve as a proxy marker of other complications. In this scenario atelectasis would be the most likely underlying cause, as open extended right hemicolectomies will necessitate a long midline incision. Anastomotic leaks are less common after right sided colonic surgery and the timeframe for it is rather short (but are possible). Both wound infections and UTI's ,may complicate major abdominal surgery at any stage. <i>We remind you to check the wording of the question, it asks for the 'least likely' cause of pyrexia.<\/i>"}], "note_html": "Many surgical patients will develop a pyrexia post operatively. The cause and investigation depends upon the nature of the infection. <br>The following scenarios may account for post operative pyrexia:<br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Cause<\/b><\/td><td><b>Features<\/b><\/td><\/tr><tr><td>Anastomotic leak<\/td><td><ul><li>Swinging pyrexia<\/li><li>Ileus<\/li><li>Increasing abdominal pain<\/li><li>Raised inflammatory markers<\/li><\/ul><\/td><\/tr><tr><td>Wound infection<\/td><td><ul><li>Evidence of superficial erythema, discharge of pus or increasing pain<\/li><li>Usually mild pyrexia (unless major or deep seated wound infection)<\/li><li>May be accompanied by evidence of wound dehisence<\/li><li>Inflammatory markers raised<\/li><\/ul><\/td><\/tr><tr><td>Atelectasis<\/td><td><ul><li>Usually complicates abdominal surgery<\/li><li>Most common after midline laparotomies (pain impairs ventilation)<\/li><li>Pyrexia usually mild and non swinging<\/li><li>Most patients will have chest signs on examination<\/li><li>Inflammatory markers raised<\/li><\/ul><\/td><\/tr><tr><td>Central line sepsis<\/td><td><ul><li>Patients with complex venous access<\/li><li>May have marked pyrexia<\/li><li>Access site may show evidence of erythema<\/li><li>Diagnosis is by blood culture from line, line removal and subsequent tip culture<\/li><li>Groin lines and those for TPN have the highest risk<\/li><li>Inflammatory markers raised<\/li><\/ul><\/td><\/tr><tr><td>Urinary tract infection<\/td><td><ul><li>Common in surgical patients<\/li><li>Usually occur in patients with indwelling urinary catheters<\/li><li>Diagnosis is by dipstick and CSU and signs of raised inflammatory markers<\/li><li>Treatment is with antibiotics (to cover hospital acquired organisms)<\/li><\/ul><\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Thromboprophylaxis in surgical patients", "questions": [{"number": 46, "topic": "Thromboprophylaxis in surgical patients", "stem_html": "A 30 year old male is admitted electively for a right inguinal hernia repair under local anaesthesia. He is otherwise well but his grandfather died from a pulmonary embolism. What is the most appropriate form of thromboprophylaxis?", "options": [{"label_html": "Administration of low dose low molecular weight heparin for 2 weeks", "is_correct": false}, {"label_html": "Administration of high dose low molecular weight heparin for 2 weeks", "is_correct": false}, {"label_html": "No prophylaxis", "is_correct": true}, {"label_html": "Low dose low molecular weight heparin and pneumatic compression stockings", "is_correct": false}, {"label_html": "High dose low molecular weight heparin and pneumatic compression stockings", "is_correct": false}], "correct_index": 2, "explanation_html": "Inguinal hernia repairs under local anaesthetic have a short operative time and patients are usually ambulant immediately afterwards. His family history is unlikely to be significant and he is at very low risk."}, {"number": 47, "topic": "Thromboprophylaxis in surgical patients", "stem_html": "A 5 year old boy undergoes a closure of a loop colostomy. What thromboprophylaxis should be used?", "options": [{"label_html": "None", "is_correct": true}, {"label_html": "Daily low dose low molecular weight heparin for 2 weeks", "is_correct": false}, {"label_html": "Daily low dose low molecular weight heparin until discharged", "is_correct": false}, {"label_html": "Unfractionated heparin and compression stockings", "is_correct": false}, {"label_html": "Oral dabigatran for 4 weeks", "is_correct": false}], "correct_index": 0, "explanation_html": "In paediatric surgical practice, the use of heparin type agents is rare. This is because, even with abdominal surgery, children are ambulant soon after surgery and DVT's vanishingly rare in this population."}, {"number": 48, "topic": "Thromboprophylaxis in surgical patients", "stem_html": "An 83 year old man is admitted for an abdomino-perineal excision of the colon and rectum for a distal rectal tumour. His co-morbidities include diabetes. His renal function is normal. What is the best form of thromboprophylaxis?", "options": [{"label_html": "None", "is_correct": false}, {"label_html": "Compression stockings alone for 4 weeks", "is_correct": false}, {"label_html": "Daily low dose low molecular weight heparin for 4 weeks", "is_correct": true}, {"label_html": "Daily high dose low molecular weight heparin for 4 weeks", "is_correct": false}, {"label_html": "Daily administration of high dose unfractionated heparin until discharge", "is_correct": false}], "correct_index": 2, "explanation_html": "There is good evidence to support the use of extended thromboprophylaxis after pelvic cancer surgery. Don't confuse low dose and high dose low molecular weight heparins, re read the options if you got the answer wrong."}], "note_html": "Deep vein thrombosis may develop insidiously in many surgical patients. Untreated it may progress to result in pulmonary embolism. <br>The following surgical patients are at increased risk of deep vein thrombosis:<br><ul><li>Surgery greater than 90 minutes at any site or greater than 60 minutes if the procedure involves the lower limbs or pelvis<\/li><li>Acute admissions with inflammatory process involving the abdominal cavity<\/li><li>Expected significant reduction in mobility<\/li><li>Age over 60 years<\/li><li>Known malignancy<\/li><li>Thrombophilia<\/li><li>Previous thrombosis <\/li><li>BMI &gt;30<\/li><li>Taking hormone replacement therapy or the contraceptive pill <\/li><li>Varicose veins with phlebitis<\/li><\/ul><br><b>Mechanical thromboprophylaxis<\/b><br><ul><li>Early ambulation after surgery is cheap and is effective<\/li><li>Compression stockings (contra -indicated in peripheral arterial disease)<\/li><li>Intermittent pneumatic compression devices<\/li><li>Foot impulse devices<\/li><\/ul><br><b>Therapeutic agents<\/b><br> <div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Agent<\/b><\/td><td><b>Mode of action<\/b><\/td><td><b>Uses<\/b><\/td><\/tr><tr><td>Low molecular weight heparin<\/td><td>Binds antithrombin causing inhibition of factor Xa<\/td><td>Thromboprophylaxis or treatment of thromboembolic events in those with normal renal function. It is given as once daily subcutaneous injection<\/td><\/tr><tr><td>Unfractionated heparin<\/td><td>Binds antithrombin III affecting thrombin and factor Xa<\/td><td>Effective anticoagulation, administered intravenously it has a rapid onset and its therapeutic effects decline quickly on stopping and infusion. Its activity is measured using the APTT. If need be it can be reversed using protamine sulphate<\/td><\/tr><tr><td>Dabigatran<\/td><td>Orally administered direct thrombin inhibitor<\/td><td>Used prophylaxis in hip and knee surgery. It does not require therapeutic monitoring. It should not be used in any patient in whom there is a risk of active bleeding or imminent likelihood of surgery. It is reversed using Idarucizumab<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Tourniquets", "questions": [{"number": 49, "topic": "Tourniquets", "stem_html": "Which of the following statements relating to use of tourniquets in surgery is false?", "options": [{"label_html": "The use of an esmarch bandage tourniquet to exsanguinate the limb reduces the incidence of neuropraxia.", "is_correct": true}, {"label_html": "Excessive inflation pressures are amongst the commonest causes of nerve injury related to tourniquet use.", "is_correct": false}, {"label_html": "Tourniquet deflation causes a fall in CVP.", "is_correct": false}, {"label_html": "Children require lower inflation pressures than adults.", "is_correct": false}, {"label_html": "In patients developing neuropraxia related to tourniquets the radial nerve is most frequently affected.", "is_correct": false}], "correct_index": 0, "explanation_html": "The use of esmarch bandage tourniquet increases the risk of nerve injury as it increases pressure in the limb. Limb elevation is safer."}], "note_html": "Tourniquets are used during surgery to minimise blood loss and ensure a clear operative field. They must be correctly applied and monitored. They are applied to extremities and in most cases are inflated using a pressure monitoring system.<br><br>There are a number of systemic effects that can accompany tourniquet use, these can be divided into those which occur following inflation and those that occur once the tourniquet is deflated.<br><br><b>Post inflation<\/b><br>Increased systemic vascular resistance, increased CVP and increased BP<br>Slower gradual increase in BP over time<br>Induced hypercoagulable state<br>Slow increase in core temperature<br><br><b>Post deflation<\/b><br>Fall in CVP, BP and SVR<br>Increased end tidal carbon dioxide<br>Enhanced fibrinolysis<br>Fall in core temperature<br>Raised serum potassium and lactate levels<br><br><b>Contra indications<\/b><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Absolute<\/b><\/th><th><b>Relative<\/b><\/th><\/tr><\/thead><tbody><tr><td>AV fistula<br>Severe peripheral vascular disease<br>Previous vascular surgery<br>Bone fracture or thrombosis at the site of tourniquet application<\/td><td>Sickle cell disease<br>History of thromboembolic events<br>Skin grafts<br>Localised infection<br>Lymphoedema<\/td><\/tr><\/tbody><\/table><\/div><br><b>Local complications<\/b><br><ul><li>Damage to skin<\/li><li>Damage to muscle (rarely compartment syndrome)<\/li><li>Damage to vessels<\/li><li>Neuropraxia<\/li><\/ul>"}, {"name": "Wound healing", "questions": [{"number": 50, "topic": "Wound healing", "stem_html": "A 38 year old lady develops a prominent keloid scar following a thyroidectomy. Which of the following types of collagen is most likely present in the scar in excessive quantities?", "options": [{"label_html": "Type III", "is_correct": false}, {"label_html": "Type I", "is_correct": true}, {"label_html": "Type II", "is_correct": false}, {"label_html": "Type IV", "is_correct": false}, {"label_html": "Type V", "is_correct": false}], "correct_index": 1, "explanation_html": "In scar tissues, type I and III collagen subtypes predominate. The balance of these determines the scar type to some extent. Type III collagen typically is associated with greater degrees of flexibility. Keloid scars tend to contain significant quantities of type I collagen (around 17x as more than type III) this explains their rigid nature."}, {"number": 51, "topic": "Wound healing", "stem_html": "A 23 year old man is reviewed on the ward 10 days following a laparotomy. The wound is inspected and is healing well. Which of the following processes is least likely to be occurring in the wound at this stage?", "options": [{"label_html": "Angiogenesis", "is_correct": false}, {"label_html": "Synthesis of collagen", "is_correct": false}, {"label_html": "Necrosis of fibroblasts", "is_correct": true}, {"label_html": "Secretion of matrix metalloproteinases by fibroblasts", "is_correct": false}, {"label_html": "Proliferation of fibroblasts", "is_correct": false}], "correct_index": 2, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Vasculogenesis vs Angiogenesis <br><br><b>Vascu is new. Angi is pre<\/b><br><br>Vasculogenesis is new vessels developing in situ from existing mesenchyme.<br>Angiogenesis is vessels develop from sprouting off pre-existing arteries.<\/div>Fibroblasts are an important cell type in healing wounds. They typically proliferate in the early phases of wound healing. They release matrix metalloproteinases and these facilitate in the remodelling of the matrix within the healing wound. Necrosis in a healing wound would be unusual as wounds will tend to show clinical evidence of angiognesis by this time."}, {"number": 52, "topic": "Wound healing", "stem_html": "Which of the following is associated with poor wound healing?", "options": [{"label_html": "Jaundice", "is_correct": true}, {"label_html": "Patients taking carbamazepine", "is_correct": false}, {"label_html": "General anaesthesia using thiopentone", "is_correct": false}, {"label_html": "General anaesthesia using ketamine", "is_correct": false}, {"label_html": "Multiple sclerosis", "is_correct": false}], "correct_index": 0, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Mnemonic to remember factors affecting wound healing: DID NOT HEAL<br><br>D iabetes<br>I nfection, irradiation<br>D rugs eg steroids, chemotherapy<br><br>N utritional deficiencies (vitamin A, C &amp; zinc, manganese), Neoplasia<br>O bject (foreign material)<br>T issue necrosis<br><br>H ypoxia<br>E xcess tension on wound<br>A nother wound<br>L ow temperature, Liver jaundice<\/div>Multiple sclerosis is associated with pressure sores, however the cellular healing process is not affected."}, {"number": 53, "topic": "Wound healing", "stem_html": "Which of the following is not typically associated with a degloving injury?", "options": [{"label_html": "Overlying pallor of the skin", "is_correct": false}, {"label_html": "Abnormal motility of the overlying skin", "is_correct": false}, {"label_html": "History of friction type injury", "is_correct": false}, {"label_html": "Improved results when the degloved segment is left in situ as a temporary closure", "is_correct": true}, {"label_html": "Poor results when primary compression treatment is used in preference to skin grafting", "is_correct": false}], "correct_index": 3, "explanation_html": "Degloving injuries typically involve extremities and are usually friction injuries e.g. arm being run over. There is abnormal motility of the overlying skin, pallor, loss of sensation. Early treatment is key and should involve skin grafting which may use the degloved segment. This however, should be formally prepared for the role and simple compression bandaging gives poor results."}, {"number": 54, "topic": "Wound healing", "stem_html": "Which of the following statements relating to Keloid scars is untrue?", "options": [{"label_html": "They have a predilection for sternal , mandibular and deltoid area wounds", "is_correct": false}, {"label_html": "They are confined to the margins of the original injury", "is_correct": true}, {"label_html": "They often recur following excision", "is_correct": false}, {"label_html": "May occur even after superficial injury", "is_correct": false}, {"label_html": "They may be treated by injection of triamcinolone", "is_correct": false}], "correct_index": 1, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Hypertrophic scars remain confined to the wound edges.<\/div>Keloids (by definition) will tend to extend beyond the margins of the wound and in wounds of any depth."}, {"number": 55, "topic": "Wound healing", "stem_html": "A 19 year old man has a skin lesion excised from his back. He is reviewed clinically at 4 months post procedure and the surgeon notes that the scar has begun to contract. Which of the following facilitates this process?", "options": [{"label_html": "Myofibroblasts", "is_correct": true}, {"label_html": "Neutrophils", "is_correct": false}, {"label_html": "Granuloma formation", "is_correct": false}, {"label_html": "Macrophages", "is_correct": false}, {"label_html": "Fibroblasts", "is_correct": false}], "correct_index": 0, "explanation_html": "As wounds mature the fibroblast population differentiates into myofibroblasts (usually 6 weeks and beyond), these have a contractile phenotype and therefore help in contracting the wound. Immature fibroblasts, though able to adhere to the ECM, do not have this ability."}, {"number": 56, "topic": "Wound healing", "stem_html": "If a 2 x 2 cm autologus skin graft is placed on an area of healthy granulation tissue. After about a week, a thin bluish - white margin appears around the graft and spreads at a rate of 1mm per day. What is it?", "options": [{"label_html": "Epidermis alone", "is_correct": true}, {"label_html": "Epidermis and dermis", "is_correct": false}, {"label_html": "Dermis alone", "is_correct": false}, {"label_html": "Inflammatory exudate", "is_correct": false}, {"label_html": "Fibrin", "is_correct": false}], "correct_index": 0, "explanation_html": "This is the process of re-epithelialisation."}, {"number": 57, "topic": "Wound healing", "stem_html": "A 20 year old African lady undergoes an open appendicectomy. She is reviewed for an unrelated problem 8 months later. On abdominal inspection the wound site is covered by shiny dark protuberant scar tissue that projects beyond the limits of the skin incision. Which of the following is the most likely underlying process?", "options": [{"label_html": "Hypertrophic scar", "is_correct": false}, {"label_html": "Keloid scar", "is_correct": true}, {"label_html": "Marjolins ulcer", "is_correct": false}, {"label_html": "Repeated episodes of wound sepsis", "is_correct": false}, {"label_html": "Mycosis fungoides", "is_correct": false}], "correct_index": 1, "explanation_html": "Keloid scars extend beyond the limits of the incision. Mycosis fungoides is a cutaneous T cell lymphoma."}, {"number": 58, "topic": "Wound healing", "stem_html": "A 22 year old man presents with a peri anal abscess, which is managed by incision and drainage. The perineal wound measures 3cm by 3cm. Which of the following is best management option?", "options": [{"label_html": "Primary closure with interrupted mattress sutures", "is_correct": false}, {"label_html": "Delayed primary closure with interrupted mattress sutures", "is_correct": false}, {"label_html": "Allow the wound to heal by secondary intention", "is_correct": true}, {"label_html": "Insert a seton through the cavity into the rectum to allow a mature fistula track to develop", "is_correct": false}, {"label_html": "Perform a V-Y flap 2 weeks later", "is_correct": false}], "correct_index": 2, "explanation_html": "Peri anal abscess are typically managed by secondary intention healing. Any attempt at early closure is at best futile and at worst dangerous. Insertion of a seton may be considered by an experienced colorectal surgeon, and only if the tract is clearly identifiable with minimal probing. There is seldom a need for flaps, ongoing discharge usually indicates a fistula (managed separately)."}], "note_html": "Surgical wounds are either incisional or excisional and either clean, clean contaminated or dirty. Although the stages of wound healing are broadly similar their contributions will vary according to the wound type.<br><br>The main stages of wound healing include:<br><br><b>Haemostasis<\/b><br><ul><li>Minutes to hours following injury<\/li><li>Vasospasm in adjacent vessels, platelet plug formation and generation of fibrin rich clot.<\/li><\/ul><br><b>Inflammation<\/b><br><ul><li>Typically days 1-5<\/li><li>Neutrophils migrate into wound (function impaired in diabetes).<\/li><li>Growth factors released, including basic fibroblast growth factor and vascular endothelial growth factor.<\/li><li>Fibroblasts replicate within the adjacent matrix and migrate into wound.<\/li><li>Macrophages and fibroblasts couple matrix regeneration and clot substitution.<\/li><\/ul><br><b>Regeneration<\/b><br><ul><li>Typically days 7 to 56<\/li><li>Platelet derived growth factor and transformation growth factors  stimulate fibroblasts and epithelial cells.<\/li><li>Fibroblasts produce a collagen network.<\/li><li>Angiogenesis occurs and wound resembles granulation tissue.<\/li><\/ul><br><b>Remodeling<\/b><br><ul><li>From 6 weeks to 1 year<\/li><li>Longest phase of the healing process and may last up to one year (or longer). <\/li><li>During this phase fibroblasts become differentiated (myofibroblasts) and these facilitate wound contraction.<\/li><li>Collagen fibres are remodeled.<\/li><li>Microvessels regress leaving a pale scar.<\/li><\/ul><br>The above description represents an idealised scenario. A number of diseases may distort this process. Neovascularisation is an important early process. Endothelial cells may proliferate in the wound bed and recanalise to form a vessel. Vascular disease, shock and sepsis can all compromise microvascular flow and impair healing. <br><br>Conditions such as jaundice will impair fibroblast synthetic function and immunity with a detrimental effect in most parts of the healing process.<br><br><b>Problems with scars:<\/b><br><br><b>Hypertrophic scars<\/b><br>Excessive amounts of collagen within a scar. Nodules may be present histologically containing randomly arranged fibrils within and parallel fibres on the surface. The tissue itself is confined to the extent of the wound itself and is usually the result of a full thickness dermal injury. They may go on to develop contractures.<br><br>Image of hypertrophic scarring. Note that it remains confined to the boundaries of the original wound:<br><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb057b.jpg\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb057.jpg\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Scar\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb057b.jpg\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center><br><b>Keloid scars<\/b><br>Excessive amounts of collagen within a scar. Typically a keloid scar will pass beyond the boundaries of the original injury. They do not contain nodules and may occur following even trivial injury. They do not regress over time and may recur following removal. <br><br>Image of a keloid scar. Note the extension beyond the boundaries of the original incision:<br><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb056b.jpg\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb056.jpg\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Keloid\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb056b.jpg\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center><br><b>Drugs which impair wound healing:<\/b><br><ul><li>Non steroidal anti inflammatory drugs<\/li><li>Steroids<\/li><li>Immunosupressive agents<\/li><li>Anti neoplastic drugs<\/li><\/ul><br><b>Closure<\/b><br>Delayed primary closure is the anatomically precise closure that is delayed for a few days but before granulation tissue becomes macroscopically evident. <br><br>Secondary closure refers to either spontaneous closure or to surgical closure after granulation tissue has formed."}]}</script>
  <script>
    const quizData = JSON.parse(document.getElementById("quiz-data").textContent);
    const app = document.getElementById("app");
    const modeButtons = Array.from(document.querySelectorAll("[data-mode-button]"));
    const topicActionButtons = Array.from(document.querySelectorAll("[data-topic-action]"));

    const state = {
      mode: "solve",
      answers: new Map(),
      questionRefs: [],
    };

    function buildTopic(topic, questionOffset) {
      const details = document.createElement("details");
      details.className = "topic";
      details.open = true;

      const summary = document.createElement("summary");
      summary.innerHTML = `
        <div>
          <h2 class="topic-title">${topic.name}</h2>
        </div>
        <div class="topic-meta">
          <span>${topic.questions.length} questions</span>
          <span class="chevron" aria-hidden="true">></span>
        </div>
      `;

      const body = document.createElement("div");
      body.className = "topic-body";

      if (topic.note_html) {
        const notes = document.createElement("details");
        notes.className = "topic-notes";

        const notesSummary = document.createElement("summary");
        notesSummary.innerHTML = `
          <span class="topic-notes-title">Notes</span>
          <span class="chevron" aria-hidden="true">></span>
        `;

        const notesBody = document.createElement("div");
        notesBody.className = "topic-notes-body rich-text";
        notesBody.innerHTML = topic.note_html;

        notes.appendChild(notesSummary);
        notes.appendChild(notesBody);
        body.appendChild(notes);
      }

      topic.questions.forEach((question, indexInTopic) => {
        const globalIndex = questionOffset + indexInTopic;
        body.appendChild(buildQuestionCard(question, globalIndex));
      });

      details.appendChild(summary);
      details.appendChild(body);
      return details;
    }

    function buildQuestionCard(question, questionIndex) {
      const card = document.createElement("article");
      card.className = "question-card is-hidden";
      card.dataset.questionIndex = String(questionIndex);

      const label = document.createElement("p");
      label.className = "question-label";
      label.textContent = `Question ${question.number}`;

      const stem = document.createElement("div");
      stem.className = "stem rich-text";
      stem.innerHTML = question.stem_html;

      const options = document.createElement("div");
      options.className = "options";

      const optionButtons = question.options.map((option, optionIndex) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "option";
        button.dataset.optionIndex = String(optionIndex);
        button.innerHTML = option.label_html;
        button.addEventListener("click", () => {
          if (state.mode !== "solve") {
            return;
          }
          state.answers.set(questionIndex, optionIndex);
          applyQuestionState(questionIndex);
        });
        options.appendChild(button);
        return button;
      });

      const explanation = document.createElement("div");
      explanation.className = "explanation rich-text";
      explanation.innerHTML = `<span class="explanation-label">Explanation</span>${question.explanation_html}`;

      card.appendChild(label);
      card.appendChild(stem);
      card.appendChild(options);
      card.appendChild(explanation);

      state.questionRefs[questionIndex] = {
        card,
        explanation,
        optionButtons,
        question,
      };

      applyQuestionState(questionIndex);
      return card;
    }

    function applyQuestionState(questionIndex) {
      const ref = state.questionRefs[questionIndex];
      if (!ref) {
        return;
      }

      const { card, optionButtons, question } = ref;
      const selectedIndex = state.answers.get(questionIndex);
      const hasSelection = selectedIndex !== undefined;
      const isReview = state.mode === "review";
      const showExplanation = isReview || hasSelection;

      card.classList.toggle("is-hidden", !showExplanation);

      optionButtons.forEach((button, optionIndex) => {
        button.classList.remove("correct", "incorrect", "neutral-revealed");

        if (isReview) {
          button.disabled = true;
          if (optionIndex === question.correct_index) {
            button.classList.add("correct");
          } else {
            button.classList.add("neutral-revealed");
          }
          return;
        }

        button.disabled = false;
        if (!hasSelection) {
          return;
        }

        if (optionIndex === question.correct_index) {
          button.classList.add("correct");
        } else if (optionIndex === selectedIndex) {
          button.classList.add("incorrect");
        } else {
          button.classList.add("neutral-revealed");
        }
      });
    }

    function renderApp() {
      if (!quizData.topics.length) {
        const empty = document.createElement("div");
        empty.className = "empty-state";
        empty.textContent = "No questions were found in this JSON file.";
        app.replaceChildren(empty);
        return;
      }

      const wrapper = document.createElement("div");
      wrapper.className = "topic-list";

      let questionOffset = 0;
      quizData.topics.forEach((topic) => {
        wrapper.appendChild(buildTopic(topic, questionOffset));
        questionOffset += topic.questions.length;
      });

      app.replaceChildren(wrapper);
    }

    function setMode(mode) {
      state.mode = mode;
      modeButtons.forEach((button) => {
        const isActive = button.dataset.modeButton === mode;
        button.classList.toggle("active", isActive);
        button.setAttribute("aria-pressed", String(isActive));
      });

      state.questionRefs.forEach((_, index) => applyQuestionState(index));
    }

    function setAllTopics(open) {
      document.querySelectorAll(".topic").forEach((topic) => {
        topic.open = open;
      });
    }

    modeButtons.forEach((button) => {
      button.addEventListener("click", () => setMode(button.dataset.modeButton));
    });

    topicActionButtons.forEach((button) => {
      button.addEventListener("click", () => {
        setAllTopics(button.dataset.topicAction === "expand");
      });
    });

    renderApp();
    setMode("solve");
  </script>
</body>
</html>
