<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Peri Operative Care</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f1e8;
      --bg-accent: #ebe4d4;
      --surface: rgba(255, 252, 246, 0.92);
      --surface-strong: #fffdf7;
      --border: #d9cfbd;
      --text: #23313a;
      --text-soft: #5f6c73;
      --accent: #496a58;
      --accent-strong: #2f5341;
      --correct-bg: #e0f3e6;
      --correct-border: #77b487;
      --wrong-bg: #fbe0df;
      --wrong-border: #dc7a73;
      --note-bg: #f3eee2;
      --shadow: 0 18px 40px rgba(76, 59, 37, 0.08);
      --radius-lg: 22px;
      --radius-md: 16px;
      --radius-sm: 12px;
      --page-width: 960px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: "Avenir Next", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.72), transparent 32%),
        linear-gradient(180deg, #f8f4eb 0%, #f3ede0 100%);
      line-height: 1.65;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.14), transparent 18%, transparent 82%, rgba(255, 255, 255, 0.14)),
        repeating-linear-gradient(
          180deg,
          rgba(73, 106, 88, 0.015) 0,
          rgba(73, 106, 88, 0.015) 1px,
          transparent 1px,
          transparent 18px
        );
    }

    a {
      color: var(--accent-strong);
    }

    img {
      max-width: 100%;
      height: auto;
      border-radius: 14px;
    }

    .score-badge,
    .badge.rounded-pill.bg-danger {
      display: none !important;
    }

    .page {
      width: min(100% - 24px, var(--page-width));
      margin: 0 auto;
      padding: 18px 0 48px;
    }

    .topbar {
      margin-bottom: 18px;
      padding: 18px;
      background: rgba(255, 252, 246, 0.9);
      border: 1px solid rgba(217, 207, 189, 0.86);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .topbar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .eyebrow {
      margin: 0 0 4px;
      font-size: 0.76rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-soft);
    }

    .title {
      margin: 0;
      font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
      font-size: clamp(1.5rem, 2vw + 1rem, 2.35rem);
      line-height: 1.08;
      font-weight: 700;
    }

    .meta {
      margin: 8px 0 0;
      color: var(--text-soft);
      font-size: 0.96rem;
    }

    .mode-switch {
      display: inline-flex;
      padding: 6px;
      border-radius: 999px;
      background: var(--bg-accent);
      border: 1px solid var(--border);
      gap: 6px;
      flex-shrink: 0;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
      flex-wrap: wrap;
    }

    .topic-actions {
      display: inline-flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .utility-button {
      appearance: none;
      border: 1px solid var(--border);
      background: var(--surface-strong);
      color: var(--text);
      font: inherit;
      font-weight: 700;
      border-radius: 999px;
      padding: 10px 14px;
      cursor: pointer;
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .utility-button:hover {
      transform: translateY(-1px);
      border-color: #c7bba9;
      box-shadow: 0 8px 18px rgba(70, 54, 34, 0.07);
    }

    .utility-button:focus-visible {
      outline: 3px solid rgba(73, 106, 88, 0.22);
      outline-offset: 2px;
    }

    .mode-button {
      appearance: none;
      border: 0;
      background: transparent;
      color: var(--text-soft);
      font: inherit;
      font-weight: 700;
      border-radius: 999px;
      padding: 10px 16px;
      min-width: 92px;
      cursor: pointer;
      transition: transform 0.18s ease, background 0.18s ease, color 0.18s ease, box-shadow 0.18s ease;
    }

    .mode-button:hover {
      transform: translateY(-1px);
      color: var(--text);
    }

    .mode-button.active {
      background: var(--surface-strong);
      color: var(--accent-strong);
      box-shadow: 0 8px 18px rgba(73, 106, 88, 0.14);
    }

    .topic-list {
      display: grid;
      gap: 18px;
    }

    .topic {
      background: rgba(255, 252, 246, 0.78);
      border: 1px solid rgba(217, 207, 189, 0.9);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .topic[open] {
      background: rgba(255, 252, 246, 0.9);
    }

    .topic > summary {
      list-style: none;
      cursor: pointer;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      user-select: none;
    }

    .topic > summary::-webkit-details-marker {
      display: none;
    }

    .topic-title {
      margin: 0;
      font-size: 1.08rem;
      font-weight: 800;
      letter-spacing: 0.01em;
    }

    .topic-meta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--text-soft);
      font-size: 0.94rem;
    }

    .chevron {
      display: inline-block;
      transition: transform 0.2s ease;
      color: var(--accent);
      font-weight: 700;
    }

    .topic[open] > summary .chevron {
      transform: rotate(90deg);
    }

    .topic-notes {
      background: rgba(243, 238, 226, 0.62);
      border: 1px solid #e3d9c8;
      border-radius: var(--radius-md);
      overflow: hidden;
    }

    .topic-notes > summary {
      list-style: none;
      cursor: pointer;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      user-select: none;
    }

    .topic-notes > summary::-webkit-details-marker {
      display: none;
    }

    .topic-notes-title {
      font-size: 0.95rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-soft);
    }

    .topic-notes[open] > summary .chevron {
      transform: rotate(90deg);
    }

    .topic-notes-body {
      padding: 0 16px 16px;
      color: var(--text);
    }

    .topic-body {
      padding: 0 16px 16px;
      display: grid;
      gap: 14px;
    }

    .question-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 18px;
      box-shadow: 0 10px 24px rgba(70, 54, 34, 0.05);
    }

    .question-label {
      margin: 0 0 10px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-soft);
      font-size: 0.88rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 800;
    }

    .stem {
      font-size: 1rem;
    }

    .stem > *:first-child,
    .explanation > *:first-child {
      margin-top: 0;
    }

    .stem > *:last-child,
    .explanation > *:last-child {
      margin-bottom: 0;
    }

    .options {
      margin-top: 16px;
      display: grid;
      gap: 10px;
    }

    .option {
      width: 100%;
      text-align: left;
      border: 1px solid #d8d0c2;
      background: #fffdf8;
      color: var(--text);
      border-radius: var(--radius-sm);
      padding: 14px 15px;
      font: inherit;
      line-height: 1.45;
      cursor: pointer;
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
    }

    .option:hover {
      transform: translateY(-1px);
      border-color: #c7bba9;
      box-shadow: 0 8px 18px rgba(70, 54, 34, 0.07);
    }

    .option:focus-visible {
      outline: 3px solid rgba(73, 106, 88, 0.22);
      outline-offset: 2px;
    }

    .option.correct {
      background: var(--correct-bg);
      border-color: var(--correct-border);
      box-shadow: inset 0 0 0 1px rgba(119, 180, 135, 0.2);
    }

    .option.incorrect {
      background: var(--wrong-bg);
      border-color: var(--wrong-border);
      box-shadow: inset 0 0 0 1px rgba(220, 122, 115, 0.2);
    }

    .option.neutral-revealed {
      background: #faf6ee;
      border-color: #d8d0c2;
      color: #5f676a;
    }

    .option[disabled] {
      cursor: default;
      opacity: 1;
    }

    .explanation {
      margin-top: 14px;
      padding: 14px 16px;
      background: var(--note-bg);
      border: 1px solid #e3d9c8;
      border-radius: 14px;
      color: var(--text);
    }

    .question-card.is-hidden .explanation {
      display: none;
    }

    .explanation-label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-soft);
      font-weight: 800;
    }

    .empty-state {
      padding: 28px 22px;
      background: var(--surface);
      border: 1px dashed var(--border);
      border-radius: var(--radius-lg);
      color: var(--text-soft);
    }

    .rich-text table {
      width: 100%;
      border-collapse: collapse;
      margin: 12px 0;
      overflow: hidden;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.68);
    }

    .rich-text td,
    .rich-text th {
      border: 1px solid #ddd2bf;
      padding: 10px 12px;
      vertical-align: top;
    }

    .rich-text ul,
    .rich-text ol {
      padding-left: 20px;
      margin: 10px 0;
    }

    .rich-text center {
      display: block;
      text-align: center;
    }

    .rich-text .table-responsive {
      overflow-x: auto;
    }

    @media (max-width: 720px) {
      .page {
        width: min(100% - 16px, var(--page-width));
        padding-top: 10px;
      }

      .topbar {
        padding: 14px;
        border-radius: 18px;
      }

      .topbar-inner {
        flex-direction: column;
        align-items: stretch;
      }

      .controls {
        justify-content: stretch;
      }

      .topic-actions {
        width: 100%;
      }

      .utility-button {
        flex: 1 1 0;
      }

      .mode-switch {
        width: 100%;
        justify-content: stretch;
      }

      .mode-button {
        flex: 1 1 50%;
      }

      .topic > summary {
        padding: 16px;
        align-items: flex-start;
      }

      .topic-meta {
        font-size: 0.88rem;
      }

      .topic-body {
        padding: 0 12px 12px;
      }

      .question-card {
        padding: 15px;
      }

      .option {
        padding: 13px 14px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="topbar">
      <div class="topbar-inner">
        <div>
          <p class="eyebrow">Study View</p>
          <h1 class="title">Peri Operative Care</h1>
          <p class="meta">58 questions across 20 topics</p>
        </div>
        <div class="controls">
          <div class="topic-actions" aria-label="Topic visibility controls">
            <button class="utility-button" type="button" data-topic-action="expand">Expand all</button>
            <button class="utility-button" type="button" data-topic-action="collapse">Collapse all</button>
          </div>
          <div class="mode-switch" role="tablist" aria-label="Question mode">
            <button class="mode-button active" type="button" data-mode-button="solve" aria-pressed="true">Solve</button>
            <button class="mode-button" type="button" data-mode-button="review" aria-pressed="false">Review</button>
          </div>
        </div>
      </div>
    </section>

    <section id="app"></section>
  </main>

  <script id="quiz-data" type="application/json">{"title": "Peri Operative Care", "topics": [{"name": "Aortic stenosis", "questions": [{"number": 1, "topic": "Aortic stenosis", "stem_html": "An 80 year old lady is investigated in the pre operative clinic and found to have severe aortic stenosis. What, if any, is the main peri operative concern?", "options": [{"label_html": "They cannot adjust their heart rate", "is_correct": false}, {"label_html": "They may have ventricular hypertrophy", "is_correct": false}, {"label_html": "The patient cannot increase their cardiac output", "is_correct": true}, {"label_html": "They are more prone to arrhythmias", "is_correct": false}, {"label_html": "There is no concern", "is_correct": false}], "correct_index": 2, "explanation_html": "Patients with aortic stenosis are a major perioperative concern. They may have ventricular hypertrophy and this can result in relative myocardial ischaemia and increase the risk of arrhymias. However, the main concern is that they cannot increase their cardiac output particularly if vasodilation occurs."}], "note_html": "<ul><li>Narrowing of the aortic valve <\/li><li>May occur as a result of rheumatic fever or with aging and calcific changes<\/li><li>Congenitally may occur earlier due to calcification of a bicuspid aortic valve (1-2% of population)<\/li><li>Symptoms include exertional angina and syncope<\/li><li>Where the condition is suspected, trans thoracic echocardiography is the investigation of choice<\/li><\/ul><br><b>Severity<\/b><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th>Degree<\/th><th>Mean gradient (mmHg)<\/th><th>Aortic valve area (cm<sup>2<\/sup>)<\/th><\/tr><\/thead><tbody><tr><td>Mild<\/td><td>&lt;25<\/td><td>&gt;1.5<\/td><\/tr><tr><td>Moderate<\/td><td>25-40<\/td><td>1.0-1.5<\/td><\/tr><tr><td>Severe<\/td><td>&gt;40<\/td><td>&lt;1<\/td><\/tr><\/tbody><\/table><\/div><br><b>Treatment<\/b><br>Either transcatheter or open aortic valve replacement"}, {"name": "Atropine", "questions": [{"number": 2, "topic": "Atropine", "stem_html": "A patient receives atropine as pre medication prior to a laparotomy. Which of the following is least likely to occur?", "options": [{"label_html": "Pupillary dilation", "is_correct": false}, {"label_html": "Dry mouth", "is_correct": false}, {"label_html": "Urinary retention", "is_correct": false}, {"label_html": "Bradycardia", "is_correct": true}, {"label_html": "Decreased salivation", "is_correct": false}], "correct_index": 3, "explanation_html": "Since it inhibits vagal tone, the use of atropine will typically result in an increased heart rate."}], "note_html": "Atropine is a muscarinic receptor antagonist (competitive antagonist for the muscarinic acetylcholine receptor). It therefore inhibits parasympathetic activity.It was traditionally used as a premedication for anaesthesia because it reduced bronchial secretions, salivary secretions and bradycardia from increased vagal tone on anaesthetic induction. Modern anaesthetic techniques have reduced the need for routine use of this drug. Its other effects include urinary retention and pupillary dilatation."}, {"name": "Biological agents", "questions": [{"number": 3, "topic": "Biological agents", "stem_html": "Of the agents listed below, which is the most appropriate to give a 65 year old man with a locally unresectable gastrointestinal stromal tumour. Biopsies confirm that it is KIT positive.", "options": [{"label_html": "Imatinib", "is_correct": true}, {"label_html": "Infliximab", "is_correct": false}, {"label_html": "Trastuzumab", "is_correct": false}, {"label_html": "Bevacizumab", "is_correct": false}, {"label_html": "Cetuximab", "is_correct": false}], "correct_index": 0, "explanation_html": "Imatinib is licensed for treatment of GIST in the United Kingdom for this situation. The guidance from the National Institute of Clinical evidence is that patients be reviewed at 12 weeks after initiating therapy."}, {"number": 4, "topic": "Biological agents", "stem_html": "A 32 year old lady has previously undergone a wide local excision and axillary node clearance (5 nodes positive) for an invasive ductal carcinoma. It is oestrogen receptor negative, HER 2 positive, vascular invasion is present. She has a lesion suspicious for metastatic disease in the left lobe of her liver. Of the agents listed below, which is the most likely to be beneficial in this setting?", "options": [{"label_html": "Cetuximab", "is_correct": false}, {"label_html": "Bevacizumab", "is_correct": false}, {"label_html": "Trastuzumab", "is_correct": true}, {"label_html": "Basiliximab", "is_correct": false}, {"label_html": "Imatinib", "is_correct": false}], "correct_index": 2, "explanation_html": "This lady's young age, coupled with ER negativity and extensive nodal disease with suspicion of metastatic disease makes her a candidate for treatment with trastuzumab (herceptin)."}, {"number": 5, "topic": "Biological agents", "stem_html": "Which of the agents listed below is most likely to help a 22 year old lady with severe peri anal Crohns disease and multiple anal fistulae? The acute sepsis has been drained and setons are in place. She is already receiving standard non biological therapy.", "options": [{"label_html": "Trastuzumab", "is_correct": false}, {"label_html": "Bevacizumab", "is_correct": false}, {"label_html": "Imatinib", "is_correct": false}, {"label_html": "Cetuximab", "is_correct": false}, {"label_html": "Infliximab", "is_correct": true}], "correct_index": 4, "explanation_html": "Infliximab is a popular choice in managing complex peri anal Crohns. It is absolutely vital that all sepsis is drained prior to starting therapy."}], "note_html": "<div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Agents<\/b><\/th><th><b>Target<\/b><\/th><th><b>Uses<\/b><\/th><\/tr><\/thead><tbody><tr><td>Adalimumab<br>Infliximab<br>Etanercept<\/td><td>TNF alpha inhibitor<\/td><td>Crohns disease<br>Rheumatoid disease<\/td><\/tr><tr><td>Bevacizumab<\/td><td>Anti VEGF (anti angiogenic)<\/td><td>Colorectal cancer<br>Renal<br>Glioblastoma<\/td><\/tr><tr><td>Trastuzumab<\/td><td>HER receptor<\/td><td>Breast cancer<\/td><\/tr><tr><td>Imatinib<\/td><td>Tyrosine kinase inhibitor<\/td><td>Gastrointestinal stromal tumours<br>Chronic myeloid leukaemia<\/td><\/tr><tr><td>Basiliximab<\/td><td>IL2 binding site<\/td><td>Renal transplants<\/td><\/tr><tr><td>Cetuximab<\/td><td>Epidermal growth factor inhibitor<\/td><td>EGF positive colorectal cancers<\/td><\/tr><\/tbody><\/table><\/div><br>Detailed understanding of the actions of biological agents is well beyond the scope of the MRCS syllabus. However, many of these drugs are being frequently encountered in surgical patients."}, {"name": "Blood products - cross matching", "questions": [{"number": 6, "topic": "Blood products - cross matching", "stem_html": "Which of the following blood products can be administered to a non ABO matched recipient?", "options": [{"label_html": "Whole blood", "is_correct": false}, {"label_html": "Platelets", "is_correct": true}, {"label_html": "Packed red cells", "is_correct": false}, {"label_html": "Stem cells", "is_correct": false}, {"label_html": "Irradiated whole blood", "is_correct": false}], "correct_index": 1, "explanation_html": "In the UK, platelets either come from pooling of the platelet component from four units of whole donated blood, called random donor platelets, or by plasmapharesis from a single donor. The platelets are suspended in 200-300 ml of plasma and may be stored for up to 4 days in the transfusion laboratory where they are continually agitated at 22<sup>o<\/sup>C to preserve function. One adult platelet pool raises the normal platelet count by 30,000 to 60,000 platelets litre. ABO identical or compatible platelets are preferred but not necessary in adults; but rhesus compatibility is required in recipients who are children and women of childbearing age to prevent haemolytic disease of the newborn."}], "note_html": "<b>Whole blood fractions<\/b><br><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Fraction<\/b><\/th><th><b>Key points<\/b><\/th><\/tr><\/thead><tbody><tr><td>Packed red cells<\/td><td>Used for transfusion in chronic anaemia and cases where infusion of large volumes of fluid may result in cardiovascular compromise. Product obtained by centrifugation of whole blood.<\/td><\/tr><tr><td>Platelet rich plasma<\/td><td>Usually administered to patients who are thrombocytopaenic and are bleeding or require surgery. It is obtained by low speed centrifugation.<\/td><\/tr><tr><td>Platelet concentrate<\/td><td>Prepared by high speed centrifugation and administered to patients with thrombocytopaenia.<\/td><\/tr><tr><td>Fresh frozen plasma<\/td><td><ul><li>Prepared from single units of blood.<\/li><li>Contains clotting factors, albumin and immunoglobulin.<\/li><li>Unit is usually 200 to 250ml.<\/li><li>Usually used in correcting clotting deficiencies in patients with hepatic synthetic failure who are due to undergo surgery.<\/li><li>Usual dose is 12-15ml/Kg<sup>-1<\/sup>.<\/li><li>It should not be used as first line therapy for hypovolaemia.<\/li><\/ul><\/td><\/tr><tr><td>Cryoprecipitate<\/td><td><ul><li>Formed from supernatant of FFP.<\/li><li>Rich source of Factor VIII and fibrinogen.<\/li><li>Allows large concentration of factor VIII to be administered in small volume.<\/li><\/ul><\/td><\/tr><tr><td>SAG-Mannitol Blood<\/td><td>Removal of all plasma from a blood unit and substitution with:<br><ul><li>Sodium chloride <\/li><li>Adenine<\/li><li>Anhydrous glucose<\/li><li>Mannitol<\/li><\/ul>Up to 4 units of SAG M Blood may be administered. Thereafter whole blood is preferred. After 8 units, clotting factors and platelets should be considered.<\/td><\/tr><\/tbody><\/table><\/div><br><b>Cross matching<\/b><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid2\"><thead><tr><th><b>Must be cross matched<\/b><\/th><th><b>Can be ABO incompatible in adults<\/b><\/th><\/tr><\/thead><tbody><tr><td>Packed red cells<\/td><td>Platelets<\/td><\/tr><tr><td>Whole blood<\/td><td>FFP<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Brain stem death testing", "questions": [{"number": 7, "topic": "Brain stem death testing", "stem_html": "A 60 year old man is brought to the emergency department collapsed. He is found to be in a coma and imaging of the CNS shows an intracerebral haemorrhage. On the intensive care unit consideration is given as to whether he has brain stem death. Which of the criteria below form part of the testing for brain stem death?", "options": [{"label_html": "Hypothermia", "is_correct": false}, {"label_html": "Absence of pupillary reflexes", "is_correct": true}, {"label_html": "Hypoxia on disconnection from the ventilator", "is_correct": false}, {"label_html": "Positive brachialis reflex", "is_correct": false}, {"label_html": "Positive knee jerk reflex", "is_correct": false}], "correct_index": 1, "explanation_html": "The criteria for brainstem death testing are pre-requisites which must be met before testing can occur, these include excluding hypothyroidism, presence of sedatives, hypothermia. The tests themselves comprise:<br>a torch is shone into both eyes to see if they react to the light<br>the eye, is stroked with a tissue or piece of cotton wool to see if it reacts<br>pressure is applied to the forehead and the nose is pinched to see if there's any movement in response<br>ice-cold water is inserted into each ear, which would usually cause the eyes to move<br>a thin plastic tube is placed down the windpipe to see if it provokes gagging or coughing<br>the person is disconnected from the ventilator for a short period of time to see if they make any attempt to breathe on their own, they are pre-oxygenated to avoid hypoxia"}], "note_html": "<b>Conditions for brainstem death testing<\/b><br>1. There must be an identifiable pathology causing irremediable brain damage. This may be intra - or extra - cranial.<br><br>2. The patient must be deeply unconscious.<br>a. Hypothermia must be excluded as the cause of unconsciousness and the patients core temperature should be over 34<sup>o<\/sup>C.<br>b. There should be no evidence that the patients state is due to depressant drugs. This refers to narcotics, hypnotics and tranquillisers as well as neuromuscular blocking drugs. A<br>careful drug history is required, whilst drug levels and antagonists may need to be used.<br>c. Potentially reversible circulatory, metabolic and endocrine disturbances must have been<br>excluded as the cause of the continuing unconsciousness. Some of these disturbances may occur as a result of the condition rather than the cause and these do not preclude the diagnosis of brain stem death.<br><br>3. The patient must be apnoeic, needing mechanical ventilation. This condition must not be secondary to the effect of sedative drugs of neuromuscular blockade. This may require testing with a nerve stimulator to show intact neuromuscular transmission. Alternatively, demonstration of tendon reflexes can also demonstrate intact transmission<br><br><b>Criteria for brain death<\/b><br><ul><li>Fixed pupils which do not respond to sharp changes in the intensity of incident light<\/li><li>No corneal reflex<\/li><li>Absent oculo-vestibular reflexes - no eye movements following the slow injection of at least 50ml of ice-cold water into each ear in turn (the caloric test)<\/li><li>No response to supraorbital pressure<\/li><li>No cough reflex to bronchial stimulation or gagging response to pharyngeal stimulation<\/li><li>No observed respiratory effort in response to disconnection of the ventilator for long enough (typically 5 minutes) to ensure elevation of the arterial partial pressure of carbon dioxide to at least 6.0 kPa (6.5 kPa in patients with chronic carbon dioxide retention). Adequate oxygenation is ensured by pre-oxygenation and diffusion oxygenation during the disconnection (so the brain stem respiratory centre is not challenged by the ultimate, anoxic, drive stimulus)<\/li><\/ul><br>The test should be undertaken by two appropriately experienced doctors on two separate occasions."}, {"name": "Cardiopulmonary bypass", "questions": [{"number": 8, "topic": "Cardiopulmonary bypass", "stem_html": "A 66 year old man is admitted with severe angina. There is a lesion of the proximal left anterior descending coronary artery. Which of the following would be the most suitable conduit for bypass?", "options": [{"label_html": "Long saphenous vein", "is_correct": false}, {"label_html": "Short saphenous vein", "is_correct": false}, {"label_html": "Cephalic vein", "is_correct": false}, {"label_html": "Internal mammary artery", "is_correct": true}, {"label_html": "Thoraco-acromial artery", "is_correct": false}], "correct_index": 3, "explanation_html": "The internal mammary artery is an excellent conduit for coronary artery bypass. It has better long term patency rates than venous grafts. The thoraco-acromial artery is seldom used."}, {"number": 9, "topic": "Cardiopulmonary bypass", "stem_html": "Which of the following statements related to coronary artery bypass surgery is true?", "options": [{"label_html": "Late graft stenosis is mainly associated with saphenous vein grafts", "is_correct": true}, {"label_html": "Is indicated if there is stenosis &gt; 70% of the right coronary artery", "is_correct": false}, {"label_html": "The left atrium is cannulated during the procedure", "is_correct": false}, {"label_html": "The CHADS score is used to assess peri operative risk", "is_correct": false}, {"label_html": "Cardioplegia is always undertaken at a  37 degrees", "is_correct": false}], "correct_index": 0, "explanation_html": "Indications are:<br><br>1.  Left main stem stenosis or equivalent (proximal LAD and proximal circumflex)<br>2.  Triple vessel disease <br>3.  Diffuse disease unsuitable for PCI<br>The right atrium is cannulated.  The CHADS score assesses whether a patient should be warfarinised if they have atrial fibrillation.  Cardioplegia can be undertaken at cold or warm temperatures."}], "note_html": "<b>Indications for surgery<\/b><br><ul><li>Left main stem stenosis or equivalent (proximal LAD and proximal circumflex)<\/li><li>Triple vessel disease <\/li><li>Diffuse disease unsuitable for PCI<\/li><\/ul><br>The guidelines state that CABG is the preferred treatment in high-risk patients with severe ventricular dysfunction or diabetes mellitus.<br><br><b>Technique<\/b><br>General anaesthesia<br>Central and arterial lines<br>Midline sternotomy or left sub mammary incision<br>Aortic root and pericardium dissected<br>Heart inspected<br><br>Bypass grafting may be performed using a cardiopulmonary bypass circuit with cardiac arrest or using a number of novel 'off pump' techniques.<br><br><b>Procedure cardiopulmonary bypass<\/b><br><ul><li>Aortic root cannulated<\/li><li>Right atrial cannula<\/li><li>Circuit primed and patient fully heparinised (30,000 Units unfractionated heparin) as the circuit is highly thrombogenic<\/li><li>Flow established through circuit<\/li><li>Aortic cross clamp applied <\/li><li>Cardioplegia solution instilled into the aortic root below cross clamp<\/li><li>Heart now asystolic and ready for surgery<\/li><\/ul><br>Off pump techniques are evolving on a constant basis and details are beyond the scope of the MRCS.<br><br><b>Conduits for bypass<\/b><br>&gt; Internal mammary artery is best. Use of both is associated with increased risk of sternal wound dehiscence. However, many surgeons will use both especially for redo surgery.<br>&gt; Radial artery harvested from forearm. Ensure ulnar collateral working first!<br>&gt; Reversed long saphenous vein grafts<br>Typically anastamosed using 7/0-8/0 prolene sutures (distally) and 6/0 prolene for top end.<br><br>Once flow established<br>Anticoagulation reversed using protamine<br>Patient is taken off bypass<br>Inotropes given if needed<br>Sternum closed using sternal closure device or stainless steel wire<br><br><b>Complications<\/b><br><ul><li>Post perfusion syndrome:  transient cognitive impairment <\/li><li>Non union of the sternum; due to loss of the internal thoracic artery <\/li><li>Myocardial infarction  <\/li><li>Late graft stenosis<\/li><li>Acute renal failure <\/li><li>Stroke<\/li><li>Gastrointestinal<\/li><\/ul><br>Perioperative risk is quantified using the Parsonnet and Euroscores and unit outcomes are audited using this data.<br><br><b>Reference<\/b><br>Eagle KA, Guyton RA, Davidoff R, et al: ACC/AHA 2004 guideline update for coronary artery bypass graft surgery: A report of the American College of Cardiology/American Heart Association Task Force on Practice Guidelines (Committee to Revise the 1999 Guidelines for Coronary Artery Bypass Graft Surgery). Circulation 2004; 110"}, {"name": "Chest pain", "questions": [{"number": 10, "topic": "Chest pain", "stem_html": "A 52 year old male presents with tearing central chest pain. On examination, he has an aortic regurgitation murmur. An ECG shows ST elevation in leads II, III and aVF. What is the likely explanation?", "options": [{"label_html": "Distal aortic dissection", "is_correct": false}, {"label_html": "Anterior myocardial infarct", "is_correct": false}, {"label_html": "Inferior myocardial infarct", "is_correct": false}, {"label_html": "Proximal aortic dissection", "is_correct": true}, {"label_html": "Pulmonary embolism", "is_correct": false}], "correct_index": 3, "explanation_html": "An inferior myocardial infarction and AR murmur should raise suspicions of an ascending aorta dissection rather than an inferior myocardial infarction alone. Also the history is more suggestive of a dissection. Other features may include pericardial effusion, carotid dissection and absent subclavian pulse."}, {"number": 11, "topic": "Chest pain", "stem_html": "A 52 year old male presents with central chest pain and vomiting. He has drunk a bottle of vodka. On examination, there is some mild crepitus in the epigastric region. What is the likely diagnosis?", "options": [{"label_html": "Pulmonary embolus", "is_correct": false}, {"label_html": "Perforated peptic ulcer", "is_correct": false}, {"label_html": "Oesophageal perforation", "is_correct": true}, {"label_html": "Myocardial infarct", "is_correct": false}, {"label_html": "Pneumothorax", "is_correct": false}], "correct_index": 2, "explanation_html": "The Mackler triad for Boerhaave syndrome: vomiting, thoracic pain, subcutaneous emphysema. It typically presents in middle aged men with a background of alcohol abuse."}, {"number": 12, "topic": "Chest pain", "stem_html": "A 52 year old male presents with central chest pain. On examination, he has an mitral regurgitation murmur. An ECG shows ST elevation in leads V1 to V6. There is no ST elevation in leads II, III and aVF. What is the diagnosis?", "options": [{"label_html": "Pulmonary embolism", "is_correct": false}, {"label_html": "Boerhaaves syndrome", "is_correct": false}, {"label_html": "Inferior myocardial infarct", "is_correct": false}, {"label_html": "Prinzmetal angina", "is_correct": false}, {"label_html": "Anterior myocardial infarct", "is_correct": true}], "correct_index": 4, "explanation_html": "The most likely diagnosis is an anterior MI. As there are no ST changes in the inferior leads, aortic dissection is less likely."}, {"number": 13, "topic": "Chest pain", "stem_html": "A 73 year old man develops a sudden onset, severe chest pain that is tearing in nature. Auscultation of the chest reveals a loud diastolic murmur. Of the investigations listed below, which is most likely to be helpful in demonstrating the cause?", "options": [{"label_html": "Upper GI endoscopy", "is_correct": false}, {"label_html": "Radiological contrast swallow", "is_correct": false}, {"label_html": "Chest X ray", "is_correct": false}, {"label_html": "CT angiogram of the chest", "is_correct": true}, {"label_html": "Measurement of troponin enzymes", "is_correct": false}], "correct_index": 3, "explanation_html": "The description is one of aortic regurgitation and the acute nature of the presentation would equate to this being due to aortic dissection. For this reason a CT angiogram is the preferred investigation."}], "note_html": "<b>Aortic dissection<\/b><br><ul><li>This occurs when there is a flap or filling defect within the aortic intima. Blood tracks into the medial layer and splits the tissues with the subsequent creation of a false lumen. It most commonly occurs in the ascending aorta or just distal to the left subclavian artery (less common). It is most common in Afro-carribean males aged 50-70 years. <\/li><li>Patients usually present with a tearing intrascapular pain, which may be similar to the pain of a myocardial infarct. <\/li><li>The dissection may spread either proximally or distally with subsequent disruption to the arterial branches that are encountered. <\/li><li>In the Stanford classification system the disease is classified into lesions with a proximal origin (Type A) and those that commence distal to the left subclavian (Type B).<\/li><li>Diagnosis may be suggested by a chest x-ray showing a widened mediastinum. Confirmation of the diagnosis is usually made by use of CT angiography<\/li><li>Proximal (Type A) lesions are usually treated surgically, type B lesions are usually managed non operatively.<\/li><\/ul><br><b>Pulmonary embolism<\/b><br><ul><li>Typically sudden onset of chest pain, haemoptysis, hypoxia and small pleural effusions may be present. <\/li><li>Most patients will have an underlying deep vein thrombosis<\/li><li>Diagnosis may be suggested by various ECG findings including S waves in lead I, Q waves in lead III and inverted T waves in lead III. Confirmation of the diagnosis is usually made through use of CT pulmonary angiography.<\/li><li>Treatment is with anticoagulation, in those patients who develop a cardiac arrest or severe compromise from their PE, consideration may be given to thrombolysis.<\/li><\/ul><br><b>Myocardial infarction<\/b><br><ul><li>Traditionally described as sudden onset of central, crushing chest pain. It may radiate into the neck and down the left arm. Signs of autonomic dysfunction may be present. The presenting features may be atypical in the elderly and those with diabetes.<\/li><li>Diagnosis is made through identification of new and usually dynamic ECG changes (and cardiac enzyme changes). Inferior and anterior infarcts may be distinguished by the presence of specific ECG changes (usually II, III and aVF for inferior, leads V1-V5 for anterior).<\/li><li>Treatment is with oral antiplatelet agents, primary coronary angioplasty and/ or thrombolysis.<\/li><\/ul><br><b>Perforated peptic ulcer<\/b><br><ul><li>Patients usually develop sudden onset of epigastric abdominal pain, it may be soon followed by generalised abdominal pain.<\/li><li>There may be features of antecendant abdominal discomfort, the pain of gastric ulcer is typically worse immediately after eating.<\/li><li>Diagnosis may be made by erect chest x-ray which may show a small amount of free intra-abdominal air (very large amounts of air are more typically associated with colonic perforation).<\/li><li>Treatment is usually with a laparotomy, small defects may be excised and overlaid with an omental patch, larger defects are best managed with a partial gastrectomy.<\/li><\/ul><br><b>Boerhaaves syndrome<\/b><br><ul><li>Spontaneous rupture of the oesophagus that occurs as a result of repeated episodes of vomiting.<\/li><li>The rupture is usually distally sited and on the left side.<\/li><li>Patients usually give a history of sudden onset of severe chest pain that may complicate severe vomiting.<\/li><li>Severe sepsis occurs secondary to mediastinitis.<\/li><li>Diagnosis is CT contrast swallow.<\/li><li>Treatment is with thoracotomy and lavage, if less than 12 hours after onset then primary repair is usually feasible, surgery delayed beyond 12 hours is best managed by insertion of a T tube to create a controlled fistula between oesophagus and skin.<\/li><li>Delays beyond 24 hours are associated with a very high mortality rate.<\/li><\/ul>"}, {"name": "Endoscopy", "questions": [{"number": 14, "topic": "Endoscopy", "stem_html": "Which of the following preparatory regimes should be considered for a 63 year old man with normal renal function who requires a diagnostic colonoscopy to investigate iron deficiency anaemia for which he takes ferrous sulphate?", "options": [{"label_html": "Stop ferrous sulphate 7 days pre procedure and administration of oral purgatives the day prior to the procedure", "is_correct": true}, {"label_html": "Administration of oral purgatives the day prior to the procedure and continue ferrous sulphate", "is_correct": false}, {"label_html": "Continue ferrous sulphate and administration of phosphate enemas on the day", "is_correct": false}, {"label_html": "Cease ferrous sulphate 7 days pre procedure and administration of phosphate enema 30 minutes pre procedure", "is_correct": false}, {"label_html": "No preparation required", "is_correct": false}], "correct_index": 0, "explanation_html": "Endoscopy requires full bowel preparation. In elderly patients, this can cause electrolyte disturbance and renal compromise and it is important to check the patients urea and electrolytes beforehand. Drugs like ferrous sulphate impair the efficacy of purgatives and give poor endoscopic views as a result and should be stopped beforehand."}, {"number": 15, "topic": "Endoscopy", "stem_html": "A 55 year old man requires a flexible sigmoidoscopy to investigate bright red rectal bleeding. What is the most appropriate preparation?", "options": [{"label_html": "Single phosphate enema the day prior to the procedure", "is_correct": false}, {"label_html": "Single phosphate enema 30 minutes pre procedure", "is_correct": true}, {"label_html": "Oral sodium picosulphate the day prior to the procedure", "is_correct": false}, {"label_html": "Oral sodium picosulphate 30 minutes prior to the procedure", "is_correct": false}, {"label_html": "Rectal lavage with saline 1 hour pre procedure", "is_correct": false}], "correct_index": 1, "explanation_html": "For a limited endoscopy a simple enema will suffice."}], "note_html": "Endoscopy is a procedure that allows the internal visualisation of the viscera. Commonly performed procedures include, gastroscopy, colonoscopy, cystoscopy, ERCP and bronchoscopy. It is different from laparoscopy as it does not usually involve the inspection of a visceral cavity.<br><br>Most endoscopes are flexible instruments with a 3 channels and a video chip with illumination source at the end. The channels are used for suction, irrigation and instrumentation. With the flexible instruments there is a control stack with wheels that allow the tip of the instrument to be manipulated. Some procedures call for patient sedation and others do not. Endoscopies should usually be performed in dedicated units with appropriately trained staff and full resuscitation facilities available.<br><br>The preparation for endoscopy depends upon the organ to be examined. The table below covers the key aspects<br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th>Endoscopy<\/th><th>Preparation<\/th><\/tr><\/thead><tbody><tr><td>ERCP<\/td><td>Clotting, antibiotics, Vitamin K if jaundiced<\/td><\/tr><tr><td>Diagnostic OGD<\/td><td>Nil by mouth for 6 hours<\/td><\/tr><tr><td>Flexible sigmoidoscopy<\/td><td>Phosphate enema 30 minutes pre procedure<\/td><\/tr><tr><td>Colonoscopy<\/td><td>Check U+E and if normal, prescribe oral purgatives e.g. picolax<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Heparin", "questions": [{"number": 16, "topic": "Heparin", "stem_html": "Which of the following statements relating to low molecular weight heparins is false?", "options": [{"label_html": "They act via inhibition of Factor Xa", "is_correct": false}, {"label_html": "Large doses may be used prior to commencing cardiopulmonary bypass", "is_correct": true}, {"label_html": "They have a highly predictable pharmacokinetic profile", "is_correct": false}, {"label_html": "They are derivatives of unfractionated heparin", "is_correct": false}, {"label_html": "They have a molecular mass in the range of 3000-10000Da", "is_correct": false}], "correct_index": 1, "explanation_html": "As they are not easily reversed they are unsuitable for this purpose."}, {"number": 17, "topic": "Heparin", "stem_html": "A 57 year old man is coming off the cardiac bypass circuit following a successful coronary artery bypass procedure. Which drug should be administered to normalise the patients clotting prior to decannulation and chest closure?", "options": [{"label_html": "Intravenous vitamin K", "is_correct": false}, {"label_html": "Protamine sulphate", "is_correct": true}, {"label_html": "Aprotinin", "is_correct": false}, {"label_html": "Fresh frozen plasma", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 1, "explanation_html": "Since cardiac bypass circuits are thrombogenic large doses of intravenous heparin are administered. This is reversed with protamine sulphate. FFP may be effective but would carry a significant risk of fluid overload."}, {"number": 18, "topic": "Heparin", "stem_html": "A 67 year old patient is due to undergo a femoro-popliteal bypass graft.  Which heparin regime should the surgeon ask for prior to cross clamping the femoral artery?", "options": [{"label_html": "Single therapeutic dose of low molecular weight heparin on the ward prior to coming to theatre", "is_correct": false}, {"label_html": "Single therapeutic dose of low molecular weight heparin the night before surgery", "is_correct": false}, {"label_html": "Dose of 10,000 units of unfractionated heparin prior to induction of anaesthesia", "is_correct": false}, {"label_html": "Dose of 3,000 units of unfractionated heparin, 3 minutes prior to cross clamping", "is_correct": true}, {"label_html": "Dose of 30,000 units of unfractionated heparin, 3 minutes prior to cross clamping", "is_correct": false}], "correct_index": 3, "explanation_html": "As a rule most vascular surgeons will administer approximately 3,000 units of systemic heparin 3-5 minutes prior to cross clamping to help prevent further intra arterial thromboses. A dose of 30,000 units is given prior to going on cardiopulmonary bypass. Heparin given at induction will cause bleeding during routine dissection."}, {"number": 19, "topic": "Heparin", "stem_html": "A 43 year old lady with a metallic heart valve has just undergone an elective paraumbilical hernia repair. In view of her metallic valve, she is given unfractionated heparin perioperatively. How should the therapeutic efficacy be monitored, assuming her renal function is normal?", "options": [{"label_html": "Therapeutic monitoring is not required", "is_correct": false}, {"label_html": "Measurement of APTT", "is_correct": true}, {"label_html": "Measurement of INR", "is_correct": false}, {"label_html": "Measurement of Prothromin time", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 1, "explanation_html": "Unlike low molecular weight heparins that do not require monitoring unfractionated heparin does require monitoring, this is done by measuring the APTT."}, {"number": 20, "topic": "Heparin", "stem_html": "A 48 year old lady has a metallic heart valve and requires a paraumbilical hernia repair. Perioperatively she is receiving intra venous unfractionated heparin. To perform the surgery safely a normal coagulation state is required. Which of the following strategies is routine standard practice?", "options": [{"label_html": "Administration of 10 mg of vitamin K the night prior to surgery and stopping the heparin infusion 6 hours pre operatively", "is_correct": false}, {"label_html": "Stopping the heparin infusion 6 hours pre operatively", "is_correct": true}, {"label_html": "Stop the heparin infusion on induction of anaesthesia", "is_correct": false}, {"label_html": "Stopping the heparin infusion 6 hours pre operatively and administration of intravenous protamine sulphate on commencing the operation", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 1, "explanation_html": "Patients with metallic heart valves will generally stop unfractionated heparin 6 hours pre operatively. Unfractionated heparin is generally cleared from the circulation within 2 hours so this will allow plenty of time and is the method of choice in the elective setting. Protamine sulphate will reverse heparin but is associated with risks of anaphylaxis and is thus not generally used unless immediate reversal of anticoagulation is needed, e.g. coming off bypass."}], "note_html": "<ul><li>Causes the formation of complexes between antithrombin and activated thrombin/factors 7,9,10,11 &amp; 12<\/li><\/ul><br><b>Advantages of low molecular weight heparin<\/b><br><ul><li>Better bioavailability<\/li><li>Lower risk of bleeding<\/li><li>Longer half life<\/li><li>Little effect on APTT at prophylactic dosages<\/li><li>Less risk of HIT<\/li><\/ul><br><b>Complications<\/b><br><ul><li>Bleeding<\/li><li>Osteoporosis<\/li><li>Heparin induced thrombocytopenia (HIT): occurs 5-14 days after 1st exposure<\/li><li>Anaphylaxis<\/li><\/ul><br>In surgical patients that may need a rapid return to theatre, administration of unfractionated heparin is preferred; as low molecular weight heparins have a longer duration of action and are harder to reverse."}, {"name": "Intra operative fluid management", "questions": [{"number": 21, "topic": "Intra operative fluid management", "stem_html": "A 45 year old man is undergoing a small bowel resection. The anaesthetist decides to administer an intravenous fluid which is electrolyte rich. Which of the following most closely matches this requirement?", "options": [{"label_html": "Dextrose / Saline", "is_correct": false}, {"label_html": "Pentastarch", "is_correct": false}, {"label_html": "Gelofusine", "is_correct": false}, {"label_html": "Hartmanns", "is_correct": true}, {"label_html": "5% Dextrose with added potassium 20mmol/ L", "is_correct": false}], "correct_index": 3, "explanation_html": "Hartmanns solution is the most electrolyte rich. However, both pentastarch and gelofusine have more macromolecules."}, {"number": 22, "topic": "Intra operative fluid management", "stem_html": "Which of the following intravenous fluid solutions has the greatest chloride content?", "options": [{"label_html": "Dextrose / saline", "is_correct": false}, {"label_html": "Normal saline", "is_correct": true}, {"label_html": "Hartmanns solution", "is_correct": false}, {"label_html": "Ringers lactate", "is_correct": false}, {"label_html": "5% dextrose", "is_correct": false}], "correct_index": 1, "explanation_html": "Normal saline has the highest chloride content and excessive administration of normal saline is a recognised risk factor for the development of hyperchloraemic metabolic acidosis."}], "note_html": "<b>Composition of commonly used intravenous fluids mmol<sup>-1<\/sup><\/b><br><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><\/td><td><b>Na<\/b><\/td><td><b>K<\/b><\/td><td><b>Cl<\/b><\/td><td><b>Bicarbonate<\/b><\/td><td><b>Lactate<\/b><\/td><\/tr><tr><td>Plasma<\/td><td>137-147<\/td><td>4-5.5<\/td><td>95-105<\/td><td>22-25<\/td><td>-<\/td><\/tr><tr><td>0.9% Saline<\/td><td>153<\/td><td>-<\/td><td>153<\/td><td>-<\/td><td>-<\/td><\/tr><tr><td>Dextrose / saline<\/td><td>30.6<\/td><td>-<\/td><td>30.6<\/td><td>-<\/td><td>-<\/td><\/tr><tr><td>Hartmans<\/td><td>130<\/td><td>4<\/td><td>110<\/td><td>-<\/td><td>28<\/td><\/tr><\/tbody><\/table><\/div><br><b>Recommendations for intra operative fluid management<\/b><br>The latest set of NICE guidelines produced in 2017 relating to intravenous fluids did not specifically address the requirements of intra operative fluid administration. The reason for this is that administration of fluids in this specific situation does not lend itself to rigid algorithms. <br>With the introduction of enhanced recovery programmes 10 years ago there was an increasing emphasis of the concept of fluid restriction. Historically, patients received very large volumes of saline rich solutions peri-operatively. Clearing the sodium load of a single litre of saline may take up to 36 hours or more. This can have deleterious effects on the tissues including the development of oedema. This results in poor perfusion, increased risk of ileus and wound breakdown. A tailored approach to fluid administration is now practiced and far greater usage is made of cardiac output monitors in providing goal directed fluid therapy. <br><br><b>References<\/b><br>British Consensus Guidelines on Intravenous Fluid Therapy for Adult Surgical Patients <br>GIFTASUP (2009) Revised May 2011.<br><br>Frost P. Intravenous fluid therapy in adult inpatients. <i>BMJ<\/i> 2015 (350): 31-34."}, {"name": "Intravenous access", "questions": [{"number": 23, "topic": "Intravenous access", "stem_html": "A 48 year old lady is being prepared for a Whipples procedure. A right sided subclavian line is inserted and then anaesthesia is induced. Following intubation the patient becomes progressively hypoxic and haemodynamically unstable. What is the most likely underlying explanation?", "options": [{"label_html": "Drug allergy", "is_correct": false}, {"label_html": "Simple pneumothorax", "is_correct": false}, {"label_html": "Tension pneumothorax", "is_correct": true}, {"label_html": "Halothane toxicity", "is_correct": false}, {"label_html": "Haemothorax", "is_correct": false}], "correct_index": 2, "explanation_html": "Central lines (and particularly subclavian lines) are risk factors for the development of pneumothorax. In the context of positive pressure ventilation a tension pneumothorax is a strong possibility and would be associated with haemodynamic instability."}, {"number": 24, "topic": "Intravenous access", "stem_html": "A 3 year old is involved in trauma and is haemodynamically unstable. Initial attempts at intravenous access are proving unsuccessful. What is the best course of action?", "options": [{"label_html": "Insert a femoral venous central line", "is_correct": false}, {"label_html": "Insert a right internal jugular central line", "is_correct": false}, {"label_html": "Insert an intra osseous infusion system", "is_correct": true}, {"label_html": "Insert a 14 G cannula into the antecubital fossa", "is_correct": false}, {"label_html": "Insert a Broviac line", "is_correct": false}], "correct_index": 2, "explanation_html": "Gaining venous access in small children is challenging at the best of times and when they are shut down its nearly impossible. Intraosseous infusions are best in this setting. Broviac lines are long term IV access systems with narrow lumens and would be unsuitable."}, {"number": 25, "topic": "Intravenous access", "stem_html": "A 32 year old man requires venous access for chemotherapy for acute myeloid leukaemia. What is the best option?", "options": [{"label_html": "Groshong line", "is_correct": true}, {"label_html": "Internal jugular central line (triple lumen)", "is_correct": false}, {"label_html": "14 G cannula in the dorsum of  the hand", "is_correct": false}, {"label_html": "18 G cannula in the non dominant hand", "is_correct": false}, {"label_html": "Sub cuticular catheter", "is_correct": false}], "correct_index": 0, "explanation_html": "Groshong lines and Hickman lines are similar and knowledge of these systems is needed because surgeons are often called upon to either insert or remove them. Chemotherapy for AML requires long term therapy and multiple blood tests therefore an indwelling device is preferable."}, {"number": 26, "topic": "Intravenous access", "stem_html": "A 6 year old child requires long term drug therapy to treat a rare genetic disorder. The drug must be given intravenously. Recently, there have been issues with the child pulling at the current system of the Hickman line and the parents are requesting an alternative. What is the best option?", "options": [{"label_html": "Triple lumen subclavian line", "is_correct": false}, {"label_html": "Portacath device", "is_correct": true}, {"label_html": "Intermittent cannulation as needed", "is_correct": false}, {"label_html": "PICC line", "is_correct": false}, {"label_html": "Broviac line", "is_correct": false}], "correct_index": 1, "explanation_html": "Portacaths are a good choice for children as they only need to be accessed when they are used. Broviacs would pose the same core problems as a Hickman."}], "note_html": "<b>Venous access<\/b><br>A number of routes for establishing venous access are available.<br><br><b>Peripheral venous cannula<\/b> <br>Easy to insert with minimal morbidity. Wide lumen cannulae can provide rapid fluid infusions. When properly managed infections may be promptly identified and the cannula easily re sited. Problems relate to their peripheral sites and they are unsuitable for the administration of vaso active drugs, such as inotropes and irritant drugs such as TPN (except in the very short term setting).<br><br><b>Central lines<\/b> <br>Insertion is more difficult and most operators and NICE advocate the use of ultra sound. Coagulopathies may lead to haemorrhage following iatrogenic arterial injury. Femoral lines are easier to insert and iatrogenic injuries easier to manage in this site however they are prone to high infection rates. Internal jugular route is preferred. They have multiple lumens allowing for administration of multiple infusions. The lumens are relatively narrow and thus they do not allow particularly rapid rates of infusion. <br><br><b>Intraosseous access<\/b> <br>This is typically undertaken at the anteromedial aspect of the proximal tibia and provides access to the marrow cavity and circulatory system. Although traditionally preferred in paediatric practice they may be used in adults and a wide range of fluids can be infused using these devices.<br><br><b>Tunneled lines<\/b><br>Tunneled lines such as Groshong and Hickman lines are popular devices for patients with long term therapeutic requirements. These devices are usually inserted using ultrasound guidance into the internal jugular vein and then tunneled under the skin. A cuff of woven material is sited near the end and helps to anchor the device into the tissues. These cuffs require formal dissection to allow the device to be removed. Tunneled lines can be linked to injection ports that are located under the skin. These are especially popular in paediatric practice. <br><br><b>Peripherally inserted central cannula<\/b><br>Referred to as PICC lines, these are popular methods for establishing central venous access. Because they are inserted peripherally they are less prone to major complications relating to device insertion than conventional central lines."}, {"name": "Local anaesthetic agents", "questions": [{"number": 27, "topic": "Local anaesthetic agents", "stem_html": "Which of the following local anaesthetics is not an amino amide type?", "options": [{"label_html": "Lignocaine", "is_correct": false}, {"label_html": "Xylocaine", "is_correct": false}, {"label_html": "Procaine", "is_correct": true}, {"label_html": "Bupivacaine", "is_correct": false}, {"label_html": "Prilocaine", "is_correct": false}], "correct_index": 2, "explanation_html": "All local anaesthetics have a chemical bond linking an amine to either an amide or an ester. Most local anaesthetics are of the amino- amide types, these have a more favorable side effect profile and are more stable in solution. Procaine and benzocaine have amino - ester groups, these are metabolised by pseudocholinesterases."}, {"number": 28, "topic": "Local anaesthetic agents", "stem_html": "Which of the following local anaesthetic preparations would be most suitable for an 18 year old male undergoing a unilateral Zadeks procedure?", "options": [{"label_html": "Ring block with 0.5% bupivacaine with 1 in 200,000 adrenaline", "is_correct": false}, {"label_html": "Application of topical amethocaine", "is_correct": false}, {"label_html": "Ring block with 1% lignocaine alone", "is_correct": true}, {"label_html": "Ring block with 1% lignocaine and 1 in 200, 000 adrenaline", "is_correct": false}, {"label_html": "Ring block with 0.25% bupivacaine with 1 in 80,000 adrenaline", "is_correct": false}], "correct_index": 2, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Local anaesthetics: avoid use of adrenaline in extremities<\/div>This is excision of the toe nail and a fast acting local anaesthetic is indicated. Whilst use of adrenaline in digits is now sometimes done, there is little additional benefit in this case."}, {"number": 29, "topic": "Local anaesthetic agents", "stem_html": "A 72 year old woman fractured her distal radius. A Biers Block is planned to facilitate reduction of the fracture. Which of the following agents should be used?", "options": [{"label_html": "1% lignocaine", "is_correct": false}, {"label_html": "1% lignocaine with 0.5% bupivacaine mixed in 50:50 mixture", "is_correct": false}, {"label_html": "1% prilocaine", "is_correct": true}, {"label_html": "1% lignocaine with 1 in 200,000 adrenaline", "is_correct": false}, {"label_html": "1% prilocaine with 1 in 200,000 adrenaline", "is_correct": false}], "correct_index": 2, "explanation_html": "This is the best local anaesthetic for this. Bupivacaine may cause cardiotoxicity and should be avoided."}, {"number": 30, "topic": "Local anaesthetic agents", "stem_html": "A 24 year old man is due to undergo an excision of a sebaceous cyst of his scalp which of the agents below should be used for local anaesthesia?", "options": [{"label_html": "1% lignocaine with 1 in 200,000 adrenaline", "is_correct": true}, {"label_html": "1% lignocaine alone", "is_correct": false}, {"label_html": "1% prilocaine", "is_correct": false}, {"label_html": "0.5% bupivicaine", "is_correct": false}, {"label_html": "0.25% bupivacaine with 1 in 200,000 adrenaline", "is_correct": false}], "correct_index": 0, "explanation_html": "Scalp wounds often bleed and the addition of adrenaline is therefore desirable. Lignocaine is fast acting and the preferred agent."}, {"number": 31, "topic": "Local anaesthetic agents", "stem_html": "A surgeon is considering using lignocaine to provide local anaesthesia for a minor surgical procedure. Which of the following may attenuate its action?", "options": [{"label_html": "Hyperkalaemia", "is_correct": false}, {"label_html": "Administration with adrenaline", "is_correct": false}, {"label_html": "Administration with bupivicaine", "is_correct": false}, {"label_html": "Administration with sodium bicarbonate", "is_correct": false}, {"label_html": "Use in tissues which are infected", "is_correct": true}], "correct_index": 4, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Local anaesthetics are relatively ineffective when used in infected tissues.<\/div>Most anaesthetic agents are amine bases that become ionised due to the relative alkalinity of tissues. In active infection there may acidosis of the tissues and therefore local anasthetics may be less effective. Some surgeons mix sodium bicarbonate as it is reported to reduce the pain experienced by patients during administration."}, {"number": 32, "topic": "Local anaesthetic agents", "stem_html": "The following are contra indications to the use of lignocaine for local anaesthesia except:", "options": [{"label_html": "Accelerated idioventricular rhythm", "is_correct": false}, {"label_html": "Current treatment with flecainide", "is_correct": false}, {"label_html": "3rd degree heart block without pacemaker", "is_correct": false}, {"label_html": "Severe sino atrial block", "is_correct": false}, {"label_html": "Protein C deficiency", "is_correct": true}], "correct_index": 4, "explanation_html": "Lignocaine is widely used as a local anaesthetic. As a class IB antiarrhythmic it should not be used in people with unstable disorders of cardiac rhythm and ideally should not be co-administered with other anti-arhythmics."}, {"number": 33, "topic": "Local anaesthetic agents", "stem_html": "A surgeon is considering using lignocaine as local anasthesia for a minor procedure. Which of the following best accounts for its actions?", "options": [{"label_html": "Blockade of neuronal acetylcholine receptors", "is_correct": false}, {"label_html": "Blockade of  neuronal nicotinic receptors", "is_correct": false}, {"label_html": "Blockade of neuronal sodium channels", "is_correct": true}, {"label_html": "Blockade of neuronal potassium channels", "is_correct": false}, {"label_html": "Blockade of neuronal calcium channels", "is_correct": false}], "correct_index": 2, "explanation_html": "Lignocaine blocks sodium channels. They will typically be activated first, hence the pain some patients experience on administration."}], "note_html": "<b>Lidocaine<\/b><br><ul><li>An amide<\/li><li>Local anaesthetic and a less commonly used antiarrhythmic (affects Na channels in the axon)<\/li><li>Hepatic metabolism, protein bound, renally excreted<\/li><li>Toxicity: due to IV or excess administration. Increased risk if liver dysfunction or low protein states.  Note acidosis causes lidocaine to detach from protein binding.<\/li><li>Drug interactions: Beta blockers, ciprofloxacin, phenytoin<\/li><li>Features of toxicity: Initial CNS over activity then depression as lidocaine initially blocks inhibitory pathways then blocks both inhibitory and activating pathways.  Cardiac arrhythmias.<\/li><li>Increased doses may be used when combined with adrenaline to limit systemic absorption.<\/li><\/ul><br><b>Cocaine<\/b><br><ul><li>Pure cocaine is a salt, usually cocaine hydrochloride. It is supplied for local anaesthetic purposes as a paste.<\/li><li>It is supplied for clinical use in concentrations of 4 and 10%. It may be applied topically to the nasal mucosa. It has a rapid onset of action and has the additional advantage of causing marked vasoconstriction.<\/li><li>It is lipophillic and will readily cross the blood brain barrier. Its systemic effects also include cardiac arrhythmias and tachycardia.<\/li><li>Apart from its limited use in ENT surgery it is otherwise used rarely in mainstream surgical practice.<\/li><\/ul><br><b>Bupivacaine<\/b><br><ul><li>Bupivacaine binds to the intracellular portion of sodium channels and blocks sodium influx into nerve cells, which prevents depolarization.<\/li><li>It has a much longer duration of action than lignocaine and this is of use in that it may be used for topical wound infiltration at the conclusion of surgical procedures with long duration analgesic effect.<\/li><li>It is cardiotoxic and is therefore contra indicated in regional blockage in case the tourniquet fails.<\/li><li>Levobupivacaine (Chirocaine) is less cardiotoxic and causes less vasodilation.<\/li><\/ul><br><b>Prilocaine<\/b><br><ul><li>Similar mechanism of action to other local anaesthetic agents. However, it is far less cardiotoxic and is therefore the agent of choice for intravenous regional anaesthesia e.g. Biers Block.<\/li><\/ul><br>All local anaesthetic agents dissociate in tissues and this contributes to their therapeutic effect. The dissociation constant shifts in tissues that are acidic e.g. where an abscess is present, and this reduces the efficacy.<br><br><b>Doses of local anaesthetics<\/b><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Agent<\/b><\/th><th><b>Dose plain<\/b><\/th><th><b>Dose with adrenaline<\/b><\/th><\/tr><\/thead><tbody><tr><td>Lignocaine<\/td><td>3mg/Kg<\/td><td>7mg/Kg<\/td><\/tr><tr><td>Bupivacaine<\/td><td>2mg/Kg<\/td><td>2mg/Kg<\/td><\/tr><tr><td>Prilocaine<\/td><td>6mg/Kg<\/td><td>9mg/Kg<\/td><\/tr><\/tbody><\/table><\/div>These are a guide only as actual doses depend on site of administration, tissue vascularity and co-morbidities.<br><br><div class=\"alert alert-warning\"><b>Maximum total local anaesthetic doses<\/b><br><ul><li>Lignocaine 1% plain - 3mg/ Kg - 200mg (20ml)<\/li><li>Lignocaine 1% with 1 in 200,000 adrenaline - 7mg/Kg - 500mg (50ml)<\/li><li>Bupivacaine 0.5% - 2mg/kg- 150mg (30ml)<\/li><\/ul><i>Maximum doses are based on ideal body weight<\/i><br><\/div><br><b>Effects of adrenaline<\/b><br>Adrenaline may be added to local anaesthetic drugs. It prolongs the duration of action at the site of injection and permits usage of higher doses (see above). It is contra indicated in patients taking MAOI's or tricyclic antidepressants. The toxicity of bupivacaine is related to protein binding and addition of adrenaline to this drug does not permit increases in the total dose of bupivacaine, in contrast to the situation with lignocaine.<br><br><b>References<\/b><br>An excellent review is provided by:<br>French J and Sharp L. Local Anaesthetics. <i>Ann R Coll Surg Engl<\/i> 2012; 94: 76-80."}, {"name": "Post prostatectomy syndromes", "questions": [{"number": 34, "topic": "Post prostatectomy syndromes", "stem_html": "A 62 year old lawyer has a transurethral resection of the prostate which took 1 hour to perform.  The ST2 contacts you as the patient has become agitated.  He has a HR 105 bpm and his blood pressure is 170/100 mmHg.  He is fluid overloaded.  His blood results reveal a Na of 120mmol/l.  What is the most likely cause?", "options": [{"label_html": "Over administration of 0.9% Normal Saline", "is_correct": false}, {"label_html": "Syndrome of inappropriate antidiuretic hormone secretion", "is_correct": false}, {"label_html": "Congestive cardiac failure", "is_correct": false}, {"label_html": "TURP syndrome", "is_correct": true}, {"label_html": "Acute renal failure", "is_correct": false}], "correct_index": 3, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Complications of Transurethral Resection: TURP<br><br>T ur syndrome <br>U rethral stricture/UTI<br>R etrograde ejaculation<br>P erforation of the prostate<\/div>TUR syndrome occurs when irrigation fluid enters the systemic circulation.  The triad of features are:<br><br>1. Hyponatraemia: dilutional<br>2. Fluid overload<br>3. Glycine toxicity<br><br>Management involves fluid restriction and the treatment of the complications associated with the hyponatraemia."}], "note_html": "Transurethral prostatectomy is a common and popular treatment for benign prostatic hyperplasia. The procedure involves insertion of a resectoscope via the penile urethra. The bladder and prostate are irrigated and strips of prostatic tissue removed using diathermy. <br><br><div class=\"alert alert-warning\"><b>Indications for surgery in patients with BPH<\/b><br>Refractory urinary retention<br>Recurrent urinary tract infections due to prostatic hypertrophy<br>Recurrent gross haematuria<br>Renal insufficiency secondary to bladder outlet obstruction<br>Permanently damaged or weakened bladders<br>Large bladder diverticula that do not empty well secondary to an enlarged prostate<br><\/div><br>Complications include haemorrhage, urosepsis, retrograde ejaculation and electrolyte disturbances from the irrigation fluids used during surgery.<br><br><div class=\"alert alert-warning\"><b>Risk factors for increased morbidity following TURP<\/b><br>Glands &gt;45g<br>Operating time &gt; 90 minutes<br>Acute urinary retention as presenting feature<br><\/div>"}, {"name": "Pre operative fluid management", "questions": [{"number": 35, "topic": "Pre operative fluid management", "stem_html": "Which of the following statements relating to pre-operative fluid management is false?", "options": [{"label_html": "5% dextrose should be given cautiously in the elderly", "is_correct": false}, {"label_html": "Patients undergoing elective colonic resections may continue to drink water up to 2 hours prior to surgery", "is_correct": false}, {"label_html": "Normal saline increases the risk of hyperchloraemic acidosis", "is_correct": false}, {"label_html": "A 70kg man will need approximately 100mmol of sodium daily", "is_correct": false}, {"label_html": "Carbohydrate rich beverages and loading drinks can cause ileus therefore should be avoided", "is_correct": true}], "correct_index": 4, "explanation_html": "Carbohydrate loading is one of the enhanced recovery principles."}, {"number": 36, "topic": "Pre operative fluid management", "stem_html": "A 45 year old man with previous laparotomy is admitted with adhesional small bowel obstruction. He is managed with prolonged nasogastric drainage. His U+E's are as follows:<br><div class=\"table-responsive\"><table class=\"tb\"><tbody><tr><td>Sodium<\/td><td>129<\/td><\/tr><tr><td>Potassium<\/td><td>3.4<\/td><\/tr><tr><td>Urea<\/td><td>8.4<\/td><\/tr><tr><td>Creatinine<\/td><td>89<\/td><\/tr><\/tbody><\/table><\/div>Which of the following intravenous fluids should be prescribed?", "options": [{"label_html": "0.4%/0.18% dextrose saline", "is_correct": false}, {"label_html": "0.9% Sodium Chloride", "is_correct": false}, {"label_html": "0.9% sodium chloride with 40mmol potassium chloride per litre", "is_correct": true}, {"label_html": "Hartmanns solution", "is_correct": false}, {"label_html": "5% dextrose with 20mmol KCl", "is_correct": false}], "correct_index": 2, "explanation_html": "The potassium will decline further if this deficiency is not addressed. Remember that potassium is predominantly an intracellular cation. U+E's measure the serum potassium which is relatively buffered by the intra cellular stores. Therefore a fall in serum potassium represents a very real intracellular deficiency. This requires supplementary potassium to correct the defect."}, {"number": 37, "topic": "Pre operative fluid management", "stem_html": "A 53 year old alcoholic male presents with acute pancreatitis. He is clinically dehydrated. His blood results show normal renal function and electrolytes. Which of the intravenous fluids below should be prescribed?", "options": [{"label_html": "0.9% sodium chloride and 40mmol KCl", "is_correct": false}, {"label_html": "5% dextrose", "is_correct": false}, {"label_html": "Hartmanns solution", "is_correct": true}, {"label_html": "10% dextrose and 20mmol KCl", "is_correct": false}, {"label_html": "5% dextrose and 40 mmol KCl", "is_correct": false}], "correct_index": 2, "explanation_html": "This patient needs fluid replacement due to large third space losses. Hartmann's solution is recommended. N. Saline would put this patient at risk of hyperchloraemic acidosis."}, {"number": 38, "topic": "Pre operative fluid management", "stem_html": "Which of the following changes are not typically seen in established dehydration?", "options": [{"label_html": "Rising haematocrit", "is_correct": false}, {"label_html": "Urinary sodium &lt;20mmol/ litre", "is_correct": false}, {"label_html": "Metabolic acidosis", "is_correct": false}, {"label_html": "Decreased serum urea to creatinine ratio", "is_correct": true}, {"label_html": "Hypernatraemia", "is_correct": false}], "correct_index": 3, "explanation_html": "Diagnosing dehydration can be complicated, laboratory features include:<br><ul><li>Hypernatraemia<\/li><li>Rising haematocrit<\/li><li>Metabolic acidosis<\/li><li>Rising lactate<\/li><li>Increased serum urea to creatinine ratio<\/li><li>Urinary sodium &lt;20 mmol/litre<\/li><li>Urine osmolality approaching 1200mosmol/kg<\/li><\/ul>"}, {"number": 39, "topic": "Pre operative fluid management", "stem_html": "Which of these fluids is not an intravenous colloid?", "options": [{"label_html": "Gelofusine", "is_correct": false}, {"label_html": "Dextran 40", "is_correct": false}, {"label_html": "Human albumin solution", "is_correct": false}, {"label_html": "Hydroxyethyl starch", "is_correct": false}, {"label_html": "Bicarbonate 8.4%", "is_correct": true}], "correct_index": 4, "explanation_html": "Bicarbonate is a crystalloid."}], "note_html": "<b>Fluid management has been described in the British Consensus guidelines on IV fluid therapy for Adult Surgical patients (GIFTASUP) and by NICE (CG174 December 2013 updated May 2017)<\/b><br><br>The Recommendations include:<br><ul><li>Use Ringer's lactate or Hartmann's when a crystalloid is needed for resuscitation or replacement of fluids.  Avoid 0.9% N. Saline (due to risk of hyperchloraemic acidosis) unless patient vomiting or has gastric drainage.<\/li><li>Use 4%/0.18% dextrose saline or 5% dextrose in maintenance fluids.  It should not be used in resuscitation or as replacement fluids.<\/li><li>Adult maintenance fluid requirements are: Na 50-100 mmol/day and K 40-80 mmol/day in 1.5-2.5L fluid per day.<\/li><li>Patients for elective surgery should NOT be nil by mouth for &gt;2 hours (unless has disorder of gastric emptying).<\/li><li>Patients for elective surgery should be given carbohydrate rich drinks 2-3h before.  Ideally this should form part of a normal pre op plan to facilitate recovery.<\/li><li>Avoid mechanical bowel preparation.<\/li><li>If bowel prep is used, simultaneous administration of Hartmann's or Ringer's lactate should be considered.<\/li><li>Excessive fluid losses from vomiting should be treated with a crystalloid with potassium replacement.  0.9% N. Saline should be given if there is hypochloraemia.  Otherwise Hartmann's or Ringer lactate should be given for diarrhoea/ileostomy/ileus/obstruction.  Hartmann's should also be given in sodium losses secondary to diuretics.<\/li><li>High risk patients should receive fluids and inotropes.<\/li><li>An attempt should be made to detect pre or operative hypovolaemia using flow based measurements.  If this is not available, then clinical evaluation is needed i.e. JVP, pulse volume etc.<\/li><li>In Blood loss or infection causing hypovolaemia should be treated with a balanced crystalloid or colloid (or until blood available in blood loss).  A critically ill patient is unable to excrete Na or H<sub>2<\/sub>0 leading to a 5% risk of interstitial oedema.  Therefore 5% dextrose as well as colloid should be given.<\/li><li>If patients need IV fluid resuscitation, use crystalloids that contain sodium in the range 130-154 mmol/l, with a bolus of 500 ml over less than 15 minutes (NICE Guidance CG 174).<\/li><\/ul>"}, {"name": "Preparation for surgery", "questions": [{"number": 40, "topic": "Preparation for surgery", "stem_html": "A 53 year old man is due to undergo a right hemicolectomy for a caecal carcinoma. Which of the following would be usual practice prior to surgery?", "options": [{"label_html": "Oral carbohydrate loading drink 2 hours pre operatively", "is_correct": true}, {"label_html": "Mechanical bowel preparation with oral sodium picosulphate", "is_correct": false}, {"label_html": "Mechanical bowel preparation with oral mannitol", "is_correct": false}, {"label_html": "Total gut cleansing with oral antibiotics 3 days pre-operatively", "is_correct": false}, {"label_html": "Iodine rectal washout pre-operatively", "is_correct": false}], "correct_index": 0, "explanation_html": "Of the options presented here, only the oral carbohydrate drink would be standard practice prior to a right sided colonic resection. Whilst some surgeons may administer phosphate enemas before surgery, total gut clearance confers no benefit for right sided resections and delays recovery. In contrast, the carbohydrate loading drink is part of enhanced recovery protocols."}, {"number": 41, "topic": "Preparation for surgery", "stem_html": "Administration of which of the following may facilitate the identification of parathyroid glands intra operatively?", "options": [{"label_html": "Patent V dye intravenously", "is_correct": false}, {"label_html": "Methylene blue intravenously", "is_correct": true}, {"label_html": "Indigocarmine dye intravenously", "is_correct": false}, {"label_html": "India ink intravenously", "is_correct": false}, {"label_html": "Intravenous rifampicin", "is_correct": false}], "correct_index": 1, "explanation_html": "Methylene blue stains the parathyroid glands and can be useful in facilitating their identification."}, {"number": 42, "topic": "Preparation for surgery", "stem_html": "Which statement relating to the peri operative management of patients with diabetes mellitus is false?", "options": [{"label_html": "They should be placed first on the operating list", "is_correct": false}, {"label_html": "An intravenous sliding scale should be used in all cases", "is_correct": true}, {"label_html": "Potassium supplementation is likely to be required in diabetics on a sliding scale", "is_correct": false}, {"label_html": "Electrolyte abnormalities are more common after major visceral resections", "is_correct": false}, {"label_html": "Blood glucose monitoring is required during general anaesthesia", "is_correct": false}], "correct_index": 1, "explanation_html": "This is not the case and some type 2 diabetics may be managed using a watch and wait policy with regular blood glucose monitoring. The cellular shifts of potassium with sliding scales may cause problems with electrolyte management which should be anticipated."}, {"number": 43, "topic": "Preparation for surgery", "stem_html": "In relation to patients with type 1 diabetes mellitus undergoing surgery, which of the following statements is untrue?", "options": [{"label_html": "They should not receive oral carbohydrate loading drinks as part of enhanced recovery programmes", "is_correct": false}, {"label_html": "When a variable rate insulin infusion is required 0.45% sodium chloride and 5% dextrose w
