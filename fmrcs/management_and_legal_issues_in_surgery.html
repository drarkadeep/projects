  <script id="quiz-data" type="application/json">{"title": "Management And Legal Issues In Surgery", "topics": [{"name": "Absolute risk reduction", "questions": [{"number": 1, "topic": "Absolute risk reduction", "stem_html": "What is the reciprocal of absolute risk reduction?", "options": [{"label_html": "Odds ratio", "is_correct": false}, {"label_html": "Number needed to treat", "is_correct": true}, {"label_html": "False positive", "is_correct": false}, {"label_html": "False negative", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 1, "explanation_html": "In epidemiology, the absolute risk reduction, or risk difference is the decrease in risk of a given activity or treatment in relation to a control activity or treatment. It is the inverse of the number needed to treat."}, {"number": 2, "topic": "Absolute risk reduction", "stem_html": "In a randomized study of chemotherapy drugs for bowel cancer, a group receiving treatment A had a recurrence rate of 12.5% and a group receiving treatment B had a recurrence rate of 15%.  Both groups are matched for size and length of follow up.  What is the number needed to treat to prevent a recurrence?", "options": [{"label_html": "2.5", "is_correct": false}, {"label_html": "25", "is_correct": false}, {"label_html": "4", "is_correct": false}, {"label_html": "40", "is_correct": true}, {"label_html": "5", "is_correct": false}], "correct_index": 3, "explanation_html": "There is an absolute risk reduction of 15-12.5%= 2.5% for treatment A<br>Therefore the NNT = 1/0.025 = 40"}], "note_html": "The absolute risk reduction is the decrease in risk of a given activity or treatment in relation to a control activity or treatment. It is the inverse of the number needed to treat.<br><br>The absolute risk reduction is usually calculated for two different treatments. For example, consider surgical resection (X) versus watchful waiting (Y) for prostate cancer. A defined end point, such as 5 year survival is required. If the probabilities pX and pY of this end point are known then the absolute risk reduction is calculated (pX-pY). <br><br>The inverse of absolute risk reduction is the <i>Number Needed to Treat <\/i>. This is useful in determining the cost Vs benefit of many treatments. <br><br><b>Number needed to treat<\/b><br>Definition: how many patients would need to receive a treatment to prevent one event.  It is the absolute difference between two treatments."}, {"name": "Audit and Research", "questions": [{"number": 3, "topic": "Audit and Research", "stem_html": "Which of the following statements relating to randomised controlled trials is false?", "options": [{"label_html": "Consist of a control group recruited during the same time interval as the treatment group.", "is_correct": false}, {"label_html": "Are not applicable to retrospectively analysed data even if captured on a prospectively created database.", "is_correct": false}, {"label_html": "They require concealment of treatment throughout the duration of the study.", "is_correct": true}, {"label_html": "They require concealment of treatment until after randomisation.", "is_correct": false}, {"label_html": "They are less susceptible to researcher bias than non-randomised controlled trials.", "is_correct": false}], "correct_index": 2, "explanation_html": "An RCT does not have to include concealment although many medical trials may do so. Indeed in the case of surgical research it may not be practicable or possible to include concealment in the protocol. This does not mean that the trial is not an RCT, simply that it is not blinded."}, {"number": 4, "topic": "Audit and Research", "stem_html": "As the SpR in general surgery you wish to determine whether your breast cancer unit is complying with the British Association of Surgical Oncology guidelines for management of high grade ductal carcinoma in situ. What is the best course of action?", "options": [{"label_html": "Undertake a clinical audit", "is_correct": true}, {"label_html": "Undertake a clinical review", "is_correct": false}, {"label_html": "Undertake a service evaluation", "is_correct": false}, {"label_html": "Discuss the case with the ethics committee", "is_correct": false}, {"label_html": "Discuss selected cases at joint histopathology meetings", "is_correct": false}], "correct_index": 0, "explanation_html": "Since this comparison with practice against an agreed standard, the correct course of action is to undertake an audit."}, {"number": 5, "topic": "Audit and Research", "stem_html": "A patient involved in a national research trial of surgery versus conservative management for ruptured abdominal aortic aneurysms dies during surgery because the surgeon decided to deviate from the study protocol and implant a different type of graft material. What is the correct course of action?", "options": [{"label_html": "Refer the surgeon to the GMC", "is_correct": false}, {"label_html": "Report the case to the ethics committee that gave a favorable opinion for the study", "is_correct": true}, {"label_html": "Report it to the responsible officer for the hospital", "is_correct": false}, {"label_html": "Report it to the Caldicott guardian for the hospital", "is_correct": false}, {"label_html": "Report it to the media", "is_correct": false}], "correct_index": 1, "explanation_html": "Where a research participant experiences an adverse outcome, the correct course of action is to refer to the ethics committee that approved the study. Minor adverse effects are usually reviewed by the data monitoring committee and reported annually. However, a serious event is reported immediately. It would not be appropriate to refer to the GMC though, it may be that the surgeon deviated from the protocol for good reason."}, {"number": 6, "topic": "Audit and Research", "stem_html": "In Intention to treat analysis, which statement is untrue?", "options": [{"label_html": "It is based on the initial treatment intended.", "is_correct": false}, {"label_html": "Excludes those who cross over to alternative treatment arms of a trial.", "is_correct": true}, {"label_html": "Is different from a per protocol analysis.", "is_correct": false}, {"label_html": "Will affect the statistical power calculation to compare outcomes of treatment.", "is_correct": false}, {"label_html": "Helps to minimise observer bias.", "is_correct": false}], "correct_index": 1, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">An intention to treat analysis considers data according to the treatment to which the patient was randomised, rather than the treatment which was recieved. <\/div>It includes those who cross over which is how it helps provide additional information relating to those groups."}, {"number": 7, "topic": "Audit and Research", "stem_html": "Which of the following statements relating to audit and governance is untrue?", "options": [{"label_html": "An audit standard is a threshold of compliance with an audit criterion", "is_correct": false}, {"label_html": "Sample size calculations are an important part of audit planning", "is_correct": false}, {"label_html": "Clinical audit is part of clinical governance", "is_correct": false}, {"label_html": "Audits should be performed regularly when a novel surgical technique is introduced and where there is little knowledge of anticipated complications or outcomes", "is_correct": true}, {"label_html": "An audit criterion is a measurable outcome of care, aspect of practice or capacity", "is_correct": false}], "correct_index": 3, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">6 pillars of clinical governance:<br>Clinical effectiveness<br>Research and development<br>Openness<br>Risk management<br>Education and training<br>Clinical audit<\/div>Audits should compare performance against known standards. Where a novel technique is being introduced standards are unlikely to exist, sample sizes cannot therefore be accurately calculated. This is an example of research, which is not an audit."}], "note_html": "<b>Clinical audit<\/b><br>Quality improvement process that seeks to improve patient care and outcomes through systematic review of care against explicit criteria and the implementation of change. Aspects of the structure, processes, and outcomes of care are selected and systematically evaluated against explicit criteria. Where indicated, changes are implemented at an individual, team, or service level and further monitoring is used to confirm improvement in healthcare delivery. (NICE).<br><br><b>Research<\/b><br>Aims to derive new knowledge which is potentially generalisable or transferable."}, {"name": "Audit categories", "questions": [{"number": 8, "topic": "Audit categories", "stem_html": "A group of surgeons wish to determine whether patients are receiving adequate deep vein thrombosis prophylaxis following surgery. What is the most appropriate process to determine this?", "options": [{"label_html": "Departmental review", "is_correct": false}, {"label_html": "Peer review", "is_correct": false}, {"label_html": "Financial audit", "is_correct": false}, {"label_html": "Systems based audit", "is_correct": false}, {"label_html": "Standards based audit", "is_correct": true}], "correct_index": 4, "explanation_html": "This type of audit is widely undertaken in most trusts in the UK."}, {"number": 9, "topic": "Audit categories", "stem_html": "A surgical department wishes to determine whether it is using types of prosthetic mesh material for incisional hernia surgery in the most effective manner. Recently there have been cases of non mesh usage and loss of material as a result of the implants being 'out of date'. What is the most appropriate method to investigate this?", "options": [{"label_html": "System based audit", "is_correct": true}, {"label_html": "Standards audit", "is_correct": false}, {"label_html": "Peer review", "is_correct": false}, {"label_html": "Financial audit", "is_correct": false}, {"label_html": "Operational audit", "is_correct": false}], "correct_index": 0, "explanation_html": "If the problem was related to how the surgical department is performing the surgeries, rather than stock control and the system by which the materials are used within the theater, then an operational audit would be more appropriate. For example, if the problem was that the surgical department was not using the prosthetic mesh material in the most effective manner during the surgery, such as incorrect placement or incorrect sizing, then an operational audit would be more appropriate. The audit would focus on evaluating the effectiveness and efficiency of the surgical procedures being performed, including the policies and procedures, resources, and performance metrics. The audit would identify any inefficiencies or breakdowns in the day-to-day operations that are contributing to the problem and recommend solutions to improve the effectiveness and efficiency of the surgical procedures. So, in summary, the type of audit that is most appropriate depends on the nature of the problem being investigated. If the problem is related to a breakdown in the system or technology infrastructure, then a system-based audit would be more appropriate. If the problem is related to day-to-day operations, policies, and procedures, then an operational audit would be more appropriate."}], "note_html": "Audits may be used in a variety of clinical settings. These range from standards based audits, which will be familiar to most clinicians, through to systems based audits which focus more on the processes within an organisation.<br><br><b>Types of audit<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Financial audit<\/b><\/td><td>A historically oriented, independent evaluation performed for the purpose of attesting to the fairness, accuracy, and reliability of financial data<\/td><\/tr><tr><td><b>Operational audit<\/b><\/td><td>A future-oriented, systematic, and independent evaluation of organizational activities. Financial data may be used, but the primary sources of evidence are the operational policies and achievements related to organizational objectives. Internal controls and efficiencies may be evaluated during this type of review.<\/td><\/tr><tr><td><b>Departmental review<\/b><\/td><td>A current period analysis of administrative functions, to evaluate the adequacy of controls, safeguarding of assets, efficient use of resources, compliance with related laws, regulations and institutional policy and integrity of financial information.<\/td><\/tr><tr><td><b>Standards based audit<\/b><\/td><td>Comparison of care or passage of care against set and widely agreed standards or outcomes.<\/td><\/tr><tr><td><b>Systems based audit<\/b><\/td><td>Evaluation of processes occurring within an institution.<\/td><\/tr><\/tbody><\/table><\/div><br>Systems based audits are an integral part of the process of clinical governance."}, {"name": "Cluster randomised controlled trials", "questions": [{"number": 10, "topic": "Cluster randomised controlled trials", "stem_html": "Considering cluster randomised trials, which of the following statements is false?", "options": [{"label_html": "They consider interventions targeted at groups", "is_correct": false}, {"label_html": "They require increased recruitment to achieve the same level of statistical power as individual trials", "is_correct": false}, {"label_html": "If results are analysed on an individual basis a lower P value may be obtained", "is_correct": false}, {"label_html": "They are less prone to unit of analyses errors than trials involving individual observations", "is_correct": true}, {"label_html": "The statistical analyses for these trials is more complex than that required for trials based on individuals", "is_correct": false}], "correct_index": 3, "explanation_html": "Cluster randomised trials are more prone to unit of analyses errors than individual based trials. Clustering needs to be considered in trial design and data analysis. One of the commonest errors is where a study is a cluster study but researchers have failed to recognise this fact. This will then result in the incorrect analysis being pursued. A lower P value will then result and a false positive error will occur."}], "note_html": "<ul><li>Groups are randomised rather than individuals<\/li><li>Avoids cross contamination amongst participants<\/li><li>Participants in any one cluster are more likely to respond in a similar fashion<\/li><li>Higher risk of unit of analysis error as these studies should be analysed as clusters rather than on an individual basis. This leads to a higher false positive rate.<\/li><li>It is possible to adjust for clustering in statistical analyses<\/li><\/ul>"}, {"name": "Consent", "questions": [{"number": 11, "topic": "Consent", "stem_html": "A 6 year old is hit by a car and is brought to the emergency department. He is haemodynamically unstable with bilateral femoral shaft fractures and concerns that he may have a ruptured spleen. The parents have refused blood transfusions on religious grounds. What is the correct course of action?", "options": [{"label_html": "Proceed with treatment", "is_correct": true}, {"label_html": "Do not proceed with treatment", "is_correct": false}, {"label_html": "Apply to court", "is_correct": false}, {"label_html": "Apply for an IMCA", "is_correct": false}, {"label_html": "Contact the PALS service", "is_correct": false}], "correct_index": 0, "explanation_html": "In the UK, the GMC and common law advises that emergency life saving treatment can be given to a child irrespective of the parents views. There is clearly insufficient time here to apply to a court."}, {"number": 12, "topic": "Consent", "stem_html": "What is the main impact of the Montgomery ruling in consenting patients for surgical procedures?", "options": [{"label_html": "It clearly states that all risks however minor with a frequency of 10% or greater be disclosed", "is_correct": false}, {"label_html": "It states whether a reasonable person in the patients position would be likely to attach significance to the risk, or the doctor is or should reasonably be aware that the particular patient would be likely to attach significance to it", "is_correct": true}, {"label_html": "It states all procedures should be performed by a consultant", "is_correct": false}, {"label_html": "It covers the decision making for minors who need to be consented by proxy", "is_correct": false}, {"label_html": "It replaces the Gillick competency test", "is_correct": false}], "correct_index": 1, "explanation_html": "The new legal judgement recognises this individual approach to warning patients about risk. Rather than taking into account the percentage possibility of a risk arising, doctors need to bear in mind the significance of a given risk for that particular patient, and the nature of the risk, such as the effect it would have on the patient's life if it were to occur. The assessment is therefore considered to be both fact-sensitive and sensitive to the characteristics of the particular patient."}, {"number": 13, "topic": "Consent", "stem_html": "What is the main impact of the Montgomery ruling in consenting patients for surgical procedures?", "options": [{"label_html": "It clearly states that all risks however minor with a frequency of 10% or greater be disclosed", "is_correct": false}, {"label_html": "It states whether a reasonable person in the patients position would be likely to attach significance to the risk, or the doctor is or should reasonably be aware that the particular patient would be likely to attach significance to it", "is_correct": true}, {"label_html": "It states all procedures should be performed by a consultant", "is_correct": false}, {"label_html": "It covers the decision making for minors who need to be consented by proxy", "is_correct": false}, {"label_html": "It replaces the Gillick competency test", "is_correct": false}], "correct_index": 1, "explanation_html": "The new legal judgement recognises this individual approach to warning patients about risk. Rather than taking into account the percentage possibility of a risk arising, doctors need to bear in mind the significance of a given risk for that particular patient, and the nature of the risk, such as the effect it would have on the patient's life if it were to occur. The assessment is therefore considered to be both fact-sensitive and sensitive to the characteristics of the particular patient."}, {"number": 14, "topic": "Consent", "stem_html": "What is the main impact of the Montgomery ruling in consenting patients for surgical procedures?", "options": [{"label_html": "It clearly states that all risks however minor with a frequency of 10% or greater be disclosed", "is_correct": false}, {"label_html": "It states whether a reasonable person in the patients position would be likely to attach significance to the risk, or the doctor is or should reasonably be aware that the particular patient would be likely to attach significance to it", "is_correct": true}, {"label_html": "It states all procedures should be performed by a consultant", "is_correct": false}, {"label_html": "It covers the decision making for minors who need to be consented by proxy", "is_correct": false}, {"label_html": "It replaces the Gillick competency test", "is_correct": false}], "correct_index": 1, "explanation_html": "The new legal judgement recognises this individual approach to warning patients about risk. Rather than taking into account the percentage possibility of a risk arising, doctors need to bear in mind the significance of a given risk for that particular patient, and the nature of the risk, such as the effect it would have on the patient's life if it were to occur. The assessment is therefore considered to be both fact-sensitive and sensitive to the characteristics of the particular patient."}, {"number": 15, "topic": "Consent", "stem_html": "When is it mandatory to involve an independent mental capacity advocate ?", "options": [{"label_html": "When a patient requires a significant intervention, time permits and the patient lacks capacity to decide for themselves", "is_correct": true}, {"label_html": "When a patient cannot decide on the best treatment", "is_correct": false}, {"label_html": "When parents disagree about treatment of a child", "is_correct": false}, {"label_html": "When two doctors disagree about the best treatment option", "is_correct": false}, {"label_html": "When a patient has lost trust in their clinician", "is_correct": false}], "correct_index": 0, "explanation_html": "The Mental Capacity Act (MCA) requires doctors to involve an independent mental capacity advocate (IMCA) for serious medical treatment decisions when: <br><ul><li>a best interests decision is required because the doctor has assessed the person as not having the capacity to make the decision themselves <\/li><li>the person does not have family or friends with whom it is appropriate to consult about the decision. <\/li><\/ul><br>Serious medical treatment is defined in the Mental Capacity Act 2005 (Independent Mental Capacity Advocates) (General) Regulations 2006 as treatment which involves providing, withdrawing or withholding treatment in circumstances where one or more of the following apply: <br><ul><li>in a case where a single treatment is being proposed, there is a fine balance between its benefits to the patient and the burdens and risks it is likely to entail for them <\/li><li>in a case where there is a choice of treatments, a decision as to which one to use is finely balanced <\/li><li>what is proposed would be likely to involve serious consequences for the patient. <\/li><\/ul>The MCA Code of Practice says that serious consequences may include treatment options which: <br><ul><li>cause serious and prolonged pain, distress or side effects have potentially major consequences for the patient (for example, major surgery or stopping life-sustaining treatment) <\/li><li>have a serious impact on the patients future life choices. <\/li><\/ul>"}, {"number": 16, "topic": "Consent", "stem_html": "A 46 year old man is undergoing a colonoscopy under sedation using a combination of midazolam and fentanyl sedation. The procedure is complicated by the development of a significant sigmoid loop and becomes increasingly uncomfortable. When the endoscope is in the region of the colonic splenic flexure, the patients asks for the procedure to stop. What is the best course of action?", "options": [{"label_html": "Administration of additional midazolam and proceeding to complete the procedure", "is_correct": false}, {"label_html": "Withdrawal of the endoscope and arranging an alternative test", "is_correct": true}, {"label_html": "Call an anaesthetist to administer an general anaesthetic", "is_correct": false}, {"label_html": "Administration of intravenous fentantyl and proceeding to complete the procedure", "is_correct": false}, {"label_html": "Turn the patient prone and complete the procedure", "is_correct": false}], "correct_index": 1, "explanation_html": "During endoscopic procedures, many patients have conscious sedation and retain decision making ability. If they request the procedure to be stopped this must be adhered to."}], "note_html": "There are 3 types of consent:<br><br>1. Informed<br>2. Expressed<br>3. Implied<br><br><b>Consent forms used in UK NHS<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Consent Form 1<\/b><\/td><td>For competent adults who are able to consent for themselves where consciousness may be impaired (e.g. GA)<\/td><\/tr><tr><td><b>Consent Form 2<\/b><\/td><td>For an adult consenting on behalf of a child where consciousness is impaired<\/td><\/tr><tr><td><b>Consent Form 3<\/b><\/td><td>For an adult or child where consciousness is not impaired<\/td><\/tr><tr><td><b>Consent Form 4<\/b><\/td><td>For adults who lack capacity to provide informed consent<\/td><\/tr><\/tbody><\/table><\/div><br><b>Capacity<\/b><br>Key points include:<br>1. Understand and retain information<br>2. Patient believes the information to be true<br>3. Patient is able to weigh the information to make a decision<br>All patients must be assumed to have capacity<br><br><b>Consent in minors<\/b><br>Young children and older children who are not Gillick competent cannot consent for themselves. In British law the patients biological mother can always provide consent. The child's father can consent if the parents are married (and the father is the biological father), or if the father is named on the birth certificate (irrespective of marital status). If parents are not married and the father is not named on the birth certificate then the father cannot consent."}, {"name": "Diathermy", "questions": [{"number": 17, "topic": "Diathermy", "stem_html": "A 67 year old woman is undergoing a femoral hernia repair and the surgeon is using a bipolar diathermy unit for haemostasis. Which of the following is a recognised risk with the use of bipolar diathermy?", "options": [{"label_html": "Patient burns at the site of the contact plate", "is_correct": false}, {"label_html": "Fires when used near alcoholic skin preparations that have pooled", "is_correct": true}, {"label_html": "Coupling injuries", "is_correct": false}, {"label_html": "Risk of thermal injury to regional vessels as a result of tissue heating", "is_correct": false}, {"label_html": "Capacitance injuries", "is_correct": false}], "correct_index": 1, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Capacitive coupling occurs when alternating current is transferred from an insulated instrument to an uninsulated instrument through a capacitor.<\/div>In bipolar units the flow of electricity is from one electrode to the other over a small area. As a result a contact plate is not used and coupling and capacitance injuries are uncommon. They have a low risk of thermal injury to adjacent structures and are preferred for this reason. However, they may cause sparks and ignite inflammable solutions."}, {"number": 18, "topic": "Diathermy", "stem_html": "Which surgical energy device is most appropriate for performing a sphincterotomy during an ERCP?", "options": [{"label_html": "Monopolar diathermy device in cutting mode", "is_correct": true}, {"label_html": "Bipolar diathermy", "is_correct": false}, {"label_html": "Monopolar diathermy in coagulation mode", "is_correct": false}, {"label_html": "Harmonic ACE", "is_correct": false}, {"label_html": "CUSA", "is_correct": false}], "correct_index": 0, "explanation_html": "The cutting monopolar mode is needed, that's why this can be complicated by bleeding."}, {"number": 19, "topic": "Diathermy", "stem_html": "Which of the energy devices below would be most suited for resection of a parietal lobe tumour?", "options": [{"label_html": "Monopolar diathermy in coagulation mode", "is_correct": false}, {"label_html": "Harmonic ACE", "is_correct": false}, {"label_html": "CUSA device", "is_correct": true}, {"label_html": "Monopolar diathermy in cutting mode", "is_correct": false}, {"label_html": "Ligasure system", "is_correct": false}], "correct_index": 2, "explanation_html": "CUSA systems minimize thermal injury and current flow to the surrounding areas."}, {"number": 20, "topic": "Diathermy", "stem_html": "A 7 year old boy is due to undergo a circumcision for phimosis. Which of the following devices would be the most appropriate agent to use for achieving haemostasis?", "options": [{"label_html": "Monopolar unit in cutting mode", "is_correct": false}, {"label_html": "Bipolar unit", "is_correct": true}, {"label_html": "Monopolar unit in coagulation mode", "is_correct": false}, {"label_html": "Monopolar unit in blend mode", "is_correct": false}, {"label_html": "Monopolar unit configured to spray mode", "is_correct": false}], "correct_index": 1, "explanation_html": "The danger with the use of any source other than bipolar diathermy in this setting is the risk of causing trauma to end vessels. All the monopolar units, regardless of the setting will carry this risk."}], "note_html": "- Diathermy devices are used by surgeons in all branches of surgery.<br><ul><li>Use electric currents to produce local heat and thereby facilitate haemostasis or surgical dissection. <\/li><li>Consist of a generator unit that is located outside the patient and can be set to the level of power required by the surgeon. <\/li><li>There are two major types of diathermy machine; <\/li><\/ul><br><b>Monopolar<\/b><br>The current flows through the diathermy unit into a handheld device that is controlled by the surgeon. Electricity can flow from the tip of the device into the patient. The earth electrode is located some distance away. The relatively narrow tip of the diathermy device produces local heat and this can be used to vaporise and fulgurate tissues. The current can be adjusted in terms of frequency so that different actions can be effected. In cutting mode sufficient power is applied to the tissues to vaporise their water content. In coagulation mode the power level is reduced so that a coagulum is formed instead. Some diathermy machines can utilise a setting known as blend that alternates cutting and coagulation functions, these tend to be used during procedures such as colonoscopic polypectomy. <br><br><b>Bipolar<\/b><br>The electric current flows from one electrode to another however, both electrodes are usually contained within the same device e.g. a pair of forceps. The result is that heating is localised to the area between the two electrodes and surrounding tissue damage is minimised.<br><br><b>Ultrasound based devices<\/b><br>These include CUSA and Harmonic scalpel. They generate high frequency oscillations that seal and coagulate tissues. They have different energy settings that allow them to dissect and simultaneously seal vessels if required. The CUSA device leaves vessels intact that may then be divided.<br><br><b>Ligasure device<\/b><br>Delivers tailored energy levels to allow simultaneous haemostasis and dissection. The device senses the impedance of the tissues and tailors energy levels accordingly.<br><br><b>Hazards of diathermy<\/b><br><ul><li>Inadvertent patient burn. This may result of careless handling of the device or in the case of monopolar devices forgetting to apply a return electrode plate, In this situation patients may develop a contact burn when electricity flows to earth<\/li><li>Explosion or fire. This may occur when volatile anaesthetic gases or skin preparation fluid have been used<\/li><\/ul>"}, {"name": "Forest plots", "questions": [{"number": 21, "topic": "Forest plots", "stem_html": "A surgical team wish to conduct a meta analysis of randomised controlled trials of the use of low molecular weight heparins in the prevention of post operative deep vein thrombosis. How would these results be best displayed graphically?", "options": [{"label_html": "Forest plot", "is_correct": true}, {"label_html": "Box Whisker plot", "is_correct": false}, {"label_html": "Violin plot", "is_correct": false}, {"label_html": "Kaplan Meier graph", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 0, "explanation_html": "Data from multiple RCT's are best displayed using Forest plots. Funnel plots may be used to determine the effect of small studies and their overall effect on the data. Violin plots and Box Whisker plots are often used to graphically display non parametric data from single studies and are not generally used to display data from meta analyses."}], "note_html": "A Forest plot is a graphical display designed to illustrate the relative strength of treatment effects in multiple quantitative scientific studies, addressing the same question. It is often used to graphically display meta analyses of randomised controlled trials. <br><br>The graph may be plotted on a natural logarithmic scale when using odds ratios or other ratio-based effect measures, so that the confidence intervals are symmetrical about the means from each study and to ensure undue emphasis is not given to odds ratios greater than 1 when compared to those less than 1. The area of each square is proportional to the study's weight in the meta-analysis. The overall meta-analysed measure of effect is often represented on the plot as a vertical line. This meta-analysed measure of effect is commonly plotted as a diamond, the lateral points of which indicate confidence intervals for this estimate.<br><br>A vertical line representing no effect is also plotted. If the confidence intervals for individual studies overlap with this line, it demonstrates that at the given level of confidence their effect sizes do not differ from no effect for the individual study. The same applies for the meta-analysed measure of effect: if the points of the diamond overlap the line of no effect the overall meta-analysed result cannot be said to differ from no effect at the given level of confidence."}, {"name": "Incidence and prevalence", "questions": [{"number": 22, "topic": "Incidence and prevalence", "stem_html": "You have been asked to investigate the potential benefit of setting up a service to help patients with stomas in the local area. What is the most important factor when determining how many resources will be required?", "options": [{"label_html": "Incidence", "is_correct": false}, {"label_html": "Bayesian factor", "is_correct": false}, {"label_html": "Prevalence", "is_correct": true}, {"label_html": "Denominator data", "is_correct": false}, {"label_html": "P value", "is_correct": false}], "correct_index": 2, "explanation_html": "<p>No explanation provided.<\/p>"}], "note_html": "These two terms are used to describe the frequency of a condition in a population.<br><br>The <b>incidence<\/b> is the number of new cases per population in a given time period.<br><br>For example, if condition X has caused 40 new cases over the past 12 months per 1,000 of the population the annual incidence is 0.04 or 4%.<br><br>The <b>prevalence<\/b> is the total number of cases per population at a particular point in time.<br><br>For example, imagine a questionnaire is sent to 2,500 adults asking them how much they weigh. If from this sample population, 500 of the adults were obese then the prevalence of obesity would be 0.2 or 20%.<br><br>Relationship<br><ul><li>prevalence = incidence * duration of condition<\/li><li>in chronic diseases the prevalence is much greater than the incidence<\/li><li>in acute diseases the prevalence and incidence are similar. For conditions such as the common cold the incidence may be greater than the prevalence<\/li><\/ul>"}, {"name": "Normal distribution", "questions": [{"number": 23, "topic": "Normal distribution", "stem_html": "You are performing a study of weight in patients attending pre operative assessment clinic for elective knee replacement.  Assuming that the results are normally distributed, what percentage of values lie within two standard deviations of the mean weight?", "options": [{"label_html": "95.4%", "is_correct": true}, {"label_html": "5.3%", "is_correct": false}, {"label_html": "98.3%", "is_correct": false}, {"label_html": "10%", "is_correct": false}, {"label_html": "97.5%", "is_correct": false}], "correct_index": 0, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">In statistics, the 68-95-99.7 rule  or three-sigma rule, or empirical rule  states that for a normal distribution, nearly all values lie within 3 standard deviations of the mean.<br>About 68.27% of the values lie within 1 standard deviation of the mean. Similarly, about 95.45% of the values lie within 2 standard deviations of the mean. Nearly all (99.73%) of the values lie within 3 standard deviations of the mean<\/div>95.4% of values lie within 2 SD of the mean."}, {"number": 24, "topic": "Normal distribution", "stem_html": "You are performing a study of weight in patients attending pre operative assessment clinic for elective knee replacement.  Assuming that the results are normally distributed, what percentage of values lie within two standard deviations of the mean weight?", "options": [{"label_html": "95.4%", "is_correct": true}, {"label_html": "5.3%", "is_correct": false}, {"label_html": "98.3%", "is_correct": false}, {"label_html": "10%", "is_correct": false}, {"label_html": "97.5%", "is_correct": false}], "correct_index": 0, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">In statistics, the 68-95-99.7 rule  or three-sigma rule, or empirical rule  states that for a normal distribution, nearly all values lie within 3 standard deviations of the mean.<br>About 68.27% of the values lie within 1 standard deviation of the mean. Similarly, about 95.45% of the values lie within 2 standard deviations of the mean. Nearly all (99.73%) of the values lie within 3 standard deviations of the mean<\/div>95.4% of values lie within 2 SD of the mean."}, {"number": 25, "topic": "Normal distribution", "stem_html": "If a sample is normally distributed which of the following is true?", "options": [{"label_html": "Mean = standard deviation", "is_correct": false}, {"label_html": "Mean = standard error of the mean", "is_correct": false}, {"label_html": "Mean = median", "is_correct": true}, {"label_html": "Mean = variance", "is_correct": false}, {"label_html": "The mode and standard error of the mean have the same value", "is_correct": false}], "correct_index": 2, "explanation_html": "In a normally distributed sample, the mean, median and mode are the same."}, {"number": 26, "topic": "Normal distribution", "stem_html": "A surgeon is researching the body weights of patients in her region who live in various locations to determine uptake of bariatric interventions. She notes that there is a left sided Gaussian distribution to the data set. In such circumstances, how is the mean related to the median?", "options": [{"label_html": "It remains the same", "is_correct": false}, {"label_html": "They are not related", "is_correct": false}, {"label_html": "It lies to the left of the median", "is_correct": true}, {"label_html": "It lies to the right of the median", "is_correct": false}, {"label_html": "It lies to the right occupying the same location as the value for the mode", "is_correct": false}], "correct_index": 2, "explanation_html": "In a left-skewed distribution, the mean is less than the median. This is because the mean, which considers all the values in the data set, gets drawn in the direction of the outliers (which are on the negative side in a left-skewed distribution). On the other hand, the median, which is the middle value, is affected less."}], "note_html": "The normal distribution is also known as the Gaussian distribution or 'bell-shaped' distribution. It describes the spread of many biological and clinical measurements<br><br>Properties of the Normal distribution<br><ul><li>symmetrical i.e. Mean = mode = median<\/li><li>68.3% of values lie within 1 SD of the mean<\/li><li>95.4% of values lie within 2 SD of the mean<\/li><li>99.7% of values lie within 3 SD of the mean<\/li><li>this is often reversed, so that within 1.96 SD  of the mean lie 95% of the sample values<\/li><li>the range of the mean - (1.96 *SD) to the mean + (1.96 * SD) is called the 95% confidence interval, i.e. If a repeat sample of 100 observations are taken from the same group 95 of them would be expected to lie in that range<\/li><\/ul><br>Standard deviation<br><ul><li>the standard deviation (SD) represents the average difference each observation in a sample lies from the sample mean<\/li><li>SD = square root (variance)<\/li><\/ul>"}, {"name": "Power calculations and statistical error", "questions": [{"number": 27, "topic": "Power calculations and statistical error", "stem_html": "Which of the following most closely describes the risk of a type I statistical error?", "options": [{"label_html": "Power calculation", "is_correct": false}, {"label_html": "P value", "is_correct": true}, {"label_html": "Odds ratio", "is_correct": false}, {"label_html": "Relative risk", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 1, "explanation_html": "Type 1 errors occur when a test rejects a true null hypothesis and is therefore related to the significance level of the test result. To explain consider the following arbitrary example.<br><br>We hypothesise that bowel preparation vs no bowel preparation has no effect on anastomotic leak rates following left hemicolectomy. If we compare the rates of anastomotic leak and perform a Chi Squared test and obtained a P value of 0.95 we should conclude that we unable to reject the null hypothesis. Should we choose to do so then we are at risk of committing a type 1 error. In reality the knowledge that a type 1 error was committed is usually some time after the event. When other studies have been performed that have shown an effect.<br>Power calculations are related to type 2 errors."}, {"number": 28, "topic": "Power calculations and statistical error", "stem_html": "Which of the following is not usually required to make a power calculation?", "options": [{"label_html": "The specificity of the intervention being tested", "is_correct": true}, {"label_html": "The desired significance level", "is_correct": false}, {"label_html": "The size of the effect being measured", "is_correct": false}, {"label_html": "The desired power value", "is_correct": false}, {"label_html": "Sample size used to detect the effect", "is_correct": false}], "correct_index": 0, "explanation_html": "The specificity of a test is related to type 1 errors.<br><br>The components that are nearly always needed for power calculations are :<br>Size of effect<br>Significance level<br>Sample size used to detect the effect<br>Desired power value"}], "note_html": "<b>Statistical error<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Type 1 Error<\/b><\/td><td>A test rejects a true null hypothesis. Analogus to false positive. It usually equates to the significance level assigned to a test.<\/td><\/tr><tr><td><b>Type 2 Error<\/b><\/td><td>A test fails to reject a false null hypothesis. It is related to the power of a test.<\/td><\/tr><\/tbody><\/table><\/div><br><b>Statistical power<\/b><br>The power of a test is the probability that the test will reject the null hypothesis when it is false (thereby avoiding a type 2 error). Increasing the power of a test will reduce the probability of a type 2 error. Usually a value of 0.8 is selected."}, {"name": "Pre- and post- test odds and probability", "questions": [{"number": 29, "topic": "Pre- and post- test odds and probability", "stem_html": "Which one of the following is equivalent to the pre-test probability?", "options": [{"label_html": "Post test odds / (1 + post-test odds)", "is_correct": false}, {"label_html": "Pre-test odds x likelihood ratio", "is_correct": false}, {"label_html": "The prevalence of a condition", "is_correct": true}, {"label_html": "The incidence of a condition", "is_correct": false}, {"label_html": "Post-test odds / likelihood ratio", "is_correct": false}], "correct_index": 2, "explanation_html": "The prevalence is the proportion of a population that have the condition at a point in time whilst the incidence is the rate at which new cases occur in a population during a specified time period."}], "note_html": "<b>Pre-test probability<\/b><br>The proportion of people with the target disorder in the population at risk at a specific time (point prevalence) or time interval (period prevalence)<br><br>For example, the prevalence of rheumatoid arthritis in the UK is 1%<br><br><b>Post-test probability<\/b><br>The proportion of patients with that particular test result who have the target disorder<br><br>Post-test probability =  post test odds / (1 + post-test odds)<br><br><b>Pre-test odds<\/b><br>The odds that the patient has the target disorder before the test is carried out <br><br>Pre-test odds = pre-test probability / (1 - pre-test probability)<br><br><b>Post-test odds<\/b><br>The odds that the patient has the target disorder after the test is carried out<br><br>Post-test odds =  pre-test odds x likelihood ratio<br><br>where the likelihood ratio for a positive test result = sensitivity / (1 - specificity)"}, {"name": "Qualitative and quantitative data", "questions": [{"number": 30, "topic": "Qualitative and quantitative data", "stem_html": "Which of the statistical tests listed below is most appropriate to use with data which follows a normal distribution?", "options": [{"label_html": "T Test", "is_correct": true}, {"label_html": "Fishers exact test", "is_correct": false}, {"label_html": "Spearmans rank test", "is_correct": false}, {"label_html": "Mann Whitney U test", "is_correct": false}, {"label_html": "Bonferroni test", "is_correct": false}], "correct_index": 0, "explanation_html": "A T Test is most suited to data which follows the normal distribution as the others are non parametric tests. The Bonferroni test is used to provide correction when multiple tests are used."}, {"number": 31, "topic": "Qualitative and quantitative data", "stem_html": "Which of the following tests is most appropriate for correcting against multiple statistical analyses that might provide an erroneous result (i.e. to correct against data dredging)?", "options": [{"label_html": "LSD post hoc test", "is_correct": false}, {"label_html": "Bonferroni test", "is_correct": true}, {"label_html": "T Test", "is_correct": false}, {"label_html": "Fishers test", "is_correct": false}, {"label_html": "Spearmans rank test", "is_correct": false}], "correct_index": 1, "explanation_html": "As more types of side effects are considered, it becomes more likely that the new drug will appear to be less safe than existing drugs in terms of at least one side effect. Methods are available to adjust the p value to reflect the multiple comparisons being made, the aim being to avoid spurious results. A frequently applied correction is the Bonferroni method in which the observed p values are multiplied by the number of tests performed, any resulting p value which is greater than 1 is set to 1 and any which remains at less than 0.05 can be considered significant at the 5% level."}, {"number": 32, "topic": "Qualitative and quantitative data", "stem_html": "Which of the following statements relating to quantitative data is false?", "options": [{"label_html": "Discrete data cannot be sub divided", "is_correct": false}, {"label_html": "The median is less susceptible to extreme outliers than the mean", "is_correct": false}, {"label_html": "The mean is susceptible to extreme outliers", "is_correct": false}, {"label_html": "Data that fits the standard distribution perfectly will have a mode that is half the value of the mean", "is_correct": true}, {"label_html": "Values obtained have a numerical scale", "is_correct": false}], "correct_index": 3, "explanation_html": "Data that fits the standard distribution perfectly will have a mean, median and mode that are all the same value."}, {"number": 33, "topic": "Qualitative and quantitative data", "stem_html": "Which of the following statements relating to qualitative data is false?", "options": [{"label_html": "The data has no true numerical scale", "is_correct": false}, {"label_html": "It may comprise multiple data groups", "is_correct": false}, {"label_html": "May be reported using odds ratios", "is_correct": false}, {"label_html": "May be reported using frequency histograms", "is_correct": false}, {"label_html": "It is best analysed statistically using a students T test when multiple factors are present", "is_correct": true}], "correct_index": 4, "explanation_html": "The students T test should be performed if two sets of data have a normal distribution, the T test cannot be used to analyse multiple data sets."}], "note_html": "<b>Qualitative and quantitative data<\/b><br>Qualitative (categorical) data refers to different descriptions of a characteristic, although it may be possible to allocate a number it has no scale.<br>Quantitative data is associated with numerical values on a numerical scale.<br><br>Since quantitative data is based on a numerical scale it can be organised to create a distribution curve. The central tendency may be estimated using the mode, median and mean. The standard deviation gives an estimation of the spread of data."}, {"name": "Relative risk", "questions": [{"number": 34, "topic": "Relative risk", "stem_html": "A new hernia mesh designed to prevent the risk of infection undergoes clinical trials. 100 patients are given the new mesh. During a three month period 10 of the patients have an episode of infection. In the control group there are 300 patients who are given a placebo. In this group 50 people have an infection during the same time period. What is the relative risk of having an infection when the new mesh is used?", "options": [{"label_html": "0.8", "is_correct": false}, {"label_html": "0.2", "is_correct": false}, {"label_html": "1.66", "is_correct": false}, {"label_html": "0.6", "is_correct": true}, {"label_html": "0.06", "is_correct": false}], "correct_index": 3, "explanation_html": "Experimental event rate, EER = 10 / 100 = 0.10<br><br>Control event rate, CER = 50 / 300 = 0.166<br><br>Therefore the relative risk  = EER / CER = 0.1 / 0.166 = 0.6"}, {"number": 35, "topic": "Relative risk", "stem_html": "A new hernia mesh designed to prevent the risk of infection undergoes clinical trials. 100 patients are given the new mesh. During a three month period 10 of the patients have an episode of infection. In the control group there are 300 patients who are given a placebo. In this group 50 people have an infection during the same time period. What is the relative risk of having an infection when the new mesh is used?", "options": [{"label_html": "0.8", "is_correct": false}, {"label_html": "0.2", "is_correct": false}, {"label_html": "1.66", "is_correct": false}, {"label_html": "0.6", "is_correct": true}, {"label_html": "0.06", "is_correct": false}], "correct_index": 3, "explanation_html": "Experimental event rate, EER = 10 / 100 = 0.10<br><br>Control event rate, CER = 50 / 300 = 0.166<br><br>Therefore the relative risk  = EER / CER = 0.1 / 0.166 = 0.6"}], "note_html": "<b>Relative risk (RR)<\/b> is the ratio of risk in the experimental group (experimental event rate, EER) to risk in the control group (control event rate, CER)<br><br>To recap<br><ul><li>EER = rate at which events occur in the experimental group<\/li><li>CER = rate at which events occur in the control group<\/li><\/ul><br>For example, if we look at a trial comparing the use of paracetamol for back pain compared to placebo we may get the following results<br><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><\/td><td><b>Total number of patients<\/b><\/td><td><b>Experienced significant pain relief<\/b><\/td><\/tr><tr><td><b>Paracetamol<\/b><\/td><td>100<\/td><td>60<\/td><\/tr><tr><td><b>Placebo<\/b><\/td><td>80<\/td><td>20<\/td><\/tr><\/tbody><\/table><\/div><br>Experimental event rate, EER = 60 / 100 = 0.6<br><br>Control event rate, CER = 20 / 80 = 0.25<br><br>Therefore the relative risk  = EER / CER = 0.6 / 0.25 = 2.4<br><br>If the risk ratio is &gt; 1 then the rate of an event (in this case experiencing significant pain relief) is increased compared to controls. It is therefore appropriate to calculate the relative risk increase if necessary (see below).<br><br>If the risk ratio is &lt; 1 then the rate of an event is decreased compared to controls. The relative risk reduction should therefore be calculated (see below).<br><br><b>Relative risk reduction (RRR)<\/b> or <b>relative risk increase (RRI)<\/b> is calculated by dividing the absolute risk change by the control event rate<br><br>Using the above data, RRI = (EER - CER) / CER = (0.6 - 0.25) / 0.25 = 1.4 = 140%"}, {"name": "Screening test statistics", "questions": [{"number": 36, "topic": "Screening test statistics", "stem_html": "A rapid finger-prick blood test to help diagnosis deep vein thrombosis is developed. Comparing the test to current standard techniques a study is done on 1,000 patients:<br><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><\/th><th><b>DVT present<\/b><\/th><th><b>DVT absent<\/b><\/th><\/tr><\/thead><tbody><tr><td><b>New test positive<\/b><\/td><td>200<\/td><td>100<\/td><\/tr><tr><td><b>New test negative<\/b><\/td><td>20<\/td><td>680<\/td><\/tr><\/tbody><\/table><\/div><br>What is the specificity of the new test?", "options": [{"label_html": "680/880", "is_correct": false}, {"label_html": "200/220", "is_correct": false}, {"label_html": "680/780", "is_correct": true}, {"label_html": "680/700", "is_correct": false}, {"label_html": "200/300", "is_correct": false}], "correct_index": 2, "explanation_html": "Specificity =  true negatives / (true negatives + false positives)<br><br>= 680 / (680 + 100)"}, {"number": 37, "topic": "Screening test statistics", "stem_html": "A new test to screen for pulmonary embolism (PE) is used in 100 patients who present to the Emergency Department. The test is positive in 30 of the 40 patients who are proven to have a PE. Of the remaining 60 patients, only 5 have a positive test. What is the sensitivity of the new test?", "options": [{"label_html": "8.33%", "is_correct": false}, {"label_html": "30%", "is_correct": false}, {"label_html": "40%", "is_correct": false}, {"label_html": "66.66%", "is_correct": false}, {"label_html": "75%", "is_correct": true}], "correct_index": 4, "explanation_html": "A contingency table can be constructed from the above data, as shown below:<br><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><\/th><th>PE diagnosed<\/th><th>No PE<\/th><\/tr><\/thead><tbody><tr><td>Test positive<\/td><td>30<\/td><td>5<\/td><\/tr><tr><td>Test negative<\/td><td>10<\/td><td>55<\/td><\/tr><\/tbody><\/table><\/div><br>The sensitivity is therefore 30 / (30 + 10) = 75%"}], "note_html": "It would be unusual for a medical exam not to feature a question based around screening test statistics. The available data should be used to construct a contingency table as below:<br><br>TP = true positive; FP = false positive; TN = true negative; FN = false negative<br><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><\/td><td>Disease present<\/td><td>Disease absent<\/td><\/tr><tr><td>Test positive<\/td><td>TP<\/td><td>FP<\/td><\/tr><tr><td>Test negative<\/td><td>FN<\/td><td>TN<\/td><\/tr><\/tbody><\/table><\/div><br>The table below lists the main statistical terms used in relation to screening tests:<br><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td>Sensitivity<\/td><td>TP / (TP + FN )<\/td><td>Proportion of patients with the condition who have a positive test result<\/td><\/tr><tr><td>Specificity<\/td><td>TN / (TN + FP)<\/td><td>Proportion of patients without the condition who have a negative test result<\/td><\/tr><tr><td>Positive predictive value<\/td><td>TP / (TP + FP)<\/td><td>The chance that the patient has the condition if the diagnostic test is positive<\/td><\/tr><tr><td>Negative predictive value<\/td><td>TN / (TN + FN)<\/td><td>The chance that the patient does not have the condition if the diagnostic test is negative<\/td><\/tr><tr><td>Likelihood ratio for a positive test result<\/td><td>sensitivity / (1 - specificity)<\/td><td>How much the odds of the disease increase when a test is positive<\/td><\/tr><tr><td>Likelihood ratio for a negative test result<\/td><td>(1 - sensitivity) / specificity<\/td><td>How much the odds of the disease decrease when a test is negative<\/td><\/tr><\/tbody><\/table><\/div><br>Positive and negative predictive values are prevalence dependent. Likelihood ratios are not prevalence dependent"}, {"name": "Significance tests", "questions": [{"number": 38, "topic": "Significance tests", "stem_html": "Which one of the following statements best describes a type II statistical error?", "options": [{"label_html": "The p value fails to reach statistical significance", "is_correct": false}, {"label_html": "The alternative hypothesis is rejected when it is false", "is_correct": false}, {"label_html": "The null hypothesis is rejected when it is true", "is_correct": false}, {"label_html": "The null hypothesis is accepted when it is false", "is_correct": true}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 3, "explanation_html": "<p>No explanation provided.<\/p>"}], "note_html": "A null hypothesis (H0)  states that two treatments are equally effective (and is hence negatively phrased). A significance test uses the sample data to assess how likely the null hypothesis is to be correct. <br><br>For example:<br><ul><li>'there is no difference in the prevalence of colorectal cancer in patients taking low-dose aspirin compared to those who are not'<\/li><\/ul><br>The alternative hypothesis (H1) is the opposite of the null hypothesis, i.e. There is a difference between the two treatments<br><br>The p value is the probability of obtaining a result by chance at least as extreme as the one that was actually observed, assuming that the null hypothesis is true. It is therefore equal to the chance of making a type I error (see below).<br><br>Two types of errors may occur when testing the null hypothesis<br><ul><li>type I, the null hypothesis is rejected when it is true - i.e. Showing a difference between two groups when it doesn't exist, a false positive. This is determined against a preset significance level (termed alpha). As the significance level is determined in advance the chance of making a type I error is not affected by sample size. It is however increased if the number of end-points are increased. For example if a study has 20 end-points it is likely one of these will be reached, just by chance.<\/li><li>type II, the null hypothesis is accepted when it is false - i.e. Failing to spot a difference when one really exists, a false negative. The probability of making a type II error is termed beta. It is determined by both sample size and alpha<\/li><\/ul><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><\/td><td><b>Study accepts H<sub>0<\/sub><\/b><\/td><td><b>Study rejects H<sub>0<\/sub><\/b><\/td><\/tr><tr><td><b>Reality H<sub>0<\/sub><\/b><\/td><td><\/td><td>Type 1 error (alpha)<\/td><\/tr><tr><td><b>Reality H<sub>1<\/sub><\/b><\/td><td>Type 2 error (beta)<\/td><td>Power (1 - beta)<\/td><\/tr><\/tbody><\/table><\/div><br>The power of a study is the probability of (correctly) rejecting the null hypothesis when it is false<br><ul><li>power = 1 - the probability of a type II error<\/li><li>power can be increased by increasing the sample size<\/li><\/ul>"}, {"name": "Statistical error", "questions": [{"number": 39, "topic": "Statistical error", "stem_html": "In medical statistics, which of the following does a p value of 0.04 represent?", "options": [{"label_html": "Risk of type 1 Error", "is_correct": true}, {"label_html": "Risk of type 2 Error", "is_correct": false}, {"label_html": "Size of power of the study", "is_correct": false}, {"label_html": "Sample size", "is_correct": false}, {"label_html": "Number of degrees of freedom", "is_correct": false}], "correct_index": 0, "explanation_html": "P values are related to the significance levels of a statistical test and therefore are in effect measuring the risk of a type 1 error."}], "note_html": "<div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Type 1 Error<\/b><\/td><td><ul><li>Test rejects true null hypothesis<\/li><li>Rate of type 1 error is the given the value of α<\/li><li>It usually equals the significance level of a test<\/li><\/ul><\/td><\/tr><tr><td><b>Type 2 Error<\/b><\/td><td><ul><li>Test fails to reject a false null hypothesis<\/li><li>Rate of type 2 errors is given the value of β<\/li><li>It is related to the power of the test<\/li><\/ul><\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Statistics", "questions": [{"number": 40, "topic": "Statistics", "stem_html": "A surgeon has conducted a piece of research and is trying to make his non parametric data appear interesting for publication. To do this he is conducting multiple analyses of sub group data using multiple tests. Which of the tests listed below should be considered?", "options": [{"label_html": "LSD post hoc test", "is_correct": false}, {"label_html": "Bonferroni correction", "is_correct": true}, {"label_html": "Unpaired T test", "is_correct": false}, {"label_html": "Paired T test", "is_correct": false}, {"label_html": "Chi squared test", "is_correct": false}], "correct_index": 1, "explanation_html": "This is a process referred to as data dredging and can lead to erroneous results. Post hoc testing in general can be a problem in research and to try and minimise the potential for error some advocate the use of the Bonferroni method. This adjusts the test to take account of the number of tests that have been performed on the data."}, {"number": 41, "topic": "Statistics", "stem_html": "A surgical unit are conducting a study to determine whether patients who have bowel preparation have a lower risk of colonic anastomotic leakage than those having none. The planned sample size is 25. Which of the tests below is most appropriate?", "options": [{"label_html": "Paired T test", "is_correct": false}, {"label_html": "Unpaired T test", "is_correct": false}, {"label_html": "Fishers exact test", "is_correct": true}, {"label_html": "Chi squared test", "is_correct": false}, {"label_html": "LSD post hoc test", "is_correct": false}], "correct_index": 2, "explanation_html": "It is likely to be underpowered with the number provided. However, it would be possible to classify such data into a 2x2 contingency table. However, when the sample size is small, the Chi squared test is not suitable and in these situations the Fishers exact test is used."}], "note_html": "Statistics is a topic that generally strikes fear and dread into most surgeons hearts. The MRCS is not an examination designed to test mathematical skill but the examiners do expect you to have working knowledge of commonly used tests so that you can appraise the literature properly.<br><br><b>Data types<\/b><br>Before selecting a method of statistical analysis it is imperative that the type of data to be analysed is correctly categorised. Commonly used terms include nominal, ordinal, interval and continuous. <br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Term<\/b><\/th><th><b>Interpretation<\/b><\/th><\/tr><\/thead><tbody><tr><td>Nominal<\/td><td>Data can be allocated a numerical code that is arbitrary. For example allocating people as alive or dead using codes of 0 or 1<\/td><\/tr><tr><td>Ordinal data<\/td><td>Data using numbers that can be used on a scale. Severity of pain is often measured in this way<\/td><\/tr><tr><td>Interval scale<\/td><td>Data is measured numerically. However, the zero point is arbitrary<\/td><\/tr><tr><td>Continuous<\/td><td>Data is measured numerically where the numerical value is a real number and may be any value. Examples include height and weight<\/td><\/tr><\/tbody><\/table><\/div><br><b>Analysing data<\/b><br>Having ascribed the data it is then possible to begin the process of analysis. Nominal data is often tabulated into categories because of the nature of the underlying data sets. Continuous data may be displayed graphically often as individual data points. When the sample size is large enough, continuous data can be analysed to determine the distribution of the data points. Often, but not always these will be in the form of a gaussian distribution. Determining whether data is normally distributed or not is key to making sense of the subsequent statistical tests. Parametric tests are used to test normally distributed data, the T Test is one of the best examples. Data which is not normally distributed cannot be analysed in this way and a non parametric test must be used. Examples of such tests include Chi Squared and Mann Whitney U tests. Chi squared tests often appear in the medical literature. There are some assumptions that are made in relation to Chi squared tests; these include the need to use 2 degrees of freedom (usually) and the minimum sample size. Where the sample size is small then a different test is appropriate and the Fishers exact test is often used. <br>In situations where data is normally distributed and paired samples are taken from the same individuals (such as following an intervention) then the paired T Test may be used. <br><br><b>Multiple testing and post hoc analysis<\/b><br>In the ideal world statistical analysis is conducted on data that is collected prospectively according to pre set power calculations and defined end points. Occasionally, data does not produce an expected outcome or a certain type of patient appears to have a different result. Subsequent analysis of such groups is termed a post hoc analysis. This can be perfectly legitimate, alternatively it can represent the last ditch attempt of a researcher to try and find any aspect of the data that is worthwhile. This can lead to errors and false rejection of a null hypothesis. A statistically significant result is more likely to occur if the same dataset is subjected to multiple analyses. To counteract this problem some researchers will apply a Bonferroni correction, this adjusts the analysis to allow for multiple testing."}, {"name": "Study design", "questions": [{"number": 42, "topic": "Study design", "stem_html": "As part of a research project you are trying to ascertain whether the use of dummies in infants is linked to sudden infant death syndrome. What is the most appropriate form of study design?", "options": [{"label_html": "Randomised controlled trial", "is_correct": false}, {"label_html": "Cross-over trial", "is_correct": false}, {"label_html": "Cross-sectional survey", "is_correct": false}, {"label_html": "Case-control study", "is_correct": true}, {"label_html": "Cohort study", "is_correct": false}], "correct_index": 3, "explanation_html": "As sudden infant death syndrome is relatively rare a case-control design is more appropriate than a cohort study."}, {"number": 43, "topic": "Study design", "stem_html": "A cohort study is being designed to look at the relationship between smoking and breast cancer. What is the usual outcome measure in a cohort study?", "options": [{"label_html": "Odds ratio", "is_correct": false}, {"label_html": "Experimental event rate", "is_correct": false}, {"label_html": "Relative risk", "is_correct": true}, {"label_html": "Absolute risk increase", "is_correct": false}, {"label_html": "Numbers needed to harm", "is_correct": false}], "correct_index": 2, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Cohort studies - relative risk<\/div>"}], "note_html": "The following table highlights the main features of the main types of study:<br><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td>Randomised controlled trial<\/td><td>Participants randomly allocated to intervention or control group (e.g. standard treatment or placebo)<br><br> Practical or ethical problems may limit use<\/td><\/tr><tr><td>Cohort study<\/td><td>Observational and prospective. Two (or more) are selected according to their exposure to a particular agent (e.g. medicine, toxin) and followed up to see how many develop a disease or other outcome.<br><br>The usual outcome measure is the relative risk.<br><br> Examples include Framingham Heart Study<\/td><\/tr><tr><td>Case-control study<\/td><td>Observational and retrospective. Patients with a particular condition (cases) are identified and matched with controls.  Data is then collected on past exposure to a possible causal agent for the condition.<br><br>The usual outcome measure is the odds ratio.<br><br> Inexpensive, produce quick results<br> Useful for studying rare conditions<br> Prone to confounding<\/td><\/tr><tr><td>Cross-sectional survey<\/td><td>Provide a 'snapshot', sometimes called prevalence studies<br><br> Provide weak evidence of cause and effect<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Study design: evidence and recommendations", "questions": [{"number": 44, "topic": "Study design: evidence and recommendations", "stem_html": "A group of surgeons conduct a meta analysis of randomised controlled trials comparing the use of analgesic regimes following laparoscopic cholecystectomy. What level of evidence is provided by such an analysis?", "options": [{"label_html": "V", "is_correct": false}, {"label_html": "I", "is_correct": true}, {"label_html": "II", "is_correct": false}, {"label_html": "III", "is_correct": false}, {"label_html": "IV", "is_correct": false}], "correct_index": 1, "explanation_html": "<p>No explanation provided.<\/p>"}], "note_html": "Levels of evidence<br><ul><li>I - evidence from meta-analysis of randomised controlled trials<\/li><li>II - evidence from at least one well designed controlled trial which is not randomised <\/li><li>III - evidence from correlation and comparative studies or use of historical controls<\/li><li>IV - evidence from case series<\/li><li>V - Expert opinion or founded on basic principles<\/li><\/ul><br>Knowledge of the sub groups of the levels of evidence are not routinely tested in MRCS Part A.<br><br>Grading of recommendation<br><ul><li>Grade A - based on evidence from at least one randomised controlled trial (i.e. Ia or Ib)<\/li><li>Grade B - based on evidence from non-randomised controlled trials (i.e. IIa, IIb or III)<\/li><li>Grade C - based on evidence from a panel of experts (i.e. IV)<\/li><\/ul>"}]}</script>
  <script>
    const quizData = JSON.parse(document.getElementById("quiz-data").textContent);
    const app = document.getElementById("app");
    const modeButtons = Array.from(document.querySelectorAll("[data-mode-button]"));
    const topicActionButtons = Array.from(document.querySelectorAll("[data-topic-action]"));

    const state = {
      mode: "solve",
      answers: new Map(),
      questionRefs: [],
    };

    function buildTopic(topic, questionOffset) {
      const details = document.createElement("details");
      details.className = "topic";
      details.open = true;

      const summary = document.createElement("summary");
      summary.innerHTML = `
        <div>
          <h2 class="topic-title">${topic.name}</h2>
        </div>
        <div class="topic-meta">
          <span>${topic.questions.length} questions</span>
          <span class="chevron" aria-hidden="true">></span>
        </div>
      `;

      const body = document.createElement("div");
      body.className = "topic-body";

      if (topic.note_html) {
        const notes = document.createElement("details");
        notes.className = "topic-notes";

        const notesSummary = document.createElement("summary");
        notesSummary.innerHTML = `
          <span class="topic-notes-title">Notes</span>
          <span class="chevron" aria-hidden="true">></span>
        `;

        const notesBody = document.createElement("div");
        notesBody.className = "topic-notes-body rich-text";
        notesBody.innerHTML = topic.note_html;

        notes.appendChild(notesSummary);
        notes.appendChild(notesBody);
        body.appendChild(notes);
      }

      topic.questions.forEach((question, indexInTopic) => {
        const globalIndex = questionOffset + indexInTopic;
        body.appendChild(buildQuestionCard(question, globalIndex));
      });

      details.appendChild(summary);
      details.appendChild(body);
      return details;
    }

    function buildQuestionCard(question, questionIndex) {
      const card = document.createElement("article");
      card.className = "question-card is-hidden";
      card.dataset.questionIndex = String(questionIndex);

      const label = document.createElement("p");
      label.className = "question-label";
      label.textContent = `Question ${question.number}`;

      const stem = document.createElement("div");
      stem.className = "stem rich-text";
      stem.innerHTML = question.stem_html;

      const options = document.createElement("div");
      options.className = "options";

      const optionButtons = question.options.map((option, optionIndex) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "option";
        button.dataset.optionIndex = String(optionIndex);
        button.innerHTML = option.label_html;
        button.addEventListener("click", () => {
          if (state.mode !== "solve") {
            return;
          }
          state.answers.set(questionIndex, optionIndex);
          applyQuestionState(questionIndex);
        });
        options.appendChild(button);
        return button;
      });

      const explanation = document.createElement("div");
      explanation.className = "explanation rich-text";
      explanation.innerHTML = `<span class="explanation-label">Explanation</span>${question.explanation_html}`;

      card.appendChild(label);
      card.appendChild(stem);
      card.appendChild(options);
      card.appendChild(explanation);

      state.questionRefs[questionIndex] = {
        card,
        explanation,
        optionButtons,
        question,
      };

      applyQuestionState(questionIndex);
      return card;
    }

    function applyQuestionState(questionIndex) {
      const ref = state.questionRefs[questionIndex];
      if (!ref) {
        return;
      }

      const { card, optionButtons, question } = ref;
      const selectedIndex = state.answers.get(questionIndex);
      const hasSelection = selectedIndex !== undefined;
      const isReview = state.mode === "review";
      const showExplanation = isReview || hasSelection;

      card.classList.toggle("is-hidden", !showExplanation);

      optionButtons.forEach((button, optionIndex) => {
        button.classList.remove("correct", "incorrect", "neutral-revealed");

        if (isReview) {
          button.disabled = true;
          if (optionIndex === question.correct_index) {
            button.classList.add("correct");
          } else {
            button.classList.add("neutral-revealed");
          }
          return;
        }

        button.disabled = false;
        if (!hasSelection) {
          return;
        }

        if (optionIndex === question.correct_index) {
          button.classList.add("correct");
        } else if (optionIndex === selectedIndex) {
          button.classList.add("incorrect");
        } else {
          button.classList.add("neutral-revealed");
        }
      });
    }

    function renderApp() {
      if (!quizData.topics.length) {
        const empty = document.createElement("div");
        empty.className = "empty-state";
        empty.textContent = "No questions were found in this JSON file.";
        app.replaceChildren(empty);
        return;
      }

      const wrapper = document.createElement("div");
      wrapper.className = "topic-list";

      let questionOffset = 0;
      quizData.topics.forEach((topic) => {
        wrapper.appendChild(buildTopic(topic, questionOffset));
        questionOffset += topic.questions.length;
      });

      app.replaceChildren(wrapper);
    }

    function setMode(mode) {
      state.mode = mode;
      modeButtons.forEach((button) => {
        const isActive = button.dataset.modeButton === mode;
        button.classList.toggle("active", isActive);
        button.setAttribute("aria-pressed", String(isActive));
      });

      state.questionRefs.forEach((_, index) => applyQuestionState(index));
    }

    function setAllTopics(open) {
      document.querySelectorAll(".topic").forEach((topic) => {
        topic.open = open;
      });
    }

    modeButtons.forEach((button) => {
      button.addEventListener("click", () => setMode(button.dataset.modeButton));
    });

    topicActionButtons.forEach((button) => {
      button.addEventListener("click", () => {
        setAllTopics(button.dataset.topicAction === "expand");
      });
    });

    renderApp();
    setMode("solve");
  </script>
</body>
</html>
