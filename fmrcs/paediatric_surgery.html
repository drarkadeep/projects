hild has VACTERL, which is a combination of Vertebral, Ano-rectal, Cardiac, Tracheo-oesophageal, Renal and Radial limb anomalies. Half of babies with oesophageal atresia will have VACTERL. Problems that occur during feeding are more suggestive of proximal pathology."}, {"number": 46, "topic": "Paediatric Gastrointestinal disorders", "stem_html": "A 6 day old baby was born prematurely at 33 weeks. He has been suffering from respiratory distress syndrome and has been receiving ventilatory support on NICU. He has developed abdominal distension and is increasingly septic. Ultrasound of the abdomen shows free fluid and evidence of small bowel dilatation. His blood pressure has remained labile despite inotropic support. What is the best course of action?", "options": [{"label_html": "Laparoscopy", "is_correct": false}, {"label_html": "Laparotomy", "is_correct": true}, {"label_html": "Contrast enema", "is_correct": false}, {"label_html": "Upper GI contrast study", "is_correct": false}, {"label_html": "MRI abdomen", "is_correct": false}], "correct_index": 1, "explanation_html": "He has necrotising enterocolitis and whilst this is often initially managed medically, a laparotomy is required if the situation deteriorates."}, {"number": 47, "topic": "Paediatric Gastrointestinal disorders", "stem_html": "Which of the following is not a feature of oesphageal atresia in neonates?", "options": [{"label_html": "High incidence of polyhydramnios", "is_correct": false}, {"label_html": "Risk of recurrence in subsequent pregnancies of 80%", "is_correct": true}, {"label_html": "Distal tracheoesphageal fistula is the commonest variant", "is_correct": false}, {"label_html": "High incidence of associated imperforate anus", "is_correct": false}, {"label_html": "Absence of gastric fluid on antenatal ultrasound", "is_correct": false}], "correct_index": 1, "explanation_html": "Most are sporadic and risk in subsequent pregnancies is not increased."}, {"number": 48, "topic": "Paediatric Gastrointestinal disorders", "stem_html": "Which of the following statements relating to omphalocele is false?", "options": [{"label_html": "The herniated organs lie outside the peritoneal sac", "is_correct": true}, {"label_html": "Cardiac abnormalities co-exist in 25%", "is_correct": false}, {"label_html": "The caecum is usually right sided", "is_correct": false}, {"label_html": "The defect occurs through the umbilicus", "is_correct": false}, {"label_html": "Mortality may be as high as 15%", "is_correct": false}], "correct_index": 0, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Gastroschisis: Isolated abnormality, bowel lies outside abdominal wall through defect located to right of umbilicus.<br>Exomphalos: Liver and gut remain covered with membranous sac connected to umbilical cord. It is associated with other developmental defects.<\/div>They are contained within the peritoneal sac and therefore do not have the fluid losses seen in gastroschisis. True malrotation is unusual and minor variants may not result in a requirement for surgery."}, {"number": 49, "topic": "Paediatric Gastrointestinal disorders", "stem_html": "Which of the following statements relating to necrotising enterocolitis is false?", "options": [{"label_html": "It has a mortality of 30%", "is_correct": false}, {"label_html": "Most frequently presents in premature neonates less than 32 weeks gestation.", "is_correct": false}, {"label_html": "Should be managed by early laparotomy and segmental resections in most cases.", "is_correct": true}, {"label_html": "Pneumostosis intestinalis may be visible on plain abdominal x-ray.", "is_correct": false}, {"label_html": "May be minimised by use of breast milk over formula feeds.", "is_correct": false}], "correct_index": 2, "explanation_html": "Most cases will settle with conservative management with NG decompression and appropriate support. Laparotomy should be undertaken in patients who do not who progress despite conservative management or in whom compelling indications for surgery exist (eg free air)."}], "note_html": "<div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Pyloric stenosis<\/b><\/td><td><ul><li>M&gt;F<\/li><li>5-10% Family history in parents<\/li><li>Projectile non bile stained vomiting at 4-6 weeks of life<\/li><li>Diagnosis is made by test feed or USS<\/li><li> Treatment: Ramstedt pyloromyotomy (open or laparoscopic)<\/li><\/ul><\/td><\/tr><tr><td><b>Acute appendicitis<\/b><\/td><td><ul><li>Uncommon under 3 years<\/li><li>When occurs may present atypically<\/li><\/ul><\/td><\/tr><tr><td><b>Mesenteric adenitis<\/b><\/td><td><ul><li>Central abdominal pain and URTI<\/li><li>Conservative management<\/li><\/ul><\/td><\/tr><tr><td><b>Intussusception<\/b><\/td><td><ul><li>Telescoping bowel<\/li><li>Proximal to  or at the level of, ileocaecal valve<\/li><li> 6-9 months age<\/li><li> Colicky pain, diarrhoea and vomiting, sausage shaped mass, red jelly stool.<\/li><li> Treatment: reduction with air insufflation<\/li><\/ul><\/td><\/tr><tr><td><b>Malrotation<\/b><\/td><td><ul><li>High caecum at the midline<\/li><li>Feature in exomphalos, congenital diaphragmatic hernia, intrinsic duodenal atresia<\/li><li>May be complicated by development of volvulus, infant with volvulus may have bile stained vomiting<\/li><li>Diagnosis is made by upper GI contrast study and USS<\/li><li>Treatment is by laparotomy, if volvulus is present (or at high risk of occurring then a ladds procedure is performed<\/li><\/ul><\/td><\/tr><tr><td><b>Hirschsprung's disease<\/b><\/td><td><ul><li>Absence of ganglion cells from myenteric and submucosal plexuses<\/li><li>Occurs in 1/5000 births<\/li><li>Full thickness rectal biopsy for diagnosis<\/li><li>Delayed passage of meconium and abdominal distension<\/li><li>Treatment is with rectal washouts initially, thereafter an anorectal pull through procedure<\/li><\/ul><\/td><\/tr><tr><td><b>Oesophageal atresia<\/b><\/td><td><ul><li>Associated with tracheo-oesophageal fistula and polyhydramnios<\/li><li> May present with choking and cyanotic spells following aspiration<\/li><li>VACTERL associations<\/li><\/ul><\/td><\/tr><tr><td><b>Meconium ileus<\/b><\/td><td><ul><li>Usually delayed passage of meconium and abdominal distension<\/li><li>Majority have cystic fibrosis<\/li><li>X-Rays may not show a fluid level as the meconium is viscid (depends upon feeding), PR contrast studies may dislodge meconium plugs and be therapeutic<\/li><li>Infants who do not respond to PR contrast and NG N-acetyl cysteine will require surgery to remove the plugs<\/li><\/ul><\/td><\/tr><tr><td><b>Biliary atresia<\/b><\/td><td><ul><li>Jaundice &gt; 14 days<\/li><li>Increased conjugated bilirubin<\/li><li>Urgent Kasai procedure<\/li><\/ul><\/td><\/tr><tr><td><b>Necrotising enterocolitis<\/b><\/td><td><ul><li>Prematurity is the main risk factor<\/li><li>Early features include abdominal distension and passage of bloody stools<\/li><li>X-Rays may show pneumatosis intestinalis and evidence of free air<\/li><li>Increased risk when empirical antibiotics are given to infants beyond 5 days<\/li><li>Treatment is with total gut rest and TPN, babies with perforations will require laparotomy<\/li><\/ul><\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Paediatric inguinal hernia", "questions": [{"number": 50, "topic": "Paediatric inguinal hernia", "stem_html": "A 12 day old infant is brought to the emergency department by his anxious mother who notices that he has developed a right sided groin swelling. On examination the testes are correctly located but it is evident that the child has a right sided inguinal hernia. It is soft and easily reduced. What is the most appropriate management?", "options": [{"label_html": "Surgery over the next few days", "is_correct": true}, {"label_html": "Reassure and discharge", "is_correct": false}, {"label_html": "Surgery at 1 year of age", "is_correct": false}, {"label_html": "Surgery once the child is 6 months old", "is_correct": false}, {"label_html": "Application of a hernia truss", "is_correct": false}], "correct_index": 0, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Inguinal hernia in infants = Urgent surgery<\/div>The high incidence of strangulation necessitates an urgent herniotomy be performed. In infants with a reducible hernia this can be performed on a daycase list during the same week. Deferring surgery on the basis of age is not justified."}, {"number": 51, "topic": "Paediatric inguinal hernia", "stem_html": "A 2 year old boy is reviewed in the clinic and found to have a right sided inguinal hernia. What is the best course of action?", "options": [{"label_html": "Review the child at 5 years of age", "is_correct": false}, {"label_html": "Undertake an inguinal herniotomy procedure", "is_correct": true}, {"label_html": "Undertake an inguinal herniorraphy procedure with placement of synthetic mesh", "is_correct": false}, {"label_html": "Undertake an inguinal herniorraphy procedure with absorbable sutures", "is_correct": false}, {"label_html": "Undertake an inguinal herniorraphy procedure with non absorbable sutures", "is_correct": false}], "correct_index": 1, "explanation_html": "An inguinal herniotomy is optimal treatment. Herniorraphy is offered for adult hernias and addresses anatomical weakness of the posterior wall of the inguinal canal."}], "note_html": "Inguinal hernias are a common disorder in children. They are commoner in males as the testis migrates from its location on the posterior abdominal wall, down through the inguinal canal. A patent processus vaginalis may persist and be the site of subsequent hernia development. <br>Children presenting in the first few months of life are at the highest risk of strangulation and the hernia should be repaired urgently. Children over 1 year of age are at lower risk and surgery may be performed electively. For paediatric hernias a herniotomy without implantation of mesh is sufficient. Most cases are performed as day cases, neonates and premature infants are kept in hospital overnight as there is a recognised increased risk of post operative apnoea."}, {"name": "Paediatric orthopaedics", "questions": [{"number": 52, "topic": "Paediatric orthopaedics", "stem_html": "A 4 year boy presents with an abnormal gait. He has a history of recent viral illness. His WCC is 11 and ESR is 30. What is the most likely cause?", "options": [{"label_html": "Perthes disease", "is_correct": false}, {"label_html": "Transient synovitis", "is_correct": true}, {"label_html": "Septic arthritis", "is_correct": false}, {"label_html": "Slipped upper femoral epiphysis", "is_correct": false}, {"label_html": "Osteomyelitis", "is_correct": false}], "correct_index": 1, "explanation_html": "Viral illnesses can be associated with transient synovitis. The WCC should ideally be &gt; 12 and the ESR &gt; 40 to suggest septic arthritis."}, {"number": 53, "topic": "Paediatric orthopaedics", "stem_html": "A 6 year old boy presents with groin pain. He is known to be disruptive in class. He reports that he is bullied for being short. On examination, he has an antalgic gait and pain on internal rotation of the right hip. What is the most likely diagnosis?", "options": [{"label_html": "Perthes disease", "is_correct": true}, {"label_html": "Transient synovitis", "is_correct": false}, {"label_html": "Slipped upper femoral epiphysis", "is_correct": false}, {"label_html": "Developmental dysplasia of the hip", "is_correct": false}, {"label_html": "Septic arthritis", "is_correct": false}], "correct_index": 0, "explanation_html": "This child is short, has hyperactivity (disruptive behaviour) and is within the age range for Perthes disease. Hyperactivity and short stature are associated with Perthes disease."}, {"number": 54, "topic": "Paediatric orthopaedics", "stem_html": "An obese 12 year old boy is referred with pain in the left knee and hip. On examination, he has an antalgic gait and limitation of internal rotation. His knee has normal range of passive and active movement. What is the most likely diagnosis?", "options": [{"label_html": "Septic arthritis", "is_correct": false}, {"label_html": "Developmental dysplasia of the hip", "is_correct": false}, {"label_html": "Perthes disease", "is_correct": false}, {"label_html": "Osteoarthritis of the hip", "is_correct": false}, {"label_html": "Slipped upper femoral epiphysis", "is_correct": true}], "correct_index": 4, "explanation_html": "Slipped upper femoral epiphysis is commonest in obese adolescent males. The x-ray will show displacement of the femoral epiphysis inferolaterally. Treatment is usually with rest and non weight bearing crutches."}, {"number": 55, "topic": "Paediatric orthopaedics", "stem_html": "A 30 year old man presents with severe pain in the left hip it has been present on and off for many years. He was born at 39 weeks gestation by emergency caesarean section after a long obstructed breech delivery. He was slow to walk and as a child was noted to have an antalgic gait. He was a frequent attender at the primary care centre and the pains dismissed as growing pains. X-rays show almost complete destruction of the femoral head and a narrow acetabulum. What is the most likely underlying disease process?", "options": [{"label_html": "Developmental dysplasia of the hip", "is_correct": true}, {"label_html": "Slipped upper femoral epiphysis", "is_correct": false}, {"label_html": "Extra capsular fracture of the femoral neck", "is_correct": false}, {"label_html": "Rheumatoid arthritis", "is_correct": false}, {"label_html": "Perthes disease", "is_correct": false}], "correct_index": 0, "explanation_html": "Developmental dysplasia of the hip. Usually diagnosed by Barlow and Ortolani tests in early childhood. Most Breech deliveries are also routinely subjected to USS of the hip joint. At this young age an arthrodesis may be preferable to hip replacement."}, {"number": 56, "topic": "Paediatric orthopaedics", "stem_html": "A 6 year old boy presents with pain in the hip it is present on activity and has been worsening over the past few weeks. There is no history of trauma. He was born by normal vaginal delivery at 38 weeks gestation On examination he has an antalgic gait and limitation of active and passive movement of the hip joint in all directions. C-reactive protein is mildly elevated at 10 but the white cell count is normal. What is the most likely diagnosis?", "options": [{"label_html": "Perthes disease", "is_correct": true}, {"label_html": "Septic arthritis", "is_correct": false}, {"label_html": "Slipped upper femoral epiphysis", "is_correct": false}, {"label_html": "Developmental dysplasia of the hip", "is_correct": false}, {"label_html": "Osteoarthritis", "is_correct": false}], "correct_index": 0, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Early plain x-ray changes in Perthes Disease:<br>Widening of the joint space.<br>Sub chondral linear lucency.<\/div>This is a typical presentation for Perthes disease. X-ray may show flattening of the femoral head or fragmentation in more advanced cases."}, {"number": 57, "topic": "Paediatric orthopaedics", "stem_html": "An obese 14 year old boy presents with difficulty running and mild knee and hip pain. There is no antecedent history of trauma. On examination, internal rotation is restricted but the knee is normal with full range of passive movement possible and no evidence of effusions. Both the C-reactive protein and white cell count are normal. What is the most likely cause?", "options": [{"label_html": "Perthes disease", "is_correct": false}, {"label_html": "Slipped upper femoral epiphysis", "is_correct": true}, {"label_html": "Non accidental injury", "is_correct": false}, {"label_html": "Septic arthritis", "is_correct": false}, {"label_html": "Osteoarthritis", "is_correct": false}], "correct_index": 1, "explanation_html": "Slipped upper femoral epiphysis is the commonest adolescent hip disorder. It occurs most commonly in obese males. It may often present as knee pain which is usually referred from the ipsilateral hip. The knee itself is normal. The hip often limits internal rotation. The diagnosis is easily missed. X-rays will show displacement of the femoral epiphysis and the degree of its displacement may be calculated using the Southwick angle. Treatment is directed at preventing further slippage which may result in avascular necrosis of the femoral head."}, {"number": 58, "topic": "Paediatric orthopaedics", "stem_html": "An obese 12 year old boy presents with knee pain. On examination, he has pain on internal rotation of the hip. His knee is clinically normal. What is the most appropriate investigation?", "options": [{"label_html": "USS hip", "is_correct": false}, {"label_html": "CT scan of the hip", "is_correct": false}, {"label_html": "Radinucleotide scan", "is_correct": false}, {"label_html": "Hip X-ray", "is_correct": true}, {"label_html": "Anteroposterior pelvic x-ray", "is_correct": false}], "correct_index": 3, "explanation_html": "The main differential diagnosis in a boy over 10 years old is of slipped upper femoral epiphysis. Knee pain is a common presenting feature. An anteroposterior pelvic x-ray may miss a minor slip, therefore request a hip film."}, {"number": 59, "topic": "Paediatric orthopaedics", "stem_html": "A baby is delivered in the breech position. Barlows and Ortolani tests are normal. What is the most appropriate course of action?", "options": [{"label_html": "Reassure and discharge the patient", "is_correct": false}, {"label_html": "Reassess the patient at 3 years", "is_correct": false}, {"label_html": "Arrange a hip USS", "is_correct": true}, {"label_html": "Arrange a hip X-ray", "is_correct": false}, {"label_html": "Arrange a hip CT scan", "is_correct": false}], "correct_index": 2, "explanation_html": "This child is at risk of developmental dysplasia of the hip (up to 20% will have DDH), so should have the hip joints scanned to exclude this."}, {"number": 60, "topic": "Paediatric orthopaedics", "stem_html": "A 5 year old boy presents with a painful limp. The symptoms have been present for 8 weeks. Two hip x-rays have been performed and appear normal. What is the best course of action?", "options": [{"label_html": "Arrange a hip USS", "is_correct": false}, {"label_html": "Arrange a hip CT scan", "is_correct": false}, {"label_html": "Arrange a hip MRI", "is_correct": true}, {"label_html": "Arrange a further hip X-ray", "is_correct": false}, {"label_html": "Discharge and reassure", "is_correct": false}], "correct_index": 2, "explanation_html": "Perthes disease should be suspected in boys over 4 years old presenting with a limp. Early disease can be missed on x-ray. An MRI will often demonstrate areas of hypoperfusion and subtle changes that allow for earlier diagnosis. A bone scan is an alternative option."}], "note_html": "<div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Diagnosis<\/b><\/th><th><b>\tMode of presentation<\/b><\/th><th><b>\tTreatment<\/b><\/th><th><b>\tRadiology<\/b><\/th><\/tr><\/thead><tbody><tr><td>Developmental dysplasia of the hip\t<\/td><td>Usually diagnosed in infancy by screening tests. May be bilateral, when disease is unilateral there may be leg length inequality. As disease progresses child may limp and then early onset arthritis. More common in extended breech babies.<\/td><td>Splints and harnesses or traction. In later years osteotomy and hip realignment procedures may be needed. In arthritis a joint replacement may be needed. However, this is best deferred if possible as it will almost certainly require revision<\/td><td>Initially no obvious change on plain films and USS gives best resolution until 3 months of age. On plain films Shentons line should form a smooth arc<\/td><\/tr><tr><td>Perthes Disease<\/td><td>\tHip pain (may be referred to the knee) usually occurring between 5 and 12 years of age. Bilateral disease in 20%. \t<\/td><td>Remove pressure from joint to allow normal development. Physiotherapy. Usually self-limiting if diagnosed and treated promptly.\t<\/td><td>X-rays will show flattened femoral head. Eventually in untreated cases the femoral head will fragment.<\/td><\/tr><tr><td>Slipped upper femoral epiphysis\t<\/td><td>Typically seen in obese male adolescents. Pain is often referred to the knee. Limitation to internal rotation is usually seen. Knee pain is usually present 2 months prior to hip slipping. Bilateral in 20%.\t<\/td><td>Bed rest and non-weight bearing. Aim to avoid avascular necrosis. If severe slippage or risk of it occurring then percutaneous pinning of the hip may be required.<\/td><td>X-rays will show the femoral head displaced and falling inferolaterally (like a melting ice cream cone) The Southwick angle gives indication of disease severity<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Paediatric proctology", "questions": [{"number": 61, "topic": "Paediatric proctology", "stem_html": "A 4 year old boy is brought to the clinic. He gives a history of difficult, painful defecation with bright red rectal bleeding. What is the most likely diagnosis?", "options": [{"label_html": "Crohns disease", "is_correct": false}, {"label_html": "Ulcerative colitis", "is_correct": false}, {"label_html": "Anal fissure", "is_correct": true}, {"label_html": "Haemorrhoids", "is_correct": false}, {"label_html": "Juvenile polyp", "is_correct": false}], "correct_index": 2, "explanation_html": "Painful rectal bleeding in this age group is typically due to a fissure. Treatment should include stool softeners and lifestyle advice."}, {"number": 62, "topic": "Paediatric proctology", "stem_html": "A 2 year old has a history of rectal bleeding. The parents notice that post defecation, a cherry red lesion is present at the anal verge. What is the most likely diagnosis?", "options": [{"label_html": "Haemorrhoids", "is_correct": false}, {"label_html": "Villous adenoma", "is_correct": false}, {"label_html": "Juvenile polyp", "is_correct": true}, {"label_html": "Peri anal abscess", "is_correct": false}, {"label_html": "Anal fissure", "is_correct": false}], "correct_index": 2, "explanation_html": "These lesions are usually hamartomas and this accounts for the colour of the lesions. Although the lesions are not themselves malignant they serve as a marker of an underlying polyposis disorder."}, {"number": 63, "topic": "Paediatric proctology", "stem_html": "A 12 year old boy is brought to the clinic with history of weight loss and bloody diarrhoea. Abdominal examination is unremarkable. What is the most likely diagnosis?", "options": [{"label_html": "Colorectal cancer", "is_correct": false}, {"label_html": "Inflammatory bowel disease", "is_correct": true}, {"label_html": "Irritable bowel syndrome", "is_correct": false}, {"label_html": "Munchausen syndrome", "is_correct": false}, {"label_html": "Viral gastroenteritis", "is_correct": false}], "correct_index": 1, "explanation_html": "The systemic features in the history are strongly suggestive of inflammatory bowel disease rather than the other causes. Colorectal cancer is almost unheard of at this age."}], "note_html": "Children may present with altered bowel habit and/ or rectal bleeding. Classical haemorroidal disease is relatively rare in children. Painful bright red rectal bleeding is much more common since constipation is a relatively common childhood disorder. The hard stool causes a tear of the ano-rectal mucosa with subsequent fissure. The pain from the fissure must be addressed promptly or the child will delay defecation and this fissure will worsen.<br><br>Inflammatory bowel disease may present in a similar pattern in paediatric practice with altered bowel habit (usually diarrhoea) and bleeding. Systemic features may be present and investigation with an endoscopy may be required.<br><br>Children with intussceception usually present at a relatively young age and the history is usually one of colicky abdominal pain, together with a mass on clinical examination.The often cited red current jelly type stool is a rare but classical feature.<br><br>Juvenile polyps may occur as part of the familial polyposis coli syndromes. The lesions, which are hamartomas, are often cherry red if they protrude externally."}, {"name": "Paediatric umbilical disorders", "questions": [{"number": 64, "topic": "Paediatric umbilical disorders", "stem_html": "A 2 week old baby is referred to the surgical team by the paediatricians. They are concerned because the child has a painful area of macerated tissue at the site of the umbilicus. On examination, a clear- yellowish fluid is seen to be draining from the umbilicus when the baby cries. What is the most likely diagnosis?", "options": [{"label_html": "Omphalitis", "is_correct": false}, {"label_html": "Umbilical granuloma", "is_correct": false}, {"label_html": "Persistent vitello-intestinal duct", "is_correct": false}, {"label_html": "Patent urachus", "is_correct": true}, {"label_html": "Isolated cellular remnants", "is_correct": false}], "correct_index": 3, "explanation_html": "A patent urachus will present with umbilical urinary discharge. The skin may become macerated if not properly cared for. The discharge is most likely to be present when intra-abdominal pressure is raised. It is associated with posterior urethral valves."}, {"number": 65, "topic": "Paediatric umbilical disorders", "stem_html": "A premature neonate is born by emergency cesarean section at 29 weeks gestation. He initially seems to be progressing well. However, the team are concerned because he has become septic and on examination has a swollen and erythematous umbilicus. What is the most likely diagnosis?", "options": [{"label_html": "Patent urachus", "is_correct": false}, {"label_html": "Patent vitello--intestinal duct", "is_correct": false}, {"label_html": "Omphalitis", "is_correct": true}, {"label_html": "Umbilical granuloma", "is_correct": false}, {"label_html": "Pyogenic granuloma", "is_correct": false}], "correct_index": 2, "explanation_html": "Infection from omphalitis may spread rapidly and cause severe sepsis especially in immunologically compromised, premature neonates."}, {"number": 66, "topic": "Paediatric umbilical disorders", "stem_html": "A baby boy is born by elective cesarean section at 39 weeks gestation. He initially seems to progress well and is discharged from hospital the following day. The parents bring the child to the clinic at 10 days of age and are concerned at the presence of a profuse and foul smelling discharge at the site of the umbilicus. On examination, the umbilicus has some prominent granulation tissue. When the baby cries a small trickle of brownish fluid is seen to pass from the umbilicus. What is the most likely cause?", "options": [{"label_html": "Omphalitis", "is_correct": false}, {"label_html": "Patent vitello-intestinal duct", "is_correct": true}, {"label_html": "Patent urachus", "is_correct": false}, {"label_html": "Pyogenic granuloma", "is_correct": false}, {"label_html": "Umbilical hernia", "is_correct": false}], "correct_index": 1, "explanation_html": "A persistent vitello-intestinal duct may allow the persistent and ongoing discharge of small bowel content from the umbilicus. This fluid may be very irritant to the surrounding skin."}, {"number": 67, "topic": "Paediatric umbilical disorders", "stem_html": "At what age should children with otherwise uncomplicated umbilical hernias be considered for surgery?", "options": [{"label_html": "Within the first few days of life", "is_correct": false}, {"label_html": "6 months of age", "is_correct": false}, {"label_html": "12 months of age", "is_correct": false}, {"label_html": "18 months of age", "is_correct": false}, {"label_html": "After 3 years of age", "is_correct": true}], "correct_index": 4, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Many umbilical hernias will close in the first year of life. Defer surgery until the child is 3 years or older.<\/div>"}], "note_html": "<b>Embryology<\/b><br>During development the umbilicus has two umbilical arteries and one umbilical vein. The arteries are continuous with the internal iliac arteries and the vein is continuous with the falciform ligament (ductus venosus). After birth the cord dessicates and separates and the umbilical ring closes. <br><br><b>Umbilical hernia<\/b><br>Up to 20% of neonates may have an umbilical hernia, it is more common in premature infants. The majority of these hernias will close spontaneously (may take between 12 months and three years). Strangulation is rare.<br><br><b>Paraumbilical hernia<\/b><br>These are due to defects in the linea alba that are in close proximity to the umbilicus. The edges of a paraumbilical hernia are more clearly defined than those of an umbilical hernia. They are less likely to resolve spontaneously than an umbilical hernia.<br><br><b>Omphalitis<\/b><br>This condition consists of infection of the umbilicus. Infection with <i>Staphylococcus aureus<\/i> is the commonest cause. The condition is potentially serious as infection may spread rapidly through the umbilical vessels in neonates with a risk of portal pyaemia, and portal vein thrombosis. Treatment is usually with a combination of topical and systemic antibiotics.<br><br><b>Umbilical granuloma<\/b><br>These consist of cherry red lesions surrounding the umbilicus, they may bleed on contact and be a site of seropurulent discharge. Infection is unusual and they will often respond favorably to chemical cautery with topically applied silver nitrate. <br><br><b>Persistent urachus<\/b><br>This is characterised by urinary discharge from the umbilicus. It is caused by persistence of the urachus which attaches to the bladder. They are associated with other urogenital abnormalities. <br><br><b>Persistent vitello-intestinal duct<\/b><br>This will typically present as an umbilical discharge that discharges small bowel content. Complete persistence of the duct is a rare condition. Much more common is the persistence of part of the duct (Meckels diverticulum). Persistent vitello-intestinal ducts are best imaged using a contrast study to delineate the anatomy and are managed by laparotomy and surgical closure."}, {"name": "Pyloric stenosis", "questions": [{"number": 68, "topic": "Pyloric stenosis", "stem_html": "A 4 week old baby is developing well and develops profuse and projectile vomiting after feeds. He has been losing weight and the vomit is described as being non bilious. What is the most likely underlying pathology?", "options": [{"label_html": "Duodenal atresia", "is_correct": false}, {"label_html": "Ileal atresia", "is_correct": false}, {"label_html": "Hypertrophy of the pyloric sphincter", "is_correct": true}, {"label_html": "Achalasia cardia", "is_correct": false}, {"label_html": "Intestinal malrotation", "is_correct": false}], "correct_index": 2, "explanation_html": "A history of projective vomiting and weight loss is a common story suggestive of pyloric stenosis. The vomit is often not bile stained. Diagnosis is further suggested by hypochloraemic metabolic alkalosis and a palpable tumour on test feeding."}], "note_html": "Pyloric stenosis typically presents in the second to fourth weeks of life with vomiting, although rarely may present later at up to four months. It is caused by hypertrophy of the circular muscles of the pylorus<br><br>Epidemiology<br><ul><li>incidence of 4 per 1,000 live births<\/li><li>4 times more common in males<\/li><li>10-15% of infants have a positive family history<\/li><li>first-borns are more commonly affected<\/li><\/ul><br>Features<br><ul><li>'projectile' vomiting, typically 30 minutes after a feed<\/li><li>constipation and dehydration may also be present<\/li><li>a palpable mass may be present in the upper abdomen<\/li><li>hypochloraemic, hypokalaemic alkalosis due to persistent vomiting<\/li><\/ul><br>Diagnosis is most commonly made by ultrasound or test feed<br><br>Management is with Ramstedt pyloromyotomy"}, {"name": "Septic arthritis- Paediatric", "questions": [{"number": 69, "topic": "Septic arthritis- Paediatric", "stem_html": "In paediatric orthopaedic surgery, which of the following does not fulfill the Kocher criteria for septic arthritis?", "options": [{"label_html": "ESR &gt; 40mm/h", "is_correct": false}, {"label_html": "Positive blood culture", "is_correct": true}, {"label_html": "Fever", "is_correct": false}, {"label_html": "White cell count &gt; 12, 000", "is_correct": false}, {"label_html": "Non weight bearing on the affected side", "is_correct": false}], "correct_index": 1, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Kocher's 'WIFE' is:<br><br>WCC &gt;12 <br>Inability to weight bear <br>Fever <br>ESR &gt;40<br> = &gt;90 chance of septic arthritis<\/div><b>Kocher criteria<\/b> <br>1. Non weight bearing on affected side<br>2. ESR &gt; 40 mm/hr<br>3. Fever<br>4. WBC count of &gt;12,000 mm<sup>3<\/sup><br>- When 4/4 criteria are met, there is a 99% chance that the child has septic arthritis<br><br>The Kocher criteria do not consider blood culture results."}, {"number": 70, "topic": "Septic arthritis- Paediatric", "stem_html": "A 4 year old boy presents to the Emergency Department with a two-day history of fever, difficulty walking and is unable to weight bear on the right leg. He has been on oral Amoxycillin 250 mg three times a day for a chest infection over the last five days. He is irritable with a temperature of 39.4<sup>o<\/sup>C. He does not allow examination and keeps his right hip flexed and adducted. Blood tests are, (WBC) 18.3 (CRP) 146, haemoglobin 11.3 g/dL. What is the most likely diagnosis?", "options": [{"label_html": "Acute avascular necrosis of the hip", "is_correct": false}, {"label_html": "Dislocation of the hip", "is_correct": false}, {"label_html": "Perthes disease", "is_correct": false}, {"label_html": "Septic arthritis", "is_correct": true}, {"label_html": "Slipped upper femoral epiphysis", "is_correct": false}], "correct_index": 3, "explanation_html": "Septic arthritis in children may develop from osteomyelitis. This is particularly so in neonates whose transphyseal vessels allow spread into the joint in joints with an intraarticular metaphysis. It can arise as a result of the haematogenous spread of infection. Pus is chondrolytic and therefore this is a surgical emergency.  Joint aspirates show high WCC and low glucose. Organisms may be seen. <br><div class=\"alert alert-warning\"><b>Factors favoring septic arthritis<\/b><br>WCC &gt; 12<br>ESR &gt;40 <br>Inability to weight bear<br>Fever &gt;38.5<br><\/div>"}], "note_html": "<b>Septic arthritis<\/b><br><ul><li>Staph aureus commonest organism<\/li><li>Urgent washout and antibiotics otherwise high risk of joint destruction<\/li><\/ul><br><b>Diagnosis<\/b><br><ul><li>Plain x-rays<\/li><li>Consider aspiration<\/li><li>Utilise the Kocher criteria (see below)<\/li><\/ul><br><b>Kocher criteria: <\/b><br>1. Non weight bearing on affected side<br>2. ESR &gt; 40 mm/hr<br>3. Fever<br>4. WBC count of &gt;12,000 mm<sup>3<\/sup><br>- when 4/4 criteria are met, there is a 99% chance that the child has septic arthritis<br><br><b>Treatment<\/b><br>Surgical drainage of the affected joint is required, this should be done as soon as possible since permanent damage to the joint may occur. In some cases repeated procedures are necessary. Appropriate intravenous antibiotics should be administered."}, {"name": "Talipes Equinovarus", "questions": [{"number": 71, "topic": "Talipes Equinovarus", "stem_html": "Which of the following is not a typical feature of talipes equinovarus?", "options": [{"label_html": "Adducted and inverted calcaneus", "is_correct": false}, {"label_html": "Medial displacement of the navicular bone", "is_correct": false}, {"label_html": "It is nearly always unilateral", "is_correct": true}, {"label_html": "Wedge shaped head of talus", "is_correct": false}, {"label_html": "Severe Tibio-talar plantar flexion", "is_correct": false}], "correct_index": 2, "explanation_html": "It is bilateral in 50% of cases."}], "note_html": "<b>Congenital talipes equinovarus.<\/b><br>Features:<br><ul><li>Equinus of the hindfoot<\/li><li>Adduction and varus of the midfoot<\/li><li>High arch<\/li><\/ul><br>Most cases in developing countries. Incidence in UK is 1 per 1000 live births. It is more common in males and is bilateral in 50% cases. There is a strong familial link(1). It may also be associated with other developmental disorders such as Down's syndrome. <br><br><b>Key anatomical deformities<\/b> (2):<br><ul><li>Adducted and inverted calcaneus<\/li><li>Wedge shaped distal calcaneal articular surface<\/li><li>Severe Tibio-talar plantar flexion<\/li><li>Medial Talar neck inclination<\/li><li>Displacement of the navicular bone (medially)<\/li><li>Wedge shaped head of talus<\/li><li>Displacement of the cuboid (medially)<\/li><\/ul><br><b>Management<\/b><br>Conservative first, the Ponseti method is best described and gives comparable results to surgery. It consists of serial casting to mold the foot into correct shape. Following casting around 90% will require a Achilles tenotomy. This is then followed by a phase of walking braces to maintain the correction. <br><br>Surgical correction is reserved for those cases that fail to respond to conservative measures. The procedures involve multiple tenotomies and lengthening procedures. In patients who fail to respond surgically an Ilizarov frame reconstruction may be attempted and gives good results.<br><br><b>References<\/b><br>1.            Wynne-Davies R, Littlejohn A, Gormley J. Aetiology and interrelationship of some common skeletal deformities. (Talipes equinovarus and calcaneovalgus, metatarsus varus, congenital dislocation of the hip, and infantile idiopathic scoliosis). J Med Genet. 1982 Oct;19(5):321-8.<br>2.            Horn BD, Davidson RS. Current treatment of clubfoot in infancy and childhood. Foot Ankle Clin. 2010 Jun;15(2):235-43.<br>3.            Clarke NM, Uglow MG, Valentine KM. Comparison of Ponseti Versus Surgical Treatment in Congenital Talipes Equinovarus. J Foot Ankle Surg. 2011 Jun 14."}, {"name": "Testicular disorders-paediatric", "questions": [{"number": 72, "topic": "Testicular disorders-paediatric", "stem_html": "A 13 month old boy is brought to the surgical clinic by his mother because his left testicle is not located in the scrotum. At which of the following sites would the testicle be located if it were an ectopic testis?", "options": [{"label_html": "Canalicular", "is_correct": false}, {"label_html": "Inguinal", "is_correct": false}, {"label_html": "External inguinal ring", "is_correct": false}, {"label_html": "Superficial inguinal pouch", "is_correct": true}, {"label_html": "High scrotal", "is_correct": false}], "correct_index": 3, "explanation_html": "Ectopic testes are those that come to lie outside the normal range of embryological descent (i.e. in the superficial inguinal pouch). Other sites of ectopic testes include; base of penis, femoral triangle and perineum."}, {"number": 73, "topic": "Testicular disorders-paediatric", "stem_html": "A child presents to the emergency department with sudden onset scrotal pain 4 hours previously. On examination, the testis is elevated and tender. The child has eaten some chips in the waiting room. What is the best course of action?", "options": [{"label_html": "Administration of analgesic block and manipulation of the testis", "is_correct": false}, {"label_html": "Fast for 3 hours and then take to theatre for scrotal exploration", "is_correct": false}, {"label_html": "Immediate scrotal exploration under general anaesthesia", "is_correct": true}, {"label_html": "Arrange urgent scrotal ultrasound", "is_correct": false}, {"label_html": "Administration of regional local anaesthetic block and explore scrotum immediately", "is_correct": false}], "correct_index": 2, "explanation_html": "This is a likely torsion so surgery cannot be deferred. Local anaesthetic scrotal exploration is likely to be very poorly tolerated. Delay of surgery and USS are not appropriate. Immediate exploration under GA with appropriate airway protection in place."}], "note_html": "<b>Testicular disorders<\/b><br>Testicular disorders are some of the commonest conditions present in paediatric urological practice.<br><br><b>Cryptorchidism<\/b><br><ul><li>The embryological descent of the testicle from within the abdominal cavity may be subject to a number of variations. Distinctions need to be made clinically from a non descended testis and a testis that is retractile. <\/li><li>Testis that lie outside the normal path of embryological descent are termed ectopic testis. Undescended testis occurs in 1% of male infants. Where the testis does not lie in an intra scrotal location, its location should be ascertained (by laparoscopy in first instance). Where both testes are absent, the infant may be intersex. <\/li><li>MRI scanning may reveal intra-abdominal testes; however a GA is often needed to perform this investigation in this age group. <\/li><li>Testes that are undescended should be placed in the scrotum after 1 year of age, as the testosterone surge that may facilitate descent occurs at 6 months of age.     <\/li><li>Where the testes lie distally e.g. Superficial inguinal pouch an open orchidopexy is the procedure of choice. <\/li><li>With abdominal testes a laparoscopy should be performed. The risk of seminoma is increased in individuals with a non descended testes and this risk is not reduced by orchidopexy. <\/li><\/ul><br><b>Testicular torsion<\/b><br><ul><li>Typically the patient has severe sudden onset of scrotal pain. The difficulty in paediatric practice is the lack of clear history. <\/li><li>On examination the testis is tender and enlarged. <\/li><li>Management is by surgical exploration. <\/li><li>Delay beyond 6 hours is associated with low salvage rates. <\/li><li>A torted hyatid produces pain that is far more localised and the testis itself should feel normal. However, diagnostic doubt often exists and in such cases surgical exploration is warranted. <\/li><\/ul><br><b>Hydrocele<\/b><br><ul><li>Occur secondary to patent processus vaginalis<\/li><li>Present as fluid filling in scrotum or as cyst of the spermatic cord<\/li><li>Communicating hydroceles are treated by a trans inguinal ligation of the PPV<\/li><li>Cystic hydroceles in older children may be treated with scrotal exploration<\/li><\/ul>"}, {"name": "Vesicoureteric reflux", "questions": [{"number": 74, "topic": "Vesicoureteric reflux", "stem_html": "What is the investigation of choice to look for renal scarring in a child with vesicoureteric reflux?", "options": [{"label_html": "Abdominal x-ray", "is_correct": false}, {"label_html": "Ultrasound", "is_correct": false}, {"label_html": "DMSA", "is_correct": true}, {"label_html": "CT KUB", "is_correct": false}, {"label_html": "Micturating cystourethrogram", "is_correct": false}], "correct_index": 2, "explanation_html": "<p>No explanation provided.<\/p>"}], "note_html": "Vesicoureteric reflux (VUR) is the abnormal backflow of urine from the bladder into the ureter and kidney. It is relatively common abnormality of the urinary tract in children and predisposes to urinary tract infection (UTI), being found in around 30% of children who present with a UTI. As around 35% of children develop renal scarring it is important to investigate for VUR in children following a UTI<br><br>Pathophysiology of VUR<br><ul><li>ureters are displaced laterally, entering the bladder in a more perpendicular fashion than at an angle<\/li><li>therefore shortened intramural course of ureter<\/li><li>vesicoureteric junction cannot therefore function adequately <\/li><\/ul><br>The table below summarises the grading of VUR<br><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td>{Grade}<\/td><td><\/td><\/tr><tr><td>I<\/td><td>Reflux into the ureter only, no dilatation<\/td><\/tr><tr><td>II<\/td><td>Reflux into the renal pelvis on micturition, no dilatation<\/td><\/tr><tr><td>III<\/td><td>Mild/moderate dilatation of the ureter, renal pelvis and calyces<\/td><\/tr><tr><td>IV<\/td><td>Dilation of the renal pelvis and calyces with moderate ureteral tortuosity<\/td><\/tr><tr><td>V<\/td><td>Gross dilatation of the ureter, pelvis and calyces with ureteral tortuosity<\/td><\/tr><\/tbody><\/table><\/div><br>Investigation<br><ul><li>VUR is normally diagnosed following a micturating cystourethrogram<\/li><li>a DMSA scan may also be performed to look for renal scarring<\/li><\/ul>"}]}</script>
  <script>
    const quizData = JSON.parse(document.getElementById("quiz-data").textContent);
    const app = document.getElementById("app");
    const modeButtons = Array.from(document.querySelectorAll("[data-mode-button]"));
    const topicActionButtons = Array.from(document.querySelectorAll("[data-topic-action]"));

    const state = {
      mode: "solve",
      answers: new Map(),
      questionRefs: [],
    };

    function buildTopic(topic, questionOffset) {
      const details = document.createElement("details");
      details.className = "topic";
      details.open = true;

      const summary = document.createElement("summary");
      summary.innerHTML = `
        <div>
          <h2 class="topic-title">${topic.name}</h2>
        </div>
        <div class="topic-meta">
          <span>${topic.questions.length} questions</span>
          <span class="chevron" aria-hidden="true">></span>
        </div>
      `;

      const body = document.createElement("div");
      body.className = "topic-body";

      if (topic.note_html) {
        const notes = document.createElement("details");
        notes.className = "topic-notes";

        const notesSummary = document.createElement("summary");
        notesSummary.innerHTML = `
          <span class="topic-notes-title">Notes</span>
          <span class="chevron" aria-hidden="true">></span>
        `;

        const notesBody = document.createElement("div");
        notesBody.className = "topic-notes-body rich-text";
        notesBody.innerHTML = topic.note_html;

        notes.appendChild(notesSummary);
        notes.appendChild(notesBody);
        body.appendChild(notes);
      }

      topic.questions.forEach((question, indexInTopic) => {
        const globalIndex = questionOffset + indexInTopic;
        body.appendChild(buildQuestionCard(question, globalIndex));
      });

      details.appendChild(summary);
      details.appendChild(body);
      return details;
    }

    function buildQuestionCard(question, questionIndex) {
      const card = document.createElement("article");
      card.className = "question-card is-hidden";
      card.dataset.questionIndex = String(questionIndex);

      const label = document.createElement("p");
      label.className = "question-label";
      label.textContent = `Question ${question.number}`;

      const stem = document.createElement("div");
      stem.className = "stem rich-text";
      stem.innerHTML = question.stem_html;

      const options = document.createElement("div");
      options.className = "options";

      const optionButtons = question.options.map((option, optionIndex) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "option";
        button.dataset.optionIndex = String(optionIndex);
        button.innerHTML = option.label_html;
        button.addEventListener("click", () => {
          if (state.mode !== "solve") {
            return;
          }
          state.answers.set(questionIndex, optionIndex);
          applyQuestionState(questionIndex);
        });
        options.appendChild(button);
        return button;
      });

      const explanation = document.createElement("div");
      explanation.className = "explanation rich-text";
      explanation.innerHTML = `<span class="explanation-label">Explanation</span>${question.explanation_html}`;

      card.appendChild(label);
      card.appendChild(stem);
      card.appendChild(options);
      card.appendChild(explanation);

      state.questionRefs[questionIndex] = {
        card,
        explanation,
        optionButtons,
        question,
      };

      applyQuestionState(questionIndex);
      return card;
    }

    function applyQuestionState(questionIndex) {
      const ref = state.questionRefs[questionIndex];
      if (!ref) {
        return;
      }

      const { card, optionButtons, question } = ref;
      const selectedIndex = state.answers.get(questionIndex);
      const hasSelection = selectedIndex !== undefined;
      const isReview = state.mode === "review";
      const showExplanation = isReview || hasSelection;

      card.classList.toggle("is-hidden", !showExplanation);

      optionButtons.forEach((button, optionIndex) => {
        button.classList.remove("correct", "incorrect", "neutral-revealed");

        if (isReview) {
          button.disabled = true;
          if (optionIndex === question.correct_index) {
            button.classList.add("correct");
          } else {
            button.classList.add("neutral-revealed");
          }
          return;
        }

        button.disabled = false;
        if (!hasSelection) {
          return;
        }

        if (optionIndex === question.correct_index) {
          button.classList.add("correct");
        } else if (optionIndex === selectedIndex) {
          button.classList.add("incorrect");
        } else {
          button.classList.add("neutral-revealed");
        }
      });
    }

    function renderApp() {
      if (!quizData.topics.length) {
        const empty = document.createElement("div");
        empty.className = "empty-state";
        empty.textContent = "No questions were found in this JSON file.";
        app.replaceChildren(empty);
        return;
      }

      const wrapper = document.createElement("div");
      wrapper.className = "topic-list";

      let questionOffset = 0;
      quizData.topics.forEach((topic) => {
        wrapper.appendChild(buildTopic(topic, questionOffset));
        questionOffset += topic.questions.length;
      });

      app.replaceChildren(wrapper);
    }

    function setMode(mode) {
      state.mode = mode;
      modeButtons.forEach((button) => {
        const isActive = button.dataset.modeButton === mode;
        button.classList.toggle("active", isActive);
        button.setAttribute("aria-pressed", String(isActive));
      });

      state.questionRefs.forEach((_, index) => applyQuestionState(index));
    }

    function setAllTopics(open) {
      document.querySelectorAll(".topic").forEach((topic) => {
        topic.open = open;
      });
    }

    modeButtons.forEach((button) => {
      button.addEventListener("click", () => setMode(button.dataset.modeButton));
    });

    topicActionButtons.forEach((button) => {
      button.addEventListener("click", () => {
        setAllTopics(button.dataset.topicAction === "expand");
      });
    });

    renderApp();
    setMode("solve");
  </script>
</body>
</html>
