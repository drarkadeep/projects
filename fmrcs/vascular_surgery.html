a bilateral occlusion of the common iliac arteries that is not suitable for stenting. What is the most appropriate intervention?", "options": [{"label_html": "Aorto-bifemoral bypass", "is_correct": true}, {"label_html": "Axillo-bifemoral bypass", "is_correct": false}, {"label_html": "Bilateral transfermoral amputation", "is_correct": false}, {"label_html": "Femoro-femoro cross over graft", "is_correct": false}, {"label_html": "Femoro-popliteal bypass", "is_correct": false}], "correct_index": 0, "explanation_html": "In a young patient consideration should be given to aorto-bifemoral bypass grafts as these have the best long term functional outcome compared with an axillo-bifemoral bypass graft."}, {"number": 48, "topic": "Peripheral vascular disease", "stem_html": "A 78 year old man presents with left sided rest pain in his leg and a non healing arterial leg ulcer on the same leg. Imaging shows normal right leg vessels, on the left side there is a long occlusion of the external iliac artery that is unsuitable for stenting. He has a significant cardiac history. What is the most appropriate treatment option?", "options": [{"label_html": "Aorto-bifemoral bypass", "is_correct": false}, {"label_html": "Axillo-bifemoral bypass", "is_correct": false}, {"label_html": "Femoro-femoro cross over graft", "is_correct": true}, {"label_html": "Femoro-distal bypass", "is_correct": false}, {"label_html": "Amputation", "is_correct": false}], "correct_index": 2, "explanation_html": "Femoro-femoral cross over grafts are an option for treatment of iliac occlusions in patients with significant co-morbidities and healthy contralateral vessels. In reality, the idealised situation presented here seldom applies and the opposite vessels usually have some disease and one must be careful not to damage the healthy side."}, {"number": 49, "topic": "Peripheral vascular disease", "stem_html": "A 72 year old man present in the vascular clinic with calf pain present on walking 100 yards. He is an ex-smoker and lives alone. On examination, he has reasonable leg pulses. His right dorsalis pedis pulse gives a monophasic doppler signal with an ankle brachial pressure index measurement of 0.7. All other pressures are acceptable. There is no evidence of ulceration or gangrene. What is the best course of action?", "options": [{"label_html": "Conservative management with medical therapy and exercise", "is_correct": true}, {"label_html": "Angioplasty", "is_correct": false}, {"label_html": "Arterial bypass surgery with PTFE graft", "is_correct": false}, {"label_html": "Arterial bypass surgery with vein graft", "is_correct": false}, {"label_html": "Watch and wait", "is_correct": false}], "correct_index": 0, "explanation_html": "Structured exercise programmes combined with medical therapy will improve many patients. Should his symptoms worsen or fail to improve then a more comprehensive work up should be considered."}, {"number": 50, "topic": "Peripheral vascular disease", "stem_html": "An 83 year old lady is admitted from a nursing home with infected lower leg ulcers. She underwent an attempted long superficial femoral artery sub initimal angioplasty 2 weeks previously. This demonstrated poor runoff below the knee. What is the best course of action?", "options": [{"label_html": "Below knee amputation with Burgess flap", "is_correct": false}, {"label_html": "Below knee amputation with skew flaps", "is_correct": false}, {"label_html": "Transfemoral amputation", "is_correct": true}, {"label_html": "Gritti Stokes amputation", "is_correct": false}, {"label_html": "Wound debridement", "is_correct": false}], "correct_index": 2, "explanation_html": "The best option here is to opt for early amputation or simply palliate the patient. Above knee surgery would be needed, attempts to offer a below knee amputation would probably fail."}, {"number": 51, "topic": "Peripheral vascular disease", "stem_html": "A 63 year old man who previously smoked 20 cigarettes a day and has newly diagnosed type II diabetes. He presents with rest pain. A diagnostic angiogram demonstrates occlusion of the distal superficial femoral artery continuing below the knee. He has reasonable posterior tibial artery below this level which branches to give good runoff to the foot. He has varicose veins. Which of the strategies presented below is most appropriate?", "options": [{"label_html": "Femoro-distal bypass graft using long saphenous vein", "is_correct": false}, {"label_html": "Femoro-above knee popliteal bypass graft using PTFE", "is_correct": false}, {"label_html": "Femoro-distal bypass graft using PTFE", "is_correct": false}, {"label_html": "Femoro-distal bypass graft using PTFE and Miller cuff", "is_correct": true}, {"label_html": "Above knee amputation", "is_correct": false}], "correct_index": 3, "explanation_html": "This man needs a bypass operation. Using PTFE alone will not give a good result as sub intimal hyperplasia will give poor outcome early. Using a vein cuff (Miller cuff) at the end of a PTFE graft will improve the situation. Varicose veins means that vein cannot be reliably used as a conduit. However, the construction of a Miller vein cuff can be done with vein from another anatomical site."}, {"number": 52, "topic": "Peripheral vascular disease", "stem_html": "A wheelchair bound 78 year old woman with ischaemic heart disease secondary to long smoking history and longstanding type II diabetes presents with rest pain and a non healing ulcer on the dorsum of her foot. Angiogram shows reasonable superficial femoral artery and iliacs. At the level of the popliteal artery there is an occlusion. Below this there is a short area of patent posterior tibial artery and this reconstitutes lower down the leg to flow to the foot. What is the best treatment option?", "options": [{"label_html": "Long sub intimal angioplasty", "is_correct": false}, {"label_html": "Femoro-distal bypass graft with PTFE", "is_correct": false}, {"label_html": "Above knee amputation", "is_correct": true}, {"label_html": "Below knee amputation", "is_correct": false}, {"label_html": "Axillo-femoral bypass", "is_correct": false}], "correct_index": 2, "explanation_html": "A femoro-distal bypass graft would carry a high risk of failure and risk of peri-operative myocardial infarct. This lady would be well suited to primary amputation as she is not ambulant."}, {"number": 53, "topic": "Peripheral vascular disease", "stem_html": "Which of the following is not a typical feature of an arterial leg ulcer?", "options": [{"label_html": "Well demarcated edges", "is_correct": false}, {"label_html": "A grey - white base to the ulcer", "is_correct": false}, {"label_html": "Men are affected more than women", "is_correct": false}, {"label_html": "Painful", "is_correct": false}, {"label_html": "Ankle swelling", "is_correct": true}], "correct_index": 4, "explanation_html": "Ankle swelling is often absent. If present it may be due to mixed arteriovenous disease. With mixed disease the arterial component is treated first."}, {"number": 54, "topic": "Peripheral vascular disease", "stem_html": "Which of the following is not a feature of a Charcot foot?", "options": [{"label_html": "Bounding foot pulses in the early phases", "is_correct": false}, {"label_html": "Often occurs in the complete absence of trauma", "is_correct": true}, {"label_html": "Erythema of the foot in the early phase", "is_correct": false}, {"label_html": "Autonomic neuropathy", "is_correct": false}, {"label_html": "Peripheral neuropathy", "is_correct": false}], "correct_index": 1, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Do not confuse the early phase of Charcot foot with cellulitis<\/div>Trauma (even if only minor) is a prerequisite. Patients cannot usually recall the traumatic event. The associated neuropathy means that patients continue to walk on the affected foot with subsequent deformity developing over time."}], "note_html": "<b>Indications for surgery to revascularise the lower limb<\/b><br><ul><li>Intermittent claudication<\/li><li>Critical ischaemia<\/li><li>Ulceration <\/li><li>Gangrene <\/li><\/ul><br>Intermittent claudication that is not disabling may provide a relative indication, whilst the other complaints are often absolute indications depending upon the frailty of the patient.<br><br><b>Assessment<\/b><br><ul><li>Clinical examination<\/li><li>Ankle brachial pressure index measurement<\/li><li>Duplex arterial ultrasound<\/li><li>Angiography (standard, CT or MRI): usually performed only if intervention being considered.<\/li><\/ul><br><b>Angioplasty<\/b><br>In order for angioplasty to be undertaken successfully the artery has to be accessible. The lesion relatively short and reasonable distal vessel runoff. Longer lesions may be amenable to sub-intimal angioplasty.<br><br><b>Surgery<\/b><br>Surgery will be undertaken where attempts at angioplasty have either failed or are unsuitable. Bypass essentially involves bypassing the affected arterial segment by utilising a graft to run from above the disease to below the disease. As with angioplasty good runoff improves the outcome.<br><br><b>Some key concepts with bypass surgery<\/b><br><br><b>Superficial femoral artery occlusion to the above knee popliteal<\/b><br>In the ideal scenario, vein (either in situ or reversed LSV) would be used as a conduit. However, prosthetic material has reasonable 5 year patency rates and some would advocate using this in preference to vein so that vein can be used for other procedures in the future. In general terms either technique is usually associated with an excellent outcome (if run off satisfactory).<br><br><b>Procedure<\/b><br><ul><li>Artery dissected out, IV heparin 3,000 units given and then the vessels are cross clamped<\/li><li>Longitudinal arteriotomy<\/li><li>Graft cut to size and tunneled to arteriotomy sites<\/li><li>Anastomosis to femoral artery usually with 5/0 'double ended' Prolene suture <\/li><li>Distal anastomosis usually using 6/0 'double ended' Prolene <\/li><\/ul><br><b>Distal disease<\/b><br><ul><li>Femoro-distal bypass surgery takes longer to perform, is more technically challenging and has higher failure rates. <\/li><li>In elderly diabetic patients with poor runoff a primary amputation may well be a safer and more effective option. There is no point in embarking on this type of surgery in patients who are wheelchair bound.<\/li><li>In femorodistal bypasses vein gives superior outcomes to PTFE.<\/li><\/ul><br><b>Rules<\/b><br><ul><li>Vein mapping 1st to see whether there is suitable vein (the preferred conduit). Sub intimal hyperplasia occurs early when PTFE is used for the distal anastomosis and will lead to early graft occlusion and failure.<\/li><li>Essential operative procedure as for above knee fem-pop.<\/li><li>If there is insufficient vein for the entire conduit then vein can be attached to the end of the PTFE graft and then used for the distal anastomosis. This type of 'vein boot' is technically referred to as a Miller Cuff and is associated with better patency rates than PTFE alone.<\/li><li>Remember the more distal the arterial anastomosis the lower the success rate.<\/li><\/ul><br><b>References<\/b><br>Peach G <i>et al<\/i>. Diagnosis and management of peripheral arterial disease. <i>BMJ<\/i> 2012; 345: 36-41."}, {"name": "Tetralogy of Fallot", "questions": [{"number": 55, "topic": "Tetralogy of Fallot", "stem_html": "Which one of the following is least associated with Tetralogy of Fallot?", "options": [{"label_html": "Right ventricular outflow tract obstruction", "is_correct": false}, {"label_html": "Overriding aorta", "is_correct": false}, {"label_html": "Pan systolic murmur", "is_correct": false}, {"label_html": "Left-to-right shunt", "is_correct": true}, {"label_html": "Right ventricular hypertrophy", "is_correct": false}], "correct_index": 3, "explanation_html": "Right-to-left shunting is characteristic of Fallot's. In some patients there can be bidirectional shunting (if there is mild pulmonary stenosis) and a few patients can even have pink tetralogy when there is a predominant shunt from left to right due to minimal infundibular stenosis."}], "note_html": "Tetralogy of Fallot (TOF) is the most common cause of cyanotic congenital heart disease*. It typically presents at around 1-2 months, although may not be picked up until the baby is 6 months old<br><br>The four characteristic features are:<br><ul><li>ventricular septal defect (VSD)<\/li><li>right ventricular hypertrophy<\/li><li>right ventricular outflow tract obstruction, pulmonary stenosis<\/li><li>overriding aorta<\/li><\/ul><br>The severity of the right ventricular outflow tract obstruction determines the degree of cyanosis and clinical severity<br><br>Other features<br><ul><li>cyanosis<\/li><li>causes a right-to-left shunt<\/li><li>ejection systolic murmur due to pulmonary stenosis (the VSD doesn't usually cause a murmur)<\/li><li>a right-sided aortic arch is seen in 25% of patients<\/li><li>chest x-ray shows a 'boot-shaped' heart, ECG shows right ventricular hypertrophy<\/li><\/ul><br>Management<br><ul><li>surgical repair is often undertaken in two parts<\/li><li>cyanotic episodes may be helped by beta-blockers to reduce infundibular spasm<\/li><\/ul><br>*however, at birth transposition of the great arteries is the more common lesion as patients with TOF generally present at around 1-2 months"}, {"name": "Vascular disorders of the upper limb", "questions": [{"number": 56, "topic": "Vascular disorders of the upper limb", "stem_html": "A 73 year old male presents with a collapse and is brought to the emergency department. On examination, he has a cold, painful left hand and forearm. What is the most likely cause?", "options": [{"label_html": "Occlusion of the brachial artery due to atheroma", "is_correct": false}, {"label_html": "Occlusion of the axillary artery due to atheroma", "is_correct": false}, {"label_html": "Axillary vein thrombosis", "is_correct": false}, {"label_html": "Cervical rib", "is_correct": false}, {"label_html": "Brachial artery embolus", "is_correct": true}], "correct_index": 4, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Atheroma is very rare in the upper limb vessels<\/div>The most likely event is one of embolism, because of the acute nature of the condition there is no time for the development of a collateral circulation so the limb is usually pale and painful. Emboli usually occur as a result of atrial fibrillation. Fast atrial fibrillation can cause syncope and an acute embolus."}, {"number": 57, "topic": "Vascular disorders of the upper limb", "stem_html": "A 73 year old male presents with a collapse and is brought to the emergency department. On examination, he has a cold, painful left hand and forearm. What is the most likely cause?", "options": [{"label_html": "Occlusion of the brachial artery due to atheroma", "is_correct": false}, {"label_html": "Occlusion of the axillary artery due to atheroma", "is_correct": false}, {"label_html": "Axillary vein thrombosis", "is_correct": false}, {"label_html": "Cervical rib", "is_correct": false}, {"label_html": "Brachial artery embolus", "is_correct": true}], "correct_index": 4, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Atheroma is very rare in the upper limb vessels<\/div>The most likely event is one of embolism, because of the acute nature of the condition there is no time for the development of a collateral circulation so the limb is usually pale and painful. Emboli usually occur as a result of atrial fibrillation. Fast atrial fibrillation can cause syncope and an acute embolus."}, {"number": 58, "topic": "Vascular disorders of the upper limb", "stem_html": "A 23 year old man presents with intermittent symptoms of altered sensation in his arm and discomfort when he uses his hand. He works as an electrician and his symptoms are worst when he is fitting light fixtures. What is the most likely cause?", "options": [{"label_html": "Cervical rib", "is_correct": true}, {"label_html": "Axillary artery embolus", "is_correct": false}, {"label_html": "Axillary vein thrombosis", "is_correct": false}, {"label_html": "Raynaud's", "is_correct": false}, {"label_html": "Atheroma of the subclavian artery", "is_correct": false}], "correct_index": 0, "explanation_html": "Compression of the thoracic outlet by the fibrous band of the rib can result in both neurological and circulatory compromise. When manual tasks are performed in which the hand works overhead the signs and symptoms will be maximal and this is the basis of Adsons test."}], "note_html": "Upper limb arterial disease is less common than lesions causing symptoms in the lower limb. The upper limb circulation may be affected by embolic events, stenotic lesions (both internal and extrinsic), inflammatory disorders and venous diseases. <br>The anatomy of the collateral circulation of the arterial inflow may impact on the history and nature of disease presentation. In the region of the subclavian and axillary arteries the collateral vessels passing around the shoulder joint may provide pathways for flow if the main vessels are stenotic or occluded. During periods of increased metabolic demand the collateral flow is not sufficient and the vertebral arteries may have diminished flow. This may result in diminished flow to the brain with neurological sequelae such as syncope. <br><br><b>Vascular disease of the upper limb<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Condition<\/b><\/td><td><b>Features<\/b><\/td><\/tr><tr><td>Axillary/ brachial embolus<\/td><td><ul><li>50% of upper limb emboli will lodge in the brachial artery<\/li><li>30% of upper limb emboli will lodge in the axillary artery<\/li><li>Sudden onset of symptoms; pain, pallor, paresis, pulselessness, paraesthesia<\/li><li>Sources are left atrium with cardiac arrhythmia (mainly AF), mural thrombus<\/li><li>Cardiac arrhythmias may result in impaired consciousness in addition to the embolus<\/li><\/ul><\/td><\/tr><tr><td>Arterial occlusions<\/td><td><ul><li>Those resulting from atheroma are the most common, trauma may result in vascular changes and long term occlusion but this is rare<\/li><li>Features may include claudication, ulceration and gangrene. Proximally sited lesions may result in subclavian steal syndrome<\/li><li>The progressive nature of the disease allows development of collaterals, acute ischaemia may occur as a result of acute thrombosis<\/li><\/ul><\/td><\/tr><tr><td>Raynaud's disease<\/td><td><ul><li>Idiopathic condition affecting young females<\/li><li>Usually affects hands &gt; feet<\/li><li>Digits become: white →blue →red<\/li><li>Treatment is with calcium antagonists<\/li><\/ul><\/td><\/tr><tr><td>Upper limb venous thrombosis<\/td><td><ul><li>Gradual onset of upper limb swelling and discomfort.<\/li><li>Sensation and motor function are normal<\/li><li>Condition may complicate pre-existing malignancy (especially breast cancer) or arise as a result of repetitive use of the limb in a task such as painting a ceiling<\/li><li>The condition is diagnosed with duplex ultrasound and treatment is with anticoagulation<\/li><\/ul><\/td><\/tr><tr><td>Cervical rib<\/td><td><ul><li>0.2-0.4% incidence<\/li><li>Consist of an anomalous fibrous band that often originates from C7 and may arc towards, but rarely reaches the sternum<\/li><li>Congenital cases may present around the third decade, some cases are reported to occur following trauma<\/li><li>Bilateral in up to 70%<\/li><li>Compression of the subclavian artery may produce absent radial pulse on clinical examination and in particular may result in a positive Adsons test (lateral flexion of the neck away from symptomatic side and traction of the symptomatic arm- leads to obliteration of radial pulse)<\/li><li>Treatment is most commonly undertaken when there is evidence of neurovascular compromise. A transaxillary approach is the traditional operative method for excision<\/li><\/ul><\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Vascular investigations", "questions": [{"number": 59, "topic": "Vascular investigations", "stem_html": "A 65 year old man presents with expressive dysphasia and right sided weakness over 4 hours. His symptoms have now completely resolved. An MRI scan of his head is normal. What is the most useful investigation?", "options": [{"label_html": "Arch aortogram", "is_correct": false}, {"label_html": "Arterial duplex scan", "is_correct": true}, {"label_html": "24 hour cardiac tape", "is_correct": false}, {"label_html": "Implantation of a reveal device", "is_correct": false}, {"label_html": "MRI brain", "is_correct": false}], "correct_index": 1, "explanation_html": "This patient has had a transient ischaemic attack. He urgently needs carotid duplex scanning to assess if he needs a carotid endarterectomy."}, {"number": 60, "topic": "Vascular investigations", "stem_html": "A 65 year old man presents, for the first time, with pain at the back of his calves when he mobilises 10 metres. He is known to have hypertension. What is the most appropriate investigation?", "options": [{"label_html": "Arterial duplex scan", "is_correct": true}, {"label_html": "MRI angiogram", "is_correct": false}, {"label_html": "DSA angiogram", "is_correct": false}, {"label_html": "Aortic USS", "is_correct": false}, {"label_html": "Knee x-ray", "is_correct": false}], "correct_index": 0, "explanation_html": "An arterial duplex should be performed first, before progression to an angiography."}, {"number": 61, "topic": "Vascular investigations", "stem_html": "A 78 year old man develops sudden onset abdominal pain and almost immediately afterwards passes a large amount of diarrhoea. What is the most appropriate investigation?", "options": [{"label_html": "Abdominal x-ray", "is_correct": false}, {"label_html": "CT angiogram", "is_correct": true}, {"label_html": "Abdominal MRI scan", "is_correct": false}, {"label_html": "Abdominal USS", "is_correct": false}, {"label_html": "Rigid sigmoidoscopy", "is_correct": false}], "correct_index": 1, "explanation_html": "Sudden onset of abdominal pain followed by forceful evacuation are the classical presenting features of acute mesenteric infarction. This is best investigated by CT angiography, which has a sensitivity of 95% for the diagnosis."}, {"number": 62, "topic": "Vascular investigations", "stem_html": "A 43 year old lady complains of significant varicose veins that are increasingly symptomatic. On examination, there is clinical signs of sapheno femoral junction incompetence and associated truncal varicosities. What is the most appropriate course of action?", "options": [{"label_html": "Undertake a venous duplex scan", "is_correct": true}, {"label_html": "Undertake a venous doppler study", "is_correct": false}, {"label_html": "Perform a Trendelenberg test", "is_correct": false}, {"label_html": "Offer the patient radiofrequency ablative therapy", "is_correct": false}, {"label_html": "Offer the patient surgical excision of the varicosities", "is_correct": false}], "correct_index": 0, "explanation_html": "In modern venous surgery, decision making is based on venous imaging to determine which treatment modality is best. Few surgeons would proceed straight to surgery and excision without this test. A venous doppler would show incompetence of the valve but not more than that."}], "note_html": "<b>Venous disease<\/b><br><br><b>Venous Doppler<\/b><br>The simplest investigation for assessment of venous junctional incompetence is a Doppler assessment. This involves the patient standing and manual compression of the limb distal to the junction of interest. Flow should normally occur in one direction only. Where junctional incompetence is present reverse flow will occur and is relatively easy to identify. <br><br><b>Venograms and duplex scans<\/b><br>Structural venous information is historically obtained using a venogram. This is an invasive test and rarely required in modern clinical practice. The most helpful test is a venous duplex scan which will provide information relating to flow and vessel characteristics. Duplex is also useful in providing vein maps for bypass surgery.<br> <br><b>Arterial disease<\/b><br><br><b>Ankle-brachial pressure<\/b><br>The ankle brachial pressure index measurement is an important investigation as it will allow classification of the severity of the flow compromise present. False readings may occur in those with calcified vessels such as diabetics and results in such settings should be interpreted with caution. When auscultating the vessel note should be made of the character of the signal. Monophasic signals are associated with a proximal stenosis and reduction in flow. Triphasic signals provide reassurance of a healthy vessel.<br><br><b>Arterial Duplex<\/b><br>As with the vein the duplex scan can provide a substantial amount of information about arterial patency and flow patterns. In skilled hands they can provide insight as to the state of proximal vessels that are anatomically inaccessible to duplex (e.g. Iliacs). Through assessment of distal flow patterns. It is an operator dependent test.<br><br><b>Conventional angiogram<\/b><br>Vessel puncture and catheter angiography is the gold standard method of assessing arteries. High quality information can usually be obtained. Limitations of the technique include the risk of contrast toxicity and risks of vessel damage. Severely calcified vessels may be difficult to puncture and in this situation a remote access site (e.g. brachial) may be used. This technique is particularly useful in providing a distal arterial roadmap prior to femoro-distal bypass.<br><br><b>CT angiography<\/b><br>These tests provide a considerable amount of structural and flow information. They require contrast and thus carry the risks associated with this. They are particularly useful in the setting of GI bleeding as they are rapidly available and can be performed by a non vascular radiologist. However, they lack the facility for endovascular intervention. In general they do not provide high enough resolution for distal arterial surgery.<br><br><b>Magnetic resonance angiography<\/b><br>This has the advantage of being non-invasive and not using nephrotoxic contrast. Movement artifact remains a problem in some sites and distal arterial resolution is imperfect."}]}</script>
  <script>
    const quizData = JSON.parse(document.getElementById("quiz-data").textContent);
    const app = document.getElementById("app");
    const modeButtons = Array.from(document.querySelectorAll("[data-mode-button]"));
    const topicActionButtons = Array.from(document.querySelectorAll("[data-topic-action]"));

    const state = {
      mode: "solve",
      answers: new Map(),
      questionRefs: [],
    };

    function buildTopic(topic, questionOffset) {
      const details = document.createElement("details");
      details.className = "topic";
      details.open = true;

      const summary = document.createElement("summary");
      summary.innerHTML = `
        <div>
          <h2 class="topic-title">${topic.name}</h2>
        </div>
        <div class="topic-meta">
          <span>${topic.questions.length} questions</span>
          <span class="chevron" aria-hidden="true">></span>
        </div>
      `;

      const body = document.createElement("div");
      body.className = "topic-body";

      if (topic.note_html) {
        const notes = document.createElement("details");
        notes.className = "topic-notes";

        const notesSummary = document.createElement("summary");
        notesSummary.innerHTML = `
          <span class="topic-notes-title">Notes</span>
          <span class="chevron" aria-hidden="true">></span>
        `;

        const notesBody = document.createElement("div");
        notesBody.className = "topic-notes-body rich-text";
        notesBody.innerHTML = topic.note_html;

        notes.appendChild(notesSummary);
        notes.appendChild(notesBody);
        body.appendChild(notes);
      }

      topic.questions.forEach((question, indexInTopic) => {
        const globalIndex = questionOffset + indexInTopic;
        body.appendChild(buildQuestionCard(question, globalIndex));
      });

      details.appendChild(summary);
      details.appendChild(body);
      return details;
    }

    function buildQuestionCard(question, questionIndex) {
      const card = document.createElement("article");
      card.className = "question-card is-hidden";
      card.dataset.questionIndex = String(questionIndex);

      const label = document.createElement("p");
      label.className = "question-label";
      label.textContent = `Question ${question.number}`;

      const stem = document.createElement("div");
      stem.className = "stem rich-text";
      stem.innerHTML = question.stem_html;

      const options = document.createElement("div");
      options.className = "options";

      const optionButtons = question.options.map((option, optionIndex) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "option";
        button.dataset.optionIndex = String(optionIndex);
        button.innerHTML = option.label_html;
        button.addEventListener("click", () => {
          if (state.mode !== "solve") {
            return;
          }
          state.answers.set(questionIndex, optionIndex);
          applyQuestionState(questionIndex);
        });
        options.appendChild(button);
        return button;
      });

      const explanation = document.createElement("div");
      explanation.className = "explanation rich-text";
      explanation.innerHTML = `<span class="explanation-label">Explanation</span>${question.explanation_html}`;

      card.appendChild(label);
      card.appendChild(stem);
      card.appendChild(options);
      card.appendChild(explanation);

      state.questionRefs[questionIndex] = {
        card,
        explanation,
        optionButtons,
        question,
      };

      applyQuestionState(questionIndex);
      return card;
    }

    function applyQuestionState(questionIndex) {
      const ref = state.questionRefs[questionIndex];
      if (!ref) {
        return;
      }

      const { card, optionButtons, question } = ref;
      const selectedIndex = state.answers.get(questionIndex);
      const hasSelection = selectedIndex !== undefined;
      const isReview = state.mode === "review";
      const showExplanation = isReview || hasSelection;

      card.classList.toggle("is-hidden", !showExplanation);

      optionButtons.forEach((button, optionIndex) => {
        button.classList.remove("correct", "incorrect", "neutral-revealed");

        if (isReview) {
          button.disabled = true;
          if (optionIndex === question.correct_index) {
            button.classList.add("correct");
          } else {
            button.classList.add("neutral-revealed");
          }
          return;
        }

        button.disabled = false;
        if (!hasSelection) {
          return;
        }

        if (optionIndex === question.correct_index) {
          button.classList.add("correct");
        } else if (optionIndex === selectedIndex) {
          button.classList.add("incorrect");
        } else {
          button.classList.add("neutral-revealed");
        }
      });
    }

    function renderApp() {
      if (!quizData.topics.length) {
        const empty = document.createElement("div");
        empty.className = "empty-state";
        empty.textContent = "No questions were found in this JSON file.";
        app.replaceChildren(empty);
        return;
      }

      const wrapper = document.createElement("div");
      wrapper.className = "topic-list";

      let questionOffset = 0;
      quizData.topics.forEach((topic) => {
        wrapper.appendChild(buildTopic(topic, questionOffset));
        questionOffset += topic.questions.length;
      });

      app.replaceChildren(wrapper);
    }

    function setMode(mode) {
      state.mode = mode;
      modeButtons.forEach((button) => {
        const isActive = button.dataset.modeButton === mode;
        button.classList.toggle("active", isActive);
        button.setAttribute("aria-pressed", String(isActive));
      });

      state.questionRefs.forEach((_, index) => applyQuestionState(index));
    }

    function setAllTopics(open) {
      document.querySelectorAll(".topic").forEach((topic) => {
        topic.open = open;
      });
    }

    modeButtons.forEach((button) => {
      button.addEventListener("click", () => setMode(button.dataset.modeButton));
    });

    topicActionButtons.forEach((button) => {
      button.addEventListener("click", () => {
        setAllTopics(button.dataset.topicAction === "expand");
      });
    });

    renderApp();
    setMode("solve");
  </script>
</body>
</html>
