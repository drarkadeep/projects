<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Orthopaedics</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f1e8;
      --bg-accent: #ebe4d4;
      --surface: rgba(255, 252, 246, 0.92);
      --surface-strong: #fffdf7;
      --border: #d9cfbd;
      --text: #23313a;
      --text-soft: #5f6c73;
      --accent: #496a58;
      --accent-strong: #2f5341;
      --correct-bg: #e0f3e6;
      --correct-border: #77b487;
      --wrong-bg: #fbe0df;
      --wrong-border: #dc7a73;
      --note-bg: #f3eee2;
      --shadow: 0 18px 40px rgba(76, 59, 37, 0.08);
      --radius-lg: 22px;
      --radius-md: 16px;
      --radius-sm: 12px;
      --page-width: 960px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: "Avenir Next", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.72), transparent 32%),
        linear-gradient(180deg, #f8f4eb 0%, #f3ede0 100%);
      line-height: 1.65;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.14), transparent 18%, transparent 82%, rgba(255, 255, 255, 0.14)),
        repeating-linear-gradient(
          180deg,
          rgba(73, 106, 88, 0.015) 0,
          rgba(73, 106, 88, 0.015) 1px,
          transparent 1px,
          transparent 18px
        );
    }

    a {
      color: var(--accent-strong);
    }

    img {
      max-width: 100%;
      height: auto;
      border-radius: 14px;
    }

    .score-badge,
    .badge.rounded-pill.bg-danger {
      display: none !important;
    }

    .page {
      width: min(100% - 24px, var(--page-width));
      margin: 0 auto;
      padding: 18px 0 48px;
    }

    .topbar {
      margin-bottom: 18px;
      padding: 18px;
      background: rgba(255, 252, 246, 0.9);
      border: 1px solid rgba(217, 207, 189, 0.86);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .topbar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .eyebrow {
      margin: 0 0 4px;
      font-size: 0.76rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-soft);
    }

    .title {
      margin: 0;
      font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
      font-size: clamp(1.5rem, 2vw + 1rem, 2.35rem);
      line-height: 1.08;
      font-weight: 700;
    }

    .meta {
      margin: 8px 0 0;
      color: var(--text-soft);
      font-size: 0.96rem;
    }

    .mode-switch {
      display: inline-flex;
      padding: 6px;
      border-radius: 999px;
      background: var(--bg-accent);
      border: 1px solid var(--border);
      gap: 6px;
      flex-shrink: 0;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
      flex-wrap: wrap;
    }

    .topic-actions {
      display: inline-flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .utility-button {
      appearance: none;
      border: 1px solid var(--border);
      background: var(--surface-strong);
      color: var(--text);
      font: inherit;
      font-weight: 700;
      border-radius: 999px;
      padding: 10px 14px;
      cursor: pointer;
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .utility-button:hover {
      transform: translateY(-1px);
      border-color: #c7bba9;
      box-shadow: 0 8px 18px rgba(70, 54, 34, 0.07);
    }

    .utility-button:focus-visible {
      outline: 3px solid rgba(73, 106, 88, 0.22);
      outline-offset: 2px;
    }

    .mode-button {
      appearance: none;
      border: 0;
      background: transparent;
      color: var(--text-soft);
      font: inherit;
      font-weight: 700;
      border-radius: 999px;
      padding: 10px 16px;
      min-width: 92px;
      cursor: pointer;
      transition: transform 0.18s ease, background 0.18s ease, color 0.18s ease, box-shadow 0.18s ease;
    }

    .mode-button:hover {
      transform: translateY(-1px);
      color: var(--text);
    }

    .mode-button.active {
      background: var(--surface-strong);
      color: var(--accent-strong);
      box-shadow: 0 8px 18px rgba(73, 106, 88, 0.14);
    }

    .topic-list {
      display: grid;
      gap: 18px;
    }

    .topic {
      background: rgba(255, 252, 246, 0.78);
      border: 1px solid rgba(217, 207, 189, 0.9);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .topic[open] {
      background: rgba(255, 252, 246, 0.9);
    }

    .topic > summary {
      list-style: none;
      cursor: pointer;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      user-select: none;
    }

    .topic > summary::-webkit-details-marker {
      display: none;
    }

    .topic-title {
      margin: 0;
      font-size: 1.08rem;
      font-weight: 800;
      letter-spacing: 0.01em;
    }

    .topic-meta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--text-soft);
      font-size: 0.94rem;
    }

    .chevron {
      display: inline-block;
      transition: transform 0.2s ease;
      color: var(--accent);
      font-weight: 700;
    }

    .topic[open] > summary .chevron {
      transform: rotate(90deg);
    }

    .topic-notes {
      background: rgba(243, 238, 226, 0.62);
      border: 1px solid #e3d9c8;
      border-radius: var(--radius-md);
      overflow: hidden;
    }

    .topic-notes > summary {
      list-style: none;
      cursor: pointer;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      user-select: none;
    }

    .topic-notes > summary::-webkit-details-marker {
      display: none;
    }

    .topic-notes-title {
      font-size: 0.95rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-soft);
    }

    .topic-notes[open] > summary .chevron {
      transform: rotate(90deg);
    }

    .topic-notes-body {
      padding: 0 16px 16px;
      color: var(--text);
    }

    .topic-body {
      padding: 0 16px 16px;
      display: grid;
      gap: 14px;
    }

    .question-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 18px;
      box-shadow: 0 10px 24px rgba(70, 54, 34, 0.05);
    }

    .question-label {
      margin: 0 0 10px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-soft);
      font-size: 0.88rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 800;
    }

    .stem {
      font-size: 1rem;
    }

    .stem > *:first-child,
    .explanation > *:first-child {
      margin-top: 0;
    }

    .stem > *:last-child,
    .explanation > *:last-child {
      margin-bottom: 0;
    }

    .options {
      margin-top: 16px;
      display: grid;
      gap: 10px;
    }

    .option {
      width: 100%;
      text-align: left;
      border: 1px solid #d8d0c2;
      background: #fffdf8;
      color: var(--text);
      border-radius: var(--radius-sm);
      padding: 14px 15px;
      font: inherit;
      line-height: 1.45;
      cursor: pointer;
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
    }

    .option:hover {
      transform: translateY(-1px);
      border-color: #c7bba9;
      box-shadow: 0 8px 18px rgba(70, 54, 34, 0.07);
    }

    .option:focus-visible {
      outline: 3px solid rgba(73, 106, 88, 0.22);
      outline-offset: 2px;
    }

    .option.correct {
      background: var(--correct-bg);
      border-color: var(--correct-border);
      box-shadow: inset 0 0 0 1px rgba(119, 180, 135, 0.2);
    }

    .option.incorrect {
      background: var(--wrong-bg);
      border-color: var(--wrong-border);
      box-shadow: inset 0 0 0 1px rgba(220, 122, 115, 0.2);
    }

    .option.neutral-revealed {
      background: #faf6ee;
      border-color: #d8d0c2;
      color: #5f676a;
    }

    .option[disabled] {
      cursor: default;
      opacity: 1;
    }

    .explanation {
      margin-top: 14px;
      padding: 14px 16px;
      background: var(--note-bg);
      border: 1px solid #e3d9c8;
      border-radius: 14px;
      color: var(--text);
    }

    .question-card.is-hidden .explanation {
      display: none;
    }

    .explanation-label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-soft);
      font-weight: 800;
    }

    .empty-state {
      padding: 28px 22px;
      background: var(--surface);
      border: 1px dashed var(--border);
      border-radius: var(--radius-lg);
      color: var(--text-soft);
    }

    .rich-text table {
      width: 100%;
      border-collapse: collapse;
      margin: 12px 0;
      overflow: hidden;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.68);
    }

    .rich-text td,
    .rich-text th {
      border: 1px solid #ddd2bf;
      padding: 10px 12px;
      vertical-align: top;
    }

    .rich-text ul,
    .rich-text ol {
      padding-left: 20px;
      margin: 10px 0;
    }

    .rich-text center {
      display: block;
      text-align: center;
    }

    .rich-text .table-responsive {
      overflow-x: auto;
    }

    @media (max-width: 720px) {
      .page {
        width: min(100% - 16px, var(--page-width));
        padding-top: 10px;
      }

      .topbar {
        padding: 14px;
        border-radius: 18px;
      }

      .topbar-inner {
        flex-direction: column;
        align-items: stretch;
      }

      .controls {
        justify-content: stretch;
      }

      .topic-actions {
        width: 100%;
      }

      .utility-button {
        flex: 1 1 0;
      }

      .mode-switch {
        width: 100%;
        justify-content: stretch;
      }

      .mode-button {
        flex: 1 1 50%;
      }

      .topic > summary {
        padding: 16px;
        align-items: flex-start;
      }

      .topic-meta {
        font-size: 0.88rem;
      }

      .topic-body {
        padding: 0 12px 12px;
      }

      .question-card {
        padding: 15px;
      }

      .option {
        padding: 13px 14px;
      }
    }
  </style>
</head>

          </div>

      </div>
    </section>

    <section id="app"></section>
  </main>

  <script id="quiz-data" type="application/json">{"title": "Orthopaedics", "topics": [{"name": "Ankle injuries", "questions": [{"number": 1, "topic": "Ankle injuries", "stem_html": "A 30 year old man injures his ankle playing football. On examination, he has tenderness over both medial and lateral malleoli. X-ray demonstrates a bimalleolar fracture with a displaced distal fibula fracture, at the level of the syndesmosis and fracture of the medial malleolus with talar shift. The ankle has been provisionally reduced and splinted in the emergency department.  What is the most appropriate management?", "options": [{"label_html": "Application of external fixation device", "is_correct": false}, {"label_html": "Application of compression dressing and physiotherapy", "is_correct": false}, {"label_html": "Application of ankle boot", "is_correct": false}, {"label_html": "Surgical fixation", "is_correct": true}, {"label_html": "Below knee amputation", "is_correct": false}], "correct_index": 3, "explanation_html": "This is an unstable fracture pattern with a Weber B fracture of the distal fibula and a fracture of the medial malleolus. Talar shift indicates loss of ankle mortice congruity. This injury should therefore be treated with surgical fixation."}, {"number": 2, "topic": "Ankle injuries", "stem_html": "A 50 year old female slips on wet floor injuring her ankle. On examination, she has tenderness over the lateral and medial malleolus. X-rays (stress views) demonstrate an undisplaced fracture of the distal fibula at the level of the syndesmosis and a congruent ankle mortise. What is the most appropriate management?", "options": [{"label_html": "Application of full leg cast", "is_correct": false}, {"label_html": "Surgical fixation", "is_correct": false}, {"label_html": "Application of below knee walking boot", "is_correct": true}, {"label_html": "Application of external fixator", "is_correct": false}, {"label_html": "Bed rest, splinting and traction", "is_correct": false}], "correct_index": 2, "explanation_html": "This is a Weber B fracture and therefore potentially unstable. Medial malleolar tenderness indicates deltoid ligament injury. As the fracture is currently undisplaced and the ankle mortise is congruent, the injury can be initially managed conservatively in a moon boot but the patient should be monitored in the outpatient clinic for fracture displacement in the first few weeks."}, {"number": 3, "topic": "Ankle injuries", "stem_html": "A 20 year old woman trips over a step, injuring her ankle. Examination reveals tenderness over the lateral malleolus and an x-ray demonstrates an undisplaced fracture distal to the syndesmosis.  What is the best course of action?", "options": [{"label_html": "Application of ankle boot", "is_correct": true}, {"label_html": "Surgical fixation", "is_correct": false}, {"label_html": "Application of full leg plaster cast", "is_correct": false}, {"label_html": "Application of external fixator", "is_correct": false}, {"label_html": "Application of Ilizarov frame", "is_correct": false}], "correct_index": 0, "explanation_html": "This is a Weber A fracture. It is a stable ankle injury and can therefore be managed conservatively. Whilst this patient could also be treated in a below knee plaster, most clinicians would nowadays treat this injury in an ankle boot. Patients should be advised to mobilise in the ankle boot, as pain allows, and can wean themselves out of the boot as the symptoms improve."}, {"number": 4, "topic": "Ankle injuries", "stem_html": "A 45 year old man has been admitted after being knocked off his bicycle. His ankle is grossly deformed with bilateral malleolar tenderness with severe ankle swelling and tenting of the medial soft tissues. What is the most appropriate initial management?", "options": [{"label_html": "Application of compression dressing and physiotherapy", "is_correct": false}, {"label_html": "Application of external fixation device", "is_correct": false}, {"label_html": "Immediate reduction and application of backslab", "is_correct": true}, {"label_html": "Surgical fixation", "is_correct": false}, {"label_html": "Application of full leg plaster cast", "is_correct": false}], "correct_index": 2, "explanation_html": "This is an unstable ankle injury that is likely to require surgical fixation. The immediate management of a displaced ankle fracture is to reduce the fracture to prevent soft tissues compromise and help reduce swelling. This can be performed before an x-ray is obtained if performing the x-ray will significantly delay reduction."}, {"number": 5, "topic": "Ankle injuries", "stem_html": "A 40 year old marine injures his ankle on an assault course. On examination he has a severely swollen ankle, as well as tenderness over the medial malleolus and proximal fibula. X-rays demonstrate a medial malleolar fracture, spiral fracture of the proximal fibula and widening of the syndesmosis. What is the most appropriate definitive management?", "options": [{"label_html": "Surgical fixation", "is_correct": true}, {"label_html": "Application of ankle boot", "is_correct": false}, {"label_html": "Application of lower leg plaster cast", "is_correct": false}, {"label_html": "Application of external fixation device", "is_correct": false}, {"label_html": "Below knee amputation", "is_correct": false}], "correct_index": 0, "explanation_html": "This is a Maisonneuve fracture of the proximal fibula. It indicates an unstable ankle injury with likely injury to the interosseous membrane. In the setting of radiographic evidence of syndesmotic widening, this requires surgical fixation to reduce and stabilise the syndesmosis."}], "note_html": "An ankle fracture relates to a fracture around the tibio-talar joint. It generally refers to a fracture involving the lateral, and/or medial and/or posterior malleolus. Pilon and Tillaux fractures are also considered to be ankle fractures, but are not covered here.<br>Ankle fractures are common. They effect men and women in equal numbers, but men have a higher rate as young adults (sports and contact injuries), and women a higher rate post-menopausal (fragility type fracture).<br><br><b>Osseous anatomy<\/b><br>The ankle (or mortise) joint consists of the distal tibia (tibial plafond and posterior malleolus), the distal fibula (lateral malleolus), and the talus. The main movement at the ankle joint is plantar and dorsiflexion.<br><br><b>Ligamentous anatomy<\/b><br>Medial side: Deltoid ligament. This is divided into superficial and deep portions. It is the primary restraint to valgus tilting of the talus.<br><br>Lateral side: Lateral ligament complex consisting from anterior to posterior of the anterior talofibular ligament (ATFL), calcaneofibular ligament (CFL), and the posterior talofibular ligament (PTFL). Together they resist valgus stress to the ankle, and are a restraint to anterior translation of the talus within the mortise joint.<br><br>Syndesmosis: The syndesmosis is a ligament complex between the distal tibia and fibula, holding the two bones together. It is fundamental to the integrity of the ankle joint, and its disruption leads to instability. It consists of (from anterior to posterior) the anterior-inferior tibiofibular ligament (AITFL), the transverse tibiofibular ligament (TTFL), the interosseous membrane, and the posterior-inferior tibiofibular ligament (PITFL).<br><br><b>Presentation and initial management<\/b><br>Patients will present following a traumatic event with a painful, swollen ankle, and reluctance/inability to weight bear. The Ottawa rules can be applied to differentiate between an ankle fracture and sprain, but can be unreliable.<br>In high energy injuries, management should follow ATLS principles to identify more significant injuries first. Neurovascular status of the foot should be documented, and open injuries should be excluded. If an open injury is identified, it should be managed in line with BOAST 4 principles<sub>1<\/sub>. If an obvious deformity exists, it should be reduced as soon as possible with appropriate analgesia or conscious sedation. Radiographs of clearly deformed or dislocated joints are not necessary, and removing the pressure on the surrounding soft tissues from the underlying bony deformity is the priority. If the fracture pattern is not clinically obvious then plain radiographs are appropriate and will guide the subsequent manipulation during plaster-of-paris below knee backslab application.<br><br><b>Imaging<\/b><br>AP, lateral and mortise views (20 degrees internal rotation) are essential to evaluate fracture displacement and syndesmotic injury. Decreased tibiofibular overlap, medial joint clear space and lateral talar shift all indicate a syndesmotic injury. (In subtle cases of shift, imaging the uninjured ankle can be helpful as a proportion of the population have little or no tibiotalar overlap-reference 2.)<br><br>Where there is suspicion of syndesmosis involvement in the absence of radiographic evidence, stress radiographs can be diagnostic.<br>Complex fracture patterns (and increasingly posterior malleolar fractures) are best defined using CT. <br><br><br><br><b>Classification<\/b><br>The most commonly used classifications are Lauge-Hansen and Danis-Weber. <br><br><b>Lauge-Hansen<\/b><br>Comprises two parts: first part is the foot position, and the second part is the force applied. Useful for understanding the forces involved and therefore predict the ligamentous or bony injury. Results in four injury patterns: <br>Supination - Adduction (SA) - 10-20%<br>Supination - External rotation (SER) - 40-75%<br>Pronation - Abduction (PA) - 5-20%<br>Pronation - External rotation (PER) - 5-20%<br><br>Not often used in clinical practice but good for understanding the principles of ankle fracture.<br><br><b>Danis-Weber<\/b><br>Commonly used. Based on the level of the fibula fracture in relation to the syndesmosis. The more proximal, the greater the risk of syndesmotic injury and therefore fracture instability.<br>A - fracture below the level of the syndesmosis<br>B - fracture at the level of the syndesmosis / level of the tibial plafond<br>C - fracture above the level of the syndesmosis. This includes Maisonneuve fractures (proximal fibula fracture), which can be associated with ankle instability. Beware the high fibula fracture - it may be an ankle fracture!<br><br>The Weber classification is based purely on the the lateral side. All injuries can include a medial or posterior bony or ligamentous injury which also dictates fracture stability (bimalleolar and trimalleolar fractures are more unstable).<br><br><b>Treatment<\/b><br>When deciding upon treatment for an ankle fracture, one must consider both the fracture and the patient. Diabetic patients and smokers are at greater risk of post-operative complication, especially wound problems and infection. Likewise, the long term outcome of post-traumatic arthritis from a malunited ankle fracture is extremely important for a young patient, but not as relevant in the elderly. Therefore, normal surgical decision processes apply as with all fractures.<br><br>Defining stability of an ankle fracture underpins the treatment decision. <br>Weber A - Unimalleolar Weber A Weber fractures by definition are stable and therefore can be mobilised fully weight bearing in an ankle boot.<br><br>Weber C - Fractures tend to include syndesmotic disruption and are usually bimalleolar (either bony or ligamentous). They are therefore unstable and usually require operative fixation. In addition to the fracture fixation, the syndesmosis usually requires reconstruction/augmentation with screws to restore the joint integrity and function.<br><br>Weber B - B fractures vary greatly. They can be part of a trimalleolar injury and therefore extremely unstable, requiring fixation. Alternatively, a uni-malleolar Weber B fracture can be a stable injury, and therefore mobilised immediately in an ankle boot. Defining the stability can be challenging, and often involves stress radiographs, or a trial of mobilisation and repeat radiographs. However, treating undisplaced ankle fractures in a below knee plaster, non-weight bearing for six weeks is still widely practised, and a safe approach. <br><br>When operative fixation is appropriate, it is usually via open reduction and internal fixation using plates and screws. It must be carried out when soft tissue swelling has settled in order to minimise the risk of wound problems. This can often take a week to settle. <br><br>The use of fibula nails is expanding, but is not yet mainstream. Ankle fractures can also be treated with external fixation, or with a hind foot nail in patients who need fixation but where soft tissue or bone quality is poor.<br><br><br><b>Post operative management<\/b><br>Ankle fractures generally take 6 weeks to unite enough to prevent secondary displacement. This is therefore an appropriate time period to keep a cast on in a conservatively managed patient. Weight bearing post-operatively depends on the quality of the fixation and bone quality, and preference varies between surgeons, ranging from aggressive early mobilisation to a period of non-weight bearing. Return to activities takes approximately three months, and often requires assistance of a physiotherapist to improve range-of-movement and muscle strengthening.<br><br><b>References<\/b><br>1.\t http://www.boa.ac.uk/publications/boa-standards-trauma-boasts/<br>2.\tShah AS, Kadakia AR, Tan GJ, Karadsheh MS, Wolter TD, Sabb B. Radiographic evaluation of the normal distal tibiofibular syndesmosis. Foot Ankle Int. 2012;33(10):870-6"}, {"name": "Avascular necrosis", "questions": [{"number": 6, "topic": "Avascular necrosis", "stem_html": "Of the list below, which is not a cause of avascular necrosis?", "options": [{"label_html": "Steroids", "is_correct": false}, {"label_html": "Sickle cell disease", "is_correct": false}, {"label_html": "Radiotherapy", "is_correct": false}, {"label_html": "Myeloma", "is_correct": true}, {"label_html": "Caisson disease", "is_correct": false}], "correct_index": 3, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\"><b>Causes of avascular necrosis<\/b><br><b>P<\/b> ancreatitis <br><b>L<\/b> upus <br><b>A<\/b> lcohol <br><b>S<\/b> teroids <br><b>T<\/b> rauma <br><b>I<\/b> diopathic, infection <br><b>C<\/b> aisson disease, collagen vascular disease <br><b>R<\/b> adiation, rheumatoid arthritis <br><b>A<\/b> myloid <br><b>G<\/b> aucher disease <br><b>S<\/b> ickle cell disease<\/div>Steroid containing therapy for myeloma may induce avascular necrosis, however the disease itself does not cause it. Caisson disease as may occur in deep sea divers is a recognised cause."}, {"number": 7, "topic": "Avascular necrosis", "stem_html": "Which of the following statements relating to avascular necrosis is false?", "options": [{"label_html": "When associated with fracture may occur despite the radiological evidence of fracture union.", "is_correct": false}, {"label_html": "Pain and stiffness will typically precede radiological evidence of the condition.", "is_correct": false}, {"label_html": "Drilling of affected bony fragments may be used to facilitate angiogenesis where arthroplasty is not warranted.", "is_correct": false}, {"label_html": "The earliest detectable radiological evidence is a radiolucency of the affected area coupled with subchondral collapse.", "is_correct": true}, {"label_html": "It is less likely when prompt anatomical alignment of fracture fragments is achieved.", "is_correct": false}], "correct_index": 3, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Avascular necrosis- radiological changes occur late.<\/div>Radiolucency and subchondral collapse are late changes. The earliest evidence on plain films is the affected area appearing as being more radio-opaque due to hyperaemia and resorption of the neighboring area. It may be diagnosed earlier using bone scans and MRI."}], "note_html": "<ul><li> Cellular death of bone components due to interruption of the blood supply, causing bone destruction<\/li><li>Main joints affected are hip, scaphoid, lunate and the talus.<\/li><li>It is not the same as non union. The fracture has usually united.<\/li><li>Radiological evidence is slow to appear.<\/li><li>Vascular ingrowth into the affected bone may occur. However, many joints will develop secondary osteoarthritis.<\/li><\/ul><br><b>Causes<\/b><br><b>P<\/b> ancreatitis <br><b>L<\/b> upus <br><b>A<\/b> lcohol <br><b>S<\/b> teroids <br><b>T<\/b> rauma <br><b>I<\/b> diopathic, infection <br><b>C<\/b> aisson disease, collagen vascular disease <br><b>R<\/b> adiation, rheumatoid arthritis <br><b>A<\/b> myloid <br><b>G<\/b> aucher disease <br><b>S<\/b> ickle cell disease<br><br><b>Presentation<\/b><br>Usually pain. Often despite apparent fracture union.<br><br><b>Investigation<\/b><br>MRI scanning will show changes earlier than plain films.<br><br><b>Treatment<\/b><br>In fractures at high risk sites anticipation is key. Early prompt and accurate reduction is essential.<br><br>Non weight bearing may help to facilitate vascular regeneration.<br><br>Joint replacement may be necessary, or even the preferred option (e.g. Hip in the elderly)."}, {"name": "Diseases affecting the vertebral column", "questions": [{"number": 8, "topic": "Diseases affecting the vertebral column", "stem_html": "A 15 year old boy is brought to the clinic by his mother who is concerned that he has a mark overlying his lower spine. On examination, the boy has a patch of hair overlying his lower lumbar spine and a birth mark at the same location. Lower limb neurological examination is normal. What is the most likely cause?", "options": [{"label_html": "Spina bifida occulta", "is_correct": true}, {"label_html": "Meningomyelocele", "is_correct": false}, {"label_html": "Spondylolisthesis", "is_correct": false}, {"label_html": "Scheuermanns disease", "is_correct": false}, {"label_html": "Myelocele", "is_correct": false}], "correct_index": 0, "explanation_html": "Spina bifida occulta is a common condition and may affect up to 10% of the population. The more severe types of spina bifida have more characteristic skin changes. Occasionally the unwary surgeon is persuaded to operate on these cutaneous changes and we would advocate performing an MRI scan prior to any such surgical procedure in this region."}, {"number": 9, "topic": "Diseases affecting the vertebral column", "stem_html": "A 19 year old female is involved in an athletics event. She has just completed the high jump when she suddenly develops severe back pain and weakness affecting both her legs. On examination, she has a prominent sacrum and her lower back is painful. What is the most likely underlying cause?", "options": [{"label_html": "Structural scoliosis", "is_correct": false}, {"label_html": "Ankylosing spondylitis", "is_correct": false}, {"label_html": "Scheuermanns disease", "is_correct": false}, {"label_html": "Spondylolisthesis", "is_correct": true}, {"label_html": "Spondylolysis", "is_correct": false}], "correct_index": 3, "explanation_html": "Young athletic females are the group most frequently affected by spondylolythesis who have a background of spondylolysis. Whilst the latter condition is a risk factor for spondylolythesis the former condition is most likely in a young athletic female who presents with sudden pain."}, {"number": 10, "topic": "Diseases affecting the vertebral column", "stem_html": "A 19 year old female presents to the clinic with progressive pain in her neck and back. The condition has been progressively worsening over the past 6 months. She has not presented previously because she was an inpatient with a disease flare of ulcerative colitis. On examination, she has a stiff back with limited spinal extension on bending forwards. What is the most likely explanation for this process?", "options": [{"label_html": "Spondylolysis", "is_correct": false}, {"label_html": "Spondylolisthesis", "is_correct": false}, {"label_html": "Functional scoliosis", "is_correct": false}, {"label_html": "Scheuermanns disease", "is_correct": false}, {"label_html": "Ankylosing spondylitis", "is_correct": true}], "correct_index": 4, "explanation_html": "Ankylosing spondylitis is associated with HLA B27, there is a strong association with ulcerative colitis in such individuals. The clinical findings are usually of a kyphosis affecting the cervical and thoracic spine. Considerable symptomatic benefit may be obtained using non steroidal anti inflammatory drugs. These should be used carefully in patients with inflammatory bowel disease who may be taking steroids."}], "note_html": "<div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Ankylosing spondylitis<\/b><\/td><td><ul><li>Chronic inflammatory disorder affecting the axial skeleton<\/li><li>Sacro-ilitis is a usually visible in plain films<\/li><li>Up to 20% of those who are HLA B27 positive will develop the condition<\/li><li>Affected articulations develop bony or fibrous changes<\/li><li>Typical spinal features include loss of the lumbar lordosis and progressive kyphosis of the cervico-thoracic spine<\/li><\/ul><\/td><\/tr><tr><td><b>Scheuermann's disease<\/b><\/td><td><ul><li>Epiphysitis of the vertebral joints is the main pathological process<\/li><li>Predominantly affects adolescents <\/li><li>Symptoms include back pain and stiffness<\/li><li>X-ray changes include epiphyseal plate disturbance and anterior wedging<\/li><li>Clinical features include progressive kyphosis (at least 3 vertebrae must be involved)<\/li><li>Minor cases may be managed with physiotherapy and analgesia, more severe cases may require bracing or surgical stabilisation<\/li><\/ul><\/td><\/tr><tr><td><b>Scoliosis<\/b><\/td><td><ul><li>Consists of curvature of the spine in the coronal plane<\/li><li>Divisible into structural and non structural, the latter being commonest in adolescent females who develop minor postural changes only. Postural scoliosis will typically disappear on manoeuvres such as bending forwards <\/li><li>Structural scoliosis affects &gt; 1 vertebral body and is divisible into idiopathic, congential and neuromuscular in origin. It is not correctable by alterations in posture<\/li><li>Within structural scoliosis, idiopathic is the most common type<\/li><li>Severe, or progressive structural disease is often managed surgically with bilateral rod stabilisation of the spine<\/li><\/ul><\/td><\/tr><tr><td><b>Spina bifida<\/b><\/td><td><ul><li>Non fusion of the vertebral arches during embryonic development<\/li><li>Three categories; myelomeningocele, spina bifida occulta and meningocele<\/li><li>Myelomeningocele is the most severe type with associated neurological defects that may persist in spite of anatomical closure of the defect<\/li><li>Up to 10% of the population may have spina bifida occulta, in this condition the skin and tissues (but not not bones) may develop over the distal cord. The site may be identifiable by a birth mark or hair patch<\/li><li>The incidence of the condition is reduced by use of folic acid supplements during pregnancy<\/li><\/ul><\/td><\/tr><tr><td><b>Spondylolysis<\/b><\/td><td><ul><li>Congenital or acquired deficiency of the pars interarticularis of the neural arch of a particular vertebral body, usually affects L4/ L5<\/li><li>May be asymptomatic and affects up to 5% of the population<\/li><li>Spondylolysis is the commonest cause of spondylolisthesis in children<\/li><li>Asymptomatic cases do not require treatment<\/li><\/ul><\/td><\/tr><tr><td><b>Spondylolisthesis<\/b><\/td><td><ul><li>This occurs when one vertebra is displaced relative to its immediate inferior vertebral body<\/li><li>May occur as a result of stress fracture or spondylolysis<\/li><li>Traumatic cases may show the classic 'Scotty Dog' appearance on plain films<\/li><li>Treatment depends upon the extent of deformity and associated neurological symptoms, minor cases may be actively monitored. Individuals with radicular symptoms or signs will usually require spinal decompression and stabilisation<\/li><\/ul><\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Distal radius fracture", "questions": [{"number": 11, "topic": "Distal radius fracture", "stem_html": "A 24 year old man sustains a distal radius fracture during a game of rugby. Imaging shows a comminuted fracture with involvement of the articular surface. What is the most appropriate definitive management?", "options": [{"label_html": "Open reduction and internal fixation", "is_correct": true}, {"label_html": "Reduction under anaesthesia and place in plaster cast", "is_correct": false}, {"label_html": "Reduction under haematoma block and place into plaster cast", "is_correct": false}, {"label_html": "Place onto skeletal traction system", "is_correct": false}, {"label_html": "Apply a futura splint and review in fracture clinic", "is_correct": false}], "correct_index": 0, "explanation_html": "Meticulous anatomical alignment of the fracture segments is crucial to avoid the development of osteoarthritis and risk of malunion."}], "note_html": "<ul><li>Common, usual mechanism is fall onto an outstretched hand in elderly females with underlying osteoporosis<\/li><li>Typically it is a distal radius fracture occurring about 1 inch proximal to the wrist joint with dorsal angulation of the fracture fragment. The distal end of the ulna is sometimes involved<\/li><li>Management is usually conservative with reduction of the fracture under either a haematoma or Biers block and immobilisation in a cast<\/li><li>Potentially unstable injuries should be managed with surgical fixation. Factors favoring instability include; dorsal tilt of more than 20 degrees, comminuted fracture, injury to the ulnar styloid, intra articular disruption<\/li><li>Young patients, who typically have a higher energy mechanism of injury are usually managed surgically<\/li><li>In the elderly it is important to initiate treatment for osteoporosis<\/li><\/ul>"}, {"name": "Epiphyseal fractures", "questions": [{"number": 12, "topic": "Epiphyseal fractures", "stem_html": "Which of the following types of growth plate fractures may have similar radiological appearances?", "options": [{"label_html": "Salter Harris types 1 and 5", "is_correct": true}, {"label_html": "Salter Harris types 4 and 5", "is_correct": false}, {"label_html": "Salter Harris types 3 and 5", "is_correct": false}, {"label_html": "Salter Harris types 1 and 2", "is_correct": false}, {"label_html": "Salter Harris types 1 and 3", "is_correct": false}], "correct_index": 0, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Mnemonic: <b> SALTER<\/b><br><br><b> S<\/b> (Type 1): Straight through the growth plate<br><b> A<\/b>  (Type 2): Above - through growth plate and  Above involving the metaphysis<br><b>L<\/b> (Type 3): Lower -through growth plate and beLow involving the epiphysis <br><b>T<\/b> (Type 4):Through - Through both metaphysis, epiphysis and growth plate<br><b> E<\/b>  (Type 5):  Everything - Crush / compression injury<br><b> R<\/b>  (Type 5): Ruined<br>As recommended by one of our users<\/div>Salter Harris injury types 1 and 5  (transverse fracture through growth plate Vs. Compression fracture) may mimic each other radiologically. Type 5 injuries have the worst outcomes. Radiological signs of type 5 injuries are subtle and may include narrowing of the growth plate."}], "note_html": "Fractures involving the growth plate in children are classified using the Salter - Harris system.<br>There are 5 main types.<br><br><b>Salter Harris Classification<\/b><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Type<\/b><\/th><th><b>Description<\/b><\/th><\/tr><\/thead><tbody><tr><td>Type 1<\/td><td>Transverse fracture through the growth plate<\/td><\/tr><tr><td>Type 2<\/td><td>Fracture through the growth plate to the metaphysis (commonest type)<\/td><\/tr><tr><td>Type 3<\/td><td>Fracture through the growth plate and the epiphysis with metaphysis spared<\/td><\/tr><tr><td>Type 4<\/td><td>Fracture involving the growth plate, metaphysis and epiphysis<\/td><\/tr><tr><td>Type 5<\/td><td>Compression fracture of the growth plate (worst outcome)<\/td><\/tr><\/tbody><\/table><\/div><br><b>Management<\/b><br>Non displaced type 1 injuries can generally be managed conservatively. Unstable or more extensive injuries will usually require surgical reduction and/ or fixation, as proper alignment is crucial."}, {"name": "Eponymous fractures", "questions": [{"number": 13, "topic": "Eponymous fractures", "stem_html": "A 20 year old woman sustains a Holstein-Lewis fracture. Which nerve is at risk?", "options": [{"label_html": "Ulnar", "is_correct": false}, {"label_html": "Radial", "is_correct": true}, {"label_html": "Median", "is_correct": false}, {"label_html": "Musculocutaneous", "is_correct": false}, {"label_html": "Axillary", "is_correct": false}], "correct_index": 1, "explanation_html": "Since the distal humerus is affected, the radial is at risk."}, {"number": 14, "topic": "Eponymous fractures", "stem_html": "A 28 year old man falls on the back of his hand. On x-ray, he has a fractured distal radius demonstrating volar displacement of the fracture. What eponymous term is used to describe this?", "options": [{"label_html": "Barton's", "is_correct": false}, {"label_html": "Colles'", "is_correct": false}, {"label_html": "Smith's", "is_correct": true}, {"label_html": "Pott's", "is_correct": false}, {"label_html": "Galeazzi", "is_correct": false}], "correct_index": 2, "explanation_html": "This is a Smith fracture (reverse Colles' fracture); unlike a Colles' this is a high velocity injury and may require surgical correction. Note that Colles' fractures are usually dorsally displaced."}, {"number": 15, "topic": "Eponymous fractures", "stem_html": "A 38 year old window cleaner falls from his ladder. He lands on his left arm and notices an obvious injury. An x-ray and clinical examination demonstrate that he has a fracture of the proximal ulna and associated radial dislocation. What eponymous name is used to describe this injury?", "options": [{"label_html": "Galeazzi", "is_correct": false}, {"label_html": "Smith's", "is_correct": false}, {"label_html": "Bennett's", "is_correct": false}, {"label_html": "Pott's", "is_correct": false}, {"label_html": "Monteggia's", "is_correct": true}], "correct_index": 4, "explanation_html": "This constellation of injuries is referred to as a Monteggia's fracture."}, {"number": 16, "topic": "Eponymous fractures", "stem_html": "A 32 year old man falls from scaffolding and sustains an injury to his forearm. Clinical examination and x-ray shows that he has sustained a radial fracture with dislocation of the distal radio-ulna joint. What eponymous name is used to describe this injury?", "options": [{"label_html": "Galeazzi", "is_correct": true}, {"label_html": "Monteggia's", "is_correct": false}, {"label_html": "Smith's", "is_correct": false}, {"label_html": "Colles'", "is_correct": false}, {"label_html": "Barton's", "is_correct": false}], "correct_index": 0, "explanation_html": "Isolated fracture of the radius alone can occur but is rare. Always check for associated injury."}, {"number": 17, "topic": "Eponymous fractures", "stem_html": "Which of the following fractures names best accounts for the injury seen in a 14 year old boy  who jumps off a 10 foot wall and lands on both feet and whose imaging shows a bimalleolar fracture of the right ankle?", "options": [{"label_html": "Pott's", "is_correct": true}, {"label_html": "Barton's", "is_correct": false}, {"label_html": "Galeazzi", "is_correct": false}, {"label_html": "Colles'", "is_correct": false}, {"label_html": "Bennett's", "is_correct": false}], "correct_index": 0, "explanation_html": "<p>No explanation provided.<\/p>"}, {"number": 18, "topic": "Eponymous fractures", "stem_html": "Which type of fracture is seen when a 22 year old drunk man is involved in a fight and injures his thumb when he punches his opponent?", "options": [{"label_html": "Barton's", "is_correct": false}, {"label_html": "Bennett's", "is_correct": true}, {"label_html": "Galeazzi", "is_correct": false}, {"label_html": "Colles'", "is_correct": false}, {"label_html": "Smith's", "is_correct": false}], "correct_index": 1, "explanation_html": "<p>No explanation provided.<\/p>"}, {"number": 19, "topic": "Eponymous fractures", "stem_html": "A 63 year nurse falls on an extended and pronated wrist. An x-ray shows a distal radial fracture with radiocarpal dislocation. Which type of fracture is most likely?", "options": [{"label_html": "Bennett's", "is_correct": false}, {"label_html": "Barton's", "is_correct": true}, {"label_html": "Pott's", "is_correct": false}, {"label_html": "Smith's", "is_correct": false}, {"label_html": "Monteggia's", "is_correct": false}], "correct_index": 1, "explanation_html": "Barton's fractures tend to have intra-articular involvement and dislocation may sometimes be present."}], "note_html": "<b>Colles' fracture (dinner fork deformity)<\/b><br><ul><li>Fall onto extended outstretched hand<\/li><li>Classical Colles' fractures have the following 3 features:<\/li><\/ul><br>1. Transverse fracture of the radius <br>2. 1 inch proximal to the radio-carpal joint <br>3. Dorsal displacement and angulation<br><br><b>Smith's fracture (reverse Colles' fracture)<\/b><br><ul><li>Volar angulation of distal radius fragment (Garden spade deformity)<\/li><li>Caused by falling backwards onto the palm of an outstretched hand or falling with wrists flexed<\/li><\/ul><br><b>Bennett's fracture<\/b><br><ul><li>Intra-articular fracture of the first carpometacarpal joint<\/li><li>Impact on flexed metacarpal, caused by fist fights<\/li><li>X-ray: triangular fragment at ulnar base of metacarpal<\/li><\/ul><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb135b.jpg\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb135.jpg\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Bennett%27s fracture\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb135b.jpg\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center><b>Monteggia's fracture<\/b><br><ul><li>Dislocation of the proximal radioulnar joint in association with an ulna fracture<\/li><li>Fall on outstretched hand with forced pronation<\/li><li>Needs prompt diagnosis to avoid disability<\/li><\/ul><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb134b.jpg\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb134.jpg\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Monteggia fracture\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb134b.jpg\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center><b>Galeazzi fracture<\/b><br><ul><li>Radial shaft fracture with associated dislocation of the distal radioulnar joint<\/li><li>Direct blow<\/li><\/ul><br><b>Pott's fracture<\/b><br><ul><li>Bimalleolar ankle fracture<\/li><li>Forced foot eversion<\/li><\/ul><br><b>Barton's fracture<\/b><br><ul><li>Distal radius fracture (Colles'/Smith's) with associated radiocarpal dislocation<\/li><li>Fall onto extended and pronated wrist<\/li><li>Involvement of the joint is a defining feature<\/li><\/ul><br><b>Holstein Lewis Fracture<\/b><br><ul><li>A HolsteinLewis fracture is a fracture of the distal third of the humerus resulting in entrapment of the radial nerve. <\/li><li>The radial nerve is one of the major nerves of the upper limb. It innervates all of the muscles in the extensor compartments of the arm. <\/li><li>Conservative treatment includes reduction and use of a functional brace<\/li><li>Vascular injury may require open surgery<\/li><\/ul>"}, {"name": "Fracture management", "questions": [{"number": 20, "topic": "Fracture management", "stem_html": "A 22 year old rugby player falls onto an outstretched hand and sustains a fracture of the distal radius. The x-ray shows a dorsally angulated comminuted fracture. What is the most appropriate management?", "options": [{"label_html": "Reduce under haematoma block and place in plaster", "is_correct": false}, {"label_html": "Admit for open reduction and internal fixation", "is_correct": true}, {"label_html": "Reduce using Biers block and place into plaster cast", "is_correct": false}, {"label_html": "Discharge home with arm sling and review in fracture clinic", "is_correct": false}, {"label_html": "Discharge home with futura splint and fracture clinic appointment", "is_correct": false}], "correct_index": 1, "explanation_html": "Unlike an osteoporotic fracture in an elderly lady this is a high velocity injury and will require surgical fixation."}, {"number": 21, "topic": "Fracture management", "stem_html": "A 28 year old man falls onto an outstretched hand. On examination, there is tenderness of the anatomical snuffbox. However, forearm and hand x-rays are normal. What is the most appropriate course of action?", "options": [{"label_html": "Discharge with reassurance", "is_correct": false}, {"label_html": "Place in arm sling and discharge", "is_correct": false}, {"label_html": "Place in futura splint and review in fracture clinic", "is_correct": true}, {"label_html": "Admit for surgical exploration", "is_correct": false}, {"label_html": "Apply an external fixation device", "is_correct": false}], "correct_index": 2, "explanation_html": "This could well be a scaphoid fracture and should be temporarily immobilised pending further review. A futura splint will immobilise better than an arm sling for this problem."}, {"number": 22, "topic": "Fracture management", "stem_html": "A 10 year old boy undergoes a delayed open reduction and fixation of a significantly displaced supracondylar fracture. On the ward he complains of significant forearm pain and paraesthesia of the hand. Radial pulse is normal. What is the most appropriate course of action?", "options": [{"label_html": "Fasciotomy", "is_correct": true}, {"label_html": "Arrange a CT angiogram", "is_correct": false}, {"label_html": "Provide stronger analgesia", "is_correct": false}, {"label_html": "Arrange repeat limb x-rays", "is_correct": false}, {"label_html": "Arrange a forearm duplex scan", "is_correct": false}], "correct_index": 0, "explanation_html": "The delay is the significant factor here. These injuries often have neurovascular compromise and inactivity now places him at risk of developing complications. In compartment syndrome the loss of arterial pulsation occurs late."}, {"number": 23, "topic": "Fracture management", "stem_html": "A 55 year old motorcyclist is involved in a road traffic accident and sustained a Gustilo and Anderson IIIc type fracture to the distal tibia. He was trapped in the wreckage for 7 hours during which time he bled profusely from the fracture site. He has an established distal neurovascular deficit. What is the most appropriate course of action?", "options": [{"label_html": "Amputation", "is_correct": true}, {"label_html": "Skeletal traction", "is_correct": false}, {"label_html": "Application of external fixator and arterial reconstruction", "is_correct": false}, {"label_html": "Insertion of intramedullary nail and arterial reconstruction", "is_correct": false}, {"label_html": "Application of plate to tibia and arterial reconstruction", "is_correct": false}], "correct_index": 0, "explanation_html": "This man is unstable, and at 7 hours after extraction, the limb is not viable. The safest option is primary amputation."}, {"number": 24, "topic": "Fracture management", "stem_html": "A 25 year old ski instructor who falls off a ski lift and sustains a spiral fracture of the mid shaft of the tibia. Attempts to achieve satisfactory position in plaster have failed. Overlying tissues are healthy. What is the most appropriate course of action?", "options": [{"label_html": "Amputation", "is_correct": false}, {"label_html": "Open reduction and fixation using a long plate", "is_correct": false}, {"label_html": "Intramedullary nail", "is_correct": true}, {"label_html": "Skeletal traction", "is_correct": false}, {"label_html": "Long limb casting", "is_correct": false}], "correct_index": 2, "explanation_html": "This would be a good case for intramedullary nailing. Open reduction and internal fixation would strip off otherwise healthy tissues and hence is unsuitable. In some units the injury may be managed with an Ilizarov frame device but the majority would treat with IM nailing."}, {"number": 25, "topic": "Fracture management", "stem_html": "A 35 year old mechanic is hit by a fork lift truck. He sustains a Gustilo and Anderson type IIIA fracture of the shaft of the left femur. What is the most appropriate course of action?", "options": [{"label_html": "Amputation", "is_correct": false}, {"label_html": "Debridement and external fixation", "is_correct": true}, {"label_html": "Open reduction and fixation", "is_correct": false}, {"label_html": "Debridement and placement of intramedullary nail", "is_correct": false}, {"label_html": "Debridement and placement of long leg plaster cast", "is_correct": false}], "correct_index": 1, "explanation_html": "As there is no associated vascular injury the patient may be suitable for debridement of the area and external fixation. If debridement leaves a tissue defect then plastic surgical repair will be needed at a later stage. With open fractures, its best not to place intramedullary metalwork as this may become infected."}], "note_html": "<ul><li>Bony injury resulting in a fracture may arise from trauma (excessive forces applied to bone), stress related (repetitive low velocity injury) or pathological (abnormal bone which fractures during normal use of following minimal trauma)<\/li><li>Diagnosis involves not just evaluating the fracture ; such as site and type of injury but also other associated injuries and distal neurovascular deficits. This may entail not just clinical examination but radiographs of proximal and distal joints. <\/li><li>When assessing x-rays it is important to assess for changes in length of the bone, the angulation of the distal bone, rotational effects, presence of material such as glass.<\/li><\/ul><br><b>Fracture types<\/b><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Fracture type<\/b><\/th><th><b>\tDescription<\/b><\/th><\/tr><\/thead><tbody><tr><td>Oblique fracture\t<\/td><td>Fracture lies obliquely to long axis of bone<\/td><\/tr><tr><td>Comminuted fracture\t<\/td><td>&gt;2 fragments<\/td><\/tr><tr><td>Segmental fracture\t<\/td><td>More than one fracture along a bone<\/td><\/tr><tr><td>Transverse fracture<\/td><td>\tPerpendicular to long axis of bone<\/td><\/tr><tr><td>Spiral fracture<\/td><td>\tSevere oblique fracture with rotation along long axis of bone<\/td><\/tr><\/tbody><\/table><\/div><br><b>Open Vs Closed<\/b><br>It is also important to distinguish open from closed injuries. The most common classification system for open fractures is the Gustilo and Anderson classification system (given below):<br><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid2\"><thead><tr><th><b>Grade<\/b><\/th><th><b>\tInjury<\/b><\/th><\/tr><\/thead><tbody><tr><td>1\t<\/td><td>Low energy wound &lt;1cm<\/td><\/tr><tr><td>2\t<\/td><td>Greater than 1cm wound with moderate soft tissue damage<\/td><\/tr><tr><td>3\t<\/td><td>High energy wound &gt; 10cm with extensive soft tissue damage<\/td><\/tr><tr><td>3 A (sub group of 3)\t<\/td><td>Adequate soft tissue coverage<\/td><\/tr><tr><td>3 B (sub group of 3)\t<\/td><td>Inadequate soft tissue coverage<\/td><\/tr><tr><td>3 C  (sub group of 3)\t<\/td><td>Associated arterial injury<\/td><\/tr><\/tbody><\/table><\/div><br><b>Key points in management of fractures<\/b><br><ul><li>Immobilise the fracture including the proximal and distal joints<\/li><li>Carefully monitor and document neurovascular status, particularly following reduction and immobilisation<\/li><li>Manage infection including tetanus prophylaxis<\/li><li>IV broad spectrum antibiotics for open injuries<\/li><li>As a general principle all open fractures should be thoroughly debrided ( and internal fixation devices avoided or used with extreme caution) <\/li><li>Open fractures constitute an emergency and should be debrided and lavaged within 6 hours of injury<\/li><\/ul>"}, {"name": "Hip fractures", "questions": [{"number": 26, "topic": "Hip fractures", "stem_html": "Which of the following is not typically seen in patients with a femoral neck fracture?", "options": [{"label_html": "Malunion", "is_correct": true}, {"label_html": "Non union", "is_correct": false}, {"label_html": "Avascular necrosis", "is_correct": false}, {"label_html": "Shortening", "is_correct": false}, {"label_html": "External rotation", "is_correct": false}], "correct_index": 0, "explanation_html": "Malunion would be unusual with a femoral neck fracture. Because it is a weight bearing joint, if the fracture is not united then it does not heal at all. It is for this reason that most femoral neck fractures are fixed. Avascular necrosis is a well recognised complication and a total hip replacement or hemiarthroplasty is usually considered in the elderly."}, {"number": 27, "topic": "Hip fractures", "stem_html": "A 60 year old male is admitted to the emergency room with a fall. He lives with his wife and still works as a restaurant manager. He has a past history of benign prostatic hyperplasia and is currently taking tamsulosin. He is otherwise fit and healthy. On examination, there is right hip tenderness on movement in all directions. A hip x-ray confirms an intertrochanteric fracture. What is the best management option?", "options": [{"label_html": "Cemented hemiarthroplasty", "is_correct": false}, {"label_html": "Total hip replacement", "is_correct": false}, {"label_html": "Dynamic hip screw", "is_correct": true}, {"label_html": "Percutaneous pinning", "is_correct": false}, {"label_html": "Leg traction", "is_correct": false}], "correct_index": 2, "explanation_html": "The blood supply to the femoral head may be intact and the fracture should heal with compression type devices such as gamma nails or dynamic hip screws. The latter device being the most commonly performed therapeutic intervention."}, {"number": 28, "topic": "Hip fractures", "stem_html": "An 86 year old retired pharmacist is admitted to Emergency Department following a fall. She complains of right hip pain. She is known to have hypertension and is currently on bendrofluazide. She lives alone and mobilises with a Zimmer frame. Her right leg is shortened and externally rotated. A hip x-ray confirms a displaced intracapsular fracture. What is the best management option?", "options": [{"label_html": "Dynamic hip screw", "is_correct": false}, {"label_html": "Gamma nail", "is_correct": false}, {"label_html": "Total hip replacement", "is_correct": false}, {"label_html": "Hemiarthroplasty", "is_correct": true}, {"label_html": "Percutaneous pinning", "is_correct": false}], "correct_index": 3, "explanation_html": "Hemiarthroplasty is offered to older, less mobile individuals compared to fracture reduction and fixation in younger patients."}, {"number": 29, "topic": "Hip fractures", "stem_html": "A 74 year old male is admitted to the Emergency Department with a fall. He is known to have rheumatoid arthritis and is on methotrexate and paracetamol. He lives alone in a bungalow and enjoys playing golf. He is independent with his ADLs. He complains of left groin pain, therefore has a hip x-ray which confirms a displaced intracapsular fracture. What is the best course of action?", "options": [{"label_html": "Cemented hemiarthroplasty", "is_correct": false}, {"label_html": "Uncemented hemiarthroplasty", "is_correct": false}, {"label_html": "Total hip replacement", "is_correct": true}, {"label_html": "Dynamic hip screw", "is_correct": false}, {"label_html": "Intramedullary nail", "is_correct": false}], "correct_index": 2, "explanation_html": "This patient has pre-existing joint disease, good level of activity and a relatively high life expectancy, therefore THR is preferable to hemiarthroplasty."}, {"number": 30, "topic": "Hip fractures", "stem_html": "An otherwise fit 74 year old man presents with pain in the right hip following minimal trauma. On examination, his leg is shortened and externally rotated. Plain films demonstrate a displaced intracapsular fracture of the femoral neck. What is the best course of action?", "options": [{"label_html": "Uncemented hemi arthroplasty", "is_correct": false}, {"label_html": "Dynamic hip screw", "is_correct": false}, {"label_html": "Total hip replacement", "is_correct": true}, {"label_html": "Intra medullary nail", "is_correct": false}, {"label_html": "Percutaneous pins", "is_correct": false}], "correct_index": 2, "explanation_html": "In otherwise fit patients aged over 70, the best long term functional outcomes are obtained with total hip arthroplasty."}, {"number": 31, "topic": "Hip fractures", "stem_html": "A 72 year old retired teacher is admitted to A&amp;E with a fall and hip pain. He is normally fit and well. He lives with his son in a detached, 2 storey house. A hip x-ray and femur views confirm a sub trochanteric fracture. What is the best course of action?", "options": [{"label_html": "Insertion of intra medullary nail", "is_correct": true}, {"label_html": "Total hip replacement", "is_correct": false}, {"label_html": "Uncemented hemiarthroplasty", "is_correct": false}, {"label_html": "Percutaneous pinning", "is_correct": false}, {"label_html": "Hip arthrodesis", "is_correct": false}], "correct_index": 0, "explanation_html": "Intramedullary devices are normally recommended for reverse oblique, transverse subtrochanteric fractures."}, {"number": 32, "topic": "Hip fractures", "stem_html": "A 72 year old lady stumbles and falls. On examination, she is tender in the left groin and unable to weight bear. Attempts at internal rotation produce severe pain. Plain films of the hip show no obvious fracture. What is the best course of action?", "options": [{"label_html": "MRI scan", "is_correct": true}, {"label_html": "Bone scintigraphy", "is_correct": false}, {"label_html": "Conservative management", "is_correct": false}, {"label_html": "Hip arthrodesis", "is_correct": false}, {"label_html": "Total hip replacement", "is_correct": false}], "correct_index": 0, "explanation_html": "In those patients who present with a suspected hip fracture, but normal plain films, the most accurate investigation is an MRI or CT scan."}], "note_html": "<b>Background<\/b><br>Neck of femur (NOF) fracture is a common orthopaedic presentation, with over 65000 fractures in the UK per year. Like many orthopaedic injuries, there is a bimodal age distribution. It is imperative to distinguish between the high energy injury in a young patient, and the low energy osteoporotic fracture in the elderly, as their management aims are very different: <br><br>Young patient - Usually high energy trauma (e.g road traffic accident, horse riding) and needs treating in accordance with Advanced Trauma Life Support (ATLS) principles. Will often have associated injuries. Aim is to retain the patients own anatomy, and optimise their function.<br><br>Elderly patient - Predominantly female, fall from standing height (fragility fracture). Often patients have multiple comorbidities that will ultimately dictate their prognosis. Aim of orthopaedic treatment is to immediately regain patient mobility so that morbidity (infection, thromboembolic events, pressure sores etc) and mortality associated with prolonged bed rest is avoided. Left untreated, a neck of femur fracture can be considered a terminal event. Historically, mortality associated with elderly hip fracture is 10% at one month, and 30% at one year. However, this has been improved in the UK with the introduction of multidisciplinary, orthogeriatric lead care and the National Hip Fracture Database and Best Practice Tariff.<br><br><b>Pertinent anatomy<\/b><br>Osteology - normal neck-shaft angle is 130 +/- 7 degrees, and 10 +/- 7 degrees of neck anteversion.<br>Vascular supply - The predominant blood supply to the femoral head and neck is from the medial and lateral femoral circumflex arteries (branches of profunda femoris). These anastomose and pierce the joint capsule at the base of the neck, mainly posteriorly. There is a small vascular contribution from the artery of the ligament teres. Understanding the blood supply is fundamental to  the decision making process in treating NOF fractures.<br><br><b>Presentation and initial management<\/b><br>Typically, patients present with pain in the hip/groin, a shortened, abducted, externally rotated leg (due to the unopposed pull of the muscles that act across the hip joint) and the inability to straight-leg-raise. With undisplaced fractures, signs are more subtle.<br>High energy injuries should be treated in line with ATLS principles. All patients should be fluid resuscitated, have adequate pain relief (often with a fascio-iliiaca nerve block), and be optimised for surgery. In addition, elderly patients should be assessed by an orthogeriatrician.<br><br><b>Imaging<\/b><br>Anteroposterior and cross-table lateral plain radiographs are sufficient to diagnose the majority of NOF fractures. If the fracture extends below the level of the lesser trochanter, or there is any possibility of pathological fracture, full length femur views are essential to plan surgery.<br><br>Where there is a high index of suspicion of fracture, but plain radiographs are inconclusive, gold standard investigation is MRI. However, if unavailable within 24 hours, or if the patient will not tolerate MRI, CT is appropriate. The majority of fractures can be seen with modern CT techniques, and so this is becoming first line in many hospitals.<br><br><b>Classification<\/b><br>There has been a move away from named classification systems towards descriptive classification systems.<br>Two main types of NOF exist: Intra-capsular, and extra-capsular. Extra-capsular fractures are further divided into pertrochanteric or subtrochanteric (within 5cm distal to the lesser trochanter). All fractures  are then described as undisplaced, minimally displaced, or displaced. <br>Femoral neck and head blood supply disruption is common with intracapsular NOF fractures, and rare with extracapsular fractures. This fundamental principle underpins the practise of arthroplasty for intracapsular fractures, and fixation for extracapsular fractures.<br><br>If you wish to use a named classification system, the most commonly used are below: <br>Elderly intracapsular - Garden Classification<br>Young intrasapsular - Pauvels Classification<br>Intertrochanteric - Evans<br>Subtrochanteric - Russell Taylor<br><br><b>Treatment <\/b><br>In general, NOF fractures are treated operatively except if the patient is deemed unlikely to survive an anaesthetic. Best Practice Tarif (BPT) dictates that surgery should happen within 36 hours, as delay of greater than 48 hours is associated with increased morbidity and mortality. Below are suggested algorithms for the treatment of NOF. There are some areas of debate/controversy which are detailed below.<br><br><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb210b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb210.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"https://en.wikipedia.org/wiki/Main_Page\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb210b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>* The priority with the young patient is to retain the femoral head if possible, even with a displaced intracapsular fracture. The risk of avascular necrosis and non-union (and therefore revision surgery) associated with internal fixation needs weighing up against the sequelae of total hip replacement in the young (wear, dislocation, revision). Discussion is necessary with the patient, on a case by case basis.<br><br>** Undisplaced fractures in the elderly can be treated with internal fixation, often with cannulated screws. This is appropriate for valgus impacted subcapital fractures which are inherently stable, to prevent secondary displacement. This does still carry the risk of AVN or non-union, and therefore a future revision. For this reason, many surgeons advocate arthroplasty as a single surgery.<br><br>*** NICE guidance - patients who fulfil these criteria should be offered total hip replacement which conveys better function and prosthetic survivorship, compared with hemiarthroplasty, but at an increased risk of dislocation.<br><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb211b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb211.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"https://en.wikipedia.org/wiki/Main_Page\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb211b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>* Intertrochanteric fractures vary greatly in their stability. If the trochanter (and therefore lateral wall), and medial calcar is in tact, then the fracture configuration bears stability. This can be treated with a DHS, as collapse of the fracture is predictable. Where either or both structures are involved in the fracture, stability becomes compromised and many surgeons will favour using an intramedullary device. This is an ongoing debate, and difficult to test in an exam setting.<br><br><b>Post operative management<\/b><br>Patients should be mobilised fully weight bearing where possible. Care is multidisciplinary in its delivery. Elderly patients should have orthogeriatrician assessment of comorbidity, and bone health with secondary prevention measures if appropriate. There should be early involvement of physiotherapy and occupational therapy services. For further guidance see sources listed below.<br><br>NICE clinical guidance on hip fracture: https://www.nice.org.uk/guidance/cg124<br>Best Practice Tarif: www.nhfd.co.uk/20/hipfractureR.../Best%20Practice%20Tariff%20User%20Guide.pdf National Hip Fracture Database: www.nhfd.co.uk/"}, {"name": "Knee collateral ligament", "questions": [{"number": 33, "topic": "Knee collateral ligament", "stem_html": "A footballer sustains a knee injury in a match and is being assessed in the outpatient department. On examination, he has a positive valgus stress test and minimal joint effusion. What is the most likely underlying injury?", "options": [{"label_html": "Injury to the lateral collateral ligament", "is_correct": false}, {"label_html": "Injury to the medial collateral ligament", "is_correct": true}, {"label_html": "Injury to the anterior cruciate ligament", "is_correct": false}, {"label_html": "Injury to the posterior cruciate ligament", "is_correct": false}, {"label_html": "Injury to the patellar tendon", "is_correct": false}], "correct_index": 1, "explanation_html": "A knee injury in the footballer with a positive valgus stress test is usually associated with MCL injury."}], "note_html": "<b>Anatomy<\/b><br>The tibial collateral ligament is a broad, flat band. Its upper end has an extensive attachment to the medial epicondyle of the femur with some fibres projecting onto the adductor magnus tendon. The ligament passes downwards and forwards to the medial side of the tibia. The deepest fibres are fused with the medial meniscus. <br>The fibular collateral ligament is round and cord like and stands clear of the thin, lateral part of the fibrous capsule. It is enclosed within the fascia lata. It passes from the lateral epicondyle of the femur to the head of the fibula in front of its highest point and splits the tendon of biceps femoris. On the lateral side of the joint the fibres are short and weak and bridge the interval between the femoral and tibial condyles. The popliteus tendon intervenes between the lateral meniscus and the capsule. <br>The tibial and fibular collateral ligaments prevent disruption of the joint at the sides. They are most tightly stretched in extension, and then their direction- the fibular ligament downwards and backwards, the tibial downwards and forwards- prevents rotation of the tibia laterally or the femur medially. Rotation may be demonstrated in the flexed knee. <br><br><b>Injury<\/b><br>The collateral ligaments are commonly injured, the medial is most often affected. It requires a significant force such as sporting tackle or motor vehicle to strike the side of the leg. Associated injuries to both the tibial plateau or menisci are not uncommon. <br><br><b>Grading and treatment<\/b><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Grade of injury<\/b><\/th><th><b>Features<\/b><\/th><th><b>Treatment<\/b><\/th><\/tr><\/thead><tbody><tr><td>1<\/td><td>Minor tearing of ligament fibres<br>Negative instability tests<\/td><td>Conservative (analgesia and physiotherapy)<\/td><\/tr><tr><td>2<\/td><td>Ligament laxity (seen with knee in 30<sup>o<\/sup> flexion)<br>Knee stable when joint extended<\/td><td>Usually splinting or casting for 4-6 weeks<\/td><\/tr><tr><td>3<\/td><td>Ligament completely torn<br>Joint instability<\/td><td>Surgical ligament reconstruction<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Knee injury", "questions": [{"number": 34, "topic": "Knee injury", "stem_html": "A 38 year old man is playing football when he slips over during a tackle. His knee is painful immediately following the fall. Several hours later he notices that the knee has become swollen. Following a course of non steroidal anti inflammatory drugs and rest the situation improves. However, complains of recurrent pain. On assessment in clinic you notice that it is impossible to fully extend the knee, although the patient is able to do so when asked. What is the most likely injury?", "options": [{"label_html": "Anterior cruciate ligament rupture", "is_correct": false}, {"label_html": "Posterior cruciate ligament rupture", "is_correct": false}, {"label_html": "Torn meniscus", "is_correct": true}, {"label_html": "Medial collateral ligament tear", "is_correct": false}, {"label_html": "Chondromalacia patellae", "is_correct": false}], "correct_index": 2, "explanation_html": "Twisting sporting injuries followed by delayed onset of knee swelling and locking are strongly suggestive of a menisceal tear. Arthroscopic menisectomy is the usual treatment."}, {"number": 35, "topic": "Knee injury", "stem_html": "A 34 year old woman is a passenger in a car during an accident. Her knee hits the dashboard. On examination, the tibia looks posterior compared to the non injured knee. Which structure has been injured?", "options": [{"label_html": "Anterior cruciate ligament", "is_correct": false}, {"label_html": "Posterior cruciate ligament", "is_correct": true}, {"label_html": "Medial collateral ligament", "is_correct": false}, {"label_html": "Lateral collateral ligament", "is_correct": false}, {"label_html": "Patella tendon", "is_correct": false}], "correct_index": 1, "explanation_html": "In ruptured posterior cruciate ligament the tibia lies back on the femur and can be drawn forward during a paradoxical draw test."}, {"number": 36, "topic": "Knee injury", "stem_html": "A 28 year old professional footballer is admitted to the emergency department. During a tackle his leg is twisted with his knee flexed. He hears a loud crack and his knee rapidly becomes swollen. Which of the following structures is the main site of injury?", "options": [{"label_html": "Anterior cruciate ligament", "is_correct": true}, {"label_html": "Posterior cruciate ligament", "is_correct": false}, {"label_html": "Meniscus", "is_correct": false}, {"label_html": "Medial collateral ligament", "is_correct": false}, {"label_html": "Lateral collateral ligament", "is_correct": false}], "correct_index": 0, "explanation_html": "This is common in footballers as the football boot studs stick to the ground and high twisting force is applied to a flexed knee. Rapid joint swelling also supports the diagnosis."}, {"number": 37, "topic": "Knee injury", "stem_html": "A 19 year old sportswoman presents with knee pain which is worse on walking down the stairs and when sitting still. On examination, there is wasting of the quadriceps and pseudolocking of the knee. What is the diagnosis?", "options": [{"label_html": "Osteoarthritis", "is_correct": false}, {"label_html": "Quadriceps tendon rupture", "is_correct": false}, {"label_html": "Undisplaced fracture patella", "is_correct": false}, {"label_html": "Chondromalacia patellae", "is_correct": true}, {"label_html": "Osgood Schlatters disease", "is_correct": false}], "correct_index": 3, "explanation_html": "A teenage girl with knee pain on walking down the stairs is characteristic for chondromalacia patellae (anterior knee pain). Most cases are managed with physiotherapy."}, {"number": 38, "topic": "Knee injury", "stem_html": "An athletic 15 year old boy presents with knee pain of 3 weeks duration. It is worst during activity and settles with rest. On examination, there is tenderness overlying the tibial tuberosity and an associated swelling at this site. What is the diagnosis?", "options": [{"label_html": "Chondromalacia patellae", "is_correct": false}, {"label_html": "Avulsion fracture of the tibial tubercle", "is_correct": false}, {"label_html": "Osgood Schlatters disease", "is_correct": true}, {"label_html": "Quadriceps tendon rupture", "is_correct": false}, {"label_html": "Undisplaced fracture patella", "is_correct": false}], "correct_index": 2, "explanation_html": "Athletic boys and girls may develop this condition in their teenage years. It is caused by multiple micro fractures at the point of insertion of the tendon into the tibial t
