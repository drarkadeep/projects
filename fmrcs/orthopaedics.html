uberosity. Most cases settle with physiotherapy and rest."}, {"number": 39, "topic": "Knee injury", "stem_html": "Which of the following statements relating to menisceal tears is false?", "options": [{"label_html": "The medial meniscus is most often affected", "is_correct": false}, {"label_html": "True locking of the knee joint may occur", "is_correct": false}, {"label_html": "Most established tears will heal with conservative management", "is_correct": true}, {"label_html": "In the chronic setting there is typically little to find on examination if the knee is not locked", "is_correct": false}, {"label_html": "An arthroscopic approach may be used to treat most lesions", "is_correct": false}], "correct_index": 2, "explanation_html": "Menisci have no nerve or blood supply and thus heal poorly. Established tears with associated symptoms are best managed by arthroscopic menisectomy."}], "note_html": "<b>Types of injury<\/b><br><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Ruptured anterior cruciate ligament<\/b><\/td><td><ul><li>Sport injury<\/li><li>Mechanism: high twisting force applied to a bent knee<\/li><li>Typically presents with: loud crack, pain and RAPID joint swelling (haemoarthrosis)<\/li><li>Poor healing<\/li><li>Management: intense physiotherapy or surgery<\/li><\/ul><\/td><\/tr><tr><td><b>Ruptured posterior cruciate ligament<\/b><\/td><td><ul><li>Mechanism: hyperextension injuries<\/li><li>Tibia lies back on the femur<\/li><li>Paradoxical anterior draw test<\/li><\/ul><\/td><\/tr><tr><td><b>Rupture of medial collateral ligament<\/b><\/td><td><ul><li>Mechanism: leg forced into valgus via force outside the leg<\/li><li>Knee unstable when put into valgus position<\/li><\/ul><\/td><\/tr><tr><td><b>Menisceal tear<\/b><\/td><td><ul><li>Rotational sporting injuries<\/li><li>Delayed knee swelling<\/li><li>Joint locking (Patient may develop skills to 'unlock' the knee<\/li><li>Recurrent episodes of pain and effusions are common, often following minor trauma<\/li><\/ul><\/td><\/tr><tr><td><b>Chondromalacia patellae<\/b><\/td><td><ul><li>Teenage girls, following an injury to knee e.g. Dislocation patella<\/li><li>Typical history of pain on going downstairs or at rest<\/li><li>Tenderness, quadriceps wasting<\/li><\/ul><\/td><\/tr><tr><td><b>Dislocation of the patella<\/b><\/td><td><ul><li>Most commonly occurs as a traumatic primary event, either through direct trauma or through severe contraction of quadriceps with knee stretched in valgus and external rotation<\/li><li>Genu valgum, tibial torsion and high riding patella are risk factors<\/li><li>Skyline x-ray views of patella are required, although displaced patella may be clinically obvious<\/li><li>An osteochondral fracture is present in 5%<\/li><li>The condition has a 20% recurrence rate<\/li><\/ul><\/td><\/tr><tr><td><b>Fractured patella<\/b><\/td><td><ul><li>2 types: <\/li><\/ul>i. Direct blow to patella causing undisplaced fragments <br>ii. Avulsion fracture<\/td><\/tr><tr><td><b>Tibial plateau fracture<\/b><\/td><td><ul><li>Occur in the elderly (or following significant trauma in young)<\/li><li>Mechanism: knee forced into valgus or varus, but the knee fractures before the ligaments rupture<\/li><li>Varus injury affects medial plateau and if valgus injury, lateral plateau depressed fracture occurs<\/li><li>Classified using the Schatzker system (see below)<\/li><\/ul><\/td><\/tr><\/tbody><\/table><\/div><br><b>Schatzker Classification system for tibial plateau fractures<\/b><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Type<\/b><\/th><th><b>Anatomical description<\/b><\/th><th><b>Features<\/b><\/th><\/tr><\/thead><tbody><tr><td>1<\/td><td>Vertical split of lateral condyle<\/td><td>Fracture through dense bone, usually in the young. It may be virtually undisplaced, or the condylar fragment may be pushed inferiorly and tilted<\/td><\/tr><tr><td>2<\/td><td>Vertical split of the lateral condyle combined with an adjacent load bearing part of the condyle<\/td><td>The wedge fragment (which may be of variable size), is displaced laterally; the joint is widened. Untreated, a valgus deformity may develop<\/td><\/tr><tr><td>3<\/td><td>Depression of the articular surface with intact condylar rim<\/td><td>The split does not extend to the edge of the plateau. Depressed fragments may be firmly embedded in subchondral bone, the joint is stable<\/td><\/tr><tr><td>4<\/td><td>Fragment of the medial tibial condyle<\/td><td>Two injuries are seen in this category; (1) a depressed fracture of osteoporotic bone in the elderly. (2) a high energy fracture resulting in a condylar split that runs from the intercondylar eminence to the medial cortex. Associated ligamentous injury may be severe<\/td><\/tr><tr><td>5<\/td><td>Fracture of both condyles<\/td><td>Both condyles fractured but the column of the metaphysis remains in continuity with the tibial shaft<\/td><\/tr><tr><td>6<\/td><td>Combined condylar and subcondylar fractures<\/td><td>High energy fracture with marked comminution<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Open fractures", "questions": [{"number": 40, "topic": "Open fractures", "stem_html": "A 30 year old man is admitted overnight, following a road traffic accident. He has an open tibial fracture with a 20 cm wound and extensive periosteal stripping. He is neurovascularly intact; IV antibiotics and wound dressing have been administered in the emergency department. What is the most appropriate course of action?", "options": [{"label_html": "Immediate skeletal stabilisation and application of negative pressure dressing", "is_correct": false}, {"label_html": "Skeletal fixation followed by vascular reconstruction", "is_correct": false}, {"label_html": "Immediate vascuIar shunting, followed by temporary skeletal stabilisation and vascular reconstruction", "is_correct": false}, {"label_html": "Combined skeletal and soft tissue reconstruction on a scheduled operating list", "is_correct": true}, {"label_html": "Fasciotomy with four compartment decompression", "is_correct": false}], "correct_index": 3, "explanation_html": "This patient has a Gustillo-Anderson Grade 3B open fracture. He will require definitive skeletal and soft tissue reconstruction, which should be performed on a combined ortho-plastic scheduled operating list, as per the BOA/BAPRAS guidelines. The surgery does not have to be performed out of scheduled hours unless there is marine/ sewage contamination, vascular compromise or it is a polytrauma.<br>Whilst it is reasonable to apply an external fixator prior to definitive skeletal and soft tissue reconstruction, this should be converted to internal fixation within 72 hours."}, {"number": 41, "topic": "Open fractures", "stem_html": "A 50 year old man is admitted after falling from scaffolding. He has an open fracture of his tibia with a 15 cm wound. He is neurovascularly intact. What is the best initial course of action?", "options": [{"label_html": "Intravenous antibiotics, photography and application of saline soaked gauze with impermeable dressing", "is_correct": true}, {"label_html": "Thorough wound debridement in the emergency department", "is_correct": false}, {"label_html": "Combined skeletal and soft tissue reconstruction on a scheduled operating list", "is_correct": false}, {"label_html": "Application of external fixator and conversion to internal fixation after two weeks", "is_correct": false}, {"label_html": "Immediate skeletal stabilisation and application of negative pressure dressing", "is_correct": false}], "correct_index": 0, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Note the question asks for initial management<\/div><br>The initial management of open fractures should include administration of intravenous antibiotics, photography of wound and application of a sterile soaked gauze and impermeable film. The wound should only be handled to remove gross contamination. The patient is then likely to require definitive skeletal and soft tissue reconstruction."}, {"number": 42, "topic": "Open fractures", "stem_html": "A 40 year old woman is admitted after being knocked off her bike. She has an open fracture of her tibia, with a 10 cm wound. No peripheral pulses are palpable. Intravenous antibiotics have been administered in the emergency department and the wound has been dressed. What is the best course of action?", "options": [{"label_html": "Immediate skeletal stabilisation and application of negative pressure dressing", "is_correct": false}, {"label_html": "Intravenous antibiotics, photography and application of saline soaked gauze with impermeable dressing", "is_correct": false}, {"label_html": "Skeletal fixation followed by vascular reconstruction", "is_correct": false}, {"label_html": "Immediate amputation", "is_correct": false}, {"label_html": "Immediate vascuIar shunting, followed by temporary skeletal stabilisation and vascular reconstruction", "is_correct": true}], "correct_index": 4, "explanation_html": "This patient has a Gustillo-Anderson Grade 3C open fracture with vascular injury. Vascular impairment requires immediate surgery and restoration of circulation, ideally within 3-4 hours. This should follow the sequence of shunting, temporary skeletal stabilisation and then vascular reconstruction as per BOA / BAPRAS guidelines. Revascularisation using vascular shunts should be performed before skeletal fixation."}], "note_html": "The term open fracture refers to a disruption of the bony cortex associated with a breach in the overlying skin. Any wound that is present in the same limb as a fracture should be suspected as being representative of an open fracture. One of the main problems with open fractures is the associated injuries to the surrounding soft tissues. Whilst the skin is usually relatively resistant to trauma, underlying muscle can be damaged or devitalised, nerves, blood vessels and periosteum may all be disrupted the degree to which this occurs correlates with the severity of the injury and the outcome. These can be graded using the Gustilo and Anderson system (see below).<br><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Grade<\/b><\/th><th><b>\tInjury<\/b><\/th><\/tr><\/thead><tbody><tr><td>1\t<\/td><td>Low energy wound &lt;1cm<\/td><\/tr><tr><td>2\t<\/td><td>Greater than 1cm wound with moderate soft tissue damage<\/td><\/tr><tr><td>3\t<\/td><td>High energy wound &gt; 10cm with extensive soft tissue damage<\/td><\/tr><tr><td>3 A (sub group of 3)\t<\/td><td>Adequate soft tissue coverage<\/td><\/tr><tr><td>3 B (sub group of 3)\t<\/td><td>Inadequate soft tissue coverage<\/td><\/tr><tr><td>3 C  (sub group of 3)\t<\/td><td>Associated arterial injury<\/td><\/tr><\/tbody><\/table><\/div><br><br>In Type IIIc injuries, the mangled extremity scoring system (MESS) can help to predict the need for primary amputation. <br><br><div class=\"alert alert-warning\"><b>Key points for initial management<\/b><br><ul><li>Remove obvious contaminants from very contaminated wounds in the ED<\/li><li>Wound lavage should usually be undertaken in the OR<\/li><li>Early wound photography should be performed<\/li><li>Consider transfer of complex cases to centres that provide orthoplastic care<\/li><li>All wounds should be managed within 24 hours and high velocity ones within 12 hours, those with vascular compromise should be managed immediately<\/li><li>CT angiography is useful in delineating the extent of concommitant vascular injury<\/li><\/ul><\/div><br><b>Reference<\/b><br>BOAST guidelines 2017. Open fractures."}, {"name": "Osteomalacia", "questions": [{"number": 43, "topic": "Osteomalacia", "stem_html": "A 65-year-old Asian female presents with an extracapsular neck of femur fracture. Investigations show:<br><br><div class=\"table-responsive\"><table class=\"tb\"><tbody><tr><td>Calcium<\/td><td>2.07 mmol/l (2.20-2.60 mmol/l)<\/td><\/tr><tr><td>Phosphate<\/td><td>0.66 mmol/l (0.8-1.40 mmol/l)<\/td><\/tr><tr><td>ALP<\/td><td>256 IU/l (44-147 IU/l)<\/td><\/tr><\/tbody><\/table><\/div><br>What is the most likely diagnosis?", "options": [{"label_html": "Bone tuberculosis", "is_correct": false}, {"label_html": "Hypoparathyroidism", "is_correct": false}, {"label_html": "Myeloma", "is_correct": false}, {"label_html": "Osteomalacia", "is_correct": true}, {"label_html": "Paget's disease", "is_correct": false}], "correct_index": 3, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Osteomalacia<br><ul><li>low: calcium, phosphate<\/li><li>raised: alkaline phosphatase<\/li><\/ul><\/div>The low calcium and phosphate combined with the raised alkaline phosphatase point towards osteomalacia."}], "note_html": "Basics<br><ul><li>normal bony tissue but decreased mineral content<\/li><li>rickets if when growing<\/li><li>osteomalacia if after epiphysis fusion<\/li><\/ul><br>Types<br><ul><li>vitamin D deficiency e.g. malabsorption, lack of sunlight, diet<\/li><li>renal failure<\/li><li>drug induced e.g. anticonvulsants<\/li><li>vitamin D resistant; inherited<\/li><li>liver disease, e.g. cirrhosis<\/li><\/ul><br>Features<br><ul><li>rickets: knock-knee, bow leg, features of hypocalcaemia<\/li><li>osteomalacia:  bone pain, fractures, muscle tenderness, proximal myopathy<\/li><\/ul><br>Investigation<br><ul><li>low calcium, phosphate, 25(OH) vitamin D <\/li><li>raised alkaline phosphatase <\/li><li>x-ray: children - cupped, ragged metaphyseal surfaces; adults - translucent bands (Looser's zones or pseudofractures) <\/li><\/ul><br>Treatment<br><ul><li>calcium with vitamin D tablets<\/li><\/ul>"}, {"name": "Osteoporosis", "questions": [{"number": 44, "topic": "Osteoporosis", "stem_html": "An 80 year old woman has a hip fracture. Her calcium is normal. She has never been given a diagnosis of osteoporosis. Apart from treating the hip fracture what additional intervention should be considered?", "options": [{"label_html": "Vitamin D and calcium supplements alone", "is_correct": false}, {"label_html": "Vitamin D, calcium supplements and bisphosphonates", "is_correct": true}, {"label_html": "Vitamin D alone", "is_correct": false}, {"label_html": "Calcium supplements alone", "is_correct": false}, {"label_html": "DEXA scan", "is_correct": false}], "correct_index": 1, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">The patient has a frailty fracture and by definition therefore will have osteoporosis and should therefore commence treatment, a DEXA scan will not change this decision.<\/div>The osteoporosis guidelines state if a postmenopausal woman has a fracture she should be put on bisphosphonates (there is no need for a DEXA scan)."}, {"number": 45, "topic": "Osteoporosis", "stem_html": "Which of the following best describes the main pathological feature of generalized osteoporosis?", "options": [{"label_html": "Reduction in volume of normally mineralized osteoid matrix", "is_correct": true}, {"label_html": "Increase in volume of normally mineralized osteoid matrix", "is_correct": false}, {"label_html": "Reduction in volume of abnormally mineralized osteoid matrix", "is_correct": false}, {"label_html": "Increase in volume of abnormally mineralized osteoid matrix", "is_correct": false}, {"label_html": "Significant increase in bony trabeculae that are excessively mineralised", "is_correct": false}], "correct_index": 0, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Osteoporosis is characterized by reduction of normally mineralized osteoid matrix<\/div>"}], "note_html": "Osteoporosis is a condition of bone atrophy. It is a lesion in which the volume of bone tissue per unit volume of anatomical bone is reduced. It may be generalized (most common) or localized (following pressure or disuse). The hallmark is a reduction in the amount of osteoid matrix, which, however, remains normally mineralized. It is therefore distinct from osteomalacia in which there is abundant osteoid which is poorly calcified. In osteoporosis the bony trabeculae are greatly thinned which significantly reduces the tensile strength of the bone and renders it at increased risk of pathological fracture. <br>It is only visible on plain films when the calcium content is approximately halved. More subtle changes can be appreciated by use of DEXA scanning. <br><br><b>Treatment<\/b><br>Fractures are treated according to their site and mechanism of injury. Those deemed to occur as a result of osteoporosis should also be addressed medically to treat the underlying osteoporosis.<br>Drugs that can be prescribed to prevent fragility fractures include bisphosphonates (alendronate, ibandronate, risedronate and zoledronic acid) and non-bisphosphonates (raloxifene, denosumab, teriparatide, calcitriol and hormone replacement therapy).<br>Calcium and vitamin D supplements are also administered.<br><br>Individuals at risk of fragility fractures should also be considered for prophylactic medical treatment as outlined above."}, {"name": "Osteoporosis: secondary prevention", "questions": [{"number": 46, "topic": "Osteoporosis: secondary prevention", "stem_html": "A 78-year-old woman is discharged following a fractured neck of femur. On review, she is making good progress but consideration is given to secondary prevention of further fractures. Unfortunately the orthogeriatricians are all on annual leave and the consultant has asked you to arrange suitable management.  Which is the best option?", "options": [{"label_html": "Alendronate", "is_correct": false}, {"label_html": "Alendronate, calcium and vitamin D supplementation", "is_correct": true}, {"label_html": "Strontium", "is_correct": false}, {"label_html": "Arrange a DEXA scan", "is_correct": false}, {"label_html": "Hormone replacement therapy", "is_correct": false}], "correct_index": 1, "explanation_html": "A bisphosphonate, calcium and vitamin D supplementation should be given to all patients aged over 75 years after having a fracture.  A DEXA scan is only needed of the patient is aged below 75 years.  Hormone replacement therapy has been shown to reduce vertebral and non vertebral fractures, however the risks of cardiovascular disease and breast malignancy make this a less favourable option."}], "note_html": "NICE guidelines were updated in 2008 on the secondary prevention of osteoporotic fractures in postmenopausal women.<br><br>Key points include<br><ul><li>Treatment is indicated following osteoporotic fragility fractures in postmenopausal women who are confirmed to have osteoporosis (a T-score of - 2.5 SD or below).<\/li><li>In women aged 75 years or older, a DEXA scan may not be required if the responsible clinician considers it to be clinically inappropriate or unfeasible<\/li><li>Vitamin D and calcium supplementation should be offered to all women unless the clinician is confident they have adequate calcium intake and are vitamin D replete<\/li><li>Alendronate is first-line<\/li><li>Around 25% of patients cannot tolerate alendronate, usually due to upper gastrointestinal problems. These patients should be offered risedronate or etidronate (see treatment criteria below)<\/li><li>Strontium ranelate and raloxifene are recommended if patients cannot tolerate bisphosphonates (see treatment criteria below)<\/li><\/ul><br><b>Supplementary notes on treatment<\/b><br><br>Bisphosphonates<br><ul><li>Alendronate, risedronate and etidronate are all licensed for the prevention and treatment of post-menopausal and glucocorticoid-induced osteoporosis <\/li><li>All three have been shown to reduce the risk of both vertebral and non-vertebral fractures although alendronate, risedronate may be superior to etidronate in preventing hip fractures<\/li><li>Ibandronate is a once-monthly oral bisphosphonate<\/li><\/ul><br>Vitamin D and calcium<br><ul><li>Poor evidence base to suggest reduced fracture rates in the general population at risk of osteoporotic fractures - may reduce rates in frail, housebound patients<\/li><\/ul><br>Raloxifene - selective oestrogen receptor modulator (SERM)<br><ul><li>Has been shown to prevent bone loss and to reduce the risk of vertebral fractures, but has not yet been shown to reduce the risk of non-vertebral fractures<\/li><li>Has been shown to increase bone density in the spine and proximal femur<\/li><li>May worsen menopausal symptoms<\/li><li>Increased risk of thromboembolic events<\/li><li>May decrease risk of breast cancer<\/li><\/ul><br>Strontium ranelate<br><ul><li>'Dual action bone agent' - increases deposition of new bone by osteoblasts and reduces the resorption of bone by osteoclasts<\/li><li>Strong evidence base, may be second-line treatment in near future<\/li><li>Increased risk of thromboembolic events<\/li><\/ul>"}, {"name": "Patella fractures", "questions": [{"number": 47, "topic": "Patella fractures", "stem_html": "A 28 year old man injures his knee whilst playing hockey. His right knee sustains direct impact and this results in a deep laceration of the right knee cap. He is taken to the nearest emergency department. As part of his assessment, xrays are taken of his right knee. These show a right sided patella fracture with a small amount of comminution. What is the most appropriate course of action?", "options": [{"label_html": "Administration of antibiotics, debridement of wound, primary closure and placement in an extensor cast", "is_correct": false}, {"label_html": "Administration of antibiotics, debridement of wound, fracture control with encirclage wires and primary closure", "is_correct": true}, {"label_html": "Administration of antibiotics, debridement of wound, fracture control with external fixator and delayed primary closure", "is_correct": false}, {"label_html": "Administration of antibiotics, wound debridement, patellectomy, tendon advancement and primary closure", "is_correct": false}, {"label_html": "Administration of antibiotics, wound debridement, patellectomy, tendon advancement and delayed primary closure", "is_correct": false}], "correct_index": 1, "explanation_html": "Even in cases where an open fracture is present, patella fractures can be managed with definitive fixation and encirlage wires represent one such technique. Patella fractures do not lend themselves to external fixator placement. Patella excision would be an unusual immediate option unless severe contamination and or severe comminution were present."}], "note_html": "These are rather uncommon injuries and account for around 1% of fractures overall. Around 7% of them are open injuries. Typical mechanisms include either direct impact of indirect tension style injuries which occur from rapid knee flexion against contracted quadriceps muscle causing failure in tension. Depending on mechanism some are comminuted injuries others can be simple transverse or inferior avulsion style injuries. <br><br>Management is determined by mechanism of injury and patient status. Vertical or minimally displaced fractures can be managed by conservative measures. More complex fracture patterns may require operative fixation. There are several operative techniques, plates, cannulated screws and wires are all used. Healing rates of up to 95% are seen. Patients with open fractures see non union rates of up to 10%. Cases which are infected or fail to heal or are significantly infected may require partial or total patellectomy and tendon advancement. These procedures carry associated functional compromise."}, {"name": "Perthes disease", "questions": [{"number": 48, "topic": "Perthes disease", "stem_html": "A 10 year old boy is referred to the orthopaedic clinic with symptoms of right knee pain. He has suffered pain for the past 3 months and the pain typically lasts for several hours. On examination he walks with an antalgic gait and has apparent right leg shortening. The right knee is normal but the right hip reveals pain on internal  and external rotation. Imaging shows flattening of the femoral head. Which of the following is the most likely underlying diagnosis?", "options": [{"label_html": "Osteogenesis imperfecta", "is_correct": false}, {"label_html": "Child abuse", "is_correct": false}, {"label_html": "Osteosarcoma", "is_correct": false}, {"label_html": "Osteopetrosis", "is_correct": false}, {"label_html": "Perthes disease", "is_correct": true}], "correct_index": 4, "explanation_html": "This is a typical description of Perthes disease. Management involves keeping the femoral head in the acetabulum by braces, casts or surgery."}, {"number": 49, "topic": "Perthes disease", "stem_html": "Which of the following is the first radiological change likely to be apparent in a plain radiograph of a 12 year old presenting with suspected Perthes disease", "options": [{"label_html": "Multiple bone cysts", "is_correct": false}, {"label_html": "Sclerosis of the femoral head", "is_correct": true}, {"label_html": "Loss of bone density", "is_correct": false}, {"label_html": "Joint space narrowing", "is_correct": false}, {"label_html": "Collapse of the femoral head", "is_correct": false}], "correct_index": 1, "explanation_html": "In Catterall stage I disease there may be no radiological abnormality at all. In Stage II disease there may be sclerosis of the femoral head.<br><br>Indication for treatment (aide memoire):<i>Half a dozen, half a head<\/i><br>Those aged greater than 6 years with &gt;50% involvement of the femoral head should almost always be treated."}, {"number": 50, "topic": "Perthes disease", "stem_html": "An 8 year old boy presents with symptoms of right knee pain. The pain has been present on most occasions for the past three months and the pain typically lasts for several hours at a time. On examination; he walks with an antalgic gait and has apparent right leg shortening. What is the most likely diagnosis?", "options": [{"label_html": "Perthes Disease", "is_correct": true}, {"label_html": "Osteosarcoma of the femur", "is_correct": false}, {"label_html": "Osteoarthritis of the hip", "is_correct": false}, {"label_html": "Transient synovitis of the hip", "is_correct": false}, {"label_html": "Torn medial meniscus", "is_correct": false}], "correct_index": 0, "explanation_html": "There are many causes of the irritable hip in the 10-14 year age group. Many of these may cause both hip pain or knee pain. Transient synovitis of the hip the commonest disorder but does not typically last for 3 months. An osteosarcoma would not usually present with apparent limb shortening unless pathological fracture had occurred. A slipped upper femoral epiphysis can cause a similar presentation although it typically presents later and with different patient characteristics."}], "note_html": "<b>Perthes disease<\/b><br><ul><li>Idiopathic avascular necrosis of the femoral epiphysis of the femoral head<\/li><li>Impaired blood supply to femoral head, causing bone infarction.  New vessels develop and ossification occurs.  The bone either heals or a subchondral fracture occurs.<\/li><\/ul><br><b>Clinical features<\/b><br><ul><li>Males 4x's greater than females<\/li><li>Age between 2-12 years (the younger the age of onset, the better the prognosis)<\/li><li>Limp<\/li><li>Hip pain<\/li><li>Bilateral in 20%<\/li><\/ul><br><b>Diagnosis<\/b><br>Plain x-ray, Technetium bone scan or magnetic resonance imaging if normal x-ray and symptoms persist.<br><br><b>Catterall staging<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Stage<\/b><\/td><td><b>Features<\/b><\/td><\/tr><tr><td>Stage 1<\/td><td>Clinical and histological features only<\/td><\/tr><tr><td>Stage 2<\/td><td>Sclerosis with or without cystic changes and preservation of the articular surface<\/td><\/tr><tr><td>Stage 3<\/td><td>Loss of structural integrity of the femoral head<\/td><\/tr><tr><td>Stage 4<\/td><td>Loss of acetabular integrity<\/td><\/tr><\/tbody><\/table><\/div><br><b>Management<\/b><br><ul><li>To keep the femoral head within the acetabulum: cast, braces<\/li><li>If less than 6 years: observation<\/li><li>Older: surgical management with moderate results<\/li><li>Operate on severe deformities<\/li><\/ul><br><b>Prognosis<\/b><br>Most cases will resolve with conservative management. Early diagnosis improves outcomes."}, {"name": "Pes anserinus bursitis", "questions": [{"number": 51, "topic": "Pes anserinus bursitis", "stem_html": "An 18 year old athlete attends orthopaedic clinic reporting pain and swelling over the medial aspect of the knee joint. The pain occurs when climbing the stairs, but is not present when walking on flat ground. Clinically there is pain over the medial, proximal tibia and the McMurray test is negative. What is the most likely cause of this patient's symptoms?", "options": [{"label_html": "Anterior cruciate ligament tear", "is_correct": false}, {"label_html": "Prepatellar bursitis", "is_correct": false}, {"label_html": "Medial meniscus injury", "is_correct": false}, {"label_html": "Pes Anserinus Bursitis", "is_correct": true}, {"label_html": "Fracture of tibia", "is_correct": false}], "correct_index": 3, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Pes anserinus: GOOSE'S FOOT<br><br>Combination of sartorius, gracilis and semitendinous tendons inserting into the anteromedial proximal tibia.<\/div>Pes Anserinus Bursitis is common in sportsmen due to overuse injuries. The main sign is of pain in the medial proximal tibia. As the McMurray test is negative, medial meniscal injury is excluded."}], "note_html": "Pes anserinus bursitis refers to symptomatic inflammation of the pes anserinus bursa which is located at the medial aspect of the knee (at the level of the joint space) deep to the pes anserinus tendons. <br><b>Clinical presentation<\/b><br>Classically, symptoms are of pain and swelling along the proximal medial tibia, which may be exacerbated by particular activities such as ascending and descending stairs.  <br><b>Treatment<\/b><br>Most cases resolve with physiotherapy"}, {"name": "Proximal humerus fractures", "questions": [{"number": 52, "topic": "Proximal humerus fractures", "stem_html": "A 74 year old lady falls and injures her left arm. Following assessment she is found to have an impacted fracture affecting the surgical neck of the humerus. What is the most appropriate course of action?", "options": [{"label_html": "Reduce the fracture and apply a plate to stabilize the fragments", "is_correct": false}, {"label_html": "Perform a hemiarthroplasty", "is_correct": false}, {"label_html": "Apply a collar and cuff system for three weeks and then commence physiotherapy", "is_correct": true}, {"label_html": "Apply an upper limb cast for 8 weeks", "is_correct": false}, {"label_html": "Apply an external fixator system", "is_correct": false}], "correct_index": 2, "explanation_html": "Impacted fractures of the surgical neck are stable injuries and usually heal without complication. It is rare to need to resort to surgery. Its important to start physiotherapy early."}, {"number": 53, "topic": "Proximal humerus fractures", "stem_html": "A 64 year old man is involved in a motor vehicle accident and is found to have a fracture affecting the anatomical neck of his humerus which is displaced. What is the most appropriate management?", "options": [{"label_html": "Place a collar and cuff for 3 weeks and then commence physiotherapy", "is_correct": false}, {"label_html": "Hemiarthroplasty", "is_correct": true}, {"label_html": "Place in a collar and cuff for 6 weeks and then commence physiotherapy", "is_correct": false}, {"label_html": "Reduce the fracture and place in an arm sling with repeat imaging at 14 days", "is_correct": false}, {"label_html": "Reduction under anaesthesia and place in collar and cuff system for 6 weeks", "is_correct": false}], "correct_index": 1, "explanation_html": "These injuries are at significant risk of avascular necrosis and consideration of surgery is important. A hemi arthroplasty may be needed."}], "note_html": "Very common injury. Usually through the surgical neck. Number of classification systems though for practical purposes describing the number of fracture fragments is probably easier. Some key points:<br><ul><li>It is rare to have fractures through the anatomical neck.<\/li><li>Anatomical neck fractures which are displaced by &gt;1cm carry a risk of avascular necrosis to the humeral head.<\/li><li>In children the commonest injury pattern is a greenstick fracture through the surgical neck.<\/li><li>Impacted fractures of the surgical neck are usually managed with a collar and cuff for 3 weeks followed by physiotherapy.<\/li><li>More significant displaced fractures may require open reduction and fixation or use of an intramedullary device.<\/li><\/ul>"}, {"name": "Pseudogout", "questions": [{"number": 54, "topic": "Pseudogout", "stem_html": "A 54-year-old man presents to the Emergency Department with a 2 day history of a swollen, painful left knee. You aspirate the joint to avoid admission to the orthopaedic wards.  Aspirated joint fluid shows calcium pyrophosphate crystals. Which of the following blood tests is most useful in revealing an underlying cause?", "options": [{"label_html": "Transferrin saturation", "is_correct": true}, {"label_html": "ACTH", "is_correct": false}, {"label_html": "ANA", "is_correct": false}, {"label_html": "Serum ferritin", "is_correct": false}, {"label_html": "LDH", "is_correct": false}], "correct_index": 0, "explanation_html": "This is a typical presentation of pseudogout. An elevated transferrin saturation may indicate haemochromatosis, a recognised cause of pseudogout.<br><br>A high ferritin level is also seen in haemochromatosis but can be raised in a variety of infective and inflammatory processes, including pseudogout, as part of an acute phase response."}], "note_html": "Pseudogout is a form of microcrystal synovitis caused by the deposition of calcium pyrophosphate dihydrate in the synovium<br><br>Risk factors<br><ul><li>hyperparathyroidism<\/li><li>hypothyroidism<\/li><li>haemochromatosis<\/li><li>acromegaly<\/li><li>low magnesium, low phosphate<\/li><li>Wilson's disease<\/li><\/ul><br>Features<br><ul><li>knee, wrist and shoulders most commonly affected<\/li><li>joint aspiration: weakly-positively birefringent rhomboid shaped crystals<\/li><li>x-ray: chondrocalcinosis<\/li><\/ul><br>Management<br><ul><li>aspiration of joint fluid, to exclude septic arthritis<\/li><li>NSAIDs or intra-articular, intra-muscular or oral steroids as for gout<\/li><\/ul>"}, {"name": "Shoulder disorders", "questions": [{"number": 55, "topic": "Shoulder disorders", "stem_html": "A 23 year old rugby player falls directly onto his shoulder. There is pain and swelling of the shoulder joint. The clavicle is prominent and there appears to be a step deformity. What is the most likely diagnosis?", "options": [{"label_html": "Acromioclavicular joint dislocation", "is_correct": true}, {"label_html": "Glenohumeral dislocation", "is_correct": false}, {"label_html": "Sternoclavicular dislocation", "is_correct": false}, {"label_html": "Supraspinatus tear", "is_correct": false}, {"label_html": "Infra spinatus tear", "is_correct": false}], "correct_index": 0, "explanation_html": "Acromioclavicular joint (ACJ) dislocation normally occurs secondary to direct injury to the superior aspect of the acromion. Loss of shoulder contour and prominent clavicle are key features. Note; rotator cuff tears rarely occur in the third decade."}, {"number": 56, "topic": "Shoulder disorders", "stem_html": "With which of the conditions listed below is a Hill- Sachs lesions classically associated?", "options": [{"label_html": "Fracture of the surgical neck of the humerus", "is_correct": false}, {"label_html": "Glenohumeral dislocation", "is_correct": true}, {"label_html": "Supraspinatus tear", "is_correct": false}, {"label_html": "Acromioclavicular dislocation", "is_correct": false}, {"label_html": "Sternoclavicular dislocation", "is_correct": false}], "correct_index": 1, "explanation_html": "A Hill-Sachs lesion occurs when the cartilage surface of the humerus is in contact with the rim of the glenoid. About 50% of anterior glenohumeral dislocations are associated with this lesion."}, {"number": 57, "topic": "Shoulder disorders", "stem_html": "A 60 year old female presents to the emergency room after tripping on a step. She complains of shoulder pain. On examination, there is difficulty in initiating shoulder abduction. What is the most likely diagnosis?", "options": [{"label_html": "Glenohumeral dislocation", "is_correct": false}, {"label_html": "Fracture of the anatomical neck of the humerus", "is_correct": false}, {"label_html": "Sternoclavicular dislocation", "is_correct": false}, {"label_html": "Supraspinatus tear", "is_correct": true}, {"label_html": "Infraspinatus tear", "is_correct": false}], "correct_index": 3, "explanation_html": "A supraspinatus tear is the most common of rotator cuff tears. It occurs as a result of degeneration and is rare in younger adults."}, {"number": 58, "topic": "Shoulder disorders", "stem_html": "A 78 year old man complains of a long history of shoulder pain and more recently weakness. On examination, active attempts at abduction are impaired. Passive movements are normal. What is the most likely diagnosis?", "options": [{"label_html": "Rotator cuff tear", "is_correct": true}, {"label_html": "Osteoarthritis", "is_correct": false}, {"label_html": "Metastatic malignancy", "is_correct": false}, {"label_html": "Adhesive capsulitis", "is_correct": false}, {"label_html": "Calcific tendonitis", "is_correct": false}], "correct_index": 0, "explanation_html": "Rotator cuff tears are common in elderly people and may occur following minor trauma or as a result of long standing impingement. Tears greater than 2cm should generally be repaired surgically. The length of the history in this scenario is suggestive of a tear complicating impingement."}, {"number": 59, "topic": "Shoulder disorders", "stem_html": "A 63 year old lady undergoes an axillary clearance for breast cancer. She makes steady progress. However, 8 weeks post operatively she still suffers from severe shoulder pain. On examination, she has reduced active movements in all planes and loss of passive external rotation. What is the most likely cause?", "options": [{"label_html": "Metastatic cancer", "is_correct": false}, {"label_html": "Adhesive capsulitis", "is_correct": true}, {"label_html": "Rotator cuff tear", "is_correct": false}, {"label_html": "Osteoarthritis", "is_correct": false}, {"label_html": "Rheumatoid disease", "is_correct": false}], "correct_index": 1, "explanation_html": "Frozen shoulder is more likely. Metastatic cancer can cause pain. However, passive movements are normally unaffected.<br>Frozen shoulder passes through an initial painful stage followed by a period of joint stiffness. With physiotherapy the problem will usually resolve although it may take up to 2 years to do so."}, {"number": 60, "topic": "Shoulder disorders", "stem_html": "A 28 year old man complains of pain and weakness in the shoulder. He has recently been unwell with glandular fever from which he is fully recovered. On examination there is some evidence of muscle wasting and a degree of winging of the scapula. Power during active movements is impaired. What is the most likely cause?", "options": [{"label_html": "Parsonage-Turner syndrome", "is_correct": true}, {"label_html": "Adhesive capsulitis", "is_correct": false}, {"label_html": "Rotator cuff tear", "is_correct": false}, {"label_html": "Osteoarthritis", "is_correct": false}, {"label_html": "Calcific tendonitis", "is_correct": false}], "correct_index": 0, "explanation_html": "This is a peripheral neuropathy that may complicate viral illnesses and usually resolves spontaneously."}, {"number": 61, "topic": "Shoulder disorders", "stem_html": "A 23 year old man who plays rugby for a hobby presents with recurrent anterior dislocation of the shoulder. Which of the following abnormalities is most likely to be present to account for this?", "options": [{"label_html": "Rotator cuff tear", "is_correct": false}, {"label_html": "Biceps tendon rupture", "is_correct": false}, {"label_html": "Bankart lesion", "is_correct": true}, {"label_html": "Axillary nerve injury", "is_correct": false}, {"label_html": "Infraspinatus tendinitis", "is_correct": false}], "correct_index": 2, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">A Bankart lesion is an injury of the anterior (inferior) glenoid labrum of the shoulder due to anterior shoulder dislocation. When this happens, a pocket at the front of the glenoid forms that allows the humeral head to dislocate into it.<\/div>Anterior dislocations are the most common. When recurrent, a Bankart lesion is the most common underlying abnormality. This is usually visualised by CT and MRI scanning and often repaired arthroscopically."}], "note_html": "<b>Shoulder fractures and dislocations<\/b><br><b>Fractures<\/b><br>Proximal humerus<br><i>Background<\/i><ul><li>Third most common fragility fracture in the elderly. <\/li><li>Results from low energy fall in predominantly elderly females, or from high energy trauma in young males.<\/li><li>Can be associated with nerve injury (commonly axillary), and fracture-dislocation of the humeral head. Detailed neurological assessment is essential for all upper limb injuries.<\/li><\/ul><br><b>Anatomy<\/b><br><b>Osteology<\/b><br>Consists of articular head, greater tuberosity, lesser tuberosity, metaphysis and diaphysis. Between the articular head and the tuberosities is the anatomical neck (previous physis). Between the tuberosities and the metaphysis is the surgical neck.<br>The supraspinatus, infraspinatus and teres minor muscles attach to the greater tuberosity. The subscapularis muscle attaches to the lesser tuberosity.<br><br><b>Vascular Supply<\/b><br>Humeral head is supplied by the anterior and posterior humeral circumflex arteries. Anatomical neck fractures are at greatest risk of osteonecrosis.<br><br><b>Imaging<\/b><br>Imaging aims to both delineate the fracture pattern, and confirm/exlude the presence \tof an associated dislocation. <br><ul><li>Radiographs - True anteroposterior (AP), axillary lateral and/or scapula Y view.<\/li><li>CT - indicated to better define intra-articular involvement and to aid pre-operative planning. MRI is not useful for fracture imaging.\t\t\t<\/li><\/ul><br><b>Classification<\/b><br>Description of the fracture is often more useful than classification. Particular attention should be paid to humeral alignment, fracture displacement, and greater tuberosity position (rotator cuff will pull the GT supero-posterioly, which can cause impingement problems with malunion).<br>    - Neer Classification: Most commonly used. Describes fracture as 2,3,or 4 part depending upon the number main fragments. Also comments on the degree of displacement. Fragments:<br>-greater tuberosity<br>-lesser tuberosity<br>- articular surface<br>- shaft<br>Displacement: &gt;1cm or angulation &gt;45 degrees.<br>\t\t\t<br><b>Treatment<\/b><br>The vast majority of proximal humeral fractures are minimally displaced, and therefore can be managed conservatively. This involves immobilisation in a polysling, and progressive mobilisation. Pendular exercise can commence at 14 days, and active abduction from 4-6 weeks.<br><br>Irreducible fracture dislocation is an indication for operative management. Other indications include large displacement, younger patient, head splitting (intra-articular fractures). However, the recent PROFHER trial (1) has suggested no benefit to operative intervention on patient outcome (it must be applied cautiously as majority of patients were elderly with extraarticular fractures). Options available for surgical management include:<br><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td>ORIF<\/td><td>Most commonly used. Plate and screw fixation. Can reconstruct complex fractures.<\/td><\/tr><tr><td>Intramedullary nail<\/td><td>Suitable for extra-articular configuration, predominantly surgical neck +/- GT fractures.<\/td><\/tr><tr><td>Hemiarthroplasty<\/td><td>Used for un-reconstructable fractures in the older patient who has good glenoid quality.<\/td><\/tr><tr><td>Total shoulder arthroplasty<\/td><td>Unconstructable fractures where high functioning shoulder is required (hemiarthroplasty will cause glenoid erosion)<\/td><\/tr><tr><td>Reverse shoulder arthroplasty<\/td><td>Total shoulder arthroplasty that provides better functional outcome than conventional total shoulder replacement.<\/td><\/tr><\/tbody><\/table><\/div><br>\t <br><br><b>Scapula<\/b><br><b>Background<\/b><br>Uncommon fractures usually associated with high energy trauma. Most commonly involve scapula body or spine (50%), glenoid fossa and glenoid neck. Important to exclude associated life threatening injury.<br><br><b>Imaging<\/b><br>Plain radiographs should include true anteroposterior (AP), axillary lateral and/or scapula Y view. CT scanning is useful for defining intra-articular involvement, displacement and for three dimensional reconstruction.<br>\t<br><b>Classification<\/b><br>Based on the location of the fracture (coracoid, acromion, glenoid neck, glenoid fossa, scapula body). Beware of ipsilateral glenoid neck and clavicle fracture -floating shoulder - where limb is effectively dissociated from axial skeleton.<br>\t<br><b>Treatment<\/b><br>The vast majority of scapula fractures are amenable to conservative management, consisting of sling immobilisation for two weeks followed by early rehabilitation. Floating shoulder will usually require fixation, and consideration of surgery should also be given to intra-articular and displaced/angulated glenoid fractures.<br><br><b>Dislocations<\/b><br>\t<br><b>Types<\/b><br>Dislocations around the shoulder joint include glenohumeral dislocation, acromioclavicular joint disruption and sternoclavicular dislocation. Only glenohumeral \tdislocation will be covered here.<br>\t<br><b>Glenohumeral dislocation<\/b><br>Diagnosis, classification and management are covered here.<br>\t<br><b>Background<\/b><br>Shoulder dislocation is commonly seen in A&amp;E. It has a high recurrence rate that is as high as 80% in teenagers. Initial management requires emergent reduction to prevent lasting chondral damage.<br>\t<br><b>Early assessment and management<\/b><br>Usually a traumatic cause (multi-directional instability in frequent dislocations requires discussion with orthopaedics and is not covered here). Careful history, examination and documentation of neurovascular status of the limb, in particular the axillary nerve (regimental badge sensation). This should be re-assessed post manipulation. Early radiographs to confirm direction of dislocation.<br>\t<br>Initial management consists of emergent closed reduction under under entanox and analgesia, but often requires conscious sedation. Arm should then be immobilised in a polysling, and XR to confirm relocation.<br>\t<br>Imaging - True anteroposterior (AP), axillary lateral and/or scapula Y view. Reduced humeral head should lie between acromion and coracoid on lateral/scapula view. <br><br><b>\tTypes<\/b><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th>Direction<\/th><th>Features<\/th><th>Cause<\/th><th>\tExamination<\/th><th>\tReduction techniques<\/th><\/tr><\/thead><tbody><tr><td>Anterior<\/td><td>\tMost Common &gt;90%<\/td><td>\tUsually traumatic - anterior force on arm when shoulder is abducted, externally rotated<\/td><td>\tLoss of shoulder contour - sulcus sign. Humeral head can be felt anteriorly.<\/td><td>\t<br>Hippocratic.<br>Milch.<br>Stimson.<br><br>Kocher not advised due to complication of fracture<\/td><\/tr><tr><td>Posterior<\/td><td>50% missed in A&amp;E<\/td><td>50% traumatic, but classically post seizure or electrocution<\/td><td>\tShoulder locked in internal rotation. XR may show lightbulb appearance.<\/td><td>\tGentle lateral traction to adducted arm.<\/td><\/tr><tr><td>Inferior<\/td><td>\tRare<\/td><td>\tAssociated with pectorals and rotator cuff tears, and glenoid fracture<\/td><td>\tAs for primary injury<\/td><td>Management of primary injury<\/td><\/tr><tr><td>Superior<\/td><td>\tRare<\/td><td>\tAssociated with acrominon/clavicle fracture<\/td><td>As for primary injury<\/td><td>Management of primary injury<\/td><\/tr><\/tbody><\/table><\/div>\t<br><br>\t<br><b>Associated injuries<\/b><br><ul><li>Bankart lesion - avulsion of the anterior glenoid labrum with an anterior shoulder dislocation (reverse Bankart if poster labrum in posterior dislocation).<\/li><li>Hill Sachs defect - chondral impaction on posteriosuperior humeral head from contact with gleonoid rim. Can be large enough to lock shoulder, requiring open reduction. (Reverse Hill Sachs in posterior dislocation).<\/li><li>Rotator cuff tear  - increases with age.<\/li><li>Greater or lesser tuberosity fracture - increases with age.<\/li><li>Humeral neck fracture - shoulder fracture dislocation. More common in high energy trauma and elderly. Should be discussed with orthopaedics prior to any attempted reduction.<\/li><\/ul><br><b>Rotator Cuff Disease<\/b><br><br>Rotator cuff disease is a spectrum of conditions that ranges from subacromial impingement to rotator cuff tears and eventually to rotator cuff arthropathy (arthritis).<br>\t<br><b>Anatomy<\/b><br>The rotator cuff is a group of four muscles that are important in shoulder movements, and maintenance of glenohumeral stability.<br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid2\"><thead><tr><th>Muscle<\/th><th>\tScapular attachment<\/th><th>Humeral attachment<\/th><th>Action<\/th><th>Innervation<\/th><\/tr><\/thead><tbody><tr><td>Supraspinatus<\/td><td>Supraspinatus fossa<\/td><td>Superior facet of greater tuberosity<\/td><td>Initiation of abduction of humerus<\/td><td>Suprascapular nerve<\/td><\/tr><tr><td>Infraspinatus<\/td><td>Infraspinatus fossa<\/td><td>\tPosterior facet of greater tuberosity<\/td><td>External rotation of humerus<\/td><td>Suprascapular nerve<\/td><\/tr><tr><td>Teres Minor<\/td><td>Lateral border<\/td><td>Inferior facet of greater tuberosity<\/td><td>External rotation of humerus<\/td><td>Axillary Nerve<\/td><\/tr><tr><td>Subscapularis<\/td><td>Subscapular fossa<\/td><td>Lesser tuberosity<\/td><td>Internal rotation of humerus<\/td><td>Upper and lower subscapular nerve<\/td><\/tr><\/tbody><\/table><\/div><br><ul><li>The inferior rotator cuff muscles (infraspinatus, teres minor, and subscapularis) balance the superior pull of the deltoid. Injury/tear results in upward migration of the humeral head on the glenoid (can be seen on AP radiograph).<\/li><li>Likewise, the anterior muscles (subscapularis) are balanced with the posterior muscles (infraspinatus, teres minor).<\/li><\/ul><br><b>Subacromial Impingement<\/b><br><br><ul><li>The most common cause of shoulder pain, which results from impingement of the superior cuff on the undersurface of the acromion, and an inflammatory bursitis.<\/li><li>Associated with certain types of acromial morphology (Bigliani classification).<\/li><li>Presents as insidious pain which is exacerbated by overhead activities.<\/li><\/ul><br><b>Rotator Cuff Tear<\/b><br><br><ul><li>Often presents as an acute event on the background of chronic subacromial impingement in the older patient, but can present as an avulsion injury in younger patients.<\/li><li>Majority of tears are to the superior cuff (supraspinatus, infraspinatus, teres minor), though a tear to subscapularis is associated with subcoracoid impingement.<\/li><li>Tears present as pain and weakness when using the muscles in question.<\/li><\/ul><br><b>Rotator Cuff Arthropathy<\/b><br><br><ul><li>Defined as shoulder arthritis in the setting of rotator cuff dysfunction. Results from superior migration due to the loss of rotator cuff function and integrity. Unopposed deltoid pulls the humeral head superiorly. <\/li><li>Associated with massive chronic cuff tears.<\/li><\/ul><br><b>Imaging<\/b><br>\t<br>Plain radiographs<br><ul><li>AP of the shoulder may show superior migration of the humerus with a cuff tear, and features of arthritis with arthropathy. Other causes of pain may also be identified (e.g. calcific tendonitis/fracture)\t<\/li><li>Outlet view is useful for defining the acromial morphology<\/li><\/ul><br>USS<br><ul><li>Allows dynamic imaging of the cuff, and is inexpensive. However, it is very user dependent.<\/li><\/ul><br>MRI<br><ul><li>Best imaging modality for cuff pathology. <\/li><li>Also allows imaging of the rest of the shoulder. When intra-articular pathology is suspected, can be combined with an arthrogram for improved sensitivity and specificity.<\/li><\/ul>\t\t\t<br><b>Treatment<\/b><br><br><i>Subacromial impingement<\/i><ul><li>Physiotherapy, oral anti-inflammatory medication<\/li><li>Subacromial steroid injection can settle inflammation<\/li><li>Arthroscopic subacromial decompression  by shaving away the undersurface of the acromion, more space is created for the rotator cuff. Cuff integrity is assessed also at time of surgery, and can be repaired if necessary.<\/li><\/ul><br> <i>Rotator cuff tear<\/i><ul><li>When considering repair of a cuff tear, the age and activity of the patient, the nature of the tear (degenerative vs. acute traumatic), and the size and retraction of the tear should be considered when making a surgical plan.<\/li><li>Mild tears or tears in the elderly can be managed conservatively, as outlined above.<\/li><li>Moderate tears can be repaired arthroscopically. Massive or retracted tears will often require an open repair (occasionally with a tendon transfer). Subacromial decompression is performed at the same time to reduce impingement, symptoms and recurrence.<\/li><\/ul><br><i>Calcific tendonitis<\/i><br>Calcific tendonitis involves calcific deposits within tendons anywhere in the body, but most commonly in the rotator cuff (specifically the supraspinatus tendon). When present in the shoulder, it is associated with subacromial impingement and pain.<br> \t<br>Pathology<br><ul><li>More common in women aged 30-60 years.<\/li><li>Association with diabetes and hypothyroidism<\/li><\/ul><br>There are three stages of calcification<br><ul><li>Formative phase characterized by calcific deposits<\/li><li>Resting phase  deposit is stable, but presents with impingement problems<\/li><li>Resorptive phase  phagocytic resorption. Most painful stage.<\/li><\/ul><br>Presentation<br><ul><li>Similar in presentation to subacromial impingement, with pain especially with over head activities. Atraumatic in nature.<\/li><\/ul><br>Imaging<br><ul><li>Plain radiographs show calcification of the rotator cuff, usually within 1.5cm of its insertion on the humerus. Supraspinatus outlet views can show level of impingment. Further imaging is rarely needed.<\/li><\/ul><br>Treatment<br><ul><li>Non-operative  NSAIDS, steroid injection (controversial, but practiced) and physiotherapy. Approximately 75% will resolve by 6 months with conservative management.<\/li><li>Ultrasound guided or surgical needle barbotage can break down deposits and resolve symptoms. Occasionally surgical excision is required.<\/li><\/ul><br><i>Adhesive capsulitis (Frozen Shoulder)<\/i><br><ul><li>Pain and loss of movement of shoulder joint, which involves fibroplastic proliferation of capsular tissue, causing soft tissue scarring and contracture. Patients present with a painful and decreased arc of motion.<\/li><li>Associated with prolonged immobilization, previous surgery, thyroid disorders (AI) and diabetes<\/li><li>Classically three stages which can take up to two years to resolve:<\/li><\/ul><div class=\"alert alert-warning\">Stage one  the freezing and painful stage<br>Stage two  the frozen and stiff stage<br>Stage three  the thawing stage, where shoulder movement slowly improves<br><\/div><br>Imaging<br><ul><li>Plain radiographs to exclude other causes of a painful shoulder<\/li><li>MRI arthrogram may show capsular contracture, and again may be used to exclude cuff pathology. However, often not performed as diagnosis is largely clinical.<\/li><\/ul><br>Treatment<br><ul><li>Non-operative  NSAIDS, steroid injection and physiotherapy. Patience is required as condition can take up to 2 years to improve.<\/li><li>Operative  MUA or arthroscopic adhesiolysis (release of adhesions) can expedite recovery, followed by intensive physiotherapy.<\/li><\/ul><br><i>Glenohumeral Arthritis<\/i><br><b>Background <\/b><br><ul><li>May be osteoarthritis (primary or secondary to cuff tear or trauma), rheumatoid arthritis, or as part of a spondyloarthropathy. Majority of those with RA will develop symptoms.<\/li><li>More common in the elderly<\/li><li>Presents like any other arthritis - pain at night and with movement<\/li><\/ul><br><b>Imaging<\/b><br><ul><li>AP and axillary radiographs will show features of arthritis. <\/li><li>CT/MRI is often useful to classify the shape of the glenoid and extent of bone loss when considering arthroplasty. MRI also essential to asses integrity of rotator cuff if considering shoulder replacement.<\/li><\/ul><br><b>Treatment<\/b><br>Like all orthopaedics, start with simple measures:<br><ul><li>NSAIDS, management of RA, physiotherapy, steroid injection.<\/li><li>Hemiarthroplasty can sometimes be considered if glenoid is in excellent condition or if patient has large comorbidity. <\/li><li>Arthroscopic debridement is useful if patient has isolated ACJ arthritis, but is rarely used for glenohumeral arthritis. <\/li><li>Total shoulder replacement is shown to produce superior outcome when compared to hemiarthroplasty in terms of pain relief, function and implant survival.<\/li><li>Total shoulder replacement can be anatomical (ball on humerus, with cup on glenoid), or reverse geometry (ball on glenoid, with cup on humerus). Anatomical TSR requires an in tact rotator cuff, so often reverse is preferable when the cuff if questionable in integrity.<\/li><\/ul><br><br><i>References<\/i><br>1. JAMA. 2015;313(10):1037-1047. doi:10.1001/jama.2015.1629"}, {"name": "Spinal disorders", "questions": [{"number": 62, "topic": "Spinal disorders", "stem_html": "A 58 year old man presents to the plastics team with severe burns to his hands. He is not distressed by the burns. He has bilateral charcot joints. On examination; there is loss of pain and temperature sensation of the upper limbs. What is the most likely diagnosis?", "options": [{"label_html": "Potts disease of the spine", "is_correct": false}, {"label_html": "Tabes dorsalis", "is_correct": false}, {"label_html": "Transverse myelitis", "is_correct": false}, {"label_html": "Syringomyelia", "is_correct": true}, {"label_html": "Subacute degeneration of the cord", "is_correct": false}], "correct_index": 3, "explanation_html": "This patient has syringomyelia which selectively affects the spinotholamic tracts. Syringomyelia is a disorder in which a cystic cavity forms within the spinal cord. The commonest variant is the Arnold- Chiari malformation in which the cavity connects with a congenital malformation affecting the cerebellum. Acquired forms of the condition may occur as a result of previous meningitis, surgery or tumours. Many neurological manifestations have been reported, although the classical variety spares the dorsal columns and medial lemniscus and affecting only the spinothalamic tract with loss of pain and temperature sensation. The bilateral distribution of this patients symptoms would therefore favor syringomyelia over SCID or Brown Sequard syndrome. Osteomyelitis would tend to present with back pain and fever in addition to any neurological signs. Epidural haematoma large enough to produce neurological impairment will usually have motor symptoms in addition to any selective sensory loss, and the history is usually shorter."}, {"number": 63, "topic": "Spinal disorders", "stem_html": "A 34 year old man presents with localised spinal pain over 2 months which is worsened on movement. He is known to be an IVDU. He has no history suggestive of tuberculosis. The pain is now excruciating at rest and not improving with analgesia. He has a temperature of 39 <sup>o<\/sup>C. What is the most likely diagnosis?", "options": [{"label_html": "Transverse myelitis", "is_correct": false}, {"label_html": "Osteomyelitis", "is_correct": true}, {"label_html": "Potts disease of the spine", "is_correct": false}, {"label_html": "Epidural haematoma", "is_correct": false}, {"label_html": "Brown-Sequard syndrome", "is_correct": false}], "correct_index": 1, "explanation_html": "In an IVDU with back pain and pyrexia have a high suspicion for osteomylelitis. The most likely organism is staph aureus and the cervical spine is the most common region affected. TB tends to affect the thoracic spine and in other causes of osteomyelitis the lumbar spine is affected."}, {"number": 64, "topic": "Spinal disorders", "stem_html": "A 22 year man is shot in the back, in the lumbar region. He has increased tone and hyper-reflexia of his right leg. He cannot feel his left leg. What is the most likely explanation?", "options": [{"label_html": "Epidural haematoma", "is_correct": false}, {"label_html": "Osteomyelitis", "is_correct": false}, {"label_html": "Transverse myelitis", "is_correct": false}, {"label_html": "Brown-Sequard syndrome", "is_correct": true}, {"label_html": "Tabes dorsalis", "is_correct": false}], "correct_index": 3, "explanation_html": "Brown -Sequard syndrome is caused by hemisection of the spinal cord. It may result from stab injuries or lateral vertebral fractures. It results in ipsilateral paralysis (pyramidal tract) , and also loss of proprioception and fine discrimination (dorsal columns). Pain and temperature sensation are lost on the contra-lateral side. This is because the fibres of the spinothalamic tract have decussated below the level of the cord transection."}], "note_html": "<div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Dorsal column lesion<\/b><\/td><td><ul><li>Loss vibration and proprioception<\/li><li>Tabes dorsalis, SACD<\/li><\/ul><\/td><\/tr><tr><td><b>Spinothalamic tract lesion<\/b><\/td><td><ul><li>Loss of pain, sensation and temperature<\/li><\/ul><\/td><\/tr><tr><td><b>Central cord lesion<\/b><\/td><td><ul><li>Flaccid paralysis of the upper limbs<\/li><\/ul><\/td><\/tr><tr><td><b>Osteomyelitis<\/b><\/td><td><ul><li>Normally progressive<\/li><li>Staph aureus in IVDU, normally cervical region affected<\/li><li>Fungal infections in immunocompromised<\/li><li>Thoracic region affected in TB<\/li><\/ul><\/td><\/tr><tr><td><b>Infarction spinal cord<\/b><\/td><td><ul><li>Dorsal column signs (loss of proprioception and fine discrimination)<\/li><\/ul><\/td><\/tr><tr><td><b>Cord compression<\/b><\/td><td><ul><li>UMN signs<\/li><li>Malignancy<\/li><li>Haematoma<\/li><li>Fracture<\/li><\/ul><\/td><\/tr><tr><td><b>Brown-sequard syndrome<\/b><\/td><td><ul><li>Hemisection of the spinal cord<\/li><li>Ipsilateral paralysis<\/li><li>Ipsilateral loss of proprioception and fine discrimination<\/li><li>Contralateral loss of pain and temperature<\/li><\/ul><\/td><\/tr><\/tbody><\/table><\/div><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb053b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb053.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Dermatome (anatomy)\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb053b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb054b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb054.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Dermatome (anatomy)\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb054b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center><br><b>Dermatomes<\/b><br><ul><li><b>C2 to C4<\/b> The C2 dermatome covers the occiput and the top part of the neck. C3 covers the lower part of the neck to the clavicle. C4 covers the area just below the clavicle.<\/li><li><b>C5 to T1<\/b> Situated in the arms. C5 covers the lateral arm at and above the elbow. C6 covers the forearm and the radial (thumb) side of the hand. C7 is the middle finger, C8 is the medial aspect of the hand, and T1 covers the medial side of the forearm.<\/li><li><b>T2 to T12<\/b> The thoracic covers the axillary and chest region. T3 to T12 covers the chest and back to the hip girdle. The nipples are situated in the middle of T4. T10 is situated at the umbilicus. T12 ends just above the hip girdle.<\/li><li><b>L1 to L5<\/b> The cutaneous dermatome representing the hip girdle and groin area is innervated by L1 spinal cord. L2 and 3 cover the front part of the thighs. L4 and L5 cover medial and lateral aspects of the lower leg.<\/li><li><b>S1 to S5<\/b> S1 covers the heel and the middle back of the leg. S2 covers the back of the thighs. S3 cover the medial side of the buttocks and S4-5 covers the perineal region. S5 is of course the lowest dermatome and represents the skin immediately at and adjacent to the anus.<\/li><\/ul><br><b>Myotomes<\/b><br><br>Upper limb<br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Elbow flexors/Biceps<\/b><\/td><td>C5<\/td><\/tr><tr><td><b>Wrist extensors<\/b><\/td><td>C6<\/td><\/tr><tr><td><b>Elbow extensors/Triceps<\/b><\/td><td>C7<\/td><\/tr><tr><td><b>Long finger flexors<\/b><\/td><td>C8<\/td><\/tr><tr><td><b>Small finger abductors<\/b><\/td><td>T1<\/td><\/tr><\/tbody><\/table><\/div><br>Lower limb<br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Hip flexors (psoas)<\/b><\/td><td>L1 and L2<\/td><\/tr><tr><td><b>Knee extensors (quadriceps)<\/b><\/td><td>L3<\/td><\/tr><tr><td><b>Ankle dorsiflexors (tibialis anterior)<\/b><\/td><td>L4 and L5<\/td><\/tr><tr><td><b>Toe extensors (hallucis longus)<\/b><\/td><td>L 5<\/td><\/tr><tr><td><b>Ankle plantar flexors (gastrocnemius)<\/b><\/td><td>S1<\/td><\/tr><\/tbody><\/table><\/div><br>The anal sphincter is innervated by S2,3,4"}, {"name": "Stress fractures", "questions": [{"number": 65, "topic": "Stress fractures", "stem_html": "A 19 year old soldier has just returned from a prolonged marching exercise and presents with a sudden onset, severe pain, in the forefoot. Clinical examination reveals tenderness along the second metatarsal. Plain x-rays are taken of the area, these demonstrate callus surrounding the shaft of the second metatarsal. What is the most likely diagnosis?", "options": [{"label_html": "Stress fracture", "is_correct": true}, {"label_html": "Mortons neuroma", "is_correct": false}, {"label_html": "Osteochondroma", "is_correct": false}, {"label_html": "Acute osteomyelitis", "is_correct": false}, {"label_html": "Freiberg's disease", "is_correct": false}], "correct_index": 0, "explanation_html": "A short history of pain together with clinical examination and radiological signs affecting the second metatarsal favour a stress fracture. The fact that callus is present suggests that immobilisation is unlikely to be beneficial. Freibergs disease is an anterior metatarsalgia affecting the head of the second metarsal, it typically occurs in the pubertal growth spurt. The initial injury was thought to be due to stress microfractures at the growth plate. The key feature in the history which distinguishes the injury as being stress fracture is the radiology. In Freibergs disease the x-ray changes include; joint space widening, formation of bony spurs, sclerosis and flattening of the metatarsal head."}], "note_html": "Repetitive activity and loading of normal bone may result in small hairline fractures. Whilst these may be painful they are seldom displaced. Surrounding soft tissue injury is unusual. They may present late following the injury, in which case callus formation may be identified on radiographs. Such cases may not require formal immobilisation, injuries associated with severe pain and presenting at an earlier stage may benefit from immobilisation tailored to the site of injury."}, {"name": "Upper limb fractures", "questions": [{"number": 66, "topic": "Upper limb fractures", "stem_html": "A 32 year old man presents with a painful swelling over the volar aspect of his hand after receiving a hard blow to his palm. On examination, he experiences pain on moving the wrist and on longitudinal compression of the thumb. What is the most likely injury?", "options": [{"label_html": "Bennets fracture", "is_correct": false}, {"label_html": "Scaphoid fracture", "is_correct": true}, {"label_html": "5th metacarpal fracture", "is_correct": false}, {"label_html": "Ganglion", "is_correct": false}, {"label_html": "Bursitis", "is_correct": false}], "correct_index": 1, "explanation_html": "Scaphoid fractures usually occur as a result of direct hard blow to the palm or following a fall on the out-stretched hand. The main physical signs are swelling and tenderness in the anatomical snuff box, and pain on wrist movements and on longitudinal compression of the thumb"}, {"number": 67, "topic": "Upper limb fractures", "stem_html": "A 26 year old man presents to the emergency department with a swelling over his left elbow after a fall on an outstretched hand. On examination, he has tenderness over the proximal part of his forearm, and has severely restricted supination and pronation movements. What is the most likely injury?", "options": [{"label_html": "Fracture of the olecranon", "is_correct": false}, {"label_html": "Fracture of the radial head", "is_correct": true}, {"label_html": "Galeazzi fracture", "is_correct": false}, {"label_html": "Fracture of the shaft of the radius and ulnar", "is_correct": false}, {"label_html": "Fracture of the coronoid process", "is_correct": false}], "correct_index": 1, "explanation_html": "Fracture of the radial head is common in young adults. It is usually caused by a fall on the outstretched hand. On examination, there is marked local tenderness over the head of the radius, impaired movements at the elbow, and a sharp pain at the lateral side of the elbow at the extremes of rotation (pronation and supination)."}, {"number": 68, "topic": "Upper limb fractures", "stem_html": "A 56 year old lady presents with a painful swelling over the lower end of the forearm following a fall. Imaging reveals a distal radial fracture with disruption of the distal radio-ulnar joint. What is the most likely fracture?", "options": [{"label_html": "Fracture of the distal humerus", "is_correct": false}, {"label_html": "Fracture of the shaft of the radius and ulnar", "is_correct": false}, {"label_html": "Fracture of the coronoid process", "is_correct": false}, {"label_html": "Galeazzi fracture", "is_correct": true}, {"label_html": "Fracture of the radial head", "is_correct": false}], "correct_index": 3, "explanation_html": "Galeazzi fractures occur after a fall on the hand with a rotational force superimposed on it. On examination, there is bruising, swelling and tenderness over the lower end of the forearm. X- Rays reveal a displaced fracture of the radius and a prominent ulnar head due to dislocation of the inferior radio-ulnar joint."}], "note_html": "<b>Colles' fracture<\/b><br><ul><li>Fall onto extended outstretched hands<\/li><li>Described as a dinner fork type deformity<\/li><li>Classical Colles' fractures have the following 3 features:<\/li><\/ul><br><i>Features of the injury<\/i><br>1. Transverse fracture of the radius <br>2. 1 inch proximal to the radio-carpal joint <br>3. Dorsal displacement and angulation<br><br><b>Smith's fracture (reverse Colles' fracture)<\/b><br><ul><li>Volar angulation of distal radius fragment (Garden spade deformity)<\/li><li>Caused by falling backwards onto the palm of an outstretched hand or falling with wrists flexed<\/li><\/ul><br><b>Bennett's fracture<\/b><br><ul><li>Intra-articular fracture of the first carpometacarpal joint<\/li><li>Impact on flexed metacarpal, caused by fist fights<\/li><li>X-ray: triangular fragment at ulnar base of metacarpal<\/li><\/ul><br><b>Monteggia's fracture<\/b><br><ul><li>Dislocation of the proximal radioulnar joint in association with an ulna fracture<\/li><li>Fall on outstretched hand with forced pronation<\/li><li>Needs prompt diagnosis to avoid disability<\/li><\/ul><br><b>Galeazzi fracture<\/b><br><ul><li>Radial shaft fracture with associated dislocation of the distal radioulnar joint<\/li><li>Occur after a fall on the hand with a rotational force superimposed on it. <\/li><li>On examination, there is bruising, swelling and tenderness over the lower end of the forearm. <\/li><li>X Rays reveal the displaced fracture of the radius and a prominent ulnar head due to dislocation of the inferior radio-ulnar joint.<\/li><\/ul><br><b>Barton's fracture<\/b><br><ul><li>Distal radius fracture (Colles'/Smith's) with associated radiocarpal dislocation<\/li><li>Fall onto extended and pronated wrist<\/li><\/ul><br><b>Scaphoid fractures<\/b><br><ul><li>Scaphoid fractures are the commonest carpal fractures.<\/li><li>Surface of scaphoid is covered by articular cartilage with small area available for blood vessels (fracture risks blood supply)<\/li><li>Forms floor of anatomical snuffbox<\/li><li>Risk of fracture associated with fall onto outstretched hand (tubercle, waist, or proximal 1/3)<\/li><li>The main physical signs are swelling and tenderness in the anatomical snuff box, and pain on wrist movements and on longitudinal compression of the thumb.<\/li><li>Ulnar deviation AP needed for visualization of scaphoid <\/li><li>Immobilization of scaphoid fractures difficult<\/li><\/ul><br><b>Radial head fracture<\/b><br><ul><li>Fracture of the radial head is common in young adults. <\/li><li>It is usually caused by a fall on the outstretched hand. <\/li><li>On examination, there is marked local tenderness over the head of the radius, impaired movements at the elbow, and a sharp pain at the lateral side of the elbow at the extremes of rotation (pronation and supination).<\/li><\/ul>"}]}</script>
  <script>
    const quizData = JSON.parse(document.getElementById("quiz-data").textContent);
    const app = document.getElementById("app");
    const modeButtons = Array.from(document.querySelectorAll("[data-mode-button]"));
    const topicActionButtons = Array.from(document.querySelectorAll("[data-topic-action]"));

    const state = {
      mode: "solve",
      answers: new Map(),
      questionRefs: [],
    };

    function buildTopic(topic, questionOffset) {
      const details = document.createElement("details");
      details.className = "topic";
      details.open = true;

      const summary = document.createElement("summary");
      summary.innerHTML = `
        <div>
          <h2 class="topic-title">${topic.name}</h2>
        </div>
        <div class="topic-meta">
          <span>${topic.questions.length} questions</span>
          <span class="chevron" aria-hidden="true">></span>
        </div>
      `;

      const body = document.createElement("div");
      body.className = "topic-body";

      if (topic.note_html) {
        const notes = document.createElement("details");
        notes.className = "topic-notes";

        const notesSummary = document.createElement("summary");
        notesSummary.innerHTML = `
          <span class="topic-notes-title">Notes</span>
          <span class="chevron" aria-hidden="true">></span>
        `;

        const notesBody = document.createElement("div");
        notesBody.className = "topic-notes-body rich-text";
        notesBody.innerHTML = topic.note_html;

        notes.appendChild(notesSummary);
        notes.appendChild(notesBody);
        body.appendChild(notes);
      }

      topic.questions.forEach((question, indexInTopic) => {
        const globalIndex = questionOffset + indexInTopic;
        body.appendChild(buildQuestionCard(question, globalIndex));
      });

      details.appendChild(summary);
      details.appendChild(body);
      return details;
    }

    function buildQuestionCard(question, questionIndex) {
      const card = document.createElement("article");
      card.className = "question-card is-hidden";
      card.dataset.questionIndex = String(questionIndex);

      const label = document.createElement("p");
      label.className = "question-label";
      label.textContent = `Question ${question.number}`;

      const stem = document.createElement("div");
      stem.className = "stem rich-text";
      stem.innerHTML = question.stem_html;

      const options = document.createElement("div");
      options.className = "options";

      const optionButtons = question.options.map((option, optionIndex) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "option";
        button.dataset.optionIndex = String(optionIndex);
        button.innerHTML = option.label_html;
        button.addEventListener("click", () => {
          if (state.mode !== "solve") {
            return;
          }
          state.answers.set(questionIndex, optionIndex);
          applyQuestionState(questionIndex);
        });
        options.appendChild(button);
        return button;
      });

      const explanation = document.createElement("div");
      explanation.className = "explanation rich-text";
      explanation.innerHTML = `<span class="explanation-label">Explanation</span>${question.explanation_html}`;

      card.appendChild(label);
      card.appendChild(stem);
      card.appendChild(options);
      card.appendChild(explanation);

      state.questionRefs[questionIndex] = {
        card,
        explanation,
        optionButtons,
        question,
      };

      applyQuestionState(questionIndex);
      return card;
    }

    function applyQuestionState(questionIndex) {
      const ref = state.questionRefs[questionIndex];
      if (!ref) {
        return;
      }

      const { card, optionButtons, question } = ref;
      const selectedIndex = state.answers.get(questionIndex);
      const hasSelection = selectedIndex !== undefined;
      const isReview = state.mode === "review";
      const showExplanation = isReview || hasSelection;

      card.classList.toggle("is-hidden", !showExplanation);

      optionButtons.forEach((button, optionIndex) => {
        button.classList.remove("correct", "incorrect", "neutral-revealed");

        if (isReview) {
          button.disabled = true;
          if (optionIndex === question.correct_index) {
            button.classList.add("correct");
          } else {
            button.classList.add("neutral-revealed");
          }
          return;
        }

        button.disabled = false;
        if (!hasSelection) {
          return;
        }

        if (optionIndex === question.correct_index) {
          button.classList.add("correct");
        } else if (optionIndex === selectedIndex) {
          button.classList.add("incorrect");
        } else {
          button.classList.add("neutral-revealed");
        }
      });
    }

    function renderApp() {
      if (!quizData.topics.length) {
        const empty = document.createElement("div");
        empty.className = "empty-state";
        empty.textContent = "No questions were found in this JSON file.";
        app.replaceChildren(empty);
        return;
      }

      const wrapper = document.createElement("div");
      wrapper.className = "topic-list";

      let questionOffset = 0;
      quizData.topics.forEach((topic) => {
        wrapper.appendChild(buildTopic(topic, questionOffset));
        questionOffset += topic.questions.length;
      });

      app.replaceChildren(wrapper);
    }

    function setMode(mode) {
      state.mode = mode;
      modeButtons.forEach((button) => {
        const isActive = button.dataset.modeButton === mode;
        button.classList.toggle("active", isActive);
        button.setAttribute("aria-pressed", String(isActive));
      });

      state.questionRefs.forEach((_, index) => applyQuestionState(index));
    }

    function setAllTopics(open) {
      document.querySelectorAll(".topic").forEach((topic) => {
        topic.open = open;
      });
    }

    modeButtons.forEach((button) => {
      button.addEventListener("click", () => setMode(button.dataset.modeButton));
    });

    topicActionButtons.forEach((button) => {
      button.addEventListener("click", () => {
        setAllTopics(button.dataset.topicAction === "expand");
      });
    });

    renderApp();
    setMode("solve");
  </script>
</body>
</html>
