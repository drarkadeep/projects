herefore less likely to be encountered than the superficial circumflex iliac artery which arises below the inguinal ligament."}, {"number": 204, "topic": "Femoral triangle anatomy", "stem_html": "A 44 year old man has a malignant melanoma and is undergoing a block dissection of the groin. The femoral triangle is being explored for intra operative bleeding. Which of the following forms the medial border of the femoral triangle?", "options": [{"label_html": "Femoral artery", "is_correct": false}, {"label_html": "Biceps femoris", "is_correct": false}, {"label_html": "Adductor longus", "is_correct": true}, {"label_html": "Sartorius", "is_correct": false}, {"label_html": "Adductor magnus", "is_correct": false}], "correct_index": 2, "explanation_html": "Adductor longus forms the medial boundary of the femoral triangle (see below)."}, {"number": 205, "topic": "Femoral triangle anatomy", "stem_html": "You decide to take an arterial blood gas from the femoral artery. Where should the needle be inserted to gain the sample?", "options": [{"label_html": "1-2 cm inferiorly to the mid point of the inguinal ligament", "is_correct": false}, {"label_html": "1-2cm inferiorly to the mid inguinal point", "is_correct": true}, {"label_html": "2cm inferomedially to the pubic tubercle", "is_correct": false}, {"label_html": "2cm superomedially to the pubic tubercle", "is_correct": false}, {"label_html": "3cm inferolaterally to the deep inguinal ring", "is_correct": false}], "correct_index": 1, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">The mid inguinal point is midway between the anterior superior iliac spine and the symphysis pubis<\/div>The mid inguinal point in the surface marking for the femoral artery."}, {"number": 206, "topic": "Femoral triangle anatomy", "stem_html": "A 25 year old man is stabbed in the groin. The area, which lies within the femoral triangle, is explored. Which structure forms the lateral wall of the femoral triangle?", "options": [{"label_html": "Adductor longus", "is_correct": false}, {"label_html": "Pectineus", "is_correct": false}, {"label_html": "Adductor magnus", "is_correct": false}, {"label_html": "Sartorius", "is_correct": true}, {"label_html": "Conjoint tendon", "is_correct": false}], "correct_index": 3, "explanation_html": "The sartorius forms the lateral wall of the femoral triangle (see below)."}, {"number": 207, "topic": "Femoral triangle anatomy", "stem_html": "A 78 year old man is undergoing a femoro-popliteal bypass graft. The operation is not progressing well and the surgeon is complaining of poor access. Retraction of which of the following structures will improve access to the femoral artery distally?", "options": [{"label_html": "Quadriceps", "is_correct": false}, {"label_html": "Adductor longus", "is_correct": false}, {"label_html": "Adductor magnus", "is_correct": false}, {"label_html": "Pectineus", "is_correct": false}, {"label_html": "Sartorius", "is_correct": true}], "correct_index": 4, "explanation_html": "At the lower border of the femoral triangle the femoral artery passes under the sartorius muscle. This can be retracted to improve access."}, {"number": 208, "topic": "Femoral triangle anatomy", "stem_html": "During an operation for varicose veins the surgeons are mobilising the long saphenous vein. Near its point of entry to the femoral vein an artery is injured and bleeding is encountered. From where is the bleeding most likely to originate?", "options": [{"label_html": "Femoral artery", "is_correct": false}, {"label_html": "Profunda femoris artery", "is_correct": false}, {"label_html": "Superficial circumflex iliac artery", "is_correct": false}, {"label_html": "Superficial epigastric artery", "is_correct": false}, {"label_html": "Deep external pudendal artery", "is_correct": true}], "correct_index": 4, "explanation_html": "The deep external pudendal artery is a branch of the SFA and it runs medially under the long saphenous vein near its point of union with the femoral vein. The superficial external pudendal artery lies superior to the SFJ. Neither vessel is functionally important and if injured they are best ligated."}], "note_html": "<b>Boundaries<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Superiorly<\/b><\/td><td>Inguinal ligament<\/td><\/tr><tr><td><b>Laterally<\/b><\/td><td>Sartorius<\/td><\/tr><tr><td><b>Medially<\/b><\/td><td>Adductor longus<\/td><\/tr><tr><td><b>Floor<\/b><\/td><td>Iliopsoas, adductor longus and pectineus<\/td><\/tr><tr><td><b>Roof<\/b><\/td><td><ul><li>Fascia lata and Superficial fascia<\/li><li>Superficial inguinal lymph  nodes (palpable below the inguinal ligament)<\/li><li>Long saphenous vein<\/li><\/ul><\/td><\/tr><\/tbody><\/table><\/div> <br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb037b.jpg\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb037.jpg\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Femoral triangle\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb037b.jpg\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>This is displayed as an annotated cadaveric image below, the terms FV, FA, FN refer to the femoral artery, vein and nerve respectively and the SFJ is the saphenofemoral junction.<br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/bbb069b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/bbb069.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"><span style=\"font-size:11px; color:LightGray;\">© Image provided by the University of Sheffield<\/span><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/bbb069b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>                                        <br><b>Contents<\/b><br><ul><li>Femoral vein (medial to lateral)<\/li><li>Femoral artery-pulse palpated at the mid inguinal point<\/li><li>Femoral nerve<\/li><li>Deep and superficial inguinal lymph nodes<\/li><li>Lateral cutaneous nerve<\/li><li>Great saphenous vein<\/li><li>Femoral branch of the genitofemoral nerve<\/li><\/ul>"}, {"name": "Femur", "questions": [{"number": 209, "topic": "Femur", "stem_html": "Which of the structures listed below inserts into the site labelled in the image.<br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/bba025.jpg\"><\/td><\/tr><tr><td valign=\"top\" align=\"left\"><span style=\"font-size:11px; color:LightGray;\">© Image provided by the University of Sheffield<\/span><\/td><td align=\"right\"><\/td><\/tr><\/tbody><\/table><\/center>", "options": [{"label_html": "Psoas minor", "is_correct": false}, {"label_html": "Psoas major", "is_correct": true}, {"label_html": "Sartorius", "is_correct": false}, {"label_html": "Obturator externus", "is_correct": false}, {"label_html": "Gemellus", "is_correct": false}], "correct_index": 1, "explanation_html": "Psoas major inserts onto the lesser trochanter."}], "note_html": "- Extends from a rounded head, which articulates with the acetabulum down to the knee joint where the two large condyles at it's inferior aspect articulate with the tibia. <br><ul><li>The superior aspect comprises a head and neck which pass inferolaterally to the body and the two trochanters. These lie at the junction between the neck and the body.<\/li><li>The neck meets the body of the femur at an angle of 125<sup>o<\/sup>.<\/li><li>Developmentally, the neck is part of the body but is demarcated from it by a wide rough intertrochanteric crest, this continues inferomedially as a spiral line that runs below the lesser trochanter. Medially, the intertrochanteric line gives attachment to the inferior end of the iliofemoral ligament. The neck is covered by synovial membrane up to the intertrochanteric line. The posterior aspect of the neck is demarcated from the shaft by the intertrochanteric crest and only it's medial aspect is covered by synovium and the joint capsule. <\/li><li>The greater trochanter has discernible surfaces that form the site of attachment of the gluteal muscles.Laterally, the greater trochanter overhangs the body and this forms part of the origin of vastus lateralis<\/li><li>Viewed anteriorly, the body of the femur appears rounded. Viewed laterally, it has an anterior concavity which gives fullness to the anterior thigh. Posteriorly, there is a ridge of bone, the linea aspera. The surface of the anterior aspect of the body forms the origin of the vastus intermedius. More medially, it forms the origin of vastus medialis. <\/li><li>The upper and middle aspects of the linea aspera form part of the origin of the attachments of the thigh adductors. Inferiorly, it spans out to form the bony floor of the popliteal fossa. At the inferior aspect of the popliteal surface the surface curves posteriorly to form the femoral condyles. <\/li><li>The structures that are attached to the inferior aspect of the linea aspera split with it as it approaches the popliteal fossa. Thus the vastus medialis and adductor magnus continue with the medial split and the biceps femoris and vastus intermedius along the lateral split.<\/li><\/ul><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/bbb047b.jpg\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/bbb047.jpg\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"><span style=\"font-size:11px; color:LightGray;\">© Image provided by the University of Sheffield<\/span><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/bbb047b.jpg\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center><br><b>Image demonstrating anterior aspect of femur with muscular attachments<\/b><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/bbb054b.jpg\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/bbb054.jpg\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"><span style=\"font-size:11px; color:LightGray;\">© Image provided by the University of Sheffield<\/span><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/bbb054b.jpg\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center><br><b>Blood supply<\/b><br>The femur has a rich blood supply and numerous vascular foramina exist throughout it's length. The blood supply to the femoral head is clinically important and is provided by the medial circumflex femoral and lateral circumflex femoral arteries (Branches of profunda femoris). Also from the inferior gluteal artery. These form an anastomosis and travel to up the femoral neck to supply the head."}, {"name": "Foot- anatomy", "questions": [{"number": 210, "topic": "Foot- anatomy", "stem_html": "Which of the following bones is related to the cuboid's distal articular surface?", "options": [{"label_html": "All metatarsals", "is_correct": false}, {"label_html": "5th metatarsal", "is_correct": true}, {"label_html": "Calcaneum", "is_correct": false}, {"label_html": "Medial cuneiform", "is_correct": false}, {"label_html": "3rd metatarsal", "is_correct": false}], "correct_index": 1, "explanation_html": "The cuboid is located at the lateral aspect of the foot between the calcaneus posteriorly and the 4th and 5th metatarsals distally."}, {"number": 211, "topic": "Foot- anatomy", "stem_html": "Which of the following bones is related to the cuboid's distal articular surface?", "options": [{"label_html": "All metatarsals", "is_correct": false}, {"label_html": "5th metatarsal", "is_correct": true}, {"label_html": "Calcaneum", "is_correct": false}, {"label_html": "Medial cuneiform", "is_correct": false}, {"label_html": "3rd metatarsal", "is_correct": false}], "correct_index": 1, "explanation_html": "The cuboid is located at the lateral aspect of the foot between the calcaneus posteriorly and the 4th and 5th metatarsals distally."}, {"number": 212, "topic": "Foot- anatomy", "stem_html": "Which of the muscles listed below arises entirely from the dorsum of the foot?", "options": [{"label_html": "Adductor hallucis", "is_correct": false}, {"label_html": "Flexor hallucis brevis", "is_correct": false}, {"label_html": "Abductor hallucis", "is_correct": false}, {"label_html": "Flexor digitorum longus", "is_correct": false}, {"label_html": "Extensor digitorum brevis", "is_correct": true}], "correct_index": 4, "explanation_html": "Extensor digitorum brevis is the only muscle to arise from the dorsum of the foot. It arises from the upper surface of the calcaneus and the deep surface of the fascia that covers that muscle. Four thin tendons run forwards and medially to insert into the medial four toes. The lateral three tendons join the hoods of the extensor digitorum longus, and the most medial tendon (sometimes known as extensor hallucis brevis) inserts into the proximal phalanx of the great toe. It is innervated by the deep peroneal nerve."}, {"number": 213, "topic": "Foot- anatomy", "stem_html": "A 78 year old man presents with symptoms consistent with intermittent claudication. To assess the severity of his disease you decide to measure his ankle brachial pressure index. To do this you will identify the dorsalis pedis artery. Which of the following statements relating to this vessel is false?", "options": [{"label_html": "It originates from the peroneal artery", "is_correct": true}, {"label_html": "It is crossed by the tendon of extensor hallucis brevis", "is_correct": false}, {"label_html": "Two veins are usually closely related to it", "is_correct": false}, {"label_html": "It passes under the inferior extensor retinaculum", "is_correct": false}, {"label_html": "The tendon of extensor digitorum longus lies lateral to it", "is_correct": false}], "correct_index": 0, "explanation_html": "The dorsalis pedis artery is a direct continuation of the anterior tibial artery."}, {"number": 214, "topic": "Foot- anatomy", "stem_html": "A 77 year old man with symptoms of intermittent claudication is due to have his ankle brachial pressure indices measured. The dorsalis pedis artery is impalpable. Which of the following tendinous structures lies medial to it, that may facilitate its identification?", "options": [{"label_html": "Extensor digitorum longus tendon", "is_correct": false}, {"label_html": "Peroneus tertius tendon", "is_correct": false}, {"label_html": "Extensor hallucis longus tendon", "is_correct": true}, {"label_html": "Extensor digitorum brevis tendon", "is_correct": false}, {"label_html": "Flexor digitorum longus tendon", "is_correct": false}], "correct_index": 2, "explanation_html": "The extensor hallucis longus tendon lies medial to the dorsalis pedis artery."}], "note_html": "<b>Arches of the foot<\/b><br>The foot is conventionally considered to have two arches.<br><ul><li>The longitudinal arch is higher on the medial than on the lateral side. The posterior part of the calcaneum forms a posterior pillar to support the arch. The lateral part of this structure passes via the cuboid bone and the lateral two metatarsal bones. The medial part of this structure is more important. The head of the talus marks the summit of this arch, located between the sustentaculum tali and the navicular bone. The anterior pillar of the medial arch is composed of the navicular bone, the three cuneiforms and the medial three metatarsal bones. <\/li><li>The transverse arch is situated on the anterior part of the tarsus and the posterior part of the metatarsus. The cuneiforms and metatarsal bases narrow inferiorly, which contributes to the shape of the arch. <\/li><\/ul><br><b>Intertarsal joints<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Sub talar joint<\/b><\/td><td>Formed by the cylindrical facet on the lower surface of the body of the talus and the posterior facet on the upper surface of the calcaneus. The facet on the talus is concave anteroposteriorly, the other is convex. The synovial cavity of this joint does not communicate with any other joint.<\/td><\/tr><tr><td><b>Talocalcaneonavicular joint<\/b><\/td><td>The anterior part of the socket is formed by the concave articular surface of the navicular bone, posteriorly by the upper surface of the sustentaculum tali. The talus sits within this socket<\/td><\/tr><tr><td><b>Calcaneocuboid joint<\/b><\/td><td>Highest point in the lateral part of the longitudinal arch. The lower aspect of this joint is reinforced by the long plantar and plantar calcaneocuboid ligaments.<\/td><\/tr><tr><td><b>Transverse tarsal joint<\/b><\/td><td>The talocalcaneonavicular joint and the calcaneocuboid joint extend across the tarsus in an irregular transverse plane, between the talus and calcaneus behind and the navicular and cuboid bones in front. This plane is termed the transverse tarsal joint.<\/td><\/tr><tr><td><b>Cuneonavicular joint<\/b><\/td><td>Formed between the convex anterior surface of the navicular bone and the concave surface of the the posterior ends of the three cuneiforms.<\/td><\/tr><tr><td><b>Intercuneiform joints<\/b><\/td><td>Between the three cuneiform bones.<\/td><\/tr><tr><td><b>Cuneocuboid joint<\/b><\/td><td>Between the circular facets on the lateral cuneiform bone and the cuboid. This joint contributes to the tarsal part of the transverse arch.<\/td><\/tr><\/tbody><\/table><\/div><i>A detailed knowledge of the joints is not required for MRCS Part A. However, the contribution they play to the overall structure of the foot should be appreciated<\/i><br><br><b>Ligaments of the ankle joint and foot<\/b><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb084b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb084.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Talocalcaneal articulation\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb084b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center><br><b>Muscles of the foot<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Muscle<\/b><\/td><td><b>Origin<\/b><\/td><td><b>Insertion<\/b><\/td><td><b>Nerve supply<\/b><\/td><td><b>Action<\/b><\/td><\/tr><tr><td>Abductor hallucis<\/td><td>Medial side of the calcaneus, flexor retinaculum, plantar aponeurosis<\/td><td>Medial side of the base of the proximal phalanx<\/td><td>Medial plantar nerve<\/td><td>Abducts the great toe<\/td><\/tr><tr><td>Flexor digitorum brevis<\/td><td>Medial process of the calcaneus, plantar eponeurosis.<\/td><td>Via 4 tendons into the middle phalanges of the lateral 4 toes.<\/td><td>Medial plantar nerve<\/td><td>Flexes all the joints of the lateral 4 toes except for the interphalangeal joint.<\/td><\/tr><tr><td>Abductor digit minimi<\/td><td>From the tubercle of the calcaneus and from the plantar aponeurosis<\/td><td>Together with flexor digit minimi brevis into the lateral side of the base of the proximal phalanx of the little toe<\/td><td>Lateral plantar nerve<\/td><td>Abducts the little toe at the metatarsophalangeal joint<\/td><\/tr><tr><td>Flexor hallucis brevis<\/td><td>From the medial side of the plantar surface of the cuboid bone, from the adjacent part of the lateral cuneiform bone and from the tendon of tibialis posterior.<\/td><td>Into the proximal phalanx of the great toe, the tendon contains a sesamoid bone<\/td><td>Medial plantar nerve<\/td><td>Flexes the metatarsophalangeal joint of the great toe.<\/td><\/tr><tr><td>Adductor hallucis<\/td><td>Arises from two heads. The oblique head arises from the sheath of the peroneus longus tendon, and from the plantar surfaces of the bases of the 2nd, 3rd and 4th metatarsal bones. The transverse head arises from the plantar surface of the lateral 4 metatarsophalangeal joints and from the deep transverse metatarsal ligament.<\/td><td>Lateral side of the base of the proximal phalanx of the great toe.<\/td><td>Lateral plantar nerve<\/td><td>Adducts the great toe towards the second toe. Helps maintain the transverse arch of the foot.<\/td><\/tr><tr><td>Extensor digitorum brevis<\/td><td>On the dorsal surface of the foot from the upper surface of the calcaneus and its associated fascia<\/td><td>Via four thin tendons which run forward and medially to be inserted into the medial four toes. The lateral three tendons join with hoods of extensor digitorum longus.<\/td><td>Deep peroneal<\/td><td>Extend the metatarsophalangeal joint of the medial four toes. It is unable to extend the interphalangeal joint without the assistance of the lumbrical muscles.<\/td><\/tr><\/tbody><\/table><\/div><br><b>Nerves in the foot<\/b><br><br><b>Lateral plantar nerve<\/b><br>Passes anterolaterally towards the base of the 5th metatarsal between flexor digitorum brevis and flexor accessorius. On the medial aspect of the lateral plantar artery. At the base of the 5th metatarsal it splits into superficial and deep branches.<br><br><b>Medial plantar nerve<\/b><br>Passes forwards with the medial plantar artery under the cover of the flexor retinaculum to the interval between abductor hallucis and flexor digitorum brevis on the sole of the foot.<br><br><b>Plantar arteries<\/b><br>Arise under the cover of the flexor retinaculum, midway between the tip of the medial malleolus and the most prominent part of the medial side of the heel. <br><br><ul><li>Medial plantar artery. Passes forwards medial to medial plantar nerve in the space between abductor hallucis and flexor digitorum brevis.Ends by uniting with a branch of the 1st plantar metatarsal artery.<\/li><li>Lateral plantar artery. Runs obliquely across the sole of the foot. It lies lateral to the lateral plantar nerve. At the base of the 5th metatarsal bone it arches medially across the foot on the metatarsals <\/li><\/ul><br><b>Dorsalis pedis artery<\/b><br>This vessel is a direct continuation of the anterior tibial artery. It commences on the front of the ankle joint and runs to the proximal end of the first metatarsal space. Here is gives off the arcuate artery and continues forwards as the first dorsal metatarsal artery. It is accompanied by two veins throughout its length. It is crossed by the extensor hallucis brevis"}, {"name": "Foot- Cutaneous sensation", "questions": [{"number": 215, "topic": "Foot- Cutaneous sensation", "stem_html": "A 42 year old lady is reviewed in the outpatient clinic following a routine surgical procedure. She complains of diminished sensation at the lateral aspect of her foot. Which of the following nerves is most likely to be affected?", "options": [{"label_html": "Sural", "is_correct": true}, {"label_html": "Superficial peroneal", "is_correct": false}, {"label_html": "Deep peroneal", "is_correct": false}, {"label_html": "Medial plantar", "is_correct": false}, {"label_html": "Lateral plantar", "is_correct": false}], "correct_index": 0, "explanation_html": "The sural nerve supplies the lateral aspect of the foot. It runs alongside the short saphenous vein and may be injured in short saphenous vein surgery."}], "note_html": "<div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Region<\/b><\/td><td><b>Nerve<\/b><\/td><\/tr><tr><td>Lateral plantar<\/td><td>Sural<\/td><\/tr><tr><td>Dorsum (not 1st web space)<\/td><td>Superficial peroneal<\/td><\/tr><tr><td>1st Web space<\/td><td>Deep peroneal<\/td><\/tr><tr><td>Extremities of toes<\/td><td>Medial and lateral plantar nerves<\/td><\/tr><tr><td>Proximal plantar<\/td><td>Tibial<\/td><\/tr><tr><td>Medial plantar<\/td><td>Medial plantar nerve<\/td><\/tr><tr><td>Lateral plantar (inferior aspect)<\/td><td>Lateral plantar nerve<\/td><\/tr><\/tbody><\/table><\/div><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb126b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb126.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Sural nerve\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb126b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}, {"name": "Foramina of the base of the skull", "questions": [{"number": 216, "topic": "Foramina of the base of the skull", "stem_html": "Which of the following structures does not pass through the foramen ovale?", "options": [{"label_html": "Lesser petrosal nerve", "is_correct": false}, {"label_html": "Accessory meningeal artery", "is_correct": false}, {"label_html": "Maxillary nerve", "is_correct": true}, {"label_html": "Emissary veins", "is_correct": false}, {"label_html": "Otic ganglion", "is_correct": false}], "correct_index": 2, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Mnemonic: OVALE<br><br>O tic ganglion<br>V3 (Mandibular nerve:3rd branch of trigeminal)<br>A ccessory meningeal artery<br>L esser petrosal nerve<br>E missary veins<\/div>"}, {"number": 217, "topic": "Foramina of the base of the skull", "stem_html": "Which statement is false about the foramina of the skull?", "options": [{"label_html": "The hypoglossal canal transmits the hypoglossal nerve", "is_correct": false}, {"label_html": "The foramen spinosum is at the base of the medial pterygoid plate.", "is_correct": true}, {"label_html": "The jugular foramen transmits the accessory nerve", "is_correct": false}, {"label_html": "The foramen lacerum is located between the sphenoid and temporal bones", "is_correct": false}, {"label_html": "The stylomastoid foramen transmits the facial nerve", "is_correct": false}], "correct_index": 1, "explanation_html": "<p>No explanation provided.<\/p>"}, {"number": 218, "topic": "Foramina of the base of the skull", "stem_html": "Which of the following structures is not transmitted by the jugular foramen?", "options": [{"label_html": "Hypoglossal nerve", "is_correct": true}, {"label_html": "Accessory nerve", "is_correct": false}, {"label_html": "Internal jugular vein", "is_correct": false}, {"label_html": "Inferior petrosal sinus", "is_correct": false}, {"label_html": "Vagus nerve", "is_correct": false}], "correct_index": 0, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Contents of the jugular foramen:<br><br>Anterior: inferior petrosal sinus<br>Intermediate: glossopharyngeal, vagus, and accessory nerves<br>Posterior: sigmoid sinus (becoming the internal jugular vein) and some meningeal branches from the occipital and ascending pharyngeal arteries<\/div>The jugular foramen may be divided into three compartments:<br><ul><li>Anterior compartment transmits the inferior petrosal sinus<\/li><li>Middle compartment transmits cranial nerves IX, X and XI<\/li><li>Posterior compartment transmits the sigmoid sinus<\/li><\/ul>"}, {"number": 219, "topic": "Foramina of the base of the skull", "stem_html": "Which of the following does not pass through the superior orbital fissure?", "options": [{"label_html": "Lacrimal nerve", "is_correct": false}, {"label_html": "Abducens nerve", "is_correct": false}, {"label_html": "Opthalmic artery", "is_correct": true}, {"label_html": "Trochlear nerve", "is_correct": false}, {"label_html": "Superior opthalmic vein", "is_correct": false}], "correct_index": 2, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Mnemonic for the nerves passing through the supraorbital fissure:<br><br>Live Frankly To See Absolutely No Insult<br><br>Lacrimal<br>Frontal<br>Trochlear<br>Superior Division of Oculomotor<br>Abducens<br>Nasociliary<br>Inferior Division of Oculomotor nerve<\/div>The opthalmic artery arises from the internal carotid immediately after it has pierced the dura and arachnoid. It runs through the optic canal below the optic nerve and within its dural and arachnoid sheaths. It terminates as the supratrochlear and dorsal nasal arteries."}, {"number": 220, "topic": "Foramina of the base of the skull", "stem_html": "Which of the following pairings of foramina and their contents is not correct?", "options": [{"label_html": "Superior orbital fissure and the oculomotor nerve", "is_correct": false}, {"label_html": "Foramina rotundum and the maxillary nerve", "is_correct": false}, {"label_html": "Jugular foramen and the hypoglossal nerve", "is_correct": true}, {"label_html": "Foramina spinosum and the middle meningeal artery", "is_correct": false}, {"label_html": "Carotid canal and the internal carotid artery", "is_correct": false}], "correct_index": 2, "explanation_html": "The hypoglossal nerve passes through the hypoglossal canal."}, {"number": 221, "topic": "Foramina of the base of the skull", "stem_html": "In which of the following cranial bones does the foramen spinosum lie?", "options": [{"label_html": "Sphenoid bone", "is_correct": true}, {"label_html": "Frontal bone", "is_correct": false}, {"label_html": "Temporal bone", "is_correct": false}, {"label_html": "Occipital bone", "is_correct": false}, {"label_html": "Parietal bone", "is_correct": false}], "correct_index": 0, "explanation_html": "The foramen spinosum (which transmits the middle meningeal artery and vein) lies in the sphenoid bone."}, {"number": 222, "topic": "Foramina of the base of the skull", "stem_html": "In which of the following cranial bones does the foramen spinosum lie?", "options": [{"label_html": "Sphenoid bone", "is_correct": true}, {"label_html": "Frontal bone", "is_correct": false}, {"label_html": "Temporal bone", "is_correct": false}, {"label_html": "Occipital bone", "is_correct": false}, {"label_html": "Parietal bone", "is_correct": false}], "correct_index": 0, "explanation_html": "The foramen spinosum (which transmits the middle meningeal artery and vein) lies in the sphenoid bone."}, {"number": 223, "topic": "Foramina of the base of the skull", "stem_html": "Which of the following cranial foramina pairings are incorrect?", "options": [{"label_html": "Carotid canal and internal carotid artery.", "is_correct": false}, {"label_html": "Foramen ovale and mandibular nerve.", "is_correct": false}, {"label_html": "Optic canal and ophthalmic artery.", "is_correct": false}, {"label_html": "Optic canal and ophthalmic nerve.", "is_correct": true}, {"label_html": "Foramen rotundum and maxillary nerve.", "is_correct": false}], "correct_index": 3, "explanation_html": "The optic canal transmits the optic nerve. The ophthalmic nerve traverses the superior orbital fissure."}, {"number": 224, "topic": "Foramina of the base of the skull", "stem_html": "Which of the following does not pass through the superior orbital fissure?", "options": [{"label_html": "Oculomotor nerve", "is_correct": false}, {"label_html": "Abducens nerve", "is_correct": false}, {"label_html": "Ophthalmic artery", "is_correct": true}, {"label_html": "Ophthalmic division of the trigeminal nerve", "is_correct": false}, {"label_html": "Ophthalmic veins", "is_correct": false}], "correct_index": 2, "explanation_html": "The ophthalmic artery, a branch of the internal carotid enters the orbit with the optic nerve in the canal."}], "note_html": "<div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Foramen<\/b><\/th><th><b>\tLocation<\/b><\/th><th><b>\tContents<\/b><\/th><\/tr><\/thead><tbody><tr><td>Foramen ovale\t<\/td><td>Sphenoid bone\t<\/td><td>Otic ganglion<br>V3 (Mandibular nerve:3rd branch of             <br>    trigeminal)<br>Accessory meningeal artery<br>Lesser petrosal nerve<br>Emissary veins<\/td><\/tr><tr><td>Foramen spinosum\t\t<\/td><td>Sphenoid bone\t\t<\/td><td>Middle meningeal artery<br>Meningeal branch of the Mandibular nerve<\/td><\/tr><tr><td>Foramen rotundum\t\t<\/td><td>Sphenoid bone\t\t<\/td><td>Maxillary nerve (V2)<\/td><\/tr><tr><td>Foramen lacerum/ carotid canal\t\t<\/td><td>Located between the sphenoid, the apex of the petrous temporal and the basilar part of the occipital\t<\/td><td>Base of the medial pterygoid plate.<br>Internal carotid artery*<br>Nerve and artery of the pterygoid canal<\/td><\/tr><tr><td>Jugular foramen\t\t<\/td><td>Temporal bone\t\t<\/td><td>Anterior: inferior petrosal sinus<br>Intermediate: glossopharyngeal, vagus, and accessory nerves. <br>Posterior: sigmoid sinus (becoming the internal jugular vein) and some meningeal branches from the occipital and ascending pharyngeal arteries.<\/td><\/tr><tr><td>Foramen magnum\t<\/td><td>\tOccipital bone\t<\/td><td>\tAnterior and posterior spinal arteries<br>Vertebral arteries<br>Medulla oblongata<\/td><\/tr><tr><td>Stylomastoid foramen\t<\/td><td>\tTemporal bone\t<\/td><td>\tStylomastoid artery<br>Facial nerve<\/td><\/tr><tr><td>Superior orbital fissure\t\t<\/td><td>Sphenoid bone\t\t<\/td><td>Oculomotor nerve (III)<br>Recurrent meningeal artery<br>Trochlear nerve (IV)<br>Lacrimal, frontal and nasociliary branches of opthalmic nerve (V1)<br>Abducent nerve (VI)<br>Superior ophthalmic vein<\/td><\/tr><\/tbody><\/table><\/div><br>*= In life the foramen lacerum is occluded by a cartilagenous plug. The ICA initially passes into the carotid canal which ascends superomedially to enter the cranial cavity through the foramen lacerum.<br> <br><b>Base of skull anatomical overview<\/b><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb105b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb105.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Foramina of the skull\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb105b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}, {"name": "Forearm flexor muscles", "questions": [{"number": 225, "topic": "Forearm flexor muscles", "stem_html": "Which of the nerves listed below is directly responsible for the innervation of the lateral aspect of flexor digitorum profundus?", "options": [{"label_html": "Ulnar nerve", "is_correct": false}, {"label_html": "Anterior interosseous nerve", "is_correct": true}, {"label_html": "Radial nerve", "is_correct": false}, {"label_html": "Median nerve", "is_correct": false}, {"label_html": "Posterior interosseous nerve", "is_correct": false}], "correct_index": 1, "explanation_html": "The anterior interosseous nerve is a branch of the median nerve and is responsible for innervation of the lateral aspect of the flexor digitorum profundus."}], "note_html": "<div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Muscle<\/b><\/th><th><b>Origin<\/b><\/th><th><b>Insertion<\/b><\/th><th><b>Nerve supply<\/b><\/th><th><b>Action<\/b><\/th><\/tr><\/thead><tbody><tr><td>Flexor carpi radialis<\/td><td>Common flexor origin and surrounding fascia<\/td><td>Front of bases of second and third metacarpals<\/td><td>Median<\/td><td>Flexes and abducts the carpus, part flexes the elbow and part pronates forearm<\/td><\/tr><tr><td>Palmaris longus<\/td><td>Common flexor origin<\/td><td>Apex of palmar aponeurosis<\/td><td>Median<\/td><td>Wrist flexor<\/td><\/tr><tr><td>Flexor carpi ulnaris<\/td><td>Small humeral head arises from the common flexor origin and adjacent fascia. Ulnar head comes from medial border of olecranon and posterior border of ulna<\/td><td>Pisiform and base of the fifth metacarpal<\/td><td>Ulnar nerve<\/td><td>Flexes and adducts the carpus<\/td><\/tr><tr><td>Flexor digitorum superficialis<\/td><td>Long linear origin from common flexor tendon, adjacent fascia and septa and medial border of the coronoid process<\/td><td>Via tendons in the fibrous flexor sheath. At the level of the metacarpophalangeal joint each tendon split into two, these bands pass distally to their insertions<\/td><td>Median<\/td><td>Flexor of metacarpophalangeal joint and proximal interphalangeal joint<\/td><\/tr><tr><td>Flexor digitorum profundus<\/td><td>Upper two thirds of the medial and anterior surface of the ulna, medial side of the olecranon, medial half of the interosseous membrane<\/td><td>Via tendons that lie deep to those of flexor digitorum superficialis to insert into the distal phalanx<\/td><td>Medial part= ulnar, lateral part=anterior interosseous nerve<\/td><td>Flexes the distal interphalangeal joints and the wrist<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Gallbladder", "questions": [{"number": 226, "topic": "Gallbladder", "stem_html": "A 45 year old lady is undergoing a Whipples procedure for carcinoma of the pancreatic head. The bile duct is transected. Which of the following vessels is mainly responsible for the blood supply to the bile duct remnant?", "options": [{"label_html": "Cystic artery", "is_correct": false}, {"label_html": "Hepatic artery", "is_correct": true}, {"label_html": "Portal vein", "is_correct": false}, {"label_html": "Left gastric artery", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 1, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Do not confuse the blood supply of the bile duct with that of the cystic duct.<\/div>The bile duct has an axial blood supply which is derived from the hepatic artery and from retroduodenal branches of the gastroduodenal artery. Unlike the liver there is no contribution by the portal vein to the blood supply of the bile duct. Damage to the hepatic artery during a difficult cholecystectomy is a recognised cause of bile duct strictures. In this scenario the distal vessels have been removed as the patient is undergoing a resection."}, {"number": 227, "topic": "Gallbladder", "stem_html": "A 36 year old lady has been taking semaglutide (a GLP 1 agonist) as part of a weight management programme. She presents with colicky right upper quadrant pain that tends to occur post prandially. Which of the processes below accounts for this process?", "options": [{"label_html": "Increased cholecystokinin levels", "is_correct": true}, {"label_html": "Increased serum gastrin levels", "is_correct": false}, {"label_html": "Increased vagal activity", "is_correct": false}, {"label_html": "Increased glucagon levels", "is_correct": false}, {"label_html": "Increased somatostatin levels", "is_correct": false}], "correct_index": 0, "explanation_html": "Cholecystokinin increases gallbladder emptying (and thereby precipitates biliary colic) somatostatin inhibits gallbladder emptying. Gastrin and vagal activity have little , if any, direct effects on gallbladder motility."}, {"number": 228, "topic": "Gallbladder", "stem_html": "You excitedly embark on your first laparoscopic cholecystectomy and during the operation the anatomy of Calots triangle is more hostile than anticipated. Whilst trying to apply a haemostatic clip you avulse the cystic artery. This is followed by brisk haemorrhage. From which source is this most likely to originate ?", "options": [{"label_html": "Right hepatic artery", "is_correct": true}, {"label_html": "Portal vein", "is_correct": false}, {"label_html": "Gastroduodenal artery", "is_correct": false}, {"label_html": "Liver bed", "is_correct": false}, {"label_html": "Common hepatic artery", "is_correct": false}], "correct_index": 0, "explanation_html": "The cystic artery is a branch of the right hepatic artery. There are recognised variations in the anatomy of the blood supply to the gallbladder. However, the commonest situation is for the cystic artery to branch from the right hepatic artery."}], "note_html": "- Fibromuscular sac with capacity of 50ml<br><ul><li>Columnar epithelium<\/li><\/ul><br><b>Relations of the gallbladder<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Anterior<\/b><\/td><td>Liver<\/td><\/tr><tr><td><b>Posterior<\/b><\/td><td><ul><li>Covered by peritoneum  <\/li><li>Transverse colon<\/li><li>1st part of the duodenum<\/li><\/ul><\/td><\/tr><tr><td><b>Laterally<\/b><\/td><td>Right lobe of liver<\/td><\/tr><tr><td><b>Medially<\/b><\/td><td>Quadrate lobe of liver<\/td><\/tr><\/tbody><\/table><\/div><br><b>Arterial supply<\/b><br>Cystic artery (branch of Right hepatic artery)<br><br><b>Venous drainage<\/b><br>Directly to the liver<br><br><b>Nerve supply<\/b><br>Sympathetic- mid thoracic spinal cord, Parasympathetic- anterior vagal trunk<br><br><b>Common bile duct<\/b><br><br> <div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Origin<\/b><\/td><td>Confluence of cystic and common hepatic ducts<\/td><\/tr><tr><td><b>Relations at origin<\/b><\/td><td><ul><li>Medially - Hepatic artery<\/li><li>Posteriorly- Portal vein<\/li><\/ul><\/td><\/tr><tr><td><b>Relations distally<\/b><\/td><td><ul><li>Duodenum - anteriorly<\/li><li>Pancreas - medially and laterally<\/li><li>Right renal vein - posteriorly<\/li><\/ul><\/td><\/tr><tr><td><b>Arterial supply<\/b><\/td><td>Branches of hepatic artery and retroduodenal branches of gastroduodenal artery<\/td><\/tr><\/tbody><\/table><\/div><br><b>Hepatobiliary triangle<\/b><br><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Medially<\/b><\/td><td>Common hepatic duct<\/td><\/tr><tr><td><b>Inferiorly<\/b><\/td><td>Cystic duct<\/td><\/tr><tr><td><b>Superiorly<\/b><\/td><td>Inferior edge of liver<\/td><\/tr><tr><td><b>Contents<\/b><\/td><td>Cystic artery<\/td><\/tr><\/tbody><\/table><\/div><br><b>Relations of the gallbladder<\/b><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/bbb021b.jpg\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/bbb021.jpg\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"><span style=\"font-size:11px; color:LightGray;\">© Image provided by the University of Sheffield<\/span><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/bbb021b.jpg\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}, {"name": "Gastroduodenal artery", "questions": [{"number": 229, "topic": "Gastroduodenal artery", "stem_html": "During the course of a radical gastrectomy the surgeons detach the omentum and ligate the right gastro-epiploic artery. From which vessel does it originate?", "options": [{"label_html": "Superior mesenteric artery", "is_correct": false}, {"label_html": "Inferior mesenteric artery", "is_correct": false}, {"label_html": "Coeliac axis", "is_correct": false}, {"label_html": "Common hepatic artery", "is_correct": false}, {"label_html": "Gastroduodenal artery", "is_correct": true}], "correct_index": 4, "explanation_html": "The gastroduodenal artery arises at the superior part of the duodenum and descends behind it to terminate at its lower border. It terminates by dividing into the right gastro-epiploic artery and the superior pancreaticoduodenal artery. The right gastro-opiploic artery passes to the left and passes between the layers of the greater omentum to anastomose with the left gastro-epiploic artery."}, {"number": 230, "topic": "Gastroduodenal artery", "stem_html": "A 63 year old man who smokes heavily presents with dyspepsia. He is tested and found to be positive for helicobacter pylori infection. One evening he has an episode of haematemesis and collapses. What is the most likely vessel to be responsible?", "options": [{"label_html": "Portal vein", "is_correct": false}, {"label_html": "Short gastric arteries", "is_correct": false}, {"label_html": "Superior mesenteric artery", "is_correct": false}, {"label_html": "Gastroduodenal artery", "is_correct": true}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 3, "explanation_html": "He is most likely to have a posteriorly sited duodenal ulcer. These can invade the gastroduodenal artery and present with major bleeding. Although gastric ulcers may invade vessels they do not tend to produce major bleeding of this nature."}, {"number": 231, "topic": "Gastroduodenal artery", "stem_html": "A 55 year old man is admitted with a brisk haematemesis. He is taken to the endoscopy department and an upper GI endoscopy is performed by the gastroenterologist. He identifies an ulcer on the posterior duodenal wall and spends an eternity trying to control the bleeding with all the latest haemostatic techniques. He eventually asks the surgeons for help. A laparotomy and anterior duodenotomy are performed, as the surgeon opens the duodenum a vessel is spurting blood into the duodenal lumen. From which of the following does this vessel arise?", "options": [{"label_html": "Left gastric artery", "is_correct": false}, {"label_html": "Common hepatic artery", "is_correct": true}, {"label_html": "Right hepatic artery", "is_correct": false}, {"label_html": "Superior mesenteric artery", "is_correct": false}, {"label_html": "Splenic artery", "is_correct": false}], "correct_index": 1, "explanation_html": "The vessel will be the gastroduodenal artery, this arises from the common hepatic artery."}], "note_html": "<b>Supplies<\/b> <br>Pylorus, proximal part of the duodenum, and indirectly to the pancreatic head (via the anterior and posterior superior pancreaticoduodenal arteries)<br><br><b>Path<\/b><br>The gastroduodenal artery most commonly arises from the common hepatic artery of the coeliac trunk. It terminates by bifurcating into the right gastroepiploic artery and the superior pancreaticoduodenal artery"}, {"name": "Genitofemoral nerve", "questions": [{"number": 232, "topic": "Genitofemoral nerve", "stem_html": "Through which of the following foramina does the genital branch of the genitofemoral nerve exit the abdominal cavity?", "options": [{"label_html": "Superficial inguinal ring", "is_correct": false}, {"label_html": "Sciatic notch", "is_correct": false}, {"label_html": "Obturator foramen", "is_correct": false}, {"label_html": "Femoral canal", "is_correct": false}, {"label_html": "Deep inguinal ring", "is_correct": true}], "correct_index": 4, "explanation_html": "The genitofemoral nerve divides into two branches as it approaches the inguinal ligament. The genital branch passes anterior to the external iliac artery through the deep inguinal ring into the inguinal canal. It communicates with the ilioinguinal nerve in the inguinal canal (though this is seldom of clinical significance)."}, {"number": 233, "topic": "Genitofemoral nerve", "stem_html": "Through which of the following foramina does the genital branch of the genitofemoral nerve exit the abdominal cavity?", "options": [{"label_html": "Superficial inguinal ring", "is_correct": false}, {"label_html": "Sciatic notch", "is_correct": false}, {"label_html": "Obturator foramen", "is_correct": false}, {"label_html": "Femoral canal", "is_correct": false}, {"label_html": "Deep inguinal ring", "is_correct": true}], "correct_index": 4, "explanation_html": "The genitofemoral nerve divides into two branches as it approaches the inguinal ligament. The genital branch passes anterior to the external iliac artery through the deep inguinal ring into the inguinal canal. It communicates with the ilioinguinal nerve in the inguinal canal (though this is seldom of clinical significance)."}, {"number": 234, "topic": "Genitofemoral nerve", "stem_html": "Which of the following nerves is responsible for the cremasteric reflex?", "options": [{"label_html": "Lateral femoral cutaneous nerve", "is_correct": false}, {"label_html": "Femoral nerve", "is_correct": false}, {"label_html": "Obturator nerve", "is_correct": false}, {"label_html": "Genitofemoral nerve", "is_correct": true}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 3, "explanation_html": "The motor and sensory fibres of the genitofemoral nerve are tested in the cremasteric reflex. A small contribution is also played by the ilioinguinal nerve and thus the reflex may be lost following an inguinal hernia repair."}], "note_html": "<b>Supplies<\/b><br>Small area of the upper medial thigh.<br><br><b>Path<\/b><br><ul><li>Arises from the first and second lumbar nerves.<\/li><li>Passes obliquely through psoas major, and emerges from its medial border opposite the fibrocartilage between the third and fourth lumbar vertebrae.<\/li><li>It then descends on the surface of psoas major, under cover of the peritoneum<\/li><li>Divides into genital and femoral branches.<\/li><li>The genital branch passes through the inguinal canal, within the spermatic cord, to supply the skin and fascia of the scrotum. The femoral branch enters the thigh posterior to the inguinal ligament, lateral to the femoral artery. It supplies an area of skin and fascia over the femoral triangle.<\/li><li>It may be injured during abdominal or pelvic surgery, or during inguinal hernia repairs. <\/li><\/ul>"}, {"name": "Gluteal region", "questions": [{"number": 235, "topic": "Gluteal region", "stem_html": "What is the origin of the superior gluteal artery?", "options": [{"label_html": "Internal iliac artery", "is_correct": true}, {"label_html": "External iliac artery", "is_correct": false}, {"label_html": "Femoral artery", "is_correct": false}, {"label_html": "Common iliac artery", "is_correct": false}, {"label_html": "Circumflex femoral artery", "is_correct": false}], "correct_index": 0, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">The inferior gluteal artery arises from the anterior trunk of the internal iliac artery<br>The superior gluteal artery arises from the posterior trunk of the internal iliac artery<\/div>"}, {"number": 236, "topic": "Gluteal region", "stem_html": "Which muscle does not insert on the medial or superomedial surface of the greater trochanter?", "options": [{"label_html": "Gemelli", "is_correct": false}, {"label_html": "Obturator internus", "is_correct": false}, {"label_html": "Piriformis", "is_correct": false}, {"label_html": "Quadratus femoris", "is_correct": true}, {"label_html": "Obturator externus", "is_correct": false}], "correct_index": 3, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Mnemonic for muscle attachment on greater trochanter is POGO:<br><ul><li>Piriformis<\/li><li>Obturator internus<\/li><li>Gemelli<\/li><li>Obturator externus <\/li><\/ul><\/div>The quadratus femoris fibres pass laterally to be inserted into the quadrate tubercle on the intertrochanteric crest of the femur. The other muscles all insert on the trochanteric fossa lying medial to the greater trochanter."}, {"number": 237, "topic": "Gluteal region", "stem_html": "Which of the following structures is not closely related to the piriformis muscle?", "options": [{"label_html": "Superior gluteal nerve", "is_correct": false}, {"label_html": "Sciatic nerve", "is_correct": false}, {"label_html": "Inferior gluteal artery", "is_correct": false}, {"label_html": "Inferior gluteal nerve", "is_correct": false}, {"label_html": "Medial femoral circumflex artery", "is_correct": true}], "correct_index": 4, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Nerve supply of lateral hip rotators<br><br>Piriformis: ventral rami S1, S2<br>Obturator internus: nerve to obturator internus<br>Superior gemellus: nerve to obturator internus<br>Inferior gemellus: nerve to quadratus femoris<br>Quadrator femoris: nerve to quadrator femoris<\/div>The piriformis muscle is an important anatomical landmark in the gluteal region. The following structures are closely related:<br><ul><li>Sciatic nerve<\/li><li>Inferior gluteal artery and nerve<\/li><li>Superior gluteal artery and nerve<\/li><\/ul><br>The medial femoral circumflex artery runs deep to quadratus femoris."}, {"number": 238, "topic": "Gluteal region", "stem_html": "Which of these nerves pass through the greater sciatic foramen and innervate the perineum?", "options": [{"label_html": "Pudendal", "is_correct": true}, {"label_html": "Sciatic", "is_correct": false}, {"label_html": "Superior gluteal", "is_correct": false}, {"label_html": "Inferior gluteal", "is_correct": false}, {"label_html": "Posterior cutaneous nerve of the thigh", "is_correct": false}], "correct_index": 0, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">3 divisions of the pudendal nerve:<br><ul><li>Rectal nerve<\/li><li>Perineal nerve<\/li><li>Dorsal nerve of penis/ clitoris<\/li><\/ul>All these pass through the greater sciatic foramen.<\/div>The pudendal nerve innervates the perineum. It passes between piriformis and coccygeus medial to the sciatic nerve."}], "note_html": "<b>Gluteal muscles<\/b><br><ul><li>Gluteus maximus: inserts to gluteal tuberosity of the femur and iliotibial tract<\/li><li>Gluteus medius: attach to lateral greater trochanter<\/li><li>Gluteus minimis: attach to anterior greater trochanter<\/li><li>All extend and abduct the hip<\/li><\/ul><br><b>Deep lateral hip rotators<\/b><br><ul><li>Piriformis<\/li><li>Gemelli<\/li><li>Obturator internus<\/li><li>Quadratus femoris<\/li><\/ul><br><b>Nerves<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Superior gluteal nerve (L4,L5, S1)<\/b><\/td><td><ul><li>Gluteus medius<\/li><li>Gluteus minimis<\/li><li>Tensor fascia lata<\/li><\/ul><\/td><\/tr><tr><td><b>Inferior gluteal nerve (L5, S1, S2)<\/b><\/td><td>Gluteus maximus<\/td><\/tr><\/tbody><\/table><\/div>Damage to the superior gluteal nerve will result in the patient developing a Trendelenberg gait. Affected patients are unable to abduct the thigh at the hip joint. During the stance phase, the weakened abductor muscles allow the pelvis to tilt down on the opposite side. To compensate, the trunk lurches to the weakened side to attempt to maintain a level pelvis throughout the gait cycle. The pelvis sags on the opposite side of the lesioned superior gluteal nerve."}, {"name": "Greater sciatic foramen", "questions": [{"number": 239, "topic": "Greater sciatic foramen", "stem_html": "Which of the following structures does not pass close to the piriformis muscle in the greater sciatic foramen?", "options": [{"label_html": "Sciatic nerve", "is_correct": false}, {"label_html": "Posterior cutaneous nerve of the thigh", "is_correct": false}, {"label_html": "Inferior gluteal artery", "is_correct": false}, {"label_html": "Obturator nerve", "is_correct": true}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 3, "explanation_html": "The obturator nerve does not pass through the greater sciatic foramen."}, {"number": 240, "topic": "Greater sciatic foramen", "stem_html": "Which of these nerves passes through the greater and lesser sciatic foramina?", "options": [{"label_html": "Pudendal nerve", "is_correct": true}, {"label_html": "Sciatic nerve", "is_correct": false}, {"label_html": "Superior gluteal nerve", "is_correct": false}, {"label_html": "Inferior gluteal nerve", "is_correct": false}, {"label_html": "Posterior cutaneous nerve of the thigh", "is_correct": false}], "correct_index": 0, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Structures passing through the lesser and greater sciatic foramina (medial to lateral): <b>PIN<\/b><br><ul><li>Pudendal nerve<\/li><li>Internal pudendal artery<\/li><li>Nerve to obturator internus<\/li><\/ul><\/div>The pudendal nerve originates from the ventral rami of the second, third, and fourth sacral nerves (S2, S3, S4).<br><br>It passes between the piriformis and coccygeus muscles and exits the pelvis through the the greater sciatic foramen.  It crosses the spine of the ischium and reenters the pelvis through the lesser sciatic foramen.  It passes through the pudendal canal.<br><br>The pudendal nerve gives off the inferior rectal nerves. It terminates into 2 branches: perineal nerve, and the dorsal nerve of the penis or the dorsal nerve of the clitoris."}, {"number": 241, "topic": "Greater sciatic foramen", "stem_html": "Which of the following does not exit the pelvis through the greater sciatic foramen?", "options": [{"label_html": "Superior gluteal artery", "is_correct": false}, {"label_html": "Internal pudendal vessels", "is_correct": false}, {"label_html": "Sciatic nerve", "is_correct": false}, {"label_html": "Obturator nerve", "is_correct": true}, {"label_html": "Inferior gluteal nerve", "is_correct": false}], "correct_index": 3, "explanation_html": "The obturator nerve exits through the obturator foramen."}], "note_html": "<b>Contents<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Nerves<\/b><\/td><td><ul><li>Sciatic Nerve<\/li><li>Superior and Inferior Gluteal Nerves<\/li><li>Pudendal Nerve<\/li><li>Posterior Femoral Cutaneous Nerve<\/li><li>Nerve to Quadratus Femoris<\/li><li>Nerve to Obturator internus<\/li><\/ul><\/td><\/tr><tr><td><b>Vessels<\/b><\/td><td><ul><li>Superior Gluteal Artery and vein<\/li><li>Inferior Gluteal Artery and vein<\/li><li>Internal Pudendal Artery and vein<\/li><\/ul><\/td><\/tr><\/tbody><\/table><\/div><br><b>Piriformis<\/b><br>The piriformis is a landmark for identifying structures passing out of the sciatic notch<br><ul><li>Above piriformis: Superior gluteal vessels<\/li><li>Below piriformis: Inferior gluteal vessels, sciatic nerve (10% pass through it, &lt;1% above it), posterior cutaneous nerve of the thigh<\/li><\/ul><br><b>Greater sciatic foramen boundaries<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Anterolaterally<\/b><\/td><td>Greater sciatic notch of the ilium<\/td><\/tr><tr><td><b>Posteromedially<\/b><\/td><td>Sacrotuberous ligament<\/td><\/tr><tr><td><b>Inferior<\/b><\/td><td>Sacrospinous ligament and the ischial spine<\/td><\/tr><tr><td><b>Superior<\/b><\/td><td>Anterior sacroiliac ligament<\/td><\/tr><\/tbody><\/table><\/div><br><i>The greater sciatic foramen<\/i><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb004b.jpg\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb004.jpg\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Greater sciatic foramen\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb004b.jpg\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center><br><b>Structures passing between both foramina<\/b> (Medial to lateral)<br><ul><li>Pudendal nerve<\/li><li>Internal pudendal artery<\/li><li>Nerve to obturator internus<\/li><\/ul><br><b>Contents of the lesser sciatic foramen<\/b><br><ul><li>Tendon of the obturator internus<\/li><li>Pudendal nerve<\/li><li>Internal pudendal artery and vein<\/li><li>Nerve to the obturator internus<\/li><\/ul>"}, {"name": "Hand", "questions": [{"number": 242, "topic": "Hand", "stem_html": "An 18 year old man develops a severe spreading sepsis of the hand. The palm is explored surgically and the flexor digiti minimi brevis muscle is mobilised to facilitate drainage of the infection. Which of the following structures is not closely related to this muscle?", "options": [{"label_html": "The hook of hamate", "is_correct": false}, {"label_html": "Median nerve", "is_correct": true}, {"label_html": "Superficial palmar arterial arch", "is_correct": false}, {"label_html": "Digital nerves arising from the ulnar nerve", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 1, "explanation_html": "The flexor digiti minimi brevis originates from the Hamate, on its under- surface lie the ulnar contribution to the superficial palmar arterial arch and digital nerves derived from the ulnar nerve. The median nerve overlies the flexor tendons."}, {"number": 243, "topic": "Hand", "stem_html": "A 22 year old falls over and lands on a shard of glass. It penetrates the palmar aspect of his hand, immediately lateral to the pisiform bone. Which of the following structures is most likely to be injured?", "options": [{"label_html": "Palmar cutaneous branch of the median nerve", "is_correct": false}, {"label_html": "Lateral tendons of flexor digitorum superficialis", "is_correct": false}, {"label_html": "Ulnar artery", "is_correct": true}, {"label_html": "Flexor carpi radialis tendons", "is_correct": false}, {"label_html": "Lateral tendons of flexor digitorum profundus", "is_correct": false}], "correct_index": 2, "explanation_html": "The ulnar nerve and artery are at most immediate risk in this injury. This is illustrated in the image below:<br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb095b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb095.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Palmar branch of ulnar nerve\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb095b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}, {"number": 244, "topic": "Hand", "stem_html": "A 22 year old falls over and lands on a shard of glass. It penetrates the palmar aspect of his hand, immediately lateral to the pisiform bone. Which of the following structures is most likely to be injured?", "options": [{"label_html": "Palmar cutaneous branch of the median nerve", "is_correct": false}, {"label_html": "Lateral tendons of flexor digitorum superficialis", "is_correct": false}, {"label_html": "Ulnar artery", "is_correct": true}, {"label_html": "Flexor carpi radialis tendons", "is_correct": false}, {"label_html": "Lateral tendons of flexor digitorum profundus", "is_correct": false}], "correct_index": 2, "explanation_html": "The ulnar nerve and artery are at most immediate risk in this injury. This is illustrated in the image below:<br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb095b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb095.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Palmar branch of ulnar nerve\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb095b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}, {"number": 245, "topic": "Hand", "stem_html": "A 22 year old man develops an infection in the pulp of his little finger. What is the most proximal site to which this infection may migrate?", "options": [{"label_html": "The metacarpophalangeal joint", "is_correct": false}, {"label_html": "The distal interphalangeal joint", "is_correct": false}, {"label_html": "The proximal interphalangeal joint", "is_correct": false}, {"label_html": "Proximal to the flexor retinaculum", "is_correct": true}, {"label_html": "Immediately distal to the carpal tunnel", "is_correct": false}], "correct_index": 3, "explanation_html": "The 5th tendon sheath extends from the little finger to the proximal aspect of the carpal tunnel. This carries a significant risk of allowing infections to migrate proximally."}, {"number": 246, "topic": "Hand", "stem_html": "Which of the following fingers is not a point of attachment for the palmar interossei?", "options": [{"label_html": "Middle finger", "is_correct": true}, {"label_html": "Little finger", "is_correct": false}, {"label_html": "Ring finger", "is_correct": false}, {"label_html": "Index finger", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 0, "explanation_html": "The middle finger has no attachment of the palmar interosseous.   <br>Note that there are 4 palmar interossei. The first is a small slip of muscle which arises from the ulnar side of the base of the first metacarpal and passes between the head of the first dorsal interosseous and the oblique head of adductor pollicis to insert into the ulnar base of the of the proximal phalanx of the thumb. The second arises from the ulnar side of the body of the second metacarpal and is inserted into the ulnar side of the extensor hood of the index. The third and fourth palmar interossei arise from the radial sides of the bodies of the 4th and 5th metacarpals respectively and insert into the radial sides of the extensor hoods of the ring and  little fingers."}, {"number": 247, "topic": "Hand", "stem_html": "Which muscle is responsible for causing flexion of the interphalangeal joint of the thumb?", "options": [{"label_html": "Flexor pollicis longus", "is_correct": true}, {"label_html": "Flexor pollicis brevis", "is_correct": false}, {"label_html": "Flexor digitorum superficialis", "is_correct": false}, {"label_html": "Flexor digitorum profundus", "is_correct": false}, {"label_html": "Adductor pollicis", "is_correct": false}], "correct_index": 0, "explanation_html": "There are 8 muscles:<br>1.  Two flexors (flexor pollicis brevis and flexor pollicis longus)<br>2.  Two extensors (extensor pollicis brevis and longus)<br>3.  Two abductors (abductor pollicis brevis and longus)<br>4.  One adductor (adductor pollicis)<br>5.  One muscle that opposes the thumb by rotating the CMC joint (opponens pollicis). <br><br>Flexor and extensor longus insert on the distal phalanx moving both the MCP and IP joints."}, {"number": 248, "topic": "Hand", "stem_html": "Which of the following is not an intrinsic muscle of the hand?", "options": [{"label_html": "Opponens pollicis", "is_correct": false}, {"label_html": "Palmaris longus", "is_correct": true}, {"label_html": "Flexor pollicis brevis", "is_correct": false}, {"label_html": "Flexor digiti minimi brevis", "is_correct": false}, {"label_html": "Opponens digiti minimi", "is_correct": false}], "correct_index": 1, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Mnemonic for intrinsic hand muscles<br>'A OF A OF A' <br><br>A bductor pollicis brevis<br>O pponens pollicis<br>F lexor pollicis brevis<br>A dductor pollicis (thenar muscles)<br>O pponens digiti minimi<br>F lexor digiti minimi brevis<br>A bductor digiti minimi (hypothenar muscles)<\/div>Palmaris longus originates in the forearm."}], "note_html": "<b>Anatomy of the hand<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Bones<\/b><\/td><td><ul><li>8 Carpal bones <\/li><li>5 Metacarpals<\/li><li>14 phalanges<\/li><\/ul><\/td><\/tr><tr><td><b>Intrinsic Muscles<\/b><\/td><td>8 Interossei - Supplied by ulnar nerve<br><ul><li>4 palmar-<i>adduct fingers<\/i><\/li><li>4 dorsal- <i>abduct fingers<\/i><\/li><\/ul><\/td><\/tr><tr><td><b>Intrinsic muscles<\/b><\/td><td>Lumbricals<br><ul><li>Flex MCPJ and extend the IPJ.<\/li><li>Origin deep flexor tendon and insertion dorsal extensor hood mechanism.<\/li><li>Innervation: 1st and 2nd- median nerve, 3rd and 4th- deep branch of the ulnar nerve.<\/li><\/ul><\/td><\/tr><tr><td><b>Thenar eminence<\/b><\/td><td><ul><li>Abductor pollicis brevis <\/li><li>Opponens pollicis<\/li><li>Flexor pollicis brevis<\/li><\/ul><\/td><\/tr><tr><td><b>Hypothenar eminence<\/b><\/td><td><ul><li>Opponens digiti minimi<\/li><li>Flexor digiti minimi brevis<\/li><li>Abductor digiti minimi<\/li><\/ul><\/td><\/tr><\/tbody><\/table><\/div><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb097b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb097.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Hand\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb097b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center><br><b>Fascia and compartments of the palm<\/b><br>The fascia of the palm is continuous with the antebrachial fascia and the fascia of the dorsum of the hand. The palmar fascia is thin over the thenar and hypothenar eminences. In contrast, the central palmar fascia is relatively thick. The palmar aponeurosis covers the soft tissues and overlies the flexor tendons. The apex of the palmar aponeurosis is continuous with the flexor retinaculum and the palmaris longus tendon. Distally, it forms four longitudinal digital bands that attach to the bases of the proximal phalanges, blending with the fibrous digital sheaths. <br>A medial fibrous septum extends deeply from the medial border of the palmar aponeurosis to the 5th metacarpal. Lying medial to this are the hypothenar muscles. In a similar fashion, a lateral fibrous septum extends deeply from the lateral border of the palmar aponeurosis to the 3rd metacarpal. The thenar compartment lies lateral to this area. <br>Lying between the thenar and hypothenar compartments is the central compartment. It contains the flexor tendons and their sheaths, the lumbricals, the superficial palmar arterial arch and the digital vessels and nerves. <br>The deepest muscular plane is the adductor compartment, which contains adductor pollicis. <br><br><b>Short muscles of the hand<\/b><br>These comprise the lumbricals and interossei. The four slender lumbrical muscles flex the fingers at the metacarpophalangeal joints and extend the interphalangeal joint. The four dorsal interossei are located between the metacarpals and the four palmar interossei lie on the palmar surface of the metacarpals in the interosseous compartment of the hand. <br><br><b>Long flexor tendons and sheaths in the hand<\/b><br>The tendons of FDS and FDP enter the common flexor sheath deep to the flexor retinaculum. The tendons enter the central compartment of the hand and fan out to their respective digital synovial sheaths. Near the base of the proximal phalanx, the tendon of FDS splits to permit the passage of FDP. The FDP tendons are attached to the margins of the anterior aspect of the base of the distal phalanx. <br>The fibrous digital sheaths contain the flexor tendons and their synovial sheaths. These extend from the heads of the metacarpals to the base of the distal phalanges.<br><br><b> Palmar Interossei<\/b><br>Note that there are 4 palmar interossei. The first is a small slip of muscle which arises from the ulnar side of the base of the first metacarpal and passes between the head of the first dorsal interosseous and the oblique head of adductor pollicis to insert into the ulnar base of the of the proximal phalanx of the thumb. The second arises from the ulnar side of the body of the second metacarpal and is inserted into the ulnar side of the extensor hood of the index. The third and fourth palmar interossei arise from the radial sides of the bodies of the 4th and 5th metacarpals respectively and insert into the radial sides of the extensor hoods of the ring and  little fingers."}, {"name": "Heart anatomy", "questions": [{"number": 249, "topic": "Heart anatomy", "stem_html": "Inspection of the left ventricle reveals all except which of the following?", "options": [{"label_html": "Papillary muscles", "is_correct": false}, {"label_html": "Trabeculae carnae", "is_correct": false}, {"label_html": "Chordae tendinae", "is_correct": false}, {"label_html": "Conus arteriosus", "is_correct": true}, {"label_html": "Openings of the venae cordis minimae", "is_correct": false}], "correct_index": 3, "explanation_html": "The conus arteriosus (infundibulum) is the smooth walled outflow tract of the right ventricle leading to the pulmonary trunk."}, {"number": 250, "topic": "Heart anatomy", "stem_html": "Which of the following structures accompanies the posterior interventricular artery within the posterior interventricular groove?", "options": [{"label_html": "Great cardiac vein", "is_correct": false}, {"label_html": "Middle cardiac vein", "is_correct": true}, {"label_html": "Small cardiac vein", "is_correct": false}, {"label_html": "Anterior cardiac vein", "is_correct": false}, {"label_html": "Coronary sinus", "is_correct": false}], "correct_index": 1, "explanation_html": "<p>No explanation provided.<\/p>"}, {"number": 251, "topic": "Heart anatomy", "stem_html": "During the repair of an atrial septal defect the surgeons note that blood starts to leak from the coronary sinus. Which structure forms the largest tributary of the coronary sinus?", "options": [{"label_html": "Thebesian veins", "is_correct": false}, {"label_html": "Great cardiac vein", "is_correct": true}, {"label_html": "Oblique vein", "is_correct": false}, {"label_html": "Small cardiac veins", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 1, "explanation_html": "The great cardiac vein runs in the anterior interventricular groove, and is the largest tributary of the coronary sinus. The thebesian veins drain into the heart directly."}, {"number": 252, "topic": "Heart anatomy", "stem_html": "Which of the following are not generally supplied by the right coronary artery?", "options": [{"label_html": "The sino atrial node", "is_correct": false}, {"label_html": "The circumflex artery", "is_correct": true}, {"label_html": "The atrioventricular node", "is_correct": false}, {"label_html": "Most of the right ventricle", "is_correct": false}, {"label_html": "The right atrium", "is_correct": false}], "correct_index": 1, "explanation_html": "The circumflex artery is generally a branch of the left coronary artery."}, {"number": 253, "topic": "Heart anatomy", "stem_html": "Where are the greatest proportion of musculi pectinati found?", "options": [{"label_html": "Right ventricle", "is_correct": false}, {"label_html": "Left ventricle", "is_correct": false}, {"label_html": "Right atrium", "is_correct": true}, {"label_html": "Pulmonary valve", "is_correct": false}, {"label_html": "Aortic valve", "is_correct": false}], "correct_index": 2, "explanation_html": "The musculi pectinati are found in the atria, hence the reason that the atrial walls in the right atrium are irregular anteriorly.<br>The musculi pectinati of the atria are internal muscular ridges on the anterolateral surface of the chambers and they are only present in the area derived from the embryological true atrium."}, {"number": 254, "topic": "Heart anatomy", "stem_html": "During a tricuspid valve repair the right atrium is opened, following establishment of cardiopulmonary bypass. Which of the following structures do not lie within the right atrium?", "options": [{"label_html": "Crista terminalis", "is_correct": false}, {"label_html": "Tricuspid valve", "is_correct": false}, {"label_html": "Fossa ovalis", "is_correct": false}, {"label_html": "Trabeculae carnae", "is_correct": true}, {"label_html": "Musculi pectinati", "is_correct": false}], "correct_index": 3, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Structures within the right atrium:<br><ul><li>Musculi pectinati<\/li><li>Crista terminalis<\/li><li>Opening of the coronary sinus<\/li><li>Fossa ovalis<\/li><\/ul><\/div>The trabeculae carnae are located in the right ventricle."}, {"number": 255, "topic": "Heart anatomy", "stem_html": "During a tricuspid valve repair the right atrium is opened, following establishment of cardiopulmonary bypass. Which of the following structures do not lie within the right atrium?", "options": [{"label_html": "Crista terminalis", "is_correct": false}, {"label_html": "Tricuspid valve", "is_correct": false}, {"label_html": "Fossa ovalis", "is_correct": false}, {"label_html": "Trabeculae carnae", "is_correct": true}, {"label_html": "Musculi pectinati", "is_correct": false}], "correct_index": 3, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Structures within the right atrium:<br><ul><li>Musculi pectinati<\/li><li>Crista terminalis<\/li><li>Opening of the coronary sinus<\/li><li>Fossa ovalis<\/li><\/ul><\/div>The trabeculae carnae are located in the right ventricle."}, {"number": 256, "topic": "Heart anatomy", "stem_html": "A 23 year old man is due to undergo a mitral valve repair for mitral regurgitation. Which of the following is a feature of the mitral valve?", "options": [{"label_html": "Its closure is marked by the first heart so
