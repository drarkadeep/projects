ac nodes."}, {"number": 611, "topic": "Ureter", "stem_html": "A 66 year old man is undergoing a left nephro-ureterectomy. The surgeons remove the ureter, which of the following is responsible for the blood supply to the proximal ureter?", "options": [{"label_html": "Branches of the renal artery", "is_correct": true}, {"label_html": "External iliac artery", "is_correct": false}, {"label_html": "Internal iliac artery", "is_correct": false}, {"label_html": "Direct branches from the aorta", "is_correct": false}, {"label_html": "Common iliac artery", "is_correct": false}], "correct_index": 0, "explanation_html": "The proximal ureter is supplied by branches from the renal artery. For the other feeding vessels - see below."}, {"number": 612, "topic": "Ureter", "stem_html": "From which embryological structure is the ureter derived?", "options": [{"label_html": "Urachus", "is_correct": false}, {"label_html": "Cloaca", "is_correct": false}, {"label_html": "Vitello-intestinal duct", "is_correct": false}, {"label_html": "Mesonephric duct", "is_correct": true}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 3, "explanation_html": "The ureter develops from an outpouching that arises from the mesonephric duct. The mesonephric duct is associated with the metanephric duct that develops within the metenephrogenic blastema. This forms the site of the ureteric bud which branches off the mesonephric duct."}, {"number": 613, "topic": "Ureter", "stem_html": "A 23 year old man is admitted with a suspected ureteric colic. A KUB style x-ray is obtained. In which of the following locations is the stone most likely to be visualised?", "options": [{"label_html": "The tips of the transverse processes between L2 and L5", "is_correct": true}, {"label_html": "The tips of transverse processes between T10-L1", "is_correct": false}, {"label_html": "At the crest of the ilium", "is_correct": false}, {"label_html": "Over the S3 foramina", "is_correct": false}, {"label_html": "Over the sacrococcygeal joint", "is_correct": false}], "correct_index": 0, "explanation_html": "The ureter lies anterior to L2 to L5 and stones may be visualised at these points, they may also be identified over the sacro-iliac joints."}, {"number": 614, "topic": "Ureter", "stem_html": "A 42 year old woman is due to undergo a left nephroureterectomy for a transitional cell carcinoma involving the ureter. Which of the following structures is not related to the left ureter?", "options": [{"label_html": "Round ligament of the uterus", "is_correct": true}, {"label_html": "Internal iliac artery", "is_correct": false}, {"label_html": "Ovarian artery", "is_correct": false}, {"label_html": "Peritoneum", "is_correct": false}, {"label_html": "Sigmoid mesocolon", "is_correct": false}], "correct_index": 0, "explanation_html": "The ureter is not related to the round ligament of the uterus, it is related to the broad ligament and is within 1.5cm of the supravaginal part of the cervix."}], "note_html": "<ul><li>25-35 cm long<\/li><li>Muscular tube lined by transitional epithelium<\/li><li>Surrounded by thick muscular coat. Becomes 3 muscular layers as it crosses the bony pelvis<\/li><li>Retroperitoneal structure overlying transverse processes L2-L5<\/li><li>Lies anterior to bifurcation of iliac vessels<\/li><li>Blood supply is segmental; renal artery, aortic branches, gonadal branches, common iliac and internal iliac<\/li><li>Lies beneath the uterine artery<\/li><\/ul>"}, {"name": "Urethral anatomy", "questions": [{"number": 615, "topic": "Urethral anatomy", "stem_html": "A 28 year old man requires a urethral catheter to be inserted prior to undergoing a splenectomy. Where is the first site of resistance to be encountered on inserting the catheter?", "options": [{"label_html": "Bulbar urethra", "is_correct": false}, {"label_html": "Membranous urethra", "is_correct": true}, {"label_html": "Internal sphincter", "is_correct": false}, {"label_html": "Prostatic urethra", "is_correct": false}, {"label_html": "Bladder neck", "is_correct": false}], "correct_index": 1, "explanation_html": "The membranous urethra is the least distensible portion of the urethra. This is due to the fact that it is surrounded by the external sphincter."}, {"number": 616, "topic": "Urethral anatomy", "stem_html": "Which of the following regions of the male urethra is entirely surrounded by Bucks fascia?", "options": [{"label_html": "Preprostatic part", "is_correct": false}, {"label_html": "Prostatic part", "is_correct": false}, {"label_html": "Membranous part", "is_correct": false}, {"label_html": "Spongiose part", "is_correct": true}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 3, "explanation_html": "Bucks fascia is a layer of deep fascia that covers the penis it is continuous with the external spermatic fascia and the penile suspensory ligament. The membranous part of the urethra may partially pass through Bucks fascia as it passes into the penis. However, the spongiose part of the urethra is contained wholly within Bucks fascia.<br><br><i>Image of penile cross section<\/i><br><i>Bucks fascia corresponds to the layer of deep fascia<\/i><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb118b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb118.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Buck%27s fascia\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb118b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}, {"number": 617, "topic": "Urethral anatomy", "stem_html": "What is the nerve root value of the external urethral sphincter?", "options": [{"label_html": "S4", "is_correct": false}, {"label_html": "S1, S2, S3", "is_correct": false}, {"label_html": "S2, S3, S4", "is_correct": true}, {"label_html": "L3, L4, L5", "is_correct": false}, {"label_html": "L5, S1, S2", "is_correct": false}], "correct_index": 2, "explanation_html": "The external urethral sphincter is innervated by branches of the pudendal nerve, therefore the root values are S2, S3, S4."}, {"number": 618, "topic": "Urethral anatomy", "stem_html": "What is the nerve root value of the external urethral sphincter?", "options": [{"label_html": "S4", "is_correct": false}, {"label_html": "S1, S2, S3", "is_correct": false}, {"label_html": "S2, S3, S4", "is_correct": true}, {"label_html": "L3, L4, L5", "is_correct": false}, {"label_html": "L5, S1, S2", "is_correct": false}], "correct_index": 2, "explanation_html": "The external urethral sphincter is innervated by branches of the pudendal nerve, therefore the root values are S2, S3, S4."}, {"number": 619, "topic": "Urethral anatomy", "stem_html": "What is the longest part of the male urethra?", "options": [{"label_html": "Membranous urethra", "is_correct": false}, {"label_html": "Spongy urethra", "is_correct": true}, {"label_html": "Prostatic urethra", "is_correct": false}, {"label_html": "Urethra within the internal urethra orifice", "is_correct": false}, {"label_html": "Urethra within the urethral crest", "is_correct": false}], "correct_index": 1, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">The spongy urethra is around 15cm long and is the longest part of the male urethra. <\/div>"}, {"number": 620, "topic": "Urethral anatomy", "stem_html": "What is the lymphatic drainage of the membranous urethra?", "options": [{"label_html": "Deep inguinal nodes", "is_correct": false}, {"label_html": "Superficial inguinal nodes", "is_correct": false}, {"label_html": "Internal iliac nodes", "is_correct": true}, {"label_html": "External iliac nodes", "is_correct": false}, {"label_html": "Para-aortic nodes", "is_correct": false}], "correct_index": 2, "explanation_html": "The prostatic and membranous urethra drain to the internal iliac nodes."}, {"number": 621, "topic": "Urethral anatomy", "stem_html": "What is the lymphatic drainage of the female urethra?", "options": [{"label_html": "Superficial inguinal nodes", "is_correct": false}, {"label_html": "Deep inguinal nodes", "is_correct": false}, {"label_html": "Internal iliac nodes", "is_correct": true}, {"label_html": "External iliac nodes", "is_correct": false}, {"label_html": "Para-aortic nodes", "is_correct": false}], "correct_index": 2, "explanation_html": "The entire female urethra drains to the internal iliac nodes."}], "note_html": "<b>Female urethra<\/b><br>The female urethra is shorter and more acutely angulated than the male urethra. It is an extra-peritoneal structure and embedded in the endopelvic fascia. The neck of the bladder is subjected to transmitted intra-abdominal pressure and therefore deficiency in this area may result in stress urinary incontinence. Between the layers of the urogenital diaphragm the female urethra is surrounded by the external urethral sphincter, this is innervated by the pudendal nerve. It ultimately lies anterior to the vaginal orifice. <br><br><b>Male urethra<\/b><br>In males the urethra is much longer and is divided into four parts. <br><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Pre-prostatic urethra<\/b><\/td><td>Extremely short and lies between the bladder and prostate gland.It has a stellate lumen and is between 1 and 1.5cm long.Innervated by sympathetic noradrenergic fibres, as this region is composed of striated muscles bundles they may contract and prevent retrograde ejaculation.<\/td><\/tr><tr><td><b>Prostatic urethra<\/b><\/td><td>This segment is wider than the membranous urethra and contains several openings for the transmission of semen (at the midpoint of the urethral crest).<\/td><\/tr><tr><td><b>Membranous urethra<\/b><\/td><td>Narrowest part of the urethra and surrounded by external sphincter. It traverses the perineal membrane 2.5cm postero-inferior to the symphysis pubis.<\/td><\/tr><tr><td><b>Penile urethra<\/b><\/td><td>Travels through the corpus spongiosum on the underside of the penis. It is the longest urethral segment.It is dilated at its origin as the infrabulbar fossa and again in the glans penis as the navicular fossa. The bulbo-urethral glands open into the spongiose section of the urethra 2.5cm below the perineal membrane.<\/td><\/tr><\/tbody><\/table><\/div><br>The urothelium is transitional in nature near to the bladder and becomes squamous more distally."}, {"name": "Urogenital triangle", "questions": [{"number": 622, "topic": "Urogenital triangle", "stem_html": "A 43 year old man suffers a pelvic fracture which is complicated by an injury to the junction of the membranous urethra to the bulbar urethra. In which of the following directions is the extravasated urine most likely to pass?", "options": [{"label_html": "Posteriorly into extra peritoneal tissues", "is_correct": false}, {"label_html": "Laterally into the buttocks", "is_correct": false}, {"label_html": "Into the abdomen", "is_correct": false}, {"label_html": "Anteriorly into the connective tissues surrounding the scrotum", "is_correct": true}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 3, "explanation_html": "The superficial perineal pouch is a compartment bounded superficially by the superficial perineal fascia, deep by the perineal membrane (inferior fascia of the urogenital diaphragm), and laterally by the ischiopubic ramus. It contains the crura of the penis or clitoris, muscles, viscera, blood vessels, nerves, the proximal part of the <b>spongy urethra<\/b> in males, and the greater vestibular glands in females.<br>When urethral rupture occurs as in this case the urine will tend to pass anteriorly because the fascial condensations will prevent lateral and posterior passage of the urine."}, {"number": 623, "topic": "Urogenital triangle", "stem_html": "Which of the following structures is not located in the superficial perineal space in females?", "options": [{"label_html": "Posterior labial arteries", "is_correct": false}, {"label_html": "Pudendal nerve", "is_correct": true}, {"label_html": "Superficial transverse perineal muscle", "is_correct": false}, {"label_html": "Greater vestibular glands", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 1, "explanation_html": "The pudendal nerve is located in the deep perineal space and then branches to innervate more superficial structures."}], "note_html": "The urogenital triangle is formed by the:<br><ul><li>Ischiopubic inferior rami<\/li><li>Ischial tuberosities<\/li><\/ul>A fascial sheet is attached to the sides, forming the inferior fascia of the urogenital diaphragm.<br><br>It transmits the urethra in males and both the urethra and vagina in females. The membranous urethra lies deep to this structure and is surrounded by the external urethral sphincter.<br><br>Superficial to the urogenital diaphragm lies the superficial perineal pouch. In males this contains:<br><ul><li>Bulb of penis<\/li><li>Crura of the penis<\/li><li>Superficial transverse perineal muscle<\/li><li>Posterior scrotal arteries<\/li><li>Posterior scrotal nerves<\/li><\/ul><br>In females the internal pudendal artery branches to become the posterior labial arteries in the superficial perineal pouch."}, {"name": "Uterus", "questions": [{"number": 624, "topic": "Uterus", "stem_html": "What is the most important structure involved in supporting the uterus?", "options": [{"label_html": "Round ligament", "is_correct": false}, {"label_html": "Broad ligament", "is_correct": false}, {"label_html": "Uterosacral ligaments", "is_correct": false}, {"label_html": "Cardinal ligaments", "is_correct": false}, {"label_html": "Central perineal tendon", "is_correct": true}], "correct_index": 4, "explanation_html": "The central perineal tendon provides the main structural support to the uterus. Damage to this structure is commonly associated with the development of pelvic organ prolapse, even when other structures are intact."}], "note_html": "The non pregnant uterus resides entirely within the pelvis. The peritoneum invests the uterus and the structure is contained within the peritoneal cavity. The blood supply to the uterine body is via the uterine artery (branch of the internal iliac). The uterine artery passes from the inferior aspect of the uterus (lateral to the cervix) and runs alongside the uterus. It frequently anastomoses with the ovarian artery superiorly. Inferolaterally, the ureter is a close relation and ureteric injuries are a recognised complication when pathology brings these structures into close proximity. <br><br>The supports of the uterus include the central perineal tendon (the most important). The lateral cervical, round and uterosacral ligaments are condensations of the endopelvic fascia and provide additional structural support. <br><br><i>Topography of the uterus<\/i><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb132b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb132.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Uterus\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb132b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}, {"name": "Vagus nerve", "questions": [{"number": 625, "topic": "Vagus nerve", "stem_html": "A 67 year old man undergoes a carotid endarterectomy and seems to recover well following surgery. When he is reviewed on the ward post operatively he complains that his voice is hoarse. What is the most likely cause?", "options": [{"label_html": "Damage to the accessory nerve", "is_correct": false}, {"label_html": "Damage to the cervical plexus", "is_correct": false}, {"label_html": "Damage to the glossopharyngeal nerve", "is_correct": false}, {"label_html": "Damage to the hypoglossal nerve", "is_correct": false}, {"label_html": "Damage to the vagus", "is_correct": true}], "correct_index": 4, "explanation_html": "Many of these nerves are at risk of injury during carotid surgery. However, only damage to the vagus would account for a hoarse voice."}], "note_html": "The vagus nerve has mixed functions and supplies the structures from the fourth and sixth pharyngeal arches. It also supplies the fore and midgut sections of the embryonic gut tube. It carries afferent fibres from these areas (viz; pharynx, larynx, oesophagus, stomach, lungs, heart and great vessels). The efferent fibres of the vagus are of two main types. The first are preganglionic parasympathetic fibres distributed to the parasympathetic ganglia that innervate smooth muscle of the innervated organs (such as gut). The second type of efferent fibres have direct skeletal muscle innervation, these are largely to the muscles of the larynx and pharynx. <br><br><b>Origin and course<\/b><br>The vagus arises from the lateral surface of the medulla oblongata by a series of rootlets. It is related to the glossopharyngeal nerve cranially and the accessory nerve caudally. It exits through the jugular foramen and is contained within its own dural sheath alongside the accessory nerve. In the neck it descends vertically in the carotid sheath where it is closely related to the internal and common carotid arteries. It leaves the neck and enters the mediastinum. On the right it passes anterior to the first part of the subclavian artery, on the left it lies in the interval between the common carotid and subclavian arteries.<br>In the mediastinum both nerves pass postero-inferiorly and reach the posterior surface of the corresponding lung root. These then branch into both lungs. At the inferior end of the mediastinum these plexuses reunite to form the formal vagal trunks that pass through the oesophageal hiatus and into the abdomen. The anterior and posterior vagal trunks are formal nerve fibres these then splay out once again sending fibres over the stomach and posteriorly to the coeliac plexus. Branches pass to the liver, spleen and kidney. <br><br><b>Communications and branches<\/b><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Communication<\/b><\/th><th><b>Details<\/b><\/th><\/tr><\/thead><tbody><tr><td>Superior ganglion<\/td><td>Located in jugular foramen<br>Communicates with the superior cervical sympathetic ganglion, accessory nerve<br>Two branches; meningeal and auricular (the latter may give rise to vagal stimulation following instrumentation of the external auditory meatus)<\/td><\/tr><tr><td>Inferior ganglion<\/td><td>Communicates with the superior cervical sympathetic ganglion, hypoglossal nerve and loop between first and second cervical ventral rami<br>Two branches; pharyngeal  (supplies pharyngeal muscles) and superior laryngeal nerve (inferomedially- deep to both carotid arteries)<\/td><\/tr><\/tbody><\/table><\/div><br><b>Branches in the neck<\/b><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid2\"><thead><tr><th><b>Branch<\/b><\/th><th><b>Detail<\/b><\/th><\/tr><\/thead><tbody><tr><td>Superior and inferior cervical cardiac branches<\/td><td>Arise at various points and descend into thorax<br>On the right these pass posterior to the subclavian artery<br>On the left the superior branch passes between the arch of the aorta and the trachea to connect with the deep cardiac plexus. The inferior branch descends with the vagus itself.<\/td><\/tr><tr><td>Right recurrent laryngeal nerve<\/td><td>Arises from vagus anterior to the first part of the subclavian artery, hooks under it, and ascends superomedially. It passes close to the common carotid and finally the inferior thyroid artery to insert into the larynx<\/td><\/tr><\/tbody><\/table><\/div><br><b>Branches in the thorax<\/b><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid3\"><thead><tr><th><b>Branch<\/b><\/th><th><b>Details<\/b><\/th><\/tr><\/thead><tbody><tr><td>Left recurrent laryngeal nerve<\/td><td>Arises from the vagus on the aortic arch. It hooks around the inferior surface of the arch, posterior to the ligamentum arteriosum and passes upwards through the superior mediastinum and lower part of the neck. It lies in the groove between oesophagus and trachea (supplies both). It passes with the inferior thyroid artery and inserts into the larynx.<\/td><\/tr><tr><td>Thoracic and cardiac branches<\/td><td>There are extensive branches to both the heart and lung roots. These pass throughout both these viscera. The fibres reunite distally prior to passing into the abdomen.<\/td><\/tr><\/tbody><\/table><\/div><br><b>Abdominal branches<\/b><br>After entry into the abdominal cavity the nerves branch extensively. In previous years the extensive network of the distal branches (nerves of Laterjet) over the surface of the distal stomach were important for the operation of highly selective vagotomy. The use of modern PPI's has reduced the need for such highly selective procedures. Branches pass to the coeliac axis and alongside the vessels to supply the spleen, liver and kidney."}, {"name": "Vertebral artery", "questions": [{"number": 626, "topic": "Vertebral artery", "stem_html": "The vertebral artery traverses all of the following except?", "options": [{"label_html": "Transverse process of C6", "is_correct": false}, {"label_html": "Transverse process of  the axis", "is_correct": false}, {"label_html": "Vertebral canal", "is_correct": false}, {"label_html": "Foramen magnum", "is_correct": false}, {"label_html": "Intervertebral foramen", "is_correct": true}], "correct_index": 4, "explanation_html": "The vertebral artery passes through the foramina which are located in the transverse processes of the cervical vertebra, it does not traverse the intervertebral foramen."}], "note_html": "The vertebral artery is the first branch of the subclavian artery. Anatomically it is divisible into 4 regions:<br><ul><li>The first part runs to the foramen in the transverse process of C6. Anterior to this part lies the vertebral and internal jugular veins. On the left side the thoracic duct is also an anterior relation. <\/li><li>The second part runs superiorly through the foramina of the the transverse processes of the upper 6 cervical vertebrae. Once it has passed through the transverse process of the axis it then turns superolaterally to the atlas. It is accompanied by a venous plexus and the inferior cervical sympathetic ganglion. <\/li><li>The third part runs posteromedially on the lateral mass of the atlas. It enters the sub occipital triangle, in the groove of the upper surface of the posterior arch of the atlas. It then passes anterior to the edge of the posterior atlanto-occipital membrane to enter the vertebral canal. <\/li><li>The fourth part passes through the spinal dura and arachnoid, running superiorly and anteriorly at the lateral aspect of the medulla oblongata. At the lower border of the pons it unites to form the basilar artery.<\/li><\/ul>"}, {"name": "Vertebral column", "questions": [{"number": 627, "topic": "Vertebral column", "stem_html": "Which of the following statements relating to the vertebral column is false?", "options": [{"label_html": "There are 7 cervical vertebrae", "is_correct": false}, {"label_html": "The cervical and lumbar lordosis are secondary curves developing after birth due to change in shape of the intervertebral discs", "is_correct": false}, {"label_html": "The lumbar vertebrae do not have a transverse process foramina", "is_correct": false}, {"label_html": "The lumbar  vertebrae receive blood directly from the aorta", "is_correct": false}, {"label_html": "The spinous process is formed by the junction of the pedicles posteriorly", "is_correct": true}], "correct_index": 4, "explanation_html": "The spinous process is formed by 2 laminae posteriorly."}, {"number": 628, "topic": "Vertebral column", "stem_html": "A 45 year old lady develops severe back pain and on examination is found to have clinical evidence of an L5/ S1 radiculopathy. Her symptoms deteriorate and eventually a laminectomy is performed. During a posterior surgical approach the surgeons encounter a tough ligamentous structure lying anterior to the spinous processes. This structure is most likely to be the", "options": [{"label_html": "Transverse spinal ligament", "is_correct": false}, {"label_html": "Supraspinal ligament", "is_correct": false}, {"label_html": "Anterior longitudinal ligament", "is_correct": false}, {"label_html": "Ligamentum flavum", "is_correct": true}, {"label_html": "Posterior longitudinal ligament", "is_correct": false}], "correct_index": 3, "explanation_html": "The ligamentum lies in this position, as illustrated below:<br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb092b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb092.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Ligamenta flava\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb092b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}], "note_html": "<ul><li>There are 7 cervical, 12 thoracic, 5 lumbar, and 5 sacral vertebrae. <\/li><li>The spinal cord segmental levels do not necessarily correspond to the vertebral segments.  For example, while the C1 cord is located at the C1 vertebra, the C8 cord is situated at the C7 vertebra. While the T1 cord is situated at the T1 vertebra, the T12 cord is situated at the T8 vertebra. The lumbar cord is situated between T9 and T11 vertebrae. The sacral cord is situated between the T12 to L2 vertebrae.<\/li><\/ul><br><b>Cervical vertebrae<\/b><br>The interface between the first and second vertebra is called the atlanto-axis junction. The C3 cord contains the phrenic nucleus.<br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Muscle<\/b><\/th><th><b>Nerve root value<\/b><\/th><\/tr><\/thead><tbody><tr><td>Deltoid<\/td><td>C5,6<\/td><\/tr><tr><td>Biceps<\/td><td>C5,6<\/td><\/tr><tr><td>Wrist extensors<\/td><td>C6-8<\/td><\/tr><tr><td>Triceps<\/td><td>C6-8<\/td><\/tr><tr><td>Wrist flexors<\/td><td>C6-T1<\/td><\/tr><tr><td>Hand muscles<\/td><td>C8-T1<\/td><\/tr><\/tbody><\/table><\/div><br><b>Thoracic vertebrae<\/b><br>The thoracic vertebral segments are defined by those that have a rib. The spinal roots form the intercostal nerves that run on the bottom side of the ribs and these nerves control the intercostal muscles and associated dermatomes.<br><br><b>Lumbosacral vertebrae<\/b><br>Form the remainder of the segments below the vertebrae of the thorax. The lumbosacral spinal cord, however, starts at about T9 and continues only to L2. It contains most of the segments that innervate the hip and legs, as well as the buttocks and anal regions.<br><br><b>Cauda Equina<\/b><br>The spinal cord ends at L1-L2 vertebral level. The tip of the spinal cord is called the conus.  Below the conus, there is a spray of spinal roots that is called the cauda equina. Injuries below L2 represent injuries to spinal roots rather than the spinal cord proper."}, {"name": "Visual field defects", "questions": [{"number": 629, "topic": "Visual field defects", "stem_html": "A 60 year old female attends the preoperative hernia clinic.  She reports some visual difficulty.  On examination she is noted to have a homonymous hemianopia.  Where is the lesion most likely to be?", "options": [{"label_html": "Frontal lobe", "is_correct": false}, {"label_html": "Pituitary gland", "is_correct": false}, {"label_html": "Parietal lobe", "is_correct": false}, {"label_html": "Optic chiasm", "is_correct": false}, {"label_html": "Optic tract", "is_correct": true}], "correct_index": 4, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Lesions before optic chiasm:<br>Monocular vision loss = Optic nerve lesion<br>Bitemporal hemianopia = Optic chiasm lesion<br><br>Lesions after the optic chiasm:<br>Homonymous hemianopia = Optic tract lesion<br>Upper quadranopia = Temporal lobe lesion<br>Lower quadranopia = Parietal lobe lesion<\/div>Unfortunately we thought as surgeons we could forget about visual field defects! However the college seem to like them.  Remember a homonymous hemianopia is indicative of an optic tract lesion.  Parietal lobe lesions tend to cause inferior quadranopias and there is a bitemporal hemianopia with optic chiasm lesion or pituitary tumours."}, {"number": 630, "topic": "Visual field defects", "stem_html": "A middle aged lady is brought to the clinic by her husband who has noted a change in her appearance. She finds removal of rings difficult, her shoe size has changed and photographs show a marked change in her appearance. Which of the following is most likely to be identified on neurological examination?", "options": [{"label_html": "Bi nasal hemianopia", "is_correct": false}, {"label_html": "Bi temporal hemianopia", "is_correct": true}, {"label_html": "Inferior quadrantanopia", "is_correct": false}, {"label_html": "Homonymous hemianopia", "is_correct": false}, {"label_html": "Unilateral loss of vision", "is_correct": false}], "correct_index": 1, "explanation_html": "The patient is most likely to have developed acromegaly. Since a pituitary lesion is likely to be present; compression of the optic chiasm may occur."}, {"number": 631, "topic": "Visual field defects", "stem_html": "A 42 year old woman is admitted to the vascular ward for an endarterectomy. Her CT report confirms a left temporal lobe infarct. What is the most likely visual defect to be encountered?", "options": [{"label_html": "Right homonymous hemianopia", "is_correct": false}, {"label_html": "Right superior quadranopia", "is_correct": true}, {"label_html": "Right inferior quadranopia", "is_correct": false}, {"label_html": "Left superior quadranopia", "is_correct": false}, {"label_html": "Left homonymous hemianopia", "is_correct": false}], "correct_index": 1, "explanation_html": "Temporal lesions cause a contralateral superior quadranopia. Think temporal area is at the top of the head i.e. superior quadranopia.<br>Another useful mnemonic is: PITS: Parietal Inferior, Temporal superior quadratinopia"}, {"number": 632, "topic": "Visual field defects", "stem_html": "A 53 year old man is admitted to the vascular ward for a carotid endarterectomy. His CT head report confirms a left parietal lobe infarct. What type of visual field defect might be noted?", "options": [{"label_html": "Right inferior quadranopia", "is_correct": true}, {"label_html": "Right superior quadranopia", "is_correct": false}, {"label_html": "Right homonymous hemianopia", "is_correct": false}, {"label_html": "Left superior quadranopia", "is_correct": false}, {"label_html": "Lower bitemporal hemianopia", "is_correct": false}], "correct_index": 0, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Superior quadranopia = temporal lobe lesion<br>Inferior quadranopia = parietal lobe lesion<\/div>Parietal lesions cause a contralateral inferior quadranopia."}, {"number": 633, "topic": "Visual field defects", "stem_html": "What type of visual field defect is most likely to be noted in a patient with a craniopharyngioma?", "options": [{"label_html": "Lower bitemporal hemianopia", "is_correct": true}, {"label_html": "Upper bitemporal hemianopia", "is_correct": false}, {"label_html": "Right superior quadranopia", "is_correct": false}, {"label_html": "Right homonymous hemianopia", "is_correct": false}, {"label_html": "Left homonymous hemianopia", "is_correct": false}], "correct_index": 0, "explanation_html": "Lesions at the optic chiasm classically produce a bitemporal hemianopia, however note lesions that spread up from below ie pituitary tumours, the defect is worse in the upper fields and if a lesion spreads down from above ie craniopharyngiomas, the visual defect is worse in the lower quadrants. Therefore this patient is likely to have a lower bitemporal hemianopia."}], "note_html": "<ul><li>left homonymous hemianopia means visual field defect to the left, i.e. Lesion of right optic tract<\/li><li>homonymous quadrantanopias: PITS (Parietal-Inferior, Temporal-Superior)<\/li><li>incongruous defects = optic tract lesion; congruous defects = optic radiation lesion or occipital cortex<\/li><\/ul><br><b>Homonymous hemianopia<\/b><br><ul><li>Incongruous defects: lesion of optic tract<\/li><li>Congruous defects: lesion of optic radiation or occipital cortex<\/li><li>Macula sparing: lesion of occipital cortex<\/li><\/ul><br><b>Homonymous quadrantanopias<\/b><br><ul><li>Superior: lesion of temporal lobe<\/li><li>Inferior: lesion of parietal lobe<\/li><li>Mnemonic = PITS (Parietal-Inferior, Temporal-Superior)<\/li><\/ul><br><b>Bitemporal hemianopia<\/b><br><ul><li>Lesion of optic chiasm<\/li><li>Upper quadrant defect &gt; lower quadrant defect = inferior chiasmal compression, commonly a pituitary tumour<\/li><li>Lower quadrant defect &gt; upper quadrant defect = superior chiasmal compression, commonly a craniopharyngioma<\/li><\/ul>"}]}</script>
  <script>
    const quizData = JSON.parse(document.getElementById("quiz-data").textContent);
    const app = document.getElementById("app");
    const modeButtons = Array.from(document.querySelectorAll("[data-mode-button]"));
    const topicActionButtons = Array.from(document.querySelectorAll("[data-topic-action]"));

    const state = {
      mode: "solve",
      answers: new Map(),
      questionRefs: [],
    };

    function buildTopic(topic, questionOffset) {
      const details = document.createElement("details");
      details.className = "topic";
      details.open = true;

      const summary = document.createElement("summary");
      summary.innerHTML = `
        <div>
          <h2 class="topic-title">${topic.name}</h2>
        </div>
        <div class="topic-meta">
          <span>${topic.questions.length} questions</span>
          <span class="chevron" aria-hidden="true">></span>
        </div>
      `;

      const body = document.createElement("div");
      body.className = "topic-body";

      if (topic.note_html) {
        const notes = document.createElement("details");
        notes.className = "topic-notes";

        const notesSummary = document.createElement("summary");
        notesSummary.innerHTML = `
          <span class="topic-notes-title">Notes</span>
          <span class="chevron" aria-hidden="true">></span>
        `;

        const notesBody = document.createElement("div");
        notesBody.className = "topic-notes-body rich-text";
        notesBody.innerHTML = topic.note_html;

        notes.appendChild(notesSummary);
        notes.appendChild(notesBody);
        body.appendChild(notes);
      }

      topic.questions.forEach((question, indexInTopic) => {
        const globalIndex = questionOffset + indexInTopic;
        body.appendChild(buildQuestionCard(question, globalIndex));
      });

      details.appendChild(summary);
      details.appendChild(body);
      return details;
    }

    function buildQuestionCard(question, questionIndex) {
      const card = document.createElement("article");
      card.className = "question-card is-hidden";
      card.dataset.questionIndex = String(questionIndex);

      const label = document.createElement("p");
      label.className = "question-label";
      label.textContent = `Question ${question.number}`;

      const stem = document.createElement("div");
      stem.className = "stem rich-text";
      stem.innerHTML = question.stem_html;

      const options = document.createElement("div");
      options.className = "options";

      const optionButtons = question.options.map((option, optionIndex) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "option";
        button.dataset.optionIndex = String(optionIndex);
        button.innerHTML = option.label_html;
        button.addEventListener("click", () => {
          if (state.mode !== "solve") {
            return;
          }
          state.answers.set(questionIndex, optionIndex);
          applyQuestionState(questionIndex);
        });
        options.appendChild(button);
        return button;
      });

      const explanation = document.createElement("div");
      explanation.className = "explanation rich-text";
      explanation.innerHTML = `<span class="explanation-label">Explanation</span>${question.explanation_html}`;

      card.appendChild(label);
      card.appendChild(stem);
      card.appendChild(options);
      card.appendChild(explanation);

      state.questionRefs[questionIndex] = {
        card,
        explanation,
        optionButtons,
        question,
      };

      applyQuestionState(questionIndex);
      return card;
    }

    function applyQuestionState(questionIndex) {
      const ref = state.questionRefs[questionIndex];
      if (!ref) {
        return;
      }

      const { card, optionButtons, question } = ref;
      const selectedIndex = state.answers.get(questionIndex);
      const hasSelection = selectedIndex !== undefined;
      const isReview = state.mode === "review";
      const showExplanation = isReview || hasSelection;

      card.classList.toggle("is-hidden", !showExplanation);

      optionButtons.forEach((button, optionIndex) => {
        button.classList.remove("correct", "incorrect", "neutral-revealed");

        if (isReview) {
          button.disabled = true;
          if (optionIndex === question.correct_index) {
            button.classList.add("correct");
          } else {
            button.classList.add("neutral-revealed");
          }
          return;
        }

        button.disabled = false;
        if (!hasSelection) {
          return;
        }

        if (optionIndex === question.correct_index) {
          button.classList.add("correct");
        } else if (optionIndex === selectedIndex) {
          button.classList.add("incorrect");
        } else {
          button.classList.add("neutral-revealed");
        }
      });
    }

    function renderApp() {
      if (!quizData.topics.length) {
        const empty = document.createElement("div");
        empty.className = "empty-state";
        empty.textContent = "No questions were found in this JSON file.";
        app.replaceChildren(empty);
        return;
      }

      const wrapper = document.createElement("div");
      wrapper.className = "topic-list";

      let questionOffset = 0;
      quizData.topics.forEach((topic) => {
        wrapper.appendChild(buildTopic(topic, questionOffset));
        questionOffset += topic.questions.length;
      });

      app.replaceChildren(wrapper);
    }

    function setMode(mode) {
      state.mode = mode;
      modeButtons.forEach((button) => {
        const isActive = button.dataset.modeButton === mode;
        button.classList.toggle("active", isActive);
        button.setAttribute("aria-pressed", String(isActive));
      });

      state.questionRefs.forEach((_, index) => applyQuestionState(index));
    }

    function setAllTopics(open) {
      document.querySelectorAll(".topic").forEach((topic) => {
        topic.open = open;
      });
    }

    modeButtons.forEach((button) => {
      button.addEventListener("click", () => setMode(button.dataset.modeButton));
    });

    topicActionButtons.forEach((button) => {
      button.addEventListener("click", () => {
        setAllTopics(button.dataset.topicAction === "expand");
      });
    });

    renderApp();
    setMode("solve");
  </script>
</body>
</html>
