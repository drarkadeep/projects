<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Anatomy</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f1e8;
      --bg-accent: #ebe4d4;
      --surface: rgba(255, 252, 246, 0.92);
      --surface-strong: #fffdf7;
      --border: #d9cfbd;
      --text: #23313a;
      --text-soft: #5f6c73;
      --accent: #496a58;
      --accent-strong: #2f5341;
      --correct-bg: #e0f3e6;
      --correct-border: #77b487;
      --wrong-bg: #fbe0df;
      --wrong-border: #dc7a73;
      --note-bg: #f3eee2;
      --shadow: 0 18px 40px rgba(76, 59, 37, 0.08);
      --radius-lg: 22px;
      --radius-md: 16px;
      --radius-sm: 12px;
      --page-width: 960px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: "Avenir Next", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.72), transparent 32%),
        linear-gradient(180deg, #f8f4eb 0%, #f3ede0 100%);
      line-height: 1.65;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.14), transparent 18%, transparent 82%, rgba(255, 255, 255, 0.14)),
        repeating-linear-gradient(
          180deg,
          rgba(73, 106, 88, 0.015) 0,
          rgba(73, 106, 88, 0.015) 1px,
          transparent 1px,
          transparent 18px
        );
    }

    a {
      color: var(--accent-strong);
    }

    img {
      max-width: 100%;
      height: auto;
      border-radius: 14px;
    }

    .score-badge,
    .badge.rounded-pill.bg-danger {
      display: none !important;
    }

    .page {
      width: min(100% - 24px, var(--page-width));
      margin: 0 auto;
      padding: 18px 0 48px;
    }

    .topbar {
      margin-bottom: 18px;
      padding: 18px;
      background: rgba(255, 252, 246, 0.9);
      border: 1px solid rgba(217, 207, 189, 0.86);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .topbar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .eyebrow {
      margin: 0 0 4px;
      font-size: 0.76rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-soft);
    }

    .title {
      margin: 0;
      font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
      font-size: clamp(1.5rem, 2vw + 1rem, 2.35rem);
      line-height: 1.08;
      font-weight: 700;
    }

    .meta {
      margin: 8px 0 0;
      color: var(--text-soft);
      font-size: 0.96rem;
    }

    .mode-switch {
      display: inline-flex;
      padding: 6px;
      border-radius: 999px;
      background: var(--bg-accent);
      border: 1px solid var(--border);
      gap: 6px;
      flex-shrink: 0;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
      flex-wrap: wrap;
    }

    .topic-actions {
      display: inline-flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .utility-button {
      appearance: none;
      border: 1px solid var(--border);
      background: var(--surface-strong);
      color: var(--text);
      font: inherit;
      font-weight: 700;
      border-radius: 999px;
      padding: 10px 14px;
      cursor: pointer;
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .utility-button:hover {
      transform: translateY(-1px);
      border-color: #c7bba9;
      box-shadow: 0 8px 18px rgba(70, 54, 34, 0.07);
    }

    .utility-button:focus-visible {
      outline: 3px solid rgba(73, 106, 88, 0.22);
      outline-offset: 2px;
    }

    .mode-button {
      appearance: none;
      border: 0;
      background: transparent;
      color: var(--text-soft);
      font: inherit;
      font-weight: 700;
      border-radius: 999px;
      padding: 10px 16px;
      min-width: 92px;
      cursor: pointer;
      transition: transform 0.18s ease, background 0.18s ease, color 0.18s ease, box-shadow 0.18s ease;
    }

    .mode-button:hover {
      transform: translateY(-1px);
      color: var(--text);
    }

    .mode-button.active {
      background: var(--surface-strong);
      color: var(--accent-strong);
      box-shadow: 0 8px 18px rgba(73, 106, 88, 0.14);
    }

    .topic-list {
      display: grid;
      gap: 18px;
    }

    .topic {
      background: rgba(255, 252, 246, 0.78);
      border: 1px solid rgba(217, 207, 189, 0.9);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .topic[open] {
      background: rgba(255, 252, 246, 0.9);
    }

    .topic > summary {
      list-style: none;
      cursor: pointer;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      user-select: none;
    }

    .topic > summary::-webkit-details-marker {
      display: none;
    }

    .topic-title {
      margin: 0;
      font-size: 1.08rem;
      font-weight: 800;
      letter-spacing: 0.01em;
    }

    .topic-meta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--text-soft);
      font-size: 0.94rem;
    }

    .chevron {
      display: inline-block;
      transition: transform 0.2s ease;
      color: var(--accent);
      font-weight: 700;
    }

    .topic[open] > summary .chevron {
      transform: rotate(90deg);
    }

    .topic-notes {
      background: rgba(243, 238, 226, 0.62);
      border: 1px solid #e3d9c8;
      border-radius: var(--radius-md);
      overflow: hidden;
    }

    .topic-notes > summary {
      list-style: none;
      cursor: pointer;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      user-select: none;
    }

    .topic-notes > summary::-webkit-details-marker {
      display: none;
    }

    .topic-notes-title {
      font-size: 0.95rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-soft);
    }

    .topic-notes[open] > summary .chevron {
      transform: rotate(90deg);
    }

    .topic-notes-body {
      padding: 0 16px 16px;
      color: var(--text);
    }

    .topic-body {
      padding: 0 16px 16px;
      display: grid;
      gap: 14px;
    }

    .question-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 18px;
      box-shadow: 0 10px 24px rgba(70, 54, 34, 0.05);
    }

    .question-label {
      margin: 0 0 10px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-soft);
      font-size: 0.88rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 800;
    }

    .stem {
      font-size: 1rem;
    }

    .stem > *:first-child,
    .explanation > *:first-child {
      margin-top: 0;
    }

    .stem > *:last-child,
    .explanation > *:last-child {
      margin-bottom: 0;
    }

    .options {
      margin-top: 16px;
      display: grid;
      gap: 10px;
    }

    .option {
      width: 100%;
      text-align: left;
      border: 1px solid #d8d0c2;
      background: #fffdf8;
      color: var(--text);
      border-radius: var(--radius-sm);
      padding: 14px 15px;
      font: inherit;
      line-height: 1.45;
      cursor: pointer;
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
    }

    .option:hover {
      transform: translateY(-1px);
      border-color: #c7bba9;
      box-shadow: 0 8px 18px rgba(70, 54, 34, 0.07);
    }

    .option:focus-visible {
      outline: 3px solid rgba(73, 106, 88, 0.22);
      outline-offset: 2px;
    }

    .option.correct {
      background: var(--correct-bg);
      border-color: var(--correct-border);
      box-shadow: inset 0 0 0 1px rgba(119, 180, 135, 0.2);
    }

    .option.incorrect {
      background: var(--wrong-bg);
      border-color: var(--wrong-border);
      box-shadow: inset 0 0 0 1px rgba(220, 122, 115, 0.2);
    }

    .option.neutral-revealed {
      background: #faf6ee;
      border-color: #d8d0c2;
      color: #5f676a;
    }

    .option[disabled] {
      cursor: default;
      opacity: 1;
    }

    .explanation {
      margin-top: 14px;
      padding: 14px 16px;
      background: var(--note-bg);
      border: 1px solid #e3d9c8;
      border-radius: 14px;
      color: var(--text);
    }

    .question-card.is-hidden .explanation {
      display: none;
    }

    .explanation-label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-soft);
      font-weight: 800;
    }

    .empty-state {
      padding: 28px 22px;
      background: var(--surface);
      border: 1px dashed var(--border);
      border-radius: var(--radius-lg);
      color: var(--text-soft);
    }

    .rich-text table {
      width: 100%;
      border-collapse: collapse;
      margin: 12px 0;
      overflow: hidden;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.68);
    }

    .rich-text td,
    .rich-text th {
      border: 1px solid #ddd2bf;
      padding: 10px 12px;
      vertical-align: top;
    }

    .rich-text ul,
    .rich-text ol {
      padding-left: 20px;
      margin: 10px 0;
    }

    .rich-text center {
      display: block;
      text-align: center;
    }

    .rich-text .table-responsive {
      overflow-x: auto;
    }

    @media (max-width: 720px) {
      .page {
        width: min(100% - 16px, var(--page-width));
        padding-top: 10px;
      }

      .topbar {
        padding: 14px;
        border-radius: 18px;
      }

      .topbar-inner {
        flex-direction: column;
        align-items: stretch;
      }

      .controls {
        justify-content: stretch;
      }

      .topic-actions {
        width: 100%;
      }

      .utility-button {
        flex: 1 1 0;
      }

      .mode-switch {
        width: 100%;
        justify-content: stretch;
      }

      .mode-button {
        flex: 1 1 50%;
      }

      .topic > summary {
        padding: 16px;
        align-items: flex-start;
      }

      .topic-meta {
        font-size: 0.88rem;
      }

      .topic-body {
        padding: 0 12px 12px;
      }

      .question-card {
        padding: 15px;
      }

      .option {
        padding: 13px 14px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="topbar">
      <div class="topbar-inner">
        <div>
          <p class="eyebrow">Study View</p>
          <h1 class="title">Anatomy</h1>
          <p class="meta">633 questions across 205 topics</p>
        </div>
        <div class="controls">
          <div class="topic-actions" aria-label="Topic visibility controls">
            <button class="utility-button" type="button" data-topic-action="expand">Expand all</button>
            <button class="utility-button" type="button" data-topic-action="collapse">Collapse all</button>
          </div>
          <div class="mode-switch" role="tablist" aria-label="Question mode">
            <button class="mode-button active" type="button" data-mode-button="solve" aria-pressed="true">Solve</button>
            <button class="mode-button" type="button" data-mode-button="review" aria-pressed="false">Review</button>
          </div>
        </div>
      </div>
    </section>

    <section id="app"></section>
  </main>

  <script id="quiz-data" type="application/json">{"title": "Anatomy", "topics": [{"name": "Abdominal aorta", "questions": [{"number": 1, "topic": "Abdominal aorta", "stem_html": "Which of the structures listed below accompanies the aorta as it traverses the aortic hiatus?", "options": [{"label_html": "Oesophagus", "is_correct": false}, {"label_html": "Thoracic duct", "is_correct": true}, {"label_html": "Vagal trunks", "is_correct": false}, {"label_html": "Right phrenic nerve", "is_correct": false}, {"label_html": "Left phrenic nerve", "is_correct": false}], "correct_index": 1, "explanation_html": "The aorta is accompanied by the thoracic duct as it traverses the aortic hiatus. The vagal trunks accompany the oesophagus which passes through the muscular part of the diaphragm on the right. The right phrenic nerve accompanies the IVC as it passes through the caval opening. The left phrenic nerve passes through the muscular part of the diaphragm anterior to the central tendon on the left."}, {"number": 2, "topic": "Abdominal aorta", "stem_html": "A 73 year old man has a large abdominal aortic aneurysm. During a laparotomy for planned surgical repair the surgeons find the aneurysm is far more proximally located and lies near the origin of the SMA. During the dissection a vessel lying transversely across the aorta is injured. What is this vessel most likely to be?", "options": [{"label_html": "Left renal vein", "is_correct": true}, {"label_html": "Right renal vein", "is_correct": false}, {"label_html": "Inferior mesenteric artery", "is_correct": false}, {"label_html": "Ileocolic artery", "is_correct": false}, {"label_html": "Middle colic artery", "is_correct": false}], "correct_index": 0, "explanation_html": "The left renal vein runs across the surface of the aorta and may require deliberate ligation during juxtarenal aneurysm repair."}, {"number": 3, "topic": "Abdominal aorta", "stem_html": "A 72 year old man is undergoing an open abdominal aortic aneurysm repair. The aneurysm is located in a juxtarenal location and surgical access to the neck of aneurysm is difficult. Which of the following structures may be divided to improve access?", "options": [{"label_html": "Cisterna chyli", "is_correct": false}, {"label_html": "Transverse colon", "is_correct": false}, {"label_html": "Left renal vein", "is_correct": true}, {"label_html": "Superior mesenteric artery", "is_correct": false}, {"label_html": "Coeliac axis", "is_correct": false}], "correct_index": 2, "explanation_html": "The left renal vein will be stretched over the neck of the anuerysm in this location and is not infrequently divided. This adds to the nephrotoxic insult of juxtarenal aortic surgery as a supra renal clamp is also often applied. Deliberate division of the Cisterna Chyli will not improve access and will result in a chyle leak. Division of the transverse colon will not help at all and would result in a high risk of graft infection. Division of the SMA is pointless for a juxtarenal procedure."}, {"number": 4, "topic": "Abdominal aorta", "stem_html": "A 76 year old man is undergoing an abdominal aortic aneurysm repair. The surgeons occlude the aorta with two clamps, the inferior clamp being placed at the point of aortic bifurcation. Which of the following vertebral bodies will lie posterior to the clamp at this level?", "options": [{"label_html": "L1", "is_correct": false}, {"label_html": "T10", "is_correct": false}, {"label_html": "L4", "is_correct": true}, {"label_html": "L5", "is_correct": false}, {"label_html": "L2", "is_correct": false}], "correct_index": 2, "explanation_html": "The aorta bifurcates at L4. An important landmark that is tested frequently."}, {"number": 5, "topic": "Abdominal aorta", "stem_html": "A 22 year old soldier is shot in the abdomen and amongst his various injuries is a major disruption to the abdominal aorta. There is torrential haemorrhage and the surgeons decide to control the aorta by placement of a vascular clamp immediately inferior to the diaphragm. Which of the following vessels may be injured in this maneouvre?", "options": [{"label_html": "Inferior phrenic arteries", "is_correct": true}, {"label_html": "Superior phrenic arteries", "is_correct": false}, {"label_html": "Splenic artery", "is_correct": false}, {"label_html": "Renal arteries", "is_correct": false}, {"label_html": "Superior mesenteric artery", "is_correct": false}], "correct_index": 0, "explanation_html": "As the first branches of the abdominal aorta the inferior phrenic arteries are at greatest risk. The superior phrenic arteries lie in the thorax. The potential space at the level of the diaphragmatic hiatus is a potentially useful site for aortic occlusion. However, leaving the clamp applied for more than about 10 -15 minutes usually leads to poor outcomes."}], "note_html": "<b>Abdominal aortic topography<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Origin<\/b><\/td><td>T12<\/td><\/tr><tr><td><b>Termination<\/b><\/td><td>L4<\/td><\/tr><tr><td><b>Posterior relations<\/b><\/td><td>L1-L4 Vertebral bodies<\/td><\/tr><tr><td><b>Anterior relations<\/b><\/td><td>Lesser omentum<br>Liver<br>Left renal vein<br>Inferior mesenteric vein<br>Third part of duodenum<br>Pancreas<br>Parietal peritoneum<br>Peritoneal cavity<\/td><\/tr><tr><td><b>Right lateral relations<\/b><\/td><td>Right crus of the diaphragm<br>Cisterna chyli<br>IVC (becomes posterior distally)<\/td><\/tr><tr><td><b>Left lateral relations<\/b><\/td><td>4th part of duodenum<br>Duodenal-jejunal flexure<br>Left sympathetic trunk<\/td><\/tr><\/tbody><\/table><\/div><br><i>The abdominal aorta<\/i><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb104b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb104.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Abdominal aorta\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb104b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}, {"name": "Abdominal aortic branches", "questions": [{"number": 6, "topic": "Abdominal aortic branches", "stem_html": "A 72 year old man is undergoing a repair of an abdominal aortic aneurysm. The aorta is cross clamped both proximally and distally. The proximal clamp is applied immediately inferior to the renal arteries. Both common iliac arteries are clamped distally. A longitudinal aortotomy is performed. After evacuating the contents of the aneurysm sac a significant amount of ongoing bleeding is encountered. This is most likely to originate from:", "options": [{"label_html": "The coeliac axis", "is_correct": false}, {"label_html": "Testicular artery", "is_correct": false}, {"label_html": "Splenic artery", "is_correct": false}, {"label_html": "Superior mesenteric artery", "is_correct": false}, {"label_html": "Lumbar arteries", "is_correct": true}], "correct_index": 4, "explanation_html": "The lumbar arteries are posteriorly sited and are a common cause of back bleeding during aortic surgery. The other vessels cited all exit the aorta in the regions that have been cross clamped. Back bleeding from the gonadal vessels is negligible."}, {"number": 7, "topic": "Abdominal aortic branches", "stem_html": "Which of the following is not a branch of the abdominal aorta?", "options": [{"label_html": "Inferior mesenteric artery", "is_correct": false}, {"label_html": "Inferior phrenic artery", "is_correct": false}, {"label_html": "Superior mesenteric artery", "is_correct": false}, {"label_html": "Superior phrenic artery", "is_correct": true}, {"label_html": "Renal artery", "is_correct": false}], "correct_index": 3, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Phrenic [inferior]<br>Celiac<br>Superior mesenteric<br>Suprarenal [middle]<br>Renal<br>Testicular<br>Lumbars<br>Inferior mesenteric<br>Sacral<\/div>The superior phrenic artery branches from the aorta in the thorax."}, {"number": 8, "topic": "Abdominal aortic branches", "stem_html": "How many unpaired branches leave the abdominal aorta to supply the abdominal viscera?", "options": [{"label_html": "One", "is_correct": false}, {"label_html": "Two", "is_correct": false}, {"label_html": "Three", "is_correct": true}, {"label_html": "Four", "is_correct": false}, {"label_html": "Five", "is_correct": false}], "correct_index": 2, "explanation_html": "There are three unpaired branches to the abdominal viscera. These include the coeliac axis, the SMA and IMA. Branches to the adrenals, renal arteries and gonadal vessels are paired. The fourth unpaired branch of the abdominal aorta, the median sacral artery, does not directly supply the abdominal viscera."}, {"number": 9, "topic": "Abdominal aortic branches", "stem_html": "A 67 year old man is undergoing an angiogram for gastro intestinal bleeding. The radiologist advances the catheter into the coeliac axis. At what spinal level does this vessel typically arise from the aorta?", "options": [{"label_html": "T10", "is_correct": false}, {"label_html": "L3", "is_correct": false}, {"label_html": "L4", "is_correct": false}, {"label_html": "T12", "is_correct": true}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 3, "explanation_html": "The coeliac axis lies at T12, it takes an almost horizontal angle off the aorta. It has three major branches."}, {"number": 10, "topic": "Abdominal aortic branches", "stem_html": "A 67 year old man has an abdominal aortic aneurysm which displaces the left renal vein. Which branch of the aorta is most likely to be affected at this level?", "options": [{"label_html": "Inferior mesenteric artery", "is_correct": false}, {"label_html": "Superior mesenteric artery", "is_correct": true}, {"label_html": "Coeliac axis", "is_correct": false}, {"label_html": "Testicular artery", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 1, "explanation_html": "The left renal vein lies behind of the SMA as it branches off the aorta. Whilst juxtarenal AAA may sometimes require the division of the left renal vein, direct involvement of the SMA may require a hybrid surgical bypass and subsequent endovascular occlusion."}, {"number": 11, "topic": "Abdominal aortic branches", "stem_html": "Which of the following aortic branches leaves the aorta approximately 1cm below the coeliac axis?", "options": [{"label_html": "Renal artery", "is_correct": false}, {"label_html": "Inferior mesenteric artery", "is_correct": false}, {"label_html": "Superior mesenteric artery", "is_correct": true}, {"label_html": "Lumbar artery", "is_correct": false}, {"label_html": "Gonadal artery", "is_correct": false}], "correct_index": 2, "explanation_html": "The SMA leaves the aorta approximately 1cm below the coeliac axis. This is usually a level of L1. It is crossed anteriorly by the splenic vein and the body of the pancreas. It runs downwards and forwards anterior to the uncinate process."}, {"number": 12, "topic": "Abdominal aortic branches", "stem_html": "Which of the vessels listed below is the most inferiorly sited single aortic branch?", "options": [{"label_html": "Common iliac artery", "is_correct": false}, {"label_html": "Inferior mesenteric artery", "is_correct": false}, {"label_html": "Superior mesenteric artery", "is_correct": false}, {"label_html": "Gonadal artery", "is_correct": false}, {"label_html": "Median sacral artery", "is_correct": true}], "correct_index": 4, "explanation_html": "The median sacral artery leaves the aorta a little above its bifurcation. It descends in the midline anterior to L4 and L5."}, {"number": 13, "topic": "Abdominal aortic branches", "stem_html": "Which of the vessels listed below is the most inferiorly sited single aortic branch?", "options": [{"label_html": "Common iliac artery", "is_correct": false}, {"label_html": "Inferior mesenteric artery", "is_correct": false}, {"label_html": "Superior mesenteric artery", "is_correct": false}, {"label_html": "Gonadal artery", "is_correct": false}, {"label_html": "Median sacral artery", "is_correct": true}], "correct_index": 4, "explanation_html": "The median sacral artery leaves the aorta a little above its bifurcation. It descends in the midline anterior to L4 and L5."}, {"number": 14, "topic": "Abdominal aortic branches", "stem_html": "Which of the vessels listed below is the most inferiorly sited single aortic branch?", "options": [{"label_html": "Common iliac artery", "is_correct": false}, {"label_html": "Inferior mesenteric artery", "is_correct": false}, {"label_html": "Superior mesenteric artery", "is_correct": false}, {"label_html": "Gonadal artery", "is_correct": false}, {"label_html": "Median sacral artery", "is_correct": true}], "correct_index": 4, "explanation_html": "The median sacral artery leaves the aorta a little above its bifurcation. It descends in the midline anterior to L4 and L5."}, {"number": 15, "topic": "Abdominal aortic branches", "stem_html": "Which of the vessels listed below is the most inferiorly sited single aortic branch?", "options": [{"label_html": "Common iliac artery", "is_correct": false}, {"label_html": "Inferior mesenteric artery", "is_correct": false}, {"label_html": "Superior mesenteric artery", "is_correct": false}, {"label_html": "Gonadal artery", "is_correct": false}, {"label_html": "Median sacral artery", "is_correct": true}], "correct_index": 4, "explanation_html": "The median sacral artery leaves the aorta a little above its bifurcation. It descends in the midline anterior to L4 and L5."}, {"number": 16, "topic": "Abdominal aortic branches", "stem_html": "What is the most inferior anterior aortic branch?", "options": [{"label_html": "Median sacral artery", "is_correct": false}, {"label_html": "Inferior mesenteric artery", "is_correct": true}, {"label_html": "Lumbar artery", "is_correct": false}, {"label_html": "Superior mesenteric artery", "is_correct": false}, {"label_html": "Gonadal artery", "is_correct": false}], "correct_index": 1, "explanation_html": "The IMA leaves the front of the aorta usually about 3 to 4cm superior to its bifurcation. The median sacral is not an anterior branch."}], "note_html": "<div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Branches<\/b><\/th><th><b>Level<\/b><\/th><th><b>Paired<\/b><\/th><th><b>Type<\/b><\/th><\/tr><\/thead><tbody><tr><td>Inferior phrenic<\/td><td>T12 (Upper border)<\/td><td>Yes<\/td><td>Parietal<\/td><\/tr><tr><td>Coeliac<\/td><td>T12<\/td><td>No<\/td><td>Visceral<\/td><\/tr><tr><td>Superior mesenteric<\/td><td>L1<\/td><td>No<\/td><td>Visceral<\/td><\/tr><tr><td>Middle suprarenal<\/td><td>L1<\/td><td>Yes<\/td><td>Visceral<\/td><\/tr><tr><td>Renal<\/td><td>L1-L2<\/td><td>Yes<\/td><td>Visceral<\/td><\/tr><tr><td>Gonadal<\/td><td>L2<\/td><td>Yes<\/td><td>Visceral<\/td><\/tr><tr><td>Lumbar<\/td><td>L1-L4<\/td><td>Yes<\/td><td>Parietal<\/td><\/tr><tr><td>Inferior mesenteric<\/td><td>L3<\/td><td>No<\/td><td>Visceral<\/td><\/tr><tr><td>Median sacral<\/td><td>L4<\/td><td>No<\/td><td>Parietal<\/td><\/tr><tr><td>Common iliac<\/td><td>L4<\/td><td>Yes<\/td><td>Terminal<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Abdominal incisions", "questions": [{"number": 17, "topic": "Abdominal incisions", "stem_html": "A 10 year old girl has right iliac fossa pain and an appendicectomy is to be performed. What is the best incision for this procedure?", "options": [{"label_html": "Paramedian", "is_correct": false}, {"label_html": "Midline abdominal", "is_correct": false}, {"label_html": "Kochers", "is_correct": false}, {"label_html": "Lanz", "is_correct": true}, {"label_html": "Gridiron", "is_correct": false}], "correct_index": 3, "explanation_html": "Both Lanz and Gridiron incisions can be used to perform an open appendicectomy. However, a Lanz incision provides for a superior cosmetic scar and is more easily extended than a Gridiron incision."}, {"number": 18, "topic": "Abdominal incisions", "stem_html": "An 84 year old lady presents with a tender painful lump in the right groin and signs of small bowel obstruction. What is the most appropriate surgical incision to address this problem?", "options": [{"label_html": "Lotheissen", "is_correct": false}, {"label_html": "McEvedy", "is_correct": true}, {"label_html": "Midline abdominal", "is_correct": false}, {"label_html": "Paramedian", "is_correct": false}, {"label_html": "Kochers", "is_correct": false}], "correct_index": 1, "explanation_html": "A McEvedy incision is traditionally used to approach incarcerated femoral hernias. The disadvantage of the Lotheissen approach is that it weakens the inguinal canal and predisposes to inguinal hernia formation. The other incisions would not usually address femoral hernias. Given the features of bowel obstruction, a low approach would be inappropriate."}, {"number": 19, "topic": "Abdominal incisions", "stem_html": "A surgeon is due to perform a laparotomy for perforated duodenal ulcer. An upper midline incision is to be performed. Which of the following structures is the incision most likely to divide?", "options": [{"label_html": "Rectus abdominis muscle", "is_correct": false}, {"label_html": "External oblique muscle", "is_correct": false}, {"label_html": "Linea alba", "is_correct": true}, {"label_html": "Internal oblique muscle", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 2, "explanation_html": "Upper midline abdominal incisions will involve the division of the linea alba. Division of muscles will not usually improve access in this approach and they would not be routinely encountered during this incision."}], "note_html": "<div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Midline incision<\/b><\/td><td><ul><li>Commonest approach to the abdomen <\/li><li>Structures divided: linea alba, transversalis fascia, extraperitoneal fat, peritoneum (avoid falciform ligament above the umbilicus)<\/li><li>Bladder can be accessed via an extraperitoneal approach through the space of Retzius<\/li><\/ul><\/td><\/tr><tr><td><b>Paramedian incision<\/b><\/td><td><ul><li>Parallel to the midline (about 3-4cm)<\/li><li>Structures divided/retracted: anterior rectus sheath, rectus (retracted), posterior rectus sheath, transversalis fascia, extraperitoneal fat, peritoneum <\/li><li>Incision is closed in layers<\/li><\/ul><\/td><\/tr><tr><td><b>Battle<\/b><\/td><td><ul><li>Similar location to paramedian but rectus displaced medially (and thus denervated)<\/li><li>Now seldom used<\/li><\/ul><\/td><\/tr><tr><td><b>Kocher's<\/b><\/td><td>Incision under right subcostal margin e.g. Cholecystectomy (open)<\/td><\/tr><tr><td><b>Lanz<\/b><\/td><td>Incision in right iliac fossa e.g. Appendicectomy<\/td><\/tr><tr><td><b>Gridiron<\/b><\/td><td>Oblique incision centered over McBurneys point- usually appendicectomy (less cosmetically acceptable than Lanz<\/td><\/tr><tr><td><b>Gable<\/b><\/td><td>Rooftop incision<\/td><\/tr><tr><td><b>Pfannenstiel's<\/b><\/td><td>Transverse supra pubic, primarily used to access pelvic organs<\/td><\/tr><tr><td><b>McEvedy's<\/b><\/td><td>Groin incision e.g. Emergency repair strangulated femoral hernia<\/td><\/tr><tr><td><b>Rutherford Morrison<\/b><\/td><td>Extraperitoneal approach to left or right lower quadrants. Gives excellent access to iliac vessels and is the approach of choice for first time renal transplantation.<\/td><\/tr><\/tbody><\/table><\/div><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb113b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb113.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"https://en.wikipedia.org/wiki/Main_Page\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb113b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}, {"name": "Abdominal wall", "questions": [{"number": 20, "topic": "Abdominal wall", "stem_html": "A 23 year old man is undergoing a hernia repair and the mesh is to be sutured to the inguinal ligament. From which of the following does the inguinal ligament arise?", "options": [{"label_html": "Transversus abdominis fascia", "is_correct": false}, {"label_html": "Internal oblique", "is_correct": false}, {"label_html": "Rectus sheath", "is_correct": false}, {"label_html": "Rectus abdominis muscle", "is_correct": false}, {"label_html": "External oblique aponeurosis", "is_correct": true}], "correct_index": 4, "explanation_html": "The inguinal ligament is formed by the external oblique aponeurosis. It runs from the pubic tubercle to the anterior superior iliac spine."}, {"number": 21, "topic": "Abdominal wall", "stem_html": "Which of these structures are not contained within the rectus sheath?", "options": [{"label_html": "Pyramidalis", "is_correct": false}, {"label_html": "Superior epigastric artery", "is_correct": false}, {"label_html": "Inferior epigastric vein", "is_correct": false}, {"label_html": "Internal iliac artery", "is_correct": true}, {"label_html": "Rectus abdominis", "is_correct": false}], "correct_index": 3, "explanation_html": "The rectus sheath also contains:<br>superior epigastric vein<br>inferior epigastric artery"}, {"number": 22, "topic": "Abdominal wall", "stem_html": "Which of the following statements relating to quadratus lumborum is false?", "options": [{"label_html": "Causes flexion of the thoracic spine", "is_correct": true}, {"label_html": "Causes the rib cage to be pulled down", "is_correct": false}, {"label_html": "Innervated by anterior primary rami of T12 and L1-3", "is_correct": false}, {"label_html": "Attached to the iliac crest", "is_correct": false}, {"label_html": "Inserts into the 12th rib", "is_correct": false}], "correct_index": 0, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\"><b>Quadratus lumborum<\/b><br><b>Origin<\/b>: Medial aspect of iliac crest and iliolumbar ligament<br><b>Insertion<\/b>: 12th rib<br><b>Action<\/b>: Pulls the rib cage inferiorly. Lateral flexion.<br><b>Nerve supply<\/b>: Anterior primary rami of T12 and L1-3<\/div>The rectus abdominis causes flexion of the thoracic spine and therefore the statement suggesting that quadratus lumborum does so is incorrect."}, {"number": 23, "topic": "Abdominal wall", "stem_html": "The following statements regarding the rectus abdominis muscle are true except:", "options": [{"label_html": "It runs from the symphysis pubis to the xiphoid process", "is_correct": false}, {"label_html": "Its nerve supply is from the ventral rami of the lower 6 thoracic nerves", "is_correct": false}, {"label_html": "It has collateral supply from both superior and inferior epigastric vessels", "is_correct": false}, {"label_html": "It lies in a muscular aponeurosis throughout its length", "is_correct": true}, {"label_html": "It has a number of tendinous intersections that penetrate through the anterior layer of the muscle", "is_correct": false}], "correct_index": 3, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\"><b>Rectus abdominis<\/b><br><ul><li>Arises from the pubis.<\/li><li>Inserts into 5th, 6th, 7th costal cartilages.<\/li><li>The muscle lies in the rectal sheath, which also contains the superior  and inferior epigastric artery and vein.<\/li><li>Action: flexion of thoracic and lumbar spine.<\/li><li>Nerve supply: anterior primary rami of T7-12.<\/li><\/ul><\/div>The aponeurosis is deficient below the arcuate line."}, {"number": 24, "topic": "Abdominal wall", "stem_html": "The following statements regarding the rectus abdominis muscle are true except:", "options": [{"label_html": "It runs from the symphysis pubis to the xiphoid process", "is_correct": false}, {"label_html": "Its nerve supply is from the ventral rami of the lower 6 thoracic nerves", "is_correct": false}, {"label_html": "It has collateral supply from both superior and inferior epigastric vessels", "is_correct": false}, {"label_html": "It lies in a muscular aponeurosis throughout its length", "is_correct": true}, {"label_html": "It has a number of tendinous intersections that penetrate through the anterior layer of the muscle", "is_correct": false}], "correct_index": 3, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\"><b>Rectus abdominis<\/b><br><ul><li>Arises from the pubis.<\/li><li>Inserts into 5th, 6th, 7th costal cartilages.<\/li><li>The muscle lies in the rectal sheath, which also contains the superior  and inferior epigastric artery and vein.<\/li><li>Action: flexion of thoracic and lumbar spine.<\/li><li>Nerve supply: anterior primary rami of T7-12.<\/li><\/ul><\/div>The aponeurosis is deficient below the arcuate line."}, {"number": 25, "topic": "Abdominal wall", "stem_html": "The transversalis fascia contributes to which of the following?", "options": [{"label_html": "Pectineal ligament", "is_correct": false}, {"label_html": "Deep inguinal ring", "is_correct": true}, {"label_html": "Cremaster muscle and fascia", "is_correct": false}, {"label_html": "Inguinal ligament", "is_correct": false}, {"label_html": "External spermatic fascia", "is_correct": false}], "correct_index": 1, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">The internal spermatic fascia (derived from transversalis fascia) invests:<br>Ductus deferens<br>Testicular vessels<\/div>The principal outpouching of the transversalis fascia is the internal spermatic fascia. The mouth of the outpouching is the deep inguinal ring."}], "note_html": "The 2 main muscles of the abdominal wall are the <b>rectus abdominis<\/b> (anterior) and the <b>quadratus lumborum<\/b> (posterior).<br>The remaining abdominal wall consists of 3 muscular layers. Each muscle passes from the lateral aspect of the quadratus lumborum posteriorly to the lateral margin of the rectus sheath anteriorly. Each layer is muscular posterolaterally and aponeurotic anteriorly.<br><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb012b.jpg\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb012.jpg\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Abdominal wall\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb012b.jpg\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center><b>Muscles of abdominal wall<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>External oblique<\/b><\/td><td><ul><li>Lies most superficially<\/li><li>Originates from 5th to 12th ribs<\/li><li>Inserts into the anterior half of the outer aspect of the iliac crest, linea alba and pubic tubercle<\/li><li>More medially and superiorly to the arcuate line, the aponeurotic layer overlaps the rectus abdominis muscle<\/li><li>The lower border forms the inguinal ligament<\/li><li>The triangular expansion of the medial end of the inguinal ligament is the lacunar ligament.<\/li><\/ul><\/td><\/tr><tr><td><b>Internal oblique<\/b><\/td><td><ul><li>Arises from the thoracolumbar fascia, the anterior 2/3 of the iliac crest and the lateral 2/3 of the inguinal ligament<\/li><li>The muscle sweeps upwards to insert into the cartilages of the lower 3 ribs<\/li><li>The lower fibres form an aponeurosis that runs from the tenth costal cartilage to the body of the pubis<\/li><li>At its lowermost aspect it joins the fibres of the aponeurosis of transversus abdominis to form the conjoint tendon.<\/li><\/ul><\/td><\/tr><tr><td><b>Transversus abdominis<\/b><\/td><td><ul><li>Innermost muscle<\/li><li>Arises from the inner aspect of the costal cartilages of the lower 6 ribs , from the anterior 2/3 of the iliac crest and lateral 1/3 of the inguinal ligament<\/li><li>Its fibres run horizontally around the abdominal wall ending in an aponeurosis. The upper part runs posterior to the rectus abdominis. Lower down the fibres run anteriorly only. <\/li><li>The rectus abdominis lies medially; running from the pubic crest and symphysis to insert into the xiphoid process and 5th, 6th and 7th costal cartilages. The muscles lies in a aponeurosis as described above.<\/li><li>Nerve supply: anterior primary rami of T7-12<\/li><\/ul><\/td><\/tr><\/tbody><\/table><\/div><br><b>Surgical notes<\/b><br>During abdominal surgery it is usually necessary to divide either the muscles or their aponeuroses. During a midline laparotomy it is desirable to divide the aponeurosis. This will leave the rectus sheath intact above the arcuate line and the muscles intact below it. Straying off the midline will often lead to damage to the rectus muscles, particularly below the arcuate line where they may often be in close proximity to each other."}, {"name": "Abductor pollicis brevis", "questions": [{"number": 26, "topic": "Abductor pollicis brevis", "stem_html": "A patient sustains damage to the median nerve during a carpal tunnel release. Which of the following muscles will be affected?", "options": [{"label_html": "Abductor digiti minimi", "is_correct": false}, {"label_html": "Abductor pollicis brevis", "is_correct": true}, {"label_html": "Adductor pollicis", "is_correct": false}, {"label_html": "Palmaris brevis", "is_correct": false}, {"label_html": "Flexor digiti minimi brevis", "is_correct": false}], "correct_index": 1, "explanation_html": "Of the muscles listed, only the abductor pollicis brevis is innervated by the median. In questions like this one, ensure you don't become confused between <b>adductor<\/b> and <b>abductor<\/b>."}], "note_html": "<div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td>Origin<\/td><td>Fleshy fibres from the flexor retinaculum, scaphoid and trapezium<\/td><\/tr><tr><td>Insertion<\/td><td>Via a short tendon into the radial side of the proximal phalanx of the thumb<\/td><\/tr><tr><td>Nerve<\/td><td>Recurrent branch of median nerve in the palm<\/td><\/tr><tr><td>Actions<\/td><td>Abducts the thumb at the carpometacarpal and metacarpophalangeal joints, causing it to travel anteriorly at right angles to the plane of the palm and to rotate medially (e.g. typing). When the thumb is fully abducted there is angulation of around 30 degrees between the proximal phalanx and the metacarpal. Because of the direction of the muscle, abduction involves medial rotation of the metacarpal, and the abductor is used along with opponens pollicis in the initial stages of thumb opposition<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Accessory nerve", "questions": [{"number": 27, "topic": "Accessory nerve", "stem_html": "A 64 year old man has a suspected lymphoma and lymph node biopsy from the posterolateral aspect of the right neck is planned. Which of the nerves listed is at greatest risk?", "options": [{"label_html": "Accessory", "is_correct": true}, {"label_html": "Long thoracic", "is_correct": false}, {"label_html": "External laryngeal", "is_correct": false}, {"label_html": "Facial", "is_correct": false}, {"label_html": "Vagus", "is_correct": false}], "correct_index": 0, "explanation_html": "The accessory nerve has a superficial course and is easily injured. It lies under platysma and may be divided during the early part of the procedure."}], "note_html": "The cranial root of the accessory nerve arises from the caudal two thirds of the nucleus ambiguus and the caudal four fifths of the dorsal nucleus of the vagus. The cranial root emerges as four rootlets from the dorsolateral surface of the medulla oblongata below those of the vagus. It then traverses the jugular foramen. On exiting the jugular foramen it separates from its spinal part. Whereupon its cranial fibres joint those of the vagus to innervate some of the palatal muscles. The fibres arising from the spinal root exit near the junction between the spinal cord and the medulla. The fibres pass rostrally to unite with the cranial roots to exit through the jugular foramen. As outlined above these separate on exiting the foramen. The spinal part then crosses the transverse process of the atlas, and is crossed by the occipital artery as it does so. <br><br>It descends obliquely, medial to the styloid process, stylohyoid and the posterior belly of digastric. It then reaches the upper part of sternocleidomastoid to enter its upper surface. It typically exits this muscle a little above the midpoint of the posterior aspect of it. This point is usually 4-6cm below the tip of the mastoid process. It crosses the posterior triangle on the levator scapulae  separated from it by the pre vertebral layer of deep cervical fascia. At this point, the nerve is superficial and related to the superficial cervical lymph nodes. Approximately 3-5 cm above the clavicle it passes behind the anterior border of trapezius which it innervates."}, {"name": "Adductor canal", "questions": [{"number": 28, "topic": "Adductor canal", "stem_html": "A 21 year old post man notices leg pain after 5 minutes walking during his round.  It improves 3 minutes after stopping.  Clinically, he is noted to have reduced hair of the lower limb and his calf muscles appear atrophied.  There is a weak popliteal pulse, but it is still present when the knee is fully extended. What is the most likely diagnosis?", "options": [{"label_html": "Occlusive arterial disease caused by atherosclerosis", "is_correct": false}, {"label_html": "Popliteal fossa entrapment", "is_correct": false}, {"label_html": "Cerebral vascular accident", "is_correct": false}, {"label_html": "Diabetes mellitus", "is_correct": false}, {"label_html": "Adductor canal compression syndrome", "is_correct": true}], "correct_index": 4, "explanation_html": "Adductor canal compression syndrome most commonly presents in young males and is an important differential diagnosis in men presenting with symptoms of acute limb ischaemia on exertion.  It is caused by compression of the femoral artery by the musculotendinous band from adductor magnus muscle. <br>The treatment consists of the division of the abnormal band and restoration of the arterial circulation. Popliteal fossa entrapment is the main differential diagnosis, however the pulse disappears when the knee is fully extended."}, {"number": 29, "topic": "Adductor canal", "stem_html": "Which of the following is a content of the adductor canal?", "options": [{"label_html": "Saphenous nerve", "is_correct": true}, {"label_html": "Sural nerve", "is_correct": false}, {"label_html": "Femoral nerve", "is_correct": false}, {"label_html": "Profunda branch of the femoral artery", "is_correct": false}, {"label_html": "Saphenous vein", "is_correct": false}], "correct_index": 0, "explanation_html": "It contains the saphenous nerve, femoral vein and the superficial branch of the femoral artery."}, {"number": 30, "topic": "Adductor canal", "stem_html": "The foramen marking the termination of the adductor canal is located in which of the following?", "options": [{"label_html": "Adductor longus", "is_correct": false}, {"label_html": "Adductor magnus", "is_correct": true}, {"label_html": "Adductor brevis", "is_correct": false}, {"label_html": "Sartorius", "is_correct": false}, {"label_html": "Semimembranosus", "is_correct": false}], "correct_index": 1, "explanation_html": "The foramen marking the distal limit of the adductor canal is contained within adductor magnus. The vessel passes through this region to enter the popliteal fossa."}], "note_html": "<ul><li>Also called Hunter's or subsartorial canal<\/li><li>Immediately distal to the apex of the femoral triangle, lying in the middle third of the thigh.  Canal terminates at the adductor hiatus.<\/li><\/ul><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Borders<\/b><\/th><th><b>Contents<\/b><\/th><\/tr><\/thead><tbody><tr><td><i>Laterally<\/i>  Vastus medialis muscle<\/td><td>Saphenous nerve<\/td><\/tr><tr><td><i>Posteriorly<\/i>  Adductor longus, adductor magnus<\/td><td>Superficial femoral artery<\/td><\/tr><tr><td><i>Roof<\/i> Sartorius<\/td><td>Superficial femoral vein<\/td><\/tr><\/tbody><\/table><\/div><br><i>In the image below the sartorius muscle is removed to expose the canal contents<\/i><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb031b.jpg\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb031.jpg\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Adductor canal\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb031b.jpg\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}, {"name": "Adductor longus", "questions": [{"number": 31, "topic": "Adductor longus", "stem_html": "A 23 year old man is stabbed in the groin, several structures are injured and the adductor longus muscle has been lacerated. Which of the following nerves is responsible for the innervation of adductor longus?", "options": [{"label_html": "Femoral nerve", "is_correct": false}, {"label_html": "Obturator nerve", "is_correct": true}, {"label_html": "Sciatic nerve", "is_correct": false}, {"label_html": "Common peroneal nerve", "is_correct": false}, {"label_html": "Ilioinguinal nerve", "is_correct": false}], "correct_index": 1, "explanation_html": "The adductors are innervated by the obturator nerve"}, {"number": 32, "topic": "Adductor longus", "stem_html": "Which of the following structures are not closely related to the adductor longus muscle?", "options": [{"label_html": "Long saphenous vein", "is_correct": false}, {"label_html": "Tendon of iliacus", "is_correct": true}, {"label_html": "The profunda branch of the femoral artery", "is_correct": false}, {"label_html": "Pectineus muscle", "is_correct": false}, {"label_html": "Femoral nerve", "is_correct": false}], "correct_index": 1, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Femoral triangle:<br>Adductor longus medially<br>Inguinal ligament superiorly<br>Sartorius muscle laterally<\/div>Adductor longus forms the medial border of the femoral triangle. It is closely related to the long saphenous vein which overlies it and the profunda branch of the femoral artery. The femoral nerve is related to it inferiorly. However, the tendon of iliacus inserts proximally and is not in contact with adductor longus."}], "note_html": "<div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Origin<\/b><\/td><td>Anterior body of pubis<\/td><\/tr><tr><td><b>Insertion<\/b><\/td><td>Middle third of linea aspera<\/td><\/tr><tr><td><b>Action<\/b><\/td><td>Adducts and flexes the thigh, medially rotate the hip<\/td><\/tr><tr><td><b>Innervation<\/b><\/td><td>Anterior division of obturator nerve (L2, L3, L4)<\/td><\/tr><\/tbody><\/table><\/div><br><i>The schematic image below demonstrates the relationship of the adductor muscles<\/i><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb016b.jpg\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb016.jpg\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Adductor longus muscle\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb016b.jpg\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}, {"name": "Adductor pollicis", "questions": [{"number": 33, "topic": "Adductor pollicis", "stem_html": "A 33 year old man sustains an injury to his forearm and wrist. When examined in clinic he is unable to adduct his thumb. What is the most likely underlying nerve lesion?", "options": [{"label_html": "Radial nerve", "is_correct": false}, {"label_html": "Superficial branch of the ulnar nerve", "is_correct": false}, {"label_html": "Median nerve", "is_correct": false}, {"label_html": "Posterior interosseous nerve", "is_correct": false}, {"label_html": "Deep branch of the ulnar nerve", "is_correct": true}], "correct_index": 4, "explanation_html": "Damage to the deep branch of the ulnar nerve may result in an inability to adduct the thumb. This is tested clinically by trying to withdraw a piece of paper from a patients hand grasped between thumb and index finger."}], "note_html": "<div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Origin<\/b><\/th><th><b>Insertion<\/b><\/th><th><b>Nerve supply<\/b><\/th><th><b>Actions<\/b><\/th><\/tr><\/thead><tbody><tr><td>Tendon sheath of flexor carpi radialis<br>Bases of second, third and fourth metacarpals<br>Anterior aspect of the trapezoid and capitate bones<br>Transverse head comes from the longitudinal ride of the third metacarpal<\/td><td>Fibres of the two heads converge on insertion into the ulnar aspect of the base of the proximal phalanx of the thumb<\/td><td>Deep branch of the ulnar (C8, T1)<\/td><td>Adducts the thumb into the plane of the palm and draws it to the midline<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Adrenal gland anatomy", "questions": [{"number": 34, "topic": "Adrenal gland anatomy", "stem_html": "A 43 year old man is diagnosed as having a malignancy of the right adrenal gland. The decision is made to resect this via an open anterior approach. Which of the following will be most useful during the surgery?", "options": [{"label_html": "Division of the coronary ligaments of the liver", "is_correct": false}, {"label_html": "Mobilisation of the colonic hepatic flexure", "is_correct": true}, {"label_html": "Division of the right renal vein", "is_correct": false}, {"label_html": "Division of the ligament of Trietz", "is_correct": false}, {"label_html": "Division of the right colic artery", "is_correct": false}], "correct_index": 1, "explanation_html": "Mobilisation of the hepatic flexure and right colon are standard steps in open adrenal surgery from an anterior approach. Mobilisation of the liver is seldom required."}, {"number": 35, "topic": "Adrenal gland anatomy", "stem_html": "A 43 year old man is diagnosed as having a malignancy of the right adrenal gland. The decision is made to resect this via an open anterior approach. Which of the following will be most useful during the surgery?", "options": [{"label_html": "Division of the coronary ligaments of the liver", "is_correct": false}, {"label_html": "Mobilisation of the colonic hepatic flexure", "is_correct": true}, {"label_html": "Division of the right renal vein", "is_correct": false}, {"label_html": "Division of the ligament of Trietz", "is_correct": false}, {"label_html": "Division of the right colic artery", "is_correct": false}], "correct_index": 1, "explanation_html": "Mobilisation of the hepatic flexure and right colon are standard steps in open adrenal surgery from an anterior approach. Mobilisation of the liver is seldom required."}, {"number": 36, "topic": "Adrenal gland anatomy", "stem_html": "A 48 year old man with newly diagnosed hypertension is found to have a phaeochromocytoma of the left adrenal gland and is due to undergo a laparoscopic left adrenalectomy. Which of the following structures is not directly related to the left adrenal gland?", "options": [{"label_html": "Crus of the diaphragm", "is_correct": false}, {"label_html": "Lesser curvature of the stomach", "is_correct": true}, {"label_html": "Kidney", "is_correct": false}, {"label_html": "Pancreas", "is_correct": false}, {"label_html": "Splenic artery", "is_correct": false}], "correct_index": 1, "explanation_html": "The left adrenal gland is slightly larger than the right. It is crescent in shape and its concavity is adapted to the medial border of the upper part of the left kidney.  The upper area is covered by peritoneum of the omental bursa which separates it from the cardia of the stomach. The lower area is in contact with the pancreas and splenic artery and is not covered by peritoneum. On the anterior surface is a hilum from which the suprarenal vein emerges. The lateral aspect rests on the kidney. The medial is small and is on the left crus of the diaphragm."}, {"number": 37, "topic": "Adrenal gland anatomy", "stem_html": "A 56 year old lady is undergoing an adrenalectomy for Conns syndrome. During the operation the surgeon damages the middle adrenal artery and haemorrhage ensues. From which of the following structures does this vessel originate?", "options": [{"label_html": "Aorta", "is_correct": true}, {"label_html": "Renal artery", "is_correct": false}, {"label_html": "Splenic artery", "is_correct": false}, {"label_html": "Coeliac axis", "is_correct": false}, {"label_html": "Superior mesenteric artery", "is_correct": false}], "correct_index": 0, "explanation_html": "The middle adrenal artery is usually a branch of the aorta, the lower adrenal artery typically arises from the renal vessels."}, {"number": 38, "topic": "Adrenal gland anatomy", "stem_html": "You are assisting in an open right adrenalectomy for a large adrenal adenoma. The consultant is distracted and you helpfully pull the adrenal into the wound to improve the view. Unfortunately this is followed by brisk bleeding. The vessel responsible for this is most likely to be:", "options": [{"label_html": "Portal vein", "is_correct": false}, {"label_html": "Phrenic vein", "is_correct": false}, {"label_html": "Right renal vein", "is_correct": false}, {"label_html": "Superior mesenteric vein", "is_correct": false}, {"label_html": "Inferior vena cava", "is_correct": true}], "correct_index": 4, "explanation_html": "It drains directly via a very short vessel. If the sutures are not carefully tied then it may be avulsed off the IVC. An injury best managed using a Satinsky clamp and a 6/0 prolene suture."}, {"number": 39, "topic": "Adrenal gland anatomy", "stem_html": "A 48 year old lady is undergoing a left sided adrenalectomy for an adrenal adenoma. The superior adrenal artery is injured and starts to bleed, from which of the following does this vessel arise?", "options": [{"label_html": "Left renal artery", "is_correct": false}, {"label_html": "Inferior phrenic artery", "is_correct": true}, {"label_html": "Aorta", "is_correct": false}, {"label_html": "Splenic", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 1, "explanation_html": "The superior adrenal artery is a branch of the inferior phrenic artery."}], "note_html": "<b>Anatomy<\/b><br><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Location<\/b><\/td><td>Superomedially to the upper pole of each kidney<\/td><\/tr><tr><td><b>Relationships of the right adrenal<\/b><\/td><td>Diaphragm-<i>Posteriorly<\/i>, Kidney-<i>Inferiorly<\/i>, Vena Cava-<i>Medially<\/i>, Hepato-renal pouch and bare area of the liver-<i>Anteriorly<\/i><\/td><\/tr><tr><td><b>Relationships of the left adrenal<\/b><\/td><td>Crus of the diaphragm-<i>Postero- medially<\/i>, Pancreas and splenic vessels-<i>Inferiorly<\/i>, Lesser sac and stomach-<i>Anteriorly<\/i><\/td><\/tr><tr><td><b>Arterial supply<\/b><\/td><td>Superior adrenal arteries- from inferior phrenic artery, Middle adrenal arteries - from aorta, Inferior adrenal arteries -from renal arteries<\/td><\/tr><tr><td><b>Venous drainage of the right adrenal<\/b><\/td><td>Via one central vein directly into the IVC<\/td><\/tr><tr><td><b>Venous drainage of the left adrenal<\/b><\/td><td>Via one central vein into the left renal vein<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Adrenal gland embryology", "questions": [{"number": 40, "topic": "Adrenal gland embryology", "stem_html": "In a patient with an ectopic kidney where is the adrenal gland most likely to be located?", "options": [{"label_html": "In the pelvis", "is_correct": false}, {"label_html": "On the contralateral side", "is_correct": false}, {"label_html": "In its usual position", "is_correct": true}, {"label_html": "Superior to the spleen", "is_correct": false}, {"label_html": "It will be absent", "is_correct": false}], "correct_index": 2, "explanation_html": "Because the kidney is present, rather than absent, the adrenal will usually develop and in the normal location."}, {"number": 41, "topic": "Adrenal gland embryology", "stem_html": "A term neonate is undergoing an open inguinal herniotomy. During the operation, the operating surgeon identifies a small round yellow nodule within the inguinal canal. What is this most likely to represent?", "options": [{"label_html": "Ectopic lymphatic tissue", "is_correct": false}, {"label_html": "Adrenal rest", "is_correct": true}, {"label_html": "Encysted hydrocele of the cord", "is_correct": false}, {"label_html": "Yolk sac tumour", "is_correct": false}, {"label_html": "Hamartoma", "is_correct": false}], "correct_index": 1, "explanation_html": "Adrenal rests are a very common finding in term neonates (50%) and most regress so that by adulthood the population incidence is 1%. The adrenal glands and gonads both develop from the urogenital ridge. In early embryogenesis, the adrenal cortical tissue can migrate with the descending gonads."}], "note_html": "First detected at 6 weeks' gestation, the adrenal cortex is derived from the mesoderm of the posterior abdominal wall. Steroid secretion from the fetal cortex begins shortly thereafter. Adult-type zona glomerulosa and fasciculata are detected in fetal life but make up only a small proportion of the gland, and the zona reticularis is not present at all. The fetal cortex predominates throughout fetal life. The adrenal medulla is of ectodermal origin, arising from neural crest cells that migrate to the medial aspect of the developing cortex.<br><br>The fetal adrenal gland is relatively large. At 4 months' gestation, it is 4 times the size of the kidney; however, at birth, it is a third of the size of the kidney. This occurs because of the rapid regression of the fetal cortex at birth. It disappears almost completely by age 1 year; by age 4-5 years, the permanent adult-type adrenal cortex has fully developed.<br><br>Anatomic anomalies of the adrenal gland may occur. Because the development of the adrenals is closely associated with that of the kidneys, agenesis of an adrenal gland is usually associated with ipsilateral agenesis of the kidney, and fused adrenal glands (whereby the 2 glands join across the midline posterior to the aorta) are also associated with a fused kidney.<br><br>Adrenal hypoplasia occurs in the following 2 forms: (1) hypoplasia or absence of the fetal cortex with a poorly formed medulla and (2) disorganized fetal cortex and medulla with no permanent cortex present. Adrenal heterotopia describes a normal adrenal gland in an abnormal location, such as within the renal or hepatic capsules. Accessory adrenal tissue (adrenal rests), which is usually comprised only of cortex but seen combined with medulla in some cases, is most commonly located in the broad ligament or spermatic cord but can be found anywhere within the abdomen. Even intracranial adrenal rests have been reported."}, {"name": "Anal sphincter", "questions": [{"number": 42, "topic": "Anal sphincter", "stem_html": "A 73 year old lady presents with symptoms of faecal incontinence. On examination she has weak anal sphincter muscles. What are the main nerve root values of the nerves supplying the external anal sphincter?", "options": [{"label_html": "S2,3", "is_correct": false}, {"label_html": "L5, S1", "is_correct": false}, {"label_html": "S4,5", "is_correct": false}, {"label_html": "S5", "is_correct": false}, {"label_html": "S2,3,4", "is_correct": true}], "correct_index": 4, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">S2, 3, 4 Keeps the poo off the floor<\/div>The external anal sphincter is innervated by the inferior rectal branch of the pudendal nerve, this has root values of S2, 3 and the perineal branch of S4."}], "note_html": "<ul><li>Internal anal sphincter composed of smooth muscle continuous with the circular muscle of the rectum. It surrounds the upper two- thirds of the anal canal and is supplied by sympathetic nerves.<\/li><li>External anal sphincter is composed of striated muscle which surrounds the internal sphincter but extends more distally.<\/li><li>The nerve supply of the external anal sphincter is from the inferior rectal branch of the pudendal nerve (S2 and S3) and the perineal branch of the S4 nerve roots.<\/li><\/ul><br><i>Image showing relationship of internal and external anal sphincters<\/i><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb108b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb108.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Anal canal\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb108b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}, {"name": "Anatomical snuffbox", "questions": [{"number": 43, "topic": "Anatomical snuffbox", "stem_html": "Which of the following forms the floor of the anatomical snuffbox?", "options": [{"label_html": "Radial artery", "is_correct": false}, {"label_html": "Cephalic vein", "is_correct": false}, {"label_html": "Extensor pollicis brevis", "is_correct": false}, {"label_html": "Scaphoid bone", "is_correct": true}, {"label_html": "Cutaneous branch of the radial nerve", "is_correct": false}], "correct_index": 3, "explanation_html": "The scaphoid bone forms the floor of the anatomical snuffbox. The cutaneous branch of the radial nerve is much more superficially and proximally located."}, {"number": 44, "topic": "Anatomical snuffbox", "stem_html": "A 23 year old man falls and injures his hand. There are concerns that he may have a scaphoid fracture as there is tenderness in his anatomical snuffbox on clinical examination. Which of the following forms the medial border of this structure?", "options": [{"label_html": "Basilic vein", "is_correct": false}, {"label_html": "Radial artery", "is_correct": false}, {"label_html": "Extensor pollicis brevis", "is_correct": false}, {"label_html": "Abductor pollicis longus", "is_correct": false}, {"label_html": "Extensor pollicis longus", "is_correct": true}], "correct_index": 4, "explanation_html": "It's boundaries are extensor pollicis longus medially and laterally by the tendons of abductor pollicis longus and extensor pollicis brevis."}], "note_html": "<div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td>Posterior border<\/td><td>Tendon of extensor pollicis longus<\/td><\/tr><tr><td>Anterior border<\/td><td>Tendons of extensor pollicis brevis and abductor pollicis longus<\/td><\/tr><tr><td>Proximal border<\/td><td>Styloid process of the radius<\/td><\/tr><tr><td>Distal border<\/td><td>Apex of snuffbox triangle<\/td><\/tr><tr><td>Floor<\/td><td>Trapezium and scaphoid<\/td><\/tr><tr><td>Content<\/td><td>Radial artery<\/td><\/tr><\/tbody><\/table><\/div><br><i>Image showing the anatomical snuffbox<\/i><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb32.b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb32.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Anatomical snuff box\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb32.b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}, {"name": "Anatomy of the forearm and hand", "questions": [{"number": 45, "topic": "Anatomy of the forearm and hand", "stem_html": "How many phalanges are there in the hand?", "options": [{"label_html": "14", "is_correct": true}, {"label_html": "12", "is_correct": false}, {"label_html": "13", "is_correct": false}, {"label_html": "10", "is_correct": false}, {"label_html": "8", "is_correct": false}], "correct_index": 0, "explanation_html": "Each digit has 3 phalanges, the thumb has two the total is therefore 14."}, {"number": 46, "topic": "Anatomy of the forearm and hand", "stem_html": "How many phalanges are there in the hand?", "options": [{"label_html": "14", "is_correct": true}, {"label_html": "12", "is_correct": false}, {"label_html": "13", "is_correct": false}, {"label_html": "10", "is_correct": false}, {"label_html": "8", "is_correct": false}], "correct_index": 0, "explanation_html": "Each digit has 3 phalanges, the thumb has two the total is therefore 14."}, {"number": 47, "topic": "Anatomy of the forearm and hand", "stem_html": "A 20 year old man presents to the Emergency Department with a stab injury to the thenar eminence. On examination, he is found to have a 2 cm long laceration with loss of sensation in the thumb and index finger and weakness of the thenar muscles. Which of the following structures is most likely to have been injured?", "options": [{"label_html": "Anterior interosseous nerve", "is_correct": false}, {"label_html": "Recurrent branch of the median nerve", "is_correct": false}, {"label_html": "Sensory and motor branches of the median nerve", "is_correct": true}, {"label_html": "Sensory and motor branches of the radial nerve", "is_correct": false}, {"label_html": "Sensory and motor branches of the ulnar nerve", "is_correct": false}], "correct_index": 2, "explanation_html": "The question describes both a motor and sensory deficit. This means that injury cannot be isolated to the recurrent branch of the median nerve in isolation as this only provides motor function. Sensation via the palmar cutaneous branches must also be compromised and it is for this reason the correct answer is injury to motor and sensory branches of the median nerve."}], "note_html": "<b>Forearm muscles<\/b><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Muscle<\/b><\/th><th><b>Origin<\/b><\/th><th><b>Insertion<\/b><\/th><th><b>Nerve supply<\/b><\/th><th><b>Action<\/b><\/th><\/tr><\/thead><tbody><tr><td>Flexor carpi radialis<\/td><td>Common flexor origin and surrounding fascia<\/td><td>Front of bases of second and third metacarpals<\/td><td>Median<\/td><td>Flexes and abducts the carpus, part flexes the elbow and part pronates forearm<\/td><\/tr><tr><td>Palmaris longus<\/td><td>Common flexor origin<\/td><td>Apex of palmar aponeurosis<\/td><td>Median<\/td><td>Wrist flexor<\/td><\/tr><tr><td>Flexor carpi ulnaris<\/td><td>Small humeral head arises from the common flexor origin and adjacent fascia. Ulnar head comes from medial border of olecranon and posterior border of ulna<\/td><td>Pisiform and base of the fifth metacarpal<\/td><td>Ulnar nerve<\/td><td>Flexes and adducts the carpus<\/td><\/tr><tr><td>Flexor digitorum superficialis<\/td><td>Long linear origin from common flexor tendon, adjacent fascia and septa and medial border of the coronoid process<\/td><td>Via tendons in the fibrous flexor sheath. At the level of the metacarpophalangeal joint each tendon split into two, these bands pass distally to their insertions<\/td><td>Median<\/td><td>Flexor of metacarpophalangeal joint and proximal interphalangeal joint<\/td><\/tr><tr><td>Flexor digitorum profundus<\/td><td>Upper two thirds of the medial and anterior surface of the ulna, medial side of the olecranon, medial half of the interosseous membrane<\/td><td>Via tendons that lie deep to those of flexor digitorum superficialis to insert into the distal phalanx<\/td><td>Medial part= ulnar, lateral part=anterior interosseous nerve<\/td><td>Flexes the distal interphalangeal joints and the wrist<\/td><\/tr><\/tbody><\/table><\/div><br><b>Anatomy of the hand<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Bones<\/b><\/td><td><ul><li>8 Carpal bones <\/li><li>5 Metacarpals<\/li><li>14 phalanges<\/li><\/ul><\/td><\/tr><tr><td><b>Intrinsic Muscles<\/b><\/td><td>8 Interossei - Supplied by ulnar nerve<br><ul><li>4 palmar-<i>adduct fingers<\/i><\/li><li>4 dorsal- <i>abduct fingers<\/i><\/li><\/ul><\/td><\/tr><tr><td><b>Intrinsic muscles<\/b><\/td><td>Lumbricals<br><ul><li>Flex MCPJ and extend the IPJ.<\/li><li>Origin deep flexor tendon and insertion dorsal extensor hood mechanism.<\/li><li>Innervation: 1st and 2nd- median nerve, 3rd and 4th- deep branch of the ulnar nerve.<\/li><\/ul><\/td><\/tr><tr><td><b>Thenar eminence<\/b><\/td><td><ul><li>Abductor pollicis brevis <\/li><li>Opponens pollicis<\/li><li>Flexor pollicis brevis<\/li><\/ul><\/td><\/tr><tr><td><b>Hypothenar eminence<\/b><\/td><td><ul><li>Opponens digiti minimi<\/li><li>Flexor digiti minimi brevis<\/li><li>Abductor digiti minimi<\/li><\/ul><\/td><\/tr><\/tbody><\/table><\/div><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb097b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb097.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Hand\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb097b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center><br><b>Fascia and compartments of the palm<\/b><br>The fascia of the palm is continuous with the antebrachial fascia and the fascia of the dorsum of the hand. The palmar fascia is thin over the thenar and hypothenar eminences. In contrast the palmar fascia is relatively thick. The palmar aponeurosis covers the soft tissues and overlies the flexor tendons. The apex of the palmar aponeurosis is continuous with the flexor retinaculum and the palmaris longus tendon. Distally, it forms four longitudinal digital bands that attach to the bases of the proximal phalanges, blending with the fibrous digital sheaths. <br>A medial fibrous septum extends deeply from the medial border of the palmar aponeurosis to the 5th metacarpal. Lying medial to this are the hypothenar muscles. In a similar fashion, a lateral fibrous septum extends deeply from the lateral border of the palmar aponeurosis to the 3rd metacarpal. The thenar compartment lies lateral to this area. <br>Lying between the thenar and hypothenar compartments is the central compartment. It contains the flexor tendons and their sheaths, the lumbricals, the superficial palmar arterial arch and the digital vessels and nerves. <br>The deepest muscular plane is the adductor compartment, which contains adductor pollicis. <br><br><b>Short muscles of the hand<\/b><br>These comprise the lumbricals and interossei. The four slender lumbrical muscles flex the fingers at the metacarpophalangeal joints and extend the interphalangeal joint. The four dorsal interossei are located between the metacarpals and the four palmar interossei lie on the palmar surface of the metacarpals in the interosseous compartment of the hand. <br><br><b>Long flexor tendons and sheaths in the hand<\/b><br>The tendons of FDS and FDP enter the common flexor sheath deep to the flexor retinaculum. The tendons enter the central compartment of the hand and fan out to their respective digital synovial sheaths. Near the base of the proximal phalanx, the tendon of FDS splits to permit the passage of FDP. The FDP tendons are attached to the margins of the anterior aspect of the base of the distal phalanx. <br>The fibrous digital sheaths contain the flexor tendons and their synovial sheaths. These extend from the heads of the metacarpals to the base of the distal phalanges."}, {"name": "Anatomy of the pelvis", "questions": [{"number": 48, "topic": "Anatomy of the pelvis", "stem_html": "During a revision hip arthroplasty procedure, the inferior gluteal nerve is injured. Which of the  muscles listed below is most likely to be affected?", "options": [{"label_html": "Gluteus medius", "is_correct": false}, {"label_html": "Gluteus minimis", "is_correct": false}, {"label_html": "Gluteus maximus", "is_correct": true}, {"label_html": "Piriformis", "is_correct": false}, {"label_html": "Tensor fasciae latae", "is_correct": false}], "correct_index": 2, "explanation_html": "The gluteus maximus is supplied by the inferior gluteal nerve."}], "note_html": "The pelvic girdle formed by the union of the two innominate bones anteriorly at the pubis and posteriorly with their connection to the sacrum. The innominate bone is comprised of three main parts; ilium, ischium and pubis. In the young, these are connected by cartilagenous tissue. In adults, they unite as one bone. The dimensions of the bony pelvis differ in the two sexes, being shallower and wider in females and narrower and deeper in males. <br><br><b>Topography of the pelvis<\/b><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\"
