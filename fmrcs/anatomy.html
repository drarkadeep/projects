und", "is_correct": true}, {"label_html": "It has two anterior cusps", "is_correct": false}, {"label_html": "The chordae tendinae attach to the anterior cusps only", "is_correct": false}, {"label_html": "The chordae tendinae anchor the valve directly to the wall of the left ventricle", "is_correct": false}, {"label_html": "It is best auscultated in the left third interspace", "is_correct": false}], "correct_index": 0, "explanation_html": "The mitral valve is best auscultated over the cardiac apex, where its closure marks the first heart sound. It has only two cusps. These are attached to chordae tendinae which themselves are linked to the wall of the ventricle by the papillary muscles."}, {"number": 257, "topic": "Heart anatomy", "stem_html": "The thebesian veins contribute to the venous drainage of the heart. Into which of the following structures do they primarily drain?", "options": [{"label_html": "Great cardiac vein", "is_correct": false}, {"label_html": "Atrium", "is_correct": true}, {"label_html": "Superior vena cava", "is_correct": false}, {"label_html": "Oblique vein", "is_correct": false}, {"label_html": "Small cardiac vein", "is_correct": false}], "correct_index": 1, "explanation_html": "The thebesian veins are numerous small veins running over the surface of the heart they drain into the heart itself. Usually this is to the atrium directly."}], "note_html": "The walls of each cardiac chamber comprise:<br><ul><li>Epicardium<\/li><li>Myocardium<\/li><li>Endocardium<\/li><\/ul><br>Cardiac muscle is attached to the cardiac fibrous skeleton.<br><br><b>Relations<\/b><br>The heart and roots of the great vessels within the pericardial sac are related to the posterior aspect of the sternum, medial ends of the 3rd to 5th ribs on the left and their associated costal cartilages. The heart and pericardial sac are situated obliquely two thirds to the left and one third to the right of the median plane.<br><br>The pulmonary valve lies at the level of the left third costal cartilage. <br>The mitral valve lies at the level of the fourth costal cartilage.<br><br><b>Coronary sinus<\/b><br>This lies in the posterior part of the coronary groove and receives blood from the cardiac veins. The great cardiac vein lies at its left and the middle and small cardiac veins lie on its right. The smallest cardiac vein (anterior cardiac vein) drains into the right atrium directly.<br><br><b>Aortic sinus<\/b><br>Right coronary artery arises from the right aortic sinus, the left is derived from the left aortic sinus, which lies posteriorly.<br><br><b>Features of the left ventricle as opposed to the right<\/b><br><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Structure<\/b><\/td><td><b>Left Ventricle<\/b><\/td><\/tr><tr><td>A-V Valve<\/td><td>Mitral (double leaflet)<\/td><\/tr><tr><td>Walls<\/td><td>Twice as thick as right<\/td><\/tr><tr><td>Trabeculae carnae<\/td><td>Much thicker and more numerous<\/td><\/tr><\/tbody><\/table><\/div><br><b>Right coronary artery<\/b><br>The RCA supplies:<br><ul><li>Right atrium<\/li><li>Diaphragmatic part of the right ventricle<\/li><li>Usually the posterior third of the interventricular septum<\/li><li>The sino atrial node (60% cases)<\/li><li>The atrio ventricular node (80% cases)<\/li><\/ul><br><b>Left coronary artery<\/b><br>The LCA supplies:<br><ul><li>Left atrium<\/li><li>Most of left ventricle<\/li><li>Part of the right ventricle<\/li><li>Anterior two thirds of the inter ventricular septum<\/li><li>The sino atrial node (remaining 40% cases)<\/li><\/ul><br><b>Innervation of the heart<\/b><br>Autonomic nerve fibres from the superficial and deep cardiac plexus. These lie anterior to the bifurcation of the trachea, posterior to the ascending aorta and superior to the bifurcation of the pulmonary trunk. The parasympathetic supply to the heart is from presynaptic fibres of the vagus nerves.<br><br><b>Valves of the heart<\/b><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Mitral valve<\/b><\/th><th><b>Aortic valve<\/b><\/th><th><b>Pulmonary valve<\/b><\/th><th><b>Tricuspid valve<\/b><\/th><\/tr><\/thead><tbody><tr><td>2 cusps<\/td><td>3 cusps<\/td><td>3 cusps<\/td><td>3 cusps<\/td><\/tr><tr><td>First heart sound<\/td><td>Second heart sound<\/td><td>Second heart sound<\/td><td>First heart sound<\/td><\/tr><tr><td>1 anterior cusp<\/td><td>2 anterior cusps<\/td><td>2 anterior cusps<\/td><td>2 anterior cusps<\/td><\/tr><tr><td>Attached to chordae tendinae<\/td><td>No chordae<\/td><td>No chordae<\/td><td>Attached to chordae tendinae<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Hesselbach's triangle", "questions": [{"number": 258, "topic": "Hesselbach's triangle", "stem_html": "A 35 year old man presents to the surgical clinic with a suspected direct inguinal hernia. These will pass through Hesselbach's triangle. Which of the following forms the medial edge of this structure?", "options": [{"label_html": "External oblique aponeurosis", "is_correct": false}, {"label_html": "Inferior epigastric artery", "is_correct": false}, {"label_html": "Rectus abdominis muscle", "is_correct": true}, {"label_html": "Inferior epigastric vein", "is_correct": false}, {"label_html": "Obturator nerve", "is_correct": false}], "correct_index": 2, "explanation_html": "Direct inguinal hernias pass through Hesselbachs triangle (although this is of minimal clinical significance!). Its medial boundary is the rectus muscle."}], "note_html": "Direct hernias pass through Hesselbachs triangle.<br><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Superolaterally<\/b><\/td><td>Epigastric vessels<\/td><\/tr><tr><td><b>Medially<\/b><\/td><td>Lateral edge of rectus muscle<\/td><\/tr><tr><td><b>Inferiorly<\/b><\/td><td>Inguinal ligament<\/td><\/tr><\/tbody><\/table><\/div><br><i>The boundaries of Hesselbachs triangle are commonly tested and illustrated below<\/i><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb074b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb074.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Inguinal triangle\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb074b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}, {"name": "Hip joint", "questions": [{"number": 259, "topic": "Hip joint", "stem_html": "Which of the muscles below does not cause lateral rotation of the hip?", "options": [{"label_html": "Obturator internus", "is_correct": false}, {"label_html": "Quadratus femoris", "is_correct": false}, {"label_html": "Gemellus inferior", "is_correct": false}, {"label_html": "Piriformis", "is_correct": false}, {"label_html": "Pectineus", "is_correct": true}], "correct_index": 4, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Mnemonic lateral hip rotators: P-GO-GO-Q (top to bottom)<br><br>Piriformis<br>Gemellus superior<br>Obturator internus<br>Gemellus inferior<br>Obturator externus<br>Quadratus femoris<\/div>Pectineus adducts and medially rotates the femur."}, {"number": 260, "topic": "Hip joint", "stem_html": "A 72 year old lady with osteoporosis falls and sustains an intracapsular femoral neck fracture. The fracture is completely displaced. Which of the following vessels is the main contributor to the arterial supply of the femoral head?", "options": [{"label_html": "Deep external pudendal artery", "is_correct": false}, {"label_html": "Superficial femoral artery", "is_correct": false}, {"label_html": "External iliac artery", "is_correct": false}, {"label_html": "Circumflex femoral arteries", "is_correct": true}, {"label_html": "Superficial external pudendal artery", "is_correct": false}], "correct_index": 3, "explanation_html": "The vessels which form the anastomoses around the femoral head are derived from the medial and lateral circumflex femoral arteries. These are usually derived from the profunda femoris artery."}, {"number": 261, "topic": "Hip joint", "stem_html": "Which of the following ligaments contains the artery supplying the head of femur in children?", "options": [{"label_html": "Transverse ligament", "is_correct": false}, {"label_html": "Ligamentum teres", "is_correct": true}, {"label_html": "Iliofemoral ligament", "is_correct": false}, {"label_html": "Ischiofemoral ligament", "is_correct": false}, {"label_html": "Pubofemoral ligament", "is_correct": false}], "correct_index": 1, "explanation_html": "<p>No explanation provided.<\/p>"}, {"number": 262, "topic": "Hip joint", "stem_html": "A 67 year old man is due to undergo a revisional total hip replacement using a posterior approach. After dividing gluteus maximus in the line of its fibres there is brisk arterial bleeding. Which of the following vessels is likely to be responsible?", "options": [{"label_html": "Profunda femoris artery", "is_correct": false}, {"label_html": "External iliac artery", "is_correct": false}, {"label_html": "Internal iliac artery", "is_correct": false}, {"label_html": "Obturator artery", "is_correct": false}, {"label_html": "Inferior gluteal artery", "is_correct": true}], "correct_index": 4, "explanation_html": "The inferior gluteal artery runs on the deep surface of the gluteus maximus muscle. It is a branch of the internal iliac artery. It is commonly divided during the posterior approach to the hip joint."}, {"number": 263, "topic": "Hip joint", "stem_html": "A 78 year old lady falls over in her nursing home and sustains a displaced intracapsular fracture of the femoral neck. A decision is made to perform a hemi arthroplasty through a lateral approach. Which of these vessels will be divided to facilitate access?", "options": [{"label_html": "Saphenous vein", "is_correct": false}, {"label_html": "Superior gluteal artery", "is_correct": false}, {"label_html": "Superficial circumflex iliac artery", "is_correct": false}, {"label_html": "Profunda femoris artery", "is_correct": false}, {"label_html": "Transverse branch of the lateral circumflex artery", "is_correct": true}], "correct_index": 4, "explanation_html": "During the Hardinge style lateral approach the transverse branch of the lateral circumflex artery is divided to gain access. The vessels and its branches are illustrated below:<br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb086b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb086.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Lateral circumflex femoral artery\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb086b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}, {"number": 264, "topic": "Hip joint", "stem_html": "An elderly man falls and lands on his hip. On examination, his hip is tender to palpation and x-rays are taken. There are concerns that he may have an intertrochanteric fracture. What is the normal angle between the femoral neck and the femoral shaft?", "options": [{"label_html": "90<sup>o<\/sup>", "is_correct": false}, {"label_html": "105<sup>o<\/sup>", "is_correct": false}, {"label_html": "80<sup>o<\/sup>", "is_correct": false}, {"label_html": "130<sup>o<\/sup>", "is_correct": true}, {"label_html": "180<sup>o<\/sup>", "is_correct": false}], "correct_index": 3, "explanation_html": "The normal angle in males between the femoral head and shaft is 130<sup>o<\/sup>. Changes to this angle may occur as a result of disease or pathology and should be investigated. <br>Females have an angle that is around 110-120<sup>o<\/sup>"}], "note_html": "<ul><li>Head of femur articulates with acetabulum of the pelvis<\/li><li>Both covered by articular hyaline cartilage<\/li><li>The acetabulum forms at the union of the ilium, pubis, and ischium<\/li><li>The triradiate cartilage (Y-shaped growth plate) separates the pelvic bones<\/li><li>The acetabulum holds the femoral head by the acetabular labrum<\/li><li>Normal angle between femoral head and femoral shaft is 130<sup>o<\/sup><\/li><\/ul><br><b>Ligaments<\/b><br><ul><li>Transverse ligament: joints anterior and posterior ends of the articular cartilage<\/li><li>Head of femur ligament (ligamentum teres): acetabular notch to the fovea. Contains arterial supply to head of femur in children.<\/li><\/ul><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb120b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb120.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Hip joint\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb120b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb121b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb121.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Hip joint\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb121b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center><br><b>Extracapsular ligaments<\/b><br><ul><li>Iliofemoral ligament: inverted Y shape. Anterior iliac spine to the trochanteric line<\/li><li>Pubofemoral ligament: acetabulum to lesser trochanter<\/li><li>Ischiofemoral ligament: posterior support. Ischium to greater trochanter.<\/li><\/ul><br><b>Blood supply<\/b><br>Medial circumflex femoral and lateral circumflex femoral arteries (Branches of profunda femoris). Also from the inferior gluteal artery. These form an anastomosis and travel to up the femoral neck to supply the head."}, {"name": "Horners syndrome", "questions": [{"number": 265, "topic": "Horners syndrome", "stem_html": "An 18 year old man is stabbed in the neck and has to undergo repair of a laceration to the internal carotid artery. Post operatively he is noted to have a Horners syndrome. Which of the following will not be present?", "options": [{"label_html": "Apparent enopthalmos", "is_correct": false}, {"label_html": "Loss of sweating on the entire ipsilateral side of the face", "is_correct": true}, {"label_html": "Constricted pupil", "is_correct": false}, {"label_html": "Mild ptosis", "is_correct": false}, {"label_html": "Normal sympathetic activity in the torso", "is_correct": false}], "correct_index": 1, "explanation_html": "The anhidrosis will be mild as this is a distal lesion and at worst only a very limited area of the ipsilateral face will be anhidrotic."}, {"number": 266, "topic": "Horners syndrome", "stem_html": "An 18 year old man is stabbed in the neck and has to undergo repair of a laceration to the internal carotid artery. Post operatively he is noted to have a Horners syndrome. Which of the following will not be present?", "options": [{"label_html": "Apparent enopthalmos", "is_correct": false}, {"label_html": "Loss of sweating on the entire ipsilateral side of the face", "is_correct": true}, {"label_html": "Constricted pupil", "is_correct": false}, {"label_html": "Mild ptosis", "is_correct": false}, {"label_html": "Normal sympathetic activity in the torso", "is_correct": false}], "correct_index": 1, "explanation_html": "The anhidrosis will be mild as this is a distal lesion and at worst only a very limited area of the ipsilateral face will be anhidrotic."}], "note_html": "Horners syndrome, clinical features:<br><ul><li>Ptosis<\/li><li>Miosis<\/li><li>Enopthalmos<\/li><li>Anhydrosis<\/li><\/ul><br>Primarily a disorder of the sympathetic nervous system. Extent of symptoms depends upon the anatomical site of the lesion. <br><br>Proximal lesions occur along the hypothalamospinal tract<br><br>Distal lesions are usually post ganglionic e.g. at level of internal carotid artery or beyond."}, {"name": "Humerus", "questions": [{"number": 267, "topic": "Humerus", "stem_html": "Which of the following anatomical structures lies within the spiral groove of the humerus?", "options": [{"label_html": "Median nerve", "is_correct": false}, {"label_html": "Radial nerve", "is_correct": true}, {"label_html": "Tendon of triceps", "is_correct": false}, {"label_html": "Musculocutaneous nerve", "is_correct": false}, {"label_html": "Axillary nerve", "is_correct": false}], "correct_index": 1, "explanation_html": "The radial nerve lies in this groove and may be compromised by fractures involving the shaft."}], "note_html": "The humerus extends from the scapula to the elbow joint. It has a body and two ends. It is almost completely covered with muscle but can usually be palpated throughout its length. The smooth rounded surface of the head articulates with the shallow glenoid cavity. The head is connected to the body of the humerus by the anatomical neck. The surgical neck is the region below the head and tubercles and where they join the shaft and is the commonest site of fracture. The capsule of the shoulder joint is attached to the anatomical neck superiorly but extends down to 1.5cm on the surgical neck. <br><br>The greater tubercle is the prominence on the lateral side of the upper end of the bone. It merges with the body below and can be felt through the deltoid inferior to the acromion. The tendons of the supraspinatus and infraspinatus are inserted into impressions on its superior aspect. The lesser tubercle is a distinct prominence on the front of the upper end of the bone. It can be palpated through the deltoid just lateral to the tip of the coracoid process. <br><br>The intertubercular groove passes on the body between the greater and lesser tubercles, continuing down from the anterior borders of the tubercles to form the edges of the groove. The tendon of biceps within its synovial sheath passes through this groove, held within it by a transverse ligament. <br><br>The posterior surface of the body is marked by a spiral groove for the radial nerve which runs obliquely across the upper half of the body to reach the lateral border below the deltoid tuberosity. Within this groove lie the radial nerve and brachial vessels and both may be affected by fractures involving the shaft of the humerus. <br><br>The lower end of the humerus is wide and flattened anteroposteriorly, and inclined anteriorly. The middle third of the distal edge forms the trochlea. Superior to this are indentations for the coronoid fossa anteriorly and olecranon fossa posteriorly. Lateral to the trochlea is a rounded capitulum which articulates with the radius. <br><br>The medial epicondyle is very prominent with a smooth posterior surface which contains a sulcus for the ulnar nerve and collateral vessels. It's distal margin gives attachment for the ulnar collateral ligament and, in front of this, the anterior surface has an impression for the common flexor tendon."}, {"name": "Iliac arteries", "questions": [{"number": 268, "topic": "Iliac arteries", "stem_html": "A surgical resident doctor decides to take an arterial blood sample from the femoral artery. What anatomical landmark best corresponds to the commencement of this vessel?", "options": [{"label_html": "Mid inguinal point", "is_correct": true}, {"label_html": "Mid point of the inguinal ligament", "is_correct": false}, {"label_html": "Apex of the femoral triangle", "is_correct": false}, {"label_html": "Inferomedially to the pubic tubercle", "is_correct": false}, {"label_html": "Inferomedially to the symphysis pubis", "is_correct": false}], "correct_index": 0, "explanation_html": "Mid inguinal point= surface marking for femoral artery<br>Mid point of the inguinal ligament = surface marking for deep inguinal ring."}], "note_html": "The common iliac arteries are terminal branches of the abdominal aorta. They begin opposite the middle body of the fourth lumbar vertebra. The superior hypogastric plexus lies anterior to the proximal end and more distally, it is crossed by the ureter. The last two lumbar vertebral bodies, and intervening disc, the sympathetic trunk and the medial part of psoas major lie behind each artery. They are separated from the right artery by the beginning of the inferior vena cava. The only branches of the common iliac arteries are the internal and external iliac arteries. <br><br><b>Internal iliac artery<\/b><br>Anteromedially, each internal iliac artery is covered by peritoneum, beneath which the ureter descends on the anterior surface of each artery. On the left, the vessel is overlapped by the sigmoid colon and, on the right, the terminal ileum overlies it. Posteriorly, the internal iliac vein and commencement of the common iliac vein are closely related to the artery. The posterior division of the internal iliac artery has parietal branches and the anterior division has both parietal and visceral branches. <br><br><b>Branches of the posterior division of the internal iliac<\/b><br>Lateral sacral, superior gluteal, iliolumbar artery.<br><br><b>Branches of the anterior division of the internal iliac artery<\/b><br>Obturator artery, internal pudendal artery, inferior gluteal, inferior vesical artery, artery the ductus deferens, middle rectal, vaginal artery, uterine artery.<br><br><b>External iliac artery<\/b><br>The external iliac artery extends from a point opposite the sacroiliac joint at the level of the lumbosacral disc to the midinguinal point behind the inguinal ligament, midway between the anterior superior iliac spine and the pubic symphysis."}, {"name": "Ilioinguinal nerve", "questions": [{"number": 269, "topic": "Ilioinguinal nerve", "stem_html": "During an inguinal hernia repair the surgeon identifies a small nerve whilst mobilising the cord structures at the level of the superficial inguinal ring. Which nerve is this most likely to be?", "options": [{"label_html": "Subcostal", "is_correct": false}, {"label_html": "Iliohypogastric", "is_correct": false}, {"label_html": "Ilioinguinal", "is_correct": true}, {"label_html": "Obturator", "is_correct": false}, {"label_html": "Pudendal", "is_correct": false}], "correct_index": 2, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Ilioinguinal nerve entrapment may be a cause of neuropathic pain following inguinal hernia surgery.<\/div>The ilioinguinal nerve passes through the superfical inguinal ring and is routinely encountered when exploring the inguinal canal during hernia surgery. The iliohypogastric nerve pierces the aponeurosis of the external oblique muscle superior to the superficial inguinal ring."}, {"number": 270, "topic": "Ilioinguinal nerve", "stem_html": "A 23 year old man is undergoing an inguinal hernia repair. The surgeons mobilise the spermatic cord and place it in a hernia ring. A small slender nerve is identified superior to the cord. Which nerve is it most likely to be?", "options": [{"label_html": "Iliohypogastric nerve", "is_correct": false}, {"label_html": "Pudendal nerve", "is_correct": false}, {"label_html": "Femoral branch of the genitofemoral nerve", "is_correct": false}, {"label_html": "Ilioinguinal nerve", "is_correct": true}, {"label_html": "Obturator nerve", "is_correct": false}], "correct_index": 3, "explanation_html": "The ilioinguinal nerve passes through the inguinal canal and is the nerve most commonly identified during hernia surgery. The genitofemoral nerve splits into two branches, the genital branch passes through the inguinal canal within the cord structures. The femoral branch of the genitofemoral nerve enters the thigh posterior to the inguinal ligament, lateral to the femoral artery. The iliohypogastric nerve pierces the external oblique aponeurosis above the superficial inguinal ring."}, {"number": 271, "topic": "Ilioinguinal nerve", "stem_html": "A 23 year old man complains of severe groin pain several weeks after a difficult inguinal hernia repair. Which nerve is most likely to have been involved?", "options": [{"label_html": "Genitofemoral", "is_correct": false}, {"label_html": "Ilioinguinal", "is_correct": true}, {"label_html": "Femoral", "is_correct": false}, {"label_html": "Iliohypogastric", "is_correct": false}, {"label_html": "Pudendal", "is_correct": false}], "correct_index": 1, "explanation_html": "The ilioinguinal nerve may have been entrapped in the mesh causing a neuroma."}], "note_html": "Arises from the first lumbar ventral ramus with the iliohypogastric nerve. It passes inferolaterally through the substance of psoas major and over the anterior surface of quadratus lumborum. It pierces the internal oblique muscle and passes deep to the aponeurosis of the external oblique muscle. It enters the inguinal canal and then passes through the superficial inguinal ring to reach the skin. <br><br><b>Branches<\/b><br><ul><li>To supply those muscles of the abdominal wall through which it passes.<\/li><li>Skin and fascia over the pubic symphysis, superomedial part of the femoral triangle, surface of the scrotum, root and dorsum of penis or labium majus in females.<\/li><\/ul>"}, {"name": "Inferior mesenteric artery", "questions": [{"number": 272, "topic": "Inferior mesenteric artery", "stem_html": "A patient is found to have an ischaemic left colon. Which artery arising from the aorta at around the level of L3 is most likely to account for this situation?", "options": [{"label_html": "Superior mesenteric artery", "is_correct": false}, {"label_html": "Inferior mesenteric artery", "is_correct": true}, {"label_html": "Superior rectal artery", "is_correct": false}, {"label_html": "Ileocolic artery", "is_correct": false}, {"label_html": "Middle colic artery", "is_correct": false}], "correct_index": 1, "explanation_html": "Only the IMA is likely to affect the left side of the colon and originate at L3."}], "note_html": "The IMA is the main arterial supply of the embryonic hindgut and originates approximately 3-4 cm superior to the aortic bifurcation. From its aortic origin it passes immediately inferiorly across the anterior aspect of the aorta to eventually lie on its left hand side. At the level of the left common iliac artery it becomes the superior rectal artery. <br><br><b>Branches<\/b><br>The left colic artery arises from the IMA near its origin. More distally up to three sigmoid arteries will exit the IMA to supply the sigmoid colon."}, {"name": "Inferior vena cava", "questions": [{"number": 273, "topic": "Inferior vena cava", "stem_html": "A 75-year-old man presents with hepatomegaly and ascites. A CT scan shows evidence of post hepatic portal hypertension. The inferior vena cava passes through the diaphragm at which vertebral level?", "options": [{"label_html": "T5", "is_correct": false}, {"label_html": "T8", "is_correct": true}, {"label_html": "T9", "is_correct": false}, {"label_html": "T10", "is_correct": false}, {"label_html": "T11", "is_correct": false}], "correct_index": 1, "explanation_html": "It passes through the diaphragm at T8."}, {"number": 274, "topic": "Inferior vena cava", "stem_html": "A 45 year old man is stabbed in the abdomen and the inferior vena cava is injured. How many functional valves does this vessel usually have?", "options": [{"label_html": "0", "is_correct": true}, {"label_html": "1", "is_correct": false}, {"label_html": "3", "is_correct": false}, {"label_html": "2", "is_correct": false}, {"label_html": "4", "is_correct": false}], "correct_index": 0, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Mnemonic for the Inferior vena cava tributaries: I Like To Rise So High:<br><br>Iliacs<br>Lumbar<br>Testicular<br>Renal<br>Suprarenal<br>Hepatic vein<\/div>The lack of valves in the IVC is important clinically when it is cannulated during cardiopulmonary bypass, using separate SVC and IVC catheters, such as when the right atrium is to be opened.  Note that there is a non functional valve between the right atrium and inferior vena cava."}, {"number": 275, "topic": "Inferior vena cava", "stem_html": "Which of the following vessels does not drain directly into the inferior vena cava?", "options": [{"label_html": "Superior mesenteric vein", "is_correct": true}, {"label_html": "Right common iliac vein", "is_correct": false}, {"label_html": "Right hepatic vein", "is_correct": false}, {"label_html": "Left hepatic vein", "is_correct": false}, {"label_html": "Right testicular vein", "is_correct": false}], "correct_index": 0, "explanation_html": "The superior mesenteric vein drains into the portal vein. The right and left hepatic veins drain into it directly, this can account for major bleeding in more extensive liver shearing type injuries."}, {"number": 276, "topic": "Inferior vena cava", "stem_html": "A 45 year old man has a long femoral line inserted to provide CVP measurements. The catheter passes from the common iliac vein into the inferior vena cava. At which of the following vertebral levels will this occur?", "options": [{"label_html": "L5", "is_correct": true}, {"label_html": "L4", "is_correct": false}, {"label_html": "S1", "is_correct": false}, {"label_html": "L3", "is_correct": false}, {"label_html": "L2", "is_correct": false}], "correct_index": 0, "explanation_html": "The common iliac veins fuse with the IVC at L5."}, {"number": 277, "topic": "Inferior vena cava", "stem_html": "A 45 year old man has a long femoral line inserted to provide CVP measurements. The catheter passes from the common iliac vein into the inferior vena cava. At which of the following vertebral levels will this occur?", "options": [{"label_html": "L5", "is_correct": true}, {"label_html": "L4", "is_correct": false}, {"label_html": "S1", "is_correct": false}, {"label_html": "L3", "is_correct": false}, {"label_html": "L2", "is_correct": false}], "correct_index": 0, "explanation_html": "The common iliac veins fuse with the IVC at L5."}, {"number": 278, "topic": "Inferior vena cava", "stem_html": "A 56 year old man is having a long venous line inserted via the femoral vein into the right atrium for CVP measurements. The catheter is advanced through the IVC. At which of the following levels does this vessel enter the thorax?", "options": [{"label_html": "L2", "is_correct": false}, {"label_html": "T10", "is_correct": false}, {"label_html": "L1", "is_correct": false}, {"label_html": "T8", "is_correct": true}, {"label_html": "T6", "is_correct": false}], "correct_index": 3, "explanation_html": "The IVC passes through the diaphragm at T8."}], "note_html": "<b>Origin<\/b><br><ul><li>L5<\/li><\/ul><br><b>Path<\/b> <br><ul><li>Left and right common iliac veins merge to form the IVC. <\/li><li>Passes right of midline<\/li><li>Paired segmental lumbar veins drain into the IVC throughout its length<\/li><li>The right gonadal vein empties directly into the cava and the left gonadal vein generally empties into the left renal vein. <\/li><li>The next major veins are the renal veins and the hepatic veins<\/li><li>Pierces the central tendon of diaphragm at T8<\/li><li>Right atrium<\/li><\/ul><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb114b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb114.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Inferior vena cava\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb114b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center><br><b>Relations<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Anteriorly<\/b><\/td><td>Small bowel, first and third part of duodenum, head of pancreas, liver and bile duct, right common iliac artery, right gonadal artery<\/td><\/tr><tr><td><b>Posteriorly<\/b><\/td><td>Right renal artery, right psoas, right sympathetic chain, coeliac ganglion<\/td><\/tr><\/tbody><\/table><\/div><br><b>Levels<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Level<\/b><\/td><td><b>\tVein<\/b><\/td><\/tr><tr><td><b>T8\t<\/b><\/td><td>Hepatic vein, inferior phrenic vein, pierces diaphragm<\/td><\/tr><tr><td><b>L1\t<\/b><\/td><td>Right suprarenal vein, renal vein<\/td><\/tr><tr><td><b>L2\t<\/b><\/td><td>Gonadal vein<\/td><\/tr><tr><td><b>L1-5<\/b><\/td><td>\tLumbar veins<\/td><\/tr><tr><td><b>L5<\/b><\/td><td>\tCommon iliac vein, formation of IVC<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Inguinal canal", "questions": [{"number": 279, "topic": "Inguinal canal", "stem_html": "A 32 year old man presents with an inguinal hernia and undergoes an open surgical repair. The surgeons decide to place a mesh on the posterior wall of the inguinal canal to complete the repair, which of the following structures will lie posterior to the mesh?", "options": [{"label_html": "Transversalis fascia", "is_correct": true}, {"label_html": "External oblique", "is_correct": false}, {"label_html": "Rectus abdominis", "is_correct": false}, {"label_html": "Obturator nerve", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 0, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Inguinal canal walls:  'MALT: 2M, 2A, 2L, 2T': <br><br>Starting from superior, moving around in order to posterior:<br>Superior wall (roof): 2 Muscles:Internal oblique, transversus abdominis <br>Anterior wall: 2 Aponeuroses: Aponeurosis of external oblique, Aponeurosis of internal oblique <br>Lower wall (floor): 2 Ligaments: Inguinal Ligament, Lacunar Ligament Posterior wall: 2Ts: Transversalis fascia, Conjoint Tendon<\/div>This is actually quite a straightforward question. It is simply asking for the structure that forms the posterior wall of the inguinal canal. This is composed of the transversalis fascia, the conjoint tendon and more laterally the deep inguinal ring."}, {"number": 280, "topic": "Inguinal canal", "stem_html": "A 18 year old man presents with an indirect inguinal hernia and undergoes surgery. The deep inguinal ring is exposed and held with a retractor at its medial aspect. Which structure is most likely to lie under the retractor?", "options": [{"label_html": "Ureter", "is_correct": false}, {"label_html": "Inferior epigastric artery", "is_correct": true}, {"label_html": "Internal iliac vein", "is_correct": false}, {"label_html": "Femoral artery", "is_correct": false}, {"label_html": "Lateral border of rectus abdominis", "is_correct": false}], "correct_index": 1, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Boundaries of the deep inguinal ring:<br><ul><li>Superolaterally - transversalis fascia<\/li><li>Inferomedially - inferior epigastric artery<\/li><\/ul><\/div>The deep inguinal ring is closely related to the inferior epigastric artery. The inferior epigastric artery forms part of the structure referred to as Hesselbach's triangle.<br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb074b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb074.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Inguinal triangle\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb074b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}, {"number": 281, "topic": "Inguinal canal", "stem_html": "A 19 year old man undergoes an open inguinal hernia repair. The cord is mobilised and the deep inguinal ring identified. Which of the following structures forms its lateral wall?", "options": [{"label_html": "External oblique aponeurosis", "is_correct": false}, {"label_html": "Transversalis fascia", "is_correct": true}, {"label_html": "Conjoint tendon", "is_correct": false}, {"label_html": "Inferior epigastric artery", "is_correct": false}, {"label_html": "Inferior epigastric vein", "is_correct": false}], "correct_index": 1, "explanation_html": "The transversalis fascia forms the superolateral edge of the deep inguinal ring. The epigastric vessels form its inferomedial wall."}], "note_html": "<b>Location<\/b><br><ul><li>Above the inguinal ligament<\/li><li>The inguinal canal is 4cm long<\/li><li>The superficial ring is located anterior to the pubic tubercle<\/li><li>The deep ring is located approximately 1.5-2cm above the half way point between the anterior superior iliac spine and the pubic tubercle<\/li><\/ul><br><b>Boundaries of the inguinal canal<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Floor<\/b><\/td><td><ul><li>External oblique aponeurosis<\/li><li>Inguinal ligament <\/li><li>Lacunar ligament<\/li><\/ul><\/td><\/tr><tr><td><b>Roof<\/b><\/td><td><ul><li>Internal oblique<\/li><li>Transversus abdominis<\/li><\/ul><\/td><\/tr><tr><td><b>Anterior wall<\/b><\/td><td>External oblique aponeurosis<\/td><\/tr><tr><td><b>Posterior wall<\/b><\/td><td><ul><li>Transversalis fascia <\/li><li>Conjoint tendon<\/li><\/ul><\/td><\/tr><tr><td><b>Laterally<\/b><\/td><td><ul><li>Internal ring<\/li><li>Transversalis fascia<\/li><li>Fibres of internal oblique<\/li><\/ul><\/td><\/tr><tr><td><b>Medially<\/b><\/td><td><ul><li>External ring<\/li><li>Conjoint tendon<\/li><\/ul><\/td><\/tr><\/tbody><\/table><\/div><br><b>Contents<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Males<\/b><\/td><td>Spermatic cord and ilioinguinal nerve<\/td><td>As it passes through the canal the spermatic cord has 3 coverings:<br><ul><li>External spermatic fascia from external oblique aponeurosis<\/li><li>Cremasteric fascia<\/li><li>Internal spermatic fascia<\/li><\/ul><\/td><\/tr><tr><td><b>Females<\/b><\/td><td>Round ligament of uterus and ilioinguinal nerve<\/td><td><\/td><\/tr><\/tbody><\/table><\/div><br><b>Related anatomy of the inguinal region<\/b><br>The boundaries of Hesselbachs triangle are commonly tested and illustrated below:<br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb074b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb074.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Inguinal triangle\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb074b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center><br>The image below demonstrates the close relationship of the vessels to the lower limb with the inguinal canal. A fact to be borne in mind when repairing hernial defects in this region.<br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb007b.jpg\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb007.jpg\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Inguinal canal\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb007b.jpg\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}, {"name": "Internal carotid artery", "questions": [{"number": 282, "topic": "Internal carotid artery", "stem_html": "Following a carotid endarterectomy a man notices that he has a weakness of his tongue. Damage to which of the following nerves is the most likely explanation for this process?", "options": [{"label_html": "Hypoglossal", "is_correct": true}, {"label_html": "Accessory", "is_correct": false}, {"label_html": "Ansa cervicalis", "is_correct": false}, {"label_html": "Vagus", "is_correct": false}, {"label_html": "Cervical plexus", "is_correct": false}], "correct_index": 0, "explanation_html": "The hypoglossal nerve innervates the tongue and is one of the structures more commonly at risk in carotid surgery."}, {"number": 283, "topic": "Internal carotid artery", "stem_html": "A 56 year old man is undergoing a carotid endarterectomy. The internal carotid artery is mobilised. How many branches does this vessel give off in the neck?", "options": [{"label_html": "0", "is_correct": true}, {"label_html": "1", "is_correct": false}, {"label_html": "2", "is_correct": false}, {"label_html": "3", "is_correct": false}, {"label_html": "6", "is_correct": false}], "correct_index": 0, "explanation_html": "The internal carotid does not have any branches in the neck."}, {"number": 284, "topic": "Internal carotid artery", "stem_html": "A 78 year old man is due to undergo an endarterectomy of the internal carotid artery. Which of the following nervous structures are most at risk during the dissection?", "options": [{"label_html": "Recurrent laryngeal nerve", "is_correct": false}, {"label_html": "Sympathetic chain", "is_correct": false}, {"label_html": "Hypoglossal nerve", "is_correct": true}, {"label_html": "Phrenic nerve", "is_correct": false}, {"label_html": "Lingual nerve", "is_correct": false}], "correct_index": 2, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Nerves at risk during a carotid endarterectomy:<br><ul><li>Hypoglossal nerve<\/li><li>Greater auricular nerve<\/li><li>Superior laryngeal nerve<\/li><\/ul><\/div>During a carotid endarterectomy the sternocleidomastoid muscle is dissected, with ligation of the common facial vein and then the internal jugular is dissected exposing the common and the internal carotid arteries.  The nerves at risk during the operation include:<br><ul><li>\tHypoglossal nerve<\/li><li>\tGreater auricular nerve<\/li><li>\tSuperior laryngeal nerve<\/li><\/ul>The sympathetic chain lies posteriorly and is less prone to injury in this procedure."}, {"number": 285, "topic": "Internal carotid artery", "stem_html": "During a carotid endarterectomy the internal carotid artery is cross clamped. Assuming that no shunt is inserted, which of the following vessels will not have diminished or absent flow as a result?", "options": [{"label_html": "Anterior cerebral artery", "is_correct": false}, {"label_html": "Ophthalmic artery", "is_correct": false}, {"label_html": "Middle cerebral artery", "is_correct": false}, {"label_html": "Maxillary artery", "is_correct": true}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 3, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Mnemonic for branches of the cerebral portion of the internal carotid artery 'Only Press Carotid Arteries Momentarily'<br><br>Only = Opthalmic<br>Press = Posterior communicating<br>Carotid = Choroidal<br>Arteries = Anterior cerebral<br>Momentarily = Middle cerebral<\/div>The maxillary artery is a branch of the external carotid artery."}], "note_html": "The internal carotid artery is formed from the common carotid opposite the upper border of the thyroid cartilage. It extends superiorly to enter the skull via the carotid canal. From the carotid canal it then passes through the cavernous sinus, above which it divides into the anterior and middle cerebral arteries.<br><br><b>Relations in the neck<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Posterior<\/b><\/td><td><ul><li>Longus capitis<\/li><li>Pre-vertebral fascia<\/li><li>Sympathetic chain<\/li><li>Superior laryngeal nerve<\/li><\/ul><\/td><\/tr><tr><td><b>Medially<\/b><\/td><td><ul><li>External carotid (near origin)<\/li><li>Wall of pharynx<\/li><li>Ascending pharyngeal artery<\/li><\/ul><\/td><\/tr><tr><td><b>Laterally<\/b><\/td><td><ul><li>Internal jugular vein (moves posteriorly at entrance to skull)<\/li><li>Vagus nerve (most posterolaterally)<\/li><\/ul><\/td><\/tr><tr><td><b>Anteriorly<\/b><\/td><td><ul><li>Sternocleidomastoid<\/li><li>Lingual and facial veins<\/li><li>Hypoglossal nerve<\/li><\/ul><\/td><\/tr><\/tbody><\/table><\/div><br><b>Relations in the carotid canal<\/b><br><ul><li>Internal carotid plexus<\/li><li>Cochlea and middle ear cavity <\/li><li>Trigeminal ganglion (superiorly)<\/li><li>Leaves canal lies above the foramen lacerum<\/li><\/ul><br><b>Path and relations in the cranial cavity<\/b><br>The artery bends sharply forwards in the cavernous sinus, the aducens nerve lies close to its inferolateral aspect. The oculomotor, trochlear, opthalmic and, usually, the maxillary nerves lie in the lateral wall of the sinus. Near the superior orbital fissure it turns posteriorly and passes postero-medially to pierce the roof of the cavernous sinus inferior to the optic nerve. It then passes between the optic and oculomotor nerves to terminate below the anterior perforated substance by dividing into the anterior and middle cerebral arteries. <br><br><b>Branches<\/b><br><ul><li>Anterior and middle cerebral artery<\/li><li>Ophthalmic artery<\/li><li>Posterior communicating artery<\/li><li>Anterior choroid artery<\/li><li>Meningeal arteries<\/li><li>Hypophyseal arteries<\/li><\/ul><br><i>Image demonstrating the internal carotid artery and its relationship to the external carotid artery<\/i><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb005b.jpg\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb005.jpg\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Internal carotid artery\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb005b.jpg\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}, {"name": "Internal jugular vein", "questions": [{"number": 286, "topic": "Internal jugular vein", "stem_html": "As regards the internal jugular vein, which of the following statements is untrue?", "options": [{"label_html": "It lies within the carotid sheath", "is_correct": false}, {"label_html": "It is the continuation of the sigmoid sinus", "is_correct": false}, {"label_html": "The terminal part of the thoracic duct crosses anterior to it to insert into the right subclavian vein", "is_correct": true}, {"label_html": "The hypoglossal nerve is closely related to it as it passes near the atlas", "is_correct": false}, {"label_html": "The vagus nerve is closely related to it within the carotid sheath", "is_correct": false}], "correct_index": 2, "explanation_html": "The terminal part of the thoracic duct inserts into the left subclavian vein and it passes posterior to the jugular vein."}], "note_html": "Each jugular vein begins in the jugular foramen, where they are the continuation of the sigmoid sinus. They terminate at the medial end of the clavicle where they unite with the subclavian vein. <br><br>The vein lies within the carotid sheath throughout its course. Below the skull the internal carotid artery and last four cranial nerves are anteromedial to the vein. Thereafter it is in contact medially with the internal (then common) carotid artery. The vagus lies posteromedially. <br><br>At its superior aspect, the vein is overlapped by sternocleidomastoid and covered by it at the inferior aspect of the vein. <br><br>Below the transverse process of the atlas it is crossed on its lateral side by the accessory nerve. At its mid point it is crossed by the inferior root of the ansa cervicalis. <br>Posterior to the vein are the transverse processes of the cervical vertebrae, the phenic nerve as it descends on the scalenus anterior, and the first part of the subclavian artery. <br><br>On the left side its also related to the thoracic duct.<br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb141b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb141.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Jugular vein\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb141b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}, {"name": "Interossei", "questions": [{"number": 287, "topic": "Interossei", "stem_html": "Which nerve supplies the interossei of the fourth finger?", "options": [{"label_html": "Radial", "is_correct": false}, {"label_html": "Median", "is_correct": false}, {"label_html": "Superficial ulnar", "is_correct": false}, {"label_html": "Deep ulnar", "is_correct": true}, {"label_html": "Posterior interosseous", "is_correct": false}], "correct_index": 3, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Mnemonic:<br>PAD and DAB<br><b>P<\/b>almer interossei <b>AD<\/b>duct<br><b>D<\/b>orsal interossei <b>AB<\/b>duct <\/div>"}, {"number": 288, "topic": "Interossei", "stem_html": "Which nerve supplies the interossei of the fourth finger?", "options": [{"label_html": "Radial", "is_correct": false}, {"label_html": "Median", "is_correct": false}, {"label_html": "Superficial ulnar", "is_correct": false}, {"label_html": "Deep ulnar", "is_correct": true}, {"label_html": "Posterior interosseous", "is_correct": false}], "correct_index": 3, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Mnemonic:<br>PAD and DAB<br><b>P<\/b>almer interossei <b>AD<\/b>duct<br><b>D<\/b>orsal interossei <b>AB<\/b>duct <\/div>"}, {"number": 289, "topic": "Interossei", "stem_html": "How many dorsal interossei are there?", "options": [{"label_html": "1", "is_correct": false}, {"label_html": "3", "is_correct": false}, {"label_html": "2", "is_correct": false}, {"label_html": "4", "is_correct": true}, {"label_html": "5", "is_correct": false}], "correct_index": 3, "explanation_html": "Dorsally, the first interosseous occupies the space between the thumb and index finger. The tendon of the second inserts into the radial side of the extensor hood and proximal phalanx of the middle finger. The third and the fourth are inserted into the ulnar sides of the extensor hoods of the middle and ring fingers."}], "note_html": "<div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Origin and insertion<\/b><\/th><th><b>Nerve supply<\/b><\/th><th><b>Actions<\/b><\/th><\/tr><\/thead><tbody><tr><td>Four palmar and four dorsal interossei occupy the spaces between the metacarpal bones. Each palmar interossei originates from the metacarpal of the digit on which it acts. <br>Each dorsal interossei comes from the surface of the adjacent metacarpal on which it acts. As a result the dorsal interossei are twice the size of the palmar ones. <br>The interossei tendons, except the first palmar, pass to one or other side of the metacarpophalangeal joint posterior to the  deep transverse metacarpal ligament. They become inserted into the base of the proximal phalanx and partly into the extensor hood<\/td><td>They are all innervated by the ulnar nerve<\/td><td>Dorsal interossei abduct the fingers, palmar interossei adduct the fingers<\/td><\/tr><\/tbody><\/table><\/div><br><b>Clinical notes<\/b><br>Along with the lumbricals the interossei flex the metacarpophalangeal joints and extend the proximal and distal interphalangeal joints. They are responsible for fine tuning these movements. When the interossei and lumbricals are paralysed the digits are pulled into hyperextension by extensor digitorum and a claw hand is seen."}, {"name": "Intervertebral discs", "questions": [{"number": 290, "topic": "Intervertebral discs", "stem_html": "Which of the following structures separates the intervertebral discs from the spinal cord?", "options": [{"label_html": "Anterior longitudinal ligament", "is_correct": false}, {"label_html": "Posterior longitudinal ligament", "is_correct": true}, {"label_html": "Supraspinous ligament", "is_correct": false}, {"label_html": "Interspinous ligament", "is_correct": false}, {"label_html": "Ligamentum flavum", "is_correct": false}], "correct_index": 1, "explanation_html": "The posterior longitudinal ligament overlies the posterior aspect of the vertebral bodies. It also overlies the posterior aspect of the intervertebral discs."}], "note_html": "<ul><li>Consist of an outer annulus fibrosus and an inner nucleus pulposus.<\/li><li>The anulus fibrosus consists of several layers of fibrocartilage. <\/li><li>The nucleus pulposus contains loose fibres suspended in a mucoprotein gel with the consistency of jelly. The nucleus of the disc acts as a shock absorber.<\/li><li>Pressure on the disc causes posterior protrusion of the nucleus pulposus.  Most commonly in the lumbrosacral and lower cervical areas.<\/li><li>There is one disc between each pair of vertebrae, except for C1/2 and the sacrococcygeal vertebrae.<\/li><\/ul>"}, {"name": "Knee joint", "questions": [{"number": 291, "topic": "Knee joint", "stem_html": "Which of the following structures separates the posterior cruciate ligament from the popliteal artery?", "options": [{"label_html": "Oblique popliteal ligament", "is_correct": true}, {"label_html": "Transverse ligament", "is_correct": false}, {"label_html": "Popliteus tendon", "is_correct": false}, {"label_html": "Biceps femoris", "is_correct": false}, {"label_html": "Semitendinosus", "is_correct": false}], "correct_index": 0, "explanation_html": "The posterior cruciate ligament is separated from the popliteal vessels at its origin by the oblique popliteal ligament.It is attached above to the upper margin of the intercondyloid fossa and posterior surface of the femur close to the articular margins of the condyles, and below to the posterior margin of the head of the tibia. The transverse ligament is located anteriorly."}, {"number": 292, "topic": "Knee joint", "stem_html": "Which of the following statements relating to the knee joint is false?", "options": [{"label_html": "It is the largest synovial joint in the body", "is_correct": false}, {"label_html": "When the knee is fully extended all ligaments (bar the anterolateral aspect of the posterior cruciate ligament) of the knee joint are taut", "is_correct": false}, {"label_html": "Rupture of the anterior cruciate ligament may result in haemarthrosis", "is_correct": false}, {"label_html": "The posterior aspect of the patella is extrasynovial", "is_correct": true}, {"label_html": "The joint is innervated by the femoral, sciatic and obturator nerves", "is_correct": false}], "correct_index": 3, "explanation_html": "The posterior aspect is intrasynovial and the knee itself comprises the largest synovial joint in the body. It may swell considerably following trauma such as ACL injury. Which may be extremely painful owing to rich innervation from femoral, sciatic and ( a smaller) contribution from the obturator nerve. During full extension all ligaments are taut and the knee is locked."}], "note_html": "The knee joint is a synovial joint, the largest and most complicated. It consists of two condylar joints between the femur and tibia and a sellar joint between the patella and the femur. The tibiofemoral articular surfaces are incongruent, however, this is improved by the presence of the menisci. The degree of congruence is related to the anatomical position of the knee joint and is greatest in full extension. <br><br><b>Knee joint compartments<\/b><br><div class=\"table-responsive\"><table class=\"tb\"><tbody><tr><td><b>Tibiofemoral<\/b><\/td><td><ul><li>Comprised of the patella/femur joint, lateral and medial compartments (between femur condyles and tibia)<\/li><li>Synovial membrane and cruciate ligaments partially separate the medial and lateral compartments<\/li><\/ul><\/td><\/tr><tr><td><b>Patellofemoral<\/b><\/td><td><ul><li>Ligamentum patellae<\/li><li>Actions: provides joint stability in full extension<\/li><\/ul><\/td><\/tr><\/tbody><\/table><\/div><br><b>Fibrous capsule<\/b><br>The capsule of the knee joint is a complex, composite structure with contributions from adjacent tendons.<br><div class=\"table-responsive\"><table class=\"tb\"><tbody><tr><td><b>Anterior fibres<\/b><\/td><td>The capsule does not pass proximal to the patella. It blends with the tendinous expansions of vastus medialis and lateralis<\/td><\/tr><tr><td><b>Posterior fibres<\/b><\/td><td>These fibres are vertical and run from the posterior surface of the femoral condyles to the posterior aspect of the tibial condyle<\/td><\/tr><tr><td><b>Medial fibres<\/b><\/td><td>Attach to the femoral and tibial condyles beyond their articular margins, blending with the tibial collateral ligament<\/td><\/tr><tr><td><b>Lateral fibres<\/b><\/td><td>Attach to the femur superior to popliteus, pass over its tendon to head of fibula and tibial condyle<\/td><\/tr><\/tbody><\/table><\/div><br><b>Bursae<\/b><br><div class=\"table-responsive\"><table class=\"tb\"><tbody><tr><td><b>Anterior<\/b><\/td><td><ul><li>Subcutaneous prepatellar bursa; between patella and skin<\/li><li>Deep infrapatellar bursa; between tibia and patellar ligament<\/li><li>Subcutaneous infrapatellar bursa; between distal tibial tuberosity and skin<\/li><\/ul><\/td><\/tr><tr><td><b>Laterally<\/b><\/td><td><ul><li>Bursa between lateral head of gastrocnemius and joint capsule<\/li><li>Bursa between fibular collateral ligament and tendon of biceps femoris<\/li><li>Bursa between fibular collateral ligament and tendon of popliteus<\/li><\/ul><\/td><\/tr><tr><td><b>Medially<\/b><\/td><td><ul><li>Bursa between medial head of gastrocnemius and the fibrous capsule<\/li><li>Bursa between tibial collateral ligament and tendons of sartorius, gracilis and semitendinosus<\/li><li>Bursa between the tendon of semimembranosus and medial tibial condyle and medial head of gastrocnemius<\/li><\/ul><\/td><\/tr><tr><td><b>Posterior<\/b><\/td><td>Highly variable and inconsistent<\/td><\/tr><\/tbody><\/table><\/div> <br><b>Ligaments<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Medial collateral ligament<\/b><\/td><td>Medial epicondyle femur to medial tibial condyle: valgus stability<\/td><\/tr><tr><td><b>Lateral collateral ligament<\/b><\/td><td>Lateral epicondyle femur to fibula head: varus stability<\/td><\/tr><tr><td><b>Anterior cruciate ligament<\/b><\/td><td>Anterior tibia to lateral intercondylar notch femur: prevents tibia sliding anteriorly<\/td><\/tr><tr><td><b>Posterior cruciate ligament<\/b><\/td><td>Posterior tibia to medial intercondylar notch femur: prevents tibia sliding posteriorly<\/td><\/tr><tr><td><b>Patellar ligament<\/b><\/td><td>Central band of the tendon of quadriceps femoris, extends from patella to tibial tuberosity<\/td><\/tr><\/tbody><\/table><\/div><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb044b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb044.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Knee\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb044b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb045b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb045.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Knee\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb045b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/bbb008b.jpg\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/bbb008.jpg\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"><span style=\"font-size:11px; color:LightGray;\">© Image provided by the University of Sheffield<\/span><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/bbb008b.jpg\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center><b>Menisci<\/b><br>Medial and lateral menisci compensate for the incongruence of the femoral and tibial condyles.<br>Composed of fibrous tissue.<br>Medial meniscus is attached to the tibial collateral ligament.<br>Lateral meniscus is attached to the loose fibres at the lateral edge of the joint and is separate from the fibular collateral ligament. The lateral meniscus is crossed by the popliteus tendon.<br><br><b>Nerve supply<\/b><br>The knee joint is supplied by the femoral, tibial and common peroneal divisions of the sciatic and by a branch from the obturator nerve. Hip pathology pain may be referred to the knee.<br><br><b>Blood supply<\/b><br>Genicular branches of the femoral artery, popliteal and anterior tibial arteries all supply the knee joint."}, {"name": "Lacrimal apparatus", "questions": [{"number": 293, "topic": "Lacrimal apparatus", "stem_html": "What is the arterial blood supply to the lacrimal apparatus?", "options": [{"label_html": "Nasociliary artery", "is_correct": false}, {"label_html": "Supra orbital artery", "is_correct": false}, {"label_html": "Internal carotid artery", "is_correct": false}, {"label_html": "Ophthalmic artery", "is_correct": true}, {"label_html": "Supra trochlear artery", "is_correct": false}], "correct_index": 3, "explanation_html": "The ophthalmic artery supplies the gland"}], "note_html": "Comprises the lacrimal gland and its ducts, lacrimal canaliculi, lacrimal sac and naso lacrimal duct. It lies anteriorly in the superolateral region of the orbit and is divided into 2 parts by the levator palpebrae superioris. Numerous ducts empty glandular secretions into the lateral part of the superior fornix of the conjunctiva. The fluid so produced finally accumulates in the lacrimal lake from which it drains via the lacrimal canaliculi, one with each eyelid. Passing medially, the lacrimal canaliculi eventually join the lacrimal sac between the anterior and posterior lacrimal crests, posterior to the medial palpebral ligament and anterior to the lacrimal part of the orbicularis oculi muscle. When the orbicularis oculi muscle contracts during blinking, the small lacrimal part of the muscle dilates the lacrimal sac and draws tears into it.<br><br><b>Innervation<\/b><br>Secretomotor fibres from the parasympathetic nervous system. The preganglionic parasympathetic neurons leave the CNS in the facial nerve, enter the greater petrosal nerve and continue with this nerve until it becomes the nerve of the pterygoid canal. The nerve of the pterygoid canal eventually joins the pterygopalatine ganglion where the pre-ganglionic parasympathetic neurons synapse on post ganglionic parasympathetic neurons. The post ganglionic neurons join the maxillary nerve and continue with it until the zygomatic nerve branches from it, and travels with the zygomatic nerve until it gives off the zygomaticotemporal nerve which eventually distributes the post ganglionic parasympathetic fibres in a small branch that joins the lacrimal nerve. <br><br>Sympathetic innervation follows a similar path to the parasympathetic path described above. Post ganglionic sympathetic fibres originating in the superior cervical ganglion travel along the plexus surrounding the internal carotid. They leave this plexus as the deep petrosal nerve and join the parasympathetic fibres in the nerve of the pterygoid canal. Passing through the pterygopalatine ganglion, the parasympathetic fibres from this point onwards follow the same path as the parasympathetic fibres to the lacrimal gland.<br><br><b>Vessels<\/b><br>Arterial supply is from branches of the ophthalmic artery and venous drainage is to the ophthalmic veins"}, {"name": "Lacrimal system", "questions": [{"number": 294, "topic": "Lacrimal system", "stem_html": "A 25 year old man sustains a severe middle cranial fossa basal skull fracture. Once he has recovered it is noticed that he has impaired tear secretion. This is most likely to be the result of damage to which of the following?", "options": [{"label_html": "Stellate ganglion", "is_correct": false}, {"label_html": "Ciliary ganglion", "is_correct": false}, {"label_html": "Otic ganglion", "is_correct": false}, {"label_html": "Trigeminal nerve", "is_correct": false}, {"label_html": "Greater petrosal nerve", "is_correct": true}], "correct_index": 4, "explanation_html": "The greater petrosal nerve may be injured and carries fibres for lacrimation (see below)."}, {"number": 295, "topic": "Lacrimal system", "stem_html": "An 18 year old man is cutting some plants when a small piece of vegetable matter enters his eye. His eye becomes watery. Which of the following is responsible for relaying parasympathetic neuronal signals to the lacrimal apparatus?", "options": [{"label_html": "Pterygopalatine ganglion", "is_correct": true}, {"label_html": "Otic ganglion", "is_correct": false}, {"label_html": "Submandibular ganglion", "is_correct": false}, {"label_html": "Ciliary ganglion", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 0, "explanation_html": "The parasympathetic fibres to the lacrimal apparatus transit via the pterygopalatine ganglion."}], "note_html": "<b>Lacrimal gland<\/b><br>Consists of an orbital part and palpebral part. They are continuous posterolaterally around the concave lateral edge of the levator palpebrae superioris muscle.<br>The ducts of the lacrimal gland open into the superior fornix. Those from the orbital part penetrate the aponeurosis of levator palpebrae superioris to join those from the palpebral part. Therefore excision of the palpebral part is functionally similar to excision of the entire gland. <br><br><b>Blood supply<\/b><br>Lacrimal branch of the opthalmic artery. Venous drainage is to the superior opthalmic vein.<br><br><b>Innervation<\/b><br>The gland is innervated by the secretomotor parasympathetic fibres from the pterygopalatine ganglion which in turn may reach the gland via the zygomatic or lacrimal branches of the maxillary nerve or pass directly to the gland. The preganglionic fibres travel to the ganglion in the greater petrosal nerve (a branch of the facial nerve at the geniculate ganglion).<br><br><b>Nasolacrimal duct<\/b><br>Descends from the lacrimal sac to open anteriorly in the inferior meatus of the nose.<br><br><b>Lacrimation reflex<\/b><br>Occurs in response to conjunctival irritation (or emotional events). The conjunctiva will send signals via the opthalmic nerve. These then pass to the superior salivary centre. The efferent signals pass via the greater petrosal nerve (parasympathetic preganglionic fibres) and the deep petrosal nerve which carries the post ganglionic sympathetic fibres. The parasympathetic fibres will relay in the pterygopalatine ganglion, the sympathetic fibres do not synapse. They in turn will relay to the lacrimal apparatus."}, {"name": "Larynx", "questions": [{"number": 296, "topic": "Larynx", "stem_html": "Which of the following laryngeal tumours will not typically metastasise to the cervical lymph nodes?", "options": [{"label_html": "Glottic", "is_correct": true}, {"label_html": "Supraglottic", "is_correct": false}, {"label_html": "Subglottic", "is_correct": false}, {"label_html": "Transglottic", "is_correct": false}, {"label_html": "Aryepiglottic fold", "is_correct": false}], "correct_index": 0, "explanation_html": "The vocal cords have no lymphatic drainage and therefore this region serves as a lymphatic watershed. The supraglottic part drains to the upper deep cervical nodes through vessels piercing the thyrohyoid membrane. The sub glottic part drains to the pre laryngeal, pre tracheal and inferior deep cervical nodes. The aryepiglottic and vestibular folds have a rich lymphatic drainage and will metastasise early."}, {"number": 297, "topic": "Larynx", "stem_html": "Which of the following nerves conveys sensory information from the laryngeal mucosa?", "options": [{"label_html": "Glossopharyngeal", "is_correct": false}, {"label_html": "Laryngeal branches of the vagus", "is_correct": true}, {"label_html": "Ansa cervicalis", "is_correct": false}, {"label_html": "Laryngeal branches of the trigeminal", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 1, "explanation_html": "The laryngeal branches of the vagus supply sensory information from the larynx."}, {"number": 298, "topic": "Larynx", "stem_html": "Which of the following muscles is supplied by the external laryngeal nerve?", "options": [{"label_html": "Transverse arytenoid", "is_correct": false}, {"label_html": "Cricothyroid", "is_correct": true}, {"label_html": "Thyro-arytenoid", "is_correct": false}, {"label_html": "Posterior crico-arytenoid", "is_correct": false}, {"label_html": "Oblique arytenoid", "is_correct": false}], "correct_index": 1, "explanation_html": "The others are all supplied by the recurrent laryngeal nerve."}, {"number": 299, "topic": "Larynx", "stem_html": "Which of the following muscles is supplied by the external laryngeal nerve?", "options": [{"label_html": "Transverse arytenoid", "is_correct": false}, {"label_html": "Cricothyroid", "is_correct": true}, {"label_html": "Thyro-arytenoid", "is_correct": false}, {"label_html": "Posterior crico-arytenoid", "is_correct": false}, {"label_html": "Oblique arytenoid", "is_correct": false}], "correct_index": 1, "explanation_html": "The others are all supplied by the recurrent laryngeal nerve."}, {"number": 300, "topic": "Larynx", "stem_html": "The space between the vocal cords is referred to as which of the following?", "options": [{"label_html": "Piriform recess", "is_correct": false}, {"label_html": "Rima vestibuli", "is_correct": false}, {"label_html": "Vestibule", "is_correct": false}, {"label_html": "Vallecula", "is_correct": false}, {"label_html": "Rima glottidis", "is_correct": true}], "correct_index": 4, "explanation_html": "The rima glottidis is the narrowest part of the laryngeal cavity."}], "note_html": "The larynx lies in the anterior part of the neck at the levels of C3 to C6 vertebral bodies. The laryngeal skeleton consists of a number of cartilagenous segments. Three of these are paired; arytenoid, corniculate and cuneiform. Three are single; thyroid, cricoid and epiglottic. The cricoid cartilage forms a complete ring (the only one to do so). <br>The laryngeal cavity extends from the laryngeal inlet to the level of the inferior border of the cricoid cartilage. <br><br><b>Divisions of the laryngeal cavity<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Laryngeal vestibule<\/b><\/td><td>Superior to the vestibular folds<\/td><\/tr><tr><td><b>Laryngeal ventricle<\/b><\/td><td>Lies between vestibular folds and superior to the vocal cords<\/td><\/tr><tr><td><b>Infraglottic cavity<\/b><\/td><td>Extends from vocal cords to inferior border of the cricoid cartilage<\/td><\/tr><\/tbody><\/table><\/div><br>The vocal folds (true vocal cords) control sound production. The apex of each fold projects medially into the laryngeal cavity. Each vocal fold includes:<br><ul><li>Vocal ligament<\/li><li>Vocalis muscle (most medial part of thyroarytenoid muscle)<\/li><\/ul>The glottis is composed of the vocal folds, processes and rima glottidis. The rima glottidis is the narrowest potential site within the larynx, as the vocal cords may be completely opposed, forming a complete barrier. <br><br><b>Muscles of the larynx<\/b><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Muscle<\/b><\/th><th><b>Origin<\/b><\/th><th><b>Insertion<\/b><\/th><th><b>Innervation<\/b><\/th><th><b>Action<\/b><\/th><\/tr><\/thead><tbody><tr><td>Posterior cricoarytenoid<\/td><td>Posterior aspect of lamina of cricoid<\/td><td>Muscular process of arytenoid<\/td><td>Recurrent Laryngeal<\/td><td>Abducts vocal fold<\/td><\/tr><tr><td>Lateral cricoarytenoid<\/td><td>Arch of cricoid<\/td><td>Muscular process of arytenoid<\/td><td>Recurrent laryngeal<\/td><td>Adducts vocal fold<\/td><\/tr><tr><td>Thyroarytenoid<\/td><td>Posterior aspect of thyroid cartilage<\/td><td>Muscular process of arytenoid<\/td><td>Recurrent laryngeal<\/td><td>Relaxes vocal fold<\/td><\/tr><tr><td>Transverse and oblique arytenoids<\/td><td>Arytenoid cartilage<\/td><td>Contralateral arytenoid<\/td><td>Recurrent laryngeal<\/td><td>Closure of intercartilagenous part of the rima glottidis<\/td><\/tr><tr><td>Vocalis<\/td><td>Depression between lamina of thyroid cartilage<\/td><td>Vocal ligament and vocal process of arytenoid cartilage<\/td><td>Recurrent laryngeal<\/td><td>Relaxes posterior vocal ligament, tenses anterior part<\/td><\/tr><tr><td>Cricothyroid<\/td><td>Anterolateral part of cricoid<\/td><td>Inferior margin and horn of thyroid cartilage<\/td><td>External laryngeal<\/td><td>Tenses vocal fold<\/td><\/tr><\/tbody><\/table><\/div><br><b>Blood supply<\/b><br>Arterial supply is via the laryngeal arteries, branches of the superior and inferior thyroid arteries. The superior laryngeal artery is closely related to the internal laryngeal nerve. The inferior laryngeal artery is related to the inferior laryngeal nerve. Venous drainage is via superior and inferior laryngeal veins, the former draining into the superior thyroid vein and the latter draining into the middle thyroid vein, or thyroid venous plexus. <br><br><b>Lymphatic drainage<\/b><br>The vocal cords have no lymphatic drainage and this site acts as a lymphatic watershed.<br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Supraglottic part<\/b><\/td><td>Upper deep cervical nodes<\/td><\/tr><tr><td><b>Subglottic part<\/b><\/td><td>Prelaryngeal and pretracheal nodes and inferior deep cervical nodes<\/td><\/tr><\/tbody><\/table><\/div>The aryepiglottic fold and vestibular folds have a dense plexus of lymphatics associated with them and malignancies at these sites have a greater propensity for nodal metastasis.<br><br><br><i>Topography of the larynx<\/i><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb102b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb102.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Larynx\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb102b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}, {"name": "Lateral malleolus", "questions": [{"number": 301, "topic": "Lateral malleolus", "stem_html": "Which of the following structures does not pass behind the lateral malleolus?", "options": [{"label_html": "Peroneus brevis tendon", "is_correct": false}, {"label_html": "Sural nerve", "is_correct": false}, {"label_html": "Short saphenous vein", "is_correct": false}, {"label_html": "Peroneus longus tendon", "is_correct": fal
