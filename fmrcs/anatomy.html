se}, {"label_html": "Tibialis anterior tendon", "is_correct": true}], "correct_index": 4, "explanation_html": "Tibialis anterior tendon passes anterior to the medial malleolus."}, {"number": 302, "topic": "Lateral malleolus", "stem_html": "Which of the following structures does not pass anterior to the lateral malleolus?", "options": [{"label_html": "Anterior tibial artery", "is_correct": false}, {"label_html": "Extensor digitorum longus", "is_correct": false}, {"label_html": "Lateral branch of the superficial peroneal nerve", "is_correct": false}, {"label_html": "Peroneus brevis", "is_correct": true}, {"label_html": "Peroneus tertius", "is_correct": false}], "correct_index": 3, "explanation_html": "Peroneus brevis passes posterior to the lateral malleolus. Peroneus tertius is closely related to extensor digitorum and like that muscle, its tendon passes anterior to the lateral malleolus"}], "note_html": "<b>Structures posterior to the lateral malleolus and superficial to superior peroneal retinaculum<\/b><br><ul><li>Sural nerve <\/li><li>Short saphenous vein <\/li><\/ul><br><b>Structures posterior to the lateral malleolus and deep to superior peroneal retinaculum<\/b><br><ul><li>Peroneus longus tendon <\/li><li>Peroneus brevis tendon <\/li><\/ul><br>The calcaneofibular ligament is attached at the lateral malleolus"}, {"name": "Left colon", "questions": [{"number": 303, "topic": "Left colon", "stem_html": "A 56 year old lady is due to undergo a left hemicolectomy for carcinoma of the splenic flexure. The surgeons decide to perform a high ligation of the inferior mesenteric vein. Into which of the following does this structure usually drain?", "options": [{"label_html": "Portal vein", "is_correct": false}, {"label_html": "Inferior vena cava", "is_correct": false}, {"label_html": "Left renal vein", "is_correct": false}, {"label_html": "Left iliac vein", "is_correct": false}, {"label_html": "Splenic vein", "is_correct": true}], "correct_index": 4, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Beware of ureteric injury in colonic surgery.<\/div>The inferior mesenteric vein drains into the splenic vein, this point of union lies close to the duodenum and this surgical maneouvre is a recognised cause of ileus."}, {"number": 304, "topic": "Left colon", "stem_html": "A 62 year old man is undergoing a left hemicolectomy for carcinoma of the descending colon. The registrar commences mobilisation of the left colon by pulling downwards and medially. Blood soon appears in the left paracolic gutter. The most likely source of bleeding is the:", "options": [{"label_html": "Marginal artery", "is_correct": false}, {"label_html": "Left testicular artery", "is_correct": false}, {"label_html": "Spleen", "is_correct": true}, {"label_html": "Left renal vein", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 2, "explanation_html": "The spleen is commonly torn by traction injuries in colonic surgery. The other structures are associated with bleeding during colonic surgery but would not manifest themselves as blood in the paracolic gutter prior to incision of the paracolonic peritoneal edge."}], "note_html": "<b>Position<\/b><br><ul><li>As the left colon passes inferiorly its posterior aspect becomes extraperitoneal, and the ureter and gonadal vessels are close posterior relations that may become involved in disease processes<\/li><li>At a level of L3-4 (variable) the left colon becomes the sigmoid colon and wholly intraperitoneal once again<\/li><li>The sigmoid colon is a highly mobile structure and may even lie on the right side of the abdomen<\/li><li>It passes towards the midline, the taenia blend and this marks the transition between sigmoid colon and upper rectum <\/li><\/ul>   <br><b>Blood supply<\/b><br><ul><li>Inferior mesenteric artery<\/li><li>However, the marginal artery (from the right colon) contributes, this contribution becomes clinically significant when the IMA is divided surgically (e.g. During AAA repair)<\/li><\/ul>"}, {"name": "Levels", "questions": [{"number": 305, "topic": "Levels", "stem_html": "At which of the following levels does the inferior vena cava exit the abdominal cavity?", "options": [{"label_html": "T6", "is_correct": false}, {"label_html": "T7", "is_correct": false}, {"label_html": "T10", "is_correct": false}, {"label_html": "T8", "is_correct": true}, {"label_html": "T12", "is_correct": false}], "correct_index": 3, "explanation_html": "<p>No explanation provided.<\/p>"}, {"number": 306, "topic": "Levels", "stem_html": "At what level does the aorta bifurcate into the left and right common iliac arteries?", "options": [{"label_html": "L1", "is_correct": false}, {"label_html": "L2", "is_correct": false}, {"label_html": "L3", "is_correct": false}, {"label_html": "L4", "is_correct": true}, {"label_html": "L5", "is_correct": false}], "correct_index": 3, "explanation_html": "The aorta typically bifurcates at L4. This level is usually fairly constant and is often tested in the exam."}, {"number": 307, "topic": "Levels", "stem_html": "Which of the following structures is not at the level of the transpyloric plane?", "options": [{"label_html": "Hilum left kidney", "is_correct": false}, {"label_html": "Superior mesenteric artery", "is_correct": false}, {"label_html": "Fundus of the gallbladder", "is_correct": false}, {"label_html": "Cardioesophageal junction", "is_correct": true}, {"label_html": "Root of transverse mesocolon", "is_correct": false}], "correct_index": 3, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Cardiooesophageal junction level = T11<\/div>A knowledge of this anatomic level is commonly tested.<br>The oesophagus extends from C6 (the lower border of the cricoid cartilage) to T11 at the cardioesophageal junction.  Note that in the neonate the oesophagus extends from C4 or C5 to T9."}, {"number": 308, "topic": "Levels", "stem_html": "Which of the following pairings are incorrect?", "options": [{"label_html": "Aortic bifurcation and L4", "is_correct": false}, {"label_html": "Transpyloric plane and L1", "is_correct": false}, {"label_html": "Termination of dural sac and L4", "is_correct": true}, {"label_html": "Oesophageal passage through diaphragm and T10", "is_correct": false}, {"label_html": "Transition between pharynx and oesophagus at C6", "is_correct": false}], "correct_index": 2, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">                                          Vena cava T8 (eight letters)<br>                                          Oesophagus T10 (ten letters)<br>                                          Aortic hiatus T12 (twelve letters)<\/div>The dura terminates at S2. The spinal cord terminates at L1, which is why it's safe to undertake an LP at L4/5."}, {"number": 309, "topic": "Levels", "stem_html": "Two teenagers are playing with an airgun when one accidentally shoots his friend in the abdomen. He is brought to the emergency department. On examination, there is a bullet entry point immediately to the right of the rectus sheath at the level of the 1st lumbar vertebra. Which of the following structures is most likely to be injured by the bullet?", "options": [{"label_html": "Head of pancreas", "is_correct": false}, {"label_html": "Right ureter", "is_correct": false}, {"label_html": "Right adrenal gland", "is_correct": false}, {"label_html": "Fundus of the gallbladder", "is_correct": true}, {"label_html": "Gastric antrum", "is_correct": false}], "correct_index": 3, "explanation_html": "The fundus of the gallbladder lies at this level and is the most superficially located structure."}, {"number": 310, "topic": "Levels", "stem_html": "Two teenagers are playing with an airgun when one accidentally shoots his friend in the abdomen. He is brought to the emergency department. On examination, there is a bullet entry point immediately to the right of the rectus sheath at the level of the 1st lumbar vertebra. Which of the following structures is most likely to be injured by the bullet?", "options": [{"label_html": "Head of pancreas", "is_correct": false}, {"label_html": "Right ureter", "is_correct": false}, {"label_html": "Right adrenal gland", "is_correct": false}, {"label_html": "Fundus of the gallbladder", "is_correct": true}, {"label_html": "Gastric antrum", "is_correct": false}], "correct_index": 3, "explanation_html": "The fundus of the gallbladder lies at this level and is the most superficially located structure."}, {"number": 311, "topic": "Levels", "stem_html": "A 73 year old lady is admitted with brisk rectal bleeding. Despite attempts at resuscitation the bleeding proceeds to cause haemodynamic compromise. An upper GI endoscopy is normal. A mesenteric angiogram is performed and a contrast blush is seen in the region of the sigmoid colon. The radiologist decides to embolise the vessel supplying this area. At what spinal level does it leave the aorta?", "options": [{"label_html": "L2", "is_correct": false}, {"label_html": "L1", "is_correct": false}, {"label_html": "L4", "is_correct": false}, {"label_html": "L3", "is_correct": true}, {"label_html": "T10", "is_correct": false}], "correct_index": 3, "explanation_html": "The inferior mesenteric artery leaves the aorta at L3. It supplies the left colon and sigmoid. Its proximal continuation to communicate with the middle colic artery is via the marginal artery."}, {"number": 312, "topic": "Levels", "stem_html": "A 22 year old man is involved in a fight outside a nightclub. He is stabbed in the back, on the left side, approximately 3cm below the 12th rib in the mid scapular line. The structure most likely to be injured first as a result is the:", "options": [{"label_html": "Spleen", "is_correct": false}, {"label_html": "Left kidney", "is_correct": true}, {"label_html": "Left adrenal gland", "is_correct": false}, {"label_html": "Left ureter", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 1, "explanation_html": "The left kidney lies in this location and is the most likely structure to be injured. The Spleen lies more superiorly, and the left adrenal and ureter are unlikely to be injured in isolation."}], "note_html": "<b>Transpyloric plane<\/b><br>Level of the body of L1<br><br><ul><li>Pylorus stomach<\/li><li>Left kidney hilum (L1- left one!)<\/li><li>Fundus of the gallbladder <\/li><li>Neck of pancreas <\/li><li>Duodenojejunal flexure<\/li><li>Superior mesenteric artery <\/li><li>Portal vein<\/li><li>Left and right colic flexure <\/li><li>Root of the transverse mesocolon <\/li><li>2nd part of the duodenum <\/li><li>Upper part of conus medullaris<\/li><li>Spleen <\/li><\/ul><br>Can be identified by asking the supine patient to sit up without using their arms. The plane is located where the lateral border of the rectus muscle crosses the costal margin.<br><br><b>Anatomical planes<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Subcostal plane<\/b><\/td><td>Lowest margin of 10th costal cartilage<\/td><\/tr><tr><td><b>Intercristal plane<\/b><\/td><td>Level of body L4 (highest point of iliac crest)<\/td><\/tr><tr><td><b>Intertubercular plane<\/b><\/td><td>Level of body L5<\/td><\/tr><\/tbody><\/table><\/div><br><b>Common level landmarks<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Inferior mesenteric artery<\/b><\/td><td>L3<\/td><\/tr><tr><td><b>Bifurcation of aorta into common iliac arteries<\/b><\/td><td>L4<\/td><\/tr><tr><td><b> Formation of IVC<\/b><\/td><td>L5 (union of common iliac veins)<\/td><\/tr><tr><td><b>Diaphragm apertures<\/b><\/td><td><ul><li>Vena cava T8<\/li><li>Oesophagus T10 <\/li><li>Aortic hiatus T12<\/li><\/ul><\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Liver", "questions": [{"number": 313, "topic": "Liver", "stem_html": "Mobilisation of the left lobe of the liver will facilitate surgical access to which of the following?", "options": [{"label_html": "Abdominal oesophagus", "is_correct": true}, {"label_html": "Duodenum", "is_correct": false}, {"label_html": "Right colic flexure", "is_correct": false}, {"label_html": "Right kidney", "is_correct": false}, {"label_html": "Pylorus of stomach", "is_correct": false}], "correct_index": 0, "explanation_html": "The fundus of the stomach is a posterior relation. The pylorus lies more inferolaterally. During a total gastrectomy division of the ligaments holding the left lobe of the liver will facilitate access to the proximal stomach and abdominal oesophagus. This manoeuvre is seldom beneficial during a distal gastrectomy."}, {"number": 314, "topic": "Liver", "stem_html": "A 23 year old man is stabbed in the chest approximately 10cm below the right nipple. In the emergency department a abdominal ultrasound scan shows a large amount of intraperitoneal blood. Which of the following statements relating to the likely site of injury is untrue?", "options": [{"label_html": "Part of its posterior surface is devoid of peritoneum.", "is_correct": false}, {"label_html": "The quadrate lobe is contained within the functional right lobe.", "is_correct": true}, {"label_html": "Its nerve supply is from the coeliac plexus.", "is_correct": false}, {"label_html": "The hepatic flexure of the colon lies posterio-inferiorly.", "is_correct": false}, {"label_html": "The right kidney is closely related posteriorly.", "is_correct": false}], "correct_index": 1, "explanation_html": "The right lobe of the liver is the most likely site of injury. Therefore the answer is B as the quadrate lobe is functionally part of the left lobe of the liver. The liver is largely covered in peritoneum. Posteriorly there is an area devoid of peritoneum (the bare area of the liver). The right lobe of the liver has the largest bare area (and is larger than the left lobe)."}, {"number": 315, "topic": "Liver", "stem_html": "Which of the following is not a content of the porta hepatis?", "options": [{"label_html": "Portal vein", "is_correct": false}, {"label_html": "Hepatic artery", "is_correct": false}, {"label_html": "Cystic duct", "is_correct": true}, {"label_html": "Lymph nodes", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 2, "explanation_html": "The cystic duct lies outside the porta hepatis and is an important landmark in laparoscopic cholecystectomy. The structures in the porta hepatis are:<br><ul><li>Portal vein<\/li><li>Hepatic artery<\/li><li>Common hepatic duct<\/li><\/ul>These structures divide immediately after or within the porta hepatis to supply the functional left and right lobes of the liver.<br>The porta hepatis is also surrounded by lymph nodes, that may enlarge to produce obstructive jaundice and parasympathetic nervous fibres that travel along vessels to enter the liver."}, {"number": 316, "topic": "Liver", "stem_html": "Surgical occlusion of which of these structures, will result in the greatest reduction in hepatic blood flow?", "options": [{"label_html": "Portal vein", "is_correct": true}, {"label_html": "Common hepatic artery", "is_correct": false}, {"label_html": "Right hepatic artery", "is_correct": false}, {"label_html": "Coeliac axis", "is_correct": false}, {"label_html": "Left hepatic artery", "is_correct": false}], "correct_index": 0, "explanation_html": "The portal vein transports 70% of the blood supply to the liver, while the hepatic artery provides 30%.  The portal vein contains the products of digestion.  The arterial and venous blood is dispersed by sinusoids to the central veins of the liver lobules; these drain into the hepatic veins and then into the IVC. The caudate lobe drains directly into the IVC rather than into other hepatic veins."}, {"number": 317, "topic": "Liver", "stem_html": "Which of the following options in relation to the liver is true?", "options": [{"label_html": "Ligamentum venosum is an anterior relation of the liver", "is_correct": false}, {"label_html": "The portal triad comprises the hepatic artery, hepatic vein and tributary of the bile duct", "is_correct": false}, {"label_html": "The liver is completely covered by peritoneum", "is_correct": false}, {"label_html": "There are no nerves within the porta hepatis", "is_correct": false}, {"label_html": "The caudate lobe is superior to the porta hepatis", "is_correct": true}], "correct_index": 4, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">'VC goes with VC'<br><br>The ligamentun Venosum and Caudate is on same side as Vena Cava [posterior].<\/div>Ligamentum venosum is posterior to the liver.  The portal triad contains the portal vein rather than the hepatic vein.  There is the 'bare area of the liver' created by a void due to the coronary ligament layers being widely separated.  There are sympathetic and parasympathetic nerves in the porta hepatis."}, {"number": 318, "topic": "Liver", "stem_html": "Which of the following structures lies most posteriorly at the porta hepatis?", "options": [{"label_html": "Cystic artery", "is_correct": false}, {"label_html": "Common hepatic artery", "is_correct": false}, {"label_html": "Left hepatic artery", "is_correct": false}, {"label_html": "Portal vein", "is_correct": true}, {"label_html": "Common bile duct", "is_correct": false}], "correct_index": 3, "explanation_html": "The portal vein is the most posterior structure at the porta hepatis.The common bile duct is a continuation of the common hepatic duct and is formed by the union of the common hepatic duct and the cystic duct."}, {"number": 319, "topic": "Liver", "stem_html": "During a liver resection a surgeon performs a pringles manoeuvre to control bleeding. Which of the following structures will lie posterior to the epiploic foramen at this level?", "options": [{"label_html": "Hepatic artery", "is_correct": false}, {"label_html": "Cystic duct", "is_correct": false}, {"label_html": "Greater omentum", "is_correct": false}, {"label_html": "Superior mesenteric artery", "is_correct": false}, {"label_html": "Inferior vena cava", "is_correct": true}], "correct_index": 4, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Bleeding from liver trauma or a difficult cholecystectomy can be controlled with a vascular clamp applied at the epiploic foramen.<\/div>The epiploic foramen has the following boundaries:<br><b>Anteriorly<\/b> (in the free edge of the lesser omentum): Bile duct to the right, portal vein behind and hepatic artery to the left.<br><b>Posteriorly<\/b>Inferior vena cava<br><b>Inferiorly<\/b>1st part of the duodenum<br><b>Superiorly<\/b>Caudate process of the liver"}], "note_html": "<b>Structure of the liver<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Right lobe<\/b><\/td><td><ul><li>Supplied by right hepatic artery<\/li><li>Contains Couinaud segments V to VIII (-/+Sg I)<\/li><\/ul><\/td><\/tr><tr><td><b>Left lobe<\/b><\/td><td><ul><li>Supplied by the left hepatic artery<\/li><li>Contains Couinaud segments II to IV (+/- Sg1)<\/li><\/ul><\/td><\/tr><tr><td><b>Quadrate lobe<\/b><\/td><td><ul><li>Part of the right lobe anatomically, functionally is part of the left<\/li><li>Couinaud segment IV<\/li><li>Porta hepatis lies behind<\/li><li>On the right lies the gallbladder fossa<\/li><li>On the left lies the fossa for the umbilical vein<\/li><\/ul><\/td><\/tr><tr><td><b>Caudate lobe<\/b><\/td><td><ul><li>Supplied by both right and left hepatic arteries<\/li><li>Couinaud segment I<\/li><li>Lies superior to the porta hepatis<\/li><li>Anterior and medial to the inferior vena cava<\/li><li>Bile from the caudate lobe drains into both right and left hepatic ducts<\/li><\/ul><\/td><\/tr><\/tbody><\/table><\/div><br><i>Detailed knowledge of Couinaud segments is not required for MRCS<\/i><br><ul><li>Between the liver lobules are portal canals which contain the portal triad: Hepatic Artery, Portal Vein, tributary of Bile Duct.<\/li><\/ul><br><br><b>Relations of the liver<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Anterior<\/b><\/td><td><b>Postero inferiorly<\/b><\/td><\/tr><tr><td>Diaphragm<\/td><td>Oesophagus<\/td><\/tr><tr><td>Xiphoid process<\/td><td>Stomach<\/td><\/tr><tr><td><\/td><td>Duodenum<\/td><\/tr><tr><td><\/td><td>Hepatic flexure of colon<\/td><\/tr><tr><td><\/td><td>Right kidney<\/td><\/tr><tr><td><\/td><td>Gallbladder<\/td><\/tr><tr><td><\/td><td>Inferior vena cava<\/td><\/tr><\/tbody><\/table><\/div><br><b>Porta hepatis<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Location<\/b><\/td><td>Postero inferior surface, it joins nearly at right angles with the left sagittal fossa, and separates the caudate lobe behind from the quadrate lobe in front<\/td><\/tr><tr><td><b>Transmits<\/b><\/td><td><ul><li>Common hepatic duct<\/li><li>Hepatic artery<\/li><li>Portal vein<\/li><li>Sympathetic and parasympathetic nerve fibres<\/li><li>Lymphatic drainage of the liver (and nodes)<\/li><\/ul><\/td><\/tr><\/tbody><\/table><\/div><br><b>Ligaments<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Falciform ligament<\/b><\/td><td><ul><li>2 layer fold peritoneum from the umbilicus to anterior liver surface<\/li><li>Contains ligamentum teres (remnant umbilical vein)<\/li><li>On superior liver surface it splits into the coronary and left triangular ligaments<\/li><\/ul><\/td><\/tr><tr><td><b>Ligamentum teres<\/b><\/td><td>Joins the left branch of the portal vein in the porta hepatis<\/td><\/tr><tr><td><b>Ligamentum venosum<\/b><\/td><td>Remnant of ductus venosus<\/td><\/tr><\/tbody><\/table><\/div><br><b>Arterial supply<\/b><br><ul><li>Hepatic artery<\/li><\/ul><br><b>Venous<\/b><br><ul><li>Hepatic veins<\/li><li>Portal vein<\/li><\/ul><br><b>Nervous supply<\/b><br><ul><li>Sympathetic and parasympathetic trunks of coeliac plexus<\/li><\/ul>"}, {"name": "Long thoracic nerve", "questions": [{"number": 320, "topic": "Long thoracic nerve", "stem_html": "A 42 year old lady has had an axillary node clearance for breast malignancy.  Post operatively she reports weakness of the shoulder.  She is unable to push herself forwards from a wall with the right arm and the scapula is pushed out medially from the chest wall.  What is the most likely nerve injury?", "options": [{"label_html": "C5, C6", "is_correct": false}, {"label_html": "C8, T1", "is_correct": false}, {"label_html": "Axillary nerve", "is_correct": false}, {"label_html": "Long thoracic nerve", "is_correct": true}, {"label_html": "Spinal accessory nerve", "is_correct": false}], "correct_index": 3, "explanation_html": "The patient has a winged scapula caused by damage to the long thoracic nerve (C5,6,7) during surgery.  The long thoracic nerve innervates serratus anterior.  Serratus anterior causes pushing out of the scapula during a punch.<br><br>NB winging of the scapular laterally may indicate trapezius muscle weakness. Innervated by the spinal accessory nerve."}, {"number": 321, "topic": "Long thoracic nerve", "stem_html": "A 42 year old lady has had an axillary node clearance for breast malignancy.  Post operatively she reports weakness of the shoulder.  She is unable to push herself forwards from a wall with the right arm and the scapula is pushed out medially from the chest wall.  What is the most likely nerve injury?", "options": [{"label_html": "C5, C6", "is_correct": false}, {"label_html": "C8, T1", "is_correct": false}, {"label_html": "Axillary nerve", "is_correct": false}, {"label_html": "Long thoracic nerve", "is_correct": true}, {"label_html": "Spinal accessory nerve", "is_correct": false}], "correct_index": 3, "explanation_html": "The patient has a winged scapula caused by damage to the long thoracic nerve (C5,6,7) during surgery.  The long thoracic nerve innervates serratus anterior.  Serratus anterior causes pushing out of the scapula during a punch.<br><br>NB winging of the scapular laterally may indicate trapezius muscle weakness. Innervated by the spinal accessory nerve."}, {"number": 322, "topic": "Long thoracic nerve", "stem_html": "A woman develops winging of the scapula following a Patey mastectomy. What is the most likely cause?", "options": [{"label_html": "Division of pectoralis minor to access level 3 axillary nodes", "is_correct": false}, {"label_html": "Damage to the brachial plexus during axillary dissection", "is_correct": false}, {"label_html": "Damage to the long thoracic nerve during axillary dissection", "is_correct": true}, {"label_html": "Division of the thoracodorsal trunk during axillary dissection", "is_correct": false}, {"label_html": "Damage to the thoracodorsal trunk during axillary dissection", "is_correct": false}], "correct_index": 2, "explanation_html": "The serratus anterior muscle is supplied by the long thoracic nerve which runs along the surface of serratus anterior and is liable to injury during nodal dissection.  Although pectoralis minor is divided during a Patey mastectomy (now seldom performed) it is rare for this alone to produce winging of the scapula."}, {"number": 323, "topic": "Long thoracic nerve", "stem_html": "A 53 year old lady is recovering following a difficult mastectomy and axillary nodal clearance for carcinoma of the breast. She complains of shoulder pain and on examination has obvious winging of the scapula. Loss of innervation to which of the following is the most likely underlying cause?", "options": [{"label_html": "Latissimus dorsi", "is_correct": false}, {"label_html": "Serratus anterior", "is_correct": true}, {"label_html": "Pectoralis minor", "is_correct": false}, {"label_html": "Pectoralis major", "is_correct": false}, {"label_html": "Rhomboids", "is_correct": false}], "correct_index": 1, "explanation_html": "Winging of the scapula is most commonly the result of long thoracic nerve injury or dysfunction. Iatrogenic damage during the course of the difficult axillary dissection is the most likely cause in this scenario. Damage to the rhomboids may produce winging of the scapula but would be rare in the scenario given."}], "note_html": "<ul><li>Derived from ventral rami of C5, C6, and C7 (close to their emergence from intervertebral foramina)<\/li><li>It runs downward and passes either anterior or posterior to the middle scalene muscle <\/li><li>It reaches upper tip of serratus anterior muscle and descends on outer surface of this muscle, giving branches into it<\/li><li>Winging of Scapula occurs in long thoracic nerve injury (most common) or from spinal accessory nerve injury (which denervates the trapezius) or a dorsal scapular nerve injury <\/li><\/ul>"}, {"name": "Lower limb- Muscular compartments", "questions": [{"number": 324, "topic": "Lower limb- Muscular compartments", "stem_html": "Which of the following is not contained within the deep posterior compartment of the lower leg?", "options": [{"label_html": "Tibialis posterior muscle", "is_correct": false}, {"label_html": "Posterior tibial artery", "is_correct": false}, {"label_html": "Tibial nerve", "is_correct": false}, {"label_html": "Sural nerve", "is_correct": true}, {"label_html": "Flexor hallucis longus", "is_correct": false}], "correct_index": 3, "explanation_html": "The deep posterior compartment lies anterior to soleus. The sural nerve is superficially sited and therefore not contained within it."}, {"number": 325, "topic": "Lower limb- Muscular compartments", "stem_html": "A 24 year old motor cyclist is involved in a road traffic accident. He suffers a tibial fracture which is treated with an intra medullary nail. Post operatively he develops a compartment syndrome. Surgical decompression of the anterior compartment will relieve pressure on all of the following muscles except?", "options": [{"label_html": "Peroneus brevis", "is_correct": true}, {"label_html": "Peroneus tertius", "is_correct": false}, {"label_html": "Extensor digitorum longus", "is_correct": false}, {"label_html": "Tibialis anterior", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 0, "explanation_html": "The anterior compartment contains:<br>Tibialis anterior<br>Extensor digitorum longus<br>Peroneus tertius <br>Extensor hallucis longus<br>Anterior tibial artery<br>All the muscles are innervated by the deep peroneal nerve."}, {"number": 326, "topic": "Lower limb- Muscular compartments", "stem_html": "A 48 year old motor cyclist sustains a complex lower limb fracture in a motor accident. For a time the popliteal artery is occluded and eventually repaired. Subsequently he develops a compartment syndrome and the anterior and superficial posterior compartments of the lower leg are decompressed. Unfortunately, the operating surgeon neglects to decompress the deep posterior compartment. Which of the following muscles is least likely to be affected as a result?", "options": [{"label_html": "Flexor digitorum longus", "is_correct": false}, {"label_html": "Plantaris", "is_correct": true}, {"label_html": "Tibialis posterior", "is_correct": false}, {"label_html": "Flexor hallucis longus", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 1, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Muscles of the deep posterior compartment:<br><ul><li>Tibialis posterior<\/li><li>Flexor hallucis longus<\/li><li>Flexor digitorum longus<\/li><li>Popliteus<\/li><\/ul><\/div>The plantaris muscle lies within the superficial posterior compartment of the lower leg."}], "note_html": "<b>Anterior compartment<\/b><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Muscle<\/b><\/th><th><b>Nerve<\/b><\/th><th><b>Action<\/b><\/th><\/tr><\/thead><tbody><tr><td>Tibialis anterior<\/td><td>Deep peroneal nerve<\/td><td>Dorsiflexes ankle joint, inverts foot<\/td><\/tr><tr><td>Extensor digitorum longus<\/td><td>Deep peroneal nerve<\/td><td>Extends lateral four toes, dorsiflexes ankle joint<\/td><\/tr><tr><td>Peroneus tertius<\/td><td>Deep peroneal nerve<\/td><td>Dorsiflexes ankle, everts foot<\/td><\/tr><tr><td>Extensor hallucis longus<\/td><td>Deep peroneal nerve<\/td><td>Dorsiflexes ankle joint, extends big toe<\/td><\/tr><\/tbody><\/table><\/div><br><b>Peroneal compartment<\/b><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid2\"><thead><tr><th><b>Muscle<\/b><\/th><th><b>Nerve<\/b><\/th><th><b>Action<\/b><\/th><\/tr><\/thead><tbody><tr><td>Peroneus longus<\/td><td>Superficial peroneal nerve<\/td><td>Everts foot, assists in plantar flexion<\/td><\/tr><tr><td>Peroneus brevis<\/td><td>Superficial peroneal nerve<\/td><td>Plantar flexes the ankle joint<\/td><\/tr><\/tbody><\/table><\/div><br><b>Superficial posterior compartment<\/b><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid3\"><thead><tr><th><b><muscle< b=\"\"><\/muscle<><\/b><\/th><th><b>Nerve<\/b><\/th><th><b>Action<\/b><\/th><\/tr><\/thead><tbody><tr><td>Gastrocnemius<\/td><td>Tibial nerve<\/td><td>Plantar flexes the foot, may also flex the knee<\/td><\/tr><tr><td>Soleus<\/td><td>Tibial nerve<\/td><td>Plantar flexor<\/td><\/tr><\/tbody><\/table><\/div><br><b>Deep posterior compartment<\/b><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid4\"><thead><tr><th><b>Muscle<\/b><\/th><th><b>Nerve<\/b><\/th><th><b>Action<\/b><\/th><\/tr><\/thead><tbody><tr><td>Flexor digitorum longus<\/td><td>Tibial<\/td><td>Flexes the lateral four toes<\/td><\/tr><tr><td>Flexor hallucis longus<\/td><td>Tibial<\/td><td>Flexes the great toe<\/td><\/tr><tr><td>Tibialis posterior<\/td><td>Tibial<\/td><td>Plantar flexor, inverts the foot<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Lumbar puncture", "questions": [{"number": 327, "topic": "Lumbar puncture", "stem_html": "A 19 year old female is admitted with suspected meningitis.  The House Officer is due to perform a lumbar puncture.  What is the most likely structure first encountered when the needle is inserted?", "options": [{"label_html": "Ligamentum flavum", "is_correct": false}, {"label_html": "Denticulate ligament", "is_correct": false}, {"label_html": "Dural sheath", "is_correct": false}, {"label_html": "Pia Mater", "is_correct": false}, {"label_html": "Supraspinous ligament", "is_correct": true}], "correct_index": 4, "explanation_html": "<p>No explanation provided.<\/p>"}], "note_html": "Lumbar punctures are performed to obtain cerebrospinal fluid.  In adults, the procedure is best performed at the level of L3/L4 or L4/5 interspace.  These regions are below the termination of the spinal cord at L1.<br><br>During the procedure the needle passes through:<br><ul><li>The supraspinous ligament which connects the tips of spinous processes and the interspinous ligaments between adjacent borders of spinous processes<\/li><li>Then the needle passes through the ligamentum flavum, which may cause a give as it is penetrated<\/li><li>A second give represents penetration of the needle through the dura mater into the subarachnoid space.  Clear CSF should be obtained at this point<\/li><\/ul><br><b>References<\/b><br>Boon <i>et al<\/i> Lumbar Puncture: Anatomical Review of a Clinical Skill.  <i>Clinical Anatomy<\/i> 17:544553 (2004)"}, {"name": "Lung anatomy", "questions": [{"number": 328, "topic": "Lung anatomy", "stem_html": "A 28 year old man is shot in the right chest and develops a right haemothorax necessitating a thoracotomy. The surgeons decide to place a vascular clamp across the hilum of the right lung. Which of the following structures will lie most anteriorly at this point?", "options": [{"label_html": "Thoracic duct", "is_correct": false}, {"label_html": "Phrenic nerve", "is_correct": true}, {"label_html": "Vagus nerve", "is_correct": false}, {"label_html": "Pulmonary artery", "is_correct": false}, {"label_html": "Pulmonary vein", "is_correct": false}], "correct_index": 1, "explanation_html": "The phrenic nerve lies anteriorly at the root of the right lung."}, {"number": 329, "topic": "Lung anatomy", "stem_html": "A 23 year old man is shot in the chest during a robbery. The left lung is lacerated and is bleeding. An emergency thoracotomy is performed. The surgeons place a clamp over the hilum of the left lung. Which of the following structures lies most anteriorly at this level?", "options": [{"label_html": "Vagus nerve", "is_correct": false}, {"label_html": "Oesophagus", "is_correct": false}, {"label_html": "Descending aorta", "is_correct": false}, {"label_html": "Phrenic nerve", "is_correct": true}, {"label_html": "Azygos vein", "is_correct": false}], "correct_index": 3, "explanation_html": "The phrenic nerve lies anteriorly at this point. The vagus passes anteriorly and then arches backwards immediately superior to the root of the left bronchus, giving off the recurrent laryngeal nerve as it does so."}, {"number": 330, "topic": "Lung anatomy", "stem_html": "A 72 year old man with carcinoma of the lung is undergoing a left pneumonectomy. The left main bronchus is divided. Which of the following thoracic vertebrae lies posterior to this structure?", "options": [{"label_html": "T3", "is_correct": false}, {"label_html": "T7", "is_correct": false}, {"label_html": "T6", "is_correct": true}, {"label_html": "T10", "is_correct": false}, {"label_html": "T1", "is_correct": false}], "correct_index": 2, "explanation_html": "The left main bronchus lies at T6. Topographical anatomy of the thorax is important as it helps surgeons to predict the likely structures to be injured in trauma scenarios (so popular with examiners)"}, {"number": 331, "topic": "Lung anatomy", "stem_html": "How many fissures are present within the right lung?", "options": [{"label_html": "One", "is_correct": false}, {"label_html": "Three", "is_correct": false}, {"label_html": "Two", "is_correct": true}, {"label_html": "Four", "is_correct": false}, {"label_html": "Five", "is_correct": false}], "correct_index": 2, "explanation_html": "The right lung has an oblique and horizontal fissure. The upper oblique fissure separates the inferior from the middle and upper lobes. The short horizontal fissure separates the superior and middle lobes."}, {"number": 332, "topic": "Lung anatomy", "stem_html": "How many fissures are present within the right lung?", "options": [{"label_html": "One", "is_correct": false}, {"label_html": "Three", "is_correct": false}, {"label_html": "Two", "is_correct": true}, {"label_html": "Four", "is_correct": false}, {"label_html": "Five", "is_correct": false}], "correct_index": 2, "explanation_html": "The right lung has an oblique and horizontal fissure. The upper oblique fissure separates the inferior from the middle and upper lobes. The short horizontal fissure separates the superior and middle lobes."}, {"number": 333, "topic": "Lung anatomy", "stem_html": "Which of the following fascial structures encases the apex of the lungs?", "options": [{"label_html": "Waldeyers fascia", "is_correct": false}, {"label_html": "Sibsons fascia", "is_correct": true}, {"label_html": "Pretracheal fascia", "is_correct": false}, {"label_html": "Clavipectoral fascia", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 1, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Sibson's fascia overlies the apices of both lungs<\/div>The suprapleural fascia (Sibson's fascia) runs from C7 to the first rib and overlies the apex of both lungs.It lies between the parietal pleura and the thoracic cage."}, {"number": 334, "topic": "Lung anatomy", "stem_html": "A 33 year old man is stabbed in the right chest and undergoes a thoracotomy. The right lung is mobilised and the pleural reflection at the lung hilum is opened. Which of the structures listed below does not lie within this region?", "options": [{"label_html": "Pulmonary artery", "is_correct": false}, {"label_html": "Azygos vein", "is_correct": true}, {"label_html": "Pulmonary vein", "is_correct": false}, {"label_html": "Bronchus", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 1, "explanation_html": "The pleural reflections encase the hilum of the lung and continue inferiorly as the pulmonary ligament. It encases the pulmonary vessels and bronchus. The azygos vein is not contained within it."}, {"number": 335, "topic": "Lung anatomy", "stem_html": "A 72 year old man is undergoing a left pneumonectomy for carcinoma of the bronchus. As the surgeons approach the root of the lung, which structure will lie most anteriorly (in the anatomical plane)?", "options": [{"label_html": "Vagus nerve", "is_correct": false}, {"label_html": "Phrenic nerve", "is_correct": true}, {"label_html": "Bronchus", "is_correct": false}, {"label_html": "Pulmonary vein", "is_correct": false}, {"label_html": "Pulmonary artery", "is_correct": false}], "correct_index": 1, "explanation_html": "The phrenic nerve is the most anteriorly located structure in the lung root. The vagus nerve lies most posteriorly."}, {"number": 336, "topic": "Lung anatomy", "stem_html": "A 63 year old man is undergoing a right pneumonectomy for carcinoma of the bronchus. As the surgeons approach the root of the lung, which structure will lie most posteriorly (in the anatomical plane)?", "options": [{"label_html": "Phrenic nerve", "is_correct": false}, {"label_html": "Main bronchus", "is_correct": false}, {"label_html": "Vagus nerve", "is_correct": true}, {"label_html": "Pulmonary vein", "is_correct": false}, {"label_html": "Pulmonary artery", "is_correct": false}], "correct_index": 2, "explanation_html": "The vagus nerve is the most posteriorly located structure at the lung root. The phrenic nerve lies most anteriorly."}, {"number": 337, "topic": "Lung anatomy", "stem_html": "A 5 year old boy is playing with some small ball bearings. Unfortunately, he inhales one. To which of the following lung regions is the ball most likely to settle?", "options": [{"label_html": "Right lower lobe", "is_correct": true}, {"label_html": "Left main bronchus", "is_correct": false}, {"label_html": "Right upper lobe", "is_correct": false}, {"label_html": "Left lower lobe", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 0, "explanation_html": "As the most dependent part of the right lung a small object is most likely to lodge here. Most objects will preferentially enter the right lung owing to the angle the right main bronchus takes from the trachea."}], "note_html": "The right lung is composed of 3 lobes divided by the oblique and transverse fissures. The left lung has two lobes divided by the oblique fissure.The apex of both lungs is approximately 4cm superior to the sterno-costal joint of the first rib. Immediately below this is a sulcus created by the subclavian artery.  <br><br><b>Peripheral contact points of the lung<\/b><br><ul><li>Base: diaphragm<\/li><li>Costal surface: corresponds to the cavity of the chest<\/li><li>Mediastinal surface:  Contacts the mediastinal pleura. Has the cardiac impression.  Above and behind this concavity is a triangular depression named the hilum, where the structures which form the root of the lung enter and leave the viscus. These structures are invested by pleura, which, below the hilum and behind the pericardial impression, forms the pulmonary ligament<\/li><\/ul><br><b>Right lung<\/b><br>Above the hilum is the azygos vein; Superior to this is the groove for the superior vena cava and right innominate vein; behind this, and nearer the apex, is a furrow for the innominate artery. Behind the hilum and the attachment of the pulmonary ligament is a vertical groove for the oesophagus; In front and to the right of the lower part of the oesophageal groove is a deep concavity for the extrapericardiac portion of the inferior vena cava. <br><br>The root of the right lung lies behind the superior vena cava and the right atrium, and below the azygos vein. <br><br>The right main bronchus is shorter, wider and more vertical than the left main bronchus and therefore the route taken by most foreign bodies.<br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb302b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb302.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Right lung\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb302b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center><br><b>Left lung<\/b><br>Above the hilum is the furrow produced by the aortic arch, and then superiorly the groove accommodating the left subclavian artery; Behind the hilum and pulmonary ligament is a vertical groove produced by the descending aorta, and in front of this, near the base of the lung, is the lower part of the oesophagus.<br><br>The root of the left lung passes under the aortic arch and in front of the descending aorta.<br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb301b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb301.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Left lung\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb301b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center><br><b>Inferior borders of both lungs<\/b><br><ul><li>6th rib in mid clavicular line<\/li><li>8th rib in mid axillary line<\/li><li>10th rib posteriorly<\/li><\/ul>The pleura runs two ribs lower than the corresponding lung level.<br><br><b>Bronchopulmonary segments<\/b><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Segment number<\/b><\/th><th><b>Right lung<\/b><\/th><th><b>Left lung<\/b><\/th><\/tr><\/thead><tbody><tr><td>1<\/td><td>Apical<\/td><td>Apical<\/td><\/tr><tr><td>2<\/td><td>Posterior<\/td><td>Posterior<\/td><\/tr><tr><td>3<\/td><td>Anterior<\/td><td>Anterior<\/td><\/tr><tr><td>4<\/td><td>Lateral<\/td><td>Superior lingular<\/td><\/tr><tr><td>5<\/td><td>Medial<\/td><td>Inferior lingular<\/td><\/tr><tr><td>6<\/td><td>Superior (apical)<\/td><td>Superior (apical)<\/td><\/tr><tr><td>7<\/td><td>Medial basal<\/td><td>Medial basal<\/td><\/tr><tr><td>8<\/td><td>Anterior basal<\/td><td>Anterior basal<\/td><\/tr><tr><td>9<\/td><td>Lateral basal<\/td><td>Lateral basal<\/td><\/tr><tr><td>10<\/td><td>Posterior basal<\/td><td>Posterior basal<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Lymphatic drainage of the auricle", "questions": [{"number": 338, "topic": "Lymphatic drainage of the auricle", "stem_html": "A 73 year old man develops a lesion affecting the lobule of his ear. Into which of the following lymph node groups will the lesion drain?", "options": [{"label_html": "Deep cervical", "is_correct": false}, {"label_html": "Superficial cervical", "is_correct": true}, {"label_html": "Retroauricular nodes", "is_correct": false}, {"label_html": "Occipital nodes", "is_correct": false}, {"label_html": "Internal jugular nodes", "is_correct": false}], "correct_index": 1, "explanation_html": "The lobule of the ear drains to the superficial cervical nodes."}], "note_html": "<b>Lymphatic Drainage<\/b><br><ul><li>The lateral surface of the upper half drains to the superficial parotid lymph nodes<\/li><li>The cranial surface of the superior half drains to the mastoid nodes and deep cervical lymph nodes<\/li><li>The lower half and lobule drain into the superficial cervical lymph nodes.<\/li><\/ul>"}, {"name": "Lymphatic drainage of the ovaries, uterus and cervix", "questions": [{"number": 339, "topic": "Lymphatic drainage of the ovaries, uterus and cervix", "stem_html": "A 63 year old lady is diagnosed as having an endometrial carcinoma arising from the uterine body. To which nodal region will the tumour initially metastasise?", "options": [{"label_html": "Para aortic nodes", "is_correct": false}, {"label_html": "Iliac lymph nodes", "is_correct": true}, {"label_html": "Inguinal nodes", "is_correct": false}, {"label_html": "Pre sacral nodes", "is_correct": false}, {"label_html": "Mesorectal lymph nodes", "is_correct": false}], "correct_index": 1, "explanation_html": "Tumours of the uterine body will tend to spread to the iliac nodes initially. Tumour expansion crossing different nodal margins this is of considerable clinical significance, if nodal clearance is performed during a Wertheims type hysterectomy."}, {"number": 340, "topic": "Lymphatic drainage of the ovaries, uterus and cervix", "stem_html": "What is the lymphatic drainage of the ovaries?", "options": [{"label_html": "Internal iliac nodes", "is_correct": false}, {"label_html": "Common iliac nodes", "is_correct": false}, {"label_html": "Para-aortic nodes", "is_correct": true}, {"label_html": "Para uterine nodes", "is_correct": false}, {"label_html": "Inguinal nodes", "is_correct": false}], "correct_index": 2, "explanation_html": "The lymphatic drainage of the ovary follows the gonadal vessels and drainage is therefore to the para-aortic nodes."}], "note_html": "<ul><li>The ovaries drain to the para-aortic lymphatics via the gonadal vessels.<\/li><li>The uterine fundus has a lymphatic drainage that runs with the ovarian vessels and may thus drain to the para-aortic nodes. Some drainage may also pass along the round ligament to the inguinal nodes.<\/li><li>The body of the uterus drains through lymphatics contained within the broad ligament to the iliac lymph nodes.<\/li><li>The cervix drains into three potential nodal stations; laterally through the broad ligament to the external iliac nodes, along the lymphatics of the uterosacral fold to the presacral nodes and posterolaterally along lymphatics lying alongside the uterine vessels to the internal iliac nodes.<\/li><\/ul>"}, {"name": "Lymphatic drainage of the tongue", "questions": [{"number": 341, "topic": "Lymphatic drainage of the tongue", "stem_html": "A 73 year old man presents with a tumour at the central aspect of the posterior third of the tongue. To which of the following lymph node groups is it most likely to metastasise?", "options": [{"label_html": "Submental", "is_correct": false}, {"label_html": "Submandibular", "is_correct": false}, {"label_html": "Ipsilateral deep cervical nodes", "is_correct": false}, {"label_html": "Contralateral deep cervical nodes", "is_correct": false}, {"label_html": "Bilateral deep cervical nodes", "is_correct": true}], "correct_index": 4, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Posterior third tumours of the tongue commonly metastasise to the bilateral deep cervical lymph nodes<\/div>Tumours of the posterior third of the tongue will typically metastasise early and bilateral nodal involvement is well recognised, this is most often true of centrally located tumours and those adjacent to the midline as the lymph vessels may cross the median plane at this location."}, {"number": 342, "topic": "Lymphatic drainage of the tongue", "stem_html": "A 73 year old man presents with a tumour at the tip of his tongue. To which of the following regions will the tumour initially metastasise?", "options": [{"label_html": "Sub mental nodes", "is_correct": true}, {"label_html": "Ipsilateral deep cervical nodes", "is_correct": false}, {"label_html": "Tonsil", "is_correct": false}, {"label_html": "Ipsilateral superficial cervical nodes", "is_correct": false}, {"label_html": "Contralateral deep cervical nodes", "is_correct": false}], "correct_index": 0, "explanation_html": "<p>No explanation provided.<\/p>"}, {"number": 343, "topic": "Lymphatic drainage of the tongue", "stem_html": "A 73 year old man presents with a tumour at the tip of his tongue. To which of the following regions will the tumour initially metastasise?", "options": [{"label_html": "Sub mental nodes", "is_correct": true}, {"label_html": "Ipsilateral deep cervical nodes", "is_correct": false}, {"label_html": "Tonsil", "is_correct": false}, {"label_html": "Ipsilateral superficial cervical nodes", "is_correct": false}, {"label_html": "Contralateral deep cervical nodes", "is_correct": false}], "correct_index": 0, "explanation_html": "<p>No explanation provided.<\/p>"}], "note_html": "- The lymphatic drainage of the anterior two thirds of the tongue shows only minimal communication of lymphatics across the midline, so metastasis to the ipsilateral nodes is usual. <br><ul><li>The lymphatic drainage of the posterior third of the tongue have communicating networks, as a result early bilateral nodal metastases are more common in this area. <\/li><li>Lymphatics from the tip of the tongue usually pass to the sub mental nodes and from there to the deep cervical nodes.<\/li><li>Lymphatics from the mid portion of the tongue usually drain to the submandibular nodes and then to the deep cervical nodes. Mid tongue tumours that are laterally located will usually drain to the ipsilateral deep cervical nodes, those from more central regions may have bilateral deep cervical nodal involvement.<\/li><\/ul>"}, {"name": "Lymphatic drainage of the vagina", "questions": [{"number": 344, "topic": "Lymphatic drainage of the vagina", "stem_html": "The superior aspect of the vagina drains to which of the following lymph node groups?", "options": [{"label_html": "Superficial inguinal nodes", "is_correct": false}, {"label_html": "Para-aortic nodes", "is_correct": false}, {"label_html": "Iliac nodes", "is_correct": true}, {"label_html": "Meso rectal nodes", "is_correct": false}, {"label_html": "Obturator nodes", "is_correct": false}], "correct_index": 2, "explanation_html": "<p>No explanation provided.<\/p>"}], "note_html": "The lymph vessels from the superior aspect of the vagina join the internal and external iliac nodes, those from the inferior aspect of the vagina drain to the superficial inguinal nodes."}, {"name": "Medial malleolus", "questions": [{"number": 345, "topic": "Medial malleolus", "stem_html": "Which of the following structures does not pass posteriorly to the medial malleolus?", "options": [{"label_html": "Posterior tibial artery", "is_correct": false}, {"label_html": "Tibial nerve", "is_correct": false}, {"label_html": "Tibialis anterior tendon", "is_correct": true}, {"label_html": "Tendon of flexor digitorum longus", "is_correct": false}, {"label_html": "Tendon of flexor hallucis longus", "is_correct": false}], "correct_index": 2, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Mnemonic for structures posterior to the medial malleolus:<br><br>Tom Dick And Nervous Harry<br><br>T ibialis posterior tendon<br>flexor Digitorum longus<br>A rtery<br>N erve<br>H allucis longus<\/div>"}], "note_html": "The following structures pass posterior to medial malleolus (in order):<br><br><ul><li>Tibialis posterior tendon<\/li><li>Flexor digitorum longus tendon<\/li><li>Posterior tibial artery<\/li><li>Tibial nerve<\/li><li>Tendon of flexor hallucis longus<\/li><\/ul>"}, {"name": "Median nerve", "questions": [{"number": 346, "topic": "Median nerve", "stem_html": "A 22 year old man is involved in a fight and sustains a stab wound in his upper forearm. On examination there is a small, but deep laceration. There is an obvious loss of pincer movement involving the thumb and index finger with minimal loss of sensation.  The most likely nerve injury is to the:", "options": [{"label_html": "Ulnar nerve", "is_correct": false}, {"label_html": "Radial nerve", "is_correct": false}, {"label_html": "Anterior interosseous nerve", "is_correct": true}, {"label_html": "Axillary nerve", "is_correct": false}, {"label_html": "Median nerve", "is_correct": false}], "correct_index": 2, "explanation_html": "The anterior interosseous nerve is a motor branch of the median nerve just below the elbow. When damaged it classically causes:<br><ul><li>Pain in the forearm<\/li><li>Loss of pincer movement of the thumb and index finger (innervates the long flexor muscles of flexor pollicis longus &amp; flexor digitorum profundus of the index and middle finger)<\/li><li>Minimal loss of sensation due to lack of a cutaneous branch<\/li><\/ul>"}, {"number": 347, "topic": "Median nerve", "stem_html": "A 21 year old man is stabbed in the antecubital fossa. A decision is made to surgically explore the wound. At operation, the surgeon dissects down onto the brachial artery. A nerve is identified medially, which nerve is it likely to be?", "options": [{"label_html": "Radial", "is_correct": false}, {"label_html": "Recurrent branch of median", "is_correct": false}, {"label_html": "Anterior interosseous", "is_correct": false}, {"label_html": "Ulnar", "is_correct": false}, {"label_html": "Median", "is_correct": true}], "correct_index": 4, "explanation_html": "<p>No explanation provided.<\/p>"}, {"number": 348, "topic": "Median nerve", "stem_html": "Which of the muscles listed below is not innervated by the median nerve?", "options": [{"label_html": "Flexor pollicis brevis", "is_correct": false}, {"label_html": "Lateral two lumbricals", "is_correct": false}, {"label_html": "Pronator teres", "is_correct": false}, {"label_html": "Opponens pollicis", "is_correct": false}, {"label_html": "Adductor pollicis", "is_correct": true}], "correct_index": 4, "explanation_html": "Adductor pollicis is innervated by the ulnar nerve.<br>Medial two lumbricals innervated by the ulnar nerve."}, {"number": 349, "topic": "Median nerve", "stem_html": "A 23 year old rugby player sustains a Smiths Fracture. On examination, opposition of the thumb is markedly weakened. Which of the following nerves is least likely to be working normally?", "options": [{"label_html": "Ulnar", "is_correct": false}, {"label_html": "Median", "is_correct": true}, {"label_html": "Radial", "is_correct": false}, {"label_html": "Musculocutaneous", "is_correct": false}, {"label_html": "Palmar cutaneous", "is_correct": false}], "correct_index": 1, "explanation_html": "This high velocity injury can often produce significant angulation and displacement. Both of these may impair the function of the median nerve with loss of function of the muscles of the thenar eminence."}, {"number": 350, "topic": "Median nerve", "stem_html": "An 8 year old boy falls onto an outstretched hand and sustains a supracondylar fracture. In addition to a weak radial pulse the child is noted to have loss of pronation of the affected hand. Which nerve is compromised?", "options": [{"label_html": "Median", "is_correct": true}, {"label_html": "Radial", "is_correct": false}, {"label_html": "Ulnar", "is_correct": false}, {"label_html": "Musculocutaneous", "is_correct": false}, {"label_html": "Axillary", "is_correct": false}], "correct_index": 0, "explanation_html": "This is a common injury in children. In this case the angulation and displacement have resulted in median nerve injury."}, {"number": 351, "topic": "Median nerve", "stem_html": "Which of the following nerves supplies the majority of the skin on the palmar aspect of the thumb?", "options": [{"label_html": "Ulnar", "is_correct": false}, {"label_html": "Median", "is_correct": true}, {"label_html": "Radial", "is_correct": false}, {"label_html": "Musculocutaneous", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 1, "explanation_html": "The median nerve supplies cutaneous sensation to this region."}, {"number": 352, "topic": "Median nerve", "stem_html": "Which nerve supplies sensation to the nail bed of the index finger?", "options": [{"label_html": "Median", "is_correct": true}, {"label_html": "Ulnar", "is_correct": false}, {"label_html": "Radial", "is_correct": false}, {"label_html": "Musculocutaneous", "is_correct": false}, {"label_html": "Axillary", "is_correct": false}], "correct_index": 0, "explanation_html": "<p>No explanation provided.<\/p>"}, {"number": 353, "topic": "Median nerve", "stem_html": "A 53 year old lady presents with pain and discomfort in her hand. She works as a typist and notices that the pain is worst when she is working. She also suffers symptoms at night. Her little finger is less affected by the pain. Which of the nerves listed below is most likely to be affected?", "options": [{"label_html": "Radial", "is_correct": false}, {"label_html": "Median", "is_correct": true}, {"label_html": "Ulnar", "is_correct": false}, {"label_html": "Anterior interosseous nerve", "is_correct": false}, {"label_html": "Posterior interosseous nerve", "is_correct": false}], "correct_index": 1, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Motor supply:  LOAF <br><br>L ateral 2 lumbricals<br>O pponens pollicis<br>A bductor pollicisbrevis<br>F lexor pollicis brevis<\/div>The most likely diagnosis here is carpal tunnel syndrome, the median nerve is compressed in the wrist and symptoms usually affect the fingers and wrist either at night or when the hand is being used (e.g. as a typist)."}, {"number": 354, "topic": "Median nerve", "stem_html": "A 53 year old lady presents with pain and discomfort in her hand. She works as a typist and notices that the pain is worst when she is working. She also suffers symptoms at night. Her little finger is less affected by the pain. Which of the nerves listed below is most likely to be affected?", "options": [{"label_html": "Radial", "is_correct": false}, {"label_html": "Median", "is_correct": true}, {"label_html": "Ulnar", "is_correct": false}, {"label_html": "Anterior interosseous nerve", "is_correct": false}, {"label_html": "Posterior interosseous nerve", "is_correct": false}], "correct_index": 1, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Motor supply:  LOAF <br><br>L ateral 2 lumbricals<br>O pponens pollicis<br>A bductor pollicisbrevis<br>F lexor pollicis brevis<\/div>The most likely diagnosis here is carpal tunnel syndrome, the median nerve is compressed in the wrist and symptoms usually affect the fingers and wrist either at night or when the hand is being used (e.g. as a typist)."}, {"number": 355, "topic": "Median nerve", "stem_html": "A 43 year old man is stabbed outside a nightclub. He suffers a transection of his median nerve just as it leaves the brachial plexus. Which of these features is least likely to ensue?", "options": [{"label_html": "Ulnar deviation of the wrist", "is_correct": false}, {"label_html": "Complete loss of wrist flexion", "is_correct": true}, {"label_html": "Loss of pronation", "is_correct": false}, {"label_html": "Loss of flexion at the thumb joint", "is_correct": false}, {"label_html": "Inability to oppose the thumb", "is_correct": false}], "correct_index": 1, "explanation_html": "Loss of the median nerve will result in loss of function of the flexor muscles. However, flexor carpi ulnaris will still function and produce ulnar deviation and some residual wrist flexion. High median nerve lesions result in complete loss of flexion at the thumb joint."}, {"number": 356, "topic": "Median nerve", "stem_html": "A 28 year old man is stabbed outside a nightclub in the upper arm. The median nerve is transected. Which of the following muscles will demonstrate impaired function as a result?", "options": [{"label_html": "Palmaris brevis", "is_correct": false}, {"label_html": "Second and third interossei", "is_correct": false}, {"label_html": "Adductor pollicis", "is_correct": false}, {"label_html": "Abductor pollicis longus", "is_correct": false}, {"label_html": "Abductor pollicis brevis", "is_correct": true}], "correct_index": 4, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Palmaris brevis - Ulnar nerve<br>Palmar interossei- Ulnar nerve<br>Adductor pollicis - Ulnar nerve<br>Abductor pollicis longus - Posterior interosseous nerve<br>Abductor pollicis brevis - Median nerve<\/div>The median nerve innervates all the short muscles of the thumb except the adductor and the deep head of the short flexor. Palmaris and the interossei are innervated by the ulnar nerve."}], "note_html": "The median nerve is formed by the union of a lateral and medial root respectively from the lateral (C5,6,7) and medial (C8 and T1) cords of the brachial plexus; the medial root passes anterior to the third part of the axillary artery. The nerve descends lateral to the brachial artery, crosses to its medial side (usually passing anterior to the artery). It passes deep to the bicipital aponeurosis and the median cubital vein at the elbow. <br>It passes between the two heads of the pronator teres muscle, and runs on the deep surface of flexor digitorum superficialis (within its fascial sheath). <br>Near the wrist it becomes superficial between the tendons of flexor digitorum superficialis and flexor carpi radialis, deep to palmaris longus tendon. It passes deep to the flexor retinaculum to enter the palm, but lies anterior to the long flexor tendons within the carpal tunnel. <br><br><b>Branches<\/b><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Region<\/b><\/th><th><b>Branch<\/b><\/th><\/tr><\/thead><tbody><tr><td>Upper arm<\/td><td>No branches, although the nerve commonly communicates with the musculocutaneous nerve<\/td><\/tr><tr><td>Forearm<\/td><td>Pronator teres<br>Pronator quadratus<br>Flexor carpi radialis<br>Palmaris longus<br>Flexor digitorum superficialis<br>Flexor pollicis longus<br>Flexor digitorum profundus (only the radial half)<\/td><\/tr><tr><td>Distal forearm<\/td><td>Palmar cutaneous branch<\/td><\/tr><tr><td>Hand (Motor)<\/td><td>Motor supply (LOAF)<br><ul><li>Lateral 2 lumbricals<\/li><li>Opponens pollicis<\/li><li>Abductor pollicis brevis<\/li><li>Flexor pollicis brevis<\/li><\/ul><\/td><\/tr><tr><td>Hand (Sensory)<\/td><td><ul><li>Over thumb and lateral 2 ½ fingers<\/li><li>On the palmar aspect this projects proximally, on the dorsal aspect only the distal regions are innervated with the radial nerve providing the more proximal cutaneous innervation.<\/li><\/ul><\/td><\/tr><\/tbody><\/table><\/div><br><b>Patterns of damage<\/b><br>Damage at wrist<br><ul><li>e.g. carpal tunnel syndrome<\/li><li>paralysis and wasting of thenar eminence muscles and opponens pollicis (ape hand deformity)<\/li><li>sensory loss to palmar aspect of lateral (radial) 2 ½ fingers<\/li><\/ul><br>Damage at elbow, as above plus:<br><ul><li>unable to pronate forearm<\/li><li>weak wrist flexion<\/li><li>ulnar deviation of wrist<\/li><\/ul><br>Anterior interosseous nerve (branch of median nerve)<br><ul><li>leaves just below the elbow<\/li><li>results in loss of pronation of forearm and weakness of long flexors of thumb and index finger<\/li><\/ul><br><i>Topography of the median nerve<\/i><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb303b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb303.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Median nerve\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb303b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}, {"name": "Mediastinum", "questions": [{"number": 357, "topic": "Mediastinum", "stem_html": "A patient with myasthenia gravis is referred for a thymectomy. What is the embryological origin of the thymus gland?", "options": [{"label_html": "First pharyngeal pouch", "is_correct": false}, {"label_html": "First pharyngeal arch", "is_correct": false}, {"label_html": "Third pharyngeal pouch", "is_correct": true}, {"label_html": "Thyroglossal duct", "is_correct": false}, {"label_html": "Rathke's pouch", "is_correct": false}], "correct_index": 2, "explanation_html": "The thymus is formed from portions of the third pharyngeal pouch. The ventral wings of the third pouch fuse to form the cytoreticular cells of the thymus. The dorsal components form the inferior parathyroid glands."}, {"number": 358, "topic": "Mediastinum", "stem_html": "During a gangland gunfight a man is shot in the chest. The bullet passes through the posterior mediastinum (from left to right). Which of the following structures is least likely to be injured", "options": [{"label_html": "Thoracic duct", "is_correct": false}, {"label_html": "Oesophagus", "is_correct": false}, {"label_html": "Vagus nerve", "is_correct": false}, {"label_html": "Descending thoracic aorta", "is_correct": false}, {"label_html": "Arch of the azygos vein", "is_correct": true}], "correct_index": 4, "explanation_html": "The arch of the azygos vein lies in the middle mediastinum."}, {"number": 359, "topic": "Mediastinum", "stem_html": "A man is stabbed in the chest to the right of the manubriosternal angle. Which structure is least likely to be injured in this case?", "options": [{"label_html": "Right pleura", "is_correct": false}, {"label_html": "The trachea", "is_correct": false}, {"label_html": "Right phrenic nerve", "is_correct": false}, {"label_html": "Right recurrent laryngeal nerve", "is_correct": true}, {"label_html": "Brachiocephalic vein", "is_correct": false}], "correct_index": 3, "explanation_html": "The right recurrent laryngeal nerve branches off the right vagus more proximally and arches posteriorly round the subclavian artery. So of the structures given it is the least likely to be injured."}, {"number": 360, "topic": "Mediastinum", "stem_html": "Which of the following is not contained within the middle mediastinum?", "options": [{"label_html": "Main bronchi", "is_correct": false}, {"label_html": "Arch of the azygos vein", "is_correct": false}, {"label_html": "Thoracic duct", "is_correct": true}, {"label_html": "Pericardium", "is_correct": false}, {"label_html": "Aortic root", "is_correct": false}], "correct_index": 2, "explanation_html": "The thoracic duct lies within the posterior and superior mediastinum."}, {"number": 361, "topic": "Mediastinum", "stem_html": "Which of the structures listed below are not located within the mediastinum?", "options": [{"label_html": "Thymus", "is_correct": false}, {"label_html": "Heart", "is_correct": false}, {"label_html": "Great vessels", "is_correct": false}, {"label_html": "Arch of azygos vein", "is_correct": false}, {"label_html": "Vertebral bodies", "is_correct": true}], "correct_index": 4, "explanation_html": "The vertebral bodies lie outside of the mediastinum, as do the lungs."}, {"number": 362, "topic": "Mediastinum", "stem_html": "A 63 year old man is undergoing an upper GI endoscopy for dysphagia. At 33 cm (from the incisors) a malignant looking stricture is encountered. The endoscopist attempts a balloon dilatation.Unfortunately the tumour splits through the oesophageal wall. Into which region will the oesophageal contents now drain?", "options": [{"label_html": "Superior mediastinum", "is_correct": false}, {"label_html": "Posterior mediastinum", "is_correct": true}, {"label_html": "Middle mediastinum", "is_correct": false}, {"label_html": "Anterior mediastinum", "is_correct": false}, {"label_html": "Peritoneal cavity", "is_correct": false}], "correct_index": 1, "explanation_html": "At this position the oesophagus is still likely to be intrathoracic and located in the posterior mediastinum."}], "note_html": "Region between the pulmonary cavities.<br>It is covered by the mediastinal pleura. It does not contain the lungs.<br>It extends from the thoracic inlet superiorly to the diaphragm inferiorly.<br><br><b>Mediastinal regions<\/b><br><ul><li>Superior mediastinum (between manubriosternal angle and T4/5)<\/li><li>Middle mediastinum<\/li><li>Posterior mediastinum<\/li><li>Anterior mediastinum<\/li><\/ul><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Region<\/b><\/th><th><b>Contents<\/b><\/th><\/tr><\/thead><tbody><tr><td><b>Superior mediastinum<\/b><\/td><td><ul><li>Superior vena cava<\/li><li>Brachiocephalic veins<\/li><li>Arch of aorta<\/li><li>Thoracic duct<\/li><li>Trachea<\/li><li>Oesophagus<\/li><li>Thymus<\/li><li>Vagus nerve<\/li><li>Left recurrent laryngeal nerve<\/li><li>Phrenic nerve<\/li><\/ul><\/td><\/tr><tr><td><b>Anterior mediastinum<\/b><\/td><td><ul><li>Thymic remnants<\/li><li>Lymph nodes<\/li><li>Fat<\/li><\/ul><\/td><\/tr><tr><td><b>Middle mediastinum<\/b><\/td><td><ul><li>Pericardium<\/li><li>Heart<\/li><li>Aortic root<\/li><li>Arch of azygos vein<\/li><li>Main bronchi<\/li><\/ul><\/td><\/tr><tr><td><b>Posterior mediastinum<\/b><\/td><td><ul><li>Oesophagus<\/li><li>Thoracic aorta<\/li><li>Azygos vein<\/li><li>Thoracic duct<\/li><li>Vagus nerve<\/li><li>Sympathetic nerve trunks<\/li><li>Splanchnic nerves<\/li><\/ul><\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Middle meningeal artery", "questions": [{"number": 363, "topic": "Middle meningeal artery", "stem_html": "A 22 year old man sustains a blow to the side of his head with a baseball bat during a fight. He is initially conscious. However, he subsequently loses consciousness and then dies. Post mortem examination shows an extradural haematoma. The most likely culprit vessel is a branch of which of the following?", "options": [{"label_html": "Middle cerebral artery", "is_correct": false}, {"label_html": "Internal carotid artery", "is_correct": false}, {"label_html": "Anterior cerebral artery", "is_correct": false}, {"label_html": "Maxillary artery", "is_correct": true}, {"label_html": "Mandibular artery", "is_correct": false}], "correct_index": 3, "explanation_html": "The middle meningeal artery is the most likely source of the extradural haematoma in this setting. It is a branch of the maxillary artery. The middle cerebral artery does not give rise to the middle meningeal artery. Note that the question is asking for the vessel which gives rise to the middle meningeal artery ('the likely culprit vessel <i>is a branch of which of the following<\/i>')"}, {"number": 364, "topic": "Middle meningeal artery", "stem_html": "A 22 year old man is involved in a fight and sustains a skull fracture with an injury to the middle meningeal artery. A craniotomy is performed, and with considerable difficulty the haemorrhage from the middle meningeal artery is controlled by ligating it close to its origin. What is the most likely sensory impairment that the patient may notice post operatively?", "options": [{"label_html": "Parasthesia of the ipsilateral external ear", "is_correct": true}, {"label_html": "Loss of taste sensation from the anterior two thirds of the tongue", "is_correct": false}, {"label_html": "Parasthesia overlying the angle of the jaw", "is_correct": false}, {"label_html": "Loss of sensation from the ipsilateral side of the tongue", "is_correct": false}, {"label_html": "Loss of taste from the posterior two thirds of the tongue", "is_correct": false}], "correct_index": 0, "explanation_html": "The auriculotemporal nerve is closely related to the middle meningeal artery and may be damaged in this scenario. The nerve supplies sensation to the external ear and outermost part of the tympanic membrane. The angle of the jaw is innervated by C2,3 roots and would not be affected. The posterior third of the tongue is supplied by the glossopharyngeal nerve."}, {"number": 365, "topic": "Middle meningeal artery", "stem_html": "A 22 year old man is involved in a fight and sustains a skull fracture with an injury to the middle meningeal artery. A craniotomy is performed, and with considerable difficulty the haemorrhage from the middle meningeal artery is controlled by ligating it close to its origin. What is the most likely sensory impairment that the patient may notice post operatively?", "options": [{"label_html": "Parasthesia of the ipsilateral external ear", "is_correct": true}, {"label_html": "Loss of taste sensation from the anterior two thirds of the tongue", "is_correct": false}, {"label_html": "Parasthesia overlying the angle of the jaw", "is_correct": false}, {"label_html": "Loss of sensation from the ipsilateral side of the tongue", "is_correct": false}, {"label_html": "Loss of taste from the posterior two thirds of the tongue", "is_correct": false}], "correct_index": 0, "explanation_html": "The auriculotemporal nerve is closely related to the middle meningeal artery and may be damaged in this scenario. The nerve supplies sensation to the external ear and outermost part of the tympanic membrane. The angle of the jaw is innervated by C2,3 roots and would not be affected. The posterior third of the tongue is supplied by the glossopharyngeal nerve."}, {"number": 366, "topic": "Middle meningeal artery", "stem_html": "A 22 year old man is kicked in the head during a rugby match. He is temporarily concussed, but then regains consciousness.  Half an hour later he develops slurred speech, ataxia and loses consciousnesses. On arrival in hospital he is intubated and ventilated. A CT Scan is performed which shows an extradural haematoma. What is the most likely cause?", "options": [{"label_html": "Basilar artery laceration", "is_correct": false}, {"label_html": "Middle meningeal artery laceration", "is_correct": true}, {"label_html": "Laceration of the sigmoid sinus", "is_correct": false}, {"label_html": "Laceration of the anterior cerebral artery", "is_correct": false}, {"label_html": "Laceration of the middle cerebral artery", "is_correct": false}], "correct_index": 1, "explanation_html": "The most likely vessel from those in the list to cause an acute extra dural haemorrhage is the middle meningeal artery. The anterior and middle cerebral arteries may cause acute sub dural haemorrhage. Acute sub dural haemorrhages usually take slightly longer to evolve than acute extra dural haemorrhages."}], "note_html": "<ul><li>Middle meningeal artery is typically the third branch of the first part of the maxillary artery, one of the two terminal branches of the external carotid artery. After branching off the maxillary artery in the infratemporal fossa, it runs through the foramen spinosum to supply the dura mater (the outermost meninges) . <\/li><li>The middle meningeal artery is the largest of the three (paired) arteries which supply the meninges, the others being the anterior meningeal artery and the posterior meningeal artery.<\/li><li>The middle meningeal artery runs beneath the pterion. It is vulnerable to injury at this point, where the skull is thin. Rupture of the artery may give rise to an extra dural hematoma. <\/li><li>In the dry cranium, the middle meningeal, which runs within the dura mater surrounding the brain, makes a deep indention in the calvarium.<\/li><li>The middle meningeal artery is intimately associated with the auriculotemporal nerve which wraps around the artery making the two easily identifiable in the dissection of human cadavers and also easily damaged in surgery.<\/li><\/ul>"}, {"name": "Musculocutaneous nerve", "questions": [{"number": 367, "topic": "Musculocutaneous nerve", "stem_html": "In the distal third of the upper arm, where is the musculocutaneous nerve located?", "options": [{"label_html": "Between the biceps brachii and brachialis muscles", "is_correct": true}, {"label_html": "Between the brachialis and brachioradialis muscles", "is_correct": false}, {"label_html": "Between the brachioradialis and triceps muscles", "is_correct": false}, {"label_html": "Between the brachialis and triceps muscles", "is_correct": false}, {"label_html": "Between the humerus and brachialis muscles", "is_correct": false}], "correct_index": 0, "explanation_html": "The musculocutaneous nerve lies between the biceps and brachialis muscles."}, {"number": 368, "topic": "Musculocutaneous nerve", "stem_html": "Which of these muscles is supplied by the musculocutaneous nerve?", "options": [{"label_html": "Brachialis", "is_correct": true}, {"label_html": "Latissimus dorsi", "is_correct": false}, {"label_html": "Flexor carpi ulnaris", "is_correct": false}, {"label_html": "Teres minor", "is_correct": false}, {"label_html": "Triceps", "is_correct": false}], "correct_index": 0, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Mnemonic<br><br>Muscles innervated by the musculocutaneous nerve BBC:<br><br>Biceps brachii <br>Brachialis <br>Coracobrachialis<\/div>"}, {"number": 369, "topic": "Musculocutaneous nerve", "stem_html": "A well toned weight lifter attends clinic reporting weakness of his left arm. There is weakness of flexion and supination of the
