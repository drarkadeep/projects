 class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/bbb040b.jpg\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/bbb040.jpg\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"><span style=\"font-size:11px; color:LightGray;\">© Image provided by the University of Sheffield<\/span><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/bbb040b.jpg\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center><br><b>Pelvic ligaments<\/b><br>The pelvic bony structures are interconnected by a series of ligaments. These assume clinical significance during pregnancy and childbirth as they develop increased laxity at this time.<br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/bbb041b.jpg\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/bbb041.jpg\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"><span style=\"font-size:11px; color:LightGray;\">© Image provided by the University of Sheffield<\/span><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/bbb041b.jpg\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center><br><b>Potential exits<\/b><br>Sites at which important anatomical structures exit the abdomen through the pelvis are commonly examined. These include the obturator, inguinal and femoral canals anteriorly. Inferiorly, the sciatic foramina also transmit structures. These are all covered separately in the resource.<br><br><b>Gluteal region<\/b><br><b>Gluteal muscles<\/b><br><ul><li>Gluteus maximus: inserts to gluteal tuberosity of the femur and iliotibial tract<\/li><li>Gluteus medius: attach to lateral greater trochanter<\/li><li>Gluteus minimis: attach to anterior greater trochanter<\/li><li>All extend and abduct the hip<\/li><\/ul><br><b>Deep lateral hip rotators<\/b><br><ul><li>Piriformis<\/li><li>Gemelli<\/li><li>Obturator internus<\/li><li>Quadratus femoris<\/li><\/ul><br><b>Nerves<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Superior gluteal nerve (L5, S1)<\/b><\/td><td><ul><li>Gluteus medius<\/li><li>Gluteus minimis<\/li><li>Tensor fascia lata<\/li><\/ul><\/td><\/tr><tr><td><b>Inferior gluteal nerve<\/b><\/td><td>Gluteus maximus<\/td><\/tr><\/tbody><\/table><\/div>Damage to the superior gluteal nerve will result in the patient developing a Trendelenberg gait. Affected patients are unable to abduct the thigh at the hip joint. During the stance phase, the weakened abductor muscles allow the pelvis to tilt down on the opposite side. To compensate, the trunk lurches to the weakened side to attempt to maintain a level pelvis throughout the gait cycle. The pelvis sags on the opposite side of the lesioned superior gluteal nerve.<br><br><i>Anatomy of the sciatic foramina is covered separately<\/i>"}, {"name": "Ankle reflex", "questions": [{"number": 49, "topic": "Ankle reflex", "stem_html": "A 30 year old man presents with back pain and the surgeon tests the ankle reflex. Which of the following nerve roots are tested in this manoeuvre?", "options": [{"label_html": "S3 and S4", "is_correct": false}, {"label_html": "L4 and L5", "is_correct": false}, {"label_html": "L3 and L4", "is_correct": false}, {"label_html": "S1 and S2", "is_correct": true}, {"label_html": "S4 only", "is_correct": false}], "correct_index": 3, "explanation_html": "<p>No explanation provided.<\/p>"}], "note_html": "The ankle reflex is elicited by tapping the Achilles tendon with a tendon hammer. It tests the S1 and S2 nerve roots. It is typically delayed in L5 and S1 disk prolapses."}, {"name": "Ansa cervicalis", "questions": [{"number": 50, "topic": "Ansa cervicalis", "stem_html": "Which of the following nerve roots contribute nerve fibres to the ansa cervicalis?", "options": [{"label_html": "C1 only", "is_correct": false}, {"label_html": "C1, C2 and C3", "is_correct": true}, {"label_html": "C2, C3 and C6", "is_correct": false}, {"label_html": "C2, C4 and C5", "is_correct": false}, {"label_html": "C4, C5 and C6", "is_correct": false}], "correct_index": 1, "explanation_html": "The ansa cervicalis is composed of a superior and inferior root, derived from C1, C2 and C3.  The superior root arises where the nerve crosses the internal carotid artery. It descends anterior to the carotid sheath in the anterior triangle. It is joined in the region of the mid neck by the inferior root. The inferior root may pass either superficially or deep to the internal jugular vein."}, {"number": 51, "topic": "Ansa cervicalis", "stem_html": "Which of the following muscles is not innervated by the ansa cervicalis?", "options": [{"label_html": "Sternohyoid", "is_correct": false}, {"label_html": "Mylohyoid", "is_correct": true}, {"label_html": "Omohyoid", "is_correct": false}, {"label_html": "Sternothyroid", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 1, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Ansa cervicalis muscles:<br><br><b>GHost THought SOmeone Stupid Shot Irene<\/b><br><br>GenioHyoid<br>ThyroidHyoid<br>Superior Omohyoid<br>SternoThyroid<br>SternoHyoid<br>Inferior Omohyoid<\/div>Mylohyoid is innervated by the mylohyoid branch of the inferior alveolar nerve."}, {"number": 52, "topic": "Ansa cervicalis", "stem_html": "During a radical neck dissection, division of which of the following fascial layers will expose the ansa cervicalis?", "options": [{"label_html": "Pretracheal fascia", "is_correct": true}, {"label_html": "Carotid sheath", "is_correct": false}, {"label_html": "Prevertebral fascia", "is_correct": false}, {"label_html": "Investing layer of fascia", "is_correct": false}, {"label_html": "Sibsons fascia", "is_correct": false}], "correct_index": 0, "explanation_html": "The ansa cervicalis lies anterior to the carotid artery and on the carotid sheath. It may be exposed by division of the pretracheal fascia at the posterolateral aspect of the thyroid gland. The pre vertebral fascia lies more posteriorly and division of the investing layer of fascia will not expose this nerve."}], "note_html": "<div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Superior root<\/b><\/td><td>Branch of C1 anterolateral to carotid sheath<\/td><\/tr><tr><td><b>Inferior root<\/b><\/td><td>Derived from C2 and C3 roots, passes posterolateral to the internal jugular vein (may lie either deep or superficial to it)<\/td><\/tr><tr><td><b>Innervation<\/b><\/td><td>Sternohyoid<br>Sternothyroid<br>Omohyoid<\/td><\/tr><\/tbody><\/table><\/div><br>The ansa cervicalis lies anterior to the carotid sheath. The nerve supply to the inferior strap muscles enters at their inferior aspect. Therefore when dividing these muscles to expose a large goitre, the muscles should be divided in their upper half.<br><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb011b.jpg\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb011.jpg\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Ansa cervicalis\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb011b.jpg\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}, {"name": "Antecubital fossa", "questions": [{"number": 53, "topic": "Antecubital fossa", "stem_html": "Which structure separates the cephalic vein and the brachial artery in the antecubital fossa?", "options": [{"label_html": "Brachioradialis muscle", "is_correct": false}, {"label_html": "Bicipital aponeurosis", "is_correct": true}, {"label_html": "Origin of flexor digitorum profundus muscle", "is_correct": false}, {"label_html": "Pronator quadratus muscle", "is_correct": false}, {"label_html": "Origin of flexor digitorum superficialis muscle", "is_correct": false}], "correct_index": 1, "explanation_html": "<p>No explanation provided.<\/p>"}], "note_html": "<center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/bbb060b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/bbb060.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"><span style=\"font-size:11px; color:LightGray;\">© Image provided by the University of Sheffield<\/span><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/bbb060b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}, {"name": "Anterior anatomy of the neck", "questions": [{"number": 54, "topic": "Anterior anatomy of the neck", "stem_html": "A 22 year old man is brought to the emergency department with swallowing difficulty and pain on rotation of the head. Around an hour earlier, he received a kick to the neck in a karate competition. He undergoes imaging with a CT scan of the neck which demonstrates a fracture of the right greater cornu of the hyoid. Injury to which of the muscles listed below accounts for the swallowing difficulty?", "options": [{"label_html": "Geniohyoid", "is_correct": false}, {"label_html": "Middle pharyngeal constrictor", "is_correct": true}, {"label_html": "Omohyoid", "is_correct": false}, {"label_html": "Sternohyoid", "is_correct": false}, {"label_html": "Thyrohyoid", "is_correct": false}], "correct_index": 1, "explanation_html": "The swallowing issues here arise because the function of the middle pharyngeal constrictor is impaired. This muscle takes its origin from the lesser and greater cornu of the hyoid. During swallowing, the pharyngeal constrictor muscles force the food bolus into the oesophagus."}], "note_html": "<b>Anterior triangle<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Boundaries<\/b><\/td><\/tr><tr><td>Anterior border of the Sternocleidomastoid<br>Lower border of mandible<br>Anterior midline<\/td><\/tr><\/tbody><\/table><\/div><br><b>Sub triangles (divided by Digastric above and Omohyoid)<\/b><br><ul><li>Muscular triangle: Neck strap muscles <\/li><li>Carotid triangle: Carotid sheath <\/li><li>Submandibular Triangle (digastric)<\/li><\/ul><br><b>Contents of the anterior triangle<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Digastric triangle<\/b><\/td><td>Submandibular gland<br>Submandibular nodes<br>Facial vessels<br>Hypoglossal nerve<\/td><\/tr><tr><td><b>Muscular triangle<\/b><\/td><td>Strap muscles<br>External jugular vein<\/td><\/tr><tr><td><b>Carotid triangle<\/b><\/td><td>Carotid sheath (Common carotid, vagus and internal jugular vein)<br>Ansa cervicalis<\/td><\/tr><\/tbody><\/table><\/div><br><b>Nerve supply to digastric muscle<\/b><br><ul><li>Anterior: Mylohyoid nerve <\/li><li>Posterior: Facial nerve<\/li><\/ul><br><b>Veins<\/b><br>Veins of the neck are either superficial or deep to the deep fascia of the neck.Superficial tributaries of the external jugular vein drain a much smaller tissue volume than the tributaries of the internal jugular vein. <br><br>The external jugular veins drains the superficial aspects of the scalp and neck. It commences as the union of the posterior divisions of the retromandibular and posterior auricular veins near the angle of the mandible either below or within the parotid. It then descends superficially from there to the mid aspect of the clavicle. It is covered by the platysma, superficial fascia and skin. <br><br>The anterior jugular vein commences near the hyoid bone by the confluence of the superficial mandibular veins. It descends between the midline and the anterior border of the sternocleidomastoid. It eventually descends deep to this muscle to join either the external jugular or the subclavian vein.<br><br>The internal jugular vein commences at the cranial base in the posterior compartment of the jugular foramen and is continuous with the sigmoid sinus. The vein is contained within the carotid sheath and eventually unites with the subclavian vein posterior to the sternal end of the clavicle. <br><br><div class=\"alert alert-warning\"><b>Surface marking of the internal jugular vein<\/b><br>This is from the ear lobe to the medial end of the clavicle. The inferior bulb lies in a depression between the sternal and clavicular heads of the sternocleidomastoid, the lesser clavicular fossa.<br><\/div><br><b>External carotid artery<\/b><br>The external carotid commences immediately lateral to the pharyngeal side wall. It ascends and lies anterior to the internal carotid and posterior to the posterior belly of digastric and stylohyoid. More inferiorly it is covered by sternocleidomastoid, passed by hypoglossal nerves, lingual and facial veins.<br>It then pierces the fascia of the parotid gland finally dividing into its terminal branches within the gland itself. <br><br><div class=\"alert alert-warning\"><b>Surface marking of the carotid<\/b><br>This is an imaginary line drawn from the bifurcation of the common carotid passing behind the angle of the jaw to a point immediately anterior to the tragus of the ear.<br><\/div><br><b>Branches of the external carotid artery<\/b><br>It has six branches, three in front, two behind and one deep. <br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Three in front<\/b><\/td><td>Superior thyroid<br>Lingual <br>Facial<\/td><\/tr><tr><td><b>Two behind<\/b><\/td><td>Occipital<br>Posterior auricular<\/td><\/tr><tr><td><b>Deep<\/b><\/td><td>Ascending pharyngeal<\/td><\/tr><\/tbody><\/table><\/div><br>It terminates by dividing into the maxillary and superficial temporal arteries."}, {"name": "Anterior aspect of skull", "questions": [{"number": 55, "topic": "Anterior aspect of skull", "stem_html": "Which of the structures listed below is not typically transmitted via the superior orbital fissure?", "options": [{"label_html": "Lacrimal nerve", "is_correct": false}, {"label_html": "Abducens nerve", "is_correct": false}, {"label_html": "Zygomatic nerve", "is_correct": true}, {"label_html": "Superior opthalmic vein", "is_correct": false}, {"label_html": "Superior division of the oculomotor nerve", "is_correct": false}], "correct_index": 2, "explanation_html": "The zygomatic nerve is transmitted via the inferior orbital fissure.<br>A useful mnemonic for the structures that pass through the superior orbital fissure: <br>SUPERIOR ORBITAL FISSURE: <br>Outside<br>L - lacrimal F - frontal T - trochlear done <br>Inside<br>N - nasociliary A - abducens nerve O - oculomotor nerve<br>LFT done outside No Abnormality Occurred inside"}], "note_html": "<center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/bbb012b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/bbb012.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"><span style=\"font-size:11px; color:LightGray;\">© Image provided by the University of Sheffield<\/span><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/bbb012b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center><br><b>Orbital foramina<\/b><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th>Foramina<\/th><th>Structures transmitted<\/th><\/tr><\/thead><tbody><tr><td>Superior orbital fissure<\/td><td>Recurrent meningeal artery*<br>Lacrimal nerve<br>Trochlear nerve<br>Abducens nerve<br>Superior ophthalmic vein<br>Superior division of the oculomotor nerve<\/td><\/tr><tr><td>Inferior orbital fissure<\/td><td>Maxillary nerve<br>Inferior ophthalmic vein<br>Zygomatic nerve<\/td><\/tr><tr><td>Optic foramen<\/td><td>Optic nerve<br>Ophthalmic artery<\/td><\/tr><\/tbody><\/table><\/div><br>*=It may help to know that it is also termed the anastomotic branch ( of the middle meningeal artery). It enters the orbit lateral in the superior orbital fissure, it anastomoses with the recurrent branch of the lacrimal artery."}, {"name": "Anterior interosseous nerve", "questions": [{"number": 56, "topic": "Anterior interosseous nerve", "stem_html": "The anterior interosseous nerve is a branch of which of the following?", "options": [{"label_html": "Ulnar nerve", "is_correct": false}, {"label_html": "Superficial branch of the radial nerve", "is_correct": false}, {"label_html": "Axillary nerve", "is_correct": false}, {"label_html": "Deep branch of the radial nerve", "is_correct": false}, {"label_html": "Median nerve", "is_correct": true}], "correct_index": 4, "explanation_html": "<p>No explanation provided.<\/p>"}, {"number": 57, "topic": "Anterior interosseous nerve", "stem_html": "The anterior interosseous nerve is a branch of which of the following?", "options": [{"label_html": "Ulnar nerve", "is_correct": false}, {"label_html": "Superficial branch of the radial nerve", "is_correct": false}, {"label_html": "Axillary nerve", "is_correct": false}, {"label_html": "Deep branch of the radial nerve", "is_correct": false}, {"label_html": "Median nerve", "is_correct": true}], "correct_index": 4, "explanation_html": "<p>No explanation provided.<\/p>"}, {"number": 58, "topic": "Anterior interosseous nerve", "stem_html": "A 10 year old boy is admitted to the emergency department following a fall. On examination, there is deformity and swelling of the forearm. The ability to flex the fingers of the affected limb is impaired. However, there is no sensory impairment. Imaging confirms a displaced forearm fracture. Which of the nerves listed below is likely to have been affected?", "options": [{"label_html": "Ulnar", "is_correct": false}, {"label_html": "Posterior interosseous nerve", "is_correct": false}, {"label_html": "Anterior interosseous nerve", "is_correct": true}, {"label_html": "Axillary", "is_correct": false}, {"label_html": "Radial", "is_correct": false}], "correct_index": 2, "explanation_html": "Forearm fractures may be complicated by neurovascular compromise. The anterior interosseous nerve may be affected. It has no sensory supply so the defect is motor alone."}], "note_html": "The anterior interosseous nerve (volar interosseous nerve) is a branch of the median nerve that supplies the deep muscles on the front of the forearm, except the ulnar half of the flexor digitorum profundus.<br><br>It accompanies the anterior interosseous artery along the anterior of the interosseous membrane of the forearm, in the interval between the flexor pollicis longus and flexor digitorum profundus, supplying the whole of the former and (most commonly) the radial half of the latter, and ending below in the pronator quadratus and wrist joint.<br><br><b>Innervation<\/b><br>The anterior interosseous nerve classically innervates 2.5 muscles:<br><br><ul><li>Flexor pollicis longus<\/li><li>Pronator quadratus<\/li><li>The radial half of flexor digitorum profundus (the lateral two out of the four tendons).<\/li><\/ul><br>These muscles are in the deep level of the anterior compartment of the forearm."}, {"name": "Anterior tibial artery", "questions": [{"number": 59, "topic": "Anterior tibial artery", "stem_html": "A 70 year old man is due to undergo an arterial bypass procedure for claudication and foot ulceration. The anterior tibial artery will form the site of the distal arterial anastomosis. Which of the following structures is not closely related to it distally?", "options": [{"label_html": "Interosseous membrane", "is_correct": false}, {"label_html": "Deep peroneal nerve", "is_correct": false}, {"label_html": "Tibialis posterior", "is_correct": true}, {"label_html": "Extensor hallucis longus", "is_correct": false}, {"label_html": "Dorsalis pedis artery", "is_correct": false}], "correct_index": 2, "explanation_html": "As an artery of the anterior compartment, the anterior tibial artery is closely related to tibialis anterior. The tibialis posterior is related to it at its origin."}], "note_html": "<ul><li>Begins opposite the distal border of popliteus<\/li><li>Terminates in front of the ankle, continuing as the dorsalis pedis artery<\/li><li>As it descends it lies on the interosseous membrane, distal part of the tibia and front of the ankle joint<\/li><li>Passes between the tendons of extensor digitorum and extensor hallucis longus distally<\/li><li>It is related to the deep peroneal nerve, it lies anterior to the middle third of the vessel and lateral to it in the lower third<\/li><\/ul>"}, {"name": "Anterior triangle of the neck", "questions": [{"number": 60, "topic": "Anterior triangle of the neck", "stem_html": "Which of the following is not a content of the anterior triangle of the neck?", "options": [{"label_html": "Vagus nerve", "is_correct": false}, {"label_html": "Submandibular gland", "is_correct": false}, {"label_html": "Phrenic nerve", "is_correct": true}, {"label_html": "Internal jugular vein", "is_correct": false}, {"label_html": "Hypoglossal nerve", "is_correct": false}], "correct_index": 2, "explanation_html": "The phrenic nerve is a content of the posterior triangle.  The anterior triangle contains the carotid sheath and its contents."}, {"number": 61, "topic": "Anterior triangle of the neck", "stem_html": "Which of the following is not a content of the anterior triangle of the neck?", "options": [{"label_html": "Ansa cervicalis", "is_correct": false}, {"label_html": "Vagus nerve", "is_correct": false}, {"label_html": "Anterior jugular vein", "is_correct": false}, {"label_html": "Transverse cervical nerve", "is_correct": true}, {"label_html": "Hypoglossal nerve", "is_correct": false}], "correct_index": 3, "explanation_html": "The transverse cervical nerve lies within the posterior triangle (the transverse cervical nerve divides into superior and inferior branches of the anterior margin of SCM). The anterior jugular vein is formed in the submental region and descends in the superficial fascia near the median plane. It passes inferior to enter the suprasternal space, it is linked to the contralateral anterior jugular vein by the jugular venous arch."}, {"number": 62, "topic": "Anterior triangle of the neck", "stem_html": "A 43 year old lady is undergoing a total thyroidectomy for an extremely large goitre. The surgeons decide that access may be improved by division of the infra hyoid strap muscles. At which of the following sites should they be divided?", "options": [{"label_html": "In their upper half", "is_correct": true}, {"label_html": "In their lower half", "is_correct": false}, {"label_html": "In the middle", "is_correct": false}, {"label_html": "At their origin from the hyoid", "is_correct": false}, {"label_html": "At the point of their insertion", "is_correct": false}], "correct_index": 0, "explanation_html": "Should the strap muscles require division during surgery they should be divided in their upper half. This is because their nerve supply from the ansa cervicalis enters in their lower half."}, {"number": 63, "topic": "Anterior triangle of the neck", "stem_html": "Which of the following nerves is responsible for the innervation of the posterior belly of the digastric muscle?", "options": [{"label_html": "Facial nerve", "is_correct": true}, {"label_html": "Hypoglossal nerve", "is_correct": false}, {"label_html": "Trigeminal nerve", "is_correct": false}, {"label_html": "Ansa cervicalis", "is_correct": false}, {"label_html": "Mylohyoid nerve", "is_correct": false}], "correct_index": 0, "explanation_html": "The posterior belly of digastric is innervated by the facial nerve and the anterior belly by the mylohoid nerve."}, {"number": 64, "topic": "Anterior triangle of the neck", "stem_html": "A 43 year old man is due to undergo an excision of the sub mandibular gland. Which of the following incisions is the most appropriate for this procedure?", "options": [{"label_html": "A transversely orientated incision 3cm below the mandible", "is_correct": true}, {"label_html": "A transversely orientated incision immediately inferior to the mandible", "is_correct": false}, {"label_html": "A vertical incision 3 cm anterior to the angle of the mandible and extending inferiorly", "is_correct": false}, {"label_html": "A transversely orientated incision 2cm above the mandible", "is_correct": false}, {"label_html": "A transversely orientated incision 12cm below the mandible", "is_correct": false}], "correct_index": 0, "explanation_html": "To access the sub mandibular gland a transverse incision 3cm below the mandible should be made. Incisions located higher than this may damage the marginal mandibular branch of the facial nerve."}], "note_html": "<div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Boundaries<\/b><\/td><\/tr><tr><td>Anterior border of the Sternocleidomastoid<br>Lower border of mandible<br>Anterior midline<\/td><\/tr><\/tbody><\/table><\/div><br><b>Sub triangles (divided by Digastric above and Omohyoid)<\/b><br><ul><li>Muscular triangle: Neck strap muscles <\/li><li>Carotid triangle: Carotid sheath <\/li><li>Submandibular Triangle (digastric)<\/li><\/ul><br><b>Contents of the anterior triangle<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Digastric triangle<\/b><\/td><td>Submandibular gland<br>Submandibular nodes<br>Facial vessels<br>Hypoglossal nerve<\/td><\/tr><tr><td><b>Muscular triangle<\/b><\/td><td>Strap muscles<br>Jugular vein<\/td><\/tr><tr><td><b>Carotid triangle<\/b><\/td><td>Carotid sheath (Common carotid, vagus and internal jugular vein)<br>Ansa cervicalis<\/td><\/tr><\/tbody><\/table><\/div><br><b>Nerve supply to digastric muscle<\/b><br><ul><li>Anterior: Mylohyoid nerve <\/li><li>Posterior: Facial nerve<\/li><\/ul><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb026b.jpg\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb026.jpg\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Anterior triangle of the neck\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb026b.jpg\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}, {"name": "Appendix", "questions": [{"number": 65, "topic": "Appendix", "stem_html": "A 7 year old boy presents with right iliac fossa pain and there is a clinical suspicion that appendicitis is present. From which of the following embryological structures is the appendix derived?", "options": [{"label_html": "Vitello-intestinal duct", "is_correct": false}, {"label_html": "Urachus", "is_correct": false}, {"label_html": "Foregut", "is_correct": false}, {"label_html": "Hindgut", "is_correct": false}, {"label_html": "Midgut", "is_correct": true}], "correct_index": 4, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">The appendix is derived from the midgut<\/div>It is derived from the midgut which is why early appendicitis may present with periumbilical pain."}, {"number": 66, "topic": "Appendix", "stem_html": "An 18 year old boy is undergoing an appendicectomy for appendicitis. At which of the following locations is the appendix most likely to be found?", "options": [{"label_html": "Pre ileal", "is_correct": false}, {"label_html": "Pelvic", "is_correct": false}, {"label_html": "Retrocaecal", "is_correct": true}, {"label_html": "Post ileal", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 2, "explanation_html": "Most appendixes lie in the retrocaecal position. If a retrocaecal appendix is difficult to remove then mobilisation of the right colon significantly improves access."}, {"number": 67, "topic": "Appendix", "stem_html": "A 22 year old man presents with appendicitis. At operation the appendix is retrocaecal and difficult to access. Division of which of the following anatomical structures should be undertaken?", "options": [{"label_html": "Ileocolic artery", "is_correct": false}, {"label_html": "Mesentery of the caecum", "is_correct": false}, {"label_html": "Gonadal vessels", "is_correct": false}, {"label_html": "Lateral peritoneal attachments of the caecum", "is_correct": true}, {"label_html": "Right colic artery", "is_correct": false}], "correct_index": 3, "explanation_html": "The commonest appendiceal location is retrocaecal. Those struggling to find it at operation should trace the tenia to the caecal pole where the appendix is located. If it cannot be mobilised easily then division of the lateral caecal peritoneal attachments (as for a right hemicolectomy) will allow caecal mobilisation and facilitate the procedure."}, {"number": 68, "topic": "Appendix", "stem_html": "A 22 year old man presents with appendicitis. At operation the appendix is retrocaecal and difficult to access. Division of which of the following anatomical structures should be undertaken?", "options": [{"label_html": "Ileocolic artery", "is_correct": false}, {"label_html": "Mesentery of the caecum", "is_correct": false}, {"label_html": "Gonadal vessels", "is_correct": false}, {"label_html": "Lateral peritoneal attachments of the caecum", "is_correct": true}, {"label_html": "Right colic artery", "is_correct": false}], "correct_index": 3, "explanation_html": "The commonest appendiceal location is retrocaecal. Those struggling to find it at operation should trace the tenia to the caecal pole where the appendix is located. If it cannot be mobilised easily then division of the lateral caecal peritoneal attachments (as for a right hemicolectomy) will allow caecal mobilisation and facilitate the procedure."}, {"number": 69, "topic": "Appendix", "stem_html": "A 17 year old lady presents with right iliac fossa pain and diagnosed as having acute appendicitis. You take her to theatre to perform a laparoscopic appendicectomy. During the procedure the scrub nurse distracts you and you inadvertently avulse the appendicular artery. The ensuing haemorrhage is likely to be supplied directly from which vessel?", "options": [{"label_html": "Inferior mesenteric artery", "is_correct": false}, {"label_html": "Superior mesenteric artery", "is_correct": false}, {"label_html": "Ileo-colic artery", "is_correct": true}, {"label_html": "Internal iliac artery", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 2, "explanation_html": "The appendicular artery is a branch of the ileocolic artery."}], "note_html": "<ul><li>Location: Base of caecum.<\/li><li>Up to 10cm long.<\/li><li>Mainly lymphoid tissue (Hence mesenteric adenitis may mimic appendicitis).<\/li><li>Caecal taenia coli converge at base of appendix and form a longitudinal muscle cover over the appendix. This convergence should facilitate its identification at surgery if it is retrocaecal and difficult to find (which it can be when people start doing appendicectomies!)<\/li><li>Arterial supply: Appendicular artery (branch of the ileocolic).<\/li><li>It is intra peritoneal.<\/li><\/ul><br><br><b>McBurney's point<\/b><br><ul><li>1/3 of the way along a line drawn from the Anterior Superior Iliac Spine to the Umbilicus<\/li><\/ul><br>6 Positions:<br><br><ul><li>Retrocaecal 74%<\/li><li>Pelvic 21%<\/li><li>Postileal<\/li><li>Subcaecal<\/li><li>Paracaecal<\/li><li>Preileal<\/li><\/ul>"}, {"name": "Axilla", "questions": [{"number": 70, "topic": "Axilla", "stem_html": "A 44 year old lady has undergone a mastectomy and axillary node clearance. Post operatively, she notices a patch of anaesthesia of her axillary skin when she applies an underarm deodorant. Which nerve has most likely been affected?", "options": [{"label_html": "Axillary", "is_correct": false}, {"label_html": "Intercostobrachial", "is_correct": true}, {"label_html": "Long thoracic", "is_correct": false}, {"label_html": "Thoracodorsal", "is_correct": false}, {"label_html": "Accessory", "is_correct": false}], "correct_index": 1, "explanation_html": "The intercostobrachial nerves traverse the axilla and innervate the overlying skin. These can be injured or divided during axillary surgery and the result is anaesthesia of the overlying skin."}, {"number": 71, "topic": "Axilla", "stem_html": "A 44 year old lady who works as an interior decorator has undergone a mastectomy and axillary node clearance to treat breast cancer. Post operatively, she comments that her arm easily becomes fatigued when she is painting walls. What is the most likely explanation?", "options": [{"label_html": "Injury to the axillary nerve", "is_correct": false}, {"label_html": "Injury to the long thoracic nerve", "is_correct": false}, {"label_html": "Injury to the intercostobrachial nerve", "is_correct": false}, {"label_html": "Injury to the thoracodorsal nerve", "is_correct": true}, {"label_html": "Injury to the median pectoral nerve", "is_correct": false}], "correct_index": 3, "explanation_html": "The most likely explanation for this is that the thoracodorsal nerve has been injured. This will result in atrophy of latissimus dorsi and this will become evident with repetitive arm movements where the arm is elevated and moving up and down (such as in painting). Injury to the pectoral nerves may produce a similar picture but this pattern of injury is very rare and the pectoral nerves are seldom injured in breast surgery."}, {"number": 72, "topic": "Axilla", "stem_html": "A 48 year old lady is undergoing an axillary node clearance for breast cancer. Which of the structures listed below are most likely to be encountered during the axillary dissection?", "options": [{"label_html": "Cords of the brachial plexus", "is_correct": false}, {"label_html": "Thoracodorsal trunk", "is_correct": true}, {"label_html": "Internal mammary artery", "is_correct": false}, {"label_html": "Thoracoacromial artery", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 1, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Beware of damaging the thoracodorsal trunk if a latissimus dorsi flap reconstruction is planned.<\/div>The thoracodorsal trunk runs through the nodes in the axilla. If injured it may compromise the function and blood supply to latissimus dorsi, which is significant if it is to be used as a flap for a reconstructive procedure."}, {"number": 73, "topic": "Axilla", "stem_html": "A 43 year old lady is due to undergo an axillary node clearance as part of treatment for carcinoma of the breast. Which of the following fascial layers will be divided during the surgical approach to the axilla?", "options": [{"label_html": "Sibsons fascia", "is_correct": false}, {"label_html": "Pre tracheal fascia", "is_correct": false}, {"label_html": "Waldayers fascia", "is_correct": false}, {"label_html": "Clavipectoral fascia", "is_correct": true}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 3, "explanation_html": "The clavipectoral fascia is situated under the clavicular portion of pectoralis major. It protects both the axillary vessels and nodes. During an axillary node clearance for breast cancer the clavipectoral fascia is incised and this allows access to the nodal stations. The nodal stations are; level 1 nodes inferior to pectoralis minor, level 2 lie behind it and level 3 above it. During a Patey Mastectomy surgeons divide pectoralis minor to gain access to level 3 nodes. The use of sentinel node biopsy (and stronger assistants!) have made this procedure far less common."}, {"number": 74, "topic": "Axilla", "stem_html": "Which of the following is a branch of the third part of the axillary artery?", "options": [{"label_html": "Superior thoracic", "is_correct": false}, {"label_html": "Lateral thoracic", "is_correct": false}, {"label_html": "Dorsal scapular", "is_correct": false}, {"label_html": "Thoracoacromial", "is_correct": false}, {"label_html": "Posterior circumflex humeral", "is_correct": true}], "correct_index": 4, "explanation_html": "The other branches include:<br><ul><li>Subscapular<\/li><li>Anterior circumflex humeral<\/li><\/ul>The dorsal scapular artery arises from the third part of the subclavian artery in most cases"}], "note_html": "<b>Boundaries of the axilla<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Medially<\/b><\/td><td>Chest wall and Serratus anterior<\/td><\/tr><tr><td><b>Laterally<\/b><\/td><td>Humeral head<\/td><\/tr><tr><td><b>Floor<\/b><\/td><td>Subscapularis<\/td><\/tr><tr><td><b>Anterior aspect<\/b><\/td><td>Lateral border of Pectoralis major<\/td><\/tr><tr><td><b>Fascia<\/b><\/td><td>Clavipectoral fascia<\/td><\/tr><\/tbody><\/table><\/div><br><b>Content<\/b>:<br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Long thoracic nerve (of Bell)<\/b><\/td><td>Derived from C5-C7 and passes behind the brachial plexus to enter the axilla. It lies on the medial chest wall and supplies serratus anterior. Its location puts it at risk during axillary surgery and damage will lead to winging of the scapula.<\/td><\/tr><tr><td><b>Thoracodorsal nerve and thoracodorsal trunk<\/b><\/td><td>Innervate and vascularise latissimus dorsi.<\/td><\/tr><tr><td><b>Axillary vein<\/b><\/td><td>Lies at the apex of the axilla, it is the continuation of the basilic vein. Becomes the subclavian vein at the outer border of the first rib.<\/td><\/tr><tr><td><b>Intercostobrachial nerves<\/b><\/td><td>Traverse the axillary lymph nodes and are often divided during axillary surgery. They provide cutaneous sensation to the axillary skin.<\/td><\/tr><tr><td><b>Lymph nodes<\/b><\/td><td>The axilla is the main site of lymphatic drainage for the breast.<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Axillary artery", "questions": [{"number": 75, "topic": "Axillary artery", "stem_html": "An injured axillary artery is ligated between the thyrocervical trunk of the subclavian and subscapular artery. Subsequent collateral circulation is likely to result in reversal of blood flow in which of the vessels listed below?", "options": [{"label_html": "Circumflex scapular artery", "is_correct": true}, {"label_html": "Transverse cervical artery", "is_correct": false}, {"label_html": "Posterior intercostal arteries", "is_correct": false}, {"label_html": "Suprascapular artery", "is_correct": false}, {"label_html": "Profunda brachii artery", "is_correct": false}], "correct_index": 0, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">It's an easy question really, we just made the wording difficult (on purpose). It is asking about the branches of the axillary artery and knowledge of the fact that there is an extensive collateral network around the shoulder joint. As a result, the occlusion of the proximal aspect of the circumflex humeral inflow (from the axillary artery) ceases and there is then retrograde flow through it from collaterals.<\/div>The circumflex scapular artery is a branch of the subscapular artery and normally supplies the muscle on the dorsal aspect of the scapula. In this instance, flow is reversed in the circumflex scapular and subscapular arteries forming a collateral circulation around the scapula."}, {"number": 76, "topic": "Axillary artery", "stem_html": "What is the first branch of the axillary artery?", "options": [{"label_html": "Subscapular artery", "is_correct": false}, {"label_html": "Lateral thoracic artery", "is_correct": false}, {"label_html": "Thoraco acromial artery", "is_correct": false}, {"label_html": "Superior thoracic artery", "is_correct": true}, {"label_html": "Anterior circumflex humeral artery", "is_correct": false}], "correct_index": 3, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">The superior thoracic artery is the first branch of the axillary artery arises from the first part<br>Two branches arise from the second part, thoraco acromial and lateral thoracic<br>Three branches from the third part, subscapular artery, anterior and posterior circumflex humeral arteries<\/div>Mnemonic for axillary artery branches<br>Screw The Lawyer Save A patient <br>Superior thoracic artery <br>Thoracoacromial artery <br>Lateral thoracic artery <br>Subscapular artery <br>Anterior humeral circumflex artery <br>Posterior humeral circumflex artery"}], "note_html": "The axillary artery extends from the outer border of the first rib to the lower border of teres major, where it becomes the brachial artery. The vessel is subdivided into three zones; the first part lies above pectoralis minor, the second part is behind the muscle and the third part lies inferior to it. <br><br><b>First part<\/b><br>Together with the axillary vein, the artery is enclosed within the cords of the brachial plexus. Both vessels are contained within the axillary sheath, a prolongation of the prevertebral fascia. Posteriomedial to the sheath lies the first intercostal space, the superior aspect of the serratus anterior and the long thoracic nerve. Within the sheath, the medial cord of the brachial plexus lies behind the artery. Anteriorly lies the clavipectoral fascia. Superolaterally, lie the lateral and posterior cords of the brachial plexus. Inferomedially lies the axillary vein.<br><br><b>Second part<\/b><br>Posterior to the second part lies the posterior cord of the brachial plexus and the subscapularis muscle. Anteriorly, lie pectoralis minor and major. The lateral cord of the brachial plexus lies laterally. Medially, lies the medial cord of the brachial plexus, here it separates the artery from the vein. <br><br><b>Third part<\/b><br>Posterior to the artery lie subscapularis, latissimus dorsi and teres major. Interspersed between the vessel and subscapularis are the axillary and radial nerves. Anterior to the vessel is the medial root of the median nerve. Laterally, the lies the median and musculocutaneous nerves and coracobrachialis. The axillary vein is related medially. <br><br><div class=\"alert alert-warning\"><b>Branches of the axillary artery<\/b><br>Highest thoracic artery<br>Thoraco-acromial artery<br>Lateral thoracic artery<br>Subscapular artery<br>Posterior circumflex humeral artery<br>Anterior circumflex humeral artery<br><\/div><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb221b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb221.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"https://en.wikipedia.org/wiki/Main_Page\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb221b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}, {"name": "Axillary nerve", "questions": [{"number": 77, "topic": "Axillary nerve", "stem_html": "A 28 year old rugby player injures his right humerus and on examination is noted to have a minor sensory deficit overlying the point of deltoid insertion into the humerus. Which of the nerves listed below is most likely to have been affected?", "options": [{"label_html": "Radial", "is_correct": false}, {"label_html": "Axillary", "is_correct": true}, {"label_html": "Musculocutaneous", "is_correct": false}, {"label_html": "Median", "is_correct": false}, {"label_html": "Subscapular", "is_correct": false}], "correct_index": 1, "explanation_html": "This patch of skin is supplied by the axillary nerve"}, {"number": 78, "topic": "Axillary nerve", "stem_html": "Which of the structures listed below are most closely related to the axillary nerve within the quadrangular space?", "options": [{"label_html": "Posterior circumflex humeral vessels", "is_correct": true}, {"label_html": "Axillary artery", "is_correct": false}, {"label_html": "Anterior circumflex humeral vessels", "is_correct": false}, {"label_html": "Radial artery", "is_correct": false}, {"label_html": "Acromiothoracic artery", "is_correct": false}], "correct_index": 0, "explanation_html": "The posterior circumflex humeral vessels which are branches of the axillary artery are related to the axillary nerve within the quadrangular space."}, {"number": 79, "topic": "Axillary nerve", "stem_html": "Which of the structures listed below are most closely related to the axillary nerve within the quadrangular space?", "options": [{"label_html": "Posterior circumflex humeral vessels", "is_correct": true}, {"label_html": "Axillary artery", "is_correct": false}, {"label_html": "Anterior circumflex humeral vessels", "is_correct": false}, {"label_html": "Radial artery", "is_correct": false}, {"label_html": "Acromiothoracic artery", "is_correct": false}], "correct_index": 0, "explanation_html": "The posterior circumflex humeral vessels which are branches of the axillary artery are related to the axillary nerve within the quadrangular space."}, {"number": 80, "topic": "Axillary nerve", "stem_html": "Through which of the structures listed below does the axillary nerve pass?", "options": [{"label_html": "Quadrangular space", "is_correct": true}, {"label_html": "Triangular space", "is_correct": false}, {"label_html": "Subclavicular space", "is_correct": false}, {"label_html": "Sub pectoral space", "is_correct": false}, {"label_html": "Intercostal space", "is_correct": false}], "correct_index": 0, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Axillary nerve passes through the quadrangular space<\/div>"}], "note_html": "<ul><li>Terminal branch of the posterior cord of the brachial plexus<\/li><li>Root values C5 and C6<\/li><li>Descends posterior to the axillary artery at the lower border of subscapularis and then passes through quadrangular space with the posterior circumflex humeral vessels<\/li><li>Divides into anterior and posterior branches<\/li><li>Innervates deltoid muscle and small patch of skin over deltoid<\/li><\/ul><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb212b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb212.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"https://en.wikipedia.org/wiki/Main_Page\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb212b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}, {"name": "Basilic vein", "questions": [{"number": 81, "topic": "Basilic vein", "stem_html": "With respect to the basilic vein, which statement is false?", "options": [{"label_html": "Its deep anatomical location makes it unsuitable for use as an arteriovenous access site in fistula surgery", "is_correct": true}, {"label_html": "It originates from the dorsal venous network on the hand", "is_correct": false}, {"label_html": "It travels up the medial aspect of the forearm", "is_correct": false}, {"label_html": "Halfway between the shoulder and the elbow it lies deep to muscle", "is_correct": false}, {"label_html": "It is joined by the brachial vein to form the axillary vein", "is_correct": false}], "correct_index": 0, "explanation_html": "It is used in arteriovenous fistula surgery during a procedure known as a basilic vein transposition."}, {"number": 82, "topic": "Basilic vein", "stem_html": "A 56 year old man requires long term parenteral nutrition and the decision is made to insert a PICC line for long term venous access. This is inserted into the basilic vein at the region of the elbow. As the catheter is advanced, into which venous structure is the tip of the catheter most likely to pass from the basilic vein?", "options": [{"label_html": "Subclavian vein", "is_correct": false}, {"label_html": "Axillary vein", "is_correct": true}, {"label_html": "Posterior circumflex humeral vein", "is_correct": false}, {"label_html": "Cephalic vein", "is_correct": false}, {"label_html": "Superior vena cava", "is_correct": false}], "correct_index": 1, "explanation_html": "The basilic vein drains into the axillary vein and although PICC lines may end up in a variety of fascinating locations the axillary vein is usually the commonest site following from the basilic. The posterior circumflex humeral vein is encountered prior to the axillary vein. However, a PICC line is unlikely to enter this structure because of its angle of entry into the basilic vein."}], "note_html": "The basilic and cephalic veins both provide the main pathways of venous drainage for the arm and hand. It is continuous with the palmar venous arch distally and the axillary vein proximally.<br><br><b>Path<\/b><br><ul><li>Originates on the medial side of the dorsal venous network of the hand, and passes up the forearm and arm.<\/li><li>Most of its course is superficial.<\/li><li>Near the region anterior to the cubital fossa the vein joins the cephalic vein.<\/li><li>Midway up the humerus the basilic vein passes deep under the muscles.<\/li><li>At the lower border of the teres major muscle, the anterior and posterior circumflex humeral veins feed into it.<\/li><li>It is often joined by the medial brachial vein before draining into the axillary vein.<\/li><\/ul>"}, {"name": "Biceps femoris", "questions": [{"number": 83, "topic": "Biceps femoris", "stem_html": "A 19 year old man is playing rugby when he suddenly notices a severe pain at the posterolateral aspect of his right thigh. Which of the following muscle groups is most likely to have been injured?", "options": [{"label_html": "Semimembranosus", "is_correct": false}, {"label_html": "Semitendinosus", "is_correct": false}, {"label_html": "Long head of biceps femoris", "is_correct": true}, {"label_html": "Gastrocnemius", "is_correct": false}, {"label_html": "Soleus", "is_correct": false}], "correct_index": 2, "explanation_html": "The biceps femoris is the laterally located hamstring muscle. The semitendinosus and semimembranosus are located medially. Rupture of gastrocnemius and soleus may occur but is less common."}, {"number": 84, "topic": "Biceps femoris", "stem_html": "Which of the following nerves innervates the long head of the biceps femoris muscle?", "options": [{"label_html": "Inferior gluteal nerve", "is_correct": false}, {"label_html": "Tibial division of sciatic nerve", "is_correct": true}, {"label_html": "Superior gluteal nerve", "is_correct": false}, {"label_html": "Common peroneal division of sciatic nerve", "is_correct": false}, {"label_html": "Obturator nerve", "is_correct": false}], "correct_index": 1, "explanation_html": "The short head of biceps femoris, which may occasionally be absent, is innervated by the common peroneal component of the sciatic nerve. The long head is innervated by the tibial division of the sciatic nerve."}, {"number": 85, "topic": "Biceps femoris", "stem_html": "A sprinter attends A&amp;E with severe leg pain.  He had forgotten to warm up and ran a 100m sprint race. Towards the end of the race he experienced pain in the posterior aspect of his thigh.  The pain worsens, localising to the lateral aspect of the knee.  The sprinter is unable to flex the knee.  What structure has been injured?", "options": [{"label_html": "Anterior cruciate ligament", "is_correct": false}, {"label_html": "Posterior cruciate ligament", "is_correct": false}, {"label_html": "Semimembranosus tendon", "is_correct": false}, {"label_html": "Semitendinosus tendon", "is_correct": false}, {"label_html": "Biceps femoris tendon", "is_correct": true}], "correct_index": 4, "explanation_html": "The biceps femoris is commonly injured in sports that require explosive bending of the knee as seen in sprinting, especially if the athlete has not warmed up first.   Avulsion most commonly occurs where the long head attaches to the ischial tuberosity. Injuries to biceps femoris are more common than to the other hamstrings."}], "note_html": "The biceps femoris is one of the hamstring group of muscles located in the posterior upper thigh. It has two heads.<br><br><b>Long head<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Origin<\/b><\/td><td>Ischial tuberosity<\/td><\/tr><tr><td><b>Insertion<\/b><\/td><td>Fibular head<\/td><\/tr><tr><td><b>Action<\/b><\/td><td>Knee flexion, lateral rotation tibia, extension hip<\/td><\/tr><tr><td><b>Innervation<\/b><\/td><td>Tibial division of sciatic nerve (L5, S1, S2)<\/td><\/tr><tr><td><b>Arterial supply<\/b><\/td><td>Profunda femoris artery, inferior gluteal artery, and the superior muscular branches of popliteal artery<\/td><\/tr><\/tbody><\/table><\/div><br><i>Image demonstrating the biceps femoris muscle, with the long head outlined<\/i><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb139b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb139.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Biceps femoris muscle\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb139b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center><br><b>Short head<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Origin<\/b><\/td><td>Lateral lip of linea aspera, lateral supracondylar ridge of femur<\/td><\/tr><tr><td><b>Insertion<\/b><\/td><td>Fibular head<\/td><\/tr><tr><td><b>Action<\/b><\/td><td>Knee flexion, lateral rotation tibia<\/td><\/tr><tr><td><b>Innervation<\/b><\/td><td>Common peroneal division of sciatic nerve (L5, S1, S2)<\/td><\/tr><tr><td><b>Arterial supply<\/b><\/td><td>Profunda femoris artery, inferior gluteal artery, and the superior muscular branches of popliteal artery<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Bladder", "questions": [{"number": 86, "topic": "Bladder", "stem_html": "A 63 year old man undergoes a radical cystectomy for carcinoma of the bladder. During the procedure there is considerable venous bleeding. What is the primary site of venous drainage of the urinary bladder?", "options": [{"label_html": "Vesicoprostatic venous plexus", "is_correct": true}, {"label_html": "Internal iliac vein", "is_correct": false}, {"label_html": "External iliac vein", "is_correct": false}, {"label_html": "Gonadal vein", "is_correct": false}, {"label_html": "Common iliac vein", "is_correct": false}], "correct_index": 0, "explanation_html": "The urinary bladder has a rich venous plexus surrounding it, this drains subsequently into the internal iliac vein. The vesicoprostatic plexus may be a site of considerable venous bleeding during cystectomy."}, {"number": 87, "topic": "Bladder", "stem_html": "Stimulation of the parasympathetic nerve supply to the bladder is most likely to result in which of the following actions?", "options": [{"label_html": "Contraction of the internal urethral sphincter", "is_correct": false}, {"label_html": "Relaxation of the external urethral sphincter", "is_correct": false}, {"label_html": "Contraction of the external urethral sphincter", "is_correct": false}, {"label_html": "Contraction of the detrusor muscle", "is_correct": true}, {"label_html": "Relaxation of the detrusor muscle", "is_correct": false}], "correct_index": 3, "explanation_html": "The internal sphincter is formed by the circular arrangement of smooth muscle of the bladder wall at the neck of the bladder. The detrusor muscle and internal sphincter are under autonomic control. Parasympathetic fibres cause contraction of the detrusor muscle and relaxation of the internal sphincter. Sympathetic fibres cause relaxation of the detrusor muscle and contraction of the internal sphincter. The external sphincter is under voluntary control."}, {"number": 88, "topic": "Bladder", "stem_html": "A 65 year old man is undergoing a high anterior resection of the rectum for a distally sited sigmoid cancer. As the inferior mesenteric artery is mobilised at its distal aspect some fine nerves are encountered and inadvertently damaged. What is the most likely functional sequelae?", "options": [{"label_html": "Impaired contraction of the external urethral sphincter", "is_correct": false}, {"label_html": "Impaired contraction of the detrusor muscle", "is_correct": true}, {"label_html": "Impaired relaxation of the detrusor muscle", "is_correct": false}, {"label_html": "Impaired relaxation of the external urethral sphincter", "is_correct": false}, {"label_html": "Impaired contraction of the internal urethral sphincter", "is_correct": false}], "correct_index": 1, "explanation_html": "The parasympathetic nerves to the pelvic organs can be encountered in left sided distal colonic resections. If divided, there are notable effects on bladder function and this can result in impaired detrusor muscle function as parasympathetic nerves are responsible for detrusor contraction. The sympathetic nerves cause detrusor relaxation. The external sphincter is not affected. This is one of the reasons that patients may develop urinary retention following colon resections."}], "note_html": "The empty bladder is contained within the pelvic cavity. It is usually a three sided pyramid. The apex of the bladder points forwards towards the symphysis pubis and the base lies immediately anterior to the rectum or vagina. Continuous with the apex is the median umbilical ligament, during development this was the site of the urachus. <br>The inferior aspect of the bladder is retroperitoneal and the superior aspect covered by peritoneum. As the bladder distends it will tend to separate the peritoneum from the fascia of transversalis. For this reason a bladder that is distended due to acute urinary retention may be approached with a suprapubic catheter that avoids entry into the peritoneal cavity. <br>The trigone is the least mobile part of the bladder and forms the site of the ureteric orifices and internal urethral orifice. In the empty bladder the ureteric orifices are approximately 2-3cm apart, this distance may increase to 5cm in the distended bladder. <br><br><b>Arterial supply<\/b><br>The superior and inferior vesical arteries provide the main blood supply to the bladder. These are branches of the internal iliac artery. <br><br><b>Venous drainage<\/b><br>In males the bladder is drained by the vesicoprostatic venous plexus. In females the bladder is drained by the vesicouterine venous plexus. In both sexes this venous plexus will ultimately drain to the internal iliac veins.<br><br><b>Lymphatic drainage<\/b><br>Lymphatic drainage is predominantly to the external iliac nodes, internal iliac and obturator nodes also form sites of bladder lymphatic drainage.<br><br><b>Innervation<\/b><br>Parasympathetic nerve fibres innervate the bladder from the pelvic splanchnic nerves. Sympathetic nerve fibres are derived from L1 and L2 via the hypogastric nerve plexuses. The parasympathetic nerve fibres will typically cause detrusor muscle contraction and result in voiding. The muscle of the trigone is innervated by the sympathetic nervous system. The external urethral sphincter is under conscious control. During bladder filling the rate of firing of nerve impulses to the detrusor muscle is low and receptive relaxation occurs. At higher volumes and increased intra vesical pressures the rate of neuronal firing will increase and eventually voiding will occur."}, {"name": "Brachial artery", "questions": [{"number": 89, "topic": "Brachial artery", "stem_html": "What is the course of the median nerve relative to the brachial artery in the upper arm?", "options": [{"label_html": "Medial to anterior to lateral", "is_correct": false}, {"label_html": "Lateral to posterior to medial", "is_correct": false}, {"label_html": "Medial to posterior to lateral", "is_correct": false}, {"label_html": "Medial to anterior to medial", "is_correct": false}, {"label_html": "Lateral to anterior to medial", "is_correct": true}], "correct_index": 4, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Relations of median nerve to the brachial artery:<br>Lateral -&gt; Anterior -&gt; Medial<\/div>The median nerve descends lateral to the brachial artery, it usually passes anterior to the artery to lie on its medial side. It passes deep to the bicipital aponeurosis and the median cubital vein at the elbow. It enters the forearm between the two heads of the pronator teres muscle.<br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb091b.jpg\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb091.jpg\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"https://en.wikipedia.org/wiki/Main_Page\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb091b.jpg\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}, {"number": 90, "topic": "Brachial artery", "stem_html": "What is the course of the median nerve relative to the brachial artery in the upper arm?", "options": [{"label_html": "Medial to anterior to lateral", "is_correct": false}, {"label_html": "Lateral to posterior to medial", "is_correct": false}, {"label_html": "Medial to posterior to lateral", "is_correct": false}, {"label_html": "Medial to anterior to medial", "is_correct": false}, {"label_html": "Lateral to anterior to medial", "is_correct": true}], "correct_index": 4, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Relations of median nerve to the brachial artery:<br>Lateral -&gt; Anterior -&gt; Medial<\/div>The median nerve descends lateral to the brachial artery, it usually passes anterior to the artery to lie on its medial side. It passes deep to the bicipital aponeurosis and the median cubital vein at the elbow. It enters the forearm between the two heads of the pronator teres muscle.<br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb091b.jpg\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb091.jpg\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"https://en.wikipedia.org/wiki/Main_Page\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb091b.jpg\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}, {"number": 91, "topic": "Brachial artery", "stem_html": "A 25 year old man is stabbed in the upper arm. The brachial artery is lacerated at the level of the proximal humerus, and is being repaired. A nerve lying immediately lateral to the brachial artery is also lacerated. Which of the following is the nerve most likely to be?", "options": [{"label_html": "Ulnar nerve", "is_correct": false}, {"label_html": "Median nerve", "is_correct": true}, {"label_html": "Radial nerve", "is_correct": false}, {"label_html": "Intercostobrachial nerve", "is_correct": false}, {"label_html": "Axillary nerve", "is_correct": false}], "correct_index": 1, "explanation_html": "The brachial artery begins at the lower border of teres major and terminates in the cubital fossa by branching into the radial and ulnar arteries. In the upper arm the median nerve lies closest to it in the lateral position. In the cubital fossa it lies medial to it. The profunda brachii artery is related to the radial nerve.<br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb130b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb130.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Brachial artery\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb130b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}, {"number": 92, "topic": "Brachial artery", "stem_html": "A 73 year old lady with long standing atrial fibrillation develops a cold and pulseless white arm. A brachial embolus is suspected and a brachial embolectomy is performed. Which of the following structures is at greatest risk of injury during this procedure?", "options": [{"label_html": "Radial nerve", "is_correct": false}, {"label_html": "Cephalic vein", "is_correct": false}, {"label_html": "Ulnar nerve", "is_correct": false}, {"label_html": "Median nerve", "is_correct": true}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 3, "explanation_html": "The median nerve lies close to the brachial artery in the antecubital fossa. This is the usual site of surgical access to the brachial artery for an embolectomy procedure. The median nerve may be damaged during clumsy application of vascular clamps to the artery."}], "note_html": "The brachial artery begins at the lower border of teres major as a continuation of the axillary artery. It terminates in the cubital fossa at the level of the neck of the radius by dividing into the radial and ulnar arteries.<br><br><b>Relations<\/b><br>Posterior relations include the long head of triceps with the radial nerve and profunda vessels intervening. Anteriorly it is overlapped by the medial border of biceps.<br>It is crossed by the median nerve in the middle of the arm.<br>In the cubital fossa it is separated from the median cubital vein by the bicipital aponeurosis.<br>The basilic vein is in contact at the most proximal aspect of the cubital fossa and lies medially."}, {"name": "Brachial plexus", "questions": [{"number": 93, "topic": "Brachial plexus", "stem_html": "The cords of the brachial plexus are most closely related to which of the following vessels?", "options": [{"label_html": "Subclavian artery", "is_correct": false}, {"label_html": "Axillary artery", "is_correct": true}, {"label_html": "Axillary vein", "is_correct": false}, {"label_html": "Subclavian vein", "is_correct": false}, {"label_html": "Brachial artery", "is_correct": false}], "correct_index": 1, "explanation_html": "The trunks are related to the subclavian artery superiorly. The cords of the plexus surround the axillary artery, they are named according to their positions relative to this structure."}, {"number": 94, "topic": "Brachial plexus", "stem_html": "Which of the following is not a branch of the posterior cord of the brachial plexus?", "options": [{"label_html": "Thoracodorsal nerve", "is_correct": false}, {"label_html": "Axillary nerve", "is_correct": false}, {"label_html": "Radial nerve", "is_correct": false}, {"label_html": "Lower subscapular nerve", "is_correct": false}, {"label_html": "Musculocutaneous nerve", "is_correct": true}], "correct_index": 4, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Mnemonic branches off the posterior cord<br><br>S ubscapular (upper and lower)<br>T horacodorsal<br>A xillary<br>R adial<\/div>The musculocutaneous nerve is a branch off the lateral cord."}, {"number": 95, "topic": "Brachial plexus", "stem_html": "A 32 year old rugby player is hit hard on the shoulder during a rough tackle. Clinically, his arm is hanging loose on the side. It is pronated and medially rotated. What structure is most likely to have been compromised?", "options": [{"label_html": "Brachial trunks C5-6", "is_correct": true}, {"label_html": "Brachial trunks C6-7", "is_correct": false}, {"label_html": "Brachial trunks C8 - T1", "is_correct": false}, {"label_html": "Anterior interosseous nerve", "is_correct": false}, {"label_html": "Posterior interosseous nerve", "is_correct": false}], "correct_index": 0, "explanation_html": "The patient has an Erb's palsy involving brachial trunks C5-6."}, {"number": 96, "topic": "Brachial plexus", "stem_html": "A 32 year old man is stabbed in the neck and the inferior trunk of his brachial plexus is injured. Which of the modalities listed below is least likely to be affected?", "options": [{"label_html": "Initiating abduction of the shoulder", "is_correct": true}, {"label_html": "Abduction of the fingers", "is_correct": false}, {"label_html": "Flexion of the little finger", "is_correct": false}, {"label_html": "Sensation on the palmar aspect of the little finger", "is_correct": false}, {"label_html": "Gripping a screwdriver", "is_correct": false}], "correct_index": 0, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Inferior trunk of brachial plexus.<br><ul><li>C8 and T1 roots<\/li><li>Contributes to ulnar nerve and part of median nerve<\/li><\/ul><\/div>The inferior trunk of the brachial plexus is rarely injured. Nerve roots C8 and T1 are the main contributors to this trunk. Therefore an injury to this site will most consistently affect the ulnar nerve. The inferior trunk also contributes to the median nerve by way of the medial cord and therefore some impairment of grip is almost inevitable."}, {"number": 97, "topic": "Brachial plexus", "stem_html": "An 18 year old man is stabbed in the axilla during a fight. His axillary artery is lacerated and repaired. However, the surgeon neglects to repair an associated injury to the upper trunk of the brachial plexus. Which of the following muscles is least likely to demonstrate impaired function as a result?", "options": [{"label_html": "Palmar interossei", "is_correct": true}, {"label_html": "Infraspinatus", "is_correct": false}, {"label_html": "Brachialis", "is_correct": false}, {"label_html": "Supinator brevis", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 0, "explanation_html": "The palmar interossei are supplied by the ulnar nerve. Which lies inferiorly and is therefore less likely to be injured."}, {"number": 98, "topic": "Brachial plexus", "stem_html": "A baby is found to have a Klumpke's palsy post delivery.  Which of the following is most likely to be present?", "options": [{"label_html": "Partial loss of flexors of the wrist", "is_correct": true}, {"label_html": "Weak elbow flexion", "is_correct": false}, {"label_html": "Pronated forearm", "is_correct": false}, {"label_html": "Adducted shoulder", "is_correct": false}, {"label_html": "Shoulder medially rotated", "is_correct": false}], "correct_index": 0, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\"><b>Features of Klumpkes Paralysis<\/b><br><ul><li>Claw hand (MCP joints extended and IP joints flexed)<\/li><li>Loss of sensation over medial aspect of forearm and hand<\/li><li>Horner's syndrome <\/li><li>Loss of flexors of the wrist<\/li><\/ul><\/div>A C8, T1 root lesion is called Klumpke's paralysis and is caused by delivery with the arm extended."}, {"number": 99, "topic": "Brachial plexus", "stem_html": "A motor cyclist is involved in a road traffic accident causing severe right shoulder injuries.  He is found to have an adducted, medially rotated shoulder.  The elbow is fully extended and the forearm pronated.  Which is the most likely diagnosis?", "options": [{"label_html": "C8, T1 root  lesion", "is_correct": false}, {"label_html": "C5, C6 root lesion", "is_correct": true}, {"label_html": "Radial nerve lesion", "is_correct": false}, {"label_html": "Ulnar nerve lesion", "is_correct": false}, {"label_html": "Axillary nerve lesion", "is_correct": false}], "correct_index": 1, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\"><b>Erbs Palsy<\/b> C5, C6 lesion<br>The features include:<br><ul><li>\tWaiter's tip position<\/li><li>\tLoss of shoulder abduction (deltoid and supraspinatus paralysis)<\/li><li>\tLoss of external rotation of the shoulder (paralysis of infraspinatus)<\/li><li>\tLoss of elbow flexion (paralysis of biceps, brachialis and brachioradialis)<\/li><li>\tLoss of forearm supination (paralysis of Biceps)<\/li><\/ul><\/div>The motorcyclist has had an Erb's palsy (C5, C6 root lesion). This is commonly known to be associated with birth injury when a baby has a shoulder dystocia."}, {"number": 100, "topic": "Brachial plexus", "stem_html": "The first root of the brachial plexus commonly arises at which of the following levels?", "options": [{"label_html": "C6", "is_correct": false}, {"label_html": "C5", "is_correct": true}, {"label_html": "C3", "is_correct": false}, {"label_html": "C2", "is_correct": false}, {"label_html": "C8", "is_correct": false}], "correct_index": 1, "explanation_html": "It begins at C5 and has 5 roots. It ends with a total of 15 nerves of these 5 are the main nerves to the upper limb (axillary, radial, ulnar, musculocutaneous and median)"}], "note_html": "The brachial plexus extends from the neck to the axilla. It is formed by the ventral rami of the fifth to the eighth cervical nerves with the ascending part of the first thoracic nerve. <br><br><b>Location of the plexus<\/b><br>The ventral rami which form the plexus enter the lower part of the posterior triangle of the neck in series with the ventral rami of the cervical plexus. The second part of the subclavian artery lies immediately anterior to the lower two rami. The upper three rami intermingle and pass inferolaterally towards the axilla and subclavian artery. They are enclosed within an extension of the prevertebral fascia. In the neck the plexus lies deep to platysma, the supraclavicular nerves, inferior belly of omohyoid and the transverse cervical artery. It then passes deep to the clavicle and the suprascapular vessels, to enter the axilla, and thence surround the second part of the axillary artery<br><br><b>Composition of the plexus<\/b><br>Ventral rami, the roots of the plexus, lie between scalenus medius  and anterior. <br><br>As they enter the posterior triangle, the upper two (C5,6) and lower two (C8, T1) roots of the plexus unite to form the upper and lower trunks of the plexus respectively. Meanwhile, C7 continues as the middle trunk. The lower trunk may groove the superior surface of the first rib posterior to the subclavian artery, and the root from the first ventral ramus is always in contact with it. <br><br>Each trunk divides into ventral and dorsal divisions which are destined to supply the anterior (flexor) and posterior (extensor) parts of the upper limb. <br><br>The cords of the plexus are formed in the axilla. The dorsal divisions unite to form the posterior cord (C5-8). The ventral divisions of the upper and middle trunks unite to form the lateral cord (C5-7), while the ventral divisions of the lower trunk continues as the medial cord (C8-T1). The cords are named according to their relationship to the axillary artery. Each cord terminates by dividing into two main branches at the beginning of the third part of the artery. <br><br><b>Sympathetic communications<\/b><br>The fifth and sixth cervical ventral rami receive grey rami communicantes from the middle cervical ganglion, while the two or more grey rami communicantes pass from the inferior cervical ganglion to the seventh and eighth cervical ventral rami. The first thoracic ventral ramus receives its grey ramus from the cervicothoracic ganglion. Its for this reason that inferior plexus injury can be complicated by a Horners syndrome.<br><br><b>Summary<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Origin<\/b><\/td><td>Anterior rami of C5 to T1<\/td><\/tr><tr><td><b>Sections of the plexus<\/b><\/td><td><ul><li>Roots, trunks, divisions, cords, branches<\/li><li>Mnemonic:<i>Real Teenagers Drink Cold Beer<\/i><\/li><\/ul><\/td><\/tr><tr><td><b>Roots<\/b><\/td><td><ul><li>Located in the posterior triangle<\/li><li>Pass between scalenus anterior and medius<\/li><\/ul><\/td><\/tr><tr><td><b>Trunks<\/b><\/td><td><ul><li>Located posterior to middle third of clavicle<\/li><li>Upper and middle trunks related superiorly to the subclavian artery<\/li><li>Lower trunk passes over 1st rib posterior to the subclavian artery<\/li><\/ul><\/td><\/tr><tr><td><b>Divisions<\/b><\/td><td>Apex of axilla<\/td><\/tr><tr><td><b>Cords<\/b><\/td><td>Related to axillary artery<\/td><\/tr><\/tbody><\/table><\/div><br><i>Diagram illustrating the branches of the brachial plexus<\/i><br><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb010b.jpg\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb010.jpg\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Brachial plexus\" targe
