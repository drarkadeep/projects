 forearm. Which of the following nerves is likely to have been affected?", "options": [{"label_html": "Axillary", "is_correct": false}, {"label_html": "Suprascapular", "is_correct": false}, {"label_html": "Median", "is_correct": false}, {"label_html": "Radial", "is_correct": false}, {"label_html": "Musculocutaneous", "is_correct": true}], "correct_index": 4, "explanation_html": "Musculocutaneous nerve compression due to entrapment of the nerve between biceps and brachialis. Elbow flexion and supination of the arm are affected. This is a rare isolated injury."}, {"number": 370, "topic": "Musculocutaneous nerve", "stem_html": "The following statements relating to the musculocutaneous nerve are true except?", "options": [{"label_html": "It arises from the lateral cord of the brachial plexus", "is_correct": false}, {"label_html": "It provides cutaneous innervation to the lateral side of the forearm", "is_correct": false}, {"label_html": "If damaged, then extension of the elbow joint will be impaired", "is_correct": true}, {"label_html": "It supplies the biceps muscle", "is_correct": false}, {"label_html": "It runs beneath biceps", "is_correct": false}], "correct_index": 2, "explanation_html": "It supplies biceps, brachialis and coracobrachialis. If damaged then elbow flexion will be impaired."}], "note_html": "<ul><li>Branch of lateral cord of brachial plexus<\/li><\/ul><br><b>Path<\/b><br><ul><li>It penetrates the coracobrachialis muscle<\/li><li>Passes obliquely between the biceps brachii and the brachialis to the lateral side of the arm<\/li><li>Above the elbow it pierces the deep fascia lateral to the tendon of the biceps brachii<\/li><li>Continues into the forearm as the lateral cutaneous nerve of the forearm<\/li><\/ul><br><b>Innervates<\/b><br><ul><li>Coracobrachialis<\/li><li>Biceps brachii<\/li><li>Brachialis<\/li><\/ul>"}, {"name": "Nasal cavity", "questions": [{"number": 371, "topic": "Nasal cavity", "stem_html": "An ENT surgeon is undertaking a nasendoscopy to evaluate symptoms of recurrent sinusitis. As she performs the procedure, she notices that there is lesion within the sphenoethmoidal recess. Of the structures outlined below, which is most likely to be compromised as a result?", "options": [{"label_html": "Sphenoidal sinus", "is_correct": true}, {"label_html": "Frontal sinus", "is_correct": false}, {"label_html": "Maxillary sinus", "is_correct": false}, {"label_html": "Anterior ethmoidal sinus", "is_correct": false}, {"label_html": "Posterior ethmoidal sinus", "is_correct": false}], "correct_index": 0, "explanation_html": "The sphenoidal sinus drains into the sphenoethmoidal recess and is likely to be affected. The other sinuses drain into the superior, middle and inferior meatus."}, {"number": 372, "topic": "Nasal cavity", "stem_html": "A middle aged man develops a profound and severe epistaxis that proves impossible to control using conventional strategies. An ENT surgeon decides that a surgical approach to ligate the feeding vessel is required. At theatre, she ligates the maxillary artery. The epistaxis is then controlled. This is because there is a reduction of flow in which of these vessels?", "options": [{"label_html": "Sphenopalatine artery", "is_correct": true}, {"label_html": "Infra orbital artery", "is_correct": false}, {"label_html": "Posterior superior alveolar artery", "is_correct": false}, {"label_html": "Anterior superior alveolar artery", "is_correct": false}, {"label_html": "Masseteric artery", "is_correct": false}], "correct_index": 0, "explanation_html": "Occlusion of the maxillary artery will reduce flow in all these vessels. However, it is the reduction in flow in the sphenopalatine artery that accounts for the control of epistaxis as it is this vessel that supplies the nasal cavity."}, {"number": 373, "topic": "Nasal cavity", "stem_html": "A 6 year old boy with rhinorrhoea, nasal congestion and a cough is brought to the emergency department. They are assessed by one of the clinicians. The nasal cavity is examined with an otoscope, to visualise the cavity, the childs head is tilted posteriorly. As the scope advances past the nostrils, which of the structures listed below will be visualised first?", "options": [{"label_html": "Choana", "is_correct": false}, {"label_html": "Inferior nasal concha", "is_correct": true}, {"label_html": "Middle nasal concha", "is_correct": false}, {"label_html": "Torus tubarius", "is_correct": false}, {"label_html": "Superior nasal concha", "is_correct": false}], "correct_index": 1, "explanation_html": "The inferior nasal concha is the most inferior and anterior and would be seen first. The choana is located  more posteriorly. The torus tubaris is the tubal elevation and is an elevation of the cartilage and mucous membrane that covers the Eustachian tube."}, {"number": 374, "topic": "Nasal cavity", "stem_html": "A 30 year old lady presents to the emergency department with epistaxis originating from her left nostril. She recently had a sinus infection that was addressed with topical nasal sprays. Which arteries contribute to the vascular bed most likely affected in this patient?", "options": [{"label_html": "Ascending pharyngeal, facial and maxillary", "is_correct": false}, {"label_html": "Ascending pharyngeal, lingual and ophthalmic", "is_correct": false}, {"label_html": "Facial, great auricular and lingual", "is_correct": false}, {"label_html": "Facial, maxillary and ophthalmic", "is_correct": true}, {"label_html": "Inferior alveolar, maxillary and ophthalmic", "is_correct": false}], "correct_index": 3, "explanation_html": "These three arteries coalesce at Littles area which is a common site of epistaxis."}], "note_html": "There are two nasal cavities separated by the median nasal septum. This structure consists of septal cartilage and two bony parts: the vomer and the perpendicular plate of the ethmoid bone. Each cavity is approximately 5cm high and 7cm long, from the nares anteriorly to the choanae posteriorly. The lateral walls of each cavity are mainly made up of the maxilla. However, the lacrimal, ethmoid and palatine bones also contribute. The ethmoid gives rise to the two upper protrusions from the lateral walls, the superior and middle conchae. The inferior concha is a separate bone. Above the superior concha lies the sphenoethmoidal recess. The spaces inferior to conchae are the superior, middle and inferior meatus. The structures draining into each space are shown below:<br><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th>Sphenoethmoidal recess<\/th><th>Sphenoidal sinus<\/th><\/tr><\/thead><tbody><tr><td>Superior meatus<\/td><td>Posterior ethmoidal sinus<\/td><\/tr><tr><td>Middle meatus<\/td><td>Frontal sinus, maxillary sinus ,anterior and middle ethmoidal sinus<\/td><\/tr><tr><td>Inferior meatus<\/td><td>Nasolacrimal duct<\/td><\/tr><\/tbody><\/table><\/div><br><br>The main arterial supply to the septum and lateral walls is the sphenopalatine artery, a branch of the maxillary artery. The olfactory nerve conveys special sensation. Common sensation from the nasal mucosa is conveyed by the trigeminal nerve."}, {"name": "Nerve lesions during surgery", "questions": [{"number": 375, "topic": "Nerve lesions during surgery", "stem_html": "A 29 year old woman has had a Pfannenstiel incision. She has pain over the inguinal ligament which radiates to the lower abdomen. There is tenderness when the inguinal canal is compressed. Which of the following is most likely to have been affected?", "options": [{"label_html": "Genitofemoral nerve", "is_correct": false}, {"label_html": "Ilioinguinal nerve", "is_correct": true}, {"label_html": "Lateral cutaneous nerve of the thigh", "is_correct": false}, {"label_html": "Iliohypogastric nerve", "is_correct": false}, {"label_html": "Saphenous nerve", "is_correct": false}], "correct_index": 1, "explanation_html": "<p>No explanation provided.<\/p>"}, {"number": 376, "topic": "Nerve lesions during surgery", "stem_html": "A 29 year old woman has had a Pfannenstiel incision. She has pain over the inguinal ligament which radiates to the lower abdomen. There is tenderness when the inguinal canal is compressed. Which of the following is most likely to have been affected?", "options": [{"label_html": "Genitofemoral nerve", "is_correct": false}, {"label_html": "Ilioinguinal nerve", "is_correct": true}, {"label_html": "Lateral cutaneous nerve of the thigh", "is_correct": false}, {"label_html": "Iliohypogastric nerve", "is_correct": false}, {"label_html": "Saphenous nerve", "is_correct": false}], "correct_index": 1, "explanation_html": "<p>No explanation provided.<\/p>"}, {"number": 377, "topic": "Nerve lesions during surgery", "stem_html": "Which of the muscles listed below would be affected if the radial nerve were injured in a humeral shaft fracture?", "options": [{"label_html": "Supinator", "is_correct": true}, {"label_html": "Flexor digitorum profundus", "is_correct": false}, {"label_html": "Brachialis", "is_correct": false}, {"label_html": "Abductor pollicis brevis", "is_correct": false}, {"label_html": "Abductor digiti minimi", "is_correct": false}], "correct_index": 0, "explanation_html": "<p>No explanation provided.<\/p>"}], "note_html": "A variety of different procedures carry the risk of iatrogenic nerve injury. These are important not only from the patients perspective but also from a medicolegal standpoint.<br><br>The following operations and their associated nerve lesions are listed here:<br><ul><li>Posterior triangle lymph node biopsy and accessory nerve lesion.<\/li><li>Lloyd Davies stirrups and common peroneal nerve.<\/li><li>Thyroidectomy and laryngeal nerve.<\/li><li>Anterior resection of rectum and hypogastric autonomic nerves.<\/li><li>Axillary node clearance; long thoracic nerve, thoracodorsal nerve and intercostobrachial nerve.<\/li><li>Inguinal hernia surgery and ilioinguinal nerve.<\/li><li>Varicose vein surgery- sural and saphenous nerves.<\/li><li>Posterior approach to the hip and sciatic nerve.<\/li><li>Carotid endarterectomy and hypoglossal nerve.<\/li><\/ul><br>There are many more, with sound anatomical understanding of the commonly performed procedures the incidence of nerve lesions can be minimised. They commonly occur when surgeons operate in an unfamiliar tissue plane or by blind placement of haemostats (not recommended)."}, {"name": "Nerve signs", "questions": [{"number": 378, "topic": "Nerve signs", "stem_html": "In Froment's test which muscle function is tested?", "options": [{"label_html": "Flexor pollicis longus", "is_correct": false}, {"label_html": "Abductor pollicis longus", "is_correct": false}, {"label_html": "Abductor pollicis brevis", "is_correct": false}, {"label_html": "Adductor pollicis", "is_correct": true}, {"label_html": "Opponens pollicis", "is_correct": false}], "correct_index": 3, "explanation_html": "<p>No explanation provided.<\/p>"}], "note_html": "<b>Froment's sign<\/b><br> <br><ul><li>Assess for ulnar nerve palsy<\/li><li>Adductor pollicis muscle function tested<\/li><li>Hold a piece of paper between their thumb and index finger. The object is then pulled away.  If ulnar nerve palsy, unable to hold the paper and will flex the flexor pollicis longus to compensate (flexion of thumb at interphalangeal joint).<\/li><\/ul><br><b>Phalen's test<\/b><br><br><ul><li>Assess carpal tunnel syndrome<\/li><li>More sensitive than Tinel's sign<\/li><li>Hold wrist in maximum flexion and the test is positive if there is numbness in the median nerve distribution.<\/li><\/ul><br><b>Tinel's sign<\/b><br><br><ul><li>Assess for carpal tunnel syndrome<\/li><li>Tap the median nerve at the wrist and the test is positive if there is tingling/electric-like sensations over the distribution of the median nerve.<\/li><\/ul>"}, {"name": "Obturator nerve", "questions": [{"number": 379, "topic": "Obturator nerve", "stem_html": "A 20 year old lady presents with pain on the medial aspect of her thigh. Investigations show a large ovarian cyst. Compression of which of the nerves listed below is the most likely underlying cause?", "options": [{"label_html": "Sciatic", "is_correct": false}, {"label_html": "Genitofemoral", "is_correct": false}, {"label_html": "Obturator", "is_correct": true}, {"label_html": "Ilioinguinal", "is_correct": false}, {"label_html": "Femoral cutaneous", "is_correct": false}], "correct_index": 2, "explanation_html": "The cutaneous branch of the obturator nerve is frequently absent. However, the obturator nerve is a recognised contributor to innervation of the medial thigh and large pelvic tumours may compress this nerve with resultant pain radiating distally."}, {"number": 380, "topic": "Obturator nerve", "stem_html": "A 25 year old man undergoes an excision of a pelvic chondrosarcoma, during the operation the obturator nerve is sacrificed. Which of the following muscles is least likely to be affected as a result?", "options": [{"label_html": "Adductor longus", "is_correct": false}, {"label_html": "Pectineus", "is_correct": false}, {"label_html": "Adductor magnus", "is_correct": false}, {"label_html": "Sartorius", "is_correct": true}, {"label_html": "Gracilis", "is_correct": false}], "correct_index": 3, "explanation_html": "Sartorius is supplied by the femoral nerve.  In approximately 20% of the population, pectineus is supplied by the accessory obturator nerve. Adductor magnus has a composite supply from the obturator and sciatic nerves."}, {"number": 381, "topic": "Obturator nerve", "stem_html": "A 52 year female post hysterectomy attends clinic.  She reports pain and reduced sensation over the medial aspect of her thigh.  Clinically thigh adduction is weak.  What is the most likely nerve injury?", "options": [{"label_html": "Obturator nerve", "is_correct": true}, {"label_html": "Sciatic nerve", "is_correct": false}, {"label_html": "Femoral nerve", "is_correct": false}, {"label_html": "L3 cord compression", "is_correct": false}, {"label_html": "Deep peroneal nerve", "is_correct": false}], "correct_index": 0, "explanation_html": "The obturator nerve supplies sensation to the medial aspect of the thigh and causes adduction and internal rotation of the thigh.<br>Injury occurs during pelvic or abdominal surgery.<br>L3 cord compression is unlikely."}, {"number": 382, "topic": "Obturator nerve", "stem_html": "A 67 year old man is undergoing a transurethral resection of a bladder tumour using diathermy. Suddenly during the procedure the patient's thigh begins to twitch. Stimulation of which of the following nerves is the most likely cause?", "options": [{"label_html": "Femoral", "is_correct": false}, {"label_html": "Pudendal", "is_correct": false}, {"label_html": "Sciatic", "is_correct": false}, {"label_html": "Obturator", "is_correct": true}, {"label_html": "Gluteal", "is_correct": false}], "correct_index": 3, "explanation_html": "The obturator nerve is most closely related to the bladder (see below)<br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb099b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb099.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Obturator nerve\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb099b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}], "note_html": "The obturator nerve arises from L2, L3 and L4 by branches from the ventral divisions of each of these nerve roots. L3 forms the main contribution and the second lumbar branch is occasionally absent. These branches unite in the substance of psoas major, descending vertically in its posterior part to emerge from its medial border at the lateral margin of the sacrum. It then crosses the sacroiliac joint to enter the lesser pelvis, it descends on obturator internus to enter the obturator groove. In the lesser pelvis the nerve lies lateral to the internal iliac vessels and ureter, and is joined by the obturator vessels lateral to the ovary or ductus deferens. <br><br><b>Supplies<\/b><br><ul><li>Medial compartment of thigh<\/li><li>Muscles supplied: external obturator, adductor longus, adductor brevis, adductor magnus (not the lower part-sciatic nerve), gracilis<\/li><li>The cutaneous branch is often absent. When present, it passes between gracilis and adductor longus near the middle part of the thigh, and supplies the skin and fascia of the distal two thirds of the medial aspect. <\/li><\/ul><br><b>Obturator canal<\/b><br><ul><li>Connects the pelvis and thigh: contains the obturator artery, vein, nerve which divides into anterior and posterior branches.<\/li><\/ul><br><i>Cadaveric cross section demonstrating relationships of the obturator nerve<\/i><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb122b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb122.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Obturator nerve\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb122b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}, {"name": "Oesophagus", "questions": [{"number": 383, "topic": "Oesophagus", "stem_html": "The oesophagus is constricted at the following levels apart from:", "options": [{"label_html": "Cricoid cartilage", "is_correct": false}, {"label_html": "Arch of the aorta", "is_correct": false}, {"label_html": "Lower oesophageal sphincter", "is_correct": true}, {"label_html": "Left main stem bronchus", "is_correct": false}, {"label_html": "Diaphragmatic hiatus", "is_correct": false}], "correct_index": 2, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\"><br>Constrictions of the oesophagus : ABCD <br>A- Arch of the Aorta <br>B- Left main Bronchus <br>C- Cricoid Cartilage <br>D- Diaphragmatic Hiatus <\/div>The oesophagus is not constricted at the level of the lower oesophageal sphincter."}, {"number": 384, "topic": "Oesophagus", "stem_html": "Which of the following types of epithelium lines the lumenal surface of the normal oesophagus?", "options": [{"label_html": "Non keratinised stratified squamous epithelium", "is_correct": true}, {"label_html": "Ciliated columnar epithelium", "is_correct": false}, {"label_html": "Keratinised stratified squamous epithelium", "is_correct": false}, {"label_html": "Non ciliated columnar epithelium", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 0, "explanation_html": "The oesphagus is lined by non keratinised stratified squamous epithelium. Changes to glandular type epithelium occur as part of metaplastic processes in reflux."}, {"number": 385, "topic": "Oesophagus", "stem_html": "Which of the following overlies the outer muscular layer of the intrathoracic oesophagus?", "options": [{"label_html": "Serosa", "is_correct": false}, {"label_html": "Meissners plexus", "is_correct": false}, {"label_html": "Auerbach's plexus", "is_correct": false}, {"label_html": "Loose connective tissue", "is_correct": true}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 3, "explanation_html": "The oesophagus has no serosal covering and hence holds sutures poorly. The Auerbach's and Meissner's nerve plexuses lie in  between the longitudinal and circular muscle layers and submucosally. The sub mucosal location of the Meissner's nerve plexus facilitates its sensory role."}, {"number": 386, "topic": "Oesophagus", "stem_html": "Following an oesophagogastrectomy the surgeons will anastomose the oesophageal remnant to the stomach, which of the following is not part of the layers that comprise the oesophageal wall?", "options": [{"label_html": "Serosa", "is_correct": true}, {"label_html": "Adventitia", "is_correct": false}, {"label_html": "Muscularis propria", "is_correct": false}, {"label_html": "Submucosa", "is_correct": false}, {"label_html": "Mucosa", "is_correct": false}], "correct_index": 0, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">The oesophageal wall lacks the serosa layer<\/div>The wall lacks a serosa which can make the wall hold sutures less securely."}, {"number": 387, "topic": "Oesophagus", "stem_html": "Following an oesophagogastrectomy the surgeons will anastomose the oesophageal remnant to the stomach, which of the following is not part of the layers that comprise the oesophageal wall?", "options": [{"label_html": "Serosa", "is_correct": true}, {"label_html": "Adventitia", "is_correct": false}, {"label_html": "Muscularis propria", "is_correct": false}, {"label_html": "Submucosa", "is_correct": false}, {"label_html": "Mucosa", "is_correct": false}], "correct_index": 0, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">The oesophageal wall lacks the serosa layer<\/div>The wall lacks a serosa which can make the wall hold sutures less securely."}, {"number": 388, "topic": "Oesophagus", "stem_html": "A 74 year old man is assessed as having oesophageal varices at endoscopy. What is the venous drainage of these varices?", "options": [{"label_html": "Left gastric vein", "is_correct": false}, {"label_html": "Splenic vein", "is_correct": false}, {"label_html": "Portal vein", "is_correct": false}, {"label_html": "Hemiazygos vein", "is_correct": true}, {"label_html": "Renal vein", "is_correct": false}], "correct_index": 3, "explanation_html": "Remember that with impairment of flow through the portal system. The feeding vessels will be the gastric veins and drainage superiorly to the azygos system (i.e. reverse flow)."}, {"number": 389, "topic": "Oesophagus", "stem_html": "A 56 year old man presents with dysphagia and a tumour is identified on the right hand side of  the middle third of the oesophagus. What is the primary site of lymphatic drainage of this site?", "options": [{"label_html": "Cervical lymph nodes", "is_correct": false}, {"label_html": "Lymphatic duct", "is_correct": false}, {"label_html": "Left gastric nodes", "is_correct": false}, {"label_html": "Para tracheal lymph nodes", "is_correct": true}, {"label_html": "Supra clavicular nodes", "is_correct": false}], "correct_index": 3, "explanation_html": "The oesophageal lymphatic drainage is complex. The upper oesophagus can drain to nodes in the neck or the thoracic duct directly. In the mid oesophagus, lesions on the left can pass to the thoracic duct direct. On the right, it is via the paratracheal and mediastinal nodes. Lower lesions and junctional tumours can spread via the left gastric nodes."}, {"number": 390, "topic": "Oesophagus", "stem_html": "At which of the following spinal levels does the oesophagus pass through the diaphragm into the abdominal cavity?", "options": [{"label_html": "L2", "is_correct": false}, {"label_html": "L1", "is_correct": false}, {"label_html": "T10", "is_correct": true}, {"label_html": "T5", "is_correct": false}, {"label_html": "T12", "is_correct": false}], "correct_index": 2, "explanation_html": "The oesophagus passes into the abdomen at T10."}], "note_html": "- 25cm long<br><ul><li>Starts at C6 vertebra, pierces diaphragm at T10 and ends at T11<\/li><li>Squamous epithelium<\/li><\/ul><br><b>Constrictions of the oesophagus<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Structure<\/b><\/td><td><b>Distance from incisors<\/b><\/td><\/tr><tr><td>Cricoid cartilage<\/td><td>15cm<\/td><\/tr><tr><td>Arch of the Aorta<\/td><td>22.5cm<\/td><\/tr><tr><td>Left principal bronchus<\/td><td>27cm<\/td><\/tr><tr><td>Diaphragmatic hiatus<\/td><td>40cm<\/td><\/tr><\/tbody><\/table><\/div><br><b>Relations<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Anteriorly<\/b><\/td><td><ul><li>Trachea to T4<\/li><li>Recurrent laryngeal nerve<\/li><li>Left bronchus, Left atrium<\/li><li>Diaphragm<\/li><\/ul><\/td><\/tr><tr><td><b>Posteriorly<\/b><\/td><td><ul><li>Thoracic duct to left at T5<\/li><li>Hemiazygos to the left T8<\/li><li>Descending aorta<\/li><li>First 2 intercostal branches of aorta<\/li><\/ul><\/td><\/tr><tr><td><b>Left <\/b><\/td><td><ul><li>Thoracic duct<\/li><li>Left subclavian artery<\/li><\/ul><\/td><\/tr><tr><td><b>Right<\/b><\/td><td><ul><li>Azygos vein<\/li><\/ul><\/td><\/tr><\/tbody><\/table><\/div><br><b>Arterial, venous and lymphatic drainage of the oesophagus<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><\/td><td>\t <b>Artery<\/b><\/td><td><b>Vein<\/b><\/td><td><b>Lymphatics<\/b><\/td><td><b>Muscularis externa<\/b><\/td><\/tr><tr><td><b>Upper third<\/b><\/td><td>\t \tInferior thyroid\t<\/td><td>\t Inferior thyroid\t<\/td><td>\t Deep cervical\t<\/td><td>\t Striated muscle<\/td><\/tr><tr><td><b>Mid third\t<\/b><\/td><td>\t Aortic branches\t<\/td><td>\t Azygos branches\t<\/td><td>\t Mediastinal\t<\/td><td>\t Smooth &amp; striated muscle<\/td><\/tr><tr><td><b>Lower third<\/b><\/td><td>\t \tLeft gastric\t<\/td><td>\t Left gastric\t<\/td><td>\t Gastric\t<\/td><td>\t Smooth muscle<\/td><\/tr><\/tbody><\/table><\/div><br><b>Nerve supply<\/b><br><ul><li>Upper half is supplied by recurrent laryngeal nerve<\/li><li>Lower half by oesophageal plexus (vagus)<\/li><\/ul><br><b>Histology<\/b><br><ul><li>Mucosa :Non-keratinized stratified squamous epithelium<\/li><li>Submucosa: glandular tissue <\/li><li>Muscularis externa (muscularis): composition varies. See table<\/li><li>Adventitia<\/li><\/ul>"}, {"name": "Omentum", "questions": [{"number": 391, "topic": "Omentum", "stem_html": "During a radical gastrectomy for carcinoma of the stomach the surgeons remove the omentum. What is the main source of its blood supply?", "options": [{"label_html": "Ileocolic artery", "is_correct": false}, {"label_html": "Superior mesenteric artery", "is_correct": false}, {"label_html": "Gastroepiploic artery", "is_correct": true}, {"label_html": "Middle colic artery", "is_correct": false}, {"label_html": "Inferior mesenteric artery", "is_correct": false}], "correct_index": 2, "explanation_html": "The vessels supplying the omentum are the omental branches of the right and left gastro-epiploic arteries. The colonic vessels are not responsible for the arterial supply to the omentum. The left gastro-epiploic artery is a branch of the splenic artery and the right gastro-epiploic artery is a terminal branch of the gastroduodenal artery."}, {"number": 392, "topic": "Omentum", "stem_html": "Which of the following statements relating to the greater omentum is false?", "options": [{"label_html": "It is less well developed in children under 5.", "is_correct": false}, {"label_html": "It has no relationship to the lesser sac.", "is_correct": true}, {"label_html": "It contains the gastroepiploic arteries.", "is_correct": false}, {"label_html": "Has an attachment to the transverse colon.", "is_correct": false}, {"label_html": "It may be a site of metastatic disease in ovarian cancer.", "is_correct": false}], "correct_index": 1, "explanation_html": "It is connected with the lesser sac and the transverse colon. This plane is entered when performing a colonic resection. It is a common site of metastasis in many visceral malignancies."}], "note_html": "<ul><li>The omentum is divided into two parts which invest the stomach. Giving rise to the greater and lesser omentum. The greater omentum is attached to the inferolateral border of the stomach and houses the gastro-epiploic arteries. <\/li><li>It is of variable size but is less well developed in children. This is important as the omentum confers protection against visceral perforation (e.g. Appendicitis).<\/li><li>Inferiorly between the omentum and transverse colon is one potential entry point into the lesser sac.<\/li><li>Several malignant processes may involve the omentum of which ovarian cancer is the most notable.<\/li><\/ul>"}, {"name": "Pancreas", "questions": [{"number": 393, "topic": "Pancreas", "stem_html": "In patients with an annular pancreas where is the most likely site of obstruction?", "options": [{"label_html": "The first part of the duodenum", "is_correct": false}, {"label_html": "The second part of the duodenum", "is_correct": true}, {"label_html": "The fourth part of the duodenum", "is_correct": false}, {"label_html": "The third part of the duodenum", "is_correct": false}, {"label_html": "The duodeno-jejunal flexure", "is_correct": false}], "correct_index": 1, "explanation_html": "The pancreas develops from two foregut outgrowths (ventral and dorsal). During rotation the ventral bud and adjacent gallbladder and bile duct lie together and fuse. When the pancreas fails to rotate normally it can compress the duodenum with development of obstruction. Usually occurring as a result of associated duodenal malformation. The second part of the duodenum is the commonest site."}, {"number": 394, "topic": "Pancreas", "stem_html": "A 56 year old man is undergoing a pancreatectomy for carcinoma. During resection of the gland which of the following structures will the surgeon not encounter posterior to the pancreas itself?", "options": [{"label_html": "Left crus of the diaphragm", "is_correct": false}, {"label_html": "Superior mesenteric vein", "is_correct": false}, {"label_html": "Common bile duct", "is_correct": false}, {"label_html": "Portal vein", "is_correct": false}, {"label_html": "Gastroduodenal artery", "is_correct": true}], "correct_index": 4, "explanation_html": "The gastroduodenal artery divides into the gastro-epiploic and pancreaticoduodenal arteries at the superior aspect of the pancreas."}, {"number": 395, "topic": "Pancreas", "stem_html": "During embryological development, which of the following represent the correct origin of the pancreas?", "options": [{"label_html": "Ventral and dorsal endodermal outgrowths of the duodenum", "is_correct": true}, {"label_html": "Ventral and dorsal outgrowths of mesenchymal tissue from the posterior abdominal wall", "is_correct": false}, {"label_html": "Ventral and dorsal outgrowths of the vitellointestinal duct", "is_correct": false}, {"label_html": "Ventral and dorsal biliary tract diverticulae", "is_correct": false}, {"label_html": "Buds from the inferior aspect of the caudate lobe", "is_correct": false}], "correct_index": 0, "explanation_html": "The pancreas develops from a ventral and dorsal endodermal outgrowth of the duodenum. The ventral arises close to, or in common with the hepatic diverticulum, and the larger, dorsal outgrowth arises slightly cranial to the ventral extending into the mesoduodenum and mesogastrium. When the buds eventually fuse the duct of the ventral rudiment becomes the main pancreatic duct."}, {"number": 396, "topic": "Pancreas", "stem_html": "A 60 year old female is undergoing a Whipples procedure for adenocarcinoma of the pancreas. As the surgeons begin to mobilise the  pancreatic head they identify a large vessel passing inferiorly over the anterior aspect of the uncinate process. What is it likely to be?", "options": [{"label_html": "Superior mesenteric artery", "is_correct": true}, {"label_html": "Coeliac axis", "is_correct": false}, {"label_html": "Inferior mesenteric artery", "is_correct": false}, {"label_html": "Aorta", "is_correct": false}, {"label_html": "Left gastric artery", "is_correct": false}], "correct_index": 0, "explanation_html": "The superior mesenteric artery arises from the aorta and passes anterior to the lower part of the pancreas. Invasion of this structure is a relative contra indication to resectional surgery."}, {"number": 397, "topic": "Pancreas", "stem_html": "A 53 year old man is undergoing a distal pancreatectomy for trauma. Which of the following vessels is responsible for the arterial supply to the tail of the pancreas?", "options": [{"label_html": "Splenic artery", "is_correct": true}, {"label_html": "Pancreaticoduodenal artery", "is_correct": false}, {"label_html": "Gastric artery", "is_correct": false}, {"label_html": "Hepatic artery", "is_correct": false}, {"label_html": "Superior mesenteric artery", "is_correct": false}], "correct_index": 0, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Pancreatic head is supplied by the pancreaticoduodenal artery <br>Pancreatic tail is supplied by branches of the splenic artery<\/div>There is an arterial watershed in the supply between the head and tail of the pancreas. The head is supplied by the pancreaticoduodenal artery and the tail is supplied by branches of the splenic artery."}, {"number": 398, "topic": "Pancreas", "stem_html": "A 53 year old man is undergoing a distal pancreatectomy for trauma. Which of the following vessels is responsible for the arterial supply to the tail of the pancreas?", "options": [{"label_html": "Splenic artery", "is_correct": true}, {"label_html": "Pancreaticoduodenal artery", "is_correct": false}, {"label_html": "Gastric artery", "is_correct": false}, {"label_html": "Hepatic artery", "is_correct": false}, {"label_html": "Superior mesenteric artery", "is_correct": false}], "correct_index": 0, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Pancreatic head is supplied by the pancreaticoduodenal artery <br>Pancreatic tail is supplied by branches of the splenic artery<\/div>There is an arterial watershed in the supply between the head and tail of the pancreas. The head is supplied by the pancreaticoduodenal artery and the tail is supplied by branches of the splenic artery."}], "note_html": "The pancreas is a retroperitoneal organ and lies posterior to the stomach. It may be accessed surgically by dividing the peritoneal reflection that connects the greater omentum to the transverse colon. The pancreatic head sits in the curvature of the duodenum. Its tail lies close to the hilum of the spleen, a site of potential injury during splenectomy. <br><br><b>Relations<\/b><br><b>Posterior to the pancreas<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Pancreatic head<\/b><\/td><td>Inferior vena cava<br>Common bile duct <br>Right and left renal veins <br>Superior mesenteric vein and artery<\/td><\/tr><tr><td><b>Pancreatic neck<\/b><\/td><td>Superior mesenteric vein, portal vein<\/td><\/tr><tr><td><b>Pancreatic body<\/b>-<\/td><td>Left renal vein<br>Crus of diaphragm<br>Psoas muscle<br>Adrenal gland<br>Kidney <br>Aorta<\/td><\/tr><tr><td><b>Pancreatic tail<\/b><\/td><td>Left kidney<\/td><\/tr><\/tbody><\/table><\/div><br><b>Anterior to the pancreas<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Pancreatic head<\/b><\/td><td>1st part of the duodenum<br>Pylorus<br>SMA and SMV(uncinate process)<\/td><\/tr><tr><td><b>Pancreatic body<\/b><\/td><td>Stomach<br>Duodenojejunal flexure<\/td><\/tr><tr><td><b>Pancreatic tail<\/b><\/td><td>Splenic hilum<\/td><\/tr><\/tbody><\/table><\/div><br><b>Superior to the pancreas<\/b><br>Coeliac trunk and its branches common hepatic artery and splenic artery<br><br><b>Grooves of the head of the pancreas<\/b><br>2nd and 3rd part of the duodenum<br><br><b>Arterial supply<\/b><br><ul><li>Head:  pancreaticoduodenal artery<\/li><li>Rest:  splenic artery<\/li><\/ul><br><b>Venous drainage<\/b><br><ul><li>Head:  superior mesenteric vein<\/li><li>Body and tail:  splenic vein<\/li><\/ul><br><b>Ampulla of Vater<\/b><br><ul><li>Merge of pancreatic duct and common bile duct<\/li><li>Is an important landmark, halfway along the second part of the duodenum, that marks the anatomical transition from foregut to midgut (also the site of transition between regions supplied by coeliac trunk and SMA).<\/li><\/ul><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb101b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb101.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Ampulla of Vater\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb101b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}, {"name": "Pancreatic embryology", "questions": [{"number": 399, "topic": "Pancreatic embryology", "stem_html": "A 63 year old lady is undergoing an ERCP and the main pancreatic duct is cannulated. What is the embryological origin of this structure?", "options": [{"label_html": "The duct of the ventral outgrowth of the duodenum", "is_correct": true}, {"label_html": "The duct of the dorsal outgrowth of the duodenum", "is_correct": false}, {"label_html": "As an outgrowth of the embryological hepatic diverticulum", "is_correct": false}, {"label_html": "As a projection of the vitellointestinal duct", "is_correct": false}, {"label_html": "As a projection from the yolk sac", "is_correct": false}], "correct_index": 0, "explanation_html": "The main pancreatic duct is largely formed from the duct of  the ventral pancreas having fused with the dorsal part of the  gland."}], "note_html": "The pancreas develops from a ventral and dorsal entodermal outgrowth from the duodenum. The ventral arises close to, or in common with, the hepatic diverticulum, and the larger, dorsal outgrowth arises slightly cranial to the ventral and extends into the mesoduodenum and dorsal mesogastrium. As a result of the differential growth in the duodenal wall, the point of attachment of the ventral outgrowth with the undivided stem of the hepatic diverticulum and the ventral mesentery are displaced around the right hand side of the  duodenum to a dorsal position. As a result, the two pancreatic remnants eventually lie together and then become fused. In this process the ventral rudiment forms the uncinate process and the adjacent region of the head, while the dorsal forms the anterior part of the head, the body and the tail of the pancreas. <br>At the time of fusion, the ducts become joined. This occurs in a manner that results in the dorsal remnant being drained by the duct of the ventral remnant, this composite duct being named the pancreatic duct."}, {"name": "Parathyroid glands- anatomy", "questions": [{"number": 400, "topic": "Parathyroid glands- anatomy", "stem_html": "A 34 year old lady suffers from hyperparathyroidism. The right inferior parathyroid is identified as having an adenoma and is scheduled for resection. From which of the following embryological structures is it derived?", "options": [{"label_html": "Second pharyngeal pouch", "is_correct": false}, {"label_html": "Third pharyngeal pouch", "is_correct": true}, {"label_html": "Fourth pharyngeal pouch", "is_correct": false}, {"label_html": "First pharyngeal pouch", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 1, "explanation_html": "The inferior parathyroid is a derivative of the third pharyngeal pouch. The superior parathyroid originates from the fourth pharyngeal pouch."}, {"number": 401, "topic": "Parathyroid glands- anatomy", "stem_html": "A surgical resection specimen is analysed histologically. The pathologist comments that at the periphery of the resected specimen, oxyphil cells are identified. In which of the structures listed below are these cells typically found?", "options": [{"label_html": "Thymus", "is_correct": false}, {"label_html": "Thyroid gland", "is_correct": false}, {"label_html": "Parathyroid gland", "is_correct": true}, {"label_html": "Lymph node", "is_correct": false}, {"label_html": "Adrenal gland", "is_correct": false}], "correct_index": 2, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Oxyphil cells are typically found in parathyroid glands<\/div>"}, {"number": 402, "topic": "Parathyroid glands- anatomy", "stem_html": "A 38 year old lady is due to undergo a parathyroidectomy for hyperparathyroidism. At operation the inferior parathyroid gland is identified as being enlarged. A vessel is located adjacent to the gland laterally. This vessel is most likely to be the:", "options": [{"label_html": "External carotid artery", "is_correct": false}, {"label_html": "Common carotid artery", "is_correct": true}, {"label_html": "Internal carotid artery", "is_correct": false}, {"label_html": "External jugular vein", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 1, "explanation_html": "The common carotid artery is a lateral relation of the inferior parathyroid."}], "note_html": "<ul><li>Four parathyroid glands<\/li><li>Located posterior to the thyroid gland<\/li><li>They lie within the pretracheal fascia<\/li><\/ul><br><b>Embryology<\/b><br>The parathyroids develop from the extremities of the third and fourth pharyngeal pouches. The parathyroids derived from the fourth pharyngeal pouch are located more superiorly and are associated with the thyroid gland. Those derived from the third pharyngeal pouch lie more inferiorly and may become associated with the thymus. <br><br><b>Blood supply<\/b><br>The blood supply to the parathyroid glands is derived from the inferior and superior thyroid arteries[1]. There is a rich anastomosis between the two vessels. Venous drainage is into the thyroid veins.<br><br><b>Relations<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Laterally<\/b><\/td><td>Common carotid<\/td><\/tr><tr><td><b>Medially<\/b><\/td><td>Recurrent laryngeal nerve, trachea<\/td><\/tr><tr><td><b>Anterior<\/b><\/td><td>Thyroid<\/td><\/tr><tr><td><b>Posterior<\/b><\/td><td>Pretracheal fascia<\/td><\/tr><\/tbody><\/table><\/div><br><br><b>References<\/b><br>1.Nobori, M., et al., Blood supply of the parathyroid gland from the superior thyroid artery. Surgery, 1994. 115(4): p. 417-23."}, {"name": "Parotid gland", "questions": [{"number": 403, "topic": "Parotid gland", "stem_html": "A 56 year old man is undergoing a superficial parotidectomy for a pleomorphic adenoma. During the dissection of the parotid, which of the following structures will be encountered lying most superficially?", "options": [{"label_html": "Facial nerve", "is_correct": true}, {"label_html": "External carotid artery", "is_correct": false}, {"label_html": "Occipital artery", "is_correct": false}, {"label_html": "Maxillary artery", "is_correct": false}, {"label_html": "Retromandibular vein", "is_correct": false}], "correct_index": 0, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Most superficial structure on the parotid gland = facial nerve<\/div>The facial nerve is the most superficial structure in the parotid gland. Slightly deeper to this lies the retromandibular vein, with the arterial layer lying most deeply."}, {"number": 404, "topic": "Parotid gland", "stem_html": "A 28 year old man has a pleomorphic adenoma and the decision is made to resect this surgically. Which of the following structures is least likely to be encountered during surgical resection of the parotid gland?", "options": [{"label_html": "External carotid artery", "is_correct": false}, {"label_html": "Retromandibular vein", "is_correct": false}, {"label_html": "Auriculotemporal nerve", "is_correct": false}, {"label_html": "Mandibular branch of trigeminal nerve", "is_correct": true}, {"label_html": "Zygomatic branch of the facial nerve", "is_correct": false}], "correct_index": 3, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\"><b>Structures passing through the parotid gland<\/b><br><ul><li>Facial nerve and branches<\/li><li>External carotid artery (and its branches; the maxillary and superficial temporal)<\/li><li>Retromandibular vein<\/li><li>Auriculotemporal nerve<\/li><\/ul><\/div>The mandibular nerve is well separated from the parotid gland.<br>The maxillary vein joins to the superficial temporal vein and they form the retromandibular vein which then runs through the parotid gland.<br>The auriculotemporal nerve runs through the gland. Following a parotidectomy this nerve may be damaged and during neuronal regrowth may then attach to sweat glands in this region. This can then cause gustatory sweating (<i>Freys Syndrome<\/i>). <br>The facial nerve branch is the marginal mandibular branch and this is related to the gland."}, {"number": 405, "topic": "Parotid gland", "stem_html": "Which of the following nerves is most often permanently damaged during a superficial parotidectomy?", "options": [{"label_html": "Greater auricular", "is_correct": true}, {"label_html": "Facial", "is_correct": false}, {"label_html": "Greater occipital", "is_correct": false}, {"label_html": "Accessory", "is_correct": false}, {"label_html": "Opthalmic branch of the trigeminal", "is_correct": false}], "correct_index": 0, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">If you are confused by this, make sure you are clear on what the question is asking- its about nerve injury. Its very rare for the facial nerve to be injured during parotid surgery. <\/div>The greater auricular nerve and in particular its lobular branch is commonly injured in parotid surgery and consent usually makes particular reference to this. In a superficial parotidectomy, the facial nerve should not be injured and this is less common than a greater auricular nerve injury. Where facial nerve paresis occurs, its usually transient."}, {"number": 406, "topic": "Parotid gland", "stem_html": "Where does Stensens duct primarily open?", "options": [{"label_html": "Immediately lateral to the foramen caecum", "is_correct": false}, {"label_html": "Floor of mouth", "is_correct": false}, {"label_html": "Opposite the second molar tooth", "is_correct": true}, {"label_html": "Opposite the fifth molar tooth", "is_correct": false}, {"label_html": "Into the post nasal space", "is_correct": false}], "correct_index": 2, "explanation_html": "Stensens duct conveys secretions from the parotid gland and these enter the oral cavity at the level of the second molar tooth."}, {"number": 407, "topic": "Parotid gland", "stem_html": "Parasympathetic fibres innervating the parotid gland originate from which of the following?", "options": [{"label_html": "Submandibular ganglion", "is_correct": false}, {"label_html": "Otic ganglion", "is_correct": true}, {"label_html": "Ciliary ganglion", "is_correct": false}, {"label_html": "Pterygopalatine ganglion", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 1, "explanation_html": "Secretion of saliva by the parotid gland is controlled by nerve fibres originating in the inferior salivatory nucleus; these leave the brain via the tympanic nerve (branch of glossopharyngeal nerve (CN IX), travel through the tympanic plexus (located in the middle ear), and then form the lesser petrosal nerve until reaching the otic ganglion. After synapsing in the Otic ganglion, the postganglionic (postsynaptic) fibres travel as part of the auriculotemporal nerve (a branch of the mandibular nerve (V3) to reach the parotid gland."}, {"number": 408, "topic": "Parotid gland", "stem_html": "Which of the following muscles is penetrated by the parotid duct?", "options": [{"label_html": "Medial pterygoid", "is_correct": false}, {"label_html": "Buccinator", "is_correct": true}, {"label_html": "Levator anguli oris", "is_correct": false}, {"label_html": "Temporalis", "is_correct": false}, {"label_html": "Masseter", "is_correct": false}], "correct_index": 1, "explanation_html": "The duct crosses the masseter muscle and buccal fat pad and then penetrates the buccinator muscle to enter the oral cavity opposite the second upper molar tooth."}, {"number": 409, "topic": "Parotid gland", "stem_html": "Which of the following muscles is penetrated by the parotid duct?", "options": [{"label_html": "Medial pterygoid", "is_correct": false}, {"label_html": "Buccinator", "is_correct": true}, {"label_html": "Levator anguli oris", "is_correct": false}, {"label_html": "Temporalis", "is_correct": false}, {"label_html": "Masseter", "is_correct": false}], "correct_index": 1, "explanation_html": "The duct crosses the masseter muscle and buccal fat pad and then penetrates the buccinator muscle to enter the oral cavity opposite the second upper molar tooth."}], "note_html": "<b>Anatomy of the parotid gland<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Location<\/b><\/td><td>Overlying the mandibular ramus; anterior and inferior to the ear.<\/td><\/tr><tr><td><b>Salivary duct<\/b><\/td><td>Crosses the masseter, pierces the buccinator and drains adjacent to the 2nd upper molar tooth (Stensen's duct).<\/td><\/tr><tr><td><b>Structures passing through the gland<\/b><\/td><td><ul><li>Facial nerve (Mnemonic: The Zebra Buggered My Cat; Temporal Zygomatic, Buccal, Mandibular, Cervical)<\/li><li>External carotid artery<\/li><li>Retromandibular vein<\/li><li>Auriculotemporal nerve<\/li><\/ul><\/td><\/tr><tr><td><b>Relations<\/b><\/td><td><ul><li>Anterior: masseter, medial pterygoid, superficial temporal and maxillary artery, facial nerve, stylomandibular ligament<\/li><li>Posterior: posterior belly digastric muscle, sternocleidomastoid, stylohyoid, internal carotid artery, mastoid process, styloid process<\/li><\/ul><\/td><\/tr><tr><td><b>Arterial supply<\/b><\/td><td>Branches of external carotid artery<\/td><\/tr><tr><td><b>Venous drainage<\/b><\/td><td>Retromandibular vein<\/td><\/tr><tr><td><b>Lymphatic drainage<\/b><\/td><td>Deep cervical nodes<\/td><\/tr><tr><td><b>Nerve innervation<\/b><\/td><td><ul><li> Parasympathetic-Secretomotor<\/li><li>Sympathetic-Superior cervical ganglion<\/li><li> Sensory- Greater auricular nerve<\/li><\/ul><\/td><\/tr><\/tbody><\/table><\/div><br>Parasympathetic stimulation produces a water rich, serous saliva. Sympathetic stimulation leads to the production of a low volume, enzyme-rich saliva."}, {"name": "Pectoral muscles", "questions": [{"number": 410, "topic": "Pectoral muscles", "stem_html": "During a Patey mastectomy, the pectoralis minor muscle is divided to gain access to the level III axillary nodes. What is the nerve supply to this structure?", "options": [{"label_html": "Axillary nerve", "is_correct": false}, {"label_html": "Medial pectoral nerve", "is_correct": true}, {"label_html": "Lateral pectoral nerve", "is_correct": false}, {"label_html": "Long thoracic nerve", "is_correct": false}, {"label_html": "Thoracodorsal nerve", "is_correct": false}], "correct_index": 1, "explanation_html": "Pectoralis minor is supplied by the medial pectoral nerve"}], "note_html": "<b>Pectoralis major<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Origin<\/b><\/td><td>From the medial two thirds of the clavicle, manubrium and sternocostal angle<\/td><\/tr><tr><td><b>Insertion<\/b><\/td><td>Lateral edge of the bicipital groove of the humerus<\/td><\/tr><tr><td><b>Nerve supply<\/b><\/td><td>Medial and lateral pectoral nerves<\/td><\/tr><tr><td><b>Actions<\/b><\/td><td>Adductor and medial rotator of the humerus<\/td><\/tr><\/tbody><\/table><\/div><br><b>Pectoralis minor<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Origin<\/b><\/td><td>Upper margins of third to fifth ribs and intercostal fascia<\/td><\/tr><tr><td><b>Insertion<\/b><\/td><td>Medial border and upper surface of the coracoid process<\/td><\/tr><tr><td><b>Nerve supply<\/b><\/td><td>Medial pectoral nerve<\/td><\/tr><tr><td><b>Actions<\/b><\/td><td>Assists serratus anterior in drawing scapula forwards and depresses the point of the shoulder<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Periosteum", "questions": [{"number": 411, "topic": "Periosteum", "stem_html": "Which of the following structures attaches periosteum to bone?", "options": [{"label_html": "Sharpey's fibres", "is_correct": true}, {"label_html": "Peripheral lamellae", "is_correct": false}, {"label_html": "Elastic fibres", "is_correct": false}, {"label_html": "Fibrolamellar bundles", "is_correct": false}, {"label_html": "Purkinje fibres", "is_correct": false}], "correct_index": 0, "explanation_html": "Periosteum is attached to bone by strong collagenous fibers called Sharpey's fibres, which extend to the outer circumferential and interstitial lamellae. It also provides an attachment for muscles and tendons."}], "note_html": "Periosteum is a membrane that covers the outer surface of all bones, except at the joints of long bones. Endosteum lines the inner surface of all bones.<br><br>Periosteum consists of dense irregular connective tissue. Periosteum is divided into an outer 'fibrous layer' and inner 'cambium layer' (or 'osteogenic layer'). The fibrous layer contains fibroblasts, while the cambium layer contains progenitor cells that develop into osteoblasts. These osteoblasts are responsible for increasing the width of a long bone and the overall size of the other bone types. After a bone fracture the progenitor cells develop into osteoblasts and chondroblasts, which are essential to the healing process.<br><br>As opposed to osseous tissue, periosteum has nociceptive nerve endings, making it very sensitive to manipulation. It also provides nourishment by providing the blood supply. Periosteum is attached to bone by strong collagenous fibers called Sharpey's fibres, which extend to the outer circumferential and interstitial lamellae. It also provides an attachment for muscles and tendons.<br><br>Periosteum that covers the outer surface of the bones of the skull is known as 'pericranium' except when in reference to the layers of the scalp."}, {"name": "Pharyngeal arches", "questions": [{"number": 412, "topic": "Pharyngeal arches", "stem_html": "What is the correct embryological origin of the stapes?", "options": [{"label_html": "First pharyngeal arch", "is_correct": false}, {"label_html": "Second pharyngeal arch", "is_correct": true}, {"label_html": "Third pharyngeal arch", "is_correct": false}, {"label_html": "Fourth pharyngeal arch", "is_correct": false}, {"label_html": "Fifth pharyngeal arch", "is_correct": false}], "correct_index": 1, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Embryological origin stapes = 2nd pharyngeal arch<br>The ectoderm covering the outer aspect of the second arch originates from a strip of ectoderm lateral to the metencephalic neural fold. The cartilaginous element to this, eponymously known as Reicherts cartilage extends from the otic capsule to the midline on each side. Its dorsal end separates and becomes enclosed in the tympanic cavity as the stapes. <\/div>The dorsal ends of the cartilages of the first and second pharyngeal arches articulate superior to the tubotympanic recess. These cartilages form the malleus, incus and stapes. At least part of the malleus is formed from the first arch and the stapes from the second arch. The incus is most likely to arise from the first arch."}, {"number": 413, "topic": "Pharyngeal arches", "stem_html": "What is embryological origin of the pulmonary artery?", "options": [{"label_html": "First pharyngeal arch", "is_correct": false}, {"label_html": "Second pharyngeal arch", "is_correct": false}, {"label_html": "Fourth pharyngeal arch", "is_correct": false}, {"label_html": "Fifth pharyngeal arch", "is_correct": false}, {"label_html": "Sixth pharyngeal arch", "is_correct": true}], "correct_index": 4, "explanation_html": "The proximal part of the sixth right pharyngeal arch gives origin to the right pulmonary artery. The distal part gives origin to the left pulmonary artery and the ductus arteriosus."}], "note_html": "These develop during the fourth week of embryonic growth from a series of mesodermal outpouchings of the developing pharynx. <br>They develop and fuse in the ventral midline. Pharyngeal pouches form on the endodermal side between the arches. <br>There are 6 pharyngeal arches, the fifth does not contribute any useful structures and often fuses with the sixth arch.<br><br><b>Pharyngeal arches<\/b><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Pharyngeal arch<\/b><\/th><th><b>Muscular contributions<\/b><\/th><th><b>Skeletal contributions<\/b><\/th><th><b>Endocrine<\/b><\/th><th><b>Artery<\/b><\/th><th><b>Nerve<\/b><\/th><\/tr><\/thead><tbody><tr><td>First<\/td><td>Muscles of mastication<br>Anterior belly of digastric<br>Mylohyoid<br>Tensor tympanic<br>Tensor veli palatini<\/td><td>Maxilla<br>Meckels cartilage<br>Incus <br>Malleus<\/td><td>n/a<\/td><td>Maxillary<br>External carotid<\/td><td>Mandibular<\/td><\/tr><tr><td>Second<\/td><td>Buccinator<br>Platysma<br>Muscles of facial expression<br>Stylohyoid<br>Posterior belly of digastric<br>Stapedius<\/td><td>Stapes<br>Styloid process<br>Lesser horn and upper body of hyoid<\/td><td>n/a<\/td><td>Inferior branch of superior thyroid artery<br>Stapedial artery<\/td><td>Facial<\/td><\/tr><tr><td>Third<\/td><td>Stylopharyngeus<\/td><td>Greater horn and lower part of hyoid<\/td><td>Thymus<br>Inferior parathyroids<\/td><td>Common and internal carotid<\/td><td>Glossopharyngeal<\/td><\/tr><tr><td>Fourth<\/td><td>Cricothyroid<br>All intrinsic muscles of the soft palate<\/td><td>Thyroid and epiglottic cartilages<\/td><td>Superior parathyroids<\/td><td>Right- subclavian artery, Left-aortic arch<\/td><td>Vagus<\/td><\/tr><tr><td>Sixth<\/td><td>All intrinsic muscles of the larynx (except cricothyroid)<\/td><td>Cricoid, arytenoid and corniculate cartilages<\/td><td>n/a<\/td><td>Right -Pulmonary artery, Left- Pulmonary artery and ductus arteriosus<\/td><td>Vagus and recurrent laryngeal nerve<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Phrenic nerve", "questions": [{"number": 414, "topic": "Phrenic nerve", "stem_html": "Which of the following is true in connection with the phrenic nerves?", "options": [{"label_html": "They both lie anterior to the hilum of the lungs", "is_correct": true}, {"label_html": "They are derived from spinal roots C 2,3,4", "is_correct": false}, {"label_html": "They pierce the diaphragm at the level of T7", "is_correct": false}, {"label_html": "They consist of motor fibres only", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 0, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">C3,4,5<br>Keeps the diaphragm alive!<\/div>They both lie anterior to the hilum of the lung. The phrenic nerves have both motor and sensory functions. For this reason sub diaphragmatic pathology may cause referred pain to the shoulder."}, {"number": 415, "topic": "Phrenic nerve", "stem_html": "During a neck dissection, a nerve is noted to pass posterior to the medial aspect of the first rib. Which of the nerves listed below is this most likely to be?", "options": [{"label_html": "Medial cord of the brachial plexus", "is_correct": false}, {"label_html": "Long thoracic nerve", "is_correct": false}, {"label_html": "Nerve to subclavius", "is_correct": false}, {"label_html": "Medial pectoral nerve", "is_correct": false}, {"label_html": "Phrenic nerve", "is_correct": true}], "correct_index": 4, "explanation_html": "The key point is that the phrenic nerve runs posterior to the medial aspect of the first rib. Superiorly, it lies on the surface of scalenus anterior."}], "note_html": "<b>Origin<\/b><br><ul><li>C3,4,5<\/li><\/ul><br><b>Supplies<\/b><br><ul><li>Diaphragm, sensation central diaphragm and pericardium<\/li><\/ul><br><b>Path<\/b><br><ul><li>The phrenic nerve passes with the internal jugular vein across scalenus anterior. It passes superficial to prevertebral fascia of deep cervical fascia.<\/li><li>Left: crosses anterior to the 1st part of the subclavian artery.<\/li><li>Right: Anterior to scalenus anterior and crosses anterior to the 2nd part of the subclavian artery. <\/li><li>On both sides, the phrenic nerve runs posterior to the subclavian vein and posterior to the internal thoracic artery as it enters the thorax.<\/li><\/ul><br><b>Right phrenic nerve<\/b><br><ul><li>In the superior mediastinum: anterior to right vagus and laterally to superior vena cava<\/li><li>Middle mediastinum: right of pericardium <\/li><li>It passes over the right atrium to exit the diaphragm at T8<\/li><\/ul><br><b>Left phrenic nerve<\/b><br><ul><li>Passes lateral to the left subclavian artery, aortic arch and left ventricle<\/li><li>Passes anterior to the root of the lung<\/li><li>Pierces the diaphragm alone<\/li><\/ul><br><i>Image showing the passage of the phrenic nerve in the neck<\/i><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb087b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb087.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Phrenic nerve\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb087b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}, {"name": "Pituitary Gland", "questions": [{"number": 416, "topic": "Pituitary Gland", "stem_html": "A 40 year old woman had the anterior lobe of the pituitary removed because of a tumour. Without postoperative supplements, which of the following could occur?", "options": [{"label_html": "Failure to produce adequate amounts of thyroxine", "is_correct": true}, {"label_html": "Failure to produce parathyroid hormone in response to hypocalcaemia", "is_correct": false}, {"label_html": "Failure to secrete catecholamine in response to stress", "is_correct": false}, {"label_html": "Failure to secrete insulin in hyperglycemia", "is_correct": false}, {"label_html": "Inability to concentrate urine in response to water deprivation", "is_correct": false}], "correct_index": 0, "explanation_html": "Its an anterior pituitary lesion and that is the reason thyroxine secretion is affected. ADH is released by the posterior pituitary."}, {"number": 417, "topic": "Pituitary Gland", "stem_html": "Considering the pituitary gland, which of the following is false?", "options": [{"label_html": "The anterior pituitary secretes thyroid stimulating hormone", "is_correct": false}, {"label_html": "The anterior pituitary develops from Rathkes pouch", "is_correct": false}, {"label_html": "Patients with craniopharyngioma may develop bi temporal hemianopia", "is_correct": false}, {"label_html": "The pituitary is in direct contact with the optic chiasm", "is_correct": true}, {"label_html": "The posterior pituitary releases oxytocin via a positive feedback loop", "is_correct": false}], "correct_index": 3, "explanation_html": "Although the optic chiasm is closely related to the pituitary, and craniopharyngiomas may compress this structure leading to bitemporal hemianopia, it is separated from the chiasm itself by a dural fold."}, {"number": 418, "topic": "Pituitary Gland", "stem_html": "A 44 year old lady is recovering following a transphenoidal hypophysectomy. Unfortunately there is a post operative haemorrhage. Which of the following features is most likely to occur initially?", "options": [{"label_html": "Cavernous sinus thrombosis", "is_correct": false}, {"label_html": "Abducens nerve palsy", "is_correct": false}, {"label_html": "Bi-temporal hemianopia", "is_correct": true}, {"label_html": "Inferior homonymous hemianopia", "is_correct": false}, {"label_html": "Central retinal vein occlusion", "is_correct": false}], "correct_index": 2, "explanation_html": "The pituitary is covered by a sheath of dura and an expanding haematoma at this site may compress the optic chiasm in the same manner as an expanding pituitary tumour."}], "note_html": "The pituitary gland is located within the sella turcica within the sphenoid bone in the middle cranial fossa. It is covered by a dural fold and weighs around 0.5g. It is attached to the hypothalamus by the infundibulum. The anterior pituitary receives hormonal stimuli from the hypothalamus by way of the hypothalamo-pituitary portal system. It develops from a depression in the wall of the pharynx (Rathkes pouch).<br><br><b>Anterior pituitary hormones<\/b><br><ul><li>Growth hormone<\/li><li>Thyroid stimulating hormone<\/li><li>ACTH<\/li><li>Prolactin<\/li><li>LH and FSH<\/li><li>Melanocyte releasing hormone<\/li><\/ul><br><br><b>Posterior pituitary hormones<\/b><br><ul><li>Oxytocin<\/li><li>Anti diuretic hormone<\/li><\/ul>"}, {"name": "Pneumoperitoneum- therapeutic", "questions": [{"number": 419, "topic": "Pneumoperitoneum- therapeutic", "stem_html": "A 73 year old lady with gallstones is about to undergo a laparoscopic cholecystectomy. The surgeon inserts a Verress needle and performs a successful drop test prior to establishing a pneumoperitoneum. A 5 minute delay ensues before a 10mm infraumbilical trocar is inserted. The surgeon performs a diagnostic laparoscopy which shows a thickened gallbladder but is otherwise normal. The anaesthetist complains that the patient has become hypotensive with a blood pressure of 80/40 mmHg. Of the options below, which is the most appropriate course of action?", "options": [{"label_html": "Release of pneumoperitoneum", "is_correct": true}, {"label_html": "Perform a laparotomy", "is_correct": false}, {"label_html": "Administration of intravenous adrenaline", "is_correct": false}, {"label_html": "Administration of intravenous amiodarone", "is_correct": false}, {"label_html": "End the operation", "is_correct": false}], "correct_index": 0, "explanation_html": "Excessive intra-abdominal pressure may cause decreased venous return and hypotension. Since the preliminary laparoscopy did not show any major vascular catastrophe an emergency laparotomy would not be indicated. In most cases the release of pressure is often sufficient. In cases of a vaso-vagal episode (which may be induced by peritoneal stretching) a dose of atropine may be required."}, {"number": 420, "topic": "Pneumoperitoneum- therapeutic", "stem_html": "A 73 year old lady with gallstones is about to undergo a laparoscopic cholecystectomy. The surgeon inserts a Verress needle and performs a successful drop test prior to establishing a pneumoperitoneum. A 5 minute delay ensues before a 10mm infraumbilical trocar is inserted. The surgeon performs a diagnostic laparoscopy which shows a thickened gallbladder but is otherwise normal. The anaesthetist complains that the patient has become hypotensive with a blood pressure of 80/40 mmHg. Of the options below, which is the most appropriate course of action?", "options": [{"label_html": "Release of pneumoperitoneum", "is_correct": true}, {"label_html": "Perform a laparotomy", "is_correct": false}, {"label_html": "Administration of intravenous adrenaline", "is_correct": false}, {"label_html": "Administration of intravenous amiodarone", "is_correct": false}, {"label_html": "End the operation", "is_correct": false}], "correct_index": 0, "explanation_html": "Excessive intra-abdominal pressure may cause decreased venous return and hypotension. Since the preliminary laparoscopy did not show any major vascular catastrophe an emergency laparotomy would not be indicated. In most cases the release of pressure is often sufficient. In cases of a vaso-vagal episode (which may be induced by peritoneal stretching) a dose of atropine may be required."}], "note_html": "During a laparoscopic procedure a surgeon will need to create a pneumoperitoneum. This can be achieved by use of a Verress needle (risk of visceral injury). An alternative is the open 'Hasson' style technique. Once access to the abdominal cavity is secured carbon dioxide gas is insufflated to induce a working space. Higher intra-abdominal pressures may compromise venous return and reduce cardiac output. If the blood pressure is seen to drop in this way then release of air, will often improve matters. Should this not be the case then a laparotomy may be necessary to exclude a more significant internal injury."}, {"name": "Popliteal fossa", "questions": [{"number": 421, "topic": "Popliteal fossa", "stem_html": "A 34 year old man is shot in the postero- inferior aspect of his thigh. Which of the following lies at the most lateral aspect of the popliteal fossa?", "options": [{"label_html": "Popliteal artery", "is_correct": false}, {"label_html": "Popliteal vein", "is_correct": false}, {"label_html": "Common peroneal nerve", "is_correct": true}, {"label_html": "Tibial nerve", "is_correct": false}, {"label_html": "Small saphenous vein", "is_correct": false}], "correct_index": 2, "explanation_html": "The contents of the popliteal fossa are (from medial to lateral):<br>Popliteal artery<br>Popliteal vein<br>Tibial nerve<br>Common peroneal nerve<br><br>The sural nerve is a branch of the tibial nerve and usually arises at the inferior aspect of the popliteal fossa. However, its anatomy is variable."}, {"number": 422, "topic": "Popliteal fossa", "stem_html": "Which of the nerves listed below is at greatest risk of injury with a laceration to the upper lateral margin of the popliteal fossa?", "options": [{"label_html": "Common peroneal nerve", "is_correct": true}, {"label_html": "Sural nerve", "is_correct": false}, {"label_html": "Sciatic nerve", "is_correct": false}, {"label_html": "Saphenous nerve", "is_correct": false}, {"label_html": "Tibial nerve", "is_correct": false}], "correct_index": 0, "explanation_html": "The sural nerve exits at the lower infero-lateral aspect of the fossa and is more at risk in short saphenous vein surgery. The tibial nerve lies more medially and is even less likely to be injured in this location."}, {"number": 423, "topic": "Popliteal fossa", "stem_html": "A 40 year old lady presents with varicose veins, these are found to originate from the short saphenous vein. As the vein is mobilised which structure is at greatest risk of injury?", "options": [{"label_html": "Sciatic nerve", "is_correct": false}, {"label_html": "Sural nerve", "is_correct": true}, {"label_html": "Common peroneal nerve", "is_correct": false}, {"label_html": "Tibial nerve", "is_correct": false}, {"label_html": "Popliteal artery", "is_correct": false}], "correct_index": 1, "explanation_html": "The sural nerve is closely related and damage to this structure is a major cause of litigation. The other structures may all be injured but the risks are lower."}, {"number": 424, "topic": "Popliteal fossa", "stem_html": "Which of the following structures are at risk of direct injury following a fracture dislocation of the femoral condyles?", "options": [{"label_html": "Popliteal artery", "is_correct": true}, {"label_html": "Sciatic nerve", "is_correct": false}, {"label_html": "Plantaris muscle", "is_correct": false}, {"label_html": "Tibial artery", "is_correct": false}, {"label_html": "Tibial nerve", "is_correct": false}], "correct_index": 0, "explanation_html": "The heads of gastrocnemius will contract to pull the fracture segment posteriorly. The popliteal artery lies against the bone and may be damaged or compressed."}, {"number": 425, "topic": "Popliteal fossa", "stem_html": "A 65 year old man with long standing atrial fibrillation develops an embolus to the lower leg. The decision is made to perform an embolectomy, utilising a trans popliteal approach. After incising the deep fascia, which of the following structures will the surgeons encounter first on exploring the central region of the popliteal fossa?", "options": [{"label_html": "Popliteal vein", "is_correct": false}, {"label_html": "Common peroneal nerve", "is_correct": false}, {"label_html": "Popliteal artery", "is_correct": false}, {"label_html": "Tibial nerve", "is_correct": true}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 3, "explanation_html": "The tibial nerve lies superior to the vessels in the inferior aspect of the popliteal fossa. In the upper part of the fossa the tibial nerve lies lateral to the vessels, it then passes superficial to them to lie medially. The popliteal artery is the deepest structure in the popliteal fossa."}], "note_html": "<b>Boundaries of the popliteal fossa<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Laterally<\/b><\/td><td>Biceps femoris above, lateral head of gastrocnemius and plantaris below<\/td><\/tr><tr><td><b>Medially<\/b><\/td><td>Semimembranosus and semitendinosus above, medial head of gastrocnemius below<\/td><\/tr><tr><td><b>Floor<\/b><\/td><td>Popliteal surface of the femur, posterior ligament of knee joint and popliteus muscle<\/td><\/tr><tr><td><b>Roof<\/b><\/td><td>Superficial and deep fascia<\/td><\/tr><\/tbody><\/table><\/div><br><b>Image showing the popliteal fossa<\/b><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/bbb027b.jpg\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/bbb027.jpg\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"><span style=\"font-size:11px; color:LightGray;\">© Image provided by the University of Sheffield<\/span><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/bbb027b.jpg\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center><br><b>Contents<\/b><br><ul><li>Popliteal artery and vein<\/li><li>Small saphenous vein<\/li><li>Common peroneal nerve<\/li><li>Tibial nerve<\/li><li>Posterior cutaneous nerve of the thigh<\/li><li>Genicular branch of the obturator nerve<\/li><li>Lymph nodes<\/li><\/ul>"}, {"name": "Posterior interosseous nerve", "questions": [{"number": 426, "topic": "Posterior interosseous nerve", "stem_html": "A 43 year old typist presents with pain at the dorsal aspect of the upper part of her forearm. She also complains of weakness when extending her fingers. On examination triceps and supinator are both functioning normally. There is weakness of most of the extensor muscles. However, there is no sensory deficit. Which of the following nerves has been affected?", "options": [{"label_html": "Anterior interosseous", "is_correct": false}, {"label_html": "Median", "is_correct": false}, {"label_html": "Posterior interosseous", "is_correct": true}, {"label_html": "Palmar cutaneous", "is_correct": false}, {"label_html": "Ulnar", "is_correct": false}], "correct_index": 2, "explanation_html": "The radial nerve may become entrapped in the arcade of Frohse which is a superficial part of the supinator muscle which overlies the posterior interosseous nerve. This nerve is entirely muscular and articular in its distribution. It passes postero-inferiorly and gives branches to extensor carpi radialis brevis and supinator. It enters supinator and curves around the lateral and posterior surfaces of the radius. On emerging from the supinator the posterior interosseous nerve lies between the superficial extensor muscles and the lowermost fibres of supinator. It then gives branches to the extensors."}], "note_html": "<ul><li>Emerges from supinator between the superficial extensor muscles and lowest fibres of supinator<\/li><li>It gives recurrent branches which innervate extensor digitorum, extensor digiti minimi and extensor carpi ulnaris<\/li><li>It then passes with the posterior interosseous artery superficial to the abductor pollicis longus supplying it. It supplies branches to extensor pollicis longus and brevis and extensor indicis and ends as a small gangliform enlargement at the back of the carpus from which the intercarpal joints are supplied.<\/li><\/ul>"}, {"name": "Posterior tibial artery", "questions": [{"number": 427, "topic": "Posterior tibial artery", "stem_html": "A 68 year old man with critical limb ischaemia is undergoing a femoro-distal bypass graft. During mobilisation of the proximal part of the posterior tibial artery which of the following is at greatest risk of injury?", "options": [{"label_html": "Tibial nerve", "is_correct": true}, {"label_html": "Sciatic nerve", "is_correct": false}, {"label_html": "Saphenous nerve", "is_correct": false}, {"label_html": "Common peroneal nerve", "is_correct": false}, {"label_html": "Medial superior genicular artery", "is_correct": false}], "correct_index": 0, "explanation_html": "The tibial nerve is closely related to the posterior tibial artery. The tibial nerve crosses the vessel posteriorly approximately 2.5cm distal to its origin. At its origin the nerve lies medial and then lateral after it crosses the vessel as described."}, {"number": 428, "topic": "Posterior tibial artery", "stem_html": "Which of the following structures is not closely related to the posterior tibial artery?", "options": [{"label_html": "Soleus posteriorly", "is_correct": false}, {"label_html": "Tibial nerve laterally", "is_correct": false}, {"label_html": "Deep peroneal nerve laterally", "is_correct": true}, {"label_html": "Flexor hallucis longus postero-inferiorly", "is_correct": false}, {"label_html": "Popliteus", "is_correct": false}], "correct_index": 2, "explanation_html": "The deep peroneal nerve lies in the anterior compartment. The tibial nerve lies medially. At its termination it lies deep to the flexor retinaculum. The tibial nerve lies medial to the popliteal vessels but lateral to the posterior tibial artery."}], "note_html": "<ul><li>Larger terminal branch of the popliteal artery<\/li><li>Terminates by dividing into the medial and lateral plantar arteries<\/li><li>Accompanied by two veins throughout its length<\/li><li>Position of the artery corresponds to a line drawn from the lower angle of the popliteal fossa, at the level of the neck of the fibula, to a point midway between the medial malleolus and the most prominent part of the heel<\/li><\/ul><br><b>Relations of the posterior tibial artery<\/b><br><i>Proximal to distal<\/i><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Anteriorly<\/b><\/td><td>Tibialis posterior<br>Flexor digitorum longus<br>Posterior surface of tibia and ankle joint<\/td><\/tr><tr><td><b>Posterior<\/b><\/td><td>Tibial nerve 2.5 cm distal to its origin<br>Fascia overlying the deep muscular layer<br>Proximal part covered by gastrocnemius and soleus<br>Distal part covered by skin and fascia<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Po
