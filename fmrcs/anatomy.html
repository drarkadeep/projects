t=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb010b.jpg\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center><br><b>Cutaneous sensation of the upper limb<\/b><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb077b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb077.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/median nerve\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb077b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}, {"name": "Brachiocephalic artery", "questions": [{"number": 101, "topic": "Brachiocephalic artery", "stem_html": "Which of the following most commonly arises from the brachiocephalic artery?", "options": [{"label_html": "Vertebral artery", "is_correct": false}, {"label_html": "Subscapular artery", "is_correct": false}, {"label_html": "Thyroidea ima artery", "is_correct": true}, {"label_html": "Left Subclavian artery", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 2, "explanation_html": "Other occasional branches include the thymic and bronchial branch."}, {"number": 102, "topic": "Brachiocephalic artery", "stem_html": "During a trans femoral arch aortogram the brachiocephalic artery is entered with an angiography catheter. The radiologist continues to advance the catheter. Into which of the following vessels is it likely to enter?", "options": [{"label_html": "Left subclavian artery", "is_correct": false}, {"label_html": "Left axillary artery", "is_correct": false}, {"label_html": "Right subclavian artery", "is_correct": true}, {"label_html": "Right axillary artery", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 2, "explanation_html": "The axillary artery is a branch of the subclavian artery and although developmental anomalies may occur they are rare. The catheter may also enter the right carotid. There is no brachiocephalic artery on the left side."}], "note_html": "The brachiocephalic artery is the largest branch of the aortic arch. From its aortic origin it ascends superiorly, it initially lies anterior to the trachea and then on its right hand side. It branches into the common carotid and right subclavian arteries at the level of the sternoclavicular joint. <br><br><b>Path<\/b><br>Origin- apex of the midline of the aortic arch<br>Passes superiorly and posteriorly to the right<br>Divides into the right subclavian and right common carotid artery<br><br><b>Relations<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Anterior<\/b><\/td><td><ul><li>Sternohyoid<\/li><li>Sternothyroid<\/li><li>Thymic remnants<\/li><li>Left brachiocephalic vein<\/li><li>Right inferior thyroid veins<\/li><\/ul><\/td><\/tr><tr><td><b>Posterior<\/b><\/td><td><ul><li>Trachea<\/li><li>Right pleura<\/li><\/ul><\/td><\/tr><tr><td><b>Right lateral<\/b><\/td><td><ul><li>Right brachiocephalic vein<\/li><li>Superior part of SVC<\/li><\/ul><\/td><\/tr><tr><td><b>Left lateral<\/b><\/td><td><ul><li>Thymic remnants<\/li><li>Origin of left common carotid<\/li><li>Inferior thyroid veins<\/li><li>Trachea (higher level)<\/li><\/ul><\/td><\/tr><\/tbody><\/table><\/div><br><b>Branches<\/b><br>Normally none but may have the thyroidea ima artery<br><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb009b.jpg\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb009.jpg\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Brachiocephalic artery\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb009b.jpg\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}, {"name": "Breast", "questions": [{"number": 103, "topic": "Breast", "stem_html": "Which of these vessels provides the greatest contribution to the arterial supply of the breast?", "options": [{"label_html": "External mammary artery", "is_correct": false}, {"label_html": "Thoracoacromial artery", "is_correct": false}, {"label_html": "Internal mammary artery", "is_correct": true}, {"label_html": "Lateral thoracic artery", "is_correct": false}, {"label_html": "Subclavian artery", "is_correct": false}], "correct_index": 2, "explanation_html": "60% of the arterial supply to the breast is derived from the internal mammary artery. The external mammary and lateral thoracic arteries also make a significant (but lesser) contribution. This is of importance clinically in performing reduction mammoplasty procedures."}, {"number": 104, "topic": "Breast", "stem_html": "A 58 year old lady presents with a mass in the upper outer quadrant of the right breast. Which of the following statements relating to the breast is untrue?", "options": [{"label_html": "The internal mammary artery provides the majority of its arterial supply", "is_correct": false}, {"label_html": "Nipple retraction may occur as a result of tumour infiltration of the clavipectoral fascia", "is_correct": true}, {"label_html": "The internal mammary artery is a branch of the subclavian artery", "is_correct": false}, {"label_html": "Up to 70% of lymphatic drainage is to the ipsilateral axillary nodes", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 1, "explanation_html": "Both skin dimpling and nipple retraction are features of breast malignancy. However, they usually occur as a result of tumour infiltration of the breast ligaments and ducts respectively. The clavipectoral fascia encases the axillary contents. The lymphatic drainage of the breast is to the axilla and also to the internal mammary chain. The breast is well vascularised and the internal mammary artery is a branch of the subclavian artery."}], "note_html": "The breast itself lies on a layer of pectoral fascia and the following muscles:<br>1. Pectoralis major<br>2. Serratus anterior<br>3. External oblique<br> <br><i>Image showing the topography of the female breast<\/i><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb085b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb085.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Mammary gland\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb085b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center><br><b>Breast anatomy<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Nerve supply<\/b><\/td><td>Branches of intercostal nerves from T4-T6.<\/td><\/tr><tr><td><b>Arterial supply<\/b><\/td><td><ul><li>Internal mammary (thoracic) artery<\/li><li>External mammary artery (laterally)<\/li><li>Anterior intercostal arteries<\/li><li>Thoraco-acromial artery<\/li><\/ul><\/td><\/tr><tr><td><b>Venous drainage<\/b><\/td><td>Superficial venous plexus to subclavian, axillary and intercostal veins.<\/td><\/tr><tr><td><b>Lymphatic drainage<\/b><\/td><td><ul><li>70% Axillary nodes<\/li><li>Internal mammary chain<\/li><li>Other lymphatic sites such as deep cervical and supraclavicular fossa (later in disease)<\/li><\/ul><\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Caecum", "questions": [{"number": 105, "topic": "Caecum", "stem_html": "During a right hemicolectomy the caecum is mobilised. As the bowel is retracted medially a vessel is injured, posterior to the colon. Which of the following is the most likely vessel?", "options": [{"label_html": "Right colic artery", "is_correct": false}, {"label_html": "Inferior vena cava", "is_correct": false}, {"label_html": "Aorta", "is_correct": false}, {"label_html": "External iliac artery", "is_correct": false}, {"label_html": "Gonadal vessels", "is_correct": true}], "correct_index": 4, "explanation_html": "The key in this question is that its during the caecal mobilization. The gonadal vessels and ureter are important posterior relations that are at risk during a right hemicolectomy. During latter stages of the procedure, the ileocolic artery and vein are traced along the anterior aspect of the duodenum. At this point it is possible to injure these, the superior mesenteric vein or the middle colic vein, injury to any of these can result in torrential bleeding that is very difficult to control."}, {"number": 106, "topic": "Caecum", "stem_html": "On inspecting the caecum, which of the following structures is most likely to be identified at the point at which all the tenia coli converge?", "options": [{"label_html": "Gonadal vessels", "is_correct": false}, {"label_html": "Appendix base", "is_correct": true}, {"label_html": "Appendix tip", "is_correct": false}, {"label_html": "Ileocaecal valve", "is_correct": false}, {"label_html": "Ileocolic artery", "is_correct": false}], "correct_index": 1, "explanation_html": "The tenia coli converge at the base of the appendix."}, {"number": 107, "topic": "Caecum", "stem_html": "A patient is due to undergo a right hemicolectomy for a carcinoma of the caecum. Which of the following vessels will require high ligation to provide optimal oncological control?", "options": [{"label_html": "Middle colic artery", "is_correct": false}, {"label_html": "Inferior mesenteric artery", "is_correct": false}, {"label_html": "Superior mesenteric artery", "is_correct": false}, {"label_html": "Ileo-colic artery", "is_correct": true}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 3, "explanation_html": "The ileo - colic artery supplies the caecum and would require high ligation during a right hemicolectomy. The middle colic artery should generally be preserved when resecting a caecal lesion.<br>This question is essentially asking you to name the vessel supplying the caecum. The SMA does not directly supply the caecum, it is the ileocolic artery which does this."}], "note_html": "<div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Location<\/b><\/td><td><ul><li>Proximal right colon below the ileocaecal valve<\/li><li>Intraperitoneal<\/li><\/ul><\/td><\/tr><tr><td><b>Posterior relations<\/b><\/td><td><ul><li>Psoas<\/li><li>Iliacus<\/li><li>Femoral nerve<\/li><li>Genitofemoral nerve<\/li><li>Gonadal vessels<\/li><\/ul><\/td><\/tr><tr><td><b>Anterior relations<\/b><\/td><td>Greater omentum<\/td><\/tr><tr><td><b>Arterial supply<\/b><\/td><td>Ileocolic artery<\/td><\/tr><tr><td><b>Lymphatic drainage<\/b><\/td><td>Mesenteric nodes accompany the venous drainage<\/td><\/tr><\/tbody><\/table><\/div><br><ul><li>The caecum is the most distensible part of the colon and in complete large bowel obstruction with a competent ileocaecal valve the most likely site of eventual perforation.<\/li><\/ul>"}, {"name": "Capitate bone", "questions": [{"number": 108, "topic": "Capitate bone", "stem_html": "Which of the following is not closely related to the capitate bone?", "options": [{"label_html": "Lunate bone", "is_correct": false}, {"label_html": "Scaphoid bone", "is_correct": false}, {"label_html": "Ulnar nerve", "is_correct": true}, {"label_html": "Hamate bone", "is_correct": false}, {"label_html": "Trapezoid bone", "is_correct": false}], "correct_index": 2, "explanation_html": "The ulnar nerve and artery lie adjacent to the pisiform bone. The capitate bone articulates with the lunate, scaphoid, hamate and trapezoid bones, which are therefore closely related to it."}], "note_html": "This is the largest of the carpal bones. It is centrally placed with a rounded head set into the cavities of the lunate and scaphoid bones. Flatter articular surfaces are present for the hamate medially and the trapezoid laterally. Distally the bone articulates predominantly with the middle metacarpal."}, {"name": "Carpal bones", "questions": [{"number": 109, "topic": "Carpal bones", "stem_html": "Which of the following is not a carpal bone?", "options": [{"label_html": "Trapezium", "is_correct": false}, {"label_html": "Triquetrum", "is_correct": false}, {"label_html": "Trapezoid", "is_correct": false}, {"label_html": "Trapezius", "is_correct": true}, {"label_html": "Lunate", "is_correct": false}], "correct_index": 3, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Mnemonic for the Carpal  Bones <br><br>Sally Likes To Play The Tiny Chrome Harmonica<br>She Looks Too Pretty Try To Catch Her<br>Scared Lovers Try Positions That They Can't Handle<\/div>Trapezius is a muscle of the back."}, {"number": 110, "topic": "Carpal bones", "stem_html": "A 32 year old lady complains of carpal tunnel syndrome. The carpal tunnel is explored surgically. Which of the following structures will lie in closest proximity to the hamate bone within the carpal tunnel?", "options": [{"label_html": "The tendon of abductor pollicis longus", "is_correct": false}, {"label_html": "The tendons of flexor digitorum profundus", "is_correct": true}, {"label_html": "The tendons of flexor carpi radialis longus", "is_correct": false}, {"label_html": "Median nerve", "is_correct": false}, {"label_html": "Radial artery", "is_correct": false}], "correct_index": 1, "explanation_html": "The carpal tunnel contains nine flexor tendons:<br><ul><li>Flexor digitorum profundus<\/li><li>Flexor digitorum superficialis<\/li><li>Flexor pollicis longus<\/li><\/ul><br>The tendon of flexor digitorum profundus lies deepest in the tunnel and will thus lie nearest to the hamate bone."}, {"number": 111, "topic": "Carpal bones", "stem_html": "Which of the following carpal bones is a sesamoid bone in the tendon of flexor carpi ulnaris?", "options": [{"label_html": "Triquetrum", "is_correct": false}, {"label_html": "Lunate", "is_correct": false}, {"label_html": "Pisiform", "is_correct": true}, {"label_html": "Scaphoid", "is_correct": false}, {"label_html": "Capitate", "is_correct": false}], "correct_index": 2, "explanation_html": "This small bone has a single articular facet. It projects from the triquetral bone at the ulnar aspect of the wrist where most regard it as a sesamoid bone lying within the tendon of flexor carpi ulnaris."}, {"number": 112, "topic": "Carpal bones", "stem_html": "Which of the following carpal bones is a sesamoid bone in the tendon of flexor carpi ulnaris?", "options": [{"label_html": "Triquetrum", "is_correct": false}, {"label_html": "Lunate", "is_correct": false}, {"label_html": "Pisiform", "is_correct": true}, {"label_html": "Scaphoid", "is_correct": false}, {"label_html": "Capitate", "is_correct": false}], "correct_index": 2, "explanation_html": "This small bone has a single articular facet. It projects from the triquetral bone at the ulnar aspect of the wrist where most regard it as a sesamoid bone lying within the tendon of flexor carpi ulnaris."}], "note_html": "The wrist is comprised of 8 carpal bones, these are arranged in two rows of 4. It is convex from side to side posteriorly and concave anteriorly. <br><b>Diagrammatic image of carpal bones<\/b><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb076b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb076.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Hamate bone\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb076b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center><br><b>Key to image<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td>A<\/td><td>Scaphoid<\/td><\/tr><tr><td>B<\/td><td>Lunate<\/td><\/tr><tr><td>C<\/td><td>Triquetrum<\/td><\/tr><tr><td>D<\/td><td>Pisiform<\/td><\/tr><tr><td>E<\/td><td>Trapezium<\/td><\/tr><tr><td>F<\/td><td>Trapezoid<\/td><\/tr><tr><td>G<\/td><td>Capitate<\/td><\/tr><tr><td>H<\/td><td>Hamate<\/td><\/tr><tr><td>1<\/td><td>Radius<\/td><\/tr><tr><td>2<\/td><td>Ulna<\/td><\/tr><tr><td>3<\/td><td>Metacarpals<\/td><\/tr><\/tbody><\/table><\/div><br><ul><li>No tendons attach to: Scaphoid, lunate, triquetrum (stabilised by ligaments)<\/li><\/ul>"}, {"name": "Cavernous sinus", "questions": [{"number": 113, "topic": "Cavernous sinus", "stem_html": "A neurosurgeon decides to explore the cavernous sinus via the extended endonasal route. Which of the structures listed below is unlikely to be encountered with such an approach.", "options": [{"label_html": "Oculomotor nerve", "is_correct": false}, {"label_html": "Internal carotid artery", "is_correct": false}, {"label_html": "Opthalmic nerve", "is_correct": false}, {"label_html": "Abducens nerve", "is_correct": false}, {"label_html": "Optic nerve", "is_correct": true}], "correct_index": 4, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Mnemonic for contents of cavernous sinus:<br>O TOM CAT<br><br>Occulomotor nerve (III)<br>Trochlear nerve (IV)<br>Ophthalmic nerve (V1)<br>Maxillary nerve (V2)<br>Carotid artery<br>Abducent nerve (VI)<br>T<br><br><br>OTOM=lateral wall components<br>CA= components within sinus<\/div>The optic nerve lies above and outside the cavernous sinus."}, {"number": 114, "topic": "Cavernous sinus", "stem_html": "Which of the following statements relating to the Cavernous Sinus is false?", "options": [{"label_html": "The pituitary gland lies medially", "is_correct": false}, {"label_html": "The internal carotid artery passes through it", "is_correct": false}, {"label_html": "The temporal lobe of the brain is a lateral relation", "is_correct": false}, {"label_html": "The mandibular branch of the trigeminal and optic nerve lie on the lateral wall", "is_correct": true}, {"label_html": "The ophthalmic veins drain into the anterior aspect of the sinus", "is_correct": false}], "correct_index": 3, "explanation_html": "The veins that drain into the sinus are important as sepsis can cause cavernous sinus thrombosis. The maxillary branch of the trigeminal and not the mandibular branches pass through the sinus"}], "note_html": "The cavernous sinuses are paired and are situated on the body of the sphenoid bone. It runs from the superior orbital fissure to the petrous temporal bone. <br><br><b>Relations<\/b><br><div class=\"table-responsive\"><table class=\"tb\"><tbody><tr><td><b>Medial<\/b><\/td><td><b>Lateral<\/b><\/td><\/tr><tr><td>Pituitary fossa<br>Sphenoid sinus<\/td><td>Temporal lobe<\/td><\/tr><\/tbody><\/table><\/div><br><b>Contents<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Lateral wall components<\/b><\/td><td>(from top to bottom:)<br>Oculomotor nerve <br>Trochlear nerve <br>Ophthalmic nerve <br>Maxillary nerve<\/td><\/tr><tr><td><b>Contents of the sinus<\/b><\/td><td>(from medial to lateral:)<br>Internal carotid artery (and sympathetic plexus)<br>Abducens nerve<\/td><\/tr><\/tbody><\/table><\/div><br><b>Blood supply<\/b><br>Ophthalmic vein, superficial cortical veins, basilar plexus of veins posteriorly. <br><br>Drains into the internal jugular vein via: the superior and inferior petrosal sinuses"}, {"name": "Cephalic vein", "questions": [{"number": 115, "topic": "Cephalic vein", "stem_html": "Which of the structures listed below overlies the cephalic vein?", "options": [{"label_html": "Extensor retinaculum", "is_correct": false}, {"label_html": "Bicipital aponeurosis", "is_correct": false}, {"label_html": "Biceps muscle", "is_correct": false}, {"label_html": "Antebrachial fascia", "is_correct": false}, {"label_html": "None of the above", "is_correct": true}], "correct_index": 4, "explanation_html": "The cephalic vein is superficially located in the upper limb and overlies most the fascial planes. It pierces the coracoid membrane (continuation of the clavipectoral fascia) to terminate in the axillary vein. It lies anterolaterally to biceps."}, {"number": 116, "topic": "Cephalic vein", "stem_html": "A 23 year old man has a cannula inserted into his cephalic vein. Through which structure does the cephalic vein pass?", "options": [{"label_html": "Interosseous membrane", "is_correct": false}, {"label_html": "Triceps", "is_correct": false}, {"label_html": "Pectoralis major", "is_correct": false}, {"label_html": "Clavipectoral fascia", "is_correct": true}, {"label_html": "Tendon of biceps", "is_correct": false}], "correct_index": 3, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">The cephalic vein is a favored vessel for arteriovenous fistula formation and should be preserved in patients with end stage renal failure<\/div>The cephalic vein penetrates the clavipectoral fascia (but not the pectoralis major) prior to terminating in the axillary vein."}, {"number": 117, "topic": "Cephalic vein", "stem_html": "The cephalic vein pierces the clavipectoral fascia to terminate in which of the veins listed below?", "options": [{"label_html": "External jugular", "is_correct": false}, {"label_html": "Axillary", "is_correct": true}, {"label_html": "Internal jugular", "is_correct": false}, {"label_html": "Azygos", "is_correct": false}, {"label_html": "Brachial", "is_correct": false}], "correct_index": 1, "explanation_html": "<p>No explanation provided.<\/p>"}], "note_html": "<b>Path<\/b><br><ul><li>Dorsal venous arch drains laterally into the cephalic vein<\/li><li>Crosses the anatomical snuffbox and travels laterally up the arm<\/li><li>At the antecubital fossa connected to the basilic vein by the median cubital vein<\/li><li>Pierces deep fascia of deltopectoral groove to join axillary vein<\/li><\/ul>"}, {"name": "Chest drains", "questions": [{"number": 118, "topic": "Chest drains", "stem_html": "What are the boundaries of the  'safe triangle' for chest drain insertion?", "options": [{"label_html": "Bounded by trapezius, latissimus dorsi, and laterally by the vertebral border of the scapula", "is_correct": false}, {"label_html": "Bounded by latissimus dorsi, pectoralis major, line superior to the nipple and apex at the axilla", "is_correct": true}, {"label_html": "Bounded by latissimus dorsi, serratus anterior, line superior to the nipple and apex at the axilla", "is_correct": false}, {"label_html": "Bounded by trapezius, deltoid, rhomboid major and teres minor", "is_correct": false}, {"label_html": "Bounded by trapezius, deltoid and latissimus dorsi", "is_correct": false}], "correct_index": 1, "explanation_html": "<p>No explanation provided.<\/p>"}, {"number": 119, "topic": "Chest drains", "stem_html": "A patient has a chest drain insertion.  There is fresh blood at the chest drain insertion area.  Which vessel has been damaged?", "options": [{"label_html": "Pericardiophrenic artery", "is_correct": false}, {"label_html": "Intercostal vein", "is_correct": false}, {"label_html": "Right ventricle", "is_correct": false}, {"label_html": "Vagus artery", "is_correct": false}, {"label_html": "Intercostal artery", "is_correct": true}], "correct_index": 4, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">The intercostal vein is more superior than the artery and is thus slightly less susceptible to injury.<\/div>Within the intercostal spaces there are thin, strong muscles, intercostal vessels, nerves and lymphatics. There are 3 intercostal muscle layers corresponding to the lateral abdominal wall; external, internal, innermost intercostals.  At the mid axillary line there are thin intracostals which is an extension of the internal intercostal muscle. In each intercostal space lies the neurovascular bundle, comprising, from superior to inferiorly;  the posterior intercostal vein, artery and nerve, lying protected in the subcostal groove of the rib above and situated between the second and third layer of the intercostal muscles.  These blood vessels anastomose anteriorly with the anterior intercostal vessels, which arise from the internal thoracic artery and vein."}], "note_html": "There are a number of different indications for chest drain insertion. In general terms large bore chest drains are preferred for trauma and haemothorax drainage. Smaller diameter chest drains can be used for pneumothorax or pleural effusion drainage.<br><br>Insertion can be performed either using anatomical guidance or through ultrasound guidance. In the exam, the anatomical method is usually tested.<br><br>It is advised that chest drains are placed in the 'safe triangle'.  The triangle is located in the mid axillary line of the 5th intercostal space.  It is bordered by:<br>Anterior edge latissimus dorsi, the lateral border of pectoralis major, a line superior to the horizontal level of the nipple, and the apex below the axilla.<br><br>Another triangle is situated behind the scapula. It is bounded above by the trapezius, below by the latissimus dorsi, and laterally by the vertebral border of the scapula; the floor is partly formed by the rhomboid major. If the scapula is drawn forward by folding the arms across the chest, and the trunk bent forward, parts of the sixth and seventh ribs and the interspace between them become subcutaneous and available for auscultation. The space is therefore known as the triangle of auscultation. <br><br><b>References<\/b><br>Prof Harold Ellis. The applied anatomy of chest drains insertions. British Journal of hospital medicine 2007; (68): 44-45.<br><br>Laws D, Neville E, Duffy J. BTS guidelines for insertion of chest drains. Thorax, 2003; (58): 53-59."}, {"name": "Circle of Willis", "questions": [{"number": 120, "topic": "Circle of Willis", "stem_html": "Which of the following statements relating to the posterior cerebral artery is false?", "options": [{"label_html": "It supplies the visual cortex", "is_correct": false}, {"label_html": "It is closely related to the 3rd cranial nerve", "is_correct": false}, {"label_html": "It is a branch of the basilar artery", "is_correct": false}, {"label_html": "It is connected to the circle of Willis via the superior cerebellar artery", "is_correct": true}, {"label_html": "When occluded may result in contralateral loss of field of vision", "is_correct": false}], "correct_index": 3, "explanation_html": "The posterior cerebral arteries are formed at the bifurcation of the basilar artery and is connected to the circle of Willis via the posterior communicating artery.<br><br>The posterior cerebral arteries supply the occipital lobe and part of the temporal lobe."}, {"number": 121, "topic": "Circle of Willis", "stem_html": "You are working as an anatomy demonstrator and the medical students decide to test your knowledge on the Circle of Willis.  Which of the following comments is false?", "options": [{"label_html": "The anterior communicating artery links the right and left sides", "is_correct": false}, {"label_html": "Asymmetry of the circle of willis is a risk factor for the development of intracranial aneurysms", "is_correct": false}, {"label_html": "Majority of blood passing through the vessels mix together", "is_correct": true}, {"label_html": "Includes the anterior communicating artery", "is_correct": false}, {"label_html": "The circle surrounds the stalk of the pituitary gland", "is_correct": false}], "correct_index": 2, "explanation_html": "There is minimum mixing of blood passing through the vessels."}, {"number": 122, "topic": "Circle of Willis", "stem_html": "Which of the following statements relating to the basilar artery and its branches is false?", "options": [{"label_html": "The superior cerebellar artery may be decompressed to treat trigeminal neuralgia", "is_correct": false}, {"label_html": "Occlusion of the posterior cerebral artery causes contralateral loss of the visual field", "is_correct": false}, {"label_html": "The oculomotor nerve lies between the superior cerebellar and posterior cerebral arteries", "is_correct": false}, {"label_html": "The posterior inferior cerebellar artery is the largest of the cerebellar arteries arising from the basilar artery", "is_correct": true}, {"label_html": "The labyrinthine branch is accompanied by the facial nerve", "is_correct": false}], "correct_index": 3, "explanation_html": "The posterior inferior cerebellar artery is the largest of the cerebellar arteries arising from the vertebral artery. The labyrinthine artery is long and slender and may arise from the lower part of the basilar artery. It accompanies the facial and vestibulocochlear nerves into the internal auditory meatus. The posterior cerebral artery is often larger than the superior cerebellar artery and it is separated from the vessel, near it's origin, by the oculomotor nerve. Arterial decompression is a well established therapy for trigeminal neuralgia."}, {"number": 123, "topic": "Circle of Willis", "stem_html": "Which of the following statements relating to the basilar artery and its branches is false?", "options": [{"label_html": "The superior cerebellar artery may be decompressed to treat trigeminal neuralgia", "is_correct": false}, {"label_html": "Occlusion of the posterior cerebral artery causes contralateral loss of the visual field", "is_correct": false}, {"label_html": "The oculomotor nerve lies between the superior cerebellar and posterior cerebral arteries", "is_correct": false}, {"label_html": "The posterior inferior cerebellar artery is the largest of the cerebellar arteries arising from the basilar artery", "is_correct": true}, {"label_html": "The labyrinthine branch is accompanied by the facial nerve", "is_correct": false}], "correct_index": 3, "explanation_html": "The posterior inferior cerebellar artery is the largest of the cerebellar arteries arising from the vertebral artery. The labyrinthine artery is long and slender and may arise from the lower part of the basilar artery. It accompanies the facial and vestibulocochlear nerves into the internal auditory meatus. The posterior cerebral artery is often larger than the superior cerebellar artery and it is separated from the vessel, near it's origin, by the oculomotor nerve. Arterial decompression is a well established therapy for trigeminal neuralgia."}, {"number": 124, "topic": "Circle of Willis", "stem_html": "An occlusion of the anterior cerebral artery may compromise the blood supply to the following structures except:", "options": [{"label_html": "Medial inferior surface of the frontal lobe", "is_correct": false}, {"label_html": "Corpus callosum", "is_correct": false}, {"label_html": "Medial surface of the frontal lobe", "is_correct": false}, {"label_html": "Olfactory bulb", "is_correct": false}, {"label_html": "Brocas area", "is_correct": true}], "correct_index": 4, "explanation_html": "Brocas area is usually supplied by branches from the middle cerebral artery."}], "note_html": "The two internal carotid arteries and two vertebral arteries form an anastomosis known as the Circle of Willis on the inferior surface of the brain. Each half of the circle is formed by:<br>1. Anterior communicating artery<br>2. Anterior cerebral artery<br>3. Internal carotid artery<br>4. Posterior communicating artery<br>5. Posterior cerebral arteries and the termination of the basilar artery<br><br>The circle and its branches supply; the corpus striatum, internal capsule, diencephalon and midbrain.<br><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb035b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb035.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Circle of Willis\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb035b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center><br><b>Vertebral arteries<\/b><br><ul><li>Enter the cranial cavity via foramen magnum<\/li><li>Lie in the subarachnoid space<\/li><li>Ascend on anterior surface of medulla oblongata<\/li><li>Unite to form the basilar artery at the base of the pons<\/li><\/ul><br>Branches:<br><ul><li>Posterior spinal artery<\/li><li>Anterior spinal artery<\/li><li>Posterior inferior cerebellar artery<\/li><\/ul><br><b>Basilar artery<\/b><br>Branches:<br><ul><li>Anterior inferior cerebellar artery<\/li><li>Labyrinthine artery<\/li><li>Pontine arteries<\/li><li>Superior cerebellar artery<\/li><li>Posterior cerebral artery (at the point where it bifurcates)<\/li><\/ul><br><b>Internal carotid arteries<\/b><br>Branches:<br><ul><li>Posterior communicating artery<\/li><li>Anterior cerebral artery<\/li><li>Middle cerebral artery<\/li><li>Anterior choroid artery<\/li><\/ul>"}, {"name": "Clavicle", "questions": [{"number": 125, "topic": "Clavicle", "stem_html": "A 35 year old man falls and sustains a fracture to the medial third of his clavicle. Which vessel is at greatest risk of injury?", "options": [{"label_html": "Subclavian vein", "is_correct": true}, {"label_html": "Subclavian artery", "is_correct": false}, {"label_html": "External carotid artery", "is_correct": false}, {"label_html": "Internal carotid artery", "is_correct": false}, {"label_html": "Vertebral artery", "is_correct": false}], "correct_index": 0, "explanation_html": "The subclavian vein lies behind subclavius and the medial part of the clavicle. It rests on the first rib, below and in front of the third part of the subclavian artery, and then on scalenus anterior which separates it from the second part of the artery (posteriorly)."}], "note_html": "The clavicle extends from the sternum to the acromion and helps prevent the shoulder falling forwards and downwards. <br>The inferior surface is irregular and strongly marked by ligaments at each end. Laterally, lies the trapezoid line and this runs anterolaterally. Posteriorly, lies the conoid tubercle. These give attachment to the conoid and trapezoid parts of the coracoclavicular ligament. The medial part of the inferior surface has an irregular surface which marks the surface attachment of the costoclavicular ligament. The intermediate portion is marked by a groove for the subclavius muscle. <br>Medially, the superior part of the bone has a raised surface which gives attachment to the clavicular head of sternocleidomastoid. Sternohyoid gains attachment to the posterior surface. <br>Laterally there is an oval articular facet for the acromion and a disk lies between the clavicle and acromion. The capsule of the joint is attached to the ridge on the margin of the facet."}, {"name": "Coeliac axis", "questions": [{"number": 126, "topic": "Coeliac axis", "stem_html": "Which of the following is not a branch of the hepatic artery?", "options": [{"label_html": "Pancreatic artery", "is_correct": true}, {"label_html": "Cystic artery", "is_correct": false}, {"label_html": "Right gastric artery", "is_correct": false}, {"label_html": "Right hepatic artery", "is_correct": false}, {"label_html": "Gastroduodenal artery", "is_correct": false}], "correct_index": 0, "explanation_html": "The pancreatic artery is a branch of the splenic artery."}, {"number": 127, "topic": "Coeliac axis", "stem_html": "A 53 year old man is undergoing a radical gastrectomy for carcinoma of the stomach. Which of these structures will need to be divided to gain access to the coeliac axis?", "options": [{"label_html": "Lesser omentum", "is_correct": true}, {"label_html": "Greater omentum", "is_correct": false}, {"label_html": "Falciform ligament", "is_correct": false}, {"label_html": "Median arcuate ligament", "is_correct": false}, {"label_html": "Gastrosplenic ligament", "is_correct": false}], "correct_index": 0, "explanation_html": "The lesser omentum will need to be divided. During a radical gastrectomy this forms one of the nodal stations that will need to be taken."}], "note_html": "The coeliac axis has three main branches. <br><ul><li>Left gastric<\/li><li>Hepatic: branches-Right Gastric, Gastroduodenal, Superior Pancreaticoduodenal, Cystic (occasionally). <\/li><li>Splenic: branches- Pancreatic, Short Gastric, Left Gastroepiploic <\/li><\/ul><br>It occasionally gives off one of the inferior phrenic arteries.    <br>  <br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb133b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb133.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Coeliac artery\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb133b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center><br><b>Relations<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Anteriorly<\/b><\/td><td>Lesser omentum<\/td><\/tr><tr><td><b>Right<\/b><\/td><td>Right coeliac ganglion and caudate process of liver<\/td><\/tr><tr><td><b>Left<\/b><\/td><td>Left coeliac ganglion and gastric cardia<\/td><\/tr><tr><td><b>Inferiorly<\/b><\/td><td>Upper border of pancreas and renal vein<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Coeliac plexus", "questions": [{"number": 128, "topic": "Coeliac plexus", "stem_html": "Which of the positions listed below best describes the location of the coeliac autonomic plexus?", "options": [{"label_html": "Anterior to the aorta", "is_correct": true}, {"label_html": "Posterolateral to the aorta", "is_correct": false}, {"label_html": "Anterolateral to the sympathetic chain", "is_correct": false}, {"label_html": "Anteromedial to the sympathetic chain", "is_correct": false}, {"label_html": "Posterior to L1", "is_correct": false}], "correct_index": 0, "explanation_html": "<p>No explanation provided.<\/p>"}], "note_html": "The coeliac plexus is the largest of the autonomic plexuses. It is located on a level of the last thoracic and first lumbar vertebrae. It surrounds the coeliac axis and the SMA. It lies posterior to the stomach and the lesser sac. It lies anterior to the crura of the diaphragm and the aorta. The plexus and ganglia are joined by the greater and lesser splanchnic nerves on both sides and branches from both the vagus and phrenic nerves. <br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb144b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb144.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Celiac plexus\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb144b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}, {"name": "Colon anatomy", "questions": [{"number": 129, "topic": "Colon anatomy", "stem_html": "A man undergoes a high anterior resection for carcinoma of the upper rectum. Which of the following vessels will require ligation?", "options": [{"label_html": "Superior mesenteric artery", "is_correct": false}, {"label_html": "Inferior mesenteric artery", "is_correct": true}, {"label_html": "Coeliac axis", "is_correct": false}, {"label_html": "Perineal artery", "is_correct": false}, {"label_html": "Middle colic artery", "is_correct": false}], "correct_index": 1, "explanation_html": "The IMA is usually divided during anterior resection. Not only is this borne out of oncological necessity but it also permits sufficient colonic mobilisation for anastomosis."}, {"number": 130, "topic": "Colon anatomy", "stem_html": "A 56 year old man is undergoing a high anterior resection. Which of the following structures is at greatest risk of injury in this procedure?", "options": [{"label_html": "Superior mesenteric artery", "is_correct": false}, {"label_html": "Left ureter", "is_correct": true}, {"label_html": "External iliac vein", "is_correct": false}, {"label_html": "External iliac artery", "is_correct": false}, {"label_html": "Inferior vena cava", "is_correct": false}], "correct_index": 1, "explanation_html": "A careless surgeon may damage all of these structures. However, the structure at greatest risk and most frequently encountered is the left ureter."}, {"number": 131, "topic": "Colon anatomy", "stem_html": "A 43 year old man is undergoing a right hemicolectomy and the ileo-colic artery is ligated. From which of the following vessels is it derived?", "options": [{"label_html": "Inferior mesenteric artery", "is_correct": false}, {"label_html": "Superior mesenteric artery", "is_correct": true}, {"label_html": "Coeliac axis", "is_correct": false}, {"label_html": "Aorta", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 1, "explanation_html": "The ileocolic artery is a branch of the SMA and supplies the right colon and terminal ileum. The transverse colon is supplied by the middle colic artery. As veins accompany arteries in the mesentery and are lined by lymphatics, high ligation is the norm in cancer resections. The ileo-colic artery branches off the SMA near the duodenum."}, {"number": 132, "topic": "Colon anatomy", "stem_html": "A 53 year old man is undergoing a left hemicolectomy for carcinoma of the descending colon. From which embryological structure is this region of the gastrointestinal tract derived?", "options": [{"label_html": "Vitellino-intestinal duct", "is_correct": false}, {"label_html": "Hind gut", "is_correct": true}, {"label_html": "Mid gut", "is_correct": false}, {"label_html": "Fore gut", "is_correct": false}, {"label_html": "Woolffian duct", "is_correct": false}], "correct_index": 1, "explanation_html": "The left colon is embryologically part of the hind gut. Which accounts for its separate blood supply via the IMA."}], "note_html": "The colon commences with the caecum. This represents the most dilated segment of the human colon and its base (which is intraperitoneal) is marked by the convergence of teniae coli. At this point is located the vermiform appendix. The colon continues as the ascending colon, the posterior aspect of which is retroperitoneal. The line of demarcation between the intra and retro peritoneal right colon is visible as a white line, in the living, and forms the line of incision for colonic resections. <br><br>The ascending colon becomes the transverse colon after passing the hepatic flexure. At this location the colon becomes wholly intra peritoneal once again. The superior aspect of the transverse colon is the point of attachment of the transverse colon to the greater omentum. This is an important anatomical site since division of these attachments permits entry into the lesser sac. Separation of the greater omentum from the transverse colon is a routine operative step in both gastric and colonic resections. <br><br>At the left side of the abdomen the transverse colon passes to the left upper quadrant and makes an oblique inferior turn at the splenic flexure. Following this, the posterior aspect becomes retroperitoneal once again. <br><br>At the level of approximately L4 the descending colon becomes wholly intraperitoneal and becomes the sigmoid colon. Whilst the sigmoid is wholly intraperitoneal there are usually attachments laterally between the sigmoid and the lateral pelvic sidewall. These small congenital adhesions are not formal anatomical attachments but frequently require division during surgical resections. <br><br>At its distal end the sigmoid passes to the midline and at the region around the sacral promontary it becomes the upper rectum. This transition is visible macroscopically as the point where the teniae fuse. More distally the rectum passes through the peritoneum at the region of the peritoneal reflection and becomes extraperitoneal.<br><br><b>Arterial supply<\/b><br>Superior mesenteric artery and inferior mesenteric artery: linked by the marginal artery.<br>Ascending colon:  ileocolic and right colic arteries <br>Transverse colon:  middle colic artery <br>Descending and sigmoid colon: inferior mesenteric artery<br><br><b>Venous drainage<\/b><br>From regional veins (that accompany arteries) to superior and inferior mesenteric vein<br><br><b>Lymphatic drainage<\/b><br>Initially along nodal chains that accompany supplying arteries, then para-aortic nodes.<br><br><b>Embryology<\/b><br>Midgut- Second part of duodenum to 2/3 transverse colon<br>Hindgut- Distal 1/3 transverse colon to anus<br><br><b>Peritoneal location<\/b><br>The right and left colon are part intraperitoneal and part extraperitoneal. The sigmoid and transverse colon are generally wholly intraperitoneal. This has implications for the sequelae of perforations, which will tend to result in generalised peritonitis in the wholly intra peritoneal segments.<br><br><b>Colonic relations<\/b><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Region of colon<\/b><\/th><th><b>Relation<\/b><\/th><\/tr><\/thead><tbody><tr><td>Caecum/ right colon<\/td><td>Right ureter, gonadal vessels<\/td><\/tr><tr><td>Hepatic flexure<\/td><td>Gallbladder (medially)<\/td><\/tr><tr><td>Splenic flexure<\/td><td>Spleen and tail of pancreas<\/td><\/tr><tr><td>Distal sigmoid/ upper rectum<\/td><td>Left ureter<\/td><\/tr><tr><td>Rectum<\/td><td>Ureters, autonomic nerves, seminal vesicles, prostate, urethra (distally)<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Common carotid artery", "questions": [{"number": 133, "topic": "Common carotid artery", "stem_html": "Which of the structures listed below lies posterior to the carotid sheath at the level of the 6th cervical vertebra?", "options": [{"label_html": "Hypoglossal nerve", "is_correct": false}, {"label_html": "Vagus nerve", "is_correct": false}, {"label_html": "Cervical sympathetic chain", "is_correct": true}, {"label_html": "Ansa cervicalis", "is_correct": false}, {"label_html": "Glossopharyngeal nerve", "is_correct": false}], "correct_index": 2, "explanation_html": "The carotid sheath is crossed anteriorly by the hypoglossal nerves and the ansa cervicalis. The vagus lies within it. The cervical sympathetic chain lies posteriorly between the sheath and the prevertebral fascia."}, {"number": 134, "topic": "Common carotid artery", "stem_html": "Which of the structures listed below lies posterior to the carotid sheath at the level of the 6th cervical vertebra?", "options": [{"label_html": "Hypoglossal nerve", "is_correct": false}, {"label_html": "Vagus nerve", "is_correct": false}, {"label_html": "Cervical sympathetic chain", "is_correct": true}, {"label_html": "Ansa cervicalis", "is_correct": false}, {"label_html": "Glossopharyngeal nerve", "is_correct": false}], "correct_index": 2, "explanation_html": "The carotid sheath is crossed anteriorly by the hypoglossal nerves and the ansa cervicalis. The vagus lies within it. The cervical sympathetic chain lies posteriorly between the sheath and the prevertebral fascia."}, {"number": 135, "topic": "Common carotid artery", "stem_html": "Which of the structures listed below is not a content of the carotid sheath?", "options": [{"label_html": "Internal jugular vein", "is_correct": false}, {"label_html": "Internal carotid artery", "is_correct": false}, {"label_html": "Vagus nerve", "is_correct": false}, {"label_html": "Recurrent laryngeal nerve", "is_correct": true}, {"label_html": "Common carotid artery", "is_correct": false}], "correct_index": 3, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Contents of carotid sheath:<br>Common carotid artery<br>Internal carotid artery<br>Internal jugular vein<br>Vagus nerve<\/div>"}, {"number": 136, "topic": "Common carotid artery", "stem_html": "At which of the following vertebral body levels does the common carotid artery typically bifurcate into the external and internal carotid arteries?", "options": [{"label_html": "C4", "is_correct": true}, {"label_html": "C2", "is_correct": false}, {"label_html": "C1", "is_correct": false}, {"label_html": "C6", "is_correct": false}, {"label_html": "C7", "is_correct": false}], "correct_index": 0, "explanation_html": "It terminates at the upper border of the thyroid cartilage, Which is usually located at C4."}, {"number": 137, "topic": "Common carotid artery", "stem_html": "Which of the following structures is not closely related to the carotid sheath?", "options": [{"label_html": "Sternothyroid muscle", "is_correct": false}, {"label_html": "Sternohyoid muscle", "is_correct": false}, {"label_html": "Hypoglossal nerve", "is_correct": false}, {"label_html": "Superior belly of omohyoid muscle", "is_correct": false}, {"label_html": "Anterior belly of digastric muscle", "is_correct": true}], "correct_index": 4, "explanation_html": "At its lower end the carotid sheath is related to sternohyoid and sternothyroid. Opposite the cricoid cartilage the sheath is crossed by the superior belly of omohyoid. Above this level the sheath is covered by the sternocleidomastoid muscle. Above the level of the hyoid the vessels pass deep to the posterior belly of digastric and stylohyoid. Opposite the hyoid bone the sheath is crossed obliquely by the hypoglossal nerve."}], "note_html": "The right common carotid artery arises at the bifurcation of the brachiocephalic trunk, the left common carotid arises from the arch of the aorta. Both terminate at the level of the upper border of the thyroid cartilage (the lower border of the third cervical vertebra) by dividing into the internal and external carotid arteries.<br><br><b>Left common carotid artery<\/b><br>This vessel arises immediately to the left and slightly behind the origin of the brachiocephalic trunk. Its thoracic portion is 2.5- 3.5 cm in length and runs superolaterally to the sternoclavicular joint.<br><br><i>In the thorax<\/i><br>The vessel is in contact, from below upwards, with the trachea, left recurrent laryngeal nerve, left margin of the oesophagus. Anteriorly the left brachiocephalic vein runs across the artery, and the cardiac branches from the left vagus descend in front of it. These structures together with the thymus and the anterior margins of the left lung and pleura separate the artery from the manubrium. <br><br><i>In the neck<\/i><br>The artery runs superiorly deep to sternocleidomastoid and then enters the anterior triangle. At this point it lies within the carotid sheath with the vagus nerve and the internal jugular vein. Posteriorly the sympathetic trunk lies between the vessel and the prevertebral fascia. At the level of C7 the vertebral artery and thoracic duct lie behind it. The anterior tubercle of C6 transverse process is prominent and the artery can be compressed against this structure (it corresponds to the level of the cricoid). <br>Anteriorly at C6 the omohyoid muscle passes superficial to the artery.<br>Within the carotid sheath the jugular vein lies lateral to the artery.<br><br><b>Right common carotid artery<\/b><br>The right common carotid arises from the brachiocephalic artery. The right common carotid artery corresponds with the cervical portion of the left common carotid, except that there is no thoracic duct on the right. The oesophagus is less closely related to the right carotid than the left. <br><br><b>Summary points about the carotid anatomy<\/b><br><br><b>Path<\/b><br>Passes behind the sternoclavicular joint (12% patients above this level) to the upper border of the thyroid cartilage, to divide into the external (ECA) and internal carotid arteries (ICA).<br><br><b>Relations<\/b><br><ul><li>Level of 6th cervical vertebra crossed by omohyoid<\/li><li>Then passes deep to the thyrohyoid, sternohyoid, sternomastoid muscles.<\/li><li>Passes anterior to the carotid tubercle (transverse process 6th cervical vertebra)-NB compression here stops haemorrhage.<\/li><li>The inferior thyroid artery passes posterior to the common carotid artery.<\/li><li>Then : Left common carotid artery crosses the thoracic duct, Right common carotid artery crossed by recurrent laryngeal nerve<\/li><\/ul><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb009b.jpg\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb009.jpg\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Common carotid artery\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb009b.jpg\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}, {"name": "Common peroneal nerve", "questions": [{"number": 138, "topic": "Common peroneal nerve", "stem_html": "A 56 year old man undergoes a low anterior resection with legs in the Lloyd-Davies position. Post operatively he complains of foot drop. Which nerve has been injured?", "options": [{"label_html": "Femoral nerve", "is_correct": false}, {"label_html": "Tibial nerve", "is_correct": false}, {"label_html": "Sciatic nerve", "is_correct": false}, {"label_html": "Common peroneal nerve", "is_correct": true}, {"label_html": "Sural nerve", "is_correct": false}], "correct_index": 3, "explanation_html": "Positioning legs in Lloyd- Davies stirrups can carry the risk of peroneal nerve neuropraxia if not done carefully."}, {"number": 139, "topic": "Common peroneal nerve", "stem_html": "A 33 year old man develops a complex tibial and associated fibular fracture that is managed in a cast for 6 weeks. On removal of the cast the patient is noted to have a foot drop. Which nerve is most likely to be compromised?", "options": [{"label_html": "Obturator", "is_correct": false}, {"label_html": "Sciatic", "is_correct": false}, {"label_html": "Tibial", "is_correct": false}, {"label_html": "Common peroneal", "is_correct": true}, {"label_html": "Medial plantar", "is_correct": false}], "correct_index": 3, "explanation_html": "The cast is most likely to affect the common peroneal nerve as it wraps around the fibular head. A foot drop is the typical end result of such an injury."}, {"number": 140, "topic": "Common peroneal nerve", "stem_html": "A 34 year old man is injured by farm machinery and sustains a laceration at the superolateral aspect of the popliteal fossa. The lateral aspect of biceps femoris is lacerated. Which of the following underlying structures is at greatest risk of injury?", "options": [{"label_html": "Gracilis", "is_correct": false}, {"label_html": "Sural nerve", "is_correct": false}, {"label_html": "Nerve to semimembranosus", "is_correct": false}, {"label_html": "Popliteal artery", "is_correct": false}, {"label_html": "Common peroneal nerve", "is_correct": true}], "correct_index": 4, "explanation_html": "The common peroneal nerve lies under the lateral aspect of biceps femoris and is therefore at greatest risk of injury. The tibial nerve may also be damaged in such an injury (but is not listed here). The sural nerve branches off more inferiorly."}, {"number": 141, "topic": "Common peroneal nerve", "stem_html": "At which of the following anatomical locations does the common peroneal nerve bifurcate into the superficial and deep peroneal nerves?", "options": [{"label_html": "Immediately anterior to the linea aspera", "is_correct": false}, {"label_html": "At the lateral aspect of the neck of the fibula", "is_correct": true}, {"label_html": "Within the substance of tibialis anterior muscle", "is_correct": false}, {"label_html": "At the inferomedial aspect of the popliteal fossa", "is_correct": false}, {"label_html": "Under the medial head of gastrocnemius", "is_correct": false}], "correct_index": 1, "explanation_html": "The common peroneal nerve bifurcates at the neck of the fibula (where it is most likely to be injured)."}, {"number": 142, "topic": "Common peroneal nerve", "stem_html": "The common peroneal nerve, or its branches, supply the following muscles except:", "options": [{"label_html": "Peroneus longus", "is_correct": false}, {"label_html": "Tibialis anterior", "is_correct": false}, {"label_html": "Extensor hallucis longus", "is_correct": false}, {"label_html": "Flexor digitorum brevis", "is_correct": true}, {"label_html": "Extensor digitorum longus", "is_correct": false}], "correct_index": 3, "explanation_html": "Flexor digitorum is supplied by the tibial nerve."}], "note_html": "Derived from the dorsal divisions of the sacral plexus (L4, L5, S1 and S2).<br><br>This nerve supplies the skin and fascia of the anterolateral surface of the leg and the dorsum of the foot. It also innervates the muscles of the anterior and peroneal compartments of the leg, extensor digitorum brevis as well as the knee, ankle and foot joints.<br><br>It is laterally placed within the sciatic nerve. From the bifurcation of the sciatic nerve it passes inferolaterally in the lateral and proximal part of the popliteal fossa, under the cover of biceps femoris and its tendon. To reach the posterior aspect of the fibular head. It ends by dividing into the deep and superficial peroneal nerves at the point where it winds around the lateral surface of the neck of the fibula in the body of peroneus longus, approximately 2cm distal to the apex of the head of the fibula. It is palpable posterior to the head of the fibula.<br><br><b>Branches<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>In the thigh<\/b><\/td><td>Nerve to the short head of biceps<br>Articular branch (knee)<\/td><\/tr><tr><td><b>In the popliteal fossa<\/b><\/td><td>Lateral cutaneous nerve of the calf<\/td><\/tr><tr><td><b>Neck of fibula<\/b><\/td><td>Superficial and deep peroneal nerves<\/td><\/tr><\/tbody><\/table><\/div><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb307b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb307.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"https://en.wikipedia.org/wiki/Main_Page\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb307b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}, {"name": "Cords of the brachial plexus", "questions": [{"number": 143, "topic": "Cords of the brachial plexus", "stem_html": "A 56 year old machinist has his arm entrapped in a steel grinder and is brought to the emergency department. On examination, he is unable to extend his metacarpophalangeal joints and abduct his shoulder.  He has weakness of his elbow and wrist.  What has been injured?", "options": [{"label_html": "Ulnar nerve", "is_correct": false}, {"label_html": "Axillary nerve", "is_correct": false}, {"label_html": "Medial cord of brachial plexus", "is_correct": false}, {"label_html": "Lateral cord of brachial plexus", "is_correct": false}, {"label_html": "Posterior cord of brachial plexus", "is_correct": true}], "correct_index": 4, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">The posterior cord gives rise to: <br><ul><li>Radial nerve ((innervates the triceps, brachioradialis, wrist extensors, and finger extensors)<\/li><li>Axillary nerve (innervates deltoid and teres minor)<\/li><li>Upper subscapular nerve (innervates subscapularis)<\/li><li>Lower subscapular nerve (innervates teres major and subscapularis)<\/li><li>Thoracodorsal nerve (innervates latissimus dorsi) <\/li><\/ul><\/div>This is a description of a posterior cord lesion.  Remember that the posterior cord gives rise to the axillary and radial nerve."}], "note_html": "The brachial plexus cords are described according to their relationship with the axillary artery.  The cords pass over the 1st rib near to the dome of the lung and pass beneath the clavicle immediately posterior to the subclavian artery.<br><br><b>Lateral cord<\/b><br><ul><li>Anterior divisions of the upper and middle trunks form the lateral cord<\/li><li>Origin of the lateral pectoral nerve (C5, C6, C7)<\/li><\/ul><b>Medial cord<\/b><br><ul><li>Anterior division of the lower trunk forms the medial cord<\/li><li>Origin of the medial pectoral nerve (C8, T1), the medial brachial cutaneous nerve (T1), and the medial antebrachial cutaneous nerve (C8, T1)<\/li><\/ul><b>Posterior cord<\/b><br><ul><li>Formed by the posterior divisions of the 3 trunks (C5-T1)<\/li><li>Origin of the upper and lower subscapular nerves (C7, C8 and C5, C6, respectively) and the thoracodorsal nerve to the latissimus dorsi (also known as the middle subscapular nerve, C6, C7, C8), axillary and radial nerve<\/li><li>Pnemonic for branches of posterior chord. ULNAR U-Upper subscapular Nerve L- Lower subscapular nerve N- Nerve to lattismus Dorsi A- Axillary Nerve R- Radial Nerve<\/li><\/ul>"}, {"name": "Cranial nerves", "questions": [{"number": 144, "topic": "Cranial nerves", "stem_html": "A motorcyclist is injured in a road traffic accident and is not wearing a helmet. He suffers a severe closed head injury and develops raised intracranial pressure. The first cranial nerve to be affected by this process is likely to be:", "options": [{"label_html": "Oculomotor", "is_correct": false}, {"label_html": "Hypoglossal", "is_correct": false}, {"label_html": "Motor branch of the trigeminal", "is_correct": false}, {"label_html": "Abducens", "is_correct": true}, {"label_html": "Sensory branch of the trigeminal", "is_correct": false}], "correct_index": 3, "explanation_html": "The abducens nerve (CN VI) has a long intra cranial course and is thus susceptible to raised intra cranial pressure. It also passes over the petrous temporal bone and 6th nerve palsies are also seen in mastoiditis."}, {"number": 145, "topic": "Cranial nerves", "stem_html": "A motorcyclist is injured in a road traffic accident and is not wearing a helmet. He suffers a severe closed head injury and develops raised intracranial pressure. The first cranial nerve to be affected by this process is likely to be:", "options": [{"label_html": "Oculomotor", "is_correct": false}, {"label_html": "Hypoglossal", "is_correct": false}, {"label_html": "Motor branch of the trigeminal", "is_correct": false}, {"label_html": "Abducens", "is_correct": true}, {"label_html": "Sensory branch of the trigeminal", "is_correct": false}], "correct_index": 3, "explanation_html": "The abducens nerve (CN VI) has a long intra cranial course and is thus susceptible to raised intra cranial pressure. It also passes over the petrous temporal bone and 6th nerve palsies are also seen in mastoiditis."}, {"number": 146, "topic": "Cranial nerves", "stem_html": "A patient presents to the clinic following a surgical procedure. She complains that she is unable to shrug her shoulder. What is the most likely underlying nerve injury?", "options": [{"label_html": "Accessory nerve", "is_correct": true}, {"label_html": "Cervical plexus", "is_correct": false}, {"label_html": "Ansa cervicalis", "is_correct": false}, {"label_html": "Long thoracic nerve", "is_correct": false}, {"label_html": "Axillary nerve", "is_correct": false}], "correct_index": 0, "explanation_html": "The accessory nerve may be injured in operations in the posterior triangle. Injury will affect trapezius."}, {"number": 147, "topic": "Cranial nerves", "stem_html": "A 43 year old lady develops a cerebello-pontine angle lesion. Which of the nerves listed below is likely to be affected first?", "options": [{"label_html": "CN X", "is_correct": false}, {"label_html": "CN III", "is_correct": false}, {"label_html": "CN V", "is_correct": true}, {"label_html": "CN IX", "is_correct": false}, {"label_html": "CN XII", "is_correct": false}], "correct_index": 2, "explanation_html": "The most likely lesion to occur in the cerebello-pontine angle is an acoustic neuroma. <br>The trigeminal nerve has a broad base and involvement of at least part of this nerve is the most likely initial finding. The defect may be subtle such as loss of the ipsilateral corneal reflex. Ipsilateral hearing loss will also occur. Untreated, progressive lesions, may ultimately affect cranial nerve roots in this region."}, {"number": 148, "topic": "Cranial nerves", "stem_html": "Which of the cranial nerves listed below is least likely to carry parasympathetic fibres?", "options": [{"label_html": "III", "is_correct": false}, {"label_html": "VII", "is_correct": false}, {"label_html": "IX", "is_correct": false}, {"label_html": "X", "is_correct": false}, {"label_html": "II", "is_correct": true}], "correct_index": 4, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Cranial nerves carrying parasympathetic fibres<br>X IX VII III (1973)<\/div>The parasympathetic functions served by the cranial nerves include:<br><div class=\"table-responsive\"><table class=\"tb\"><tbody><tr><td>III (oculomotor)<\/td><td>Pupillary constriction and accommodation<\/td><\/tr><tr><td>VII (facial)<\/td><td>Lacrimal gland, submandibular and sublingual glands<\/td><\/tr><tr><td>IX (glossopharyngeal)<\/td><td>Parotid<\/td><\/tr><tr><td>X (vagus)<\/td><td>Heart and abdominal viscera<\/td><\/tr><\/tbody><\/table><\/div>The optic nerve carries no parasympathetic fibres.<br><br>The cranial preganglionic parasympathetic nerves arise from specific nuclei in the CNS. These synapse at one of four parasympathetic ganglia; otic, pterygopalatine, ciliary and submandibular. From these ganglia the parasympathetic nerves complete their journey to their target tissues via CN V (trigeminal) branches (ophthalmic nerve CNV branch 1, Maxillary nerve CN V branch2, mandibular nerve CN V branch 3)"}, {"number": 149, "topic": "Cranial nerves", "stem_html": "A 63 year old man is admitted with severe headache, nausea and recent epileptic fit. Fundoscopy shows papilloedema. He is also noted to have diplopia. Which of the cranial nerves listed accounts for the latter?", "options": [{"label_html": "Abducens", "is_correct": true}, {"label_html": "Optic", "is_correct": false}, {"label_html": "Oculomotor", "is_correct": false}, {"label_html": "Facial", "is_correct": false}, {"label_html": "Trigeminal", "is_correct": false}], "correct_index": 0, "explanation_html": "The long intracranial course of this nerve makes it susceptible to damage early in the course of raised ICP."}, {"number": 150, "topic": "Cranial nerves", "stem_html": "A 21 year old man undergoes an uncomplicated tonsillectomy for recurrent attacks of tonsillitis. Post operatively he complains of otalgia. Which nerve is responsible?", "options": [{"label_html": "Trigeminal", "is_correct": false}, {"label_html": "Hypoglossal", "is_correct": false}, {"label_html": "Glossopharyngeal", "is_correct": true}, {"label_html": "Facial", "is_correct": false}, {"label_html": "Vagus", "is_correct": false}], "correct_index": 2, "explanation_html": "The glossopharyngeal nerve supplies this area and the ear and otalgia may be the result of referred pain."}, {"number": 151, "topic": "Cranial nerves", "stem_html": "Which cranial nerve supplies the motor fibres of styloglossus?", "options": [{"label_html": "Facial", "is_correct": false}, {"label_html": "Trigeminal", "is_correct": false}, {"label_html": "Vagus", "is_correct": false}, {"label_html": "Hypoglossal", "is_correct": true}, {"label_html": "Glossopharyngeal", "is_correct": false}], "correct_index": 3, "explanation_html": "The hypoglossal nerve supplies motor innervation to all extrinsic and intrinsic muscles of the tongue. The only possible exception to this is palatoglossus, which is innervated by the vagus."}, {"number": 152, "topic": "Cranial nerves", "stem_html": "Which cranial nerve provides general sensation to the anterior two thirds of the tongue?", "options": [{"label_html": "Facial", "is_correct": false}, {"label_html": "Trigeminal", "is_correct": true}, {"label_html": "Hypoglossal", "is_correct": false}, {"label_html": "Vagus", "is_correct": false}, {"label_html": "Glossopharyngeal", "is_correct": false}], "correct_index": 1, "explanation_html": "Taste to the anterior two thirds of the tongue is supplied by the facial nerve, the trigeminal supplies general sensation, this is mediated by the mandibular branch of the trigeminal nerve (via the lingual nerve)."}, {"number": 153, "topic": "Cranial nerves", "stem_html": "Which cranial nerve supplies general sensation to the posterior third of the tongue?", "options": [{"label_html": "Facial", "is_correct": false}, {"label_html": "Trigeminal", "is_correct": false}, {"label_html": "Vagus", "is_correct": false}, {"label_html": "Hypoglossal", "is_correct": false}, {"label_html": "Glossopharyngeal", "is_correct": true}], "correct_index": 4, "explanation_html": "The glossopharyngeal nerve supplies general sensation to the posterior third of the tongue and contributes to the gag reflex."}, {"number": 154, "topic": "Cranial nerves", "stem_html": "A 35 year old man is admitted to hospital with vomiting, nausea and severe headaches. An MRI scan reveals a tumour of the cerebellopontine angle. Which one of the following pairs of cranial nerves is most likely to be compressed by this tumour?", "options": [{"label_html": "Accessory and vagus", "is_correct": false}, {"label_html": "Facial and vagus", "is_correct": false}, {"label_html": "Facial and vestibulocochlear", "is_correct": true}, {"label_html": "Glossopharyngeal and vestibulocochlear", "is_correct": false}, {"label_html": "Vagus and vestibulocochlear", "is_correct": false}], "correct_index": 2, "explanation_html": "The cerebellopontine angle is located between the superior and inferior limbs of the angular cerebellopontine fissure formed by the petrosal cerebellar surface folding around the pons and middle cerebellar peduncle. The cerebellopontine fissure opens medially and has superior and inferior limbs that meet at a lateral apex. The fourth through the eleventh cranial nerves are located near or within the angular space between the two limbs commonly referred to as the cerebellopontine angle. The commonest lesion to affect this site is an acoustic neuroma. Therefore the vestibulocochlear nerve is commonly compromised. Larger lesions may also affect the facial nerve which lies closest to this site."}, {"number": 155, "topic": "Cranial nerves", "stem_html": "A motor cyclist is involved in a motor vehicle accident. He sustains significant head injuries. Following recovery, he is noted to have significant anosmia. A fracture of which of the following is likely to have resulted in this process?", "options": [{"label_html": "Sphenoid", "is_correct": false}, {"label_html": "Temporal", "is_correct": false}, {"label_html": "Ethmoid", "is_correct": true}, {"label_html": "Parietal", "is_correct": false}, {"label_html": "Frontal", "is_correct": false}], "correct_index": 2, "explanation_html": "The olfactory nerve passes through the ethmoid bone and fractures affecting this will impact on it resulting in anosmia."}, {"number": 156, "topic": "Cranial nerves", "stem_html": "A motor cyclist is involved in a motor vehicle accident. He sustains significant head injuries. Following recovery, he is noted to have significant anosmia. A fracture of which of the following is likely to have resulted in this process?", "options": [{"label_html": "Sphenoid", "is_correct": false}, {"label_html": "Temporal", "is_correct": false}, {"label_html": "Ethmoid", "is_correct": true}, {"label_html": "Parietal", "is_correct": false}, {"label_html": "Frontal", "is_correct": false}], "correct_index": 2, "explanation_html": "The olfactory nerve passes through the ethmoid bone and fractures affecting this will impact on it resulting in anosmia."}], "note_html": "<b>Cranial nerve lesions<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Olfactory nerve<\/b><\/td><td>May be injured in basal skull fractures or involved in frontal lobe tumour extension. Loss of olfactory nerve function in relation to major CNS pathology is seldom an isolated event and thus it is poor localiser of CNS pathology.<\/td><\/tr><tr><td><b>Optic nerve<\/b><\/td><td>Problems with visual acuity may result from intra ocular disorders. Problems with the blood supply such as amaurosis fugax may produce temporary visual distortion. More important surgically is the pupillary response to light. The pupillary size may be altered in a number of disorders. Nerves involved in the resizing of the pupil connect to the pretectal nucleus of the high midbrain, bypassing the lateral geniculate nucleus and the primary visual cortex. From the pretectal nucleus neurones pass to the Edinger - Westphal nucleus, motor axons from here pass along with the oculomotor nerve. They synapse with ciliary ganglion neurones; the parasympathetic axons from this then innervate the iris and produce miosis. The miotic pupil is seen in disorders such as Horner's syndrome or opiate overdose. <br>Mydriasis is the dilatation of the pupil in response to disease, trauma, drugs (or the dark!). It is pathological when light fails to induce miosis. The radial muscle is innervated by the sympathetic nervous system. Because the parasympathetic fibres travel with the oculomotor nerve they will be damaged by lesions affecting this nerve (e.g. cranial trauma).<br>The response to light shone in one eye is usually a constriction of both pupils. This indicates intact direct and consensual light reflexes. When the optic nerve has an afferent defect the light shining on the affected eye will produce a diminished pupillary response in both eyes. Whereas light shone on the unaffected eye will produce a normal pupillary response in both eyes. This is referred to as the Marcus Gunn pupil and is seen in conditions such as optic neuritis. In a total CN II lesion shining the light in the affected eye will produce no response.<\/td><\/tr><tr><td><b>Oculomotor nerve<\/b><\/td><td>The pupillary effects are described above. In addition it supplies all ocular muscles apart from lateral rectus and superior oblique. Thus the affected eye will be deviated inferolaterally. Levator palpebrae superioris may also be impaired resulting in impaired ability to open the eye.<\/td><\/tr><tr><td><b>Trochlear nerve<\/b><\/td><td>The eye will not be able to look down.<\/td><\/tr><tr><td><b>Trigeminal nerve <\/b><\/td><td>Largest cranial nerve. Exits the brainstem at the pons. Branches are ophthalmic, maxillary and mandibular. Only the mandibular branch has both sensory and motor fibres. Branches converge to form the trigeminal ganglion (located in Meckels cave). It supplies the muscles of mastication and also tensor veli palatine, mylohyoid, anterior belly of digastric and tensor tympani. The detailed descriptions of the various sensory functions are described in other areas of the website. The corneal reflex is important and is elicited by applying a small tip of cotton wool to the cornea, a reflex blink should occur if it is intact. It is mediated by: the naso ciliary branch of the ophthalmic branch of the trigeminal (sensory component) and the facial nerve producing the motor response. Lesions of the afferent arc will produce bilateral absent blink and lesions of the efferent arc will result in a unilateral absent blink.<\/td><\/tr><tr><td><b>Abducens nerve<\/b><\/td><td>The affected eye will have a deficit of abduction. This cranial nerve exits the brainstem between the pons and medulla. It thus has a relatively long intra cranial course which renders it susceptible to damage in raised intra cranial pressure.<\/td><\/tr><tr><td><b>Facial nerve<\/b><\/td><td>Emerges from brainstem between pons and medulla. It controls muscles of facial expression and taste from the anterior 2/3 of the tongue. The nerve passes into the petrous temporal bone and into the internal auditory meatus. It then passes through the facial canal and exits at the stylomastoid foramen. It passes through the parotid gland and divides at this point. It does not innervate the parotid gland. Its divisions are considered in other parts of the website. Its motor fibres innervate orbicularis oculi to produce the efferent arm of the corneal reflex.  In surgical practice it may be injured during parotid gland surgery or invaded by malignancies of the gland and a lower motor neurone on the ipsilateral side will result.<\/td><\/tr><tr><td><b>Vestibulo-cochlear nerve<\/b><\/td><td>Exits from the pons and then passes through the internal auditory meatus. It is implicated in sensorineural hearing loss. Individuals with sensorineural hearing loss will localise the sound in webers test to the normal ear. Rinnes test will be reduced on the affected side but should still work.  These two tests will distinguish sensorineural hearing loss from conductive
