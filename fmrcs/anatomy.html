o be interrupted, with drainage achieved via the azygos venous system. This may occur in patients with left sided atrial isomerism."}, {"name": "Suprascapular nerve", "questions": [{"number": 550, "topic": "Suprascapular nerve", "stem_html": "A 38 year old man presents to the clinic with shoulder weakness. On examination he has an inability to initiate shoulder abduction. Which of the nerves listed below is least likely to be functioning normally?", "options": [{"label_html": "Suprascapular nerve", "is_correct": true}, {"label_html": "Medial pectoral nerve", "is_correct": false}, {"label_html": "Axillary nerve", "is_correct": false}, {"label_html": "Median nerve", "is_correct": false}, {"label_html": "Radial nerve", "is_correct": false}], "correct_index": 0, "explanation_html": "<p>No explanation provided.<\/p>"}], "note_html": "The suprascapular nerve arises from the upper trunk of the brachial plexus. It lies superior to the trunks of the brachial plexus and passes inferolaterally parallel to them. It passes through the scapular notch, deep to trapezius. It innervates both supraspinatus and infraspinatus and initiates abduction of the shoulder. If damaged, patients may be able to abduct the shoulder by leaning over the affected side and deltoid can then continue to abduct the shoulder.<br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb125b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb125.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Suprascapular nerve\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb125b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}, {"name": "Surface anatomy of the neck", "questions": [{"number": 551, "topic": "Surface anatomy of the neck", "stem_html": "At which of the following levels does the inferior thyroid artery enter the thyroid gland?", "options": [{"label_html": "C6", "is_correct": true}, {"label_html": "C2", "is_correct": false}, {"label_html": "C4", "is_correct": false}, {"label_html": "C3", "is_correct": false}, {"label_html": "C5", "is_correct": false}], "correct_index": 0, "explanation_html": "It enters the gland at C6."}, {"number": 552, "topic": "Surface anatomy of the neck", "stem_html": "What is the level of the hyoid bone?", "options": [{"label_html": "C1", "is_correct": false}, {"label_html": "C2", "is_correct": false}, {"label_html": "C3", "is_correct": true}, {"label_html": "C4", "is_correct": false}, {"label_html": "C5", "is_correct": false}], "correct_index": 2, "explanation_html": "<p>No explanation provided.<\/p>"}], "note_html": "In the midline from above down, the following structures are felt<br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th>Structure<\/th><th>Level<\/th><\/tr><\/thead><tbody><tr><td>Hyoid<\/td><td>C3<\/td><\/tr><tr><td>Notch of the thyroid cartilage<\/td><td>C4<\/td><\/tr><tr><td>Cricoid cartilage(termination)<\/td><td>C6<\/td><\/tr><\/tbody><\/table><\/div>The lower border of the cricoid cartilage corresponds to the commencement of the trachea and also to the following:<br><br><ul><li>Junction of larynx with trachea<\/li><li>Junction of pharynx with oesophagus<\/li><li>Level at which the inferior thyroid artery enters the thyroid gland<\/li><li>The level at which the vertebral artery enters the transverse foramen in the 6th cervical vertebra<\/li><li>Level at which the superior belly of omohyoid crosses the carotid sheath<\/li><li>The level of the middle cervical sympathetic ganglion<\/li><li>The level at which the carotid artery can be compressed against the transverse process of C6 (carotid tubercle).<\/li><\/ul>"}, {"name": "Sympathetic nervous system- anatomy", "questions": [{"number": 553, "topic": "Sympathetic nervous system- anatomy", "stem_html": "An 18 year old lady with troublesome hyperhidrosis of the hands and arms is due to undergo a sympathectomy to treat the condition. Which of the following should the surgeons divide to most effectively treat her condition?", "options": [{"label_html": "Sympathetic ganglia at T1, T2 and T3", "is_correct": false}, {"label_html": "Sympathetic ganglia at T2 and T3", "is_correct": true}, {"label_html": "Sympathetic ganglia at T1 and T2", "is_correct": false}, {"label_html": "Stellate ganglion", "is_correct": false}, {"label_html": "Superior cervical ganglion", "is_correct": false}], "correct_index": 1, "explanation_html": "To treat hyperhidrosis the sympathetic ganglia at T2 and T3 should be divided. Dividing the other structures listed would either carry a risk of Horners syndrome or be ineffective.<br>Useful mnemonic: T2 &amp; T3 Make the hands sweat-free"}, {"number": 554, "topic": "Sympathetic nervous system- anatomy", "stem_html": "A 23 year old lady with troublesome axillary hyperhidrosis is undergoing a thorascopic sympathectomy to treat the condition. Which of the following structures will need to be divided to access the sympathetic trunk?", "options": [{"label_html": "Intercostal vein", "is_correct": false}, {"label_html": "Intercostal artery", "is_correct": false}, {"label_html": "Parietal pleura", "is_correct": true}, {"label_html": "Visceral pleura", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 2, "explanation_html": "The sympathetic chain lies posterior to the parietal pleura. During a thorascopic sympathectomy this structure will need to be divided. The intercostal vessels lie posteriorly. They may be damaged with troublesome bleeding but otherwise are best left alone as deliberate division will not improve surgical access."}], "note_html": "The cell bodies of the pre-ganglionic efferent neurones lie in the lateral horn of the grey matter of the spinal cord in the thoraco-lumbar regions. <br>The pre-ganglionic efferents leave the spinal cord at levels T1-L2. These pass to the sympathetic chain. <br>Lateral branches of the sympathetic chain connect it to every spinal nerve. These post ganglionic nerves will pass to structures that receive sympathetic innervation at the periphery. <br><br><b>Sympathetic chains<\/b><br>These lie on the vertebral column and run from the base of the skull to the coccyx. <br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Cervical region<\/b><\/td><td>Lie anterior to the transverse processes of the cervical vertebrae and posterior to the carotid sheath.<\/td><\/tr><tr><td><b>Thoracic region<\/b><\/td><td>Lie anterior to the neck of the upper ribs and and lateral sides of the lower thoracic vertebrae.They are covered by the parietal pleura<\/td><\/tr><tr><td><b>Lumbar region<\/b><\/td><td>Enter by passing posterior to the medial arcuate ligament. Lie anteriorly to the vertebrae and medial to psoas major.<\/td><\/tr><\/tbody><\/table><\/div><br><b>Sympathetic ganglia<\/b><br><ul><li>Superior cervical ganglion lies anterior to C2 and C3. <\/li><li>Middle cervical ganglion (if present) C6<\/li><li>Stellate ganglion- anterior to transverse process of C7, lies posterior to the subclavian artery, vertebral artery and cervical pleura.<\/li><li>Thoracic ganglia are segmentally arranged.<\/li><li>There are usually 4 lumbar ganglia.<\/li><\/ul><br><b>Clinical importance<\/b><br><ul><li>Interruption of the head and neck supply of the sympathetic nerves will result in an ipsilateral Horners syndrome.<\/li><li>For treatment of hyperhidrosis the sympathetic denervation can be achieved by removing the second and third thoracic ganglia with their rami. Removal of T1 will cause a Horners syndrome and is therefore not performed.<\/li><li>In patients with vascular disease of the lower limbs a lumbar sympathetomy may be performed, either radiologically or (more rarely now) surgically. The ganglia of L2 and below are disrupted. If L1 is removed then ejaculation may be compromised (and little additional benefit conferred as the preganglionic fibres do not arise below L2. <\/li><\/ul>"}, {"name": "Testicular embryology", "questions": [{"number": 555, "topic": "Testicular embryology", "stem_html": "A 6 month old child is brought to the surgical clinic because of non descended testes. What is the main structure that determines the descent path of the testicle?", "options": [{"label_html": "Processus vaginalis", "is_correct": false}, {"label_html": "Cremaster", "is_correct": false}, {"label_html": "Mesorchium", "is_correct": false}, {"label_html": "Inguinal canal", "is_correct": false}, {"label_html": "Gubernaculum", "is_correct": true}], "correct_index": 4, "explanation_html": "The gubernaculum is a ridge of mesenchymal tissue that connects the testis to the inferior aspect of the scrotum. Early in embryonic development the gubernaculum is long and the testis are located on the posterior abdominal wall. During foetal growth the body grows relative to the gubernaculum, with resultant descent of the testis."}, {"number": 556, "topic": "Testicular embryology", "stem_html": "A 1 year old boy is referred because of an impalpable testis in the left scrotum. Which of the following positions describes an ectopic testis?", "options": [{"label_html": "Intracanalicular", "is_correct": false}, {"label_html": "At the superficial ring", "is_correct": false}, {"label_html": "At the base of the penis", "is_correct": true}, {"label_html": "Upper scrotum", "is_correct": false}, {"label_html": "At the deep inguinal ring", "is_correct": false}], "correct_index": 2, "explanation_html": "A testis at the base of the penis is ectopic, not listed is the superficial inguinal pouch (one of the commonest ectopic sites). A testis located at deep or superficial rings or intra canalicular is not ectopically located."}], "note_html": "Until the end of foetal life the testicles are located within the abdominal cavity. They are initially located on the posterior abdominal wall on a level with the upper lumbar vertebrae (L2). Attached to the inferior aspect of the testis is the gubernaculum testis which extends caudally to the inguinal region, through the canal and down to the superficial skin. Both the testis and the gubernaculum are extra-peritoneal. <br>As the foetus grows the gubernaculum becomes progressively shorter. It carries the peritoneum of the anterior abdominal wall (the processus vaginalis). As the processus vaginalis descends the testis is guided by the gubernaculum down the posterior abdominal wall and the back of the processus vaginalis into the scrotum. <br>By the third month of foetal life the testes are located in the iliac fossae, by the seventh they lie at the level of the deep inguinal ring. <br><br>The processus vaginalis usually closes after birth, but may persist and be the site of indirect hernias. Part closure may result in development of cysts on the cord."}, {"name": "Thoracic aorta", "questions": [{"number": 557, "topic": "Thoracic aorta", "stem_html": "Which of the following is not considered a major branch of the descending thoracic aorta?", "options": [{"label_html": "Bronchial artery", "is_correct": false}, {"label_html": "Mediastinal artery", "is_correct": false}, {"label_html": "Inferior thyroid artery", "is_correct": true}, {"label_html": "Posterior intercostal artery", "is_correct": false}, {"label_html": "Oesophageal artery", "is_correct": false}], "correct_index": 2, "explanation_html": "The inferior thyroid artery is usually derived from the thyrocervical trunk, a branch of the subclavian artery."}], "note_html": "<div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Origin<\/b><\/td><td>T4<\/td><\/tr><tr><td><b>Terminates<\/b><\/td><td>T12<\/td><\/tr><tr><td><b>Relations<\/b><\/td><td><ul><li>Anteriorly (from top to bottom)-root of the left lung, the pericardium, the oesophagus, and the diaphragm<\/li><li>Posteriorly-vertebral column, azygos vein<\/li><li>Right- azygos veins, thoracic duct<\/li><li>Left- left pleura and lung<\/li><\/ul><\/td><\/tr><tr><td><b>Branches<\/b><\/td><td><ul><li>Lateral segmental branches: Posterior intercostal arteries<\/li><li>Lateral visceral: Bronchial arteries supply bronchial walls and lung excluding the alveoli<\/li><li>Midline branches: Oesophageal arteries<\/li><\/ul><\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Thoracic duct", "questions": [{"number": 558, "topic": "Thoracic duct", "stem_html": "A 53 year old man with a carcinoma of the lower third of the oesophagus is undergoing an oesophagogastrectomy. As the surgeons mobilise the mid part of the oesophagus, where are they most likely to encounter the thoracic duct?", "options": [{"label_html": "Anterior to the oesophagus", "is_correct": false}, {"label_html": "On the left side of the oesophagus", "is_correct": false}, {"label_html": "On the right side of the oesophagus", "is_correct": false}, {"label_html": "Immediately anterior to the azygos vein", "is_correct": false}, {"label_html": "Posterior to the oesophagus", "is_correct": true}], "correct_index": 4, "explanation_html": "The thoracic duct lies posterior to the oesophagus and passes to the left at the level of the Angle of Louis. It enters the thorax at T12 alongside with the aorta."}], "note_html": "<ul><li>Continuation of the cisterna chyli in the abdomen.<\/li><li>Enters the thorax at T12.<\/li><li>Lies posterior to the oesophagus for most of its intrathoracic course. Passes to the left at T5.<\/li><li>Lymphatics draining the left side of the head and neck join the thoracic duct prior to its insertion into the junction between left subclavian and internal jugular veins.<\/li><li>Lymphatics draining the right side of the head and neck drain via the subclavian and jugular trunks into the right lymphatic duct and thence into the mediastinal trunk and eventually the right brachiocephalic vein.<\/li><li>Its location in the thorax makes it prone to injury during oesophageal surgery. Some surgeons administer cream to patients prior to oesophagectomy so that it is easier to identify the cut ends of the duct.<\/li><\/ul>"}, {"name": "Thoracoacromial artery", "questions": [{"number": 559, "topic": "Thoracoacromial artery", "stem_html": "A 23 year old man is injured during a game of rugby. He suffers a fracture of the distal third of his clavicle, it is a compound fracture and there is evidence of arterial haemorrhage. Which of the following vessels is most likely to be encountered first during subsequent surgical exploration?", "options": [{"label_html": "Posterior circumflex humeral artery", "is_correct": false}, {"label_html": "Axillary artery", "is_correct": false}, {"label_html": "Thoracoacromial artery", "is_correct": true}, {"label_html": "Sub scapular artery", "is_correct": false}, {"label_html": "Lateral thoracic artery", "is_correct": false}], "correct_index": 2, "explanation_html": "The thoracoacromial artery arises from the second part of the axillary artery. It is a short, wide trunk, which pierces the clavipectoral fascia, and ends, deep to pectoralis major by dividing into four branches."}, {"number": 560, "topic": "Thoracoacromial artery", "stem_html": "A 43 year old lady is undergoing an axillary node clearance for breast cancer. The nodal disease is bulky. During clearance of the level 3 nodes there is suddenly brisk haemorrhage. The most likely vessel responsible is:", "options": [{"label_html": "Thoracoacromial artery", "is_correct": true}, {"label_html": "Cephalic vein", "is_correct": false}, {"label_html": "Thoracodorsal trunk", "is_correct": false}, {"label_html": "Internal mammary artery", "is_correct": false}, {"label_html": "Posterior circumflex humeral artery", "is_correct": false}], "correct_index": 0, "explanation_html": "The thoracoacromial artery pierces the pectoralis major and gives off branches within this space. The level 3 axillary nodes lie between pectoralis major and minor.Although the thoracodorsal trunk may be injured during an axillary dissection it does not lie within the level 3 nodes."}], "note_html": "The thoracoacromial artery (acromiothoracic artery; thoracic axis) is a short trunk, which arises from the forepart of the axillary artery, its origin being generally overlapped by the upper edge of the Pectoralis minor.<br><br>Projecting forward to the upper border of the Pectoralis minor, it pierces the coracoclavicular fascia and divides into four branches: pectoral, acromial, clavicular, and deltoid.<br><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Branch<\/b><\/th><th><b>Description<\/b><\/th><\/tr><\/thead><tbody><tr><td>Pectoral branch<\/td><td>Descends between the two Pectoral muscles, and is distributed to them and to the breast, anastomosing with the intercostal branches of the internal thoracic artery and with the lateral thoracic.<\/td><\/tr><tr><td>Acromial branch<\/td><td>Runs laterally over the coracoid process and under the Deltoid, to which it gives branches; it then pierces that muscle and ends on the acromion in an arterial network formed by branches from the suprascapular, thoracoacromial, and posterior humeral circumflex arteries.<\/td><\/tr><tr><td>Clavicular branch<\/td><td>Runs upwards and medially to the sternoclavicular joint, supplying this articulation, and the Subclavius.<\/td><\/tr><tr><td>Deltoid branch<\/td><td>Arising with the acromial, it crosses over the Pectoralis minor and passes in the same groove as the cephalic vein, between the Pectoralis major and Deltoid, and gives branches to both muscles.<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Thoracodorsal nerve", "questions": [{"number": 561, "topic": "Thoracodorsal nerve", "stem_html": "A 43 year old woman is due to undergo an axillary node clearance following a positive sentinel node biopsy. Which of the nerves below is at greatest risk?", "options": [{"label_html": "Accessory nerve", "is_correct": false}, {"label_html": "Thoracodorsal", "is_correct": true}, {"label_html": "Upper trunk of the brachial plexus", "is_correct": false}, {"label_html": "Medial pectoral", "is_correct": false}, {"label_html": "Axillary", "is_correct": false}], "correct_index": 1, "explanation_html": "The long thoracic nerve is also at risk. The thoracodorsal nerve traverses the level 2 axillary nodes to supply latissimus dorsi and may be divided or damaged with diathermy."}], "note_html": "This nerve arises between the two subscapular nerves. It passes inferomedially over subscapularis and accompanies the thoracodorsal vessels along the anterolateral surface of latissimus dorsi which it innervates."}, {"name": "Thyroid gland", "questions": [{"number": 562, "topic": "Thyroid gland", "stem_html": "Which nerve lies medially to the lobes of the thyroid gland, in the groove between the oesophagus and trachea?", "options": [{"label_html": "Vagus nerve", "is_correct": false}, {"label_html": "External laryngeal nerve", "is_correct": false}, {"label_html": "Recurrent laryngeal nerve", "is_correct": true}, {"label_html": "Ansa cervicalis", "is_correct": false}, {"label_html": "Phrenic nerve", "is_correct": false}], "correct_index": 2, "explanation_html": "The recurrent laryngeal nerve may be injured at this site during ligation of the inferior thyroid artery."}, {"number": 563, "topic": "Thyroid gland", "stem_html": "Which nerve lies medially to the lobes of the thyroid gland, in the groove between the oesophagus and trachea?", "options": [{"label_html": "Vagus nerve", "is_correct": false}, {"label_html": "External laryngeal nerve", "is_correct": false}, {"label_html": "Recurrent laryngeal nerve", "is_correct": true}, {"label_html": "Ansa cervicalis", "is_correct": false}, {"label_html": "Phrenic nerve", "is_correct": false}], "correct_index": 2, "explanation_html": "The recurrent laryngeal nerve may be injured at this site during ligation of the inferior thyroid artery."}, {"number": 564, "topic": "Thyroid gland", "stem_html": "During a difficult thyroidectomy haemorrhage is noted from the thyroidea ima vessel. From which structure does this vessel usually arise?", "options": [{"label_html": "External carotid artery", "is_correct": false}, {"label_html": "Internal carotid artery", "is_correct": false}, {"label_html": "Brachiocephalic artery", "is_correct": true}, {"label_html": "Axillary artery", "is_correct": false}, {"label_html": "Superior thyroid artery", "is_correct": false}], "correct_index": 2, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Rhyme isthmus location:<br><br>Rings 2,3,4 make the isthmus floor<\/div>This accessory vessel which usually lies at the inferior aspect of the gland is derived either from the brachiocephalic artery or the arch of the aorta."}, {"number": 565, "topic": "Thyroid gland", "stem_html": "Into which of these veins does the middle thyroid vein drain?", "options": [{"label_html": "Vertebral", "is_correct": false}, {"label_html": "External jugular", "is_correct": false}, {"label_html": "Internal jugular", "is_correct": true}, {"label_html": "Subclavian", "is_correct": false}, {"label_html": "Anterior jugular", "is_correct": false}], "correct_index": 2, "explanation_html": "It drains to the internal jugular vein. Which is one of the reasons why it bleeds so copiously if a ligature slips."}, {"number": 566, "topic": "Thyroid gland", "stem_html": "During a thyroidectomy the surgeons ligate the inferior thyroid artery. From which vessel does this structure usually originate?", "options": [{"label_html": "External carotid artery", "is_correct": false}, {"label_html": "Thyrocervical trunk", "is_correct": true}, {"label_html": "Internal carotid artery", "is_correct": false}, {"label_html": "Subclavian artery", "is_correct": false}, {"label_html": "Vertebral artery", "is_correct": false}], "correct_index": 1, "explanation_html": "The inferior thyroid artery originates from the thyrocervical trunk. This is a branch of the subclavian artery."}], "note_html": "<ul><li>Right and left lobes connected by isthmus<\/li><li>Surrounded by sheath from pretracheal layer of deep fascia<\/li><li>Apex: Lamina of thyroid cartilage<\/li><li>Base: 4th-5th tracheal ring<\/li><li>Pyramidal lobe: from isthmus<\/li><li>May be attached to foramen caecum at the base of the tongue<\/li><\/ul>   <br><b>Relations<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Anteromedially<\/b><\/td><td><ul><li>Sternothyroid<\/li><li>Superior belly of omohyoid<\/li><li>Sternohyoid<\/li><li>Anterior aspect of sternocleidomastoid<\/li><\/ul><\/td><\/tr><tr><td><b>Posterolaterally<\/b><\/td><td>Carotid sheath<\/td><\/tr><tr><td><b>Medially<\/b><\/td><td><ul><li>Larynx<\/li><li>Trachea<\/li><li>Pharynx<\/li><li>Oesophagus<\/li><li>Cricothyroid muscle<\/li><li>External laryngeal nerve (near superior thyroid artery)<\/li><li>Recurrent laryngeal nerve (near inferior thyroid artery)<\/li><\/ul><\/td><\/tr><tr><td><b>Posterior<\/b><\/td><td><ul><li>Parathyroid glands<\/li><li>Anastomosis of superior and inferior thyroid arteries<\/li><\/ul><\/td><\/tr><tr><td><b>Isthmus<\/b><\/td><td><ul><li>Anteriorly:  Sternothyroids, sternohyoids, anterior jugular veins<\/li><li>Posteriorly:  2nd, 3rd, 4th tracheal rings (attached via Ligament of Berry)<\/li><\/ul><\/td><\/tr><\/tbody><\/table><\/div><br><b>Blood Supply<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Arterial<\/b><\/td><td><ul><li>Superior thyroid artery (1st branch of external carotid)<\/li><li>Inferior thyroid artery (from thyrocervical trunk)<\/li><li>Thyroidea ima (in 10% of population -from brachiocephalic artery or aorta)<\/li><\/ul><\/td><\/tr><tr><td><b>Venous<\/b><\/td><td><ul><li>Superior and middle thyroid veins - into the IJV<\/li><li>Inferior thyroid vein - into the brachiocephalic veins<\/li><\/ul><\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Tibial nerve", "questions": [{"number": 567, "topic": "Tibial nerve", "stem_html": "A 22 year old man is involved in a fight and is stabbed in the posterior aspect of his right leg. The knife passes into the popliteal fossa. He sustains an injury to his tibial nerve. Which muscle is least likely to be compromised as a result?", "options": [{"label_html": "Tibialis posterior", "is_correct": false}, {"label_html": "Flexor hallucis longus", "is_correct": false}, {"label_html": "Flexor digitorum brevis", "is_correct": false}, {"label_html": "Soleus", "is_correct": false}, {"label_html": "Peroneus tertius", "is_correct": true}], "correct_index": 4, "explanation_html": "Peroneus tertius is innervated by the deep peroneal nerve."}], "note_html": "Begins at the upper border of the popliteal fossa and is a branch of the sciatic nerve.<br><br><ul><li>Root values: L4, L5, S1, S2, S3<\/li><\/ul><br><b>Muscles innervated<\/b><br><ul><li>Popliteus<\/li><li>Gastrocnemius<\/li><li>Soleus<\/li><li>Plantaris <\/li><li>Tibialis posterior<\/li><li>Flexor hallucis longus <\/li><li>Flexor digitorum brevis and longus<\/li><\/ul><br>Terminates by dividing into the medial and lateral plantar nerves."}, {"name": "Tongue", "questions": [{"number": 568, "topic": "Tongue", "stem_html": "Loss of taste sensation from the posterior third of the tongue is most likely the result to an injury to which of the structures listed below?", "options": [{"label_html": "Hypoglossal nerve", "is_correct": false}, {"label_html": "Chorda tympani nerve", "is_correct": false}, {"label_html": "Facial nerve", "is_correct": false}, {"label_html": "Mandibular branch of the trigeminal nerve", "is_correct": false}, {"label_html": "Glossopharyngeal nerve", "is_correct": true}], "correct_index": 4, "explanation_html": "The glossopharyngeal nerve supplies the taste and general sensation to the posterior third of the tongue."}, {"number": 569, "topic": "Tongue", "stem_html": "A patient has a difficult carotid endarterectomy performed. Which of the following modalities is most likely to be noted following the surgery?", "options": [{"label_html": "Impaired taste of the anterior third of the tongue", "is_correct": false}, {"label_html": "Impaired taste of the posterior third of the tongue", "is_correct": false}, {"label_html": "Diminished sensitivity of the tip of the tongue", "is_correct": false}, {"label_html": "Weakness of the tongue muscles", "is_correct": true}, {"label_html": "Diminished sensitivity of the posterior tongue surface", "is_correct": false}], "correct_index": 3, "explanation_html": "The hypoglossal nerve can be injured in carotid surgery and result in tongue weakness"}], "note_html": "The tongue is a muscular organ concerned with both feeding and speech. It is shaped like an inverted boot with a root through which extrinsic muscles pass to attach it to the soft palate, the styloid process, the hyoid bone and the mandible. It has a body that comprises muscle intermingled with lingual salivary glands, connective tissue, nerves, vessels and lymphatic follicles. <br>The dorsum of the tongue is divided by an ill defined V shaped groove, the sulcus terminalis, into an anterior two thirds and a posterior third. <br><br>The arterial blood supply to the tongue is from the paired sets of lingual arteries that arise from the external carotid. The venous drainage is via dorsal lingual veins which then join the lingual veins and eventually into the sublingual vein.<br><br>The nerve supply is as follows:<br><ul><li>The lingual branch of the mandibular division of the trigeminal nerve supplies common sensation to the anterior two thirds<\/li><li>The chorda tympani branch of the facial nerve supplies taste to the anterior two thirds<\/li><li>The lingual branch of the glossopharyngeal nerve supplies common sensation and taste to the posterior third of the tongue<\/li><li>All intrinsic muscles of the tongue are supplied by the hypoglossal nerve<\/li><\/ul>"}, {"name": "Tonsil", "questions": [{"number": 570, "topic": "Tonsil", "stem_html": "A 21 year old develops tonsillitis. He is in considerable pain. Which of the following nerves is responsible for the sensory innervation of the tonsillar fossa?", "options": [{"label_html": "Facial nerve", "is_correct": false}, {"label_html": "Trigeminal nerve", "is_correct": false}, {"label_html": "Glossopharyngeal nerve", "is_correct": true}, {"label_html": "Hypoglossal nerve", "is_correct": false}, {"label_html": "Vagus", "is_correct": false}], "correct_index": 2, "explanation_html": "The glossopharyngeal nerve is the main sensory nerve for the tonsillar fossa. A lesser contribution is made by the lesser palatine nerve. Because of this otalgia may occur following tonsillectomy."}, {"number": 571, "topic": "Tonsil", "stem_html": "An 18 year old man undergoes a tonsillectomy for attacks of recurrent acute tonsillitis. Whilst in recovery he develops a post operative haemorrhage. Which of the following vessels is the most likely culprit?", "options": [{"label_html": "Facial vein", "is_correct": false}, {"label_html": "External palatine vein", "is_correct": true}, {"label_html": "External carotid artery", "is_correct": false}, {"label_html": "Internal jugular vein", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 1, "explanation_html": "The external palatine vein lies immediately lateral to the tonsil and if damaged may be a cause of reactionary haemorrhage following tonsillectomy."}], "note_html": "<b>Anatomy<\/b><br><ul><li>Each palatine tonsil has two surfaces, a medial surface which projects into the pharynx and a lateral surface that is embedded in the wall of the pharynx. <\/li><li>They are usually 25mm tall by 15mm wide, although this varies according to age and may be almost completely atrophied in the elderly. <\/li><li>Their arterial supply is from the <b>tonsillar artery<\/b>, a branch of the facial artery.  <\/li><li>Its veins pierce the constrictor muscle to join the external palatine or facial veins. The external palatine vein is immediately lateral to the tonsil, which may result in haemorrhage during tonsillectomy. <\/li><li>Lymphatic drainage is the jugulodigastric node and the deep cervical nodes. <\/li><\/ul><br><b>Tonsillitis<\/b><br><ul><li>Usually bacterial (50%)- group A <i>Streptococcus<\/i>. Remainder viral.<\/li><li>May be complicated by development of abscess (quinsy). This may distort the uvula. <\/li><\/ul>    - Indications for tonsillectomy include recurrent acute tonsillitis, suspected malignancy, enlargement causing sleep apnoea.<br>    - Dissection tonsillectomy is the preferred technique with haemorrhage being the commonest complication. Delayed otalgia may occur owing to irritation of the glossopharyngeal nerve."}, {"name": "Trachea", "questions": [{"number": 572, "topic": "Trachea", "stem_html": "Which of the following physiological changes do not occur following tracheostomy?", "options": [{"label_html": "Alveolar ventilation is increased.", "is_correct": false}, {"label_html": "Anatomical dead space is reduced by 50%.", "is_correct": false}, {"label_html": "Work of breathing is increased.", "is_correct": true}, {"label_html": "Proportion of ciliated epithelial cells in the trachea may decrease.", "is_correct": false}, {"label_html": "Splinting of the larynx may lead to swallowing difficulties.", "is_correct": false}], "correct_index": 2, "explanation_html": "Work of breathing is decreased which is one of the reasons it is a popular option for weaning ventilated patients. Humidified air in this setting helps to reduce the viscosity of mucous that forms."}, {"number": 573, "topic": "Trachea", "stem_html": "A 22 year old man is undergoing an endotracheal intubation. Which of the following vertebral levels is consistent with the origin of the trachea?", "options": [{"label_html": "C2", "is_correct": false}, {"label_html": "T1", "is_correct": false}, {"label_html": "C6", "is_correct": true}, {"label_html": "C4", "is_correct": false}, {"label_html": "C3", "is_correct": false}], "correct_index": 2, "explanation_html": "The trachea commences at C6. It terminates at the level of T5 (or T6 in tall subjects in deep inspiration)."}, {"number": 574, "topic": "Trachea", "stem_html": "A 72 year old man presents with haemoptysis and undergoes a bronchoscopy. The carina is noted to be widened. At which level does the trachea bifurcate?", "options": [{"label_html": "T3", "is_correct": false}, {"label_html": "T5", "is_correct": true}, {"label_html": "T7", "is_correct": false}, {"label_html": "T2", "is_correct": false}, {"label_html": "T8", "is_correct": false}], "correct_index": 1, "explanation_html": "The trachea bifurcates at the level of the angle of Louis which is the intervertebral space between the fourth and fifth thoracic vertebra."}], "note_html": "<b>Trachea<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Location<\/b><\/td><td>C6 vertebra to the upper border of T5 vertebra (bifurcation)<\/td><\/tr><tr><td><b>Arterial and venous supply<\/b><\/td><td>Inferior thyroid arteries and the thyroid venous plexus.<\/td><\/tr><tr><td><b>Nerve<\/b><\/td><td>Branches of vagus, sympathetic and the recurrent nerves<\/td><\/tr><\/tbody><\/table><\/div><br><b>Relations in the neck<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Anterior(Superior to inferior)<\/b><\/td><td><ul><li>Isthmus of the thyroid gland<\/li><li>Inferior thyroid veins<\/li><li>Arteria thyroidea ima (when that vessel exists)<\/li><li>Sternothyroid<\/li><li>Sternohyoid<\/li><li>Cervical fascia<\/li><li>Anastomosing branches between the anterior jugular veins<\/li><\/ul><\/td><\/tr><tr><td><b>Posterior<\/b><\/td><td>Oesophagus.<\/td><\/tr><tr><td><b>Laterally<\/b><\/td><td><ul><li>Common carotid arteries<\/li><li>Right and left lobes of the thyroid gland <\/li><li>Inferior thyroid arteries<\/li><li>Recurrent laryngeal nerves<\/li><\/ul><\/td><\/tr><\/tbody><\/table><\/div><br><b>Relations in the thorax<\/b><br><br><b>Anterior<\/b><br><ul><li>Manubrium, the remains of the thymus, the aortic arch, left common carotid arteries, and the deep cardiac plexus<\/li><\/ul><br><b>Lateral<\/b><br><ul><li>In the superior mediastinum, on the right side is the pleura and right vagus; on its left side are the left recurrent nerve, the aortic arch, and the left common carotid and subclavian arteries.<\/li><\/ul>"}, {"name": "Transpyloric plane", "questions": [{"number": 575, "topic": "Transpyloric plane", "stem_html": "What is the anatomical level of the transpyloric plane?", "options": [{"label_html": "T11", "is_correct": false}, {"label_html": "T12", "is_correct": false}, {"label_html": "L1", "is_correct": true}, {"label_html": "L4", "is_correct": false}, {"label_html": "T10", "is_correct": false}], "correct_index": 2, "explanation_html": "<p>No explanation provided.<\/p>"}], "note_html": "<b>Transpyloric plane<\/b><br>Level of the body of L1<br><br><ul><li>Pylorus stomach<\/li><li>Left kidney hilum (L1- left one!)<\/li><li>Right hilum of the kidney (1.5cm lower than the left) <\/li><li>Fundus of the gallbladder <\/li><li>Neck of pancreas <\/li><li>Duodenojejunal flexure<\/li><li>Superior mesenteric artery<\/li><li>Portal vein<\/li><li>Left and right colic flexure <\/li><li>Root of the transverse mesocolon <\/li><li>2nd part of the duodenum <\/li><li>Upper part of conus medullaris<\/li><li>Spleen <\/li><\/ul>"}, {"name": "Transverse colon", "questions": [{"number": 576, "topic": "Transverse colon", "stem_html": "A 59 year old man is undergoing an extended right hemicolectomy for a carcinoma of the splenic flexure of the colon. The surgeons divide the middle colic vein close to its origin. Into which of the following structures does this vessel primarily drain?", "options": [{"label_html": "Superior mesenteric vein", "is_correct": true}, {"label_html": "Portal vein", "is_correct": false}, {"label_html": "Inferior mesenteric vein", "is_correct": false}, {"label_html": "Inferior vena cava", "is_correct": false}, {"label_html": "Ileocolic vein", "is_correct": false}], "correct_index": 0, "explanation_html": "The middle colonic vein drains into the SMV, if avulsed during mobilisation then dramatic haemorrhage can occur and be difficult to control."}, {"number": 577, "topic": "Transverse colon", "stem_html": "A 53 year old male presents with a carcinoma of the transverse colon. Which of the following structures should be ligated close to their origin to maximise clearance of the tumour?", "options": [{"label_html": "Superior mesenteric artery", "is_correct": false}, {"label_html": "Inferior mesenteric artery", "is_correct": false}, {"label_html": "Middle colic artery", "is_correct": true}, {"label_html": "Ileo-colic artery", "is_correct": false}, {"label_html": "Superior rectal artery", "is_correct": false}], "correct_index": 2, "explanation_html": "The middle colic artery supplies the transverse colon and requires high ligation during cancer resections. It is a branch of the superior mesenteric artery."}], "note_html": "<ul><li>The right colon undergoes a sharp turn at the level of the hepatic flexure to become the transverse colon. <\/li><li>At this point it also becomes intraperitoneal. <\/li><li>It is connected to the inferior border of the pancreas by the transverse mesocolon.<\/li><li>The greater omentum is attached to the superior aspect of the transverse colon from which it can easily be separated. The mesentery contains the middle colic artery and vein. The greater omentum remains attached to the transverse colon up to the splenic flexure. At this point the colon undergoes another sharp turn. <\/li><\/ul><br><b>Relations<\/b><br><div class=\"table-responsive\"><table class=\"tb\"><tbody><tr><td>Superior<\/td><td>Liver and gall-bladder, the greater curvature of the stomach, and the lower end of the spleen<\/td><\/tr><tr><td>Inferior<\/td><td>Small intestine<\/td><\/tr><tr><td>Anterior<\/td><td>Greater omentum<\/td><\/tr><tr><td>Posterior<\/td><td>From right to left with the descending portion of the duodenum, the head of the pancreas, convolutions of the jejunum and ileum, spleen<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Trapezius", "questions": [{"number": 578, "topic": "Trapezius", "stem_html": "What is the nerve supply to the muscle indicated by an X on the prosection below?<br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/bba024.jpg\"><\/td><\/tr><tr><td valign=\"top\" align=\"left\"><span style=\"font-size:11px; color:LightGray;\">© Image provided by the University of Sheffield<\/span><\/td><td align=\"right\"><\/td><\/tr><\/tbody><\/table><\/center>", "options": [{"label_html": "CN XI", "is_correct": true}, {"label_html": "CN IX", "is_correct": false}, {"label_html": "Median pectoral nerve", "is_correct": false}, {"label_html": "Lateral pectoral nerve", "is_correct": false}, {"label_html": "Suprascapular nerve", "is_correct": false}], "correct_index": 0, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Be careful not to confuse CN IX with CN XI<\/div>The muscle indicated is trapezius and it is innervated by the accessory nerve (CN XI)"}, {"number": 579, "topic": "Trapezius", "stem_html": "A 73 year old man undergoes an excision biopsy of a lymph node that is closely applied to sternocleidomastoid. This muscle is mobilized and a nerve that is present is damaged. Which muscle below is most likely to be affected?", "options": [{"label_html": "Trapezius", "is_correct": true}, {"label_html": "Rhomboid major", "is_correct": false}, {"label_html": "Deltoid", "is_correct": false}, {"label_html": "Supraspinatus", "is_correct": false}, {"label_html": "Rhomboid minor", "is_correct": false}], "correct_index": 0, "explanation_html": "The accessory nerve has a number of lymph nodes applied to it near the sternocleidomastoid muscle. It is particularly at risk if SCM is mobilized. If injured, the trapezius muscle and SCM will be paralysed."}], "note_html": "<div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Origin<\/b><\/td><td>Medial third of the superior nuchal line of the occiput<br>External occipital protruberance<br>Ligamentum nuchae<br>Spines of C7 and all thoracic vertebrae and all intervening interspinous ligaments<\/td><\/tr><tr><td><b>Insertion<\/b><\/td><td>Posterior border of the lateral third of the clavicle<br>Medial border of the acromion<br>Upper border of the crest of the spine of the scapula<\/td><\/tr><tr><td><b>Nerve supply<\/b><\/td><td>Spinal portion of the accessory nerve<\/td><\/tr><tr><td><b>Actions<\/b><\/td><td>Elevation of the shoulder girdle<br>Lateral rotation of the scapula<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Trendelenburg test", "questions": [{"number": 580, "topic": "Trendelenburg test", "stem_html": "The integrity of which muscle is assessed by the Trendelenburg test?", "options": [{"label_html": "Sartorius", "is_correct": false}, {"label_html": "Quadratus femoris", "is_correct": false}, {"label_html": "Semimembranosus", "is_correct": false}, {"label_html": "Gluteus medius", "is_correct": true}, {"label_html": "Piriformis", "is_correct": false}], "correct_index": 3, "explanation_html": "<p>No explanation provided.<\/p>"}, {"number": 581, "topic": "Trendelenburg test", "stem_html": "A 24 year old lady is stabbed in the buttock. Following the injury the wound is sutured in the emergency department. Eight weeks later she attends the clinic, as she walks into the clinic room she has a waddling gait and difficulty with thigh abduction. On examination she has buttock muscle wasting. Which nerve has been injured?", "options": [{"label_html": "Superior gluteal nerve", "is_correct": true}, {"label_html": "Obturator nerve", "is_correct": false}, {"label_html": "Sciatic nerve", "is_correct": false}, {"label_html": "Femoral nerve", "is_correct": false}, {"label_html": "Inferior gluteal nerve", "is_correct": false}], "correct_index": 0, "explanation_html": "Damage to the superior gluteal nerve will result in a Trendelenburg gait."}], "note_html": "Injury or division of the superior gluteal nerve results in a motor deficit that consists of weakened abduction of the thigh by gluteus medius, a disabling gluteus medius limp and a compensatory list of the body to the weakened gluteal side. The compensation results in a gravitational shift so that the body is supported on the unaffected limb. <br><br>When a person is asked to stand on one leg, the gluteus medius usually contracts as soon as the contralateral leg leaves the floor, preventing the pelvis from dipping towards the unsupported side. When a person with paralysis of the superior gluteal nerve is asked to stand on one leg, the pelvis on the unsupported side descends, indicating that the gluteus medius on the affected side is weak or non functional ( a positive Trendelenburg test).<br><br>This eponymous test also refers to a vascular investigation in which tourniquets are placed around the upper thigh, these can help determine whether saphenofemoral incompetence is present."}, {"name": "Triceps", "questions": [{"number": 582, "topic": "Triceps", "stem_html": "Which of the following nerves is responsible for innervation of the triceps muscle?", "options": [{"label_html": "Radial", "is_correct": true}, {"label_html": "Ulnar", "is_correct": false}, {"label_html": "Axillary", "is_correct": false}, {"label_html": "Median", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 0, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">To remember nerve roots and their reflexes:<br><br>1-2 Ankle (S1-S2)<br>3-4 Knee (L3-L4)<br>5-6 Biceps (C5-C6)<br>7-8 Triceps (C7-C8)<\/div>The radial nerve innervates all three heads of triceps, with a separate branch to each head."}, {"number": 583, "topic": "Triceps", "stem_html": "From which of the following structures does the long head of the triceps muscle arise?", "options": [{"label_html": "Coracoid process", "is_correct": false}, {"label_html": "Acromion", "is_correct": false}, {"label_html": "Infraglenoid tubercle", "is_correct": true}, {"label_html": "Coraco-acromial ligament", "is_correct": false}, {"label_html": "Coraco-humeral ligament", "is_correct": false}], "correct_index": 2, "explanation_html": "The long head arises from the infraglenoid tubercle. The fleshy lateral and medial heads are attached to the posterior aspect of the humerus between the insertion of the teres minor and the olecranon fossa."}, {"number": 584, "topic": "Triceps", "stem_html": "A 23 year old man is involved in a fight, during the dispute he sustains a laceration to the posterior aspect of his right arm, approximately 2cm proximal to the olecranon process. On assessment in the emergency department he is unable to extend his elbow joint. Which of the following tendons is most likely to have been cut?", "options": [{"label_html": "Triceps", "is_correct": true}, {"label_html": "Pronator teres", "is_correct": false}, {"label_html": "Brachioradialis", "is_correct": false}, {"label_html": "Brachialis", "is_correct": false}, {"label_html": "Biceps", "is_correct": false}], "correct_index": 0, "explanation_html": "The triceps muscle extends the elbow joint. The other muscles listed all produce flexion of the elbow joint."}, {"number": 585, "topic": "Triceps", "stem_html": "A 23 year old man is involved in a fight, during the dispute he sustains a laceration to the posterior aspect of his right arm, approximately 2cm proximal to the olecranon process. On assessment in the emergency department he is unable to extend his elbow joint. Which of the following tendons is most likely to have been cut?", "options": [{"label_html": "Triceps", "is_correct": true}, {"label_html": "Pronator teres", "is_correct": false}, {"label_html": "Brachioradialis", "is_correct": false}, {"label_html": "Brachialis", "is_correct": false}, {"label_html": "Biceps", "is_correct": false}], "correct_index": 0, "explanation_html": "The triceps muscle extends the elbow joint. The other muscles listed all produce flexion of the elbow joint."}, {"number": 586, "topic": "Triceps", "stem_html": "Which of the following structures lie between the lateral and medial heads of the triceps muscle?", "options": [{"label_html": "Radial nerve", "is_correct": true}, {"label_html": "Median nerve", "is_correct": false}, {"label_html": "Ulnar nerve", "is_correct": false}, {"label_html": "Axillary nerve", "is_correct": false}, {"label_html": "Medial cutaneous nerve of the forearm", "is_correct": false}], "correct_index": 0, "explanation_html": "The radial nerve runs in its groove on between the two heads. The ulnar nerve lies anterior to the medial head. The axillary nerve passes through the quadrangular space. This lies superior to lateral head of the triceps muscle and thus the lateral border of the quadrangular space is the humerus. Therefore the correct answer is the radial nerve."}], "note_html": "<div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Origin<\/b><\/td><td><ul><li>Long head- infraglenoid tubercle of the scapula.<\/li><li>Lateral head- dorsal surface of the humerus, lateral and proximal to the groove of the radial nerve<\/li><li>Medial head- posterior surface of the humerus on the inferomedial side of the radial groove and both of the intermuscular septae<\/li><\/ul><\/td><\/tr><tr><td><b>Insertion<\/b><\/td><td><ul><li>Olecranon process of the ulna. Here the olecranon bursa is between the triceps tendon and olecranon.<\/li><li>Some fibres insert to the deep fascia of the forearm, posterior capsule of the elbow (preventing the capsule from being trapped between olecranon and olecranon fossa during extension)<\/li><\/ul><\/td><\/tr><tr><td><b>Innervation<\/b><\/td><td>Radial nerve<\/td><\/tr><tr><td><b>Blood supply<\/b><\/td><td>Profunda brachii artery<\/td><\/tr><tr><td><b>Action<\/b><\/td><td>Elbow extension. The long head can adduct the humerus and extend it from a flexed position<\/td><\/tr><tr><td><b>Relations<\/b><\/td><td>The radial nerve and profunda brachii vessels lie between the lateral and medial heads<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Trigeminal nerve", "questions": [{"number": 587, "topic": "Trigeminal nerve", "stem_html": "Which of the nerves listed below provides sensory innervation to the skin overlying the lateral aspect of the nose?", "options": [{"label_html": "Infratrochlear nerve", "is_correct": false}, {"label_html": "Zygomatic nerve", "is_correct": false}, {"label_html": "Nasopalatine nerve", "is_correct": false}, {"label_html": "Lateral nasal branches of the ethmoidal nerve", "is_correct": true}, {"label_html": "Frontal nerve", "is_correct": false}], "correct_index": 3, "explanation_html": "The lateral aspect of the external nose is innervated by lateral nasal branches of the anterior ethmoidal nerve. The ethmoidal nerve is a branch of the nasociliary nerve which is one of the divisions of the trigeminal."}, {"number": 588, "topic": "Trigeminal nerve", "stem_html": "Which of the nerves listed below is responsible for providing innervation to the lower molar teeth?", "options": [{"label_html": "Greater palatine nerve", "is_correct": false}, {"label_html": "Nasopalatine nerve", "is_correct": false}, {"label_html": "Inferior alveolar nerve", "is_correct": true}, {"label_html": "Zygomatic nerve", "is_correct": false}, {"label_html": "Mandibular nerve", "is_correct": false}], "correct_index": 2, "explanation_html": "The branches of the lower molar and premolar teeth are supplied by branches of the inferior alveolar nerve. Those of the canine and incisors by the incisive branch of the same nerve. The gingiva and supporting structures are innervated by the lingual nerve."}, {"number": 589, "topic": "Trigeminal nerve", "stem_html": "From which of these foraminae does the opthalmic branch of the trigeminal nerve exit the skull?", "options": [{"label_html": "Foramen ovale", "is_correct": false}, {"label_html": "Foramen rotundum", "is_correct": false}, {"label_html": "Foramen spinosum", "is_correct": false}, {"label_html": "Superior orbital fissure", "is_correct": true}, {"label_html": "Foramen magnum", "is_correct": false}], "correct_index": 3, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Mnemonic:<br><br>Standing Room Only -Exit of branches of trigeminal nerve from the skull <br><br>V1 -Superior orbital fissure<br>V2 -foramen Rotundum<br>V3 -foramen Ovale<\/div>The opthalmic branch of the trigeminal nerve exits the skull through the superior orbital fissure."}, {"number": 590, "topic": "Trigeminal nerve", "stem_html": "What is the sensory nerve supply to the skin overlying the angle of the jaw?", "options": [{"label_html": "Maxillary branch of the trigeminal nerve", "is_correct": false}, {"label_html": "Mandibular branch of the trigeminal nerve", "is_correct": false}, {"label_html": "C3-C4", "is_correct": false}, {"label_html": "Greater auricular nerve (C2-C3)", "is_correct": true}, {"label_html": "Buccal branch of the facial nerve", "is_correct": false}], "correct_index": 3, "explanation_html": "The trigeminal nerve is the major sensory nerve to the face except over the angle of the jaw. The angle of the jaw is innervated by the greater auricular nerve."}, {"number": 591, "topic": "Trigeminal nerve", "stem_html": "Which of the nerves below innervates the tensor tympani muscle?", "options": [{"label_html": "Vestibulocochlear", "is_correct": false}, {"label_html": "Facial", "is_correct": false}, {"label_html": "Vagus", "is_correct": false}, {"label_html": "Trigeminal", "is_correct": true}, {"label_html": "Hypoglossal", "is_correct": false}], "correct_index": 3, "explanation_html": "The tensor tympani muscle (in conjunction with stapedius) helps to mitigate the effects of loud sounds. The tensor tympani is innervated by the trigeminal nerve (the stapedius by the facial). In some people with hyperacousia, the tensor tympani muscle does not function normally."}, {"number": 592, "topic": "Trigeminal nerve", "stem_html": "Which muscle is not innervated by the trigeminal nerve?", "options": [{"label_html": "Medial pterygoid", "is_correct": false}, {"label_html": "Mylohyoid", "is_correct": false}, {"label_html": "Stylohyoid", "is_correct": true}, {"label_html": "Masseter", "is_correct": false}, {"label_html": "Temporalis", "is_correct": false}], "correct_index": 2, "explanation_html": "Stylohyoid is innervated by the facial nerve."}, {"number": 593, "topic": "Trigeminal nerve", "stem_html": "A young child undergoes a difficult craniotomy for fulminant mastoiditis and associated abscess. During the procedure the trigeminal nerve is severely damaged within Meckels cave. Which deficit is least likely to be present?", "options": [{"label_html": "Anaesthesia over the ipsilateral anterior aspect of the scalp", "is_correct": false}, {"label_html": "Loss of the corneal reflex", "is_correct": false}, {"label_html": "Weakness of the ipsilateral masseter muscle", "is_correct": false}, {"label_html": "Anaesthesia of the anterior aspect of the lip", "is_correct": false}, {"label_html": "Anaesthesia over the entire ipsilateral side of the face", "is_correct": true}], "correct_index": 4, "explanation_html": "The angle of the jaw is not innervated by sensory fibres of the trigeminal nerve and is spared in this type of injury.<br>Remember the trigeminal nerve provides motor innervation to the muscles of mastication. The close proximity of the site of injury to the motor fibres is likely to result in at least some compromise of motor muscle function."}], "note_html": "The trigeminal nerve is the main sensory nerve of the head. In addition to its major sensory role, it also innervates the muscles of mastication. <br><br><b>Distribution of the trigeminal nerve<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Sensory<\/b><\/td><td><ul><li>Scalp<\/li><li>Face<\/li><li>Oral cavity (and teeth)<\/li><li>Nose and sinuses<\/li><li>Dura mater<\/li><\/ul><\/td><\/tr><tr><td><b>Motor<\/b><\/td><td><ul><li>Muscles of mastication<\/li><li>Mylohyoid<\/li><li>Anterior belly of digastric<\/li><li>Tensor tympani<\/li><li>Tensor palati<\/li><\/ul><\/td><\/tr><tr><td><b>Autonomic connections (ganglia)<\/b><\/td><td><ul><li>Ciliary<\/li><li>Sphenopalatine<\/li><li>Otic <\/li><li>Submandibular<\/li><\/ul><\/td><\/tr><\/tbody><\/table><\/div><br><br><b>Path<\/b><br><ul><li>Originates at the pons<\/li><li>Sensory root forms the large, crescentic trigeminal ganglion within Meckel's cave, and contains the cell bodies of incoming sensory nerve fibres.  Here the 3 branches exit.<\/li><li>The motor root cell bodies are in the pons and the motor fibres are distributed via the mandibular nerve.  The motor root is not part of the trigeminal ganglion.<\/li><\/ul><br><b>Branches of the trigeminal nerve<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Ophthalmic nerve<\/b><\/td><td>Sensory only<\/td><\/tr><tr><td><b>Maxillary nerve<\/b><\/td><td>Sensory only<\/td><\/tr><tr><td><b>Mandibular nerve<\/b><\/td><td>Sensory and motor<\/td><\/tr><\/tbody><\/table><\/div><br><b>Sensory<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Ophthalmic<\/b><\/td><td>Exits skull via the superior orbital fissure<br>Sensation of: scalp and forehead, the upper eyelid, the conjunctiva and cornea of the eye, the nose (including the tip of the nose, except alae nasi), the nasal mucosa, the frontal sinuses, and parts of the meninges (the dura and blood vessels).<\/td><\/tr><tr><td><b>Maxillary nerve<\/b><\/td><td>Exit skull via the foramen rotundum<br>Sensation: lower eyelid and cheek, the nares and upper lip, the upper teeth and gums, the nasal mucosa, the palate and roof of the pharynx, the maxillary, ethmoid and sphenoid sinuses, and parts of the meninges.<\/td><\/tr><tr><td><b>Mandibular nerve<\/b><\/td><td>Exit skull via the foramen ovale<br>Sensation: lower lip, the lower teeth and gums, the chin and jaw (except the angle of the jaw), parts of the external ear, and parts of the meninges.<\/td><\/tr><\/tbody><\/table><\/div><br><b>Motor<\/b><br>Distributed via the mandibular nerve.<br>The following muscles of mastication are innervated:<br><ul><li>Masseter <\/li><li>Temporalis <\/li><li>Medial pterygoid <\/li><li>Lateral pterygoid <\/li><\/ul><br>Other muscles innervated include:<br><ul><li>Tensor veli palatini <\/li><li>Mylohyoid <\/li><li>Anterior belly of digastric <\/li><li>Tensor tympani<\/li><\/ul><br><b>Overview of the trigeminal nerve<\/b><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb304b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb304.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http:en.wikipedia.org/wiki/Trigeminal&lt;/td&gt;&lt;td&gt;nerve\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb304b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}, {"name": "Types of joint", "questions": [{"number": 594, "topic": "Types of joint", "stem_html": "Where is a gomphoses type of fibrous joint typically found?", "options": [{"label_html": "Teeth", "is_correct": true}, {"label_html": "Skull", "is_correct": false}, {"label_html": "Manubriosternum", "is_correct": false}, {"label_html": "Ribs", "is_correct": false}, {"label_html": "Femur", "is_correct": false}], "correct_index": 0, "explanation_html": "<p>No explanation provided.<\/p>"}], "note_html": "There are three main types of joint, fibrous, cartilaginous and synovial<br><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th>Type of joint<\/th><th>Features<\/th><th>Example<\/th><\/tr><\/thead><tbody><tr><td>Fibrous<\/td><td>Comprise sutures, gomphoses and syndesmoses<br>Tough connective tissues unite the joints<\/td><td>Sutures- skull<br>Gomphoses-Peg to socket e.g. teeth<br>Syndesmosis-tibiofibular joint<\/td><\/tr><tr><td>Cartilaginous<\/td><td>Joints united by layer of hyaline cartilage<\/td><td>Epiphyseal growth plates<br>Symphysis pubis<\/td><\/tr><tr><td>Synovial joints<\/td><td>Bone ends permitted free movement<br>Bone ends covered by cartilage and surrounded by fluid<\/td><td>Hip/ knee joint<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Ulnar artery", "questions": [{"number": 595, "topic": "Ulnar artery", "stem_html": "At the level of the wrist joint, which of the statements below best describes the relationship of the ulnar artery to the ulnar nerve?", "options": [{"label_html": "It lies on its radial side", "is_correct": true}, {"label_html": "It lies deep to it", "is_correct": false}, {"label_html": "It lies superficial to it", "is_correct": false}, {"label_html": "It lies on its ulnar side", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 0, "explanation_html": "In the middle of the forearm, the artery is overlapped by the flexor carpi ulnaris and on the flexor retinaculum it is covered by a superficial layer from that structure. In its distal two-thirds, flexor digitorum superficialis lies on its radial side, and the ulnar nerve is situated on its ulnar side."}, {"number": 596, "topic": "Ulnar artery", "stem_html": "At the level of the wrist joint, which of the statements below best describes the relationship of the ulnar artery to the ulnar nerve?", "options": [{"label_html": "It lies on its radial side", "is_correct": true}, {"label_html": "It lies deep to it", "is_correct": false}, {"label_html": "It lies superficial to it", "is_correct": false}, {"label_html": "It lies on its ulnar side", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 0, "explanation_html": "In the middle of the forearm, the artery is overlapped by the flexor carpi ulnaris and on the flexor retinaculum it is covered by a superficial layer from that structure. In its distal two-thirds, flexor digitorum superficialis lies on its radial side, and the ulnar nerve is situated on its ulnar side."}, {"number": 597, "topic": "Ulnar artery", "stem_html": "Which of the following structures separates the ulnar artery from the median nerve?", "options": [{"label_html": "Brachioradialis", "is_correct": false}, {"label_html": "Pronator teres", "is_correct": true}, {"label_html": "Tendon of biceps brachii", "is_correct": false}, {"label_html": "Flexor carpi ulnaris", "is_correct": false}, {"label_html": "Brachialis", "is_correct": false}], "correct_index": 1, "explanation_html": "It lies deep to pronator teres and this separates it from the median nerve."}], "note_html": "<b>Path<\/b>  <br><ul><li>Starts: middle of antecubital fossa<\/li><li>Passes obliquely downward, reaching the ulnar side of the forearm at a point about midway between the elbow and the wrist. It follows the ulnar border to the wrist, crossing over the flexor retinaculum.  It then divides into the superficial and deep volar arches.    <\/li><\/ul><br><b>Relations<\/b><br>Deep to- Pronator teres, Flexor carpi ulnaris, Palmaris longus<br>Lies on- Brachialis and Flexor digitorum profundus<br>Superficial to the  flexor retinaculum at the wrist<br><br>The median nerve is in relation with the medial side of the artery for about 2.5 cm. And then crosses the vessel, being separated from it by the ulnar head of the Pronator teres<br><br>The ulnar nerve lies medially to the lower two-thirds of the artery<br><br><b>Branch<\/b><br><ul><li>Anterior interosseous artery<\/li><\/ul><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb022b.jpg\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb022.jpg\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Ulnar artery\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb022b.jpg\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}, {"name": "Ulnar nerve", "questions": [{"number": 598, "topic": "Ulnar nerve", "stem_html": "A 17 year old male presents to the clinic. He complains of difficulty using his left hand. It has been a persistent problem since he sustained a distal humerus fracture as a child. On examination, there is diminished sensation overlying the hypothenar eminence and medial one and half fingers. What is the most likely nerve lesion?", "options": [{"label_html": "Anterior interosseous nerve", "is_correct": false}, {"label_html": "Posterior interosseous nerve", "is_correct": false}, {"label_html": "Ulnar nerve", "is_correct": true}, {"label_html": "Median nerve", "is_correct": false}, {"label_html": "Radial nerve", "is_correct": false}], "correct_index": 2, "explanation_html": "This sensory deficit pattern is most consistent with ulnar nerve injury.<br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb095b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb095.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Ulnar nerve\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb095b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}, {"number": 599, "topic": "Ulnar nerve", "stem_html": "A 23 year old man is involved in a fight and is stabbed in his upper arm. The ulnar nerve is transected. Which of the following muscles will not demonstrate compromised function as a result?", "options": [{"label_html": "Flexor carpi ulnaris", "is_correct": false}, {"label_html": "Medial half of flexor digitorum profundus", "is_correct": false}, {"label_html": "Palmaris brevis", "is_correct": false}, {"label_html": "Hypothenar muscles", "is_correct": false}, {"label_html": "Pronator teres", "is_correct": true}], "correct_index": 4, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\"><b>M<\/b> edial lumbricals<br><b>A<\/b> dductor pollicis<br><b>F<\/b> lexor digitorum profundus/Flexor digiti minimi<br><b>I<\/b> nterossei<br><b>A<\/b> bductor digiti minimi and opponens<br><br>Innervates all intrinsic muscles of the hand (EXCEPT 2: thenar muscles &amp; first two lumbricals - supplied by median nerve)<\/div>Pronator teres is innervated by the median nerve. Palmaris brevis is innervated by the ulnar nerve"}, {"number": 600, "topic": "Ulnar nerve", "stem_html": "A 24 year female is admitted to A&amp;E with tingling of her hand after a fall.  She is found to have a fracture of the medial epicondyle. What is the most likely nerve lesion?", "options": [{"label_html": "Ulnar nerve", "is_correct": true}, {"label_html": "Radial nerve", "is_correct": false}, {"label_html": "Median nerve", "is_correct": false}, {"label_html": "Axillary nerve", "is_correct": false}, {"label_html": "Cutaneous nerve", "is_correct": false}], "correct_index": 0, "explanation_html": "The radial nerve is located near the lateral epicondyle."}, {"number": 601, "topic": "Ulnar nerve", "stem_html": "A 40 year old lady trips and falls through a glass door and sustains a severe laceration to her left arm. Amongst her injuries it is noticed that she has lost the ability to adduct the fingers of her left hand. Injury to which of the following nerves is most likely to account for her examination findings?", "options": [{"label_html": "Ulnar", "is_correct": true}, {"label_html": "Median", "is_correct": false}, {"label_html": "Radial", "is_correct": false}, {"label_html": "Musculocutaneous", "is_correct": false}, {"label_html": "Axillary", "is_correct": false}], "correct_index": 0, "explanation_html": "The interossei are supplied by the ulnar nerve."}, {"number": 602, "topic": "Ulnar nerve", "stem_html": "Which nerve supplies the skin at the medial aspect of the palm?", "options": [{"label_html": "Ulnar", "is_correct": true}, {"label_html": "Radial", "is_correct": false}, {"label_html": "Median", "is_correct": false}, {"label_html": "Musculocutaneous", "is_correct": false}, {"label_html": "Anterior interosseous", "is_correct": false}], "correct_index": 0, "explanation_html": "<p>No explanation provided.<\/p>"}, {"number": 603, "topic": "Ulnar nerve", "stem_html": "A 35 year tennis player attends clinic reporting tingling down his arm. He says that his 'funny bone' was hit very hard by a tennis ball. There is weakness of abduction and adduction of his extended fingers. Which nerve has been affected?", "options": [{"label_html": "Ulnar", "is_correct": true}, {"label_html": "Anterior interosseous", "is_correct": false}, {"label_html": "Posterior interosseous", "is_correct": false}, {"label_html": "Median", "is_correct": false}, {"label_html": "Musculocutaneous", "is_correct": false}], "correct_index": 0, "explanation_html": "The ulnar nerve arises from the medial cord of the brachial plexus (C8, T1 and contribution from C7). The nerve descends between the axillary artery and vein, posterior to the cutaneous nerve of the forearm and then lies anterior to triceps on the medial side of the brachial artery. In the distal half of the arm it passes through the medial intermuscular septum, and continues between this structure and the medial head of triceps to enter the forearm between the medial epicondyle of the humerus and the olecranon. It may be injured at this site in this scenario."}, {"number": 604, "topic": "Ulnar nerve", "stem_html": "Which of the following muscles is not innervated by the deep branch of the ulnar nerve?", "options": [{"label_html": "Adductor pollicis", "is_correct": false}, {"label_html": "Hypothenar muscles", "is_correct": false}, {"label_html": "All the interosseous muscles", "is_correct": false}, {"label_html": "Extensor indicis", "is_correct": true}, {"label_html": "Third and fourth lumbricals", "is_correct": false}], "correct_index": 3, "explanation_html": "The extensor muscles are innervated by the radial nerve."}, {"number": 605, "topic": "Ulnar nerve", "stem_html": "A 32 year old attends neurology clinic complaining of tingling in his hand.  He has radial deviation of his wrist and there is mild clawing of his fingers, with the 4th and 5th digits being relatively spared.  What is the most likely lesion?", "options": [{"label_html": "Ulnar nerve damage at the wrist", "is_correct": false}, {"label_html": "Ulnar nerve damage at the elbow", "is_correct": true}, {"label_html": "Radial nerve damage at the elbow", "is_correct": false}, {"label_html": "Median nerve damage at the wrist", "is_correct": false}, {"label_html": "Median nerve damage at the elbow", "is_correct": false}], "correct_index": 1, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">The ulnar paradox- the higher the lesion, the less the clawing of the fingers seen clinically.<\/div>At the elbow the ulnar nerve lesion affects the flexor carpi ulnaris and flexor digitorum profundus."}, {"number": 606, "topic": "Ulnar nerve", "stem_html": "A 23 year old man falls and slips at a nightclub. A shard of glass penetrates the skin at the level of the medial epicondyle, which of the following sequelae is least likely to occur?", "options": [{"label_html": "Atrophy of the first dorsal interosseous muscle", "is_correct": false}, {"label_html": "Difficulty in abduction of the the 2nd, 3rd, 4th and 5th fingers", "is_correct": false}, {"label_html": "Claw like appearance of the hand", "is_correct": true}, {"label_html": "Loss of sensation on the anterior aspect of the 5th finger", "is_correct": false}, {"label_html": "Partial denervation of flexor digitorum profundus", "is_correct": false}], "correct_index": 2, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Injury to the ulnar nerve in the mid to distal forearm will typically produce a claw hand. This consists of flexion of the 4th and 5th interphalangeal joints and extension of the metacarpophalangeal joints. The effects are potentiated when flexor digitorum profundus is not affected, and the clawing is more pronounced.More proximally sited ulnar nerve lesions produce a milder clinical picture owing to the simultaneous paralysis of flexor digitorum profundus (ulnar half).<\/div>This is the 'ulnar paradox', due to the more proximal level of transection the hand will typically not have a claw like appearance that may be seen following a more distal injury. The first dorsal interosseous muscle will be affected as it is supplied by the ulnar nerve."}, {"number": 607, "topic": "Ulnar nerve", "stem_html": "A 23 year old man falls and slips at a nightclub. A shard of glass penetrates the skin at the level of the medial epicondyle, which of the following sequelae is least likely to occur?", "options": [{"label_html": "Atrophy of the first dorsal interosseous muscle", "is_correct": false}, {"label_html": "Difficulty in abduction of the the 2nd, 3rd, 4th and 5th fingers", "is_correct": false}, {"label_html": "Claw like appearance of the hand", "is_correct": true}, {"label_html": "Loss of sensation on the anterior aspect of the 5th finger", "is_correct": false}, {"label_html": "Partial denervation of flexor digitorum profundus", "is_correct": false}], "correct_index": 2, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Injury to the ulnar nerve in the mid to distal forearm will typically produce a claw hand. This consists of flexion of the 4th and 5th interphalangeal joints and extension of the metacarpophalangeal joints. The effects are potentiated when flexor digitorum profundus is not affected, and the clawing is more pronounced.More proximally sited ulnar nerve lesions produce a milder clinical picture owing to the simultaneous paralysis of flexor digitorum profundus (ulnar half).<\/div>This is the 'ulnar paradox', due to the more proximal level of transection the hand will typically not have a claw like appearance that may be seen following a more distal injury. The first dorsal interosseous muscle will be affected as it is supplied by the ulnar nerve."}], "note_html": "<b>Origin<\/b><br><ul><li>C8, T1<\/li><\/ul><br><b>Supplies<\/b> (no muscles in the upper arm)<br><ul><li>Flexor carpi ulnaris<\/li><li>Flexor digitorum profundus<\/li><li>Flexor digiti minimi<\/li><li>Abductor digiti minimi<\/li><li>Opponens digiti minimi<\/li><li>Adductor pollicis<\/li><li>Interossei muscle<\/li><li>Third and fourth lumbricals<\/li><li>Palmaris brevis<\/li><\/ul><br><b>Path<\/b><br><ul><li>Posteromedial aspect of upper arm to flexor compartment of forearm, then along the ulnar.  Passes beneath the flexor carpi ulnaris muscle, then superficially over the flexor retinaculum into the palm of the hand.<\/li><\/ul><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb103b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb103.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Ulnar nerve\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb103b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center><br><b>Branches<\/b><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Branch<\/b><\/th><th><b>Supplies<\/b><\/th><\/tr><\/thead><tbody><tr><td>Muscular branch<\/td><td>Flexor carpi ulnaris<br>Medial half of the flexor digitorum profundus<\/td><\/tr><tr><td>Palmar cutaneous branch (Arises near the middle of the forearm)<\/td><td>Skin on the medial part of the palm<\/td><\/tr><tr><td>Dorsal cutaneous branch<\/td><td>Dorsal surface of the medial part of the hand<\/td><\/tr><tr><td>Superficial branch<\/td><td>Cutaneous fibres to the anterior surfaces of the medial one and one-half digits<\/td><\/tr><tr><td>Deep branch<\/td><td>Hypothenar muscles<br>All the interosseous muscles <br>Third and fourth lumbricals <br>Adductor pollicis<br>Medial head of the flexor pollicis brevis<\/td><\/tr><\/tbody><\/table><\/div><br><b>Effects of injury<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Damage at the wrist<\/b><\/td><td><ul><li>Wasting and paralysis of intrinsic hand muscles (claw hand)<\/li><li>Wasting and paralysis of hypothenar muscles<\/li><li>Loss of sensation medial 1 and half fingers<\/li><\/ul><\/td><\/tr><tr><td><b>Damage at the elbow<\/b><\/td><td><ul><li>Radial deviation of the wrist<\/li><li>Clawing less in 4th and 5th digits<\/li><\/ul><\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Ulnar nerve injury at wrist", "questions": [{"number": 608, "topic": "Ulnar nerve injury at wrist", "stem_html": "A man sustains a laceration between the base of the little finger and wrist. Several weeks after the injury there is loss of thumb adduction power. Which nerve is most likely to have been injured?", "options": [{"label_html": "Superficial ulnar nerve", "is_correct": false}, {"label_html": "Deep ulnar nerve", "is_correct": true}, {"label_html": "Median nerve", "is_correct": false}, {"label_html": "Radial nerve", "is_correct": false}, {"label_html": "Recurrent branch of median nerve", "is_correct": false}], "correct_index": 1, "explanation_html": "<p>No explanation provided.<\/p>"}], "note_html": "<b>Branches of the ulnar nerve in the wrist and hand<\/b><br>At the wrist the ulnar nerve divides into superficial and deep branches. The superficial branch lies deep to the palmaris brevis. It divides into two; to produce digital nerves, which innervate the skin of the medial third of the palm and the palmar surface of one and a half fingers. <br>The deep branch arises from the nerve on the flexor retinaculum lateral to the pisiform bone. It passes posteriorly between the abductor and short flexor of the little finger supplying them, and supplying and piercing the opponens digiti minimi near its origin from the flexor retinaculum, turns laterally over the distal surface of the Hook of the Hamate bone. It eventually passes between the two heads of adductor pollicis with the deep palmar arch and ends in the first dorsal interosseous muscle. In the palm the deep branch also innervates the lumbricals and interosseous muscles."}, {"name": "Ureter", "questions": [{"number": 609, "topic": "Ureter", "stem_html": "A 45 year old man is undergoing a left hemicolectomy. As the surgeons mobilise the left colon they identify a tubular structure lying at the inferior aspect of psoas major. What is it most likely to be?", "options": [{"label_html": "Left ureter", "is_correct": true}, {"label_html": "Left common iliac vein", "is_correct": false}, {"label_html": "Left common iliac artery", "is_correct": false}, {"label_html": "Left external iliac artery", "is_correct": false}, {"label_html": "Left external iliac vein", "is_correct": false}], "correct_index": 0, "explanation_html": "The left ureter lies posterior to the left colon. The sigmoid colon and upper rectum may be more closely related to the iliac vessels. These are not typically found above L4."}, {"number": 610, "topic": "Ureter", "stem_html": "What is the lymphatic drainage of the upper ureter?", "options": [{"label_html": "Common iliac nodes", "is_correct": false}, {"label_html": "Para aortic nodes", "is_correct": true}, {"label_html": "External iliac nodes", "is_correct": false}, {"label_html": "Internal iliac nodes", "is_correct": false}, {"label_html": "Meso colic nodes", "is_correct": false}], "correct_index": 1, "explanation_html": "The upper ureter drains to the para-aortic nodes, the lower ureter drains to the common ili
