deafness. In the latter condition webers test will localise to the affected ear and Rinnes test will be impaired on the affected side. Surgical lesions affecting this nerve include CNS tumours and basal skull fractures. It may also be damaged by the administration of ototoxic drugs (of which gentamicin is the most commonly used in surgical practice).<\/td><\/tr><tr><td><b>Glossopharyngeal nerve<\/b><\/td><td>Exits the pons just above the vagus. Receives sensory fibres from posterior 1/3 tongue, tonsils, pharynx and middle ear (otalgia may occur following tonsillectomy). It receives visceral afferents from the carotid bodies. It supplies parasympathetic fibres to the parotid gland via the otic ganglion and motor function to stylopharyngeaus muscle. The sensory function of the nerve is tested using the gag reflex.<\/td><\/tr><tr><td><b>Vagus nerve<\/b><\/td><td>Leaves the medulla between the olivary nucleus and the inferior cerebellar peduncle. Passes through the jugular foramen and into the carotid sheath. Details of the functions of the vagus nerve are covered in the website under relevant organ sub headings.<\/td><\/tr><tr><td><b>Accessory nerve<\/b><\/td><td>Exists from the caudal aspect of the brainstem (multiple branches) supplies trapezius and sternocleidomastoid muscles. The distal portion of this nerve is most prone to injury during surgical procedures.<\/td><\/tr><tr><td><b>Hypoglossal nerve<\/b><\/td><td>Emerges from the medulla at the preolivary sulcus, passes through the hypoglossal canal. It lies on the carotid sheath and passes deep to the posterior belly of digastric to supply muscles of the tongue (except palatoglossus). Its location near the carotid sheath makes it vulnerable during carotid endarterectomy surgery and damage will produce ipsilateral defect in muscle function.<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Cranial venous sinuses", "questions": [{"number": 157, "topic": "Cranial venous sinuses", "stem_html": "Which of the following cranial venous sinuses is unpaired?", "options": [{"label_html": "Transverse sinus", "is_correct": false}, {"label_html": "Superior sagittal sinus", "is_correct": true}, {"label_html": "Cavernous sinus", "is_correct": false}, {"label_html": "Sigmoid sinus", "is_correct": false}, {"label_html": "Inferior petrosal sinus", "is_correct": false}], "correct_index": 1, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">The superior sagittal sinus is unpaired<\/div>The superior sagittal sinus is unpaired. It begins at the crista galli, where it may communicate with the veins of the frontal sinus and sometimes with those of the nasal cavity. It arches backwards in the falx cerebri to terminate at the internal occipital protuberance (usually into the right transverse sinus). The parietal emissary veins link the superior sagittal sinus with the veins on the exterior of the cranium."}, {"number": 158, "topic": "Cranial venous sinuses", "stem_html": "A 21 year old man is hit with a hammer and sustains a depressed skull fracture at the vertex. Which of the following sinuses is at risk in this injury?", "options": [{"label_html": "Superior sagittal sinus", "is_correct": true}, {"label_html": "Inferior petrosal sinus", "is_correct": false}, {"label_html": "Transverse sinus", "is_correct": false}, {"label_html": "Inferior sagittal sinus", "is_correct": false}, {"label_html": "Straight sinus", "is_correct": false}], "correct_index": 0, "explanation_html": "The superior sagittal sinus is at greatest risk in this pattern of injury. This sinus begins at the front of the crista galli and courses backwards along the falx cerebri. It becomes continuous with the right transverse sinus near the internal occipital protuberance."}], "note_html": "The cranial venous sinuses are located within the dura mater. They have no valves which is important in the potential for spreading sepsis. They eventually drain into the internal jugular vein. <br><br>They are:<br><br>Superior sagittal sinus<br>Inferior sagittal sinus<br>Straight sinus<br>Transverse sinus<br>Sigmoid sinus<br>Confluence of sinuses<br>Occipital sinus<br>Cavernous sinus<br><br><i>Topography of cranial venous sinuses<\/i><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb117b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb117.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Dural venous sinuses\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb117b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}, {"name": "Deep perineal pouch", "questions": [{"number": 159, "topic": "Deep perineal pouch", "stem_html": "Which of the following is not found within the deep perineal pouch in an adult male?", "options": [{"label_html": "Pudendal nerve", "is_correct": false}, {"label_html": "Dorsal nerve of the penis", "is_correct": false}, {"label_html": "Sphincter urethrae", "is_correct": false}, {"label_html": "Urethral artery", "is_correct": false}, {"label_html": "Obturator nerve", "is_correct": true}], "correct_index": 4, "explanation_html": "<p>No explanation provided.<\/p>"}], "note_html": "The perineal pouch is surrounded inferiorly by the inferior fascia of the urogenital diaphragm. This fascial boundary extends laterally to form the medial wall of the ischiorectal fossa. The pouch is bounded superiorly by the superior fascia of the urogenital diaphragm and this lies beneath the levator ani muscle. <br><br><b>Contents of the deep perineal pouch<\/b><br><ul><li>Urethral sphincter<\/li><li>Transversus perinei<\/li><li>Dorsal nerve of penis, muscular branches of the perineal nerve<\/li><li>Deep and dorsal arteries of penis, stem of origin of artery to the bulb of penis, urethral artery.<\/li><\/ul>"}, {"name": "Deep peroneal nerve", "questions": [{"number": 160, "topic": "Deep peroneal nerve", "stem_html": "A 45 year old motor cyclist sustains a tibial fracture and is noted to have anaesthesia of the web space between his first and second toes. Which of the nerves listed below is most likely to be compromised?", "options": [{"label_html": "Superficial peroneal nerve", "is_correct": false}, {"label_html": "Deep peroneal nerve", "is_correct": true}, {"label_html": "Sural nerve", "is_correct": false}, {"label_html": "Long saphenous nerve", "is_correct": false}, {"label_html": "Tibial nerve", "is_correct": false}], "correct_index": 1, "explanation_html": "The deep peroneal nerve lies in the anterior muscular compartment of the lower leg and can be compromised by compartment syndrome affecting this area. It provides cutaneous sensation to the first web space. The superficial peroneal nerve provides more lateral cutaneous innervation."}, {"number": 161, "topic": "Deep peroneal nerve", "stem_html": "Which nerve supplies the 1st web space of the foot?", "options": [{"label_html": "Popliteal nerve", "is_correct": false}, {"label_html": "Superficial peroneal nerve", "is_correct": false}, {"label_html": "Deep peroneal nerve", "is_correct": true}, {"label_html": "Tibial nerve", "is_correct": false}, {"label_html": "Saphenous nerve", "is_correct": false}], "correct_index": 2, "explanation_html": "The first web space is innervated by the deep peroneal nerve. See diagram below:<br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb079b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb079.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Deep peroneal nerve\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb079b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}, {"number": 162, "topic": "Deep peroneal nerve", "stem_html": "A 22 year old man suffers a compound fracture of the tibia. During attempted surgical repair the deep peroneal nerve is divided. Which of the following muscles will not be affected as a result?", "options": [{"label_html": "Tibialis anterior", "is_correct": false}, {"label_html": "Peroneus longus", "is_correct": true}, {"label_html": "Extensor hallucis longus", "is_correct": false}, {"label_html": "Extensor digitorum longus", "is_correct": false}, {"label_html": "Peroneus tertius", "is_correct": false}], "correct_index": 1, "explanation_html": "Peroneus longus is innervated by the superficial peroneal nerve (L4, L5, S1).<br><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb100b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb100.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Superficial fibular nerve\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb100b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}], "note_html": "<div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Origin<\/b><\/td><td>From the common peroneal nerve, at the lateral aspect of the fibula, deep to peroneus longus<\/td><\/tr><tr><td><b>Nerve root values<\/b><\/td><td>L4, L5, S1, S2<\/td><\/tr><tr><td><b>Course and relation<\/b><\/td><td><ul><li>Pierces the anterior intermuscular septum to enter the anterior compartment of the lower leg<\/li><li>Passes anteriorly down to the ankle joint, midway between the two malleoli<\/li><\/ul><\/td><\/tr><tr><td><b>Terminates<\/b><\/td><td>In the dorsum of the foot<\/td><\/tr><tr><td><b>Muscles innervated<\/b><\/td><td><ul><li>Tibialis anterior<\/li><li>Extensor hallucis longus<\/li><li>Extensor digitorum longus<\/li><li>Peroneus tertius<\/li><li>Extensor digitorum brevis<\/li><\/ul><\/td><\/tr><tr><td><b>Cutaneous innervation<\/b><\/td><td>Web space of the first and second toes<\/td><\/tr><tr><td><b>Actions<\/b><\/td><td><ul><li>Dorsiflexion of ankle joint<\/li><li>Extension of all toes (extensor hallucis longus and extensor digitorum longus)<\/li><li>Eversion of the foot<\/li><\/ul><\/td><\/tr><\/tbody><\/table><\/div><br>After its bifurcation past the ankle joint, the lateral branch of the deep peroneal nerve innervates the extensor digitorum brevis and the extensor hallucis brevis<br>The medial branch supplies the web space between the first and second digits."}, {"name": "Dermatomes", "questions": [{"number": 163, "topic": "Dermatomes", "stem_html": "Your consultant decides to perform an open inguinal hernia repair under local anaesthesia. Which of the following dermatomal levels will require blockade?", "options": [{"label_html": "T10", "is_correct": false}, {"label_html": "T12", "is_correct": true}, {"label_html": "T11", "is_correct": false}, {"label_html": "S1", "is_correct": false}, {"label_html": "S2", "is_correct": false}], "correct_index": 1, "explanation_html": "<p>No explanation provided.<\/p>"}], "note_html": "The common dermatomal levels and cutaneous nerves responsible for them is illustrated below.<br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb123b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb123.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Dermatome 28anatomy29\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb123b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}, {"name": "Diaphragm apertures", "questions": [{"number": 164, "topic": "Diaphragm apertures", "stem_html": "At which level does the aorta traverse the diaphragm?", "options": [{"label_html": "T10", "is_correct": false}, {"label_html": "T9", "is_correct": false}, {"label_html": "T8", "is_correct": false}, {"label_html": "T11", "is_correct": false}, {"label_html": "T12", "is_correct": true}], "correct_index": 4, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Memory aid:<br>T8 (8 letters) = vena cava<br>T10 (10 letters) = oesophagus<br>T12 (12 letters) = aortic hiatus<\/div>Another memory aid (depending upon your learning style):<br>I ate 10 Eggs At 12' I (IVC) ate (T8) 10 (T10) eggs (eosophagus) At (aorta) 12 (T12)"}], "note_html": "Diaphragm aperture levels<br><br>Vena cava T8<br>Oesophagus T10<br>Aortic hiatus T12"}, {"name": "Ductus arteriosus", "questions": [{"number": 165, "topic": "Ductus arteriosus", "stem_html": "Which of these structures are linked by the ductus arteriosus?", "options": [{"label_html": "Iliac vessels and inferior vena cava", "is_correct": false}, {"label_html": "Umbilical vein and inferior vena cava", "is_correct": false}, {"label_html": "Iliac arteries and umbilical arteries", "is_correct": false}, {"label_html": "Pulmonary artery and aorta", "is_correct": true}, {"label_html": "Pulmonary vein and inferior vena cava", "is_correct": false}], "correct_index": 3, "explanation_html": "The ductus arteriosus connects the pulmonary artery to the first part of the descending aorta.  The ductus venosus connects the umbilical vein to the inferior vena cava and bypasses the liver. The volume transferred by this route decreases with gestation. Persistent patent ductus arteriosus is treated with NSAIDS in most cases."}], "note_html": "The ductus arteriosus is formed from the left 6th aortic arch during embryonic development and attaches to the final part of the aortic arch (the isthmus of aorta) and the first part of the pulmonary artery.<br>It serves to allow blood in the developing foetus to bypass the lungs. It usually closes soon after birth. Should it not do so, it can be stimulated to close by administration of indomethacin."}, {"name": "Duodenum", "questions": [{"number": 166, "topic": "Duodenum", "stem_html": "Which of the following is most important in providing support to the duodenojejunal flexure?", "options": [{"label_html": "Mesentery of the transverse colon", "is_correct": false}, {"label_html": "Uncinate process of the pancreas", "is_correct": false}, {"label_html": "Gerotas fascia", "is_correct": false}, {"label_html": "Ligament of Treves", "is_correct": false}, {"label_html": "Ligament of Treitz", "is_correct": true}], "correct_index": 4, "explanation_html": "The suspensory muscle of the duodenum which is referred to as the ligament of Treitz is most important. The ligament of Treves is located between the ileum and caecum."}, {"number": 167, "topic": "Duodenum", "stem_html": "Which of the following is most important in providing support to the duodenojejunal flexure?", "options": [{"label_html": "Mesentery of the transverse colon", "is_correct": false}, {"label_html": "Uncinate process of the pancreas", "is_correct": false}, {"label_html": "Gerotas fascia", "is_correct": false}, {"label_html": "Ligament of Treves", "is_correct": false}, {"label_html": "Ligament of Treitz", "is_correct": true}], "correct_index": 4, "explanation_html": "The suspensory muscle of the duodenum which is referred to as the ligament of Treitz is most important. The ligament of Treves is located between the ileum and caecum."}, {"number": 168, "topic": "Duodenum", "stem_html": "A 38 year old man undergoes an OGD to investigate dyspepsia. Following intubation of the duodenum, the ampulla of Vater is identified. At which of these sites, is the it most likely to be located?", "options": [{"label_html": "Inferior aspect of the 1st part of the duodenum", "is_correct": false}, {"label_html": "Medial aspect of the 3rd part of the duodenum", "is_correct": false}, {"label_html": "Lateral aspect of the 2nd part of the duodenum", "is_correct": false}, {"label_html": "Lateral aspect of the 3rd part of the duodenum", "is_correct": false}, {"label_html": "Medial aspect of the 2nd part of the duodenum", "is_correct": true}], "correct_index": 4, "explanation_html": "The Ampulla of Vater is usually located 8-10cm from the pylorus and 2-3cm inferior to the opening of the accessory pancreatic duct of the lesser duodenal papilla. Knowledge of the location of the Ampulla is important when cannulating it at ERCP."}], "note_html": "This is the first and widest part of the small bowel. It has a diameter of around 4-5cm. Its commencement is immediately distal to the pylorus and it runs for around 25cm where it becomes the jejunum at the region of the duodenojejunal flexure. It comprises four parts, superior, descending, horizontal and ascending. Of these, the horizontal is the longest segment. The first 2-3cm of the superior duodenum are intraperitoneal. The remainder is largely retroperitoneal with the exception of the final 1-2cm. <br><br>Medial relations of the duodenum include the superior pancreatico-duodenal artery and the pancreatic head. The descending duodenum is closely related to the commencement of the transverse colon which has little in the way of mesentery at this area. Posterior to the descending duodenum lies the right kidney. <br><br>The horizontal part passes transversely to the left with an upward deflection as it does so. From right to left it crosses in front of the right ureter, right psoas major, right gonadal vessels and IVC. It terminates anterior to the aorta. Anteriorly, it's relations include the superior mesenteric vessels and the root of the small bowel. <br><br>The ascending part runs to the left of the aorta and upwards to the level of L2. It terminates by binding abruptly forwards as the duodenojejunal flexure. Posteriorly, are the left sympathetic trunk, left psoas major and left gonadal vessels. Anteriorly, it gives attachment to the root of the mesentery, while the left kidney lies laterally and the uncinate process of the pancreas lies medially. The region of the duodenojenunal flexure is fixed in position by the suspensory muscle of the duodenum. This fibromuscular band blends with the musculature of the flexure and passes upwards deep to the pancreas to gain attachment to the right crus of the diaphragm. It is referred to eponymously as the ligament of Treitz."}, {"name": "Ear- anatomy", "questions": [{"number": 169, "topic": "Ear- anatomy", "stem_html": "A man develops an infection in his external ear. The infection is extremely painful. Which of the following nerves conveys sensation from this region?", "options": [{"label_html": "Occipital branch of the trigeminal nerve", "is_correct": false}, {"label_html": "Vestibulocochlear nerve", "is_correct": false}, {"label_html": "Glossopharyngeal nerve", "is_correct": false}, {"label_html": "Auriculotemporal nerve", "is_correct": true}, {"label_html": "Maxillary branch of the trigeminal nerve", "is_correct": false}], "correct_index": 3, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Tensor tympania and stapedius are the only two muscles of the middle ear. Contraction of tensor tympani will tend to dampen the vibrations produced by loud sounds, it is innervated by a branch of the trigeminal nerve. The stapedius dampens movements of the ossicles in response to loud sounds and is innervated by a branch of the facial nerve.<\/div>The auriculotemporal nerve, which is derived from the mandibular branch of the trigeminal nerve supplies this area.<br>Some areas may also be innervated by the vagus."}, {"number": 170, "topic": "Ear- anatomy", "stem_html": "A 10 year old child has a grommet inserted for a glue ear. What type of epithelium is present on the external aspect of the tympanic membrane?", "options": [{"label_html": "Stratified squamous", "is_correct": true}, {"label_html": "Ciliated columnar", "is_correct": false}, {"label_html": "Non ciliated columnar", "is_correct": false}, {"label_html": "Non stratified squamous", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 0, "explanation_html": "The external aspect of the tympanic membrane is lined by stratified squamous epithelium. This is significant clinically in the development of middle ear infections when this type of epithelium may migrate inside the middle ear."}], "note_html": "The ear is composed of three anatomically distinct regions.<br><br><b>External ear<\/b><br>Auricle is composed of elastic cartilage covered by skin. The lobule has no cartilage and contains fat and fibrous tissue.<br><br>External auditory meatus is approximately 2.5cm long. <br>Lateral third of the external auditory meatus is cartilaginous and the medial two thirds is bony.<br><br>The region is innervated by the greater auricular nerve. The auriculotemporal branch of the trigeminal nerve supplies most of the external auditory meatus and the lateral surface of the auricle. <br><br><br><b>Middle ear<\/b><br>Space between the tympanic membrane and cochlea. The aditus leads to the mastoid air cells is the route through which middle ear infections may cause mastoiditis. Anteriorly the eustacian tube connects the middle ear to the naso pharynx. <br>The tympanic membrane consists of:<br><ul><li>Outer layer of stratified squamous epithelium.   <\/li><li>Middle layer of fibrous tissue.<\/li><li>Inner layer of mucous membrane continuous with the middle ear. <\/li><\/ul>The tympanic membrane is approximately 1cm in diameter. <br>The chorda tympani nerve passes on the medial side of the pars flaccida.<br><br>The middle ear is innervated by the glossopharyngeal nerve and pain may radiate to the middle ear following tonsillectomy. <br><br><b>Ossicles<\/b><br>Malleus attaches to the tympanic membrane (the Umbo).<br>Malleus articulates with the incus (synovial joint).<br>Incus attaches to stapes (another synovial joint).<br><br><b>Internal ear<\/b><br>Cochlea, semi circular canals and vestibule<br><br>Organ of corti is the sense organ of hearing and is located on the inside of the cochlear duct on the basilar membrane.<br><br>Vestibule accommodates the utricule and the saccule. These structures contain endolymph and are surrounded by perilymph within the vestibule.<br><br>The semicircular canals lie at various angles to the petrous temporal bone. All share a common opening into the vestibule."}, {"name": "Elbow joint", "questions": [{"number": 171, "topic": "Elbow joint", "stem_html": "Which of the muscles listed below is attached to the anterior aspect of the fibrous capsule that encases the elbow joint?", "options": [{"label_html": "Pronator teres", "is_correct": false}, {"label_html": "Biceps", "is_correct": false}, {"label_html": "Brachialis", "is_correct": true}, {"label_html": "Triceps", "is_correct": false}, {"label_html": "Extensor carpi radialis longus", "is_correct": false}], "correct_index": 2, "explanation_html": "The brachialis inserts some of its fibres into the fibrous joint of the elbow capsule and when it contracts, it helps to flex the joint."}], "note_html": "This large synovial joint is of the hinge variety of joint, the bones of the forearm articulate with the lower end of the humerus. The upper ends of the radius and ulnar are bound together by the anular ligament of the radius in such a way as to permit movement between these two bones at what is described as the proximal radio-ulnar joint. The elbow and the proximal radio-ulnar joints have a common fibrous capsule and synovial cavity, and though the anular ligament plays a part in the structure of both joints, it is described with the proximal radio-ulnar joint. <br><br><b>Articular surfaces<\/b><br>The humeral articular surface at the elbow comprises the grooved trochlea, the spheroidal capitulum, and the sulcus between them. This composite surface is covered by a layer of articular cartilage. The capitulum is confined to the anterior and distal aspects of the bone, but the trochea extends round the distal end of the bone from the lower edge of the coronoid fossa on the front of the humerus to the lower edge of the olecranon fossa posteriorly. The articular surface covering the ulnar surface of the elbow joint is interrupted along the deepest part in a transverse line. Then trochlear notch articulates with the trochlea of the humerus forming a saddle shaped joint with it. The radial surface has a slight concavity to the proximal surface of the head which articulates with the capitulum while its raised margin lies on the capitulotrochlear groove. This surface of the head is covered with articular cartilage which is continuous with that round the sides in the radio-ulnar joint. The radial and ulnar surfaces are most fully in contact with the corresponding humeral surfaces when the forearm is in a position midway between full pronation and supination and the elbow is fixed to a right angle. <br><br><b>Fibrous capsule<\/b><br>The joint is encased within a fibrous capsule that is relatively weak anteriorly and posteriorly, its strengthened at the sides to form the radial and ulnar collateral ligaments. The anterior part of the capsule is attached to the front of the humerus immediately superior to the radial and coronoid fossae, to the anterior border of the coronoid process of the ulna, and to the anterior part of the anular ligament of the radius. The brachialis muscle covers the greater part of the front of the capsule, and some of its deep fibres insert into the capsule. <br>The posterior part of the capsule is very weak in its median part. However, the tendon of triceps inserts at this site and supports it and also draws it upwards in extension. <br>The radial collateral ligament is a strong triangular shaped thickening of the fibrous capsule. Its apex is attached superiorly to the antero-inferior aspect of the lateral epicondyle of the humerus in close relation to the common extensor muscles whose common origin overlies this site. Distally, the broad base of the ligament blends with the anular ligament of the radius, and is attached both in front and behind to the margins of the radial notch on the ulna. <br>The ulna collateral ligament is comprised of three capsular condensations which are continuous with one another. An anterior band passes from the front of the medial epicondyle of the humerus to the medial edge of the coronoid process of the ulna; it is closely related to the common origin of the superficial flexor muscles. A posterior band is attached above to the back of the medial epicondyle and below to the medial edge of the olecranon. A transverse band stretches between the attachments of the anterior and posterior bands on the coronoid process and the olecranon. The lower edge of this transverse ligament is free, a small amount of synovial membrane may protrude through the space between this and the underlying bone. <br><br><b>Synovial membrane<\/b><br>The attachments of the synovial membrane generally follow those of the fibrous capsule. <br><br><b>Nerve supply<\/b><br>The elbow joint derives its nerve supply from the musculocutaneous, median, radial and ulnar nerves. <br><br><b>Movements<\/b><br>Movement occurs around a transverse axis, a movement of flexion when the forearm makes anteriorly a diminishing angle with the upper arm and extension when the opposite occurs. The axis of movement passes through the humeral epicondyles and is not at right angles with either the humerus or bones of the forearm. In full extension with the forearm supinated, the arm and forearm form an angle which is more than 180 degrees, the extent to which this angle is exceeded is termed the carrying angle. The carrying angle is masked when the forearm is pronated."}, {"name": "Embryological aortic arches", "questions": [{"number": 172, "topic": "Embryological aortic arches", "stem_html": "The right and left pulmonary arteries are derived from which of the following embryological aortic arches?", "options": [{"label_html": "Fifth", "is_correct": false}, {"label_html": "Second", "is_correct": false}, {"label_html": "Sixth", "is_correct": true}, {"label_html": "Fourth", "is_correct": false}, {"label_html": "Third", "is_correct": false}], "correct_index": 2, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Pulmonary vessels develop from the sixth arch<\/div>"}, {"number": 173, "topic": "Embryological aortic arches", "stem_html": "The proximal aspect of the right subclavian artery is derived from which of the structures listed below:", "options": [{"label_html": "6th aortic arch", "is_correct": false}, {"label_html": "3rd aortic arch", "is_correct": false}, {"label_html": "4th aortic arch", "is_correct": true}, {"label_html": "1st aortic arch", "is_correct": false}, {"label_html": "2nd aortic arch", "is_correct": false}], "correct_index": 2, "explanation_html": "<p>No explanation provided.<\/p>"}], "note_html": "- The aortic arches are a series of six paired embryological vascular structures which give rise to the great arteries of the neck and head.<br><ul><li>The first and second arches disappear early. A remnant of the 1st arch forms part of the maxillary artery. The external carotid buds from the horns of the aortic sac left behind by the regression of the first two arches.<\/li><li>The third aortic arch constitutes the commencement of the internal carotid artery, and is therefore named the carotid arch. It contributes to the common carotid artery and the proximal portion of the internal carotid artery.<\/li><li>The fourth right arch forms the right subclavian as far as the origin of its internal mammary branch. The fourth left arch forms the arch of the aorta between the origin of the left carotid artery and the termination of the ductus arteriosus. <\/li><li>The fifth arch regresses or forms incompletely.<\/li><li>The proximal part of the sixth right arch persists as the proximal part of the right pulmonary artery while the distal section degenerates; The sixth left arch gives off the left pulmonary artery and forms the ductus arteriosus.<\/li><\/ul>"}, {"name": "Embryology of the diaphragm and diaphragmatic hernia", "questions": [{"number": 174, "topic": "Embryology of the diaphragm and diaphragmatic hernia", "stem_html": "From which structure is the central tendon of the diaphragm derived?", "options": [{"label_html": "Septum transversum", "is_correct": true}, {"label_html": "Pleuroperitoneal folds", "is_correct": false}, {"label_html": "Diaphragmatic crura", "is_correct": false}, {"label_html": "Dorsal mesocardium", "is_correct": false}, {"label_html": "Oropharyngeal membrane", "is_correct": false}], "correct_index": 0, "explanation_html": "The septum transversum is a thick ridge of mesodermal tissue in the developing embryo that separates the thoracic and abdominal cavities and forms the central tendon of the diaphragm."}, {"number": 175, "topic": "Embryology of the diaphragm and diaphragmatic hernia", "stem_html": "A male infant is born by emergency cesarean section at 39 weeks gestation for foetal distress. Soon after the birth the baby becomes progressively hypoxic and on examination is found to have a scaphoid abdomen. What is the most likely underlying diagnosis?", "options": [{"label_html": "Intestinal malrotation", "is_correct": false}, {"label_html": "Hiatus hernia", "is_correct": false}, {"label_html": "Foramen of Bochdalek hernia", "is_correct": true}, {"label_html": "Foramen of Morgagni hernia", "is_correct": false}, {"label_html": "Tracheo-oesphageal fistula", "is_correct": false}], "correct_index": 2, "explanation_html": "The finding of a scaphoid abdomen and respiratory distress suggests extensive intra thoracic herniation of the abdominal contents. This is seen most frequently with Bochdalek hernias. Morgagni hernias seldom present in  such a dramatic fashion. The other options do not typically present with the symptoms and signs described."}], "note_html": "<b>Embryology<\/b><br>The diaphragm is formed between the 5th and 7th weeks of gestation through the progressive fusion of the septum transversum, pleuroperitoneal folds and via lateral muscular ingrowth. The muscular origins of the diaphragm are somites located in cervical segments 3 to 5, which accounts for the long path taken by the phrenic nerve. The components contribute to the following diaphragmatic segments:<br><ul><li>Septum transversum - Central tendon<\/li><li>Pleuroperitoneal membranes - Parietal membranes surrounding viscera<\/li><li>Cervical somites C3 to C5 - Muscular component of the diaphragm<\/li><\/ul><br><b>Diaphragmatic hernia<\/b><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Type of hernia<\/b><\/th><th><b>Features<\/b><\/th><\/tr><\/thead><tbody><tr><td>Morgagni<\/td><td>Anteriorly located<br>Minimal compromise on lung development<br>Minimal signs on antenatal ultrasound<br>Usually present later<br>Usually good prognosis<\/td><\/tr><tr><td>Bochdalek hernia<\/td><td>Posteriorly located<br>Larger defect<br>Often diagnosed antenatally<br>Associated with pulmonary hypoplasia<br>Poor prognosis<\/td><\/tr><\/tbody><\/table><\/div><br>The posterior hernias of Bochdalek are the most common type and if not diagnosed antenatally will typically present soon after birth with respiratory distress. The classical finding is that of a scaphoid abdomen on clinical examination because of herniation of the abdominal contents into the chest. Bochdalek hernias are associated with a number of chromosomal abnormalities such as Trisomy 21 and 18. Infants have considerable respiratory distress due to hypoplasia of the developing lung. Historically this was considered to be due to direct compression of the lung by herniated viscera. This view over simplifies the situation and the pulmonary hypoplasia occurs concomitantly with the hernial development, rather than as a direct result of it. The pulmonary hypoplasia is associated with pulmonary hypertension and abnormalities of pulmonary vasculature. The pulmonary hypertension renders infants at risk of right to left shunting (resulting in progressive and worsening hypoxia). <br>Diagnostic work up of these infants includes chest x-rays/ abdominal ultrasound scans and cardiac echo. <br>Surgery forms the mainstay of treatment and both thoracic and abdominal approaches may be utilised. Following reduction of the hernial contents a careful search needs to be made for a hernial sac as failure to recognise and correct this will result in a high recurrence rate. Smaller defects may be primarily closed, larger defects may require a patch to close the defect. Malrotation of the viscera is a recognised association and may require surgical correction at the same procedure (favoring an abdominal approach). <br>The mortality rate is 50-75% and is related to the degree of lung compromise and age at presentation (considerably better in infants &gt;24 hours old)."}, {"name": "Embryology of the kidney", "questions": [{"number": 176, "topic": "Embryology of the kidney", "stem_html": "Which of these location best describes the initial location of the metanephric cap from which the kidney is derived?", "options": [{"label_html": "Medial to the ureteric bud in the pelvis", "is_correct": true}, {"label_html": "Medial to the renal arteries", "is_correct": false}, {"label_html": "Lateral to the renal arteries", "is_correct": false}, {"label_html": "Lateral to the ureteric bud beneath the adrenal gland", "is_correct": false}, {"label_html": "Lateral to the ureteric bud beneath the renal veins", "is_correct": false}], "correct_index": 0, "explanation_html": "The metanephric cap lies in the pelvis initially. Failure to migrate cranially results in a pelvic kidney."}], "note_html": "The permanent kidney or metanephros has a double origin. The renal tubules are derived from a part of the intermediate cell mass caudal to that from which the mesonephros is derived; the ureter, the pelvis, calyces and the collecting tubules of the kidney are formed from the ureteric bud of the mesonephric duct. <br>The ureteric bud arises as a tubular diverticulum from the mesonephric duct close to the point where it joins the cloaca. The diverticulum appears during the fifth week of gestation. It grows cranially, dorsal to the body cavity. The portion of the outgrowth nearest the mesonephric duct is slender and forms the adult ureter. The expanded distal part forms the pelvis of the kidney and gives rise to branches which form the calyces of the kidney. From the calyces numerous collecting tubules grow and acquire connections with the renal tubules, which arise independently in the metanephric cap- a condensation of the intermediate mesoderm covering the expanded ureteric bud. <br>The metanephric cap, in which the renal tubules arise, lies at first on the medial side of the ureteric bud and later on its dorsal aspect. The ureteric bud and metanephric duct grow in a cephalic direction dorsal to the mesonephros. If this process fails to occur, the kidney retains its pelvic location (the so called pelvic kidney). The close relationship of the two metanephric caps at their caudal ends can result in the development of horseshoe kidney in some cases. As the kidney ascends cranially, its blood supply changes from the iliac vessels to the renal arteries from the aorta. These additional vessels may sometimes persist. <br>As the ureteric bud divides to form the calyces, the metanephric cap breaks up into numerous cell masses- one for each calyx, and later one for each of the collecting tubules which grow out from the calyces. This results in the kidney having a lobulated appearance which is seen in the kidneys of neonates."}, {"name": "Epigastric artery", "questions": [{"number": 177, "topic": "Epigastric artery", "stem_html": "A 63 year old lady is undergoing a complex abdominal wall reconstruction to manage an incisional hernia. The inferior epigastric artery is encountered. Which of the following most accurately describes its location at the level of the umbilicus?", "options": [{"label_html": "It lies posterior to the posterior wall of the rectus sheath and the peritoneum", "is_correct": false}, {"label_html": "It lies anterior to the posterior wall of the rectus sheath and posterior to the rectus abdominis muscle", "is_correct": false}, {"label_html": "It lies posterior to the anterior wall of the rectus sheath and anterior to the rectus abdominis muscle", "is_correct": false}, {"label_html": "It lies within the rectus abdominis muscle", "is_correct": true}, {"label_html": "It lies anterior to the anterior wall of the rectus sheath", "is_correct": false}], "correct_index": 3, "explanation_html": "The inferior epigastric artery arises above the inguinal ligament and ascends towards the umbilicus from the medial side of the deep ring. It then pierces the transversalis fascia and passes anterior to the arcuate line into the rectus sheath and penetrates the muscle, and its branches anastomose with those of the superior epigastric artery"}, {"number": 178, "topic": "Epigastric artery", "stem_html": "A 63 year old lady is undergoing a complex abdominal wall reconstruction to manage an incisional hernia. The inferior epigastric artery is encountered. Which of the following most accurately describes its location at the level of the umbilicus?", "options": [{"label_html": "It lies posterior to the posterior wall of the rectus sheath and the peritoneum", "is_correct": false}, {"label_html": "It lies anterior to the posterior wall of the rectus sheath and posterior to the rectus abdominis muscle", "is_correct": false}, {"label_html": "It lies posterior to the anterior wall of the rectus sheath and anterior to the rectus abdominis muscle", "is_correct": false}, {"label_html": "It lies within the rectus abdominis muscle", "is_correct": true}, {"label_html": "It lies anterior to the anterior wall of the rectus sheath", "is_correct": false}], "correct_index": 3, "explanation_html": "The inferior epigastric artery arises above the inguinal ligament and ascends towards the umbilicus from the medial side of the deep ring. It then pierces the transversalis fascia and passes anterior to the arcuate line into the rectus sheath and penetrates the muscle, and its branches anastomose with those of the superior epigastric artery"}, {"number": 179, "topic": "Epigastric artery", "stem_html": "An 80 year old lady with a caecal carcinoma is undergoing a right hemicolectomy performed through a transverse incision. The procedure is difficult and the incision is extended medially by dividing the rectus sheath. Brisk arterial haemorrhage ensues. From which of the following does the damaged vessel originate?", "options": [{"label_html": "Internal iliac artery", "is_correct": false}, {"label_html": "External iliac artery", "is_correct": true}, {"label_html": "Superior vesical artery", "is_correct": false}, {"label_html": "Inferior vesical artery", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 1, "explanation_html": "The vessel damaged is the epigastric artery. This originates from the external iliac artery (see below)."}], "note_html": "The inferior epigastric artery arises from the external iliac artery immediately above the inguinal ligament. It then passes along the medial margin of the deep inguinal ring. From here it continues superiorly to lie behind the rectus abdominis muscle. <br><br>This is illustrated below:<br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb083b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb083.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Inferior epigastric artery\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb083b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}, {"name": "Epiploic Foramen", "questions": [{"number": 180, "topic": "Epiploic Foramen", "stem_html": "A 42 year old lady undergoes a difficult cholecystectomy and significant bleeding is occurring. The surgeons place a vascular clamp transversely across the anterior border of the epiploic foramen. Which of the following structures will be occluded in this manoeuvre?", "options": [{"label_html": "Cystic artery", "is_correct": false}, {"label_html": "Cystic duct", "is_correct": false}, {"label_html": "Left gastric artery", "is_correct": false}, {"label_html": "Portal vein", "is_correct": true}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 3, "explanation_html": "The portal vein, hepatic artery and common bile duct are occluded."}], "note_html": "The epiploic foramen has the following boundaries:<br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Anteriorly<\/b> (in the free edge of the lesser omentum)<\/td><td>Bile duct to the right, portal vein behind and hepatic artery to the left.<\/td><\/tr><tr><td><b>Posteriorly<\/b><\/td><td>Inferior vena cava<\/td><\/tr><tr><td><b>Inferiorly<\/b><\/td><td>1st part of the duodenum<\/td><\/tr><tr><td><b>Superiorly<\/b><\/td><td>Caudate process of the liver<\/td><\/tr><\/tbody><\/table><\/div><br>During liver surgery bleeding may be controlled using a Pringles manoeuvre, this involves placing a vascular clamp across the anterior aspect of the epiploic foramen. Thereby occluding:<br><ul><li>Common bile duct<\/li><li>Hepatic artery<\/li><li>Portal vein<\/li><\/ul>"}, {"name": "Extensor retinaculum", "questions": [{"number": 181, "topic": "Extensor retinaculum", "stem_html": "A 22 year old man is involved in a fight. He sustains a laceration to the posterior aspect of his wrist. In the emergency department the wound is explored and the laceration is found to be transversely orientated and overlies the region of the extensor retinaculum, which is intact. Which of the following structures is least likely to be injured in this scenario?", "options": [{"label_html": "Dorsal cutaneous branch of the ulnar nerve", "is_correct": false}, {"label_html": "Tendon of extensor indicis", "is_correct": true}, {"label_html": "Basilic vein", "is_correct": false}, {"label_html": "Superficial branch of the radial nerve", "is_correct": false}, {"label_html": "Cephalic vein", "is_correct": false}], "correct_index": 1, "explanation_html": "The extensor retinaculum attaches to the radius proximal to the styloid, thereafter it runs obliquely and distally to wind around the ulnar styloid (but does not attach to it).  The extensor tendons lie deep to the extensor retinaculum and would therefore be less susceptible to injury than the superficial structures."}, {"number": 182, "topic": "Extensor retinaculum", "stem_html": "A 28 year old man lacerates the posterolateral aspect of his wrist with a knife in an attempted suicide. On arrival in the emergency department the wound is inspected and found to be located over the lateral aspect of the extensor retinaculum (which is intact). Which of the following structures is at greatest risk of injury?", "options": [{"label_html": "Superficial branch of the radial nerve", "is_correct": true}, {"label_html": "Radial artery", "is_correct": false}, {"label_html": "Dorsal branch of the ulnar nerve", "is_correct": false}, {"label_html": "Tendon of extensor carpi radialis brevis", "is_correct": false}, {"label_html": "Tendon of extensor digiti minimi", "is_correct": false}], "correct_index": 0, "explanation_html": "The superficial branch of the radial nerve passes superior to the extensor retinaculum in the position of this laceration and is at greatest risk of injury. The dorsal branch of the ulnar nerve and artery also pass superior to the extensor retinaculum but are located medially."}], "note_html": "The extensor retinaculum is a thickening of the deep fascia that stretches across the back of the wrist and holds the long extensor tendons in position. <br>Its attachments are:<br><ul><li>The pisiform and triquetral medially<\/li><li>The end of the radius laterally<\/li><\/ul><br><b>Structures related to the extensor retinaculum<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Structures superficial to the retinaculum<\/b><\/td><td><ul><li>Basilic vein<\/li><li>Dorsal cutaneous branch of the ulnar nerve<\/li><li>Cephalic vein<\/li><li>Superficial branch of the radial nerve<\/li><\/ul><\/td><\/tr><tr><td><b>Structures passing deep to the extensor retinaculum<\/b><\/td><td><ul><li>Extensor carpi ulnaris tendon<\/li><li>Extensor digiti minimi tendon<\/li><li>Extensor digitorum and extensor indicis tendon<\/li><li>Extensor pollicis longus tendon<\/li><li>Extensor carpi radialis longus tendon<\/li><li>Extensor carpi radialis brevis tendon<\/li><li>Abductor pollicis longus and extensor pollicis brevis tendons<\/li><\/ul><\/td><\/tr><\/tbody><\/table><\/div><br>Beneath the extensor retinaculum fibrous septa form six compartments that contain the extensor muscle tendons. Each compartment has its own synovial sheath.<br><br><b>The radial artery<\/b><br>The radial artery passes between the lateral collateral ligament of the wrist joint and the tendons of the abductor pollicis longus and extensor pollicis brevis.<br><br><i>Image illustrating the topography of tendons passing under the extensor retinaculum<\/i><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb020b.jpg\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb020.jpg\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Extensor retinaculum of the hand\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb020b.jpg\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}, {"name": "External carotid artery", "questions": [{"number": 183, "topic": "External carotid artery", "stem_html": "Which of the following is not a branch of the external carotid artery?", "options": [{"label_html": "Facial artery", "is_correct": false}, {"label_html": "Lingual artery", "is_correct": false}, {"label_html": "Superior thyroid artery", "is_correct": false}, {"label_html": "Mandibular artery", "is_correct": true}, {"label_html": "Maxillary artery", "is_correct": false}], "correct_index": 3, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">External carotid artery branches mnemonic:<br><br>'Some Angry Lady Figured Out PMS'<br><br>Superior thyroid (superior laryngeal artery branch)<br>Ascending pharyngeal <br>Lingual <br>Facial (tonsillar and labial artery)<br>Occipital <br>Posterior auricular <br>Maxillary (inferior alveolar artery, middle meningeal artery)<br>Superficial temporal<\/div>"}, {"number": 184, "topic": "External carotid artery", "stem_html": "Which of these statements relating to the external carotid is false?", "options": [{"label_html": "It ends by bifurcating into the superficial temporal and ascending pharyngeal artery", "is_correct": true}, {"label_html": "Its first branch is the superior thyroid artery", "is_correct": false}, {"label_html": "The superior thyroid, lingual and facial arteries all arise from its anterior surface", "is_correct": false}, {"label_html": "The ascending pharyngeal artery is a medial branch", "is_correct": false}, {"label_html": "Initially it lies anteromedial to the internal carotid", "is_correct": false}], "correct_index": 0, "explanation_html": "It terminates by dividing into the superficial temporal and maxillary branches. The external carotid has eight branches, 3 from its anterior surface ; thyroid, lingual and facial. The pharyngeal artery is a medial branch. The posterior auricular and occipital are posterior branches."}, {"number": 185, "topic": "External carotid artery", "stem_html": "Which of the following is the first vessel to branch from the external carotid artery?", "options": [{"label_html": "Superior thyroid artery", "is_correct": true}, {"label_html": "Inferior thyroid artery", "is_correct": false}, {"label_html": "Lingual artery", "is_correct": false}, {"label_html": "Facial artery", "is_correct": false}, {"label_html": "Occipital artery", "is_correct": false}], "correct_index": 0, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\"><b>Mnemonic<\/b><br>(Order in which they branch off)Some (sup thyroid)Attendings (Ascending Pharyngeal)Like (Lingual)Freaking (Facial)Out (Occipital)Potential (Post auricular)Medical (Maxillary)Students (Sup temporal)<\/div>The first branch of the external carotid artery is the superior thyroid artery. The inferior thyroid artery is derived from the thyrocervical trunk. The other branches are illustrated below."}, {"number": 186, "topic": "External carotid artery", "stem_html": "An ENT surgeon is performing a radical neck dissection. She wishes to fully expose the external carotid artery. To do so she inserts a self retaining retractor close to its origin. Which of the following structures lies posterolaterally to the external carotid at this point?", "options": [{"label_html": "Superior thyroid artery", "is_correct": false}, {"label_html": "Internal carotid artery", "is_correct": true}, {"label_html": "Lingual artery", "is_correct": false}, {"label_html": "Facial artery", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 1, "explanation_html": "The internal carotid artery lies posterolaterally to the external carotid artery at it's origin from the common carotid. The superior thyroid, lingual and facial arteries all arise from its anterior surface."}], "note_html": "The external carotid commences immediately lateral to the pharyngeal side wall. It ascends and lies anterior to the internal carotid and posterior to the posterior belly of digastric and stylohyoid. More inferiorly it is covered by sternocleidomastoid, passed by hypoglossal nerves, lingual and facial veins.<br>It then pierces the fascia of the parotid gland finally dividing into its terminal branches within the gland itself. <br><br><b>Surface marking of the carotid<\/b><br>This is an imaginary line drawn from the bifurcation of the common carotid passing behind the angle of the jaw to a point immediately anterior to the tragus of the ear.<br><br><b>Branches of the external carotid artery<\/b><br>It has six main branches, three in front, two behind and one deep. <br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Three in front<\/b><\/td><td>Superior thyroid<br>Lingual <br>Facial<\/td><\/tr><tr><td><b>Two behind<\/b><\/td><td>Occipital<br>Posterior auricular<\/td><\/tr><tr><td><b>Deep<\/b><\/td><td>Ascending pharyngeal<\/td><\/tr><\/tbody><\/table><\/div><br>It terminates by dividing into the superficial temporal and maxillary arteries in the parotid gland. <br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb008b.jpg\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb008.jpg\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/External carotid artery\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb008b.jpg\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}, {"name": "External oblique muscle", "questions": [{"number": 187, "topic": "External oblique muscle", "stem_html": "A 25 year old man has an inguinal hernia, which of the following structures must be divided (at open surgery) to gain access to the inguinal canal?", "options": [{"label_html": "Transversalis fascia", "is_correct": false}, {"label_html": "External oblique aponeurosis", "is_correct": true}, {"label_html": "Conjoint tendon", "is_correct": false}, {"label_html": "Rectus abdominis", "is_correct": false}, {"label_html": "Inferior epigastric artery", "is_correct": false}], "correct_index": 1, "explanation_html": "This question is asking what structure forms the anterior wall of the inguinal canal. The anterior wall is formed by the external oblique aponeurosis. Once this is divided the canal is entered, the cord can be mobilised and a hernia repair performed. The transversalis fascia and conjoint tendons form the posterior wall and would not routinely be divided to gain access to the inguinal canal itself."}], "note_html": "External oblique forms the outermost muscle of the three muscles comprising the anterolateral aspect of the abdominal wall. Its aponeurosis comprises the anterior wall of the inguinal canal.<br><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Origin<\/b><\/td><td>Outer surfaces of the lowest eight ribs<\/td><\/tr><tr><td><b>Insertion<\/b><\/td><td><ul><li>Anterior two thirds of the outer lip of the iliac crest. <\/li><li>The remainder becomes the aponeurosis that fuses with the linea alba in the midline.<\/li><\/ul><\/td><\/tr><tr><td><b>Nerve supply<\/b><\/td><td>Ventral rami of the lower six thoracic nerves<\/td><\/tr><tr><td><b>Actions<\/b><\/td><td>Contains the abdominal viscera, may contract to raise intra abdominal pressure. Moves trunk to one side.<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Facial nerve", "questions": [{"number": 188, "topic": "Facial nerve", "stem_html": "A 12 year old boy undergoes surgery for recurrent mastoid infections. Post operatively he complains of an altered taste sensation. Which of the following nerves has been injured?", "options": [{"label_html": "Glossopharyngeal", "is_correct": false}, {"label_html": "Greater petrosal", "is_correct": false}, {"label_html": "Olfactory", "is_correct": false}, {"label_html": "Trigeminal", "is_correct": false}, {"label_html": "Chorda tympani", "is_correct": true}], "correct_index": 4, "explanation_html": "The chorda tympani branch of the facial nerve passes forwards through its canaliculus into the middle ear, and crosses the medial aspect of the tympanic membrane. It then passes antero-inferiorly in the infratemporal fossa. It distributes taste fibres to the anterior two thirds of the tongue.<br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb078b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb078.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Chorda tympani\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb078b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}, {"number": 189, "topic": "Facial nerve", "stem_html": "A 12 year old boy undergoes surgery for recurrent mastoid infections. Post operatively he complains of an altered taste sensation. Which of the following nerves has been injured?", "options": [{"label_html": "Glossopharyngeal", "is_correct": false}, {"label_html": "Greater petrosal", "is_correct": false}, {"label_html": "Olfactory", "is_correct": false}, {"label_html": "Trigeminal", "is_correct": false}, {"label_html": "Chorda tympani", "is_correct": true}], "correct_index": 4, "explanation_html": "The chorda tympani branch of the facial nerve passes forwards through its canaliculus into the middle ear, and crosses the medial aspect of the tympanic membrane. It then passes antero-inferiorly in the infratemporal fossa. It distributes taste fibres to the anterior two thirds of the tongue.<br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb078b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb078.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Chorda tympani\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb078b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}, {"number": 190, "topic": "Facial nerve", "stem_html": "A 53 year old man presents with unilateral hyperacousia. Which of the following nerves is least likely to be functioning normally?", "options": [{"label_html": "Vestibulocochlear", "is_correct": false}, {"label_html": "Glossopharyngeal", "is_correct": false}, {"label_html": "Facial", "is_correct": true}, {"label_html": "Trochlear", "is_correct": false}, {"label_html": "Vagus", "is_correct": false}], "correct_index": 2, "explanation_html": "Damage to the nerve in the bony canal may result in impaired innervation to stapedius and therefore sounds are no longer dampened. Another cause of hyperacusis is increased activity in the tensor tympani muscle, this is innervated by the trigeminal nerve."}, {"number": 191, "topic": "Facial nerve", "stem_html": "A professional musician visits his physician after a morning concert. He complains of painless swelling in his left cheek when he plays his tuba. Physical examination of the patient reveals slight facial asymmetry due to minor swelling on the right side of the face. The skin over the swelling is smooth without any secondary changes. Palpation reveals a soft and non-tender swelling. The oral opening is normal without any trismus. Further examination reveals swelling of the left buccal mucosa extending from the first to the third molar. Bedside ultrasound shows small areas of high echogenicity consistent with pneumoparotid. Which nerve is associated with motor function to prevent air from entering the affected duct in this patient?", "options": [{"label_html": "V2  Maxillary nerve", "is_correct": false}, {"label_html": "V3  Mandibular nerve", "is_correct": false}, {"label_html": "CN VII  Zygomatic branch", "is_correct": false}, {"label_html": "CN VII  Buccal branch", "is_correct": true}, {"label_html": "CN VII  Marginal mandibular branch", "is_correct": false}], "correct_index": 3, "explanation_html": "Pneumoparotid is a very rare condition of parotid gland, often complicating with a subcutaneous emphysema, causing swelling of the parotid lodge. This pathology usually occurred due to physiological stagnation of air in parotid parenchyma. Pneumoparotid is usually associated with a retrograde insufflation of air and saliva via Stensens duct into the secondary ducts and glandular acini. Hypotonia of the buccinator muscle, hypertrophy of the masseter muscle or temporary obstruction of the Stensens duct by mucous are described as possible risk factors.<br>The opening of the Stensens duct lies near to the second upper molar tooth bilaterally. The normal anatomy of duct preventing the reflux of air and saliva into the parotid gland are three fold:<br>The diameter of the duct orifice is smaller than that of the duct itself;<br>The duct opening is covered by redundant mucosal layer, covering the duct orifice when there is increased intraoral pressure.<br>The Stensens duct is compressed in its lateral course along the masseter muscle and its passage through the buccinator muscle with an increase in oral pressure.<br>The buccinator is the muscle of interest here. Motor innervation is from the buccal branch of the facial nerve (cranial nerve VII). Sensory innervation is supplied by the buccal branch (one of the muscular branches) of the mandibular part of the trigeminal (cranial nerve V)."}, {"number": 192, "topic": "Facial nerve", "stem_html": "A 22 year old man undergoes a superficial parotidectomy for a pleomorphic adenoma. The operation does not proceed well and a diathermy malfunction results in division of the buccal branch of the facial nerve. Which of the following muscles will not demonstrate impaired function as a result?", "options": [{"label_html": "Zygomaticus minor", "is_correct": false}, {"label_html": "Mentalis", "is_correct": true}, {"label_html": "Buccinator", "is_correct": false}, {"label_html": "Levator anguli oris", "is_correct": false}, {"label_html": "Orbicularis oris", "is_correct": false}], "correct_index": 1, "explanation_html": "<b>Buccal branch supplies<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td>Zygomaticus minor<\/td><td>Elevates upper lip<\/td><\/tr><tr><td><\/td><\/tr><tr><td>Buccinator<\/td><td>Pulls corner of mouth backward and compresses cheek<\/td><\/tr><tr><td>Levator anguli oris<\/td><td>Pulls angles of mouth upward and toward midline<\/td><\/tr><tr><td>Orbicularis<\/td><td>Closes and tightens lips together<\/td><\/tr><tr><td>Nasalis<\/td><td>Flares nostrils and compresses nostrils<\/td><\/tr><\/tbody><\/table><\/div><br>The orbicularis oris has innervation by both the buccal and marginal mandibular branches of the facial nerve."}, {"number": 193, "topic": "Facial nerve", "stem_html": "Which of the following is not a direct branch of the facial nerve?", "options": [{"label_html": "Greater petrosal nerve", "is_correct": false}, {"label_html": "Nerve to stapedius", "is_correct": false}, {"label_html": "Auriculotemporal", "is_correct": true}, {"label_html": "Chorda tympani", "is_correct": false}, {"label_html": "Buccal branch of facial nerve", "is_correct": false}], "correct_index": 2, "explanation_html": "The auriculotemporal nerve is a direct branch of the mandibular nerve.<br>Other branches of the mandibular nerve include:<br>Lingual<br>Inferior alveolar<br>Nerve to the mylohyoid<br>Mental"}, {"number": 194, "topic": "Facial nerve", "stem_html": "Which of these muscles is innervated by the cervical branch of the facial nerve?", "options": [{"label_html": "Masseter", "is_correct": false}, {"label_html": "Sternocleidomastoid", "is_correct": false}, {"label_html": "Platysma", "is_correct": true}, {"label_html": "Geniohyoid", "is_correct": false}, {"label_html": "Sternothyroid", "is_correct": false}], "correct_index": 2, "explanation_html": "The cervical branch of the facial nerve innervates platysma."}], "note_html": "The facial nerve is the main nerve supplying the structures of the second embryonic branchial arch. It is predominantly an efferent nerve to the muscles of facial expression, digastric muscle and also to many glandular structures. It contains a few afferent fibres which originate in the cells of its genicular ganglion and are concerned with taste.<br><br><b>Supply<\/b> - 'face, ear, taste, tear'<br><ul><li>Face: muscles of facial expression<\/li><li>Ear: nerve to stapedius<\/li><li>Taste: supplies anterior two-thirds of tongue<\/li><li>Tear: parasympathetic fibres to lacrimal glands, also salivary glands<\/li><\/ul><br><b>Path<\/b><br><b>Subarachnoid path<\/b><br><ul><li>Origin: motor- pons, sensory- nervus intermedius<\/li><li>Pass through the petrous temporal bone into the internal auditory meatus with the vestibulocochlear nerve.  Here they combine to become the facial nerve.<\/li><\/ul><br><b>Facial canal path<\/b><br><ul><li>The canal passes superior to the vestibule of the inner ear<\/li><li>At the medial aspect of the middle ear, it becomes wider and contains the geniculate ganglion.<\/li><\/ul>  - 3 branches:<br>1. greater petrosal nerve<br>2. nerve to stapedius<br>3. chorda tympani<br><br><b>Stylomastoid foramen<\/b><br><ul><li>Passes through the stylomastoid foramen (tympanic cavity anterior and mastoid antrum posteriorly)<\/li><li>Posterior auricular nerve and branch to posterior belly of digastric and stylohyoid muscle <\/li><\/ul><br><b>Face<\/b><br>Enters parotid gland and divides into 5 branches:  <br><ul><li>Temporal branch <\/li><li>Zygomatic branch <\/li><li>Buccal branch <\/li><li>Marginal mandibular branch <\/li><li>Cervical branch<\/li><\/ul>"}, {"name": "Fascial compartments of the leg", "questions": [{"number": 195, "topic": "Fascial compartments of the leg", "stem_html": "How many compartments are there in the lower leg?", "options": [{"label_html": "2", "is_correct": false}, {"label_html": "1", "is_correct": false}, {"label_html": "3", "is_correct": false}, {"label_html": "5", "is_correct": false}, {"label_html": "4", "is_correct": true}], "correct_index": 4, "explanation_html": "The posterior compartment of the lower leg has both superficial and deep posterior layers, together with the anterior and lateral compartments this allows for four compartments. Decompression of the deep posterior compartment during fasciotomy may be overlooked with significant sequelae."}, {"number": 196, "topic": "Fascial compartments of the leg", "stem_html": "A 72 year old man with non reconstructible arterial disease is undergoing an above knee amputation. The posterior compartment muscles are divided. Which of the following muscles does not lie in the posterior compartment of the thigh?", "options": [{"label_html": "Biceps femoris", "is_correct": false}, {"label_html": "Quadriceps femoris", "is_correct": true}, {"label_html": "Semitendinosus", "is_correct": false}, {"label_html": "Semimembranosus", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 1, "explanation_html": "The quadriceps femoris lies in the anterior compartment."}, {"number": 197, "topic": "Fascial compartments of the leg", "stem_html": "A 66 year old man with peripheral vascular disease is undergoing a below knee amputation. In which of the lower leg compartments does peroneus brevis lie?", "options": [{"label_html": "Lateral compartment", "is_correct": true}, {"label_html": "Anterior compartment", "is_correct": false}, {"label_html": "Superficial posterior compartment", "is_correct": false}, {"label_html": "Deep posterior compartment", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 0, "explanation_html": "The interosseous membrane separates the anterior and posterior compartments.  The deep and superficial compartments are separated by the deep transverse fascia. The peroneus brevis is part of the lateral compartment."}, {"number": 198, "topic": "Fascial compartments of the leg", "stem_html": "Which of the following muscles is not within the posterior compartment of the lower leg?", "options": [{"label_html": "Peroneus brevis", "is_correct": true}, {"label_html": "Flexor digitorum longus", "is_correct": false}, {"label_html": "Soleus", "is_correct": false}, {"label_html": "Popliteus", "is_correct": false}, {"label_html": "Flexor hallucis longus", "is_correct": false}], "correct_index": 0, "explanation_html": "Peroneus brevis lies in the lateral compartment."}], "note_html": "<b>Compartments of the thigh<\/b> <br><br>Formed by septae passing from the femur to the fascia lata.<br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Compartment<\/b><\/th><th><b>Nerve<\/b><\/th><th><b>Muscles<\/b><\/th><th><b>Blood supply<\/b><\/th><\/tr><\/thead><tbody><tr><td>Anterior compartment<\/td><td>Femoral<\/td><td><ul><li>Iliacus <\/li><li>Tensor fasciae latae <\/li><li>Sartorius<\/li><li>Quadriceps femoris<\/li><\/ul><\/td><td>Femoral artery<\/td><\/tr><tr><td>Medial compartment<\/td><td>Obturator<\/td><td><ul><li>Adductor longus/magnus/brevis<\/li><li>Gracilis<\/li><li>Obturator externus<\/li><\/ul><\/td><td>Profunda femoris artery and obturator artery<\/td><\/tr><tr><td>Posterior compartment (2 layers)<\/td><td>Sciatic<\/td><td><ul><li>Semimembranosus<\/li><li>Semitendinosus<\/li><li>Biceps femoris<\/li><\/ul><\/td><td>Branches of Profunda femoris artery<\/td><\/tr><\/tbody><\/table><\/div><br><br><b>Compartments of the lower leg<\/b><br>Separated by the interosseous membrane (anterior and posterior compartments), anterior fascial septum (separate anterior and lateral compartments) and posterior fascial septum (separate lateral and posterior compartments)<br><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid2\"><thead><tr><th><b>Compartment<\/b><\/th><th><b>Nerve<\/b><\/th><th><b>Muscles<\/b><\/th><th><b>Blood supply<\/b><\/th><\/tr><\/thead><tbody><tr><td>Anterior compartment<\/td><td>Deep peroneal nerve<\/td><td><ul><li>Tibialis anterior<\/li><li>Extensor digitorum longus<\/li><li>Extensor hallucis longus<\/li><li>Peroneus tertius<\/li><\/ul><\/td><td>Anterior tibial artery<\/td><\/tr><tr><td>Posterior compartment<\/td><td>Tibial<\/td><td><ul><li>Muscles: deep and superficial compartments (separated by deep transverse fascia)<\/li><li>Deep: Flexor hallucis longus, Flexor digitalis longus, Tibialis posterior, Popliteus<\/li><li>Superficial: Gastrocnemius, Soleus, Plantaris<\/li><\/ul><\/td><td>Posterior tibial<\/td><\/tr><tr><td>Lateral compartment<\/td><td>Superficial peroneal<\/td><td><ul><li>Peroneus longus/brevis<\/li><\/ul><\/td><td>Peroneal artery<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Femoral nerve", "questions": [{"number": 199, "topic": "Femoral nerve", "stem_html": "The following are true of the femoral nerve, except:", "options": [{"label_html": "It is derived from L2, L3 and L4 nerve roots", "is_correct": false}, {"label_html": "It supplies sartorius", "is_correct": false}, {"label_html": "It supplies quadriceps femoris", "is_correct": false}, {"label_html": "It gives cutaneous innervations via the saphenous nerve", "is_correct": false}, {"label_html": "It supplies adductor longus", "is_correct": true}], "correct_index": 4, "explanation_html": "Adductor longus is supplied by the obturator nerve."}, {"number": 200, "topic": "Femoral nerve", "stem_html": "The following are true of the femoral nerve, except:", "options": [{"label_html": "It is derived from L2, L3 and L4 nerve roots", "is_correct": false}, {"label_html": "It supplies sartorius", "is_correct": false}, {"label_html": "It supplies quadriceps femoris", "is_correct": false}, {"label_html": "It gives cutaneous innervations via the saphenous nerve", "is_correct": false}, {"label_html": "It supplies adductor longus", "is_correct": true}], "correct_index": 4, "explanation_html": "Adductor longus is supplied by the obturator nerve."}, {"number": 201, "topic": "Femoral nerve", "stem_html": "An intravenous drug user develops a false aneurysm and requires emergency surgery. The procedure is difficult and the femoral nerve is inadvertently transected. Which of the following muscles is least likely to be affected as a result?", "options": [{"label_html": "Sartorius", "is_correct": false}, {"label_html": "Vastus medialis", "is_correct": false}, {"label_html": "Pectineus", "is_correct": false}, {"label_html": "Quadriceps femoris", "is_correct": false}, {"label_html": "Adductor magnus", "is_correct": true}], "correct_index": 4, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Mnemonic for femoral nerve supply <br><br>(don't) <b>M I S V Q Scan for PE<\/b><br><b>M<\/b> edial cutaneous nerve of the thigh<br><b>I<\/b> ntermediate cutaneous nerve of the thigh  <br><b>S<\/b> aphenous nerve<br><br><b>V<\/b> astus<br><b>Q<\/b> uadriceps femoris<br><b>S<\/b> artorius<br><br><b>PE<\/b> ectineus<\/div>Adductor magnus is innervated by the obturator and sciatic nerve. The pectineus muscle is sometimes supplied by the obturator nerve but this is variable. Since the question states <i>least likely<\/i>, the correct answer is adductor magnus."}, {"number": 202, "topic": "Femoral nerve", "stem_html": "A 22 year old man is shot in the groin. On examination, he has weak hip flexion, weak knee extension, and impaired quadriceps tendon reflex, as well as sensory deficit in the anteromedial aspect of the thigh. Which structure has been affected?", "options": [{"label_html": "Femoral nerve", "is_correct": true}, {"label_html": "Sciatic nerve", "is_correct": false}, {"label_html": "Superior gluteal nerve", "is_correct": false}, {"label_html": "Ilioinguinal nerve", "is_correct": false}, {"label_html": "Genitofemoral nerve", "is_correct": false}], "correct_index": 0, "explanation_html": "This is a classical description of a femoral nerve injury."}], "note_html": "<div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Root values<\/b><\/td><td>L2, 3, 4<\/td><\/tr><tr><td><b>Innervates<\/b><\/td><td><ul><li>Pectineus<\/li><li>Sartorius<\/li><li>Quadriceps femoris<\/li><li>Vastus lateralis/medialis/intermedius<\/li><li>Rectus femoris<\/li><\/ul><\/td><\/tr><tr><td><b>Branches<\/b><\/td><td><ul><li>Medial cutaneous nerve of thigh<\/li><li>Saphenous nerve<\/li><li>Intermediate cutaneous nerve of thigh<\/li><\/ul><\/td><\/tr><\/tbody><\/table><\/div><br><b>Path<\/b><br>Penetrates psoas major and exits the pelvis by passing under the inguinal ligament to enter the femoral triangle, lateral to the femoral artery and vein.<br><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb003b.jpg\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb003.jpg\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Femoral nerve\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb003b.jpg\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center><br>Mnemonic for femoral nerve supply <br><br>(don't) <b>M I S V Q Scan for PE<\/b><br><b>M<\/b> edial cutaneous nerve of the thigh<br><b>I<\/b> ntermediate cutaneous nerve of the thigh  <br><b>S<\/b> aphenous nerve<br><br><b>V<\/b> astus<br><b>Q<\/b> uadriceps femoris<br><b>S<\/b> artorius<br><br><b>PE<\/b> ectineus"}, {"name": "Femoral triangle anatomy", "questions": [{"number": 203, "topic": "Femoral triangle anatomy", "stem_html": "A 52 year old female renal patient needs a femoral catheter to allow for haemodialysis. Which of the structures listed below is least likely to be encountered during its insertion?", "options": [{"label_html": "Great saphenous vein", "is_correct": false}, {"label_html": "Deep circumflex iliac artery", "is_correct": true}, {"label_html": "Superficial circumflex iliac artery", "is_correct": false}, {"label_html": "Femoral vein", "is_correct": false}, {"label_html": "Femoral branch of the genitofemoral nerve", "is_correct": false}], "correct_index": 1, "explanation_html": "Femoral access catheters are typically inserted in the region of the femoral triangle. Therefore the physician may encounter the femoral, vein, nerve, branches of the femoral artery and tributaries of the femoral vein. The deep circumflex iliac artery arises above the inguinal ligament and is t
