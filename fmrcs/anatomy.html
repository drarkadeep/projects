n<\/b><\/td><td>Spinal nerves C4-6<\/td><\/tr><tr><td><b>Origin<\/b><\/td><td>Transverse processes C2 to C7<\/td><\/tr><tr><td><b>Insertion<\/b><\/td><td>First and second ribs<\/td><\/tr><tr><td><b>Important relations<\/b><\/td><td><ul><li>The brachial plexus and subclavian artery pass between the anterior and middle scalenes through a space called the scalene hiatus/fissure.<\/li><li>The subclavian vein and phrenic nerve pass anteriorly to the anterior scalene as it crosses over the first rib.<\/li><\/ul><\/td><\/tr><\/tbody><\/table><\/div><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb024b.jpg\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb024.jpg\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Scalene muscles\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb024b.jpg\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center><br><b>Thoracic outlet syndrome<\/b><br>The scalenes are at risk of adhering to the fascia surrounding the brachial plexus or shortening causing compression of the brachial plexus when it passes between the clavicle and 1st rib causing thoracic outlet syndrome."}, {"name": "Scaphoid bone", "questions": [{"number": 493, "topic": "Scaphoid bone", "stem_html": "A 24 year old man falls and sustains a fracture through his scaphoid bone. From which of the following areas does the scaphoid derive the majority of its blood supply?", "options": [{"label_html": "From its proximal medial border", "is_correct": false}, {"label_html": "From its proximal lateral border", "is_correct": false}, {"label_html": "From its proximal posterior surface", "is_correct": false}, {"label_html": "Superficial palmar arch vessels", "is_correct": false}, {"label_html": "Dorsal carpal branch vessels", "is_correct": true}], "correct_index": 4, "explanation_html": "The dorsal carpal branch vessels supply 80% of the scaphoid via retrograde flow. There is a minor supply from the superficial palmar arch vessels that supplies the distal 20% of the scaphoid."}, {"number": 494, "topic": "Scaphoid bone", "stem_html": "A 38 year old man falls onto an outstretched hand. Following the accident he is examined in the emergency department. On palpating his anatomical snuffbox there is tenderness noted in the base. What is the most likely injury in this scenario?", "options": [{"label_html": "Rupture of the tendon of flexor pollicis", "is_correct": false}, {"label_html": "Scaphoid fracture", "is_correct": true}, {"label_html": "Distal radius fracture", "is_correct": false}, {"label_html": "Rupture of flexor carpi ulnaris tendon", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 1, "explanation_html": "A fall onto an outstretched hand is a common mechanism of injury for a scaphoid fracture. This should be suspected clinically if there is tenderness in the base of the anatomical snuffbox. A tendon rupture would not result in bony tenderness."}], "note_html": "The scaphoid has a concave articular surface for the head of the capitate and at the edge of this is a crescentic surface for the corresponding area on the lunate. <br>Proximally, it has a wide convex articular surface with the radius. It has a distally sited tubercle that can be palpated. The remaining articular surface is to the lateral side of the tubercle. It faces laterally and is associated with the trapezium and trapezoid bones. <br><br>The narrow strip between the radial and trapezial surfaces and the tubercle gives rise to the radial collateral carpal ligament. <br><br><b>Blood supply<\/b><br>This is from the scaphoid tubercle vessels that comprise 20% and the dorsal ridge vessels that supply 80%.<br><br><i>Scaphoid bone<\/i><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb112b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb112.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Scaphoid bone\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb112b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}, {"name": "Sciatic nerve", "questions": [{"number": 495, "topic": "Sciatic nerve", "stem_html": "A 72 year old man develops a foot drop after a revision total hip replacement. Which nerve is likely to have been affected?", "options": [{"label_html": "Sciatic", "is_correct": true}, {"label_html": "Femoral", "is_correct": false}, {"label_html": "Obturator", "is_correct": false}, {"label_html": "Superior gluteal", "is_correct": false}, {"label_html": "Inferior gluteal", "is_correct": false}], "correct_index": 0, "explanation_html": "Whilst many of these nerves can be injured in hip surgery, for a foot drop to develop in this context (i.e. revision THR), the sciatic nerve is the most likely."}, {"number": 496, "topic": "Sciatic nerve", "stem_html": "At what level does the sciatic nerve usually bifurcate into the tibial and common peroneal nerves?", "options": [{"label_html": "At the superior aspect of the popliteal fossa", "is_correct": true}, {"label_html": "At the inferior aspect of the popliteal fossa", "is_correct": false}, {"label_html": "At the inferior border of gluteus maximus", "is_correct": false}, {"label_html": "At the inferior border of the piriformis muscle", "is_correct": false}, {"label_html": "In the pelvis", "is_correct": false}], "correct_index": 0, "explanation_html": "The sciatic nerve passes vertically downwards over the posterior surface of the obturator internus and quadratus femoris to the hamstring compartment of the thigh, here it is crossed posteriorly by the long head of biceps femoris. In the buttock it lies under the cover of gluteus maximus. It separates into its tibial and common peroneal components at the upper aspect of the popliteal fossa."}, {"number": 497, "topic": "Sciatic nerve", "stem_html": "At what level does the sciatic nerve usually bifurcate into the tibial and common peroneal nerves?", "options": [{"label_html": "At the superior aspect of the popliteal fossa", "is_correct": true}, {"label_html": "At the inferior aspect of the popliteal fossa", "is_correct": false}, {"label_html": "At the inferior border of gluteus maximus", "is_correct": false}, {"label_html": "At the inferior border of the piriformis muscle", "is_correct": false}, {"label_html": "In the pelvis", "is_correct": false}], "correct_index": 0, "explanation_html": "The sciatic nerve passes vertically downwards over the posterior surface of the obturator internus and quadratus femoris to the hamstring compartment of the thigh, here it is crossed posteriorly by the long head of biceps femoris. In the buttock it lies under the cover of gluteus maximus. It separates into its tibial and common peroneal components at the upper aspect of the popliteal fossa."}, {"number": 498, "topic": "Sciatic nerve", "stem_html": "A 34 year old man undergoes excision of a sarcoma from the right buttock. During the procedure the sciatic nerve is sacrificed. Which of the following will not occur as a result of this process?", "options": [{"label_html": "Loss of extension at the knee joint", "is_correct": true}, {"label_html": "Foot drop", "is_correct": false}, {"label_html": "Inability to extend extensor hallucis longus", "is_correct": false}, {"label_html": "Impaired function of gastrocnemius", "is_correct": false}, {"label_html": "Loss of sensation to the posterior aspect of the lower leg", "is_correct": false}], "correct_index": 0, "explanation_html": "Extension of the knee joint is caused by the obturator and femoral nerves. Sensation to the posterior aspect of the thigh is via the posterior cutaneous nerve of the thigh and this is a direct branch from the plexus itself."}, {"number": 499, "topic": "Sciatic nerve", "stem_html": "Which of the following muscles does not recieve any innervation from the sciatic nerve?", "options": [{"label_html": "Semimembranosus", "is_correct": false}, {"label_html": "Quadriceps femoris", "is_correct": true}, {"label_html": "Biceps femoris", "is_correct": false}, {"label_html": "Semitendinosus", "is_correct": false}, {"label_html": "Adductor magnus", "is_correct": false}], "correct_index": 1, "explanation_html": "The sciatic nerve is traditionally viewed as being a nerve of the posterior compartment. It is known to contribute to the innervation of adductor magnus (although the main innervation to this muscle is from the obturator nerve). The quadriceps femoris is nearly always innervated by the femoral nerve."}], "note_html": "The sciatic nerve is formed from the sacral plexus and is the largest nerve in the body. It is the continuation of the main part of the plexus arising from ventral rami of L4 to S3. These rami converge at the inferior border of piriformis to form the nerve itself. It passes through the inferior part of the greater sciatic foramen and emerges beneath piriformis. Medially, lie the inferior gluteal nerve and vessels and the pudendal nerve and vessels. It runs inferolaterally under the cover of gluteus maximus midway between the greater trochanter and ischial tuberosity. It receives its blood supply from the inferior gluteal artery. The nerve provides cutaneous sensation to the skin of the foot and the leg. It also innervates the posterior thigh muscles and the lower leg and foot muscles. The nerve splits into the tibial and common peroneal nerves approximately half way down the posterior thigh. The tibial nerve supplies the flexor muscles and the common peroneal nerve supplies the extensor muscles and the evertor muscles of the foot.<br><br><b>Summary points<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Origin<\/b><\/td><td>Spinal nerves L4 - S3<\/td><\/tr><tr><td><b>Articular Branches<\/b><\/td><td>Hip joint<\/td><\/tr><tr><td><b>Muscular branches in upper leg<\/b><\/td><td><ul><li>Semitendinosus<\/li><li>Semimembranosus<\/li><li>Biceps femoris<\/li><li>Part of adductor magnus<\/li><\/ul><\/td><\/tr><tr><td><b>Cutaneous sensation<\/b><\/td><td><ul><li>Posterior aspect of thigh (via cutaneous nerves)<\/li><li>Gluteal region<\/li><li>Entire lower leg (except the medial aspect)<\/li><\/ul><\/td><\/tr><tr><td><b>Terminates<\/b><\/td><td>At the upper part of the popliteal fossa by dividing into the tibial and peroneal nerves<\/td><\/tr><\/tbody><\/table><\/div><br><ul><li>The nerve to the short head of the biceps femoris comes from the common peroneal part of the sciatic and the other muscular branches arise from the tibial portion.<\/li><li>The tibial nerve goes on to innervate all muscles of the foot except the extensor digitorum brevis  (which is innervated by the common peroneal nerve).<\/li><\/ul>"}, {"name": "Scrotal and testicular anatomy", "questions": [{"number": 500, "topic": "Scrotal and testicular anatomy", "stem_html": "A 23 year old man undergoes an orchidectomy. The right testicular vein is ligated; into which structure does it drain?", "options": [{"label_html": "Right renal vein", "is_correct": false}, {"label_html": "Inferior vena cava", "is_correct": true}, {"label_html": "Common iliac vein", "is_correct": false}, {"label_html": "Internal iliac vein", "is_correct": false}, {"label_html": "External iliac vein", "is_correct": false}], "correct_index": 1, "explanation_html": "The testicular venous drainage begins in the septa and these veins together with those of the tunica vasculosa converge on the posterior border of the testis as the pampiniform plexus. The pampiniform plexus drains to the testicular vein. The left testicular vein drains into the left renal vein. The right testicular vein drains into the inferior vena cava."}, {"number": 501, "topic": "Scrotal and testicular anatomy", "stem_html": "A 2 year old boy is identified as having a communicating hydrocele and a decision is made to address this surgically. At the level of the testicle, between which of the following layers will the surgeon find accumulated fluid?", "options": [{"label_html": "Cremasteric and internal spermatic fascia", "is_correct": false}, {"label_html": "Dartos and external spermatic fascia", "is_correct": false}, {"label_html": "Ductus deferens and internal spermatic fascia", "is_correct": false}, {"label_html": "Internal and external spermatic fascia", "is_correct": false}, {"label_html": "Visceral and parietal layers of the tunica vaginalis", "is_correct": true}], "correct_index": 4, "explanation_html": "At its distal end, the patent processes vaginalis will envelop the testis. Both visceral and parietal layers will be present. Fluid of a hydrocele does not collect in the other spaces."}, {"number": 502, "topic": "Scrotal and testicular anatomy", "stem_html": "A 28 year old man has sustained a non salvageable testicular injury to his left testicle. The surgeon decides to perform an orchidectomy and divides the left testicular artery. From which of the following does this vessel originate?", "options": [{"label_html": "Abdominal aorta", "is_correct": true}, {"label_html": "Internal iliac artery", "is_correct": false}, {"label_html": "Inferior epigastric artery", "is_correct": false}, {"label_html": "Inferior vesical artery", "is_correct": false}, {"label_html": "External iliac artery", "is_correct": false}], "correct_index": 0, "explanation_html": "The testicular artery is a branch of the abdominal aorta."}, {"number": 503, "topic": "Scrotal and testicular anatomy", "stem_html": "A 17 year old male has a suspected testicular torsion and the scrotum is to be explored surgically. The surgeon incises the skin and then the dartos muscle. What is the next tissue layer that will be encountered during the dissection?", "options": [{"label_html": "Visceral layer of the tunica vaginalis", "is_correct": false}, {"label_html": "Cremasteric fascia", "is_correct": false}, {"label_html": "Parietal layer of the tunica vaginalis", "is_correct": false}, {"label_html": "External spermatic fascia", "is_correct": true}, {"label_html": "Internal spermatic fascia", "is_correct": false}], "correct_index": 3, "explanation_html": "The layers that will be encountered are (in order):<br>1. Skin<br>2. Dartos fascia and muscle<br>3. External spermatic fascia<br>4. Cremasteric muscle and fascia<br>5. Internal spermatic fascia<br>6. Parietal layer of the tunica vaginalis<br><br>The layers of the spermatic cord and scrotum are a popular topic in the MRCS exam.<br>A mnemonic which may help:<br>Some Damned Examiner Called It The Testes (skin dartos external fascia cremaster internal fascia tunica Testes)"}, {"number": 504, "topic": "Scrotal and testicular anatomy", "stem_html": "A 78 year old man develops a carcinoma of the scrotum. To which of the following lymph node groups may the tumour initially metastasise?", "options": [{"label_html": "Para aortic", "is_correct": false}, {"label_html": "Obturator", "is_correct": false}, {"label_html": "Inguinal", "is_correct": true}, {"label_html": "Meso rectal", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 2, "explanation_html": "The scrotum is drained by the inguinal nodes."}, {"number": 505, "topic": "Scrotal and testicular anatomy", "stem_html": "An 18 year old man is undergoing an orchidectomy via a scrotal approach. The surgeons mobilise the spermatic cord. From which of the following is the outermost layer of this structure derived?", "options": [{"label_html": "Internal oblique aponeurosis", "is_correct": false}, {"label_html": "External oblique aponeurosis", "is_correct": true}, {"label_html": "Transversalis fascia", "is_correct": false}, {"label_html": "Rectus sheath", "is_correct": false}, {"label_html": "Campers fascia", "is_correct": false}], "correct_index": 1, "explanation_html": "The outermost covering of the spermatic cord is derived from the external oblique aponeurosis.This layer is added as the cord passes through the superficial inguinal ring."}, {"number": 506, "topic": "Scrotal and testicular anatomy", "stem_html": "A 72 year old man develops a hydrocele which is being surgically managed. As part of the procedure the surgeons divide the tunica vaginalis. From which of the following is this structure derived?", "options": [{"label_html": "Peritoneum", "is_correct": true}, {"label_html": "External oblique aponeurosis", "is_correct": false}, {"label_html": "Internal oblique aponeurosis", "is_correct": false}, {"label_html": "Transversalis fascia", "is_correct": false}, {"label_html": "Rectus sheath", "is_correct": false}], "correct_index": 0, "explanation_html": "The tunica vaginalis is derived from peritoneum, it secretes the fluid that fills the hydrocele cavity."}], "note_html": "<b>Spermatic cord<\/b><br>Formed by the vas deferens and is covered by the following structures:<br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Layer<\/b><\/th><th><b>Origin<\/b><\/th><\/tr><\/thead><tbody><tr><td>Internal spermatic fascia<\/td><td>Transversalis fascia<\/td><\/tr><tr><td>Cremasteric fascia<\/td><td>From the fascial coverings of internal oblique<\/td><\/tr><tr><td>External spermatic fascia<\/td><td>External oblique aponeurosis<\/td><\/tr><\/tbody><\/table><\/div><br><b>Contents of the cord<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Vas deferens<\/b><\/td><td>Transmits sperm and accessory gland secretions<\/td><\/tr><tr><td><b>Testicular artery<\/b><\/td><td>Branch of abdominal aorta supplies testis and epididymis<\/td><\/tr><tr><td><b>Artery of vas deferens<\/b><\/td><td>Arises from inferior vesical artery<\/td><\/tr><tr><td><b>Cremasteric artery<\/b><\/td><td>Arises from inferior epigastric artery<\/td><\/tr><tr><td><b>Pampiniform plexus<\/b><\/td><td>Venous plexus, drains into right or left testicular vein<\/td><\/tr><tr><td><b>Sympathetic nerve fibres<\/b><\/td><td>Lie on arteries, the parasympathetic fibres lie on the vas<\/td><\/tr><tr><td><b>Genital branch of the genitofemoral nerve<\/b><\/td><td>Supplies cremaster<\/td><\/tr><tr><td><b>Lymphatic vessels<\/b><\/td><td>Drain to lumbar and para-aortic nodes<\/td><\/tr><\/tbody><\/table><\/div><br><b>Scrotum<\/b><br><ul><li>Composed of skin and closely attached dartos fascia. <\/li><li>Arterial supply from the anterior and posterior scrotal arteries<\/li><li>Lymphatic drainage to the inguinal lymph nodes<\/li><li>Parietal layer of the tunica vaginalis is the innermost layer<\/li><\/ul><br><b>Testes<\/b><br><ul><li>The testes are surrounded by the tunica vaginalis (closed peritoneal sac). The parietal layer of the tunica vaginalis adjacent to the internal spermatic fascia.<\/li><li>The testicular arteries arise from the aorta immediately inferiorly to the renal arteries.<\/li><li>The pampiniform plexus drains into the testicular veins, the left drains into the left renal vein and the right into the inferior vena cava.<\/li><li>Lymphatic drainage is to the para-aortic nodes.<\/li><\/ul>"}, {"name": "Scrotal sensation", "questions": [{"number": 507, "topic": "Scrotal sensation", "stem_html": "Which of the following nerves is the primary source of innervation to the anterior scrotal skin?", "options": [{"label_html": "Iliohypogastric nerve", "is_correct": false}, {"label_html": "Pudendal nerve", "is_correct": false}, {"label_html": "Ilioinguinal nerve", "is_correct": true}, {"label_html": "Femoral branch of the genitofemoral nerve", "is_correct": false}, {"label_html": "Obturator nerve", "is_correct": false}], "correct_index": 2, "explanation_html": "The pudendal nerve may innervate the posterior skin of the scrotum. The anterior innervation of the scrotum is primarily provided by the ilioinguinal nerve. The genital branch of the genitofemoral nerve provides a smaller contribution."}, {"number": 508, "topic": "Scrotal sensation", "stem_html": "Which of the following nerves is the primary source of innervation to the anterior scrotal skin?", "options": [{"label_html": "Iliohypogastric nerve", "is_correct": false}, {"label_html": "Pudendal nerve", "is_correct": false}, {"label_html": "Ilioinguinal nerve", "is_correct": true}, {"label_html": "Femoral branch of the genitofemoral nerve", "is_correct": false}, {"label_html": "Obturator nerve", "is_correct": false}], "correct_index": 2, "explanation_html": "The pudendal nerve may innervate the posterior skin of the scrotum. The anterior innervation of the scrotum is primarily provided by the ilioinguinal nerve. The genital branch of the genitofemoral nerve provides a smaller contribution."}], "note_html": "The scrotum is innervated by the ilioinguinal nerve and the pudendal nerve. The ilioinguinal nerve arises from L1 and pierces the internal oblique muscle. It eventually passes through the superficial inguinal ring to innervate the anterior skin of the scrotum.<br><br>The pudendal nerve is the principal nerve of the perineum. It arises in the pelvis from 3 nerve roots. It passes through both greater and lesser sciatic foramina to enter the perineal region. The perineal branches pass anteromedially and divide into posterior scrotal branches. The posterior scrotal branches pass superficially to supply the skin and fascia of the perineum. It cross communicates with the inferior rectal nerve."}, {"name": "Shoulder joint", "questions": [{"number": 509, "topic": "Shoulder joint", "stem_html": "Which muscle initiates abduction of the shoulder?", "options": [{"label_html": "Infraspinatus", "is_correct": false}, {"label_html": "Latissimus dorsi", "is_correct": false}, {"label_html": "Supraspinatus", "is_correct": true}, {"label_html": "Deltoid", "is_correct": false}, {"label_html": "Teres major", "is_correct": false}], "correct_index": 2, "explanation_html": "The intermediate portion of the deltoid muscle is the chief abductor of the humerus.  However, it can only do this after the movement has been initiated by supraspinatus.  Damage to the tendon of supraspinatus is a common form of rotator cuff disease."}, {"number": 510, "topic": "Shoulder joint", "stem_html": "Which of the following muscles does not adduct the shoulder?", "options": [{"label_html": "Teres major", "is_correct": false}, {"label_html": "Pectoralis major", "is_correct": false}, {"label_html": "Coracobrachialis", "is_correct": false}, {"label_html": "Supraspinatus", "is_correct": true}, {"label_html": "Latissimus dorsi", "is_correct": false}], "correct_index": 3, "explanation_html": "Supraspinatus is an abductor of the shoulder."}, {"number": 511, "topic": "Shoulder joint", "stem_html": "An injury to the spinal accessory nerve will have the greatest effect on which of the following movements?", "options": [{"label_html": "Lateral rotation of the arm", "is_correct": false}, {"label_html": "Adduction of the arm at the glenohumeral joint", "is_correct": false}, {"label_html": "Protraction of the scapula", "is_correct": false}, {"label_html": "Upward rotation of the scapula", "is_correct": true}, {"label_html": "Depression of the scapula", "is_correct": false}], "correct_index": 3, "explanation_html": "The spinal accessory nerve innervates trapezius. The entire muscle will retract the scapula. However, its upper and lower fibres act together to upwardly rotate it."}, {"number": 512, "topic": "Shoulder joint", "stem_html": "Which of the following structures passes through the quadrangular space near the humeral head?", "options": [{"label_html": "Axillary artery", "is_correct": false}, {"label_html": "Radial nerve", "is_correct": false}, {"label_html": "Axillary nerve", "is_correct": true}, {"label_html": "Median nerve", "is_correct": false}, {"label_html": "Transverse scapular artery", "is_correct": false}], "correct_index": 2, "explanation_html": "The quadrangular space is bordered by the humerus laterally, subscapularis  and teres minor superiorly, teres major inferiorly and the long head of triceps medially. It lies lateral to the triangular space. It transmits the axillary nerve and posterior circumflex humeral artery.<br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb098b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb098.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Quadrangular space\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb098b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}, {"number": 513, "topic": "Shoulder joint", "stem_html": "Into which of the following structures does the superior part of the fibrous capsule of the shoulder joint insert?", "options": [{"label_html": "The surgical neck of the humerus", "is_correct": false}, {"label_html": "The body of the humerus", "is_correct": false}, {"label_html": "The bicipital groove", "is_correct": false}, {"label_html": "Immediately distal to the greater tuberosity", "is_correct": false}, {"label_html": "The anatomical neck of the humerus", "is_correct": true}], "correct_index": 4, "explanation_html": "The shoulder joint is a shallow joint, hence its great mobility. However, this comes at the expense of stability. The fibrous capsule attaches to the anatomical neck superiorly and the surgical neck inferiorly"}, {"number": 514, "topic": "Shoulder joint", "stem_html": "Which of the following muscles inserts onto the lesser tuberosity of the humerus?", "options": [{"label_html": "Subscapularis", "is_correct": true}, {"label_html": "Deltoid", "is_correct": false}, {"label_html": "Supraspinatus", "is_correct": false}, {"label_html": "Teres minor", "is_correct": false}, {"label_html": "Infraspinatus", "is_correct": false}], "correct_index": 0, "explanation_html": "With the exception of subscapularis which inserts into the lesser tuberosity, the muscles of the rotator cuff insert into the greater tuberosity."}], "note_html": "<ul><li>Shallow synovial ball and socket type of joint. <\/li><li>It is an inherently unstable joint, but is capable to a wide range of movement.<\/li><li>Stability is provided by muscles of the rotator cuff that pass from the scapula to insert in the greater tuberosity (all except sub scapularis-lesser tuberosity).<\/li><\/ul><br><b>Glenoid labrum<\/b><br><ul><li>Fibrocartilaginous rim attached to the free edge of the glenoid cavity<\/li><li>Tendon of the long head of biceps arises from within the joint from the supraglenoid tubercle, and is fused at this point to the labrum.<\/li><li>The long head of triceps attaches to the infraglenoid tubercle<\/li><\/ul><br><b>Fibrous capsule<\/b><br><ul><li>Attaches to the scapula external to the glenoid labrum and to the labrum itself (postero-superiorly) <\/li><li>Attaches to the humerus at the level of the anatomical neck superiorly and the surgical neck inferiorly<\/li><li>Anteriorly the capsule is in contact with the tendon of subscapularis, superiorly with the supraspinatus tendon, and posteriorly with the tendons of infraspinatus and teres minor. All these blend with the capsule towards their insertion. <\/li><li>Two defects in the fibrous capsule; superiorly for the tendon of biceps. Anteriorly there is a defect beneath the subscapularis tendon.<\/li><li>The inferior extension of the capsule is closely related to the axillary nerve at the surgical neck and this nerve is at risk in anteroinferior dislocations. It also means that proximally sited osteomyelitis may progress to septic arthritis. <\/li><\/ul><br><b>Movements and muscles<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Flexion<\/b><\/td><td>Anterior part of deltoid<br>Pectoralis major<br>Biceps<br>Coracobrachialis<\/td><\/tr><tr><td><b>Extension<\/b><\/td><td>Posterior deltoid<br>Teres major<br>Latissimus dorsi<\/td><\/tr><tr><td><b>Adduction<\/b><\/td><td>Pectoralis major<br>Latissimus dorsi<br>Teres major<br>Coracobrachialis<\/td><\/tr><tr><td><b>Abduction<\/b><\/td><td>Mid deltoid<br>Supraspinatus<\/td><\/tr><tr><td><b>Medial rotation<\/b><\/td><td>Subscapularis<br>Anterior deltoid<br>Teres major<br>Latissimus dorsi<\/td><\/tr><tr><td><b>Lateral rotation<\/b><\/td><td>Posterior deltoid<br>Infraspinatus<br>Teres minor<\/td><\/tr><\/tbody><\/table><\/div><br><b>Important anatomical relations<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Anteriorly<\/b><\/td><td>Brachial plexus<br>Axillary artery and vein<\/td><\/tr><tr><td><b>Posterior<\/b><\/td><td>Suprascapular nerve<br>Suprascapular vessels<\/td><\/tr><tr><td><b>Inferior<\/b><\/td><td>Axillary nerve<br>Circumflex humeral vessels<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Sinoatrial node", "questions": [{"number": 515, "topic": "Sinoatrial node", "stem_html": "Which nerve directly innervates the sinoatrial node?", "options": [{"label_html": "Superior cardiac nerve", "is_correct": false}, {"label_html": "Right vagus nerve", "is_correct": false}, {"label_html": "Left vagus nerve", "is_correct": false}, {"label_html": "Inferior cardiac nerve", "is_correct": false}, {"label_html": "None of the above", "is_correct": true}], "correct_index": 4, "explanation_html": "No single one of the above nerves is responsible for direct cardiac innervation (which those who have handled the heart surgically will appreciate).<br>The heart receives its nerves from the superficial and deep cardiac plexuses.  The cardiac plexuses send small branches to the heart along the major vessels, continuing with the right and left coronary arteries.  The vagal efferent fibres emerge from the brainstem in the roots of the vagus and accessory nerves, and run to ganglia in the cardiac plexuses and within the heart itself.<br><br>The background vagal discharge serves to limit heart rate, and loss of this background vagal tone accounts for the higher resting heart rate seen following cardiac transplant."}], "note_html": "<ul><li>Located in the wall of the right atrium in the upper part of the sulcus terminalis from which it extends anteriorly over the opening of the superior vena cava.<\/li><li>In most cases it is supplied by the right coronary artery.<\/li><li>It has a complicated nerve supply from the cardiac nerve plexus that takes both sympathetic and parasympathetic fibres that run alongside the main vessels.<\/li><\/ul>"}, {"name": "Spinal cord", "questions": [{"number": 516, "topic": "Spinal cord", "stem_html": "A 56 year old man suddenly develops severe back pain. His pain has a radicular pattern. On examination, he is unable to extend his great toe. Which of the spinal levels listed below is most likely to have been affected?", "options": [{"label_html": "L5", "is_correct": true}, {"label_html": "L4", "is_correct": false}, {"label_html": "L3", "is_correct": false}, {"label_html": "L2", "is_correct": false}, {"label_html": "L1", "is_correct": false}], "correct_index": 0, "explanation_html": "Extensor hallucis longus is derived from L5 and loss of EHL function is a useful test to determine whether this level is involved."}, {"number": 517, "topic": "Spinal cord", "stem_html": "A man with lung cancer and bone metastasis in the thoracic spinal vertebral bodies, sustains a pathological fracture at the level of T4. The fracture is unstable and the spinal cord is severely compressed at this level. Which of the findings below will not be present 6 weeks after injury?", "options": [{"label_html": "Extensor plantar reflexes", "is_correct": false}, {"label_html": "Spasticity of the lower limbs", "is_correct": false}, {"label_html": "Diminished patellar tendon reflex", "is_correct": true}, {"label_html": "Urinary incontinence", "is_correct": false}, {"label_html": "Sensory ataxia", "is_correct": false}], "correct_index": 2, "explanation_html": "A thoracic cord lesion causes spastic paraperesis, hyperrflexia and extensor plantar responses (UMN lesion), incontinence, sensory loss below the lesion and 'sensory' ataxia.These features typically manifest several weeks later, once spinal shock (in which areflexia predominates) has resolved."}, {"number": 518, "topic": "Spinal cord", "stem_html": "A builder falls off  a ladder whilst laying roof tiles. He sustains a burst fracture of L2. The MRI scan shows complete nerve transection at this level, as a result of the injury. Which clinical sign will not be present initially?", "options": [{"label_html": "Flaccid paralysis of the legs", "is_correct": false}, {"label_html": "Extensor plantar response", "is_correct": true}, {"label_html": "Sensory loss in the legs", "is_correct": false}, {"label_html": "Incontinence", "is_correct": false}, {"label_html": "Areflexia", "is_correct": false}], "correct_index": 1, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">In lower motor neuron lesions everything is reduced<br><br><\/div>The main purpose of this question is to differentiate the features of an UMN lesion and a LMN lesion.  The features of a LMN lesion include:<br><ul><li>Flaccid paralysis of muscles supplied<\/li><li>Atrophy of muscles supplied.<\/li><li>Loss of reflexes of muscles supplied.<\/li><li>Muscles fasciculation <\/li><\/ul>For lesions below L1 LMN signs will occur.  Hence in an L3 lesion, there will be loss of the patella reflex but there will be no extensor plantar reflex."}, {"number": 519, "topic": "Spinal cord", "stem_html": "A builder falls off  a ladder whilst laying roof tiles. He sustains a burst fracture of L2. The MRI scan shows complete nerve transection at this level, as a result of the injury. Which clinical sign will not be present initially?", "options": [{"label_html": "Flaccid paralysis of the legs", "is_correct": false}, {"label_html": "Extensor plantar response", "is_correct": true}, {"label_html": "Sensory loss in the legs", "is_correct": false}, {"label_html": "Incontinence", "is_correct": false}, {"label_html": "Areflexia", "is_correct": false}], "correct_index": 1, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">In lower motor neuron lesions everything is reduced<br><br><\/div>The main purpose of this question is to differentiate the features of an UMN lesion and a LMN lesion.  The features of a LMN lesion include:<br><ul><li>Flaccid paralysis of muscles supplied<\/li><li>Atrophy of muscles supplied.<\/li><li>Loss of reflexes of muscles supplied.<\/li><li>Muscles fasciculation <\/li><\/ul>For lesions below L1 LMN signs will occur.  Hence in an L3 lesion, there will be loss of the patella reflex but there will be no extensor plantar reflex."}, {"number": 520, "topic": "Spinal cord", "stem_html": "Which of the following structures suspends the spinal cord in the dural sheath?", "options": [{"label_html": "Filum terminale", "is_correct": false}, {"label_html": "Conus medullaris", "is_correct": false}, {"label_html": "Ligamentum flavum", "is_correct": false}, {"label_html": "Denticulate ligaments", "is_correct": true}, {"label_html": "Anterior longitudinal ligament", "is_correct": false}], "correct_index": 3, "explanation_html": "The spinal cord is approximately 45cm in men and 43cm in women.  The denticulate ligament is a continuation of the pia mater (innermost covering of the spinal cord) which has intermittent lateral projections attaching the spinal cord to the dura mater."}], "note_html": "- Located in a canal within the vertebral column that affords it structural support.<br><ul><li>Rostrally it continues to the medulla oblongata of the brain and caudally it tapers at a level corresponding to the L1-2 interspace (in the adult), a central structure, the filum terminale anchors the cord to the first coccygeal vertebra.<\/li><li>The spinal cord is characterised by cervico-lumbar enlargements and these, broadly speaking, are the sites which correspond to the brachial and lumbar plexuses respectively.<\/li><\/ul><br>There are some key points to note when considering the surgical anatomy of the spinal cord:<br><br>* During foetal growth the spinal cord becomes shorter than the spinal canal, hence the adult site of cord termination at the <b>L1-2 level<\/b>.<br><br>* Due to growth of the vertebral column the spine segmental levels may not always correspond to bony landmarks as they do in the cervical spine.<br><br>* The spinal cord is incompletely divided into two symmetrical halves by a <b>dorsal median sulcus<\/b> and <b>ventral median fissure<\/b>. Grey matter surrounds a central canal that is continuous rostrally with the ventricular system of the CNS. <br><br>* The grey matter is sub divided cytoarchitecturally into <b>Rexeds laminae<\/b>.<br><br>* Afferent fibres entering through the dorsal roots usually terminate near their point of entry but may travel for varying distances in <b>Lissauers tract<\/b>. In this way they may establish synaptic connections over several levels<br><br>* At the tip of the dorsal horn are afferents associated with nociceptive stimuli. The ventral horn contains neurones that innervate skeletal muscle.<br><br>The key point to remember when revising CNS anatomy is to keep a clinical perspective in mind. So it is worth classifying the ways in which the spinal cord may become injured. These include:<br><br><ul><li><b>Trauma<\/b> either direct or as a result of disc protrusion<\/li><li><b>Neoplasia<\/b> either by direct invasion (rare) or as a result of pathological vertebral fracture<\/li><li><b>Inflammatory diseases<\/b> such as Rheumatoid disease, or OA (formation of osteophytes compressing nerve roots etc.<\/li><li><b>Vascular<\/b> either as a result of stroke (rare in cord) or as complication of aortic dissection<\/li><li><b>Infection<\/b> historically diseases such as TB, epidural abscesses.<\/li><\/ul><br>The anatomy of the cord will, to an extent dictate the clinical presentation. Some points/ conditions to remember:<br><br><ul><li>Brown- Sequard syndrome-Hemisection of the cord producing ipsilateral loss of proprioception and upper motor neurone signs, plus contralateral loss of pain and temperature sensation. The explanation of this is that the fibres decussate at different levels.<\/li><li>Lesions below L1 will tend to present with lower motor neurone signs<\/li><\/ul>"}, {"name": "Spinothalamic tract", "questions": [{"number": 521, "topic": "Spinothalamic tract", "stem_html": "A 22 year old man is undergoing a wedge excision of his great toenail. As the surgeon passes a needle into the area to administer local anaesthetic, the patient notices a sharp pain. By which pathway will this sensation be conveyed to the central nervous system?", "options": [{"label_html": "Anterior corticospinal tract", "is_correct": false}, {"label_html": "Posterior spinocerebellar tract", "is_correct": false}, {"label_html": "Cuneate fasciculus", "is_correct": false}, {"label_html": "Vestibulospinal tract", "is_correct": false}, {"label_html": "Spinothalamic tract", "is_correct": true}], "correct_index": 4, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Spinothalamic tract- Pain and temperature<br>Vestibulospinal tract- Motor neuronal signals relating to posture<br>Cuneate fasciculus- Fine touch, pressure and proprioception<br>Posterior spinocerebellar tract- Proprioceptive signals to cerebellum<br>Anterior corticospinal tract- Conveys motor signals from precentral gyrus to motor cells within the cord<\/div>Pain impulses are transmitted via the spinothalamic tract"}], "note_html": "The spinothalamic tract transmits impulses from receptors which measure crude touch, pain and temperature. The spinothalamic tract comprises the lateral and anterior spinothalamic tracts, the former typically transmits pain and temperature and the latter crude touch and pressure. Neurones transmitting these signals will typically ascend by one or two vertebral levels in Lissaurs tract prior to decussating in the spinal cord itself. Neurones then pass rostrally in the cord to connect at the thalamus."}, {"name": "Spleen", "questions": [{"number": 522, "topic": "Spleen", "stem_html": "Which of the following statements about the spleen is false?", "options": [{"label_html": "The hilum contains the splenic vessels.", "is_correct": false}, {"label_html": "The spleen is derived from endodermal tissue.", "is_correct": true}, {"label_html": "The white pulp has immune function.", "is_correct": false}, {"label_html": "The colon lies inferiorly.", "is_correct": false}, {"label_html": "Weighs 150g.", "is_correct": false}], "correct_index": 1, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\"><b>1,3,5,7,9,11 (odd numbers up to 11)<\/b><br><br>The spleen is: 1 inch thick, 3 inches wide, 5 inches long, weighs 7oz (150-200g), lies between the 9th and 11th ribs<\/div>Most of the gut is derived endodermally except for the spleen which is from mesenchymal tissue."}, {"number": 523, "topic": "Spleen", "stem_html": "Where are accessory spleens not found?", "options": [{"label_html": "Gonads", "is_correct": false}, {"label_html": "Tail of pancreas", "is_correct": false}, {"label_html": "Greater omentum", "is_correct": false}, {"label_html": "Splenorenal ligament", "is_correct": false}, {"label_html": "Ureter", "is_correct": true}], "correct_index": 4, "explanation_html": "Accessory spleens <br><br>  - 10% population<br>  - 1 cm size<br>  - locations: hilum of the spleen, tail of the pancreas, along the splenic vessels, in the gastrosplenic ligament, the splenorenal ligament, the walls of the stomach or intestines, the greater omentum, the mesentery, the gonads"}], "note_html": "The spleen is located in the left upper quadrant of the abdomen and its size can vary depending upon the amount of blood it contains. The typical adult spleen is 12.5cm long and 7.5cm wide. The usual weight of the adult spleen is 150g.<br>The exact position of the spleen can vary with respiratory activity, posture and the state of surrounding viscera. It usually lies obliquely with its long axis aligned to the 9th, 10th and 11th ribs. It is separated from these ribs by both diaphragm and pleural cavity. The normal spleen is not palpable. <br><br>The shape of the spleen is influenced by the state of the colon and stomach. Gastric distension will cause the spleen to resemble the shape of an orange segment. Colonic distension will cause it to become more tetrahedral. <br><br>The spleen is almost entirely covered by peritoneum, which adheres firmly to its capsule. Recesses of the greater sac separate it from the stomach and kidney. It develops from the upper dorsal mesogastrium, remaining connected to the posterior abdominal wall and stomach by two folds of peritoneum; the lienorenal ligament and gastrosplenic ligament. The lienorenal ligament is derived from peritoneum where the wall of the general peritoneum meets the omental bursa between the left kidney and spleen; the splenic vessels lie in its layers. The gastrosplenic ligament also has two layers, formed by the meeting of the walls of the greater sac and omental bursa between spleen and stomach, the short gastric and left gastroepiploic branches of the splenic artery pass in its layers. Laterally, the spleen is in contact with the phrenicocolic ligament. <br><br><br><b>Relations<\/b><br><div class=\"table-responsive\"><table class=\"tb\"><tbody><tr><td><b>Superiorly<\/b><\/td><td>Diaphragm<\/td><\/tr><tr><td><b>Anteriorly<\/b><\/td><td>Gastric impression<\/td><\/tr><tr><td><b>Posteriorly<\/b><\/td><td>Kidney<\/td><\/tr><tr><td><b>Inferiorly<\/b><\/td><td>Colon<\/td><\/tr><tr><td><b>Hilum<\/b><\/td><td>Tail of pancreas and splenic vessels (splenic artery divides here, branches pass to the white pulp transporting plasma)<\/td><\/tr><\/tbody><\/table><\/div><br><b>Contents<\/b><br><div class=\"table-responsive\"><table class=\"tb\"><tbody><tr><td><b>White pulp<\/b><\/td><td>Immune function. Contains central trabecular artery. The germinal centres are supplied by arterioles called penicilliary radicles.<\/td><\/tr><tr><td><b>Red pulp<\/b><\/td><td>Filters abnormal red blood cells.<\/td><\/tr><\/tbody><\/table><\/div><br><b>Function<\/b><br><ul><li>Filtration of abnormal blood cells and foreign bodies such as bacteria.<\/li><li>Immunity: IgM.  Production of properdin, and tuftsin which help target fungi and bacteria for phagocytosis. <\/li><li>Haematopoiesis: up to 5th month gestation or in haematological disorders.<\/li><li>Pooling: storage of 40% platelets.<\/li><li>Iron reutilisation<\/li><li>Storage monocytes<\/li><\/ul><br><b>Disorders of the spleen<\/b><br>Massive splenomegaly<br><ul><li>Myelofibrosis<\/li><li>Chronic myeloid leukaemia<\/li><li>Visceral leishmaniasis (kala-azar)<\/li><li>Malaria<\/li><li>Gaucher's syndrome<\/li><\/ul><br>Other causes (as above plus)<br><ul><li>Portal hypertension e.g. secondary to cirrhosis<\/li><li>Lymphoproliferative disease e.g.  CLL, Hodgkin's<\/li><li>Haemolytic anaemia<\/li><li>Infection: hepatitis, glandular fever<\/li><li>Infective endocarditis<\/li><li>Sickle-cell*, thalassaemia<\/li><li>Rheumatoid arthritis (Felty's syndrome)<\/li><\/ul><br>*the majority of adult patients with sickle-cell will have an atrophied spleen due to repeated infarction"}, {"name": "Splenic anatomy", "questions": [{"number": 524, "topic": "Splenic anatomy", "stem_html": "An enthusiastic surgical registrar undertakes his first solo splenectomy. The operation is far more difficult than anticipated and the registrar leaves a tube drain to the splenic bed at the end of the procedure. Over the following 24 hours approximately 500ml of clear fluid has entered the drain. Biochemical testing of the fluid is most likely to reveal:", "options": [{"label_html": "Elevated creatinine", "is_correct": false}, {"label_html": "Elevated triglycerides", "is_correct": false}, {"label_html": "Elevated glucagon", "is_correct": false}, {"label_html": "Elevated amylase", "is_correct": true}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 3, "explanation_html": "During splenectomy the tail of the pancreas may be damaged. The pancreatic duct will then drain into the splenic bed, amylase is the most likely biochemical finding. Glucagon is not secreted into the pancreatic duct."}, {"number": 525, "topic": "Splenic anatomy", "stem_html": "A 63 year old man is due to undergo a splenectomy. Which splenic structure lies most posteriorly?", "options": [{"label_html": "Gastrosplenic ligament", "is_correct": false}, {"label_html": "Splenic vein", "is_correct": false}, {"label_html": "Splenic artery", "is_correct": false}, {"label_html": "Splenic notch", "is_correct": false}, {"label_html": "Lienorenal ligament", "is_correct": true}], "correct_index": 4, "explanation_html": "The lienorenal ligament lies most posteriorly. The antero-lateral connection is via the phrenicocolic ligament. Anteriorly the gastro splenic ligament. These structures condense around the vessels at the splenic hilum."}, {"number": 526, "topic": "Splenic anatomy", "stem_html": "A 32 year old man is undergoing a splenectomy. Division of which of the following will be necessary during the procedure?", "options": [{"label_html": "Left crus of diaphragm", "is_correct": false}, {"label_html": "Short gastric vessels", "is_correct": true}, {"label_html": "Gerotas fascia", "is_correct": false}, {"label_html": "Splenic flexure of colon", "is_correct": false}, {"label_html": "Marginal artery", "is_correct": false}], "correct_index": 1, "explanation_html": "During a splenectomy the short gastric vessels which lie within the gastrosplenic ligament will need to be divided. The splenic flexure of the colon may need to be mobilised. However, it will almost never need to be divided, as this is watershed area that would necessitate a formal colonic resection in the event of division."}], "note_html": "The spleen is the largest lymphoid organ in the body. It is an intraperitoneal organ, the peritoneal attachments condense at the hilum where the vessels enter the spleen. Its blood supply is from the splenic artery (derived from the coeliac axis) and the splenic vein (which is joined by the IMV and unites with the SMV).<br><br><ul><li>Embryology: derived from mesenchymal tissue<\/li><li>Shape: clenched fist<\/li><li>Position: below 9th-12th ribs<\/li><li>Weight: 75-150g<\/li><\/ul><br><b>Relations<\/b><br><ul><li>Superiorly- diaphragm<\/li><li>Anteriorly- gastric impression<\/li><li>Posteriorly- kidney<\/li><li>Inferiorly- colon<\/li><li>Hilum: tail of pancreas and splenic vessels <\/li><li>Forms apex of lesser sac (containing short gastric vessels)<\/li><\/ul>"}, {"name": "Sternal angle", "questions": [{"number": 527, "topic": "Sternal angle", "stem_html": "Which structure is least likely to be found at the level of the sternal angle?", "options": [{"label_html": "Left brachiocephalic vein", "is_correct": true}, {"label_html": "Intervertebral discs T4-T5", "is_correct": false}, {"label_html": "Start of aortic arch", "is_correct": false}, {"label_html": "2nd pair of costal cartilages", "is_correct": false}, {"label_html": "Bifurcation of the trachea into left and right bronchi", "is_correct": false}], "correct_index": 0, "explanation_html": "The left brachiocephalic vein lies posterior to the manubrium, at the level of its upper border. The sternal angle refers to the transition between manubrium and sternum and therefore will not include the left brachiocephalic vein."}, {"number": 528, "topic": "Sternal angle", "stem_html": "A 22 year old man is stabbed in the chest at the level of the junction between the sternum and manubrium.  Which structure is at greatest risk?", "options": [{"label_html": "Left atrium", "is_correct": false}, {"label_html": "Oesophagus", "is_correct": false}, {"label_html": "Thyroid gland", "is_correct": false}, {"label_html": "Inferior vena cava", "is_correct": false}, {"label_html": "Aortic arch", "is_correct": true}], "correct_index": 4, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Mnemonic for lower sternal angle:<br>Red, white, blue and air 2 <br><br>Red- arch of aorta <br>White- the thoracic duct crosses at the midline <br>Bue- azygous joins the svc <br>Air- tracheal bifurcation <br>2- costal cartilage of the second rib<\/div>At the level of the Angle of Louis (Manubriosternal angle), is the surface marking for the aortic arch. The oesophagus is posteriorly located and at less risk."}], "note_html": "<b>Anatomical structures at the level of the manubrium and upper sternum<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Upper part of the manubrium<\/b><\/td><td><ul><li>Left brachiocephalic vein<\/li><li>Brachiocephalic artery<\/li><li>Left common carotid<\/li><li>Left subclavian artery<\/li><\/ul><\/td><\/tr><tr><td><b>Lower part of the manubrium/ manubrio-sternal angle<\/b><\/td><td><ul><li>Costal cartilages of the 2nd ribs<\/li><li>Transition point between superior and inferior mediastinum<\/li><li>Arch of the aorta<\/li><li>Tracheal bifurcation<\/li><li>Union of the azygos vein and superior vena cava<\/li><li>The thoracic duct crosses to the midline<\/li><\/ul><\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Sternocleidomastoid", "questions": [{"number": 529, "topic": "Sternocleidomastoid", "stem_html": "Which of the following nerves is responsible for the motor innervation of the sternocleidomastoid muscle?", "options": [{"label_html": "Ansa cervicalis", "is_correct": false}, {"label_html": "Accessory nerve", "is_correct": true}, {"label_html": "Hypoglossal nerve", "is_correct": false}, {"label_html": "Facial nerve", "is_correct": false}, {"label_html": "Vagus nerve", "is_correct": false}], "correct_index": 1, "explanation_html": "The motor supply to the sternocleidomastoid is from the accessory nerve. The ansa cervicalis supplies sensory information from the muscle."}, {"number": 530, "topic": "Sternocleidomastoid", "stem_html": "Which of the following nerves is responsible for the motor innervation of the sternocleidomastoid muscle?", "options": [{"label_html": "Ansa cervicalis", "is_correct": false}, {"label_html": "Accessory nerve", "is_correct": true}, {"label_html": "Hypoglossal nerve", "is_correct": false}, {"label_html": "Facial nerve", "is_correct": false}, {"label_html": "Vagus nerve", "is_correct": false}], "correct_index": 1, "explanation_html": "The motor supply to the sternocleidomastoid is from the accessory nerve. The ansa cervicalis supplies sensory information from the muscle."}, {"number": 531, "topic": "Sternocleidomastoid", "stem_html": "Which of the following statements relating to sternocleidomastoid is untrue?", "options": [{"label_html": "The external jugular vein lies posteromedially.", "is_correct": true}, {"label_html": "It is supplied by the accessory nerve.", "is_correct": false}, {"label_html": "It has two heads of origin", "is_correct": false}, {"label_html": "It inserts into the lateral aspect of the mastoid process.", "is_correct": false}, {"label_html": "It marks the anterior border of the posterior triangle.", "is_correct": false}], "correct_index": 0, "explanation_html": "The external jugular vein lies lateral (i.e. superficial) to the sternocleidomastoid."}], "note_html": "<b>Anatomy<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Origin<\/b><\/td><td>Rounded tendon attached to upper manubrium sterni and muscular head attached to medial third of the clavicle<\/td><\/tr><tr><td><b>Insertion<\/b><\/td><td>Mastoid process of the temporal bone and lateral area of the superior nuchal line of the occipital bone<\/td><\/tr><tr><td><b>Innervation<\/b><\/td><td>Spinal part of accessory nerve and anterior rami of C2 and C3 (proprioception)<\/td><\/tr><tr><td><b>Action<\/b><\/td><td><ul><li>Both: extend the head at atlanto-occipital joint and flex the cervical vertebral column.  Accessory muscles of inspiration.<\/li><li>Single: lateral flexion of neck, rotates head so face looks upward to the opposite side<\/li><\/ul><\/td><\/tr><\/tbody><\/table><\/div><br>Sternocleidomastoid divides the anterior and posterior triangles of the neck."}, {"name": "Stomach anatomy", "questions": [{"number": 532, "topic": "Stomach anatomy", "stem_html": "A 70 year old man undergoes an oesophagectomy and an oesophagogastric anastomosis is constructed. The arterial supply to the gastric component is mainly provided by which of these vessels?", "options": [{"label_html": "Short gastric arteries", "is_correct": false}, {"label_html": "Left gastric artery", "is_correct": false}, {"label_html": "Right gastroepiploic artery", "is_correct": true}, {"label_html": "Left gastroepiploic artery", "is_correct": false}, {"label_html": "Common hepatic artery", "is_correct": false}], "correct_index": 2, "explanation_html": "The resection of the proximal stomach which is performed in these cases together with the gastric mobilisation required results in the division of all vessels except the right gastro-epiploic artery which then supplies the gastric remnant. It is this precarious supply that can result in conduit necrosis."}], "note_html": "The abdominal oesophagus enters the stomach through the cardiac orifice, it tends to lie around the level of T11 although this can vary considerably. The pyloric orifice tends to lie on a level of L1 (the transpyloric plane) although this, too, can vary. <br><br>Structurally, the stomach comprises fundic, body and pyloric regions. The body is comprises most of the gastric surface area. The anterior and posterior surfaces of the stomach unite at the greater and lesser curvatures. The peritoneum on the anterior and posterior surfaces of the stomach unites at the greater curvature to form the gastrosplenic ligament above and the anterior layer of the greater omentum below. <br><br>There are three muscular layers to the stomach wall; circular muscle fibres, longitudinal fibres and oblique fibres. <br><br><b>Blood supply<\/b><br><div class=\"alert alert-warning\">Left gastric artery<br>Short gastric vessels<br>Gastro-epiploic arteries<br><\/div><br>The veins draining the stomach accompany the arteries. The right and left gastric veins drain directly into the portal vein. The right gastro-epiploic vein either drains into the SMV or middle colic vein. The left gastro-epiploic and short gastric veins drain into the splenic vein.<br><br><b>Innervation<\/b><br><div class=\"alert alert-warning\">Sympathetic nerves arise from the coeliac ganglia with post ganglionic fibres accompanying the arteries.<br>Parasympathetic innervation is from the anterior and posterior vagal trunks<br><\/div>"}, {"name": "Subclavian artery", "questions": [{"number": 533, "topic": "Subclavian artery", "stem_html": "Which of the following is not a branch of the subclavian artery?", "options": [{"label_html": "Superior thyroid artery", "is_correct": true}, {"label_html": "Vertebral artery", "is_correct": false}, {"label_html": "Thyrocervical trunk", "is_correct": false}, {"label_html": "Internal thoracic artery", "is_correct": false}, {"label_html": "Dorsal scapular artery", "is_correct": false}], "correct_index": 0, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Mnemonic for the branches of the subclavian artery: VIT C &amp; D<br><br>V ertebral artery<br>I nternal thoracic<br>T hyrocervical trunk<br><br>C ostalcervical trunk<br>D orsal scapular<\/div>Superior thyroid artery is a branch of the external carotid artery."}, {"number": 534, "topic": "Subclavian artery", "stem_html": "Which of the following structures separates the subclavian artery from the subclavian vein?", "options": [{"label_html": "Scalenus anterior", "is_correct": true}, {"label_html": "Scalenus medius", "is_correct": false}, {"label_html": "Sternocleidomastoid", "is_correct": false}, {"label_html": "Pectoralis major", "is_correct": false}, {"label_html": "Pectoralis minor", "is_correct": false}], "correct_index": 0, "explanation_html": "The artery and vein are separated by scalenus anterior. This muscle runs from the transverse processes of C3,4,5 and 6 to insert onto the scalene tubercle of the first rib."}, {"number": 535, "topic": "Subclavian artery", "stem_html": "A 52 year old male attends the stroke unit with dizziness and vertigo while playing tennis.  He is known to have hypertension and  a previous myocardial infarct.  He now complains of right arm pain.  What is the most likely diagnosis?", "options": [{"label_html": "Posterior circulation infarct", "is_correct": false}, {"label_html": "Vertebrobasilar aneurysm", "is_correct": false}, {"label_html": "Dissection of thoracic aorta", "is_correct": false}, {"label_html": "Subclavian steal syndrome", "is_correct": true}, {"label_html": "Left middle cerebral artery infarct", "is_correct": false}], "correct_index": 3, "explanation_html": "Subclavian steal syndrome characteristically presents with posterior circulation symptoms, such as dizziness and vertigo, during exertion of an arm.  There is subclavian artery steno-occlusive disease proximal to the origin of the vertebral artery and is associated with flow reversal in the vertebral artery.  Management involves percutaneous transluminal angioplasty or a stent."}], "note_html": "<b>Path<\/b><br><ul><li>The left subclavian comes directly off the arch of aorta<\/li><li>The right subclavian arises from the  brachiocephalic artery (trunk) when it bifurcates into the subclavian and the right common carotid artery. <\/li><li>From its origin, the subclavian artery travels laterally, passing between anterior and middle scalene muscles, deep to scalenus anterior and anterior to scalenus medius.  As the subclavian artery crosses the lateral border of the first rib, it becomes the axillary artery.  At this point it is superficial and within the subclavian triangle.<\/li><\/ul><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb019b.jpg\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb019.jpg\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Subclavian artery\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb019b.jpg\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center><br><b>Branches<\/b><br><ul><li>Vertebral artery<\/li><li>Internal thoracic artery<\/li><li>Thyrocervical trunk<\/li><li>Costocervical trunk<\/li><li>Dorsal scapular artery<\/li><\/ul>"}, {"name": "Submandibular gland", "questions": [{"number": 536, "topic": "Submandibular gland", "stem_html": "A 22 year old woman has recently undergone a surgical excision of the submandibular gland. She presents to the follow up clinic with a complaint of tongue weakness on the ipsilateral side to her surgery. Which nerve has been damaged?", "options": [{"label_html": "Hypoglossal nerve", "is_correct": true}, {"label_html": "Lingual nerve", "is_correct": false}, {"label_html": "Inferior alveolar nerve", "is_correct": false}, {"label_html": "Facial nerve", "is_correct": false}, {"label_html": "Lesser petrosal nerve", "is_correct": false}], "correct_index": 0, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Three cranial nerves may be injured during submandibular gland excision.<br><ul><li>Marginal mandibular branch of the facial nerve<\/li><li>Lingual nerve<\/li><li>Hypoglossal nerve<\/li><\/ul><\/div>Hypoglossal nerve damage may result in paralysis of the ipsilateral aspect of the tongue. The nerve itself lies deep to the capsule surrounding the gland and should not be injured during an intracapsular dissection. The lingual nerve is probably at greater risk of injury. However, the effects of lingual nerve injury are sensory rather than motor.<br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb124b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb124.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Mylohyoid nerve\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb124b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}, {"number": 537, "topic": "Submandibular gland", "stem_html": "Which nerve is at risk during submandibular gland excision?", "options": [{"label_html": "Maxillary nerve", "is_correct": false}, {"label_html": "Buccal nerve", "is_correct": false}, {"label_html": "Zygomatic nerve", "is_correct": false}, {"label_html": "Marginal mandibular nerve", "is_correct": true}, {"label_html": "Cervical nerve", "is_correct": false}], "correct_index": 3, "explanation_html": "The marginal mandibular nerve lies deep to platysma. It supplies the depressor anguli oris and the depressor labii inferioris. If injured it may lead to facial asymmetry and dribbling."}, {"number": 538, "topic": "Submandibular gland", "stem_html": "A 23 year old lady with sialolithiasis of the submandibular gland is undergoing excision of the gland. Which of the following nerves is at risk as the duct is mobilised?", "options": [{"label_html": "Lingual nerve", "is_correct": true}, {"label_html": "Buccal nerve", "is_correct": false}, {"label_html": "Facial nerve", "is_correct": false}, {"label_html": "Glossopharyngeal", "is_correct": false}, {"label_html": "Vagus", "is_correct": false}], "correct_index": 0, "explanation_html": "The lingual nerve wraps around Whartons duct. The lingual nerve provides sensory supply to the anterior 2/3 of the tongue."}, {"number": 539, "topic": "Submandibular gland", "stem_html": "A 54 year old female has an acute abscess secondary to a submandibular ductal stone. The abscess involves the floor of the mouth and extends around the mylohyoid muscle into the neck. An incision and drainage is to be performed to drain the abscess via an incision through the neck. What structures are most at risk with this approach?", "options": [{"label_html": "Marginal mandibular nerve, accessory nerve, greater auricular nerve", "is_correct": false}, {"label_html": "Deep cervical nerve, marginal mandibular nerve, inferior alveolar nerve", "is_correct": false}, {"label_html": "Lingual nerve, hypoglossal nerve, submental nerve", "is_correct": false}, {"label_html": "Lingual nerve, marginal mandibular nerve, hypoglossal nerve", "is_correct": true}, {"label_html": "Accessory nerve, greater auricular nerve, deep cervical nerve", "is_correct": false}], "correct_index": 3, "explanation_html": "In the traditional approach to the deep lobe of the gland, the nerves at risk include the marginal mandibular nerve, hypoglossal nerve and lingual nerve."}, {"number": 540, "topic": "Submandibular gland", "stem_html": "Approximately what proportion of basal salivary secretions are provided by the submandibular glands?", "options": [{"label_html": "10%", "is_correct": false}, {"label_html": "70%", "is_correct": true}, {"label_html": "40%", "is_correct": false}, {"label_html": "90%", "is_correct": false}, {"label_html": "20%", "is_correct": false}], "correct_index": 1, "explanation_html": "Although they are small, the submandibular glands provide the bulk of salivary secretions and contribute 70%, the sublingual glands provide 5% and the remainder from the parotid. During food consumption the contribution of the parotid secretions is greater."}, {"number": 541, "topic": "Submandibular gland", "stem_html": "Approximately what proportion of basal salivary secretions are provided by the submandibular glands?", "options": [{"label_html": "10%", "is_correct": false}, {"label_html": "70%", "is_correct": true}, {"label_html": "40%", "is_correct": false}, {"label_html": "90%", "is_correct": false}, {"label_html": "20%", "is_correct": false}], "correct_index": 1, "explanation_html": "Although they are small, the submandibular glands provide the bulk of salivary secretions and contribute 70%, the sublingual glands provide 5% and the remainder from the parotid. During food consumption the contribution of the parotid secretions is greater."}, {"number": 542, "topic": "Submandibular gland", "stem_html": "A man is undergoing excision of a sub mandibular gland. As the gland is mobilised, a vessel is injured lying between the gland and the mandible. Which of the following is this vessel most likely to be?", "options": [{"label_html": "Lingual artery", "is_correct": false}, {"label_html": "Occipital artery", "is_correct": false}, {"label_html": "Superior thyroid artery", "is_correct": false}, {"label_html": "Facial artery", "is_correct": true}, {"label_html": "External jugular vein", "is_correct": false}], "correct_index": 3, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">The high salivary viscosity of submandibular gland secretions favors stone formation.<br>Most stones are radio-opaque.<br>The marginal mandibular nerve is the most superficial structure.<\/div>The facial artery lies between the gland and mandible and is often ligated during excision of the gland. The lingual artery may be encountered but this is usually later in the operative process as Whartons duct is mobilised."}], "note_html": "<b>Relations of the submandibular gland<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Superficial<\/b><\/td><td>Platysma, deep fascia and mandible<br>Submandibular lymph nodes<br>Facial vein (facial artery near mandible)<br>Marginal mandibular nerve<br>Cervical branch of the facial nerve<\/td><\/tr><tr><td><b>Deep<\/b><\/td><td>Facial artery (inferior to the mandible)<br>Mylohyoid muscle<br>Sub mandibular duct<br>Hyoglossus muscle<br>Lingual nerve<br>Submandibular ganglion<br>Hypoglossal nerve<\/td><\/tr><\/tbody><\/table><\/div><br><b>Submandibular duct (Wharton's duct)<\/b><br><ul><li>Opens lateral to the lingual frenulum on the anterior floor of mouth. <\/li><li>5 cm length<\/li><li>Lingual nerve wraps around Wharton's duct. As the duct passes forwards it crosses medial to the nerve to lie above it and then crosses back, lateral to it, to reach a position below the nerve.<\/li><\/ul> <br><b>Innervation<\/b><br><ul><li>Sympathetic innervation- Derived from superior cervical ganglion <\/li><li>Parasympathetic innervation- Submandibular ganglion via lingual nerve<\/li><\/ul><br><b>Arterial supply<\/b><br>Branch of the facial artery. The facial artery passes through the gland to groove its deep surface. It then emerges onto the face by passing between the gland and the mandible. <br><br><b>Venous drainage<\/b><br>Anterior facial vein (lies deep to the Marginal Mandibular nerve) <br><br><b>Lymphatic drainage<\/b><br>Deep cervical and jugular chains of nodes"}, {"name": "Superficial peroneal nerve", "questions": [{"number": 543, "topic": "Superficial peroneal nerve", "stem_html": "Which muscle is supplied by the superficial peroneal nerve?", "options": [{"label_html": "Peroneus tertius", "is_correct": false}, {"label_html": "Sartorius", "is_correct": false}, {"label_html": "Adductor magnus", "is_correct": false}, {"label_html": "Peroneus brevis", "is_correct": true}, {"label_html": "Gracilis", "is_correct": false}], "correct_index": 3, "explanation_html": "<p>No explanation provided.<\/p>"}], "note_html": "<b>Supplies<\/b><br><ul><li>Lateral compartment of leg: peroneus longus, peroneus brevis (action: eversion and plantar flexion)<\/li><li>Sensation over dorsum of the foot (except the first web space, which is innervated by the deep peroneal nerve)<\/li><\/ul> <br><b>Path<\/b> <br><ul><li>Passes between peroneus longus and peroneus brevis along the length of the proximal one third of the fibula<\/li><li>10-12 cm above the tip of the lateral malleolus, the superficial peroneal nerve pierces the fascia<\/li><li>6-7 cm distal to the fibula, the superficial peroneal nerve bifurcates into intermediate and medial dorsal cutaneous nerves<\/li><\/ul>"}, {"name": "Superior and inferior gluteal nerve", "questions": [{"number": 544, "topic": "Superior and inferior gluteal nerve", "stem_html": "Which of the nerves listed below is responsible for the innervation of gluteus maximus?", "options": [{"label_html": "Inferior gluteal nerve", "is_correct": true}, {"label_html": "Superior gluteal nerve", "is_correct": false}, {"label_html": "Posterior femoral cutaneous nerve", "is_correct": false}, {"label_html": "Sciatic nerve", "is_correct": false}, {"label_html": "Perineal nerve", "is_correct": false}], "correct_index": 0, "explanation_html": "<p>No explanation provided.<\/p>"}, {"number": 545, "topic": "Superior and inferior gluteal nerve", "stem_html": "Which of the nerves listed below is responsible for the innervation of gluteus medius?", "options": [{"label_html": "Inferior gluteal nerve", "is_correct": false}, {"label_html": "Sciatic nerve", "is_correct": false}, {"label_html": "Superior gluteal nerve", "is_correct": true}, {"label_html": "Perineal nerve", "is_correct": false}, {"label_html": "Inferior rectal nerve", "is_correct": false}], "correct_index": 2, "explanation_html": "<p>No explanation provided.<\/p>"}], "note_html": "<b>Superior gluteal nerve<\/b><br><ul><li>Arises from dorsal surface of the sacral plexus (L4, L5, S1)<\/li><li>Passes into gluteal region together with superior gluteal vessels<\/li><li>Supplies gluteus medius and minimus<\/li><\/ul><br><b>Inferior gluteal nerve<\/b><br><ul><li>Arises from dorsal surface of sacral plexus (L5, S1 and S2)<\/li><li>Runs medial to the posterior femoral cutaneous nerve <\/li><li>Enters gluteal region at inferior border of piriformis<\/li><li>Supplies gluteus maximus<\/li><\/ul>"}, {"name": "Superior mesenteric artery", "questions": [{"number": 546, "topic": "Superior mesenteric artery", "stem_html": "A 73 year old lady is admitted with acute mesenteric ischaemia. A CT angiogram is performed and a stenotic lesion is noted at the origin of the superior mesenteric artery. At which of the following levels does this branch from the aorta?", "options": [{"label_html": "L1", "is_correct": true}, {"label_html": "L2", "is_correct": false}, {"label_html": "L3", "is_correct": false}, {"label_html": "L4", "is_correct": false}, {"label_html": "L5", "is_correct": false}], "correct_index": 0, "explanation_html": "The SMA leaves the aorta at L1. It passes under the neck of the pancreas prior to giving its first branch the inferior pancreatico-duodenal artery."}], "note_html": "<ul><li>Branches off aorta at L1<\/li><li>Supplies small bowel from duodenum (distal to ampulla of vater) through to mid transverse colon<\/li><li>Takes more oblique angle from aorta and thus more likely to recieve emboli than coeliac axis<\/li><\/ul><br><b>Relations of superior mesenteric artery<\/b><br><div class=\"table-responsive\"><table class=\"tb\"><tbody><tr><td><b>Superiorly<\/b><\/td><td>Neck of pancreas<\/td><\/tr><tr><td><b>Postero-inferiorly<\/b><\/td><td>Third part of duodenum<br>Uncinate process<\/td><\/tr><tr><td><b>Posteriorly<\/b><\/td><td>Left renal vein<\/td><\/tr><tr><td><b>Right<\/b><\/td><td>Superior mesenteric vein<\/td><\/tr><\/tbody><\/table><\/div><br><b>Branches of the superior mesenteric artery<\/b><br><ul><li>Inferior pancreatico-duodenal artery<\/li><li>Jejunal and ileal arcades<\/li><li>Ileo-colic artery<\/li><li>Right colic artery<\/li><li>Middle colic artery<\/li><\/ul><br><i>Overview of SMA and branches<\/i><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb109b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb109.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Superior mesenteric artery\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb109b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}, {"name": "Superior vena cava", "questions": [{"number": 547, "topic": "Superior vena cava", "stem_html": "An individual is noted to have a left sided superior vena cava. By which pathway is blood from this system most likely to enter the heart?", "options": [{"label_html": "Via the coronary sinus", "is_correct": true}, {"label_html": "Via the azygos venous system and into the superior vena cava", "is_correct": false}, {"label_html": "Via anomalies in the pulmonary vascular bed", "is_correct": false}, {"label_html": "Via the left atrium and persistent foramen ovale", "is_correct": false}, {"label_html": "Directly into the roof of the right atrium", "is_correct": false}], "correct_index": 0, "explanation_html": "Persistent left superior vena cava is the most common anomaly of the thoracic venous system. It is prevalent in 0.3% of the population and is a benign entity of failed involution during embryogenesis."}, {"number": 548, "topic": "Superior vena cava", "stem_html": "How many valves lie between the superior vena cava and the right atrium?", "options": [{"label_html": "None", "is_correct": true}, {"label_html": "One", "is_correct": false}, {"label_html": "Two", "is_correct": false}, {"label_html": "Three", "is_correct": false}, {"label_html": "Four", "is_correct": false}], "correct_index": 0, "explanation_html": "There are no valves which is why it is relatively easy to insert a CVP line from the internal jugular vein into the right atrium."}, {"number": 549, "topic": "Superior vena cava", "stem_html": "A patient presents with superior vena caval obstruction. How many collateral circulations exist as alternative pathways of venous return?", "options": [{"label_html": "None", "is_correct": false}, {"label_html": "One", "is_correct": false}, {"label_html": "Two", "is_correct": false}, {"label_html": "Three", "is_correct": false}, {"label_html": "Four", "is_correct": true}], "correct_index": 4, "explanation_html": "There are 4 collateral venous systems:<br><ul><li>Azygos venous system<\/li><li>Internal mammary venous pathway<\/li><li>Long thoracic venous system with connections to the femoral and vertebral veins (2 pathways)<\/li><\/ul><br>Despite this, venous hypertension still occurs."}], "note_html": "<b>Drainage<\/b><br><ul><li>Head and neck<\/li><li>Upper limbs<\/li><li>Thorax<\/li><li>Part of abdominal walls<\/li><\/ul><br><b>Formation<\/b><br><ul><li>Subclavian and internal jugular veins unite to form the right and left brachiocephalic veins<\/li><li>These unite to form the SVC<\/li><li>Azygos vein joins the SVC before it enters the right atrium<\/li><\/ul><br><b>Relations<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Anterior<\/b><\/td><td>Anterior margins of the right lung and pleura<\/td><\/tr><tr><td><b>Posteromedial<\/b><\/td><td>Trachea and right vagus nerve<\/td><\/tr><tr><td><b>Posterolateral<\/b><\/td><td>Posterior aspects of right lung and pleura<br>Pulmonary hilum is posterior<\/td><\/tr><tr><td><b>Right lateral<\/b><\/td><td>Right phrenic nerve and pleura<\/td><\/tr><tr><td><b>Left lateral<\/b><\/td><td>Brachiocephalic artery and ascending aorta<\/td><\/tr><\/tbody><\/table><\/div><br><b>Developmental variations<\/b><br>Anomalies of the connection of the SVC are recognised. In some individuals a persistent left sided SVC drains into the right atrium via an enlarged orifice of the coronary sinus. More rarely the left sided vena cava may connect directly with the superior aspect of the left atrium, usually associated with an un-roofing of the coronary sinus. The commonest lesion of the IVC is for its abdominal course t
