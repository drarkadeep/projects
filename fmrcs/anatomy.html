sterior triangle of the neck", "questions": [{"number": 429, "topic": "Posterior triangle of the neck", "stem_html": "A 36 year old male is admitted for elective surgery for a lymph node biopsy in the supraclavicular region.  Post operatively the patient has difficulty shrugging his left shoulder.  What is the most likely reason?", "options": [{"label_html": "Phrenic nerve lesion", "is_correct": false}, {"label_html": "Axillary nerve lesion", "is_correct": false}, {"label_html": "C5, C6 root lesion", "is_correct": false}, {"label_html": "C8, T1 root lesion", "is_correct": false}, {"label_html": "Accessory nerve lesion", "is_correct": true}], "correct_index": 4, "explanation_html": "The accessory nerve lies in the posterior triangle and may be injured in this region. Apart from problems with shrugging the shoulder, he may also have difficulty lifting his arm above his head."}, {"number": 430, "topic": "Posterior triangle of the neck", "stem_html": "Which of the following nerves is not contained within the posterior triangle of the neck?", "options": [{"label_html": "Accessory nerve", "is_correct": false}, {"label_html": "Phrenic nerve", "is_correct": false}, {"label_html": "Greater auricular nerve", "is_correct": false}, {"label_html": "Ansa cervicalis", "is_correct": true}, {"label_html": "Lesser occipital nerve", "is_correct": false}], "correct_index": 3, "explanation_html": "Ansa cervicalis is a content of the anterior triangle of the neck."}, {"number": 431, "topic": "Posterior triangle of the neck", "stem_html": "Which of the following nerves is not contained within the posterior triangle of the neck?", "options": [{"label_html": "Accessory nerve", "is_correct": false}, {"label_html": "Phrenic nerve", "is_correct": false}, {"label_html": "Greater auricular nerve", "is_correct": false}, {"label_html": "Ansa cervicalis", "is_correct": true}, {"label_html": "Lesser occipital nerve", "is_correct": false}], "correct_index": 3, "explanation_html": "Ansa cervicalis is a content of the anterior triangle of the neck."}, {"number": 432, "topic": "Posterior triangle of the neck", "stem_html": "Which of the following is not a content of the posterior triangle of the neck?", "options": [{"label_html": "Spinal accessory nerve", "is_correct": false}, {"label_html": "Phrenic nerve", "is_correct": false}, {"label_html": "External jugular vein", "is_correct": false}, {"label_html": "Occipital lymph nodes", "is_correct": false}, {"label_html": "Internal jugular vein", "is_correct": true}], "correct_index": 4, "explanation_html": "The IJV does not lie in the posterior triangle. However, the terminal branches of the external jugular vein do."}, {"number": 433, "topic": "Posterior triangle of the neck", "stem_html": "A 45 year old man presents with a lipoma located posterior to the posterior border of the sternocleidomastoid muscle, approximately 4cm superior to the middle third of the clavicle. During surgical excision of the lesion troublesome bleeding is encountered. Which of the following is the most likely source?", "options": [{"label_html": "Internal jugular vein", "is_correct": false}, {"label_html": "External jugular vein", "is_correct": true}, {"label_html": "Common carotid artery", "is_correct": false}, {"label_html": "Vertebral artery", "is_correct": false}, {"label_html": "Second part of the subclavian artery", "is_correct": false}], "correct_index": 1, "explanation_html": "The external jugular vein runs obliquely in the superficial fascia of the posterior triangle. It drains into the subclavian vein. During surgical exploration of this area the external jugular vein may be injured and troublesome bleeding may result. The internal jugular vein and carotid arteries are located in the anterior triangle. The third, and not the second, part of the subclavian artery is also a content of the posterior triangle"}], "note_html": "<b>Boundaries<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Apex<\/b><\/td><td>Sternocleidomastoid and the Trapezius muscles at the Occipital bone<\/td><\/tr><tr><td><b>Anterior<\/b><\/td><td>Posterior border of the Sternocleidomastoid<\/td><\/tr><tr><td><b>Posterior<\/b><\/td><td>Anterior border of the Trapezius<\/td><\/tr><tr><td><b>Base<\/b><\/td><td>Middle third of the clavicle<\/td><\/tr><\/tbody><\/table><\/div><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb027b.jpg\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb027.jpg\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Posterior triangle of the neck\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb027b.jpg\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center><br><b>Contents<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Nerves<\/b><\/td><td><ul><li>Accessory nerve<\/li><li>Phrenic nerve<\/li><li>Three trunks of the brachial plexus<\/li><li>Branches of the cervical plexus: Supraclavicular nerve, transverse cervical nerve, great auricular nerve, lesser occipital nerve<\/li><\/ul><\/td><\/tr><tr><td><b>Vessels<\/b><\/td><td><ul><li>External jugular vein<\/li><li>Subclavian artery<\/li><\/ul><\/td><\/tr><tr><td><b>Muscles<\/b><\/td><td><ul><li>Inferior belly of omohyoid<\/li><li>Scalene<\/li><\/ul><\/td><\/tr><tr><td><b>Lymph nodes<\/b><\/td><td><ul><li>Supraclavicular<\/li><li>Occipital<\/li><\/ul><\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Prolapsed disc", "questions": [{"number": 434, "topic": "Prolapsed disc", "stem_html": "A 40-year-old man presents with pain in his lower back and 'sciatica' for the past three days. He describes bending down to pick up a washing machine when he felt 'something go'. He now has severe pain radiating from his back down the right leg. On examination, there is  paraesthesia over the anterior aspect of the right knee and the medial aspect of his lower leg. Power is intact and the right knee reflex is diminished. The femoral stretch test is positive on the right side. Which nerve or nerve root is most likely to be affected?", "options": [{"label_html": "Common peroneal nerve", "is_correct": false}, {"label_html": "Lateral cutaneous nerve of the thigh", "is_correct": false}, {"label_html": "L5", "is_correct": false}, {"label_html": "L3", "is_correct": true}, {"label_html": "L1", "is_correct": false}], "correct_index": 3, "explanation_html": "<p>No explanation provided.<\/p>"}], "note_html": "A prolapsed lumbar disc usually produces clear dermatomal leg pain associated with neurological deficits.<br><br><b>Features<\/b><br><ul><li>Leg pain usually worse than back<\/li><li>Pain often worse when sitting<\/li><\/ul><br>The table below demonstrates the expected features according to the level of compression:<br><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>L3 nerve root compression<\/b><\/td><td>Sensory loss over anterior thigh/knee<br>Weak quadriceps<br>Reduced knee reflex<br>Positive femoral stretch test<\/td><\/tr><tr><td><b>L5 nerve root compression<\/b><\/td><td>Sensory loss dorsum of foot<br>Weakness in foot and big toe dorsiflexion<br>Reflexes intact<br>Positive sciatic nerve stretch test<\/td><\/tr><tr><td><b>S1 nerve root compression<\/b><\/td><td>Sensory loss posterolateral aspect of leg and lateral aspect of foot<br>Weakness in plantar flexion of foot<br>Reduced ankle reflex<br>Positive sciatic nerve stretch test<\/td><\/tr><\/tbody><\/table><\/div><br><b>Management<\/b><br><ul><li>Similar to that of other musculoskeletal lower back pain: analgesia, physiotherapy, exercises<\/li><li>Persistent symptoms, muscular weakness, bladder or bowel dysfunction are indications for urgent MRI scanning to delineate the disease extent to allow surgical planning<\/li><li>Plain spinal x-rays have no useful role in establishing the extent of disc disease<\/li><\/ul>"}, {"name": "Prostate gland", "questions": [{"number": 435, "topic": "Prostate gland", "stem_html": "Which of the following anatomical planes separates the prostate from the rectum?", "options": [{"label_html": "Sibsons fascia", "is_correct": false}, {"label_html": "Denonvilliers fascia", "is_correct": true}, {"label_html": "Levator ani muscle", "is_correct": false}, {"label_html": "Waldeyers fascia", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 1, "explanation_html": "The Denonvilliers fascia separates the rectum from the prostate. Waldeyers fascia separates the rectum from the sacrum"}, {"number": 436, "topic": "Prostate gland", "stem_html": "A 25 year old man is being catheterised, prior to a surgical procedure. As the catheter enters the prostatic urethra which of the following changes will occur?", "options": [{"label_html": "Resistance will increase significantly", "is_correct": false}, {"label_html": "Resistance will increase slightly", "is_correct": false}, {"label_html": "It will lie horizontally", "is_correct": false}, {"label_html": "Resistance will decrease", "is_correct": true}, {"label_html": "It will deviate laterally", "is_correct": false}], "correct_index": 3, "explanation_html": "The prostatic urethra is much wider than the membranous urethra and therefore resistance will decrease. The prostatic urethra is inclined superiorly."}, {"number": 437, "topic": "Prostate gland", "stem_html": "A 73 year old man is due to undergo a radical prostatectomy for carcinoma of the prostate gland. To which of these lymph nodes will the tumour drain primarily?", "options": [{"label_html": "Para aortic", "is_correct": false}, {"label_html": "Internal iliac", "is_correct": true}, {"label_html": "Superficial inguinal", "is_correct": false}, {"label_html": "Meso rectal", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 1, "explanation_html": "The prostate lymphatic drainage is primarily to the internal iliac nodes and also the sacral nodes. Although internal iliac is the first site."}, {"number": 438, "topic": "Prostate gland", "stem_html": "A 55 year old man is due to undergo a radical prostatectomy for carcinoma of the prostate gland. Which of the following vessels directly supplies the prostate?", "options": [{"label_html": "External iliac artery", "is_correct": false}, {"label_html": "Common iliac artery", "is_correct": false}, {"label_html": "Internal iliac artery", "is_correct": false}, {"label_html": "Inferior vesical artery", "is_correct": true}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 3, "explanation_html": "The arterial supply to the prostate gland is from the inferior vesical artery, it is a branch of the prostatovesical artery. The prostatovesical artery usually arises from the internal pudendal and inferior gluteal arterial branches of the internal iliac artery."}], "note_html": "The prostate gland is approximately the shape and size of a walnut and is located inferior to the bladder. It is separated from the rectum by Denonvilliers fascia and its blood supply is derived from the internal iliac vessels (via inferior vesical artery). The internal sphincter lies at the apex of the gland and may be damaged during prostatic surgery, affected individuals may complain of retrograde ejaculation.<br><br><b>Summary of prostate gland<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Arterial supply<\/b><\/td><td>Inferior vesical artery (from internal iliac)<\/td><\/tr><tr><td><b>Venous drainage<\/b><\/td><td>Prostatic venous plexus (to paravertebral veins)<\/td><\/tr><tr><td><b>Lymphatic drainage<\/b><\/td><td>Internal iliac nodes<\/td><\/tr><tr><td><b>Innervation<\/b><\/td><td>Inferior hypogastric plexus<\/td><\/tr><tr><td><b>Dimensions<\/b><\/td><td><ul><li>Transverse diameter (4cm)<\/li><li>AP diameter (2cm)<\/li><li>Height  (3cm)<\/li><\/ul><\/td><\/tr><tr><td><b>Lobes<\/b><\/td><td><ul><li>Posterior lobe: posterior to urethra<\/li><li>Median lobe: posterior to urethra, in between ejaculatory ducts<\/li><li>Lateral lobes x 2<\/li><li>Isthmus<\/li><\/ul><\/td><\/tr><tr><td><b>Zones<\/b><\/td><td><ul><li>Peripheral zone: subcapsular portion of posterior prostate. Most prostate cancers are here<\/li><li>Central zone<\/li><li>Transition zone<\/li><li>Stroma<\/li><\/ul><\/td><\/tr><\/tbody><\/table><\/div><br><b>Relations<\/b><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th> <b>Anterior<\/b><\/th><th>Pubic symphysis<br>Prostatic venous plexus<\/th><\/tr><\/thead><tbody><tr><td><b>Posterior<\/b><\/td><td>Denonvilliers fascia<br>Rectum<br>Ejaculatory ducts<\/td><\/tr><tr><td><b>Lateral<\/b><\/td><td>Venous plexus (lies on prostate)<br>Levator ani (immediately below the puboprostatic ligaments)<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Prosthetic heart valves on Chest X-rays", "questions": [{"number": 439, "topic": "Prosthetic heart valves on Chest X-rays", "stem_html": "A 43 year old man is reviewed in the clinic following a cardiac operation. A chest x-ray is performed and a circular radio-opaque structure is noted medial aspect of the 4th intercostal space on the left. Which of the following procedures is the patient most likely to have undergone?", "options": [{"label_html": "Aortic valve replacement with metallic valve", "is_correct": false}, {"label_html": "Tricuspid valve replacement with metallic valve", "is_correct": false}, {"label_html": "Tricuspid valve replacement with porcine valve", "is_correct": false}, {"label_html": "Pulmonary valve replacement with porcine valve", "is_correct": false}, {"label_html": "Mitral valve replacement with metallic valve", "is_correct": true}], "correct_index": 4, "explanation_html": "<p>No explanation provided.<\/p>"}], "note_html": "The aortic and mitral valves are most commonly replaced and when a metallic valve is used, can be most readily identified on plain x-rays.<br>The presence of cardiac disease (such as cardiomegaly) may affect the figures quoted here.<br><br><b>Aortic<\/b><br>Usually located medial to the 3rd interspace on the right.<br><br><b>Mitral<\/b><br>Usually located medial to the 4th interspace on the left.<br><br><b>Tricuspid<\/b><br>Usually located medial to the 5th interspace on the right.<br><br>Please note that these are the sites at which an artificial valve may be located and are NOT the sites of auscultation."}, {"name": "Psoas Muscle", "questions": [{"number": 440, "topic": "Psoas Muscle", "stem_html": "A 23 year old man presents with delayed diagnosis of appendicitis. The appendix is retrocaecal and has perforated causing a psoas abscess. Into which structure does the psoas major muscle insert?", "options": [{"label_html": "Greater trochanter of the femur", "is_correct": false}, {"label_html": "Linea aspera of the femur", "is_correct": false}, {"label_html": "Lesser trochanter of the femur", "is_correct": true}, {"label_html": "Iliac crest", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 2, "explanation_html": "The psoas major inserts into the lesser trochanter."}, {"number": 441, "topic": "Psoas Muscle", "stem_html": "A 56 year old lady with metastatic breast cancer develops an osteolytic deposit in the proximal femur. One morning whilst getting out of bed she notices severe groin pain. X-rays show that the lesser trochanter has been avulsed. Which muscle is the most likely culprit?", "options": [{"label_html": "Vastus lateralis", "is_correct": false}, {"label_html": "Psoas major", "is_correct": true}, {"label_html": "Piriformis", "is_correct": false}, {"label_html": "Gluteus maximus", "is_correct": false}, {"label_html": "Gluteus medius", "is_correct": false}], "correct_index": 1, "explanation_html": "The psoas major inserts into the lesser trochanter and contracts when raising the trunk from the supine position. When osteolytic lesions are present in the femur the lesser trochanter may be avulsed."}, {"number": 442, "topic": "Psoas Muscle", "stem_html": "A 56 year old lady with metastatic breast cancer develops an osteolytic deposit in the proximal femur. One morning whilst getting out of bed she notices severe groin pain. X-rays show that the lesser trochanter has been avulsed. Which muscle is the most likely culprit?", "options": [{"label_html": "Vastus lateralis", "is_correct": false}, {"label_html": "Psoas major", "is_correct": true}, {"label_html": "Piriformis", "is_correct": false}, {"label_html": "Gluteus maximus", "is_correct": false}, {"label_html": "Gluteus medius", "is_correct": false}], "correct_index": 1, "explanation_html": "The psoas major inserts into the lesser trochanter and contracts when raising the trunk from the supine position. When osteolytic lesions are present in the femur the lesser trochanter may be avulsed."}], "note_html": "<b>Origin<\/b><br>The deep part originates from the transverse processes of the five lumbar vertebrae, the superficial part originates from T12 and the first 4 lumbar vertebrae.<br><br><b>Insertion<\/b><br>Lesser trochanter of the femur.<br><br><b>Innervation<\/b><br>Anterior rami of L1 to L3.<br><br><b>Action<\/b><br>Flexion and external rotation of the hip. Bilateral contraction can raise the trunk from the supine position."}, {"name": "Pudendal canal", "questions": [{"number": 443, "topic": "Pudendal canal", "stem_html": "The pudendal canal is a fascial canal located on the lateral wall of the ischioanal fossa. In this location, it lies on the inferior border of which of the following muscles?", "options": [{"label_html": "Coccygeus", "is_correct": false}, {"label_html": "Obturator internus", "is_correct": true}, {"label_html": "Pubococcygeus", "is_correct": false}, {"label_html": "Iliococcygeus", "is_correct": false}, {"label_html": "Piriformis", "is_correct": false}], "correct_index": 1, "explanation_html": "The coccygeus, pubococcygeus and iliococcygeus form part of the pelvic diaphragm and are not related to it. The piriformis exits the pelvis via the greater sciatic foramen and is not associated with the canal in the ischiorectal fossa."}], "note_html": "The pudendal canal is located along the lateral wall of the ischioanal fossa at the inferior margin of the obturator internus muscle. It extends from the lesser sciatic foramen to the posterior margin of the urogenital diaphragm. It conveys the internal pudendal vessels and nerve."}, {"name": "Pudendal nerve", "questions": [{"number": 444, "topic": "Pudendal nerve", "stem_html": "A 34 year old lady presents with symptoms of faecal incontinence. Ten years previously she gave birth to a child by normal vaginal delivery. Injury to which of the following nerves is most likely to account for this process?", "options": [{"label_html": "Genitofemoral", "is_correct": false}, {"label_html": "Ilioinguinal", "is_correct": false}, {"label_html": "Pudendal", "is_correct": true}, {"label_html": "Hypogastric autonomic nerve", "is_correct": false}, {"label_html": "Obturator", "is_correct": false}], "correct_index": 2, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">S2,3,4 keeps the poo up off the floor - POOdendal nerve<\/div>Damage to the pudendal nerve is classically associated with faecal incontinence and it is for this reason that sacral neuromodulation is a popular treatment for the condition. Injury to the hypogastric autonomic nerves is an aetiological factor in the development of constipation."}, {"number": 445, "topic": "Pudendal nerve", "stem_html": "Which of the nerves listed below is responsible for providing voluntary control of the urethral sphincter?", "options": [{"label_html": "Inferior hypogastric plexus", "is_correct": false}, {"label_html": "Superior hypogastric plexus", "is_correct": false}, {"label_html": "Obturator nerve", "is_correct": false}, {"label_html": "Femoral nerve", "is_correct": false}, {"label_html": "Pudendal nerve", "is_correct": true}], "correct_index": 4, "explanation_html": "The hypogastric plexuses provide autonomic control of the bladder. However, voluntary control of the urethral sphincter is provided by the pudendal nerve."}], "note_html": "The pudendal nerve arises from nerve roots S2, S3 and S4 and exits the pelvis through the greater sciatic foramen. It re-enters the perineum through the lesser sciatic foramen. It travels inferior to give innervation to the anal sphincters and external urethral sphincter. It also provides cutaneous innervation to the region of perineum surrounding the anus and posterior vulva.<br><br>Traction and compression of the pudendal nerve by the foetus in late pregnancy may result in late onset pudendal neuropathy which may be part of the process involved in the development of faecal incontinence."}, {"name": "Radial nerve", "questions": [{"number": 446, "topic": "Radial nerve", "stem_html": "A 23 year old climber falls and fractures his humerus. The surgeons decide upon a posterior approach to the middle third of the bone. Which of the following nerves is at greatest risk in this approach?", "options": [{"label_html": "Ulnar", "is_correct": false}, {"label_html": "Antebrachial", "is_correct": false}, {"label_html": "Musculocutaneous", "is_correct": false}, {"label_html": "Radial", "is_correct": true}, {"label_html": "Intercostobrachial", "is_correct": false}], "correct_index": 3, "explanation_html": "The radial nerve wraps around the humerus and may be injured during a posterior approach. An IM nail may be preferred as it avoids the complex dissection needed for direct bone exposure."}, {"number": 447, "topic": "Radial nerve", "stem_html": "A 62 year old man presents with arm weakness. On examination, he has a weakness of elbow extension and loss of sensation on the dorsal aspect of the first digit. What is the site of the most likely underlying defect?", "options": [{"label_html": "Axillary nerve", "is_correct": false}, {"label_html": "Median nerve", "is_correct": false}, {"label_html": "Ulnar nerve", "is_correct": false}, {"label_html": "Radial nerve", "is_correct": true}, {"label_html": "Musculocutaneous nerve", "is_correct": false}], "correct_index": 3, "explanation_html": "The loss of extension is secondary to triceps injury which reflects its innervation by the radial nerve."}, {"number": 448, "topic": "Radial nerve", "stem_html": "A 23 year old man is involved in a fight outside a nightclub and sustains a laceration to his right arm. On examination, he has lost extension of the fingers in his right hand. Which of the nerves listed below is most likely to have been divided?", "options": [{"label_html": "Median", "is_correct": false}, {"label_html": "Musculocutaneous", "is_correct": false}, {"label_html": "Radial", "is_correct": true}, {"label_html": "Ulnar", "is_correct": false}, {"label_html": "Axillary", "is_correct": false}], "correct_index": 2, "explanation_html": "The radial nerve supplies the extensor muscle group."}, {"number": 449, "topic": "Radial nerve", "stem_html": "A motorcyclist is involved in a road traffic accident. He suffers a complex humeral shaft fracture which is plated. Post operatively he complains of an inability to extend his fingers. Which of the following structures is most likely to have been injured?", "options": [{"label_html": "Ulnar nerve", "is_correct": false}, {"label_html": "Radial nerve", "is_correct": true}, {"label_html": "Median nerve", "is_correct": false}, {"label_html": "Axillary nerve", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 1, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Mnemonic for radial nerve muscles: BEST <br><br>B rachioradialis<br>E xtensors<br>S upinator<br>T riceps<\/div>The radial nerve is responsible for innervation of the extensor compartment of the forearm."}, {"number": 450, "topic": "Radial nerve", "stem_html": "As it exits the axilla the radial nerve passes under the inferior border of which of the muscles listed below?", "options": [{"label_html": "Supraspinatus", "is_correct": false}, {"label_html": "Infraspinatus", "is_correct": false}, {"label_html": "Teres major", "is_correct": true}, {"label_html": "Deltoid", "is_correct": false}, {"label_html": "Pectoralis major", "is_correct": false}], "correct_index": 2, "explanation_html": "The radial nerve passes through the triangular interval to leave the axilla. The superior border of this is bounded by the teres major muscle to which the radial nerve is closely related."}, {"number": 451, "topic": "Radial nerve", "stem_html": "Transection of the radial nerve at the level of the axilla will result in all of the following except:", "options": [{"label_html": "Loss of elbow extension.", "is_correct": false}, {"label_html": "Loss of extension of the interphalangeal joints.", "is_correct": true}, {"label_html": "Loss of metacarpophalangeal extension.", "is_correct": false}, {"label_html": "Loss of triceps reflex.", "is_correct": false}, {"label_html": "Loss of sensation overlying the first dorsal interosseous.", "is_correct": false}], "correct_index": 1, "explanation_html": "These may still extend by virtue of retained lumbrical muscle function."}, {"number": 452, "topic": "Radial nerve", "stem_html": "Which of the following upper limb muscles is not innervated by the radial nerve?", "options": [{"label_html": "Extensor carpi ulnaris", "is_correct": false}, {"label_html": "Abductor digiti minimi", "is_correct": true}, {"label_html": "Anconeus", "is_correct": false}, {"label_html": "Supinator", "is_correct": false}, {"label_html": "Brachioradialis", "is_correct": false}], "correct_index": 1, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Mnemonic for radial nerve muscles: BEST <br><br>B rachioradialis<br>E xtensors<br>S upinator<br>T riceps<\/div> Abductor digiti minimi is innervated by the ulnar nerve."}, {"number": 453, "topic": "Radial nerve", "stem_html": "Which of the following upper limb muscles is not innervated by the radial nerve?", "options": [{"label_html": "Extensor carpi ulnaris", "is_correct": false}, {"label_html": "Abductor digiti minimi", "is_correct": true}, {"label_html": "Anconeus", "is_correct": false}, {"label_html": "Supinator", "is_correct": false}, {"label_html": "Brachioradialis", "is_correct": false}], "correct_index": 1, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Mnemonic for radial nerve muscles: BEST <br><br>B rachioradialis<br>E xtensors<br>S upinator<br>T riceps<\/div> Abductor digiti minimi is innervated by the ulnar nerve."}, {"number": 454, "topic": "Radial nerve", "stem_html": "A 32 year old motorcyclist is involved in a road traffic accident. His humerus is fractured and severely displaced. At the time of surgical repair the surgeon notes that the radial nerve has been injured. Which of the following muscles is least likely to be affected by an injury at this site?", "options": [{"label_html": "Extensor carpi radialis brevis", "is_correct": false}, {"label_html": "Brachioradialis", "is_correct": false}, {"label_html": "Abductor pollicis longus", "is_correct": false}, {"label_html": "Extensor pollicis brevis", "is_correct": false}, {"label_html": "None of the above", "is_correct": true}], "correct_index": 4, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Muscles supplied by the radial nerve<br><br><b>BEST<\/b><br>Brachioradialis<br>Extensors<br>Supinator<br>Triceps<\/div>The radial nerve supplies the extensor muscles, abductor pollicis longus and extensor pollicis brevis (the latter two being innervated by the posterior interosseous branch of the radial nerve)."}, {"number": 455, "topic": "Radial nerve", "stem_html": "A 73 year old lady is hit by a car. She suffers a complex fracture of the distal aspect of her humerus with associated injury to the radial nerve. Which of the following movements will be most impaired as a result?", "options": [{"label_html": "Elbow extension", "is_correct": false}, {"label_html": "Elbow flexion", "is_correct": false}, {"label_html": "Shoulder abduction", "is_correct": false}, {"label_html": "Wrist extension", "is_correct": true}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 3, "explanation_html": "The triceps will not be affected so elbow extension will be preserved. Loss of wrist extension will be the most obvious effect."}], "note_html": "Continuation of posterior cord of the brachial plexus (root values C5 to T1)<br><br><b>Path<\/b><br><ul><li>In the axilla: lies posterior to the axillary artery on subscapularis, latissimus dorsi and teres major.<\/li><li>Enters the arm between the brachial artery and the long head of triceps (medial to humerus).<\/li><li>Spirals around the posterior surface of the humerus in the groove for the radial nerve.<\/li><li>At the distal third of the lateral border of the humerus it then pierces the intermuscular septum and descends in front of the lateral epicondyle. <\/li><li>At the lateral epicondyle it lies deeply between brachialis and brachioradialis where it then divides into a superficial and deep terminal branch.<\/li><li>Deep branch crosses the supinator to become the posterior interosseous nerve.<\/li><\/ul><br><i>In the image below the relationships of the radial nerve can be appreciated<\/i><br><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb305b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb305.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Radial nerve\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb305b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center><br><b>Regions innervated<\/b><br><div class=\"table-responsive\"><table class=\"tb\"><tbody><tr><td>Motor (main nerve)<\/td><td><ul><li>Triceps<\/li><li>Anconeus<\/li><li>Brachioradialis<\/li><li>Extensor carpi radialis<\/li><\/ul><\/td><\/tr><tr><td>Motor (posterior interosseous branch)<\/td><td><ul><li>Supinator<\/li><li>Extensor carpi ulnaris<\/li><li>Extensor digitorum<\/li><li>Extensor indicis<\/li><li>Extensor digiti minimi<\/li><li>Extensor pollicis longus and brevis<\/li><li>Abductor pollicis longus<\/li><\/ul><\/td><\/tr><tr><td>Sensory<\/td><td>The area of skin supplying the proximal phalanges on the dorsal aspect of the hand is supplied by the radial nerve (this does not apply to the little finger and part of the ring finger)<\/td><\/tr><\/tbody><\/table><\/div> <br><b>Muscular innervation and effect of denervation<\/b><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Anatomical location<\/b><\/th><th><b>Muscle affected<\/b><\/th><th><b>Effect of paralysis<\/b><\/th><\/tr><\/thead><tbody><tr><td>Shoulder<\/td><td>Long head of triceps<\/td><td>Minor effects on shoulder stability in abduction<\/td><\/tr><tr><td>Arm<\/td><td>Triceps<\/td><td>Loss of elbow extension<\/td><\/tr><tr><td>Forearm<\/td><td>Supinator<br>Brachioradialis<br>Extensor carpi radialis longus and brevis<\/td><td>Weakening of supination of prone hand and elbow flexion in mid prone position<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Radius", "questions": [{"number": 456, "topic": "Radius", "stem_html": "Which of the structures listed below articulates with the head of the radius superiorly?", "options": [{"label_html": "Capitulum", "is_correct": true}, {"label_html": "Trochlea", "is_correct": false}, {"label_html": "Lateral epicondyle", "is_correct": false}, {"label_html": "Ulna", "is_correct": false}, {"label_html": "Medial epicondyle", "is_correct": false}], "correct_index": 0, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">A useful revision aid : 'Capital Radio' is the articulation of the radial head superiorly. <\/div>The head of the radius articulates with the capitulum of the humerus."}, {"number": 457, "topic": "Radius", "stem_html": "Which ligament keeps the head of the radius connected to the radial notch of the ulna?", "options": [{"label_html": "Annular (orbicular) ligament", "is_correct": true}, {"label_html": "Quadrate ligament", "is_correct": false}, {"label_html": "Radial collateral ligament of the elbow", "is_correct": false}, {"label_html": "Ulnar collateral ligament", "is_correct": false}, {"label_html": "Radial collateral ligament", "is_correct": false}], "correct_index": 0, "explanation_html": "The annular ligament connects the radial head to the radial notch of the ulna. This is illustrated below:<br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb080b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb080.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Anular ligament of radius\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb080b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}, {"number": 458, "topic": "Radius", "stem_html": "A 78 year old man is lifting a heavy object when he feels a pain in his forearm and is unable to continue. He has a swelling over his upper forearm. An MRI scan shows a small cuff of tendon still attached to the radial tuberosity consistent with a recent tear. Which of the following muscles has been injured?", "options": [{"label_html": "Pronator teres", "is_correct": false}, {"label_html": "Supinator", "is_correct": false}, {"label_html": "Aconeus", "is_correct": false}, {"label_html": "Brachioradialis", "is_correct": false}, {"label_html": "Biceps brachii", "is_correct": true}], "correct_index": 4, "explanation_html": "Biceps inserts into the radial tuberosity. Distal injuries of this muscle are rare but are reported and are clinically more important than more proximal ruptures."}, {"number": 459, "topic": "Radius", "stem_html": "Which of the following muscles does not attach to the radius?", "options": [{"label_html": "Pronator quadratus", "is_correct": false}, {"label_html": "Biceps", "is_correct": false}, {"label_html": "Brachioradialis", "is_correct": false}, {"label_html": "Supinator", "is_correct": false}, {"label_html": "Brachialis", "is_correct": true}], "correct_index": 4, "explanation_html": "The brachialis muscle inserts into the ulna. The other muscles are all inserted onto the radius."}], "note_html": "The radius is one of the two long forearm bones that extends from the lateral side of the elbow to the thumb side of the wrist. It has two expanded ends, of which the distal end is the larger. Key points relating to its topography and relations are outlined below;<br><br><b>Upper end<\/b><br><ul><li>Articular cartilage- covers medial &gt; lateral side<\/li><li>Articulates with radial notch of the ulna by the annular ligament<\/li><li>Muscle attachment- biceps brachii at the tuberosity<\/li><\/ul><br><b>Shaft<\/b><br>Muscle attachment<br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Upper third of the body<\/b><\/td><td>Supinator<br>Flexor digitorum superficialis<br>Flexor pollicis longus<\/td><\/tr><tr><td><b>Middle third of the body<\/b><\/td><td>Pronator teres<\/td><\/tr><tr><td><b>Lower quarter of the body<\/b><\/td><td>Pronator quadratus<br>Tendon of supinator longus<\/td><\/tr><\/tbody><\/table><\/div><br><b>Lower end<\/b><br><ul><li>Quadrilateral<\/li><li>Anterior surface- capsule of wrist joint<\/li><li>Medial surface- head of ulna<\/li><li>Lateral surface- ends in the styloid process<\/li><li>Posterior surface: 3 grooves containing:<\/li><\/ul>1. Tendons of extensor carpi radialis longus and brevis <br>2. Tendon of extensor pollicis longus <br>3. Tendon of extensor indicis<br><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb147b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb147.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Radius %28bone%29\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb147b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}, {"name": "Rectum", "questions": [{"number": 460, "topic": "Rectum", "stem_html": "A 56 year old lady undergoes a Hartmann's style resection of the sigmoid colon, with ligation of the vessels close to the colon. Which of the following vessels will be responsible to supplying the rectal stump directly?", "options": [{"label_html": "Superior mesenteric artery", "is_correct": false}, {"label_html": "Middle colic artery", "is_correct": false}, {"label_html": "Superior rectal artery", "is_correct": true}, {"label_html": "Inferior mesenteric artery", "is_correct": false}, {"label_html": "External iliac artery", "is_correct": false}], "correct_index": 2, "explanation_html": "This question is addressing the blood supply to the rectum. Which is supplied by the superior rectal artery. High ligation of the IMA may compromise this structure. However, the question states that during the Hartmans procedure the vessels were ligated close to the bowel. Implying that the superior rectal was preserved."}, {"number": 461, "topic": "Rectum", "stem_html": "A 56 year old man is undergoing an anterior resection for a carcinoma of the rectum. Which of the structures below is least likely to be encountered during the mobilisation of the anterior rectum?", "options": [{"label_html": "Denonvilliers' fascia", "is_correct": false}, {"label_html": "Middle sacral artery", "is_correct": true}, {"label_html": "Bladder", "is_correct": false}, {"label_html": "Rectovesical pouch", "is_correct": false}, {"label_html": "Seminal vesicles", "is_correct": false}], "correct_index": 1, "explanation_html": "With the exception of the middle sacral artery all of the other structures lie anterior to the rectum. They may all be palpated during digital rectal examination."}, {"number": 462, "topic": "Rectum", "stem_html": "What vessel is the origin of the middle rectal artery?", "options": [{"label_html": "Aorta", "is_correct": false}, {"label_html": "Inferior mesenteric artery", "is_correct": false}, {"label_html": "Superior mesenteric artery", "is_correct": false}, {"label_html": "Internal iliac artery", "is_correct": true}, {"label_html": "Internal pudendal artery", "is_correct": false}], "correct_index": 3, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">The rectum is supplied by 3 main vessels<br><ul><li>Superior rectal artery from inferior mesenteric artery<\/li><li>Middle rectal artery from the internal iliac artery<\/li><li>Inferior rectal artery from the internal pudendal artery<\/li><\/ul><\/div>The rectum has a dual blood supply. The superior rectal artery is a branch of the inferior mesenteric artery. Inferiorly, it derives a blood supply from branches of the internal iliac artery."}, {"number": 463, "topic": "Rectum", "stem_html": "A 56 year old lorry driver presents to the emergency department after returning from his usual week long trucking trip with excruciating pain around his anus. The patient admits to drinking beer when not working and notes that his meals usually consist of fast food. He has no allergies, takes no medications, and his clinical observations are normal. On examination, he was found to have a tender lump on the right side of his anus that measures 1 cm in diameter. The lump is bluish with surrounding  oedema. It is visible without the aid of a proctoscope . It is soft and tender on palpation. The remainder of the history and physical examination are unremarkable. Which vein drains the vessels responsible for the formation of this lump?", "options": [{"label_html": "Internal haemorrhoids", "is_correct": false}, {"label_html": "Internal pudendal", "is_correct": true}, {"label_html": "Inferior mesenteric", "is_correct": false}, {"label_html": "Inferior vena cava", "is_correct": false}, {"label_html": "Superior rectal", "is_correct": false}], "correct_index": 1, "explanation_html": "Venous drainage of hemorrhoidal tissue mirrors embryologic origin. Internal hemorrhoids drain through the superior rectal vein into the portal system. External hemorrhoids drain through the inferior rectal vein into the inferior vena cava."}, {"number": 464, "topic": "Rectum", "stem_html": "A 56 year old lorry driver presents to the emergency department after returning from his usual week long trucking trip with excruciating pain around his anus. The patient admits to drinking beer when not working and notes that his meals usually consist of fast food. He has no allergies, takes no medications, and his clinical observations are normal. On examination, he was found to have a tender lump on the right side of his anus that measures 1 cm in diameter. The lump is bluish with surrounding  oedema. It is visible without the aid of a proctoscope . It is soft and tender on palpation. The remainder of the history and physical examination are unremarkable. Which vein drains the vessels responsible for the formation of this lump?", "options": [{"label_html": "Internal haemorrhoids", "is_correct": false}, {"label_html": "Internal pudendal", "is_correct": true}, {"label_html": "Inferior mesenteric", "is_correct": false}, {"label_html": "Inferior vena cava", "is_correct": false}, {"label_html": "Superior rectal", "is_correct": false}], "correct_index": 1, "explanation_html": "Venous drainage of hemorrhoidal tissue mirrors embryologic origin. Internal hemorrhoids drain through the superior rectal vein into the portal system. External hemorrhoids drain through the inferior rectal vein into the inferior vena cava."}, {"number": 465, "topic": "Rectum", "stem_html": "A 45 year old man is undergoing a low anterior resection for a carcinoma of the rectum. Which of the following fascial structures will need to be divided to mobilise the mesorectum from the sacrum and coccyx?", "options": [{"label_html": "Denonvilliers fascia", "is_correct": false}, {"label_html": "Colles fascia", "is_correct": false}, {"label_html": "Sibsons fascia", "is_correct": false}, {"label_html": "Waldeyers fascia", "is_correct": true}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 3, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Fascial layers surrounding the rectum:<br><ul><li>Anteriorly lies the fascia of Denonvilliers<\/li><li>Posteriorly lies Waldeyers fascia<\/li><\/ul><\/div>Waldeyers fascia separates the mesorectum from the sacrum and will need to be divided."}, {"number": 466, "topic": "Rectum", "stem_html": "A 56 year old lady is referred to the colorectal clinic with symptoms of pruritus ani. On examination, a polypoidal mass is identified inferior to the dentate line. A biopsy confirms squamous cell carcinoma. To which of the following lymph node groups will the lesion potentially metastasise?", "options": [{"label_html": "Internal iliac", "is_correct": false}, {"label_html": "External iliac", "is_correct": false}, {"label_html": "Mesorectal", "is_correct": false}, {"label_html": "Inguinal", "is_correct": true}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 3, "explanation_html": "Lesions distal to the dentate line drain to the inguinal nodes. Occasionally this will result in the need for a block dissection of the groin."}], "note_html": "The rectum is approximately 12 cm long. It is a capacitance organ. It has both intra and extraperitoneal components. The transition between the sigmoid colon is marked by the disappearance of the tenia coli.The extra peritoneal rectum is surrounded by mesorectal fat that also contains lymph nodes. This mesorectal fatty layer is removed surgically during rectal cancer surgery (Total Mesorectal Excision). The fascial layers that surround the rectum are important clinical landmarks, anteriorly lies the fascia of Denonvilliers. Posteriorly lies Waldeyers fascia.<br><br><b>Extra peritoneal rectum<\/b><br><ul><li>Posterior upper third<\/li><li>Posterior and lateral middle third <\/li><li>Whole lower third<\/li><\/ul><br><b>Relations<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Anteriorly (Males)<\/b><\/td><td>Rectovesical pouch<br>Bladder<br>Prostate<br>Seminal vesicles<\/td><\/tr><tr><td><b>Anteriorly (Females)<\/b><\/td><td>Recto-uterine pouch (Douglas)<br>Cervix<br>Vaginal wall<\/td><\/tr><tr><td><b>Posteriorly<\/b><\/td><td>Sacrum<br>Coccyx <br>Middle sacral artery<\/td><\/tr><tr><td><b>Laterally<\/b><\/td><td>Levator ani<br>Coccygeus<\/td><\/tr><\/tbody><\/table><\/div><br><b>Arterial supply<\/b><br>Superior rectal artery <br>Middle rectal artery (from the internal iliac)<br>Inferior rectal artery (from the pudendal vessels)<br><br><b>Venous drainage<\/b><br>Superior rectal vein<br>Inferior rectal vein<br>Note the venous drainage is a site of portosystemic anastomosis.<br><br><b>Lymphatic drainage<\/b><br><ul><li>Mesorectal lymph nodes (superior to dentate line)<\/li><li>Inguinal nodes (inferior to dentate line)<\/li><\/ul>"}, {"name": "Rectus abdominis muscle", "questions": [{"number": 467, "topic": "Rectus abdominis muscle", "stem_html": "A 45 year old man presents with bilateral inguinal hernias. The surgical team decide to repair these laparoscopically through an extraperitoneal approach. Through an infraumbilical incision the surgeons displace the inferior aspect of the rectus abdominis muscle anteriorly and place a prosthetic mesh into the area to repair the hernias. Which structure will lie posterior to the mesh?", "options": [{"label_html": "Peritoneum", "is_correct": true}, {"label_html": "Internal oblique aponeurosis", "is_correct": false}, {"label_html": "External oblique aponeurosis", "is_correct": false}, {"label_html": "Posterior aspect of the rectus sheath", "is_correct": false}, {"label_html": "Bucks fascia", "is_correct": false}], "correct_index": 0, "explanation_html": "During a TEP repair of inguinal hernia the only structure to lie posterior to the mesh is peritoneum. The question is really only asking which structure lies posterior to the rectus abdominis muscle. Since this region is below the arcuate line, the transversalis fascia and peritoneum lie posterior to it. Bucks fascia lies in the penis."}, {"number": 468, "topic": "Rectus abdominis muscle", "stem_html": "A patient undergoes a femoral hernia repair and at operation the surgeon decides to enter the abdominal cavity to resect small bowel. She makes a transverse incision two thirds of the way between umbilicus and the symphysis pubis. Which of the structures listed below is least likely to be divided?", "options": [{"label_html": "Rectus abdominis", "is_correct": false}, {"label_html": "External oblique aponeurosis", "is_correct": false}, {"label_html": "Peritoneum", "is_correct": false}, {"label_html": "Fascia transversalis", "is_correct": false}, {"label_html": "Posterior lamina of the rectus sheath", "is_correct": true}], "correct_index": 4, "explanation_html": "An incision at this level lies below the arcuate line and the posterior wall of the rectus sheath is deficient at this level."}], "note_html": "The rectus sheath is formed by the aponeuroses of the lateral abdominal wall muscles. The rectus sheath has a composition that varies according to anatomical level. <br><br>1. Above the costal margin the anterior sheath is composed of external oblique aponeurosis, the costal cartilages are posterior to it.<br>2. From the costal margin to the arcuate line, the anterior rectus sheath is composed of external oblique aponeurosis and the anterior part of the internal oblique aponeurosis. The posterior part of the internal oblique aponeurosis and transversus abdominis form the posterior rectus sheath.<br>3. Below the arcuate line the aponeuroses of all the abdominal muscles lie in anterior aspect of the rectus sheath. Posteriorly lies the transversalis fascia and peritoneum. <br><br>The arcuate line is the point at which the inferior epigastric vessels enter the rectus sheath."}, {"name": "Recurrent laryngeal nerve", "questions": [{"number": 469, "topic": "Recurrent laryngeal nerve", "stem_html": "A 53 year old man is to undergo a thyroidectomy. Which nerve is at greatest risk?", "options": [{"label_html": "Hypoglossal", "is_correct": false}, {"label_html": "Recurrent laryngeal", "is_correct": true}, {"label_html": "Ansa cervicalis", "is_correct": false}, {"label_html": "Accessory", "is_correct": false}, {"label_html": "Marginal mandibular", "is_correct": false}], "correct_index": 1, "explanation_html": "Recurrent laryngeal nerve injury may complicate thyroid surgery in up to 1- 2% of cases."}, {"number": 470, "topic": "Recurrent laryngeal nerve", "stem_html": "The following muscles are supplied by the recurrent laryngeal nerve except:", "options": [{"label_html": "Transverse arytenoid", "is_correct": false}, {"label_html": "Posterior crico-arytenoid", "is_correct": false}, {"label_html": "Cricothyroid", "is_correct": true}, {"label_html": "Oblique arytenoid", "is_correct": false}, {"label_html": "Thyroarytenoid", "is_correct": false}], "correct_index": 2, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Innervates: all intrinsic larynx muscles (excluding cricothyroid)<\/div>The external branch of the superior laryngeal nerve innervates the cricothyroid muscle."}, {"number": 471, "topic": "Recurrent laryngeal nerve", "stem_html": "The recurrent laryngeal is connected to which of the following nerves?", "options": [{"label_html": "Trigeminal", "is_correct": false}, {"label_html": "Accessory", "is_correct": false}, {"label_html": "Hypoglossal", "is_correct": false}, {"label_html": "Vagus", "is_correct": true}, {"label_html": "Glossopharyngeal", "is_correct": false}], "correct_index": 3, "explanation_html": "<p>No explanation provided.<\/p>"}], "note_html": "<ul><li>Branch of the vagus nerve<\/li><\/ul><br><b>Path<\/b><br><br><b>Right<\/b><br><ul><li>Arises anterior to the subclavian artery and ascends obliquely next to the trachea, behind the common carotid artery <\/li><li>It is either anterior or posterior to the inferior thyroid artery<\/li><\/ul><br><b>Left<\/b><br><ul><li>Arises left to the arch of the aorta<\/li><li>Winds below the aorta<\/li><li>Ascends along the side of the trachea <\/li><\/ul><br><b>Then both<\/b><br><br><ul><li>Pass in a groove between the trachea and oesophagus<\/li><li>Enters the larynx behind the articulation between the thyroid cartilage and cricoid<\/li><li>Distributed to larynx muscles<\/li><\/ul><br><b>Branches to<\/b><br><br><ul><li>Cardiac plexus<\/li><li>Mucous membrane and muscular coat of the oesophagus and trachea<\/li><\/ul><br><b>Innervates<\/b><br><br><ul><li>Intrinsic larynx muscles (excluding cricothyroid)<\/li><\/ul><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb013b.jpg\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb013.jpg\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Recurrent laryngeal nerve\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb013b.jpg\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}, {"name": "Renal anatomy", "questions": [{"number": 472, "topic": "Renal anatomy", "stem_html": "A 56 year old man is undergoing a radical nephrectomy via a posterior approach. Which of the following structures is most likely to be encountered during the operative approach?", "options": [{"label_html": "8th rib", "is_correct": false}, {"label_html": "10th rib", "is_correct": false}, {"label_html": "6th rib", "is_correct": false}, {"label_html": "12th rib", "is_correct": true}, {"label_html": "9th rib", "is_correct": false}], "correct_index": 3, "explanation_html": "The 11th and 12th ribs lie posterior to the kidneys and may be encountered during a posterior approach. A pneumothorax is a recognised complication of this type of surgery."}, {"number": 473, "topic": "Renal anatomy", "stem_html": "A 44 year old man is stabbed in the back and the left kidney is injured. A haematoma forms, which of the following fascial structures will contain the haematoma?", "options": [{"label_html": "Waldeyers fascia", "is_correct": false}, {"label_html": "Sibsons fascia", "is_correct": false}, {"label_html": "Bucks fascia", "is_correct": false}, {"label_html": "Gerotas fascia", "is_correct": true}, {"label_html": "Denonvilliers fascia", "is_correct": false}], "correct_index": 3, "explanation_html": "Waldeyers fascia- Posterior ano-rectum<br>Sibsons fascia- Lung apex<br>Bucks fascia- Base of penis<br>Gerotas fascia- Surrounding kidney<br>Denonvilliers fascia- Between rectum and prostate"}, {"number": 474, "topic": "Renal anatomy", "stem_html": "At which level is the hilum of the left kidney located?", "options": [{"label_html": "L1", "is_correct": true}, {"label_html": "L2", "is_correct": false}, {"label_html": "T12", "is_correct": false}, {"label_html": "T11", "is_correct": false}, {"label_html": "L3", "is_correct": false}], "correct_index": 0, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Remember L1 ('left one') is the level of the hilum of the left kidney<\/div>"}, {"number": 475, "topic": "Renal anatomy", "stem_html": "At which level is the hilum of the left kidney located?", "options": [{"label_html": "L1", "is_correct": true}, {"label_html": "L2", "is_correct": false}, {"label_html": "T12", "is_correct": false}, {"label_html": "T11", "is_correct": false}, {"label_html": "L3", "is_correct": false}], "correct_index": 0, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Remember L1 ('left one') is the level of the hilum of the left kidney<\/div>"}], "note_html": "Each kidney is about 11cm long, 5cm wide and 3cm thick. They are located in a deep gutter alongside the projecting vertebral bodies, on the anterior surface of psoas major. In most cases the left kidney lies approximately 1.5cm higher than the right. The upper pole of both kidneys approximates with the 11th rib (beware pneumothorax during nephrectomy). On the left hand side the hilum is located at the L1 vertebral level and the right kidney at level L1-2. The lower border of the kidneys is usually alongside L3. <br><br>The table below shows the anatomical relations of the kidneys:<br><br><b>Relations<\/b><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Relations<\/b><\/th><th><b>Right Kidney<\/b><\/th><th><b>Left Kidney<\/b><\/th><\/tr><\/thead><tbody><tr><td>Posterior<\/td><td>Quadratus lumborum, diaphragm, psoas major, transversus abdominis<\/td><td>Quadratus lumborum, diaphragm, psoas major, transversus abdominis<\/td><\/tr><tr><td>Anterior<\/td><td>Hepatic flexure of colon<\/td><td>Stomach, Pancreatic tail<\/td><\/tr><tr><td>Superior<\/td><td>Liver, adrenal gland<\/td><td>Spleen, adrenal gland<\/td><\/tr><\/tbody><\/table><\/div><br><b>Fascial covering<\/b><br>Each kidney and suprarenal gland is enclosed within a common layer of investing fascia, derived from the transversalis fascia. It is divided into anterior and posterior layers (Gerotas fascia).<br><br><b>Renal structure<\/b><br>Kidneys are surrounded by an outer cortex and an inner medulla which usually contains between 6 and 10 pyramidal structures. The papilla marks the innermost apex of these. They terminate at the renal pelvis, into the ureter.<br>Lying in a hollow within the kidney is the renal sinus. This contains:<br>1. Branches of the renal artery<br>2. Tributaries of the renal vein<br>3. Major and minor calyces's<br>4. Fat<br><br><b>Structures at the renal hilum<\/b><br>The renal vein lies most anteriorly, then renal artery (it is an end artery) and the ureter lies most posterior."}, {"name": "Renal arteries", "questions": [{"number": 476, "topic": "Renal arteries", "stem_html": "A 43 year old lady is donating her left kidney to her sister and the surgeons are harvesting the left kidney. Which of the following structures will lie most anteriorly at the hilum of the left kidney?", "options": [{"label_html": "Left renal artery", "is_correct": false}, {"label_html": "Left renal vein", "is_correct": true}, {"label_html": "Left ureter", "is_correct": false}, {"label_html": "Left ovarian vein", "is_correct": false}, {"label_html": "Left ovarian artery", "is_correct": false}], "correct_index": 1, "explanation_html": "The renal veins lie most anteriorly, then artery and ureter lies posteriorly."}, {"number": 477, "topic": "Renal arteries", "stem_html": "A 56 year old man is undergoing a right nephrectomy. The surgeons divide the renal artery. At what level does this usually branch off the abdominal aorta?", "options": [{"label_html": "T9", "is_correct": false}, {"label_html": "L2", "is_correct": true}, {"label_html": "L3", "is_correct": false}, {"label_html": "T10", "is_correct": false}, {"label_html": "L4", "is_correct": false}], "correct_index": 1, "explanation_html": "The renal arteries usually branch off the aorta on a level with L2."}], "note_html": "<ul><li> The right renal artery is longer than the left renal artery<\/li><li>The renal vein/artery/pelvis enter the kidney at the hilum<\/li><\/ul><br><b>Relations<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Right<\/b><\/td><td>Anterior- IVC, right renal vein, the head of the pancreas, and the descending part of the duodenum<\/td><\/tr><tr><td><b>Left<\/b><\/td><td>Anterior- left renal vein, the tail of the pancreas<\/td><\/tr><\/tbody><\/table><\/div><br><b>Branches<\/b><br><ul><li>The renal arteries are direct branches off the aorta (upper border of L2- right side and L1 - left side)<\/li><li>In 30% there may be accessory arteries (mainly left side). Instead of entering the kidney at the hilum, they usually pierce the upper or lower part of the organ.<\/li><li>Before reaching the hilum of the kidney, each artery divides into four or five segmental branches (renal vein anterior and ureter posterior); which then divide within the sinus into lobar arteries supplying each pyramid and cortex.<\/li><li>Each vessel gives off some small inferior suprarenal branches to the suprarenal gland, the ureter, and the surrounding cellular tissue and muscles.<\/li><\/ul>"}, {"name": "Retromandibular vein", "questions": [{"number": 478, "topic": "Retromandibular vein", "stem_html": "A 24 year old man is involved in a fight and his face is cut with a knife. The wound lies immediately anterior to the tragus of the ear and extends anteriorly. The wound is surgically explored and the laceration is found to be mainly superficial. It extends slightly more deeply immediately inferior to the main trunk of the facial nerve. Bleeding is observed, from which of the following is it most likely to originate?", "options": [{"label_html": "External carotid artery", "is_correct": false}, {"label_html": "Retromandibular vein", "is_correct": true}, {"label_html": "Occipital artery", "is_correct": false}, {"label_html": "Maxillary artery", "is_correct": false}, {"label_html": "Ascending pharyngeal artery", "is_correct": false}], "correct_index": 1, "explanation_html": "The retromandibular vein lies slightly more deeply than the facial nerve in the parotid gland. It is formed from the maxillary and superficial temporal vein."}, {"number": 479, "topic": "Retromandibular vein", "stem_html": "Which of the following is a recognised tributary of the retromandibular vein?", "options": [{"label_html": "Internal jugular vein", "is_correct": false}, {"label_html": "External jugular vein", "is_correct": false}, {"label_html": "Anterior temporal diploic vein", "is_correct": false}, {"label_html": "Maxillary vein", "is_correct": true}, {"label_html": "Inferior opthalmic vein", "is_correct": false}], "correct_index": 3, "explanation_html": "The retromandibular vein is formed from the union of the maxillary and superficial temporal veins."}], "note_html": "- Formed by a union of the maxillary vein and superficial temporal vein<br><ul><li>It descends through the parotid gland and bifurcates within it<\/li><li>The anterior division passes forwards to join the facial vein, the posterior division is one of the tributaries of the external jugular vein<\/li><\/ul>"}, {"name": "Right colon", "questions": [{"number": 480, "topic": "Right colon", "stem_html": "A 73 year old lady is admitted with right iliac fossa pain. A plain abdominal x-ray is taken and the caecal diameter measured. Which of the following caecal diameters is pathological?", "options": [{"label_html": "4cm", "is_correct": false}, {"label_html": "5cm", "is_correct": false}, {"label_html": "6cm", "is_correct": false}, {"label_html": "7cm", "is_correct": false}, {"label_html": "10cm", "is_correct": true}], "correct_index": 4, "explanation_html": "8 cm is still within normal limits. However, caecal diameters of 9 and 10 are pathological and should prompt further investigation."}], "note_html": "<b>Ileocaecal valve<\/b><br><ul><li>Entry point of the terminal ileum to the caecum<\/li><li>An important colonoscopic landmark<\/li><li>The ileocaecal valve is not always competent and this may allow partial decompression of an obstructed colon<\/li><\/ul><br><b>Appendix<\/b><br><ul><li>At the base of the caecum the taenia coalesce to mark the base of the appendix<\/li><li>This is a reliable way of locating the appendix surgically and is a constant landmark<\/li><li>The appendix has a small mesentery (the mesoappendix) and in this runs the appendiceal artery, a branch of the ileocolic artery.<\/li><\/ul><br>The posterior aspect of the right colon is extra peritoneal and the anterior aspect intraperitoneal. <br><br><b>Relations<\/b><br><br><ul><li><b>Posterior<\/b> <\/li><\/ul>Iliacus, Iliolumbar ligament, Quadratus lumborum, Transverse abdominis, Diaphragm at the tip of the last rib; Lateral cutaneous, ilioinguinal, and iliohypogastric nerves; the iliac branches of the iliolumbar vessels, the fourth lumbar artery, gonadal vessels, ureter and the right kidney.<br><br><ul><li><b>Superior<\/b><\/li><\/ul>Right kidney which is embedded in the perinephric fat<br><br><ul><li><b>Medial<\/b><\/li><\/ul>Mesentery which contains the ileocolic artery that supplies the right colon and terminal ileum. A further branch , the right colic artery, also contributes to supply the hepatic flexure and proximal transverse colon. Medially these pass through the mesentery to join the SMA. This occurs near to the head of the pancreas and care has to be taken when ligating the ileocolic artery near to its origin in cancer cases for fear of impinging on the SMA.<br><br>  - <b>Anterior<\/b><br>Coils of small intestine, the right edge of the greater omentum, and the anterior abdominal wall. <br><br><br><b>Nerve supply<\/b><br><ul><li>Parasympathetic fibres of the vagus nerve (CN X)<\/li><\/ul><br><b>Arterial supply<\/b><br><ul><li>Ileocolic artery and right colic artery, both branches of the SMA. While the ileocolic artery is almost always present, the right colic can be absent in 5-15% of individuals.<\/li><\/ul>"}, {"name": "Root of the neck", "questions": [{"number": 481, "topic": "Root of the neck", "stem_html": "A 55 year old man with carcinoma of the larynx is undergoing a difficult laryngectomy. The surgeons divide the thyrocervical trunk, from which of the following vessels does this structure most commonly originate?", "options": [{"label_html": "Subclavian artery", "is_correct": true}, {"label_html": "Common carotid artery", "is_correct": false}, {"label_html": "Vertebral artery", "is_correct": false}, {"label_html": "External carotid artery", "is_correct": false}, {"label_html": "Internal carotid artery", "is_correct": false}], "correct_index": 0, "explanation_html": "The thyrocervical trunk is a branch of the subclavian artery. It arises from the first part between the subclavian artery and the inner border of scalenus anterior. It branches off the subclavian distal to the vertebral artery."}, {"number": 482, "topic": "Root of the neck", "stem_html": "Which of the following statements relating to the root of the neck is false?", "options": [{"label_html": "The lung projects into the neck beyond the first rib and is constrained by Sibson's fascia", "is_correct": false}, {"label_html": "The subclavian artery arches over the first rib anterior to scalenus anterior", "is_correct": true}, {"label_html": "The trunks of the brachial plexus lie posterior to the subclavian artery on the first rib", "is_correct": false}, {"label_html": "The roots and trunks of the Brachial plexus lie between scalenus anterior and scalenus medius muscles", "is_correct": false}, {"label_html": "The thyrocervical trunk is a branch of the subclavian artery", "is_correct": false}], "correct_index": 1, "explanation_html": "The subclavian artery lies posterior to scalenus anterior, the vein lies in front. Sibson's fascia is another name for the suprapleural membrane."}], "note_html": "<b>Thoracic Outlet<\/b><br><br><ul><li>Where the subclavian artery and vein and the brachial plexus exit the thorax and enter the arm.<\/li><li>They pass over the 1st rib and under the clavicle. <\/li><li>The subclavian vein is the most anterior structure and is immediately anterior to scalenus anterior and its attachment to the first rib. <\/li><li>Then subclavian artery passes between the anterior and middle scalene muscles.<\/li><li>At the level of the first rib, the lower cervical nerve roots combine to form the 3 trunks of the brachial plexus. The lowest trunk is formed by the union of C8 and T1, and this trunk lies directly posterior to the artery and is in contact with the superior surface of the first rib. <\/li><\/ul><br>Thoracic outlet obstruction causes neurovascular compromise."}, {"name": "Saphenous vein", "questions": [{"number": 483, "topic": "Saphenous vein", "stem_html": "During short saphenous vein surgery for varicose veins which of the following nerves is particularly at risk?", "options": [{"label_html": "Sural nerve", "is_correct": true}, {"label_html": "Popliteal nerve", "is_correct": false}, {"label_html": "Tibial nerve", "is_correct": false}, {"label_html": "Femoral nerve", "is_correct": false}, {"label_html": "Saphenous nerve", "is_correct": false}], "correct_index": 0, "explanation_html": "<p>No explanation provided.<\/p>"}, {"number": 484, "topic": "Saphenous vein", "stem_html": "A 23 year old lady is undergoing a trendelenberg procedure for varicose veins. During the dissection of the saphenofemoral junction, which of the structures listed below is most liable to injury?", "options": [{"label_html": "Superficial circumflex iliac artery", "is_correct": false}, {"label_html": "Superficial circumflex iliac vein", "is_correct": false}, {"label_html": "Femoral artery", "is_correct": false}, {"label_html": "Femoral nerve", "is_correct": false}, {"label_html": "Deep external pudendal artery", "is_correct": true}], "correct_index": 4, "explanation_html": "The deep external pudendal artery runs under the long saphenous vein close to its origin and may be injured. It is at greatest risk of injury during the flush ligation of the saphenofemoral junction. Provided an injury is identified and vessel ligated, injury is seldom associated with any serious adverse sequelae."}, {"number": 485, "topic": "Saphenous vein", "stem_html": "A 43 year old lady presents with varicose veins and undergoes a saphenofemoral disconnection, long saphenous vein stripping to the ankle and isolated hook phlebectomies. Post operatively she notices an area of numbness superior to her ankle. What is the most likely cause for this?", "options": [{"label_html": "Sural nerve injury", "is_correct": false}, {"label_html": "Femoral nerve injury", "is_correct": false}, {"label_html": "Saphenous nerve injury", "is_correct": true}, {"label_html": "Common peroneal nerve injury", "is_correct": false}, {"label_html": "Superficial peroneal nerve injury", "is_correct": false}], "correct_index": 2, "explanation_html": "The sural nerve is related to the short saphenous vein. The saphenous nerve is related to the long saphenous vein below the knee and for this reason full length stripping of the vein is no longer advocated."}, {"number": 486, "topic": "Saphenous vein", "stem_html": "A 43 year old lady presents with varicose veins and undergoes a saphenofemoral disconnection, long saphenous vein stripping to the ankle and isolated hook phlebectomies. Post operatively she notices an area of numbness superior to her ankle. What is the most likely cause for this?", "options": [{"label_html": "Sural nerve injury", "is_correct": false}, {"label_html": "Femoral nerve injury", "is_correct": false}, {"label_html": "Saphenous nerve injury", "is_correct": true}, {"label_html": "Common peroneal nerve injury", "is_correct": false}, {"label_html": "Superficial peroneal nerve injury", "is_correct": false}], "correct_index": 2, "explanation_html": "The sural nerve is related to the short saphenous vein. The saphenous nerve is related to the long saphenous vein below the knee and for this reason full length stripping of the vein is no longer advocated."}], "note_html": "<b>Long saphenous vein<\/b><br>This vein may be harvested for bypass surgery, or removed as treatment for varicose veins with saphenofemoral junction incompetence.<br><br><ul><li>Originates at the 1st digit where the dorsal vein merges with the dorsal venous arch of the foot<\/li><li> Passes anterior to the medial malleolus and runs up the medial side of the leg<\/li><li>At the knee, it runs over the posterior border of the medial epicondyle of the femur bone<\/li><li>Then passes laterally to lie on the anterior surface of the thigh before entering an opening in the fascia lata called the saphenous opening<\/li><li>It joins with the femoral vein in the region of the femoral triangle at the saphenofemoral junction<\/li><\/ul><br><b>Tributaries<\/b><br><ul><li>Medial marginal <\/li><li>Superficial epigastric<\/li><li>Superficial iliac circumflex<\/li><li>Superficial external pudendal veins<\/li><\/ul><br><br><b>Short saphenous vein<\/b> <br><ul><li>Originates at the 5th digit where the dorsal vein merges with the dorsal venous arch of the foot, which attaches to the great saphenous vein. <\/li><li>It passes around the lateral aspect of the foot (inferior and posterior to the lateral malleolus) and runs along the posterior aspect of the leg (with the sural nerve)<\/li><li>Passes between the heads of the gastrocnemius muscle, and drains into the popliteal vein, approximately at or above the level of the knee joint.<\/li><\/ul>"}, {"name": "Sartorius", "questions": [{"number": 487, "topic": "Sartorius", "stem_html": "An 18 year old athlete attends orthopaedic clinic reporting pain and swelling over the medial aspect of the knee joint.  The pain occurs when climbing the stairs, but is not present when walking on flat ground.  Clinically there is pain over the medial, proximal tibia and the McMurray test is negative.  What is the most likely cause of this patient's symptoms?", "options": [{"label_html": "Anterior cruciate ligament tear", "is_correct": false}, {"label_html": "Prepatellar bursitis", "is_correct": false}, {"label_html": "Medial meniscus injury", "is_correct": false}, {"label_html": "Pes Anserinus Bursitis", "is_correct": true}, {"label_html": "Fracture of tibia", "is_correct": false}], "correct_index": 3, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Pes anserinus: GOOSE'S FOOT<br><br>Combination of sartorius, gracilis and semitendinous tendons inserting into the anteromedial proximal tibia.<\/div>Pes Anserinus Bursitis is common in sportsmen due to overuse injuries.  The main sign is of pain in the medial proximal tibia.  As the McMurray test is negative, medial meniscal injury is excluded."}, {"number": 488, "topic": "Sartorius", "stem_html": "Which of the following is true in relation to the sartorius muscle?", "options": [{"label_html": "Innervated by the deep branch of the femoral nerve", "is_correct": false}, {"label_html": "Inserts at the fibula", "is_correct": false}, {"label_html": "It is the shortest muscle in the body", "is_correct": false}, {"label_html": "Forms the Pes anserinus with Gracilis and semitendinosus muscle", "is_correct": true}, {"label_html": "Causes extension of the knee", "is_correct": false}], "correct_index": 3, "explanation_html": "It is innervated by the superficial branch of the femoral nerve. It is a component of the pes anserinus."}, {"number": 489, "topic": "Sartorius", "stem_html": "During a block dissection of the groin, the sartorius muscle is identified. What is the nerve supply to this muscle?", "options": [{"label_html": "Obturator nerve", "is_correct": false}, {"label_html": "Posterior division of the femoral nerve", "is_correct": false}, {"label_html": "Anterior division of the femoral nerve", "is_correct": true}, {"label_html": "Sciatic nerve", "is_correct": false}, {"label_html": "Genitofemoral nerve", "is_correct": false}], "correct_index": 2, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Sartorius is supplied by the anterior (superficial) branch of the femoral nerve.<\/div>Most of the branches of the superficial femoral nerve are cutaneous. However, it does also supply sartorius."}, {"number": 490, "topic": "Sartorius", "stem_html": "What is the nerve supply of the structure indicated by the arrow?<br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/bbb070b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/bbb070.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"><span style=\"font-size:11px; color:LightGray;\">© Image provided by the University of Sheffield<\/span><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/bbb070b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>", "options": [{"label_html": "Sciatic nerve", "is_correct": false}, {"label_html": "Common peroneal nerve", "is_correct": false}, {"label_html": "Femoral nerve", "is_correct": true}, {"label_html": "Obturator nerve", "is_correct": false}, {"label_html": "Gluteal nerve", "is_correct": false}], "correct_index": 2, "explanation_html": "The muscle indicated is the sartorius and it is innervated by the femoral nerve."}], "note_html": "- Longest strap muscle in the body<br><ul><li>Most superficial muscle in the anterior compartment of the thigh<\/li><\/ul><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Origin<\/b><\/td><td>Anterior superior iliac spine<\/td><\/tr><tr><td><b>Insertion<\/b><\/td><td>Medial surface of the of the body of the tibia (upper part). It inserts anterior to gracilis and semitendinosus<\/td><\/tr><tr><td><b>Nerve Supply<\/b><\/td><td>Femoral nerve (L2,3 -root values for sartorius)<\/td><\/tr><tr><td><b>Action<\/b><\/td><td><ul><li>Flexor of the hip and knee, slight abducts the thigh and rotates it laterally<\/li><li>It assists with medial rotation of the tibia on the femur. For example it would play a pivotal role in placing the right heel onto the left knee ( and vice versa)<\/li><\/ul><\/td><\/tr><tr><td><b>Important relations<\/b><\/td><td>The middle third of this muscle, and its strong underlying fascia forms the roof of the adductor canal , in which lie the femoral vessels, the saphenous nerve and the nerve to vastus medialis.<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Scalene muscles", "questions": [{"number": 491, "topic": "Scalene muscles", "stem_html": "Which of the following structures separates the subclavian artery and vein?", "options": [{"label_html": "Digastric muscle", "is_correct": false}, {"label_html": "Prevertebral fascia", "is_correct": false}, {"label_html": "Anterior scalene muscle", "is_correct": true}, {"label_html": "Middle scalene muscle", "is_correct": false}, {"label_html": "Omohyoid", "is_correct": false}], "correct_index": 2, "explanation_html": "The anterior scalene muscle is an important anatomical landmark and separates the subclavian vein (anterior) from the subclavian artery (posterior)."}, {"number": 492, "topic": "Scalene muscles", "stem_html": "Which of the following relationship descriptions regarding the scalene muscles is incorrect?", "options": [{"label_html": "The brachial plexus passes anterior to the middle scalene muscle", "is_correct": false}, {"label_html": "The phrenic nerve lies anterior to the anterior scalene muscle", "is_correct": false}, {"label_html": "The subclavian artery passes posterior to the middle scalene", "is_correct": true}, {"label_html": "The subclavian vein lies anterior to the anterior scalene muscle at the level of the first rib", "is_correct": false}, {"label_html": "The anterior scalene inserts into the first rib", "is_correct": false}], "correct_index": 2, "explanation_html": "The subclavian artery passes anterior to the middle scalene."}], "note_html": "The 3 paired muscles are:<br><ul><li>Scalenus anterior: Elevate 1st rib and laterally flex the neck to same side<\/li><li>Scalenus medius: Same action as scalenus anterior<\/li><li>Scalenus posterior: Elevate 2nd rib and tilt the cervical spine<\/li><\/ul><br><div class=\"table-responsive\"><table class=\"tb\"><tbody><tr><td><b>Innervatio
