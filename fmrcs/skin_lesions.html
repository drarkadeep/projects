  <script id="quiz-data" type="application/json">{"title": "Skin Lesions", "topics": [{"name": "Benign skin diseases", "questions": [{"number": 1, "topic": "Benign skin diseases", "stem_html": "A 70 year old lady presents with a number of skin lesions that she describes as unsightly. On examination she has a number of raised lesions with a greasy surface located over her trunk. Apart from having a greasy surface the lesions also seem to have scattered keratin plugs located within them. What is the most likely diagnosis?", "options": [{"label_html": "Keratoacanthoma", "is_correct": false}, {"label_html": "Pilar cysts", "is_correct": false}, {"label_html": "Dermatofibroma", "is_correct": false}, {"label_html": "Seborrhoeic keratosis", "is_correct": true}, {"label_html": "Epidermoid cyst", "is_correct": false}], "correct_index": 3, "explanation_html": "Seborrhoeic keratosis may have a number of appearances. However, the scaly, thick, greasy surface with scattered keratin plugs makes this the most likely diagnosis."}, {"number": 2, "topic": "Benign skin diseases", "stem_html": "A 28 year old female presents with a small nodule located on the back of her neck. It is excised for cosmetic reasons and the histology report states that the lesion consists of a sebum filled lesion surrounded by the outer root sheath of a hair follicle. What is the most likely cause?", "options": [{"label_html": "Pilar cyst", "is_correct": true}, {"label_html": "Seborrheoic keratosis", "is_correct": false}, {"label_html": "Dermatofibroma", "is_correct": false}, {"label_html": "Atypical naevus", "is_correct": false}, {"label_html": "Spitz naevus", "is_correct": false}], "correct_index": 0, "explanation_html": "Pilar cysts may contain foul smelling cheesy material and are surrounded by the outer part of a hair follicle. Because of their histological appearances they are more correctly termed pilar cysts than sebaceous cysts."}, {"number": 3, "topic": "Benign skin diseases", "stem_html": "A 21 year old lady presents with a nodule on the posterior aspect of her right calf. It has been present at the site for the past 6 months and occurred at the site of a previous insect bite. Although the nodule appears small, on palpation it appears to be nearly twice the size it appears on examination. The overlying skin is faintly pigmented. What is the most likely cause?", "options": [{"label_html": "Pilar cyst", "is_correct": false}, {"label_html": "Dermatofibroma", "is_correct": true}, {"label_html": "Spitz naevus", "is_correct": false}, {"label_html": "Seborrhoeic wart", "is_correct": false}, {"label_html": "Basal cell carcinoma", "is_correct": false}], "correct_index": 1, "explanation_html": "Dermatofibromas may be pigmented and are often larger than they appear. They frequently occur at sites of previous trauma."}, {"number": 4, "topic": "Benign skin diseases", "stem_html": "Which of the skin lesions listed below are most likely to resemble a malignant melanoma?", "options": [{"label_html": "Spitz naevus", "is_correct": true}, {"label_html": "Dermatofibroma", "is_correct": false}, {"label_html": "Squamous cell carcinoma", "is_correct": false}, {"label_html": "Bowens disease", "is_correct": false}, {"label_html": "Seborrhoeic wart", "is_correct": false}], "correct_index": 0, "explanation_html": "Spitz naevi can often resemble melanoma and are best excised."}, {"number": 5, "topic": "Benign skin diseases", "stem_html": "A 28 year old man undergoes an ileocaecal resection and end ileostomy for Crohn's disease. One year later he presents with a deep painful ulcer at his stoma site. What is the most likely diagnosis?", "options": [{"label_html": "Bullous pemphigoid", "is_correct": false}, {"label_html": "Pemphigus vulgaris", "is_correct": false}, {"label_html": "Pyoderma gangrenosum", "is_correct": true}, {"label_html": "Squamous cell carcinoma", "is_correct": false}, {"label_html": "Poorly fitting appliance", "is_correct": false}], "correct_index": 2, "explanation_html": "Pyoderma gangrenosum is associated with inflammatory bowel disease (this patient had a stoma for crohns!). It is commonly found on lower limbs and described as being painful, the size of an insect bite and growing. It looks like a margherita pizza (with a red base and yellow topping!) Treatment involves steroids. It would be rare for a poorly fitting appliance to cause a deep painful ulcer."}], "note_html": "<b>Seborrhoeic keratosis<\/b><br><ul><li>Most commonly arise in patients over the age of 50 years, often idiopathic<\/li><li>Equal sex incidence and prevalence<\/li><li>Usually multiple lesions over face and trunk<\/li><li>Flat, raised, filiform and pedunculated subtypes are recognised<\/li><li>Variable colours and surface may have greasy scale overlying it<\/li><li>Treatment options consist of leaving alone or simple shave excision<\/li><\/ul><br><b>Melanocytic naevi<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Congenital melanocytic naevi<\/b><\/td><td><ul><li>Typically appear at, or soon after, birth<\/li><li>Usually greater than 1cm diameter<\/li><li>Increased risk of malignant transformation (increased risk greatest for large lesions)<\/li><\/ul><\/td><\/tr><tr><td><b>Junctional melanocytic naevi<\/b><\/td><td><ul><li>Circular macules<\/li><li>May have heterogeneous colour even within same lesion<\/li><li>Most naevi of the palms, soles and mucous membranes are of this type<\/li><\/ul><\/td><\/tr><tr><td><b>Compound naevi<\/b><\/td><td><ul><li>Domed pigmented nodules up to 1cm in diameter<\/li><li>Arise from junctional naevi, usually have uniform colour and are smooth<\/li><\/ul><\/td><\/tr><tr><td><b>Spitz naevus<\/b><\/td><td><ul><li>Usually develop over a few months in children<\/li><li>May be pink or red in colour, most common on face and legs<\/li><li>May grow up to 1cm and growth can be rapid, this usually results in excision<\/li><\/ul><\/td><\/tr><tr><td><b>Atypical naevus syndrome<\/b><\/td><td><ul><li>Atypical melanocytic naevi that may be autosomally dominantly inherited<\/li><li>Some individuals are at increased risk of melanoma (usually have mutations of CDKN2A gene)<\/li><li>Many people with atypical naevus syndrome AND a parent sibling with melanoma will develop melanoma<\/li><\/ul><\/td><\/tr><\/tbody><\/table><\/div><br><b>Epidermoid cysts<\/b><br><ul><li>Common and affect face and trunk<\/li><li>They have a central punctum, they may contain small quantities of sebum <\/li><li>The cyst lining is either normal epidermis (epidermoid cyst) or outer root sheath of hair follicle (pilar cyst)<\/li><\/ul><br><b>Dermatofibroma<\/b><br><ul><li>Solitary dermal nodules<\/li><li>Usually affect extremities of young adults<\/li><li>Lesions feel larger than they appear visually<\/li><li>Histologically they consist of proliferating fibroblasts merging with sparsely cellular dermal tissues<\/li><\/ul><br><b>Painful skin lesions<\/b><br><ul><li>Eccrine spiradenoma<\/li><li>Neuroma<\/li><li>Glomus tumour<\/li><li>Leiomyoma<\/li><li>Angiolipoma <\/li><li>Neurofibroma (rarely painful) and dermatofibroma (rarely painful)<\/li><\/ul>"}, {"name": "Sebaceous cysts", "questions": [{"number": 6, "topic": "Sebaceous cysts", "stem_html": "A 22 year old man presents with an infected sebaceous cyst. The cyst itself is swollen, discharging pus and has some surrounding erythema. What is the most appropriate treatment?", "options": [{"label_html": "Excision of the cyst and closure of the defect with interrupted 3/0 silk", "is_correct": false}, {"label_html": "Excision of the cyst and closure of the defect with subcuticular 4/0 undyed nylon", "is_correct": false}, {"label_html": "Incision and drainage with excision of the cyst wall and packing of the defect", "is_correct": true}, {"label_html": "Incision and drainage with conservation of the cyst wall and packing of the defect", "is_correct": false}, {"label_html": "Administration of oral co-amoxiclav and definitive surgery once the infection has cleared", "is_correct": false}], "correct_index": 2, "explanation_html": "The correct treatment for an infected sebaceous cyst is incision and drainage with removal of the cyst wall. Conservation of the cyst wall will invariably lead to recurrence. Under no circumstances should an infected wound like this be primarily closed. The administration of antibiotics without drainage of sepsis is futile."}, {"number": 7, "topic": "Sebaceous cysts", "stem_html": "A 29 year old man presents with a lump in his scalp. It is located approximately 4cm superior to the external occipital protuberance. It feels smooth and slightly fluctuant and has a centrally located small epithelial defect. What is the most likely underlying diagnosis?", "options": [{"label_html": "Cocks peculiar tumour", "is_correct": false}, {"label_html": "Dermoid cyst", "is_correct": false}, {"label_html": "Sebaceous cyst", "is_correct": true}, {"label_html": "Merkel cell tumour", "is_correct": false}, {"label_html": "Seborrhoeic wart", "is_correct": false}], "correct_index": 2, "explanation_html": "Sebaceous cysts are most frequently located in the scalp and have an associated central punctum. They may become infected and develop superficial ulceration in which case they are known as 'Cocks Peculiar Tumour'. The presence of a punctum is highly suggestive of a sebaceous cyst and are not typically found in the other lesions described."}, {"number": 8, "topic": "Sebaceous cysts", "stem_html": "Which of the following statements relating to sebaceous cysts is false?", "options": [{"label_html": "When infected and ulcerated, are also known as Cocks peculiar tumour", "is_correct": false}, {"label_html": "Typically contain pus", "is_correct": true}, {"label_html": "Are usually associated with a central punctum", "is_correct": false}, {"label_html": "Most commonly occur on the scalp", "is_correct": false}, {"label_html": "They will typically have a cyst wall", "is_correct": false}], "correct_index": 1, "explanation_html": "Sebaceous cysts usually contain sebum, pus is only present in infected sebaceous cysts which should then be treated by surgical incision and drainage."}], "note_html": "<ul><li>Originate from sebaceous glands and contain sebum.<\/li><li>Location: anywhere but most common scalp, ears, back, face, and upper arm (not palms of the hands and soles of the feet).<\/li><li>They will typically contain a punctum.<\/li><li>Excision of the cyst wall needs to be complete to prevent recurrence.<\/li><li>A Cock's 'Peculiar' Tumour is a suppurating and ulcerated sebaceous cyst. It may resemble a squamous cell carcinoma- hence its name.<\/li><\/ul>"}, {"name": "Skin Diseases", "questions": [{"number": 9, "topic": "Skin Diseases", "stem_html": "An 8 year old boy presented with a painless swelling on the superotemporal aspect of his orbit. It was smooth on examination, produced no visual disturbances. Following excision it was found to be lined by squamous epithelium and hair follicles. Which of the following lesions most closely matches these findings?", "options": [{"label_html": "Dermoid cyst", "is_correct": true}, {"label_html": "Desmoid tumour", "is_correct": false}, {"label_html": "Lipoma", "is_correct": false}, {"label_html": "Sebaceous cyst", "is_correct": false}, {"label_html": "Schwannoma", "is_correct": false}], "correct_index": 0, "explanation_html": "Dermoid cysts are embryological remnants and may be lined by hair and squamous epithelium (like teratomas). They are often located in the midline and may be linked to deeper structures resulting in a dumbbell shape to the lesion. Complete excision is required as they have a propensity to local recurrence if not excised.<br>Desmoid tumours are a different entity, they most commonly develop in ligaments and tendons. They are also referred to as aggressive fibromatosis and consist of fibroblast dense lesions (resembling scar tissue). They should be managed in a similar manner to soft tissue sarcomas."}, {"number": 10, "topic": "Skin Diseases", "stem_html": "A 22 year old man is investigated for weight loss. A duodenal biopsy taken as part of his investigations shows total villous atrophy and lymphocytic infiltrate. He has a skin lesion that has small itchy papules. What is the most likely underlying diagnosis of the skin lesion?", "options": [{"label_html": "Pyoderma gangrenosum", "is_correct": false}, {"label_html": "Dermatitis herpetiformis", "is_correct": true}, {"label_html": "Bullous pemphigoid", "is_correct": false}, {"label_html": "Acanthosis nigricans", "is_correct": false}, {"label_html": "Pemphigus vulgaris", "is_correct": false}], "correct_index": 1, "explanation_html": "The patient has coeliac disease and this is classically associated with dermatitis herpetiformis."}, {"number": 11, "topic": "Skin Diseases", "stem_html": "A patient with Crohns disease has a purple coloured skin lesion near an ileostomy site. What is the most likely diagnosis?", "options": [{"label_html": "Pyoderma gangrenosum", "is_correct": true}, {"label_html": "Pemphigus vulgaris", "is_correct": false}, {"label_html": "Metastatic Crohns disease", "is_correct": false}, {"label_html": "Dermatitis herpetiformis", "is_correct": false}, {"label_html": "Bullous pemphigoid", "is_correct": false}], "correct_index": 0, "explanation_html": "Pyoderma gangrenosum may occur in Crohns disease. Cutaneous involvement of granulomas a.k.a metastatic crohns is recognized but very rare and much less likely and therefore not the correct answer."}, {"number": 12, "topic": "Skin Diseases", "stem_html": "A 72 year old man presents with a large nodule on his face. It is friable. There is no regional lymphadenopathy. He is lost to follow up and re-attends several months later. On this occasion the lesion has been noted to resolve with scarring. What is the most likely lesion?", "options": [{"label_html": "Pyogenic granuloma", "is_correct": false}, {"label_html": "Keratoacanthoma", "is_correct": true}, {"label_html": "Melanoma", "is_correct": false}, {"label_html": "Basal cell carcinoma", "is_correct": false}, {"label_html": "Dermatitis artifacta", "is_correct": false}], "correct_index": 1, "explanation_html": "Keratoacanthomas may reach a considerable size prior to sloughing off and scarring."}, {"number": 13, "topic": "Skin Diseases", "stem_html": "A 72 year old man presents with a large nodule on his face. It is friable. There is no regional lymphadenopathy. He is lost to follow up and re-attends several months later. On this occasion the lesion has been noted to resolve with scarring. What is the most likely lesion?", "options": [{"label_html": "Pyogenic granuloma", "is_correct": false}, {"label_html": "Keratoacanthoma", "is_correct": true}, {"label_html": "Melanoma", "is_correct": false}, {"label_html": "Basal cell carcinoma", "is_correct": false}, {"label_html": "Dermatitis artifacta", "is_correct": false}], "correct_index": 1, "explanation_html": "Keratoacanthomas may reach a considerable size prior to sloughing off and scarring."}, {"number": 14, "topic": "Skin Diseases", "stem_html": "A 72 year old man presents with a large nodule on his face. It is friable. There is no regional lymphadenopathy. He is lost to follow up and re-attends several months later. On this occasion the lesion has been noted to resolve with scarring. What is the most likely lesion?", "options": [{"label_html": "Pyogenic granuloma", "is_correct": false}, {"label_html": "Keratoacanthoma", "is_correct": true}, {"label_html": "Melanoma", "is_correct": false}, {"label_html": "Basal cell carcinoma", "is_correct": false}, {"label_html": "Dermatitis artifacta", "is_correct": false}], "correct_index": 1, "explanation_html": "Keratoacanthomas may reach a considerable size prior to sloughing off and scarring."}, {"number": 15, "topic": "Skin Diseases", "stem_html": "A 30 year old man cuts the corner of his lip whilst shaving. Over the next few days a large purplish lesion appears at the site which bleeds on contact. What is the most likely diagnosis?", "options": [{"label_html": "Pyogenic granuloma", "is_correct": true}, {"label_html": "Keratoacanthoma", "is_correct": false}, {"label_html": "Melanoma", "is_correct": false}, {"label_html": "Squamous cell carcinoma", "is_correct": false}, {"label_html": "Adenocarcinoma", "is_correct": false}], "correct_index": 0, "explanation_html": "Pyogenic granulomas often appear at sites of trauma."}, {"number": 16, "topic": "Skin Diseases", "stem_html": "A 58 year old lady presents with changes that are suspicious of lichen sclerosus of the perineum. What is the best course of action?", "options": [{"label_html": "Wide excision of the area and split thickness skin grafts", "is_correct": false}, {"label_html": "Punch biopsy", "is_correct": true}, {"label_html": "Excision of area with 0.5cm margin", "is_correct": false}, {"label_html": "Excision of the area and full thickness skin grafts", "is_correct": false}, {"label_html": "Excision of the area with 2cm margin", "is_correct": false}], "correct_index": 1, "explanation_html": "Punch biopsies are a useful option for obtaining a full thickness tissues sample with minimal tissue disruption. In this situation, the other differential would be AIN or VIN and punch biopsies would be useful in distinguishing these."}], "note_html": "Skin lesions may be referred for surgical assessment, but more commonly will come via a dermatologist for definitive surgical management.<br><br>Skin malignancies include basal cell carcinoma, squamous cell carcinoma and malignant melanoma.<br><br><b>Basal Cell Carcinoma<\/b><br><ul><li>Most common form of skin cancer.<\/li><li>Commonly occur on sun exposed sites apart from the ear. <\/li><li>Sub types include nodular, morphoeic, superficial and pigmented.<\/li><li>Typically slow growing with low metastatic potential.<\/li><li>Standard surgical excision, topical chemotherapy and radiotherapy are all successful. <\/li><li>As a minimum a diagnostic punch biopsy should be taken if treatment other than standard surgical excision is planned.<\/li><\/ul><br><b>Squamous Cell Carcinoma<\/b><br><ul><li>Again related to sun exposure.<\/li><li>May arise in pre - existing solar keratoses.<\/li><li>May metastasize if left.<\/li><li>Immunosupression (e.g. following transplant), increases risk.<\/li><li>Wide local excision is the treatment of choice and where a diagnostic excision biopsy has demonstrated SCC, repeat surgery to gain adequate margins may be required.<\/li><\/ul><br><b>Malignant Melanoma<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>The main diagnostic features (major criteria):<\/b><br><ul><li>Change in size<\/li><li>Change in shape<\/li><li>Change in colour<\/li><\/ul><\/td><td><b>Secondary features (minor criteria)<\/b><br><ul><li>Diameter &gt;6mm<\/li><li>Inflammation<\/li><li>Oozing or bleeding<\/li><li>Altered sensation<\/li><\/ul><\/td><\/tr><\/tbody><\/table><\/div><br><b>Treatment<\/b><br><ul><li>Suspicious lesions should undergo excision biopsy. The lesion should be removed completely as incision biopsy can make subsequent histopathological assessment difficult.<\/li><li>Once the diagnosis is confirmed the pathology report should be reviewed to determine whether further re-excision of margins is required (see below):<\/li><\/ul><br><b>Margins of excision-Related to Breslow thickness<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Lesions 0-1mm thick<\/b><\/td><td>1cm<\/td><\/tr><tr><td><b>Lesions 1-2mm thick<\/b><\/td><td>1- 2cm (Depending upon site and pathological features)<\/td><\/tr><tr><td><b>Lesions 2-4mm thick<\/b><\/td><td>2-3 cm (Depending upon site and pathological features)<\/td><\/tr><tr><td><b>Lesions &gt;4 mm thick<\/b><\/td><td>3cm<\/td><\/tr><\/tbody><\/table><\/div>Marsden J <i> et al<\/i>. Revised UK guidelines for management of Melanoma. <i> Br J Dermatol<\/i> 2010 <b>163<\/b>:238-256.<br><br>Further treatments such as sentinel lymph node mapping, isolated limb perfusion and block dissection of regional lymph node groups should be selectively applied.<br><br><b>Kaposi Sarcoma<\/b><br><ul><li>Tumour of vascular and lymphatic endothelium.<\/li><li>Purple cutaneous nodules.<\/li><li>Associated with immuno supression.<\/li><li>Classical form affects elderly males and is slow growing.<\/li><li>Immunosupression form is much more aggressive and tends to affect those with HIV related disease.<\/li><\/ul><br><b>Non malignant skin disease<\/b><br><br><b>Dermatitis Herpetiformis<\/b><br><ul><li>Chronic itchy clusters of blisters.<\/li><li>Linked to underlying gluten enteropathy (coeliac disease).<\/li><\/ul><br><b>Dermatofibroma<\/b><br><ul><li>Benign lesion.<\/li><li>Firm elevated nodules.<\/li><li>Usually history of trauma.<\/li><li>Lesion consists of histiocytes, blood vessels and fibrotic changes.<\/li><\/ul><br><b>Pyogenic granuloma<\/b><br><ul><li>Overgrowth of blood vessels.<\/li><li>Red nodules.<\/li><li>Usually follow trauma.<\/li><li>May mimic amelanotic melanoma.<\/li><\/ul><br><b>Acanthosis nigricans<\/b><br><ul><li>Brown to black, poorly defined, velvety hyperpigmentation of the skin.<\/li><li>Usually found in body folds such as the posterior and lateral folds of the neck, the axilla, groin, umbilicus, forehead, and other areas.<\/li><li>The most common cause of acanthosis nigricans is insulin resistance, which leads to increased circulating insulin levels. Insulin spillover into the skin results in its abnormal increase in growth (hyperplasia of the skin). <\/li><li>In the context of a malignant disease, acanthosis nigricans is a paraneoplastic syndrome and is then commonly referred to as acanthosis nigricans maligna. Involvement of mucous membranes is rare and suggests a coexisting malignant condition.<\/li><\/ul>"}, {"name": "Skin disorders in surgery- malignancy and related lesions", "questions": [{"number": 17, "topic": "Skin disorders in surgery- malignancy and related lesions", "stem_html": "A 53 year old man presents with a nodule on his chin. He is concerned because it has grown extremely rapidly over the course of the preceding week. On examination, he has a swollen, red, dome shaped lesion with a central defect that contains a keratinous type material. What is the most likely cause?", "options": [{"label_html": "Actinic keratosis", "is_correct": false}, {"label_html": "Bowens disease", "is_correct": false}, {"label_html": "Pyogenic granuloma", "is_correct": false}, {"label_html": "Keratoacanthoma", "is_correct": true}, {"label_html": "Squamous cell carcinoma", "is_correct": false}], "correct_index": 3, "explanation_html": "Keratoacanthomas are characterised by a rapid growth phase. This may mimic amelanotic melanoma (although such rapid growth is rare even in these lesions). The keratin core is the clue as to the true nature of the lesion."}, {"number": 18, "topic": "Skin disorders in surgery- malignancy and related lesions", "stem_html": "A 68 year old farmer presents with a skin lesion on his forehead. It has been present for the past 6 months and has grown slightly in size during that time. On examination, he has an ulcerated lesion with pearly white raised edges that measures 2cm in diameter. What is the most likely diagnosis?", "options": [{"label_html": "Keratoacanthoma", "is_correct": false}, {"label_html": "Squamous cell carcinoma", "is_correct": false}, {"label_html": "Pyogenic granuloma", "is_correct": false}, {"label_html": "Basal cell carcinoma", "is_correct": true}, {"label_html": "Bowens disease", "is_correct": false}], "correct_index": 3, "explanation_html": "The raised pearly edges in an ulcerated lesion at a sun exposed site makes BCC most likely."}, {"number": 19, "topic": "Skin disorders in surgery- malignancy and related lesions", "stem_html": "A 34 year old gardener presents with a lesion affecting the dorsum of his right hand. It has been present for the past 10 days and occurred after he had been pruning rose bushes. On examination, he has a raised ulcerated lesion which bleeds easily on contact. What is the diagnosis?", "options": [{"label_html": "Keratoacanthoma", "is_correct": false}, {"label_html": "Pyogenic granuloma", "is_correct": true}, {"label_html": "Basal cell carcinoma", "is_correct": false}, {"label_html": "Squamous cell carcinoma", "is_correct": false}, {"label_html": "Amelanotic melanoma", "is_correct": false}], "correct_index": 1, "explanation_html": "Trauma is a common precipitant of pyogenic granuloma and contact bleeding and ulceration are common."}, {"number": 20, "topic": "Skin disorders in surgery- malignancy and related lesions", "stem_html": "A 70 year old man has a basal cell carcinoma affecting his temple. Following excision and histopathological assessment, which of the factors outlined below has the greatest bearing on prognosis?", "options": [{"label_html": "Pathological subtype", "is_correct": false}, {"label_html": "Completeness of excision", "is_correct": true}, {"label_html": "Lymphocytic infiltrate", "is_correct": false}, {"label_html": "Lymphovascular invasion", "is_correct": false}, {"label_html": "Mitotic index", "is_correct": false}], "correct_index": 1, "explanation_html": "Incompletely excised BCC have upwards of 30% recurrence rates. Systemic spread with these lesions is rare and it is usually local recurrence that is the main problem."}], "note_html": "Non melanoma skin cancer (BCC and SCC) are some of the commonest types of human malignancy. Up to 80% of these are BCC's with approximately 20% comprising SCC's. The incidence of NMSC's increases with age and whilst there is a female preponderance in those under 40 years of age, in latter life the sex incidence is roughly equal. <br>The vast majority of NMSC's are related to UV light exposure. For SCC's the major pattern is in chronic long term exposure. For BCC's, the pattern of sporadic exposure with episodes of burning is more important. Organ transplant recipients have a markedly increased incidence of SCC, risk factors include length of immunosuppression, ethnic origin and associated sunlight exposure. Human papilloma virus DNA is found in the majority of transplant recipient SCC's. In addition to this increased risk, transplant recipients are also more likely to develop locoregional recurrences following treatment. <br><br><b>Actinic keratosis and SCC<\/b><br>Actinic keratosis is viewed as a premalignant lesion because there are atypical keratinocytes present in the epidermis. In a person with 7 actinic keratosis the risks of subsequent SCC is of the order of 10% at 10 years. The primary lesion is a rough erythematous papule with a white to yellow scale. Lesions are typically clustered at sites of chronic sun exposure. <br><br><b>Squamous cell carcinoma in situ<\/b><br>Also known as Bowens disease the commonest presentation of in situ SCC is with an erythematous scaling patch or elevated plaque arising on sun exposed skin in an elderly patient. Lesions may arise <i>de novo<\/i> or from pre-existing actinic keratosis. <br>Pathologically there is full thickness atypia of dermal keratinocytes over a broad zone. Nuclear pleomorphism, apoptosis and abnormal mitoses are all seen. <br><br><b>Invasive SCC<\/b><br>The commonest clinical presentation of SCC is with an erythematous keratotic papule or nodule on a background of sun exposure. Ulceration may occur and both exophytic and endophytic areas may be seen. Regional lymphadenopathy may be present. <br>Pathologically there is downward proliferation of malignant cells and invasion of the basement membrane. Poorly differentiated lesions may show perineural invasion and require immunohistochemistry with S100 to distinguish them from melanomas (which stain strongly positive with this marker). <br><br><b>Basal cell carcinoma<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Nodular BCC<\/b><\/td><td>Commonest variant (60%)<br>Raised translucent papule<br>Usually affect the face<br>Large nodular BCC's are locally destructive<\/td><\/tr><tr><td><b>Superficial BCC<\/b><\/td><td>Usually appears as superficial erythematous macule affecting the trunk<br>Younger age at presentation (mean 57)<br>May show areas of spontaneous regression<br>Horizontal growth pattern predominates<br>High recurrence rate (due to sub clinical lateral spread)<\/td><\/tr><tr><td><b>Morpheaform BCC<\/b><\/td><td>Macroscopically resembles flat, slightly atrophic lesion or plaque without well defined borders<br>Tumour has sub clinical lateral spread which increases recurrence rates<\/td><\/tr><tr><td><b>Cystic BCC<\/b><\/td><td>Often have clear or blue - grey appearance<br>Cystic degeneration may not be clinically obvious and tumour may resemble nodular BCC<\/td><\/tr><tr><td><b>Basosquamous carcinoma<\/b><\/td><td>Atypical BCC<br>Basaloid histological BCC features with eosinophillic squamoid features of SCC<br>Biologically more aggressive and are more locally destructive<br>Rare lesion accounts for 1% of all non melanoma skin cancers<br>Metastatic disease may occur in 9-10% of cases and resemble an SCC<\/td><\/tr><\/tbody><\/table><\/div><br><b>Keratoacanthoma<\/b><br>Dome shaped erythematous lesions that develop over a period of days and grow rapidly. They often contain a central pit of keratin. They then begin to necrose and slough off. They are generally benign lesions although some do view them as precursors of malignancy. They may be treated by curettage and cautery. If there is diagnostic doubt (they can mimic malignancy) then formal excision biopsy is warranted. <br><br><b>Pyogenic granuloma<\/b><br>These present as friable overgrowths of granulation at sites of minor trauma. They may be ulcerated and bleeding on contact is common. They may be treated with curretage and cautery, formal excision may be used if there is diagnostic doubt."}, {"name": "Treatment of suspicious skin lesions", "questions": [{"number": 21, "topic": "Treatment of suspicious skin lesions", "stem_html": "An 83 year old lady presents with multiple patches of pigmented irregular, superficial lesions over the torso. They do not bleed but have become increasingly itchy. What is the best course of action?", "options": [{"label_html": "Shave biopsy", "is_correct": true}, {"label_html": "Excisional biopsy", "is_correct": false}, {"label_html": "Trucut biopsy", "is_correct": false}, {"label_html": "Incisional biopsy", "is_correct": false}, {"label_html": "Wide surgical excision", "is_correct": false}], "correct_index": 0, "explanation_html": "This is most likely to be seborrhoeic warts. These are usually superficially sited and are best managed with shave biopsy and cautery."}, {"number": 22, "topic": "Treatment of suspicious skin lesions", "stem_html": "A 65 year old man presents with a 5cm ulcerated area over his medial malleolus. It has been present for many years and the nurses have complained that it is not healing with simple bandages. What is the best course of action?", "options": [{"label_html": "Perform a core biopsy", "is_correct": false}, {"label_html": "Perform a punch biopsy", "is_correct": true}, {"label_html": "Arrange a split thickness skin graft", "is_correct": false}, {"label_html": "Undertake an excisional biopsy", "is_correct": false}, {"label_html": "Arrange for wide surgical excision and skin grafting", "is_correct": false}], "correct_index": 1, "explanation_html": "This is likely to be a venous ulcer and should usually be managed with compression bandaging if there is no arterial compromise. Long standing lesions may be complicated by the development of malignancy and for this reason a punch biopsy of long standing or non healing lesions is advisable."}, {"number": 23, "topic": "Treatment of suspicious skin lesions", "stem_html": "A 23 year old lady presents with an itchy, bleeding pigmented lesion on her right thigh. What is the best course of action?", "options": [{"label_html": "Core biopsy", "is_correct": false}, {"label_html": "Punch biopsy", "is_correct": false}, {"label_html": "Incisional biopsy", "is_correct": false}, {"label_html": "Excision biopsy", "is_correct": true}, {"label_html": "Wide excision", "is_correct": false}], "correct_index": 3, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Avoid incisional or punch biopsy of lesions suspected to be melanoma. <\/div>This may represent a malignant melanoma. Complete excision is required to allow accurate histological assessment. If the diagnosis is confirmed then re-excision of margins may be required. Clearly if the lesion is benign then no further action is required."}], "note_html": "Skin lesions may be referred to surgeons for treatment or discovered incidentally. The table below outlines the various therapeutic options:<br><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Method<\/b><\/th><th><b>Indication<\/b><\/th><\/tr><\/thead><tbody><tr><td>Tru-cut biopsy<\/td><td>Most often used for percutaneous sampling of deep seated lesions or used intra operatively for visceral lesions<\/td><\/tr><tr><td>5mm punch biopsy<\/td><td>Used for diagnostic confirmation of lesions that are suspected to be benign or where the definitive management is unlikely to be surgical. Of limited usefulness in pigmented lesions where they do not include sufficient tissue for accurate diagnosis. May be used in non melanoma type skin disease to establish diagnosis prior to more extensive resection.<\/td><\/tr><tr><td>Wide excision<\/td><td>Where the complete excision of the lesion (with healthy margins) is the main objective. In cosmetically sensitive sites, or where the defect is large, this may need to be complemented with plastic surgical techniques<\/td><\/tr><tr><td>Incisional biopsy<\/td><td>Used mainly for deep seated or extensive lesions where there is diagnostic doubt (usually following core or tru-cut biopsy). Used rarely for skin lesions.<\/td><\/tr><tr><td>Diagnostic excision<\/td><td>Primarily used for lesions that are suspicious for melanoma, the lesion is excised with a rim of normal tissue. Excision of margins may be required subsequently.<\/td><\/tr><\/tbody><\/table><\/div>"}]}</script>
  <script>
    const quizData = JSON.parse(document.getElementById("quiz-data").textContent);
    const app = document.getElementById("app");
    const modeButtons = Array.from(document.querySelectorAll("[data-mode-button]"));
    const topicActionButtons = Array.from(document.querySelectorAll("[data-topic-action]"));

    const state = {
      mode: "solve",
      answers: new Map(),
      questionRefs: [],
    };

    function buildTopic(topic, questionOffset) {
      const details = document.createElement("details");
      details.className = "topic";
      details.open = true;

      const summary = document.createElement("summary");
      summary.innerHTML = `
        <div>
          <h2 class="topic-title">${topic.name}</h2>
        </div>
        <div class="topic-meta">
          <span>${topic.questions.length} questions</span>
          <span class="chevron" aria-hidden="true">></span>
        </div>
      `;

      const body = document.createElement("div");
      body.className = "topic-body";

      if (topic.note_html) {
        const notes = document.createElement("details");
        notes.className = "topic-notes";

        const notesSummary = document.createElement("summary");
        notesSummary.innerHTML = `
          <span class="topic-notes-title">Notes</span>
          <span class="chevron" aria-hidden="true">></span>
        `;

        const notesBody = document.createElement("div");
        notesBody.className = "topic-notes-body rich-text";
        notesBody.innerHTML = topic.note_html;

        notes.appendChild(notesSummary);
        notes.appendChild(notesBody);
        body.appendChild(notes);
      }

      topic.questions.forEach((question, indexInTopic) => {
        const globalIndex = questionOffset + indexInTopic;
        body.appendChild(buildQuestionCard(question, globalIndex));
      });

      details.appendChild(summary);
      details.appendChild(body);
      return details;
    }

    function buildQuestionCard(question, questionIndex) {
      const card = document.createElement("article");
      card.className = "question-card is-hidden";
      card.dataset.questionIndex = String(questionIndex);

      const label = document.createElement("p");
      label.className = "question-label";
      label.textContent = `Question ${question.number}`;

      const stem = document.createElement("div");
      stem.className = "stem rich-text";
      stem.innerHTML = question.stem_html;

      const options = document.createElement("div");
      options.className = "options";

      const optionButtons = question.options.map((option, optionIndex) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "option";
        button.dataset.optionIndex = String(optionIndex);
        button.innerHTML = option.label_html;
        button.addEventListener("click", () => {
          if (state.mode !== "solve") {
            return;
          }
          state.answers.set(questionIndex, optionIndex);
          applyQuestionState(questionIndex);
        });
        options.appendChild(button);
        return button;
      });

      const explanation = document.createElement("div");
      explanation.className = "explanation rich-text";
      explanation.innerHTML = `<span class="explanation-label">Explanation</span>${question.explanation_html}`;

      card.appendChild(label);
      card.appendChild(stem);
      card.appendChild(options);
      card.appendChild(explanation);

      state.questionRefs[questionIndex] = {
        card,
        explanation,
        optionButtons,
        question,
      };

      applyQuestionState(questionIndex);
      return card;
    }

    function applyQuestionState(questionIndex) {
      const ref = state.questionRefs[questionIndex];
      if (!ref) {
        return;
      }

      const { card, optionButtons, question } = ref;
      const selectedIndex = state.answers.get(questionIndex);
      const hasSelection = selectedIndex !== undefined;
      const isReview = state.mode === "review";
      const showExplanation = isReview || hasSelection;

      card.classList.toggle("is-hidden", !showExplanation);

      optionButtons.forEach((button, optionIndex) => {
        button.classList.remove("correct", "incorrect", "neutral-revealed");

        if (isReview) {
          button.disabled = true;
          if (optionIndex === question.correct_index) {
            button.classList.add("correct");
          } else {
            button.classList.add("neutral-revealed");
          }
          return;
        }

        button.disabled = false;
        if (!hasSelection) {
          return;
        }

        if (optionIndex === question.correct_index) {
          button.classList.add("correct");
        } else if (optionIndex === selectedIndex) {
          button.classList.add("incorrect");
        } else {
          button.classList.add("neutral-revealed");
        }
      });
    }

    function renderApp() {
      if (!quizData.topics.length) {
        const empty = document.createElement("div");
        empty.className = "empty-state";
        empty.textContent = "No questions were found in this JSON file.";
        app.replaceChildren(empty);
        return;
      }

      const wrapper = document.createElement("div");
      wrapper.className = "topic-list";

      let questionOffset = 0;
      quizData.topics.forEach((topic) => {
        wrapper.appendChild(buildTopic(topic, questionOffset));
        questionOffset += topic.questions.length;
      });

      app.replaceChildren(wrapper);
    }

    function setMode(mode) {
      state.mode = mode;
      modeButtons.forEach((button) => {
        const isActive = button.dataset.modeButton === mode;
        button.classList.toggle("active", isActive);
        button.setAttribute("aria-pressed", String(isActive));
      });

      state.questionRefs.forEach((_, index) => applyQuestionState(index));
    }

    function setAllTopics(open) {
      document.querySelectorAll(".topic").forEach((topic) => {
        topic.open = open;
      });
    }

    modeButtons.forEach((button) => {
      button.addEventListener("click", () => setMode(button.dataset.modeButton));
    });

    topicActionButtons.forEach((button) => {
      button.addEventListener("click", () => {
        setAllTopics(button.dataset.topicAction === "expand");
      });
    });

    renderApp();
    setMode("solve");
  </script>
</body>
</html>
