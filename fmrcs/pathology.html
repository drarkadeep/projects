tml": "Sarcoidosis", "is_correct": false}], "correct_index": 2, "explanation_html": "Bleeding gums and poor healing are suggestive of vitamin C deficiency."}], "note_html": "Vitamin C deficiency (scurvy) leads to defective synthesis of collagen resulting in capillary fragility (bleeding tendency) and poor wound healing<br><br>Features<br><ul><li>gingivitis, loose teeth<\/li><li>poor wound healing<\/li><li>bleeding from gums, haematuria, epistaxis<\/li><li>general malaise<\/li><\/ul>"}, {"name": "Von Hippel-Lindau syndrome", "questions": [{"number": 290, "topic": "Von Hippel-Lindau syndrome", "stem_html": "A 25-year-old female with a history of bilateral vitreous haemorrhage is referred with bilateral lesions in the cerebellar region.  What is the likely diagnosis?", "options": [{"label_html": "Neurofibromatosis type I", "is_correct": false}, {"label_html": "Neurofibromatosis type II", "is_correct": false}, {"label_html": "Tuberous sclerosis", "is_correct": false}, {"label_html": "Von Hippel-Lindau syndrome", "is_correct": true}, {"label_html": "Sarcoidosis", "is_correct": false}], "correct_index": 3, "explanation_html": "Retinal and cerebellar haemangiomas are key features of Von Hippel-Lindau syndrome. Retinal haemangiomas are bilateral in 25% of patients and may lead to vitreous haemorrhage"}], "note_html": "Von Hippel-Lindau (VHL) syndrome is an autosomal dominant condition predisposing to neoplasia. It is due to an abnormality in the VHL gene located on short arm of chromosome 3<br><br>Features<br><ul><li>cerebellar haemangiomas<\/li><li>retinal haemangiomas: vitreous haemorrhage<\/li><li>renal cysts (premalignant)<\/li><li>phaeochromocytoma<\/li><li>extra-renal cysts: epididymal, pancreatic, hepatic<\/li><li>endolymphatic sac tumours<\/li><\/ul>"}, {"name": "Wallerian degeneration", "questions": [{"number": 291, "topic": "Wallerian degeneration", "stem_html": "Which of the following is not a feature of Wallerian Degeneration?", "options": [{"label_html": "May result from an axonotmesis", "is_correct": false}, {"label_html": "Typically occurs in the peripheral nervous systems", "is_correct": false}, {"label_html": "The axon remains excitable throughout the whole process", "is_correct": true}, {"label_html": "The distal neuronal stump is affected", "is_correct": false}, {"label_html": "Is  a component of the healing process following neuronal injury", "is_correct": false}], "correct_index": 2, "explanation_html": "The axon loses its excitability once the process is established."}], "note_html": "- Is the process that occurs when a nerve is cut or crushed. <br>  - It occurs when the part of the axon separated from the neuron's cell nucleus degenerates. <br>  - It usually begins 24 hours following neuronal injury and the distal axon remains excitable up until this time. <br>  - The degeneration of the axon is followed by breakdown of the myelin sheath, a process that occurs by infiltration of the site with macrophages. <br>  - Eventually regeneration of the nerve may occur although recovery will depend on the extent and manner of injury"}, {"name": "Wuchereria bancrofti", "questions": [{"number": 292, "topic": "Wuchereria bancrofti", "stem_html": "A 42 year old man from Southern India presents with chronic swelling of both lower legs, they are brawny and indurated with marked skin trophic changes. Which of the following organisms is the most likely origin of this disease process?", "options": [{"label_html": "<i>Loa loa<\/i>", "is_correct": false}, {"label_html": "<i>Wuchereria bancrofti<\/i>", "is_correct": true}, {"label_html": "<i>Trypanosoma cruzi<\/i>", "is_correct": false}, {"label_html": "<i>Trypanosoma gambiense<\/i>", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 1, "explanation_html": "<i>W. Bancrofti<\/i> is the commonest cause of filariasis leading to lymphatic obstruction. Infection with <i> Loa loa<\/i> typically occurs in the African sub continent and usually results in generalised sub cutaneous infections without lymphatic obstruction. Trypanosomal infections would not produce this clinical picture."}], "note_html": "<ul><li>Parasitic filarial nematode<\/li><li>Accounts for 90% of cases of filariasis<\/li><li>Usually diagnosed by blood smears<\/li><li>Usually transmitted by mosquitos<\/li><li>Treatment is with diethylcarbamazine<\/li><\/ul>"}]}</script>
  <script>
    const quizData = JSON.parse(document.getElementById("quiz-data").textContent);
    const app = document.getElementById("app");
    const modeButtons = Array.from(document.querySelectorAll("[data-mode-button]"));
    const topicActionButtons = Array.from(document.querySelectorAll("[data-topic-action]"));

    const state = {
      mode: "solve",
      answers: new Map(),
      questionRefs: [],
    };

    function buildTopic(topic, questionOffset) {
      const details = document.createElement("details");
      details.className = "topic";
      details.open = true;

      const summary = document.createElement("summary");
      summary.innerHTML = `
        <div>
          <h2 class="topic-title">${topic.name}</h2>
        </div>
        <div class="topic-meta">
          <span>${topic.questions.length} questions</span>
          <span class="chevron" aria-hidden="true">></span>
        </div>
      `;

      const body = document.createElement("div");
      body.className = "topic-body";

      if (topic.note_html) {
        const notes = document.createElement("details");
        notes.className = "topic-notes";

        const notesSummary = document.createElement("summary");
        notesSummary.innerHTML = `
          <span class="topic-notes-title">Notes</span>
          <span class="chevron" aria-hidden="true">></span>
        `;

        const notesBody = document.createElement("div");
        notesBody.className = "topic-notes-body rich-text";
        notesBody.innerHTML = topic.note_html;

        notes.appendChild(notesSummary);
        notes.appendChild(notesBody);
        body.appendChild(notes);
      }

      topic.questions.forEach((question, indexInTopic) => {
        const globalIndex = questionOffset + indexInTopic;
        body.appendChild(buildQuestionCard(question, globalIndex));
      });

      details.appendChild(summary);
      details.appendChild(body);
      return details;
    }

    function buildQuestionCard(question, questionIndex) {
      const card = document.createElement("article");
      card.className = "question-card is-hidden";
      card.dataset.questionIndex = String(questionIndex);

      const label = document.createElement("p");
      label.className = "question-label";
      label.textContent = `Question ${question.number}`;

      const stem = document.createElement("div");
      stem.className = "stem rich-text";
      stem.innerHTML = question.stem_html;

      const options = document.createElement("div");
      options.className = "options";

      const optionButtons = question.options.map((option, optionIndex) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "option";
        button.dataset.optionIndex = String(optionIndex);
        button.innerHTML = option.label_html;
        button.addEventListener("click", () => {
          if (state.mode !== "solve") {
            return;
          }
          state.answers.set(questionIndex, optionIndex);
          applyQuestionState(questionIndex);
        });
        options.appendChild(button);
        return button;
      });

      const explanation = document.createElement("div");
      explanation.className = "explanation rich-text";
      explanation.innerHTML = `<span class="explanation-label">Explanation</span>${question.explanation_html}`;

      card.appendChild(label);
      card.appendChild(stem);
      card.appendChild(options);
      card.appendChild(explanation);

      state.questionRefs[questionIndex] = {
        card,
        explanation,
        optionButtons,
        question,
      };

      applyQuestionState(questionIndex);
      return card;
    }

    function applyQuestionState(questionIndex) {
      const ref = state.questionRefs[questionIndex];
      if (!ref) {
        return;
      }

      const { card, optionButtons, question } = ref;
      const selectedIndex = state.answers.get(questionIndex);
      const hasSelection = selectedIndex !== undefined;
      const isReview = state.mode === "review";
      const showExplanation = isReview || hasSelection;

      card.classList.toggle("is-hidden", !showExplanation);

      optionButtons.forEach((button, optionIndex) => {
        button.classList.remove("correct", "incorrect", "neutral-revealed");

        if (isReview) {
          button.disabled = true;
          if (optionIndex === question.correct_index) {
            button.classList.add("correct");
          } else {
            button.classList.add("neutral-revealed");
          }
          return;
        }

        button.disabled = false;
        if (!hasSelection) {
          return;
        }

        if (optionIndex === question.correct_index) {
          button.classList.add("correct");
        } else if (optionIndex === selectedIndex) {
          button.classList.add("incorrect");
        } else {
          button.classList.add("neutral-revealed");
        }
      });
    }

    function renderApp() {
      if (!quizData.topics.length) {
        const empty = document.createElement("div");
        empty.className = "empty-state";
        empty.textContent = "No questions were found in this JSON file.";
        app.replaceChildren(empty);
        return;
      }

      const wrapper = document.createElement("div");
      wrapper.className = "topic-list";

      let questionOffset = 0;
      quizData.topics.forEach((topic) => {
        wrapper.appendChild(buildTopic(topic, questionOffset));
        questionOffset += topic.questions.length;
      });

      app.replaceChildren(wrapper);
    }

    function setMode(mode) {
      state.mode = mode;
      modeButtons.forEach((button) => {
        const isActive = button.dataset.modeButton === mode;
        button.classList.toggle("active", isActive);
        button.setAttribute("aria-pressed", String(isActive));
      });

      state.questionRefs.forEach((_, index) => applyQuestionState(index));
    }

    function setAllTopics(open) {
      document.querySelectorAll(".topic").forEach((topic) => {
        topic.open = open;
      });
    }

    modeButtons.forEach((button) => {
      button.addEventListener("click", () => setMode(button.dataset.modeButton));
    });

    topicActionButtons.forEach((button) => {
      button.addEventListener("click", () => {
        setAllTopics(button.dataset.topicAction === "expand");
      });
    });

    renderApp();
    setMode("solve");
  </script>
</body>
</html>
