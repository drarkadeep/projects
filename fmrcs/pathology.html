<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pathology</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f1e8;
      --bg-accent: #ebe4d4;
      --surface: rgba(255, 252, 246, 0.92);
      --surface-strong: #fffdf7;
      --border: #d9cfbd;
      --text: #23313a;
      --text-soft: #5f6c73;
      --accent: #496a58;
      --accent-strong: #2f5341;
      --correct-bg: #e0f3e6;
      --correct-border: #77b487;
      --wrong-bg: #fbe0df;
      --wrong-border: #dc7a73;
      --note-bg: #f3eee2;
      --shadow: 0 18px 40px rgba(76, 59, 37, 0.08);
      --radius-lg: 22px;
      --radius-md: 16px;
      --radius-sm: 12px;
      --page-width: 960px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: "Avenir Next", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.72), transparent 32%),
        linear-gradient(180deg, #f8f4eb 0%, #f3ede0 100%);
      line-height: 1.65;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.14), transparent 18%, transparent 82%, rgba(255, 255, 255, 0.14)),
        repeating-linear-gradient(
          180deg,
          rgba(73, 106, 88, 0.015) 0,
          rgba(73, 106, 88, 0.015) 1px,
          transparent 1px,
          transparent 18px
        );
    }

    a {
      color: var(--accent-strong);
    }

    img {
      max-width: 100%;
      height: auto;
      border-radius: 14px;
    }

    .score-badge,
    .badge.rounded-pill.bg-danger {
      display: none !important;
    }

    .page {
      width: min(100% - 24px, var(--page-width));
      margin: 0 auto;
      padding: 18px 0 48px;
    }

    .topbar {
      margin-bottom: 18px;
      padding: 18px;
      background: rgba(255, 252, 246, 0.9);
      border: 1px solid rgba(217, 207, 189, 0.86);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .topbar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .eyebrow {
      margin: 0 0 4px;
      font-size: 0.76rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-soft);
    }

    .title {
      margin: 0;
      font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
      font-size: clamp(1.5rem, 2vw + 1rem, 2.35rem);
      line-height: 1.08;
      font-weight: 700;
    }

    .meta {
      margin: 8px 0 0;
      color: var(--text-soft);
      font-size: 0.96rem;
    }

    .mode-switch {
      display: inline-flex;
      padding: 6px;
      border-radius: 999px;
      background: var(--bg-accent);
      border: 1px solid var(--border);
      gap: 6px;
      flex-shrink: 0;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
      flex-wrap: wrap;
    }

    .topic-actions {
      display: inline-flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .utility-button {
      appearance: none;
      border: 1px solid var(--border);
      background: var(--surface-strong);
      color: var(--text);
      font: inherit;
      font-weight: 700;
      border-radius: 999px;
      padding: 10px 14px;
      cursor: pointer;
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .utility-button:hover {
      transform: translateY(-1px);
      border-color: #c7bba9;
      box-shadow: 0 8px 18px rgba(70, 54, 34, 0.07);
    }

    .utility-button:focus-visible {
      outline: 3px solid rgba(73, 106, 88, 0.22);
      outline-offset: 2px;
    }

    .mode-button {
      appearance: none;
      border: 0;
      background: transparent;
      color: var(--text-soft);
      font: inherit;
      font-weight: 700;
      border-radius: 999px;
      padding: 10px 16px;
      min-width: 92px;
      cursor: pointer;
      transition: transform 0.18s ease, background 0.18s ease, color 0.18s ease, box-shadow 0.18s ease;
    }

    .mode-button:hover {
      transform: translateY(-1px);
      color: var(--text);
    }

    .mode-button.active {
      background: var(--surface-strong);
      color: var(--accent-strong);
      box-shadow: 0 8px 18px rgba(73, 106, 88, 0.14);
    }

    .topic-list {
      display: grid;
      gap: 18px;
    }

    .topic {
      background: rgba(255, 252, 246, 0.78);
      border: 1px solid rgba(217, 207, 189, 0.9);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .topic[open] {
      background: rgba(255, 252, 246, 0.9);
    }

    .topic > summary {
      list-style: none;
      cursor: pointer;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      user-select: none;
    }

    .topic > summary::-webkit-details-marker {
      display: none;
    }

    .topic-title {
      margin: 0;
      font-size: 1.08rem;
      font-weight: 800;
      letter-spacing: 0.01em;
    }

    .topic-meta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--text-soft);
      font-size: 0.94rem;
    }

    .chevron {
      display: inline-block;
      transition: transform 0.2s ease;
      color: var(--accent);
      font-weight: 700;
    }

    .topic[open] > summary .chevron {
      transform: rotate(90deg);
    }

    .topic-notes {
      background: rgba(243, 238, 226, 0.62);
      border: 1px solid #e3d9c8;
      border-radius: var(--radius-md);
      overflow: hidden;
    }

    .topic-notes > summary {
      list-style: none;
      cursor: pointer;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      user-select: none;
    }

    .topic-notes > summary::-webkit-details-marker {
      display: none;
    }

    .topic-notes-title {
      font-size: 0.95rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-soft);
    }

    .topic-notes[open] > summary .chevron {
      transform: rotate(90deg);
    }

    .topic-notes-body {
      padding: 0 16px 16px;
      color: var(--text);
    }

    .topic-body {
      padding: 0 16px 16px;
      display: grid;
      gap: 14px;
    }

    .question-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 18px;
      box-shadow: 0 10px 24px rgba(70, 54, 34, 0.05);
    }

    .question-label {
      margin: 0 0 10px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-soft);
      font-size: 0.88rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 800;
    }

    .stem {
      font-size: 1rem;
    }

    .stem > *:first-child,
    .explanation > *:first-child {
      margin-top: 0;
    }

    .stem > *:last-child,
    .explanation > *:last-child {
      margin-bottom: 0;
    }

    .options {
      margin-top: 16px;
      display: grid;
      gap: 10px;
    }

    .option {
      width: 100%;
      text-align: left;
      border: 1px solid #d8d0c2;
      background: #fffdf8;
      color: var(--text);
      border-radius: var(--radius-sm);
      padding: 14px 15px;
      font: inherit;
      line-height: 1.45;
      cursor: pointer;
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
    }

    .option:hover {
      transform: translateY(-1px);
      border-color: #c7bba9;
      box-shadow: 0 8px 18px rgba(70, 54, 34, 0.07);
    }

    .option:focus-visible {
      outline: 3px solid rgba(73, 106, 88, 0.22);
      outline-offset: 2px;
    }

    .option.correct {
      background: var(--correct-bg);
      border-color: var(--correct-border);
      box-shadow: inset 0 0 0 1px rgba(119, 180, 135, 0.2);
    }

    .option.incorrect {
      background: var(--wrong-bg);
      border-color: var(--wrong-border);
      box-shadow: inset 0 0 0 1px rgba(220, 122, 115, 0.2);
    }

    .option.neutral-revealed {
      background: #faf6ee;
      border-color: #d8d0c2;
      color: #5f676a;
    }

    .option[disabled] {
      cursor: default;
      opacity: 1;
    }

    .explanation {
      margin-top: 14px;
      padding: 14px 16px;
      background: var(--note-bg);
      border: 1px solid #e3d9c8;
      border-radius: 14px;
      color: var(--text);
    }

    .question-card.is-hidden .explanation {
      display: none;
    }

    .explanation-label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-soft);
      font-weight: 800;
    }

    .empty-state {
      padding: 28px 22px;
      background: var(--surface);
      border: 1px dashed var(--border);
      border-radius: var(--radius-lg);
      color: var(--text-soft);
    }

    .rich-text table {
      width: 100%;
      border-collapse: collapse;
      margin: 12px 0;
      overflow: hidden;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.68);
    }

    .rich-text td,
    .rich-text th {
      border: 1px solid #ddd2bf;
      padding: 10px 12px;
      vertical-align: top;
    }

    .rich-text ul,
    .rich-text ol {
      padding-left: 20px;
      margin: 10px 0;
    }

    .rich-text center {
      display: block;
      text-align: center;
    }

    .rich-text .table-responsive {
      overflow-x: auto;
    }

    @media (max-width: 720px) {
      .page {
        width: min(100% - 16px, var(--page-width));
        padding-top: 10px;
      }

      .topbar {
        padding: 14px;
        border-radius: 18px;
      }

      .topbar-inner {
        flex-direction: column;
        align-items: stretch;
      }

      .controls {
        justify-content: stretch;
      }

      .topic-actions {
        width: 100%;
      }

      .utility-button {
        flex: 1 1 0;
      }

      .mode-switch {
        width: 100%;
        justify-content: stretch;
      }

      .mode-button {
        flex: 1 1 50%;
      }

      .topic > summary {
        padding: 16px;
        align-items: flex-start;
      }

      .topic-meta {
        font-size: 0.88rem;
      }

      .topic-body {
        padding: 0 12px 12px;
      }

      .question-card {
        padding: 15px;
      }

      .option {
        padding: 13px 14px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="topbar">
      <div class="topbar-inner">
        <div>
          <p class="eyebrow">Study View</p>
          <h1 class="title">Pathology</h1>
          <p class="meta">292 questions across 126 topics</p>
        </div>
        <div class="controls">
          <div class="topic-actions" aria-label="Topic visibility controls">
            <button class="utility-button" type="button" data-topic-action="expand">Expand all</button>
            <button class="utility-button" type="button" data-topic-action="collapse">Collapse all</button>

          <div class="mode-switch" role="tablist" aria-label="Question mode">
            <button class="mode-button active" type="button" data-mode-button="solve" aria-pressed="true">Solve</button>
            <button class="mode-button" type="button" data-mode-button="review" aria-pressed="false">Review</button>
          </div>
        </div>
      </div>
    </section>

    <section id="app"></section>
  </main>

  <script id="quiz-data" type="application/json">{"title": "Pathology", "topics": [{"name": "Abdominal aorta aneurysm", "questions": [{"number": 1, "topic": "Abdominal aorta aneurysm", "stem_html": "A 72 year old man collapses with sudden onset abdominal pain. He has been suffering from back pain recently and has been taking ibuprofen. What is the most likely cause?", "options": [{"label_html": "Acute mesenteric artery embolus", "is_correct": false}, {"label_html": "Peritonitis due to peptic ulcer disease", "is_correct": false}, {"label_html": "Ruptured abdominal aortic aneurysm", "is_correct": true}, {"label_html": "Bleeding Dieulafoy lesion", "is_correct": false}, {"label_html": "Pancreatitis", "is_correct": false}], "correct_index": 2, "explanation_html": "The key feature here is the sudden nature of the collapse, this suggests a significant intra abdominal catastrophe. The history of back pain is also suggestive of recent aneurysm expansion."}, {"number": 2, "topic": "Abdominal aorta aneurysm", "stem_html": "A 66 year old man is referred via the aneurysm screening programme with an abdominal aortic aneurysm measuring 4.5 cm. Apart from well controlled type 2 DM he has no other co-morbidities. What is the best course of action?", "options": [{"label_html": "AAA repair during next 48 hours", "is_correct": false}, {"label_html": "USS in 3 months", "is_correct": true}, {"label_html": "CT aortic angiogram", "is_correct": false}, {"label_html": "MRI aortic angiogram", "is_correct": false}, {"label_html": "Discharge from the programme", "is_correct": false}], "correct_index": 1, "explanation_html": "At this point continue with ultrasound surveillance.<br>USS surveillance of AAA:<br>3cm- 4.4cm - 1 year<br>4.5-5.4cm- 3 monthly <br>This is the data provided by the NHS AAA screening programme (2017) endorsed by NICE 2020."}, {"number": 3, "topic": "Abdominal aorta aneurysm", "stem_html": "A 72 year old man has a CT scan for abdominal discomfort and the surgeon suspects abdominal aortic disease. It reveals a 6.6cm aneurysm with a 3.5cm neck and it continues to involve the right common iliac. The left iliac is occluded. He is hypertensive and has Type 2 DM which is well controlled. What is the best course of action?", "options": [{"label_html": "Abdominal aortic aneurysm repair in next 48 hours", "is_correct": true}, {"label_html": "Abdominal aortic aneurysm repair in 6 weeks time", "is_correct": false}, {"label_html": "Review in outpatients in 3 months", "is_correct": false}, {"label_html": "Endovascular aortic aneurysm repair in 48 hours", "is_correct": false}, {"label_html": "Discharge the patient", "is_correct": false}], "correct_index": 0, "explanation_html": "Assuming he is fit enough. This would be a typical 'open ' case as the marked iliac disease would make EVAR difficult. Tender aneurysms require urgent surgery."}, {"number": 4, "topic": "Abdominal aorta aneurysm", "stem_html": "An 89 year old man presents with hypotension and collapse and is found by the staff in the toilet of his care home. He is moribund and unable to give a clear history. He had suffered a cardiac arrest in the ambulance but has since been resuscitated and now has a Bp of 95 systolic. He has an obviously palpable AAA. What is the best course of action?", "options": [{"label_html": "Immediate CT scanning of the abdominal aorta", "is_correct": false}, {"label_html": "Immediate laparotomy", "is_correct": false}, {"label_html": "Immediate endovascular aortic aneurysm repair", "is_correct": false}, {"label_html": "Palliation", "is_correct": true}, {"label_html": "USS of aorta", "is_correct": false}], "correct_index": 3, "explanation_html": "The fact that he is frail (care home resident) and has already suffered a cardiac arrest means that attempts at surgery will invariably fail. At 89 years of age the functional outcomes were it to be 'successful' would be very poor. Palliation is therefore the best option, imaging will not change this management decision."}, {"number": 5, "topic": "Abdominal aorta aneurysm", "stem_html": "A 67 year old male is diagnosed as having a 7cm infra renal abdominal aortic aneurysm. What is the likely risk of rupture over the next 5 years?", "options": [{"label_html": "&lt;10%", "is_correct": false}, {"label_html": "20%", "is_correct": false}, {"label_html": "25%", "is_correct": false}, {"label_html": "75%", "is_correct": true}, {"label_html": "35%", "is_correct": false}], "correct_index": 3, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Risks of abdominal aortic aneurysm rupture (over 5 years):<br><ul><li>5-5.9cm = 25%<\/li><li>6-6.9cm= 35%<\/li><li>7cm and over = 75%<\/li><\/ul><\/div>Aneurysms greater than 5cm in diameter on USS should be formally assessed using CT scanning with arterial phases to delineate anatomy and facilitate surgical planning."}, {"number": 6, "topic": "Abdominal aorta aneurysm", "stem_html": "A 73 year old man develops sudden onset abdominal pain and collapses. On examination he has a tender pulsatile mass in his upper abdomen. He has a blood pressure of 90/60mmHg and pulse rate of 105 beats per minute. Which of the following intravenous fluid regimens is most appropriate, whilst waiting for operative repair?", "options": [{"label_html": "1 Litre of pentastarch over 15 minutes", "is_correct": false}, {"label_html": "1 litre of Hartmans solution over 4 hours", "is_correct": true}, {"label_html": "1 litre of gelofusin over 30 minutes", "is_correct": false}, {"label_html": "1 litre of Hartmans solution over 30 minutes", "is_correct": false}, {"label_html": "1 litre of blood over 15 minutes", "is_correct": false}], "correct_index": 1, "explanation_html": "This man will have a contained haematoma and is awaiting surgery. Rapid, high volume infusions may cause this to dislodge with disastrous consequences. In emergency aortic surgery a policy of permissive hypotension is utilised to reduce the risk."}, {"number": 7, "topic": "Abdominal aorta aneurysm", "stem_html": "A 67 year old man is investigated for biliary colic and a 4.8 cm abdominal aortic aneurysm is identified. Which of the following statements relating to this condition is untrue?", "options": [{"label_html": "The wall will be composed of dense fibrous tissue only", "is_correct": true}, {"label_html": "The majority are located inferior to the renal arteries", "is_correct": false}, {"label_html": "They occur most often in current or former smokers", "is_correct": false}, {"label_html": "He should initially be managed by a process of active surveillance", "is_correct": false}, {"label_html": "Aortoduodenal fistula is a recognised complication following repair.", "is_correct": false}], "correct_index": 0, "explanation_html": "They are true aneurysms and have all 3 layers of arterial wall."}], "note_html": "- Abdominal aortic aneurysms are a common problem in vascular surgery. <br><ul><li>They may occur as either true or false aneurysm. With the former all 3 layers of the arterial wall are involved, in the latter only a single layer of fibrous tissue forms the aneurysm wall. <\/li><li>True abdominal aortic aneurysms have an approximate incidence of 0.06 per 1000 people. They are commonest in elderly men and for this reason the UK is now introducing the aneurysm screening program with the aim of performing an abdominal aortic ultrasound measurement in all men aged 65 years. <\/li><\/ul><br><b>Causes<\/b><br><ul><li>Several different groups of patients suffer from aneurysmal disease. <\/li><li>The commonest group is those who suffer from standard arterial disease, i.e. Those who are <b>hypertensive<\/b> and have been or are <b>smokers<\/b>. <\/li><li>Other patients such as those suffering from <b>connective tissue diseases<\/b> such as Marfan's may also develop aneurysms. In patients with abdominal aortic aneurysms the extracellular matrix becomes disrupted with a change in the balance of collagen and elastic fibres. <\/li><\/ul><br><b>Management<\/b><br><ul><li>Most abdominal aortic aneurysms are an incidental finding. <\/li><li>Symptoms most often relate to rupture or impending rupture. <\/li><li>20% rupture anteriorly into the peritoneal cavity. Very poor prognosis.<\/li><li>80% rupture posteriorly into the retroperitoneal space<\/li><li>The risk of rupture is related to aneurysm size, only 2% of aneurysms measuring less than 4cm in diameter will rupture over a 5 year period. This contrasts with 75% of aneurysms measuring over 7cm in diameter. <\/li><li>This is well explained by Laplaces' law which relates size to transmural pressure. <\/li><li>For this reason most vascular surgeons will subject patients with an aneurysm size of 5cm or greater to CT scanning of the chest, abdomen and pelvis with the aim of delineating anatomy and planning treatment. Depending upon co-morbidities, surgery is generally offered once the aneurysm is between 5.5cm and 6cm. <\/li><\/ul><br><i>A CT reconstruction showing an infrarenal abdominal aortic aneurysm. The walls of the sac are calcified which may facilitate identification on plain x-rays<\/i><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb068b.jpg\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb068.jpg\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Abdominal aortic aneurysm\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb068b.jpg\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center><br><b>Indications for surgery<\/b><br><ul><li>Symptomatic aneurysms (80% annual mortality if untreated)<\/li><li>Increasing size above 5.5cm if asymptomatic<\/li><li>Rupture (100% mortality without surgery)<\/li><\/ul><br><b>Surgical procedures<\/b><br><b>Abdominal aortic aneurysm repair<\/b><br><br>Procedure:<br><br>GA<br>Invasive monitoring (A-line, CVP, catheter)<br>Incision: Midline or transverse<br>Bowel and distal duodenum mobilised to access aorta.<br>Aneurysm neck and base dissected out and prepared for cross clamp<br>Systemic heparinisation <br>Cross clamp (proximal first)<br>Longitudinal aortotomy<br>Atherectomy<br>Deal with back bleeding from lumbar vessels and inferior mesenteric artery<br>Insert graft either tube or bifurcated depending upon anatomy<br>Suture using Prolene (3/0 for proximal , distal anastomosis suture varies according to site)<br>Clamps off: End tidal CO2 will rise owing to effects of reperfusion, at this point major risk of myocardial events.<br>Haemostasis<br>Closure of aneurysm sac to minimise risk of aorto-enteric fistula<br>Closure: Loop 1 PDS or Prolene to abdominal wall<br>Skin- surgeons preference<br><br>Post operatively:<br><br>ITU (Almost all)<br>Greatest risk of complications following emergency repair<br>Complications: Embolic- gut and foot infarcts<br>Cardiac - owing to premorbid states, re-perfusion injury and effects of cross clamp<br>Wound problems<br>Later risks related to graft- infection and aorto-enteric fistula<br><br><b>Special groups<\/b><br><br><b>Supra renal AAA<\/b><br>These patients will require a supra renal clamp and this carries a far higher risk of complications and risk of renal failure.<br><br><b>Ruptured AAA<\/b><br>Pre-operatively the management depends upon haemodynamic instability. In patients with symptoms of rupture (typical pain, haemodynamic compromise and risk factors) then ideally prompt laparotomy. In those with vague symptoms and haemodynamic stability the ideal test is CT scan to determine whether rupture has occurred or not. Most common rupture site is retroperitoneal 80%. These patients will tend to develop retroperitoneal haematoma. This can be disrupted if Bp is allowed to rise too high so aim for Bp 100mmHg. <br>Operative details are similar to elective repair although surgery should be swift, blind rushing often makes the situation worse. Plunging vascular clamps blindly into a pool of blood at the aneurysm neck carries the risk of injury the vena cava that these patients do not withstand. Occasionally a supracoeliac clamp is needed to effect temporary control, although leaving this applied for more than 20 minutes tends to carry a dismal outcome.<br><br><b>EVAR<\/b><br>Increasingly patients are now being offered endovascular aortic aneurysm repair. This is undertaken by surgeons and radiologists working jointly. The morphology of the aneurysm is important and not all are suitable. Here is a typical list of those features favoring a suitable aneurysm:<br><ul><li>Long neck<\/li><li>Straight iliac vessels<\/li><li>Healthy groin vessels<\/li><\/ul><br>Clearly few AAA patients possess the  above and compromise has to be made. The use of fenestrated grafts can allow supra renal AAA to be treated.<br><br>Procedure:<br><br>GA<br>Radiology or theatre<br>Bilateral groin incisions<br>Common femoral artery dissected out<br>Heparinisation<br>Arteriotomy and insertion of guide wire<br>Dilation of arteriotomy<br>Insertion of EVAR Device<br>Once in satisfactory position it is released<br>Arteriotomy closed once check angiogram shows good position and no endoleak<br><br>Complications:<br>Endoleaks depending upon site are either Type I or 2. These may necessitate re-intervention and all EVAR patients require follow up . Details are not needed for MRCS.<br><br><b>References<\/b><br>A reasonable review is provided by:<br>Sakalihasan N, Limet R, Defawe O. Abdominal aortic aneurysm. <i>Lancet<\/i> 2005 (365):1577- 1589"}, {"name": "Abnormal coagulation", "questions": [{"number": 8, "topic": "Abnormal coagulation", "stem_html": "A 45 year old male has alcoholic cirrhosis and decompensated liver failure. If the decision was taken to undertake an assay of the factors of the coagulation cascade, the levels of which of the factors listed below is most likely to be normal?", "options": [{"label_html": "Factor V", "is_correct": false}, {"label_html": "Factor VII", "is_correct": false}, {"label_html": "Factor IX", "is_correct": false}, {"label_html": "Factor VIII", "is_correct": true}, {"label_html": "Factor XI", "is_correct": false}], "correct_index": 3, "explanation_html": "Factor VIII is synthesised in the endothelial cells of the liver rather than the liver itself and therefore is less prone to the effects of hepatic dysfunction."}, {"number": 9, "topic": "Abnormal coagulation", "stem_html": "A 20 year old male presents with a tense, swollen knee joint. There is no history of antecedent trauma. On examination the joint is tense and swollen but there is no sign of injury. Plain x-rays show no fracture or arthritis. What is the most likely explanation?", "options": [{"label_html": "Rupture of the anterior cruciate ligament", "is_correct": false}, {"label_html": "Rupture of the medial collateral ligament", "is_correct": false}, {"label_html": "Tibial plateau fracture", "is_correct": false}, {"label_html": "Haemophilia A", "is_correct": true}, {"label_html": "von Willebrands disease", "is_correct": false}], "correct_index": 3, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Haemarthrosis without trauma is typically a feature of haemophilia A and B<\/div>Without a history of trauma, ligamentous rupture or tibial plateau fractures would be unusual. <br>Haemarthroses may occur in 45% of patients with severe von Willebrands disease. However, this is rare."}, {"number": 10, "topic": "Abnormal coagulation", "stem_html": "A 28 year old female attends the gynaecology unit for a D+C following an incomplete miscarriage. She has previously had recurrent pulmonary embolic events. After the procedure she is persistently bleeding. Her APTT is 52 (increased). What is the most likely cause?", "options": [{"label_html": "Antiphospholipid syndrome", "is_correct": true}, {"label_html": "DIC", "is_correct": false}, {"label_html": "Haemophilia B", "is_correct": false}, {"label_html": "von Willebrand disease", "is_correct": false}, {"label_html": "Factor V Leiden deficiency", "is_correct": false}], "correct_index": 0, "explanation_html": "A combination of thromboembolism and coagulation issues in a young woman should raise the possibility of antiphospholipid syndrome. Other features may include foetal loss, venous and arterial thrombosis and thrombocytopenia. A Lupus anticoagulant may be present and the APTT is prolonged."}, {"number": 11, "topic": "Abnormal coagulation", "stem_html": "Which of the following statements relating to abnormal coagulation is false?", "options": [{"label_html": "Warfarin affects the synthesis of factor 2,7,9,10", "is_correct": false}, {"label_html": "The prothrombin time is prolonged in Haemophilia A", "is_correct": true}, {"label_html": "Cholestatic jaundice can cause vitamin K deficiency", "is_correct": false}, {"label_html": "Disseminated intravascular coagulation is associated with thrombocytopenia", "is_correct": false}, {"label_html": "Massive transfusion is associated with reduced levels of factor 5 and 8", "is_correct": false}], "correct_index": 1, "explanation_html": "In haemophilia A the APTT is prolonged and there is reduced levels of factor 8:C.  The bleeding time and PT are normal.  Cholestatic jaundice prevents the absorption of the fat soluble vitamin K.  Massive transfusion (&gt;10u blood or equivalent to the blood volume of a person) puts the patient at risk of thrombocytopaenia, factor 5 and 8 deficiency."}, {"number": 12, "topic": "Abnormal coagulation", "stem_html": "A 65 year old lady is recovering from major abdominal surgery in ITU and, as part of her clinical care a clotting screen is performed. The prothrombin time is noted to be increased. Which of the conditions below is unlikely to account for this finding?", "options": [{"label_html": "Cholestatic jaundice", "is_correct": false}, {"label_html": "Disseminated intravascular coagulation", "is_correct": false}, {"label_html": "Prolonged antibiotic treatment", "is_correct": false}, {"label_html": "Liver disease", "is_correct": false}, {"label_html": "Acquired factor 12 deficiency", "is_correct": true}], "correct_index": 4, "explanation_html": "Vitamin K deficiency results from cholestatic jaundice and prolonged antibiotic therapy.  Acquired factor 12 deficiency causes prolonged APTT."}, {"number": 13, "topic": "Abnormal coagulation", "stem_html": "Which of the following is least associated with thrombosis?", "options": [{"label_html": "Endothelial cell damage", "is_correct": false}, {"label_html": "Use of tourniquets in surgery", "is_correct": false}, {"label_html": "Formation of platelet aggregates", "is_correct": false}, {"label_html": "Thrombocytopenia", "is_correct": true}, {"label_html": "Carcinoma of the stomach", "is_correct": false}], "correct_index": 3, "explanation_html": "All the other options either act directly to promote thrombosis e.g. endothelial cell damage or via changes in consistency or flow of blood."}, {"number": 14, "topic": "Abnormal coagulation", "stem_html": "A 43 year old lady is admitted with cholestasis secondary to a stone impacted at the level of the ampulla of vater. Which of the following tests is most likely to be predictive of bleeding diathesis at the time of ERCP in this particular case?", "options": [{"label_html": "Bleeding time", "is_correct": false}, {"label_html": "Prothrombin time", "is_correct": true}, {"label_html": "APTT", "is_correct": false}, {"label_html": "Platelet count", "is_correct": false}, {"label_html": "Factor I levels", "is_correct": false}], "correct_index": 1, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">PT: Vitamin K dependent factors 2, 7, 9, 10<br>APTT: Factors 8, 9, 11, 12<\/div>Jaundice will impair the production of vitamin K dependent clotting factors. This is most accurately tested by measuring the prothrombin time. APTT can be affected by vitamin K deficiency (due to factor 9 deficiency), however this occurs to a lesser extent and is normally associated with severe liver disease.  The bleeding time is a measure of platelet function."}], "note_html": "<div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Cause<\/b><\/th><th><b>Factors affected<\/b><\/th><\/tr><\/thead><tbody><tr><td>Heparin<\/td><td>Prevents activation factors 2,9,10,11<\/td><\/tr><tr><td>Warfarin<\/td><td>Affects synthesis of factors 2,7,9,10<\/td><\/tr><tr><td>DIC<\/td><td>Factors 1,2,5,8,11<\/td><\/tr><tr><td>Liver disease<\/td><td>Factors 1,2,5,7,9,10,11<\/td><\/tr><\/tbody><\/table><\/div><br><b>Interpretation blood clotting test results<\/b><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid2\"><thead><tr><th><b>Disorder<\/b><\/th><th><b>APTT<\/b><\/th><th><b>PT<\/b><\/th><th><b>Bleeding time<\/b><\/th><\/tr><\/thead><tbody><tr><td>Haemophilia<\/td><td>Increased<\/td><td>Normal<\/td><td>Normal<\/td><\/tr><tr><td>von Willebrand's disease<\/td><td>Increased<\/td><td>Normal<\/td><td>Increased<\/td><\/tr><tr><td>Vitamin K deficiency<\/td><td>Increased<\/td><td>Increased<\/td><td>Normal<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Achondroplasia", "questions": [{"number": 15, "topic": "Achondroplasia", "stem_html": "A 5 year old boy presents to the clinic with short stature suggestive of achondroplasia. What is the genetic basis of this condition?", "options": [{"label_html": "X linked defect", "is_correct": false}, {"label_html": "Y linked defect", "is_correct": false}, {"label_html": "YY linked defect", "is_correct": false}, {"label_html": "Autosomal dominant defect", "is_correct": true}, {"label_html": "Autosomal recessive defect", "is_correct": false}], "correct_index": 3, "explanation_html": "Achondroplasia usually occurs as a sporadic mutation. It is then transmitted in an autosomal dominant fashion."}], "note_html": "Achondroplasia is a common cause of dwarfism and is caused by defects in the fibroblast growth factor receptor. In most cases (approximately 70%) it occurs as a sporadic mutation. The main risk factor is advancing parental age at the time of conception. Once present it is typically inherited in an autosomal dominant fashion. <br><br><b>Radiological features<\/b><br><ul><li>Large skull with narrow foramen magnum<\/li><li>Short, flattened vertebral bodies<\/li><li>Narrow spinal canal<\/li><li>Horizontal acetabular roof<\/li><li>Broad, short metacarpals<\/li><\/ul><br><b>Treatment<\/b><br>There is no specific therapy. However, some individuals benefit from limb lengthening procedures. These usually involve application of Ilizarov frames and targeted bone fractures. A clearly defined need and end point is the cornerstone of achieving success with such procedures."}, {"name": "Actinomycosis", "questions": [{"number": 16, "topic": "Actinomycosis", "stem_html": "A 40 year old man undergoes a complex appendicectomy and the wound fails to heal satisfactorily. The wound site itself is associated with multiple sinuses and fistulas. Pus is sent for microbiology and shows gram positive organisms and sulphur granules. What is the most likely underlying diagnosis?", "options": [{"label_html": "Infection with <i>Staphylococcus aureus<\/i>", "is_correct": false}, {"label_html": "Infection with <i>Bacteroides fragilis<\/i>", "is_correct": false}, {"label_html": "Actinomycosis", "is_correct": true}, {"label_html": "Crohns disease", "is_correct": false}, {"label_html": "Ulcerative colitis", "is_correct": false}], "correct_index": 2, "explanation_html": "The presence of chronic sinuses together with gram positive organisms and sulphur granules is highly suggestive of Actinomycosis. Crohns disease is associated with multiple fistulae, but not gram positive organisms with sulphur granules."}], "note_html": "Chronic, progressive granulomatous disease caused by filamentous gram positive anaerobic bacteria from the Actinomycetaceae family. <br><br>Actinomyces are commensal bacteria that become pathogenic when a mucosal barrier is breached.<br><br>The disease most commonly occurs in the head and neck, although it may also occur in the abdominal cavity and in the thorax. <br><br>The mass will often enlarge across tissue planes with the formation of multiple sinus tracts.<br><br>Abdominopelvic actinomycosis occurs most frequently in individuals that have had appendicitis (65%) cases. <br><br><b>Pathology<\/b><br><ul><li>On histological examination gram positive organisms and evidence of sulphur granules.<\/li><li>Sulphur granules are colonies of organisms that appear as round or oval basophilic masses.  <\/li><li>They are also seen in other conditions such as nocardiosis.<\/li><\/ul><br><b>Treatment<\/b><br><ul><li>Long term antibiotic therapy usually with penicillin.<\/li><li>Surgical resection is indicated for extensive necrotic tissue, non healing sinus tracts, abscesses or where biopsy is needed to exclude malignancy. <\/li><\/ul><br><b>References<\/b><br>Wong V, Turmezei T and Weston V. Actinomycosis. <i>BMJ<\/i> 2011;343d6099."}, {"name": "Acute inflammation", "questions": [{"number": 17, "topic": "Acute inflammation", "stem_html": "A 25 year old man undergoes an appendicetomy for appendicitis. The appendix is submitted for histopathological evaluation. Which of the following is most likely to be identified microscopically within and on the serosa?", "options": [{"label_html": "Macrophages", "is_correct": false}, {"label_html": "Neutrophils", "is_correct": true}, {"label_html": "Fibroblasts", "is_correct": false}, {"label_html": "Lymphocytes", "is_correct": false}, {"label_html": "Stem cells", "is_correct": false}], "correct_index": 1, "explanation_html": "Neutrophil polymorphs are the cell type most commonly encountered in acute inflammation."}, {"number": 18, "topic": "Acute inflammation", "stem_html": "A 20 year old man develops acute appendicitis, his appendix is removed and he makes a full recovery. Which of the following pathological processes is least likely to be present in the acutely inflamed tissues?", "options": [{"label_html": "Altered Starlings forces", "is_correct": false}, {"label_html": "Sequestration of neutrophils", "is_correct": false}, {"label_html": "Formation of fluid exudate", "is_correct": false}, {"label_html": "Formation of granulomas", "is_correct": true}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 3, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Neutrophil polymorphs=Acute inflammation.<br>Granuloma = Chronic inflammation.<\/div>Acute inflammation:<br><b>3 phases<\/b><br>1.\tChanges in blood vessel and flow: flush, flare, wheal<br>2.\tFluid exudates (rich in protein i.e. Ig, coagulation factors) produced via increased vascular permeability<br>3.\tCellular exudates mainly containing neutrophil polymorphs pass into extravascular space. <br><br>Neutrophils are then transported to tissues via:<br><br>a.\t<b>Margination<\/b> of neutrophils to the peripheral plasmatic of the vessel rather than the central axial stream<br>b.\t<b>Pavementing<\/b>: Adhesion of neutrophils to endothelial cells in venules at site of acute inflammation<br>c.\t<b>Emigration<\/b>: neutrophils pass between endothelial cells into the tissue"}, {"number": 19, "topic": "Acute inflammation", "stem_html": "A 23 year old man suffers a thermal injury to his left hand. It becomes red and painful. Which of the following mediators are not involved in this process?", "options": [{"label_html": "Histamine", "is_correct": false}, {"label_html": "Free radicals", "is_correct": true}, {"label_html": "Prostaglandins", "is_correct": false}, {"label_html": "Leukotrienes", "is_correct": false}, {"label_html": "Serotonin", "is_correct": false}], "correct_index": 1, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Acute inflammation is not mediated by free radicals<\/div>Chemical mediators facilitate the spread of inflammation into normal tissue<br>Chemical mediators include: <br><ul><li>Lysosomal compounds<\/li><li>Chemokines such as serotinin and histamine (released by platelets and mast cells)<\/li><\/ul><br>Other enzyme cascades producing inflammatory mediators include:<br><ul><li>\tComplement, kinin, coagulation system and fibrinolytic system<\/li><\/ul>"}, {"number": 20, "topic": "Acute inflammation", "stem_html": "Which of the following statements relating to neutrophil polymorphs is true?", "options": [{"label_html": "Produce nitrogen peroxide as a microbicidal agent", "is_correct": false}, {"label_html": "Not involved in opsonisation", "is_correct": false}, {"label_html": "Deficiency leads to AIDS", "is_correct": false}, {"label_html": "Neutrophil disorders may result in chronic granulomatous diseases", "is_correct": true}, {"label_html": "Have a lifespan of 9 hours", "is_correct": false}], "correct_index": 3, "explanation_html": "<ul><li>\tNeutrophils are the main cells of acute inflammation, important action against gram -ve and +ve bacteria<\/li><li>\tAppearance of segmented nucleus and granulated cytoplasm<\/li><li>\tHave a lifespan of 1-3 days (shorter when consumed during septic process, though 9 hours is unusual)<\/li><li>\tActions include: movement, opsonise microorganisms, phagocytosis &amp; intracellular killing of microorganisms via aerobic (produce HYDROGEN PEROXIDE) &amp; anaerobic mechanisms.<\/li><li>\tNeutrophil disorders include chronic granulomatous diseases: rare<\/li><li>\tAIDS associated with T cell deficiency<\/li><\/ul>"}, {"number": 21, "topic": "Acute inflammation", "stem_html": "A 43 year old female develops severe chest wall cellulitis following a mastectomy. On examination, the skin is markedly erythematous. Which of the acute inflammatory mediators listed below is least likely to produce vasodilation at this site?", "options": [{"label_html": "Complement component C5a", "is_correct": false}, {"label_html": "Lysosomal compounds", "is_correct": false}, {"label_html": "Histamine", "is_correct": false}, {"label_html": "Serotonin", "is_correct": true}, {"label_html": "Prostaglandins", "is_correct": false}], "correct_index": 3, "explanation_html": "Erythema is a classical feature of acute inflammation. Potent mediators of vascular dilatation include; histamine, prostaglandins, nitric oxide, platelet activating factor, complement C5a (and C3a) and lysosomal compounds. Although serotonin is associated with acute inflammation it is a vasoconstrictor. The effects of serotonin are dependent upon the state of the vessels in the tissues. Intact and healthy tissues and vessels will respond to a serotonin infusion with vasodilation (hence the flushing seen in carcinoid syndrome). In contrast it worsens cardiac ischaemia in myocardial infarcts when released from damaged platelets."}, {"number": 22, "topic": "Acute inflammation", "stem_html": "A 28 year old man develops an acute paronychia and subsequent spreading sepsis. The tissue exudate has a higher protein content than normal tissue because?", "options": [{"label_html": "Breakdown of tissue cells release protein", "is_correct": false}, {"label_html": "Capillary walls are more permeable", "is_correct": true}, {"label_html": "Increased blood flow transports more protein into the area", "is_correct": false}, {"label_html": "Intracapillary pressure is raised", "is_correct": false}, {"label_html": "Plasma cells release gamma globulin", "is_correct": false}], "correct_index": 1, "explanation_html": "The increased permeability allows the exudation of plasma proteins."}, {"number": 23, "topic": "Acute inflammation", "stem_html": "An 18 year old rock climber falls onto his left arm and sustains a large haematoma of the left upper arm. Unfortunately the wound associated with the injury is neglected and it becomes infected. Which of these changes is least likely to occur?", "options": [{"label_html": "Axillary lymphadenopathy", "is_correct": false}, {"label_html": "Leucopenia", "is_correct": true}, {"label_html": "Tenderness", "is_correct": false}, {"label_html": "Mild pyrexia", "is_correct": false}, {"label_html": "Local formation of yellow pus", "is_correct": false}], "correct_index": 1, "explanation_html": "Leucopenia would be unusual and should prompt a search for another cause."}], "note_html": "Inflammation is the reaction of the tissue elements to injury. Vascular changes occur, resulting in the generation of a protein rich exudate. So long as the injury does not totally destroy the existing tissue architecture, the episode may resolve with restoration of original tissue architecture.<br><br><b>Vascular changes<\/b><br><ul><li>Vasodilation occurs and persists throughout the inflammatory phase.<\/li><li>Inflammatory cells exit the circulation at the site of injury.<\/li><li>The equilibrium that balances Starlings forces within capillary beds is disrupted and a protein rich exudate will form as the vessel walls also become more permeable to proteins.<\/li><li>The high fibrinogen content of the fluid may form a fibrin clot. This has several important immunomodulatory functions.<\/li><\/ul><br><b>Sequelae<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Resolution<\/b><\/td><td><ul><li>Typically occurs with minimal initial injury<\/li><li>Stimulus removed and normal tissue architecture results<\/li><\/ul><\/td><\/tr><tr><td><b>Organisation<\/b><\/td><td><ul><li>Delayed removal of exudate<\/li><li>Tissues undergo organisation and usually fibrosis<\/li><\/ul><\/td><\/tr><tr><td><b>Suppuration<\/b><\/td><td><ul><li>Typically formation of an abscess or an empyema<\/li><li>Sequestration of large quantities of dead neutrophils<\/li><\/ul><\/td><\/tr><tr><td><b>Progression to chronic inflammation<\/b><\/td><td><ul><li>Coupled inflammatory and reparative activities<\/li><li>Usually occurs when initial infection or suppuration has been inadequately managed<\/li><\/ul><\/td><\/tr><\/tbody><\/table><\/div><br><b>Causes<\/b><br><ul><li>Infections e.g. Viruses, exotoxins or endotoxins released by bacteria<\/li><li>Chemical agents <\/li><li>Physical agents e.g. Trauma<\/li><li>Hypersensitivity reactions <\/li><li>Tissue necrosis<\/li><\/ul><br><b>Presence of neutrophil polymorphs is a histological diagnostic feature of acute inflammation<\/b>"}, {"name": "Acute intermittent porphyria", "questions": [{"number": 24, "topic": "Acute intermittent porphyria", "stem_html": "A 45-year-old man presents to surgical outpatients with a long history of recurrent abdominal pain and vomiting.  He is noted to have a peripheral motor neuropathy on examination. What is the most likely diagnosis?", "options": [{"label_html": "Huntington's disease", "is_correct": false}, {"label_html": "Myeloma", "is_correct": false}, {"label_html": "Acute intermittent porphyria", "is_correct": true}, {"label_html": "Lawrence-Moon-Biedl syndrome", "is_correct": false}, {"label_html": "Friedreich's ataxia", "is_correct": false}], "correct_index": 2, "explanation_html": "Neurological signs combined with abdominal pain is acute intermittent porphyria or lead poisoning until proven otherwise."}], "note_html": "Acute intermittent porphyria (AIP) is a rare autosomal dominant condition caused by a defect in porphobilinogen deaminase, an enzyme involved in the biosynthesis of haem. The results in the toxic accumulation of delta aminolaevulinic acid and porphobilinogen. It characteristically presents with abdominal and neuropsychiatric symptoms in 20-40 year olds. AIP is more common in females (5:1)<br><br>Features<br><ul><li>abdominal: abdominal pain, vomiting<\/li><li>neurological: motor neuropathy<\/li><li>psychiatric: e.g. depression<\/li><li>hypertension and tachycardia common<\/li><\/ul><br>Diagnosis <br><ul><li>classically urine turns deep red on standing<\/li><li>raised urinary porphobilinogen (elevated between attacks and to a greater extent during acute attacks)<\/li><li>assay of red cells for porphobilinogen deaminase<\/li><li>raised serum levels of delta aminolaevulinic acid and porphobilinogen<\/li><\/ul>"}, {"name": "Aggressive fibromatosis", "questions": [{"number": 25, "topic": "Aggressive fibromatosis", "stem_html": "Which of the tumour types listed below is found most frequently in a person with aggressive fibromatosis?", "options": [{"label_html": "Medullary thyroid cancer", "is_correct": false}, {"label_html": "Basal cell carcinoma of the skin", "is_correct": false}, {"label_html": "Desmoid tumours", "is_correct": true}, {"label_html": "Dermoid tumours", "is_correct": false}, {"label_html": "Malignant melanoma", "is_correct": false}], "correct_index": 2, "explanation_html": "<p>No explanation provided.<\/p>"}], "note_html": "Aggressive fibromatosis is a disorder consisting of desmoid tumours, which behave in a locally aggressive manner. Desmoid tumours may be identified in both abdominal and extra-abdominal locations.  Metastatic disease is rare. The main risk factor (for abdominal desmoids) is having APC variant of familial adenomatous polyposis coli. Most cases are sporadic.<br>Treatment is by surgical excision."}, {"name": "Amyloid", "questions": [{"number": 26, "topic": "Amyloid", "stem_html": "A 72 year old man has been unwell for many years and following his death a post mortem is performed. Tissue is submitted for microscopic evaluation. Evaluation of sections of the myocardium demonstrates evidence of apple green birefringence with polarised light. What is the most likely diagnosis?", "options": [{"label_html": "Amyloidosis", "is_correct": true}, {"label_html": "SLE", "is_correct": false}, {"label_html": "Tuberculosis", "is_correct": false}, {"label_html": "Disseminated B cell lymphoma", "is_correct": false}, {"label_html": "Systemic sclerosis", "is_correct": false}], "correct_index": 0, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Amyloidosis = apple green birefringence with polarised light<\/div>"}, {"number": 27, "topic": "Amyloid", "stem_html": "A 73 year old lady presents with rectal bleeding and after extensive investigation, a diagnosis of rectal amyloidosis is suspected. A biopsy is taken for histopathological evaluation. This is stained with congo red stain and evaluated microscopically. Which of the findings described below would be consistent with a diagnosis of amyloidosis?", "options": [{"label_html": "Negative birefringence and bright red staining of tissue fibres under polarized light", "is_correct": false}, {"label_html": "Positive birefringence and bright red fibres under polarized light", "is_correct": false}, {"label_html": "Positive birefringence and white under polarized light", "is_correct": false}, {"label_html": "Positive birefringence and green staining of fibres under polarized light", "is_correct": true}, {"label_html": "Negative birefringence and blue staining of fibres under polarized light", "is_correct": false}], "correct_index": 3, "explanation_html": "Amyloid is best assessed with a congo red stain. The tissues are positively birefringent under polarized light and typically stain green."}], "note_html": "Amyloid is an extracellular protein deposit which is insoluble. These deposits disrupt normal tissue structure and if excessive may affect function. All types of amyloid consist of a major fibrillar protein that defines the type of amyloid (approximately 90%) plus various minor components.<br><br>Amyloid is classified with the prefix A (for amyloid) and the suffix depending upon the fibrillary protein present. The main clinical types are AA and AL amyloidosis. Systemic AA amyloidosis is a long-term complication of several chronic inflammatory disorders - e.g. rheumatoid arthritis, ankylosing spondylitis, Crohn's disease, malignancies and conditions predisposing to recurrent infections. AL amyloidosis results from extra-cellular deposition of fibril-forming monoclonal immunoglobulin light chains (most commonly of lambda isotype). Most patients have evidence of isolated monoclonal gammopathy or asymptomatic myeloma, and the occurrence of AL amyloidosis in patients with symptomatic multiple myeloma or other B-cell lymphoproliferative disorders is unusual. AL type amyloidosis is the most common variant. The kidney and heart are two of the most commonly affected sites. Diagnosis is based on surgical biopsy and characteristic histological features which consist birefringence under polarised light. Immunohistochemistry is used to delineate the subtype. Treatment is usually targeted at the underlying cause."}, {"name": "Arterial occlusions/ insufficiency", "questions": [{"number": 28, "topic": "Arterial occlusions/ insufficiency", "stem_html": "A 26 year old man who smokes heavily develops aching, crampy pains in his legs. On examination, distal limb pulses are diminished. What is the most likely cause?", "options": [{"label_html": "Vasculitis", "is_correct": true}, {"label_html": "Steal syndrome", "is_correct": false}, {"label_html": "Clot embolus", "is_correct": false}, {"label_html": "Vasospasm", "is_correct": false}, {"label_html": "Arterial injury", "is_correct": false}], "correct_index": 0, "explanation_html": "This is likely to represent Buergers disease. It is commonest in young males who smoke heavily."}, {"number": 29, "topic": "Arterial occlusions/ insufficiency", "stem_html": "A 6 year old child has suffered a displaced supracondylar humeral fracture. On examination, he has a cold and insensate hand with absent pulses. What is the most likely underlying cause?", "options": [{"label_html": "Clot embolus", "is_correct": false}, {"label_html": "Compartment syndrome", "is_correct": false}, {"label_html": "Steal syndrome", "is_correct": false}, {"label_html": "Direct arterial injury", "is_correct": true}, {"label_html": "Vasospasm", "is_correct": false}], "correct_index": 3, "explanation_html": "Both vasospasm and arterial injury may complicate supracondylar fractures and are seen in 1% of all cases. Vasospasm is usually transient and more likely when the injury is minor and reduced early. Severely displaced injuries and those with more advanced signs are usually associated with direct arterial injury."}, {"number": 30, "topic": "Arterial occlusions/ insufficiency", "stem_html": "What is the process that is most likely to account for a 73 year old lady presenting with a cold pulseless hand 3 days following a myocardial infarct?", "options": [{"label_html": "Foreign body embolus", "is_correct": false}, {"label_html": "Rupture of existing atheromatous plaque", "is_correct": false}, {"label_html": "Steal syndrome", "is_correct": false}, {"label_html": "Vasospasm", "is_correct": false}, {"label_html": "Clot embolus", "is_correct": true}], "correct_index": 4, "explanation_html": "The development of mural or atrial appendage thrombi may occur following a myocardial infarct and co-existing atrial fibrillation may contribute to the formation. They tend to present with classical features of an embolic event."}], "note_html": "Arterial occlusions may occur as a result of a number of processes. The typical clinical scenarios are outlined below.<br><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Cause of occlusion<\/b><\/th><th><b>Typical picture<\/b><\/th><\/tr><\/thead><tbody><tr><td>Embolus<\/td><td>Sudden onset <br>Depending upon level of occlusion; limb may show typical features of pain, loss of pulses and pallor. Sensory perceptive changes may also be present<\/td><\/tr><tr><td>Thrombosis<\/td><td>Usually known disease and prodromal symptoms e.g. claudication<br>Disruption to flow may be incomplete<br>If background disease process present then collaterals may be present and picture less dramatic<\/td><\/tr><tr><td>Vasospasm<\/td><td>May be due to Raynauds and affect extremities<br>Symptoms are often temperature related<br>Discolouration of the hands may occur (pale, dark, red)<br>Symptoms improve during pregnancy (hyperdynamic circulation)<\/td><\/tr><tr><td>Steal syndromes<\/td><td>Occur secondary to arteriovenous fistula, or partial arterial occlusions (e.g. cervical rib)<br>Pain and diminished pulses distal to fistula are seen<\/td><\/tr><\/tbody><\/table><\/div><br><b>Vasculitis<\/b><br><b>Vessel diameter and vasculitis classification<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Aorta and branches<\/b><\/td><td><ul><li>Takayasu's arteritis<\/li><li>Buergers disease<\/li><li>Giant cell arteritis<\/li><\/ul><\/td><\/tr><tr><td><b>Large and medium sized arteries<\/b><\/td><td><ul><li>Buergers disease<\/li><li>Giant cell arteritis<\/li><li>Polyarteritis nodosa<\/li><\/ul><\/td><\/tr><tr><td><b>Medium sized muscular arteries<\/b><\/td><td><ul><li>Polyarteritis nodosa<\/li><li>Wegeners granulomatosis<\/li><\/ul><\/td><\/tr><tr><td><b>Small muscular arteries<\/b><\/td><td><ul><li>Wegeners granulomatosis<\/li><li>Rheumatoid vasculitis<\/li><\/ul><\/td><\/tr><\/tbody><\/table><\/div><br><b>Specific conditions<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Takyasu's arteritis<\/b><\/td><td><ul><li>Inflammatory, obliterative arteritis affecting aorta and branches<\/li><li>Females&gt; Males<\/li><li>Symptoms may include upper limb claudication<\/li><li>Clinical findings include diminished or absent pulses<\/li><li>ESR often affected during the acute phase<\/li><\/ul><\/td><\/tr><tr><td><b>Buergers disease<\/b><\/td><td><ul><li>Segmental thrombotic occlusions of the small and medium sized lower limb vessels<\/li><li>Commonest in young male smokers<\/li><li>Proximal pulses usually present, but pedal pulses are lost<\/li><li>An acuter hypercellular occlusive thrombus is often present<\/li><li>Tortuous corkscrew shaped collateral vessels may be seen on angiography<\/li><\/ul><\/td><\/tr><tr><td><b>Giant cell arteritis<\/b><\/td><td><ul><li>Systemic granulomatous arteritis that usually affects large and medium sized vessels<\/li><li>Females &gt; Males<\/li><li>Temporal arteritis is commonest type<\/li><li>Granulomatous lesions may be seen on biopsy (although up to 50% are normal)<\/li><\/ul><\/td><\/tr><tr><td><b>Polyarteritis nodosa<\/b><\/td><td><ul><li>Systemic necrotising vasculitis affecting small and medium sized muscular arteries<\/li><li>Most common in populations with high prevalence of hepatitis B<\/li><li>Renal disease is seen in 70% cases<\/li><li>Angiography may show saccular or fusiform aneurysms and arterial stenoses<\/li><\/ul><\/td><\/tr><tr><td><b>Wegeners granulomatosis<\/b><\/td><td><ul><li>Predominantly affects small and medium sized arteries<\/li><li>Systemic necrotising granulomatous vasculitis<\/li><li>Cutaneous vascular lesions may be seen (ulceration, nodules and purpura)<\/li><li>Sinus imaging may show mucosal thickening and air fluid levels<\/li><\/ul><\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Atrophy", "questions": [{"number": 31, "topic": "Atrophy", "stem_html": "A 73 year old lady falls and sustains a distal radius fracture that is immobilized in a cast. What pathological process is most likely to have affected the immobilized muscles?", "options": [{"label_html": "Agenesis", "is_correct": false}, {"label_html": "Hypoplasia", "is_correct": false}, {"label_html": "Apoptosis", "is_correct": false}, {"label_html": "Atrophy", "is_correct": true}, {"label_html": "Coagulative necrosis", "is_correct": false}], "correct_index": 3, "explanation_html": "Immobilization of muscle typically results in atrophy. The overall cellularity does not change."}], "note_html": "Atrophy is an acquired diminution in size of a part due to a reduction in the number or size of its constituent elements. It is the antithesis of hyperplasia and hypertrophy combined. In muscle, the reduction in size is the key feature, in all other circumstances a reduction in cellularity occurs too."}, {"name": "Benign cyclical mastalgia", "questions": [{"number": 32, "topic": "Benign cyclical mastalgia", "stem_html": "A 28 year old lady presents with benign cyclical mastalgia. Which of the following is not a recognised treatment for the condition?", "options": [{"label_html": "Evening primrose oil", "is_correct": false}, {"label_html": "Bromocriptine", "is_correct": false}, {"label_html": "Methotrexate", "is_correct": true}, {"label_html": "Danazol", "is_correct": false}, {"label_html": "Tamoxifen", "is_correct": false}], "correct_index": 2, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Surgical excision of tender breast tissue is inappropriate<\/div>Methotrexate is used for the treatment of breast cancer. Whilst the use of tamoxifen is of benefit other agents such as flaxseed oil or evening primrose oil should be tried first. Danazol is effective, but many women dislike the side effects."}], "note_html": "Benign cyclical mastalgia is a common cause of breast pain in younger females. It varies in intensity according to the phase of the menstrual cycle. It is not associated with point tenderness of the chest wall (more likely to be Tietze's syndrome). <br><br>The underlying cause is difficult to pinpoint, examination should focus on identifying focal lesions (such as cysts) that may be treated to provide symptomatic benefit. Women should be advised to wear a supportive bra. Conservative treatments include flax seed oil and evening primrose oil. There is slightly more evidence in favor of flax seed oil, though neither has performed much better than placebo in RCT's. <br><br>Hormonal agents such as bromocriptine and danazol may be more effective. However, many women discontinue these therapies due to adverse effects."}, {"name": "Benign liver lesions", "questions": [{"number": 33, "topic": "Benign liver lesions", "stem_html": "A 37 year old lady presents with right upper quadrant pain and nausea. She is otherwise well and her only medical therapy is the oral contraceptive pill which she has taken for many years with no ill effects. Her liver function tests and serum alpha feto protein are normal. An ultrasound examination demonstrates a 4cm non encapsulated lesion in the right lobe of the liver which has a mixed echoity and heterogeneous texture. What is the underlying lesion most likely to be?", "options": [{"label_html": "Liver cell adenoma", "is_correct": true}, {"label_html": "Hydatid cyst", "is_correct": false}, {"label_html": "Hepatocellular carcinoma", "is_correct": false}, {"label_html": "Cystadenoma", "is_correct": false}, {"label_html": "Mesenchymal hamartoma", "is_correct": false}], "correct_index": 0, "explanation_html": "Liver cell adenomas are linked to OCP use and 90% of patients with liver cell adenomas have used the OCP. Liver function tests are often normal. The lesions will typically have a mixed echoity and heterogeneous texture."}, {"number": 34, "topic": "Benign liver lesions", "stem_html": "A 38 year old sheep farmer presents to the clinic with a 3 month history of malaise and right upper quadrant pain. On examination, he is mildly jaundiced. His liver function tests demonstrate a mild elevation in bilirubin and transaminases, his full blood count shows an elevated eosinophil level. An abdominal x-ray is performed by the senior house officer and demonstrates a calcified lesion in the right upper quadrant of the abdomen. What is the most probably underlying diagnosis?", "options": [{"label_html": "Mesenchymal hamartoma", "is_correct": false}, {"label_html": "Clonorchiasis", "is_correct": false}, {"label_html": "Fasciolopsiasis", "is_correct": false}, {"label_html": "Liver cell adenoma", "is_correct": false}, {"label_html": "Hydatid cyst", "is_correct": true}], "correct_index": 4, "explanation_html": "Hydatid disease is more common in those who work with sheep or dogs. Liver function tests may be abnormal and an eosinophilia is often present. Plain radiographs may reveal a calcified cyst wall. Fasciolopsiasis infection is confined to intestinal wall in most cases."}, {"number": 35, "topic": "Benign liver lesions", "stem_html": "A 25 year old man from the far east presents with a fever and right upper quadrant pain. As part of his investigations a CT scan shows an ill defined lesion in the right lobe of the liver. What is the most probable cause?", "options": [{"label_html": "Hydatid cyst", "is_correct": false}, {"label_html": "Amoebic abscess", "is_correct": true}, {"label_html": "Hepatocellular carcinoma", "is_correct": false}, {"label_html": "Simple liver cyst", "is_correct": false}, {"label_html": "Liver cell adenoma", "is_correct": false}], "correct_index": 1, "explanation_html": "<p>No explanation provided.<\/p>"}, {"number": 36, "topic": "Benign liver lesions", "stem_html": "What is the commonest cause of an amoebic liver abscess?", "options": [{"label_html": "Hydatid disease", "is_correct": false}, {"label_html": "Clonorchiasis", "is_correct": false}, {"label_html": "Entamoeba histolytica", "is_correct": true}, {"label_html": "Fasicola hepatica", "is_correct": false}, {"label_html": "Giardia", "is_correct": false}], "correct_index": 2, "explanation_html": "Entamoeba histiolytica is the only agent on the list that would produce an amoebic abscess."}, {"number": 37, "topic": "Benign liver lesions", "stem_html": "A 42 year old lady presents with right upper quadrant pain and a sensation of abdominal fullness. An ultrasound scan demonstrates a 6.5 cm hyperechoic lesion in the right lobe of the liver. Serum AFP is normal. What is the most likely underlying lesion?", "options": [{"label_html": "Liver cyst", "is_correct": false}, {"label_html": "Haemangioma", "is_correct": true}, {"label_html": "Hepatocellular carcinoma", "is_correct": false}, {"label_html": "Liver metastasis", "is_correct": false}, {"label_html": "Liver cell adenoma", "is_correct": false}], "correct_index": 1, "explanation_html": "A large hyperechoic lesion in the presence of normal AFP is likely to be a haemangioma. An HCC of equivalent size will almost always result in rise in AFP."}], "note_html": "<b>Benign liver lesions<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td>Haemangioma<\/td><td><ul><li>Most common benign tumours of mesenchymal origin<\/li><li>Incidence in autopsy series is 8%<\/li><li>Cavernous haemangiomas may be enormous<\/li><li>Clinically they are reddish purple hypervascular lesions<\/li><li>Lesions are normally separated from normal liver by ring of fibrous tissue<\/li><li>On ultrasound they are typically hyperechoic<\/li><\/ul><\/td><\/tr><tr><td>Liver cell adenoma<\/td><td><ul><li>90% develop in women in their third to fifth decade<\/li><li>Linked to use of oral contraceptive pill<\/li><li>Lesions are usually solitary<\/li><li>They are usually sharply demarcated from normal liver although they usually lack a fibrous capsule<\/li><li>On ultrasound the appearances are of mixed echoity and heterogeneous texture. On CT most lesions are hypodense when imaged prior to administration of IV contrast agents<\/li><li>In patients with haemorrhage or symptoms removal of the adenoma may be required<\/li><\/ul><\/td><\/tr><tr><td>Mesenchymal hamartomas<\/td><td>Congential and benign, usually present in infants. May compress normal liver<\/td><\/tr><tr><td>Liver abscess<\/td><td><ul><li>Biliary sepsis is a major predisposing factor <\/li><li>Structures drained by the portal venous system form the second largest source<\/li><li>Common symptoms include fever, right upper quadrant pain. Jaundice may be seen in 50%<\/li><li>Ultrasound will usually show a fluid filled cavity, hyperechoic walls may be seen in chronic abscesses<\/li><\/ul><\/td><\/tr><tr><td>Amoebic abscess<\/td><td><ul><li>Liver abscess is the most common extra intestinal manifestation of amoebiasis<\/li><li>Between 75 and 90% lesions occur in the right lobe<\/li><li>Presenting complaints typically include fever and right upper quadrant pain<\/li><li>Ultrasonography will usually show a fluid filled structure with poorly defined boundaries<\/li><li>Aspiration yield sterile odourless fluid which has an anchovy paste consistency<\/li><li>Treatment is with metronidazole<\/li><\/ul><\/td><\/tr><tr><td>Hyatid cysts<\/td><td><ul><li>Seen in cases of <i>Echinococcus<\/i> infection<\/li><li>Typically an intense fibrotic reaction occurs around sites of infection<\/li><li>The cyst has no epithelial lining<\/li><li>Cysts are commonly unilocular and may grow to 20cm in size. The cyst wall is thick and has an external laminated hilar membrane and an internal enucleated germinal layer<\/li><li>Typically presents with malaise and right upper quadrant pain. Secondary bacterial infection occurs in 10%.<\/li><li>Liver function tests are usually abnormal and eosinophilia is present in 33% cases<\/li><li>Ultrasound may show septa and hyatid sand or daughter cysts.<\/li><li>Percutaneous aspiration was previously contra indicated, it is now incorporated into some treatment regimens<\/li><li>Treatment is by sterilisation of the cyst with mebendazole and may be followed by surgical resection. Hypertonic swabs are packed around the cysts during surgery<\/li><\/ul><\/td><\/tr><tr><td>Polycystic liver disease<\/td><td><ul><li>Usually occurs in association with polycystic kidney disease<\/li><li>Autosomal dominant disorder<\/li><li>Symptoms may occur as a result of capsular stretch<\/li><\/ul><\/td><\/tr><tr><td>Cystadenoma<\/td><td><ul><li>Rare lesions with malignant potential<\/li><li>Usually solitary multiloculated lesions<\/li><li>Liver function tests usually normal<\/li><li>Ultrasonography typically shows a large anechoic, fluid filled area with irregular margins. Internal echos may result from septa<\/li><li>Surgical resection is indicated in all cases<\/li><\/ul><\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Bladder cancer", "questions": [{"number": 38, "topic": "Bladder cancer", "stem_html": "A 56 year old man from Ghana has suffered from recurrent attacks of haematuria for many years. He presents with suprapubic discomfort and at cystoscopy is found to have a mass lesion within the bladder. What is the most likely diagnosis?", "options": [{"label_html": "Squamous cell carcinoma", "is_correct": true}, {"label_html": "Transitional cell papilloma", "is_correct": false}, {"label_html": "Adenocarcinoma", "is_correct": false}, {"label_html": "Leiomyosarcoma", "is_correct": false}, {"label_html": "Rhabdomyosarcoma", "is_correct": false}], "correct_index": 0, "explanation_html": "In Ghana, Schistosomiasis is more common than in the UK and may cause recurrent episodes of haematuria. In those affected with the condition who develop a bladder neoplasm, an SCC is the most common type."}, {"number": 39, "topic": "Bladder cancer", "stem_html": "A 55 year old man presents with an episode of frank haematuria and on investigation is found to have a T2 transitional cell carcinoma of the bladder. His staging investigations are negative for metastatic disease. What is the most appropriate treatment?", "options": [{"label_html": "Radical cystectomy", "is_correct": true}, {"label_html": "Palliative radiotherapy", "is_correct": false}, {"label_html": "Intravesical BCG", "is_correct": false}, {"label_html": "Intravesical mitomycin C", "is_correct": false}, {"label_html": "Intravesical cisplatin", "is_correct": false}], "correct_index": 0, "explanation_html": "T2 lesions in a young fit patient are best managed surgically. Up to 25 % patients may develop perioperative complications. However, palliative treatments and intravesical chemotherapy (which does NOT include cisplatin) are not used curatively in this situation."}, {"number": 40, "topic": "Bladder cancer", "stem_html": "A 63 year old male presents with several episodes of haematuria. He suffers from COPD secondary to long term smoking. What is the most likely underlying cause?", "options": [{"label_html": "Renal cortical adenoma", "is_correct": false}, {"label_html": "Renal adenocarcinoma", "is_correct": false}, {"label_html": "Nephroblastoma", "is_correct": false}, {"label_html": "Transitional cell carcinoma of the bladder", "is_correct": true}, {"label_html": "Adenocarcinoma of the bladder", "is_correct": false}], "correct_index": 3, "explanation_html": "TCC is the most common subtype and is strongly linked to smoking. The important point to note in this question is the term <i>most likely<\/i> as renal adenocarcinoma may produce similar symptoms but is less likely."}, {"number": 41, "topic": "Bladder cancer", "stem_html": "A 75 year old lady is investigated for episodes of painless haematuria. Apart from COPD from long term smoking she is otherwise well. She has no other urinary symptoms. What is the most likely cause?", "options": [{"label_html": "Transitional cell bladder cancer", "is_correct": true}, {"label_html": "Squamous cell bladder cancer", "is_correct": false}, {"label_html": "Adenocarcinoma of the bladder", "is_correct": false}, {"label_html": "Stone disease", "is_correct": false}, {"label_html": "Arteriovenous malformation of the bladder", "is_correct": false}], "correct_index": 0, "explanation_html": "TCC commonly presents with painless haematuria that may be detected during testing carried out for other reasons. Bladder AVM are very rare."}], "note_html": "Bladder cancer is the second most common urological cancer. It most commonly affects males aged between 50 and 80 years of age. Those who are current, or previous (within 20 years), smokers have a 2-5 fold increased risk of the disease. Exposure to hydrocarbons such as 2-Naphthylamine increases the risk. Although rare in the UK, chronic bladder inflammation arising from Schistosomiasis infection remains a common cause of squamous cell carcinomas, in those countries where the disease is endemic. <br><br><b>Benign tumours<\/b><br>Benign tumours of the bladder including inverted urothelial papilloma and nephrogenic adenoma are uncommon. <br><br><b>Bladder malignancies<\/b><br><ul><li>Transitional cell carcinoma (&gt;90% of cases)<\/li><li>Squamous cell carcinoma ( 1-7% -except in regions affected by schistosomiasis)<\/li><li>Adenocarcinoma (2%)<\/li><\/ul><br>Transitional cell carcinomas may arise as solitary lesions, or may be multifocal, owing to the effect of 'field change' within the urothelium. Up to 70% of TCC's will have a papillary growth pattern. These tumours are usually superficial in location and accordingly have a better prognosis. The remaining tumours show either mixed papillary and solid growth or pure solid growths. These tumours are typically more prone to local invasion and may be of higher grade, the prognosis is therefore worse. Those with T3 disease or worse have a 30% (or higher) risk of regional or distant lymph node metastasis. <br><br><b>TNM Staging<\/b><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Stage<\/b><\/th><th><b>Description<\/b><\/th><\/tr><\/thead><tbody><tr><td>T0<\/td><td>No evidence of tumour<\/td><\/tr><tr><td>Ta<\/td><td>Non invasive papillary carcinoma<\/td><\/tr><tr><td>T1<\/td><td>Tumour invades sub epithelial connective tissue<\/td><\/tr><tr><td>T2a<\/td><td>Tumor invades superficial muscularis propria (inner half)<\/td><\/tr><tr><td>T2b<\/td><td>Tumor invades deep muscularis propria (outer half)<\/td><\/tr><tr><td>T3<\/td><td>Tumour extends to perivesical fat<\/td><\/tr><tr><td>T4<\/td><td>\tTumor invades any of the following: prostatic stroma, seminal vesicles, uterus, vagina<\/td><\/tr><tr><td>T4a<\/td><td>Invasion of uterus, prostate or bowel<\/td><\/tr><tr><td>T4b<\/td><td>Invasion of pelvic sidewall or abdominal wall<\/td><\/tr><tr><td>N0<\/td><td>No nodal disease<\/td><\/tr><tr><td>N1<\/td><td>Single regional lymph node metastasis in the true pelvis (hypogastric, obturator, external iliac, or presacral lymph node)<\/td><\/tr><tr><td>N2<\/td><td>Multiple regional lymph node metastasis in the true pelvis (hypogastric, obturator, external iliac, or presacral lymph node metastasis)<\/td><\/tr><tr><td>N3<\/td><td>Lymph node metastasis to the common iliac lymph nodes<\/td><\/tr><tr><td>M0<\/td><td>No distant metastasis<\/td><\/tr><tr><td>M1<\/td><td>Distant disease<\/td><\/tr><\/tbody><\/table><\/div><br><b>Presentation<\/b><br>Most patients (85%) will present with painless, macroscopic haematuria. In those patients with incidental microscopic haematuria, up to 10% of females aged over 50 will be found to have a malignancy (once infection excluded). <br><br><b>Staging<\/b><br>Most will undergo a cystoscopy and biopsies or TURBT, this provides histological diagnosis and information relating to depth of invasion. Locoregional spread is best determined using pelvic MRI and distant disease CT scanning. Nodes of uncertain significance may be investigated using PET CT.<br><br><b>Treatment<\/b><br>Those with superficial lesions may be managed using TURBT in isolation. Those with recurrences or higher grade/ risk on histology may be offered intravesical chemotherapy. Those with T2 disease are usually offered either surgery (radical cystectomy and ileal conduit) or radical radiotherapy.<br><br><b>Prognosis<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td>T1<\/td><td>90%<\/td><\/tr><tr><td>T2<\/td><td>60%<\/td><\/tr><tr><td>T3<\/td><td>35%<\/td><\/tr><tr><td>T4a<\/td><td>10-25%<\/td><\/tr><tr><td>Any T, N1-N2<\/td><td>30%<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Blood transfusion reactions", "questions": [{"number": 42, "topic": "Blood transfusion reactions", "stem_html": "A 44 year old man undergoes a distal gastrectomy for cancer. He is slightly anaemic and therefore receives a transfusion of 4 units of packed red cells to cover both the existing anaemia and associated perioperative blood loss. He is noted to develop ECG changes that are not consistent with ischaemia. What is the most likely cause?", "options": [{"label_html": "Hyponatraemia", "is_correct": false}, {"label_html": "Hyperkalaemia", "is_correct": true}, {"label_html": "Hypercalcaemia", "is_correct": false}, {"label_html": "Metabolic alkalosis", "is_correct": false}, {"label_html": "Hypernatraemia", "is_correct": false}], "correct_index": 1, "explanation_html": "The transfusion of packed red cells has been shown to increase serum potassium levels. The risk is higher with large volume transfusions and with old blood."}, {"number": 43, "topic": "Blood transfusion reactions", "stem_html": "A 63 year old man is commenced on an infusion of packed red cells following a total hip replacement. Which of the following adverse events is most likely?", "options": [{"label_html": "ABO mismatching", "is_correct": false}, {"label_html": "Immune mediated intolerance of rhesus incompatible blood", "is_correct": false}, {"label_html": "Pyrexia", "is_correct": true}, {"label_html": "Jaundice", "is_correct": false}, {"label_html": "Graft versus host disease", "is_correct": false}], "correct_index": 2, "explanation_html": "Mild pyrexia during blood transfusion is the most common event and commonly occurs during transfusion."}, {"number": 44, "topic": "Blood transfusion reactions", "stem_html": "Infusion with which of the following blood products is most likely to result in an urticarial reaction?", "options": [{"label_html": "Packed red cells", "is_correct": false}, {"label_html": "Fresh frozen plasma", "is_correct": true}, {"label_html": "Platelets", "is_correct": false}, {"label_html": "Cryoprecipitate", "is_correct": false}, {"label_html":
