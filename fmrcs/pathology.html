 "Factor VIII concentrate", "is_correct": false}], "correct_index": 1, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Pyrexia is the most common adverse event in transfusing packed red cells<br>Urticaria is the most common adverse event following infusion of FFP<\/div>"}, {"number": 45, "topic": "Blood transfusion reactions", "stem_html": "A 52 year old man is having a blood transfusion after losing blood from a total knee replacement. He is normally fit and well. Three hours into the transfusion he complains of sudden onset abdominal pain and nausea. His temperature is 39 degrees, Blood pressure 98/42 mmHg, HR 105 bpm and saturations 94% air. His urine appears dark. What is the most likely diagnosis?", "options": [{"label_html": "Delayed haemolytic transfusion reaction", "is_correct": false}, {"label_html": "Neutrophilic febrile reaction", "is_correct": false}, {"label_html": "Acute haemolytic transfusion reaction", "is_correct": true}, {"label_html": "Sickle cell crisis", "is_correct": false}, {"label_html": "Transfusion associated lung injury", "is_correct": false}], "correct_index": 2, "explanation_html": "Rapid intravascular haemolysis leading to shock, DIC and death can occur with this reaction."}, {"number": 46, "topic": "Blood transfusion reactions", "stem_html": "A 32 year male with leukaemia attends the day unit for a blood transfusion. Five days after the transfusion he attends the Emergency Department with a temperature of 38.5, erythroderma and desquamation. What is the most likely explanation?", "options": [{"label_html": "Graft versus host disease", "is_correct": true}, {"label_html": "Acute haemolytic transfusion reaction", "is_correct": false}, {"label_html": "Neutropenic sepsis", "is_correct": false}, {"label_html": "Transfusion associated lung injury", "is_correct": false}, {"label_html": "Neutrophilic febrile reaction", "is_correct": false}], "correct_index": 0, "explanation_html": "This is associated with transfusion of unirradiated blood in immunosuppressed patients. Transfusion associated GVHD can occur 4-30 days after a transfusion and follows a sub acute pathway. Patients may also have diarrhoea and abnormal liver function tests. Management involves steroid therapy."}, {"number": 47, "topic": "Blood transfusion reactions", "stem_html": "A 22 year old man is having a blood transfusion after losing blood from a peptic ulcer. He is normally fit and well. Four hours after the transfusion; he complains of sudden onset shortness of breath and chest pain. On examination his temperature is 37.2, saturations are 88% on air, blood pressure 100/55 mmHg and HR 110 bpm. He has crepitations bilaterally up to the midzones. He is given IV furosemide, but deteriorates and is admitted to ITU. Invasive monitoring shows normal right heart pressures. What is the most likely underlying process?", "options": [{"label_html": "Acute haemolytic transfusion reaction", "is_correct": false}, {"label_html": "Delayed haemolytic transfusion reaction", "is_correct": false}, {"label_html": "Fluid overload", "is_correct": false}, {"label_html": "Transfusion associated lung injury", "is_correct": true}, {"label_html": "Graft versus host disease", "is_correct": false}], "correct_index": 3, "explanation_html": "The normal right heart pressures indicate this is not fluid overload. Transfusion associated lung injury is a rare reaction causing neutrophilic mediated allergic pulmonary oedema. Patient's have antibodies to donor leukocytes. It is important to consider this as a diagnosis when patients don't respond to treatment for pulmonary oedema. Patients normally respond to supportive therapy including fluids and oxygen."}, {"number": 48, "topic": "Blood transfusion reactions", "stem_html": "A 32 year old male is receiving a blood transfusion after being involved in a road traffic accident.  A few minutes after the transfusion he complains of loin pain.  His observations show temperature 39 <sup>o<\/sup>C, HR 130bpm and blood pressure is 95/40mmHg.  What is the best test to confirm his diagnosis?", "options": [{"label_html": "USS abdomen", "is_correct": false}, {"label_html": "Direct Coomb's test", "is_correct": true}, {"label_html": "Blood cultures", "is_correct": false}, {"label_html": "Blood film", "is_correct": false}, {"label_html": "Sickle cell test", "is_correct": false}], "correct_index": 1, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Mnemonic for transfusion reactions:<br><br><b>Got a bad unit<\/b><br><br><b>G<\/b> raft vs. Host disease<br><b>O<\/b> verload<br><b>T<\/b> hrombocytopaenia<br><br><b>A<\/b> lloimmunization<br><br><b>B<\/b> lood pressure unstable<br><b>A<\/b> cute haemolytic reaction<br><b>D<\/b> elayed haemolytic reaction<br><br><b>U<\/b> rticaria<br><b>N<\/b> eutrophilia<br><b>I<\/b> nfection<br><b>T<\/b> ransfusion associated lung injury<\/div>The diagnosis is of an acute haemolytic transfusion reaction, normally due to ABO incompatibility.  Haemolysis of the transfused cells occurs causing the combination of shock, haemoglobinaemia and loin pain.  This may subsequently lead to disseminated intravascular coagulation.  A Coomb's test should confirm haemolysis.  Other tests for haemolysis include: unconjugated bilirubin, haptoglobin, serum and urine free haemoglobin.<br><br>Note that delayed haemolytic reactions are normally associated with antibodies to the Rh system and occur 5-10 days after transfusion."}, {"number": 49, "topic": "Blood transfusion reactions", "stem_html": "An enthusiastic medical student approaches you with a list of questions about blood transfusion reactions.  Which of her following points is incorrect?", "options": [{"label_html": "Graft versus host disease involves neutrophil proliferation", "is_correct": true}, {"label_html": "Thrombocytopaenia may occur in women with a prior pregnancy", "is_correct": false}, {"label_html": "IgA antibodies may cause blood pressure compromise during transfusion", "is_correct": false}, {"label_html": "Hypocalcaemia can occur", "is_correct": false}, {"label_html": "Iron overload can be avoided by chelation therapy", "is_correct": false}], "correct_index": 0, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Mnemonic for transfusion reactions:<br><br><b>Got a bad unit<\/b><br><br><b>G<\/b> raft vs. Host disease<br><b>O<\/b> verload<br><b>T<\/b> hrombocytopaenia<br><br><b>A<\/b> lloimmunization<br><br><b>B<\/b> lood pressure unstable<br><b>A<\/b> cute haemolytic reaction<br><b>D<\/b> elayed haemolytic reaction<br><br><b>U<\/b> rticaria<br><b>N<\/b> eutrophilia<br><b>I<\/b> nfection<br><b>T<\/b> ransfusion associated lung injury<\/div>GVHD results from lymphocytic proliferation.  The patient's own lymphocytes are similar to the donor's lymphocytes, therefore don't perceive them as being foreign.  The donor lymphocytes, however, sees the recipient lymphocytes as being foreign.  Therefore they proliferate causing severe complications.<br><br>Thrombocytopaenia occurs a few days after transfusion and may resolve spontaneously.<br><br>Patients with IGA antibodies need IgA deficient blood transfusions."}], "note_html": "Acute transfusion reactions present as adverse signs or symptoms during or within 24 hours of a blood transfusion. The most frequent reactions are fever, chills, pruritus, or urticaria, which typically resolve promptly without specific treatment or complications. Other signs occurring in temporal relationship with a blood transfusion, such as severe dyspnoea, pyrexia, or loss of consciousness may be the first indication of a more severe potentially fatal reaction.<br>The causes of adverse reactions are multi-factorial. Immune mediated reactions, some of the most feared, occur as a result of component mismatch, the commonest cause of which is clerical error. More common, non immune mediated, complications may occur as a result of product contamination, this may be bacterial or viral. <br>Transfusion related lung injury is well recognised and there are two proposed mechanisms which underpin this. One involves the sequestration of primed neutrophils within the recipient pulmonary capillary bed. The other proposed mechanism suggests that HLA mismatches between donor neutrophils and recipient lung tissue is to blame.<br>The table below summarises the main types of transfusion reaction.<br><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Immune mediated<\/b><\/th><th><b>Non immune mediated<\/b><\/th><\/tr><\/thead><tbody><tr><td>Pyrexia<\/td><td>Hypocalcaemia<\/td><\/tr><tr><td>Alloimmunization<\/td><td>CCF<\/td><\/tr><tr><td>Thrombocytopaenia<\/td><td>Infections<\/td><\/tr><tr><td>Transfusion associated lung injury<\/td><td>Hyperkalaemia<\/td><\/tr><tr><td>Graft vs Host disease<\/td><td><\/td><\/tr><tr><td>Urticaria<\/td><td><\/td><\/tr><tr><td>Acute or delayed haemolysis<\/td><td><\/td><\/tr><tr><td>ABO incompatibility<\/td><td><\/td><\/tr><tr><td>Rhesus incompatibility<\/td><td><\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Bone disease", "questions": [{"number": 50, "topic": "Bone disease", "stem_html": "A 66 year old lady presents with pain in her right hip. It has been increasing over the previous three weeks and waking her from sleep. On examination, she is tender on internal rotation. Blood tests reveal a markedly elevated serum calcium and alkaline phosphatase levels. What is the likely cause?", "options": [{"label_html": "Metastatic breast cancer", "is_correct": true}, {"label_html": "Chondrosarcoma", "is_correct": false}, {"label_html": "Osteoporosis", "is_correct": false}, {"label_html": "Pagets disease", "is_correct": false}, {"label_html": "Rickets", "is_correct": false}], "correct_index": 0, "explanation_html": "Increasing pain at rest, together with increased serum calcium and alkaline phosphatase are most likely to represent metastatic tumour to bone. Chondrosarcomas do occur in the pelvis but are not associated with increased serum calcium and typically have a longer history."}, {"number": 51, "topic": "Bone disease", "stem_html": "A 73 year old lady presents with pain in her left hip. She was walking around the house when she tripped over a rug and fell over. Apart from temporal arteritis which is well controlled with prednisolone she is otherwise well. On examination, her leg is shorted and externally rotated. Her serum alkaline phosphatase and calcium are normal. What is the likely underlying disease process?", "options": [{"label_html": "Pagets disease", "is_correct": false}, {"label_html": "Metastatic renal cancer", "is_correct": false}, {"label_html": "Osteoporosis", "is_correct": true}, {"label_html": "Osteopetrosis", "is_correct": false}, {"label_html": "Osteoclastoma", "is_correct": false}], "correct_index": 2, "explanation_html": "The combination of age, female gender and steroids coupled with hip pain on minor trauma are strongly suggestive of osteoporosis complicated by pathological fracture."}], "note_html": "<div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Disease<\/b><\/th><th><b>Features<\/b><\/th><th><b>Treatment<\/b><\/th><\/tr><\/thead><tbody><tr><td>Pagets<\/td><td><ul><li>Focal bone resorption followed by excessive and chaotic bone deposition<\/li><li>Affects (in order): spine, skull, pelvis and femur<\/li><li>Serum alkaline phosphatase raised (other parameters normal)<\/li><li>Abnormal thickened, sclerotic bone on x-rays<\/li><li>Risk of cardiac failure with &gt;15% bony involvement<\/li><li>Small risk of sarcomatous change<\/li><\/ul><\/td><td>Bisphosphonates<\/td><\/tr><tr><td>Osteoporosis<\/td><td><ul><li>Excessive bone resorption resulting in demineralised bone<\/li><li>Commoner in old age<\/li><li>Increased risk of pathological fracture, otherwise asymptomatic<\/li><li>Alkaline phosphatase normal, calcium normal<\/li><\/ul><\/td><td>Bisphosphonates, calcium and vitamin D<\/td><\/tr><tr><td>Secondary bone tumours<\/td><td><ul><li>Bone destruction and tumour infiltration<\/li><li>Mirel scoring used to predict risk of fracture<\/li><li>Appearances depend on primary (e.g.sclerotic - prostate, lytic - breast)<\/li><li>Elevated serum calcium and alkaline phosphatase may be seen<\/li><\/ul><\/td><td>Radiotherapy, prophylactic fixation and analgesia<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Bone tumours", "questions": [{"number": 52, "topic": "Bone tumours", "stem_html": "A 30-year-old lady presents with a swelling over her right knee. Movements of her knee are restricted. A plain x-ray of the affected site shows multiple lytic and lucent lesions with clearly defined borders. What is the most likely diagnosis?", "options": [{"label_html": "Osteoclastoma", "is_correct": true}, {"label_html": "Osteoblastoma", "is_correct": false}, {"label_html": "Osteosarcoma", "is_correct": false}, {"label_html": "Ewings sarcoma", "is_correct": false}, {"label_html": "Osteoid osteoma", "is_correct": false}], "correct_index": 0, "explanation_html": "Osteoclastoma has a characteristic appearance on x-ray with multiple lytic and lucent areas (Soap bubble) appearances. Pathological fractures may occur. The disease is usually indolent."}], "note_html": "<b>Benign bone tumours<\/b><br>These are relatively common and typically occur in the young. Most will cease growth once skeletal maturity is attained. A key aspect to managing benign bone tumours lies in the exclusion of a malignant bone tumour. Plain films, CT, MRI and sometimes a bone biopsy may be required.<br><br><b>Benign tumours<\/b><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Tumour<\/b><\/th><th><b>Features<\/b><\/th><\/tr><\/thead><tbody><tr><td>Osteoid osteoma<\/td><td>M&gt;F<br>Commonest between 10 and 25 years<br>Severe pain that responds to NSAIDS<br>Femur and tibia usually affected<br>Lesion affects cortex and radiologically consists of a lucent centre surrounded by reactive sclerosis<br>Usually smaller than 1cm<\/td><\/tr><tr><td>Chondroma<\/td><td>Common benign tumour<br>Endochondroma are central lesions that may cause cortical thinning<br>Ecchondroma project beyond the cortex<br>May cause pathological fracture<br>Rarely found in large bones<\/td><\/tr><tr><td>Osteochondroma<\/td><td>One of the commonest benign bone tumours<br>Usually occurs on the surface of a metaphysis (usually femur, proximal humerus or tibia)<br>Pedunculated lesion arising from metaphysis<br>Long standing lesions<br>Do not grow once skeletal maturity reached<\/td><\/tr><tr><td>Bone cyst<\/td><td>Commonest in adolescent boys<br>Occur in proximal femur and humerus<br>May result in pathological fracture<br>Does not affect growth plate<br>On imaging appears as ovoid radiolucent area with surrounding cortical thinning<\/td><\/tr><\/tbody><\/table><\/div><br><b>Giant cell tumour of bone<\/b><br>These lesions sit between benign and malignant. Most are benign. They are relatively rare. They consist of multinucleated giant cells (osteoclast like). Malignancy in these lesions is rare and is of the order of 2%. They account for 20% of benign bone tumours. The lesions may present as an enlarging mass, with pain or pathological fracture. On imaging, these lesions have an epiphyseal location and have a characteristic 'soap bubble' appearance. They do not normally demonstrate sclerosis and have a sharply defined border. Histologically, they demonstrate multinucleated giant cells. Treatment is challenging since these lesions are locally aggressive and have a high rate of local recurrence following excision.<br><br><b>Malignant bone tumours<\/b><br><b>The commonest malignant bone tumour is bone metastasis from another solid organ malignancy<\/b>. Metastatic lesions to bone are significantly more common than primary bone tumours which are extremely rare.<br><br><b>Osteosarcoma<\/b><br>This is the most common form of primary bone tumour. It typically affects males in their second decade. They typically present as a painful expanding mass affecting a long bone such as the femur, in close proximity to a joint. Imaging demonstrates a lesion with mixed sclerotic and lucent zones in the metaphysis bone formation within the tumour is often visible. All patients will be fully staged at presentation with CT, MRI and often PET scanning. There is a high rate of metastasis to the lungs and most patients will receive chemotherapy. Surgical excision is the main treatment.<br><br><b>Ewings sarcoma<\/b><br>Ewings sarcomas typically affect long bones and typically occurs during the first two decades of life. They are complex tumours and have overlap with primitive neuroectodermal tumours. They have a predilection for the lower extremity. They typically present as a painful swelling affecting a long bone. Inflammatory markers such as the ESR are sometimes raised and this is associated with a poorer prognosis. On plain films, the tumour shows evidence of bone destruction with a periosteal reaction (onion skin) appearance. As the condition progresses the periosteal findings can change as the tumour invades the periosteum. Treatment is with excisional surgery and chemotherapy. <br><br><b>Secondary malignant tumours of bone<\/b><br>Metastatic bone tumours may be described as blastic, lytic or mixed. Osteoblastic metastatic disease has the lowest risk of spontaneous fracture when compared to osteolytic lesions of a similar size. <br>Lesions affecting the peritrochanteric region are most prone to spontaneous fracture (because of loading forces at that site). <br>The factors are incorporated into the Mirel Scoring system to stratify the risk of spontaneous fracture for bone metastasis of varying types.<br><br><b>Mirel Scoring system<\/b><br><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid2\"><thead><tr><th><b>Score points<\/b><\/th><th><b>Site<\/b><\/th><th><b>Radiographic appearance<\/b><\/th><th><b>Width of bone involved<\/b><\/th><th><b>Pain<\/b><\/th><\/tr><\/thead><tbody><tr><td>1<\/td><td>Upper extremity<\/td><td>\t Blastic<\/td><td>Less than 1/3<\/td><td>Mild<\/td><\/tr><tr><td>2<\/td><td>Lower extremity<\/td><td>Mixed<\/td><td>\t 1/3 to 2/3<\/td><td>Moderate<\/td><\/tr><tr><td>3<\/td><td>Peritrochanteric\t<\/td><td>Lytic\t<\/td><td>More than 2/3<\/td><td>Aggravated by function<\/td><\/tr><\/tbody><\/table><\/div><br>Depending upon the score the treatment should be as follows:<br><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid3\"><thead><tr><th><b>Score<\/b><\/th><th><b>Risk of fracture<\/b><\/th><th><b>Treatment<\/b><\/th><\/tr><\/thead><tbody><tr><td>9 or greater<\/td><td>Impending (33%)<\/td><td>Prophylactic fixation<\/td><\/tr><tr><td>8<\/td><td>Borderline<\/td><td>Consider fixation<\/td><\/tr><tr><td>7 or less<\/td><td>Not impending (4%)<\/td><td>Non operative management<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Brain abscess", "questions": [{"number": 53, "topic": "Brain abscess", "stem_html": "A 22 year old man presents with symptoms of headache, lethargy and confusion. On examination, he is febrile and has a right sided weakness. A CT scan shows a ring enhancing lesion affecting the left motor cortex. Which of the following is the most likely diagnosis?", "options": [{"label_html": "Arteriovenous malformation", "is_correct": false}, {"label_html": "Cerebral abscess", "is_correct": true}, {"label_html": "Herpes simplex encephalitis", "is_correct": false}, {"label_html": "Metastatic renal adenocarcinoma", "is_correct": false}, {"label_html": "Glioblastoma multiforme", "is_correct": false}], "correct_index": 1, "explanation_html": "The combination of rapidly progressive neurology, fever and headache is highly suggestive of cerebral abscess. CT scanning will show a ring enhancing lesion because the intravenous contrast cannot penetrate the centre of the abscess cavity. HSV encephalitis does not produce ring enhancing lesions."}], "note_html": "<ul><li>CNS abscesses may result from a number of causes including, extension of sepsis from middle ear or sinuses, trauma or surgery to the scalp, penetrating head injuries and embolic events from endocarditis.<\/li><li>The presenting symptoms will depend upon the site of the abscess (those in critical areas e.g.motor cortex) will present earlier. Abscesses have a considerable mass effect in the brain and raised intra cranial pressure is common.<\/li><li>Although fever, headache and focal neurology are highly suggestive of a brain abscess the absence of one or more of these does not exclude the diagnosis, fever may be absent and even if present, is usually not the swinging pyrexia seen with abscesses at other sites.<\/li><li>Assessment of the patient includes imaging with CT scanning.<\/li><li>Treatment is usually surgical, a craniotomy is performed and the abscess cavity debrided. The abscess may reform because the head is closed following abscess drainage.<\/li><\/ul>"}, {"name": "Breast cancer - In situ disease", "questions": [{"number": 54, "topic": "Breast cancer - In situ disease", "stem_html": "A 59 year old lady is referred from the NHS breast screening program. A recent mammogram is reported as showing linear, branching microcalcification with coarse granules. Which disease process is the most likely underlying cause of these appearances?", "options": [{"label_html": "Invasive lobular cancer", "is_correct": false}, {"label_html": "Lobular carcinoma in situ", "is_correct": false}, {"label_html": "Cribriform type ductal carcinoma in situ", "is_correct": false}, {"label_html": "Comedo type ductal carcinoma in situ", "is_correct": true}, {"label_html": "Fibroadenosis", "is_correct": false}], "correct_index": 3, "explanation_html": "Comedo type DCIS is usually associated with microcalcifications. Cribriform lesions are usually multifocal but less likely to form microcalcifications. Lobular cancers and in situ lesions rarely form microcalcifications and are difficult to detect using mammography."}], "note_html": "Breast cancer that has yet to invade the basement membrane is referred to as in situ disease. Both ductal and lobular in situ variants are recognised. <br><br><b>Ductal carcinoma in situ<\/b><br><ul><li>Sub types include; comedo, cribriform, micropapillary and solid<\/li><li>Comdeo DCIS is most likely to form microcalcifications<\/li><li>Cribriform and micropapillary are most likely to be multifocal<\/li><li>Most lesions are mixed (composed of multiple subtypes)<\/li><li>High nuclear grade DCIS is associated with more malignant characteristics (loss of p53, increased erbB2 expression)<\/li><li>Local excision of low nuclear grade DCIS will usually produce satisfactory outcomes. <\/li><li>Multifocal lesions, large and high nuclear grade lesions will usually require mastectomy<\/li><li>Whole breast irradiation improves locoregional control when breast conserving surgery is performed<\/li><\/ul><br><b>Lobular carcinoma in situ<\/b><br><ul><li>Much rarer than DCIS<\/li><li>Does not form microcalcifications<\/li><li>Usually single growth pattern<\/li><li>When an invasive component is found it is less likely to be associated with axillary nodal metastasis than with invasive foci found within DCIS<\/li><li>Low grade LCIS is usually treated by monitoring rather than excision<\/li><\/ul>"}, {"name": "Breast cancer pathology", "questions": [{"number": 55, "topic": "Breast cancer pathology", "stem_html": "A 59 year old lady presents with a firm, irregular 4cm mass affecting the upper outer quadrant of her right breast. Which of the features described below is less likely to be encountered in this scenario if a core biopsy were submitted for histological assessment?", "options": [{"label_html": "Abnormal ductal epithelial cells", "is_correct": false}, {"label_html": "Angiogenesis", "is_correct": false}, {"label_html": "Nuclear pleomorphism", "is_correct": false}, {"label_html": "Metastatic calcification", "is_correct": true}, {"label_html": "Vascular invasion", "is_correct": false}], "correct_index": 3, "explanation_html": "Dystrophic calcification may be present in breast malignancy and is the basis for the breast screening programme. Metastatic calcification is calcification which occurs in otherwise normal tissues, usually as a result of hypercalcaemia. Invasive ductal carcinoma is the most common type of breast cancer, unless the tumour is very poorly differentiated there is usually some resemblance to ductal epithelial cells (though these can be abnormal)."}], "note_html": "The histological features of breast cancer depend upon the underlying diagnosis. The invasive component is usually comprised of ductal cells (unless it is an invasive lobular cancer). In situ lesions may co-exist (such as DCIS).<br><br>Typical changes seen in conjunction with invasive breast cancer include:<br>1. Nuclear pleomorphism<br>2. Coarse chromatin<br>3. Angiogenesis<br>4. Invasion of the basement membrane<br>5. Dystrophic calcification (may be seen on mammography)<br>6. Abnormal mitoses<br>7. Vascular invasion<br>8. Lymph node metastasis<br><br>The primary tumour is graded on a scale of 1-3 where 1 is the most benign lesion and 3 the most poorly differentiated. <br><br>Immunohistochemistry for oestrogen receptor and herceptin status is routinely performed. <br><br>The grade, lymph node stage and size are combined to provide the Nottingham prognostic index."}, {"name": "Burns pathology", "questions": [{"number": 56, "topic": "Burns pathology", "stem_html": "Which of the following does not occur as a pathological response to extensive burns?", "options": [{"label_html": "Plasma leakage into interstitial space", "is_correct": false}, {"label_html": "Absolute polycythaemia", "is_correct": true}, {"label_html": "Increased haematocrit", "is_correct": false}, {"label_html": "Keratinocyte migration during healing", "is_correct": false}, {"label_html": "Cardiac output reduction by 50% in first 30 minutes", "is_correct": false}], "correct_index": 1, "explanation_html": "Haemolysis is the main pathological response."}, {"number": 57, "topic": "Burns pathology", "stem_html": "A 32 year old man is involved in a house fire and sustains extensive partial thickness burns to his torso and thigh. Two weeks post incident he develops oedema of both lower legs. The most likely cause of this is:", "options": [{"label_html": "Iliofemoral deep vein thrombosis", "is_correct": false}, {"label_html": "Venous obstruction due to scarring", "is_correct": false}, {"label_html": "Hypoalbuminaemia", "is_correct": true}, {"label_html": "Excessive administration of intravenous fluids", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 2, "explanation_html": "Loss of plasma proteins is the most common cause of oedema developing in this time frame."}], "note_html": "<b>Extensive burns<\/b><br><ul><li>Haemolysis due to damage of erythrocytes by heat and microangiopathy<\/li><li>Loss of capillary membrane integrity causing plasma leakage into interstitial space<\/li><li>Extravasation of fluids from the burn site causing hypovolaemic shock (up to 48h after injury)- decreased blood volume and increased haematocrit<\/li><li>Protein loss<\/li><li>Secondary infection e.g. <i>Staphylococcus aureus<\/i><\/li><li>ARDS<\/li><li>Risk of Curlings ulcer (acute peptic stress ulcers)<\/li><li>Danger of full thickness circumferential burns in an extremity as these may develop compartment syndrome<\/li><\/ul><br><b>Healing<\/b><br><ul><li>Superficial burns: keratinocytes migrate to form a new layer over the burn site<\/li><li>Full thickness burns: dermal scarring.  Usually need keratinocytes from skin grafts to provide optimal coverage.<\/li><\/ul>"}, {"name": "Carcinoid syndrome", "questions": [{"number": 58, "topic": "Carcinoid syndrome", "stem_html": "A 43 year old man has symptoms of carcinoid syndrome. Which of the following is the most effective therapeutic agent in controlling the symptoms?", "options": [{"label_html": "Atenolol", "is_correct": false}, {"label_html": "Octreotide", "is_correct": true}, {"label_html": "Glucagon", "is_correct": false}, {"label_html": "Somatostatin", "is_correct": false}, {"label_html": "Spironolactone", "is_correct": false}], "correct_index": 1, "explanation_html": "Octreotide is the usual treatment for carcinoid syndrome. Somatostatin inhibits the release of a number of gut hormones. Octreotide is the synthetic alternative to somatostatin and thus the most appropriate therapeutic agent."}, {"number": 59, "topic": "Carcinoid syndrome", "stem_html": "A 28 year old man has a carcinoid tumour identified in his appendix. Blood testing for which of the substances listed below is likely to be helpful during follow up?", "options": [{"label_html": "CA19-9", "is_correct": false}, {"label_html": "Alkaline phosphatase", "is_correct": false}, {"label_html": "AFP", "is_correct": false}, {"label_html": "CEA", "is_correct": false}, {"label_html": "Chromogranin A", "is_correct": true}], "correct_index": 4, "explanation_html": "It is important to distinguish between blood and urine tests for carcinoid syndrome. Blood tests usually measure chromogranin A,neuron-specific enolase (NSE), substance P, and gastrin. Urine tests usually measure 5 HIAA, which is a metabolite of serotonin. Sometimes blood tests for 5 hydroxytryptamine (serotonin) are also performed."}, {"number": 60, "topic": "Carcinoid syndrome", "stem_html": "A 24 year old man is identified as having a 5cm carcinoid tumour of the appendix. Imaging and diagnostic work up does not demonstrate any distant disease. What is the best course of action?", "options": [{"label_html": "Appendicectomy", "is_correct": false}, {"label_html": "Right hemicolectomy", "is_correct": true}, {"label_html": "Resection of the caecal pole", "is_correct": false}, {"label_html": "External beam radiotherapy", "is_correct": false}, {"label_html": "Observation with imaging", "is_correct": false}], "correct_index": 1, "explanation_html": "Large carcinoid tumours should be formally resected. In many cases, they will be identified as an incidental finding. In such cases, it can be difficult to distinguish between carcinoid tumours and other appendiceal neoplasms."}, {"number": 61, "topic": "Carcinoid syndrome", "stem_html": "A 25 year old man is found to have carcinoid syndrome. Which of the following hormones is released by carcinoids?", "options": [{"label_html": "Serotonin", "is_correct": true}, {"label_html": "Dopamine", "is_correct": false}, {"label_html": "Nor adrenaline", "is_correct": false}, {"label_html": "Adrenaline", "is_correct": false}, {"label_html": "Aldosterone", "is_correct": false}], "correct_index": 0, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Rule of thirds:<br><br>1/3 multiple<br>1/3 small bowel<br>1/3 metastasize<br>1/3 second tumour<\/div>Carcinoids secrete serotonin. Carcinoid syndrome will only occur in the presence of liver metastasis as the hormone released from primary lesions will typically be metabolised by the liver."}, {"number": 62, "topic": "Carcinoid syndrome", "stem_html": "A 28 year old man undergoes a completion right hemicolectomy for treatment of a 5cm appendiceal carcinoid. As part of his follow up he is due to undergo 24 hour urine collection for 5-HIAA. Which of the following causes an elevated 5-HIAA in a 24-hour urine collection?", "options": [{"label_html": "Naproxen", "is_correct": true}, {"label_html": "Oranges", "is_correct": false}, {"label_html": "Flucloxacillin", "is_correct": false}, {"label_html": "Amiodarone", "is_correct": false}, {"label_html": "Beef", "is_correct": false}], "correct_index": 0, "explanation_html": "It is important to be aware of what can falsely elevate 5-HIAA to avoid diagnosing carcinoid syndrome incorrectly.  These include:<br><br>Food: spinach, cheese, wine, caffeine, tomatoes<br>Drugs: Naproxen, Monoamine oxidase inhibitors<br>Recent surgery"}, {"number": 63, "topic": "Carcinoid syndrome", "stem_html": "What is the urinary diagnostic marker for carcinoid syndrome?", "options": [{"label_html": "B-HCG", "is_correct": false}, {"label_html": "Histamine", "is_correct": false}, {"label_html": "Chromogranin A", "is_correct": false}, {"label_html": "5-Hydroxyindoleacetic acid", "is_correct": true}, {"label_html": "5-Hydroxytryptamine", "is_correct": false}], "correct_index": 3, "explanation_html": "Urinary measurement of 5- HIAA is an important part of clinical follow up."}, {"number": 64, "topic": "Carcinoid syndrome", "stem_html": "A patient has an appendicectomy and a 1.2cm carcinoid tumour is identified in the tip of the appendix. What is the most appropriate management?", "options": [{"label_html": "Watchful waiting", "is_correct": false}, {"label_html": "Discharge", "is_correct": true}, {"label_html": "Right hemicolectomy", "is_correct": false}, {"label_html": "Limited ileocaecal resection", "is_correct": false}, {"label_html": "Radioisotope scan", "is_correct": false}], "correct_index": 1, "explanation_html": "Individuals with small carcinoids can be discharged (&lt;2cm and limited to the appendix). Larger tumours should have a radioisotope scan. Where the resection margin is positive or where the isotope scan suggests lymphatic metastasis a right hemicolectomy should be performed."}, {"number": 65, "topic": "Carcinoid syndrome", "stem_html": "The following are true of carcinoid tumours except:", "options": [{"label_html": "When present in  the appendix tip and measure less than 2 cm have an excellent prognosis", "is_correct": false}, {"label_html": "Even when metastatic disease is present it tends to follow a protracted course", "is_correct": false}, {"label_html": "When present in the appendix body tend to present with carcinoid syndrome even when liver metastases are not present", "is_correct": true}, {"label_html": "May be imaged using somatostatin receptor scintigraphy scanning", "is_correct": false}, {"label_html": "Advanced appendiceal carcinoids may require right hemicolectomy", "is_correct": false}], "correct_index": 2, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Rule of thirds:<br><br>1/3 multiple<br>1/3 small bowel<br>1/3 metastasize<br>1/3 second tumour<\/div>Liver metastases are necessary for the presence of carcinoid syndrome."}, {"number": 66, "topic": "Carcinoid syndrome", "stem_html": "A 32 year old man undergoes an appendicectomy. A large carcinoid tumour is identified and a completion right hemicolectomy is performed. He is well for several months and then develops symptoms of palpitations and facial flushing. Which of the following diagnostic markers should be requested?", "options": [{"label_html": "Alpha feto protein", "is_correct": false}, {"label_html": "Urinary 5-Hydroxyindoleacetic acid measurements", "is_correct": true}, {"label_html": "Urinary catecholamines", "is_correct": false}, {"label_html": "Urinary VMA measurements", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 1, "explanation_html": "5 HIAA is the most commonly used diagnostic marker for carcinoid syndrome, it is measured in a 24 hour urine collection."}], "note_html": "- Carcinoid tumours secrete serotonin<br><ul><li>Originate in neuroendocrine cells mainly in the intestine (midgut-distal ileum/appendix)<\/li><li>Can occur in the rectum, bronchi<\/li><li>Hormonal symptoms mainly occur when disease spreads outside the bowel<\/li><\/ul><br><b>Clinical features<\/b><br><ul><li>Onset: insidious over many years<\/li><li>Flushing face<\/li><li>Palpitations<\/li><li>Pulmonary valve stenosis and tricuspid regurgitation causing dyspnoea<\/li><li>Asthma<\/li><li>Severe diarrhoea (secretory, persists despite fasting)<\/li><\/ul><br><b>Investigation<\/b><br><ul><li>5-HIAA in a 24-hour urine collection<\/li><li>Somatostatin receptor scintigraphy<\/li><li>CT scan<\/li><li>Blood testing for chromogranin A<\/li><\/ul><br><b>Treatment<\/b><br><ul><li>Octreotide<\/li><li>Surgical removal<\/li><\/ul>"}, {"name": "Carpal tunnel syndrome", "questions": [{"number": 67, "topic": "Carpal tunnel syndrome", "stem_html": "A 45 year old woman complains of painful tingling in her fingers. The pain is relieved by hanging the arm over the side of the bed.  She has a positive Tinel's sign at the wrist.  Which of the following is most likely to contribute to her diagnosis?", "options": [{"label_html": "Methotrexate use", "is_correct": false}, {"label_html": "Crohn's disease", "is_correct": false}, {"label_html": "Hyperthyroidism", "is_correct": false}, {"label_html": "Tuberculosis", "is_correct": false}, {"label_html": "Rheumatoid arthritis", "is_correct": true}], "correct_index": 4, "explanation_html": "This woman has a diagnosis of carpal tunnel syndrome. Rheumatological disorders are a common cause. Clinical examination should focus on identifying stigmata of rheumatoid arthritis, such as rheumatoid nodules, vasculitic lesions and metacarpophalangeal joint arthritis."}], "note_html": "Carpal tunnel syndrome is caused by compression of median nerve in the carpal tunnel<br><br>History<br><ul><li>pain/pins and needles in thumb, index, middle finger e.g. at night<\/li><li>patient flicks hand to obtain relief<\/li><\/ul><br>Examination<br><ul><li>weakness of thumb abduction<\/li><li>wasting of thenar eminence (NOT hypothenar)<\/li><li>Tinel's sign: tapping causes paraesthesia<\/li><li>Phalen's sign: flexion of wrist causes symptoms<\/li><\/ul><br><br><b>Causes of carpal tunnel syndrome<\/b><br><br><i>MEDIAN TRAP<\/i> Mnemonic <br><br><ul><li>Myxoedema <\/li><li>Edema premenstrually <\/li><li>Diabetes <\/li><li>Idiopathic <\/li><li>Acromegaly <\/li><li>Neoplasm <\/li><li>Trauma <\/li><li>Rheumatoid arthritis <\/li><li>Amyloidosis <\/li><li>Pregnancy <\/li><\/ul><br><b>Management<\/b><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Non surgical treatment<\/b><\/th><th><b>Surgery<\/b><\/th><\/tr><\/thead><tbody><tr><td>May resolve spontaneously<br>Avoid precipitants and reassurance<br>Night-time splints<br>Local steroid injections<\/td><td>Complete division of the flexor retinaculum and decompression of the tunnel (successful in approximately 80% of patients)<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Cell death", "questions": [{"number": 68, "topic": "Cell death", "stem_html": "Which of the following events is most classically seen in the arterioles of patients with malignant hypertension?", "options": [{"label_html": "Caseous necrosis", "is_correct": false}, {"label_html": "Coagulative necrosis", "is_correct": false}, {"label_html": "Fibrinoid necrosis", "is_correct": true}, {"label_html": "Apoptosis", "is_correct": false}, {"label_html": "Colliquative necrosis", "is_correct": false}], "correct_index": 2, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Fibrinoid necrosis is seen in the arterioles of patients with malignant hypertension.<\/div>"}, {"number": 69, "topic": "Cell death", "stem_html": "An 83 year old lady is admitted with a fractured neck of femur and is managed with surgical fixation. On the day following surgery, she is noted to have a dense hemiparesis. Several days later, an MRI scan of the brain is performed which demonstrates a 3cm area of devitalised tissue within the right frontal lobe. Which of the pathological processes described below is most likely to account for these appearances?", "options": [{"label_html": "Coagulative necrosis", "is_correct": false}, {"label_html": "Colliquative necrosis", "is_correct": true}, {"label_html": "Caseous necrosis", "is_correct": false}, {"label_html": "Fibrinoid necrosis", "is_correct": false}, {"label_html": "Apoptosis", "is_correct": false}], "correct_index": 1, "explanation_html": "Death of CNS tissue through vascular compromise tends to result in colliquative necrosis as the cells have less formal supporting stroma."}], "note_html": "Cells can die via two mechanisms; necrosis and apoptosis. These are outlined below:<br><br><b>Necrosis<\/b><br>Necrosis is characterised by bioenergetics failure. Loss of tissue perfusion results in hypoxia and an inability to generate ATP. The integrity of the cellular membrane is lost and the loss of ATP results in loss of energy dependent cellular transport mechanisms. There is an influx of water, ionic instability and cellular lysis. The release of intracellular contents may stimulate an inflammatory response. Several types of necrosis are recognised; coagulative, colliquative, caseous, gangrene, fibrinoid and fat necrosis. The type of tissue and the underlying cause determine the predominant necrosis pattern. <br><br><b>Coagulative necrosis<\/b><br><ul><li>The commonest type, occurs in most organs<\/li><li>Tissue is initially firm, later becomes soft as tissue is digested by macrophages<\/li><li>In the early phases the histological appearances may demonstrate little change<\/li><li>In later stages cellular outlines are seen with loss of intracellular detail<\/li><\/ul><br><b>Colliquative necrosis<\/b><br><ul><li>Occurs in tissues with no supporting stroma<\/li><li>Dominant necrosis pattern in the CNS<\/li><li>Necrotic site may eventually become encysted<\/li><\/ul><br><b>Caseous necrosis<\/b><br><ul><li>No definable structure seen in the necrotic tissue<\/li><li>Amorphous eosinophilic tissue may be seen histologically<\/li><li>Classically seen in tuberculosis<\/li><\/ul><br><b>Gangrene<\/b><br><ul><li>Necrosis with putrefaction of tissue<\/li><li>May complicate ischaemia<\/li><li>Haemoglobin degenerates and results in the deposition of iron sulphide (which is why the tissue is black)<\/li><li>Both wet and dry gangrene may occur, in wet gangrene there is often a liquefactive component and super-added infection (which usually smells!)<\/li><\/ul><br><b>Fibrinoid necrosis<\/b><br><ul><li>Classically seen in arterioles in patients with hypertension (malignant type)<\/li><li>Necrosis of the smooth muscle wall occurs and plasma may extravasate into the media with fibrin deposition<\/li><\/ul><br><b>Fat necrosis<\/b><br><ul><li>Direct trauma to fat can result in rupture of adipocytes<\/li><li>Lipids incite a local inflammatory reaction<\/li><li>Inflammatory cells phagocytose the lipid with eventual fibrosis<\/li><\/ul><br><b>Apoptosis<\/b><br><ul><li>Also known as programmed cell death<\/li><li>Energy dependent pathways are activated via a number of intracellular signalling mechanisms<\/li><li>It is the result of the activation of caspases triggered by the bcl-2 family or the binding of the FAS ligand to its receptor<\/li><li>DNA fragments, mitochondrial function ceases, nuclear and cellular shrinkage occurs<\/li><li>Phagocytosis of the cell does not occur, instead the cell degenerates into apoptotic bodies<\/li><\/ul>"}, {"name": "Chronic inflammation", "questions": [{"number": 70, "topic": "Chronic inflammation", "stem_html": "Causes of primary chronic inflammation do not include which of the following?", "options": [{"label_html": "Sarcoidosis", "is_correct": false}, {"label_html": "Tuberculosis", "is_correct": false}, {"label_html": "Ulcerative colitis", "is_correct": false}, {"label_html": "Breast implants", "is_correct": false}, {"label_html": "Chronic cholecystitis", "is_correct": true}], "correct_index": 4, "explanation_html": "Chronic cholecystitis is caused by recurrent episodes of acute inflammation.<br>Prosthetic implants may be the site of primary chronic inflammation. A common example clinically is breast implants which may become encapsulated. The subsequent fibrosis then results in distortion and may be painful. Hip implants may be affected in a similar fashion but this is less common."}, {"number": 71, "topic": "Chronic inflammation", "stem_html": "Which of the following statements relating to chronic inflammation is true?", "options": [{"label_html": "Chronic inflammation is mainly secondary to acute inflammation", "is_correct": false}, {"label_html": "Neutrophils are the predominant cells involved", "is_correct": false}, {"label_html": "Growth factors are not involved in the process", "is_correct": false}, {"label_html": "Appendicitis is mainly a form of chronic inflammation", "is_correct": false}, {"label_html": "Fibrosis is a macroscopic feature", "is_correct": true}], "correct_index": 4, "explanation_html": "Macroscopic features include:<br><ul><li>Ulcers<\/li><li>Fibrosis<\/li><li>Granulomatous process<\/li><\/ul>It most commonly occurs as a primary event rather than as a result of acute inflammation."}, {"number": 72, "topic": "Chronic inflammation", "stem_html": "Which of the following cellular types or features is not seen in sarcoidosis?", "options": [{"label_html": "Reed Sternberg Cells", "is_correct": true}, {"label_html": "T lymphocytes", "is_correct": false}, {"label_html": "Macrophages", "is_correct": false}, {"label_html": "Asteroid bodies", "is_correct": false}, {"label_html": "B lymphocytes", "is_correct": false}], "correct_index": 0, "explanation_html": "Reed Sternberg cells are seen in Hodgkins disease. All of the other cell types are seen in sarcoid."}, {"number": 73, "topic": "Chronic inflammation", "stem_html": "Which of the following is not characteristic of a granuloma?", "options": [{"label_html": "Altered macrophages", "is_correct": false}, {"label_html": "Fused macrophages", "is_correct": false}, {"label_html": "Epithelioid cells", "is_correct": false}, {"label_html": "Mixture of chronic inflammatory cells", "is_correct": false}, {"label_html": "Polymorphnuclear leucocytes, cellular debris and fibrin", "is_correct": true}], "correct_index": 4, "explanation_html": "These are typical components of an abscess cavity. Polymorphonuclear leucocytes may be found in a granuloma if there is a focus of suppuration."}, {"number": 74, "topic": "Chronic inflammation", "stem_html": "A 34 year old man presents to the surgical clinic 8 months following a laparotomy for a ruptured spleen. He complains of a nodule in the centre of his laparotomy wound. This is explored surgically and a stitch granuloma is found and excised. From which of the following cell types do granulomata arise?", "options": [{"label_html": "Polymorpho nucleocytes", "is_correct": false}, {"label_html": "Plasma cells", "is_correct": false}, {"label_html": "Reed- Sternberg cells", "is_correct": false}, {"label_html": "Platelets", "is_correct": false}, {"label_html": "Macrophages", "is_correct": true}], "correct_index": 4, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Granulomas are organised collections of macrophages<\/div>Macrophages give origin to granulomas."}, {"number": 75, "topic": "Chronic inflammation", "stem_html": "A 63 year old lady is suspected as having sarcoidosis. She is sent to the general surgeons and a lymph node biopsy is performed. Which histological feature is most likely to be identified in a lymph node if sarcoid is present?", "options": [{"label_html": "Psammoma bodies", "is_correct": false}, {"label_html": "Extensive necrosis", "is_correct": false}, {"label_html": "Dense eosinophillic infiltrates", "is_correct": false}, {"label_html": "Asteroid bodies", "is_correct": true}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 3, "explanation_html": "Asteroid bodies are often found in the granulomas of individuals with sarcoid. Unlike the granulomata associated with tuberculosis the granulomas of sarcoid are rarely associated with extensive necrosis.<br><br><i>An Asteroid body in an individual with sarcoid<\/i><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb094b.jpg\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb094.jpg\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Granuloma\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb094b.jpg\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}], "note_html": "<b>Overview<\/b><br>Chronic inflammation may occur secondary to acute inflammation.In most cases chronic inflammation occurs as a primary process. These may be broadly viewed as being one of three main processes:<br><ul><li>Persisting infection with certain organisms such as <i>Mycobacterium<\/i> tuberculosis which results in delayed type hypersensitivity reactions and inflammation.<\/li><li>Prolonged exposure to non-biodegradable substances such as silica or suture materials which may induce an inflammatory response.<\/li><li>Autoimmune conditions involving antibodies formed against host antigens.<\/li><\/ul><br><b>Acute vs. Chronic inflammation<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Acute inflammation<\/b><\/td><td><b>Chronic inflammation<\/b><\/td><\/tr><tr><td>Changes to existing vascular structure and increased permeability of endothelial cells<\/td><td>Angiogenesis predominates<\/td><\/tr><tr><td>Infiltration of neutrophils<\/td><td>Macrophages, plasma cells and lymphocytes predominate<\/td><\/tr><tr><td>Process may resolve with:<br><ul><li>Suppuration<\/li><li>Complete resolution<\/li><li>Abscess formation<\/li><li>Progression to chronic inflammation<\/li><li>Healing by fibrosis<\/li><\/ul><\/td><td>Healing by fibrosis is the main result<\/td><\/tr><\/tbody><\/table><\/div><br><b>Granulomatous inflammation<\/b><br>A granuloma consists of a microscopic aggregation of macrophages (with epithelial type arrangement =epithelioid). Large giant cells may be found at the periphery of granulomas.<br><br><b>Mediators<\/b><br>Growth factors released by activated macrophages include agents such as interferon and fibroblast growth factor (plus many more). Some of these such as interferons may have systemic features resulting in systemic symptoms and signs, which may be present in individuals with long standing chronic inflammation.<br><br><i>The finding of granulomas is pathognomonic of chronic inflammation, as illustrated in this biopsy from a patient with colonic Crohns disease<\/i><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb093b.jpg\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb093.jpg\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Crohn%27s disease\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb093b.jpg\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}, {"name": "Claudication", "questions": [{"number": 76, "topic": "Claudication", "stem_html": "A 63 year old man has a history of claudication that has been present for many years. He is recently evaluated in the clinic and a duplex scan shows that he has an 85% stenosis of the superficial femoral artery. Two weeks later he presents with a 1 hour history of severe pain in his leg. On examination, he has absent pulses in the affected limb and it is much cooler than the contra-lateral limb. Which process best accounts for this presentation?", "options": [{"label_html": "Thrombosis", "is_correct": true}, {"label_html": "Embolus", "is_correct": false}, {"label_html": "Atheroma growth", "is_correct": false}, {"label_html": "Sub intimal dissection", "is_correct": false}, {"label_html": "Anaemia", "is_correct": false}], "correct_index": 0, "explanation_html": "In an existing lesion a complication such as thrombosis is more likely than embolus. These patients should receive heparin and imaging with duplex scanning. Whilst an early surgical bypass or intra-arterial thrombolysis may be indicated, an embolectomy should not generally be performed as the lesion is not an embolus and the operation therefore ineffective."}], "note_html": "Claudication is a condition in which patients develop pain in a limb during periods of exercise. The underlying disorder is usually that of arterial insufficiency. Atheroma develops in the arterial wall and once this occludes &gt;50-75% of the lumenal diameter the supply to metabolising tissues distally may become compromised. The typical claudicant complains of calf pain that is worse on exercise and relieved by rest. This typical description assumes that the SFA is the site of disease, more proximal disease may present with other symptoms such as buttock claudication and impotence. <br><br>The history is usually a progressive one, patients presenting as an emergency with severe pain, diminished sensation, pallor and absent pulses have critical limb ischaemia. This may complicate claudication and usually indicates a plaque related complication, such as thrombosis. <br><br><b>Risk factors<\/b><br>Risk factors for claudication include smoking, diabetes and hyperlipidaemia. <br><br><b>Diagnosis<\/b><br>Diagnostic work -up includes measurement of ankle- brachial pressure indices, duplex scanning and formal angiography. <br><br><b>Treatment<\/b><br>Those with long claudication distances, no ulceration or gangrene may be managed conservatively. Patients with rest pain, ulceration or gangrene will almost always require intervention. All patients should receive an antiplatelet agent and a statin unless there are compelling contra-indications."}, {"name": "CNS tumours", "questions": [{"number": 77, "topic": "CNS tumours", "stem_html": "Which of the following is the most common childhood brain tumour?", "options": [{"label_html": "Glioblastoma multiforme", "is_correct": false}, {"label_html": "Astrocytoma", "is_correct": true}, {"label_html": "Medulloblastoma", "is_correct": false}, {"label_html": "Ependymoma", "is_correct": false}, {"label_html": "Meningioma", "is_correct": false}], "correct_index": 1, "explanation_html": "Glioblastoma multiforme is rare in childhood.  In contrast, astrocytoma is the commonest brain tumour in children. Medulloblastoma is no longer the commonest CNS tumour in children (Cancer research UK)"}, {"number": 78, "topic": "CNS tumours", "stem_html": "A 65 year old man presents with a new onset left sided hemiparesis. A CT scan of the brain is performed and this demonstrates a 4cm lesion within the right frontal lobe, it traverses the midline and displays marked central necrosis. There is extensive oedema surrounding the lesion. What is the most likely diagnosis?", "options": [{"label_html": "Meningioma", "is_correct": false}, {"label_html": "Central neurocytoma", "is_correct": false}, {"label_html": "Ependymoma", "is_correct": false}, {"label_html": "Oligodendroglioma", "is_correct": false}, {"label_html": "Glioblastoma", "is_correct": true}], "correct_index": 4, "explanation_html": "Glioblastomas typically display such marked appearances and an important differential on imaging is one of cerebral abscess. A meningioma would not display such infiltrative behavior. Significant necrosis is more commonly seen with glioblastomas than with other CNS tumours."}, {"number": 79, "topic": "CNS tumours", "stem_html": "A 2 year old boy presents with vague neurological symptoms and is imaged with an MRI of the brain. This demonstrates a tumour that is located in the floor of the 4th ventricle and extends through the foramen of Magendie. What is the most likely diagnosis?", "options": [{"label_html": "Glioblastoma", "is_correct": false}, {"label_html": "CNS lymphoma", "is_correct": false}, {"label_html": "Ependymoma", "is_correct": true}, {"label_html": "Schwannoma", "is_correct": false}, {"label_html": "Meningioma", "is_correct": false}], "correct_index": 2, "explanation_html": "Glioblastoma is rare in children. Ependymoma account for up to 33% of CNS tumours in those under age of 3. They commonly arise in the 4th ventricle and can grow through the foramina of Luschka and Magendie"}], "note_html": "<ul><li>60% = Glioma and metastatic disease<\/li><li>20% = Meningioma<\/li><li>10% = Pituitary lesions<\/li><\/ul>In paediatric practice medulloblastomas (neuroectodermal tumours) were the commonest lesions, astrocytomas now account for the majority. <br>Tumours arising in right temporal and frontal lobe may reach considerable size before becoming symptomatic. Whereas tumours in the speech and visual areas will typically produce early symptoms. <br><br><div class=\"alert alert-warning\">Most paediatric CNS tumours are infratentorial <br>Most adult CNS tumours are supratentorial<br><\/div><br><b>Diagnosis<\/b> <br>MRI Scanning provides the best resolution.<br> <br><b>Treatment<\/b><br>Usually surgery, even if tumour cannot be completely resected conditions such as rising ICP can be addressed with tumour debulking and survival and quality of life prolonged. <br>Curative surgery can usually be undertaken with lesions such as meningiomas. Gliomas have a marked propensity to invade normal brain and resection of these lesions is nearly always incomplete."}, {"name": "Collagen", "questions": [{"number": 80, "topic": "Collagen", "stem_html": "Which vitamin is involved in the formation of collagen?", "options": [{"label_html": "Vitamin A", "is_correct": false}, {"label_html": "Vitamin B", "is_correct": false}, {"label_html": "Vitamin C", "is_correct": true}, {"label_html": "Vitamin D", "is_correct": false}, {"label_html": "Vitamin E", "is_correct": false}], "correct_index": 2, "explanation_html": "Vitamin C is needed for the hydroxylation of proline during collagen synthesis."}, {"number": 81, "topic": "Collagen", "stem_html": "Which of the following amino acids is present in all types of collagen?", "options": [{"label_html": "Alanine", "is_correct": false}, {"label_html": "Aspartime", "is_correct": false}, {"label_html": "Glycine", "is_correct": true}, {"label_html": "Tyrosine", "is_correct": false}, {"label_html": "Cysteine", "is_correct": false}], "correct_index": 2, "explanation_html": "Collagen has a generic structure of Glycine- X- Y, where X and Y are variable sub units. The relatively small size of the glycine molecule enables collagen to form a tight helical structure."}, {"number": 82, "topic": "Collagen", "stem_html": "A 17 year old lady with long standing anorexia nervosa is due to undergo excision of a lipoma. Which of the following nutritional deficiencies is most likely to be implicated in poor collagen formation as the wound heals?", "options": [{"label_html": "Deficiency of copper", "is_correct": false}, {"label_html": "Deficiency of iron", "is_correct": false}, {"label_html": "Deficiency of ascorbic acid", "is_correct": true}, {"label_html": "Deficiency of phosphate", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 2, "explanation_html": "Vitamin C is involved in the cross linkage of collagen and impaired wound healing is well described in cases of vitamin C deficiency."}], "note_html": "Collagen is one of the most important structural proteins within the extracellular matrix, collagen together with components such as elastin and glycosaminoglycans determine the properties of all tissues. <br><ul><li>Composed of 3 polypeptide strands that are woven into a helix, usually a combination of glycine with either proline or hydroxyproline plus another amino acid <\/li><li>Numerous hydrogen bonds exist within molecule to provide additional strength<\/li><li>Many sub types but commonest sub type is I (90% of bodily collagen), tissues with increased levels of flexibility have increased levels of type III collagen<\/li><li>Vitamin c is important in establishing cross links<\/li><li>Synthesised by fibroblasts<\/li><\/ul><br><b>Collagen Diseases<\/b><br>Disorders of collagen range from relatively common, acquired defects (typically aging), through to rarer congenital disorders. The latter are exemplified by conditions such as osteogenesis imperfecta and Ehlers Danlos syndromes.<br><br>Osteogenesis imperfecta:<br>-8 Subtypes<br>-Defect of type I collagen<br>-In type I the collagen is normal quality but insufficient quantity<br>-Type II- poor quantity and quality<br>-Type III- Collagen poorly formed, normal quantity<br>-Type IV- Sufficient quantity but poor quality<br>Patients have bones which fracture easily, loose joint and multiple other defects depending upon which sub type they suffer from.<br><br>Ehlers Danlos:<br>-Multiple sub types<br>-Abnormality of types 1 and 3 collagen<br>-Patients have features of hypermobility.<br>-Individuals are prone to joint dislocations and pelvic organ prolapse. In addition to many other diseases related to connective tissue defects."}, {"name": "Colonic lesions - DALM", "questions": [{"number": 83, "topic": "Colonic lesions - DALM", "stem_html": "A 45 year old man with long standing ulcerative colitis and rectal dysplasia presents with a DALM lesion in the rectum. What is the most appropriate management option?", "options": [{"label_html": "Snare polypectomy", "is_correct": false}, {"label_html": "Repeat endoscopy in 2 years", "is_correct": false}, {"label_html": "Discharge", "is_correct": false}, {"label_html": "Anterior resection", "is_correct": false}, {"label_html": "Panproctocolectomy", "is_correct": true}], "correct_index": 4, "explanation_html": "DALM lesions complicating ulcerative colitis should be managed with panproctocolectomy. An anterior resection is inadequate since it will only remove the rectum and ulcerative colitis affects the entire colon. Since many will be associated with invasion a snare polypectomy is not sufficient either."}], "note_html": "<ul><li>The term DALM lesion refers to a Dysplasia Associated Lesion or Mass.<\/li><li>They may complicate dysplasia occurring in patients with longstanding ulcerative colitis.<\/li><li>They have a high incidence of invasive foci.<\/li><li>When they complicate longstanding ulcerative colitis, they should be treated by panproctocolectomy.<\/li><\/ul>"}, {"name": "Dercums disease", "questions": [{"number": 84, "topic": "Dercums disease", "stem_html": "A 40 year old female is diagnosed as having Dercums disease. Which of the lesions listed below are most likely to be identified on physical examination?", "options": [{"label_html": "Lipomas", "is_correct": true}, {"label_html": "Neuromas", "is_correct": false}, {"label_html": "Hamartomas", "is_correct": false}, {"label_html": "Arteriovenous malformations", "is_correct": false}, {"label_html": "Histiocytomas", "is_correct": false}], "correct_index": 0, "explanation_html": "Dercums disease is characterized by multiple lipomas. It is also referred to as adiposis dolorosa."}], "note_html": "<ul><li>Condition in which there is generalized obesity and multiple fatty tumours within adipose tissue<\/li><li>Lesions are usually multiple and found around extremity joints<\/li><li>Commonest in females<\/li><li>Typically presents in middle age<\/li><li>Treatments include analgesia and occasionally resection of the lesions, recurrence, however, is common<\/li><\/ul>"}, {"name": "Dermoid cysts", "questions": [{"number": 85, "topic": "Dermoid cysts", "stem_html": "A 4 year old boy is brought to the clinic by his mother who has noticed a small lesion at the external angle of his eye. On examination there is a small cystic structure which has obviously been recently infected. On removal of the scab, there is hair visible within the lesion. What is the most likely diagnosis?", "options": [{"label_html": "Dermoid cyst", "is_correct": true}, {"label_html": "Desmoid cyst", "is_correct": false}, {"label_html": "Sebaceous cyst", "is_correct": false}, {"label_html": "Epidermoid cyst", "is_correct": false}, {"label_html": "Keratoacanthoma", "is_correct": false}], "correct_index": 0, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Dermoid cysts occur at sites of embryonic fusion and may contain multiple cell types. They occur most often in children.<\/div>The lesion is unlikely to be a desmoid cyst as these are seldom located either at this site or in this age group. In addition they do not contain hair. Sebaceous cysts will usually have a punctum and contain a cheesy material. Epidermoid cysts contain keratin plugs."}], "note_html": "A cutaneous dermoid cyst may develop at sites of embryonic developmental fusion. They are most common in the midline of the neck, external angle of the eye and posterior to the pinna of the ear. They typically have multiple inclusions such as hair follicles that bud out from its walls. They may develop at other sites such as the ovary and in these sites are synonymous with teratomas. <br><br>A desmoid tumour is a completely different entity and may be classified either as low grade fibrosarcomas or non aggressive fibrous tumours. They commonly present as large infiltrative masses. They may be divided into abdominal, extra abdominal and intra abdominal. All types share the same biological features. Extra abdominal desmoids have an equal sex distribution and primarily arise in the musculature of the shoulder, chest wall, back and thigh. Abdominal desmoids usually arise in the musculoaponeurotic structures of the abdominal wall. Intra abdominal desmoids tend to occur in the mesentery or pelvic side walls and occur most frequently in patients with familial adenomatous polyposis coli syndrome."}, {"name": "Desmoid tumours", "questions": [{"number": 86, "topic": "Desmoid tumours", "stem_html": "A 34 year old woman who has previously undergone a colectomy for familial adenomatous polyposis coli presents with a firm lesion at the inferior aspect of her rectus abdominis muscle. Which cell type is most typically associated with such tumours?", "options": [{"label_html": "Myocytes", "is_correct": false}, {"label_html": "Proliferation of apocrine glands", "is_correct": false}, {"label_html": "Chondrocytes", "is_correct": false}, {"label_html": "Lipoblasts", "is_correct": false}, {"label_html": "Myofibroblasts", "is_correct": true}], "correct_index": 4, "explanation_html": "Desmoid tumours would be the most likely differential here and consist of a clonal proliferation of myofibroblasts."}, {"number": 87, "topic": "Desmoid tumours", "stem_html": "Which of the lesions listed below is most likely to arise from musculoaponeurotic structures?", "options": [{"label_html": "Dermoid tumour", "is_correct": false}, {"label_html": "Desmoid tumour", "is_correct": true}, {"label_html": "Schwannoma", "is_correct": false}, {"label_html": "Sebaceous cyst", "is_correct": false}, {"label_html": "Osteoclastoma", "is_correct": false}], "correct_index": 1, "explanation_html": "Desmoids are clonal proliferations of myofibroblasts and tend to arise from aponeurotic structures."}], "note_html": "<ul><li>Desmoid tumours are fibrous neoplasms arising from musculoaponeurotic structures. They typically contain clonal proliferations of myofibroblasts.<\/li><li>They are usually firm overgrowths of tissue with a propensity to local infiltration.<\/li><li>They occur in up to 15% of patients with familial adenomatous polyposis coli.<\/li><li>Desmoid tumours usually show bi allelic APC mutations<\/li><li>They occur most commonly in women after childbirth in the rectus abdominis muscle.<\/li><li>They are usually treated (regardless of site) by radical surgical resection, in some patients radiotherapy and chemotherapy may be considered. The results of non surgical therapy is inferior to surgical resection. In selected cases of abdominal desmoids a period of observation may be preferred as some may spontaneously regress.<\/li><li>Desmoids have a high tendency to local recurrence.<\/li><\/ul><i>Desmoids consist of sheets of differentiated fibroblasts<\/i><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb143b.jpg\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb143.jpg\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Aggressive fibromatosis\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb143b.jpg\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}, {"name": "Diaphragm disease", "questions": [{"number": 88, "topic": "Diaphragm disease", "stem_html": "A 73 year old lady is admitted with small bowel obstruction and following surgery is diagnosed as having diaphragm disease. Which of the agents listed below is the most likely precipitant?", "options": [{"label_html": "Alcohol abuse", "is_correct": false}, {"label_html": "Oral non steroidal anti inflammatory drugs", "is_correct": true}, {"label_html": "Abdominal radiotherapy", "is_correct": false}, {"label_html": "Oral steroids", "is_correct": false}, {"label_html": "Chronic laxative misuse", "is_correct": false}], "correct_index": 1, "explanation_html": "Diaphragm disease of the small intestine is caused by NSAIDS in most cases and treated by surgical resection."}], "note_html": "Diaphragm disease is seen when the lumen of the small bowel is divided into short compartments by circular membranes of mucosa and sub-mucosa; these membranes have a pinhole lumen leading to frequent bouts of intestinal obstruction. The condition is said to be rare and associated with prolonged or long-term usage of non-steroidal anti-inflammatory drugs (NSAIDs). It is more common in the elderly as this group are more likely to take non steroidal anti inflammatory drugs in the long term. <br>It is usually treated by surgical resection as the condition typically results in small bowel obstruction."}, {"name": "Disorders affecting the spleen", "questions": [{"number": 89, "topic": "Disorders affecting the spleen", "stem_html": "An 83 year old lady presents to the clinic with early satiety. On examination, she is found to have massive splenomegaly. What is the most likely underlying cause?", "options": [{"label_html": "Acute lymphoblastic leukaemia", "is_correct": false}, {"label_html": "Acute myelomonocytic leukaemia", "is_correct": false}, {"label_html": "Acute monoblastic leukaemia", "is_correct": false}, {"label_html": "Chronic granulocytic leukaemia", "is_correct": true}, {"label_html": "Epstein Barr virus infection", "is_correct": false}], "correct_index": 3, "explanation_html": "Long standing pathology is usually the cause of massive splenomegaly. Of these, its a common finding in chronic leukaemia. Its rare for EBV infections to cause massive splenomegaly."}, {"number": 90, "topic": "Disorders affecting the spleen", "stem_html": "Which of the conditions listed below is least likely to be associated with hypersplenism?", "options": [{"label_html": "Coeliac disease", "is_correct": true}, {"label_html": "Lymphoma", "is_correct": false}, {"label_html": "Leukaemia", "is_correct": false}, {"label_html": "Portal hypertension", "is_correct": false}, {"label_html": "Feltys syndrome", "is_correct": false}], "correct_index": 0, "explanation_html": "Many conditions may result in overactivity of the spleen. It is not seen in coeliac disease. Feltys syndrome occurs in association with rheumatoid disease."}, {"number": 91, "topic": "Disorders affecting the spleen", "stem_html": "A 23 year old man is admitted to the emergency room with a sudden collapse. A FAST scan shows a large amount of free blood and an enlarged spleen. Which of the conditions below is most likely to account for this?", "options": [{"label_html": "Acute rubella infection", "is_correct": false}, {"label_html": "Mumps infection", "is_correct": false}, {"label_html": "Infection with Epstein Barr virus", "is_correct": true}, {"label_html": "Infection with influenza", "is_correct": false}, {"label_html": "Infection with COVID 19", "is_correct": false}], "correct_index": 2, "explanation_html": "EBV infection is the classic cause of sudden spontaneous splenic rupture. Of the many conditions linked to COVID 19, splenic rupture is not one of them."}], "note_html": "One of the commonest conditions to affect the spleen is traumatic rupture and this is addressed elsewhere.<br><br><b>Splenomegaly<\/b><br>Enlargement of the spleen can commonly accompany a variety of haematological disorders. Of these, chronic conditions such as haemolytic anaemia and chronic leukaemia are often associated with splenomegaly. More acute haematological conditions tend not to cause massive splenic enlargement. Infections with parasites (such as malaria) and viruses such as Epstein Barr virus can cause splenomegaly and this one condition that is associated with sudden spontaneous splenic rupture. Portal hypertension can result in splenomegaly and the finding of an enlarged spleen on abdominal examination should prompt a search for the other stigmata of chronic liver disease.<br><br><b>Splenic atrophy<\/b><br>This typically occurs as a result of conditions that impair the blood flow to the spleen. Division of some of the major vessels can cause shrinkage of the spleen and this is commonly seen when splenic artery aneurysms are coiled for example."}, {"name": "Disseminated intravascular coagulation", "questions": [{"number": 92, "topic": "Disseminated intravascular coagulation", "stem_html": "A 73 year old man undergoes an emergency amputation for severe lower limb sepsis and gangrene. Post operatively he develops disseminated intravascular coagulation. Which of the following clotting factors will be most rapidly consumed in this process?", "options": [{"label_html": "Factor V and VIII", "is_correct": true}, {"label_html": "Factor I", "is_correct": false}, {"label_html": "Factor I and III", "is_correct": false}, {"label_html": "Factor III and VII", "is_correct": false}, {"label_html": "Factor VI and VIII", "is_correct": false}], "correct_index": 0, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">D-I-S-S-E-M-I-N-A-T-E-D <br><br>D-Dx: D dimer <br>I-Immune complexes <br>S-Snakebite, shock, heatstroke <br>S-SLE <br>E-Eclampsia, HELLP syndrome <br>M-Massive tissue damage <br>I-Infections: viral and bacterial <br>N-Neoplasms <br>A-Acute promyelocytic leukemia <br>T-Tumor products: Tissue Factor (TF) and TF-like factors released by carcinomas of pancreas, prostate, lung, <br>colon, stomach <br>E-Endotoxins (bacterial) <br>D-Dead fetus (retained)<\/div>DIC Will tend to consume factors five and eight intially (and platelets)."}], "note_html": "Simultaneous coagulation and haemorrhage caused by initially formation of thrombi which consume clotting factors (factors 5,8) and platelets, ultimately leading to bleeding<br><br>Causes include:<br><ul><li>Infection<\/li><li>Malignancy<\/li><li>Trauma e.g. major surgery, burns, shock, dissecting aortic aneurysm<\/li><li>Liver disease<\/li><li>Obstetric complications<\/li><\/ul><br><b>Key points<\/b><br><ul><li>Clinically bleeding is usually a dominant feature, bruising, ischaemia and organ failure<\/li><li>Blood tests: prolonged clotting times, thrombocytopenia, decreased fibrinogen, increased fibrinogen degradation products<\/li><li>Treat the underlying cause and supportive management<\/li><\/ul>"}, {"name": "Disseminated intravascular coagulation - Diagnosis", "questions": [{"number": 93, "topic": "Disseminated intravascular coagulation - Diagnosis", "stem_html": "A 72 year old man has just undergone an emergency repair for a ruptured abdominal aortic aneurysm. Pre operatively he was taking aspirin, clopidogrel and warfarin. Intra operatively he received 5000 units of unfractionated heparin prior to application of the aortic cross clamp.  His blood results on admission to the critical care unit are as follows:<br><b>Full blood count<\/b><br><div class=\"table-responsive\"><table class=\"tb\"><tbody><tr><td>Hb<\/td><td>8 g/dl<\/td><\/tr><tr><td>Platelets<\/td><td>40  * 10<sup>9<\/sup>/l<\/td><\/tr><tr><td>WBC<\/td><td>7.1  * 10<sup>9<\/sup>/l<\/td><\/tr><\/tbody><\/table><\/div>His fibrin degradation products are measured and found to be markedly elevated. Which of the following accounts for these results?", "options": [{"label_html": "Anastomotic leak", "is_correct": false}, {"label_html": "Disseminated intravascular coagulation", "is_correct": true}, {"label_html": "Heparin induced thrombocytopenia", "is_correct": false}, {"label_html": "Adverse effect of warfarin", "is_correct": false}, {"label_html": "Adverse effects of antiplatelet agents", "is_correct": false}], "correct_index": 1, "explanation_html": "The combination of low platelet counts and raised FDP in this setting make DIC the most likely diagnosis."}], "note_html": "Under homeostatic conditions, coagulation and fibrinolysis are coupled. The activation of the coagulation cascade yields thrombin that converts fibrinogen to fibrin; the stable fibrin clot being the final product of hemostasis. The fibrinolytic system breaks down fibrinogen and fibrin. Activation of the fibrinolytic system generates plasmin (in the presence of thrombin), which is responsible for the lysis of fibrin clots. The breakdown of fibrinogen and fibrin results in polypeptides (fibrin degradation products). In a state of homeostasis, the presence of plasmin is critical, as it is the central proteolytic enzyme of coagulation and is also necessary for fibrinolysis.<br><br>In DIC, the processes of coagulation and fibrinolysis are dysregulated, and the result is widespread clotting with resultant bleeding. Regardless of the triggering event of DIC, once initiated, the pathophysiology of DIC is similar in all conditions. One critical mediator of DIC is the release of a transmembrane glycoprotein (tissue factor =TF). TF is present on the surface of many cell types (including endothelial cells, macrophages, and monocytes) and is not normally in contact with the general circulation, but is exposed to the circulation after vascular damage. For example, TF is released in response to exposure to cytokines (particularly interleukin 1), tumor necrosis factor, and endotoxin. This plays a major role in the development of DIC in septic conditions. TF is also abundant in tissues of the lungs, brain, and placenta. This helps to explain why DIC readily develops in patients with extensive trauma. Upon activation, TF binds with coagulation factors that then triggers the extrinsic pathway (via Factor VII) which subsequently triggers the intrinsic pathway (XII to XI to IX) of coagulation.<br><br><b>Diagnosis<\/b><br>Fibrin degradation products are often raised.<br><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Disorder<\/b><\/th><th><b>Prothrombin time<\/b><\/th><th><b>APTT<\/b><\/th><th><b>Bleeding
