arriage, stillbirth, preterm delivery, or severe preeclampsia.<br><br>The diagnostic criteria requires one clinical event, i.e. thrombosis or pregnancy complication, and two positive blood tests spaced at least 3 months apart. These antibodies are: lupus anticoagulant, anti-cardiolipin and anti-β2-glycoprotein.<br><br>Antiphospholipid syndrome can be primary or secondary. Primary antiphospholipid syndrome occurs in the absence of any other related disease. Secondary antiphospholipid syndrome occurs with other autoimmune diseases, such as systemic lupus erythematosus (SLE). In rare cases, APS leads to rapid organ failure due to generalised thrombosis; this is termed catastrophic antiphospholipid syndrome (CAPS) and is associated with a high risk of death.<br><br>Antiphospholipid syndrome often requires treatment with anticoagulant medication such as heparin to reduce the risk of further episodes of thrombosis and improve the prognosis of pregnancy. Warfarin is not used during pregnancy because it can cross the placenta, unlike heparin, and is teratogenic."}], "note_html": "<div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Type of thrombophilia<\/b><\/th><th><b>Features<\/b><\/th><\/tr><\/thead><tbody><tr><td>Antithrombin deficiency<\/td><td>Antithrombin inactivates thrombin and factor XII a, XIa, IXa and Xa<br>Rare defect, inherited in autosomal dominant fashion<br>10x increase in risk of thrombotic events <br>Heparin may be ineffective because it works via antithrombin<\/td><\/tr><tr><td>Protein C and S deficiency<\/td><td>These are natural anticoagulants (vitamin K dependent synthesis)<br>Protein C produced by liver<br>Protein S produced by liver, megakaryocytes, Leydig cells  and endothelial cells<br>Protein C and S bind to form activated complex which binds to factor V<br>Deficiency accounts for up to 5% of thrombotic episodes<\/td><\/tr><tr><td>Factor V Leiden<\/td><td>Resistance to anticoagulant effect of activated protein C<br>May account for up to 20% or more of thrombotic episodes<br>Prevalence of 7% in Europe<br>Most common genetic defect accounting for DVT<\/td><\/tr><tr><td>Antiphospholipid syndrome<\/td><td>Multi organ disease<br>Pregnancy involvement common<br>Arterial and venous thromboses<br>Either Lupus anticoagulant or Anti cardiolipin antibodies<br>APTT usually prolonged<br>Antibodies may be elevated following surgery, drugs or malignancy<br>Need anticoagulation with INR between 3 and 4<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Hypersensitivity reactions", "questions": [{"number": 145, "topic": "Hypersensitivity reactions", "stem_html": "A 33 year old man is involved in a road traffic accident. He is initially stable and transferred to the accident and emergency department. On arrival he is catheterised. One minute later he becomes hypotensive, with evidence of angioedema surrounding his penis. What is the most likely explanation for this event?", "options": [{"label_html": "Type V latex hypersensitivity reaction", "is_correct": false}, {"label_html": "Type IV latex hypersensitivity reaction", "is_correct": false}, {"label_html": "Type III latex hypersensitivity reaction", "is_correct": false}, {"label_html": "Type I latex hypersensitivity reaction", "is_correct": true}, {"label_html": "Type II latex hypersensitivity reaction", "is_correct": false}], "correct_index": 3, "explanation_html": "Sudden collapse and angioedema following exposure to latex (of which most urinary catheters are manufactured) suggests a type I hypersensitivity reaction."}, {"number": 146, "topic": "Hypersensitivity reactions", "stem_html": "Which of the following best describes the processes underpinning type IV hypersensitivity reactions?", "options": [{"label_html": "Deposition of immune complexes of IgG and antigen at the site of inflammation", "is_correct": false}, {"label_html": "Deposition of IgA complexes at the site of inflammation", "is_correct": false}, {"label_html": "Deposition of IgM and IgG complexes at the site of inflammation", "is_correct": false}, {"label_html": "Degranulation of mast cells at the site of inflammation", "is_correct": false}, {"label_html": "T cell mediated response at the site of inflammation", "is_correct": true}], "correct_index": 4, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Hypersensitivity reactions: ACID<br><br>type 1 --Anaphylactic<br>type 2 --Cytotoxic<br>type 3 --Immune complex<br>type 4 --Delayed hypersensitivity<\/div>T Cells are the mediators of type 4 hypersensitivity reactions which are characterised by the absence of immune complex deposition."}, {"number": 147, "topic": "Hypersensitivity reactions", "stem_html": "A 56 year old surgeon has been successfully operating for many years. Over the past few weeks she has begun to notice that her hands are becoming blistering and weepy. A latex allergy is diagnosed. Which of the following pathological processes accounts for this scenario?", "options": [{"label_html": "Type 1 hypersensitivity reaction", "is_correct": false}, {"label_html": "Type 2 hypersensitivity reaction", "is_correct": false}, {"label_html": "Type 4 hypersensitivity reaction", "is_correct": true}, {"label_html": "Type 3 hypersensitivity reaction", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 2, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Hypersensitivity reactions: ACID<br><br>type 1 --Anaphylactic<br>type 2 --Cytotoxic<br>type 3 --Immune complex<br>type 4 --Delayed hypersensitivity<\/div>Contact dermatitis of a chronic nature is an example of a type 4 hypersensitivity reaction. Type 4 hypersensitivity reactions are cell mediated rather than antibody mediated."}, {"number": 148, "topic": "Hypersensitivity reactions", "stem_html": "A 53 year old man is due to undergo a splenectomy as a treatment for refractory haemolytic anaemia. The underlying pathological basis for haemolytic anaemia is thought to be a Type 2 hypersensitivity response. Which of the following mechanisms best describes this process", "options": [{"label_html": "Deposition of immune complexes", "is_correct": false}, {"label_html": "Cell mediated immune response", "is_correct": false}, {"label_html": "IgE mediated response", "is_correct": false}, {"label_html": "Formation of autoantibodies against cell surface antigens", "is_correct": true}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 3, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Mnemonic for the reactions and the mediators involved<br>ACID EGG-T <br>Type 1 Anaphylactic<br>Type 2 Cytotoxic<br>Type 3 Immune complex<br>Type 4 Delayed type <br><br>EGG T (mediators)<br><br>IgE<br>IgG<br>IgG<br>T cells<\/div>Type 2 hypersensitivity reactions (which includes haemolytic anaemia) are associated with formation of antibody against cell surface antigens."}, {"number": 149, "topic": "Hypersensitivity reactions", "stem_html": "A 23 year old man presents with weight loss fatigue and lymphadenopathy. He is diagnosed with tuberculosis. Which of the following processes most closely matches the underlying pathological process?", "options": [{"label_html": "Type 1 hypersensitivity reaction", "is_correct": false}, {"label_html": "Type 2 hypersensitivity reaction", "is_correct": false}, {"label_html": "Type 3 hypersensitivity reaction", "is_correct": false}, {"label_html": "Type 4 hypersensitivity reaction", "is_correct": true}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 3, "explanation_html": "Granulomas (which occur in tuberculosis) are a feature of Type 4 hypersensitivity reactions."}], "note_html": "The Gell and Coombs classification divides hypersensitivity reactions into 4 types<br><br>\t<div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><\/th><th><b>Type I<\/b><\/th><th>\t <b>Type II<\/b><\/th><th><b>\tType III<\/b><\/th><th><b>Type IV<\/b><\/th><\/tr><\/thead><tbody><tr><td>\t<b>Description<\/b><\/td><td>\t  Anaphylactic<\/td><td>\t \tCytotoxic<\/td><td>\t \tImmune complex<\/td><td>\t \tDelayed type<\/td><\/tr><tr><td><b>Mediator<\/b><\/td><td>\t \tIgE\t<\/td><td>\t IgG, IgM<\/td><td>\t \tIgG, Ig A, IgM<\/td><td>\t \tT-cells<\/td><\/tr><tr><td><b>Antigen<\/b><\/td><td>Exogenous\t<\/td><td>Cell surface\t<\/td><td>Soluble\t<\/td><td>Tissues<\/td><\/tr><tr><td><b>Response time<\/b> \t<\/td><td>Minutes\t<\/td><td>Hours\t<\/td><td>Hours<\/td><td>\t2-3 days<\/td><\/tr><tr><td><b>Examples<\/b><\/td><td>\tAsthma<br>Hay fever<\/td><td>Autoimmune haemolytic anaemia<br>\tPemphigus<br>Goodpasture's<\/td><td>\tSerum sickness<br>SLE<br>Aspergillosis<\/td><td>Graft versus host disease<br>Contact dermatitis<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Iliopsoas abscess", "questions": [{"number": 150, "topic": "Iliopsoas abscess", "stem_html": "A 35 year old type 1 diabetic presents with difficulty mobilising and back pain radiating to the thigh.  He has a temperature of 39 <sup>o<\/sup>C and has pain on extension of the hip.  He is diagnosed with an iliopsoas abscess.  Which of the following statements is false in relation to his diagnosis?", "options": [{"label_html": "<i><i>Staphylococcus<\/i> aureus<\/i> is the most likely primary cause", "is_correct": false}, {"label_html": "Recurrence occurs in 60% cases", "is_correct": true}, {"label_html": "More common in males", "is_correct": false}, {"label_html": "Crohn's is the most likely secondary cause in patients within the UK", "is_correct": false}, {"label_html": "CT guided drainage is preferable first line management", "is_correct": false}], "correct_index": 1, "explanation_html": "Classical features include: a limp, back pain and fever. Recurrence rates are about 15-20%. In the UK,  <i>Staphylococcus<\/i> is the commonest primary cause, others include <i>Streptococcus<\/i> and E.coli.  Management is ideally by CT guided drainage."}], "note_html": "- Collection of pus in iliopsoas compartment (iliopsoas and iliacus)<br><ul><li>Causes:<\/li><\/ul><br><b>Primary<\/b><br><br><ul><li>Haematogenous spread of bacteria<\/li><li><i><i>Staphylococcus<\/i> aureus<\/i>: most common<\/li><\/ul><br><b>Secondary<\/b> <br><br><ul><li>Crohn's (commonest cause in this category)<\/li><li>Diverticulitis, Colorectal cancer<\/li><li>UTI, GU cancers<\/li><li>Vertebral osteomyelitis<\/li><li>Femoral catheter, lithotripsy<\/li><li>Endocarditis<\/li><\/ul><br>Note the mortality rate can be up to 19-20% in secondary iliopsoas abscesses compared with 2.4% in primary abscesses.<br><br><b>Clinical features<\/b><br><br><ul><li>Fever<\/li><li>Back/flank pain<\/li><li>Limp<\/li><li>Weight loss<\/li><\/ul><br><b>Clinical examination<\/b><br><br><ul><li>Patient in the supine position with the knee flexed and the hip mildly externally rotated<\/li><\/ul><br><ul><li>Specific tests to diagnose iliopsoas inflammation:<\/li><\/ul><br>Place hand proximal to the patient's ipsilateral knee and ask patient to lift thigh against your hand. This will cause pain due to contraction of the psoas muscle.<br><br>Lie the patient on the normal side and hyperextend the affected hip.  In inflammation this should elicit pain as the psoas muscle is stretched.<br><br><b>Investigation<\/b><br><br><ul><li>CT is gold standard<\/li><\/ul><br><b>Management<\/b><br><br><ul><li>Antibiotics<\/li><li>Percutaneous drainage<\/li><li>Surgery is indicated if:<\/li><\/ul><br>1. Failure of percutaneous drainage<br>2. Presence of an another intra-abdominal pathology which requires surgery<br><br><b>Surgical approach<\/b><br>The authors technique for draining these collections is given here.<br>Review the CT scans and plan surgical approach. An extraperitoneal approach is important.<br>The collection usually extends inferiorly and can be accessed from an incision at a level of L4 on the affected side.<br><br>GA<br>Transverse laterally placed incision.<br>Incise external oblique.<br>Split the subsequent muscle layers.<br>As you approach the peritoneum use blunt dissection to pass laterally around it.<br>Remember the ureter and gonadal veins lie posterior at this level.<br>Eventually you will enter the abscess cavity, a large amount of pus is usually released at this point. Drain the area with suction and washout with saline.<br>Place a corrugated drain well into the abscess cavity. <br>If you have made a small skin incision it is reasonable to bring the drain up through the skin wound. Otherwise place a lateral exit site and close the skin and external oblique. If you do this ensure that you use interrupted sutures.<br><br>Anchor the drain with strong securely tied silk sutures (it is extremely tiresome if it falls out!)<br><br><b>Reference<\/b><br><br>Iliopsoas abscesses <br>I H Mallick, M H Thoufeeq, T P Rajendran <br>Postgrad Med J 2004;80:459-462"}, {"name": "Intraventricular haemorrhage", "questions": [{"number": 151, "topic": "Intraventricular haemorrhage", "stem_html": "A male infant is born prematurely at 34 weeks gestation by emergency cesarean section. He initially appears to be stable. However, over the ensuing 24 hours he develops worsening neurological function. Which of the following processes is most likely to have occurred?", "options": [{"label_html": "Extra dural haemorrhage", "is_correct": false}, {"label_html": "Sub dural haemorrhage", "is_correct": false}, {"label_html": "Sub arachnoid haemorrhage", "is_correct": false}, {"label_html": "Intraventricular haemorrhage", "is_correct": true}, {"label_html": "Arteriovenous malformation", "is_correct": false}], "correct_index": 3, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Premature neonates= Intra ventricular haemorrhage<br>Non accidental injury= Sub dural bleed<\/div>"}], "note_html": "Intraventricular haemorrhage is a haemorrhage that occurs into the ventricular system of the brain. It is relatively rare in adult surgical practice and when it does occur, it is typically associated with severe head injuries. In premature neonates it may occur spontaneously. The blood may clot and occlude CSF flow, hydrocephalus may result. <br>In neonatal practice the vast majority of IVH occur in the first 72 hours after birth, the aetiology is not well understood and it is suggested to occur as a result of birth trauma combined with cellular hypoxia, together the with the delicate neonatal CNS. <br><br><b>Treatment<\/b><br>Is largely supportive, therapies such as intraventricular thrombolysis and prophylactic CSF drainage have been trialled and not demonstrated to show benefit. Hydrocephalus and rising ICP is an indication for shunting."}, {"name": "Koebner phenomenon", "questions": [{"number": 152, "topic": "Koebner phenomenon", "stem_html": "Which of the following conditions is least likely to exhibit the Koebner phenomenon?", "options": [{"label_html": "Vitiligo", "is_correct": false}, {"label_html": "Molluscum contagiosum", "is_correct": false}, {"label_html": "Lichen planus", "is_correct": false}, {"label_html": "Psoriasis", "is_correct": false}, {"label_html": "Lupus vulgaris", "is_correct": true}], "correct_index": 4, "explanation_html": "Lupus vulgaris is not associated with the Koebner phenomenon."}], "note_html": "The Koebner phenomenon describes skin lesions which appear at the site of injury. It is seen in:<br><ul><li>Psoriasis<\/li><li>Vitiligo<\/li><li>Warts<\/li><li>Lichen planus<\/li><li>Lichen sclerosus<\/li><li>Molluscum contagiosum<\/li><\/ul>"}, {"name": "Lead poisoning", "questions": [{"number": 153, "topic": "Lead poisoning", "stem_html": "A 52 year old woman attends clinic for investigation of abdominal pain and constipation.  On examination, you note blue lines on the gum margin.  She mentions that her legs have become weak in the past few days.  What is the most likely diagnosis?", "options": [{"label_html": "Acute intermittent porphyria", "is_correct": false}, {"label_html": "Lead poisoning", "is_correct": true}, {"label_html": "Constipation", "is_correct": false}, {"label_html": "Guillan Barre syndrome", "is_correct": false}, {"label_html": "Rectal carcinoma", "is_correct": false}], "correct_index": 1, "explanation_html": "This would be an impressive diagnosis to make in the surgical out patient department!  The combination of abdominal pain and a motor periperal neuropathy, should indicate this diagnosis.  The blue line along the gum margin can occur in up to 20% patients with lead poisoning."}], "note_html": "Along with acute intermittent porphyria, lead poisoning should be considered in questions giving a combination of abdominal pain and neurological signs<br><br>Features<br><ul><li>abdominal pain<\/li><li>peripheral neuropathy (mainly motor)<\/li><li>fatigue<\/li><li>constipation<\/li><li>blue lines on gum margin (only 20% of adult patients, very rare in children)<\/li><\/ul><br>Investigations<br><ul><li>The blood lead level is usually used for diagnosis. Levels greater than 10 mcg/dl are considered significant<\/li><li>Full blood count: microcytic anaemia. Blood film shows red cell abnormalities including basophilic stippling and clover-leaf morphology<\/li><li>Raised serum and urine levels of delta aminolaevulinic acid may be seen making it sometimes difficult to differentiate from acute intermittent porphyria<\/li><li>Urinary coproporphyrin is also increased (urinary porphobilinogen and uroporphyrin levels are normal to slightly increased)<\/li><\/ul><br>Management - various chelating agents are currently used:<br><ul><li>Dimercaptosuccinic acid (DMSA)<\/li><li>D-penicillamine<\/li><li>EDTA<\/li><li>Dimercaprol<\/li><\/ul>"}, {"name": "Leriche syndrome", "questions": [{"number": 154, "topic": "Leriche syndrome", "stem_html": "A 52 year old male is referred to urology clinic with impotence.  He is known to have hypertension.  He does not have any morning erections.  On further questioning the patient reports pain in his buttocks, this worsens on mobilising.  On examination there is some muscle atrophy.  The penis and scrotum are normal.  What is the most likely diagnosis?", "options": [{"label_html": "Leriche syndrome", "is_correct": true}, {"label_html": "S3-S4 cord lesion", "is_correct": false}, {"label_html": "Pudendal nerve lesion", "is_correct": false}, {"label_html": "Psychological impotence", "is_correct": false}, {"label_html": "Beta blocker induced impotence", "is_correct": false}], "correct_index": 0, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\"><b>Leriche syndrome<\/b><br><br>Classically, it is described in male patients as a triad of symptoms: <br><br>1. Claudication of the buttocks and thighs <br>2. Atrophy of the musculature of the legs <br>3. Impotence (due to paralysis of the L1 nerve)<\/div>Leriche syndrome, is atherosclerotic occlusive disease involving the abdominal aorta and/or both of the iliac arteries. Management involves correcting underlying risk factors such as hypercholesterolaemia and stopping smoking. Investigation is usually with angiography."}], "note_html": "Atheromatous disease involving the iliac vessels. Blood flow to the pelvic viscera is compromised. Patients may present with buttock claudication and impotence (in this particular syndrome). Diagnostic work up will include angiography, where feasible, iliac occlusions are usually treated with endovascular angioplasty and stent insertion."}, {"name": "Lipomata", "questions": [{"number": 155, "topic": "Lipomata", "stem_html": "A 55 year old man presents with a soft, fluctuant lesion overlying his right scapula. The surgeon suspects the lesion may be a lipoma. Which of the following, if present, may be indicative of an alternative diagnosis?", "options": [{"label_html": "Located in superficial tissues", "is_correct": false}, {"label_html": "Size greater than 5cm", "is_correct": true}, {"label_html": "Presence of multiple similar lesions at other anatomical sites", "is_correct": false}, {"label_html": "Increased mobility of the lesion", "is_correct": false}, {"label_html": "Lobulated appearance during surgical excision", "is_correct": false}], "correct_index": 1, "explanation_html": "Lipomas are typically small and mobile lesions. They may be multiple. Lesions &gt;5cm may be indicative of a soft tissue sarcoma and additional diagnostic tests may be required prior to excision."}], "note_html": "<ul><li>Benign tumour of adipocytes<\/li><li>Occur in middle aged adults<\/li><li>Smooth, mobile, painless<\/li><li>Subtypes: Angiolipoma, Angiolipoleiomyoma<\/li><li>Malignant transformation is rare<\/li><\/ul><br><b>Features suggestive of sarcomatous change<\/b><br><div class=\"table-responsive\"><table class=\"tb\"><tbody><tr><td>Size &gt;5cm<br>Increasing size<br>Pain<br>Deep anatomical location<\/td><\/tr><\/tbody><\/table><\/div>In one series the presence of all 4 features was associated with up to 85% being sarcomatous (1).<br><br><i>Lipoma removed surgically. Benign lesions are often small and well encapsulated. Deep seated or lesions larger than 5cm are at increased risk of being associated with sarcomatous change<\/i><br><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb064b.jpg\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb064.jpg\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Lipoma\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb064b.jpg\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center><br><b>References<\/b><br>Johnson C, Pysent P and Grimer R. Clinical features of soft tissue sarcomas. Ann R Coll Surg Engl. 2001 May; 83(3): 203205."}, {"name": "Liver tumours", "questions": [{"number": 156, "topic": "Liver tumours", "stem_html": "A 56 year old man with long standing ulcerative colitis and a DALM lesion in the rectum is admitted with jaundice. On CT scanning the liver has 3 nodules in the right lobe and 1 nodule in the left lobe. Carcinoembryonic antigen levels are elevated. What is the most likely diagnosis?", "options": [{"label_html": "Yolk sac tumour", "is_correct": false}, {"label_html": "Hepatocellular carcinoma", "is_correct": false}, {"label_html": "Metastatic lesion", "is_correct": true}, {"label_html": "Cholangiocarcinoma", "is_correct": false}, {"label_html": "Rhabdomyosarcoma", "is_correct": false}], "correct_index": 2, "explanation_html": "This is likely to be due to metastatic lesions from a colonic primary. DALM lesions should be excised by oncological colectomy for this reason. This burden of metastatic disease is unlikely to precipitate jaundice directly and nodal disease at the porta hepatis is the most likely cause in this case."}, {"number": 157, "topic": "Liver tumours", "stem_html": "A 48 year old lady with chronic hepatitis B infection is noted to have worsening liver function tests and progressive jaundice. Her alpha feto protein levels are grossly elevated. What is the most likely diagnosis?", "options": [{"label_html": "Hepatocellular carcinoma", "is_correct": true}, {"label_html": "Metastatic cancer", "is_correct": false}, {"label_html": "Cholangiocarcinoma", "is_correct": false}, {"label_html": "Yolk sac tumour", "is_correct": false}, {"label_html": "Liver cell adenoma", "is_correct": false}], "correct_index": 0, "explanation_html": "<p>No explanation provided.<\/p>"}, {"number": 158, "topic": "Liver tumours", "stem_html": "A patient is diagnosed with a Klatskin tumour which of the structures listed below is affected by this disease process?", "options": [{"label_html": "Kidney", "is_correct": false}, {"label_html": "Stomach", "is_correct": false}, {"label_html": "Colon", "is_correct": false}, {"label_html": "Bile duct", "is_correct": true}, {"label_html": "Spleen", "is_correct": false}], "correct_index": 3, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">A Klatskin tumor (or hilar cholangiocarcinoma) is a cholangiocarcinoma (cancer of the biliary tree) occurring at the confluence of the right and left hepatic bile ducts.<\/div>"}, {"number": 159, "topic": "Liver tumours", "stem_html": "Which of these tumour markers is most helpful in identifying an individual with hepatocellular carcinoma?", "options": [{"label_html": "Serum AFP", "is_correct": true}, {"label_html": "Serum CA19-9", "is_correct": false}, {"label_html": "CEA", "is_correct": false}, {"label_html": "Beta HCG", "is_correct": false}, {"label_html": "CA125", "is_correct": false}], "correct_index": 0, "explanation_html": "Hepatocellular carcinoma is commonly diagnosed with imaging and an elevated alpha fetoprotein. Biopsy may seed the tumour and should be avoided. Up to 80% of hepatocellular carcinoma arise in cirrhotic livers."}], "note_html": "<b>Primary liver tumours<\/b><br>The most common primary tumours are cholangiocarcinoma and hepatocellular carcinoma. Overall metastatic disease accounts for 95% of all liver malignancies making the primary liver tumours comparatively rare. <br><br>Primary liver tumours include:<br><ul><li>Cholangiocarcinoma<\/li><li>Hepatocellular carcinoma<\/li><li>Hepatoblastoma<\/li><li>Sarcomas (Rare)<\/li><li>Lymphomas <\/li><li>Carcinoids (most often secondary although primary may occur)<\/li><\/ul> <br><b>Hepatocellular carcinoma<\/b><br>These account for the bulk of primary liver tumours (75% cases). Its worldwide incidence reflects its propensity to occur on a background of chronic inflammatory activity. Most cases arise in cirrhotic livers or those with chronic hepatitis B infection, especially where viral replication is actively occurring. In the UK it accounts for less than 5% of all cancers, although in parts of Asia its incidence is 100 per 100,000.<br>The majority of patients (80%) present with existing liver cirrhosis, with a mass discovered on screening ultrasound. <br><br><b>Diagnosis<\/b><br><ul><li>CT/ MRI (usually both) are the imaging modalities of choice<\/li><li>a-fetoprotein is elevated in almost all cases<\/li><li>Biopsy should be avoided as it seeds tumours cells through a resection plane. <\/li><li>In cases of diagnostic doubt serial CT and αFP measurements are the preferred strategy. <\/li><\/ul><br><b>Treatment<\/b><br><ul><li>Patients should be staged with liver MRI and chest, abdomen and pelvic CT scan.<\/li><li>The testis should be examined in males (testicular tumours may cause raised AFP). PET CT may be used to identify occult nodal disease.<\/li><li>Surgical resection is the mainstay of treatment in operable cases. In patients with a small primary tumour in a cirrhotic liver whose primary disease process is controlled, consideration may be given to primary whole liver resection and transplantation.<\/li><li>Liver resections are an option but since most cases occur in an already diseased liver the operative risks and post-operative hepatic dysfunction are far greater than is seen following metastectomy. <\/li><li>These tumours are not particularly chemo or radiosensitive however, both may be used in a palliative setting. Tumour ablation is a more popular strategy. <\/li><\/ul><br><b>Survival<\/b><br>Poor, overall survival is 15% at 5 years.<br><br><b>Cholangiocarcinoma<\/b><br>This is the second most common type of primary liver malignancy. As its name suggests these tumours arise in the bile ducts. Up to 80% of tumours arise in the extra hepatic biliary tree. Most patients present with jaundice and by this stage the majority will have disease that is not resectable. <br>Primary sclerosing cholangitis is the main risk factor. In deprived countries typhoid and liver flukes are also major risk factors.<br><br><b>Diagnosis<\/b><br><ul><li>Patients will typically have an obstructive picture on liver function tests.<\/li><li>CA 19-9, CEA and CA 125 are often elevated<\/li><li>CT/ MRI and MRCP are the imaging methods of choice.<\/li><\/ul><br><b>Treatment<\/b><br><ul><li>Surgical resection offers the best chance of cure. Local invasion of peri hilar tumours is a particular problem and this coupled with lobar atrophy will often contra indicate surgical resection. <\/li><li>Palliation of jaundice is important, although metallic stents should be avoided in those considered for resection. <\/li><\/ul><br><b>Survival<\/b><br>Is poor, approximately 5-10% 5 year survival."}, {"name": "Lobular carcinoma of the breast", "questions": [{"number": 160, "topic": "Lobular carcinoma of the breast", "stem_html": "A 55 year old lady presents with discomfort in the right breast. On clinical examination a small lesion is identified and clinical appearances suggest fibroadenoma. Imaging confirms the presence of a fibroadenoma alone. A core biopsy is taken, this confirms the presence of the fibroadenoma. However, the pathologist notices that a small area of lobular carcinoma in situ is also present in the biopsy. What is the most appropriate course of action?", "options": [{"label_html": "Whole breast irradiation", "is_correct": false}, {"label_html": "Simple mastectomy", "is_correct": false}, {"label_html": "Mastectomy and sentinal lymph node biopsy", "is_correct": false}, {"label_html": "Wide local excision and sentinel lymph node biopsy", "is_correct": false}, {"label_html": "Breast MRI scan", "is_correct": true}], "correct_index": 4, "explanation_html": "Lobular carcinoma in situ has a low association with invasive malignancy. It is seldom associated with microcalcification and therefore MRI is the best tool for determining disease extent. Resection of in situ disease is not generally recommended and most surgeons would simply pursue a policy of close clinical and radiological follow up."}, {"number": 161, "topic": "Lobular carcinoma of the breast", "stem_html": "Which of the following breast tumours is most commonly associated with a risk of metastasis to the contralateral breast?", "options": [{"label_html": "Invasive ductal carcinoma", "is_correct": false}, {"label_html": "Invasive lobular carcinoma", "is_correct": true}, {"label_html": "Phyllodes tumour", "is_correct": false}, {"label_html": "Pagets disease of the breast", "is_correct": false}, {"label_html": "Atypical ductal hyperplasia", "is_correct": false}], "correct_index": 1, "explanation_html": "Risk of metastasis to the contralateral breast is a classical feature of invasive lobular carcinoma."}], "note_html": "Lobular breast cancers are less common than their ductal counterparts. They typically present differently, the mass is usually more diffuse and less obvious on the usual imaging modalities of ultrasound and mammography. This is significant since the disease may be understaged resulting in inadequate treatment when wide local excision is undertaken. <br>In women with invasive lobular carcinoma it is usually safest to perform an MRI scan of the breast, if breast conserving surgery is planned. <br>Lobular carcinomas are also more likely to be multifocal and metastasise to the contralateral breast. <br>Lobular carcinoma in situ is occasionally diagnosed incidentally on core biopsies. Unlike DCIS, lobular carcinoma in situ is far less strongly associated with foci of invasion and is usually managed by close monitoring. <br><br><b>Lobular carcinoma stained using haematoxylin and eosin<\/b><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb217b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb217.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"https://en.wikipedia.org/wiki/Main_Page\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb217b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}, {"name": "Lower GI polyps", "questions": [{"number": 162, "topic": "Lower GI polyps", "stem_html": "A 6 year old girl undergoes a transanal excision of a fleshy polyp 8cm from the anal verge. What type of polyp is most likely to be seen?", "options": [{"label_html": "Hyperplastic polyp", "is_correct": false}, {"label_html": "Sessile serrated lesion", "is_correct": false}, {"label_html": "Adenoma", "is_correct": false}, {"label_html": "Cloacogenic polyp", "is_correct": false}, {"label_html": "Hamartoma", "is_correct": true}], "correct_index": 4, "explanation_html": "The child is most likely to have a juvenile polyp, these are hamartomatous lesions. Cloacogenic inflammatory polyps correspond to a rare subtype of prolapsing mucosal polyps that arise around the anal transitional zone. They can rarely mimic neoplasia. Adenomatous lesions are rarely seen in children."}], "note_html": "Colonic polyps are a common condition and there are a number of different types. The type of polyps found varies according to the age of the patient and the aetiology of the polyp. Isolated, small proximal polyps are often an incidental. Multiple, distal or large polyps may give rise to symptoms such as bleeding, intussceception or systemic disturbance owing to electrolyte derangement. <br><br><b>Polyp types<\/b><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Type<\/b><\/th><th><b>Key features<\/b><\/th><th><b>Management<\/b><\/th><\/tr><\/thead><tbody><tr><td>Juvenile polyp<\/td><td>Often single hamartomatous lesions<br>Rectum commonest site<br>Multiple lesions associated with increased risk of malignancy<\/td><td>Excision (usually per anal or endoscopic)<\/td><\/tr><tr><td>Hyperplastic polyps<\/td><td>Account for 90% of all polyps<br>Usually less than 5mm in diameter<br>Rectosigmoid is commonest location<\/td><td>If multiple polyps (more than 20) increased risk of malignancy<br>Isolated hyperplastic polyps are benign and can be left<\/td><\/tr><tr><td>Peutz-Jeghers syndrome<\/td><td>Hamartomatous polyps<br>Mucocutaneous hyperpigmentation<br>Family history (autosomal dominant)<\/td><td>Polyps benign but may intusscecept<br>Surveillance as increased risk of malignancy<\/td><\/tr><tr><td>Adenoma<\/td><td>Comprise around 10% of all colonic polyps<br>90% less than 1cm in diameter<br>Increased risk of malignancy in those over 1cm in diameter<br>3 types villous, tubulovillous and tubular<br>Serrated adenomas are a combination of adenomatous and hyperplastic features and are also associated with increased risk of malignancy<\/td><td>Full colonoscopic evaluation<br>Colonoscopic polypectomy<br>Follow up depending upon polyp burden and risk factors<\/td><\/tr><tr><td>Inflammatory pseudopolyp<\/td><td>Found in patients with IBD<br>Co-existing inflammation is present<\/td><td>Management directed at underlying cause<\/td><\/tr><\/tbody><\/table><\/div><br><b>Polyposis syndromes<\/b><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid2\"><thead><tr><th><b>Syndrome<\/b><\/th><th><b>Genetic defect<\/b><\/th><th><b>Features<\/b><\/th><th><b>Screening and management<\/b><\/th><th><b>Associated disorders<\/b><\/th><\/tr><\/thead><tbody><tr><td>Familial adenomatous polyposis<\/td><td>Mutation of APC gene (80%) cases, dominant<\/td><td>Typically over 100 colonic adenomas<br>Cancer risk of 100%<br>20% are new mutations<\/td><td>If known to be at risk then predictive genetic testing as teenager<br>Annual flexible sigmoidoscopy from 15 years<br>If no polyps found then 5 yearly colonoscopy started at age 20<br>Polyps found = resectional surgery (resection and pouch Vs sub total colectomy and IRA)<\/td><td>Gastric fundal polyps (50%).<br>Duodenal polyps 90%.<br>If severe duodenal polyposis cancer risk of 30% at 10 years.<br>Abdominal desmoid tumours<\/td><\/tr><tr><td>MYH associated polyposis<\/td><td>Biallelic mutation of mut Y human homologue (MYH) on chromosome 1p, recessive<\/td><td>Multiple colonic polyps<br>Later onset right sided cancers more common than in FAP<br>100% cancer risk by age 60<\/td><td>Once identified resection and ileoanal pouch reconstruction is recommended<br>Attenuated phenotype - regular colonoscopy<\/td><td>Duodenal polyposis in 30%<br>Associated with increased risk of breast cancer (self examination)<\/td><\/tr><tr><td>Peutz -Jeghers syndrome<\/td><td>STK11 (LKB1) mutation on chromosome 19 in some (but not all) cases, dominant<\/td><td>Multiple benign intestinal hamartomas<br>Episodic obstruction and intussceception<br>Increased risk of GI cancers (colorectal cancer 20%, gastric 5%)<br>Increased risk of breast, ovarian, cervical pancreatic and testicular cancers<\/td><td>Annual examination<br>Pan intestinal endoscopy every 2-3 years<\/td><td>Malignancies at other sites<br>Classical pigmentation pattern<\/td><\/tr><tr><td>Cowden disease<\/td><td>Mutation of PTEN gene on chromosome 10q22, dominant<\/td><td>Macrocephaly<br>Multiple intestinal hamartomas<br>Multiple trichilemmomas<br>89% risk of cancer at any site<br>16% risk of colorectal cancer<\/td><td>Targeted individualised screening<\/td><td>Breast cancer (81% risk)<br>Thyroid cancer and non toxic goitre<br>Uterine cancer<\/td><\/tr><tr><td>HNPCC (Lynch syndrome)<\/td><td>Germline mutations of DNA mismatch repair genes<\/td><td>Colo rectal cancer 30-70%<br>Endometrial cancer 30-70%<br>Gastric cancer 5-10%<br>Scanty colonic polyps may be present<br>Colonic tumours likely to be right sided and mucinous<\/td><td>Colonoscopy every 1-2 years from age 25<br>Consideration of prophylactic surgery<br>Extra colonic surveillance recommended<\/td><td>Extra colonic cancers<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Lumbar spinal stenosis", "questions": [{"number": 163, "topic": "Lumbar spinal stenosis", "stem_html": "A 63 year old man finds that he has to stop walking after 100 yards due to bilateral calf pain. He finds that bending forwards and walking up hill helps. He is able to ride a bike without any pain. What is the most likely underlying cause?", "options": [{"label_html": "Lumbar canal stenosis", "is_correct": true}, {"label_html": "Diabetic neuropathy", "is_correct": false}, {"label_html": "Aorto-iliac occlusion", "is_correct": false}, {"label_html": "Occlusion of the superficial femoral artery", "is_correct": false}, {"label_html": "Pelvic rheumatoid arthritis", "is_correct": false}], "correct_index": 0, "explanation_html": "The positional nature of the pain and the fact that improves with walking uphill makes an underlying vascular aetiology far less likely."}], "note_html": "Lumbar spinal stenosis is a condition in which the central canal is narrowed by tumour, disk prolapse or other similar degenerative changes. <br>Patients may present with a combination of back pain, neuropathic pain and symptoms mimicking claudication. One of the main features that may help to differentiate it from true claudication in the history is the positional element to the pain. Sitting is better than standing and patients may find it easier to walk uphill rather than downhill. The neurogenic claudication type history makes lumbar spinal stenosis a likely underlying diagnosis, the absence of such symptoms makes it far less likely. <br><br><b>Pathology<\/b><br>Degenerative disease is the commonest underlying cause. Degeneration is believed to begin in the intervertebral disk where biochemical changes such as cell death and loss of proteoglycan and water content lead to progressive disk bulging and collapse. This process leads to an increased stress transfer to the posterior facet joints, which accelerates cartilaginous degeneration, hypertrophy, and osteophyte formation; this is associated with thickening and distortion of the ligamentum flavum. The combination of the ventral disk bulging, osteophyte formation at the dorsal facet, and ligamentum flavum hyptertrophy combine to circumferentially narrow the spinal canal and the space available for the neural elements. The compression of the nerve roots of the cauda equina leads to the characteristic clinical signs and symptoms of lumbar spinal stenosis.<br><br><b>Diagnosis<\/b><br>MRI scanning is the best modality for demonstrating the canal narrowing. Historically a bicycle test was used as true vascular claudicants could not complete the test.<br><br><b>Treatment<\/b><br>Laminectomy"}, {"name": "Lung cancer", "questions": [{"number": 164, "topic": "Lung cancer", "stem_html": "A 70 year old lady who has never smoked is identified as having a peripherally sited mass in her left lung. What is the most likely underlying diagnosis?", "options": [{"label_html": "Small cell lung cancer", "is_correct": false}, {"label_html": "Gastric cancer metastasis", "is_correct": false}, {"label_html": "Adenocarcinoma", "is_correct": true}, {"label_html": "Squamous cell carcinoma", "is_correct": false}, {"label_html": "Lymphoma", "is_correct": false}], "correct_index": 2, "explanation_html": "Adenocarcinomas are the most common tumour type present in never smokers. They are usually located at the periphery."}, {"number": 165, "topic": "Lung cancer", "stem_html": "A 73 year old heavy smoker presents with haemoptysis. On examination, he is cachectic and shows evidence of clubbing. Imaging shows a main bronchial tumour with massive mediastinal lymphadenopathy together with widespread visceral metastases. What is the most likely diagnosis?", "options": [{"label_html": "Metastatic prostate cancer", "is_correct": false}, {"label_html": "Small cell lung cancer", "is_correct": true}, {"label_html": "Lymphoma", "is_correct": false}, {"label_html": "Adenocarcinoma", "is_correct": false}, {"label_html": "Squamous cell carcinoma", "is_correct": false}], "correct_index": 1, "explanation_html": "Small cell carcinoma is often associated with disseminated disease at presentation in the majority of cases. Most cases occur in the main airways and paraneoplastic features are common."}, {"number": 166, "topic": "Lung cancer", "stem_html": "An 85 year old man presents with a cough and haemoptysis. He has a modest smoking history of 15 pack years. He is found to have a tumour located in the right main bronchus, with no evidence of metastatic disease. He decides not  to undergo any treatment and he remains well for a further 12 months before developing symptomatic metastasis. What is the most likely diagnosis?", "options": [{"label_html": "Adenocarcinoma", "is_correct": false}, {"label_html": "Small cell carcinoma", "is_correct": false}, {"label_html": "Squamous cell carcinoma", "is_correct": true}, {"label_html": "Metastatic renal cancer", "is_correct": false}, {"label_html": "Lymphoma", "is_correct": false}], "correct_index": 2, "explanation_html": "Squamous cell carcinomas are reported to be more slow growing and are typically centrally located. Small cell carcinomas are usually centrally located. However, small cell carcinomas would seldom be associated with a survival of a year without treatment."}, {"number": 167, "topic": "Lung cancer", "stem_html": "A lung resection is least likely to be utilized in the management of which of the following?", "options": [{"label_html": "Small cell lung cancer", "is_correct": true}, {"label_html": "Adenocarcinoma of the lung", "is_correct": false}, {"label_html": "Squamous cell carcinoma of the lung", "is_correct": false}, {"label_html": "A solitary lung metastasis from colorectal cancer", "is_correct": false}, {"label_html": "A solitary lung metastasis from a low grade sarcoma", "is_correct": false}], "correct_index": 0, "explanation_html": "Note, the question asked for least likely. That being the case, the correct answer is small cell lung cancer as they are nearly always disseminated at diagnosis."}], "note_html": "Lung cancers may be classified according to histological subtypes. The main distinction is between small cell and non small cell lung cancer. Non small cell lung cancer is the most common variant and accounts for 80% of all lung cancers.<br><br><b>Non small cell lung cancer<\/b><br>These share common features of prognosis and management. They comprise the following tumours: <br><ul><li>Squamous cell carcinoma (25% cases)<\/li><li>Adenocarcinoma (40% cases)<\/li><li>Large cell carcinoma (10% cases)<\/li><\/ul>Paraneoplastic features and early disease dissemination are less likely than with small cell lung carcinoma. Adenocarcinoma is the most common lung cancer type encountered in never smokers. <br><br><b>Small cell lung carcinoma<\/b><br>Small cell lung carcinomas are comprised of cells with a neuro endocrine differentiation. The neuroendocrine hormones may be released from these cells with a wide range of paraneoplastic associations. These tumours are strongly associated with smoking and will typically arise in the larger airways. They disseminate early in the course of the disease and although they are usually chemosensitive this seldom results in long lasting remissions."}, {"name": "Lymphadenopathy", "questions": [{"number": 168, "topic": "Lymphadenopathy", "stem_html": "An 18 year old male presents with lethargy, night sweats and on examination is found to have left supraclavicular lymphadenopathy. A surgical registrar performs a left supraclavicular lymph node biopsy. The pathologist identifies Reed- Sternberg cells on the subsequent histology sections, what is the most likely diagnosis?", "options": [{"label_html": "Metastatic gastric cancer", "is_correct": false}, {"label_html": "Hodgkins lymphoma", "is_correct": true}, {"label_html": "Non Hodgkins lymphoma", "is_correct": false}, {"label_html": "Tuberculosis", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 1, "explanation_html": "Reed-Sternberg cells are characteristic histological cell type found in Hodgkins disease."}], "note_html": "<ul><li>Lymphadenopathy in the neck, axillae, groins and abdomen<\/li><li>Need to note: solitary/multiple, defined/indistinct, hard/rubbery/soft, tender/painless<\/li><\/ul><br><b>Causes of lymphadenopathy<\/b><br><br> Mnemonic: Hodgkins disease<br><br><b>H<\/b> aematological: Hodgkins lymphoma, NHL, Leukaemia<br><b>O<\/b> ncological: metastases<br><b>D<\/b> ermatopathic lymphadenitis<br><b>G<\/b> aucher's disease<br><b>K<\/b> awasaki disease<br><b>I<\/b> nfections: TB, glandular fever, Syphilis<br><b>N<\/b> iemann Pick disease<br><b>S<\/b> erum sickness<br><b>D<\/b> rug reaction (phenytoin)<br><b>I<\/b> mmunological (SLE)<br><b>S<\/b> arcoidosis<br><b>E<\/b> ndocrinological (Hyperthyroidism)<br><b>A<\/b> ngioimmunoplastic lymphadenopathy<br><b>S<\/b> LE<br><b>E<\/b> osinophilic granulomatosis"}, {"name": "Malignant melanoma", "questions": [{"number": 169, "topic": "Malignant melanoma", "stem_html": "A 28 year old lady presents with a pigmented lesion on her calf. Excisional biopsy confirms a diagnosis of melanoma measuring 1cm in diameter with a Breslow thickness of 0.1mm. The lesion is less than 1 mm at all resection margins. Which of the following surgical resection margins is acceptable for this lesion?", "options": [{"label_html": "5 cm", "is_correct": false}, {"label_html": "1 cm", "is_correct": true}, {"label_html": "0.5 cm", "is_correct": false}, {"label_html": "2 cm", "is_correct": false}, {"label_html": "3 cm", "is_correct": false}], "correct_index": 1, "explanation_html": "<p>No explanation provided.<\/p>"}, {"number": 170, "topic": "Malignant melanoma", "stem_html": "A 32 year old lady presents with a 1.5cm pigmented lesion on her back. The surgeon is concerned that this may be a melanoma. What is the most appropriate course of action?", "options": [{"label_html": "2mm punch biopsy from the centre of the lesion", "is_correct": false}, {"label_html": "4mm punch biopsy from the centre of the lesion", "is_correct": false}, {"label_html": "Wide excision of the lesion with 3cm margins", "is_correct": false}, {"label_html": "Excisional biopsy of the lesion", "is_correct": true}, {"label_html": "Wide excision of the lesion with 1cm margins", "is_correct": false}], "correct_index": 3, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Suspicious naevi should NOT be partially sampled as histological interpretation is severely compromised. Complete excision is mandatory where lesions fulfil diagnostic criteria. However, wide excision for margins may be deferred until definitive histology is available.<\/div>Lesions that are suspicious for melanoma should be excised with complete margins. Radical excision is not routinely undertaken for diagnostic purposes and therefore if subsequent histopathological assessment determines that the lesion is a melanoma a re-exicision of margins may be required. Incisional punch biopsies of potential melanomas makes histological interpretation difficult and is best avoided."}, {"number": 171, "topic": "Malignant melanoma", "stem_html": "A 28 year old lady has a malignant melanoma removed from her calf. Which of the following pathological criteria carries the greatest prognostic weighting?", "options": [{"label_html": "Vascular invasion", "is_correct": false}, {"label_html": "Abnormal mitoses", "is_correct": false}, {"label_html": "Breslow thickness", "is_correct": true}, {"label_html": "Perineural invasion", "is_correct": false}, {"label_html": "Lymphocytic infiltrates", "is_correct": false}], "correct_index": 2, "explanation_html": "The Breslow thickness has considerable prognostic importance. Lymphocytic infiltrates may be associated with an improved prognosis, but do not carry nearly the same weight as increased thickness."}], "note_html": "<div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>The main diagnostic features (major criteria):<\/b><br><ul><li>Change in size<\/li><li>Change in shape<\/li><li>Change in colour<\/li><\/ul><\/td><td><b>Secondary features (minor criteria)<\/b><br><ul><li>Diameter &gt;6mm<\/li><li>Inflammation<\/li><li>Oozing or bleeding<\/li><li>Altered sensation<\/li><\/ul><\/td><\/tr><\/tbody><\/table><\/div><br><b>Treatment<\/b><br><ul><li>Suspicious lesions should undergo excision biopsy. The lesion should be removed in completely as incision biopsy can make subsequent histopathological assessment difficult.<\/li><li>Once the diagnosis is confirmed the pathology report should be reviewed to determine whether further re-excision of margins is required (see below):<\/li><\/ul><br><b>Margins of excision-Related to Breslow thickness<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Lesions 0-1mm thick<\/b><\/td><td>1cm<\/td><\/tr><tr><td><b>Lesions 1-2mm thick<\/b><\/td><td>1- 2cm (Depending upon site and pathological features)<\/td><\/tr><tr><td><b>Lesions 2-4mm thick<\/b><\/td><td>2-3 cm (Depending upon site and pathological features)<\/td><\/tr><tr><td><b>Lesions &gt;4 mm thick<\/b><\/td><td>3cm<\/td><\/tr><\/tbody><\/table><\/div>Marsden J <i> et al<\/i> Revised UK guidelines for management of Melanoma. <i> Br J Dermatol<\/i> 2010 <b>163<\/b>:238-256.<br><br>Further treatments such as sentinel lymph node mapping, isolated limb perfusion and block dissection of regional lymph node groups should be selectively applied.<br><br><b>Guidelines<\/b><br>The UK NICE guidance is covered by Melanoma: assessment and management NICE guideline [NG14]. However, the complex oncological regimens are not extensively covered in this guidance though more formal guidance is provided by relevant oncological organisations."}, {"name": "Marfan's syndrome", "questions": [{"number": 172, "topic": "Marfan's syndrome", "stem_html": "A 34-year-old man is taken immediately to theatre with aortic dissection.  You note he is tall with pectus excavatum and arachnodactyly. His condition is primarily due to a defect in which one of the following proteins?", "options": [{"label_html": "Polycystin-1", "is_correct": false}, {"label_html": "Fibrillin", "is_correct": true}, {"label_html": "Type IV collagen", "is_correct": false}, {"label_html": "Type I collagen", "is_correct": false}, {"label_html": "Elastin", "is_correct": false}], "correct_index": 1, "explanation_html": "Although fibrillin is the primary protein affected (due to a defect in the fibrillin-1 gene) it should be noted that fibrillin is used as a substrate of elastin."}], "note_html": "Marfan's syndrome is an autosomal dominant connective tissue disorder. It is caused by a defect in the fibrillin-1 gene on chromosome 15 and affects around 1 in 3,000 people.<br><br>Features<br><ul><li>tall stature with arm span to height ratio &gt; 1.05<\/li><li>high-arched palate<\/li><li>arachnodactyly<\/li><li>pectus excavatum<\/li><li>pes planus<\/li><li>scoliosis of &gt; 20 degrees <\/li><li>heart: dilation of the aortic sinuses (seen in 90%) which may lead to aortic aneurysm, aortic dissection, aortic regurgitation, mitral valve prolapse (75%), <\/li><li>lungs: repeated pneumothoraces<\/li><li>eyes: upwards lens dislocation (superotemporal ectopia lentis), blue sclera, myopia<\/li><li>dural ectasia (ballooning of the dural sac at the lumbosacral level)<\/li><\/ul><br>The life expectancy of patients used to be around 40-50 years. With the advent of regular echocardiography monitoring and beta-blocker/ACE-inhibitor therapy this has improved significantly over recent years. Aortic dissection and other cardiovascular problems remain the leading cause of death however."}, {"name": "Merkel cell tumours of the skin", "questions": [{"number": 173, "topic": "Merkel cell tumours of the skin", "stem_html": "A 69 year old man presents with a purple lesion on his forearm. It is excised and a 3 cm Merkel cell tumour is diagnosed. Which of the following statements relating to this diagnosis is false?", "options": [{"label_html": "He should undergo a sentinel lymph node biopsy.", "is_correct": false}, {"label_html": "Lymphovascular invasion is typically seen histologically", "is_correct": false}, {"label_html": "They are more common in immunosupressed patients", "is_correct": false}, {"label_html": "Histologically they may resemble pyogenic granuloma", "is_correct": true}, {"label_html": "They are associated with visceral metastasis", "is_correct": false}], "correct_index": 3, "explanation_html": "Merkel cell tumours are rare cutaneous tumours. Histologically they consist of sheets and nodules of hyperchromatic epithelial cells, with high rates of mitosis and apoptosis. As such they are relatively easy to distinguish from pyogenic granuloma which has no features of malignancy and would not show lymphovascular invasion."}], "note_html": "<ul><li>Rare but aggressive tumour.<\/li><li>Develops from intra epidermal Merkel cells.<\/li><li>Usually presents on elderly, sun damaged skin. The periorbital area is the commonest site.<\/li><li>Histologically these tumours appear within the dermis and subcutis. The lesions consist of sheets and nodules of small hyperchromatic epithelial cells with high rates of mitosis and apoptosis. Lymphovascular invasion is commonly seen. <\/li><li>Pre-existing infection with Merkel Cell Polyomavirus is seen in 80% cases.<\/li><\/ul><br><b>Treatment<\/b><br>Surgical excision is first line. Margins of 1cm are required. Lesions &gt;10mm in diameter should undergo sentinel lymph node biopsy. Adjuvant radiotherapy is often given to reduce the risk of local recurrence.<br><br><b>Prognosis<\/b><br><ul><li>With lymph node metastasis 5 year survival is 50% or less.<\/li><li>Small lesions without nodal spread are usually associated with a 5 year survival of 80%.<\/li><\/ul><br><i>Skin biopsy demonstrating a Merkel Cell cancer. Note the hyperchromatic epithelial cells and high mitotic rate<\/i><br><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb070b.jpg\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb070.jpg\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Merkel cell cancer\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb070b.jpg\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}, {"name": "Mesenteric vessel disease", "questions": [{"number": 174, "topic": "Mesenteric vessel disease", "stem_html": "A 73 year old lady presents with severe abdominal pain and a laparotomy is performed. At operation there is widespread necrosis of the small bowel and right colon. What is the most likely explanation for this finding?", "options": [{"label_html": "Mesenteric vein thrombosis", "is_correct": false}, {"label_html": "Acute embolism affecting the superior mesenteric artery", "is_correct": true}, {"label_html": "Acute on chronic thrombus of the superior mesenteric artery", "is_correct": false}, {"label_html": "Sub intimal dissection of the superior mesenteric artery", "is_correct": false}, {"label_html": "Proximal migration of abdominal aortic aneurysm", "is_correct": false}], "correct_index": 1, "explanation_html": "Acute embolic events account for up to 50% of cases of mesenteric infarcts. These may occur as a result of long standing atrial fibrillation, ventricular anuerysms and post myocardial infarction."}, {"number": 175, "topic": "Mesenteric vessel disease", "stem_html": "A 41 year old man is admitted with peritonitis secondary to a perforated appendix. He is treated with a laparoscopic appendicectomy but has a stormy post operative course. He is now developing increasing abdominal pain and has been vomiting. A laparotomy is performed and at operation a large amount of small bowel shows evidence of patchy areas of infarction. What is the most likely cause?", "options": [{"label_html": "Mesenteric venous thrombosis", "is_correct": true}, {"label_html": "Superior mesenteric artery embolus", "is_correct": false}, {"label_html": "Acute on chronic mesenteric ischaemia", "is_correct": false}, {"label_html": "Vasculitis", "is_correct": false}, {"label_html": "Median arcuate ligament syndrome", "is_correct": false}], "correct_index": 0, "explanation_html": "Mesenteric vein thrombosis may complicate severe intra abdominal sepsis and when it progresses may impair bowel perfusion. The serosa is quite resistant to ischaemia so in this case the appearances are usually patchy."}, {"number": 176, "topic": "Mesenteric vessel disease", "stem_html": "A 79 year old lady develops sudden onset of abdominal pain and collapses, she has passed a large amount of diarrhoea. In casualty her pH is 7.35 and WCC is 18. What is the most likely cause?", "options": [{"label_html": "Mesenteric venous thrombosis", "is_correct": false}, {"label_html": "Acute mesenteric embolus", "is_correct": true}, {"label_html": "Acute on chronic mesenteric ischaemia", "is_correct": false}, {"label_html": "Vasculitis", "is_correct": false}, {"label_html": "Myocardial infarct", "is_correct": false}], "correct_index": 1, "explanation_html": "Although mesenteric infarct may raise the lactate the pH may be raised often secondary to vomiting."}, {"number": 177, "topic": "Mesenteric vessel disease", "stem_html": "A 24 year old lady presents with a history of severe epigastric pain that is worse post prandially. On examination, the abdomen is soft and non tender with no palpable masses, there is a bruit in the epigastrium. Imaging with USS shows no gallstones and an OGD is normal. What is the most likely diagnosis?", "options": [{"label_html": "Sphincter of oddi dysfunction", "is_correct": false}, {"label_html": "Irritable bowel syndrome", "is_correct": false}, {"label_html": "Median arcuate ligament syndrome", "is_correct": true}, {"label_html": "Mesenteric vein thrombosis", "is_correct": false}, {"label_html": "GORD", "is_correct": false}], "correct_index": 2, "explanation_html": "Median arcuate ligament syndrome is largely a diagnosis of exclusion. The classic signs of epigastric pain with an audible bruit are only found in a minority. Where the condition is suspected, the diagnosis is usually apparent on duplex scanning (in thin patients) or with CT angiography."}, {"number": 178, "topic": "Mesenteric vessel disease", "stem_html": "A 73 year old woman collapses with sudden onset of abdominal pain and she passes a large amount of diarrhoea. On admission, she is vomiting repeatedly. She has recently been discharged from hospital following a myocardial infarct but recovered well. What is the most likely cause?", "options": [{"label_html": "Acute superior mesenteric artery embolus", "is_correct": true}, {"label_html": "Acute inferior mesenteric artery embolus", "is_correct": false}, {"label_html": "Pancreatitis", "is_correct": false}, {"label_html": "Infection with clostridium difficile", "is_correct": false}, {"label_html": "Myocarditis", "is_correct": false}], "correct_index": 0, "explanation_html": "Sudden onset of abdominal pain and forceful bowel evacuation are features of acute mesenteric infarct. The SMA is more likely to be involved than the IMA and that makes this the most likely diagnosis. Severe vomiting is not commonly seen with clostridium difficile infection."}, {"number": 179, "topic": "Mesenteric vessel disease", "stem_html": "A 66 year old man has been suffering from weight loss and develops severe abdominal pain. He is admitted to hospital and undergoes a laparotomy. At operation, the entire small bowel is infarcted and only the left colon is viable. What is the most likely explanation?", "options": [{"label_html": "Mesenteric venous thrombosis", "is_correct": false}, {"label_html": "Acute on chronic mesenteric ischaemia", "is_correct": true}, {"label_html": "Acute embolus to the inferior mesenteric artery", "is_correct": false}, {"label_html": "Acute embolus affecting the coeliac axis", "is_correct": false}, {"label_html": "Arcuate ligament compression syndrome", "is_correct": false}], "correct_index": 1, "explanation_html": "This man is likely to have underlying chronic mesenteric vascular disease. Only 15% of emboli will occlude SMA orifice leading to entire small bowel infarct. The background history of weight loss also favors an acute on chronic event."}], "note_html": "Mesenteric ischaemia accounts for 1 in 1000 acute surgical admissions. It is primarily caused by arterial embolism resulting in infarction of the colon. It is more likely to occur in areas such as the splenic flexure that are located at the borders of the territory supplied by the superior and inferior mesenteric arteries. <br><br><b>Types<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Acute mesenteric embolus (commonest 50%)<\/b><\/td><td><ul><li>Sudden onset abdominal pain followed by profuse diarrhoea.<\/li><li>May be associated with vomiting.<\/li><li>Rapid clinical deterioration.<\/li><li>Serological tests: WCC, lactate, amylase may all be abnormal particularly in established disease.  These can be normal in the early phases.<\/li><\/ul><\/td><\/tr><tr><td><b>Acute on chronic mesenteric ischaemia<\/b><\/td><td><ul><li>Usually longer prodromal history.<\/li><li>Post prandial abdominal discomfort and weight loss are dominant features.  Patients will usually present with an acute on chronic event, but otherwise will tend not to present until mesenteric flow is reduced by greater than 80%.<\/li><li>When acute thrombosis occurs presentation may be as above.  In the chronic setting the symptoms will often be those of ischaemic colitis (mucosa is the most sensitive area to this insult).<\/li><\/ul><\/td><\/tr><tr><td><b>Mesenteric vein thrombosis<\/b><\/td><td><ul><li>Usually a history over weeks.<\/li><li>Overt abdominal signs and symptoms will not occur until venous thrombosis has reached a stage to compromise arterial inflow.<\/li><li>Thrombophilia accounts for 60% of cases.<\/li><\/ul><\/td><\/tr><tr><td><b>Low flow mesenteric infarction<\/b><\/td><td><ul><li>This occurs in patients with multiple co morbidities in whom mesenteric perfusion is significantly compromised by overuse of inotropes or background cardiovascular compromise.<\/li><li>The end result is that the bowel is not adequately perfused and infarcts occur from the mucosa outwards.<\/li><\/ul><\/td><\/tr><\/tbody><\/table><\/div><br><b>Diagnosis<\/b><br><ul><li>Serological tests: WCC, lactate, CRP, amylase (can be normal in early disease).<\/li><li>Cornerstone for diagnosis of arterial AND venous mesenteric disease is CT angiography scanning in the arterial phase with thin slices (&lt;5mm).  Venous phase contrast is not helpful.<\/li><li>SMA duplex USS is useful in the evaluation of proximal SMA disease in patients with chronic mesenteric ischaemia.<\/li><li>MRI is of limited use due to gut peristalsis and movement artefact.<\/li><\/ul><br><b>Management<\/b><br><ul><li>Overt signs of peritonism: Laparotomy<\/li><li>Mesenteric vein thrombosis: If no peritonism: Medical management with IV heparin<\/li><li>At operation limited resection of frankly necrotic bowel with view to relook laparotomy at 24-48h. In the interim urgent bowel revascularisation via endovascular (preferred) or surgery.<\/li><\/ul><br><b>Prognosis<\/b><br>Overall poor.  Best outlook is from an acute ischaemia from an embolic event where surgery occurs within 12h.  Survival may be 50%.  This falls to 30% with treatment delay.  The other conditions carry worse survival figures."}, {"name": "Mesothelioma", "questions": [{"number": 180, "topic": "Mesothelioma", "stem_html": "A 72 year old male attends for a preoperative assessment for an inguinal hernia repair.  You notice that the chest x-ray shows a loculated left pleural effusion.  On further questioning the patient reports that he worked as a builder 30 years ago.  What is the most likely cause for the effusion?", "options": [{"label_html": "Asbestosis", "is_correct": false}, {"label_html": "Pneumonia", "is_correct": false}, {"label_html": "Mesothelioma", "is_correct": true}, {"label_html": "Silicosis", "is_correct": false}, {"label_html": "Left ventricular failure", "is_correct": false}], "correct_index": 2, "explanation_html": "This patient has a risk of asbestos exposure through his occupation as a builder.  As there a is latent period of 30 years and a complicated effusion, the most likely cause is mesothelioma."}], "note_html": "Features<br><ul><li>Dyspnoea, weight loss, chest wall pain<\/li><li>Clubbing<\/li><li>30% present as painless pleural effusion<\/li><li>Only 20% have pre-existing asbestosis<\/li><li>History of asbestos exposure in 85-90%, latent period of 30-40 years<\/li><\/ul><br>Basics<br><ul><li>Malignancy of mesothelial cells of pleura<\/li><li>Metastases to contralateral lung and peritoneum<\/li><li>Right lung affected more often than left<\/li><\/ul><br>Management<br><ul><li>Investigation: pleural biopsy, CT Scanning, (PET Scanning if surgery considered)<\/li><li>Symptomatic<\/li><li>Industrial compensation<\/li><li>Chemotherapy, Surgery if operable <\/li><li>Prognosis poor, median survival 12 months<\/li><\/ul>"}, {"name": "Metaplasia", "questions": [{"number": 181, "topic": "Metaplasia", "stem_html": "A 53 year old man presents with dyspepsia.  An upper GI endoscopy is performed and <i>Helicobacter pylori<\/i> is identified. A duodenal ulcer is present in the first part of the duodenum. Duodenal biopsies are taken and demonstrate epithelium that resembles cells of the gastric antrum. Which of the following is the most likely explanation for this process?", "options": [{"label_html": "Hyperplasia of the crypts of Lieberkuhn", "is_correct": false}, {"label_html": "Duodenal metaplasia", "is_correct": true}, {"label_html": "Duodenal dysplasia", "is_correct": false}, {"label_html": "Duodenal carcinoma", "is_correct": false}, {"label_html": "Hyptertrophy of Brunners glands", "is_correct": false}], "correct_index": 1, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Metaplasia = cell type conversion<\/div>The process involved is metaplasia.  During metaplasia there is no direct carcinogenesis, however the persistent presence of precipitants of metaplasia will lead to malignant changes in cells.<br>Metaplastic changes in the duodenal cap are frequently seen in association with H-Pylori induced ulcers. It typically resolves after ulcer healing and eradication therapy."}], "note_html": "<ul><li>Definition: reversible change of differentiated cells to another cell type.<\/li><li>May represent an adaptive substitution of cells that are sensitive to stress by cell types better able to withstand the adverse environment.<\/li><li>Can be a normal physiological response (ossification of cartilage to form bone)<\/li><li>Most common epithelial metaplasia occurs with transformation of columnar cells to squamous cells (smoking causes ciliated columnar cells to be replaced by squamous epithelial cells; Schistosomiasis).<\/li><li>Metaplasia from squamous to columnar cells occurs in Barrett oesophagus.<\/li><li>If the metaplastic stimulus is removed, the cells will return to their original pattern of differentiation.  However, if the stimulus is not removed then progression to dysplasia may occur.<\/li><li>Not considered directly carcinogenic, however the factors which predispose to metaplasia, if persistent may induce malignant transformation.  <\/li><li>The pathogenesis involves a reprogramming of stem cells that are known to exist in normal tissues, or of undifferentiated mesenchymal cells present in connective tissue. In a metaplastic change, these precursor cells differentiate along a new pathway.<\/li><\/ul>"}, {"name": "Metastatic bone disease- risk of fracture", "questions": [{"number": 182, "topic": "Metastatic bone disease- risk of fracture", "stem_html": "Which of the metastatic bone tumours described below is at the greatest risk of pathological fracture ?", "options": [{"label_html": "Proximal humeral lesion from a prostate cancer", "is_correct": false}, {"label_html": "Vertebral body lesions from a prostate cancer", "is_correct": false}, {"label_html": "Peritrochanteric lesion from a carcinoma of the breast", "is_correct": true}, {"label_html": "Proximal humeral lesion from a carcinoma of the breast", "is_correct": false}, {"label_html": "Peritrochanteric lesion from a prostate cancer", "is_correct": false}], "correct_index": 2, "explanation_html": "Peritrochanteric lesions have the greatest risks of fracture (due to loading). The lesions from breast cancer are usually lytic and therefore at higher risk rather than the sclerotic lesions from prostate cancer."}], "note_html": "Metastatic bone tumours may be described as blastic, lytic or mixed. Osteoblastic metastatic disease has the lowest risk of spontaneous fracture when compared to osteolytic lesions of a similar size. <br>Lesions affecting the peritrochanteric region are most prone to spontaneous fracture (because of loading forces at that site). <br>The factors are incorporated into the Mirel Scoring system to stratify the risk of spontaneous fracture for bone metastasis of varying types.<br><br><b>Mirel Scoring system<\/b><br><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Score points<\/b><\/th><th><b>Site<\/b><\/th><th><b>Radiographic appearance<\/b><\/th><th><b>Width of bone involved<\/b><\/th><th><b>Pain<\/b><\/th><\/tr><\/thead><tbody><tr><td>1<\/td><td>Upper extremity<\/td><td>\t Blastic<\/td><td>Less than 1/3<\/td><td>Mild<\/td><\/tr><tr><td>2<\/td><td>Lower extremity<\/td><td>Mixed<\/td><td>\t 1/3 to 2/3<\/td><td>Moderate<\/td><\/tr><tr><td>3<\/td><td>Peritrochanteric\t<\/td><td>Lytic\t<\/td><td>More than 2/3<\/td><td>Aggravated by function<\/td><\/tr><\/tbody><\/table><\/div><br>Depending upon the score the treatment should be as follows:<br><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid2\"><thead><tr><th><b>Score<\/b><\/th><th><b>Risk of fracture<\/b><\/th><th><b>Treatment<\/b><\/th><\/tr><\/thead><tbody><tr><td>9 or greater<\/td><td>Impending (33%)<\/td><td>Prophylactic fixation<\/td><\/tr><tr><td>8<\/td><td>Borderline<\/td><td>Consider fixation<\/td><\/tr><tr><td>7 or less<\/td><td>Not impending (4%)<\/td><td>Non operative management<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Multiple Endocrine Neoplasia", "questions": [{"number": 183, "topic": "Multiple Endocrine Neoplasia", "stem_html": "Which of the following is not included in Multiple Endocrine Neoplasia Type 2b?", "options": [{"label_html": "Phaeochromocytoma", "is_correct": false}, {"label_html": "Visceral ganglioneuromas", "is_correct": false}, {"label_html": "Thyroid medullary carcinoma", "is_correct": false}, {"label_html": "Zollinger Ellison syndrome", "is_correct": true}, {"label_html": "Marfanoid features", "is_correct": false}], "correct_index": 3, "explanation_html": "MEN IIB<br><ul><li>Medullary thyroid cancer<\/li><li>Phaeochromocytoma<\/li><li>Mucosal neuroma<\/li><li>Marfanoid appearance<\/li><\/ul>"}, {"number": 184, "topic": "Multiple Endocrine Neoplasia", "stem_html": "A 22 year old lady presents with an episode of renal colic and following investigation is suspected of suffering from MEN IIa. Which of the following abnormalities of the parathyroid glands are most often found in this condition?", "options": [{"label_html": "Hypertrophy", "is_correct": false}, {"label_html": "Hyperplasia", "is_correct": true}, {"label_html": "Adenoma", "is_correct": false}, {"label_html": "Carcinoma", "is_correct": false}, {"label_html": "Metaplasia", "is_correct": false}], "correct_index": 1, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">MEN IIa<br><ul><li>Medullary thyroid cancer<\/li><li>Hyperparathyroidism (usually hyperplasia)<\/li><li>Phaeochromocytoma<\/li><\/ul><\/div>In MEN IIa the commonest lesion is medullary thyroid cancer, with regards to the parathyroid glands the most common lesion is hyperplasia. In MEN I a parathyroid adenoma is the most common lesion."}, {"number": 185, "topic": "Multiple Endocrine Neoplasia", "stem_html": "In patients with multiple endocrine neoplasia type IIb which of the following clinical appearances is the patient most likely to display?", "options": [{"label_html": "Acromegalic facies", "is_correct": false}, {"label_html": "Turners type features", "is_correct": false}, {"label_html": "Profound kyphoscoliosis", "is_correct": false}, {"label_html": "Multiple bony exostoses", "is_correct": false}, {"label_html": "Marfanoid features", "is_correct": true}], "correct_index": 4, "explanation_html": "Patients with MEN IIb may display Marfanoid features. It is unclear at the present time whether they have discrete changes in the microfibrils of elastic fibres that are present in Marfans."}], "note_html": "Multiple endocrine neoplasia (MEN) is inherited as an autosomal dominant disorder.<br><br>The table below summarises the three main types of MEN:<br><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>MEN type<\/b> I<\/td><td><b>MEN type IIa<\/b><\/td><td><b>MEN type IIb<\/b><\/td><\/tr><tr><td>Mnemonic 'three P's':<br><br> <b>P<\/b>arathyroid (95%): Parathyroid adenoma <br> <b>P<\/b>ituitary (70%):  Prolactinoma/ACTH/Growth Hormone secreting adenoma<br> <b>P<\/b>ancreas (50%): Islet cell tumours/Zollinger Ellison syndrome<br><br> also: Adrenal (adenoma) and thyroid (adenoma)<\/td><td>Phaeochromocytoma<br> Medullary thyroid cancer (70%)<br> Hyperparathyroidism (60%)<\/td><td>Same as MEN IIa with addition of:<br> Marfanoid body habitus<br> Mucosal neuromas<\/td><\/tr><tr><td>MENIN gene (chromosome 11)<br><br>Most common presentation = hypercalcaemia<\/td><td>RET oncogene (chromosome 10)<\/td><td>RET oncogene (chromosome 10)<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Nasopharyngeal carcinoma", "questions": [{"number": 186, "topic": "Nasopharyngeal carcinoma", "stem_html": "A 55 year old man from Hong Kong presents with left sided otalgia and recurrent episodes of epistaxis. On examination, his pharynx appears normal. Examination of his neck reveals left sided cervical lymphadenopathy. What is the most likely underlying diagnosis?", "options": [{"label_html": "Antrochoanal polyp", "is_correct": false}, {"label_html": "Nasopharyngeal carcinoma", "is_correct": true}, {"label_html": "Adenocarcinoma of the tonsil", "is_correct": false}, {"label_html": "Angiofibroma", "is_correct": false}, {"label_html": "Globus syndrome", "is_correct": false}], "correct_index": 1, "explanation_html": "Given this mans ethnic origin and presenting features a nasopharyngeal carcinoma is the most likely underlying diagnosis."}, {"number": 187, "topic": "Nasopharyngeal carcinoma", "stem_html": "A 53 year old man from Hong Kong presents with symptoms of fatigue, weight loss and recurrent epistaxis. Clinical examination reveals left sided cervical lymphadenopathy and oropharyngeal examination reveals an ulcerated mass in the naso pharynx. Which of the following viral agents is most commonly implicated in the development of this condition?", "options": [{"label_html": "Cytomegalovirus", "is_correct": false}, {"label_html": "Epstein Barr virus", "is_correct": true}, {"label_html": "Coxsackie virus", "is_correct": false}, {"label_html": "Herpes simplex virus", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 1, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Trotter's triad (diagnosis of nasopharyngeal carcinoma)<br><ul><li>Unilateral conductive hearing loss<\/li><li>Ipsilateral facial &amp; ear pain<\/li><li>Ipsilateral paralysis of soft palate<\/li><\/ul><\/div>The clinical scenario is most typical for nasopharyngeal carcinoma. An association with previous Epstein Barr Virus is well established. Infection with the other viruses listed is not a recognised risk factor for the development of the condition."}], "note_html": "<ul><li>Squamous cell carcinoma of the nasopharynx<\/li><li>Rare in most parts of the world, apart from individuals from Southern China<\/li><li>Associated with Epstein Barr virus infection<\/li><\/ul><br><b>Presenting features<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Systemic<\/b><\/td><td><b>Local<\/b><\/td><\/tr><tr><td>Cervical lymphadenopathy<\/td><td>Otalgia<\/td><\/tr><tr><td><\/td><td>Unilateral serous otitis media<\/td><\/tr><tr><td><\/td><td>Nasal obstruction, discharge and/ or epistaxis<\/td><\/tr><tr><td><\/td><td>Cranial nerve palsies e.g. III-VI<\/td><\/tr><\/tbody><\/table><\/div><br><b>Imaging<\/b><br>Combined CT and MRI.<br><br><b>Treatment<\/b><br>Radiotherapy is first line therapy."}, {"name": "Nerve injury", "questions": [{"number": 188, "topic": "Nerve injury", "stem_html": "Which of the following is not a typical featu
