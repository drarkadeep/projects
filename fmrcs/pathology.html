cumulation of large amounts of mucinous material in the abdominal cavity<\/li><\/ul><br><b>Treatment<\/b><br>Is usually surgical and consists of cytoreductive surgery (and often peritonectomy c.f Sugarbaker procedure) combined with intra peritoneal chemotherapy with mitomycin C.  <br><br>Survival is related to the quality of primary treatment and in Sugarbakers own centre 5 year survival rates of 75% have been quoted. Patients with disseminated intraperitoneal malignancy from another source fare far worse.<br>In selected patients a second look laparotomy is advocated and some practice this routinely."}, {"name": "Retroperitoneal fibrosis", "questions": [{"number": 239, "topic": "Retroperitoneal fibrosis", "stem_html": "A 62 year old man is admitted with dull lower back pain and abdominal discomfort. On examination, he is hypertensive and a lower abdominal fullness is elicited on examination. An abdominal ultrasound demonstrates hydronephrosis and intravenous urography demonstrated medially displaced ureters. A CT scan shows a periaortic mass. What is the most likely cause?", "options": [{"label_html": "Abdominal liposarcoma", "is_correct": false}, {"label_html": "Metastatic pancreatic cancer", "is_correct": false}, {"label_html": "Abdominal aortic aneurysm", "is_correct": false}, {"label_html": "Retroperitoneal fibrosis", "is_correct": true}, {"label_html": "Colonic cancer", "is_correct": false}], "correct_index": 3, "explanation_html": "Retroperitoneal Fibrosis: This is a condition characterized by the development of fibrous tissue in the retroperitoneum, which can encase the aorta, inferior vena cava, and ureters, leading to hydronephrosis due to ureteral obstruction. The typical finding of a periaortic mass that displaces the ureters medially and causes hydronephrosis fits well with retroperitoneal fibrosis. This condition also aligns with the hypertension (possibly from renal artery involvement) and the other symptoms described."}], "note_html": "<ul><li>Retroperitoneal fibrosis or Ormond's disease is a disease featuring the proliferation of fibrous tissue in the retroperitoneum, the compartment of the body containing the kidneys, aorta, renal tract, and various other structures. It may present with lower back pain, kidney failure, hypertension, deep vein thrombosis, and other obstructive symptoms. It is named after John Kelso Ormond, who rediscovered the condition in 1948<\/li><li>Imaged with CT scanning of the abdomen<\/li><li>Biopsy is usually performed to exclude other causes<\/li><li>Treatment includes steroids and occasionally surgery, ureteric stent insertion is commonly required<\/li><\/ul>"}, {"name": "Sarcomas", "questions": [{"number": 240, "topic": "Sarcomas", "stem_html": "A 6 month old boy is brought to the clinic with difficulty breathing and weight loss. On examination, he is found to have a firm para testicular mass. What is the most likely diagnosis?", "options": [{"label_html": "Teratoma", "is_correct": false}, {"label_html": "Seminoma", "is_correct": false}, {"label_html": "Adenocarcinoma", "is_correct": false}, {"label_html": "Rhabdomyosarcoma", "is_correct": true}, {"label_html": "Malignant fibrous histiocytoma", "is_correct": false}], "correct_index": 3, "explanation_html": "Rhabdomyosarcomas as one of the more common malignant solid tumours in children (though all are rare). They have an aggressive behavior pattern and metastases are common. Teratomas are nearly always benign in younger children. Seminomas are very rare indeed. Malignant fibrous histiocytomas are almost never found in this location."}, {"number": 241, "topic": "Sarcomas", "stem_html": "Where are sarcomas most likely to be found?", "options": [{"label_html": "In the thorax", "is_correct": false}, {"label_html": "In the abdomen", "is_correct": false}, {"label_html": "Around the axial spine", "is_correct": false}, {"label_html": "In the extremities", "is_correct": true}, {"label_html": "In the head and neck", "is_correct": false}], "correct_index": 3, "explanation_html": "40% of sarcomas are found in the extremities."}, {"number": 242, "topic": "Sarcomas", "stem_html": "A 16 year-old boy presents to his GP with loss of weight, pain and fever. On examination, a mass is palpable over the mid-thigh region. What is the most likely diagnosis?", "options": [{"label_html": "Fibrosarcoma", "is_correct": false}, {"label_html": "Osteosarcoma", "is_correct": false}, {"label_html": "Ewing sarcoma", "is_correct": true}, {"label_html": "Osteoid osteoma", "is_correct": false}, {"label_html": "Synovial sarcoma", "is_correct": false}], "correct_index": 2, "explanation_html": "Ewing's sarcoma is a malignant round cell tumour occurring in the diaphysis of the long bones in the children. These are not confined to the ends of long bones. X- Rays often show a large soft-tissue mass with concentric layers of new bone formation ( 'onion-peel' sign). The ESR may be elevated, thus suggesting an inflammatory or an infective cause such as osteomyelitis; although osteomyelitis usually affects the metaphyseal region in children. Treatment is with chemotherapy and surgical excision, an endoprosthesis may be used to conserve the limb."}, {"number": 243, "topic": "Sarcomas", "stem_html": "A 75 year old lady presents with weight loss, pain and a swelling over her left knee. She has been treated for Pagets disease of the bone for some time. What is the most likely diagnosis?", "options": [{"label_html": "Ewings sarcoma", "is_correct": false}, {"label_html": "Osteosarcoma", "is_correct": true}, {"label_html": "Myeloma", "is_correct": false}, {"label_html": "Septic arthritis", "is_correct": false}, {"label_html": "Osteoclastoma", "is_correct": false}], "correct_index": 1, "explanation_html": "Osteosarcoma may complicate Pagets disease of bone in up to 10% cases. Radiological appearances include bone destruction coupled with new bone formation, periosteal elevation may also occur. Surgical resection is the main treatment."}, {"number": 244, "topic": "Sarcomas", "stem_html": "A 16 year old boy develops a painful swelling of his distal femur. An osteoblastic sarcoma is diagnosed. To which of the following sites is this lesion most likely to metastasise?", "options": [{"label_html": "Inguinal lymph nodes", "is_correct": false}, {"label_html": "Common iliac lymph nodes", "is_correct": false}, {"label_html": "Liver", "is_correct": false}, {"label_html": "Brain", "is_correct": false}, {"label_html": "Lung", "is_correct": true}], "correct_index": 4, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Sarcomas in which Lymphatic Metastasis is seen:<br><br>'RACE For MS'<br><br>R: Rhabdomyosarcoma<br>A: Angiosarcoma<br>C: Clear cell sarcoma<br>E: Epithelial cell sarcoma<br><br>For: Fibrosarcoma<br><br>M: Malignant fibrous histiocytoma<br>S: Synovial cell sarcoma<br><br>Or<br><br>'SCARE'<br><br>Synovial sarcoma<br>Clear cell sarcoma <br>Angiosarcoma <br>Rhabdomyosarcoma<br>Epithelioid sarcoma<\/div>Sarcomas often metastasise via the haematogenous route and the lung is a common site for sarcoma metastasis. The liver and brain are often spared (at least initially). A smaller number may develop lymphatic metastasis (see above)."}], "note_html": "<ul><li>Malignant tumours of mesenchymal origin<\/li><\/ul><br><b>Types<\/b> <br>May be either bone or soft tissue in origin. <br>Bone sarcoma include:<br><ul><li>Osteosarcoma<\/li><li>Ewings sarcoma (although non bony sites recognised)<\/li><li>Chondrosarcoma - originate from Chondrocytes<\/li><\/ul><br>Soft tissue sarcoma are a far more heterogeneous group and include:<br><ul><li>Liposarcoma-adipocytes<\/li><li>Rhabdomyosarcoma-striated muscle<\/li><li>Leiomyosarcoma-smooth muscle<\/li><li>Synovial sarcomas- close to joints  (cell of origin not known but not synovium)    <\/li><\/ul><br>Malignant fibrous histiocytoma is now referred to as undifferentiated pleomorphic sarcoma. Careful histological assessment of lesions now allows more accurate categorisation of sarcoma subtypes than was previously possible. <br><br><b>Features<\/b><br>Certain features of a mass or swelling should raise suspicion for a sarcoma these include:<br><ul><li>Large &gt;5cm soft tissue mass<\/li><li>Deep tissue location or intra muscular location<\/li><li>Rapid growth<\/li><li>Painful lump<\/li><\/ul><br><b>Assessment<\/b><br>Imaging of suspicious masses should utilise a combination of MRI, CT and USS. Blind biopsy should not be performed prior to imaging and where required should be done in such a way that the biopsy tract can be subsequently included in any resection.<br><br><b>Ewings sarcoma<\/b><br><ul><li>Commoner in males<\/li><li>Incidence of 0.3 / 1, 000, 000<\/li><li>Onset typically between 10 and 20 years of age<\/li><li>Location by femoral diaphysis is commonest site<\/li><li>Histologically it is a small round tumour<\/li><li>Blood borne metastasis is common and chemotherapy is often combined with surgery<\/li><\/ul><br><b>Osteosarcoma<\/b><br><ul><li>Mesenchymal cells with osteoblastic differentiation<\/li><li>20% of all primary bone tumours<\/li><li>Incidence of 5 per 1,000,000<\/li><li>Peak age 15-30, commoner in males<\/li><li>Limb preserving surgery may be possible and many patients will receive chemotherapy<\/li><\/ul><br><b>Liposarcoma<\/b><br><ul><li>Malignancy of adipocytes<\/li><li>Rare, approximately 2.5 per 1,000,000. They are the most common soft tissue sarcoma<\/li><li>Typically located in deep locations such as retroperitoneum<\/li><li>Affect older age group usually &gt;40 years of age<\/li><li>May be well differentiated and thus slow growing although may undergo de-differentiation and disease progression<\/li><li>Many tumours will have a pseudocapsule that can misleadingly allow surgeons to feel that they can 'shell out' these lesions. In reality, tumour may invade at the edge of the pseudocapsule and result in local recurrence if this strategy is adopted<\/li><li>Usually resistant to radiotherapy, although this is often used in a palliative setting<\/li><\/ul><br><b>Malignant Fibrous Histiocytoma<\/b><br><ul><li>Tumour with large number of histiocytes<\/li><li>Also described as undifferentiated pleomorphic sarcoma NOS (i.e. Cell of origin is not known)<\/li><li>Four major subtypes are recognised: storiform-pleomorphic (70% cases), myxoid (less aggressive), giant cell and inflammatory<\/li><li>Treatment is usually with surgical resection and adjuvant radiotherapy as this reduces the likelihood of local recurrence<\/li><\/ul>"}, {"name": "Sideroblastic anaemia", "questions": [{"number": 245, "topic": "Sideroblastic anaemia", "stem_html": "A 55 year old man with a long history of excessive alcohol consumption. Presents with lethargy. His investigations culminate in a blood film which shows abnormalities encircling the nucleus on Prussian blue staining. What is the most likely diagnosis?", "options": [{"label_html": "Sickle cell anaemia", "is_correct": false}, {"label_html": "Beta thalassaemia", "is_correct": false}, {"label_html": "Sideroblastic anaemia", "is_correct": true}, {"label_html": "Chronic lymphocytic leukaemia", "is_correct": false}, {"label_html": "Folate deficiency", "is_correct": false}], "correct_index": 2, "explanation_html": "Sideroblastic anaemia produces a ring of iron which stains on Prussian blue staining and surrounds (encircles) the nucleus. Whilst there are many causes, alcohol excess is the most common."}], "note_html": "Sideroblastic anemia is a rare blood disorder characterized by the body’s inability to properly incorporate iron into hemoglobin despite adequate or increased iron stores, leading to anemia and iron overload, with both inherited and acquired causes and emerging gene therapy treatments.<br><br>Overview<br>Sideroblastic anemia (SA) is a condition where the bone marrow produces abnormal red blood cells called ring sideroblasts, which contain excessive iron deposits trapped in the mitochondria surrounding the nucleus, visible with specific staining. This iron is not efficiently used to form hemoglobin, resulting in a shortage of functional red blood cells and anemia, accompanied by iron overload in tissues <br><br>Causes and Types<br>Inherited (Congenital) Forms:<br>The most common is X-linked sideroblastic anemia (XLSA), caused by mutations in the ALAS2 gene responsible for heme synthesis. XLSA usually manifests with microcytic, hypochromic anemia and can also involve iron overload even without transfusions.<br>Autosomal recessive sideroblastic anemia involves mutations in genes like SLC25A38, often causing severe, transfusion-dependent anemia in infants or young children.<br>Rare syndromic forms include additional features like ataxia or pancreatic insufficiency <br><br><br>Acquired Forms:<br>Primary (clonal) sideroblastic anemia often occurs as part of myelodysplastic syndromes (MDS) and is linked to mutations impacting RNA splicing and ineffective erythropoiesis.<br>Secondary (reversible) sideroblastic anemia results from external factors like alcohol abuse (most common), lead poisoning, certain drug toxicities (e.g., isoniazid, chloramphenicol), vitamin B6 deficiency, copper deficiency, and zinc overdose <br><br>Symptoms<br>Common symptoms reflect anemia and include fatigue, shortness of breath, palpitations, headaches, and pale skin. In inherited forms with iron overload, patients may develop bronze or gray skin, enlarged liver or spleen, diabetes, and organ damage from iron accumulation. Secondary forms may vary in severity depending on the cause <br><br>Diagnosis<br>Blood tests typically show anemia with variable cell sizes (microcytic or macrocytic), increased serum iron, high ferritin, and normal or decreased total iron-binding capacity (TIBC).<br>Peripheral blood smear may reveal basophilic stippling and Pappenheimer bodies (iron granules in red cells).<br>Bone marrow examination is definitive, showing &gt;15% ring sideroblasts in erythroblasts with iron-laden mitochondria visible on Prussian blue staining.<br>Genetic testing helps confirm inherited forms and guides counseling and management .<br><br>Treatment<br>Pyridoxine (Vitamin B6): Often effective in X-linked sideroblastic anemia, improving anemia partially or completely in responsive patients. Dosage and response depend on mutation type and iron status.<br>Managing Iron Overload: Chronic transfusions may worsen iron overload, requiring iron chelation therapy or therapeutic phlebotomy.<br>Blood Transfusions: Used in severe or refractory cases.<br>Allogeneic Stem Cell Transplantation: Currently the only curative option for severe autosomal recessive forms and some refractory cases <br><br>Summary<br>Sideroblastic anemia is a complex disorder with genetic and environmental causes leading to ineffective erythropoiesis and iron overload. Diagnosis relies on bone marrow findings and genetic testing, while treatment strategies vary by subtype and severity. Emerging gene therapies provide hope for more definitive and less toxic treatments in the future. Regular monitoring and management of iron overload are critical to improving outcomes."}, {"name": "Splenectomy", "questions": [{"number": 246, "topic": "Splenectomy", "stem_html": "A 56 year old lady with idiopathic thrombocytopenic purpura has a platelet count of 50. She is due to undergo a splenectomy. What is the optimal timing of a platelet transfusion in this case?", "options": [{"label_html": "24 hours pre-operatively", "is_correct": false}, {"label_html": "2 hours pre-operatively", "is_correct": false}, {"label_html": "Whilst making the skin incision", "is_correct": false}, {"label_html": "After ligation of the splenic artery", "is_correct": true}, {"label_html": "On removal of the spleen", "is_correct": false}], "correct_index": 3, "explanation_html": "ITP causes splenic sequestration of platelets. Therefore a platelet transfusion should be carefully timed. Too soon and it will be ineffective. Too late and unnecessary bleeding will occur. The optimal time is after the splenic artery has been ligated."}, {"number": 247, "topic": "Splenectomy", "stem_html": "Which is the characteristic finding on a blood film post splenectomy?", "options": [{"label_html": "Stipple cell", "is_correct": false}, {"label_html": "Tear drop cell", "is_correct": false}, {"label_html": "Reticulocytes", "is_correct": false}, {"label_html": "Howell-Jolly bodies", "is_correct": true}, {"label_html": "Schistocyte", "is_correct": false}], "correct_index": 3, "explanation_html": "Blood film in hyposplenism:<br><br>Howell-Jolly bodies<br>Pappenheimer bodies<br>Poikilocytes (Target cells)<br>Erythrocyte containing siderotic granules<br>Heinz bodies"}], "note_html": "<b>Indications<\/b><br><ul><li>Trauma: 1/4 are iatrogenic <\/li><li>Spontaneous rupture: EBV<\/li><li>Hypersplenism: hereditary spherocytosis or elliptocytosis etc<\/li><li>Malignancy: lymphoma or leukaemia<\/li><li>Splenic cysts, hydatid cysts, splenic abscesses <\/li><\/ul><br><b>Splenectomy<\/b><br><b>Technique<\/b><br><b>Trauma<\/b><br><ul><li>GA<\/li><li>Long midline incision<\/li><li>If time permits insert a self retaining retractor (e.g. Balfour/ omnitract)<\/li><li>Large amount of free blood is usually present. Pack all 4 quadrants of the abdomen. Allow the anaesthetist to 'catch up'<\/li><li>Remove the packs and assess the viability of the spleen. Hilar injuries and extensive parenchymal lacerations will usually require splenectomy.<\/li><li>Divide the short gastric vessels and ligate them.<\/li><li>Clamp the splenic artery and vein. Two clamps on the patient side are better and allow for double ligation and serve as a safety net if your assistant does not release the clamp smoothly.<\/li><li>Be careful not to damage the tail of the pancreas, if you do then this will need to be formally removed and the pancreatic duct closed.<\/li><li>Wash out the abdomen and place a tube drain to the splenic bed.<\/li><li>Some surgeons implant a portion of spleen into the omentum, whether you decide to do this is a matter of personal choice.<\/li><li>Post operatively the patient will require prophylactic penicillin V and pneumococcal vaccine.<\/li><\/ul><br><b>Elective<\/b><br>Elective splenectomy is a very different operation from that performed in the emergency setting. The spleen is often large (sometimes massive). Most cases can be performed laparoscopically. The spleen will often be macerated inside a specimen bag to facilitate extraction.<br><br><b>Complications <\/b><br><ul><li>Haemorrhage (may be early and either from short gastrics or splenic hilar vessels<\/li><li>Pancreatic fistula (from iatrogenic damage to pancreatic tail)<\/li><li>Thrombocytosis: prophylactic aspirin <\/li><li>Encapsulated bacteria infection e.g. <i>Strep. pneumoniae<\/i>, <i>Haemophilus influenzae<\/i> and <i><i>Neisseria<\/i> meningitidis<\/i><\/li><\/ul><br><b>Post splenectomy changes<\/b><br><ul><li>Platelets will rise first (therefore in ITP should be given after splenic artery clamped)<\/li><li>Blood film will change over following weeks, Howell Jolly bodies will appear<\/li><li>Other blood film changes include target cells and Pappenheimer bodies<\/li><li>Increased risk of post splenectomy sepsis, therefore prophylactic antibiotics and pneumococcal vaccine should be given.<\/li><\/ul><br><b>Post splenectomy sepsis<\/b><br><ul><li>Typically occurs with encapsulated organisms<\/li><li>Opsonisation occurs but then not recognised<\/li><\/ul>"}, {"name": "Squamous cell carcinoma of the skin", "questions": [{"number": 248, "topic": "Squamous cell carcinoma of the skin", "stem_html": "A 68 year old man presents with an ulcerated lesion on his right cheek. It is excised and on histological assessment a squamous cell carcinoma is diagnosed. It measures 25mm in diameter and is 4mm deep. Which of the following statements relating to this condition is false?", "options": [{"label_html": "In this particular case margins of at least 6mm are required", "is_correct": false}, {"label_html": "Use of cryosurgery to treat this patients lesion would have been unsafe", "is_correct": false}, {"label_html": "Use of radiotherapy to treat this lesion would have been unsafe", "is_correct": true}, {"label_html": "This patients local recurrence rate may approach 15%", "is_correct": false}, {"label_html": "The disease usually spreads via lymphatics", "is_correct": false}], "correct_index": 2, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Poor prognostic factors in SCC:<br><ul><li>Size &gt;20mm (local recurrence rate of up to 15%)<\/li><li>Depth greater than 4mm (risk of metastasis up to 30%)<\/li><\/ul><\/div>This man has an SCC with significant risk of metastasis. Although cryotherapy may be used to treat SCC it would be most unsafe in this setting as the lesion extends deeply. However, radiotherapy is a safe treatment modality for SCC and may be used in selected cases. It is unwise to use radiotherapy in areas prone to radionecrosis e.g. the nose."}], "note_html": "<ul><li>Second most common skin malignancy<\/li><li>Derived from epidermal keratinocytes<\/li><li>Commonest in fair skinned individuals in sun exposed sites<\/li><li>May occur in perianal and genital skin especially in association with Human Papilloma Virus 16 and 18 infections.<\/li><\/ul><br><b>Groups at high risk<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td>Renal transplant and on immunosuppression<\/td><\/tr><tr><td>Individuals with HIV<\/td><\/tr><tr><td>Those who have received psoralen UVA therapy<\/td><\/tr><tr><td>Chronic wounds (Marjolins ulcer)<\/td><\/tr><tr><td>Xeroderma pigmentosum<\/td><\/tr><tr><td>Oculocutaneous albinism<\/td><\/tr><\/tbody><\/table><\/div><br><b>Prognosis<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Good Prognosis<\/b><\/td><td><b>Poor prognosis<\/b><\/td><\/tr><tr><td>Well differentiated tumours<\/td><td>Poorly differentiated tumours<\/td><\/tr><tr><td>&lt;20mm diameter<\/td><td>&gt;20mm in diameter<\/td><\/tr><tr><td>&lt;2mm deep<\/td><td>&gt;4mm deep<\/td><\/tr><tr><td>No associated diseases<\/td><td>Immunosupression for whatever reason<\/td><\/tr><\/tbody><\/table><\/div><br><b>Treatment<\/b><br>Surgical excision with 4mm margins if lesion &lt;20mm in diameter. If tumour &gt;20mm then margins should be 6mm.<br><br><i>Squamous cell carcinomas of the skin typically arise in areas of sun exposure as shown here<\/i><br><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb071b.jpg\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb071.jpg\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Squamous cell carcinoma\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb071b.jpg\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center><br><b>References<\/b><br>The British Association of Dermatology provides guidelines for the diagnosis and treatment of SCC.<br>http://www. bad.org.uk"}, {"name": "Takayasu's arteritis", "questions": [{"number": 249, "topic": "Takayasu's arteritis", "stem_html": "A 24-year-old female is referred to the acute surgical team as she is noted to have an absent left radial pulse. Apart from some dizziness and lethargy, the patient does not have any features suggestive of an acute ischaemic limb.  Blood tests are as follows:<br><br><div class=\"table-responsive\"><table class=\"tb\"><tbody><tr><td>Na+<\/td><td>136 mmol/l<\/td><\/tr><tr><td>K+<\/td><td>4.1 mmol/l<\/td><\/tr><tr><td>Urea<\/td><td>2.3 mmol/l<\/td><\/tr><tr><td>Creatinine<\/td><td>77 µmol/l<\/td><\/tr><tr><td>&nbsp;<\/td><\/tr><tr><td>ESR<\/td><td>66  mm/hr<\/td><\/tr><\/tbody><\/table><\/div><br>What is the most likely diagnosis?", "options": [{"label_html": "Turner's syndrome", "is_correct": false}, {"label_html": "Takayasu's arteritis", "is_correct": true}, {"label_html": "Kawasaki disease", "is_correct": false}, {"label_html": "Coarctation of the aorta", "is_correct": false}, {"label_html": "Breast carcinoma with local spread", "is_correct": false}], "correct_index": 1, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\"><ul><li>Inflammatory, obliterative arteritis affecting aorta and branches<\/li><li>Females&gt; Males<\/li><li>Symptoms may include upper limb claudication<\/li><li>Clinical findings include diminished or absent pulses<\/li><li>ESR often affected during the acute phase<\/li><\/ul><\/div>"}], "note_html": "Takayasu's arteritis is a large vessel vasculitis. It typically causes occlusion of the aorta and questions commonly refer to an absent limb pulse. It is more common in females and Asian people<br><br>Associations<br><ul><li>renal artery stenosis<\/li><\/ul><br>Management<br><ul><li>steroids<\/li><\/ul>"}, {"name": "Temporal artery biopsy", "questions": [{"number": 250, "topic": "Temporal artery biopsy", "stem_html": "Patients with suspected temporal arteritis are often sent for temporal artery biopsy.  Which statement is true?", "options": [{"label_html": "Temporal artery biopsy is only diagnostic if there is visual loss", "is_correct": false}, {"label_html": "Biopsy is typically taken from the non-symptomatic side to avoid the risk of blindness", "is_correct": false}, {"label_html": "Pre-operative localisation with duplex is mandatory", "is_correct": false}, {"label_html": "Biopsies may be non diagnostic in over 50% of cases", "is_correct": true}, {"label_html": "Biopsies are usually performed under general anaesthesia", "is_correct": false}], "correct_index": 3, "explanation_html": "Temporal artery biopsies are frequently non diagnostic. They should be taken from the symptomatic side and though not mandatory a duplex ultrasound is a helpful investigation, particularly if they mark the artery. It is usually performed under local anaesthetic."}], "note_html": "<ul><li>Superficial temporal artery is a terminal branch of the external carotid artery<\/li><\/ul><br><b>Main indication<\/b><br><ul><li>Temporal arteritis <\/li><\/ul><br>American College of Rheumatology guidelines recommend a temporal artery biopsy if:<br><br><ul><li>Age of onset older than 50 years<\/li><li>New-onset headache or localized head pain<\/li><li>Temporal artery tenderness to palpation or reduced pulsation<\/li><li>ESR &gt; 50 mm/h<\/li><\/ul><br><b>Histopathology<\/b><br><ul><li>Vessel wall granulomatous arteritis with mononuclear cell infiltrates and giant cell formation <\/li><\/ul><br><b>Procedure<\/b><br><ul><li>Position: supine, head 45 degrees<\/li><li>USS doppler to locate the superficial temporal artery or palpate<\/li><li>Local anaesthetic<\/li><li>Artery within temporoparietal fascia<\/li><li>Clamp and ligate the vessel<\/li><li>Cut 3-5cm<\/li><li>Ligate the remaining ends with absorbable suture<\/li><li>Close the skin<\/li><\/ul><br><b>Contraindication<\/b><br>Glucocorticoid therapy &gt; 30 days<br><br><b>Risks<\/b><br>Injury to facial or auriculotemporal nerve"}, {"name": "Thymus", "questions": [{"number": 251, "topic": "Thymus", "stem_html": "A pathologist is examining a histological section and identifies Hassall's corpuscles. With what are they most commonly associated?", "options": [{"label_html": "Follicular carcinoma of the thyroid", "is_correct": false}, {"label_html": "Medulla of the thymus", "is_correct": true}, {"label_html": "Medulla of the spleen", "is_correct": false}, {"label_html": "Medulla of the kidney", "is_correct": false}, {"label_html": "Fundus of the stomach", "is_correct": false}], "correct_index": 1, "explanation_html": "Hassall's corpuscles are the concentric ring of epithelial cells seen in the medulla of the thymus."}], "note_html": "The thymus develops from the third and fourth pharyngeal pouches. It descends to lie in the anterior superior mediastinum. It is encapsulated and is subdivided into lobules, these consist of a cortex and a medulla. The cortex is composed of tightly packed lymphocytes, the medulla consists largely of epithelial cells. The medullary epithelial cells are concentrically arranged and may surround a keratinised centre, known as Hassall's corpuscles. <br>The inferior parathyroid glands also develop from the third pharyngeal pouch and may also be located with the thymus gland. <br>Its arterial supply is from the internal mammary artery or pericardiophrenic arteries. Venous drainage is to the left brachiocephalic vein. <br><br><i>Hassall's corpuscles stained with H+E<\/i><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb116b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb116.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Hassall%27s corpuscles\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb116b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}, {"name": "Thyroid malignancy", "questions": [{"number": 252, "topic": "Thyroid malignancy", "stem_html": "A 40 year old woman presented with a mass on her forehead. On examination, she had a fluctuant pulsatile mass on her head. Examination of her neck revealed a mass inferior to the hyoid with a positive Berry's sign. What is the most likely underlying diagnosis?", "options": [{"label_html": "Follicular thyroid cancer", "is_correct": true}, {"label_html": "Medullary thyroid cancer", "is_correct": false}, {"label_html": "Papillary thyroid cancer", "is_correct": false}, {"label_html": "Anaplastic thyroid cancer", "is_correct": false}, {"label_html": "Parathyroid gland cancer", "is_correct": false}], "correct_index": 0, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Berrys sign= Absence of carotid pulse due to malignant thyromegaly. <\/div>Papillary thyroid cancers will tend to spread via lymphatics and present with disease that is nearly always confined to the neck. Follicular carcinomas may metastasise haematogenously and the skull may be the presenting site of disease in between 2 and 8% of patients."}, {"number": 253, "topic": "Thyroid malignancy", "stem_html": "A 55 year old lady presents with a neck mass. On examination, there is a swelling of the neck and enlarged deep cervical lymph nodes. A biopsy is taken from the nodes and is noted to be CD20 positive. What is the most likely diagnosis?", "options": [{"label_html": "Hashimotos thyroiditis", "is_correct": false}, {"label_html": "Thyroid gland lymphoma", "is_correct": true}, {"label_html": "Papillary thyroid cancer", "is_correct": false}, {"label_html": "Follicular thyroid cancer", "is_correct": false}, {"label_html": "Anaplastic thyroid cancer", "is_correct": false}], "correct_index": 1, "explanation_html": "CD20 is a B cell lymphoma marker and is useful in histochemical analysis of biopsies. Even without knowing that, it is still possible to approach questions like this with a logical exclusion approach. Follicular lesions tend not to have lymphatic involvement and the same is true of Hashimotos thyroiditis. Papillary thyroid cancers do remain a possible tumour as they have lymphatic involvement (its for this that knowledge of the CD20 is required)."}, {"number": 254, "topic": "Thyroid malignancy", "stem_html": "A 42 year old lady presents with a small mass in the right lobe of the thyroid gland. Following excision, the histopathologist assess the lesion and makes remark about the significant amount of dystrophic calcification associated with the lesion? What is the most likely underlying definitive diagnosis?", "options": [{"label_html": "Follicular adenoma", "is_correct": false}, {"label_html": "Follicular carcinoma", "is_correct": false}, {"label_html": "Anaplastic thyroid carcinoma", "is_correct": false}, {"label_html": "Papillary carcinoma", "is_correct": true}, {"label_html": "Toxic nodule", "is_correct": false}], "correct_index": 3, "explanation_html": "Calcification is likely to be Psammoma body seen in papillary lesions."}, {"number": 255, "topic": "Thyroid malignancy", "stem_html": "Which investigation is best for initial assessment of recurrence of follicular carcinoma of the thyroid?", "options": [{"label_html": "Free T4", "is_correct": false}, {"label_html": "Thyroid stimulating hormone", "is_correct": false}, {"label_html": "Scintigraphy", "is_correct": false}, {"label_html": "Serum thyroglobulin", "is_correct": true}, {"label_html": "USS thyroid gland", "is_correct": false}], "correct_index": 3, "explanation_html": "Elevated thyroglobulin levels raises suspicion of recurrence."}, {"number": 256, "topic": "Thyroid malignancy", "stem_html": "A 23 year old lady undergoes a total thyroidectomy as treatment for a papillary carcinoma of the thyroid. The pathologist examines histological sections of the thyroid gland and identifies a psammoma body. What are these primarily composed of?", "options": [{"label_html": "Clusters of calcification", "is_correct": true}, {"label_html": "Aggregations of neutrophils", "is_correct": false}, {"label_html": "Aggregations of macrophages", "is_correct": false}, {"label_html": "Giant cells surrounding the tumour", "is_correct": false}, {"label_html": "Clusters of oxalate crystals", "is_correct": false}], "correct_index": 0, "explanation_html": "Psammoma bodies consist of clusters of microcalcification. They are most commonly seen in papillary carcinomas."}, {"number": 257, "topic": "Thyroid malignancy", "stem_html": "A 20 year old lady presents with a thyroid cancer, she is otherwise well with no significant family history. On examination, she has a nodule in the left lobe of the thyroid, with a small discrete mass separate from the gland itself. Which of the following is the most likely cause?", "options": [{"label_html": "Follicular carcinoma", "is_correct": false}, {"label_html": "Anaplastic carcinoma", "is_correct": false}, {"label_html": "Medullary carcinoma", "is_correct": false}, {"label_html": "Papillary carcinoma", "is_correct": true}, {"label_html": "B Cell Lymphoma", "is_correct": false}], "correct_index": 3, "explanation_html": "Papillary carcinoma is the most common subtype and may cause lymph node metastasis (mass separate from the gland itself) that is rare with follicular tumours. Anaplastic carcinoma would cause more local symptoms and would be rare in this age group."}, {"number": 258, "topic": "Thyroid malignancy", "stem_html": "A 45 year old lady has recently undergone a thyroidectomy for treatment of medullary thyroid cancer. Which of the following tumour markers is used clinically to screen for recurrence?", "options": [{"label_html": "Free T3", "is_correct": false}, {"label_html": "Thyroglobulin", "is_correct": false}, {"label_html": "Calcitonin", "is_correct": true}, {"label_html": "Free T4", "is_correct": false}, {"label_html": "Thyroid stimulating hormone", "is_correct": false}], "correct_index": 2, "explanation_html": "Calcitonin is clinically utilised to screen for medullary thyroid cancer recurrence. Thyroid function testing does not form part of either diagnosis or follow up from a malignancy perspective. However, routine assessment of TSH may be needed in patients on thyroxine."}, {"number": 259, "topic": "Thyroid malignancy", "stem_html": "A 45 year old lady presents with a pathological fracture of her femoral shaft. She is a poor historian, but it transpires that she underwent a thyroidectomy 1 year previously. She has no other illness or co-morbidities. What is the most likely underlying diagnosis?", "options": [{"label_html": "Hyperparathyroidism", "is_correct": false}, {"label_html": "Metastatic papillary carcinoma of the thyroid", "is_correct": false}, {"label_html": "Metastatic medullary carcinoma of the thyroid", "is_correct": false}, {"label_html": "Metastatic follicular carcinoma of the thyroid", "is_correct": true}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 3, "explanation_html": "Follicular carcinomas are a recognised cause of bone metastasis. Papillary lesions typically spread via the lymphatics."}], "note_html": "<b>Papillary carcinoma<\/b><br><ul><li>Commonest sub-type<\/li><li>Accurately diagnosed on fine needle aspiration cytology<\/li><li>Histologically, they may demonstrate psammoma bodies (areas of calcification) and so called 'orphan Annie' nuclei<\/li><li>They typically metastasise via the lymphatics and thus laterally located apparently ectopic thyroid tissue is usually a metastasis from a well differentiated papillary carcinoma<\/li><\/ul><br><b>Follicular carcinoma<\/b><br><ul><li>Are less common than papillary lesions<\/li><li>Like papillary tumours, they may present as a discrete nodule. Although they appear to be well encapsulated macroscopically there is invasion on microscopic evaluation<\/li><li>Lymph node metastases are uncommon and these tumours tend to spread haematogenously. This translates into a higher mortality rate<\/li><li>Follicular lesions cannot be accurately diagnosed on fine needle aspiration cytology and thus all follicular FNA's (THY 3f) will require at least a hemi thyroidectomy<\/li><\/ul><br><b>Anaplastic carcinoma<\/b><br><ul><li>Less common and tend to occur in elderly females<\/li><li>Disease is usually advanced at presentation and often only palliative decompression and radiotherapy can be offered.<\/li><\/ul><br><b>Medullary carcinoma<\/b><br><ul><li>These are tumours of the parafollicular cells ( C Cells) and are of neural crest origin. <\/li><li>The serum calcitonin may be elevated which is of use when monitoring for recurrence. <\/li><li>They may be familial and occur as part of the MEN -2A disease spectrum.     <\/li><li>Spread may be either lymphatic or haematogenous and as these tumours are not derived primarily from thyroid cells they are not responsive to radioiodine. <\/li><\/ul><br><b>Lymphoma<\/b><br><ul><li>These respond well to combined chemoradiotherapy<\/li><li>Radical surgery is unnecessary once the disease has been diagnosed on biopsy material. Such biopsy material is not generated by an FNA and thus a core biopsy has to be obtained (with care!).<\/li><\/ul>"}, {"name": "Thyroid neoplasms", "questions": [{"number": 260, "topic": "Thyroid neoplasms", "stem_html": "A 45 year old woman with a thyroid carcinoma undergoes a total thyroidectomy. The post operative histology report shows a final diagnosis of medullary type thyroid cancer. Which of the tests below is most likely to be of clinical use in screening for disease recurrence?", "options": [{"label_html": "Serum CA 19-9 Levels", "is_correct": false}, {"label_html": "Serum thyroglobulin levels", "is_correct": false}, {"label_html": "Serum PTH levels", "is_correct": false}, {"label_html": "Serum calcitonin levels", "is_correct": true}, {"label_html": "Serum TSH levels", "is_correct": false}], "correct_index": 3, "explanation_html": "Medullary thyroid cancers often secrete calcitonin and monitoring the serum levels of this hormone is useful in detecting sub clinical recurrence."}, {"number": 261, "topic": "Thyroid neoplasms", "stem_html": "A 52 year old woman presents with a neck swelling. On examination, she is noted to have single nodule on the thyroid gland. A CXR shows two mass lesions. What is the most likely cause?", "options": [{"label_html": "Papillary thyroid cancer", "is_correct": false}, {"label_html": "Toxic adenoma", "is_correct": false}, {"label_html": "Follicular thyroid cancer", "is_correct": true}, {"label_html": "Anaplastic thyroid cancer", "is_correct": false}, {"label_html": "Medullary thyroid cancer", "is_correct": false}], "correct_index": 2, "explanation_html": "A solitary nodule with signs of haematogenous spread indicates a follicular tumour. Note that papillary tumours tend to be multinodular and spread via the lymphatic system. Lymphatic spread from a papillary thyroid cancer is nearly always to neck nodes in the first instance and mediastinal lymphadenopathy is vanishingly rare. Lung lesions are typically synonymous with haematogenous metastasis of which a follicular lesion is the most likely culprit."}, {"number": 262, "topic": "Thyroid neoplasms", "stem_html": "A 78 year old lady presents to the surgical clinic with symptoms of both dysphagia and dyspnoea. On examination, there is a large mass in the neck that moves on swallowing. CT scanning of the neck shows a locally infiltrative lesion arising from the thyroid and invading the strap muscles. What is the most likely diagnosis?", "options": [{"label_html": "Lymphoma", "is_correct": false}, {"label_html": "Follicular carcinoma", "is_correct": false}, {"label_html": "Multinodular goitre", "is_correct": false}, {"label_html": "Anaplastic carcinoma", "is_correct": true}, {"label_html": "Papillary carcinoma", "is_correct": false}], "correct_index": 3, "explanation_html": "Marked local invasion is a feature of anaplastic carcinoma. These tumours are more common in elderly females."}, {"number": 263, "topic": "Thyroid neoplasms", "stem_html": "A 25 year old female presents with a lump in her neck. On examination, she has a discrete nodule in the right lobe of the thyroid. A fine needle aspirate shows papillary cells. An adjacent nodule is also sampled which shows similar well differentiated papillary cells. What is the most likely cause?", "options": [{"label_html": "Hashimotos thyroiditis", "is_correct": false}, {"label_html": "Papillary carcinoma", "is_correct": true}, {"label_html": "Follicular carcinoma", "is_correct": false}, {"label_html": "Medullary carcinoma", "is_correct": false}, {"label_html": "Thyroid B Cell lymphoma", "is_correct": false}], "correct_index": 1, "explanation_html": "Multifocal disease is a recognised feature of papillary lesions. Papillary adenomas are not really recognised and most well differentiated lesions are papillary carcinomas."}, {"number": 264, "topic": "Thyroid neoplasms", "stem_html": "A 22 year old female undergoes a thyroidectomy. The resected specimen shows a non encapsulated tumour with papillary projections and pale empty nuclei. What is the underlying diagnosis?", "options": [{"label_html": "Papillary carcinoma", "is_correct": true}, {"label_html": "Follicular carcinoma", "is_correct": false}, {"label_html": "Medullary carcinoma", "is_correct": false}, {"label_html": "Anaplastic carcinoma", "is_correct": false}, {"label_html": "B Cell lymphoma", "is_correct": false}], "correct_index": 0, "explanation_html": "The presence of papillary structures together with the cytoplasmic features described is strongly suggestive of papillary carcinoma. They are seldom encapsulated."}, {"number": 265, "topic": "Thyroid neoplasms", "stem_html": "A thyroidectomy specimen from a 45 year old man shows a mass with prominent oxyphil cells and scanty thyroid colloid. What is the underlying cause?", "options": [{"label_html": "Papillary carcinoma", "is_correct": false}, {"label_html": "Lymphoma", "is_correct": false}, {"label_html": "Follicular carcinoma", "is_correct": true}, {"label_html": "Thyroiditis", "is_correct": false}, {"label_html": "Graves disease", "is_correct": false}], "correct_index": 2, "explanation_html": "Hurthle cell tumours are a variant of follicular neoplasms in which oxyphil cells predominate. They have a poorer prognosis than conventional follicular neoplasms."}, {"number": 266, "topic": "Thyroid neoplasms", "stem_html": "A 32 year old lady undergoes a thyroidectomy for a mild goitre. The resected specimen shows an intense lymphocytic infiltrate with acinar destruction and fibrosis. What is the underlying lesion?", "options": [{"label_html": "Anaplastic carcinoma", "is_correct": false}, {"label_html": "Rhadomyosarcoma", "is_correct": false}, {"label_html": "Lymphoma", "is_correct": false}, {"label_html": "Hashimotos thyroiditis", "is_correct": true}, {"label_html": "Graves disease", "is_correct": false}], "correct_index": 3, "explanation_html": "Lymphocytic infiltrates and fibrosis are typically seen in Hashimotos thyroiditis. In lymphoma only dense lymphatic type tissue is usually present."}, {"number": 267, "topic": "Thyroid neoplasms", "stem_html": "A 45 year old lady presents with a neck swelling. A thyroid lesion is identified and a thyroidectomy is performed. On histological evaluation of the resected specimen, the reporting pathologist notes the presence of amyloid. What is the most likely underlying diagnosis?", "options": [{"label_html": "Follicular adenoma", "is_correct": false}, {"label_html": "Follicular carcinoma", "is_correct": false}, {"label_html": "Papillary thyroid cancer", "is_correct": false}, {"label_html": "Medullary thyroid cancer", "is_correct": true}, {"label_html": "Anaplastic thyroid cancer", "is_correct": false}], "correct_index": 3, "explanation_html": "Medullary thyroid cancer is strongly associated with localised amyloidosis. The amyloid is composed of calcitonin."}], "note_html": "<div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Lesion<\/b><\/th><th><b>Common features<\/b><\/th><\/tr><\/thead><tbody><tr><td>Follicular adenoma<\/td><td><ul><li>Usually present as a solitary thyroid nodule<\/li><li>Malignancy can only be excluded on formal histological assessment<\/li><\/ul><\/td><\/tr><tr><td>Papillary carcinoma<\/td><td><ul><li>Usually contain a mixture of papillary and colloidal filled follicles<\/li><li>Histologically tumour has papillary projections and pale empty nuclei<\/li><li>Seldom encapsulated<\/li><li>Lymph node metastasis predominate<\/li><li>Haematogenous metastasis rare<\/li><li>Account for 60% of thyroid cancers<\/li><\/ul><\/td><\/tr><tr><td>Follicular carcinoma<\/td><td><ul><li>May appear macroscopically encapsulated, microscopically capsular invasion is seen. Without this finding the lesion is a follicular adenoma.<\/li><li>Vascular invasion predominates<\/li><li>Multifocal disease rare<\/li><li>Account for 20% of all thyroid cancers<\/li><\/ul><\/td><\/tr><tr><td>Anaplastic carcinoma<\/td><td><ul><li>Most common in elderly females<\/li><li>Local invasion is a common feature<\/li><li>Account for 10% of thyroid cancers<\/li><li>Treatment is by resection where possible, palliation may be achieved through isthmusectomy and radiotherapy. Chemotherapy is ineffective.<\/li><\/ul><\/td><\/tr><tr><td>Medullary carcinoma<\/td><td><ul><li>Tumours of the parafollicular cells (C Cells)<\/li><li>C cells derived from neural crest and not thyroid tissue<\/li><li>Serum calcitonin levels often raised<\/li><li>Familial genetic disease accounts for up to 20% cases<\/li><li>Both lymphatic and haematogenous metastasis are recognised, nodal disease is associated with a very poor prognosis.<\/li><\/ul><\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Trypanosoma Cruzi", "questions": [{"number": 268, "topic": "Trypanosoma Cruzi", "stem_html": "Infection with which of the following micro-organisms may result in a clinical picture resembling achalasia of the oesphagus?", "options": [{"label_html": "Epstein Barr virus", "is_correct": false}, {"label_html": "<i>Wuchereria Bancrofti<\/i>", "is_correct": false}, {"label_html": "<i>Candida Spp<\/i>", "is_correct": false}, {"label_html": "<i>Trypanosoma Cruzi<\/i>", "is_correct": true}, {"label_html": "<i>Helicobacter Pylori<\/i>", "is_correct": false}], "correct_index": 3, "explanation_html": "Infection with Trypanosoma Cruzi may result in destruction of the ganglion cells of the myenteric plexus, resulting in a clinical picture similar to achalasia."}], "note_html": "<ul><li>Protozoan <\/li><li>Causes Chagas disease<\/li><li>Carried by bugs which infect the skin whilst feeding<\/li><li>Penetrate through open wounds and mucous membranes<\/li><li>Intracellular proliferation<\/li><li>Major infective sites include CNS, intestinal myenteric plexus, spleen, lymph nodes and cardiac muscle<\/li><li>Chronic disease is irreversible, nifurtimox is used to treat acute infection<\/li><\/ul>"}, {"name": "Tuberculosis", "questions": [{"number": 269, "topic": "Tuberculosis", "stem_html": "Which of the following is not a risk factor for developing tuberculosis?", "options": [{"label_html": "Gastrectomy", "is_correct": false}, {"label_html": "Solid organ transplantation with immunosupression", "is_correct": false}, {"label_html": "Intravenous drug use", "is_correct": false}, {"label_html": "Haematological malignancy", "is_correct": false}, {"label_html": "Amiodarone", "is_correct": true}], "correct_index": 4, "explanation_html": "Risk factors for developing active tuberculosis include:<br><ul><li>silicosis<\/li><li>chronic renal failure<\/li><li>HIV positive<\/li><li>solid organ transplantation with immunosuppression<\/li><li>intravenous drug use<\/li><li>haematological malignancy<\/li><li>anti-TNF treatment<\/li><li>previous gastrectomy<\/li><\/ul>"}], "note_html": "Tuberculosis (TB) is an infection caused by Mycobacterium tuberculosis that most commonly affects the lungs. Understanding the pathophysiology of TB can be difficult - the key is to differentiate between primary and secondary disease.<br><br><b>Primary tuberculosis<\/b><br>A non-immune host who is exposed to M. tuberculosis may develop primary infection of the lungs. A small lung lesion known as a Ghon focus develops. The Ghon focus is composed of tubercle-laden macrophages. The combination of a Ghon focus and hilar lymph nodes is known as a Ghon complex<br><br>In immunocompetent people the initial lesion usually heals by fibrosis. Those who are immunocompromised may develop disseminated disease (miliary tuberculosis).<br><br><b>Secondary (post-primary) tuberculosis<\/b><br>If the host becomes immunocompromised the initial infection may become reactivated. Reactivation generally occurs in the apex of the lungs and may spread locally or to more distant sites. Possible causes of immunocomprise include:<br><ul><li>immunosuppressive drugs including steroids<\/li><li>HIV<\/li><li>malnutrition<\/li><\/ul><br>The lungs remain the most common site for secondary tuberculosis. Extra-pulmonary infection may occur in the following areas:<br><ul><li>central nervous system (tuberculous meningitis - the most serious complication)<\/li><li>vertebral bodies (Pott's disease)<\/li><li>cervical lymph nodes (scrofuloderma)<\/li><li>renal<\/li><li>gastrointestinal tract<\/li><\/ul>"}, {"name": "Tuberculosis pathology", "questions": [{"number": 270, "topic": "Tuberculosis pathology", "stem_html": "A 24 year old man from Malawi presents with a lymphadenopathy and weight loss. A diagnosis of tuberculosis is suspected and a lymph node biopsy is performed. Staining with which of the agents below is most likely to facilitate identification of the causative organism?", "options": [{"label_html": "Gram stain", "is_correct": false}, {"label_html": "Ziehl-Neelsen stain", "is_correct": true}, {"label_html": "Von Kossa stain", "is_correct": false}, {"label_html": "Van Gieson stain", "is_correct": false}, {"label_html": "Masson Trichrome stain", "is_correct": false}], "correct_index": 1, "explanation_html": "Ziehl-Neelsen stain is typically used to identify mycobacteria. They are not stained in the Gram staining process. Van Gieson and Masson trichrome are histological staining methods for identification of connective tissues. The Von Kossa technique is useful for identifying tissue mineralisation."}, {"number": 271, "topic": "Tuberculosis pathology", "stem_html": "A 43 year old man presents with haemoptysis and is diagnosed as having tuberculosis. Which of the cell types listed below will usually internalise the tubercule bacullis?", "options": [{"label_html": "Fibroblast", "is_correct": false}, {"label_html": "Neutrophil", "is_correct": false}, {"label_html": "Erythrocyte", "is_correct": false}, {"label_html": "Macrophage", "is_correct": true}, {"label_html": "Eosinophil", "is_correct": false}], "correct_index": 3, "explanation_html": "M. Tuberculosis will reside in macrophages where it will often survive"}, {"number": 272, "topic": "Tuberculosis pathology", "stem_html": "In which of the following conditions is a Ghon complex most likely to be found?", "options": [{"label_html": "Actinomycosis", "is_correct": false}, {"label_html": "Infection with mycobacterium tuberculosis", "is_correct": true}, {"label_html": "Mycosis fungoides", "is_correct": false}, {"label_html": "Lewy body dementia", "is_correct": false}, {"label_html": "Chronic lymphocytic leukaemia", "is_correct": false}], "correct_index": 1, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Ghon focus is primary infection<br>Ghon complex is primary infection and regional nodal involvement<\/div>"}, {"number": 273, "topic": "Tuberculosis pathology", "stem_html": "At which of the following anatomical sites does dormant tuberculosis most frequently reactivate?", "options": [{"label_html": "Apex of the lung", "is_correct": true}, {"label_html": "Base of the lung", "is_correct": false}, {"label_html": "Brain", "is_correct": false}, {"label_html": "Terminal ileum", "is_correct": false}, {"label_html": "Lumbar spine", "is_correct": false}], "correct_index": 0, "explanation_html": "TB reactivation most commonly occurs at the lung apex. This site is better oxygenated than elsewhere allowing the mycobacteria to multiply more rapidly and then spread both locally and distantly."}, {"number": 274, "topic": "Tuberculosis pathology", "stem_html": "The pathogenicity of the tubercle bacillus is due to which of the following?", "options": [{"label_html": "Necrosis caused by expanding granulomas", "is_correct": false}, {"label_html": "Ability to multiply within fibroblasts", "is_correct": false}, {"label_html": "Delayed hypersensitivity reaction against bacteria", "is_correct": true}, {"label_html": "Effect of antibody response", "is_correct": false}, {"label_html": "Direct toxic effect on host cells", "is_correct": false}], "correct_index": 2, "explanation_html": "Mycobacteria stimulate a specific T cell response of cell mediated immunity. This is effective in reducing the infection, the delayed hypersensitivity also damages tissues. Necrosis occurs in TB but is usually within the granuloma."}, {"number": 275, "topic": "Tuberculosis pathology", "stem_html": "A 24 year old man presents with symptoms of malaise, weight loss and lymphadenopathy. A lymph node biopsy is performed and the subsequent histology report states that there is evidence of granuloma formation and central necrosis. What is the most likely underlying cause?", "options": [{"label_html": "Non Hodgkins lymphoma", "is_correct": false}, {"label_html": "Churg Strauss syndrome", "is_correct": false}, {"label_html": "Epstein Barr Virus infection", "is_correct": false}, {"label_html": "Rheumatoid nodule", "is_correct": false}, {"label_html": "Infection with <i>Mycobacterium tuberculosis<\/i>", "is_correct": true}], "correct_index": 4, "explanation_html": "These histological features are typically seen in TB. Necrosis occurring in granulomas is usually indicative of an underlying infective cause. Churg Strauss syndrome is a form of vasculitis, which is the usual histological finding. Granulomas are reported in the condition, but it is rare for them to demonstrate necrosis."}], "note_html": "<ul><li> Is a form of primary chronic inflammation, caused by the inability of macrophages to kill the <i>Mycobacterium tuberculosis<\/i>. <\/li><li>The macrophages often migrate to regional lymph nodes, the lung lesion plus affected lymph nodes is referred to as a Ghon complex.<\/li><li>This leads to the formation of a granuloma which is a collection of epithelioid histiocytes.  <\/li><li>There is the presence of caseous necrosis in the centre.  <\/li><li>The inflammatory response is mediated by a type 4 hypersensitivity reaction.<\/li><li>In healthy individuals the disease may be contained, in the immunocompromised disseminated (miliary TB) may occur.<\/li><\/ul><br><b>Diagnosis<\/b><br><ul><li>Waxy membrane of mycobacteria prevents binding with normal stains. Ziehl - Neelsen staining is typically used.<\/li><li>Culture based methods take far longer.<\/li><\/ul><br><i>Image showing acid- alcohol fast mycobacteria stained using the Ziehl- Neelsen method<\/i><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb107b.jpg\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb107.jpg\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Ziehl%E2%80%93Neelsen stain\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb107b.jpg\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}, {"name": "Tuberous sclerosis", "questions": [{"number": 276, "topic": "Tuberous sclerosis", "stem_html": "A 35-year-old female is admitted to hospital with hypovolaemic shock. CT abdomen reveals a haemorrhagic lesion in the right kidney. Following surgery and biopsy this is shown to be an angiomyolipomata. What is the most likely underlying diagnosis?", "options": [{"label_html": "Neurofibromatosis", "is_correct": false}, {"label_html": "Budd-Chiari syndrome", "is_correct": false}, {"label_html": "Hereditary haemorrhagic telangiectasia", "is_correct": false}, {"label_html": "Von Hippel-Lindau syndrome", "is_correct": false}, {"label_html": "Tuberous sclerosis", "is_correct": true}], "correct_index": 4, "explanation_html": "<p>No explanation provided.<\/p>"}], "note_html": "Tuberous sclerosis (TS) is a genetic condition of autosomal dominant inheritance. Like neurofibromatosis, the majority of features seen in TS are neuro-cutaneous<br><br>Cutaneous features<br><ul><li>depigmented 'ash-leaf' spots which fluoresce under UV light<\/li><li>roughened patches of skin over lumbar spine (Shagreen patches)<\/li><li>adenoma sebaceum: butterfly distribution over nose<\/li><li>fibromata beneath nails (subungual fibromata)<\/li><li>cafe-au-lait spots* may be seen<\/li><\/ul><br>Neurological features<br><ul><li>developmental delay<\/li><li>epilepsy (infantile spasms or partial)<\/li><li>intellectual impairment<\/li><\/ul><br>Also<br><ul><li>retinal hamartomas: dense white areas on retina (phakomata)<\/li><li>rhabdomyomas of the heart<\/li><li>gliomatous changes can occur in the brain lesions<\/li><li>polycystic kidneys, renal angiomyolipomata<\/li><\/ul><br>*these of course are more commonly associated with neurofibromatosis. However a 1998 study of 106 children with TS found cafe-au-lait spots in 28% of patients"}, {"name": "Tumour grading", "questions": [{"number": 277, "topic": "Tumour grading", "stem_html": "Features which are evaluated for the grading of breast cancer include all the following, except:", "options": [{"label_html": "Tubule formation", "is_correct": false}, {"label_html": "Mitoses", "is_correct": false}, {"label_html": "Nuclear pleomorphism", "is_correct": false}, {"label_html": "Tumour necrosis", "is_correct": true}, {"label_html": "Coarse chromatin", "is_correct": false}], "correct_index": 3, "explanation_html": "The necrosis of a tumour may be suggestive of a high grade tumour which has out grown its blood supply. However, the grading of breast cancer which classically follows the Bloom -Richardson grading model will tend to favor nuclear appearances (which include mitoses, coarse chromatin and pleomorphism). Tubule formation is an important marker of the degree of differentiation with formation of tubular structures being associated with well differentiated tumours."}], "note_html": "Tumours may be graded according to their degree of differentiation, mitotic activity and other features. Grade 1 tumours are the most differentiated and grade 3 or 4 the least. The assessment is subjective, in most cases high grade equates to poor prognosis, or at least rapid growth. <br>Tumours of glandular epithelium will tend to arrange themselves into acinar type structures containing a central lumen. Well differentiated tumours may show excellent acinar formation and poorly differentiated tumours simply clumps of cells around a desmoplastic stroma. Sometimes tumours demonstrate mucous production without evidence of acinar formation. Since mucous production is evidence of a glandular function such tumours are often termed mucinous adenocarcinoma. <br>Squamous cell tumours will typically produce structures resembling epithelial cell components. Well differentiated tumours may also produce keratin (depending upon tissue of origin)."}, {"name": "Tumour markers", "questions": [{"number": 278, "topic": "Tumour markers", "stem_html": "Which of the tumour markers listed below is most likely to be elevated in a patient with ovarian cancer?", "options": [{"label_html": "IgG 4", "is_correct": false}, {"label_html": "CEA", "is_correct": false}, {"label_html": "CA125", "is_correct": true}, {"label_html": "CA19-9", "is_correct": false}, {"label_html": "AFP", "is_correct": false}], "correct_index": 2, "explanation_html": "<p>No explanation provided.<\/p>"}, {"number": 279, "topic": "Tumour markers", "stem_html": "Which of the tumour markers listed below is most likely to be elevated in a patient with colorectal cancer?", "options": [{"label_html": "CEA", "is_correct": true}, {"label_html": "CA19-9", "is_correct": false}, {"label_html": "IgG 4", "is_correct": false}, {"label_html": "AFP", "is_correct": false}, {"label_html": "PSA", "is_correct": false}], "correct_index": 0, "explanation_html": "<p>No explanation provided.<\/p>"}, {"number": 280, "topic": "Tumour markers", "stem_html": "Which of the tumour markers listed below is most likely to be elevated in a patient with pancreatic cancer?", "options": [{"label_html": "CEA", "is_correct": false}, {"label_html": "CA19-9", "is_correct": true}, {"label_html": "AFP", "is_correct": false}, {"label_html": "PSA", "is_correct": false}, {"label_html": "CA15-3", "is_correct": false}], "correct_index": 1, "explanation_html": "<p>No explanation provided.<\/p>"}, {"number": 281, "topic": "Tumour markers", "stem_html": "Which of the tumour markers listed below is most likely to be elevated in a patient with pancreatic cancer?", "options": [{"label_html": "CEA", "is_correct": false}, {"label_html": "CA19-9", "is_correct": true}, {"label_html": "AFP", "is_correct": false}, {"label_html": "PSA", "is_correct": false}, {"label_html": "CA15-3", "is_correct": false}], "correct_index": 1, "explanation_html": "<p>No explanation provided.<\/p>"}], "note_html": "Tumour markers may be divided into:<br><ul><li>monoclonal antibodies against carbohydrate or glycoprotein tumour antigens<\/li><li>tumour antigens<\/li><li>enzymes (alkaline phosphatase, neurone specific enolase)<\/li><li>hormones (e.g. calcitonin, ADH)<\/li><\/ul><br>It should be noted that tumour markers usually have a low specificity<br><br><b>Monoclonal antibodies<\/b><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Tumour marker<\/b><\/th><th><b>Association<\/b><\/th><\/tr><\/thead><tbody><tr><td>CA 125<\/td><td>Ovarian cancer<\/td><\/tr><tr><td>CA 19-9<\/td><td>Pancreatic cancer<\/td><\/tr><tr><td>CA 15-3<\/td><td>Breast cancer<\/td><\/tr><\/tbody><\/table><\/div>NB: The breast cancer tumour marker is not specific or sensitive enough to be used routinely.<br><br><b>Tumour antigens<\/b><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid2\"><thead><tr><th><b>Tumour marker<\/b><\/th><th><b>Association<\/b><\/th><\/tr><\/thead><tbody><tr><td>Prostate specific antigen (PSA)<\/td><td>Prostatic carcinoma<\/td><\/tr><tr><td>Alpha-feto protein (AFP)<\/td><td>Hepatocellular carcinoma, teratoma<\/td><\/tr><tr><td>Carcinoembryonic antigen (CEA)<\/td><td>Colorectal cancer<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Ulcerative colitis and colorectal cancer", "questions": [{"number": 282, "topic": "Ulcerative colitis and colorectal cancer", "stem_html": "Which one of the following is least associated with the development of colorectal cancer in patients with ulcerative colitis?", "options": [{"label_html": "Unremitting disease", "is_correct": false}, {"label_html": "Disease duration &gt; 10 years", "is_correct": false}, {"label_html": "Onset before 15 years old", "is_correct": false}, {"label_html": "Poor compliance to treatment", "is_correct": false}, {"label_html": "Disease confined to the rectum", "is_correct": true}], "correct_index": 4, "explanation_html": "<p>No explanation provided.<\/p>"}], "note_html": "Overview<br><ul><li>risk of colorectal cancer is 10-20 times that of general population<\/li><li>the increased risk is mainly related to chronic inflammation<\/li><li>worse prognosis than patients without ulcerative colitis (partly due to delayed diagnosis)<\/li><li>lesions may be multifocal<\/li><\/ul><br>Factors increasing risk of cancer<br><ul><li>disease duration &gt; 10 years<\/li><li>patients with pancolitis<\/li><li>onset before 15 years old<\/li><li>unremitting disease<\/li><li>poor compliance to treatment<\/li><\/ul>"}, {"name": "Vascular disease", "questions": [{"number": 283, "topic": "Vascular disease", "stem_html": "A 24 year old lady from Western India presents with symptoms of lethargy and dizziness, worse on turning her head. On examination, her blood pressure is 176/128. Her pulses are impalpable at all peripheral sites. Auscultation of her chest reveals a systolic heart murmur. What is the most likely diagnosis?", "options": [{"label_html": "Subclavian steal syndrome", "is_correct": false}, {"label_html": "Aortic coarctation", "is_correct": false}, {"label_html": "Patent ductus arteriosus", "is_correct": false}, {"label_html": "Aortic dissection", "is_correct": false}, {"label_html": "Takayasu's arteritis", "is_correct": true}], "correct_index": 4, "explanation_html": "Takayasu's arteritis most commonly affects young Asian females. Pulseless peripheries are a classical finding. The CNS symptoms may be variable."}, {"number": 284, "topic": "Vascular disease", "stem_html": "A 25 year old junior doctor has a chest x-ray performed as part of a routine insurance medical examination. The x-ray shows evidence of rib notching. Auscultation of his chest reveals a systolic murmur which is loudest at the posterior aspect of the fourth intercostal space. What is the most likely diagnosis?", "options": [{"label_html": "Patent ductus arteriosus", "is_correct": false}, {"label_html": "Aortic coarctation", "is_correct": true}, {"label_html": "Aortic dissection", "is_correct": false}, {"label_html": "Cervical rib", "is_correct": false}, {"label_html": "Subclavian steal syndrome", "is_correct": false}], "correct_index": 1, "explanation_html": "Coarctation of the aorta may occur due to the remnant of the ductus arteriosus acting as a fibrous constrictive band of the aorta. Weak arm pulses may be seen, radiofemoral delay is the classical physical finding. Collateral flow through the intercostal vessels may produce notching of the ribs, if the disease is long standing."}], "note_html": "<div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Aortic dissection<\/b><\/td><td><ul><li>Chest pain (anterior chest pain- ascending aorta, back pain - descending aorta)<\/li><li>Widening of aorta on chest x-ray<\/li><li>Diagnosis made by CT scanning<\/li><li>Treatment is either medical (Type B disease) or surgical (Type A disease)<\/li><\/ul><\/td><\/tr><tr><td><b>Cervical rib<\/b><\/td><td><ul><li>Supernumery fibrous band arising from seventh cervical vertebra<\/li><li>Incidence of 1 in 500<\/li><li>May cause thoracic outlet syndrome<\/li><li>Treatment involves surgical division of rib<\/li><\/ul><\/td><\/tr><tr><td><b>Subclavian steal syndrome<\/b><\/td><td><ul><li>Due to proximal stenotic lesion of the subclavian artery<\/li><li>Results in retrograte flow through vertebral or internal thoracic arteries<\/li><li>The result is that decrease in cerebral blood flow may occur and produce syncopal symptoms<\/li><li>A duplex scan and/ or angiogram will delineate the lesion and allow treatment to be planned<\/li><\/ul><\/td><\/tr><tr><td><b>Takayasu's arteritis<\/b><\/td><td><ul><li>Large vessel granulomatous vasculitis<\/li><li>Results in intimal narrowing <\/li><li>Most commonly affects young asian females<\/li><li>Patients present with features of mild systemic illness, followed by pulseless phase with symptoms of vascular insufficiency<\/li><li>Treatment is with systemic steroids<\/li><\/ul><\/td><\/tr><tr><td><b>Patent ductus arteriosus<\/b><\/td><td><ul><li>Ductus arteriosus is a normal foetal vessel that closes spontaneously after birth<\/li><li>Results in high pressure, oxygenated blood entering the pulmonary circuit<\/li><li>Untreated patients develop symptoms of congestive cardiac failure<\/li><\/ul><\/td><\/tr><tr><td> <b>Coarctation of the aorta<\/b><\/td><td><ul><li>Aortic stenosis at the site of the ductus arteriosus insertion<\/li><li>More prevalent in boys or females with Turners syndrome<\/li><li>Patients may present with symptoms of arterial insufficiency, such as syncope and claudication<\/li><li>Blood pressure mismatch may be seen, as may mismatch of pulse pressure in the upper and lower limbs<\/li><li>Treatment is either with angioplasty or surgical resection (the former is the most common)<\/li><\/ul><\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Vasculitis", "questions": [{"number": 285, "topic": "Vasculitis", "stem_html": "A 20 year old lady is referred to the vascular clinic. She has been feeling generally unwell for the past six weeks. She works as a typist and has noticed increasing pain in her forearms whilst working. On examination, she has absent upper limb pulses. Her ESR is measured and mildly elevated. What is the most likely diagnosis?", "options": [{"label_html": "Polyarteritis nodosa", "is_correct": false}, {"label_html": "Granulomatosis with polyangiitis", "is_correct": false}, {"label_html": "Giant cell arteritis", "is_correct": false}, {"label_html": "Takayasu's arteritis", "is_correct": true}, {"label_html": "Buergers disease", "is_correct": false}], "correct_index": 3, "explanation_html": "Takayasus arteritis may be divided into acute systemic phases and the chronic pulseless phase. In the latter part of the disease process the patient may complain of symptoms such as upper limb claudication. In the later stages of the condition the vessels will typically show changes of intimal proliferation, together with band fibrosis of the intima and media."}, {"number": 286, "topic": "Vasculitis", "stem_html": "A 32 year old man presents to the vascular clinic with symptoms of foot pain during exertion. He is a heavy smoker and has recently tried to stop smoking. On examination, he has normal pulses to the level of the popliteal. However, foot pulses are absent. A diagnostic angiogram is performed which shows an abrupt cut off at the level of the anterior tibial artery, together with the formation of corkscrew shaped collateral vessels distally. What is the most likely diagnosis?", "options": [{"label_html": "Buergers disease", "is_correct": true}, {"label_html": "Granulomatosis with polyangiitis", "is_correct": false}, {"label_html": "Giant cell arteritis", "is_correct": false}, {"label_html": "Takayasu's arteritis", "is_correct": false}, {"label_html": "Polyarteritis nodosa", "is_correct": false}], "correct_index": 0, "explanation_html": "Buergers disease is most common in young male smokers. This demographic is changing in those areas where young female smokers are more common. In the acute lesion the internal elastic lamina of the vessels is usually intact. As the disease progresses the changes progress to hypercellular occlusive thrombus. Tortuous corkscrew collaterals may reconstitute patent segments of the distal tibial or pedal vessels."}, {"number": 287, "topic": "Vasculitis", "stem_html": "A 78 year old man presents with symptoms of headaches and deteriorating vision. He notices that there is marked pain on the right hand side of his face when he combs his hair. What is the most likely diagnosis?", "options": [{"label_html": "Giant cell arteritis", "is_correct": true}, {"label_html": "Granulomatosis with polyangiitis", "is_correct": false}, {"label_html": "Polyarteritis nodosa", "is_correct": false}, {"label_html": "Takayasu's arteritis", "is_correct": false}, {"label_html": "Buergers disease", "is_correct": false}], "correct_index": 0, "explanation_html": "Temporal arteritis may present acutely with symptoms of headache and visual loss, or with a less acute clinical picture. Sight may be threatened and treatment with immunosuppressants should be started promptly. The often requested temporal artery biopsy (which can be the bane of many surgeons) is often non diagnostic and unhelpful."}], "note_html": "The vasculitides are a group of conditions characterised by inflammation of the blood vessel walls. This may, in turn, compromise vessel integrity. Constitutional symptoms may be present. Whilst certain disease subtypes are reported to affect specific vessels, there is often a degree of overlap clinically. <br><br><b>Vessel diameter and vasculitis classification<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Aorta and branches<\/b><\/td><td><ul><li>Takayasu's arteritis<\/li><li>Buergers disease<\/li><li>Giant cell arteritis<\/li><\/ul><\/td><\/tr><tr><td><b>Large and medium sized arteries<\/b><\/td><td><ul><li>Buergers disease<\/li><li>Giant cell arteritis<\/li><li>Polyarteritis nodosa<\/li><\/ul><\/td><\/tr><tr><td><b>Medium sized muscular arteries<\/b><\/td><td><ul><li>Polyarteritis nodosa<\/li><li>Wegeners granulomatosis<\/li><\/ul><\/td><\/tr><tr><td><b>Small muscular arteries<\/b><\/td><td><ul><li>Granulomatosis with polyangiitis<\/li><li>Rheumatoid vasculitis<\/li><\/ul><\/td><\/tr><\/tbody><\/table><\/div><br><b>Specific conditions<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Takyasu's arteritis<\/b><\/td><td><ul><li>Inflammatory, obliterative arteritis affecting aorta and branches<\/li><li>Females&gt; Males<\/li><li>Symptoms may include upper limb claudication<\/li><li>Clinical findings include diminished or absent pulses<\/li><li>ESR often affected during the acute phase<\/li><\/ul><\/td><\/tr><tr><td><b>Buergers disease<\/b><\/td><td><ul><li>Segmental thrombotic occlusions of the small and medium sized lower limb vessels<\/li><li>Commonest in young male smokers<\/li><li>Proximal pulses usually present, but pedal pulses are lost<\/li><li>An acuter hypercellular occlusive thrombus is often present<\/li><li>Tortuous corkscrew shaped collateral vessels may be seen on angiography<\/li><\/ul><\/td><\/tr><tr><td><b>Giant cell arteritis<\/b><\/td><td><ul><li>Systemic granulomatous arteritis that usually affects large and medium sized vessels<\/li><li>Females &gt; Males<\/li><li>Temporal arteritis is commonest type<\/li><li>Granulomatous lesions may be seen on biopsy (although up to 50% are normal)<\/li><\/ul><\/td><\/tr><tr><td><b>Polyarteritis nodosa<\/b><\/td><td><ul><li>Systemic necrotising vasculitis affecting small and medium sized muscular arteries<\/li><li>Most common in populations with high prevalence of hepatitis B<\/li><li>Renal disease is seen in 70% cases<\/li><li>Angiography may show saccular or fusiform aneurysms and arterial stenoses<\/li><\/ul><\/td><\/tr><tr><td><b>Granulomatosis with polyangiitis<\/b><\/td><td><ul><li>Predominantly affects small and medium sized arteries<\/li><li>Systemic necrotising granulomatous vasculitis<\/li><li>Cutaneous vascular lesions may be seen (ulceration, nodules and purpura)<\/li><li>Sinus imaging may show mucosal thickening and air fluid levels<\/li><\/ul><\/td><\/tr><\/tbody><\/table><\/div><br><b>Treatment<\/b><br>Conditions such as Buergers disease are markedly helped by smoking cessation. Immunosupression is the main treatment for vasculitides."}, {"name": "Venous thromboembolism: risk factors", "questions": [{"number": 288, "topic": "Venous thromboembolism: risk factors", "stem_html": "Which one of the following is most associated with an increased risk of venous thromboembolism?", "options": [{"label_html": "Diabetes", "is_correct": false}, {"label_html": "Cannula", "is_correct": false}, {"label_html": "Hyperthyroidism", "is_correct": false}, {"label_html": "Tamoxifen", "is_correct": true}, {"label_html": "Amiodarone", "is_correct": false}], "correct_index": 3, "explanation_html": "Consider thromboembolism in breast cancer patients on tamoxifen!"}], "note_html": "Common predisposing factors include malignancy, pregnancy and the period following an operation. The comprehensive list below is partly based on the 2010 SIGN venous thromboembolism (VTE) guidelines:<br><br>General<br><ul><li>increased risk with advancing age<\/li><li>obesity<\/li><li>family history of VTE<\/li><li>pregnancy (especially puerperium)<\/li><li>immobility<\/li><li>hospitalisation<\/li><li>anaesthesia<\/li><li>central venous catheter: femoral &gt;&gt; subclavian<\/li><\/ul><br>Underlying conditions<br><ul><li>malignancy<\/li><li>thrombophilia: e.g. Activated protein C resistance, protein C and S deficiency<\/li><li>heart failure<\/li><li>antiphospholipid syndrome<\/li><li>Behcet's<\/li><li>polycythaemia<\/li><li>nephrotic syndrome<\/li><li>sickle cell disease<\/li><li>paroxysmal nocturnal haemoglobinuria<\/li><li>hyperviscosity syndrome<\/li><li>homocystinuria<\/li><\/ul><br>Medication<br><ul><li>combined oral contraceptive pill: 3rd generation more than 2nd generation<\/li><li>hormone replacement therapy<\/li><li>raloxifene and tamoxifen<\/li><li>antipsychotics (especially olanzapine) have recently been shown to be a risk factor<\/li><\/ul><br>SIGN also state that the following are risk factors for recurrent VTE:<br><ul><li>previous unprovoked VTE<\/li><li>male sex<\/li><li>obesity<\/li><li>thrombophilias<\/li><\/ul>"}, {"name": "Vitamin C deficiency", "questions": [{"number": 289, "topic": "Vitamin C deficiency", "stem_html": "A 64-year-old woman is reviewed due to multiple non-healing leg ulcers. She reports feeling generally unwell for many months. Examination findings include a blood pressure of 138/72 mmHg, pulse 90 bpm, pale conjunctivae and poor dentition associated with bleeding gums. What is the most likely underlying diagnosis?", "options": [{"label_html": "Thyrotoxicosis", "is_correct": false}, {"label_html": "Vitamin B12 deficiency", "is_correct": false}, {"label_html": "Vitamin C deficiency", "is_correct": true}, {"label_html": "Diabetes mellitus", "is_correct": false}, {"label_h
