re of neuropraxia?", "options": [{"label_html": "Transient delay in neuronal transmission", "is_correct": false}, {"label_html": "Axonal degeneration distal to the site of injury", "is_correct": true}, {"label_html": "Absence of neuroma formation", "is_correct": false}, {"label_html": "Preservation of autonomic function", "is_correct": false}, {"label_html": "Absence of axonal degeneration proximal to the site of injury", "is_correct": false}], "correct_index": 1, "explanation_html": "Full recovery may occur 6-8 weeks after nerve injury in neuropraxia.<br>Wallerian degeneration does not usually occur in simple neuropraxia.<br>Autonomic function is usually preserved."}, {"number": 189, "topic": "Nerve injury", "stem_html": "During a difficult femoro-popliteal bypass operation the surgeon inadvertently places a clamp across the femoral nerve. It remains there for most of the procedure. At the end of the operation the nerve is inspected, it is in continuity but has evidence of being crushed. Which of the following is most likely to occur over the following weeks?", "options": [{"label_html": "Wallerian degeneration", "is_correct": true}, {"label_html": "Rapid restoration of neuronal function because the axon itself is intact", "is_correct": false}, {"label_html": "Normal but delayed neuronal transmission due to disruption of the myelin", "is_correct": false}, {"label_html": "Absence of neuroma formation", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 0, "explanation_html": "A neuronal injury such as this will result in Wallerian degeneration even though the nerve remains in continuity. Neuromas may well form."}, {"number": 190, "topic": "Nerve injury", "stem_html": "A laceration of the wrist produces a median nerve transection. The wound is clean and seen immediately after injury. Collateral soft tissue damage is absent. The patient asks what the prognosis is. You indicate that the nerve should regrow at approximately:", "options": [{"label_html": "0.1 mm per day", "is_correct": false}, {"label_html": "1 mm per day", "is_correct": true}, {"label_html": "5 mm per day", "is_correct": false}, {"label_html": "1 cm per day", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 1, "explanation_html": "Transection of a peripheral nerve results in hemorrhage and retraction of the severed nerve ends. Almost immediately, degeneration of the axon distal to the injury begins. Degeneration also occurs in the proximal fragment back to the first node of Ranvier. Phagocytosis of the degenerated axonal fragments leaves neurilemmal sheath with empty cylindrical spaces where the axons were. Several days following the injury, axons from the proximal fragment begin to regrow. If they make contact with the distal neurilemmal sheath, regrowth occurs at about the rate of 1 mm/day. However, if associated trauma, fracture, infection, or separation of neurilemmal sheath ends precludes contact between axons, growth is haphazard and a traumatic neuroma is formed. When neural transection is associated with widespread soft tissue damage and hemorrhage (with increased probability of infection), many surgeons choose to delay reapproximation of the severed nerve end for 3 to 4 weeks."}], "note_html": "There are 3 types of nerve injury:<br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Neuropraxia<\/b><\/td><td><ul><li>Nerve intact but electrical conduction is affected<\/li><li>Full recovery<\/li><li>Autonomic function preserved<\/li><li>Wallerian degeneration does not occur<\/li><\/ul><\/td><\/tr><tr><td><b>Axonotmesis<\/b><\/td><td><ul><li>Axon is damaged and the myelin sheath is preserved. The connective tissue framework is not affected.<\/li><li>Wallerian degeneration occurs.<\/li><\/ul><\/td><\/tr><tr><td><b>Neurotmesis<\/b><\/td><td><ul><li>Disruption of the axon, myelin sheath and surrounding connective tissue.<\/li><li>Wallerian degeneration occurs.<\/li><\/ul><\/td><\/tr><\/tbody><\/table><\/div><br><b>Wallerian Degeneration<\/b><br><ul><li>Axonal degeneration distal to the site of injury.<\/li><li>Typically begins 24-36 hours following injury.<\/li><li>Axons are excitable prior to degeneration occurring.<\/li><li>Myelin sheath degenerates and is phagocytosed by tissue macrophages.<\/li><\/ul><br><b>Nerve repair<\/b><br><ul><li>Neuronal repair may only occur physiologically where nerves are in direct contact. Where a large defect is present, the process of nerve regeneration is hampered. It may not occur at all or result in the formation of a neuroma. Where nerve regrowth occurs it is typically at a rate of 1mm per day.<\/li><\/ul>"}, {"name": "Neuropraxia", "questions": [{"number": 191, "topic": "Neuropraxia", "stem_html": "A 20 year old man is involved in a road traffic accident. Following the incident he is unable to extend his wrist. However, this improves over the following weeks. Which type of injury is he most likely to have sustained?", "options": [{"label_html": "Radial nerve neurotmesis", "is_correct": false}, {"label_html": "Radial nerve neuropraxia", "is_correct": true}, {"label_html": "Axillary nerve axonotmesis", "is_correct": false}, {"label_html": "Ulnar nerve neuropraxia", "is_correct": false}, {"label_html": "Ulnar nerve axonotmesis", "is_correct": false}], "correct_index": 1, "explanation_html": "Transient loss of function makes neuropraxia the most likely injury. The wrist extensors are innervated by the radial nerve making this the most likely site of injury."}], "note_html": "<ul><li>Nerve intact but electrical conduction is affected<\/li><li>Myelin sheath integrity is preserved<\/li><li>Full recovery<\/li><li>Autonomic function preserved<\/li><li>Wallerian degeneration does not occur<\/li><\/ul>"}, {"name": "Nipple discharge", "questions": [{"number": 192, "topic": "Nipple discharge", "stem_html": "A 23 year old woman presents with greenish nipple discharge on one occasion. Clinical examination of the breast is normal. Ultrasound report is U1. What is the best course of action?", "options": [{"label_html": "Arrange a mammogram", "is_correct": false}, {"label_html": "Undertake a total duct excision", "is_correct": false}, {"label_html": "Undertake a microdochectomy", "is_correct": false}, {"label_html": "Reassure and discharge", "is_correct": true}, {"label_html": "Express duct fluid for cytology", "is_correct": false}], "correct_index": 3, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Undertaking cytology of nipple discharge fluid is unhelpful and adds very little to management.<\/div>This is likely to be simple duct ectasia and U1 (normal USS) coupled with normal examination would favor discharge from clinic. Mammography is generally unhelpful in this age group."}, {"number": 193, "topic": "Nipple discharge", "stem_html": "A 43 year old woman has had recurrent episodes of breast infections. She has received multiple courses of antibiotics and is troubled by persisting green nipple discharge. Clinical examination reveals green nipple discharge, but no discrete lump. Imaging with mammography and ultrasound is reassuring (U2, M2). What is the best course of action?", "options": [{"label_html": "Undertake a Hadfields procedure", "is_correct": true}, {"label_html": "Undertake a microdochectomy", "is_correct": false}, {"label_html": "Arrange a breast MRI scan", "is_correct": false}, {"label_html": "Express fluid for cytology", "is_correct": false}, {"label_html": "Prescribe danazol", "is_correct": false}], "correct_index": 0, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Multiple duct pathology= total duct excision<br>Single duct pathology= microdochectomy<\/div>This woman has troublesome duct ectasia and total duct excision is warranted."}, {"number": 194, "topic": "Nipple discharge", "stem_html": "A 55 year old woman complains of nipple discharge. This was blood stained on one occasion. But not subsequently. Clinical examination shows clear fluid but no discrete lump. Imaging with ultrasound and mammography is normal. What is the best course of action?", "options": [{"label_html": "Mastectomy", "is_correct": false}, {"label_html": "Total duct excision", "is_correct": false}, {"label_html": "Microdochectomy", "is_correct": true}, {"label_html": "Discharge", "is_correct": false}, {"label_html": "Mammographic surveillence", "is_correct": false}], "correct_index": 2, "explanation_html": "Although this is likely to be benign disease, her age coupled with an episode of blood stained discharge would attract a recommendation for microdochectomy. She may have an intraductal papilloma. But the concern would be DCIS."}, {"number": 195, "topic": "Nipple discharge", "stem_html": "A 52 year old lady is referred to the breast clinic with symptoms of nipple discharge. The discharge is usually thick and green. Which of the following statements relating to the most likely underlying diagnosis is untrue?", "options": [{"label_html": "The majority of patients will be smokers", "is_correct": false}, {"label_html": "Typically produces blood stained nipple discharge", "is_correct": true}, {"label_html": "It is not associated with increased risk of breast cancer", "is_correct": false}, {"label_html": "May result in development of mammary duct fistula", "is_correct": false}, {"label_html": "May require total duct excision (Hadfields operation) if it fails to resolve", "is_correct": false}], "correct_index": 1, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Blood stained nipple discharge should always be investigated.<br>Nipple fluid cytology is generally unhelpful.<\/div>Discharge of this type of material is most likely to be due to duct ectasia. Green or brown discharge is most common. Blood stained discharge should raise concern of intraductal papilloma or cancer."}], "note_html": "<b>Causes of nipple discharge<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Physiological<\/b><\/td><td>During breast feeding<\/td><\/tr><tr><td><b>Galactorrhoea<\/b><\/td><td>Commonest cause may be response to emotional events, drugs such as histamine receptor antagonists are also implicated<\/td><\/tr><tr><td><b>Hyperprolactinaemia<\/b><\/td><td><ul><li>Commonest type of pituitary tumour<\/li><li>Microadenomas &lt;1cm in diameter<\/li><li>Macroadenomas &gt;1cm in diameter<\/li><li>Pressure on optic chiasm may cause bitemporal hemianopia<\/li><\/ul><\/td><\/tr><tr><td><b>Mammary duct ectasia<\/b><\/td><td><ul><li>Dilatation breast ducts.<\/li><li>Most common in menopausal women<\/li><li>Discharge typically thick and green in colour<\/li><li>Most common in smokers<\/li><\/ul><\/td><\/tr><tr><td><b>Carcinoma<\/b><\/td><td><ul><li>Often blood stained<\/li><li>May be underlying mass or axillary lymphadenopathy<\/li><\/ul><\/td><\/tr><tr><td><b>Intraductal papilloma<\/b><\/td><td><ul><li>Commoner in younger patients<\/li><li>May cause blood stained discharge<\/li><li>There is usually no palpable lump<\/li><\/ul><\/td><\/tr><\/tbody><\/table><\/div><br><b>Assessment of patients<\/b><br><ul><li>Examine breast and determine whether there is mass lesion present<\/li><li>All mass lesions should undergo <i>Triple assessment<\/i>.<\/li><\/ul><br><b>Reporting of investigations<\/b><br>Where a mass lesion is suspected or investigations are requested these are prefixed using a system that denotes the investigation type e.g. M for mammography, followed by a numerical code as shown below:<br><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td>1<\/td><td>No abnormality<\/td><\/tr><tr><td>2<\/td><td>Abnormality with benign features<\/td><\/tr><tr><td>3<\/td><td>Indeterminate probably benign<\/td><\/tr><tr><td>4<\/td><td>Indeterminate probably malignant<\/td><\/tr><tr><td>5<\/td><td>Malignant<\/td><\/tr><\/tbody><\/table><\/div><br><b>Management of non malignant nipple discharge<\/b><br><ul><li>Exclude endocrine disease<\/li><li>Nipple cytology unhelpful<\/li><li>Smoking cessation advice for duct ectasia<\/li><li>For duct ectasia with severe symptoms, total duct excision may be warranted.<\/li><\/ul>"}, {"name": "Nottingham prognostic index", "questions": [{"number": 196, "topic": "Nottingham prognostic index", "stem_html": "A 39 year old lady has undergone surgery for breast cancer. As part of the histopathology report the pathologist provides the surgeon with a Nottingham Prognostic Index score of 6.4. He also states that the tumour size is 2cm. Which of the following inferences can be made in relation to this statement?", "options": [{"label_html": "The tumour is likely to be grade 1", "is_correct": false}, {"label_html": "Vascular invasion is present", "is_correct": false}, {"label_html": "Lymph node metastasis are definitely present", "is_correct": true}, {"label_html": "The tumour is oestrogen receptor positive", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 2, "explanation_html": "A score of this value is unlikely to be reached with a grade 1 tumour and a size of 2cm. Therefore lymph node metastasis are definitely present. In addition since the maximal score for lymph node metastasis is 3 the tumour is likely be of a higher grade (see below). The Nottingham Prognostic Index provides no information about oestrogen receptor status or the presence or absence of vascular invasion."}, {"number": 197, "topic": "Nottingham prognostic index", "stem_html": "A lady has undergone breast cancer surgery and the pathological analysis of the specimen is completed. Which of the Nottingham Prognostic Index scores shown below would correlate with the best long term outcome?", "options": [{"label_html": "5.4", "is_correct": false}, {"label_html": "2.2", "is_correct": true}, {"label_html": "2.5", "is_correct": false}, {"label_html": "3.0", "is_correct": false}, {"label_html": "6.0", "is_correct": false}], "correct_index": 1, "explanation_html": "The Nottingham prognostic index may be used to stratify patients into various prognostic groups (see below). An excellent prognosis is seen with a score of &lt;2.4. Scores of over 5 equate to a greatly reduced survival rate."}], "note_html": "The Nottingham Prognostic Index can be used to give an indication of survival following breast cancer surgery. In this system, the tumour size is weighted less heavily than other major prognostic parameters.<br><br>Calculation of <b>NPI<\/b><br><b>Tumour Size<\/b> x 0.2 + <b>Lymph node score<\/b>(From table below)+<b>Grade score<\/b>(From table below).<br><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td>  <br><b>Score<\/b><\/td><td><b>Lymph nodes involved<\/b><\/td><td><b>Grade<\/b><\/td><\/tr><tr><td>1<\/td><td>0<\/td><td>1<\/td><\/tr><tr><td>2<\/td><td>1-3<\/td><td>2<\/td><\/tr><tr><td>3<\/td><td>&gt;3<\/td><td>3<\/td><\/tr><\/tbody><\/table><\/div><br><b>Prognosis<\/b><br><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Score<\/b><\/td><td><b>Percentage 5 year survival<\/b><\/td><\/tr><tr><td>2.0 to 2.4<\/td><td>93%<\/td><\/tr><tr><td>2.5 to 3.4<\/td><td>85%<\/td><\/tr><tr><td>3.5 to 5.4<\/td><td>70%<\/td><\/tr><tr><td>&gt;5.4<\/td><td>50%<\/td><\/tr><\/tbody><\/table><\/div><br>This data was originally published in 1992. It should be emphasised that other factors such as vascular invasion and receptor status also impact on survival and are not included in this data and account for varying prognoses often cited in the literature.<br><br><b>Reference<\/b><br>Galea, M.H., et al., The Nottingham Prognostic Index in primary breast cancer. Breast Cancer Res Treat, 1992. 22(3): p. 207-19."}, {"name": "Occupational cancers", "questions": [{"number": 198, "topic": "Occupational cancers", "stem_html": "Beta-naphthalamine is associated with which of the following malignancies?", "options": [{"label_html": "Lung cancer", "is_correct": false}, {"label_html": "Bowel cancer", "is_correct": false}, {"label_html": "Bladder cancer", "is_correct": true}, {"label_html": "Liver cancer", "is_correct": false}, {"label_html": "Renal cancer", "is_correct": false}], "correct_index": 2, "explanation_html": "Beta-naphthalamine is used in the rubber industry.<br><br>The following factors are associated with the development of bladder cancer:<br><ul><li>smoking<\/li><li>occupational: aniline dyes used in printing and textile industry, rubber manufacture<\/li><li>schistosomiasis<\/li><li>drugs: cyclophosphamide<\/li><\/ul>"}, {"number": 199, "topic": "Occupational cancers", "stem_html": "Which of the following statements relating to malignant mesothelioma is false?", "options": [{"label_html": "It may be treated by extrapleural pneumonectomy.", "is_correct": false}, {"label_html": "It is linked to asbestos exposure.", "is_correct": false}, {"label_html": "It is linked to cigarette smoking independent of asbestos exposure.", "is_correct": true}, {"label_html": "It may occur intra abdominally.", "is_correct": false}, {"label_html": "It is relatively resistant to radiotherapy", "is_correct": false}], "correct_index": 2, "explanation_html": "It is not linked to cigarette smoking. When identified at an early stage a radical resection is the favored option. Radiotherapy is often given perioperatively. However, it is not a particularly radiosensitive tumour. Combination chemotherapy gives some of the best results and most regimes are cisplatin based."}, {"number": 200, "topic": "Occupational cancers", "stem_html": "A 64 year old man presents to the clinic with right upper quadrant discomfort. He has never attended the hospital previously and is usually well. He has just retired from full time employment as a machinist in a PVC factory. CT scanning shows a large irregular tumour in the right lobe of his liver. Which of the following lesions is the most likely?", "options": [{"label_html": "Liposarcoma", "is_correct": false}, {"label_html": "Angiosarcoma", "is_correct": true}, {"label_html": "Hamartoma", "is_correct": false}, {"label_html": "Hyatid liver disease", "is_correct": false}, {"label_html": "Benign angioma", "is_correct": false}], "correct_index": 1, "explanation_html": "Angiosarcoma of the liver is a rare tumour. However, it is linked to working with vinyl chloride, as in this case. Although modern factories minimise the exposure to this agent, this has not always been the case."}], "note_html": "Occupational cancers accounted for 5.3% cancer deaths in 2005.<br>In men the main cancers include:<br><ul><li>Mesothelioma <\/li><li>Bladder cancer<\/li><li>Non melanoma skin cancer<\/li><li>Lung cancer<\/li><li>Sino nasal cancer<\/li><\/ul><br>Occupations with high levels of occupational tumours include:<br><ul><li>Construction industry <\/li><li>Working with coal tar and pitch<\/li><li>Mining<\/li><li>Metalworkers<\/li><li>Working with asbestos (accounts for 98% of all mesotheliomas)<\/li><li>Working in rubber industry <\/li><\/ul><br>Shift work has been linked to breast cancer in women (Health and safety executive report RR595). <br><br>The latency between exposure and disease is typically 15 years for solid tumours and 20 for leukaemia.<br><br>Many occupational cancers are otherwise rare. For example sino nasal cancer is an uncommon tumour, 50% will be SCC. They are linked to conditions such as wood dust exposure and unlike lung cancer is not strongly linked to cigarette smoking. Another typical occupational tumour is angiosarcoma of the liver which is linked to working with vinyl chloride. Again in the non occupational context this is an extremely rare sporadic tumour."}, {"name": "Oesophageal cancer", "questions": [{"number": 201, "topic": "Oesophageal cancer", "stem_html": "A 55 year old man with a long history of achalasia is successfully treated by a Hellers Cardiomyotomy. Several years later he develops an oesophageal malignancy. Which of the following lesions is most likely to be present?", "options": [{"label_html": "Adenocarcinoma", "is_correct": false}, {"label_html": "Gastrointestinal stromal tumour", "is_correct": false}, {"label_html": "Leiomyosarcoma", "is_correct": false}, {"label_html": "Rhabdomyosarcoma", "is_correct": false}, {"label_html": "Squamous cell carcinoma", "is_correct": true}], "correct_index": 4, "explanation_html": "Achalasia is a rare condition. However, even once treated there is an increased risk of malignancy. When it does occur it is most likely to be of squamous cell type."}, {"number": 202, "topic": "Oesophageal cancer", "stem_html": "Which of these lesions is most closely associated with Barretts oesophagus?", "options": [{"label_html": "Squamous cell carcinoma", "is_correct": false}, {"label_html": "Gastro intestinal stromal tumours", "is_correct": false}, {"label_html": "Carcinoid tumours", "is_correct": false}, {"label_html": "Leiomyosarcoma", "is_correct": false}, {"label_html": "Adenocarcinoma", "is_correct": true}], "correct_index": 4, "explanation_html": "Barretts oesophagus is most closely associated with adenocarcinoma, and it confers a 30 fold increased risk of developing the condition."}, {"number": 203, "topic": "Oesophageal cancer", "stem_html": "Which of the following is not considered a risk factor for the development of oesophageal malignancy?", "options": [{"label_html": "Oesophageal metaplasia", "is_correct": false}, {"label_html": "Smoking", "is_correct": false}, {"label_html": "Excessive intake of alcoholic spirits", "is_correct": false}, {"label_html": "Achalasia", "is_correct": false}, {"label_html": "Blood group O", "is_correct": true}], "correct_index": 4, "explanation_html": "Blood group O is not a risk factor for oesophageal cancer. Achalasia is associated with the risk of developing squamous cell carcinoma of the oesophagus."}], "note_html": "- Incidence is increasing<br><ul><li>In most cases in the Western world this increase is accounted for by a rise in the number of cases of adenocarcinoma.  In the UK adenocarcinomas account for 65% of cases. <\/li><li>Barretts oesophagus is a major risk factor for most cases of oesophageal adenocarcinoma. <\/li><li>In other regions of the world squamous cancer is more common and is linked to smoking, alcohol intake, diets rich in nitrosamines and achalasia. <\/li><li>Surveillance of Barretts is important, as it imparts a 30 fold increase in cancer risk and if invasive malignancy is diagnosed early then survival may approach 85% at 5 years. <\/li><\/ul><br><b>Diagnosis<\/b><br><ul><li>Upper GI endoscopy is the first line test<\/li><li>Contrast swallow may be of benefit in classifying benign motility disorders but has no place in the assessment of tumours<\/li><li>Staging is initially undertaken with CT scanning of the chest, abdomen and pelvis. If overt metastatic disease is identified using this modality then further complex imaging is unnecessary <\/li><li>If CT does not show metastatic disease, then local stage may be more accurately assessed by use of endoscopic ultrasound.<\/li><li>Staging laparoscopy is performed to detect occult peritoneal disease. PET CT is performed in those with negative laparoscopy. Thoracoscopy is not routinely performed.<\/li><\/ul><br><b>Treatment<\/b><br>Operable disease is best managed by surgical resection. The most standard procedure is an Ivor- Lewis type oesophagectomy. This procedure involves the mobilisation of the stomach and division of the oesophageal hiatus. The abdomen is closed and a right sided thoracotomy performed. The stomach is brought into the chest and the oesophagus mobilised further. An intrathoracic oesophagogastric anastomosis is constructed. Alternative surgical strategies include a transhiatal resection (for distal lesions), a left thoraco-abdominal resection (difficult access due to thoracic aorta) and a total oesophagectomy (McKeown) with a cervical oesophagogastric anastomosis.<br>The biggest surgical challenge is that of anastomotic leak, with an intrathoracic anastomosis this will result in mediastinitis. With high mortality. The McKeown technique has an intrinsically lower systemic insult in the event of anastomotic leakage.<br><br>In addition to surgical resection many patients will be treated with adjuvant chemotherapy."}, {"name": "Oesophageal candidiasis", "questions": [{"number": 204, "topic": "Oesophageal candidiasis", "stem_html": "A 43 year old man presents with a 3 week history of malaise, sore throat, odynophagia and dysphagia. On examination he is found to have patchy white spots in his oropharynx. An upper GI endoscopy is performed and similar lesions are identified in the oesophagus. Which investigation is most likely to identify the underlying pathology in this case?", "options": [{"label_html": "Serum urea and electrolytes", "is_correct": false}, {"label_html": "Oesophageal biopsy for culture", "is_correct": false}, {"label_html": "Oesophageal biopsy for histology", "is_correct": false}, {"label_html": "Glucose tolerance testing", "is_correct": false}, {"label_html": "Viral serology", "is_correct": true}], "correct_index": 4, "explanation_html": "Oesophageal candidiasis is associated with immunosupression; mainly in patients on chemotherapy, with haematological malignancy, HIV or inhaled steroids.  In patients with HIV, oesophageal candidiasis is part of the spectrum of AIDS defining illnesses and usually occurs when the CD4 count is less than 200. Others include PCP pneumonia and CMV infections."}], "note_html": "Characterised by white spots in the oropharynx with extension into the oesophagus. Associated with broad spectrum antibiotic usage, immunosupression and immunological disorders. <br>Patients may present with oropharyngeal symptoms, odynophagia and dysphagia.<br>Treatment is directed both at the underlying cause (which should be investigated for) and with oral antifungal agents."}, {"name": "Oncogenes", "questions": [{"number": 205, "topic": "Oncogenes", "stem_html": "Which of the following is not an oncogene?", "options": [{"label_html": "ras", "is_correct": false}, {"label_html": "myc", "is_correct": false}, {"label_html": "sis", "is_correct": false}, {"label_html": "Ki 67", "is_correct": true}, {"label_html": "erb-B", "is_correct": false}], "correct_index": 3, "explanation_html": "Ki 67 is a nuclear proliferation marker (used in immunohistochemistry). Although, Ki67 positivity is a marker of malignancy, it is not itself, an oncogene."}, {"number": 206, "topic": "Oncogenes", "stem_html": "Which one of the following genes protects against neoplasms?", "options": [{"label_html": "sis", "is_correct": false}, {"label_html": "p53", "is_correct": true}, {"label_html": "ras", "is_correct": false}, {"label_html": "myc", "is_correct": false}, {"label_html": "src", "is_correct": false}], "correct_index": 1, "explanation_html": "p53 is a tumour supressor gene and located on chromosome 17. It plays an important role in causing cells that are undergoing neoplastic changes to enter an apoptotic pathway."}], "note_html": "Oncogenes are cancer promoting genes that are derived from normal genes (proto-oncogenes). Proto-oncogenes play an important physiological role in cellular growth. They are implicated in the development of up to 20% of human cancers. <br><br>Proto-oncogenes may become oncogenes via the following processes:<br><ul><li>Mutation (point mutation)<\/li><li>Chromosomal translocation<\/li><li>Increased protein expression<\/li><\/ul>Only one mutated copy of the gene is needed for cancer to occur - a dominant effect<br><br><b>Classification of oncogenes<\/b><br><ul><li>Growth factors e.g. Sis<\/li><li>Transcription factors e.g. Myc<\/li><li>Receptor tyrosine kinase e.g. RET<\/li><li>Cytoplasmic tyrosine kinase e.g.  Src<\/li><li>Regulatory GTPases e.g. Ras<\/li><\/ul><br><b>Tumour suppressor genes<\/b><br>Tumour suppressor genes restrict or repress cellular proliferation in normal cells. Their inactivation through mutation or germ line incorporation is implicated in renal, colonic, breast, bladder and many other cancers. One of the best known tumour suppressor genes is p53. p53 gene offers protection by causing apoptosis of damaged cells. Other well known genes include BRCA 1 and 2."}, {"name": "Oncoviruses", "questions": [{"number": 207, "topic": "Oncoviruses", "stem_html": "A 53 year old man presents with an ulcerated mass at the anal verge. A biopsy is taken and the histology demonstrates as squamous cell carcinoma. Infection with which of the viruses below is most likely to have contributed to the development of the condition?", "options": [{"label_html": "Human papillomavirus 7", "is_correct": false}, {"label_html": "Human immunodeficiency virus 1", "is_correct": false}, {"label_html": "Human immunodeficiency virus 2", "is_correct": false}, {"label_html": "Human papillomavirus 16", "is_correct": true}, {"label_html": "Human T-lymphotropic virus 1", "is_correct": false}], "correct_index": 3, "explanation_html": "Infection with human papilloma virus 16 is a risk factor for the development of intra epithelial dysplasia of the anal skin with subsequent increased risk of invasive malignancy."}, {"number": 208, "topic": "Oncoviruses", "stem_html": "Which of the following is not associated with Epstein-Barr virus?", "options": [{"label_html": "Burkitt's lymphoma", "is_correct": false}, {"label_html": "Post-transplantation lymphoma", "is_correct": false}, {"label_html": "Hodgkin's lymphoma", "is_correct": false}, {"label_html": "Nasopharyngeal carcinoma", "is_correct": false}, {"label_html": "Mycosis fungoides", "is_correct": true}], "correct_index": 4, "explanation_html": "<p>No explanation provided.<\/p>"}, {"number": 209, "topic": "Oncoviruses", "stem_html": "Which of the following cancers is not associated with the human papillomavirus?", "options": [{"label_html": "Anal cancer", "is_correct": false}, {"label_html": "Oropharyngeal cancer", "is_correct": false}, {"label_html": "Tracheal cancer", "is_correct": true}, {"label_html": "Vulval cancer", "is_correct": false}, {"label_html": "Penile cancer", "is_correct": false}], "correct_index": 2, "explanation_html": "HPV is associated with:<br><br>1. Cervical cancer (HPV 16/18 most common)<br>2. Anal cancer<br>3. Penile cancer<br>4. Vulval cancer<br>5. Oropharyngeal cancer"}, {"number": 210, "topic": "Oncoviruses", "stem_html": "Which virus is associated with Kaposi's sarcoma?", "options": [{"label_html": "Human herpes virus 8", "is_correct": true}, {"label_html": "Human papillomavirus 16", "is_correct": false}, {"label_html": "Human T-lymphotropic virus 1", "is_correct": false}, {"label_html": "Epstein-Barr virus", "is_correct": false}, {"label_html": "Human papillomavirus 18", "is_correct": false}], "correct_index": 0, "explanation_html": "<p>No explanation provided.<\/p>"}, {"number": 211, "topic": "Oncoviruses", "stem_html": "Which virus is implicated in cervical carcinoma?", "options": [{"label_html": "Human papilloma virus 16", "is_correct": true}, {"label_html": "Human papilloma virus 2", "is_correct": false}, {"label_html": "Human herpes virus 8", "is_correct": false}, {"label_html": "Human herpes virus 2", "is_correct": false}, {"label_html": "Epstein-Barr virus", "is_correct": false}], "correct_index": 0, "explanation_html": "<p>No explanation provided.<\/p>"}], "note_html": "<ul><li>Viruses which cause cancer<\/li><li>These may be detected on blood test and prevented by vaccine<\/li><\/ul><br>These are the main types of oncoviruses and their diseases:<br><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Oncovirus<\/b><\/td><td><b>\tCancer<\/b><\/td><\/tr><tr><td>Epstein-Barr virus<\/td><td>Burkitt's lymphoma<br>Hodgkin's lymphoma<br>Post transplant lymphoma<br>Nasopharyngeal carcinoma<\/td><\/tr><tr><td>Human papillomavirus 16/18<\/td><td>\tCervical cancer<br>Anal cancer<br>Penile cancer<br>Vulval cancer<br>Oropharyneal cancer<\/td><\/tr><tr><td>Human herpes virus 8\t<\/td><td>Kaposi's sarcoma<\/td><\/tr><tr><td>Hepatitis B virus\t<\/td><td>Hepatocellular carcinoma<\/td><\/tr><tr><td>Hepatitis C virus\t<\/td><td>Hepatocellular carcinoma<\/td><\/tr><tr><td>Human T-lymphotropic virus 1\t<\/td><td>Tropical spastic paraparesis<br>Adult T cell leukaemia<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Osteopetrosis", "questions": [{"number": 212, "topic": "Osteopetrosis", "stem_html": "The pathogenesis of osteopetrosis is best explained by a defect in which of the following?", "options": [{"label_html": "Osteoclast function", "is_correct": true}, {"label_html": "PTH receptors", "is_correct": false}, {"label_html": "Osteoblast function", "is_correct": false}, {"label_html": "Calcium resorption in proximal tubule", "is_correct": false}, {"label_html": "Calcium absorption", "is_correct": false}], "correct_index": 0, "explanation_html": "<p>No explanation provided.<\/p>"}], "note_html": "Overview<br><ul><li>Also known as marble bone disease<\/li><li>Rare disorder of defective osteoclast function resulting in failure of normal bone resorption<\/li><li>Stem cell transplant and interferon-gamma have been used for treatment<\/li><\/ul>"}, {"name": "Osteoporosis", "questions": [{"number": 213, "topic": "Osteoporosis", "stem_html": "Which one of the following confers the least risk of developing osteoporosis?", "options": [{"label_html": "Obesity", "is_correct": true}, {"label_html": "Long term unfractionated heparin therapy", "is_correct": false}, {"label_html": "Gastrectomy", "is_correct": false}, {"label_html": "Osteogenesis imperfecta", "is_correct": false}, {"label_html": "Diabetes", "is_correct": false}], "correct_index": 0, "explanation_html": "Low body weight is a risk factor for osteoporosis."}], "note_html": "Risk factors<br><ul><li>Family history<\/li><li>Female sex<\/li><li>Increasing age<\/li><li>Deficient diet<\/li><li>Sedentary lifestyle<\/li><li>Smoking<\/li><li>Premature menopause<\/li><li>Low body weight <\/li><li>Caucasians and Asians<\/li><\/ul><br>Diseases which predispose<br><ul><li>Endocrine: glucocorticoid excess (e.g. Cushing's, steroid therapy),  hyperthyroidism, hypogonadism (e.g. Turner's, testosterone deficiency), growth hormone deficiency, hyperparathyroidism, diabetes mellitus<\/li><li>Multiple myeloma, lymphoma<\/li><li>Gastrointestinal problems: inflammatory bowel disease, malabsorption (e.g. Coeliacs), gastrectomy, liver disease<\/li><li>Rheumatoid arthritis<\/li><li>Long term heparin therapy<\/li><li>Chronic renal failure<\/li><li>Osteogenesis imperfecta, homocystinuria<\/li><\/ul>"}, {"name": "Pagets disease", "questions": [{"number": 214, "topic": "Pagets disease", "stem_html": "A 73 year old man presents with pain in the right leg. It is most uncomfortable on walking. On examination, he has a deformity of his right femur, which on x-ray is thickened and sclerotic. His serum alkaline phosphatase is elevated, but calcium is within normal limits. What is the most probable underlying diagnosis?", "options": [{"label_html": "Rickets", "is_correct": false}, {"label_html": "Pagets disease", "is_correct": true}, {"label_html": "Metastatic lung cancer", "is_correct": false}, {"label_html": "Osteoclastoma", "is_correct": false}, {"label_html": "Chondrosarcoma", "is_correct": false}], "correct_index": 1, "explanation_html": "Pagets is typically associated with thickened, sclerotic, long bones. Lung carcinoma typically causes lytic bony lesions and hypercalcaemia."}, {"number": 215, "topic": "Pagets disease", "stem_html": "A 78 year old man presents with unilateral deafness which has been present for the past 3 months. On examination, Webers test localises to the contralateral side and a CT scan of his head shows a thickened calvarium with areas of sclerosis and radiolucency. His blood tests show an elevated alkaline phosphatase, normal serum calcium and normal PTH levels. Which of the following is the most likely underlying diagnosis?", "options": [{"label_html": "Multiple myeloma with skull involvement", "is_correct": false}, {"label_html": "Osteoporosis", "is_correct": false}, {"label_html": "Pagets disease with skull involvement", "is_correct": true}, {"label_html": "Lung cancer with skull metastasis", "is_correct": false}, {"label_html": "Osteopetrosis with skull involvement", "is_correct": false}], "correct_index": 2, "explanation_html": "Of the conditions listed, Pagets disease is the most likely diagnosis (skull vault expansion and sensorineural hearing loss). Multiple myeloma would typically result in multiple areas of radiolucency and usually raised calcium in this setting. Osteopetrosis is a recognised cause of the features described. However, it is a rare inherited disorder and usually presents in children in young adults. Presentation at this stage with no prior symptoms would be extremely rare and therefore this is not the <i>most likely<\/i> diagnosis."}], "note_html": "Paget's disease is a disease of increased but uncontrolled bone turnover and is characterised by architecturally abnormal bones. It is thought to be primarily a disorder of osteoclasts, with excessive osteoclastic resorption followed by increased osteoblastic activity causing areas of sclerosis and deformity. Paget's disease is common (UK prevalence 5%) but symptomatic in only 1 in 20 patients<br><br>Predisposing factors<br><ul><li>increasing age<\/li><li>male sex<\/li><li>northern latitude<\/li><li>family history<\/li><\/ul><br>Clinical features <br><ul><li>bone pain (e.g. pelvis, lumbar spine, femur)<\/li><li>classical, untreated features: bowing of tibia, bossing of skull<\/li><li>raised alkaline phosphatase (ALP) - calcium* and phosphate are typically normal<\/li><li>skull x-ray: thickened vault, osteoporosis circumscripta<\/li><\/ul><br>Indications for treatment include bone pain, skull or long bone deformity, fracture, periarticular Paget's<br><ul><li>bisphosphonate (either oral risedronate or IV zoledronate)<\/li><li>calcitonin is less commonly used now<\/li><\/ul><br>Complications<br><ul><li>deafness (cranial nerve entrapment)<\/li><li>bone sarcoma (1% if affected for &gt; 10 years)<\/li><li>fractures<\/li><li>skull thickening<\/li><li>high-output cardiac failure<\/li><\/ul><br>*usually normal in this condition but hypercalcaemia may occur with prolonged immobilisation"}, {"name": "Pagets disease of the nipple", "questions": [{"number": 216, "topic": "Pagets disease of the nipple", "stem_html": "A 65 year old lady presents with a lesion affecting her right breast. On examination she has a weeping, crusting lesion overlying the right nipple, the areolar region is not involved. There is no palpable mass lesion in the breast, there is a palpable axillary lymph node. The patient's general practitioner has tried treating the lesion with 1% hydrocortisone cream, with no success. What is the most likely diagnosis?", "options": [{"label_html": "Infection with <i>Staphylococcus aureus<\/i>", "is_correct": false}, {"label_html": "Pagets disease of the nipple", "is_correct": true}, {"label_html": "Phylloides tumour", "is_correct": false}, {"label_html": "Nipple eczema", "is_correct": false}, {"label_html": "Basal cell carcinoma", "is_correct": false}], "correct_index": 1, "explanation_html": "A weeping, crusty lesion such as this is most likely to represent Pagets disease of the nipple (especially since the areolar region is spared). Although no mass lesion is palpable, a proportion of patients will still have an underlying invasive malignancy (hence the lymphadenopathy)."}], "note_html": "Pagets disease of the breast is rare, accounting for 13% of all breast malignancies but is often missed in the early stages after being wrongly diagnosed as simple dermatitis. Importantly Pagets disease of the breast does not infer definite underlying malignancy but DCIS or invasive cancer is associated in around 90% of cases. In comparison to invasive ductal cancer with no associated Pagets disease there is larger tumour size, higher grade, less ER/PR receptor positivity and higher rates of HER2 positivity, i.e all poor prognostic indicators. There is no evidence to suggest that Pagets is more commonly associated with DCIS or invasive disease.<br><br><b>Pathogenesis<\/b><br>Two theories predominate 1. Epidermatropic wherein adenocarcinoma spreads from the primary site through the ducts to the nipples itself. 2. Transformation wherein keratinocytes transform into Pagets cells independent of the underlying cancer<br><br><b>Investigation<\/b><br>Suspected cases require bilateral mammograms (although these can show no abnormalities in 50% of cases). Diagnosis is made by punch biopsies of the affected area. Histologically large pale paget cells would be seen in the epidermis and IHC for CEA would likely be positive. Only half are ER/PR positive and over 90% are HER2 positive inferring poor prognosis<br><br><b>Treatment<\/b><br>Historically this would have always been a simple mastectomy. This was due to the fact that the underlying disease is often multifocal and can lie far from the nipple. However MRI can now very accurately map disease and in selected patients wide local excision of the disease along with the nipple areolar complex (which must be excised) and adjuvant radiotherapy can be sufficient.  Where invasive disease is the underlying driver sentinel lymph node biopsy must be carried out, and as always where mastectomy for DCIS is carried out SLNB must also be performed due to the possibility of upgrade to invasive disease on final pathology. It is worth noting that disease associated with Pagets has a worse prognosis due to more extensive lymph node involvement and distant metastases and tumours that were higher in grade, more advanced in stage, larger in size and had higher levels of HER2 expression compared to those with IDC. As a result, it has been reported in a recent study comparing patients with IDC to Pagets with associated IDC reported that patients with Pagets had a significantly lower survival (10-year OS 49%) than patients with IDC only (64%).<br><br><b>References<\/b><br>1.\tJM Dixon, ABC of Breast Diseases, 4th Edition, Wiley Press, 2012<br>2.\tAdams, SJ and Kanthan R. Paget's disease of the male breast in the 21st century: A systematic review. The Breast, Volume 29, October 2016, Pages 14-23.<br><br><br><b>Pagets disease of the nipple<\/b><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb218b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb218.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"https://en.wikipedia.org/wiki/Main_Page\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb218b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}, {"name": "Para-aortic lymphadenopathy", "questions": [{"number": 217, "topic": "Para-aortic lymphadenopathy", "stem_html": "Which of the following tumours are most likely to give rise to para-aortic nodal metastasis early?", "options": [{"label_html": "Ovarian", "is_correct": true}, {"label_html": "Bladder", "is_correct": false}, {"label_html": "Rectal", "is_correct": false}, {"label_html": "Caecal", "is_correct": false}, {"label_html": "Cervical", "is_correct": false}], "correct_index": 0, "explanation_html": "Ovarian tumours are supplied by the ovarian vessels, these branch directly from the aorta. The cervix drains to the internal and external iliac nodes."}], "note_html": "Organ sites that may metastasise (early) to the para-aortic lymph nodes:<br><ul><li>Testis<\/li><li>Ovary<\/li><li>Uterine fundus<\/li><\/ul>Many other organs may result in para-aortic nodal disease. However, these deposits will represent a much later stage of the disease, since other nodal stations are involved earlier."}, {"name": "Parotid gland malignancy", "questions": [{"number": 218, "topic": "Parotid gland malignancy", "stem_html": "A 56 year old man presents with symptoms of neuropathic facial pain and some weakness of the muscles of facial expression on the right side. On examination he has a hard mass approximately 6cm anterior to the right external auditory meatus. What is the most likely diagnosis?", "options": [{"label_html": "Pleomorphic adenoma", "is_correct": false}, {"label_html": "Adenocarcinoma", "is_correct": false}, {"label_html": "Mucoepidermoid carcinoma", "is_correct": false}, {"label_html": "Adenoid cystic carcinoma", "is_correct": true}, {"label_html": "Lymphoma", "is_correct": false}], "correct_index": 3, "explanation_html": "The patient is most likely to have a malignant lesion within the parotid. Of the malignancies listed; adenoid cystic carcinoma has the greatest tendency to perineural invasion."}], "note_html": "<ul><li>Most parotid neoplasms (80%) are benign lesions<\/li><li>Most commonly present with painless mass around the mandible<\/li><li>Up to 30% may present with pain, when this is associated with a discrete mass lesion in the parotid it usually indicates perineural invasion. <\/li><li>Perineural invasion is very unlikely to occur in association with benign lesions<\/li><li>80% of patients with facial nerve weakness caused by parotid malignancies will have nodal metastasis and a 5 year survival of 25%<\/li><\/ul><br><b>Types of malignancy<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Mucoepidermoid carcinoma<\/b><\/td><td>30% of all parotid malignancies<br>Usually low potential for local invasiveness and metastasis (depends mainly on grade)<\/td><\/tr><tr><td><b>Adenoid cystic carcinoma<\/b><\/td><td>Unpredictable growth pattern<br>Tendency for perineural spread<br>Nerve growth may display skip lesions resulting in incomplete excision<br>Distant metastasis more common (visceral rather than nodal spread)<br>5 year survival 35%<\/td><\/tr><tr><td><b>Mixed tumours<\/b><\/td><td>Often a malignancy occurring in a previously benign parotid lesion<\/td><\/tr><tr><td><b>Acinic cell carcinoma<\/b><\/td><td>Intermediate grade malignancy<br>May show perineural invasion<br>Low potential for distant metastasis<br>5 year survival 80%<\/td><\/tr><tr><td><b>Adenocarcinoma<\/b><\/td><td>Develops from secretory portion of gland<br>Risk of regional nodal and distant metastasis<br>5 year survival depends upon stage at presentation, may be up to 75% with small lesions with no nodal involvement<\/td><\/tr><tr><td><b>Lymphoma<\/b><\/td><td>Large rubbery lesion, may occur in association with Warthins tumours<br>Diagnosis should be based on regional nodal biopsy rather than parotid resection Treatment is with chemotherapy (and radiotherapy)<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Pathological calcification", "questions": [{"number": 219, "topic": "Pathological calcification", "stem_html": "A 53 year old lady has undergone a bilateral breast augmentation procedure many years previously. The implants are tense and uncomfortable and are removed. During their removal the surgeon encounters a dense membrane surrounding the implants, it has a coarse granular appearance. The tissue is sent for histology and it demonstrates fibrosis with the presence of calcification. The underlying process responsible for these changes is:", "options": [{"label_html": "Hyperplasia", "is_correct": false}, {"label_html": "Dysplasia", "is_correct": false}, {"label_html": "Metastatic calcification", "is_correct": false}, {"label_html": "Dystrophic calcification", "is_correct": true}, {"label_html": "Necrosis", "is_correct": false}], "correct_index": 3, "explanation_html": "Breast implants often become surrounded by a pseudocapsule and this may secondarily then be subjected to a process of dystrophic calcification."}], "note_html": "<div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Dystrophic calcification<\/b><\/td><td>Deposition of calcium deposits in tissues that have undergone degeneration, damage or disease in the presence of normal serum calcium levels<\/td><\/tr><tr><td><b>Metastatic calcification<\/b><\/td><td>Deposition of calcium deposits in tissues that are otherwise normal in the presence of <i>increased<\/i> serum calcium levels<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Pathology of abdominal aortic aneurysm", "questions": [{"number": 220, "topic": "Pathology of abdominal aortic aneurysm", "stem_html": "Which of the following pathological explanations best describes the initial pathological processes occurring in an abdominal aortic aneurysm in an otherwise well 65 year old, hypertensive male?", "options": [{"label_html": "Loss of elastic fibres from the adventitia", "is_correct": false}, {"label_html": "Loss of collagen from the adventitia", "is_correct": false}, {"label_html": "Loss of collagen from the media", "is_correct": false}, {"label_html": "Loss of elastic fibres from the media", "is_correct": true}, {"label_html": "Decreased matrix metalloproteinases in the adventitia", "is_correct": false}], "correct_index": 3, "explanation_html": "In established aneurysmal disease there is dilation of all layers of the arterial wall and loss of both elastin and collagen. The primary event is loss of elastic fibres with subsequent degradation of collagen fibres."}], "note_html": "Abdominal aortic aneurysms occur primarily as a result of the failure of elastic proteins within the extracellular matrix. Aneurysms typically represent dilation of all layers of the arterial wall. Most aneurysms are caused by degenerative disease. After the age of 50 years the normal diameter of the infrarenal aorta is 1.5cm in females and 1.7cm in males. Diameters of 3cm and greater, are considered aneurysmal. The pathophysiology involved in the development of aneurysms is complex and the primary event is loss of the intima with loss of elastic fibres from the media. This process is associated with, and potentiated by, increased proteolytic activity and lymphocytic infiltration. <br><br>Major risk factors for the development of aneurysms include smoking and hypertension. Rare but important causes include syphilis and connective tissues diseases such as Ehlers Danlos type 1 and Marfans syndrome. <br><br><i>Layers of arterial wall<\/i><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb127b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb127.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Artery\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb127b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}, {"name": "Pernicious anaemia", "questions": [{"number": 221, "topic": "Pernicious anaemia", "stem_html": "A woman is diagnosed as having pernicious anaemia. What is the most likely underlying explanation for this?", "options": [{"label_html": "Autoimmune antibodies to parietal cells", "is_correct": true}, {"label_html": "Autoimmune antibodies to chief cells", "is_correct": false}, {"label_html": "Autoimmune antibodies to goblet cells", "is_correct": false}, {"label_html": "Autoimmune antibodies to Brunners glands", "is_correct": false}, {"label_html": "Autimmune antibodies to fundic cells", "is_correct": false}], "correct_index": 0, "explanation_html": "Parietal cell destruction is a major cause of pernicious anaemia and is usually autoimmune mediated. Other conditions such as bacterial overgrowth may produce mixed patterns and require more complex diagnostic evaluation."}], "note_html": "<ul><li>Pernicious anaemia is a chronic illness caused by impaired absorption of vitamin B-12 because of a lack of intrinsic factor (IF) in gastric secretions. It occurs as a relatively common adult form of anaemia that is associated with gastric atrophy and a loss of IF production and as a rare congenital autosomal recessive form in which IF production is lacking without gastric atrophy.<\/li><li>Classic pernicious anaemia is caused by the failure of gastric parietal cells to produce sufficient IF (a gastric protein secreted by parietal cells) to permit the absorption of adequate quantities of dietary vitamin B-12. Other disorders that interfere with the absorption and metabolism of vitamin B-12 can produce cobalamin deficiency, with the development of a macrocytic anaemia and neurologic complications. In many cases the underlying cause is autoimmune destruction of the parietal cell mass of the gastric antrum.<\/li><li>Diagnostic evaluation may include investigations to delineate the precise cause and this may include Schilling test, trials of B12 and in some cases bone marrow sampling.<\/li><li>Treatment of the disorder is with 3 monthly treatment of vitamin B12 injections. Folic acid supplementation may also be required.<\/li><\/ul>"}, {"name": "Peutz-Jeghers syndrome", "questions": [{"number": 222, "topic": "Peutz-Jeghers syndrome", "stem_html": "A 15 year old boy is admitted with colicky abdominal pain of 6 hours duration. On examination he has a soft abdomen, on systemic examination he has brownish spots around his mouth, feet and hands. His mother underwent surgery for intussusception, aged 12, and has similar lesions. What is the most likely underlying diagnosis?", "options": [{"label_html": "Li Fraumeni syndrome", "is_correct": false}, {"label_html": "Peutz-Jeghers syndrome", "is_correct": true}, {"label_html": "Addisons disease", "is_correct": false}, {"label_html": "McCune -Albright syndrome", "is_correct": false}, {"label_html": "Appendicitis", "is_correct": false}], "correct_index": 1, "explanation_html": "This is most likely to be Peutz-Jeghers syndrome. Addisons and McCune Albright syndrome may produce similar skin changes but the intussusception resulting from polyps combined with the autosomal inheritance pattern makes this the most likely diagnosis."}, {"number": 223, "topic": "Peutz-Jeghers syndrome", "stem_html": "A 23 year old man presents to the surgical clinic with an inguinal hernia. On examination he has a small direct hernia. However, you also notice that he has pigmented spots around his mouth, on his palms and soles. In his history he underwent a reduction of an intussusception aged 12 years. Which of the following lesions is most likely to be identified if a colonoscopy were performed?", "options": [{"label_html": "Hamartomas", "is_correct": true}, {"label_html": "Tubulovillous adenoma", "is_correct": false}, {"label_html": "Colorectal cancer", "is_correct": false}, {"label_html": "Crohns disease", "is_correct": false}, {"label_html": "Hyperplastic polyps", "is_correct": false}], "correct_index": 0, "explanation_html": "He is most likely to have Peutz-Jeghers syndrome which is associated with Hamartomas."}], "note_html": "Peutz-Jeghers syndrome is an autosomal dominant condition characterised by numerous benign hamartomatous polyps in the gastrointestinal tract. It is also associated with pigmented freckles on the lips, face, palms and soles. Around 50% of patients will have died from a gastrointestinal tract cancer by the age of 60 years.<br><br>Genetics<br><ul><li>Autosomal dominant<\/li><li>Responsible gene encodes serine threonine kinase LKB1 or STK11<\/li><\/ul><br>Features<br><ul><li>Hamartomatous polyps in GI tract (mainly small bowel) <\/li><li>Pigmented lesions on lips, oral mucosa, face, palms and soles<\/li><li>Intestinal obstruction e.g. intussusception (which may lead to diagnosis)<\/li><li>Gastrointestinal bleeding<\/li><\/ul><br>Management<br><ul><li>Conservative unless complications develop<\/li><\/ul>"}, {"name": "Phagocytosis", "questions": [{"number": 224, "topic": "Phagocytosis", "stem_html": "Which of the following processes facilitates phagocytosis?", "options": [{"label_html": "Apoptosis", "is_correct": false}, {"label_html": "Opsonisation", "is_correct": true}, {"label_html": "Proteolysis", "is_correct": false}, {"label_html": "Angiogenesis", "is_correct": false}, {"label_html": "Necrosis", "is_correct": false}], "correct_index": 1, "explanation_html": "Opsonisation will facilitate phagocytosis. The micro-organism becomes coated with antibody, C3b and certain acute phase proteins. The macrophages and neutrophils have up regulation of phagocytic cell surface receptors in these circumstances, a process mediated by pro-inflammatory cytokines.  These cells then engulf the micro organism."}], "note_html": "<ul><li>Ingestion of pathogens or foreign materials by cells<\/li><li>First step is opsonisation whereby the organism is coated by antibody<\/li><li>Second step is adhesion to cell surface<\/li><li>Third step is pseudopodial extension to form a phagocytic vacuole<\/li><li>Lysosomes fuse with vacuole and degrade contents<\/li><\/ul>"}, {"name": "Polyposis syndromes", "questions": [{"number": 225, "topic": "Polyposis syndromes", "stem_html": "A 20 year old male is referred to the clinic. He has undergone genetic testing because his father died from colorectal cancer at the age of 21. His testing revealed a mutation of the APC gene. A colonoscopy is proposed. What is the most likely finding?", "options": [{"label_html": "Multiple colonic hamartomas", "is_correct": false}, {"label_html": "Carpet villous adenoma of the rectum", "is_correct": false}, {"label_html": "Caecal carcinoma", "is_correct": false}, {"label_html": "Multiple colonic adenomas", "is_correct": true}, {"label_html": "Multiple colonic hyperplastic polyps", "is_correct": false}], "correct_index": 3, "explanation_html": "APC mutations are found in familial adenomatous polyposis coli. These have multiple colonic adenomas."}, {"number": 226, "topic": "Polyposis syndromes", "stem_html": "A 23 year old woman has undergone a pan proctocolectomy and ileoanal pouch because she suffers from familial adenomatous polyposis coli. What is the commonest extra colonic lesion in this disorder?", "options": [{"label_html": "Gastric fundal polyps", "is_correct": false}, {"label_html": "Trichilemmomas", "is_correct": false}, {"label_html": "Duodenal polyps", "is_correct": true}, {"label_html": "Fibrocystic disease of the breast", "is_correct": false}, {"label_html": "Skull osteomas", "is_correct": false}], "correct_index": 2, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Duodenal polyps occur in up to 100% of patients with FAP if follow up is continued for long enough. Duodenal cancer has an incidence of 4-10%.<\/div>Duodenal polyps are the commonest extra colonic lesion in FAP. Gastric fundal polyps are seen in 50% of patients. Skull osteomas are seen in Gardeners syndrome which is a variant of FAP."}, {"number": 227, "topic": "Polyposis syndromes", "stem_html": "A 32 year old man is diagnosed as having a carcinoma of the caecum. On questioning, his mother developed uterine cancer at the age of 39 and his maternal uncle died from colonic cancer aged 38. His older brother developed a colonic cancer with micro satellite instability aged 37. What is the most appropriate operative treatment?", "options": [{"label_html": "Limited ileocaecal resection", "is_correct": false}, {"label_html": "Right hemicolectomy", "is_correct": false}, {"label_html": "Extended right hemicolectomy", "is_correct": false}, {"label_html": "Panproctocolectomy", "is_correct": true}, {"label_html": "Sub total colectomy", "is_correct": false}], "correct_index": 3, "explanation_html": "The likely diagnosis is one of a familial cancer syndrome and now that he has developed a colonic cancer the safest operative strategy is a total colectomy and end ileostomy."}, {"number": 228, "topic": "Polyposis syndromes", "stem_html": "Which of the disorders listed below is characterized by a PTEN mutation and intestinal hamartomas?", "options": [{"label_html": "Familial adenomatous polyposis coli", "is_correct": false}, {"label_html": "MYH associated polyposis", "is_correct": false}, {"label_html": "Peutz-Jeghers syndrome", "is_correct": false}, {"label_html": "Cowden disease", "is_correct": true}, {"label_html": "Lynch syndrome", "is_correct": false}], "correct_index": 3, "explanation_html": "PTEN is a tumour suppressor gene and loss of function mutations result in up regulation of the mTOR pathway."}, {"number": 229, "topic": "Polyposis syndromes", "stem_html": "Which of the syndromes listed below may be present in a patient with multiple intestinal hamartomas and pigmentation spots around the mouth?", "options": [{"label_html": "Familial adenomatous polyposis syndrome", "is_correct": false}, {"label_html": "Cowden disease", "is_correct": false}, {"label_html": "MYH associated polyposis", "is_correct": false}, {"label_html": "Peutz-Jeghers syndrome", "is_correct": true}, {"label_html": "Lynch syndrome", "is_correct": false}], "correct_index": 3, "explanation_html": "<p>No explanation provided.<\/p>"}, {"number": 230, "topic": "Polyposis syndromes", "stem_html": "Which syndrome is likely to be present in a 28 year old man who presents with a locally advanced mucinous carcinoma of the caecum. There are scanty polyps in the remaining colon. His father died from colorectal cancer aged 34.", "options": [{"label_html": "FAP", "is_correct": false}, {"label_html": "Lynch syndrome", "is_correct": true}, {"label_html": "Cowden disease", "is_correct": false}, {"label_html": "MYH associated polyposis", "is_correct": false}, {"label_html": "Peutz-Jeghers syndrome", "is_correct": false}], "correct_index": 1, "explanation_html": "Lynch syndrome is likely when right sided colonic cancers occur at a young age. These tumours are often poorly differentiated and mucinous. The Amsterdam criteria can be used to identify families at risk who may benefit from genetic testing."}], "note_html": "<div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Syndrome<\/b><\/th><th><b>Genetic defect<\/b><\/th><th><b>Features<\/b><\/th><th><b>Screening and management<\/b><\/th><th><b>Associated disorders<\/b><\/th><\/tr><\/thead><tbody><tr><td>Familial adenomatous polyposis<\/td><td>Mutation of APC gene (80%) cases, dominant<\/td><td>Typically over 100 colonic adenomas<br>Cancer risk of 100%<br>20% are new mutations<\/td><td>If known to be at risk then predictive genetic testing as teenager<br>Annual flexible sigmoidoscopy from 15 years<br>If no polyps found then 5 yearly colonoscopy started at age 20<br>Polyps found = resectional surgery (resection and pouch Vs sub total colectomy and IRA)<\/td><td>Gastric fundal polyps (50%).<br>Duodenal polyps 90%.<br>If severe duodenal polyposis cancer risk of 30% at 10 years.<br>Abdominal desmoid tumours.<\/td><\/tr><tr><td>MYH associated polyposis<\/td><td>Biallelic mutation of mut Y human homologue (MYH) on chromosome 1p, recessive<\/td><td>Multiple colonic polyps<br>Later onset right sided cancers more common than in FAP<br>100% cancer risk by age 60<\/td><td>Once identified resection and ileoanal pouch reconstruction is recommended<br>Attenuated phenotype - regular colonoscopy<\/td><td>Duodenal polyposis in 30%<br>Associated with increased risk of breast cancer (self examination)<\/td><\/tr><tr><td>Peutz -Jeghers syndrome<\/td><td>STK11 (LKB1) mutation on chromosome 19 in some (but not all) cases, dominant<\/td><td>Multiple benign intestinal hamartomas<br>Episodic obstruction and intussceception<br>Increased risk of GI cancers (colorectal cancer 20%, gastric 5%)<br>Increased risk of breast, ovarian, cervical pancreatic and testicular cancers<\/td><td>Annual examination<br>Pan intestinal endoscopy every 2-3 years<\/td><td>Malignancies at other sites<br>Classical pigmentation pattern<\/td><\/tr><tr><td>Cowden disease<\/td><td>Mutation of PTEN gene on chromosome 10q22, dominant<\/td><td>Macrocephaly<br>Multiple intestinal hamartomas<br>Multiple trichilemmomas<br>89% risk of cancer at any site<br>16% risk of colorectal cancer<\/td><td>Targeted individualised screening<\/td><td>Breast cancer (81% risk)<br>Thyroid cancer and non toxic goitre<br>Uterine cancer<\/td><\/tr><tr><td>HNPCC (Lynch syndrome)<\/td><td>Germline mutations of DNA mismatch repair genes<\/td><td>Colo rectal cancer 30-70%<br>Endometrial cancer 30-70%<br>Gastric cancer 5-10%<br>Scanty colonic polyps may be present<br>Colonic tumours likely to be right sided and mucinous<\/td><td>Colonoscopy every 1-2 years from age 25<br>Consideration of prophylactic surgery<br>Extra colonic surveillance recommended<\/td><td>Extra colonic cancers<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Post splenectomy blood film changes", "questions": [{"number": 231, "topic": "Post splenectomy blood film changes", "stem_html": "A 22 year old man undergoes a splenectomy for an iatrogenic splenic injury. On the second post operative day a full blood count is performed. Which of the following components of the full blood count is the first to be affected ?", "options": [{"label_html": "Erythrocyte count", "is_correct": false}, {"label_html": "Reticulocyte count", "is_correct": true}, {"label_html": "Eosinophil count", "is_correct": false}, {"label_html": "Monocyte count", "is_correct": false}, {"label_html": "Lymphocyte count", "is_correct": false}], "correct_index": 1, "explanation_html": "The granulocyte (the eosinophil component is seldom raised) and platelet count are the first to be affected following splenectomy. Then reticulocytes increase.  Although a lymphocytosis and monocytosis are reported, these take several weeks to develop."}, {"number": 232, "topic": "Post splenectomy blood film changes", "stem_html": "Which of the following is not found on a blood film post splenectomy?", "options": [{"label_html": "Pappenheimer bodies", "is_correct": false}, {"label_html": "Stipple cells", "is_correct": true}, {"label_html": "Erythrocyte containing siderotic granules", "is_correct": false}, {"label_html": "Howell-Jolly bodies", "is_correct": false}, {"label_html": "Target cells", "is_correct": false}], "correct_index": 1, "explanation_html": "Stipple cells are found in lead poisoning/haemoglobinopathies.<br><br>Blood film in hyposplenism:<br><br>Howell-Jolly bodies<br>Pappenheimer bodies<br>Poikilocytes (Target cells)<br>Erythrocyte containing siderotic granules<br>Heinz bodies"}, {"number": 233, "topic": "Post splenectomy blood film changes", "stem_html": "A 15 year old boy undergoes an emergency splenectomy for trauma. He makes a full recovery and is discharged home. Eight weeks post operatively the general practitioner performs a full blood count with a blood film. Which of the following is most likely to be present?", "options": [{"label_html": "Myofibroblasts", "is_correct": false}, {"label_html": "Howell-Jolly bodies", "is_correct": true}, {"label_html": "Multinucleate giant cells", "is_correct": false}, {"label_html": "Reed Sternberg Cells", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 1, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Post splenectomy blood film features:<br>Howell- Jolly bodies<br>Pappenheimer bodies<br>Target cells<br>Irregular contracted erythrocytes<\/div>As the filtration function in the spleen is no longer present Howell-Jolly bodies are found."}], "note_html": "The loss of splenic tissue results in the inability to readily remove immature or abnormal red blood cells from the circulation. The red cell count does not alter significantly. However, cytoplasmic inclusions may be seen e.g. Howell-Jolly bodies. <br>In the first few days after splenectomy target cells, siderocytes and reticulocytes will appear in the circulation. Immediately following splenectomy a granulocytosis (mainly composed of neutrophils) is seen, this is replaced by a lymphocytosis and monocytosis over the following weeks. <br>The platelet count is usually increased and this may be persistent, oral antiplatelet agents may be needed in some patients. <br><br><i>Image showing Howell Jolly bodies (arrowed)<\/i><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb115b.jpg\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb115.jpg\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Howell-Jolly body\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb115b.jpg\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}, {"name": "Post splenectomy sepsis", "questions": [{"number": 234, "topic": "Post splenectomy sepsis", "stem_html": "A splenectomy increases the risk of infection from all the following organisms except?", "options": [{"label_html": "<i>Pneumococcus<\/i>", "is_correct": false}, {"label_html": "<i>Klebsiella<\/i>", "is_correct": false}, {"label_html": "<i>Haemophilus influenzae<\/i>", "is_correct": false}, {"label_html": "<i>Staphylococcus aureus<\/i>", "is_correct": true}, {"label_html": "<i>Neisseria meningitidis<\/i>", "is_correct": false}], "correct_index": 3, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\"> Mnemonic used to remember some encapsulated pathogens is: 'Even Some Super Killers Have Pretty Nice Big Capsules' <br>Escherichia coli, Streptococcus pneumoniae, Salmonella, Klebsiella pneumoniae, Haemophilus influenzae, Pseudomonas aeruginosa, Neisseria meningitidis, Bacteroides fragilis, and the yeast Cryptococcus neoformans<\/div>Staphylococcus aureus infection following splenectomy is no more common than in non splenectomised individuals. The other organisms are encapsulated, which is why they are more likely to cause overwhelming post splenectomy sepsis."}, {"number": 235, "topic": "Post splenectomy sepsis", "stem_html": "A 22 year old man is admitted to hospital with a lower respiratory chest infection.  He had a splenectomy after being involved in a car accident.  What is the most likely infective organism?", "options": [{"label_html": "<i>Haemophilus influenzae<\/i>", "is_correct": true}, {"label_html": "<i><i>Staphylococcus<\/i> aureus<\/i>", "is_correct": false}, {"label_html": "Rhinovirus", "is_correct": false}, {"label_html": "<i>Mycobacterium tuberculosis<\/i>", "is_correct": false}, {"label_html": "<i><i>Moraxella<\/i> catarrhalis<\/i>", "is_correct": false}], "correct_index": 0, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Organisms causing post splenectomy sepsis:<br><i>Streptococcus pneumoniae<\/i><br><i>Haemophilus influenzae<\/i><br><i>Meningococci<\/i><\/div>Encapsulated organisms carry the greatest pathogenic risk following splenectomy. The effects of sepsis following splenectomy are variable. This may be the result of small isolated fragments of splenic tissue that retain some function following splenectomy. These may implant spontaneously following splenic rupture (in trauma) or be surgically implanted at the time of splenectomy."}], "note_html": "Hyposplenism may complicate certain medical conditions where splenic atrophy occurs or may be the result of medical intervention such as splenic artery embolization and splenectomy for trauma. Diagnosis of hyposplenism is difficult and whilst there may be peripheral markers of the splenectomised state (e.g. Howell Jolly bodies) these are neither 100% sensitive or specific. The most sensitive test is a radionucleotide labeled red cell scan. <br>Hyposplenism, by whatever mechanism it occurs dramatically increases the risk of post splenectomy sepsis, particularly with encapsulated organisms. Since these organisms may be opsonised, but this then goes undetected at an immunological level due to loss of the spleen. For this reason individuals are recommended to be vaccinated and have antibiotic prophylaxis. <br><br><b>Key recommendations<\/b><br><ul><li>All those with hyposplenism or may become so (such as prior to an elective splenectomy) should receive pneumococcal, haemophilus type b and meningococcal type C vaccines. These should be administered 2 weeks prior to splenectomy or two weeks following splenectomy. The vaccine schedule for meningococcal disease essentially consists of a dose of Men C and Hib at 2 weeks and then a dose of the MenACWY vaccine one month later. Those aged under 2 may require a booster at 2 years. A dose of pneumococcal polyvalent polysaccharide vaccine (PPV) is given at two weeks. A conjugated vaccine (PCV) is offered to young children. The PCV is more immunogenic but covers fewer serotypes. Boosting PPV is either guided by serological measurements (where available) or by routine boosting doses at 5 yearly intervals. <\/li><li>Annual influenza vaccination is recommended in all cases<\/li><li>Antibiotic prophylaxis is offered to all. The risk of post splenectomy sepsis is greatest immediately following splenectomy and in those aged less than 16 years or greater than 50 years. Individuals with a poor response to pneumococcal vaccination are another high risk group. High risk individuals should be counselled to take penicillin or macrolide prophylaxis. Those at low risk may choose to discontinue therapy. All patients should be advised about taking antibiotics early in the case of intercurrent infections. <\/li><li>Asplenic individuals traveling to malaria endemic areas are at high risk and should have both pharmacological and mechanical protection.<\/li><\/ul><br><b>Dosing<\/b><br>Penicillin V 500mg BD or amoxicillin 250mg BD<br><br><b>References<\/b><br>Davies J <i>et al<\/i>.  Review of guidelines for the prevention and treatment of infection in patients with an absent or dysfunctional spleen: Prepared on behalf of the British Committee for Standards in Haematology by a Working Party of the Haemato-Oncology Task Force. <i>British Journal of Haematology<\/i> 2011 (155): 308317."}, {"name": "PSA testing", "questions": [{"number": 236, "topic": "PSA testing", "stem_html": "A 60-year-old man presents with lower urinary tract symptoms and is offered a PSA test. Which one of the following could interfere with the PSA level?", "options": [{"label_html": "Vigorous exercise in the past 48 hours", "is_correct": true}, {"label_html": "Poorly controlled diabetes mellitus", "is_correct": false}, {"label_html": "Drinking more than 4 units of alcohol in the past 48 hours", "is_correct": false}, {"label_html": "Smoking", "is_correct": false}, {"label_html": "Recent cholecystectomy", "is_correct": false}], "correct_index": 0, "explanation_html": "<p>No explanation provided.<\/p>"}], "note_html": "Prostate specific antigen (PSA) is a serine protease enzyme produced by normal and malignant prostate epithelial cells. It has become an important tumour marker but much controversy still exists regarding its usefulness as a screening tool. <br><br>The NHS Prostate Cancer Risk Management Programme (PCRMP) has published updated guidelines in 2009 on how to handle requests for PSA testing in asymptomatic men. A recent European trial (ERSPC) showed a statistically significant reduction in the rate of death prostate cancer by 20% in men aged 55 to 69 years but this was associated with a high risk of over-diagnosis and over-treatment. Having reviewed this and other data the National Screening Committee have decided not to introduce a prostate cancer screening programme yet but rather allow men to make an informed choice.<br><br>Age-adjusted upper limits for PSA were recommended by the PCRMP*:<br><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td>{Age}<\/td><td>{PSA level (ng/ml)}<\/td><\/tr><tr><td>50-59 years<\/td><td>3.0<\/td><\/tr><tr><td>60-69 years<\/td><td>4.0<\/td><\/tr><tr><td>&gt; 70 years<\/td><td>5.0<\/td><\/tr><\/tbody><\/table><\/div><br>PSA levels may also be raised by**:<br><ul><li>benign prostatic hyperplasia (BPH)<\/li><li>prostatitis and urinary tract infection (NICE recommend to postpone the PSA test for at least 1 month after treatment)<\/li><li>ejaculation (ideally not in the previous 48 hours)<\/li><li>vigorous exercise (ideally not in the previous 48 hours)<\/li><li>urinary retention<\/li><li>instrumentation of the urinary tract<\/li><\/ul><br>Poor specificity and sensitivity<br><ul><li>around 33% of men with a PSA of 4-10 ng/ml will be found to have prostate cancer. With a PSA of 10-20 ng/ml this rises to 60% of men<\/li><li>around 20% with prostate cancer have a normal PSA<\/li><li>various methods are used to try and add greater meaning to a PSA level including age-adjusted upper limits and monitoring change in PSA level with time (PSA velocity or PSA doubling time)<\/li><\/ul><br>*aide memoire for upper PSA limit: (age - 20) / 10<br><br>**whether digital rectal examination actually causes a rise in PSA levels is a matter of debate"}, {"name": "Pseudomyxoma Peritonei", "questions": [{"number": 237, "topic": "Pseudomyxoma Peritonei", "stem_html": "A 32 year old man is admitted with a distended tense abdomen. He previously underwent a difficult appendicectomy 1 year previously and was discharged. At laparotomy the abdomen is filled with a gelatinous substance. What is the most likely diagnosis?", "options": [{"label_html": "Appendiceal sarcoma", "is_correct": false}, {"label_html": "Pseudomyxoma peritoneii", "is_correct": true}, {"label_html": "Appendiceal adenocarcinoma", "is_correct": false}, {"label_html": "Appendiceal carcinoid", "is_correct": false}, {"label_html": "Caecal adenocarcinoma", "is_correct": false}], "correct_index": 1, "explanation_html": "Pseudomyxoma is classically associated with mucin production and the appendix is the commonest source."}, {"number": 238, "topic": "Pseudomyxoma Peritonei", "stem_html": "A 30 year old man presents with abdominal distension, a laparotomy is performed, at operation the abdomen is filled with a large amount of gelatinous fluid. What is the most likely underlying diagnosis?", "options": [{"label_html": "Infection with <i>entamoeba histolytica<\/i>", "is_correct": false}, {"label_html": "Pseudomyxoma peritonei", "is_correct": true}, {"label_html": "Metastatic colonic cancer", "is_correct": false}, {"label_html": "Chylous ascites", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 1, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Pseudomyxoma peritoneii- Curative treatment is peritonectomy (Sugarbaker procedure) and heated intra peritoneal chemotherapy.<\/div>Pseudomyxoma is associated with the deposition of large amounts of gelatinous material. The appendix is the commonest organ of origin."}], "note_html": "<ul><li>Rare mucinous tumour <\/li><li>Most commonly arising from the appendix (other abdominal viscera are also recognised as primary sites)<\/li><li>Incidence of 1-2/1,000,000 per year<\/li><li>The disease is characterised by the ac
