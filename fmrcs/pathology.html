time<\/b><\/th><th><b>Platelet count<\/b><\/th><\/tr><\/thead><tbody><tr><td>Warfarin administration<\/td><td>Prolonged<\/td><td>Normal<\/td><td>Normal<\/td><td>Normal<\/td><\/tr><tr><td>Aspirin administration<\/td><td>Normal<\/td><td>Normal<\/td><td>Prolonged<\/td><td>Normal<\/td><\/tr><tr><td>Heparin<\/td><td>Often normal (may be prolonged)<\/td><td>Prolonged<\/td><td>Normal<\/td><td>Normal<\/td><\/tr><tr><td>DIC<\/td><td>Prolonged<\/td><td>Prolonged<\/td><td>Prolonged<\/td><td>Low<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Duct ectasia", "questions": [{"number": 94, "topic": "Duct ectasia", "stem_html": "A 38 year old lady who smokes heavily presents with recurrent episodes of infection in the right breast. On examination she has an indurated area at the lateral aspect of the nipple areaolar complex. Imaging shows no mass lesions. What is the most likely diagnosis?", "options": [{"label_html": "Duct ectasia", "is_correct": false}, {"label_html": "Periductal mastitis", "is_correct": true}, {"label_html": "Pagets disease of the nipple", "is_correct": false}, {"label_html": "Mondors disease of the breast", "is_correct": false}, {"label_html": "Radial scar", "is_correct": false}], "correct_index": 1, "explanation_html": "Periductal mastitis is common in smokers and may present with recurrent infections. Treatment is with co-amoxiclav. Mondors disease of the breast is a localised thrombophlebitis of a breast vein."}], "note_html": "Duct ectasia is a dilatation and shortening of the terminal breast ducts within 3cm of the nipple. It is common and the incidence increases with age. It typically presents with nipple retraction and occasionally creamy nipple discharge. It may be confused with periductal mastitis, which presents in younger women, the vast majority of which are smokers. Periductal mastitis typically presents with periareolar or sub areolar infections and may be recurrent. <br>Patients with troublesome nipple discharge may be treated by microdochectomy (if young) or total duct excision (if older)."}, {"name": "Dysphagia", "questions": [{"number": 95, "topic": "Dysphagia", "stem_html": "A cachectic 32 year old man with severe perineal Crohns disease is receiving treatment with intravenous antibiotics. Over the past 72 hours he has complained of intermittent dysphagia and odynophagia. What is the most likely cause?", "options": [{"label_html": "Oesophageal Crohns disease", "is_correct": false}, {"label_html": "Oesophageal candidiasis", "is_correct": true}, {"label_html": "Plummer Vinson syndrome", "is_correct": false}, {"label_html": "Globus", "is_correct": false}, {"label_html": "Achalasia", "is_correct": false}], "correct_index": 1, "explanation_html": "Treatment with systemic antibiotics may result in development of candidiasis. Patients may present with odynophagia and episodic dysphagia. Endoscopic appearances are usually diagnostic and treatment is with an oral anti fungal agent."}, {"number": 96, "topic": "Dysphagia", "stem_html": "A 78 year old lady presents 6 years following a successfully treated squamous cell carcinoma of the oesophagus. She has a long history of dysphagia but it is not progressive. What is the most likely diagnosis?", "options": [{"label_html": "Recurrent malignancy", "is_correct": false}, {"label_html": "Oesophageal candidiasis", "is_correct": false}, {"label_html": "Radiation stricture", "is_correct": true}, {"label_html": "Globus", "is_correct": false}, {"label_html": "Pharyngeal pouch", "is_correct": false}], "correct_index": 2, "explanation_html": "SCC of the oesophagus is commonly treated with chemoradiotherapy. Fibrosis and dysphagia may occur in survivors. At 6 years post treatment, recurrence would be most unusual."}, {"number": 97, "topic": "Dysphagia", "stem_html": "A 32 year old lady presents with dysphagia. She has a 10 year history of anaemia secondary to menorrhagia and has been strongly resistant to treatment. What is the most likely underlying cause?", "options": [{"label_html": "Candidiasis", "is_correct": false}, {"label_html": "Globus", "is_correct": false}, {"label_html": "Squamous cell carcinoma of the oesophagus", "is_correct": false}, {"label_html": "Adenocarcinoma of the oesophagus", "is_correct": false}, {"label_html": "Plummer Vinson syndrome", "is_correct": true}], "correct_index": 4, "explanation_html": "Plummer Vinson syndrome (oesophageal web) may occur in association with iron deficiency anaemia (although rare!)."}, {"number": 98, "topic": "Dysphagia", "stem_html": "A 65 year old man presents with a history of progressive dysphagia over the past 4 weeks. For the preceding 5 years he had regularly attended his general practitioner with symptoms of dyspepsia and reflux. What is the most likely cause?", "options": [{"label_html": "Leiomyoma of the oesophagus", "is_correct": false}, {"label_html": "Plummer Vinson syndrome", "is_correct": false}, {"label_html": "Squamous cell carcinoma of the oesophagus", "is_correct": false}, {"label_html": "Adenocarcinoma of the oesophagus", "is_correct": true}, {"label_html": "Achalasia", "is_correct": false}], "correct_index": 3, "explanation_html": "A short history of progressive dysphagia in a middle aged man who has a background history of reflux is strongly suggestive of malignancy. Long standing reflux symptoms may be suggestive of a increased risk of developing Barretts oesophagus. Note that not all patients with Barretts transformation alone are symptomatic. In such cases, the tumours are adenocarcinoma."}, {"number": 99, "topic": "Dysphagia", "stem_html": "A 40 year old man presents with symptoms of dysphagia that have been present for many months. His investigations demonstrate lack of relaxation of the lower oesophageal sphincter during swallowing. What is the most likely diagnosis?", "options": [{"label_html": "Benign stricture", "is_correct": false}, {"label_html": "Leiomyoma", "is_correct": false}, {"label_html": "Adenocarcinoma", "is_correct": false}, {"label_html": "Barretts oesophagus", "is_correct": false}, {"label_html": "Achalasia", "is_correct": true}], "correct_index": 4, "explanation_html": "Patients with dysphagia will usually undergo an upper GI endoscopy as a first line investigation. Where this investigation is normal, the next stage is to perform studies assessing oesophageal motility. These comprise fluroscopic barium swallows and oesophageal manometry and pH studies. Lack of sphincter relaxation suggests achalasia (pressures are usually high)."}, {"number": 100, "topic": "Dysphagia", "stem_html": "A 4 year old presents with sudden onset of dysphagia. He undergoes an upper GI endoscopy and a large bolus of food is identified in the mid oesophagus. He has no significant history, other than a tracheo-oesophageal fistula repair soon after birth. What is the most likely diagnosis?", "options": [{"label_html": "Barretts oesophagus", "is_correct": false}, {"label_html": "Benign oesophageal stricture", "is_correct": true}, {"label_html": "Squamous cell carcinoma of the oesophagus", "is_correct": false}, {"label_html": "Oesophageal adenocarcinoma", "is_correct": false}, {"label_html": "Achalasia", "is_correct": false}], "correct_index": 1, "explanation_html": "Children with tracheo-oesophageal fistulas will commonly develop oesophageal strictures following repair. These may require regular dilations throughout childhood."}, {"number": 101, "topic": "Dysphagia", "stem_html": "A 24 year old man presents with dysphagia that occurs intermittently and swallowing of both liquids and solids can be difficult at times. An upper gastrointestinal endoscopy is unremarkable. What is the most appropriate next step?", "options": [{"label_html": "Hellers cardiomyotomy", "is_correct": false}, {"label_html": "Nissen fundoplication", "is_correct": false}, {"label_html": "Injection of botulinum toxin into the lower oesophageal sphincter", "is_correct": false}, {"label_html": "Oesophageal manometry", "is_correct": true}, {"label_html": "Pneumatic dilatation of the lower oesophageal sphincter", "is_correct": false}], "correct_index": 3, "explanation_html": "Whilst this is likely to represent achalasia, in the first instance oesophageal manometry is needed. Definitive treatment should not be undertaken until the diagnosis is proven."}, {"number": 102, "topic": "Dysphagia", "stem_html": "A patient is suspected of having a pharyngeal pouch, what is the most appropriate investigation?", "options": [{"label_html": "Upper GI endoscopy with flexible endoscope", "is_correct": false}, {"label_html": "Upper GI endoscopy with rigid endoscope", "is_correct": false}, {"label_html": "Upper GI fluoroscopic swallowing study", "is_correct": true}, {"label_html": "Oesophageal manometry", "is_correct": false}, {"label_html": "CT scan of the neck", "is_correct": false}], "correct_index": 2, "explanation_html": "Upper GI endoscopy is contra indicated in pharyngeal pouch."}, {"number": 103, "topic": "Dysphagia", "stem_html": "A 12 year old male is investigated for swallowing difficulties and is found to have dysphagia lusoria. Which of the diagnostic modalities described below is most likely to demonstrate the cause?", "options": [{"label_html": "CT angiogram", "is_correct": true}, {"label_html": "Upper GI endoscopy", "is_correct": false}, {"label_html": "Barium swallow", "is_correct": false}, {"label_html": "Capsule endoscopy", "is_correct": false}, {"label_html": "Oesophageal manometry", "is_correct": false}], "correct_index": 0, "explanation_html": "Dysphagia lusoria is caused by compression of the esophagus from any of several congenital vascular abnormalities. The vascular abnormality is usually an aberrant right subclavian artery arising from the left side of the aortic arch, a double aortic arch, or a right aortic arch with left ligamentum arteriosum. The dysphagia may develop in childhood or later in life as a result of arteriosclerotic changes in the aberrant vessel.<br>Barium swallow shows the extrinsic compression, but arteriography is necessary for absolute diagnosis."}], "note_html": "Causes of dysphagia<br><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Extrinsic<\/b><\/td><td><ul><li>Mediastinal masses<\/li><li>Cervical spondylosis<\/li><\/ul><\/td><\/tr><tr><td><b>Oesophageal wall<\/b><\/td><td><ul><li>Achalasia<\/li><li>Diffuse oesophageal spasm<\/li><li>Hypertensive lower oesophageal sphincter<\/li><\/ul><\/td><\/tr><tr><td><b>Intrinsic<\/b><\/td><td><ul><li>Tumours<\/li><li>Strictures<\/li><li>Oesophageal web<\/li><li>Schatzki rings<\/li><\/ul><\/td><\/tr><tr><td><b>Neurological<\/b><\/td><td><ul><li>CVA<\/li><li>Parkinson's disease<\/li><li>Multiple Sclerosis<\/li><li>Brainstem pathology<\/li><li>Myasthenia Gravis<\/li><\/ul><\/td><\/tr><\/tbody><\/table><\/div><br><b>Investigation<\/b><br>All patients require an upper GI endoscopy unless there are compelling reasons for this not to be performed. Motility disorders may be best appreciated by undertaking fluoroscopic swallowing studies. <br><br>A full blood count should be performed.<br><br>Ambulatory oesophageal pH and manometry studies will be required to evaluate conditions such as achalasia and patients with GORD being considered for fundoplication surgery."}, {"name": "Dysplasia", "questions": [{"number": 104, "topic": "Dysplasia", "stem_html": "A 55 year old man has suffered from reflux oesophagitis for many years. During a recent endoscopy a biopsy is taken from the distal oesophagus. The histopathology report indicates that cells are identified with features of coarse chromatin and abnormal mitoses. The cells are confined to the superficial epithelial layer only. Which of the following accounts for this process?", "options": [{"label_html": "Metaplasia", "is_correct": false}, {"label_html": "Apoptosis", "is_correct": false}, {"label_html": "Autoimmune oesophagitis", "is_correct": false}, {"label_html": "Dysplasia", "is_correct": true}, {"label_html": "Infection with <i>Helicobacter pylori<\/i>", "is_correct": false}], "correct_index": 3, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Dysplasia = pre cancerous<\/div>Dysplasia tends to develop as a result of prolonged stimulation by precipitants.  Removal of these precipitants may possibly reverse these changes.  Replacement of differentiated cells with another cell type describes metaplasia rather than dysplasia. The absence of invasion distinguishes this from malignancy."}], "note_html": "<ul><li>Premalignant condition<\/li><li>Disordered growth and differentiation of cells <\/li><li>Alteration in size, shape, and organization of cells<\/li><li>Features increased abnormal cell growth (increased number of mitoses/abnormal mitoses and cellular differentiation)<\/li><li>Underlying connective tissue is not invaded<\/li><li>Causes include smoking, <i>Helicobacter pylori<\/i>, Human papilloma virus<\/li><li>Main differences to metaplasia is that dysplasia is considered to be part of carcinogenesis (pre cancerous) and is associated with a delay in maturation of cells rather than differentiated cells replacing one another<\/li><li>The absence of invasion differentiates dysplasia from invasive malignancy<\/li><li>Severe dysplasia with foci of invasion are well recognised<\/li><\/ul>"}, {"name": "Fat embolism", "questions": [{"number": 105, "topic": "Fat embolism", "stem_html": "A 56 year old motorcyclist is involved in a road traffic accident and sustains a displaced femoral shaft fracture. No other injuries are identified on the primary or secondary surveys. The fracture is treated with closed, antegrade intramedullary nailing. The following day the patient becomes increasingly agitated and confused. On examination, he is pyrexial, hypoxic SaO<sub>2<\/sub> 90% on 6 litres O<sub>2<\/sub>, tachycardic and  normotensive. Systemic examination demonstrates a non blanching petechial rash present over the torso. What is the most likely explanation for this?", "options": [{"label_html": "Pulmonary embolism with paradoxical embolus", "is_correct": false}, {"label_html": "Fat embolism", "is_correct": true}, {"label_html": "Meningococcal sepsis", "is_correct": false}, {"label_html": "Alcohol withdrawl", "is_correct": false}, {"label_html": "Chronic sub dural haematoma", "is_correct": false}], "correct_index": 1, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Triad of symptoms:<br><ul><li>Respiratory<\/li><li>Neurological<\/li><li>Petechial rash (tends to occur after the first 2 symptoms)<\/li><\/ul><\/div>This man has a recent injury and physical signs that would be concordant with fat embolism syndrome. Meningococcal sepsis is not usually associated with hypoxia initially. Pulmonary emboli are not typically associated with pyrexia."}], "note_html": "<b>Diagnosis and clinical features<\/b><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>System<\/b><\/th><th><b>Feature<\/b><\/th><\/tr><\/thead><tbody><tr><td>Respiratory<\/td><td><ul><li>Early persistent tachycardia<\/li><li>Tachypnoea, dyspnoea, hypoxia usually 72 hours following injury<\/li><li>Pyrexia<\/li><\/ul><\/td><\/tr><tr><td>Dermatological<\/td><td><ul><li>Red/ brown impalpable petechial rash (usually only in 25-50%)<\/li><li>Subconjunctival and oral haemorrhage/ petechiae<\/li><\/ul><\/td><\/tr><tr><td>CNS<\/td><td><ul><li>Confusion and agitation<\/li><li>Retinal haemorrhages and intra-arterial fat globules on fundoscopy<\/li><\/ul><\/td><\/tr><\/tbody><\/table><\/div><br><b>Imaging<\/b><br><ul><li>May be normal<\/li><li>Fat emboli tend to lodge distally and therefore CTPA may not show any vascular occlusion, a ground glass appearance may be seen at the periphery<\/li><\/ul><br><b>Treatment<\/b><br><ul><li>Prompt fixation of long bone fractures<\/li><li>Some debate regarding benefit Vs. risk of medullary reaming in femoral shaft/ tibial fractures in terms of increasing risk (probably does not).<\/li><li>DVT prophylaxis<\/li><li>General supportive care<\/li><\/ul>"}, {"name": "Fracture healing", "questions": [{"number": 106, "topic": "Fracture healing", "stem_html": "A 23 year old man fractures his right tibia in a sporting accident. At which point in the healing process is fracture callus first visible radiologically?", "options": [{"label_html": "1 day", "is_correct": false}, {"label_html": "7 days", "is_correct": false}, {"label_html": "8 weeks", "is_correct": false}, {"label_html": "6 weeks", "is_correct": false}, {"label_html": "3 weeks", "is_correct": true}], "correct_index": 4, "explanation_html": "Fracture callus is composed of fibroblasts and chondroblasts and the synthesis of fibrocartilage. It is typically visible on radiographs approximately 3 weeks following injury. If delayed then there may be risk of non union."}, {"number": 107, "topic": "Fracture healing", "stem_html": "Which of the following is least likely to impair bone fracture healing?", "options": [{"label_html": "Radiotherapy", "is_correct": false}, {"label_html": "Osteoporosis", "is_correct": false}, {"label_html": "Administration of non steroidal anti inflammatory drugs", "is_correct": false}, {"label_html": "Preservation of periosteum", "is_correct": true}, {"label_html": "Presence of osteomyelitic sequestra", "is_correct": false}], "correct_index": 3, "explanation_html": "Periosteal preservation helps fractures to heal."}], "note_html": "<b>Bone fracture<\/b><br>-  Bleeding vessels in the bone and periosteum<br>-  Clot and haematoma formation<br>-  The clot organises over a week (improved structure and collagen)<br>-  The periosteum contains osteoblasts which produce new bone<br>-  Mesenchymal cells produce cartilage (fibrocartilage and hyaline cartilage) in the soft tissue around the fracture<br>-  Connective tissue + hyaline cartilage = callus<br>-  As the new bone approaches the new cartilage, endochondral ossification occurs to bridge the gap<br>-  Trabecular bone forms<br>-  Trabecular bone is resorbed by osteoclasts and replaced with compact bone<br><br><br><b>Factors affecting fracture healing<\/b><br><ul><li>Age<\/li><li>Malnutrition<\/li><li>Bone disorders: osteoporosis<\/li><li>Systemic disorders: diabetes, Marfan's syndrome and Ehlers-Danlos syndrome cause abnormal musculoskeletal healing. <\/li><li>Drugs: steroids, non steroidal anti inflammatory agents.<\/li><li>Type of bone: Cancellous (spongy) bone fractures are usually more stable, involve greater surface areas, and have a better blood supply than cortical (compact) bone fractures. <\/li><li>Degree of Trauma: The more extensive the injury to bone and surrounding soft tissue, the poorer the outcome. <\/li><li>Vascular Injury: Especially the femoral head, talus, and scaphoid bones. <\/li><li>Degree of Immobilization<\/li><li>Intra-articular Fractures: These fractures communicate with synovial fluid, which contains collagenases that retard bone healing. <\/li><li>Separation of Bone Ends: Normal apposition of fracture fragments is needed for union to occur. Inadequate reduction, excessive traction, or interposition of soft tissue will prevent healing. <\/li><li>Infection<\/li><\/ul>"}, {"name": "Gastric cancer", "questions": [{"number": 108, "topic": "Gastric cancer", "stem_html": "A 40 year old lady presents with a gastric carcinoma of the greater curvature of the stomach. Her staging investigations are negative for metastatic disease.  What is the most appropriate treatment option?", "options": [{"label_html": "Radical radiotherapy", "is_correct": false}, {"label_html": "Sub total gastrectomy, D2 lymphadenectomy and Roux en Y reconstruction", "is_correct": true}, {"label_html": "Sub total gastrectomy, D2 lymphadenectomy and anterior gastrojejunostomy", "is_correct": false}, {"label_html": "Oesophagogastrectomy", "is_correct": false}, {"label_html": "Sleeve gastrectomy", "is_correct": false}], "correct_index": 1, "explanation_html": "This is amenable to potentially curative resection. The proximal stomach can be conserved.<br>Reconstruction with an anterior gastrojejunostomy will not provide optimal function. A Sleeve gastrectomy is not performed for malignant disease."}, {"number": 109, "topic": "Gastric cancer", "stem_html": "A 62 year old man presents with dyspepsia and a tumour of the gastric cardia is diagnosed. He has no evidence of metastatic disease.  What is the most appropriate treatment option?", "options": [{"label_html": "Sub total gastrectomy and Roux en Y reconstruction", "is_correct": false}, {"label_html": "Total gastrectomy and Roux en Y reconstruction", "is_correct": true}, {"label_html": "Total gastrectomy and loop jejunostomy reconstruction", "is_correct": false}, {"label_html": "Proximal gastrectomy and gastric pull up", "is_correct": false}, {"label_html": "External beam radical radiotherapy", "is_correct": false}], "correct_index": 1, "explanation_html": "This will require a total gastrectomy. Retention of a gastric remnant is unlikely to achieve acceptable resection margins. Resection of the proximal stomach with pull up of the stomach is not standard oncological practice for gastric cancer."}, {"number": 110, "topic": "Gastric cancer", "stem_html": "A 56 year old man is investigated for anaemia and a large exophytic growth is identified in the distal stomach. What pathological finding is most likely?", "options": [{"label_html": "Squamous cell carcinoma", "is_correct": false}, {"label_html": "Adenocarcinoma", "is_correct": true}, {"label_html": "Lymphoma", "is_correct": false}, {"label_html": "Leiomyosarcoma", "is_correct": false}, {"label_html": "Rhadomyosarcoma", "is_correct": false}], "correct_index": 1, "explanation_html": "Most gastric malignancies are adenocarcinomas."}, {"number": 111, "topic": "Gastric cancer", "stem_html": "A 55 year old man is attending a health screening centre and is concerned about risk factors for the development of gastric cancer. Which of the factors described below carries the least risk of developing the condition subsequently", "options": [{"label_html": "Polya gastrectomy for antral ulcer", "is_correct": false}, {"label_html": "Atrophic gastritis", "is_correct": false}, {"label_html": "Intestinal metaplasia of columnar type at the gastric cardia", "is_correct": false}, {"label_html": "Gastric polyp showing medium grade dysplasia", "is_correct": false}, {"label_html": "Long term therapy with sucralfate", "is_correct": true}], "correct_index": 4, "explanation_html": "Although some acid lowering procedures increase the risk of gastric cancer the use of sucralfate does not, at the present time, seem to increase the risk."}, {"number": 112, "topic": "Gastric cancer", "stem_html": "Which of the following statements relating to gastric cancer is untrue?", "options": [{"label_html": "It is associated with chronic helicobacter pylori infection", "is_correct": false}, {"label_html": "5% of gastric malignancies are due to lymphoma", "is_correct": false}, {"label_html": "In the Lauren classification the diffuse type of adenocarcinoma typically presents as a large exophytic growth in the antrum", "is_correct": true}, {"label_html": "Smoking is a risk factor", "is_correct": false}, {"label_html": "It is associated with acanthosis nigricans", "is_correct": false}], "correct_index": 2, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Barium meal appearances of linitis plastica:<br>Due to the increased rigidity of the wall, the stomach cannot be adequately distended, with only a narrow lumen identified. The normal mucosal fold pattern is absent, either distorted, thickened or nodular.<\/div>The Lauren classification describes a diffuse type of adenocarcinoma (Linitis plastica type lesion) and an intestinal type. The diffuse type is often deeply infiltrative and may be difficult to detect on endoscopy. Barium meal appearances can be characteristic."}, {"number": 113, "topic": "Gastric cancer", "stem_html": "Which of the following is not true of gastric cancer?", "options": [{"label_html": "There is an association with blood group A", "is_correct": false}, {"label_html": "Adenocarcinoma is the most common subtype", "is_correct": false}, {"label_html": "Individuals with histological evidence of signet ring cells have a lower incidence of lymph node metastasis", "is_correct": true}, {"label_html": "Lymphomas account for 5% cases", "is_correct": false}, {"label_html": "In Western Countries a more proximal disease distribution has been noted", "is_correct": false}], "correct_index": 2, "explanation_html": "Signet ring cells are features of poorly differentiated gastric cancer associated with a increased risk of metastatic disease."}, {"number": 114, "topic": "Gastric cancer", "stem_html": "A 63 year old Japanese man presents with epigastric discomfort and iron deficiency anaemia. He undergoes an upper GI endoscopy, where the following appearances are found:<br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb081b.jpg\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb081.jpg\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Linitis plastica\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb081b.jpg\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>The most likely diagnosis is:", "options": [{"label_html": "Squamous cell carcinoma", "is_correct": false}, {"label_html": "Linitis plastica", "is_correct": true}, {"label_html": "Leiomyosarcoma", "is_correct": false}, {"label_html": "Gastric varices", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 1, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">During upper GI endoscopy, a linitis plastica lesion may prevent gastric distension. <\/div>Linitis plastica produces a diffuse infiltrating lesion, the stomach is fibrotic and rigid and will not typically distend.  This may be described as a 'leather bottle stomach'.  Diagnosis is made with a combination of pathology examination with endoscopy, radiological or surgical assessment.  Pathologically signet-ring cell proliferation occurs."}], "note_html": "<b>Overview<\/b><br>There are 700,000 new cases of gastric cancer worldwide each year. It is most common in Japan and less common in western countries. It is more common in men and incidence rises with increasing age. The exact cause of many sporadic cancer is not known, however, familial cases do occur in HNPCC families. In addition, smoking and smoked or preserved foods increase the risk. Japanese migrants retain their increased risk (decreased in subsequent generations). The distribution of the disease in western countries is changing towards a more proximal location (perhaps due to rising obesity). <br><br><b>Pathology<\/b><br>There is some evidence of support a stepwise progression of the disease through intestinal metaplasia progressing to atrophic gastritis and subsequent dysplasia, through to cancer. The favoured staging system is TNM. The risk of lymph node involvement is related to size and depth of invasion; early cancers confined to submucosa have a 20% incidence of lymph node metastasis. Tumours of the gastro-oesophageal junction are classified as below:<br><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Type 1<\/b><\/td><td>True oesophageal cancers and may be associated with Barrett's oesophagus.<\/td><\/tr><tr><td><b>Type 2<\/b><\/td><td>Carcinoma of the cardia, arising from cardiac type epithelium <br>or short segments with intestinal metaplasia at the oesophagogastric junction.<\/td><\/tr><tr><td><b>Type 3<\/b><\/td><td>Sub cardial cancers that spread across the junction. Involve similar nodal stations to gastric cancer.<\/td><\/tr><\/tbody><\/table><\/div><br><b>Groups for close endoscopic monitoring<\/b><br><ul><li>Intestinal metaplasia of columnar type<\/li><li>Atrophic gastritis<\/li><li>Low to medium grade dysplasia<\/li><li>Patients who have previously undergone resections for benign peptic ulcer disease (except highly selective vagotomy).<\/li><\/ul><br><b>Referral to endoscopy<\/b><br><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Patients of any age with dyspepsia and any of the following<\/b><\/td><td><b>Patients without dyspepsia<\/b><\/td><td><b>Worsening dyspepsia<\/b><\/td><\/tr><tr><td>Chronic gastrointestinal bleeding<\/td><td>Dysphagia<\/td><td>Barretts oesophagus<\/td><\/tr><tr><td>Dysphagia<\/td><td>Unexplained abdominal pain or weight loss<\/td><td>Intestinal metaplasia<\/td><\/tr><tr><td>Weight loss<\/td><td>Vomiting<\/td><td>Dysplasia<\/td><\/tr><tr><td>Iron deficiency anaemia<\/td><td>Upper abdominal mass<\/td><td>Atrophic gastritis<\/td><\/tr><tr><td>Upper abdominal mass<\/td><td>Jaundice<\/td><td>Patient aged over 55 years with unexplained or persistent dyspepsia<\/td><\/tr><\/tbody><\/table><\/div><br><i>Upper GI endoscopy performed for dyspepsia. The addition of dye spraying (as shown in the bottom right) may facilitate identification of smaller tumours<\/i><br><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb067b.jpg\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb067.jpg\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Gastric cancer\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb067b.jpg\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center><br><b>Staging<\/b><br><ul><li>CT scanning of the chest abdomen and pelvis is the routine first line staging investigation in most centres.<\/li><li>Laparoscopy to identify occult peritoneal disease<\/li><li>PET CT (particularly for junctional tumours)<\/li><\/ul><br><b>Treatment<\/b><br><ul><li>Proximally sited disease greater than 5-10cm from the OG junction may be treated by sub total gastrectomy<\/li><li>Total gastrectomy if tumour is &lt;5cm from OG junction<\/li><li>For type 2 junctional tumours (extending into oesophagus) oesophagogastrectomy is usual<\/li><li>Endoscopic sub mucosal resection may play a role in early gastric cancer confined to the mucosa and perhaps the sub mucosa (this is debated)<\/li><li>Lymphadenectomy should be performed. A D2 lymphadenectomy is widely advocated by the Japanese, the survival advantages of extended lymphadenectomy have been debated. However, the overall recommendation is that a D2 nodal dissection be undertaken. <\/li><li>Most patients will receive chemotherapy either pre or post operatively.<\/li><\/ul><br><b>Prognosis<\/b><br><br>UK Data<br><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Disease extent<\/b><\/td><td><b>Percentage 5 year survival<\/b><\/td><\/tr><tr><td>All RO resections<\/td><td>54%<\/td><\/tr><tr><td>Early gastric cancer<\/td><td>91%<\/td><\/tr><tr><td>Stage 1<\/td><td>87%<\/td><\/tr><tr><td>Stage 2<\/td><td>65%<\/td><\/tr><tr><td>Stage 3<\/td><td>18%<\/td><\/tr><\/tbody><\/table><\/div><br><br><b>Operative procedure<\/b><br><br><b>Total Gastrectomy , lymphadenectomy and Roux en Y anastomosis<\/b><br><br>General anaesthesia<br>Prophylactic intravenous antibiotics<br>Incision: Rooftop.<br>Perform a thorough laparotomy to identify any occult disease.<br>Mobilise the left lobe of the liver off the diaphragm and place a large pack over it. Insert a large self retaining retractor e.g. omnitract or Balfour (take time with this, the set up should be perfect). Pack the small bowel away.<br>Begin by mobilising the omentum off the transverse colon.<br>Proceed to detach the short gastric vessels.<br>Mobilise the pylorus and divide it at least 2cm distally using a linear cutter stapling device.<br>Continue the dissection into the lesser sac taking the lesser omentum and left gastric artery flush at its origin.<br>The lymph nodes should be removed en bloc with the specimen where possible.<br>Place 2 stay sutures either side of the distal oesophagus. Ask the anaesthetist to pull back on the nasogastric tube. Divide the distal oesophagus and remove the stomach. <br>The oesphago jejunal anastomosis should be constructed. Identify the DJ flexure and bring a loop of jejunum up to the oesophagus (to check it will reach). Divide the jejunum at this point. Bring the divided jejunum either retrocolic or antecolic to the oesophagus. Anastamose the oesophagus to the jejunum, using either interrupted 3/0 vicryl or a stapling device. Then create the remainder of the Roux en Y reconstruction distally. <br>Place a jejunostomy feeding tube.<br>Wash out the abdomen and insert drains (usually the anastomosis and duodenal stump). Help the anaesthetist insert the nasogastric tube (carefully!)<br>Close the abdomen and skin.<br>Enteral feeding may commence on the first post-operative day. However, most surgeons will leave patients on free NG drainage for several days and keep them nil by mouth."}, {"name": "Gastritis", "questions": [{"number": 115, "topic": "Gastritis", "stem_html": "Which of the following is least likely to occur in association with severe atrophic gastritis?", "options": [{"label_html": "Gastric ulcers", "is_correct": false}, {"label_html": "Gastric cancer", "is_correct": false}, {"label_html": "Anaemia", "is_correct": false}, {"label_html": "Duodenal ulcers", "is_correct": true}, {"label_html": "Gastric polyps", "is_correct": false}], "correct_index": 3, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Achlorhydria would make the formation of duodenal ulcers unlikely. Note the question states 'least likely'.<\/div>Due to the loss of gastric acid a duodenal ulcer is unlikely. Note that gastric polyps may form (see below)."}], "note_html": "<div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Type of gastritis<\/b><\/th><th><b>Features<\/b><\/th><\/tr><\/thead><tbody><tr><td>Type A<\/td><td>Autoimmune<br>Circulating antibodies to parietal cells, causes reduction in cell mass and hypochlorhydria<br>Loss of parietal cells = loss of intrinsic factor = B12 malabsorption<br>Absence of antral involvement<br>Hypochlorhydria causes elevated gastrin levels-  stimulating enterochromaffin cells and adenomas may form<\/td><\/tr><tr><td>Type B<\/td><td>Antral gastritis <br>Associated with infection with helicobacter pylori infection<br>Intestinal metaplasia may occur in stomach and require surveillance endoscopy<br>Peptic ulceration may occur<\/td><\/tr><tr><td>Reflux gastritis<\/td><td>Bile refluxes into stomach, either post surgical or due to failure of pyloric function<br>Histologically, evidence of chronic inflammation, and <b>foveolar hyperplasia<\/b><br>May respond to therapy with prokinetics<\/td><\/tr><tr><td>Erosive gastritis<\/td><td>Agents disrupt the gastric mucosal barrier<br>Most commonly due to NSAIDs and alcohol<br>With NSAIDs the effects occur secondary to COX 1 inhibition<\/td><\/tr><tr><td>Stress ulceration<\/td><td>This occurs as a result of mucosal ischaemia during hypotension or hypovolaemia<br>The stomach is the most sensitive organ in the GI tract to ischaemia following hypovolaemia<br>Diffuse ulceration may occur<br>Prophylaxis with acid lowering therapy and sucralfate may minimise complications<\/td><\/tr><tr><td>Menetriers disease<\/td><td>Gross hypertrophy of the gastric mucosal folds, excessive mucous production and hypochlorhydria<br>Pre malignant condition<\/td><\/tr><\/tbody><\/table><\/div><br><b>References<\/b><br>Whiting J <i>et al<\/i>. The long term results of endoscopic surveillance of premalignant gastric lesions. <i>Gut<\/i> 2002; 50 :378381.<br><br>Dixon M <i> et al<\/i>. Reflux  gastritis: distinct histopathological entity?<i>J Clin Pathol<\/i> 1986; 39 : 524-530."}, {"name": "Gastrointestinal stromal tumour", "questions": [{"number": 116, "topic": "Gastrointestinal stromal tumour", "stem_html": "A 45 year old woman is identified as having a gastric gastro-intestinal stromal tumour. What is the usual cell of origin of these lesions?", "options": [{"label_html": "Brunners glands", "is_correct": false}, {"label_html": "Interstitial cells of Cajal", "is_correct": true}, {"label_html": "Primitive stem cells of the gut wall", "is_correct": false}, {"label_html": "Fundic glands", "is_correct": false}, {"label_html": "Antral goblet cells", "is_correct": false}], "correct_index": 1, "explanation_html": "GIST's are derived from the interstitial pacemaker cells of Cajal. This means that they are often located extramucosally and macroscopically, demonstrate little mucosal disruption."}], "note_html": "GIST's are not common tumours (10 per million) and originate primarily from the interstitial pacemaker cells (of Cajal). Up to 70% occur in the stomach, the remainder occurring in the small intestine (20%) and the colon and rectum (5%). Up to 95% are solitary lesions and most are sporadic. The vast majority express CD117 which is a transmembrane tyrosine kinase receptor and in these there is a mutation of the c-KIT gene. <br><br>The goal of surgery is resection of the tumour with a 1-2cm margin of normal tissue. As a result extensive resections are not required. Unfortunately there is a high local recurrence rate, the risk of which is related to site, incomplete resections and high mitotic count. Salvage surgery for recurrent disease is associated with a median survival of 15 months. <br><br>The prognosis in high risk patients is greatly improved through the use of imatinib, which in the ACOSOG trial (imatinib vs placebo) improved relapse rates from 17% to 2%.<br>In the UK it is advocated by NICE for use in patients with metastatic disease or locally unresectable disease."}, {"name": "Genetics and surgical disease", "questions": [{"number": 117, "topic": "Genetics and surgical disease", "stem_html": "A 40 year old male is found to have multiple colonic polyps during a colonoscopy. He mentions that he has extra teeth. What is the underlying diagnosis?", "options": [{"label_html": "Gardner's syndrome", "is_correct": true}, {"label_html": "Lynch syndrome", "is_correct": false}, {"label_html": "FAP", "is_correct": false}, {"label_html": "Neurofibromatosis Type I", "is_correct": false}, {"label_html": "Neurofibromatosis Type II", "is_correct": false}], "correct_index": 0, "explanation_html": "Gardner's syndrome is an AD disorder, characterised by: Colonic polyps, supernumerary teeth, jaw osteomas, congenital hypertrophy of retinal pigment. osteomas of the skull, thyroid cancer, epidermoid cysts, fibromas and sebaceous cysts."}, {"number": 118, "topic": "Genetics and surgical disease", "stem_html": "A 10 year old boy who has learning difficulties, is reported as having a difference in size between his two legs. What is the underlying disorder?", "options": [{"label_html": "Neurofibromatosis Type I", "is_correct": true}, {"label_html": "Neurofibromatosis Type II", "is_correct": false}, {"label_html": "Kartagener's syndrome", "is_correct": false}, {"label_html": "Multiple endocrine neoplasia type II", "is_correct": false}, {"label_html": "Multiple endocrine neoplasia type I", "is_correct": false}], "correct_index": 0, "explanation_html": "Neurofibromatosis type I. A hallmark finding is a plexiform neurofibroma, which is a sheet of neurofibromatosis tissue which encases major nerves. In children this attracts extra blood circulation, which can accelerate growth of the affected limb.<br>Other features include:<br>Schwannoma, &gt; 6<br>Cafe au lait spots, axillary freckling, Lisch nodules, Optic glioma. Meningiomas, Glioma, or Schwannoma."}, {"number": 119, "topic": "Genetics and surgical disease", "stem_html": "A 22 year old is found to have bilateral acoustic neuromas. Which of the disorders listed below is most likely to be present?", "options": [{"label_html": "Neurofibromatosis Type I", "is_correct": false}, {"label_html": "Neurofibromatosis Type II", "is_correct": true}, {"label_html": "MEN I", "is_correct": false}, {"label_html": "MEN II", "is_correct": false}, {"label_html": "Gardner's syndrome", "is_correct": false}], "correct_index": 1, "explanation_html": "In NF2 bilateral acoustic neuromas are characteristic with a family history of Neurofibroma."}, {"number": 120, "topic": "Genetics and surgical disease", "stem_html": "A 5 year old boy presents with recurrent episodes of sinusitis. The casualty staff are surprised to find his liver lying in the left upper quadrant of the abdomen. What is the underlying diagnosis?", "options": [{"label_html": "Von Recklinghausen's disease", "is_correct": false}, {"label_html": "Li Fraumeni syndrome", "is_correct": false}, {"label_html": "Pierre Robin syndrome", "is_correct": false}, {"label_html": "Kartagener's syndrome", "is_correct": true}, {"label_html": "MEN I", "is_correct": false}], "correct_index": 3, "explanation_html": "This is a case of Kartagener's syndrome. The primary problem is of immotile cilia syndrome. When associated with situs inversus Kartagener's syndrome is diagnosed."}, {"number": 121, "topic": "Genetics and surgical disease", "stem_html": "A 22 year old man presents with carcinoma of the caecum. His brother died from colorectal cancer aged 25. Which of the non GI cancers listed below are close relatives at greatest risk of developing?", "options": [{"label_html": "Glioma", "is_correct": false}, {"label_html": "Soft tissue sarcoma", "is_correct": false}, {"label_html": "Endometrial cancer", "is_correct": true}, {"label_html": "Ovarian cancer", "is_correct": false}, {"label_html": "Fallopian tube cancer", "is_correct": false}], "correct_index": 2, "explanation_html": "This is a case of Lynch syndrome HNPCC. It is transmitted in an autosomal dominant fashion. Cancer of the uterine body is more common in HNPCC than Gardners syndrome. The fact that the patient is male is irrelevant as female relatives can still go on to develop endometrial cancers."}, {"number": 122, "topic": "Genetics and surgical disease", "stem_html": "A tall 32 year old lady presents with a diffuse neck swelling, a carcinoma of the thyroid medullary type is diagnosed. What is the underlying problem?", "options": [{"label_html": "MEN I", "is_correct": false}, {"label_html": "MEN II", "is_correct": true}, {"label_html": "Von Recklinghausen's disease", "is_correct": false}, {"label_html": "Kartagener's syndrome", "is_correct": false}, {"label_html": "Neurofibromatosis", "is_correct": false}], "correct_index": 1, "explanation_html": "This is a case MEN type IIb. It is associated with phaeochromocytomas and is transmitted in an autosomal dominant pattern if inherited. All MEN II tend to have medullary carcinoma of the thyroid as a presenting feature."}, {"number": 123, "topic": "Genetics and surgical disease", "stem_html": "Which of the following are not true of Li-Fraumeni syndrome?", "options": [{"label_html": "It consists of mutations to the p53 tumour suppressor gene", "is_correct": false}, {"label_html": "Is likely to be present in a teenager presenting with a liposarcoma", "is_correct": false}, {"label_html": "It has an autosomal dominant inheritance pattern", "is_correct": false}, {"label_html": "Affected individuals are unlikely to develop acute myeloid leukaemia", "is_correct": true}, {"label_html": "Adrenal malignancies are more common than in normal population", "is_correct": false}], "correct_index": 3, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">The classical LFS malignancies - sarcoma, cancers of the breast, brain and adrenal glands - comprise about 80% of all cancers that occur in this syndrome. <\/div>They are at high risk of developing leukaemia."}, {"number": 124, "topic": "Genetics and surgical disease", "stem_html": "A 43 year old woman is identified as being a carrier of a BRCA 1 mutation. Apart from breast cancer, which of the following malignancies is she at greatest risk of developing?", "options": [{"label_html": "Colonic cancer", "is_correct": false}, {"label_html": "Ovarian cancer", "is_correct": true}, {"label_html": "Follicular carcinoma of the thyroid", "is_correct": false}, {"label_html": "Pituitary adenoma", "is_correct": false}, {"label_html": "Phaeochromocytoma", "is_correct": false}], "correct_index": 1, "explanation_html": "BRCA 1 mutation patients are 55% more likely to get ovarian cancer. Those with BRCA 2 are 25% more likely. The risk of developing other malignancies is slightly increased but not to the same extent, and not enough to justify screening."}, {"number": 125, "topic": "Genetics and surgical disease", "stem_html": "Which of the following are not typical of Lynch syndrome?", "options": [{"label_html": "It is inherited in an autosomal recessive manner", "is_correct": true}, {"label_html": "Affected patients are more likely to develop right colon mucinous tumours than the general population", "is_correct": false}, {"label_html": "Affected individuals have an 80% lifetime risk of colon cancer", "is_correct": false}, {"label_html": "Endometrial cancer is seen in 80% of women", "is_correct": false}, {"label_html": "Gastric cancers are more common", "is_correct": false}], "correct_index": 0, "explanation_html": "Lynch syndrome is inherited in an autosomal dominant fashion. It is characterised by microsatellite instability in the DNA mismatch repair genes. Colonic tumours in patients with Lynch syndrome are more likely to be right sided tumours and to be poorly differentiated."}, {"number": 126, "topic": "Genetics and surgical disease", "stem_html": "Which of the following statements relating to Gardners syndrome variant of familial adenomatous polyposis coli is false?", "options": [{"label_html": "It is an autosomal dominant condition", "is_correct": false}, {"label_html": "Patients may develop retroperitoneal desmoid tumours", "is_correct": false}, {"label_html": "The vast majority of the polyps are benign and thus the risk of colorectal cancer is small", "is_correct": true}, {"label_html": "Patients are at increased risk of thyroid cancer", "is_correct": false}, {"label_html": "It is characterised by a mutation in the APC gene", "is_correct": false}], "correct_index": 2, "explanation_html": "The multiple polyps increase the risk of malignancy and most patients should undergo a colectomy."}, {"number": 127, "topic": "Genetics and surgical disease", "stem_html": "Which of the following statements in relation to the p53 tumour suppressor protein is false?", "options": [{"label_html": "It may induce necrosis of cells with non repairable DNA damage", "is_correct": true}, {"label_html": "It is affected in Li Fraumeni syndrome", "is_correct": false}, {"label_html": "It can induce DNA repair", "is_correct": false}, {"label_html": "It can halt the cell cycle", "is_correct": false}, {"label_html": "It may inhibit angiogenesis", "is_correct": false}], "correct_index": 0, "explanation_html": "When DNA cannot be repaired it will induce cellular apoptosis (not necrosis)"}], "note_html": "Some of the more commonly occurring genetic conditions occurring in surgical patients are presented here.<br><br><b>Li-Fraumeni Syndrome<\/b><br><ul><li>Autosomal dominant <\/li><li>Consists of germline mutations to p53 tumour suppressor gene<\/li><li>High incidence of malignancies particularly sarcomas and leukaemias<\/li><li>Diagnosed when:<\/li><\/ul><br>*Individual develops sarcoma under 45 years<br>*First degree relative diagnosed with any cancer below age 45 years and another family member develops malignancy under 45 years or sarcoma at any age<br><br><b>BRCA 1 and 2<\/b><br><ul><li>Carried on chromosome 17 (BRCA 1) and Chromosome 13 (BRCA 2)<\/li><li>Linked to developing breast cancer (60%) risk.<\/li><li>Associated risk of developing ovarian cancer (55% with BRCA 1 and 25% with BRCA 2).<\/li><\/ul><br><b>Lynch Syndrome<\/b><br><ul><li>Autosomal dominant <\/li><li>Develop colonic cancer and endometrial cancer at young age<\/li><li>80% of affected individuals will get colonic and/ or endometrial cancer<\/li><li>High risk individuals may be identified using the Amsterdam criteria<\/li><\/ul><br><b>Amsterdam criteria<\/b><br>Three or more family members with a confirmed diagnosis of colorectal cancer, one of whom is a first degree (parent, child, sibling) relative of the other two.<br>Two successive affected generations.<br>One or more colon cancers diagnosed under age 50 years.<br>Familial adenomatous polyposis (FAP) has been excluded.<br><br><b>Gardners syndrome<\/b><br><ul><li>Autosomal dominant familial colorectal polyposis<\/li><li>Multiple colonic polyps<\/li><li>Extra colonic diseases include: skull osteoma, thyroid cancer and epidermoid cysts<\/li><li>Desmoid tumours are seen in 15%<\/li><li>Mutation of APC gene located on chromosome 5<\/li><li>Due to colonic polyps most patients will undergo colectomy to reduce risk of colorectal cancer<\/li><li>Now considered a variant of familial adenomatous polyposis coli<\/li><\/ul>"}, {"name": "Genetics of colorectal cancer", "questions": [{"number": 128, "topic": "Genetics of colorectal cancer", "stem_html": "A 40 year old man presents with obstructive jaundice and dysphagia. Twenty years previously he underwent a right hemicolectomy for a mucinous right sided colonic carcinoma. He was subsequently diagnosed as having Lynch syndrome. A recent colonoscopy was normal. What is the most likely cause of his jaundice?", "options": [{"label_html": "Hepatocellular carcinoma", "is_correct": false}, {"label_html": "Liver metastasis from colonic cancer", "is_correct": false}, {"label_html": "Pancreatic carcinoma", "is_correct": false}, {"label_html": "Duodenal carcinoma", "is_correct": false}, {"label_html": "Metastatic gastric carcinoma", "is_correct": true}], "correct_index": 4, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Mnemonic 3-2-1 for HNPCC.<br>3 individuals, 2 generations and one must be younger than 50 yrs.<\/div>Lynch syndrome usually results in colonic cancer which is right sided and mucinous. The next most common site to be affected is the uterus. The stomach is at particular risk and this risk is up to 10 times greater in HNPCC (Lynch) patients than the general population. Duodenal adenomas (and rarely carcinoma) are usually seen in association with FAP. Whilst pancreatic carcinoma is associated with HNPCC it is far less likely to occur than gastric cancer.<br>We are often asked how these patients become jaundiced, this occurs as a result of nodal spread along the hepatoduodenal ligament nodes to occlude the porta hepatis resulting in jaundice."}, {"number": 129, "topic": "Genetics of colorectal cancer", "stem_html": "A 34 year old man is diagnosed with an aggressive caecal adenocarcinoma. His sister died from the same disease at 38 years of age. His mother died from endometrial cancer at the age of 41. What is the most likely underlying abnormality?", "options": [{"label_html": "Familial adenopolypomatosis coli", "is_correct": false}, {"label_html": "Gardners syndrome", "is_correct": false}, {"label_html": "Mutation of mismatch repair genes", "is_correct": true}, {"label_html": "Deletion of chromosome 6", "is_correct": false}, {"label_html": "MYH gene mutation", "is_correct": false}], "correct_index": 2, "explanation_html": "Lynch syndrome which is characterised by aggressive right sided colonic malignancy and endometrial cancer is caused by microsatellite instability of DNA repair genes."}], "note_html": "The lifetime risk of colorectal cancer in the UK population is 5%. Up to 5% of newly diagnosed bowel cancers will be in those individuals who have a high genetically acquired risk of bowel cancer. Cancers arising in the low-moderate genetic risk group comprise approximately 30% of newly diagnosed bowel cancer. <br><br><b>Genetics of inherited colorectal cancer syndromes<\/b><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Syndrome<\/b><\/th><th><b>Features<\/b><\/th><th><b>Genes implicated<\/b><\/th><\/tr><\/thead><tbody><tr><td>FAP<\/td><td>More than 100 adenomatous polyps affecting the colon and rectum. Duodenal and fundic glandular polyps<\/td><td>APC (over 90%)<\/td><\/tr><tr><td>Gardner syndrome<\/td><td>As FAP but with desmoid tumours and mandibular osteomas<\/td><td>APC<\/td><\/tr><tr><td>Turcots syndrome<\/td><td>Polyposis and colonic tumours and CNS tumours<\/td><td>APC +MLH1 and PMS2<\/td><\/tr><tr><td>HNPCC<\/td><td>Colorectal cancer without extensive polyposis. Endometrial cancer, renal and CNS<\/td><td>MSH2, MLH1, PMS2 and GTBP<\/td><\/tr><tr><td>Peutz-Jeghers syndrome<\/td><td>Hamartomatous polyps in GI tract and increased risk of GI malignancy<\/td><td>LKB1 andSTK11 (in up to 70%)<\/td><\/tr><tr><td>Cowden disease<\/td><td>Multiple hamartomas (see below)<\/td><td>PTEN (85%)<\/td><\/tr><tr><td>MYH associated polyposis<\/td><td>Autosomal recessive, multiple adenomatous polyps in GI tract, those in colon having somatic KRAS mutations<\/td><td>MYH<\/td><\/tr><\/tbody><\/table><\/div><br><b>FAP<\/b><br>Autosomal dominant condition, affects 1 in 12,000.  Accounts for 0.5% of all CRCs. Lifetime incidence of colorectal cancer in untreated FAP =100%.  Up to 25% cases are caused by de-novo germ line mutations and show no prior family history. The APC tumour suppressor gene is affected in most cases.<br><br><b>APC in non inherited colorectal cancer<\/b><br>Up to 80% of sporadic colorectal cancers will have somatic mutations that inactivate APC[1]. Both alleles are usually affected. Although the APC protein more than likely has multiple critical cellular functions, the best-established role for APC in the cancer process is as a major binding partner and regulator of the β- catenin protein in the so-called canonical or β- catenin dependent Wnt signaling pathway. <br><br><b>HNPCC (Lynch syndrome)<\/b><br>HNPCC cancers differ from conventional tumours in a number of respects. In the colon the tumours are more likely to be right sided, histologically they are more likely to be mucinous and have dense lymphocytic infiltrates. To be diagnosed as having HNPCC individuals must show typically HNPCC tumours in at least three individuals, (one of whom must be a first degree relative to the other two). In at least two successive generations. At least one cancer must be diagnosed under the age of 50. FAP must be excluded and tumours should be verified by pathological identification (Amsterdam criteria). The genetic changes in HNPCC stem primarily from microsatellite instability affecting DNA mismatch repair genes. In HNPCC the mismatch repair genes most commonly implicated include; MSH2 and MLH1 and these occur in up to 70% of people with HNPCC. The finding of microsatellite instability is unusual in sporadic colorectal cancers. Approximately 60% of individuals who fulfill the Amsterdam criteria will not be found to have evidence of mismatch repair gene defects on genetic testing. The risk of developing colorectal cancer in those who have not demonstrated mutation of the mis match repair genes is increased if they fulfill the Amsterdam criteria, but not <br>the extent that it is increased in those who fulfill the criteria AND have evidence of mis match repair gene defects. <br><br><b>KRAS Mutations<\/b><br>The RAS family of small G proteins act as molecular switches downstream of growth factor receptors. KRAS and the other two members of the family; HRAS and NRAS, are the site of mutation in approximately 40% of colorectal cancers. When adenomas are examined the proportion of adenomas less than 1cm showing KRAS mutations was only 10% which contrasts with 50% in those lesions greater than 1cm. <br><br><b>p53 mutations<\/b><br>The p53 protein functions as a key transcriptional regulator of genes that encode proteins with functions in cell-cycle checkpoints at the G1/S and G2/M boundaries, in promoting apoptosis, and in restricting angiogenesis . As such, selection for p53 defects at the adenoma-carcinoma transition may reflect the fact that stresses on tumor cells activate cell-cycle arrest, apoptotic, and antiangiogenic pathways in cells with wild-type p53 function. Many colonic tumours will demonstrate changes in the p53 gene that may facilitate tumour progression through from adenoma to carcinoma. <br><br><b>Cowden syndrome<\/b><br>Also known as multiple hamartoma syndrome. Rare autosomal dominant condition with incidence of 1 in 200,000.. It is characterised by multiple mucocutaneous lesions, trichilemmomas, oral papillomas and acral keratosis. Most often diagnosed in third decade of life. Breast carcinoma may occur in up to 50% of patients and conditions such as fibrocystic disease of the breast may occur in 75% of women. Thyroid disease occurs in 75% and may include malignancy. Endoscopic screening will identify disease in up to 85% although the small bowel is rarely involved. There is a 15-20% risk of developing colorectal cancer and regular colonoscopic screening from age 45 is recommended.<br><br><b>Terminology<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Oncogene<\/b><\/td><td>Oncogenes are genes which have the potential to induce cellular proliferation and avoid apoptosis. Oncogene mutations are general gain of function and are therefore dominant. Increased expression of oncogenes are found in most tumours<\/td><\/tr><tr><td><b>Tumour suppressor gene<\/b><\/td><td>These genes generally inhibit cellular proliferation or induce apoptosis. Mutations in tumour suppressor genes are generally loss of function mutations, and are therefore recessive. Mutations in both tumour suppressor gene alleles allow cells to proliferate without restraint<\/td><\/tr><\/tbody><\/table><\/div><br><b>References<\/b><br>1.\tFearon, E.R. and B. Vogelstein, A genetic model for colorectal tumorigenesis. Cell, 1990. 61(5): p. 759-67."}, {"name": "Giant cells", "questions": [{"number": 130, "topic": "Giant cells", "stem_html": "From which of the following cell types do giant cells most commonly originate?", "options": [{"label_html": "Neutrophils", "is_correct": false}, {"label_html": "Myofibroblasts", "is_correct": false}, {"label_html": "Fibroblasts", "is_correct": false}, {"label_html": "Macrophages", "is_correct": true}, {"label_html": "Goblet cells", "is_correct": false}], "correct_index": 3, "explanation_html": "Although many cell types may give rise to giant cells, macrophages remain the most common."}], "note_html": "<ul><li>A giant cell is a mass formed by the union of several distinct types of cells<\/li><li>They are most commonly comprised of macrophages<\/li><li>They are different to granulomas although causative agents may overlap<\/li><\/ul><br><i>Section stained using haematoxylin and eosin showing giant cell reaction to suture material<\/i><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb106b.jpg\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb106.jpg\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Giant cell\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb106b.jpg\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}, {"name": "Glioma", "questions": [{"number": 131, "topic": "Glioma", "stem_html": "A 56 year old man is diagnosed as having a glioma. From which of the following cell types do these tumours usually originate?", "options": [{"label_html": "Schwann cells", "is_correct": false}, {"label_html": "Oligodendrocytes", "is_correct": false}, {"label_html": "Ependymal cells", "is_correct": false}, {"label_html": "Squamous cells", "is_correct": false}, {"label_html": "Neuroglial cells", "is_correct": true}], "correct_index": 4, "explanation_html": "Gliomas originate from glial (otherwise known as neuroglial) cells. These serve a structural function in the CNS. The tumours produced may resemble a number of CNS cell types. Tumours are therefore named according to the cells they resemble rather than the origin. Where this is not possible they are termed gliomas."}], "note_html": "Glioma is a tumour that is typically found in the CNS. These tumours arise from glial cells. They are sub categorised according to the cell type they most closely resemble.<br><br><b>Glioma sub types<\/b><br><ul><li>Ependymomas- Ependymal cells<\/li><li>Astocytomas- Astrocytes (including glioblastoma)<\/li><li>Oligodendrogliomas- Oligodendrocytes<\/li><li>Mixed- e.g. oligoastrocytomas<\/li><\/ul><br>Gliomas are categorised as being either high or low grade lesions (the former has the worse prognosis). They may be either supra or infra tentorial. Their symptoms will typically reflect their site of origin. Glioblastoma multiforme has the worst prognosis and few patients will survive beyond 12 months."}, {"name": "Glucagonoma", "questions": [{"number": 132, "topic": "Glucagonoma", "stem_html": "A 46 year old lady presents with symptoms of diarrhoea, weight loss of 10 Kg and a skin rash of erythematous blisters involving the abdomen and buttocks. The blisters have an irregular border and both intact and ruptured vesicles. What is the most likely diagnosis?", "options": [{"label_html": "Colonic adenocarcinoma", "is_correct": false}, {"label_html": "Pancreatic adenocarcinoma", "is_correct": false}, {"label_html": "Tropical sprue", "is_correct": false}, {"label_html": "Glucagonoma", "is_correct": true}, {"label_html": "Insulinoma", "is_correct": false}], "correct_index": 3, "explanation_html": "Glucagonoma is strongly associated with necrolytic migratory erythema."}], "note_html": "<ul><li>Rare pancreatic tumours arising from the alpha cells of the pancreas.<\/li><li>Glucagon levels markedly elevated.<\/li><li>Symptoms include diarrhoea, weight loss and necrolytic migratory erythema.<\/li><li>A serum level of glucagon &gt;1000pg/ml usually suggests the diagnosis, imaging with CT scanning is also required.<\/li><li>Treatment is with surgical resection. However, careful staging is required for these tumours are usually malignant and non resectable. <\/li><\/ul>"}, {"name": "Hamartoma", "questions": [{"number": 133, "topic": "Hamartoma", "stem_html": "A 60 year old man is found to have a 2 cm diameter mass in the upper lobe of his left lung.The lesion is excised and it is found that the lesion includes connective tissue, mature cartilage and ciliated epithelium. What is the most likely diagnosis?", "options": [{"label_html": "Sarcoma", "is_correct": false}, {"label_html": "Adenocarcinoma", "is_correct": false}, {"label_html": "Squamous cell carcinoma", "is_correct": false}, {"label_html": "Hamartoma", "is_correct": true}, {"label_html": "Chondroma", "is_correct": false}], "correct_index": 3, "explanation_html": "Only a hamartoma will have all these tissue elements, chondroma will not contain ciliated epithelium."}], "note_html": "<ul><li>A benign neoplasm that is comprised of tissue structures normally found within that site or organ. <\/li><li>The lung is one of the commonest site of hamartoma formation and they comprise around 5% of all lung lesions.<\/li><li>They generally have a good prognosis and do not require excision unless symptomatic.<\/li><\/ul>"}, {"name": "Hereditary Spherocytosis", "questions": [{"number": 134, "topic": "Hereditary Spherocytosis", "stem_html": "A 33 year old lady presents to the emergency department following a road traffic accident. Her evaluation demonstrates a mild degree of anaemia and on examination, the spleen is palpable. In her family history, her mother underwent a splenectomy in her fifth decade. Which of the following laboratory test findings is most likely?", "options": [{"label_html": "Positive Paul Bunnell test", "is_correct": false}, {"label_html": "Blood film showing elliptical cells", "is_correct": true}, {"label_html": "Blood film showing infection with plasmodium vivax", "is_correct": false}, {"label_html": "Reed Sternberg cells within the splenic tissue", "is_correct": false}, {"label_html": "Spur cells", "is_correct": false}], "correct_index": 1, "explanation_html": "It is likely that the patient has hereditary spherocytosis. Given the familial nature, EBV infection is unlikely and so a Paul Bunnell test will be negative. Lymphoma would be unusual and Spur cells are seen in association with liver disease and / or renal failure."}], "note_html": "Most common disorder of the red cell membrane, it has an incidence of 1 in 5000. The abnormally shaped erythrocytes are prone to splenic sequestration and destruction. This can result in hyperbilirubinaemia, jaundice and splenomegaly. In older patients an intercurrent illness may increase the rate of red cell destruction resulting in more acute symptoms. <br>Severe cases may benefit from splenectomy."}, {"name": "Heterotopia", "questions": [{"number": 135, "topic": "Heterotopia", "stem_html": "Which of the conditions listed below is an example of heterotopia?", "options": [{"label_html": "Barretts oesophagus", "is_correct": false}, {"label_html": "Squamous cell carcinoma of the lung", "is_correct": false}, {"label_html": "Meckels diverticulum containing gastric mucosa", "is_correct": true}, {"label_html": "Colonic diverticulum", "is_correct": false}, {"label_html": "Ectopic testis", "is_correct": false}], "correct_index": 2, "explanation_html": "In heterotopia, the tissue type that is found in the abnormal location is present there from birth and does not migrate to that site subsequently or arise as a result of metaplasia. The tissue that lines a Meckels diverticulum is determined early in development."}, {"number": 136, "topic": "Heterotopia", "stem_html": "A 14 year old develops abdominal pain and anaemia and a colonoscopy and terminal ileal intubation are performed. The terminal ileum shows normal mucosa but quite a lot of fresh blood. An OGD is normal. Which of these pathological processes is likely to be present within the causative lesion?", "options": [{"label_html": "Heterotopia", "is_correct": true}, {"label_html": "Metaplasia", "is_correct": false}, {"label_html": "Dysplasia", "is_correct": false}, {"label_html": "Anaplasia", "is_correct": false}, {"label_html": "Atrophy", "is_correct": false}], "correct_index": 0, "explanation_html": "This is a knowledge application question. Fresh blood in the small bowel of a child/ adolescent with normal mucosa is likely to reflect a bleeding Meckels diverticulum. These are not usually seen at endoscopy as they are too proximally sited but the normal mucosa seen tends to exclude Crohns disease. For a Meckels to bleed, it must be lined by ectopic gastric mucosa which is an example of heterotopia."}], "note_html": "Heterotopia is the presence of a specified normal tissue type at a non-physiological site, but usually co-existing with original tissue in its correct anatomical location. It implies ectopic tissue, in addition to retention of the original tissue type. In neuropathology, for example, gray matter heterotopia is the presence of gray matter within the cerebral white matter or ventricles. Heterotopia within the brain is often divided into three groups: subependymal heterotopia, focal cortical heterotopia and band heterotopia. Another example is a Meckel's diverticulum, which may contain heterotopic gastric or pancreatic tissue. <br>It is the fact that the tissue is itself that distinguishes heterotopia from a malignant process."}, {"name": "Histopathology of malignancy", "questions": [{"number": 137, "topic": "Histopathology of malignancy", "stem_html": "A 73 year old man presents with haemoptysis and is suspected of suffering from lung cancer. On examination he has an enlarged supraclavicular lymph node. Which of the following features is most likely to be present on histological examination?", "options": [{"label_html": "Increased mitoses", "is_correct": true}, {"label_html": "Apoptosis", "is_correct": false}, {"label_html": "Barr Bodies", "is_correct": false}, {"label_html": "Multinucleate giant cells", "is_correct": false}, {"label_html": "Granuloma", "is_correct": false}], "correct_index": 0, "explanation_html": "Increased mitoses are commonly seen in association with malignant transformation of cells. Apoptosis is not a common feature of metastatic cancer. Barr Bodies are formed during X chromosome inactivation in female somatic cells."}, {"number": 138, "topic": "Histopathology of malignancy", "stem_html": "A 58 year old lady undergoes a screening mammogram and appearances are suspicious for ductal carcinoma in situ. A stereotactic core biopsy is performed. If ductal carcinoma in situ is to be diagnosed, which of the following pathological features must not be present?", "options": [{"label_html": "Nuclear pleomorphism", "is_correct": false}, {"label_html": "Coarse chromatin", "is_correct": false}, {"label_html": "Abnormal mitoses", "is_correct": false}, {"label_html": "Angiogenesis", "is_correct": false}, {"label_html": "Dysplastic cells infiltrating the suspensory ligaments of the breast", "is_correct": true}], "correct_index": 4, "explanation_html": "The presence of invasion is a hallmark of invasive disease and thus would not be a feature of DCIS. Angiogenesis may occur in association with high grade DCIS."}], "note_html": "<ul><li>Abnormal tissue architecture<\/li><li>Coarse chromatin<\/li><li>Invasion of basement membrane*<\/li><li>Abnormal mitoses<\/li><li>Angiogenesis<\/li><li>De-differentiation<\/li><li>Areas of necrosis<\/li><li>Nuclear pleomorphism<\/li><\/ul><br>*= Those features that distinguish invasive malignancy from in situ disease"}, {"name": "Hodgkins lymphoma", "questions": [{"number": 139, "topic": "Hodgkins lymphoma", "stem_html": "A patient undergoes excision of a lump and the pathologist then examines a histological section and identifies a clump of Reed Sternberg cells. What is the most likely diagnosis?", "options": [{"label_html": "Thymoma", "is_correct": false}, {"label_html": "Papillary carcinoma of the thyroid", "is_correct": false}, {"label_html": "Hodgkins lymphoma", "is_correct": true}, {"label_html": "Kaposi sarcoma", "is_correct": false}, {"label_html": "Carcinoma of the parathyroid gland", "is_correct": false}], "correct_index": 2, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Reed Sternberg cells are diagnostic of Hodgkins lymphoma<\/div>"}, {"number": 140, "topic": "Hodgkins lymphoma", "stem_html": "A patient is diagnosed as having Hodgkins lymphoma and the reporting pathologist notes that popcorn cells are present. Which of the subtypes listed below is most often associated with this finding.", "options": [{"label_html": "Anaplastic", "is_correct": false}, {"label_html": "Lymphocyte depleted", "is_correct": false}, {"label_html": "Nodular sclerosis", "is_correct": false}, {"label_html": "Nodular lymphocyte predominant", "is_correct": true}, {"label_html": "Mixed cellularity", "is_correct": false}], "correct_index": 3, "explanation_html": "Popcorn cells are small cells with hyper-lobulated nucleus and small nucleoli. They are the lymphohistiocytic (L-H) variant of Reed Sternberg cells and are associated with nodular lymphocyte predominant Hodgkin lymphoma"}, {"number": 141, "topic": "Hodgkins lymphoma", "stem_html": "A 19 year old male presents with axillary lymphadenopathy and symptoms suggestive of Hodgkins lymphoma. What is the most appropriate investigation?", "options": [{"label_html": "Fine needle aspiration of the lymph nodes", "is_correct": false}, {"label_html": "Freehand needle core biopsy of the lymph nodes", "is_correct": false}, {"label_html": "Image guided core biopsy of the lymph nodes", "is_correct": false}, {"label_html": "Excision biopsy of a lymph node", "is_correct": true}, {"label_html": "Axillary node clearance", "is_correct": false}], "correct_index": 3, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">When a diagnosis of lymphoma is suspected, the correct investigation is excision biopsy of a complete lymph node to confirm the diagnosis.<\/div>Excision of a single node is appropriate. Lymphoma is usually treated with chemotherapy and axillary node clearance is therefore inappropriate. FNA and core biopsy will not allow accurate diagnosis and are therefore not appropriate."}], "note_html": "<b>Presenting features<\/b><br><ul><li>Asymptomatic lympadenopathy<\/li><li>Cough, Pel Ebstein fever, haemoptysis, dyspnoea<\/li><li>B Symptoms - 10% weight loss, fever, night sweats<\/li><\/ul><br><b>Staging<\/b><br>All patients are staged with CT scanning of the chest, abdomen and pelvis<br>The Ann Arbor staging system is commonly used<br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th>Stage<\/th><th>Features<\/th><\/tr><\/thead><tbody><tr><td>I<\/td><td>Single lymph node region<\/td><\/tr><tr><td>II<\/td><td>Two or more regions on the same side of the diaphragm<\/td><\/tr><tr><td>III<\/td><td>Involvement of lymph node regions on both sides of the diaphragm<\/td><\/tr><tr><td>IV<\/td><td>Involvement of extra nodal sites<\/td><\/tr><\/tbody><\/table><\/div><br><b>Sub types<\/b><br>Classical Hodgkin lymphoma is classified into the following 4 types:<br><br>    Nodular sclerosing Hodgkin lymphoma (NSHL)<br>    Mixed-cellularity Hodgkin lymphoma (MCHL)<br>    Lymphocyte-depleted Hodgkin lymphoma (LDHL)<br>    Lymphocyte-rich classical Hodgkin lymphoma (LRHL)<br><br>Reed Sternberg cells may be identified histologically. <br><br><b>Treatment<\/b><br>This may be multimodal and both chemo and radiotherapy are used. <br><br><b>Diagnosis<\/b><br>This is made by excision of a complete lymph node that is then submitted for detailed histological evaluation.<br><br><b>Pathogenesis<\/b><br>Infection with Ebstein Barr virus is linked to the condition (particularly mixed cellularity lymphoma).<br><br><b>Prognosis<\/b><br>Stage I disease is associated with survival figures of up to 85% at 5 years. Nodular sclerosing has the best prognosis. Lymphocyte depleted Hodgkins lymphoma, advancing age, male sex and stage IV disease are all associated with a worsening of prognosis.<br><br><b>Reference<\/b><br>Shanbhag S and Ambinder R. Hodgkin Lymphoma: a review and update on recent progress. <i>CA Cancer J Clin<\/i> . 2018 March ; 68(2): 116132"}, {"name": "Hydatid cysts", "questions": [{"number": 142, "topic": "Hydatid cysts", "stem_html": "A 43 year old man from Greece presents with colicky right upper quadrant pain, jaundice and an urticarial rash. He is initially treated with ciprofloxacin, but does not improve. What is the most likely diagnosis?", "options": [{"label_html": "Infection with <i>Wucheria bancrofti<\/i>", "is_correct": false}, {"label_html": "Infection with <i>Echinococcus granulosus<\/i>", "is_correct": true}, {"label_html": "Type III hypersensitivity reaction", "is_correct": false}, {"label_html": "Allergy to ciprofloxacin", "is_correct": false}, {"label_html": "Common bile duct stones", "is_correct": false}], "correct_index": 1, "explanation_html": "Infection with <i>Echinococcus granulosus<\/i> will typically produce a type I hypersensitivity reaction which is characterised by an urticarial rash. With biliary rupture a classical triad of biliary colic, jaundice and urticaria occurs. Whilst jaundice and biliary colic may be a feature of CBD stones they do not produce an urticarial rash. Antibiotic sensitivity with ciprofloxacin may produce jaundice and a rash, however it was not present at the outset and does not cause biliary colic."}, {"number": 143, "topic": "Hydatid cysts", "stem_html": "A 28 year old man presents with right upper quadrant pain and hydatid disease is suspected. Which of the following statements relating to the disease is untrue?", "options": [{"label_html": "First line treatment is with pentavalent antimony.", "is_correct": true}, {"label_html": "Peritoneal contamination with active daughter cysts may complicate surgery.", "is_correct": false}, {"label_html": "CT scanning of the liver may show a floating membrane.", "is_correct": false}, {"label_html": "Biliary communication with the cysts may occur.", "is_correct": false}, {"label_html": "It is caused by <i>Echinococcus granulosus<\/i>.", "is_correct": false}], "correct_index": 0, "explanation_html": "Drug treatment is with albendazole or mebendazole. Praziquantzel may be used in the pre operative stages."}], "note_html": "Hydatid cysts are endemic in Mediterranean and Middle Eastern countries.  They are caused by the tapeworm parasite <i>Echinococcus granulosus<\/i>.  An outer fibrous capsule is formed containing multiple small daughter cysts.  These cysts are allergens which precipitate a <b>type 1 hypersensitivity reaction<\/b>.<br><br>Clinical features are as follows:<br><ul><li>Up to 90% cysts occur in the liver and lungs <\/li><li>Can be asymptomatic, or symptomatic if cysts &gt; 5cm in diameter<\/li><li>Morbidity caused by cyst bursting, infection and organ dysfunction (biliary, bronchial, renal and cerebrospinal fluid outflow obstruction)<\/li><li>In biliary rupture there may be the classical triad of; biliary colic, jaundice, and urticaria <\/li><\/ul><br>CT is the best investigation to differentiate hydatid cysts from amoebic and pyogenic cysts.<br>Surgery is the mainstay of treatment (the cyst walls must not be ruptured during removal and the contents sterilised first)."}, {"name": "Hypercoagulability", "questions": [{"number": 144, "topic": "Hypercoagulability", "stem_html": "A pregnant woman suddenly develops bilateral leg swelling. Her mother and aunt were troubled by the same problem. What is the most likely underlying abnormality?", "options": [{"label_html": "Anti endomysial antibodies", "is_correct": false}, {"label_html": "Anti nuclear antibodies", "is_correct": false}, {"label_html": "Anti cardiolipin antibodies", "is_correct": true}, {"label_html": "Anti thyroid antibodies", "is_correct": false}, {"label_html": "Anti mitochondrial antibodies", "is_correct": false}], "correct_index": 2, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Anti phospholipid syndrome= following antibodies<br><ul><li>Lupus anticoagulant<\/li><li>Anti-cardiolipin <\/li><li>Anti-β2-glycoprotein<\/li><\/ul><\/div>Antiphospholipid syndrome, is an autoimmune, hypercoagulable state caused by antiphospholipid antibodies. APS provokes blood clots (thrombosis) in both arteries and veins as well as pregnancy-related complications such as misc
