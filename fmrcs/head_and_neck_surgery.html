<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Head And Neck Surgery</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f1e8;
      --bg-accent: #ebe4d4;
      --surface: rgba(255, 252, 246, 0.92);
      --surface-strong: #fffdf7;
      --border: #d9cfbd;
      --text: #23313a;
      --text-soft: #5f6c73;
      --accent: #496a58;
      --accent-strong: #2f5341;
      --correct-bg: #e0f3e6;
      --correct-border: #77b487;
      --wrong-bg: #fbe0df;
      --wrong-border: #dc7a73;
      --note-bg: #f3eee2;
      --shadow: 0 18px 40px rgba(76, 59, 37, 0.08);
      --radius-lg: 22px;
      --radius-md: 16px;
      --radius-sm: 12px;
      --page-width: 960px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: "Avenir Next", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.72), transparent 32%),
        linear-gradient(180deg, #f8f4eb 0%, #f3ede0 100%);
      line-height: 1.65;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.14), transparent 18%, transparent 82%, rgba(255, 255, 255, 0.14)),
        repeating-linear-gradient(
          180deg,
          rgba(73, 106, 88, 0.015) 0,
          rgba(73, 106, 88, 0.015) 1px,
          transparent 1px,
          transparent 18px
        );
    }

    a {
      color: var(--accent-strong);
    }

    img {
      max-width: 100%;
      height: auto;
      border-radius: 14px;
    }

    .score-badge,
    .badge.rounded-pill.bg-danger {
      display: none !important;
    }

    .page {
      width: min(100% - 24px, var(--page-width));
      margin: 0 auto;
      padding: 18px 0 48px;
    }

    .topbar {
      margin-bottom: 18px;
      padding: 18px;
      background: rgba(255, 252, 246, 0.9);
      border: 1px solid rgba(217, 207, 189, 0.86);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .topbar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .eyebrow {
      margin: 0 0 4px;
      font-size: 0.76rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-soft);
    }

    .title {
      margin: 0;
      font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
      font-size: clamp(1.5rem, 2vw + 1rem, 2.35rem);
      line-height: 1.08;
      font-weight: 700;
    }

    .meta {
      margin: 8px 0 0;
      color: var(--text-soft);
      font-size: 0.96rem;
    }

    .mode-switch {
      display: inline-flex;
      padding: 6px;
      border-radius: 999px;
      background: var(--bg-accent);
      border: 1px solid var(--border);
      gap: 6px;
      flex-shrink: 0;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
      flex-wrap: wrap;
    }

    .topic-actions {
      display: inline-flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .utility-button {
      appearance: none;
      border: 1px solid var(--border);
      background: var(--surface-strong);
      color: var(--text);
      font: inherit;
      font-weight: 700;
      border-radius: 999px;
      padding: 10px 14px;
      cursor: pointer;
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .utility-button:hover {
      transform: translateY(-1px);
      border-color: #c7bba9;
      box-shadow: 0 8px 18px rgba(70, 54, 34, 0.07);
    }

    .utility-button:focus-visible {
      outline: 3px solid rgba(73, 106, 88, 0.22);
      outline-offset: 2px;
    }

    .mode-button {
      appearance: none;
      border: 0;
      background: transparent;
      color: var(--text-soft);
      font: inherit;
      font-weight: 700;
      border-radius: 999px;
      padding: 10px 16px;
      min-width: 92px;
      cursor: pointer;
      transition: transform 0.18s ease, background 0.18s ease, color 0.18s ease, box-shadow 0.18s ease;
    }

    .mode-button:hover {
      transform: translateY(-1px);
      color: var(--text);
    }

    .mode-button.active {
      background: var(--surface-strong);
      color: var(--accent-strong);
      box-shadow: 0 8px 18px rgba(73, 106, 88, 0.14);
    }

    .topic-list {
      display: grid;
      gap: 18px;
    }

    .topic {
      background: rgba(255, 252, 246, 0.78);
      border: 1px solid rgba(217, 207, 189, 0.9);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .topic[open] {
      background: rgba(255, 252, 246, 0.9);
    }

    .topic > summary {
      list-style: none;
      cursor: pointer;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      user-select: none;
    }

    .topic > summary::-webkit-details-marker {
      display: none;
    }

    .topic-title {
      margin: 0;
      font-size: 1.08rem;
      font-weight: 800;
      letter-spacing: 0.01em;
    }

    .topic-meta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--text-soft);
      font-size: 0.94rem;
    }

    .chevron {
      display: inline-block;
      transition: transform 0.2s ease;
      color: var(--accent);
      font-weight: 700;
    }

    .topic[open] > summary .chevron {
      transform: rotate(90deg);
    }

    .topic-notes {
      background: rgba(243, 238, 226, 0.62);
      border: 1px solid #e3d9c8;
      border-radius: var(--radius-md);
      overflow: hidden;
    }

    .topic-notes > summary {
      list-style: none;
      cursor: pointer;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      user-select: none;
    }

    .topic-notes > summary::-webkit-details-marker {
      display: none;
    }

    .topic-notes-title {
      font-size: 0.95rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-soft);
    }

    .topic-notes[open] > summary .chevron {
      transform: rotate(90deg);
    }

    .topic-notes-body {
      padding: 0 16px 16px;
      color: var(--text);
    }

    .topic-body {
      padding: 0 16px 16px;
      display: grid;
      gap: 14px;
    }

    .question-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 18px;
      box-shadow: 0 10px 24px rgba(70, 54, 34, 0.05);
    }

    .question-label {
      margin: 0 0 10px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-soft);
      font-size: 0.88rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 800;
    }

    .stem {
      font-size: 1rem;
    }

    .stem > *:first-child,
    .explanation > *:first-child {
      margin-top: 0;
    }

    .stem > *:last-child,
    .explanation > *:last-child {
      margin-bottom: 0;
    }

    .options {
      margin-top: 16px;
      display: grid;
      gap: 10px;
    }

    .option {
      width: 100%;
      text-align: left;
      border: 1px solid #d8d0c2;
      background: #fffdf8;
      color: var(--text);
      border-radius: var(--radius-sm);
      padding: 14px 15px;
      font: inherit;
      line-height: 1.45;
      cursor: pointer;
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
    }

    .option:hover {
      transform: translateY(-1px);
      border-color: #c7bba9;
      box-shadow: 0 8px 18px rgba(70, 54, 34, 0.07);
    }

    .option:focus-visible {
      outline: 3px solid rgba(73, 106, 88, 0.22);
      outline-offset: 2px;
    }

    .option.correct {
      background: var(--correct-bg);
      border-color: var(--correct-border);
      box-shadow: inset 0 0 0 1px rgba(119, 180, 135, 0.2);
    }

    .option.incorrect {
      background: var(--wrong-bg);
      border-color: var(--wrong-border);
      box-shadow: inset 0 0 0 1px rgba(220, 122, 115, 0.2);
    }

    .option.neutral-revealed {
      background: #faf6ee;
      border-color: #d8d0c2;
      color: #5f676a;
    }

    .option[disabled] {
      cursor: default;
      opacity: 1;
    }

    .explanation {
      margin-top: 14px;
      padding: 14px 16px;
      background: var(--note-bg);
      border: 1px solid #e3d9c8;
      border-radius: 14px;
      color: var(--text);
    }

    .question-card.is-hidden .explanation {
      display: none;
    }

    .explanation-label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-soft);
      font-weight: 800;
    }

    .empty-state {
      padding: 28px 22px;
      background: var(--surface);
      border: 1px dashed var(--border);
      border-radius: var(--radius-lg);
      color: var(--text-soft);
    }

    .rich-text table {
      width: 100%;
      border-collapse: collapse;
      margin: 12px 0;
      overflow: hidden;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.68);
    }

    .rich-text td,
    .rich-text th {
      border: 1px solid #ddd2bf;
      padding: 10px 12px;
      vertical-align: top;
    }

    .rich-text ul,
    .rich-text ol {
      padding-left: 20px;
      margin: 10px 0;
    }

    .rich-text center {
      display: block;
      text-align: center;
    }

    .rich-text .table-responsive {
      overflow-x: auto;
    }

    @media (max-width: 720px) {
      .page {
        width: min(100% - 16px, var(--page-width));
        padding-top: 10px;
      }

      .topbar {
        padding: 14px;
        border-radius: 18px;
      }

      .topbar-inner {
        flex-direction: column;
        align-items: stretch;
      }

      .controls {
        justify-content: stretch;
      }

      .topic-actions {
        width: 100%;
      }

      .utility-button {
        flex: 1 1 0;
      }

      .mode-switch {
        width: 100%;
        justify-content: stretch;
      }

      .mode-button {
        flex: 1 1 50%;
      }

      .topic > summary {
        padding: 16px;
        align-items: flex-start;
      }

      .topic-meta {
        font-size: 0.88rem;
      }

      .topic-body {
        padding: 0 12px 12px;
      }

      .question-card {
        padding: 15px;
      }

      .option {
        padding: 13px 14px;
      }
    }
  </style>
</head>

          </div>
        </div>
      </div>
    </section>

    <section id="app"></section>
  </main>

  <script id="quiz-data" type="application/json">{"title": "Head And Neck Surgery", "topics": [{"name": "Diseases of nose and sinuses", "questions": [{"number": 1, "topic": "Diseases of nose and sinuses", "stem_html": "A child is brought to casualty complaining of a headache and a sensation of pressure between the eyes. On examination, she is febrile with a smooth swelling overlying the superomedial aspect of the right eye. The eye is uncomfortable and there is a purulent discharge from the inner canthus. What is the most likely cause?", "options": [{"label_html": "Maxillary sinusitis", "is_correct": false}, {"label_html": "Ethmoidal sinusitis", "is_correct": true}, {"label_html": "Nasal polyps", "is_correct": false}, {"label_html": "Ethmoid sinus cancer", "is_correct": false}, {"label_html": "Maxillary sinus cancer", "is_correct": false}], "correct_index": 1, "explanation_html": "Ethmoidal sinusitis may spread to the periorbital tissues resulting in periorbital cellulitis. The superomedial distribution makes a maxillary sinusitis less likely."}, {"number": 2, "topic": "Diseases of nose and sinuses", "stem_html": "A 45 year old man presents with a facial swelling. On examination, he has a swelling that lies inferolaterally to the nose. When the area is palpated, it feels like the underlying bone is cracking. What is the most likely diagnosis?", "options": [{"label_html": "Maxillary sinus cancer", "is_correct": false}, {"label_html": "Ameloblastoma", "is_correct": true}, {"label_html": "Nasal polyps", "is_correct": false}, {"label_html": "Maxillary sinusitis", "is_correct": false}, {"label_html": "Mucocele", "is_correct": false}], "correct_index": 1, "explanation_html": "Ameloblastomas are rare tumours of the odontogenic epithelium. They are slow growing and expand with a rim of periosteum that surrounds them. It is the palpation and disruption of this layer that gives rise to the crepitus."}, {"number": 3, "topic": "Diseases of nose and sinuses", "stem_html": "A 56 year old man presents with symptoms of nasal pain, anosmia and rhinorrhea. He has been well until recently and has worked as a wood carver for many years. What is the most likely diagnosis?", "options": [{"label_html": "Ethmoid sinus cancer", "is_correct": true}, {"label_html": "Ameloblastoma", "is_correct": false}, {"label_html": "Maxillary sinus cancer", "is_correct": false}, {"label_html": "Fibrous dysplasia", "is_correct": false}, {"label_html": "Haemangiopericytoma", "is_correct": false}], "correct_index": 0, "explanation_html": "Paranasal sinus cancer is strongly associated with wood work. Most cases require an occupational exposure of greater than 10 years and are adenocarcinomas on histology. <br>Most cases are ethmoidal in origin <br>References: <br>Hadfield E. Ann R Coll Surg Engl. 1970 June; 46(6): 301319<br>Binazzi A et al. Occupational exposure and sinonasal cancer: a systematic review and meta-analysis. BMC Cancer. 2015; 15: 49. This is a comprehensive review of the topic. In particular, it summarises that it is not maxillary sinus cancer in the woodworking subgroup."}], "note_html": "<b>Benign Tumours<\/b><br><ul><li>Simple papillomas may be an incidental finding or present with obstructive symptoms. Excision under general anaesthesia is sufficient management.<\/li><li>Transitional cell papillomas may be more extensive and produce obstructive symptoms. Erosion of local structures is a recognised complication. These lesions may rarely undergo malignant transformation and therefore careful and complete excision is required, some cases may require partial or total maxillectomy.<\/li><li>Pleomorphic adenomas of the maxillary sinuses are reported but are extremely rare, their symptoms typically include nasal obstruction and pain if the sinus is obstructed. Treatment is by complete surgical excision, the diagnosis is not infrequently made post operatively. <\/li><li>Benign osteomas may develop in the paranasal sinuses, the frontal sinus is the most frequent location of such lesions. Symptoms include; pain, rhinorrhoea and anosmia. Most osteomas may be observed if asymptomatic, sphenoid osteomas should be resected soon after diagnosis as enlargement may compromise visual fields. Many sinus osteomas can now be resected endoscopically, complete surgical resection is required.<\/li><li>Nasal polyps are benign lesions of the ethmoid sinus mucosa. Many patients may also have asthma, cystic fibrosis and a sensitivity to aspirin. Symptoms include watery rhinorrhoea, infection and anosmia. The polyps are usually a semi transparent grey mass. They are rare in childhood. Treatment is either with systemic steroids or surgical resection. The latter should be combined with antral washout. Low dose, nasal, steroid drops may reduce the risk of recurrence.<\/li><\/ul><br><b> Malignant disease<\/b><br><ul><li>Malignancies encountered in the nose and paranasal sinuses include; adenoid cystic carcinoma, squamous cell carcinoma and adenocarcinoma. <\/li><li>Adenocarcinoma of the paranasal sinuses and nasopharynx is strongly linked to exposure to hard wood dust (after &gt;10 years exposure).<\/li><li>Adenoid cystic carcinoma usually originate in the smaller salivary glands.<\/li><li>The majority of cancers (50%) arise from the lateral nasal wall, a smaller number (33%) arise from the maxillary antrum, ethmoid and sphenoid cancers comprise only 7%.<\/li><li>Signs of malignancy on clinical examination include loose teeth, cranial nerve palsies and lymphadenopathy.<\/li><li>Nasopharyngeal cancers are most common in individuals presenting from China and Asia and are linked to viral infection with Epstein Barr Virus. Radiotherapy and chemotherapy are the most commonly used modalities.<\/li><\/ul><br><b>Maxillary sinusitis<\/b><br><ul><li>Common symptoms include post nasal discharge, pain, headache and toothache. <\/li><li>Imaging may show a fluid level in the antrum.<\/li><li>Common organisms include <i>Haemophilus influenzae<\/i> or <i>Streptococcus pneumoniae<\/i>.<\/li><li>Treatment with functional endoscopic sinus surgery is the operative standard. Antimicrobial therapy has to be continued for long periods. Antrostomy may be needed. <\/li><\/ul><br><b>Frontoethmoidal sinusitis<\/b><br><ul><li>Usually presents with frontal headache, nasal obstruction and altered sense of smell.<\/li><li>Inflammation may progress to involve periorbital tissues. Ocular symptoms may occur and secondary CNS involvement brought about by infection entering via emissary veins.<\/li><li>CT scanning is the imaging modality of choice. Early cases may be managed with antibiotics. More severe cases usually require surgical drainage.<\/li><\/ul>"}, {"name": "Disorders affecting the ear", "questions": [{"number": 4, "topic": "Disorders affecting the ear", "stem_html": "An elderly diabetic male presents with a severe deep seated otalgia and a facial nerve palsy, he has completed a course of amoxycillin with no benefit. What is the most likely diagnosis?", "options": [{"label_html": "Malignant otitis externa", "is_correct": true}, {"label_html": "Otosclerosis", "is_correct": false}, {"label_html": "Acoustic neuroma", "is_correct": false}, {"label_html": "Meniers disease", "is_correct": false}, {"label_html": "Viral illness", "is_correct": false}], "correct_index": 0, "explanation_html": "A combination of severe otalgia and facial nerve palsy in a diabetic should raise suspicion of malignant otitis externa. This is a condition caused by pseudomonas. It commences as otitis externa and then progresses to involve the temporal bone.  Spread of the disease outside the external auditory canal occurs through the fissures of Santorini and the osseocartilaginous junction."}, {"number": 5, "topic": "Disorders affecting the ear", "stem_html": "A 34 year old lady presents with a long standing offensive discharge from the ear and on examination is noted to have a reduction in her hearing of 40 decibels compared to the opposite side. What is the most likely cause?", "options": [{"label_html": "Otosclerosis", "is_correct": false}, {"label_html": "Acute otitis media", "is_correct": false}, {"label_html": "Cholesteatoma", "is_correct": true}, {"label_html": "Long standing perforation of the pars tensa", "is_correct": false}, {"label_html": "Otitis externa", "is_correct": false}], "correct_index": 2, "explanation_html": "The combination of long history, offensive discharge and hearing loss is strongly suggestive of cholesteatoma."}, {"number": 6, "topic": "Disorders affecting the ear", "stem_html": "A 4 year old is brought to the general practitioner by her mother. She has been distressed with ear pain for the past 14 hours. She is constantly touching and pulling at her ear. Whilst she is sat in the waiting room her mother notices a discharge of foul smelling fluid from the ear, following which the pain resolves. What is the most likely cause?", "options": [{"label_html": "Acute otitis media", "is_correct": true}, {"label_html": "Otitis externa", "is_correct": false}, {"label_html": "Cholesteatoma", "is_correct": false}, {"label_html": "Mastoiditis", "is_correct": false}, {"label_html": "Otosclerosis", "is_correct": false}], "correct_index": 0, "explanation_html": "In young children acute suppurative otitis media is a common condition. Rupture of the tympanic membrane is a rare, but recognised complication."}, {"number": 7, "topic": "Disorders affecting the ear", "stem_html": "A 4 year old child is brought to the clinic by his father. They are concerned because the child has been noted to have a small epithelial defect anterior to the left ear and is has been noted to discharge foul smelling material for the past 2 days. What is the most likely explanation?", "options": [{"label_html": "Otitis externa", "is_correct": false}, {"label_html": "Otitis media", "is_correct": false}, {"label_html": "Pre auricular sinus", "is_correct": true}, {"label_html": "Cholesteatoma", "is_correct": false}, {"label_html": "Long standing pars flaccida perforation", "is_correct": false}], "correct_index": 2, "explanation_html": "Pre auricular sinuses that are deeper may accumulate secretions and produce foul smelling discharge."}], "note_html": "<b>Otitis externa<\/b><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Variant<\/b><\/th><th><b>Cause<\/b><\/th><th><b>Features<\/b><\/th><th><b>Treatment<\/b><\/th><\/tr><\/thead><tbody><tr><td>Acute otitis externa<\/td><td>Boil in external auditory meatus<\/td><td>Acute pain on moving the pinna<br>Conductive hearing loss if lesion is large<br>When rupture occurs pus will flow from ear<\/td><td>Ear packs may be used<br>Topical antibiotics<br>Operative debridement may be needed in severe cases<\/td><\/tr><tr><td>Chronic otitis externa<\/td><td>Chronic combined infection in the external auditory meatus usually combined staphylococcal and fungal infection<\/td><td>Chronic discharge from affected ear, hearing loss and severe pain rare<\/td><td>Cleansing of the external ear and treatment with antifungal and antibacterial ear drops<\/td><\/tr><\/tbody><\/table><\/div><br><b>Otitis media<\/b><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid2\"><thead><tr><th><b>Variant<\/b><\/th><th><b>Cause<\/b><\/th><th><b>Features<\/b><\/th><th><b>Treatment<\/b><\/th><\/tr><\/thead><tbody><tr><td>Acute suppurative otitis media<\/td><td>Viral induced middle ear effusions secondary to eustacian tube dysfunction<\/td><td>Most common in children and rare in adults<br>May present with symptoms elsewhere (e.g. vomiting) in children<br>Severe pain and sometimes fever<br>May present with discharge if tympanic rupture occurs<\/td><td>Antibiotics (usually amoxycillin)<\/td><\/tr><tr><td>Chronic suppurative otitis media<\/td><td>May occur with or without cholesteatoma <br>Those without cholesteatoma have a perforation of the pars tensa <br>Those with cholesteatoma have a perforation of the pars flaccida<\/td><td>Those without cholesteatoma may complain of intermittent discharge (non offensive)<br>Those with cholesteatoma have impaired hearing and foul smelling discharge<\/td><td>Simple pars tensa perforations may be managed non operatively or a myringoplasty considered if symptoms troublesome.<br>Pars flaccida perforations will usually require a modified radical mastoidectomy<\/td><\/tr><\/tbody><\/table><\/div><br><b>Otosclerosis<\/b><br><ul><li>Progressive conductive deafness<\/li><li>Secondary to fixation of the stapes in the oval window<\/li><li>Treatment is with stapedectomy and insertion of a prosthesis<\/li><\/ul><br><b>Acoustic neuroma<\/b><br><ul><li>Symptoms of gradually progressive unilateral perceptive deafness and tinnitus<\/li><li>Involvement of the vestibular nerve may cause vertigo<\/li><li>Extension to involve the facial nerve may cause weakness and then paralysis.<\/li><\/ul><br><b>Pre auricular sinus<\/b><br><ul><li>Common congenital condition in which an epithelial defect forms around the external ear<\/li><li>Small sinuses require no treatment<\/li><li>Deeper sinuses may become blocked and develop episodes of infection, they may be closely related to the facial nerve and are challenging to excise<\/li><\/ul>"}, {"name": "Epistaxis", "questions": [{"number": 8, "topic": "Epistaxis", "stem_html": "A 10 year old girl presents with epistaxis. From which of the following regions is the bleeding most likely to originate?", "options": [{"label_html": "Posterior nasal space", "is_correct": false}, {"label_html": "Alar rim", "is_correct": false}, {"label_html": "Kiesselbach's plexus", "is_correct": true}, {"label_html": "Cribriform plate", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 2, "explanation_html": "Kiesselbachs plexus has an arterial supply derived from both the internal and external carotid arteries and is the commonest area for bleeding in idiopathic epistaxis."}], "note_html": "Usually trivial and insignificant but severe haemorrhage may compromise airway and pose a risk to life.<br><br><b>Anatomy:<\/b><br><br><b>Arterial supply<\/b><br><ul><li>From internal and external carotid<\/li><li>An arterial plexus exists at Little's area and is the source of bleeding in 90% cases<\/li><li>Major arterial supply is from the sphenopalatine and greater palatine arteries (branches of the maxillary artery)<\/li><li>The facial artery supplies the more anterior aspect of the nose<\/li><li>Ethmoidal arteries are branches of the ophthalmic artery. They supply the posterosuperior nasal cavity<\/li><\/ul><br><b>Venous drainage<\/b> follows the arterial pattern<br><br><b>Classification<\/b><br><ul><li>Primary idiopathic epistaxis accounts for 75% of all cases<\/li><li>Secondary cases arise as a result of events such as anticoagulants, trauma and coagulopathy<\/li><li>Classification into anterior and posterior epistaxis may help to locate the source and becomes more important when invasive treatment is required<\/li><\/ul><br><b>Management<\/b><br><ul><li>Resuscitate if required<\/li><li>Subject should sit upright and pinch nose firmly<\/li><li>Nasal cavity should be examined using a headlight<\/li><li>Simple anterior epistaxis may be managed using silver nitrate cautery. If difficult to manage then custom manufactured packs may be inserted<\/li><li>Posterior packing or tamponade may be achieved by passing a balloon tamponade device and inflating it. This is indicated where anterior packing alone has failed to achieve haemostasis.<\/li><li>Post nasal pack patients should receive antibiotics<\/li><li>Failure of these methods will require more invasive therapy. Where a vascular radiology suite is available, consideration may be given to angiographic techniques. Direct ligation of the nasal arterial supply may also be undertaken. Of the arterial ligation techniques available, the endo nasal sphenopalatine arterial ligation procedure is most popular.<\/li><\/ul>"}, {"name": "Facial nerve palsy", "questions": [{"number": 9, "topic": "Facial nerve palsy", "stem_html": "A 21 year old man presents with a unilateral facial nerve palsy after being hit on the head. On examination, he has a right sided facial nerve palsy and a watery discharge from his nose. What is the most likely cause?", "options": [{"label_html": "Pleomorphic adenoma", "is_correct": false}, {"label_html": "Cerebrovascular accident", "is_correct": false}, {"label_html": "Occipital bone fracture", "is_correct": false}, {"label_html": "Petrous temporal fracture", "is_correct": true}, {"label_html": "Sarcoidosis", "is_correct": false}], "correct_index": 3, "explanation_html": "Nasal discharge of clear fluid and recent head injury makes a basal skull fracture the most likely underlying diagnosis."}, {"number": 10, "topic": "Facial nerve palsy", "stem_html": "A 43 year old lady presents with symptoms of chronic ear discharge and a right sided facial nerve palsy. On examination, she has foul smelling fluid draining from her right ear and a complete right sided facial nerve palsy. What is the most likely cause?", "options": [{"label_html": "Adenoid cystic carcinoma", "is_correct": false}, {"label_html": "Cholesteatoma", "is_correct": true}, {"label_html": "Acute otitis media", "is_correct": false}, {"label_html": "Chronic sinusitis", "is_correct": false}, {"label_html": "Cerebrovascular accident", "is_correct": false}], "correct_index": 1, "explanation_html": "Foul smelling ear discharge and facial nerve weakness is likely to be due to cholesteatoma. The presence of a neurological deficit is a sinister feature."}], "note_html": "<div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Sarcoid<\/b><\/td><td>Facial nerve palsy is the most frequent neurological manifestation of sarcoid<br>Affects right and left side with equal frequency, may be bilateral<br>Typically resolves in up to 80% of cases<\/td><\/tr><tr><td><b>Cholesteatoma<\/b><\/td><td>Destructive and expanding growth of keratinised squamous epithelium<br>Patients often complain of chronic ear discharge<br>Infection with Pseudomonas may occur resulting in foul smell to discharge<br>Aquired lesions usually arise from the Pars flaccida region of the tympanic membrane<br>Surgical removal and mastoidectomy may be needed<br>Recurrence rates of 20% may be seen following surgery<\/td><\/tr><tr><td><b>Basal skull fracture<\/b><\/td><td>History of head injury<br>Presence of features such as Battles sign on examination<br>Clinical presence of CSF leak strongly supports diagnosis<br>Assessment is by CT and MRI scan<br>Prophylactic antibiotics should be given in cases of CSF leak<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Ingested foreign bodies", "questions": [{"number": 11, "topic": "Ingested foreign bodies", "stem_html": "A 34 year old lady presents to the emergency department having eaten fish and chips. The fish was bony and there is a strong suspicion that she has ingested a fish bone which is now stuck in her throat. There are no signs of airway compromise. What is the most appropriate course of action?", "options": [{"label_html": "Arrange an AP and lateral x-ray of the neck", "is_correct": false}, {"label_html": "Refer for endoscopic evaluation", "is_correct": true}, {"label_html": "Advise the patient to eat bread and drink water and review in 24 hours", "is_correct": false}, {"label_html": "Discharge the patient with safety netting advice", "is_correct": false}, {"label_html": "Perform a Heimlich manoeuvre", "is_correct": false}], "correct_index": 1, "explanation_html": "Nasendoscopy is the most helpful investigation here. X- rays are of limited value. Deferred treatment increases the risks of pharyngeal abscess and is not justified."}, {"number": 12, "topic": "Ingested foreign bodies", "stem_html": "A 16 month old baby is playing with some button batteries when it ingests one. The event is witnessed by its parents who bring the child to the local district hospital emergency department. A chest x-ray is performed and shows the button battery within the oesophagus. What is the most appropriate course of action?", "options": [{"label_html": "Feed the child and repeat the imaging 2 hours later", "is_correct": false}, {"label_html": "Admit for observation and re-image at 24 hours", "is_correct": false}, {"label_html": "Admit for observation and feeding and re-image at 6 hours", "is_correct": false}, {"label_html": "Arrange urgent upper GI endoscopy", "is_correct": true}, {"label_html": "Transfer to the regional paediatric surgical unit", "is_correct": false}], "correct_index": 3, "explanation_html": "Ingestion of button batteries is an emergency as they can erode the oesophagus. Removal should be performed at the admitting hospital and all units in the UK should have a policy for how this is delivered out of hours."}], "note_html": "Both children and adults may ingest or inhale foreign bodies. Younger children can often swallow a wide variety of objects. <br>In adults foods such as fish bones can be the culprit<br><br>Clinical features:<br>Adults may give a clear history, children less so. In children, even if symptoms have settled, have a low threshold for further assessment<br><br>On examination, access may be limited if there is pain or distress. Pooling of saliva in the pyriform fossa or pharyngeal oedema are all suggestive of a foreign body. <br><br>Radiology is sometimes helpful but small objects like fish bones may not be visible limiting its use<br><br>Endoscopic evaluation of the oropharynx or upper GI endoscopy or bronchoscopy may be needed in some cases."}, {"name": "Neck lumps", "questions": [{"number": 13, "topic": "Neck lumps", "stem_html": "A 40 year old woman presents as an emergency with a painful mass underneath her right mandible. The mass has appeared over the previous week with the pain worsening as the lump has increased in size. On examination, there is a 4cm mass underneath her mandible, there is no associated lymphadenopathy. What is the most likely diagnosis?", "options": [{"label_html": "Submandibular gland cancer", "is_correct": false}, {"label_html": "Submandibular gland calculus", "is_correct": true}, {"label_html": "Carotid body tumour", "is_correct": false}, {"label_html": "Papilloma of Whartons duct", "is_correct": false}, {"label_html": "Carotid body aneurysm", "is_correct": false}], "correct_index": 1, "explanation_html": "The sub mandibular gland is the most common site for salivary calculi. Patients will usually complain of pain, which is worse on eating. When the lesion is located distally the duct may be laid open and the stone excised. Otherwise the gland will require removal. In this case the increase in size will be the result of infection occurring in a blocked duct."}, {"number": 14, "topic": "Neck lumps", "stem_html": "A 25 year old lady presents with a swelling located at the anterior border of the sternocleidomastoid muscle. The swelling is intermittent and on examination it is soft and fluctuant. What is the most likely diagnosis?", "options": [{"label_html": "Thyroglossal cyst", "is_correct": false}, {"label_html": "Branchial cyst", "is_correct": true}, {"label_html": "Carotid body tumour", "is_correct": false}, {"label_html": "Infection with Bartonella", "is_correct": false}, {"label_html": "Dental abscess", "is_correct": false}], "correct_index": 1, "explanation_html": "Branchial cysts are remnants of the branchial cleft. They may become infected."}, {"number": 15, "topic": "Neck lumps", "stem_html": "A dentist treating a woman with rheumatoid arthritis for recurrent episodes of dental sepsis notices that both parotid and submandibular glands are symmetrically enlarged. What is the most likely diagnosis?", "options": [{"label_html": "Sjogren's syndrome", "is_correct": true}, {"label_html": "Mikulicz's syndrome", "is_correct": false}, {"label_html": "Alcoholism", "is_correct": false}, {"label_html": "Liver cirrhosis", "is_correct": false}, {"label_html": "Metastatic cancer", "is_correct": false}], "correct_index": 0, "explanation_html": "Sjogren's is associated with autoimmune disorders. Mikulicz's is similar but there is no sicca or arthritis."}, {"number": 16, "topic": "Neck lumps", "stem_html": "A patient presents with a facial nerve palsy. This occurred following repeat excision of a facial lump. The histology report remarks on the biphasic appearance of the lesion and mucinous connective tissue. What is the most likely underlying lesion?", "options": [{"label_html": "Pleomorphic adenoma", "is_correct": true}, {"label_html": "Adenolymphoma", "is_correct": false}, {"label_html": "Anaplastic carcinoma", "is_correct": false}, {"label_html": "Adenoid cystic carcinoma", "is_correct": false}, {"label_html": "Schwannoma", "is_correct": false}], "correct_index": 0, "explanation_html": "The histological features are as described with a classic biphasic (mixed stromal and epithelial elements), although benign local recurrence can complicate incomplete excision. As this is a benign lesion direct extension into the facial nerve is unlikely to occur. Facial nerve injury can happen during repeat parotid surgery."}, {"number": 17, "topic": "Neck lumps", "stem_html": "The parents of a 1 year old child are concerned after he develops a lump in his neck. On examination, there is a swelling in the subcutaneous tissue of the posterior triangle which transilluminates. What is the most likely cause?", "options": [{"label_html": "Branchial cyst", "is_correct": false}, {"label_html": "Branchial sinus", "is_correct": false}, {"label_html": "Cystic hygroma", "is_correct": true}, {"label_html": "Lipoma", "is_correct": false}, {"label_html": "Pharyngeal pouch", "is_correct": false}], "correct_index": 2, "explanation_html": "This is a classical description. Collection of dilated lymphatic sacs which are fluctuant and brilliantly transilluminable. Recurrence following surgical excision is not uncommon."}, {"number": 18, "topic": "Neck lumps", "stem_html": "A 70 year old lady presents with a painless neck lump. There is a mass noted beneath the sternocleidomastoid muscle. There is a long history and somewhat unkindly her husband remarked on her rather noticeable halitosis. What is the most likely explanation?", "options": [{"label_html": "Branchial cyst", "is_correct": false}, {"label_html": "Branchial fistula", "is_correct": false}, {"label_html": "Pharyngeal pouch", "is_correct": true}, {"label_html": "Thyroglossal cyst", "is_correct": false}, {"label_html": "Dental caries", "is_correct": false}], "correct_index": 2, "explanation_html": "Usual history of regurgitation of undigested food or coughing at night. Associated with halitosis and throat infections."}, {"number": 19, "topic": "Neck lumps", "stem_html": "A 32 year old lady is referred to the clinic with recurrent infections and abscesses in the neck. On examination, she has a midline defect with an overlying scab, which moves upwards on tongue protrusion. What is the most likely diagnosis?", "options": [{"label_html": "Branchial cyst", "is_correct": false}, {"label_html": "Branchial fistula", "is_correct": false}, {"label_html": "Thyroglossal cyst", "is_correct": true}, {"label_html": "Sebaceous cyst", "is_correct": false}, {"label_html": "Dermoid cyst", "is_correct": false}], "correct_index": 2, "explanation_html": "Thyroglossal cyst is always located in the midline as it is this route that the thyroid takes during its embryological descent. Its connection with the foramen caecum means it will move on tongue protrusion."}, {"number": 20, "topic": "Neck lumps", "stem_html": "Which of the following statements relating to branchial cysts is untrue?", "options": [{"label_html": "The greater auricular nerve may be divided during excision", "is_correct": false}, {"label_html": "They typically occur in young adults", "is_correct": false}, {"label_html": "They move upwards on swallowing", "is_correct": true}, {"label_html": "They are rare over the age of 40 years", "is_correct": false}, {"label_html": "They are usually located in the anterior triangle of the neck", "is_correct": false}], "correct_index": 2, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Nerves at risk during branchial cyst excision: Mandibular branch of facial nerve, greater auricular nerve and accessory nerve.<\/div>They do not move on swallowing. They should be diagnosed with caution in those aged &gt;40 years, as lumps in this age group may in fact be metastatic disease from oropharyngeal cancer."}], "note_html": "The table below gives characteristic exam question features for conditions causing neck lumps:<br><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Reactive lymphadenopathy<\/b><\/td><td>By far the most common cause of neck swellings. There may be a history of local infection or a generalised viral illness<\/td><\/tr><tr><td><b>Lymphoma<\/b><\/td><td>Rubbery, painless lymphadenopathy<br>The phenomenon of pain whilst drinking alcohol is very uncommon<br>There may be associated night sweats and splenomegaly<\/td><\/tr><tr><td><b>Thyroid swelling <\/b><\/td><td>May be hypo-, eu- or hyperthyroid symptomatically<br>Moves upwards on swallowing<\/td><\/tr><tr><td><b>Thyroglossal cyst<\/b><\/td><td>More common in patients &lt; 20 years old<br>Usually midline, between the isthmus of the thyroid and the hyoid bone<br>Moves upwards with protrusion of the tongue<br>May be painful if infected<\/td><\/tr><tr><td><b>Pharyngeal pouch<\/b><\/td><td>More common in older men<br>Represents a posteromedial herniation between thyropharyngeus and cricopharyngeus muscles<br>Usually not seen, but if large then a midline lump in the neck that gurgles on palpation<br>Typical symptoms are dysphagia, regurgitation, aspiration and chronic cough<\/td><\/tr><tr><td><b>Cystic hygroma<\/b><\/td><td>A congenital lymphatic lesion (lymphangioma) typically found in the neck, classically on the left side<br>Most are evident at birth, around 90% present before 2 years of age<\/td><\/tr><tr><td><b>Branchial cyst<\/b><\/td><td>An oval, mobile cystic mass that develops between the sternocleidomastoid muscle and the pharynx<br>Develop due to failure of obliteration of the second branchial cleft in embryonic development<br>Usually present in early adulthood<\/td><\/tr><tr><td><b>Cervical rib<\/b><\/td><td>More common in adult females<br>Around 10% develop thoracic outlet syndrome<\/td><\/tr><tr><td><b>Carotid aneurysm<\/b><\/td><td>Pulsatile lateral neck mass which doesn't move on swallowing<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Parotid gland clinical", "questions": [{"number": 21, "topic": "Parotid gland clinical", "stem_html": "A 53 year old man presents with a mass lesion slightly inferior to the tragus of his right ear. An FNA and USS are performed and a 2cm pleomorphic adenoma is diagnosed. What is the most appropriate course of action?", "options": [{"label_html": "USS guided core biopsy", "is_correct": false}, {"label_html": "Radical parotidectomy", "is_correct": false}, {"label_html": "Superficial parotidectomy", "is_correct": true}, {"label_html": "Discharge", "is_correct": false}, {"label_html": "MRI scanning of the region", "is_correct": false}], "correct_index": 2, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Pleomorphic adenoma of the parotid= surgical excision <\/div>Pleomorphic adenomas a usually benign tumours. However, they will enlarge over time and a proportion can undergo malignant transformation. Therefore, all pleomorphic adenomas are excised and a superficial parotidectomy is generally the procedure of choice. The facial nerve is preserved. More recently, there has been a move towards partial superficial parotidectomy. However, complete resection of the lesion is still mandatory."}, {"number": 22, "topic": "Parotid gland clinical", "stem_html": "A 22 year old man presents with symptoms of lethargy and bilateral facial nerve palsy. On examination he has bilateral parotid gland enlargement. What is the most likely cause?", "options": [{"label_html": "Pleomorphic adenoma", "is_correct": false}, {"label_html": "Cerebrovascular accident", "is_correct": false}, {"label_html": "Sarcoidosis", "is_correct": true}, {"label_html": "Warthins tumour", "is_correct": false}, {"label_html": "Adenoid cystic carcinoma", "is_correct": false}], "correct_index": 2, "explanation_html": "Facial nerve palsy is the commonest neurological manifestation of sarcoid. It usually resolves. The absence of a discrete lesion on palpation is against the other causes."}, {"number": 23, "topic": "Parotid gland clinical", "stem_html": "A 50 year old female presents with bilateral parotid gland swelling and symptoms of a dry mouth. On examination, she has bilateral facial nerve palsies. This improved following steroid treatment. What is the likely underlying diagnosis?", "options": [{"label_html": "Pleomorphic adenoma", "is_correct": false}, {"label_html": "Sarcoid", "is_correct": true}, {"label_html": "Warthins tumour", "is_correct": false}, {"label_html": "Sialolithiasis", "is_correct": false}, {"label_html": "Adenoid cystic carcinoma", "is_correct": false}], "correct_index": 1, "explanation_html": "Sarcoid occurs bilaterally in 70% of cases and facial nerve involvement is recognised. Treatment is conservative in most cases although individuals with facial nerve palsy will usually receive steroids with good effect."}, {"number": 24, "topic": "Parotid gland clinical", "stem_html": "A 50 year old woman presents with a diffuse swelling in the region of her right parotid together with facial pain. On examination, she has a right sided facial nerve palsy. What is the most likely underlying cause?", "options": [{"label_html": "Pleomorphic adenoma", "is_correct": false}, {"label_html": "Adenoid cystic carcinoma", "is_correct": true}, {"label_html": "Warthins tumour", "is_correct": false}, {"label_html": "Lymphoma", "is_correct": false}, {"label_html": "Sarcoid", "is_correct": false}], "correct_index": 1, "explanation_html": "Adenoid cystic carcinoma commonly infiltrates the facial nerve and may cause neuropathy and facial pain."}, {"number": 25, "topic": "Parotid gland clinical", "stem_html": "A 50 year old lady presents with symptoms of a dry mouth that has been present for the past few months. She also has a sensation of grittiness in her eyes. On examination, she has a diffuse swelling of her parotid gland. There is no evidence of facial nerve palsy. What is the likely underlying diagnosis?", "options": [{"label_html": "Sarcoid", "is_correct": false}, {"label_html": "Sjogrens syndrome", "is_correct": true}, {"label_html": "Adenoid cystic carcinoma", "is_correct": false}, {"label_html": "Pleomorphic adenoma", "is_correct": false}, {"label_html": "Lymphoma", "is_correct": false}], "correct_index": 1, "explanation_html": "Most patients with Sjogrens present in the post menopausal years. Multi system involvement is common."}, {"number": 26, "topic": "Parotid gland clinical", "stem_html": "An 18 year old boy presents with pancreatitis. He has bilateral painful parotid enlargement. What is the most likely underlying cause?", "options": [{"label_html": "Sialectasis", "is_correct": false}, {"label_html": "Bacterial parotitis", "is_correct": false}, {"label_html": "Viral parotitis", "is_correct": true}, {"label_html": "Mucoepidermoid carcinoma", "is_correct": false}, {"label_html": "Sjogren's syndrome", "is_correct": false}], "correct_index": 2, "explanation_html": "In a young adult with parotid swelling and pancreatitis/orchitis/reduced hearing/meningoencephalitis suspect mumps. There is an association between Sjogrens syndrome and pancreatitis but the mean age of onset is 55."}, {"number": 27, "topic": "Parotid gland clinical", "stem_html": "Which of the following does not cause parotid enlargement?", "options": [{"label_html": "Liver cirrhosis", "is_correct": false}, {"label_html": "Myxoedema", "is_correct": false}, {"label_html": "Amiodarone", "is_correct": true}, {"label_html": "Tuberculosis", "is_correct": false}, {"label_html": "Sjogrens syndrome", "is_correct": false}], "correct_index": 2, "explanation_html": "Drugs commonly implicated in parotid gland enlargement include: <br>Thiouracil, isoprenaline, phenylbutazone, high oestrogen dose contraceptive pills."}, {"number": 28, "topic": "Parotid gland clinical", "stem_html": "A 25 year old woman presents with a slowly enlarging mass on the side of the face. Clinical examination demonstrates that the mass is located in the tail of the parotid gland. There is no evidence of facial nerve involvement. What is the most likely cause?", "options": [{"label_html": "Sialolithiasis", "is_correct": false}, {"label_html": "Adenocarcinoma", "is_correct": false}, {"label_html": "Warthins tumour", "is_correct": false}, {"label_html": "Oncocytoma", "is_correct": false}, {"label_html": "Pleomorphic adenoma", "is_correct": true}], "correct_index": 4, "explanation_html": "Pleomorphic adenomas are the commonest tumours of the parotid gland and are often slow growing, smooth and mobile. Warthins tumours are typically found in elderly males and are composed of multiple cysts and solid components consisting of lymphoid tissue. Warthins tumours are most often found in the tail of the parotid gland, but not in 25 year old females, where a pleomorphic adenoma remains the most likely lesion."}, {"number": 29, "topic": "Parotid gland clinical", "stem_html": "A 78 year old man is referred to the clinic by his general practitioner. For many years he noticed a smooth swelling approximately 2cm anterior to the tragus of his right ear. Apart from being a heavy smoker he has no co-morbidities. What is the most likely diagnosis?", "options": [{"label_html": "Pleomorphic adenoma", "is_correct": false}, {"label_html": "Liposarcoma", "is_correct": false}, {"label_html": "Warthins tumour", "is_correct": true}, {"label_html": "Adenocarcinoma", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 2, "explanation_html": "Warthins tumours are most common in elderly smokers. They have a relatively benign and indolent course. They are usually well circumscribed as illustrated below:<br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb088b.jpg\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb088.jpg\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Warthin%27s tumor\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb088b.jpg\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}], "note_html": "<b>Benign neoplasms<\/b><br>Up to 80% of all salivary gland tumours occur in the parotid gland and up to 80% of these are benign. There is no consistent correlation between the rate of growth and the malignant potential of the lesion. However, benign tumours should not invade structures such as the facial nerve. <br>With the exception of Warthins tumours, they are commoner in women than men. The median age of developing a lesion is in the 5th decade of life. <br><br><b>Benign tumour types<\/b><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Tumour type<\/b><\/th><th><b>Features<\/b><\/th><\/tr><\/thead><tbody><tr><td>Benign pleomorphic adenoma or benign mixed tumor<\/td><td>Most common parotid neoplasm (80%) <br>Proliferation of epithelial and myoepithelial cells of the ducts and an increase in stromal components<br>Slow growing, lobular, and not well encapsulated<br>Recurrence rate of 1-5% with appropriate excision (parotidectomy)<br>Recurrence possibly secondary to capsular disruption during surgery<br>Malignant degeneration occurring in 2-10% of adenomas observed for long periods, with carcinoma ex-pleomorphic adenoma occurring most frequently as adenocarcinoma<\/td><\/tr><tr><td>Warthin tumor (papillary cystadenoma lymphoma or adenolymphoma)<\/td><td>Second most common benign parotid tumor (5%)<br>Most common bilateral benign neoplasm of the parotid<br>Marked male as compared to female predominance<br>Occurs later in life (sixth and seventh decades)<br>Presents as a lymphocytic infiltrate and cystic epithelial proliferation<br>May represent heterotopic salivary gland epithelial tissue trapped within intraparotid lymph nodes<br>Incidence of bilaterality and multicentricity of 10%<br>Malignant transformation rare (almost unheard of)<\/td><\/tr><tr><td>Monomorphic adenoma<\/td><td>Account for less than 5% of tumours<br>Slow growing<br>Consist of only one morphological cell type (hence term mono)<br>Include; basal cell adenoma, canalicular adenoma, oncocytoma, myoepitheliomas<\/td><\/tr><tr><td>Haemangioma<\/td><td>Should be considered in the differential of a parotid mass in a child<br>Accounts for 90% of parotid tumours in children less than 1 year of age<br>Hypervascular on imaging<br>Spontaneous regression may occur and malignant transformation is almost unheard of<\/td><\/tr><\/tbody><\/table><\/div><br><b>Malignant salivary gland tumours<\/b><br><b>Types of malignancy<\/b><br><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Mucoepidermoid carcinoma<\/b><\/td><td>30% of all parotid malignancies<br>Usually low potential for local invasiveness and metastasis (depends mainly on grade)<\/td><\/tr><tr><td><b>Adenoid cystic carcinoma<\/b><\/td><td>Unpredictable growth pattern<br>Tendency for perineural spread<br>Nerve growth may display skip lesions resulting in incomplete excision<br>Distant metastasis more common (visceral rather than nodal spread)<br>5 year survival 35%<\/td><\/tr><tr><td><b>Mixed tumours<\/b><\/td><td>Often a malignancy occurring in a previously benign parotid lesion<\/td><\/tr><tr><td><b>Acinic cell carcinoma<\/b><\/td><td>Intermediate grade malignancy<br>May show perineural invasion<br>Low potential for distant metastasis<br>5 year survival 80%<\/td><\/tr><tr><td><b>Adenocarcinoma<\/b><\/td><td>Develops from secretory portion of gland<br>Risk of regional nodal and distant metastasis<br>5 year survival depends upon stage at presentation, may be up to 75% with small lesions with no nodal involvement<\/td><\/tr><tr><td><b>Lymphoma<\/b><\/td><td>Large rubbery lesion, may occur in association with Warthins tumours<br>Diagnosis should be based on regional nodal biopsy rather than parotid resection<br> Treatment is with chemotherapy (and radiotherapy)<\/td><\/tr><\/tbody><\/table><\/div><br><b>Diagnostic evaluation<\/b><br><ul><li>Plain x-rays may be used to exclude calculi<\/li><li>Sialography may be used to delineate ductal anatomy<\/li><li>FNAC is used in most cases<\/li><li>Superficial parotidectomy may be either diagnostic or therapeutic depending upon the nature of the lesion<\/li><li>Where malignancy is suspected the primary approach should be definitive resection rather than excisional biopsy<\/li><li>CT/ MRI may be used in cases of malignancy for staging primary disease<\/li><\/ul><br><b>Treatment<\/b><br>For nearly all lesions this consists of surgical resection, for benign disease this will usually consist of a superficial parotidectomy. For malignant disease a radical or extended radical parotidectomy is performed. The facial nerve is included in the resection if involved. The need for neck dissection is determined by the potential for nodal involvement.<br><br><b>Other parotid disorders<\/b><br><b>HIV infection<\/b><br><ul><li>Lymphoepithelial cysts associated with HIV occur almost exclusively in the parotid<\/li><li>Typically presents as bilateral, multicystic, symmetrical swelling <\/li><li>Risk of malignant transformation is low and management usually conservative<\/li><\/ul><br><b>Sjogren syndrome<\/b><br><ul><li>Autoimmune disorder characterised by parotid enlargement, xerostomia and keratoconjunctivitis sicca<\/li><li>90% of cases occur in females<\/li><li>Second most common connective tissue disorder<\/li><li>Bilateral, non tender enlargement of the gland is usual<\/li><li>Histologically, the usual findings are of a lymphocytic infiltrate in acinar units and epimyoepithelial islands surrounded by lymphoid stroma<\/li><li>Treatment is supportive<\/li><li>There is an increased risk of subsequent lymphoma<\/li><\/ul><br><b>Sarcoid<\/b><br><ul><li>Parotid involvement occurs in 6% of patients with sarcoid<\/li><li>Bilateral in most cases<\/li><li>Gland is not tender<\/li><li>Xerostomia may occur<\/li><li>Management of isolated parotid disease is usually conservative<\/li><\/ul>"}, {"name": "Secondary haemorrhage after tonsillectomy", "questions": [{"number": 30, "topic": "Secondary haemorrhage after tonsillectomy", "stem_html": "At which of the following time frames is secondary haemorrhage most likely to occur following tonsillectomy?", "options": [{"label_html": "Between 5 and 10 days after surgery", "is_correct": true}, {"label_html": "During the first 6 hours after surgery", "is_correct": false}, {"label_html": "Between 6 and 12 hours after surgery", "is_correct": false}, {"label_html": "Upon resumption of normal feeding", "is_correct": false}, {"label_html": "Between 2 and 3 days post operatively", "is_correct": false}], "correct_index": 0, "explanation_html": "Haemorrhage in the first 24 hours after surgery is termed reactionary haemorrhage. Feeding does not increase the risk and may actually lower the risks of infection developing."}], "note_html": "Haemorrhage is a feared complication following tonsillectomy. Primary, or reactionary haemorrhage most commonly occurs in the first 6-8 hours following surgery. It is managed by immediate return to theatre.<br>Secondary haemorrhage occurs between 5 and 10 days after surgery, it is often associated with a wound infection. Treatment is usually with admission and antibiotics. Severe bleeding may require surgery. Secondary haemorrhage occurs in 3% of all tonsillectomies."}, {"name": "Submandibular glands- disease", "questions": [{"number": 31, "topic": "Submandibular glands- disease", "stem_html": "A 56 year old man presents with episodic facial pain and discomfort whilst eating. He has suffered from halitosis recently and he frequently complains of a dry mouth. He has a smooth swelling underneath his right mandible. What is the most likely underlying diagnosis?", "options": [{"label_html": "Stone impacted in Whartons duct", "is_correct": true}, {"label_html": "Stone impacted in Stensens duct", "is_correct": false}, {"label_html": "Benign adenoma of the submandibular gland", "is_correct": false}, {"label_html": "Adenocarcinoma of the submandibular gland", "is_correct": false}, {"label_html": "Squamous cell carcinoma of the submandibular gland", "is_correct": false}], "correct_index": 0, "explanation_html": "The symptoms are typical for sialolithiasis. The stones most commonly form in the submandibular gland and therefore may occlude Whartons duct. Stensens duct drains the parotid gland."}, {"number": 32, "topic": "Submandibular glands- disease", "stem_html": "A 56 year old man presents with a painless swelling in the upper part of the anterior triangle of his neck. On examination a mass lesion involving the sub mandibular gland is identified. On CT scanning this is shown to be a solid lesion. There is no regional lymphadenopathy. Two fine needle aspirates have failed to be diagnostic. Which of the following is the most appropriate management option?", "options": [{"label_html": "Sub mandibular gland excision", "is_correct": true}, {"label_html": "Incisional biopsy of the mass", "is_correct": false}, {"label_html": "Manage conservatively and repeat the CT scan in 6 months", "is_correct": false}, {"label_html": "Sub mandibular gland excision and radical neck dissection", "is_correct": false}, {"label_html": "Diagnostic excision of the superficial lobe of the submandibular gland", "is_correct": false}], "correct_index": 0, "explanation_html": "There is a 50% risk that this lesion is malignant (in some series up to 70%). Therefore the gland should be excised entirely. At this stage a radical neck dissection is not justified."}], "note_html": "<b>Physiology<\/b><br>The submandibular glands secrete approximately 800- 1000ml saliva per day. They typically produce mixed seromucinous secretions. When parasympathetic activity is dominant; the secretions will be more serous. The parasympathetic fibres are derived from the chorda tympani nerves and the submandibular ganglion. Sensory fibres are conveyed by the lingual branch of the mandibular nerve.<br><br><b>Sialolithiasis<\/b><br><ul><li>80% of all salivary gland calculi occur in the submandibular gland<\/li><li>70% of the these calculi are radio-opaque<\/li><li>Stones are usually composed of calcium phosphate or calcium carbonate<\/li><li>Patients typically develop colicky pain and post prandial swelling of the gland<\/li><li>Investigation involves sialography to demonstrate the site of obstruction and associated other stones<\/li><li>Stones impacted in the distal aspect of Whartons duct may be removed orally, other stones and chronic inflammation will usually require gland excision<\/li><\/ul><br><b>Sialadenitis<\/b><br><ul><li>Usually occurs as a result of <i>Staphylococcus aureus<\/i> infection<\/li><li>Pus may be seen leaking from the duct, erythema may also be noted<\/li><li>Development of a sub mandibular abscess is a serious complication as it may spread through the other deep fascial spaces and occlude the airway<\/li><\/ul><br><b>Submandibular tumours<\/b><br><ul><li>Only 8% of salivary gland tumours affect the sub mandibular gland<\/li><li>Of these 50% are malignant (usually adenoid cystic carcinoma)<\/li><li>Diagnosis usually involves fine needle aspiration cytology<\/li><li>Imaging is with CT and MRI<\/li><li>In view of the high prevalence of malignancy, all masses of the submandibular glands should generally be excised.<\/li><\/ul>"}, {"name": "Voice production", "questions": [{"number": 33, "topic": "Voice production", "stem_html": "A 42 year old singer is admitted for a thyroidectomy. Post operatively she is only able to make a gargling noise. Her voice sounds breathy. What is the most likely explanation?", "options": [{"label_html": "Bilateral inferior laryngeal nerve injury", "is_correct": false}, {"label_html": "Unilateral inferior laryngeal nerve injury", "is_correct": true}, {"label_html": "Unilateral superior laryngeal nerve injury", "is_correct": false}, {"label_html": "Bilateral superior laryngeal nerve injury", "is_correct": false}, {"label_html": "Lacunar infarct", "is_correct": false}], "correct_index": 1, "explanation_html": "This patient has diplophonia which causes a gargling sound. This is associated with dysphagia. This can also be caused by a vagus nerve lesion, but the recurrent laryngeal nerve is more at risk of damage. In bilateral injury, the airway is at risk and therefore this takes precedence."}, {"number": 34, "topic": "Voice production", "stem_html": "A 42 year old singer is admitted for a thyroidectomy. Post operatively the patient develops stridor and has difficulty speaking. What is the most likely underlying cause?", "options": [{"label_html": "Bilateral superior laryngeal nerve injury", "is_correct": false}, {"label_html": "Unilateral recurrent laryngeal nerve injury", "is_correct": false}, {"label_html": "Unilateral superior laryngeal nerve injury", "is_correct": false}, {"label_html": "Bilateral recurrent laryngeal nerve injury", "is_correct": true}, {"label_html": "Hypoglossal nerve injury", "is_correct": false}], "correct_index": 3, "explanation_html": "This patient has speaking difficulties as the cords lie in the paramedian position and so speech is difficult and breathing obstructed."}, {"number": 35, "topic": "Voice production", "stem_html": "A 40 year old professional singer is admitted for a right thyroid lobectomy. Post operatively, she is unable to sing high notes. Which of the following muscles is likely to demonstrate impaired function?", "options": [{"label_html": "Thyroarytenoid", "is_correct": false}, {"label_html": "Posterior cricoarytenoid", "is_correct": false}, {"label_html": "Cricothyroid", "is_correct": true}, {"label_html": "Thyrohyoid", "is_correct": false}, {"label_html": "Lateral cricoarytenoid", "is_correct": false}], "correct_index": 2, "explanation_html": "The most likely injury is to the superior laryngeal nerve which innervates the cricothyroid muscle. Since this tenses the vocal cords, singing high notes becomes a problem."}], "note_html": "There are 2 main nerves involved:<br><br><b>Superior laryngeal nerve (SLN)<\/b><br><ul><li>Innervates the cricothyroid muscle<\/li><\/ul><br>Since the cricothyroid muscle is involved in adjusting the tension of the vocal fold for high notes during singing, SLN paresis and paralysis result in:<br><br>a. Abnormalities in pitch<br>b. Inability to sing with smooth change to each higher note (glissando or pitch glide)<br><br><b>Recurrent laryngeal nerve (RLN)/Inferior laryngeal nerve<\/b><br><ul><li>Innervates intrinsic larynx muscles<\/li><\/ul><br>a. Opening vocal folds (as in breathing, coughing)<br>b. Closing vocal folds for vocal fold vibration during voice use<br>c. Closing vocal folds during swallowing"}]}</script>
  <script>
    const quizData = JSON.parse(document.getElementById("quiz-data").textContent);
    const app = document.getElementById("app");
    const modeButtons = Array.from(document.querySelectorAll("[data-mode-button]"));
    const topicActionButtons = Array.from(document.querySelectorAll("[data-topic-action]"));

    const state = {
      mode: "solve",
      answers: new Map(),
      questionRefs: [],
    };

    function buildTopic(topic, questionOffset) {
      const details = document.createElement("details");
      details.className = "topic";
      details.open = true;

      const summary = document.createElement("summary");
      summary.innerHTML = `
        <div>
          <h2 class="topic-title">${topic.name}</h2>
        </div>
        <div class="topic-meta">
          <span>${topic.questions.length} questions</span>
          <span class="chevron" aria-hidden="true">></span>
        </div>
      `;

      const body = document.createElement("div");
      body.className = "topic-body";

      if (topic.note_html) {
        const notes = document.createElement("details");
        notes.className = "topic-notes";

        const notesSummary = document.createElement("summary");
        notesSummary.innerHTML = `
          <span class="topic-notes-title">Notes</span>
          <span class="chevron" aria-hidden="true">></span>
        `;

        const notesBody = document.createElement("div");
        notesBody.className = "topic-notes-body rich-text";
        notesBody.innerHTML = topic.note_html;

        notes.appendChild(notesSummary);
        notes.appendChild(notesBody);
        body.appendChild(notes);
      }

      topic.questions.forEach((question, indexInTopic) => {
        const globalIndex = questionOffset + indexInTopic;
        body.appendChild(buildQuestionCard(question, globalIndex));
      });

      details.appendChild(summary);
      details.appendChild(body);
      return details;
    }

    function buildQuestionCard(question, questionIndex) {
      const card = document.createElement("article");
      card.className = "question-card is-hidden";
      card.dataset.questionIndex = String(questionIndex);

      const label = document.createElement("p");
      label.className = "question-label";
      label.textContent = `Question ${question.number}`;

      const stem = document.createElement("div");
      stem.className = "stem rich-text";
      stem.innerHTML = question.stem_html;

      const options = document.createElement("div");
      options.className = "options";

      const optionButtons = question.options.map((option, optionIndex) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "option";
        button.dataset.optionIndex = String(optionIndex);
        button.innerHTML = option.label_html;
        button.addEventListener("click", () => {
          if (state.mode !== "solve") {
            return;
          }
          state.answers.set(questionIndex, optionIndex);
          applyQuestionState(questionIndex);
        });
        options.appendChild(button);
        return button;
      });

      const explanation = document.createElement("div");
      explanation.className = "explanation rich-text";
      explanation.innerHTML = `<span class="explanation-label">Explanation</span>${question.explanation_html}`;

      card.appendChild(label);
      card.appendChild(stem);
      card.appendChild(options);
      card.appendChild(explanation);

      state.questionRefs[questionIndex] = {
        card,
        explanation,
        optionButtons,
        question,
      };

      applyQuestionState(questionIndex);
      return card;
    }

    function applyQuestionState(questionIndex) {
      const ref = state.questionRefs[questionIndex];
      if (!ref) {
        return;
      }

      const { card, optionButtons, question } = ref;
      const selectedIndex = state.answers.get(questionIndex);
      const hasSelection = selectedIndex !== undefined;
      const isReview = state.mode === "review";
      const showExplanation = isReview || hasSelection;

      card.classList.toggle("is-hidden", !showExplanation);

      optionButtons.forEach((button, optionIndex) => {
        button.classList.remove("correct", "incorrect", "neutral-revealed");

        if (isReview) {
          button.disabled = true;
          if (optionIndex === question.correct_index) {
            button.classList.add("correct");
          } else {
            button.classList.add("neutral-revealed");
          }
          return;
        }

        button.disabled = false;
        if (!hasSelection) {
          return;
        }

        if (optionIndex === question.correct_index) {
          button.classList.add("correct");
        } else if (optionIndex === selectedIndex) {
          button.classList.add("incorrect");
        } else {
          button.classList.add("neutral-revealed");
        }
      });
    }

    function renderApp() {
      if (!quizData.topics.length) {
        const empty = document.createElement("div");
        empty.className = "empty-state";
        empty.textContent = "No questions were found in this JSON file.";
        app.replaceChildren(empty);
        return;
      }

      const wrapper = document.createElement("div");
      wrapper.className = "topic-list";

      let questionOffset = 0;
      quizData.topics.forEach((topic) => {
        wrapper.appendChild(buildTopic(topic, questionOffset));
        questionOffset += topic.questions.length;
      });

      app.replaceChildren(wrapper);
    }

    function setMode(mode) {
      state.mode = mode;
      modeButtons.forEach((button) => {
        const isActive = button.dataset.modeButton === mode;
        button.classList.toggle("active", isActive);
        button.setAttribute("aria-pressed", String(isActive));
      });

      state.questionRefs.forEach((_, index) => applyQuestionState(index));
    }

    function setAllTopics(open) {
      document.querySelectorAll(".topic").forEach((topic) => {
        topic.open = open;
      });
    }

    modeButtons.forEach((button) => {
      button.addEventListener("click", () => setMode(button.dataset.modeButton));
    });

    topicActionButtons.forEach((button) => {
      button.addEventListener("click", () => {
        setAllTopics(button.dataset.topicAction === "expand");
      });
    });

    renderApp();
    setMode("solve");
  </script>
</body>
</html>
