<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Emergency Medicine And Management Of Trauma</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f1e8;
      --bg-accent: #ebe4d4;
      --surface: rgba(255, 252, 246, 0.92);
      --surface-strong: #fffdf7;
      --border: #d9cfbd;
      --text: #23313a;
      --text-soft: #5f6c73;
      --accent: #496a58;
      --accent-strong: #2f5341;
      --correct-bg: #e0f3e6;
      --correct-border: #77b487;
      --wrong-bg: #fbe0df;
      --wrong-border: #dc7a73;
      --note-bg: #f3eee2;
      --shadow: 0 18px 40px rgba(76, 59, 37, 0.08);
      --radius-lg: 22px;
      --radius-md: 16px;
      --radius-sm: 12px;
      --page-width: 960px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: "Avenir Next", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.72), transparent 32%),
        linear-gradient(180deg, #f8f4eb 0%, #f3ede0 100%);
      line-height: 1.65;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.14), transparent 18%, transparent 82%, rgba(255, 255, 255, 0.14)),
        repeating-linear-gradient(
          180deg,
          rgba(73, 106, 88, 0.015) 0,
          rgba(73, 106, 88, 0.015) 1px,
          transparent 1px,
          transparent 18px
        );
    }

    a {
      color: var(--accent-strong);
    }

    img {
      max-width: 100%;
      height: auto;
      border-radius: 14px;
    }

    .score-badge,
    .badge.rounded-pill.bg-danger {
      display: none !important;
    }

    .page {
      width: min(100% - 24px, var(--page-width));
      margin: 0 auto;
      padding: 18px 0 48px;
    }

    .topbar {
      margin-bottom: 18px;
      padding: 18px;
      background: rgba(255, 252, 246, 0.9);
      border: 1px solid rgba(217, 207, 189, 0.86);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .topbar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .eyebrow {
      margin: 0 0 4px;
      font-size: 0.76rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-soft);
    }

    .title {
      margin: 0;
      font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
      font-size: clamp(1.5rem, 2vw + 1rem, 2.35rem);
      line-height: 1.08;
      font-weight: 700;
    }

    .meta {
      margin: 8px 0 0;
      color: var(--text-soft);
      font-size: 0.96rem;
    }

    .mode-switch {
      display: inline-flex;
      padding: 6px;
      border-radius: 999px;
      background: var(--bg-accent);
      border: 1px solid var(--border);
      gap: 6px;
      flex-shrink: 0;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
      flex-wrap: wrap;
    }

    .topic-actions {
      display: inline-flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .utility-button {
      appearance: none;
      border: 1px solid var(--border);
      background: var(--surface-strong);
      color: var(--text);
      font: inherit;
      font-weight: 700;
      border-radius: 999px;
      padding: 10px 14px;
      cursor: pointer;
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .utility-button:hover {
      transform: translateY(-1px);
      border-color: #c7bba9;
      box-shadow: 0 8px 18px rgba(70, 54, 34, 0.07);
    }

    .utility-button:focus-visible {
      outline: 3px solid rgba(73, 106, 88, 0.22);
      outline-offset: 2px;
    }

    .mode-button {
      appearance: none;
      border: 0;
      background: transparent;
      color: var(--text-soft);
      font: inherit;
      font-weight: 700;
      border-radius: 999px;
      padding: 10px 16px;
      min-width: 92px;
      cursor: pointer;
      transition: transform 0.18s ease, background 0.18s ease, color 0.18s ease, box-shadow 0.18s ease;
    }

    .mode-button:hover {
      transform: translateY(-1px);
      color: var(--text);
    }

    .mode-button.active {
      background: var(--surface-strong);
      color: var(--accent-strong);
      box-shadow: 0 8px 18px rgba(73, 106, 88, 0.14);
    }

    .topic-list {
      display: grid;
      gap: 18px;
    }

    .topic {
      background: rgba(255, 252, 246, 0.78);
      border: 1px solid rgba(217, 207, 189, 0.9);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .topic[open] {
      background: rgba(255, 252, 246, 0.9);
    }

    .topic > summary {
      list-style: none;
      cursor: pointer;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      user-select: none;
    }

    .topic > summary::-webkit-details-marker {
      display: none;
    }

    .topic-title {
      margin: 0;
      font-size: 1.08rem;
      font-weight: 800;
      letter-spacing: 0.01em;
    }

    .topic-meta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--text-soft);
      font-size: 0.94rem;
    }

    .chevron {
      display: inline-block;
      transition: transform 0.2s ease;
      color: var(--accent);
      font-weight: 700;
    }

    .topic[open] > summary .chevron {
      transform: rotate(90deg);
    }

    .topic-notes {
      background: rgba(243, 238, 226, 0.62);
      border: 1px solid #e3d9c8;
      border-radius: var(--radius-md);
      overflow: hidden;
    }

    .topic-notes > summary {
      list-style: none;
      cursor: pointer;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      user-select: none;
    }

    .topic-notes > summary::-webkit-details-marker {
      display: none;
    }

    .topic-notes-title {
      font-size: 0.95rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-soft);
    }

    .topic-notes[open] > summary .chevron {
      transform: rotate(90deg);
    }

    .topic-notes-body {
      padding: 0 16px 16px;
      color: var(--text);
    }

    .topic-body {
      padding: 0 16px 16px;
      display: grid;
      gap: 14px;
    }

    .question-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 18px;
      box-shadow: 0 10px 24px rgba(70, 54, 34, 0.05);
    }

    .question-label {
      margin: 0 0 10px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-soft);
      font-size: 0.88rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 800;
    }

    .stem {
      font-size: 1rem;
    }

    .stem > *:first-child,
    .explanation > *:first-child {
      margin-top: 0;
    }

    .stem > *:last-child,
    .explanation > *:last-child {
      margin-bottom: 0;
    }

    .options {
      margin-top: 16px;
      display: grid;
      gap: 10px;
    }

    .option {
      width: 100%;
      text-align: left;
      border: 1px solid #d8d0c2;
      background: #fffdf8;
      color: var(--text);
      border-radius: var(--radius-sm);
      padding: 14px 15px;
      font: inherit;
      line-height: 1.45;
      cursor: pointer;
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
    }

    .option:hover {
      transform: translateY(-1px);
      border-color: #c7bba9;
      box-shadow: 0 8px 18px rgba(70, 54, 34, 0.07);
    }

    .option:focus-visible {
      outline: 3px solid rgba(73, 106, 88, 0.22);
      outline-offset: 2px;
    }

    .option.correct {
      background: var(--correct-bg);
      border-color: var(--correct-border);
      box-shadow: inset 0 0 0 1px rgba(119, 180, 135, 0.2);
    }

    .option.incorrect {
      background: var(--wrong-bg);
      border-color: var(--wrong-border);
      box-shadow: inset 0 0 0 1px rgba(220, 122, 115, 0.2);
    }

    .option.neutral-revealed {
      background: #faf6ee;
      border-color: #d8d0c2;
      color: #5f676a;
    }

    .option[disabled] {
      cursor: default;
      opacity: 1;
    }

    .explanation {
      margin-top: 14px;
      padding: 14px 16px;
      background: var(--note-bg);
      border: 1px solid #e3d9c8;
      border-radius: 14px;
      color: var(--text);
    }

    .question-card.is-hidden .explanation {
      display: none;
    }

    .explanation-label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-soft);
      font-weight: 800;
    }

    .empty-state {
      padding: 28px 22px;
      background: var(--surface);
      border: 1px dashed var(--border);
      border-radius: var(--radius-lg);
      color: var(--text-soft);
    }

    .rich-text table {
      width: 100%;
      border-collapse: collapse;
      margin: 12px 0;
      overflow: hidden;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.68);
    }

    .rich-text td,
    .rich-text th {
      border: 1px solid #ddd2bf;
      padding: 10px 12px;
      vertical-align: top;
    }

    .rich-text ul,
    .rich-text ol {
      padding-left: 20px;
      margin: 10px 0;
    }

    .rich-text center {
      display: block;
      text-align: center;
    }

    .rich-text .table-responsive {
      overflow-x: auto;
    }

    @media (max-width: 720px) {
      .page {
        width: min(100% - 16px, var(--page-width));
        padding-top: 10px;
      }

      .topbar {
        padding: 14px;
        border-radius: 18px;
      }

      .topbar-inner {
        flex-direction: column;
        align-items: stretch;
      }

      .controls {
        justify-content: stretch;
      }

      .topic-actions {
        width: 100%;
      }

      .utility-button {
        flex: 1 1 0;
      }

      .mode-switch {
        width: 100%;
        justify-content: stretch;
      }

      .mode-button {
        flex: 1 1 50%;
      }

      .topic > summary {
        padding: 16px;
        align-items: flex-start;
      }

      .topic-meta {
        font-size: 0.88rem;
      }

      .topic-body {
        padding: 0 12px 12px;
      }

      .question-card {
        padding: 15px;
      }

      .option {
        padding: 13px 14px;
      }
    }
  </style>
</head>

  <script id="quiz-data" type="application/json">{"title": "Emergency Medicine And Management Of Trauma", "topics": [{"name": "Addisonian crisis", "questions": [{"number": 1, "topic": "Addisonian crisis", "stem_html": "A 42 year old man is admitted to surgery with acute appendicitis.  He is known to have hypertension,  psoriatic arthropathy and polymyalgia rheumatica.  His medical therapy includes:<br>Paracetamol 1g qds<br>Codeine phosphate 30mg qds<br>Bendrofluazide 2.5 mg od<br>Ramipril 10mg od<br>Methotrexate 7.5mg once a week<br>Prednisolone 5mg od<br>You are called by the core surgical trainee to assess this man as he has become delirious and hypotensive 2 hours after surgery.  His blood results reveal:<br><br><br><div class=\"table-responsive\"><table class=\"tb\"><tbody><tr><td>Na<sup>+<\/sup><\/td><td>132 mmol/l<\/td><\/tr><tr><td>K<sup>+<\/sup><\/td><td>5.2 mmol/l<\/td><\/tr><tr><td>Urea<\/td><td>10 mmol/l<\/td><\/tr><tr><td>Creatinine<\/td><td>111 µmol/l<\/td><\/tr><tr><td>Glucose<\/td><td>3.5<\/td><\/tr><tr><td>CRP<\/td><td>158<\/td><\/tr><\/tbody><\/table><\/div><br><br><br><br><div class=\"table-responsive\"><table class=\"tb\"><tbody><tr><td>Hb<\/td><td>10.2 g/dl<\/td><\/tr><tr><td>Platelets<\/td><td>156 * 10<sup>9<\/sup>/l<\/td><\/tr><tr><td>WBC<\/td><td>14 * 10<sup>9<\/sup>/l<\/td><\/tr><\/tbody><\/table><\/div><br><br>What is the most likely diagnosis?", "options": [{"label_html": "Septic shock secondary to appendicitis", "is_correct": false}, {"label_html": "Neutropenic sepsis", "is_correct": false}, {"label_html": "Phaeochromocytoma", "is_correct": false}, {"label_html": "Perforated bowel", "is_correct": false}, {"label_html": "Addisonian crisis", "is_correct": true}], "correct_index": 4, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Features of an addisonian crisis:<br><ul><li>Hyponatraemia<\/li><li>Hyperkalaemia<\/li><li>Hypoglycaemia<\/li><\/ul><\/div>This man is on steroids for polymyalgia rheumatica.  Surgery can precipitate acute adrenal deficiency.  The diagnosis is further confirmed by the blood results of hyponatraemia, hyperkalaemia and hypoglycaemia. This patient urgently needs hydrocortisone."}, {"number": 2, "topic": "Addisonian crisis", "stem_html": "A 42 year old woman is admitted to surgery with acute cholecystitis.  She is known to have hypertension, rheumatoid arthritis and polymyalgia rheumatica.  Her medical therapy includes:<br>Paracetamol 1g qds<br>Codeine phosphate 30mg qds<br>Bendrofluazide 2.5 mg od<br>Ramipril 10mg od<br>Methotrexate 7.5mg once a week<br>Prednisolone 5mg od<br>You are called by the CT1 to assess this lady as she has become delirious and hypotensive 2 hours after surgery.  Her blood results reveal:<br><br><div class=\"table-responsive\"><table class=\"tb\"><tbody><tr><td>Na<sup>+<\/sup><\/td><td>132 mmol/l<\/td><\/tr><tr><td>K<sup>+<\/sup><\/td><td>5.3 mmol/l<\/td><\/tr><tr><td>Urea<\/td><td>7 mmol/l<\/td><\/tr><tr><td>Creatinine<\/td><td>108 µmol/l<\/td><\/tr><\/tbody><\/table><\/div><br><div class=\"table-responsive\"><table class=\"tb\"><tbody><tr><td>Hb<\/td><td>12.4 g/dl<\/td><\/tr><tr><td>Platelets<\/td><td>178 * 10<sup>9<\/sup>/l<\/td><\/tr><tr><td>WBC<\/td><td>15.4 * 10<sup>9<\/sup>/l<\/td><\/tr><\/tbody><\/table><\/div><br><br>What management is needed immediately?", "options": [{"label_html": "Ceftriaxone IV", "is_correct": false}, {"label_html": "Hydrocortisone 50mg IV", "is_correct": false}, {"label_html": "CT scan abdomen", "is_correct": false}, {"label_html": "Urgent exploratory laparotomy", "is_correct": false}, {"label_html": "Hydrocortisone 100mg IV", "is_correct": true}], "correct_index": 4, "explanation_html": "This patient has acute adrenal insufficiency and urgently needs steroid replacement."}], "note_html": "<b>Causes<\/b><br><ul><li>Sepsis or surgery causing an acute exacerbation of chronic insufficiency (Addison's, Hypopituitarism)<\/li><li>Adrenal haemorrhage eg Waterhouse-Friderichsen syndrome (fulminant meningococcemia) <\/li><li>Steroid withdrawal<\/li><\/ul><br><b>Management<\/b><br><ul><li>Hydrocortisone 100 mg im or iv <\/li><li>1 litre normal saline infused over 30-60 mins or with dextrose if hypoglycaemic<\/li><li>Continue hydrocortisone 6 hourly until the patient is stable.  No fludrocortisone is required because high cortisol exerts weak mineralocorticoid action <\/li><li>Oral replacement may begin after 24 hours and be reduced to maintenance over 3-4 days<\/li><\/ul>"}, {"name": "Anaphylactic shock", "questions": [{"number": 3, "topic": "Anaphylactic shock", "stem_html": "A 56 year old man is day one following a laparoscopic appendicectomy. He suddenly develops marked dyspnoea following administration of cyclizine to relieve post operative nausea. On arrival, the patient is breathless with a pulse rate of 122, Bp 86/48, oxygen saturations on air are 85%. Which of these agents should be administered initially?", "options": [{"label_html": "Adrenaline", "is_correct": true}, {"label_html": "Chlorpheniramine", "is_correct": false}, {"label_html": "IV 0.9% saline", "is_correct": false}, {"label_html": "Hydrocortisone", "is_correct": false}, {"label_html": "Salbutamol", "is_correct": false}], "correct_index": 0, "explanation_html": "As this patient most likely has anaphylaxis, administration of adrenaline is most appropriate."}, {"number": 4, "topic": "Anaphylactic shock", "stem_html": "A 21 year old man is undergoing an inguinal hernia repair and receives a dose of intravenous co-amoxiclav. He is reported to have a penicillin allergy. Over the next few minutes his vital signs are:  Pulse - 130bpm, blood pressure-  60/40mmHg.  What is the first line treatment?", "options": [{"label_html": "Hydrocortisone 100mg IV", "is_correct": false}, {"label_html": "Adrenaline 1:1000 IV", "is_correct": false}, {"label_html": "Chlorpheniramine 10mg IV", "is_correct": false}, {"label_html": "Adrenaline 1:1000 IM", "is_correct": true}, {"label_html": "Adrenaline 1:10000 IV", "is_correct": false}], "correct_index": 3, "explanation_html": "The first line treatment of anaphylactic shock is intra muscular adrenaline."}, {"number": 5, "topic": "Anaphylactic shock", "stem_html": "A keen surgical trainee is about to embark on her first hemi arthroplasty for a fractured neck of femur. In the anaesthetic room the patient is given 1.2g intravenous co-amoxiclav. There is a possible history of penicillin allergy but the patient has dementia and the history is not checked. The patient then develops severe respiratory compromise and haemodynamic collapse. Which pathological process accounts for this event?", "options": [{"label_html": "Binding of the drug to circulating IgG class antibodies", "is_correct": false}, {"label_html": "Recognition of the drug by IgE receptors on mast cells", "is_correct": true}, {"label_html": "Drug initiated formation of hapten-protein complexes", "is_correct": false}, {"label_html": "Binding of the drug to circulating IgM class antibodies", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 1, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Anaphylactic shock:<br>Antigen recognised by IgE molecules on the surface of mast cells resulting in rapid degranulation with release of histamine and other inflammatory cytokines.<\/div>This is a case of anaphylactic shock. In anaphylaxis the mast cells degranulate."}], "note_html": "- Suspect if there has been exposure to an allergen<br><br><b>Management<\/b><br>- Remove allergen<br>- ABCD<br>- Drugs:<br><br><b>Adrenaline<\/b> 1:1000 0.5ml INTRAMUSCULARLY (not IV). Repeat after 5 mins if no response.<br>Consider antihistamine if ongoing local symptoms.<br><br>In the refractory anaphylaxis guidance, consideration is given to adrenaline infusions.<br><br><b>Reference<\/b><br>Emergency treatment of anaphylactic reactions. Guidelines for healthcare providers. Working Group of the Resuscitation Council (UK).2021"}, {"name": "Burns", "questions": [{"number": 6, "topic": "Burns", "stem_html": "A 30 year old man is trapped in a house fire and sustains 30% partial and full thickness burns to his torso and limbs. Three days following admission he has a brisk haematemesis. Which of the following is the most likely explanation for this event?", "options": [{"label_html": "Dieulafoy lesion", "is_correct": false}, {"label_html": "Curlings ulcers", "is_correct": true}, {"label_html": "Mallory Weiss tear", "is_correct": false}, {"label_html": "Depletion of platelets", "is_correct": false}, {"label_html": "Depletion of clotting factors", "is_correct": false}], "correct_index": 1, "explanation_html": "Curlings ulcers typically occur secondary to thermal injuries and are caused by loss of GI protective mechanisms. They are at greater risk of perforation than stress ulcers and may also haemorrhage."}, {"number": 7, "topic": "Burns", "stem_html": "A 10 year old child is admitted with severe 30% burns following a house fire. After wound cleaning and dressings he is admitted to critical care. 1 day following skin grafts he becomes tachycardic and hypotensive. He vomits twice and this shows evidence of haematemesis. What is the most likely explanation?", "options": [{"label_html": "Disseminated intra vascular coagulation", "is_correct": false}, {"label_html": "Cushings ulcers", "is_correct": false}, {"label_html": "Curlings ulcers", "is_correct": true}, {"label_html": "Dieulafoy lesion", "is_correct": false}, {"label_html": "Mallory Weiss tear", "is_correct": false}], "correct_index": 2, "explanation_html": "Stress ulcers may occur in the duodenum of burns patients and are more common in children. Cushings ulcers occur as a result of raised ICP."}, {"number": 8, "topic": "Burns", "stem_html": "A 26 year old electrician suffers a full thickness high voltage burn to his leg. On routine urine analysis he has + blood. His U+E's show mild hyperkalaemia and a CK of 3000. What is the most likely explanation?", "options": [{"label_html": "Deep vein thrombosis", "is_correct": false}, {"label_html": "Disseminated intra vascular coagulation", "is_correct": false}, {"label_html": "Rhabdomyolysis", "is_correct": true}, {"label_html": "Myocardial infarct", "is_correct": false}, {"label_html": "Glomerulonephritis", "is_correct": false}], "correct_index": 2, "explanation_html": "Electrical high voltage burns are associated with rhabdomyolysis. Acute tubular necrosis may occur. Aggressive IV fluids should be given."}, {"number": 9, "topic": "Burns", "stem_html": "A 45 year old man is admitted after his clothing caught fire. He suffers a full thickness circumferential burn to his lower thigh. He complains of increasing pain in lower leg and on examination there is parasthesia and severe pain in the lower leg. Foot pulses are normal. What is the most likely explanation?", "options": [{"label_html": "Deep vein thrombosis", "is_correct": false}, {"label_html": "Compartment syndrome", "is_correct": true}, {"label_html": "Rhabdomyolysis", "is_correct": false}, {"label_html": "Synergistic spreading infection", "is_correct": false}, {"label_html": "Nerve injury", "is_correct": false}], "correct_index": 1, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">In compartment syndrome the loss of pulses is a very late sign indeed and only seen when compartment pressure exceeds arterial pressure<\/div>Circumferential burns may constrict the limb and cause a compartment syndrome to develop. Eshcarotomy is required, and compartmental decompression."}, {"number": 10, "topic": "Burns", "stem_html": "A 34 year old woman trips over and falls into a bonfire whilst intoxicated at a party. She suffers burns to her arms, torso and face. These are calculated to be 25% body surface area. She is otherwise stable. The burns to the torso are superficial, her left forearm has a full thickness burn and the burns to her face are superficial. There is no airway compromise. She has received 1000ml of intravenous Hartman's solution, with a further 1000ml prescribed to run over 4 hours. What should be the next course of action?", "options": [{"label_html": "Undertake an escharotomy", "is_correct": false}, {"label_html": "Undertake debridement and skin grafting", "is_correct": false}, {"label_html": "Transfer to a regional burns unit", "is_correct": true}, {"label_html": "Intubate and admit to intensive care", "is_correct": false}, {"label_html": "Discharge home with daily review", "is_correct": false}], "correct_index": 2, "explanation_html": "This woman has been resuscitated and requires transfer for specialist management."}, {"number": 11, "topic": "Burns", "stem_html": "A 20 year old man is trapped in a warehouse fire. He has sustained 60% burns to his torso and limbs. The limb burns are partial thickness but the torso burns are full thickness. He was intubated by paramedics at the scene and is receiving intravenous fluids. His ventilation pressure requirements are rising. What is the best course of action?", "options": [{"label_html": "Ventilate the patient in the prone position", "is_correct": false}, {"label_html": "Escharotomy", "is_correct": true}, {"label_html": "Extubate the patient", "is_correct": false}, {"label_html": "Undertake skin grafting", "is_correct": false}, {"label_html": "Transfer to a burns unit", "is_correct": false}], "correct_index": 1, "explanation_html": "He requires an escharotomy as this will be contributing to impaired ventilation. That may need to precede transfer."}, {"number": 12, "topic": "Burns", "stem_html": "A 30 year old man is rescued from a house fire. On examination, his pulse rate is 80bpm and he is normotensive. His oxygen saturations are 96% on air. and respiratory rate is 14. He has some areas of superficial thickness burns that amount to no more than 2% body surface area. His nasal hairs are noted to be burnt and there is some soot visible in the oropharynx. What is the best course of action?", "options": [{"label_html": "Admit for observation", "is_correct": false}, {"label_html": "Transfer to a burns unit", "is_correct": false}, {"label_html": "Admit to high dependency care unit for observation and invasive monitoring", "is_correct": false}, {"label_html": "Intubate the patient", "is_correct": true}, {"label_html": "Administer nebulised steroids and high flow nasal oxygen", "is_correct": false}], "correct_index": 3, "explanation_html": "Airway injuries can develop marked laryngeal swelling and early intubation is essential to protect the airway."}, {"number": 13, "topic": "Burns", "stem_html": "A 30 year old man is rescued from a house fire. On examination, his pulse rate is 80bpm and he is normotensive. His oxygen saturations are 96% on air. and respiratory rate is 14. He has some areas of superficial thickness burns that amount to no more than 2% body surface area. His nasal hairs are noted to be burnt and there is some soot visible in the oropharynx. What is the best course of action?", "options": [{"label_html": "Admit for observation", "is_correct": false}, {"label_html": "Transfer to a burns unit", "is_correct": false}, {"label_html": "Admit to high dependency care unit for observation and invasive monitoring", "is_correct": false}, {"label_html": "Intubate the patient", "is_correct": true}, {"label_html": "Administer nebulised steroids and high flow nasal oxygen", "is_correct": false}], "correct_index": 3, "explanation_html": "Airway injuries can develop marked laryngeal swelling and early intubation is essential to protect the airway."}, {"number": 14, "topic": "Burns", "stem_html": "A 30 year old man is rescued from a house fire. On examination, his pulse rate is 80bpm and he is normotensive. His oxygen saturations are 96% on air. and respiratory rate is 14. He has some areas of superficial thickness burns that amount to no more than 2% body surface area. His nasal hairs are noted to be burnt and there is some soot visible in the oropharynx. What is the best course of action?", "options": [{"label_html": "Admit for observation", "is_correct": false}, {"label_html": "Transfer to a burns unit", "is_correct": false}, {"label_html": "Admit to high dependency care unit for observation and invasive monitoring", "is_correct": false}, {"label_html": "Intubate the patient", "is_correct": true}, {"label_html": "Administer nebulised steroids and high flow nasal oxygen", "is_correct": false}], "correct_index": 3, "explanation_html": "Airway injuries can develop marked laryngeal swelling and early intubation is essential to protect the airway."}, {"number": 15, "topic": "Burns", "stem_html": "The following features are typical of superficial partial dermal burns except:", "options": [{"label_html": "Erythema", "is_correct": false}, {"label_html": "Absence of blisters", "is_correct": true}, {"label_html": "Spontaneous healing in most cases", "is_correct": false}, {"label_html": "No extension beyond proximal dermal papillae", "is_correct": false}, {"label_html": "Good capillary refill at the burn site", "is_correct": false}], "correct_index": 1, "explanation_html": "Superficial dermal burns are typically erythematous, do not extend beyond the upper part of the dermal papillae, capillary return and blisters are both usually present.<br><br><i>A Typical example of a superficial dermal burn is shown below<\/i><br><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb060b.jpg\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb060.jpg\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Firstdegreeburn\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb060b.jpg\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}, {"number": 16, "topic": "Burns", "stem_html": "A 10 year old boy is playing with a firework which explodes and he sustains a full thickness burn to his left arm. Which of the following statements is not characteristic of this situation?", "options": [{"label_html": "They have a leathery appearance", "is_correct": false}, {"label_html": "The burn area is extremely painful until skin grafted", "is_correct": true}, {"label_html": "They always heal with scarring", "is_correct": false}, {"label_html": "Blanching does not occur under pressure", "is_correct": false}, {"label_html": "Absence of,or few, blisters", "is_correct": false}], "correct_index": 1, "explanation_html": "Full thickness burns involve complete injury to the dermis and sub dermal appendages. They have a leathery, often white appearance. They are initially insensate although pain often occurs during healing following skin grafting. They do not blanch under pressure."}], "note_html": "Burns may be thermal, chemical or electrical. In the former category are burns which occur as a result of heat. Chemical burns occur when the skin is exposed to an extremely caustic or alkaline substance. Electrical burns occur following exposure to electrical current. The immediate management includes removal of the burning source which usually includes irrigation of the burned area. A detailed assessment then needs to be made of the extent of the burns and a number of charts are available for recording this information. The degree of injury relates to the temperature and duration of exposure. Most domestic burns are mainly scalds in young children. <br><br>Following the burn, there is a local response with progressive tissue loss and release of inflammatory cytokines.  Systemically, there are cardiovascular effects resulting from fluid loss and sequestration of fluid into the third space. There is a marked catabolic response. Immunosuppression is common with large burns and bacterial translocation from the gut lumen is a recognised event. Sepsis is a common cause of death following major burns. <br><br><b>Types of burn<\/b><br><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Type of burn<\/b><\/td><td><b>\tSkin layers affected<\/b><\/td><td><b>\tSkin appearance<\/b><\/td><td><b>\tBlanching<\/b><\/td><td><b>\tManagement<\/b><\/td><\/tr><tr><td>Epidermal/Superficial\t<\/td><td>Epidermis<\/td><td>\tRed, moist\t<\/td><td>Yes<\/td><td>\t<\/td><\/tr><tr><td>Superficial partial thickness\t<\/td><td>Epidermis and part of papillary dermis affected \t<\/td><td>Pale, dry<\/td><td>Yes\t<\/td><td>Normally heals with no intervention<\/td><\/tr><tr><td>Deep partial thickness\t<\/td><td>Epidermis, whole papillary dermis affected \t<\/td><td>Mottled red colour\t<\/td><td>No\t<\/td><td>Needs surgical intervention (depending on site)<\/td><\/tr><tr><td>Full thickness\t<\/td><td>Whole skin layer and subcutaneous tissue affected<\/td><td>\tDry, leathery hard wound\t<\/td><td>No\t<\/td><td>Burns centre<\/td><\/tr><\/tbody><\/table><\/div><br><b>Depth of burn assessment<\/b><br><ul><li>Bleeding on needle prick<\/li><li>Sensation<\/li><li>Appearance<\/li><li>Blanching to pressure<\/li><\/ul><br><b>Percentage burn estimation<\/b><br>Lund Browder chart: most accurate even in children<br>Wallace rule of nines<br>Palmar surface: surface area palm = 0.8% burn<br><br>&gt;15% body surface area burns in adults needs urgent burn fluid resuscitation<br><br><b>Transfer to burn centre if:<\/b><br><ul><li>Need burn shock resuscitation<\/li><li>Face/hands/genitals affected<\/li><li>Deep partial thickness or full thickness burns<\/li><li>Significant electrical/chemical burns<\/li><\/ul><br><b>Management<\/b><br>The initial aim is to stop the burning process and resuscitate the patient. Intravenous fluids will be required for children with burns greater than 10% of total body surface area. Adults with burns greater than 15% of total body surface area will also require IV fluids. The fluids are calculated using the Parkland formula which is; volume of fluid= total body surface area of the burn % x weight (Kg) x2-4 (preference for lower amount i.e. 2ml to avoid excessive fluid overload). Half of the fluid is administered in the first 8 hours.  A urinary catheter should be inserted. Analgesia should be given. Complex burns, burns involving the hand perineum and face and burns &gt;10% in adults and &gt;5% in children should be transferred to a burns unit. <br><br>Circumferential burns affecting a limb or severe torso burns impeding respiration may require escharotomy to divide the burnt tissue. <br><br>Conservative management is appropriate for superficial burns and mixed superficial burns that will heal in 2 weeks. More complex burns may require excision and skin grafting. Excision and primary closure is not generally practised as there is a high risk of infection. <br><br>There is no evidence to support the use of anti microbial prophylaxis or topical antibiotics in burn patients. <br><br><b>Escharotomies<\/b> <br><ul><li>Indicated in circumferential full thickness burns to the torso or limbs.<\/li><li>Careful division of the encasing band of burn tissue will potentially improve ventilation (if the burn involves the torso), or relieve compartment syndrome and oedema (where a limb is involved)<\/li><\/ul><br><b>References<\/b><br>www.euroburn.org/e107files/downloads/guidelinesburncare.pdf<br><br>Barajas-Nava LA, LÃ³pez-Alcalde J, Roque i Figuls M, SolÃ&nbsp; I, Bonfill Cosp X. Antibiotic prophylaxis for preventing burn wound infection. Cochrane Database of Systematic Reviews 2013, Issue 6. Art. No.: CD008738. DOI: 10.1002/14651858.CD008738.pub2.   <br><br>Hettiaratchy S &amp; Papini R.  Initial management of a major burn: assessment and resuscitation.  BMJ  2004;329:101-103"}, {"name": "Chest pain in pregnancy", "questions": [{"number": 17, "topic": "Chest pain in pregnancy", "stem_html": "A 28 year old Indian woman, who is 18 weeks pregnant, presents with increasing shortness of breath, chest pain and coughing clear sputum. She is apyrexial, blood pressure is 140/80 mmHg, heart rate 130 bpm and saturations 94% on 15L oxygen. On examination, there is a mid diastolic murmur, there are bibasal crepitations and mild pedal oedema. She suddenly deteriorates and has a respiratory arrest. Her chest x-ray shows a whiteout of both of her lungs. What is the most likely explanation?", "options": [{"label_html": "Acute exacerbation asthma", "is_correct": false}, {"label_html": "Pulmonary embolus", "is_correct": false}, {"label_html": "Mitral regurgitation", "is_correct": false}, {"label_html": "Mitral valve stenosis", "is_correct": true}, {"label_html": "Aortic dissection", "is_correct": false}], "correct_index": 3, "explanation_html": "Mitral stenosis is the commonest cause of cardiac abnormality occurring in pregnant women. Mitral stenosis is becoming less common in the UK population, however should be considered in women from countries where there is a higher incidence of rheumatic heart disease. Mitral stenosis causes a mid diastolic murmur which may be difficult to auscultate unless the patient is placed into the left lateral position. These patients are at risk of atrial fibrillation (up to 40%), which can also contribute to rapid decompensation such as pulmonary oedema (hence cxr 'whiteout' of lungs). Physiological changes in pregnancy may cause an otherwise asymptomatic patient to suddenly deteriorate. Balloon valvuloplasty is the treatment of choice."}, {"number": 18, "topic": "Chest pain in pregnancy", "stem_html": "A 28 year old woman, who is 30 weeks pregnant, presents with sudden onset chest pain associated with loss of consciousness. Her blood pressure is 170/90 mmHg, saturations on 15L oxygen 93%, heart rate 120 bpm and she is apyrexial. On examination, there is an early diastolic murmur, occasional bibasal creptitations and mild pedal oedema. An ECG shows ST elevation in leads II, III and aVF. What is the most likely diagnosis?", "options": [{"label_html": "Pulmonary embolism", "is_correct": false}, {"label_html": "Aortic dissection", "is_correct": true}, {"label_html": "Mitral valve stenosis", "is_correct": false}, {"label_html": "Pneumonia", "is_correct": false}, {"label_html": "Pneumothorax", "is_correct": false}], "correct_index": 1, "explanation_html": "Aortic dissection is associated with the 3rd trimester of pregnancy, connective tissue disorders (Marfan's, Ehlers- Danlos) and bicuspid valve. Patients may complain of a tearing chest pain or syncope. Clinically they may be hypertensive. The right coronary artery may become involved in the dissection, causing myocardial infarct in up to 2% cases (hence ST elevation in the inferior leads). An aortic regurgitant murmur may be auscultated."}, {"number": 19, "topic": "Chest pain in pregnancy", "stem_html": "A 28 year old woman, who is 18 weeks pregnant, presents with sudden chest pain. Her blood pressure is 150/70 mmHg, saturations are 92% on 15L oxygen and her heart rate is 130 bpm. There are no murmurs and her chest is clear. There are signs of thrombophlebitis in the left leg. What is the most likely problem?", "options": [{"label_html": "Pulmonary embolism", "is_correct": true}, {"label_html": "Aortic dissection", "is_correct": false}, {"label_html": "Mitral valve regurgitation", "is_correct": false}, {"label_html": "Myocardial infarct", "is_correct": false}, {"label_html": "Myocarditis", "is_correct": false}], "correct_index": 0, "explanation_html": "Chest pain, hypoxia and clear chest on auscultation in pregnancy should lead to a high suspicion of pulmonary embolism."}], "note_html": "<b>Aortic dissection<\/b><br><ul><li>Predisposing factors in pregnancy are hypertension, congenital heart disease and Marfan's syndrome<\/li><li>Mainly Stanford type A dissections<\/li><li>Sudden tearing chest pain, transient syncope<\/li><li>Patient may be cold and clammy, hypertensive and have an aortic regurgitation murmur<\/li><li>Involvement of the right coronary artery may cause inferior myocardial infarction<\/li><\/ul><br><b>Surgical management<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Gestational timeframe<\/b><\/td><td><b>Management<\/b><\/td><\/tr><tr><td>&lt; 28/40<\/td><td>Aortic repair with the fetus kept in utero<\/td><\/tr><tr><td>28-32/40<\/td><td>Dependent on fetal condition<\/td><\/tr><tr><td>&gt; 32/40<\/td><td>Primary Cesarean section followed by aortic repair at the same operation<\/td><\/tr><\/tbody><\/table><\/div><br><b>Mitral stenosis<\/b><br><ul><li>Most cases associated with rheumatic heart disease<\/li><li>Becoming less common in British women; suspect in women who have moved recently to the country<\/li><li>Commonest cardiac condition in pregnancy<\/li><li>Commonly associated with mortality<\/li><li>Valve surgery; balloon valvuloplasty preferable <\/li><\/ul><br><b>Pulmonary embolism<\/b><br><ul><li>Leading cause of mortality in pregnancy<\/li><li>Half dose scintigraphy; CT chest if underlying lung disease, should aid diagnosis<\/li><li>Treatment with low molecular weight heparin throughout pregnancy and 4-6 weeks after childbirth<\/li><li>Warfarin is contra indicated in pregnancy (though may be continued in women with mechanical heart valves due to the significant risk of thromboembolism)<\/li><\/ul><br><b>References<\/b><br>1. Bates S.M. and Ginsberg J.S. How we manage venous thromboembolism during pregnancy. <i>Blood<\/i> 2002 (100): 3470-3478.<br><br>2. Scarsbrook A.Fand Gleeson V. Investigating suspected pulmonary embolism in pregnancy. <i>BMJ<\/i> 2007 (326) : 1135 doi: 10.1136/bmj.7399.1135.<br><br>3. Morley C. A. and Lim B. A. Lesson of the Week: The risks of delay in diagnosis of breathlessness in pregnancy. <i>BMJ<\/i> 1995 (311) : 1083."}, {"name": "Compartment syndrome", "questions": [{"number": 20, "topic": "Compartment syndrome", "stem_html": "A 24 year old man is brought to the emergency department having suffered a crush injury to his forearm. Assessment demonstrates that the arm is tender, red and swollen. There is clinical evidence of an ulnar fracture and the patient cannot move their fingers. Which is the most appropriate course of action?", "options": [{"label_html": "Application of an external fixation device", "is_correct": false}, {"label_html": "Closed reduction", "is_correct": false}, {"label_html": "Debridement", "is_correct": false}, {"label_html": "Discharge and review in fracture clinic", "is_correct": false}, {"label_html": "Fasciotomy", "is_correct": true}], "correct_index": 4, "explanation_html": "The combination of a crush injury, limb swelling and inability to move digits should raise suspicion of a compartment syndrome that will require a fasciotomy. Paralysis is a very late sign."}, {"number": 21, "topic": "Compartment syndrome", "stem_html": "A 22 year old man is brought to the emergency department. He was found lying unconscious on his right arm and it is evident that he has taken a temazepam overdose. His right arm is mottled in colour and swollen, his hand is insensate and stiff. What substance is most likely to be present in the urine in increased quantities?", "options": [{"label_html": "Protein", "is_correct": false}, {"label_html": "Haemoglobin", "is_correct": false}, {"label_html": "Myoglobin", "is_correct": true}, {"label_html": "Erythrocytes", "is_correct": false}, {"label_html": "Lymphocytes", "is_correct": false}], "correct_index": 2, "explanation_html": "This man is likely to have muscle death secondary to compartment syndrome. This will result in muscle breakdown and release of myoglobin. This may accumulate in the kidney and result in renal failure."}, {"number": 22, "topic": "Compartment syndrome", "stem_html": "A 34 year old man is involved in the road traffic accident and suffers bilateral tibial fractures and a ruptured spleen. He undergoes an emergency laparotomy and splenectomy soon after the incident. A blood test is taken in the recovery room and the following results are obtained:<br>Hb 91<br>WCC 5.6<br>Platelets 230<br>Na 132<br>K 6.5<br>Urea 6.1<br>Creatinine 83<br>What is the most appropriate course of action?", "options": [{"label_html": "CT scan of the abdomen", "is_correct": false}, {"label_html": "Measurement of abdominal compartment pressures", "is_correct": false}, {"label_html": "Measurement of leg compartment pressures", "is_correct": true}, {"label_html": "Re-opening the abdomen", "is_correct": false}, {"label_html": "Insertion of a nephrostomy", "is_correct": false}], "correct_index": 2, "explanation_html": "It is likely that the patient has developed lower leg compartment syndrome and as cell death occurs, hyperkalaemia results. The time taken for the laparotomy would have contributed to this event and provided a distraction. It is less likely that the patient will have developed intra abdominal compartment syndrome in this time frame."}, {"number": 23, "topic": "Compartment syndrome", "stem_html": "A 29 year old man injures his leg in a skiing accident and sustains a tibial fracture that is managed by the insertion of an intramedullary nail. In the immediate post operative period, he develops severe leg pain and there are concerns that he has developed a compartment syndrome. Of the signs described below, which is typically seen last?", "options": [{"label_html": "Swelling of the leg", "is_correct": false}, {"label_html": "Pain on passive stretch", "is_correct": false}, {"label_html": "Loss of the dorsalis pedis pulse", "is_correct": true}, {"label_html": "Severe lower leg pain out of proportion to that which would be expected following intra medullary nailing", "is_correct": false}, {"label_html": "Parasthesia", "is_correct": false}], "correct_index": 2, "explanation_html": "Loss of pulses occurs very late when compartment pressures are very high."}, {"number": 24, "topic": "Compartment syndrome", "stem_html": "A 29 year old man injures his leg in a skiing accident and sustains a tibial fracture that is managed by the insertion of an intramedullary nail. In the immediate post operative period, he develops severe leg pain and there are concerns that he has developed a compartment syndrome. Of the signs described below, which is typically seen last?", "options": [{"label_html": "Swelling of the leg", "is_correct": false}, {"label_html": "Pain on passive stretch", "is_correct": false}, {"label_html": "Loss of the dorsalis pedis pulse", "is_correct": true}, {"label_html": "Severe lower leg pain out of proportion to that which would be expected following intra medullary nailing", "is_correct": false}, {"label_html": "Parasthesia", "is_correct": false}], "correct_index": 2, "explanation_html": "Loss of pulses occurs very late when compartment pressures are very high."}, {"number": 25, "topic": "Compartment syndrome", "stem_html": "A 32 year old man is involved in a motorcycle accident and sustains a closed unstable spiral tibial fracture. This is managed with an intramedullary nail. On return to the ward he is noted to have increasing pain in the limb and on examination the limb is swollen and tender with pain on passive stretching of the toes. The most likely diagnosis is:", "options": [{"label_html": "Tibial nerve neuropraxia", "is_correct": false}, {"label_html": "Displaced tibial nail", "is_correct": false}, {"label_html": "Compartment syndrome", "is_correct": true}, {"label_html": "Deep vein thrombosis", "is_correct": false}, {"label_html": "Sciatic nerve injury", "is_correct": false}], "correct_index": 2, "explanation_html": "Severe pain in a limb should raise suspicions of compartment syndrome especially in tibial fractures following fixation with intra medullary devices."}, {"number": 26, "topic": "Compartment syndrome", "stem_html": "Which option is not recommended during the management of compartment syndrome?", "options": [{"label_html": "Anticoagulation", "is_correct": true}, {"label_html": "Keep limb level with the body", "is_correct": false}, {"label_html": "Intravenous fluids", "is_correct": false}, {"label_html": "Pain control", "is_correct": false}, {"label_html": "Fasciotomy", "is_correct": false}], "correct_index": 0, "explanation_html": "Anticoagulation will worsen compartment syndrome."}], "note_html": "- This is a particular complication that may occur following fractures (or following ischaemia re-perfusion injury in vascular patients). It is characterised by raised pressure within a closed anatomical space. <br><ul><li>The raised pressure within the compartment will eventually compromise tissue perfusion resulting in necrosis. The two main fractures carrying this complication include supracondylar fractures and tibial shaft injuries. <\/li><\/ul><br><b>Symptoms and signs<\/b><br><ul><li>Pain, especially on movement (even passive)<\/li><li>Parasthesiae <\/li><li>Pallor may be present<\/li><li>Arterial pulsation may still be felt as the necrosis occurs as a result of microvascular compromise<\/li><li>Paralysis of the muscle group may occur<\/li><\/ul><br><b>Diagnosis<\/b><br><ul><li>Is made by measurement of intracompartmental pressure measurements. Pressures in excess of 20mmHg are abnormal and &gt;40mmHg is diagnostic.<\/li><\/ul><br><b>Treatment<\/b> <br><ul><li>This is essentially prompt and extensive fasciotomies<\/li><li>In the lower limb the deep muscles may be inadequately decompressed by the inexperienced operator when smaller incisions are performed<\/li><li>Myoglobinuria may occur following fasciotomy and result in renal failure and for this reason these patients require aggressive IV fluids  <\/li><li>Where muscle groups are frankly necrotic at fasciotomy they should be debrided and amputation may have to be considered<\/li><li>Death of muscle groups may occur within 4-6 hours<\/li><\/ul>"}, {"name": "Craniomaxillofacial injuries", "questions": [{"number": 27, "topic": "Craniomaxillofacial injuries", "stem_html": "What is the least likely examination finding in patients with Le Fort II fractures?", "options": [{"label_html": "Excessive mobility of the palate", "is_correct": false}, {"label_html": "Paraesthesia in the region supplied by the inferior alveolar nerve", "is_correct": true}, {"label_html": "Malocclusion of the teeth", "is_correct": false}, {"label_html": "Enopthalmos", "is_correct": false}, {"label_html": "Parasthesia in the region supplied by the infraorbital nerve", "is_correct": false}], "correct_index": 1, "explanation_html": "Le Fort II fractures have a pyramidal shape. The fracture line involves the orbit and extends to involve the bridge of the nose and the ethmoids. In continues to involve the infraorbital rim and usually through the infraorbital foramen. As a result infraorbital parasthesia, palatal mobility and malocclusion are common findings. Severe fractures may result in enopthalmos. However, the fracture does not, by definition, involve the inferior alveolar nerve."}, {"number": 28, "topic": "Craniomaxillofacial injuries", "stem_html": "A 32 year old female hits her head on the steering wheel during a collision with another car. She has periorbital swelling and a flattened appearance of the face. What is the most likely injury?", "options": [{"label_html": "Le Fort 1 fracture affecting maxilla", "is_correct": false}, {"label_html": "Le Fort 3 fracture affecting the maxilla", "is_correct": true}, {"label_html": "Mandibular fracture", "is_correct": false}, {"label_html": "Unilateral fracture of the zygoma", "is_correct": false}, {"label_html": "Isolated temporal bone injury", "is_correct": false}], "correct_index": 1, "explanation_html": "The flattened appearance of the face is a classical description of the dish/pan face associated with Le fort fracture 2 or 3 of the maxilla."}, {"number": 29, "topic": "Craniomaxillofacial injuries", "stem_html": "A 49-year-old male sustained a severe blunt injury just below the bridge of the nose with industrial machinery. Imaging demonstrates a fracture involving the superior orbital fissure. On examination an ipsilateral pupillary defect is present and loss of the corneal reflexes. In addition to these examination findings, which of the following will not be present?", "options": [{"label_html": "Altered cutaneous sensation from the forehead to the vertex", "is_correct": false}, {"label_html": "Ptosis", "is_correct": false}, {"label_html": "Complete opthalmoplegia", "is_correct": false}, {"label_html": "Nystagmus", "is_correct": true}, {"label_html": "Ipsilateral visual loss", "is_correct": false}], "correct_index": 3, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Orbital apex syndrome<br>This is an extension of superior orbital fissure syndrome and includes compression of the optic nerve passing through the optic foramen. It is indicated by features of superior orbital fissure syndrome and ipsilateral afferent pupillary defect.<\/div>This type of injury will result in the orbital apex syndrome (<i>See above<\/i>). As such opthalmoplegia will be present and nystagmus cannot occur."}], "note_html": "Craniomaxillofacial injuries in the UK are due to:<br><ul><li>Interpersonal violence (52%)<\/li><li>Motor vehicle accidents (16%)<\/li><li>Sporting injuries (19%)<\/li><li>Falls (11%)<\/li><\/ul><br><b>Le Fort Fractures<\/b><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Grade<\/b><\/th><th><b>Feature<\/b><\/th><\/tr><\/thead><tbody><tr><td>Le Fort 1<\/td><td>The fracture extends from the nasal septum to the lateral pyriform rims, travels horizontally above the teeth apices, crosses below the zygomaticomaxillary junction, and traverses the pterygomaxillary junction to interrupt the pterygoid plates.<\/td><\/tr><tr><td>Le Fort 2<\/td><td>These  fractures have a pyramidal shape and extend from the nasal bridge at or below the nasofrontal suture through the frontal process of the maxilla, inferolaterally through the lacrimal bones and inferior orbital floor and rim through or near the inferior orbital foramen, and inferiorly through the anterior wall of the maxillary sinus; it then travels under the zygoma, across the pterygomaxillary fissure, and through the pterygoid plates.<\/td><\/tr><tr><td>Le Fort 3<\/td><td>These fractures start at the nasofrontal and frontomaxillary sutures and extend posteriorly along the medial wall of the orbit through the nasolacrimal groove and ethmoid bones. The thicker sphenoid bone posteriorly usually prevents continuation of the fracture into the optic canal. Instead, the fracture continues along the floor of the orbit along the inferior orbital fissure and continues superolaterally through the lateral orbital wall, through the zygomaticofrontal junction and the zygomatic arch. Intranasally, a branch of the fracture extends through the base of the perpendicular plate of the ethmoid, through the vomer, and through the interface of the pterygoid plates to the base of the sphenoid. This type of fracture predisposes the patient to CSF rhinorrhea more commonly than the other types.<\/td><\/tr><\/tbody><\/table><\/div><br><b>Ocular injuries<\/b><br><b>Superior orbital fissure syndrome<\/b><br>Severe force to the lateral wall of the orbit resulting in compression of neurovascular structures. Results in :<br><ul><li>Complete opthalmoplegia and ptosis (Cranial nerves 3, 4, 6 and nerve to levator palpebrae superioris)<\/li><li>Relative afferent pupillary defect<\/li><li>Dilatation of the pupil and loss of accommodation and corneal reflexes<\/li><li>Altered sensation from forehead to vertex (frontal branch of trigeminal nerve)<\/li><\/ul><br><b>Orbital blow out fracture<\/b><br>Typically occurs when an object of slightly larger diameter than the orbital rim strikes the incompressible eyeball. The bone fragment is displaced downwards into the antral cavity, remaining attached to the orbital periosteum. Periorbital fat may be herniated through the defect, interfering with the inferior rectus and inferior oblique muscles which are contained within the same fascial sheath. This prevents upward movement and outward rotation of the eye and the patient experiences diplopia on upward gaze. The initial bruising and swelling may make assessment difficult and patients should usually be reviewed 5 days later. Residual defects may require orbital floor reconstruction.<br><br><b>Nasal Fractures<\/b><br><ul><li>Common injury<\/li><li>Ensure new and not old deformity<\/li><li>Control epistaxis<\/li><li>CSF rhinorrhoea implies that the cribriform plate has been breached and antibiotics will be required.<\/li><li>Usually best to allow bruising and swelling to settle and then review patient clinically. Major persistent deformity requires fracture manipulation, best performed within 10 days of injury.<\/li><\/ul><br><b>Retrobulbar haemorrhage<\/b><br>Rare but important ocular emergency. Presents with:<br><ul><li><b>P<\/b>ain (usually sharp and within the globe)<\/li><li><b>P<\/b>roptosis <\/li><li><b>P<\/b>upil reactions are lost<\/li><li><b>P<\/b>aralysis (eye movements lost)<\/li><li><b>V<\/b>isual acuity is lost (colour vision is lost first)<\/li><\/ul>May be the result of Le Fort type facial fractures.<br><br><b>Management<\/b>:<br><ul><li>Mannitol 1g/Kg as 20% infusion, Osmotic diuretic, Contra-indicated in congestive heart failure and pulmonary oedema<\/li><li>Acetazolamide 500mg IV, (Monitor FBC/U+E) Reduces aqueous pressure by inhibition of carbonic anhydrase (used in glaucoma)<\/li><li>Dexamethasone 8mg orally or intravenously<\/li><li>In a traumatic setting an urgent cantholysis may be needed prior to definitive surgery.<\/li><\/ul><br><i>Consider<\/i><br>Papaverine 40mg smooth muscle relaxant<br>Dextran 40 500mls IV improves perfusion"}, {"name": "Diaphragmatic rupture", "questions": [{"number": 30, "topic": "Diaphragmatic rupture", "stem_html": "An 18 year old student is involved in a car crash, with another car crashing into the side of the car. A CXR shows an indistinct left hemidiaphragm. What is the most likely diagnosis?", "options": [{"label_html": "Diaphragmatic rupture", "is_correct": true}, {"label_html": "Acute phrenic nerve injury", "is_correct": false}, {"label_html": "Cardiac tamponade", "is_correct": false}, {"label_html": "Tension pneumothorax", "is_correct": false}, {"label_html": "Aortic rupture", "is_correct": false}], "correct_index": 0, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">CXR findings in diaphragmatic rupture:<br>Hemidiaphragm is not visible <br>Bowel loops in the lower half of the hemi-thorax <br>Mediastinum is displaced <br><\/div>A lateral blunt injury during a road traffic accident is a common cause of diaphragmatic rupture. Diagnosis is usually evident on chest x-ray. CXR changes include non visible diaphragm, bowel loops in the hemithorax and displacement of the mediastinum. In most cases direct surgical repair is the best option."}], "note_html": "Rupture of the diaphragm can follow either blunt or penetrating abdominal trauma. They tend to occur more often on the left hand side. The presence of the liver on the right shields the diaphragm. It is rare for a penetrating injury to the diaphragm to occur as an isolated injury and so such injuries are typically discovered during surgery that is performed for another more significant injury. If such injuries are missed (and the smaller lacerations can be overlooked in a pool of blood). They can present later with symptoms of herniation.<br>Blunt abdominal trauma tends to produce injuries that are larger and result in more obvious herniation. <br>The management of both types of injury is surgical repair. Remember that the decision to augment any surgical repair with the placement of mesh may be affected intra peritoneal contamination and such decisions should not be taken lightly."}, {"name": "Fluid resuscitation burns", "questions": [{"number": 31, "topic": "Fluid resuscitation burns", "stem_html": "A 36 year old man is admitted following a major electrical injury. He is assessed as having a second degree burn which affects 30% of the total body surface area and full thickness burn which affects 5% of the total body surface area. He is catheterized and the catheter drains 50ml of dark coloured urine.  Which of the resuscitation protocols below is most appropriate in this case?", "options": [{"label_html": "Administration of 4ml/kg/%total body surface area of Hartmanns solution to achieve a urine output of 100ml per hour", "is_correct": true}, {"label_html": "Administration of 2ml/kg/%total body surface area of Hartmanns solution to achieve a urine output of 50ml per hour", "is_correct": false}, {"label_html": "Administration of 1ml/kg/%total body surface area of Hartmanns solution to achieve a urine output of 70ml per hour", "is_correct": false}, {"label_html": "Administration of 2ml/kg/%total body surface area of Hartmanns solution to achieve a urine output of 100ml per hour", "is_correct": false}, {"label_html": "Administration of 10ml/kg/%total body surface area of Hartmanns solution to achieve a urine output of 500ml per hour", "is_correct": false}], "correct_index": 0, "explanation_html": "Electrical burn infusion protocols are different to those for flame or scald burns as higher volumes of fluid  are given with increased targets for urine output to minimize the effects of rhabdomyolysis."}, {"number": 32, "topic": "Fluid resuscitation burns", "stem_html": "A 28 year old man presents with a burn injury secondary to a house fire. He has sustained 25% mixed full and partial thickness burns to his torso and limbs. Which of the following resuscitation protocols would be most appropriate in this case?", "options": [{"label_html": "Administration of 2 ml of Hartmanns x  weight in kg x 25 to maintain a urine output of 30ml/ hour", "is_correct": true}, {"label_html": "Administration of 4 ml of Hartmanns x  weight in kg x 25 to maintain a urine output of 100ml/ hour", "is_correct": false}, {"label_html": "Administration of 3 ml of Hartmanns x  weight in kg x 25 to maintain a urine output of 70ml/ hour", "is_correct": false}, {"label_html": "Administration of 2 ml of 5% dextrose  x  weight in kg x 25 to maintain a urine output of 50ml/ hour", "is_correct": false}, {"label_html": "Administration of 2 ml  of Dextrose / saline x  weight in kg x 25 to maintain a urine output of 30ml/ hour", "is_correct": false}], "correct_index": 0, "explanation_html": "Lower infusion volumes are now administered to burn patients to minimize the potential harm caused by excessive fluid administration"}, {"number": 33, "topic": "Fluid resuscitation burns", "stem_html": "A 22 year old man suffers 20% partial and full thickness burns in a house fire. There is an associated inhalational injury. It is decided to administer intravenous fluids to replace fluid losses. Which of the intravenous fluids listed below should be used for initial resuscitation?", "options": [{"label_html": "Dextran 40", "is_correct": false}, {"label_html": "5% Dextrose", "is_correct": false}, {"label_html": "Fresh frozen plasma", "is_correct": false}, {"label_html": "Hartmans solution", "is_correct": true}, {"label_html": "Blood", "is_correct": false}], "correct_index": 3, "explanation_html": "In most units a crystalloid such as Hartmans (Ringers lactate) is administered initially. Controversy does remain and some units do prefer colloid. Should this leak in the interstitial tissues this may increase the risk of oedema."}], "note_html": "<b>Indication<\/b>: &gt;15% total body area burns in adults (&gt;10% children)<br><ul><li>The main aim of resuscitation is to prevent the burn deepening<\/li><li>Most fluid is lost 24 hours after injury<\/li><li>First 8-12 hour fluid shifts are from intravascular to interstitial fluid compartments<\/li><li>Therefore circulatory volume can be compromised.  However fluid resuscitation causes more fluid into the interstitial compartment especially colloid (therefore avoided in first 8-24 hours)<\/li><li>Protein loss occurs<\/li><\/ul><br>There are concerns that use of the traditional Parkland formula resulted in the administration of excessive quantities of intravenous fluids in patients with burns. The current consensus guidelines state that fluid resuscitation should begin at 2 ml of lactated Ringers x patients body weight in kg x % TBSA for second- and third-degree burns. <br>The calculated fluid volume is initiated in the following manner: one-half of the total fluid is provided in the first 8 hours after the burn injury (for example, a 100-kg man with 80% TBSA burns requires 2 Ã— 80 Ã— 100 = 16,000 mL in 24 hours). One-half of that volume (8,000 mL) should be provided in the first 8 hours, so the patient should be started at a rate of 1000 mL/hr. The remaining one-half of the total fluid is administered during the subsequent 16 hours.<br>The efficacy of fluid replacement is determined in the main by monitoring urine output. For adults this is in the region of 0.5ml/kg/hr and for children less than 30Kg it is 1ml/kg/hr. <br><br><b>Fluid resuscitation according to burn type<\/b><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Type of burn<\/b><\/th><th><b>Age or weight<\/b><\/th><th><b>Fluid rate<\/b><\/th><th><b>Urine output<\/b><\/th><\/tr><\/thead><tbody><tr><td>Flames or scalding<\/td><td>Adults and children over 14 years<\/td><td>2 ml Hartmanns x kg x % TBSA<\/td><td>0.3-0.5ml/kg/hr OR 30-50ml per hour<\/td><\/tr><tr><td>Flames or scalding<\/td><td>Children less than 14 years<\/td><td>3 ml Hartmanns x kg x % TBSA<\/td><td>1ml/kg/hr<\/td><\/tr><tr><td>Flames or scalds<\/td><td>Children less than 30Kg and infants<\/td><td>3 ml Hartmanns x kg x % TBSA. Plus a sugar-containing solution at maintenance rate<\/td><td>1ml/kg/hr<\/td><\/tr><tr><td>Electrical injury<\/td><td>All ages<\/td><td>4 ml Hartmanns x kg x % TBSA until urine clears<\/td><td>1-1.5 ml/kg/hr until urine clears<\/td><\/tr><\/tbody><\/table><\/div><br>Fluid resuscitation in electrical burn patients is different because they have far greater soft tissue involvement in muscle compartments and associated muscle death that can result in myoglobinuria. <br><br><b>After 24 hours<\/b><br><ul><li>Maintenance crystalloid (usually dextrose-saline) is continued at a rate of 1.5 ml x(burn area)x(body weight)<\/li><li>Colloids are rarely used (e.g. albumin)<\/li><li>Antioxidants, such as vitamin C, can be used to minimize oxidant-mediated contributions to the inflammatory cascade in burns<\/li><li>High tension electrical injuries and inhalation injuries require more fluid <\/li><li>Monitor: packed cell volume, plasma sodium, base excess, and lactate<\/li><\/ul><br><b>Reference<\/b><br>ATLS Manual 10th Edition."}, {"name": "Glasgow coma scale", "questions": [{"number": 34, "topic": "Glasgow coma scale", "stem_html": "A 20 year old man is hit over the head with a mallet. On arrival in the accident and emergency department he opens his eyes to pain and groans or grunts. On application of a painful stimulus to his hands, he extends his arm at the elbow. What is his Glasgow coma score", "options": [{"label_html": "10", "is_correct": false}, {"label_html": "6", "is_correct": true}, {"label_html": "3", "is_correct": false}, {"label_html": "7", "is_correct": false}, {"label_html": "4", "is_correct": false}], "correct_index": 1, "explanation_html": "E=2, V= 2, M=2."}, {"number": 35, "topic": "Glasgow coma scale", "stem_html": "A 20 year old man is hit over the head with a mallet. On arrival in the accident and emergency department he opens his eyes to pain and groans or grunts. On application of a painful stimulus to his hands, he extends his arm at the elbow. What is his Glasgow coma score", "options": [{"label_html": "10", "is_correct": false}, {"label_html": "6", "is_correct": true}, {"label_html": "3", "is_correct": false}, {"label_html": "7", "is_correct": false}, {"label_html": "4", "is_correct": false}], "correct_index": 1, "explanation_html": "E=2, V= 2, M=2."}, {"number": 36, "topic": "Glasgow coma scale", "stem_html": "A 20 year old man falls over and bangs his head whilst intoxicated. On arrival in the emergency department he opens his eyes in response to speech, and is able to speak, although he is disorientated. He obeys motor commands. What is his Glasgow coma score?", "options": [{"label_html": "10", "is_correct": false}, {"label_html": "8", "is_correct": false}, {"label_html": "15", "is_correct": false}, {"label_html": "13", "is_correct": true}, {"label_html": "11", "is_correct": false}], "correct_index": 3, "explanation_html": "E=3, V=4, M=6."}], "note_html": "The Glasgow Coma Scale is used to assess a patient's responsiveness, or level of consciousness, in acute acute brain impairment. When using the GCS, the response of a patient is documented in three components: eyes, verbal and motor. Each of these modalities is assessed simultaneously.<br><br><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Modality<\/b><\/th><th><b>Options<\/b><\/th><\/tr><\/thead><tbody><tr><td>Eye opening<\/td><td><ul><li>Spontaneous<\/li><li>To speech<\/li><li>To finger tip stimulus<\/li><li>None<\/li><\/ul><\/td><\/tr><tr><td>Verbal response<\/td><td><ul><li>Orientated<\/li><li>Not orientated but communication coherent<\/li><li>Intelligible single words<\/li><li>Only moans and groans<\/li><li>None<\/li><\/ul><\/td><\/tr><tr><td>Motor response<\/td><td><ul><li>Obeys 2 part request<\/li><li>Brings hand above the clavicle to stimulus on head or neck<\/li><li>Bends arm at elbow rapidly but features not predominantly abnormal<\/li><li>Bends arm at elbow, features clearly predominantly abnormal<\/li><li>Extending arm at elbow<\/li><li>None<\/li><\/ul><\/td><\/tr><\/tbody><\/table><\/div><br>Responses are taken from each category (marks in descending order) to produce an overall score. Severe brain injuries are generally associated with GCS &lt;8. Where a category cannot be tested by virtue of other factors, no score is recorded and the term not tested is used."}, {"name": "Head injury management- NICE Guidelines", "questions": [{"number": 37, "topic": "Head injury management- NICE Guidelines", "stem_html": "A 25 year old cyclist is hit by a bus traveling at 30mph. He was not wearing a helmet. He arrives with a GCS of 3/15 and is intubated. A CT scan shows evidence of cerebral contusion but no localising clinical signs are present. What is the most appropriate course of action?", "options": [{"label_html": "Burr hole decompression", "is_correct": false}, {"label_html": "Decompressive craniotomy", "is_correct": false}, {"label_html": "Insertion of intra cranial pressure monitoring device", "is_correct": true}, {"label_html": "Administration of intravenous mannitol", "is_correct": false}, {"label_html": "Parietotemporal craniotomy", "is_correct": false}], "correct_index": 2, "explanation_html": "This patient may well develop raised ICP over the next few days and intracranial pressure monitoring will help with management."}, {"number": 38, "topic": "Head injury management- NICE Guidelines", "stem_html": "A 32 year old rugby player is crushed in a scrum. He is briefly concussed but then regains consciousness. He then collapses and is brought to ED. His GCS on arrival is 6/15 and his left pupil is dilated. What is the best course of definitive management?", "options": [{"label_html": "Burr Hole decompression", "is_correct": false}, {"label_html": "Parietotemporal craniotomy", "is_correct": true}, {"label_html": "Intravenous mannitol", "is_correct": false}, {"label_html": "Posterior fossa craniotomy", "is_correct": false}, {"label_html": "Insertion of intra cranial pressure bolt monitor", "is_correct": false}], "correct_index": 1, "explanation_html": "This man needs urgent decompression and extradural haematoma is the most likely event, from a lacerated middle meningeal artery. Most neurosurgeons would perform a craniotomy. However, rural units and those units without neurosurgical kit facing this emergency may resort to Burr Holes."}, {"number": 39, "topic": "Head injury management- NICE Guidelines", "stem_html": "A 30 year old woman is injured in a skiing accident. She suffers a blow to the occiput and is concussed for 5 minutes. On arrival in ED she is confused with GCS 10/15. A CT scan shows no evidence of acute bleed or fracture but some evidence of oedema with the beginnings of mass effect. What is the best initial course of action?", "options": [{"label_html": "Administration of intravenous mannitol", "is_correct": true}, {"label_html": "Administration of intravenous frusemide", "is_correct": false}, {"label_html": "Parietotemporal craniotomy", "is_correct": false}, {"label_html": "Posterior fossa craniotomy", "is_correct": false}, {"label_html": "Burr hole decompression", "is_correct": false}], "correct_index": 0, "explanation_html": "This woman has raised ICP and mannitol will help reduce this in the acute phase."}, {"number": 40, "topic": "Head injury management- NICE Guidelines", "stem_html": "A 68 year old man is involved in a road traffic accident that is relatively minor and sustains a minor head injury with small associated scalp laceration. Apart from atrial fibrillation for which he is treated with bisoprolol and dabigatran, he is well. On examination, he is drowsy and GCS is 12 with no localizing neurological signs. What is the most appropriate course of action?", "options": [{"label_html": "Arrange a skull x-ray", "is_correct": false}, {"label_html": "Arrange an MRI scan of the brain", "is_correct": false}, {"label_html": "Admit for observation with GCS measurements every 30 minutes", "is_correct": false}, {"label_html": "Admit for observation with GCS measurements every 60 minutes", "is_correct": false}, {"label_html": "Arrange a CT scan of the head", "is_correct": true}], "correct_index": 4, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Head injury with anticoagulants= CT head<\/div>"}, {"number": 41, "topic": "Head injury management- NICE Guidelines", "stem_html": "A 16 year old man sustains a basal skull fracture and is suspected of having CSF rhinorrhoea. Which of the following laboratory tests would most accurately identify whether CSF is present or not?", "options": [{"label_html": "Microscopy to identify red blood cells", "is_correct": false}, {"label_html": "Lab stix testing for glucose", "is_correct": false}, {"label_html": "Lab stix testing for protein", "is_correct": false}, {"label_html": "Beta 2 transferrin assay", "is_correct": true}, {"label_html": "Microscopy, gram stain and culture", "is_correct": false}], "correct_index": 3, "explanation_html": "Beta 2 transferrin is a carbohydrate free form of transferrin that is almost exclusively found in the CSF. Although lab stix testing for glucose is traditional it is associated with false positive results secondary to contamination with other glucose containing bodily secretions."}], "note_html": "<b>Summary of guidelines<\/b><br><ul><li>All patients should be assessed within 15 minutes on arrival to A&amp;E<\/li><li>Document all 3 components of the GCS<\/li><li>If GCS &lt;8 or = to 8, consider stabilising the airway<\/li><li>Full spine immobilisation until assessment if:<\/li><\/ul><br>- GCS &lt; 15<br>- neck pain/tenderness<br>- paraesthesia extremities<br>- focal neurological deficit<br>- suspected c-spine injury<br><br>If a c-spine injury is suspected a 3 view c-spine x-ray is indicated. CT c-spine is preferred if:<br>- Intubated<br>- GCS &lt;13<br>- Normal x-ray but continued concerns regarding c-spine injury<br>- Any focal neurology<br>- A CT head scan is being performed<br>- Initial plain films are abnormal<br><br><b>Immediate CT head (within 1 hour) if:<\/b><br><ul><li>GCS &lt; 12 on admission<\/li><li>GCS &lt; 15 2 hours after admission<\/li><li>Suspected open or depressed skull fracture<\/li><li>Suspected skull base fracture (panda eyes, Battle's sign, CSF from nose/ear, bleeding ear)<\/li><li>Focal neurology<\/li><li>Vomiting &gt; 1 episode<\/li><li>Post traumatic seizure<\/li><\/ul><br><br><b>Contact neurosurgeon if:<\/b><br><ul><li>Persistent GCS &lt; 8 or = 8<\/li><li>Unexplained confusion &gt; 4h<\/li><li>Reduced GCS after admission<\/li><li>Progressive neurological signs<\/li><li>Incomplete recovery post seizure<\/li><li>Penetrating injury<\/li><li>Cerebrospinal fluid leak<\/li><\/ul><br><b>Observations<\/b><br><ul><li>1/2 hourly GCS until 15<\/li><\/ul><br>In the latest guidance, there is a move to considering CT in those on anticoagulants rather than mandating it.<br><br><b>Reference<\/b><br>1. NICE Guidance NG 232 (Published 2023).<br>2. Hodgkinson S <i>et al<\/i>. Early management of head injury: summary of NICE guidance. <i>BMJ<\/i> 2014 (348):34-37."}, {"name": "Head injury paediatrics", "questions": [{"number": 42, "topic": "Head injury paediatrics", "stem_html": "Which of the features below, following a head injury, is not an indication for an immediate CT head scan in children?", "options": [{"label_html": "Drowsiness", "is_correct": false}, {"label_html": "A single, discrete episode of vomiting", "is_correct": true}, {"label_html": "A 9 month old child with a 6cm haematoma on the head", "is_correct": false}, {"label_html": "Numb left arm", "is_correct": false}, {"label_html": "Suspicion of a non accidental head injury", "is_correct": false}], "correct_index": 1, "explanation_html": "Whilst not an indication for immediate CT there should be a low threshold for admission and observation."}], "note_html": "<b>Criteria for immediate request for CT scan of the head (children)<\/b> <br>* Loss of consciousness lasting more than 5 minutes (witnessed)<br>* Amnesia (antegrade or retrograde) lasting more than 5 minutes<br>* Abnormal drowsiness<br>* Three or more discrete episodes of vomiting<br>* Clinical suspicion of non-accidental injury<br>* Post-traumatic seizure but no history of epilepsy<br>* GCS less than 14, or for a baby under 1 year GCS (paediatric) less than 15, on    assessment in the emergency department<br>* Suspicion of open or depressed skull injury or tense fontanelle<br>* Any sign of basal skull fracture (haemotympanum, panda' eyes, cerebrospinal fluid  leakage from the ear or nose, Battle's sign)<br>* Focal neurological deficit<br>* If under 1 year, presence of bruise, swelling or laceration of more than 5 cm on the head<br>* Dangerous mechanism of injury (high-speed road traffic accident either as pedestrian, cyclist or vehicle occupant, fall from a height of greater than 3 m, high-speed injury from a projectile or an object)"}, {"name": "Hypocalcaemia: causes and management", "questions": [{"number": 43, "topic": "Hypocalcaemia: causes and management", "stem_html": "A 54-year-old man is brought to the Emergency Department after being found collapsed in the street. He is known to have a history of alcoholic liver disease. Blood tests reveal the following:<br><br><div class=\"table-responsive\"><table class=\"tb\"><tbody><tr><td>Calcium<\/td><td>1.62 mmol/l<\/td><\/tr><tr><td>Albumin<\/td><td>33 g/l<\/td><\/tr><\/tbody><\/table><\/div><br>Which one of the following is the most appropriate management of the calcium result?", "options": [{"label_html": "10ml of 10% calcium carbonate over 10 minutes", "is_correct": false}, {"label_html": "20% albumin infusion", "is_correct": false}, {"label_html": "10ml of 10% calcium gluconate over 10 minutes", "is_correct": true}, {"label_html": "No action", "is_correct": false}, {"label_html": "10ml o
