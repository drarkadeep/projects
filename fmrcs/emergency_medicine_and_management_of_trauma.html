d", "is_correct": false}], "correct_index": 2, "explanation_html": "Fresh blood is the fluid of choice when large volume blood loss complicates trauma. Mortality is doubled when blood &gt;3 weeks old is used."}, {"number": 90, "topic": "Trauma management", "stem_html": "Which of the following statements relating to large volume blood loss in trauma is incorrect?", "options": [{"label_html": "Tranexamic acid reduces the incidence of rebleeding following surgery", "is_correct": false}, {"label_html": "Hypocalcaemia may complicate resuscitation", "is_correct": false}, {"label_html": "Colloids are preferred initially as they reduce the incidence of coagulopathy", "is_correct": true}, {"label_html": "When patients receive over 5 units of whole blood mortality increases when blood products greater than 3 weeks old are utilised", "is_correct": false}, {"label_html": "In the battlefield setting a ratio of 1:1:1 for blood, plasma and platelets is used", "is_correct": false}], "correct_index": 2, "explanation_html": "Fresh blood is the fluid of choice when large volume blood loss complicates trauma. Mortality is doubled when blood &gt;3 weeks old is used."}, {"number": 91, "topic": "Trauma management", "stem_html": "A 44 year old man is involved in a road traffic accident. He suffers significant injuries to his thorax, he has bilateral haemopneumothoraces and a suspected haemopericardium. He is to undergo surgery, what is the best method of accessing these injuries?", "options": [{"label_html": "Bilateral thoracoscopy and mediastinoscopy", "is_correct": false}, {"label_html": "Midline sternotomy", "is_correct": false}, {"label_html": "Bilateral posterolateral thoracotomy", "is_correct": false}, {"label_html": "Clam shell thoracotomy", "is_correct": true}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 3, "explanation_html": "Patients with significant mediastinal and lung injuries are best operated on using a Clam shell thoracotomy. All modes of access involve a degree of compromise. A sternotomy would give good access to the heart. However, it takes longer to perform and does not provide good access to the lungs. Trauma should not be managed using laparoscopy."}], "note_html": "The cornerstone of trauma management is embodied in the principles of ATLS.<br><br>Following trauma there is a trimodal death distribution:<br><ul><li><b>Immediately<\/b> following injury. Typically as result of brain or high spinal injuries, cardiac or great vessel damage. Salvage rate is low.<\/li><li>In <b>early hours<\/b> following injury. In this group deaths are due to phenomena such as splenic rupture, sub dural haematomas and haemopneumothoraces<\/li><li>In the <b>days<\/b> following injury. Usually due to sepsis or multi organ failure.<\/li><\/ul><br><b>Aspects of trauma management<\/b> <br><ul><li>ABCDE approach.<\/li><li>Tension pneumothoraces will deteriorate with vigorous ventilation attempts.<\/li><li>External haemorrhage is managed as part of the primary survey. As a rule tourniquets should not be used. Blind application of clamps will tend to damage surrounding structures and packing is the preferred method of haemorrhage control.<\/li><li>Urinary catheters and naso gastric tubes may need inserting. Be wary of basal skull fractures and urethral injuries.<\/li><li>Patients with head and neck trauma should be assumed to have a cervical spine injury until proven otherwise.<\/li><\/ul><br><b>Thoracic injuries<\/b><br><ul><li>Simple pneumothorax<\/li><li>Mediastinal traversing wounds<\/li><li>Tracheobronchial tree injury<\/li><li>Haemothorax<\/li><li>Blunt cardiac injury<\/li><li>Diaphragmatic injury<\/li><li>Aortic disruption<\/li><li>Pulmonary contusion<\/li><\/ul><br><b>Management of thoracic trauma<\/b><br><ul><li><b>Simple pneumothorax<\/b> insert chest drain. Aspiration is risky in trauma as pneumothorax may be from lung laceration and convert to tension pneumothorax.<\/li><li><b>Mediastinal traversing wounds<\/b> These result from situations like stabbings. Exit and entry wounds in separate hemithoraces. The presence of a mediastinal haematoma indicates the likelihood of a great vessel injury. All patients should undergo CT angiogram and oesophageal contrast swallow. Indications for thoracotomy are largely related to blood loss and will be addressed below.<\/li><li><b>Tracheobronchial tree injury<\/b> Unusual injuries. In blunt trauma most injuries occur within 4cm of the carina. Features suggesting this injury include haemoptysis and surgical emphysema. These injuries have a very large air leak and may have tension pneumothorax.<\/li><li><b>Haemothorax<\/b> Usually caused by laceration of lung vessel or internal mammary artery by rib fracture. Patients should all have a wide bore 36F chest drain. Indications for thoracotomy include loss of more than 1.5L blood initially or ongoing losses of &gt;200ml per hour for &gt;2 hours.<\/li><li><b>Cardiac contusions<\/b> Usually cardiac arrhythmias, often overlying sternal fracture. Perform echocardiography to exclude pericardial effusions and tamponade. Risk of arrhythmias falls after 24 hours.<\/li><li><b>Diaphragmatic injury<\/b> Usually left sided. Direct surgical repair is performed.<\/li><li><b>Traumatic aortic disruption<\/b> Commonest cause of death after RTA or falls. Usually incomplete laceration near ligamentum arteriosum. All survivors will have contained haematoma. Only 1-2% of patients with this injury will have a normal chest x-ray.<\/li><li><b>Pulmonary contusion<\/b> Common and lethal. Insidious onset. Early intubation and ventilation.<\/li><\/ul><br><b>Abdominal trauma<\/b><br><ul><li>Deceleration injuries are common.<\/li><li>In blunt trauma requiring laparotomy the spleen is most commonly injured (40%)<\/li><li>Stab wounds traverse structures most commonly liver (40%)<\/li><li>Gunshot wounds have variable effects depending upon bullet type. Small bowel is most commonly injured (50%)<\/li><li>Patients with stab wounds and no peritoneal signs up to 25% will not enter the peritoneal cavity<\/li><li>Blood at urethral meatus suggests a urethral tear<\/li><li>High riding prostate on PR = urethral disruption<\/li><li>Mechanical testing for pelvic stability should only be performed once<\/li><\/ul><br><b>Investigations in abdominal trauma<\/b><br><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><\/td><td><b>Diagnostic Peritoneal Lavage<\/b><\/td><td><b>Abdominal CT scan<\/b><\/td><td><b>USS<\/b><\/td><\/tr><tr><td><b>Indication<\/b><\/td><td>Document bleeding if hypotensive<\/td><td>Document organ injury if normotensive<\/td><td>Document fluid if hypotensive<\/td><\/tr><tr><td><b>Advantages<\/b><\/td><td>Early diagnosis and sensitive; 98% accurate<\/td><td>Most specific for localising injury; 92 to 98% accurate<\/td><td>Early diagnosis, non invasive and repeatable; 86 to 95% accurate<\/td><\/tr><tr><td><b>Disadvantages<\/b><\/td><td>Invasive and may miss retroperitoneal and diaphragmatic injury<\/td><td>Location of scanner away from facilities, time taken for reporting, need for contrast<\/td><td>Operator dependent and may miss retroperitoneal injury<\/td><\/tr><\/tbody><\/table><\/div><ul><li>Amylase may be normal following pancreatic trauma<\/li><li>Urethrography if suspected urethral injury<\/li><\/ul>"}, {"name": "Vascular trauma", "questions": [{"number": 92, "topic": "Vascular trauma", "stem_html": "A 27 year old man sustains a single gunshot wound to the left thigh. In the emergency department, he is noted to have a large haematoma of his medial thigh. He complains of parasthesia in his foot. On examination, there are weak pulses palpable distal to the injury and the patient is unable to move his foot. The appropriate initial management of this patient is:", "options": [{"label_html": "Conventional angiography", "is_correct": false}, {"label_html": "Immediate exploration and repair", "is_correct": true}, {"label_html": "Fasciotomy of the anterior compartment", "is_correct": false}, {"label_html": "Observation for resolution of spasm", "is_correct": false}, {"label_html": "Local wound exploration", "is_correct": false}], "correct_index": 1, "explanation_html": "The five P's of arterial injury include pain, parasthesias, pallor, pulselessness and paralysis. In the extremities, the tissues most sensitive to anoxia are the peripheral nerves and striated muscle. The early developments of paresthesias and paralysis are signals that there is significant ischemia present, and immediate exploration and repair are warranted. The presence of palpable pulse does not exclude an arterial injury because this presence may represent a transmitted pulsation through a blood clot. When severe ischemia is present, the repair must be completed within 6 to 8 h to prevent irreversible muscle ischemia and loss of limb function. Delay to obtain a conventional angiogram or to observe for change needlessly prolongs the ischemic time. A CT angiogram may be a reasonable alternative. Fasciotomy may be required but should be done in conjunction with and after re-establishment of arterial flow. Local wound exploration is not recommended because brisk hemorrhage may be encountered without the securing of prior vascular control."}], "note_html": "Peripheral and central vessels may be injured by blunt, penetrating or shearing injuries. Fractures of bones close to vessels may also be associated with vascular injury or vessel occlusion.<br><br><b>Assessment<\/b><br><ul><li>Check for signs of distal perfusion <\/li><li>Doppler signal distally (monophasic/ biphasic or triphasic)<\/li><li>Anatomical location (which vessel is likely to be involved)<\/li><li>Duplex scanning and angiography are 'gold standard' tests but may not be immediately available in the trauma setting<\/li><\/ul><br><b>Management<\/b><br><ul><li>Almost always operative.<\/li><li>Obtaining proximal and distal control of affected vessels is crucial.<\/li><li>Simple lacerations of arteries may be directly closed, or a vein patch applied if there is a risk of subsequent stenosis.<\/li><li>Transection of the vessel should be treated by either end to end anastomosis (often not possible) or an interposition vein graft.<\/li><li>Use of PTFE in traumatic open injuries will invariably result in infection.<\/li><\/ul>"}, {"name": "Ventricular tachycardia", "questions": [{"number": 93, "topic": "Ventricular tachycardia", "stem_html": "You are called to the acute surgical unit. A patient who has short gut syndrome has developed a broad complex tachycardia. You suspect a diagnosis of ventricular tachycardia. What is the most likely precipitant?", "options": [{"label_html": "Hypoglycaemia", "is_correct": false}, {"label_html": "Bisoprolol", "is_correct": false}, {"label_html": "Hypomagnesaemia", "is_correct": true}, {"label_html": "Dehydration", "is_correct": false}, {"label_html": "Hyperthyroidism", "is_correct": false}], "correct_index": 2, "explanation_html": "<p>No explanation provided.<\/p>"}], "note_html": "Ventricular tachycardia (VT)is broad-complex tachycardia originating from a ventricular ectopic focus. It has the potential to precipitate ventricular fibrillation and hence requires urgent treatment.<br><br>There are two main types of VT:<br><ul><li>monomorphic VT: most commonly caused by myocardial infarction<\/li><li>polymorphic VT: A subtype of polymorphic VT is torsades de pointes which is precipitated by prolongation of the QT interval. The causes of a long QT interval are listed below<\/li><\/ul><br>Causes of a prolonged QT interval<br><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Congenital<\/b><br><ul><li>Jervell-Lange-Nielsen syndrome (includes deafness and is due to an abnormal potassium channel)<\/li><li>Romano-Ward syndrome (no deafness)<\/li><\/ul><\/td><td><b>Drugs<\/b><br><ul><li>amiodarone, sotalol, class 1a antiarrhythmic drugs<\/li><li>tricyclic antidepressants, fluoxetine<\/li><li>chloroquine<\/li><li>terfenadine<\/li><li>erythromycin<\/li><\/ul><\/td><td><b>Other<\/b><br><ul><li>electrolyte: hypocalcaemia, hypokalaemia, hypomagnesaemia<\/li><li>acute myocardial infarction<\/li><li>myocarditis<\/li><li>hypothermia<\/li><li>subarachnoid haemorrhage<\/li><\/ul><\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Ventricular tachycardia: management", "questions": [{"number": 94, "topic": "Ventricular tachycardia: management", "stem_html": "A 60-year-old man develops palpitations while on the acute surgical unit. An ECG shows a broad complex tachycardia at a rate of 150 bpm. His blood pressure is 124/82 mmHg and there is no evidence of heart failure. The surgical consultant wants to give rate control (the medical team are not answering their bleeps).  Which one of the following is least appropriate to give?", "options": [{"label_html": "Procainamide", "is_correct": false}, {"label_html": "Lidocaine", "is_correct": false}, {"label_html": "Amiodarone", "is_correct": false}, {"label_html": "Adenosine", "is_correct": false}, {"label_html": "Verapamil", "is_correct": true}], "correct_index": 4, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Ventricular tachycardia - verapamil is contraindicated<\/div>Verapamil should never be given to a patient with a broad complex tachycardia as it may precipitate ventricular fibrillation in patients with ventricular tachycardia. Adenosine is sometimes given in this situation as a 'trial' if there is a strong suspicion the underlying rhythm is a supraventricular tachycardia with aberrant conduction"}], "note_html": "Whilst a broad complex tachycardia may result from a supraventricular rhythm with aberrant conduction, the European Resuscitation Council advise that in a peri-arrest situation it is assumed to be ventricular in origin <br><br>If the patient has adverse signs (systolic BP &lt; 90 mmHg, chest pain, heart failure or rate &gt; 150 beats/min) then immediate cardioversion is indicated. In the absence of such signs antiarrhythmics may be used. If these fail, then electrical cardioversion may be needed with synchronised DC shocks<br><br>Drug therapy<br><ul><li>amiodarone: ideally administered through a central line<\/li><li>lidocaine: use with caution in severe left ventricular impairment<\/li><li>procainamide<\/li><\/ul><br>Verapamil should NOT be used in VT<br><br>If drug therapy fails<br><ul><li>electrophysiological study (EPS) <\/li><li>implant able cardioverter-defibrillator (ICD) - this is particularly indicated in patients with significantly impaired LV function<\/li><\/ul>"}]}</script>
  <script>
    const quizData = JSON.parse(document.getElementById("quiz-data").textContent);
    const app = document.getElementById("app");
    const modeButtons = Array.from(document.querySelectorAll("[data-mode-button]"));
    const topicActionButtons = Array.from(document.querySelectorAll("[data-topic-action]"));

    const state = {
      mode: "solve",
      answers: new Map(),
      questionRefs: [],
    };

    function buildTopic(topic, questionOffset) {
      const details = document.createElement("details");
      details.className = "topic";
      details.open = true;

      const summary = document.createElement("summary");
      summary.innerHTML = `
        <div>
          <h2 class="topic-title">${topic.name}</h2>
        </div>
        <div class="topic-meta">
          <span>${topic.questions.length} questions</span>
          <span class="chevron" aria-hidden="true">></span>
        </div>
      `;

      const body = document.createElement("div");
      body.className = "topic-body";

      if (topic.note_html) {
        const notes = document.createElement("details");
        notes.className = "topic-notes";

        const notesSummary = document.createElement("summary");
        notesSummary.innerHTML = `
          <span class="topic-notes-title">Notes</span>
          <span class="chevron" aria-hidden="true">></span>
        `;

        const notesBody = document.createElement("div");
        notesBody.className = "topic-notes-body rich-text";
        notesBody.innerHTML = topic.note_html;

        notes.appendChild(notesSummary);
        notes.appendChild(notesBody);
        body.appendChild(notes);
      }

      topic.questions.forEach((question, indexInTopic) => {
        const globalIndex = questionOffset + indexInTopic;
        body.appendChild(buildQuestionCard(question, globalIndex));
      });

      details.appendChild(summary);
      details.appendChild(body);
      return details;
    }

    function buildQuestionCard(question, questionIndex) {
      const card = document.createElement("article");
      card.className = "question-card is-hidden";
      card.dataset.questionIndex = String(questionIndex);

      const label = document.createElement("p");
      label.className = "question-label";
      label.textContent = `Question ${question.number}`;

      const stem = document.createElement("div");
      stem.className = "stem rich-text";
      stem.innerHTML = question.stem_html;

      const options = document.createElement("div");
      options.className = "options";

      const optionButtons = question.options.map((option, optionIndex) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "option";
        button.dataset.optionIndex = String(optionIndex);
        button.innerHTML = option.label_html;
        button.addEventListener("click", () => {
          if (state.mode !== "solve") {
            return;
          }
          state.answers.set(questionIndex, optionIndex);
          applyQuestionState(questionIndex);
        });
        options.appendChild(button);
        return button;
      });

      const explanation = document.createElement("div");
      explanation.className = "explanation rich-text";
      explanation.innerHTML = `<span class="explanation-label">Explanation</span>${question.explanation_html}`;

      card.appendChild(label);
      card.appendChild(stem);
      card.appendChild(options);
      card.appendChild(explanation);

      state.questionRefs[questionIndex] = {
        card,
        explanation,
        optionButtons,
        question,
      };

      applyQuestionState(questionIndex);
      return card;
    }

    function applyQuestionState(questionIndex) {
      const ref = state.questionRefs[questionIndex];
      if (!ref) {
        return;
      }

      const { card, optionButtons, question } = ref;
      const selectedIndex = state.answers.get(questionIndex);
      const hasSelection = selectedIndex !== undefined;
      const isReview = state.mode === "review";
      const showExplanation = isReview || hasSelection;

      card.classList.toggle("is-hidden", !showExplanation);

      optionButtons.forEach((button, optionIndex) => {
        button.classList.remove("correct", "incorrect", "neutral-revealed");

        if (isReview) {
          button.disabled = true;
          if (optionIndex === question.correct_index) {
            button.classList.add("correct");
          } else {
            button.classList.add("neutral-revealed");
          }
          return;
        }

        button.disabled = false;
        if (!hasSelection) {
          return;
        }

        if (optionIndex === question.correct_index) {
          button.classList.add("correct");
        } else if (optionIndex === selectedIndex) {
          button.classList.add("incorrect");
        } else {
          button.classList.add("neutral-revealed");
        }
      });
    }

    function renderApp() {
      if (!quizData.topics.length) {
        const empty = document.createElement("div");
        empty.className = "empty-state";
        empty.textContent = "No questions were found in this JSON file.";
        app.replaceChildren(empty);
        return;
      }

      const wrapper = document.createElement("div");
      wrapper.className = "topic-list";

      let questionOffset = 0;
      quizData.topics.forEach((topic) => {
        wrapper.appendChild(buildTopic(topic, questionOffset));
        questionOffset += topic.questions.length;
      });

      app.replaceChildren(wrapper);
    }

    function setMode(mode) {
      state.mode = mode;
      modeButtons.forEach((button) => {
        const isActive = button.dataset.modeButton === mode;
        button.classList.toggle("active", isActive);
        button.setAttribute("aria-pressed", String(isActive));
      });

      state.questionRefs.forEach((_, index) => applyQuestionState(index));
    }

    function setAllTopics(open) {
      document.querySelectorAll(".topic").forEach((topic) => {
        topic.open = open;
      });
    }

    modeButtons.forEach((button) => {
      button.addEventListener("click", () => setMode(button.dataset.modeButton));
    });

    topicActionButtons.forEach((button) => {
      button.addEventListener("click", () => {
        setAllTopics(button.dataset.topicAction === "expand");
      });
    });

    renderApp();
    setMode("solve");
  </script>
</body>
</html>
