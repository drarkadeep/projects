f 10% calcium chloride over 4 hours", "is_correct": false}], "correct_index": 2, "explanation_html": "Even after correction for the low albumin level this patient has significant hypocalcaemia which should be corrected. Both calcium chloride and gluconate can be used. Currently, gluconate is the favored agent."}], "note_html": "The clinical history combined with parathyroid hormone levels will reveal the cause of hypocalcaemia in the majority of cases<br><br>Causes<br><ul><li>Vitamin D deficiency (osteomalacia)<\/li><li>Acute pancreatitis<\/li><li>Chronic renal failure<\/li><li>Hypoparathyroidism (e.g. post thyroid/parathyroid surgery)<\/li><li>Pseudohypoparathyroidism (target cells insensitive to PTH)<\/li><li>Rhabdomyolysis (initial stages)<\/li><li>Magnesium deficiency  (due to end organ PTH resistance)<\/li><\/ul>  <br><br>Management<br><ul><li>Acute management of severe hypocalcaemia is with intravenous replacement. The preferred method is with intravenous calcium gluconate, 10ml of 10% solution over 10 minutes<\/li><li>ECG monitoring is recommended<\/li><li>Further management depends on the underlying cause<\/li><li>Calcium and bicarbonate should not be administered via the same route<\/li><\/ul>"}, {"name": "Hypothermia", "questions": [{"number": 44, "topic": "Hypothermia", "stem_html": "A 21 year old man falls down a ravine whilst skiing and is trapped for several hours. He is finally brought to the emergency department profoundly hypothermic with a core temperature of 29<sup>o<\/sup>C. Which method is most effective at raising the core temperature?", "options": [{"label_html": "Re-warming with electric blankets", "is_correct": false}, {"label_html": "Increasing the room temperature", "is_correct": false}, {"label_html": "Instillation of warm intravesical fluid", "is_correct": false}, {"label_html": "Instillation of warmed rectal fluid", "is_correct": false}, {"label_html": "Instillation of warmed intra peritoneal fluid", "is_correct": true}], "correct_index": 4, "explanation_html": "Visceral cavity re-warming be it lung or abdomen (or both) provides rapid rewarming. Only extracorporeal circulatory devices provide faster rates of re-warming."}, {"number": 45, "topic": "Hypothermia", "stem_html": "A 34 year old man develops mild hypothermia. Which of the hormones listed below will be released in reduced quantities?", "options": [{"label_html": "Thyroid stimulating hormone", "is_correct": false}, {"label_html": "Corticosterone", "is_correct": false}, {"label_html": "Insulin", "is_correct": true}, {"label_html": "Glucagon", "is_correct": false}, {"label_html": "Aldosterone", "is_correct": false}], "correct_index": 2, "explanation_html": "In mild hypothermia TSH release is increased as is corticosterone, glucagon and aldosterone. The effects on electrolytes are minimal. There is a perceived loss of plasma volume which may reflect microvascular changes within capillary beds."}, {"number": 46, "topic": "Hypothermia", "stem_html": "A 34 year old man develops mild hypothermia. Which of the hormones listed below will be released in reduced quantities?", "options": [{"label_html": "Thyroid stimulating hormone", "is_correct": false}, {"label_html": "Corticosterone", "is_correct": false}, {"label_html": "Insulin", "is_correct": true}, {"label_html": "Glucagon", "is_correct": false}, {"label_html": "Aldosterone", "is_correct": false}], "correct_index": 2, "explanation_html": "In mild hypothermia TSH release is increased as is corticosterone, glucagon and aldosterone. The effects on electrolytes are minimal. There is a perceived loss of plasma volume which may reflect microvascular changes within capillary beds."}], "note_html": "Core body temperature below 35<sup>o<\/sup>C. Severe hypothermia is present when the core temperature is below 28<sup>o<\/sup>C. Hypothermia is associated with a reduction in both respiratory and cardiac activity. Many cases are complicated by the presence of alcohol intoxication.<br><br><b>Stages of hypothermia<\/b><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th>Stage<\/th><th>Features<\/th><th>Classification<\/th><th>Temperature <sup>o<\/sup>C<\/th><\/tr><\/thead><tbody><tr><td>1<\/td><td>Awake and shivering<\/td><td>Mild<\/td><td>32-35<\/td><\/tr><tr><td>2<\/td><td>Drowsy and not shivering<\/td><td>Moderate<\/td><td>28-32<\/td><\/tr><tr><td>3<\/td><td>Unconcious and not shivering<\/td><td>Severe<\/td><td>20-28<\/td><\/tr><tr><td>4<\/td><td>No vital signs<\/td><td>Profound<\/td><td>Less than 20<\/td><\/tr><\/tbody><\/table><\/div><br><b>Management<\/b><br>An organised cardiac rhythm may be converted to fibrillation if CPR is attempted inappropriately so ECG should be analysed with care. The rewarming technique used depends upon the degree of hypothermia and the physiological state of the patient. Mild hypothermia may respond to external rewarming devices. Severe hypothermia may require active core rewarming techniques such as peritoneal lavage, haemodialysis or cardiac bypass. Patients who develop cardiac arrhythmias who are severely hypothermic may respond to bretylium toslyte (sadly no longer available in most centres), but do not generally respond to standard therapies or DC cardioversion."}, {"name": "Imaging in the pregnant trauma patient", "questions": [{"number": 47, "topic": "Imaging in the pregnant trauma patient", "stem_html": "A 31 year old lady is struck by a car and is 32 weeks pregnant. On arrival in the emergency department she has a systolic blood pressure of 105mmHg and a pulse rate of 126 beats per minute. Abdominal examination demonstrates a diffusely tender abdomen and some left sided flank bruising. A FAST scan is normal. What is the most appropriate course of action?", "options": [{"label_html": "Arrange a departmental abdominal USS scan", "is_correct": false}, {"label_html": "Arrange an urgent abdominal MRI scan", "is_correct": false}, {"label_html": "Perform a laparotomy", "is_correct": false}, {"label_html": "Perform diagnostic peritoneal lavage", "is_correct": false}, {"label_html": "Arrange an urgent abdominal CT scan", "is_correct": true}], "correct_index": 4, "explanation_html": "The patient's mechanism of injury makes a solid organ injury likely. FAST scanning is associated with a false negative rate in pregnancy which makes the negative result less reassuring. CT scanning remains the gold standard."}], "note_html": "Sonography and FAST scanning are established in pregnancy and have the advantage of avoiding ionising radiation. However, the sensitivity of the FAST scan is reduced in pregnancy especially with advanced gestational age. Sensitivity of FAST scanning is 60-80% across all trimesters and 90% in the first. CT scanning remains the first line investigation in major trauma where significant visceral injury is suspected. The maximum permitted safe dose of radiation in pregnancy is 5mSv. A pelvic CT scan would fall below this level. That said, early exposure to radiation will increase the risk of developmental anomalies and foetal loss. Late exposure increases the risk of childhood cancer twofold.  CT scanning remains the most sensitive test for identifying complications such as placental abruption in this group."}, {"name": "Local anaesthetic toxicity", "questions": [{"number": 48, "topic": "Local anaesthetic toxicity", "stem_html": "A 73 year old lady sustains a distal radius fracture and this is manipulated using a Biers block with prilocaine as the local anaesthetic agent. During the procedure the occlusion cuff deflates and the patient becomes progressively cyanosed. What is the treatment of choice?", "options": [{"label_html": "Intravenous calcium gluconate", "is_correct": false}, {"label_html": "Exchange transfusion", "is_correct": false}, {"label_html": "Intravenous methylene blue", "is_correct": true}, {"label_html": "Intravenous sodium thiosulphate", "is_correct": false}, {"label_html": "Intravenous gelofusine", "is_correct": false}], "correct_index": 2, "explanation_html": "Prilocaine is a recognised cause of methaemoglobinaemia, this is characterised by the development of cyanosis and dyspnoea. This disorder occurs because of the change haemoglobin to a ferric subtype rather than ferrous (Fe<sup>2+<\/sup>). This type of change shifts the oxygen dissociation curve to the left and tissue hypoxia occurs. Methylene blue will revert the haemoglobin to the ferrous type and reverse this effect."}], "note_html": "Toxicity results from either accidental intravascular injection (rapid onset of symptoms-usually correct dose), or from excessive dosage (slower onset). Local anaesthetic agents not only exert a membrane stabilising effect on peripheral nerves but will also act on excitable membranes within the CNS and Heart. The sensory neurones in the CNS are suppressed before the motor ones. As a result the early symptoms will typically be those of circumoral paraesthesia and tinnitus, followed by falling GCS and eventually coma. <br><br><b>Management of toxicity<\/b><br><ul><li>Stop injecting the anaesthetic agent<\/li><li>High flow 100% oxygen via face mask<\/li><li>Cardiovascular monitoring<\/li><li>Administer lipid emulsion (Intralipid 20%) at 1.5ml/Kg over 1 minute as a bolus<\/li><li>Consider lipid emulsion infusion, at 0.25ml/ Kg/ minute<\/li><li>If toxicity due to prilocaine then administer methylene blue<\/li><\/ul><br><b>Safe doses<\/b><br>10ml of lignocaine 1% contains 100mg of drug, this would constitute 70% of the maximum safe dose in a 50 kg patient. Up to 7mg / kg can be administered if adrenaline is added to the solution.<br><br><b>Doses of local anaesthetics<\/b><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Agent<\/b><\/th><th><b>Dose plain<\/b><\/th><th><b>Dose with adrenaline<\/b><\/th><\/tr><\/thead><tbody><tr><td>Lignocaine<\/td><td>3mg/Kg<\/td><td>7mg/Kg<\/td><\/tr><tr><td>Bupivicane<\/td><td>2mg/Kg<\/td><td>2mg/Kg<\/td><\/tr><tr><td>Prilocaine<\/td><td>6mg/Kg<\/td><td>9mg/Kg<\/td><\/tr><\/tbody><\/table><\/div>These are a guide only as actual doses depend on site of administration, tissue vascularity and co-morbidities."}, {"name": "Management of acute coronary syndrome", "questions": [{"number": 49, "topic": "Management of acute coronary syndrome", "stem_html": "A 63 year old male is admitted to the surgical ward for an elective femoral popliteal bypass.  He suddenly starts complaining of central, crushing chest pain which is radiating to the left arm.  An ECG shows some ischaemic changes.  The Nursing staff start high flow oxygen and give a spray of glyceryl trinitrate spray.  Unfortunately there is no relief of symptoms.  What is the next agent to be administered?", "options": [{"label_html": "Aspirin 75mg", "is_correct": false}, {"label_html": "Clopidogrel 75mg", "is_correct": false}, {"label_html": "Aspirin 300mg", "is_correct": true}, {"label_html": "Clopidogrel 300mg", "is_correct": false}, {"label_html": "Direct admission to angiography suite", "is_correct": false}], "correct_index": 2, "explanation_html": "Aspirin 300mg should be given as soon as possible.  If the patient has a moderate to high risk of myocardial infarction, then Clopidogrel should be given with a low molecular weight heparin.  Thromboloysis or urgent percutaneous intervention should be given if there are significant ECG changes."}], "note_html": "NICE produced guidelines in 2020 on the management of unstable angina and non-ST elevation myocardial infarction (NSTEMI). They advocate managing patients based on the early risk assessment using a recognised scoring system such as GRACE (Global Registry of Acute Cardiac Events) to calculate a predicted 6 month mortality.<br><br>All patients should receive<br>    - aspirin 300mg<br>    - nitrates or morphine to relieve chest pain if required<br><br>Supplementary oxygen should be routinely given unless there are compelling reasons not to do so.<br><br><b>Antithrombin<\/b> treatment. Low molecular weight heparin should be offered to patients who are not at a high risk of bleeding and who are not having angiography within the next 24 hours. If angiography is likely within 24 hours or a patients creatinine is &gt; 265 umol/l unfractionated heparin should be given.<br><br><b>Clopidogrel<\/b> 300mg should be given to patients with a predicted 6 month mortality of more than 1.5% or patients who may undergo percutaneous coronary intervention within 24 hours of admission to hospital. Clopidogrel should be continued for 12 months. Dual antiplatelet therapy should be given for patients who have undergone PCI and this should be continued for 12 months.<br><br>Intravenous <b>glycoprotein IIb/IIIa receptor antagonists<\/b> (eptifibatide or tirofiban) should be given to patients who have an intermediate or higher risk of adverse cardiovascular events (predicted 6-month mortality above 3.0%), and who are scheduled to undergo angiography within 96 hours of hospital admission. These agents should be not be administered to those patients who are being considered for PCI as their primary intervention.<br><br><b>Coronary angiography<\/b> should be considered within 96 hours of first admission<br>to hospital to patients who have a predicted 6-month mortality above 3.0%. It should also be performed as soon as possible in patients who are clinically unstable. Coronary angiography is the preferred modality for those patients within 12 hours of acute STEMI."}, {"name": "Management of hyperkalaemia", "questions": [{"number": 50, "topic": "Management of hyperkalaemia", "stem_html": "A 45-year-old man is seen in the Emergency Department with nausea, pallor and lethargy. He has no past medical history of note. A cannula is inserted and serum urea and electrolytes show the following<br><br><div class=\"table-responsive\"><table class=\"tb\"><tbody><tr><td>Na+<\/td><td>140 mmol/l<\/td><\/tr><tr><td>K+<\/td><td>6.7 mmol/l<\/td><\/tr><tr><td>Bicarbonate<\/td><td>14 mmol/l<\/td><\/tr><tr><td>Urea<\/td><td>18.2 mmol/l<\/td><\/tr><tr><td>Creatinine<\/td><td>230  micro mol/l<\/td><\/tr><\/tbody><\/table><\/div>An ECG shows peaked T waves.<br>What is the most appropriate initial management?", "options": [{"label_html": "Nebulised salbutamol", "is_correct": false}, {"label_html": "Intravenous bicarbonate", "is_correct": false}, {"label_html": "Haemodialysis", "is_correct": false}, {"label_html": "Insulin/dextrose infusion", "is_correct": false}, {"label_html": "Intravenous calcium gluconate", "is_correct": true}], "correct_index": 4, "explanation_html": "The first priority in this patient is to stabilise the myocardium with intravenous calcium gluconate."}], "note_html": "Untreated hyperkalaemia may cause life-threatening arrhythmias. Precipitating factors should be addressed (e.g. acute renal failure) and aggravating drugs stopped (e.g. ACE inhibitors). Management may be categorised by the aims of treatment<br><br>Stabilisation of the cardiac membrane<br><ul><li>Intravenous calcium gluconate<\/li><\/ul><br>Short-term shift in potassium from extracellular to intracellular fluid compartment<br><ul><li>Combined insulin/dextrose infusion<\/li><li>Nebulised salbutamol<\/li><\/ul><br>Removal of potassium from the body<br><ul><li>Calcium resonium (orally or enema)<\/li><li>Loop diuretics<\/li><li>Dialysis<\/li><\/ul>"}, {"name": "Oculogyric crisis", "questions": [{"number": 51, "topic": "Oculogyric crisis", "stem_html": "A 14-year-old boy is admitted to the acute surgical unit with appendicitis.  He is normally fit and well.  Apart from metoclopramide, the patient has had no other medications.  The nursing staff contact you as the patient is acting strange.  On examination he is agitated, has a clenched jaw and his eyes are deviated upwards. What is the most likely diagnosis?", "options": [{"label_html": "Functional disorder", "is_correct": false}, {"label_html": "Malignant hyperthermia", "is_correct": false}, {"label_html": "Oculogyric crisis", "is_correct": true}, {"label_html": "Epilepsy", "is_correct": false}, {"label_html": "Serotonin syndrome", "is_correct": false}], "correct_index": 2, "explanation_html": "This is a classic description of an oculogyric crisis, a form of extrapyramidal disorder.  An oculogyric crisis is an acute dystonic reaction.  This is precipitated by antipsychotics (haloperidol) and metoclopramide in susceptible individuals with a genetic predisposition to this.  Treatment is with procyclidine IM."}], "note_html": "An oculogyric crisis is a dystonic reaction to certain drugs or medical conditions<br><br>Features<br><ul><li>Restlessness, agitation<\/li><li>Involuntary upward deviation of the eyes<\/li><\/ul><br>Causes<br><ul><li>Phenothiazines<\/li><li>Haloperidol<\/li><li>Metoclopramide<\/li><li>Postencephalitic Parkinson's disease<\/li><\/ul><br>Management<br><ul><li>Procyclidine<\/li><\/ul>"}, {"name": "Opioid misuse", "questions": [{"number": 52, "topic": "Opioid misuse", "stem_html": "A 19 year intravenous drug abuser is recovering following a surgical drainage of a psoas abscess.  He is found collapsed in the ward toilet unresponsive and with pinpoint pupils.  What is the most appropriate immediate management?", "options": [{"label_html": "Intravenous flumazenil", "is_correct": false}, {"label_html": "Intravenous naloxone", "is_correct": true}, {"label_html": "Intravenous benxhexol", "is_correct": false}, {"label_html": "No further management", "is_correct": false}, {"label_html": "Intravenous glycopyrolate", "is_correct": false}], "correct_index": 1, "explanation_html": "Intravenous nalaxone is needed to treat the patient who has had an overdose of opiate.  Naloxone has the quickest onset of action, however it is important to be aware of its short acting duration and the need for further administration.  There is also the risk of rebound pain once naloxone is given."}], "note_html": "Opioids are substances which bind to opioid receptors. This includes both naturally occurring opiates such as morphine and synthetic opioids such as buprenorphine and methadone.<br><br>Features of opioid misuse<br><ul><li>Rhinorrhoea<\/li><li>Needle track marks<\/li><li>Pinpoint pupils<\/li><li>Drowsiness<\/li><\/ul>      <br>Complications of intravenous opioid misuse<br><ul><li>Viral infection secondary to sharing needles: HIV, hepatitis B &amp; C<\/li><li>Bacterial infection secondary to injection: infective endocarditis, septic arthritis, septicaemia, necrotising fasciitis, groin abscess <\/li><li>Pseudoaneurysm<\/li><li>Venous thromboembolism<\/li><li>Osteomyelitis<\/li><li>Overdose may lead to respiratory depression and death<\/li><\/ul>   <br>Emergency management of opioid overdose<br><ul><li>IV or IM naloxone: has a rapid onset and relatively short duration of action<\/li><\/ul>"}, {"name": "Pneumothorax", "questions": [{"number": 53, "topic": "Pneumothorax", "stem_html": "A 33 year old man is involved in a motor vehicle accident. He is found to have a low GCS and is intubated at the scene. Shortly after intubation, he becomes profoundly hypoxic. What is the most likely explanation?", "options": [{"label_html": "Slipped endotracheal tube", "is_correct": false}, {"label_html": "Trachobronchial injury", "is_correct": false}, {"label_html": "Tension pneumothorax", "is_correct": true}, {"label_html": "Mucous plugging", "is_correct": false}, {"label_html": "Aspiration", "is_correct": false}], "correct_index": 2, "explanation_html": "In trauma, sudden development of hypoxia following intubation suggests a pneumothorax. Where there is concern and time permits, it is usually safer to insert a chest drain prior to intubation and if a trauma patient does require intubation at scene . It is often safer to prophylactically insert a chest drain prior to transfer."}], "note_html": "Pneumothorax is a common medical problem. In surgical practice patients can be divided into those who sustain thoracic trauma with an associated pneumothorax and those who happen to be surgical patients for another reason and develop a pneumothorax. In some cases this may be a sudden spontaneous event. For others, it may be the result of iatrogenic injury. <br><br><b>Initial approach<\/b><br><ul><li>ABCD approach <\/li><li>High flow oxygen<\/li><li>Adequate monitoring<\/li><li>Early imaging (portable CXR)<\/li><\/ul><br><b>Traumatic pneumothorax<\/b><br>The management of a traumatic pneumothorax is embodied in the ATLS principles. The most important decision to make and to make early, is whether the patient has a tension present.<br><div class=\"alert alert-warning\"><b>Signs of tension pneumothorax<\/b><br>Severe respiratory distress<br>Hyper-expanded chest<br>Tracheal shift<br>Hyperressonant percussion note<br>Distended neck veins<br>Decreased breath sounds<br><\/div><br>If so then it must be immediately decompressed using a wide bore needle inserted in the fourth intercostal space in the mid axillary line. <br>Once this has been undertaken, immediate steps should be taken to insert a chest drain. <br><br>Traumatic pneumothoraxes may occur via a number of different mechanisms. Penetrating trauma may create a flap of lung tissue that can predispose to subsequent tension and for that reason, most would proceed to insert a chest drain if even a small pneumothorax were present by the underlying mechanism one of penetrating injury. One potential pitfall is to fail to appreciate that blunt mechanisms of injury to the chest wall may cause a rib fracture which is then able to inflict a penetrating lung injury. <br><br>The insertion of chest drains for chest trauma is different from the seldinger sets that are often used by physicians. In trauma it is usual to insert a wide bore chest drain (between 30 and 34Fr) using an open technique (with trochar removed).<br><br><div class=\"alert alert-warning\"><b>Triangle of safety<\/b><br>It is advised that chest drains are placed in the 'safe triangle'.  The triangle is located in the mid axillary line of the 5th intercostal space.  It is bordered by:<br>Anterior edge latissimus dorsi, the lateral border of pectoralis major, a line superior to the horizontal level of the nipple, and the apex below the axilla.<br><\/div><br><b>Non traumatic pneumothorax<\/b><br>The management of these is governed by the British Thoracic Society Guidelines (which do not apply to trauma cases).  When reviewing the chest x-rays for these cases it is useful to distinguish between large and small pneumothoraces, The differentiation of a large from a small pneumo-thorax continues to be the presence of a visible rim of &gt;2 cm between the lung margin and the chest wall (at the level of the hilum). However, size does not correlate well with symptoms. The presence of small primary pneumothorax in a patient with no compromise may not require any specific treatment. Those with underlying lung disease or large pneumothoraces should be considered for aspiration or chest drain insertion. Where a chest drain is inserted, a small calibre drain is sufficient. Detailed management of these cases is usually provided by physicians with an interest in respiratory medicine and fall outside of the remit of general surgical practice (and thus the MRCS!)<br><br><div class=\"alert alert-warning\">Whenever a chest drain or thoracic aspiration is performed, a check x-ray should be routinely performed following the intervention<br><\/div>"}, {"name": "Pulmonary Embolism: ECG changes", "questions": [{"number": 54, "topic": "Pulmonary Embolism: ECG changes", "stem_html": "Which of the following is not a change found on an ECG in acute pulmonary embolism?", "options": [{"label_html": "No changes", "is_correct": false}, {"label_html": "J waves", "is_correct": true}, {"label_html": "P pulmonale", "is_correct": false}, {"label_html": "Right ventricular strain", "is_correct": false}, {"label_html": "T wave inversion in the inferior leads", "is_correct": false}], "correct_index": 1, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">S1, Q3, T3<\/div>J waves are pathognomonic of hypothermia."}, {"number": 55, "topic": "Pulmonary Embolism: ECG changes", "stem_html": "A 77-year-old man who is a smoker, collapses 12 days following an esophagectomy. Prior to his collapse he complained of a sudden onset of chest pain and dyspnea on examination, his blood pressure is 90/60 mmHg. His ECG shows right heart strain. What is the most likely explanation?", "options": [{"label_html": "Pulmonary embolism", "is_correct": true}, {"label_html": "Simple pneumothorax", "is_correct": false}, {"label_html": "Tension pneumothorax", "is_correct": false}, {"label_html": "Atelectesis", "is_correct": false}, {"label_html": "Myocardial infarction", "is_correct": false}], "correct_index": 0, "explanation_html": "The event occurring at day 12 with right sided ECG changes all favor PE. Surgery and cancer are risk factors. Pneumothorax would tend to occur much earlier in the post operative period."}], "note_html": "- No changes<br><ul><li>S1, Q3, T3<\/li><li>Tall R waves: V1 <\/li><li><b>P<\/b> pulmonale (peaked P waves): inferior leads <\/li><li><b>R<\/b>ight axis deviation, Right bundle branch block <\/li><li><b>A<\/b>trial arrhythmias <\/li><li><b>T<\/b> wave inversion: V1, V2, V3 <\/li><li>Right ventricular strain: if identified is associated with adverse short-term outcome and adds prognostic value to echocardiographic evidence of right ventricular dysfunction in patients with acute pulmonary embolism and normal blood pressure.<\/li><\/ul><br><b>References<\/b><br>Vanni S et al. Prognostic value of ECG among patients with acute pulmonary embolism and normal blood pressure. Am J Med. 2009 Mar;122(3):257-64."}, {"name": "Pulmonary embolism: management", "questions": [{"number": 56, "topic": "Pulmonary embolism: management", "stem_html": "A 45 year old man complains of sharp chest pain.  He is due to have elective surgery to replace his left hip.   He has been bed bound for 3 months.  He suddenly collapses; his blood pressue is 70/40mmHg, heart rate 120 bpm and his saturations are 74% on air.  He is deteriorating in front of you.  What is the next best management plan?", "options": [{"label_html": "Aspirin", "is_correct": false}, {"label_html": "Thrombolysis with Alteplase", "is_correct": true}, {"label_html": "Unfractionated heparin", "is_correct": false}, {"label_html": "Thrombolysis with streptokinase", "is_correct": false}, {"label_html": "Clopidogrel", "is_correct": false}], "correct_index": 1, "explanation_html": "This man is peri arrest with the diagnosis of pulmonary embolism (chest pain,bedbound, collapse, low saturations).  He needs urgent thrombolysis with alteplase (he may not survive if you wait for the medical Spr/ITU to arrive!)."}, {"number": 57, "topic": "Pulmonary embolism: management", "stem_html": "A 45 year old man complains of sharp chest pain.  He is due to have elective surgery to replace his left hip.   He has been bed bound for 3 months.  He suddenly collapses; his blood pressue is 70/40mmHg, heart rate 120 bpm and his saturations are 74% on air.  He is deteriorating in front of you.  What is the next best management plan?", "options": [{"label_html": "Aspirin", "is_correct": false}, {"label_html": "Thrombolysis with Alteplase", "is_correct": true}, {"label_html": "Unfractionated heparin", "is_correct": false}, {"label_html": "Thrombolysis with streptokinase", "is_correct": false}, {"label_html": "Clopidogrel", "is_correct": false}], "correct_index": 1, "explanation_html": "This man is peri arrest with the diagnosis of pulmonary embolism (chest pain,bedbound, collapse, low saturations).  He needs urgent thrombolysis with alteplase (he may not survive if you wait for the medical Spr/ITU to arrive!)."}], "note_html": "<b>A summary of the British Thoracic Society guidelines<\/b><br><br><ul><li>Heparin should be given if intermediate or high clinical probability before imaging.<\/li><li>Unfractionated heparin (UFH) should be considered (a) as a first dose bolus, (b) in massive PE, or (c) where rapid reversal of effect may be needed.<\/li><li>Otherwise, low molecular weight heparin (LMWH) should be considered as preferable to UFH, having equal efficacy and safety and being easier to use.<\/li><li>Oral anticoagulation should only be commenced once VTE has been reliably confirmed.<\/li><li>The target INR should be 2.0-3.0; when this is achieved, heparin can be discontinued. <\/li><li>The standard duration of oral anticoagulation is: 4 to 6 weeks for temporary risk factors, 3 months for first idiopathic, and at least 6 months for other; the risk of bleeding should be balanced with that of further VTE.<\/li><\/ul><br><b>Massive PE<\/b><br><br><ul><li>CTPA or echocardiography will reliably diagnose clinically massive PE.<\/li><li>Thrombolysis is 1st line for massive PE (ie circulatory failure) and may be instituted on clinical grounds alone if cardiac arrest is imminent; a 50 mg bolus of alteplase is recommended.<\/li><li>Invasive approaches (thrombus fragmentation and IVC filter insertion) should be considered where facilities and expertise are readily available.<\/li><\/ul>"}, {"name": "Sick euthyroid syndrome", "questions": [{"number": 58, "topic": "Sick euthyroid syndrome", "stem_html": "A 56-year-old female is admitted to ITU with a severe pancreatitis. Thyroid function tests show:<br><br>TSH = 0.5 Low<br>Thyroxine = 1.0 Low<br>T3 = 0.5 Low<br><br>What is the most likely cause?", "options": [{"label_html": "Sick euthyroid syndrome", "is_correct": true}, {"label_html": "Graves disease", "is_correct": false}, {"label_html": "Hashimotos thyroiditis", "is_correct": false}, {"label_html": "Levothyroxine", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 0, "explanation_html": "This patient has sick euthyroid syndrome as all thyroid parameters are reduced.  Graves disease and levothyroxine will cause hyperthyroidism (low TSH and elevated thyroxine/T3).  Hashimotos thyroiditis is associated with hypothyroidism (high TSH and low thyroxine/T3)."}], "note_html": "In sick euthyroid syndrome (now referred to as non-thyroidal illness) it is often said that everything (TSH, thyroxine and T3) is low. In the majority of cases however the TSH level is within the normal range (inappropriately normal given the low thyroxine and T3).<br><br>Changes are reversible upon recovery from the systemic illness."}, {"name": "Sickle cell anaemia", "questions": [{"number": 59, "topic": "Sickle cell anaemia", "stem_html": "A 28 year old African man is admitted with acute severe abdominal pain. He has just flown into the UK long haul and the pain developed whilst in flight.  On examination he is tender in the left upper quadrant. His blood tests are as shown. <br><br>Hb 6 g/dl<br>Reticulocyte count 15%.<br>Ultrasound shows a spleen with a heterogenous texture. The gallbladder shows a few small gallstones but is otherwise normal.<br>What is the most likely diagnosis?", "options": [{"label_html": "Pancreatitis", "is_correct": false}, {"label_html": "Parvovirus infection", "is_correct": false}, {"label_html": "Sickle cell anaemia", "is_correct": true}, {"label_html": "Pulmonary embolism", "is_correct": false}, {"label_html": "Beta Thalassaemia minor", "is_correct": false}], "correct_index": 2, "explanation_html": "A combination of a high reticulocyte count and severe anaemia indicates sickle cell anaemia, however another differential can be of a transient aplastic crisis due to parvovirus.  This is less likely as this causes a reticulocytopenia rather than a reticulocytosis.<br><br>Parvovirus B19 infects erythroid progenitor cells in the bone marrow and causes temporary cessation of red blood cell production, patients who have underlying hematologic abnormalities are at risk of cessation of red blood cell production if they become infected. This can result in a transient aplastic crisis.  Thus, patients with sickle cell anaemia are at risk. Typically, these patients have a viral prodrome followed by anaemia, often with haemoglobin concentrations falling below 5.0 g/dL and reticulocytopenia."}], "note_html": "<ul><li>Autosomal recessive<\/li><li>Single base mutation <\/li><li>Deoxygenated cells become sickle in shape<\/li><li>Causes: short red cell survival, obstruction of microvessels and infarction<\/li><li>Sickling is precipitated by: dehydration, infection, hypoxia<\/li><li>Manifest at 6 months age<\/li><li>Africans, Middle East, Indian<\/li><li>Diagnosis: Hb electrophoresis<\/li><\/ul><br><b>Sickle crises<\/b><br><br><ul><li>Bone pain<\/li><li>Pleuritic chest pain: acute sickle chest syndrome commonest cause of death<\/li><li>CVA, seizures<\/li><li>Papillary necrosis<\/li><li>Splenic infarcts<\/li><li>Priapism<\/li><li>Hepatic pain<\/li><\/ul><br><b>Hb does not fall during a crisis, unless there is<\/b><br><br><ul><li>Aplasia: parvovirus<\/li><li>Acute sequestration<\/li><li>Haemolysis<\/li><\/ul><br><b>Long-term complications<\/b><br><br><ul><li>Infections: <i>Streptococcus<\/i> pnemoniae<\/li><li>Chronic leg ulcers<\/li><li>Gallstones: haemolysis<\/li><li>Aseptic necrosis of bone<\/li><li>Chronic renal disease<\/li><li>Retinal detachment, proliferative retinopathy<\/li><\/ul><br><b>Surgical complications<\/b><br><br><ul><li>Bowel ischaemia<\/li><li>Cholecystitis<\/li><li>Avascular necrosis<\/li><\/ul><br><b>Management<\/b><br><br><ul><li>Supportive<\/li><li>Hydroxyurea<\/li><li>Repeated transfusions pre operatively<\/li><li>Exchange transfusion in emergencies<\/li><\/ul>   <br><b>Sickle cell trait<\/b><br><br><ul><li>Heterozygous state<\/li><li>Asymptomatic<\/li><li>Symptoms associated with extreme situations ie anaesthesia complications<\/li><li>Protective against <i><i>Plasmodium<\/i> falciparum<\/i><\/li><\/ul>"}, {"name": "Splenic trauma", "questions": [{"number": 60, "topic": "Splenic trauma", "stem_html": "A 7 year old boy falls off a wall the distance is 7 feet. He lands on his left side and there is left flank bruising. There is no haematuria. He is otherwise stable and haemoglobin is within normal limits. What is the most appropriate initial course of action?", "options": [{"label_html": "Undertake a CT scan of the abdomen", "is_correct": false}, {"label_html": "Undertake an abdominal USS", "is_correct": true}, {"label_html": "Undertake diagnostic peritoneal lavage", "is_correct": false}, {"label_html": "Undertake a splenectomy", "is_correct": false}, {"label_html": "Arrange an angiogram and possibly proceed to embolisation", "is_correct": false}], "correct_index": 1, "explanation_html": "This will demonstrate any overt splenic injury. A CT scan carries a significant dose of radiation. In the absence of haemodynamic instability or other major associated injuries the use of USS to exclude intraabdominal free fluid (blood) would seem safe when coupled with active observation. An USS will also show splenic haematomas."}, {"number": 61, "topic": "Splenic trauma", "stem_html": "A 42 year old motorcyclist is involved in a road traffic accident. A FAST scan in the emergency department shows free intrabdominal fluid and a laparotomy is performed. At operation there is evidence of small liver laceration that has stopped bleeding and a tear to the inferior pole of the spleen. What is the best course of action?", "options": [{"label_html": "Proceed to splenectomy", "is_correct": false}, {"label_html": "Attempt measures to conserve the spleen", "is_correct": true}, {"label_html": "Resection of the inferior pole of the spleen", "is_correct": false}, {"label_html": "Ligate the splenic vein alone", "is_correct": false}, {"label_html": "Fully mobilise the spleen to inspect it", "is_correct": false}], "correct_index": 1, "explanation_html": "Mobilising the spleen will result in removal. Splenic injuries like this are amenable to conservation."}, {"number": 62, "topic": "Splenic trauma", "stem_html": "An 18 year old man is involved in a road traffic accident. He arrives haemodynamically unstable. A CT scan shows disruption of the splenic hilum and a moderate sized perisplenic haematoma. What is the best course of action?", "options": [{"label_html": "Manage conservatively", "is_correct": false}, {"label_html": "Arrange USS", "is_correct": false}, {"label_html": "Transfer to centre for interventional radiology", "is_correct": false}, {"label_html": "Discharge", "is_correct": false}, {"label_html": "Splenectomy", "is_correct": true}], "correct_index": 4, "explanation_html": "Hilar injuries usually mandate splenectomy. The main risk with conservative management here is that he will rebleed and with hilar injuries this can be dramatic."}], "note_html": "- The spleen is one of the more commonly injured intra abdominal organs<br><ul><li>In most cases the spleen can be conserved. The management is dictated by the associated injuries, haemodynamic status and extent of direct splenic injury.<\/li><\/ul><br><b>Management of splenic trauma<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Conservative<\/b><\/td><td>Small subcapsular haematoma<br>Minimal intra abdominal blood<br>No hilar disruption<\/td><\/tr><tr><td><b>Laparotomy with conservation<\/b><\/td><td>Increased amounts of intraabdominal blood<br>Moderate haemodynamic compromise<br>Tears or lacerations affecting &lt;50%<\/td><\/tr><tr><td><b>Resection<\/b><\/td><td>Hilar injuries<br>Major haemorrhage<br>Major associated injuries<\/td><\/tr><\/tbody><\/table><\/div><br><b>Splenectomy<\/b><br><b>Technique<\/b><br><b>Trauma<\/b><br><ul><li>GA<\/li><li>Long midline incision<\/li><li>If time permits insert a self retaining retractor (e.g. Balfour/ omnitract)<\/li><li>Large amount of free blood is usually present. Pack all 4 quadrants of the abdomen. Allow the anaesthetist to 'catch up'<\/li><li>Remove the packs and assess the viability of the spleen. Hilar injuries and extensive parenchymal lacerations will usually require splenectomy.<\/li><li>Divide the short gastric vessels and ligate them.<\/li><li>Clamp the splenic artery and vein. Two clamps on the patient side are better and allow for double ligation and serve as a safety net if your assistant does not release the clamp smoothly.<\/li><li>Be careful not to damage the tail of the pancreas, if you do then this will need to be formally removed and the pancreatic duct closed.<\/li><li>Wash out the abdomen and place a tube drain to the splenic bed.<\/li><li>Some surgeons implant a portion of spleen into the omentum, whether you decide to do this is a matter of personal choice.<\/li><li>Post operatively the patient will require prophylactic penicillin V and pneumococcal vaccine.<\/li><\/ul><br><b>Elective<\/b><br>Elective splenectomy is a very different operation from that performed in the emergency setting. The spleen is often large (sometimes massive). Most cases can be performed laparoscopically. The spleen will often be macerated inside a specimen bag to facilitate extraction.<br><br><b>Complications <\/b><br><ul><li>Haemorrhage (may be early and either from short gastrics or splenic hilar vessels<\/li><li>Pancreatic fistula (from iatrogenic damage to pancreatic tail)<\/li><li>Thrombocytosis: prophylactic aspirin <\/li><li>Encapsulated bacteria infection e.g. <i>Strep. pneumoniae<\/i>, <i>Haemophilus influenzae<\/i> and <i><i>Neisseria<\/i> meningitidis<\/i><\/li><\/ul>"}, {"name": "Stroke: types", "questions": [{"number": 63, "topic": "Stroke: types", "stem_html": "A  66 year old male is admitted to the vascular ward for an amputation.  He reports episodes of vertigo and dysarthria to the house officer.  He suddenly collapses with a Glasgow Coma Score of 3.  What is the most likely diagnosis?", "options": [{"label_html": "Cerebral haemorrhage in left temporal parietal area", "is_correct": false}, {"label_html": "Opiate overdose", "is_correct": false}, {"label_html": "Cerebral haemorrhage in right temporal parietal area", "is_correct": false}, {"label_html": "Diazepam overdose", "is_correct": false}, {"label_html": "Basilar artery occlusion", "is_correct": true}], "correct_index": 4, "explanation_html": "Vertigo and dysarthria suggest a posterior circulation event.  In the scenario of a patient complaining of posterior symptoms and a sudden deterioration in consciousness, the main differential diagnosis is of a basilar artery occlusion."}, {"number": 64, "topic": "Stroke: types", "stem_html": "A 53 year old teacher is admitted to the vascular ward for a carotid endarterectomy. Your FY1 does a preoperative assessment and notes that there is a right homonymous hemianopia. There is no other neurology. What is the most likely cause?", "options": [{"label_html": "Lateral medullary syndrome", "is_correct": false}, {"label_html": "Middle cerebral artery infarct", "is_correct": false}, {"label_html": "Anterior cerebral artery infarct", "is_correct": false}, {"label_html": "Cerebellar infarct", "is_correct": false}, {"label_html": "Posterior cerebral artery infarct", "is_correct": true}], "correct_index": 4, "explanation_html": "This patient has had a left occipital infarct, as there is only a homonymous hemianopia. If this patient had a temporal or parietal lobe infarct, there would be associated hemiparesis and higher cortical dysfunction. This is important to differentiate, as the carotid endarterectomy is inappropriate in this patient as the lesion is in the posterior cerebral artery."}, {"number": 65, "topic": "Stroke: types", "stem_html": "A 52 year man is admitted to the vascular ward for an amputation. The patient complains of unsteadiness. On further examination you detect right facial numbness and right sided nystagmus. There is sensory loss of the left side of the body. What is the most likely cause?", "options": [{"label_html": "Lateral medullary syndrome", "is_correct": true}, {"label_html": "Pontine infarct", "is_correct": false}, {"label_html": "Cerebellar infarct", "is_correct": false}, {"label_html": "Middle cerebral artery infarct", "is_correct": false}, {"label_html": "Posterior cerebral artery infarct", "is_correct": false}], "correct_index": 0, "explanation_html": "A combination of ipsilateral ataxia, nystagmus, dysphagia, facial numbness, cranial nerve palsy with contralateral hemisensory loss indicates this diagnosis."}, {"number": 66, "topic": "Stroke: types", "stem_html": "A 48 year old type 2 diabetic complains of numbness in his left arm and leg. Otherwise there are no other neurological signs. What is the most likely cause?", "options": [{"label_html": "Middle cerebral artery infarct", "is_correct": false}, {"label_html": "Lacunar infarct", "is_correct": true}, {"label_html": "Pontine infarct", "is_correct": false}, {"label_html": "Anterior cerebral artery infarct", "is_correct": false}, {"label_html": "Posterior cerebral artery infarct", "is_correct": false}], "correct_index": 1, "explanation_html": "Isolated hemisensory loss is a feature of a lacunar infarct."}], "note_html": "<div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Primary intracerebral haemorrhage (PICH, c. 10%)<\/b><\/td><td><ul><li>Presents with headache, vomiting, loss of consciousness<\/li><\/ul><\/td><\/tr><tr><td><b>Total anterior circulation infarcts (TACI, c. 15%)<\/b><\/td><td><ul><li>Involves middle and anterior cerebral arteries<\/li><li><b>H<\/b>emiparesis/hemisensory loss<\/li><li><b>H<\/b>omonymous hemianopia<\/li><li><b>H<\/b>igher cognitive dysfunction e.g. Dysphasia<\/li><\/ul><\/td><\/tr><tr><td><b>Partial anterior circulation infarcts (PACI, c. 25%)<\/b><\/td><td><ul><li>Involves smaller arteries of anterior circulation e.g. upper or lower division of middle cerebral artery<\/li><li>Higher cognitive dysfunction or two of the three TACI features<\/li><\/ul><\/td><\/tr><tr><td><b>Lacunar infarcts (LACI, c. 25%)<\/b><\/td><td><ul><li>Involves perforating arteries around the internal capsule, thalamus and basal ganglia<\/li><li>Present with either isolated hemiparesis,  hemisensory loss or hemiparesis with limb ataxia<\/li><\/ul><\/td><\/tr><tr><td><b>Posterior circulation infarcts (POCI, c. 25%)<\/b><\/td><td><ul><li>Vertebrobasilar arteries<\/li><li>Presents with features of brainstem damage<\/li><li>Ataxia, disorders of gaze and vision, cranial nerve lesions<\/li><\/ul><\/td><\/tr><tr><td><b>Lateral medullary syndrome (posterior inferior cerebellar artery)<\/b><\/td><td><ul><li>Wallenberg's syndrome<\/li><li>Ipsilateral: ataxia, nystagmus, dysphagia, facial numbness, cranial nerve palsy<\/li><li>Contralateral: limb sensory loss<\/li><\/ul><\/td><\/tr><tr><td><b>Weber's syndrome<\/b><\/td><td><ul><li>Ipsilateral III palsy<\/li><li>Contralateral weakness<\/li><\/ul><\/td><\/tr><\/tbody><\/table><\/div><br>--------------------------------------<br><br><br><b>Anterior cerebral artery<\/b>  <br><ul><li>Contralateral hemiparesis and sensory loss, lower extremity &gt; upper<\/li><li>Disconnection syndrome <\/li><\/ul><br><b>Middle cerebral artery<\/b><br><ul><li>Contralateral hemiparesis and sensory loss, upper extremity &gt; lower<\/li><li>Contralateral hemianopia <\/li><li>Aphasia  (Wernicke's)<\/li><li>Gaze abnormalities <\/li><\/ul><br><b>Posterior cerebral artery<\/b>  <br><ul><li>Contralateral hemianopia with macular sparing <\/li><li>Disconnection syndrome <\/li><\/ul> <br><b>Lacunar<\/b><br><ul><li>Present with either isolated hemiparesis,  hemisensory loss or hemiparesis with limb ataxia<\/li><\/ul><br><b>Lateral medulla (posterior inferior cerebellar artery)<\/b><br><ul><li>Ipsilateral: ataxia, nystagmus, dysphagia, facial numbness, cranial nerve palsy e.g. <\/li><\/ul><br><b>Horner's<\/b><br><ul><li>Contralateral: limb sensory loss<\/li><\/ul><br><b>Pontine<\/b> <br><ul><li>VI nerve: horizontal gaze palsy<\/li><li>VII nerve<\/li><li>Contralateral hemiparesis<\/li><\/ul>"}, {"name": "Surgical chest pain", "questions": [{"number": 67, "topic": "Surgical chest pain", "stem_html": "An obese 53 year old man presents with symptoms of recurrent retrosternal discomfort and dyspepsia. This is typically worse at night after eating a large meal. On examination, there is no physical abnormality to find. What is the most likely cause of his symptoms?", "options": [{"label_html": "Oesophageal cancer", "is_correct": false}, {"label_html": "Achalasia", "is_correct": false}, {"label_html": "Reflux disease", "is_correct": true}, {"label_html": "Oesophageal candidiasis", "is_correct": false}, {"label_html": "Pulmonary embolus", "is_correct": false}], "correct_index": 2, "explanation_html": "Patients with GORD often have symptoms that are worse at night. In this age group an Upper GI endoscopy should probably be performed."}, {"number": 68, "topic": "Surgical chest pain", "stem_html": "An obese 53 year old man presents with symptoms of recurrent retrosternal discomfort and dyspepsia. This is typically worse at night after eating a large meal. On examination, there is no physical abnormality to find. What is the most likely cause of his symptoms?", "options": [{"label_html": "Oesophageal cancer", "is_correct": false}, {"label_html": "Achalasia", "is_correct": false}, {"label_html": "Reflux disease", "is_correct": true}, {"label_html": "Oesophageal candidiasis", "is_correct": false}, {"label_html": "Pulmonary embolus", "is_correct": false}], "correct_index": 2, "explanation_html": "Patients with GORD often have symptoms that are worse at night. In this age group an Upper GI endoscopy should probably be performed."}, {"number": 69, "topic": "Surgical chest pain", "stem_html": "A 43 year old man who has a long term history of alcohol misuse is admitted with a history of an attack of vomiting after an episode of binge drinking. After vomiting he developed sudden onset left sided chest pain, which is pleuritic in nature. On examination, he is profoundly septic and drowsy with severe epigastric tenderness and left sided chest pain. What is the most likely cause?", "options": [{"label_html": "Chest infection", "is_correct": false}, {"label_html": "Boerhaaves syndrome", "is_correct": true}, {"label_html": "Oesophageal cancer", "is_correct": false}, {"label_html": "Pulmonary embolus", "is_correct": false}, {"label_html": "Myocardial infarct", "is_correct": false}], "correct_index": 1, "explanation_html": "In patients with Boerhaaves the rupture is often on the left side. The story here is typical. All patients should have a contrast study to confirm the diagnosis and the affected site prior to thoracotomy."}], "note_html": "<div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Dissection of thoracic aorta<\/b><\/td><td><ul><li>Tearing interscapular pain<\/li><li>Discrepancy in arterial blood pressures taken in both arms<\/li><li>May show mediastinal widening on chest x-ray<\/li><\/ul><\/td><\/tr><tr><td><b>Diffuse oesophageal spasm<\/b><\/td><td><ul><li>Spectrum of oesophageal motility disorders<\/li><li>Caused by uncoordinated contractions of oesphageal muscles<\/li><li>May show 'nutcracker oesophagus' on barium swallow<\/li><li>Symptoms include dysphagia, retrosternal discomfort and dyspepsia<\/li><\/ul><\/td><\/tr><tr><td><b>Gastro-oesphageal reflux<\/b><\/td><td><ul><li>Common cause of retrosternal discomfort<\/li><li>Usually associated with symptoms of regurgitation, odynophagia and dyspepsia<\/li><li>Symptoms usually well controlled with PPI therapy<\/li><li>Risk factors include obesity, smoking and excess alcohol consumption<\/li><\/ul><\/td><\/tr><tr><td><b>Boerhaaves syndrome<\/b><\/td><td><ul><li>Spontaneous rupture of the oesophagus <\/li><li>Caused by episodes of repeated vomiting often in association with alcohol excess<\/li><li>Typically there is an episode of repetitive vomiting followed by severe chest and epigastric pain<\/li><li>Diagnosis is by CT and contrast studies<\/li><li>Treatment is surgical; during first 12 hours primary repair, beyond this usually creation of controlled fistula with a T Tube, delay beyond 24 hours is associated with fulminent mediastinitis and is usually fatal.<\/li><\/ul><\/td><\/tr><tr><td><b>Achalasia<\/b><\/td><td><ul><li>Difficulty swallowing, dysphagia to both liquids and solids and sometimes chest pain<\/li><li>Usually caused by failure of distal oesphageal inhibitory neurones<\/li><li>Diagnosis is by pH and manometry studies together with contrast swallow and endoscopy<\/li><li>Treatment is with either botulinum toxin, pneumatic dilatation or cardiomyotomy<\/li><\/ul><\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Thoracic aorta rupture", "questions": [{"number": 70, "topic": "Thoracic aorta rupture", "stem_html": "A 27 year old man is involved in a road traffic accident. He is seen in the emergency department with chest pain. Clinical examination is essentially unremarkable and he is discharged. He subsequently is found dead at home. What is the most likely underlying injury?", "options": [{"label_html": "Tracheobronchial tree injury", "is_correct": false}, {"label_html": "Traumatic aortic disruption", "is_correct": true}, {"label_html": "Cardiac laceration", "is_correct": false}, {"label_html": "Diaphragmatic rupture", "is_correct": false}, {"label_html": "Rupture of the oesophagus", "is_correct": false}], "correct_index": 1, "explanation_html": "Aortic injuries that do not die at the scene may have a contained haematoma. Clinical signs are subtle and the diagnosis may not be apparent on clinical examination. Without prompt treatment the haematoma usually bursts and the patient dies."}, {"number": 71, "topic": "Thoracic aorta rupture", "stem_html": "A 19 year old student is involved in a head on car collision.  He complains of severe chest pain.  A Chest x-ray performed as part of a trauma series shows widening of the mediastinum. Which is the most likely injury in this scenario?", "options": [{"label_html": "Rupture of the distal oesophagus", "is_correct": false}, {"label_html": "Rupture of the left main bronchus", "is_correct": false}, {"label_html": "Rupture of the aorta proximal to the left subclavian artery", "is_correct": false}, {"label_html": "Rupture of the aorta distal to the left subclavian artery", "is_correct": true}, {"label_html": "Rupture of the inferior vena cava", "is_correct": false}], "correct_index": 3, "explanation_html": "The aorta may be injured in deceleration accidents. In the setting of deceleration injury, chest pain and mediastinal widening the most likely problem is aortic rupture. This will typically occur distal to the left subclavian artery. Rupture of the proximal aorta may occur. However, survival is unlikely. It is important to note that the question uses the term <i>Most likely injury<\/i> as this is the component that distinguishes an ascending rupture from a descending rupture."}, {"number": 72, "topic": "Thoracic aorta rupture", "stem_html": "Which of the following is not a feature found on a CXR in traumatic aortic disruption?", "options": [{"label_html": "Widened mediastinum", "is_correct": false}, {"label_html": "Trachea deviated to the left", "is_correct": true}, {"label_html": "Depression of the left main stem bronchus", "is_correct": false}, {"label_html": "Obliteration of the aortic knob", "is_correct": false}, {"label_html": "Widened paraspinal interfaces", "is_correct": false}], "correct_index": 1, "explanation_html": "The trachea is normally deviated to the right."}], "note_html": "<ul><li>Mechanism of injury: Decelerating force i.e. RTA, fall from a great height<\/li><li>Most people die at scene<\/li><li>Survivors may have an incomplete laceration at the ligamentum arteriosum of the aorta.<\/li><\/ul><br><b>Clinical features<\/b><br><ul><li>Contained haematoma: persistent hypotension<\/li><li>Detected mainly by history, CXR changes <\/li><\/ul><br><b>CXR changes<\/b><br><ul><li>Widened mediastinum<\/li><li>Trachea/Oesophagus to right<\/li><li>Depression of left main stem bronchus<\/li><li>Widened paratracheal stripe/paraspinal interfaces<\/li><li>Space between aorta and pulmonary artery obliterated<\/li><li>Rib fracture/left haemothorax<\/li><\/ul><br><b>Diagnosis<\/b><br>Angiography, usually CT aortogram.<br><br><b>Treatment<\/b><br>Repair or replacement. Ideally they should undergo endovascular repair."}, {"name": "Thoracic trauma", "questions": [{"number": 73, "topic": "Thoracic trauma", "stem_html": "A 24 year old motorist is involved in a road traffic accident in which he collides with the wall of a tunnel in a head on car crash, speed 85mph. He is wearing a seatbelt and the airbags have deployed. When rescuers arrive he is lucid and conscious and then dies suddenly. What is the most likely underlying injury?", "options": [{"label_html": "Tension pneumothorax", "is_correct": false}, {"label_html": "Aortic transection", "is_correct": true}, {"label_html": "Splenic rupture", "is_correct": false}, {"label_html": "Haemopericardium", "is_correct": false}, {"label_html": "Tracheobronchial dislocation", "is_correct": false}], "correct_index": 1, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Persisting hypotensive episodes in patients with aortic transections are often due to extra thoracic injury. Most patients with aortic transections who survive to reach hospital have a contained haematoma. If this fails or is disrupted, death occurs within a few minutes if not quickly treated.<\/div>Aortic transections typically occur distal to the ligamentum arteriosum. A temporary haematoma may prevent the immediate death that usually occurs. This is a deceleration injury. A widened mediastinum may be seen on x-ray."}, {"number": 74, "topic": "Thoracic trauma", "stem_html": "A 17 year old male is involved in a motorcycle accident in which he is thrown from his motorcycle. On admission he has distended neck veins and a weak pulse. The trachea is central. What is the most likely cause?", "options": [{"label_html": "Aortic transection", "is_correct": false}, {"label_html": "Haemopericardium", "is_correct": true}, {"label_html": "Simple pneumothorax", "is_correct": false}, {"label_html": "Tension pneumothorax", "is_correct": false}, {"label_html": "Tracheobronchial dislocation", "is_correct": false}], "correct_index": 1, "explanation_html": "This is most likely a cardiac tamponade produced by haemopericardium. As little as 100ml of blood may result in tamponade as the pericardial sac is not distensible. Diagnosis is suggested by muffled heart sounds, paradoxical pulse and jugular vein distension. A tension pneumothorax is made less likely in this case by the central trachea."}, {"number": 75, "topic": "Thoracic trauma", "stem_html": "A 28 year old male is involved in a road traffic accident he is thrown from his motorbike onto the pavement and sustains a haemopneumothorax and flail segment of the right chest. What is the most appropriate course of action?", "options": [{"label_html": "CT scanning of the thorax", "is_correct": false}, {"label_html": "Insertion of intercostal tube drain", "is_correct": true}, {"label_html": "Video assisted thoracoscopy", "is_correct": false}, {"label_html": "Thoracotomy", "is_correct": false}, {"label_html": "CT angiogram of the thorax", "is_correct": false}], "correct_index": 1, "explanation_html": "He requires a chest drain and analgesia. In general all haemopneumothoraces should be managed by intercostal chest drain insertion as they have a risk of becoming a tension pneumothorax until the lung laceration has sealed. This is due to the laceration of the underlying lung parenchyma having a flap effect."}, {"number": 76, "topic": "Thoracic trauma", "stem_html": "A 19 year old man is stabbed in the chest at a nightclub. He develops a cardiac arrest in casualty following an attempted transfer to the CT scanning room. What is the most appropriate course of action?", "options": [{"label_html": "Immediate CT scanning with ongoing CPR", "is_correct": false}, {"label_html": "Echocardiography", "is_correct": false}, {"label_html": "Thoracotomy", "is_correct": true}, {"label_html": "Pericardiocentesis", "is_correct": false}, {"label_html": "Chest ultrasound", "is_correct": false}], "correct_index": 2, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Massive hemothorax results from the rapid accumulation of more than 1500 mL of blood or one third or more of the patients blood volume in the chest cavity. It is most commonly caused by a penetrating wound that disrupts the systemic or hilar vessels, although massive hemothorax can also result from blunt trauma. In massive haemothorax the neck veins are typically collapsed and the chest wall remains mobile. These features can help distinguish it from pneumothorax where the neck veins are distended.<\/div>Penetrating thoracic trauma that is then followed by cardiac arrest in the department is an indication for ER thoracotomy."}, {"number": 77, "topic": "Thoracic trauma", "stem_html": "A 28 year old man falls and sustains a simple rib fracture. On examination, there is a small pneumothorax. What is the most appropriate course of action?", "options": [{"label_html": "Discharge with advice to return if symptoms worsen", "is_correct": false}, {"label_html": "Insertion of chest drain", "is_correct": true}, {"label_html": "Admission for observation", "is_correct": false}, {"label_html": "CT scanning of the chest", "is_correct": false}, {"label_html": "Thoracocentesis", "is_correct": false}], "correct_index": 1, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Do not confuse the management of pneumothorax due to trauma with the management of spontaneous uncomplicated pneumothorax.<\/div>For a rib fracture to cause a pneumothorax, there must also be laceration to the underlying lung parenchyma. This has the risk of developing into a tension pneumothorax and for this reason a chest drain should be inserted and the patient admitted."}, {"number": 78, "topic": "Thoracic trauma", "stem_html": "A 20 year old male is stabbed outside a nightclub, he has a brisk haemoptysis and in the ED has a drain inserted into the left chest. This drained 750ml frank blood. He fails to improve with this intervention. He has received 4 units of blood. His CVP is now 13. What is the best definitive course of action?", "options": [{"label_html": "Thoracotomy in theatre", "is_correct": true}, {"label_html": "Thoracotomy in ED", "is_correct": false}, {"label_html": "CT angiogram", "is_correct": false}, {"label_html": "Bronchoscopy", "is_correct": false}, {"label_html": "MRI aortic arch", "is_correct": false}], "correct_index": 0, "explanation_html": "This man has cardiac tamponade. The raised CVP in the setting of haemodynamic compromise is the pointer to this. The definitive management of this, would be an emergency thoracotomy. Since he still has a cardiac output, this should occur in theatre and a clam shell approach will give the best access. If there is a significant delay if operating some may consider a pericardiocentesis. However, this is not a widely practiced option."}, {"number": 79, "topic": "Thoracic trauma", "stem_html": "A 20 year old male is stabbed outside a nightclub, he has a brisk haemoptysis and in the ED has a drain inserted into the left chest. This drained 750ml frank blood. He fails to improve with this intervention. He has received 4 units of blood. His CVP is now 13. What is the best definitive course of action?", "options": [{"label_html": "Thoracotomy in theatre", "is_correct": true}, {"label_html": "Thoracotomy in ED", "is_correct": false}, {"label_html": "CT angiogram", "is_correct": false}, {"label_html": "Bronchoscopy", "is_correct": false}, {"label_html": "MRI aortic arch", "is_correct": false}], "correct_index": 0, "explanation_html": "This man has cardiac tamponade. The raised CVP in the setting of haemodynamic compromise is the pointer to this. The definitive management of this, would be an emergency thoracotomy. Since he still has a cardiac output, this should occur in theatre and a clam shell approach will give the best access. If there is a significant delay if operating some may consider a pericardiocentesis. However, this is not a widely practiced option."}, {"number": 80, "topic": "Thoracic trauma", "stem_html": "An 18 year old male is shot in the left chest. He was unstable but his blood pressure has improved with 1 litre of crystalloid. His chest x-ray shows a left sided pneumothorax with no lung visible. What is the best course of action?", "options": [{"label_html": "Insertion of 14Fr chest drain", "is_correct": false}, {"label_html": "Thoracotomy in ED", "is_correct": false}, {"label_html": "Insertion of 36 Fr chest drain", "is_correct": true}, {"label_html": "Thoracotomy in theatre", "is_correct": false}, {"label_html": "Thoracoscopy", "is_correct": false}], "correct_index": 2, "explanation_html": "The issue in this question is that its a traumatic pneumothorax. As a result, there is a risk of bleeding and indeed, of underlying parenchymal lung injury (these can develop into recurrent pneumothoraces quickly). Blood of even small volumes can quickly block narrow lumen drains and these can then allow a tension pneumothorax to develop. A large bore drain is less likely to develop such a complication and is preferred in the setting of trauma."}, {"number": 81, "topic": "Thoracic trauma", "stem_html": "A 19 year old motorcyclist is involved in a road traffic accident. His chest movements are irregular. He is found to have multiple rib fractures, with 2 fractures in the 3rd rib and 3 fractures in the 4th rib. What is the underlying diagnosis?", "options": [{"label_html": "Simple rib fractures", "is_correct": false}, {"label_html": "Flail chest injury", "is_correct": true}, {"label_html": "Cardiac tamponade", "is_correct": false}, {"label_html": "Pneumothorax", "is_correct": false}, {"label_html": "Aortic rupture", "is_correct": false}], "correct_index": 1, "explanation_html": "Multiple rib fractures with &gt; or = 2 rib fractures in more than 2 ribs is diagnosed as a flail chest. This is associated with pulmonary contusion."}, {"number": 82, "topic": "Thoracic trauma", "stem_html": "A 28 year old motorcyclist is involved in a road traffic accident and is brought to the emergency department. On examination, they are noted to have oxygen saturations of 89% and a chest x-ray shows that there is a left sided flail chest injury. What is the most appropriate management strategy?", "options": [{"label_html": "Administration of oral analgesia", "is_correct": false}, {"label_html": "Intercostal nerve block", "is_correct": false}, {"label_html": "Intubation and ventilation", "is_correct": true}, {"label_html": "Arrange an echocardiogram", "is_correct": false}, {"label_html": "Admit for active observation", "is_correct": false}], "correct_index": 2, "explanation_html": "A flail chest injury should usually be managed by intubation if saturations are 90% or less. Beware of the potential for underlying parenchymal lung injury which may require chest drain insertion."}, {"number": 83, "topic": "Thoracic trauma", "stem_html": "A 25 year old male pedestrian is hit by a van on a busy road. He is brought to the Emergency Department by ambulance. On examination, he is dyspneoic, and hypoxic despite administration of high flow 100% oxygen. His blood pressure is 110/70 and pulse rate is 115 bpm. The right side of his chest is hyper-resonant on percussion and has decreased breath sounds. The trachea is deviated to the left. What is the most likely underlying diagnosis?", "options": [{"label_html": "Fat embolism", "is_correct": false}, {"label_html": "Tension pneumothorax", "is_correct": true}, {"label_html": "Rupture of the right main bronchus", "is_correct": false}, {"label_html": "Rupture of the diaphragm", "is_correct": false}, {"label_html": "Pulmonary contusion", "is_correct": false}], "correct_index": 1, "explanation_html": "Blunt or penetrating chest trauma that creates a flap type defect on the surface of the lung can result in a tension pneumothorax. Typical features include dyspnoea, progressive hypoxia, hyperresonance and tracheal deviation. Treatment is with needle decompression and chest tube insertion."}], "note_html": "<b>Key points related to thoracic trauma<\/b><br><ul><li>Less than 10% of blunt chest trauma and 15-30% of penetrating chest trauma requires operative intervention.<\/li><li>The physiologic consequences of thoracic trauma are hypoxia, hypercarbia, and acidosis.  Contusion, hematoma, and alveolar collapse, or changes in intrathoracic pressure relationships (e.g., tension pneumothorax and open pneumothorax) cause hypoxia and lead to metabolic acidosis. Hypercarbia causes respiratory acidosis and most often follows inadequate ventilation caused by changes in intrathoracic pressure relationships and depressed level of consciousness.<\/li><\/ul><br><b>Types of thoracic trauma<\/b><br><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Tension pneumothorax<\/b><\/td><td><ul><li>Often laceration to lung parenchyma with flap<\/li><li>Pressure develops in thorax<\/li><li>Most common cause is mechanical ventilation in patient with pleural injury<\/li><li>Symptoms overlap with cardiac tamponade, hyper-resonant percussion note is more likely in tension pnemothorax<\/li><\/ul><\/td><\/tr><tr><td><b>Flail chest<\/b><\/td><td><ul><li>Chest wall disconnects from thoracic cage<\/li><li>Multiple rib fractures (at least two fractures per rib in at least two ribs)<\/li><li>Associated with pulmonary contusion<\/li><li>Abnormal chest motion<\/li><li>Avoid over hydration and fluid overload<\/li><\/ul><\/td><\/tr><tr><td><b>Pneumothorax<\/b><\/td><td><ul><li>Most common cause is lung laceration with air leakage<\/li><li>Most traumatic pneumothoraces should have a chest drain<\/li><li>Patients with traumatic pneumothorax should never be mechanically ventilated until a chest drain is inserted<\/li><\/ul><\/td><\/tr><tr><td><b>Haemothorax<\/b><\/td><td><ul><li>Most commonly due to laceration of lung, intercostal vessel or internal mammary artery<\/li><li>Haemothoraces large enough to appear on CXR are treated with large bore chest drain<\/li><li>Surgical exploration is warranted if &gt;1500ml blood drained immediately<\/li><\/ul><\/td><\/tr><tr><td><b>Cardiac tamponade<\/b><\/td><td><ul><li>Beck's triad: elevated venous pressure, reduced arterial pressure, reduced heart sounds<\/li><li>Pulsus paradoxus<\/li><li>May occur with as little as 100ml blood<\/li><\/ul><\/td><\/tr><tr><td><b>Pulmonary contusion<\/b><\/td><td><ul><li>Most common potentially lethal chest injury<\/li><li>Arterial blood gases and pulse oximetry important<\/li><li>Early intubation within an hour if significant hypoxia<\/li><\/ul><\/td><\/tr><tr><td><b>Blunt cardiac injury<\/b><\/td><td><ul><li>Usually occurs secondary to chest wall injury<\/li><li>ECG may show features of myocardial infarction<\/li><li>Sequelae: hypotension, arrhythmias, cardiac wall motion abnormalities<\/li><\/ul><\/td><\/tr><tr><td><b>Aorta disruption<\/b><\/td><td><ul><li>Deceleration injuries<\/li><li>Contained haematoma<\/li><li>Widened mediastinum<\/li><\/ul><\/td><\/tr><tr><td><b>Diaphragm disruption<\/b><\/td><td><ul><li>Most due to motor vehicle accidents and blunt trauma causing large radial tears (laceration injuries result in small tears)<\/li><li>More common on left side<\/li><li>Insert gastric tube, may pass into intrathoracic stomach<\/li><\/ul><\/td><\/tr><tr><td><b>Mediastinal traversing wounds<\/b><\/td><td><ul><li>Entrance wound in one hemithorax and exit wound/foreign body in opposite hemithorax<\/li><li>Mediastinal haematoma or pleural cap suggests great vessel injury<\/li><li>Mortality is 20%<\/li><\/ul><\/td><\/tr><\/tbody><\/table><\/div><br><b>References<\/b><br>ATLS Manual 10th Edition. ISBN 78-0-9968262-3-5"}, {"name": "Thrombolysis or percutaneous intervention in myocardial infarction", "questions": [{"number": 84, "topic": "Thrombolysis or percutaneous intervention in myocardial infarction", "stem_html": "A 68 year old male is admitted to the surgical ward for assessment of severe epigastric pain.  His abdomen is soft and non tender.  However the Nurse forces you to look at the ECG.  It looks abnormal.  Which of the following features is an indication for urgent coronary thrombolysis or percutaneous intervention?", "options": [{"label_html": "Right bundle branch block", "is_correct": false}, {"label_html": "ST elevation of 1mm in leads V1 to V6", "is_correct": false}, {"label_html": "Ventricular tachycardia", "is_correct": false}, {"label_html": "Q waves in leads V1 to V6", "is_correct": false}, {"label_html": "ST elevation of greater than 1mm in leads II, III and aVF", "is_correct": true}], "correct_index": 4, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">ECG changes for thrombolysis or percutaneous intervention:<br>ST elevation of &gt; 2mm (2 small squares) in 2 or more consecutive anterior leads (V1-V6) OR<br><br>ST elevation of greater than 1mm (1 small square) in greater than 2 consecutive inferior leads (II, III, avF, avL) OR<br><br>New Left bundle branch block<\/div>ST elevation of 1mm in leads II, III and aVF reflects significant cardiac ischaemia due to the right coronary artery occlusion.  The medical registrar should be contacted to urgently assess the patient.  Note right coronary artery occlusions puts the patient at risk of cardiac arrhythmias (due to blood supply to the sino atrial node)."}], "note_html": "Thrombolytic drugs activate plasminogen to form plasmin. This in turn degrades fibrin and help breaks up thrombi. They in primarily used in patients who present with a ST elevation myocardial infarction. Other indications include acute ischaemic stroke and pulmonary embolism, although strict inclusion criteria apply.<br><br>Examples<br><ul><li>alteplase<\/li><li>tenecteplase<\/li><li>streptokinase<\/li><\/ul><br>Contraindications to thrombolysis<br><ul><li>active internal bleeding<\/li><li>recent haemorrhage, trauma or surgery (including dental extraction)<\/li><li>coagulation and bleeding disorders<\/li><li>intracranial neoplasm<\/li><li>stroke &lt; 3 months<\/li><li>aortic dissection<\/li><li>recent head injury<\/li><li>pregnancy<\/li><li>severe hypertension<\/li><\/ul><br>Side-effects<br><ul><li>haemorrhage<\/li><li>hypotension - more common with streptokinase<\/li><li>allergic reactions may occur with streptokinase<\/li><\/ul>"}, {"name": "Torsades de pointes", "questions": [{"number": 85, "topic": "Torsades de pointes", "stem_html": "A 62 year old woman presents with acute bowel obstruction.  She has been vomiting up to 15 times a day and is taking erythromycin.  She suddenly complains of dizziness.  Her ECG shows torsades de pointes.  What is the management of choice?", "options": [{"label_html": "IV Atropine", "is_correct": false}, {"label_html": "IV Potassium", "is_correct": false}, {"label_html": "IV Magnesium sulphate", "is_correct": true}, {"label_html": "IV Bicarbonate", "is_correct": false}, {"label_html": "IV Adrenaline", "is_correct": false}], "correct_index": 2, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Torsades de pointes: Treatment IV magnesium sulphate<\/div>This woman is likely to have hypokalaemia and hypomagnasaemia as a result of vomiting.  In addition to this, the erythromycin will predispose her to torsades de pointes.  The patient needs Magnesium 2g over 10 minutes.  Knowledge of the management of this peri arrest diagnosis is hence important in surgical practice."}], "note_html": "Torsades de pointes ('twisting of the points') is a rare arrhythmia associated with a long QT interval. It may deteriorate into ventricular fibrillation and hence lead to sudden death<br><br>Causes of long QT interval<br><ul><li>congenital: Jervell-Lange-Nielsen syndrome, Romano-Ward syndrome<\/li><li>antiarrhythmics: amiodarone, sotalol, class 1a antiarrhythmic drugs<\/li><li>tricyclic antidepressants<\/li><li>antipsychotics<\/li><li>chloroquine<\/li><li>terfenadine<\/li><li>erythromycin<\/li><li>electrolyte: hypocalcaemia, hypokalaemia, hypomagnesaemia<\/li><li>myocarditis<\/li><li>hypothermia<\/li><li>subarachnoid haemorrhage<\/li><\/ul><br>Management<br><ul><li>IV magnesium sulphate<\/li><\/ul>"}, {"name": "Transfusions in major trauma", "questions": [{"number": 86, "topic": "Transfusions in major trauma", "stem_html": "A 25 year old man is shot in the abdomen and is transferred to the operating theatre following arrival in the emergency department, as he is unstable and a FAST scan is positive. At operation there is an extensive laceration to the right lobe of the liver and involvement of the IVC. There is massive haemorrhage. What is the most appropriate initial approach to blood component therapy?", "options": [{"label_html": "Use Factor VIII concentrates early", "is_correct": false}, {"label_html": "Avoid use of 'o' negative blood", "is_correct": false}, {"label_html": "Transfuse packed cells, FFP and platelets in fixed ratios of 1:1:1", "is_correct": true}, {"label_html": "Transfuse packed cells and FFP in a fixed ratio of 4:1", "is_correct": false}, {"label_html": "Perform goal directed transfusion based on the Hb, PT and TEG studies", "is_correct": false}], "correct_index": 2, "explanation_html": "There is strong evidence to support the use of haemostatic transfusion in the setting of major haemorrhage due to trauma. This advocates the use of 1:1:1 ratios."}], "note_html": "Uncontrolled haemorrhage accounts for up to 39% of all trauma related death. In the UK approximately 2% of all trauma patients will need massive transfusion.Massive transfusion is defined as the replacement of a patient's total blood volume in less than 24 hours, or as the acute administration of more than half the patient's estimated blood volume per hour.  In haemorrhaging patients following trauma there is evidence to support the initial administration of tranexamic acid (CRASH study). During acute bleeding the practice of haemostatic resuscitation has been shown to reduce mortality rates. The principle of haemostatic resuscitation is that blood components are transfused in fixed ratios. For example; packed red cells, FFP and platelets are administered in a ratio of 1:1:1. <br><br>The typical therapeutic end points include:<br><ul><li>Hb: 8-10 g/dl<\/li><li>Platelets &gt; 100<\/li><li>PT (INR) and APTT &lt; 1.5<\/li><li>Fibrinogen &gt; 1.0 g/l<\/li><li>Ca<sup>2+<\/sup>  &gt; 1 mmol/l<\/li><li>pH: 7.35-7.45<\/li><li>BE: +/- 2<\/li><li>T<sup>o<\/sup>C &gt; 36 °C<\/li><\/ul><br><b>Reference<\/b><br>Weymouth W <i>et al<\/i>. Whole Blood in Trauma: A Review for Emergency Clinicians. <i>J Emerg Med<\/i>. 2019 May;56(5):491-498."}, {"name": "Trauma management", "questions": [{"number": 87, "topic": "Trauma management", "stem_html": "A 10 year old child is admitted to the emergency department after a fall. On examination, the blood pressure is 100/55mmHg, pulse rate 90, abdomen soft but tender on the left. Abdominal imaging demonstrates a grade III splenic laceration. What is the most appropriate course of action?", "options": [{"label_html": "Undertake an immediate laparotomy and splenectomy", "is_correct": false}, {"label_html": "Undertake a laparoscopy and laparoscopic splenectomy", "is_correct": false}, {"label_html": "Admit the child to the high dependency unit for close monitoring", "is_correct": true}, {"label_html": "Arrange splenic artery embolisation", "is_correct": false}, {"label_html": "Undertake a laparotomy and splenic repair", "is_correct": false}], "correct_index": 2, "explanation_html": "Splenic trauma is nearly always managed conservatively. Hilar injuries (grade IV) are less amenable to this and will tend to come to surgery."}, {"number": 88, "topic": "Trauma management", "stem_html": "A 55 year old man is involved in a stabbing and receives an injury to the left iliac fossa. After transfer to hospital he is taken immediately to theatre because of haemodynamic instability. At laparotomy, an injury to the colonic mesentery is found to be the cause of blood loss, there is an associated injury to the left colon with local perforation and contamination. What is the most appropriate course of action?", "options": [{"label_html": "Undertake a repair of the descending colon and place drains", "is_correct": false}, {"label_html": "Resect the left colon and perform an end to end anastomosis", "is_correct": false}, {"label_html": "Resect the left colon and construct a left iliac fossa end colostomy", "is_correct": true}, {"label_html": "Place an omental patch over the defect in the colon and drains adjacent to this", "is_correct": false}, {"label_html": "Perform a sub total colectomy and end ileostomy", "is_correct": false}], "correct_index": 2, "explanation_html": "Colonic injuries in the face of significant instability and contamination are probably safest resected, particularly since the scenario alludes to the presence of colonic mesenteric vascular injury which might compromise attempt to heal a repair."}, {"number": 89, "topic": "Trauma management", "stem_html": "Which of the following statements relating to large volume blood loss in trauma is incorrect?", "options": [{"label_html": "Tranexamic acid reduces the incidence of rebleeding following surgery", "is_correct": false}, {"label_html": "Hypocalcaemia may complicate resuscitation", "is_correct": false}, {"label_html": "Colloids are preferred initially as they reduce the incidence of coagulopathy", "is_correct": true}, {"label_html": "When patients receive over 5 units of whole blood mortality increases when blood products greater than 3 weeks old are utilised", "is_correct": false}, {"label_html": "In the battlefield setting a ratio of 1:1:1 for blood, plasma and platelets is use
