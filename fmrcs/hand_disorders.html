<head>

  <title>Hand Disorders</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f1e8;
      --bg-accent: #ebe4d4;
      --surface: rgba(255, 252, 246, 0.92);
      --surface-strong: #fffdf7;
      --border: #d9cfbd;
      --text: #23313a;
      --text-soft: #5f6c73;
      --accent: #496a58;
      --accent-strong: #2f5341;
      --correct-bg: #e0f3e6;
      --correct-border: #77b487;
      --wrong-bg: #fbe0df;
      --wrong-border: #dc7a73;
      --note-bg: #f3eee2;
      --shadow: 0 18px 40px rgba(76, 59, 37, 0.08);
      --radius-lg: 22px;
      --radius-md: 16px;
      --radius-sm: 12px;
      --page-width: 960px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: "Avenir Next", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.72), transparent 32%),
        linear-gradient(180deg, #f8f4eb 0%, #f3ede0 100%);
      line-height: 1.65;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.14), transparent 18%, transparent 82%, rgba(255, 255, 255, 0.14)),
        repeating-linear-gradient(
          180deg,
          rgba(73, 106, 88, 0.015) 0,
          rgba(73, 106, 88, 0.015) 1px,
          transparent 1px,
          transparent 18px
        );
    }

    a {
      color: var(--accent-strong);
    }

    img {
      max-width: 100%;
      height: auto;
      border-radius: 14px;
    }

    .score-badge,
    .badge.rounded-pill.bg-danger {
      display: none !important;
    }

    .page {
      width: min(100% - 24px, var(--page-width));
      margin: 0 auto;
      padding: 18px 0 48px;
    }

    .topbar {
      margin-bottom: 18px;
      padding: 18px;
      background: rgba(255, 252, 246, 0.9);
      border: 1px solid rgba(217, 207, 189, 0.86);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .topbar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .eyebrow {
      margin: 0 0 4px;
      font-size: 0.76rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-soft);
    }

    .title {
      margin: 0;
      font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
      font-size: clamp(1.5rem, 2vw + 1rem, 2.35rem);
      line-height: 1.08;
      font-weight: 700;
    }

    .meta {
      margin: 8px 0 0;
      color: var(--text-soft);
      font-size: 0.96rem;
    }

    .mode-switch {
      display: inline-flex;
      padding: 6px;
      border-radius: 999px;
      background: var(--bg-accent);
      border: 1px solid var(--border);
      gap: 6px;
      flex-shrink: 0;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
      flex-wrap: wrap;
    }

    .topic-actions {
      display: inline-flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .utility-button {
      appearance: none;
      border: 1px solid var(--border);
      background: var(--surface-strong);
      color: var(--text);
      font: inherit;
      font-weight: 700;
      border-radius: 999px;
      padding: 10px 14px;
      cursor: pointer;
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .utility-button:hover {
      transform: translateY(-1px);
      border-color: #c7bba9;
      box-shadow: 0 8px 18px rgba(70, 54, 34, 0.07);
    }

    .utility-button:focus-visible {
      outline: 3px solid rgba(73, 106, 88, 0.22);
      outline-offset: 2px;
    }

    .mode-button {
      appearance: none;
      border: 0;
      background: transparent;
      color: var(--text-soft);
      font: inherit;
      font-weight: 700;
      border-radius: 999px;
      padding: 10px 16px;
      min-width: 92px;
      cursor: pointer;
      transition: transform 0.18s ease, background 0.18s ease, color 0.18s ease, box-shadow 0.18s ease;
    }

    .mode-button:hover {
      transform: translateY(-1px);
      color: var(--text);
    }

    .mode-button.active {
      background: var(--surface-strong);
      color: var(--accent-strong);
      box-shadow: 0 8px 18px rgba(73, 106, 88, 0.14);
    }

    .topic-list {
      display: grid;
      gap: 18px;
    }

    .topic {
      background: rgba(255, 252, 246, 0.78);
      border: 1px solid rgba(217, 207, 189, 0.9);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .topic[open] {
      background: rgba(255, 252, 246, 0.9);
    }

    .topic > summary {
      list-style: none;
      cursor: pointer;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      user-select: none;
    }

    .topic > summary::-webkit-details-marker {
      display: none;
    }

    .topic-title {
      margin: 0;
      font-size: 1.08rem;
      font-weight: 800;
      letter-spacing: 0.01em;
    }

    .topic-meta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--text-soft);
      font-size: 0.94rem;
    }

    .chevron {
      display: inline-block;
      transition: transform 0.2s ease;
      color: var(--accent);
      font-weight: 700;
    }

    .topic[open] > summary .chevron {
      transform: rotate(90deg);
    }

    .topic-notes {
      background: rgba(243, 238, 226, 0.62);
      border: 1px solid #e3d9c8;
      border-radius: var(--radius-md);
      overflow: hidden;
    }

    .topic-notes > summary {
      list-style: none;
      cursor: pointer;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      user-select: none;
    }

    .topic-notes > summary::-webkit-details-marker {
      display: none;
    }

    .topic-notes-title {
      font-size: 0.95rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-soft);
    }

    .topic-notes[open] > summary .chevron {
      transform: rotate(90deg);
    }

    .topic-notes-body {
      padding: 0 16px 16px;
      color: var(--text);
    }

    .topic-body {
      padding: 0 16px 16px;
      display: grid;
      gap: 14px;
    }

    .question-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 18px;
      box-shadow: 0 10px 24px rgba(70, 54, 34, 0.05);
    }

    .question-label {
      margin: 0 0 10px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-soft);
      font-size: 0.88rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 800;
    }

    .stem {
      font-size: 1rem;
    }

    .stem > *:first-child,
    .explanation > *:first-child {
      margin-top: 0;
    }

    .stem > *:last-child,
    .explanation > *:last-child {
      margin-bottom: 0;
    }

    .options {
      margin-top: 16px;
      display: grid;
      gap: 10px;
    }

    .option {
      width: 100%;
      text-align: left;
      border: 1px solid #d8d0c2;
      background: #fffdf8;
      color: var(--text);
      border-radius: var(--radius-sm);
      padding: 14px 15px;
      font: inherit;
      line-height: 1.45;
      cursor: pointer;
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
    }

    .option:hover {
      transform: translateY(-1px);
      border-color: #c7bba9;
      box-shadow: 0 8px 18px rgba(70, 54, 34, 0.07);
    }

    .option:focus-visible {
      outline: 3px solid rgba(73, 106, 88, 0.22);
      outline-offset: 2px;
    }

    .option.correct {
      background: var(--correct-bg);
      border-color: var(--correct-border);
      box-shadow: inset 0 0 0 1px rgba(119, 180, 135, 0.2);
    }

    .option.incorrect {
      background: var(--wrong-bg);
      border-color: var(--wrong-border);
      box-shadow: inset 0 0 0 1px rgba(220, 122, 115, 0.2);
    }

    .option.neutral-revealed {
      background: #faf6ee;
      border-color: #d8d0c2;
      color: #5f676a;
    }

    .option[disabled] {
      cursor: default;
      opacity: 1;
    }

    .explanation {
      margin-top: 14px;
      padding: 14px 16px;
      background: var(--note-bg);
      border: 1px solid #e3d9c8;
      border-radius: 14px;
      color: var(--text);
    }

    .question-card.is-hidden .explanation {
      display: none;
    }

    .explanation-label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-soft);
      font-weight: 800;
    }

    .empty-state {
      padding: 28px 22px;
      background: var(--surface);
      border: 1px dashed var(--border);
      border-radius: var(--radius-lg);
      color: var(--text-soft);
    }

    .rich-text table {
      width: 100%;
      border-collapse: collapse;
      margin: 12px 0;
      overflow: hidden;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.68);
    }

    .rich-text td,
    .rich-text th {
      border: 1px solid #ddd2bf;
      padding: 10px 12px;
      vertical-align: top;
    }

    .rich-text ul,
    .rich-text ol {
      padding-left: 20px;
      margin: 10px 0;
    }

    .rich-text center {
      display: block;
      text-align: center;
    }

    .rich-text .table-responsive {
      overflow-x: auto;
    }

    @media (max-width: 720px) {
      .page {
        width: min(100% - 16px, var(--page-width));
        padding-top: 10px;
      }

      .topbar {
        padding: 14px;
        border-radius: 18px;
      }

      .topbar-inner {
        flex-direction: column;
        align-items: stretch;
      }

      .controls {
        justify-content: stretch;
      }

      .topic-actions {
        width: 100%;
      }

      .utility-button {
        flex: 1 1 0;
      }

      .mode-switch {
        width: 100%;
        justify-content: stretch;
      }

      .mode-button {
        flex: 1 1 50%;
      }

      .topic > summary {
        padding: 16px;
        align-items: flex-start;
      }

      .topic-meta {
        font-size: 0.88rem;
      }

      .topic-body {
        padding: 0 12px 12px;
      }

      .question-card {
        padding: 15px;
      }

      .option {
        padding: 13px 14px;
      }
    }
  </style>
</head>

  <script id="quiz-data" type="application/json">{"title": "Hand Disorders", "topics": [{"name": "Hand diseases", "questions": [{"number": 1, "topic": "Hand diseases", "stem_html": "A 52 year old male presents with discomfort in the fingers of his left hand. On examination, the ring and little fingers of his left hand are flexed and unable to extend completely. He is able to make a fist with the hand. Palpation reveals thickened nodules on the medial half of the palm. What is the most likely diagnosis?", "options": [{"label_html": "de Quervain's tenosynovitis", "is_correct": false}, {"label_html": "Tendon sheath infection", "is_correct": false}, {"label_html": "Dupuytren's contracture", "is_correct": true}, {"label_html": "Ganglion", "is_correct": false}, {"label_html": "Heberden's nodes", "is_correct": false}], "correct_index": 2, "explanation_html": "Discomfort of the hand is not uncommon in Dupuytren's contracture, true pain is unusual. The disease most commonly affects the ring and little fingers."}, {"number": 2, "topic": "Hand diseases", "stem_html": "A 62 year old man presents after his wife commented on the unusual shape of his fingers. On examination, he has a hard swelling adjacent to the distal interphalangeal joint of his index finger of the right hand with lateral deviation of the finger tip. There is no sensory disturbance and the swelling is not tender. Which pathological process underpins the underlying diagnosis?", "options": [{"label_html": "Rheumatoid arthritis", "is_correct": false}, {"label_html": "Osteoarthritis", "is_correct": true}, {"label_html": "Infection with atypical organisms", "is_correct": false}, {"label_html": "Deposition of immune complexes", "is_correct": false}, {"label_html": "Malignancy", "is_correct": false}], "correct_index": 1, "explanation_html": "The description fits with Heberdens nodes. These are bony outgrowths that occur in the distal interphalangeal joint in association with osteoarthritis. They may skew the finger tip sideways. Bouchards nodes are similar, but affect the proximal interphalangeal joint."}, {"number": 3, "topic": "Hand diseases", "stem_html": "A 63 year old lady presents with a three month history of pins and needles in the fingers of the right hand, particularly at night. On examination, there is some loss of the sensation over the palmar aspect of the lateral three fingers and wasting of the thenar eminence. What is the underlying diagnosis?", "options": [{"label_html": "Radial nerve injury", "is_correct": false}, {"label_html": "Ulnar nerve injury", "is_correct": false}, {"label_html": "Psychosomatic illness", "is_correct": false}, {"label_html": "Wrist arthritis", "is_correct": false}, {"label_html": "Carpal tunnel syndrome", "is_correct": true}], "correct_index": 4, "explanation_html": "Carpal tunnel syndrome commonly produces pain at night as the wrists are flexed during sleep. Compromise of the median nerve may produce wasting of the thenar eminence muscles."}, {"number": 4, "topic": "Hand diseases", "stem_html": "A 42 year old lady who has systemic lupus erythematosus presents to the clinic with a 5 day history of a painful purple lesion on her index finger. On examination, she has a tender red lesion on the index finger. What is the diagnosis?", "options": [{"label_html": "Heberdens nodes", "is_correct": false}, {"label_html": "Oslers nodes", "is_correct": true}, {"label_html": "Bouchards nodes", "is_correct": false}, {"label_html": "Malignant fibrous histiocytoma", "is_correct": false}, {"label_html": "Osteoclastoma", "is_correct": false}], "correct_index": 1, "explanation_html": "Osler nodes are normally described as tender, purple/red raised lesions with a pale centre. These lesions occur as a result of immune complex deposition. These occur most often in association with endocarditis. However, other causes include SLE, gonorrhoea, typhoid and haemolytic anaemia."}, {"number": 5, "topic": "Hand diseases", "stem_html": "A 62 year old lady presents with a non tender lump overlying the distal interphalangeal joint of the index finger. On examination, she has a hard, non tender lump overlying the joint and deviation of the tip of the finger. What is the nature of the lesion?", "options": [{"label_html": "Oslers nodes", "is_correct": false}, {"label_html": "Bouchards nodes", "is_correct": false}, {"label_html": "Heberdens nodes", "is_correct": true}, {"label_html": "Osteosarcoma", "is_correct": false}, {"label_html": "Infective collection", "is_correct": false}], "correct_index": 2, "explanation_html": "Heberdens nodes may produce swelling of the distal interphalangeal joint with deviation of the finger tip."}, {"number": 6, "topic": "Hand diseases", "stem_html": "A 17 year old boy is brought to the clinic by his mother who is concerned about a lesion that has developed on the dorsal surface of his left hand. On examination, he has a soft fluctuant swelling on the dorsal aspect of the hand, it is most obvious on making a fist. What is the nature of the lesion?", "options": [{"label_html": "Ganglion", "is_correct": true}, {"label_html": "Osteosarcoma", "is_correct": false}, {"label_html": "Malignant fibrous histiocytoma", "is_correct": false}, {"label_html": "Bouchards nodes", "is_correct": false}, {"label_html": "Oslers nodes", "is_correct": false}], "correct_index": 0, "explanation_html": "Ganglions commonly occur in the hand and are usually associated with tendons. They are typically soft and fluctuant. They do not require removal unless they are atypical or causing symptoms."}], "note_html": "<b>Dupuytrens contracture<\/b><br><ul><li>Fixed flexion contracture of the hand where the fingers bend towards the palm and cannot be fully extended.<\/li><li>Caused by underlying contractures of the palmar aponeurosis . The ring finger and little finger are the fingers most commonly affected. The middle finger may be affected in advanced cases, but the index finger and the thumb are nearly always spared.<\/li><li>Progresses slowly and is usually painless. In patients with this condition, the tissues under the skin on the palm of the hand thicken and shorten so that the tendons connected to the fingers cannot move freely. The palmar aponeurosis becomes hyperplastic and undergoes contracture.<\/li><li>Commonest in males over 40 years of age.<\/li><li>Association with liver cirrhosis and alcoholism. However, many cases are idiopathic.<\/li><li>Treatment is surgical and involves fasciectomy. However, the condition may recur and many surgical therapies are associated with risk of neurovascular damage to the digital nerves and arteries.<\/li><\/ul><br><b>Carpal tunnel syndrome<\/b><br><ul><li>Idiopathic median neuropathy at the carpal tunnel.<\/li><li>Characterised by altered sensation of the lateral 3 fingers. <\/li><li>The condition is commoner in females and is associated with other connective tissue disorders such as rheumatoid disease. It may also occur following trauma to the distal radius.<\/li><li>Symptoms occur mainly at night in early stages of the condition.<\/li><li>Examination may demonstrate wasting of the muscles of the thenar eminence and symptoms may be reproduced by Tinels test (compression of the contents of the carpal tunnel).<\/li><li>Formal diagnosis is usually made by electrophysiological studies.<\/li><li>Treatment is by surgical decompression of the carpal tunnel, a procedure achieved by division of the flexor retinaculum. Non - surgical options include splinting and bracing.<\/li><\/ul><br><b>Miscellaneous hand lumps<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Osler's nodes<\/b><\/td><td>Osler's nodes are painful, red, raised lesions found on the hands and feet. They are the result of the deposition of immune complexes.<\/td><\/tr><tr><td><b>Bouchard's nodes<\/b><\/td><td>Hard, bony outgrowths or gelatinous cysts on the proximal interphalangeal joints (the middle joints of fingers or toes.) They are a sign of osteoarthritis, and are caused by formation of calcific spurs of the articular cartilage.<\/td><\/tr><tr><td><b>Heberden's nodes<\/b><\/td><td>Typically develop in middle age, beginning either with a chronic swelling of the affected joints or the sudden painful onset of redness, numbness, and loss of manual dexterity. This initial inflammation and pain eventually subsides, and the patient is left with a permanent bony outgrowth that often skews the fingertip sideways. It typically affects the DIP joint.<\/td><\/tr><tr><td><b>Ganglion<\/b><\/td><td>Swelling in association with a tendon sheath commonly near a joint. They are common lesions in the wrist and hand. Usually they are asymptomatic and cause little in the way of functional compromise. They are fluid filled although the fluid is similar to synovial fluid it is slightly more viscous. When the cysts are troublesome they may be excised.<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Scaphoid fractures", "questions": [{"number": 7, "topic": "Scaphoid fractures", "stem_html": "A 13 year old boy falls onto an outstretched hand and is brought to the emergency department. He is examined by a doctor and a bony injury is cleared clinically. He re-presents a week later with pain in his hand. What is the most likely underlying injury?", "options": [{"label_html": "Fracture of the distal radius", "is_correct": false}, {"label_html": "Fracture of the scaphoid", "is_correct": true}, {"label_html": "Dislocation of the lunate", "is_correct": false}, {"label_html": "Rupture of flexor pollicis longus tendon", "is_correct": false}, {"label_html": "Bennett's fracture", "is_correct": false}], "correct_index": 1, "explanation_html": "Scaphoid fractures in children are rare, will usually involve the distal pole and are easily missed. The initial clinical examination (and sometimes x-rays) may be normal and repeated clinical examination and imaging is advised for this reason. Whilst the other injuries may be sustained from a fall onto an outstretched hand they are less likely to be overlooked on clinical examination. In the case of a Bennetts fracture, the injury mechanism is less compatible with this type of injury."}, {"number": 8, "topic": "Scaphoid fractures", "stem_html": "A 42 year old skier falls and impacts his hand on his ski pole. On examination, he is tender in the anatomical snuffbox and on bimanual palpation. X-rays with scaphoid views show no evidence of fracture. What is the most appropriate course of action?", "options": [{"label_html": "Admission and surgical debridement", "is_correct": false}, {"label_html": "Application of tubigrip bandage and fracture clinic review", "is_correct": false}, {"label_html": "Application of futura splint and fracture clinic review", "is_correct": true}, {"label_html": "Admission for open reduction and fixation", "is_correct": false}, {"label_html": "Discharge with reassurance", "is_correct": false}], "correct_index": 2, "explanation_html": "A fracture may still be present and should be immobilised until repeat imaging can be performed. If clinical suspicion persists then subsequent imaging should be with MRI scanning or CT if MRI is contra-indicated."}, {"number": 9, "topic": "Scaphoid fractures", "stem_html": "A 43 year old man falls over landing on his left hand. Although there was anatomical snuffbox tenderness; no x-rays either at the time, or subsequently, have shown evidence of scaphoid fracture. He has been immobilised in a futura splint for two weeks and is now asymptomatic. What is the most appropriate course of action?", "options": [{"label_html": "Application of tubigrip bandage and fracture clinic review", "is_correct": false}, {"label_html": "Admission and surgical debridement", "is_correct": false}, {"label_html": "Application of futura splint and fracture clinic review", "is_correct": false}, {"label_html": "Application of below elbow cast for 6 weeks", "is_correct": false}, {"label_html": "Discharge with reassurance", "is_correct": true}], "correct_index": 4, "explanation_html": "This patient is at extremely low risk of having sustained a scaphoid injury and may be discharged."}, {"number": 10, "topic": "Scaphoid fractures", "stem_html": "A 25 year old man is diagnosed as having an undisplaced fracture of the proximal pole of the scaphoid. What is the best course of action?", "options": [{"label_html": "Immobilisation in future splint for 5 weeks", "is_correct": false}, {"label_html": "Arrange an MRI scan", "is_correct": false}, {"label_html": "Immobilisation in plaster cast for 4 weeks", "is_correct": false}, {"label_html": "Surgical fixation", "is_correct": true}, {"label_html": "Initial immobisation in plaster cast for 2 weeks with check radiographs at that stage", "is_correct": false}], "correct_index": 3, "explanation_html": "It is generally accepted that proximal pole fractures of the scaphoid should be surgically fixed as non union rates of up to 34% can be seen when cast immobilization alone is attempted."}], "note_html": "- Incidence of scaphoid fractures in UK ranges from 12.4 per 100,000 to 29 per 100,000<br><ul><li>Surface of scaphoid is covered by articular cartilage with small area available for blood vessels (fracture risks blood supply)<\/li><li>Forms floor of anatomical snuffbox<\/li><li>Risk of fracture associated with fall onto outstretched hand (tubercle, waist, or proximal third)<\/li><li>A series of 4 scaphoid radiographs should be undertaken (PA, pronated oblique, Ziter view and lateral view). The Ziter view is a PA view with the wrist in ulnar deviation and beam angulated at 20 degrees<\/li><li>Sensitivity of scaphoid radiographs in 1st week of injury is 80%<\/li><li>Immobilization of scaphoid fractures difficult<\/li><li>Repeat imaging should be done at 10 days. MRI should be done in cases of diagnostic uncertainty<\/li><\/ul><br><b>Classification of scaphoid fractures<\/b><br>Scaphoid tubercle<br>Distal pole<br>Waist <br>Proximal pole<br>                  <br><b>Management<\/b><br>Undisplaced fractures of the waist of the scaphoid and most distal pole fractures can be managed in a cast for 6 weeks with high rates of union. <br>Displaced scaphoid waist fractures (more than 1-2mm) should be viewed as unstable and surgically fixed. <br>All proximal pole fractures should be fixed surgically.<br><br><b>Complications<\/b><br><ul><li>Non union of scaphoid <\/li><li>Avascular necrosis of the scaphoid <\/li><li>Scapholunate disruption and wrist collapse<\/li><li>Degenerative changes of the adjacent joint<\/li><\/ul><br><b>Reference<\/b><br>Berber O <i>et al<\/i>. Fractures of the scaphoid. <i>BMJ<\/i> 2020 (369): 414-416."}]}</script>
  <script>
    const quizData = JSON.parse(document.getElementById("quiz-data").textContent);
    const app = document.getElementById("app");
    const modeButtons = Array.from(document.querySelectorAll("[data-mode-button]"));
    const topicActionButtons = Array.from(document.querySelectorAll("[data-topic-action]"));

    const state = {
      mode: "solve",
      answers: new Map(),
      questionRefs: [],
    };

    function buildTopic(topic, questionOffset) {
      const details = document.createElement("details");
      details.className = "topic";
      details.open = true;

      const summary = document.createElement("summary");
      summary.innerHTML = `
        <div>
          <h2 class="topic-title">${topic.name}</h2>
        </div>
        <div class="topic-meta">
          <span>${topic.questions.length} questions</span>
          <span class="chevron" aria-hidden="true">></span>
        </div>
      `;

      const body = document.createElement("div");
      body.className = "topic-body";

      if (topic.note_html) {
        const notes = document.createElement("details");
        notes.className = "topic-notes";

        const notesSummary = document.createElement("summary");
        notesSummary.innerHTML = `
          <span class="topic-notes-title">Notes</span>
          <span class="chevron" aria-hidden="true">></span>
        `;

        const notesBody = document.createElement("div");
        notesBody.className = "topic-notes-body rich-text";
        notesBody.innerHTML = topic.note_html;

        notes.appendChild(notesSummary);
        notes.appendChild(notesBody);
        body.appendChild(notes);
      }

      topic.questions.forEach((question, indexInTopic) => {
        const globalIndex = questionOffset + indexInTopic;
        body.appendChild(buildQuestionCard(question, globalIndex));
      });

      details.appendChild(summary);
      details.appendChild(body);
      return details;
    }

    function buildQuestionCard(question, questionIndex) {
      const card = document.createElement("article");
      card.className = "question-card is-hidden";
      card.dataset.questionIndex = String(questionIndex);

      const label = document.createElement("p");
      label.className = "question-label";
      label.textContent = `Question ${question.number}`;

      const stem = document.createElement("div");
      stem.className = "stem rich-text";
      stem.innerHTML = question.stem_html;

      const options = document.createElement("div");
      options.className = "options";

      const optionButtons = question.options.map((option, optionIndex) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "option";
        button.dataset.optionIndex = String(optionIndex);
        button.innerHTML = option.label_html;
        button.addEventListener("click", () => {
          if (state.mode !== "solve") {
            return;
          }
          state.answers.set(questionIndex, optionIndex);
          applyQuestionState(questionIndex);
        });
        options.appendChild(button);
        return button;
      });

      const explanation = document.createElement("div");
      explanation.className = "explanation rich-text";
      explanation.innerHTML = `<span class="explanation-label">Explanation</span>${question.explanation_html}`;

      card.appendChild(label);
      card.appendChild(stem);
      card.appendChild(options);
      card.appendChild(explanation);

      state.questionRefs[questionIndex] = {
        card,
        explanation,
        optionButtons,
        question,
      };

      applyQuestionState(questionIndex);
      return card;
    }

    function applyQuestionState(questionIndex) {
      const ref = state.questionRefs[questionIndex];
      if (!ref) {
        return;
      }

      const { card, optionButtons, question } = ref;
      const selectedIndex = state.answers.get(questionIndex);
      const hasSelection = selectedIndex !== undefined;
      const isReview = state.mode === "review";
      const showExplanation = isReview || hasSelection;

      card.classList.toggle("is-hidden", !showExplanation);

      optionButtons.forEach((button, optionIndex) => {
        button.classList.remove("correct", "incorrect", "neutral-revealed");

        if (isReview) {
          button.disabled = true;
          if (optionIndex === question.correct_index) {
            button.classList.add("correct");
          } else {
            button.classList.add("neutral-revealed");
          }
          return;
        }

        button.disabled = false;
        if (!hasSelection) {
          return;
        }

        if (optionIndex === question.correct_index) {
          button.classList.add("correct");
        } else if (optionIndex === selectedIndex) {
          button.classList.add("incorrect");
        } else {
          button.classList.add("neutral-revealed");
        }
      });
    }

    function renderApp() {
      if (!quizData.topics.length) {
        const empty = document.createElement("div");
        empty.className = "empty-state";
        empty.textContent = "No questions were found in this JSON file.";
        app.replaceChildren(empty);
        return;
      }

      const wrapper = document.createElement("div");
      wrapper.className = "topic-list";

      let questionOffset = 0;
      quizData.topics.forEach((topic) => {
        wrapper.appendChild(buildTopic(topic, questionOffset));
        questionOffset += topic.questions.length;
      });

      app.replaceChildren(wrapper);
    }

    function setMode(mode) {
      state.mode = mode;
      modeButtons.forEach((button) => {
        const isActive = button.dataset.modeButton === mode;
        button.classList.toggle("active", isActive);
        button.setAttribute("aria-pressed", String(isActive));
      });

      state.questionRefs.forEach((_, index) => applyQuestionState(index));
    }

    function setAllTopics(open) {
      document.querySelectorAll(".topic").forEach((topic) => {
        topic.open = open;
      });
    }

    modeButtons.forEach((button) => {
      button.addEventListener("click", () => setMode(button.dataset.modeButton));
    });

    topicActionButtons.forEach((button) => {
      button.addEventListener("click", () => {
        setAllTopics(button.dataset.topicAction === "expand");
      });
    });

    renderApp();
    setMode("solve");
  </script>
</body>
