<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Clinical Microbiology</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f1e8;
      --bg-accent: #ebe4d4;
      --surface: rgba(255, 252, 246, 0.92);
      --surface-strong: #fffdf7;
      --border: #d9cfbd;
      --text: #23313a;
      --text-soft: #5f6c73;
      --accent: #496a58;
      --accent-strong: #2f5341;
      --correct-bg: #e0f3e6;
      --correct-border: #77b487;
      --wrong-bg: #fbe0df;
      --wrong-border: #dc7a73;
      --note-bg: #f3eee2;
      --shadow: 0 18px 40px rgba(76, 59, 37, 0.08);
      --radius-lg: 22px;
      --radius-md: 16px;
      --radius-sm: 12px;
      --page-width: 960px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: "Avenir Next", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.72), transparent 32%),
        linear-gradient(180deg, #f8f4eb 0%, #f3ede0 100%);
      line-height: 1.65;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.14), transparent 18%, transparent 82%, rgba(255, 255, 255, 0.14)),
        repeating-linear-gradient(
          180deg,
          rgba(73, 106, 88, 0.015) 0,
          rgba(73, 106, 88, 0.015) 1px,
          transparent 1px,
          transparent 18px
        );
    }

    a {
      color: var(--accent-strong);
    }

    img {
      max-width: 100%;
      height: auto;
      border-radius: 14px;
    }

    .score-badge,
    .badge.rounded-pill.bg-danger {
      display: none !important;
    }

    .page {
      width: min(100% - 24px, var(--page-width));
      margin: 0 auto;
      padding: 18px 0 48px;
    }

    .topbar {
      margin-bottom: 18px;
      padding: 18px;
      background: rgba(255, 252, 246, 0.9);
      border: 1px solid rgba(217, 207, 189, 0.86);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .topbar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .eyebrow {
      margin: 0 0 4px;
      font-size: 0.76rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-soft);
    }

    .title {
      margin: 0;
      font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
      font-size: clamp(1.5rem, 2vw + 1rem, 2.35rem);
      line-height: 1.08;
      font-weight: 700;
    }

    .meta {
      margin: 8px 0 0;
      color: var(--text-soft);
      font-size: 0.96rem;
    }

    .mode-switch {
      display: inline-flex;
      padding: 6px;
      border-radius: 999px;
      background: var(--bg-accent);
      border: 1px solid var(--border);
      gap: 6px;
      flex-shrink: 0;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
      flex-wrap: wrap;
    }

    .topic-actions {
      display: inline-flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .utility-button {
      appearance: none;
      border: 1px solid var(--border);
      background: var(--surface-strong);
      color: var(--text);
      font: inherit;
      font-weight: 700;
      border-radius: 999px;
      padding: 10px 14px;
      cursor: pointer;
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .utility-button:hover {
      transform: translateY(-1px);
      border-color: #c7bba9;
      box-shadow: 0 8px 18px rgba(70, 54, 34, 0.07);
    }

    .utility-button:focus-visible {
      outline: 3px solid rgba(73, 106, 88, 0.22);
      outline-offset: 2px;
    }

    .mode-button {
      appearance: none;
      border: 0;
      background: transparent;
      color: var(--text-soft);
      font: inherit;
      font-weight: 700;
      border-radius: 999px;
      padding: 10px 16px;
      min-width: 92px;
      cursor: pointer;
      transition: transform 0.18s ease, background 0.18s ease, color 0.18s ease, box-shadow 0.18s ease;
    }

    .mode-button:hover {
      transform: translateY(-1px);
      color: var(--text);
    }

    .mode-button.active {
      background: var(--surface-strong);
      color: var(--accent-strong);
      box-shadow: 0 8px 18px rgba(73, 106, 88, 0.14);
    }

    .topic-list {
      display: grid;
      gap: 18px;
    }

    .topic {
      background: rgba(255, 252, 246, 0.78);
      border: 1px solid rgba(217, 207, 189, 0.9);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .topic[open] {
      background: rgba(255, 252, 246, 0.9);
    }

    .topic > summary {
      list-style: none;
      cursor: pointer;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      user-select: none;
    }

    .topic > summary::-webkit-details-marker {
      display: none;
    }

    .topic-title {
      margin: 0;
      font-size: 1.08rem;
      font-weight: 800;
      letter-spacing: 0.01em;
    }

    .topic-meta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--text-soft);
      font-size: 0.94rem;
    }

    .chevron {
      display: inline-block;
      transition: transform 0.2s ease;
      color: var(--accent);
      font-weight: 700;
    }

    .topic[open] > summary .chevron {
      transform: rotate(90deg);
    }

    .topic-notes {
      background: rgba(243, 238, 226, 0.62);
      border: 1px solid #e3d9c8;
      border-radius: var(--radius-md);
      overflow: hidden;
    }

    .topic-notes > summary {
      list-style: none;
      cursor: pointer;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      user-select: none;
    }

    .topic-notes > summary::-webkit-details-marker {
      display: none;
    }

    .topic-notes-title {
      font-size: 0.95rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-soft);
    }

    .topic-notes[open] > summary .chevron {
      transform: rotate(90deg);
    }

    .topic-notes-body {
      padding: 0 16px 16px;
      color: var(--text);
    }

    .topic-body {
      padding: 0 16px 16px;
      display: grid;
      gap: 14px;
    }

    .question-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 18px;
      box-shadow: 0 10px 24px rgba(70, 54, 34, 0.05);
    }

    .question-label {
      margin: 0 0 10px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-soft);
      font-size: 0.88rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 800;
    }

    .stem {
      font-size: 1rem;
    }

    .stem > *:first-child,
    .explanation > *:first-child {
      margin-top: 0;
    }

    .stem > *:last-child,
    .explanation > *:last-child {
      margin-bottom: 0;
    }

    .options {
      margin-top: 16px;
      display: grid;
      gap: 10px;
    }

    .option {
      width: 100%;
      text-align: left;
      border: 1px solid #d8d0c2;
      background: #fffdf8;
      color: var(--text);
      border-radius: var(--radius-sm);
      padding: 14px 15px;
      font: inherit;
      line-height: 1.45;
      cursor: pointer;
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
    }

    .option:hover {
      transform: translateY(-1px);
      border-color: #c7bba9;
      box-shadow: 0 8px 18px rgba(70, 54, 34, 0.07);
    }

    .option:focus-visible {
      outline: 3px solid rgba(73, 106, 88, 0.22);
      outline-offset: 2px;
    }

    .option.correct {
      background: var(--correct-bg);
      border-color: var(--correct-border);
      box-shadow: inset 0 0 0 1px rgba(119, 180, 135, 0.2);
    }

    .option.incorrect {
      background: var(--wrong-bg);
      border-color: var(--wrong-border);
      box-shadow: inset 0 0 0 1px rgba(220, 122, 115, 0.2);
    }

    .option.neutral-revealed {
      background: #faf6ee;
      border-color: #d8d0c2;
      color: #5f676a;
    }

    .option[disabled] {
      cursor: default;
      opacity: 1;
    }

    .explanation {
      margin-top: 14px;
      padding: 14px 16px;
      background: var(--note-bg);
      border: 1px solid #e3d9c8;
      border-radius: 14px;
      color: var(--text);
    }

    .question-card.is-hidden .explanation {
      display: none;
    }

    .explanation-label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-soft);
      font-weight: 800;
    }

    .empty-state {
      padding: 28px 22px;
      background: var(--surface);
      border: 1px dashed var(--border);
      border-radius: var(--radius-lg);
      color: var(--text-soft);
    }

    .rich-text table {
      width: 100%;
      border-collapse: collapse;
      margin: 12px 0;
      overflow: hidden;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.68);
    }

    .rich-text td,
    .rich-text th {
      border: 1px solid #ddd2bf;
      padding: 10px 12px;
      vertical-align: top;
    }

    .rich-text ul,
    .rich-text ol {
      padding-left: 20px;
      margin: 10px 0;
    }

    .rich-text center {
      display: block;
      text-align: center;
    }

    .rich-text .table-responsive {
      overflow-x: auto;
    }

    @media (max-width: 720px) {
      .page {
        width: min(100% - 16px, var(--page-width));
        padding-top: 10px;
      }

      .topbar {
        padding: 14px;
        border-radius: 18px;
      }

      .topbar-inner {
        flex-direction: column;
        align-items: stretch;
      }

      .controls {
        justify-content: stretch;
      }

      .topic-actions {
        width: 100%;
      }

      .utility-button {
        flex: 1 1 0;
      }

      .mode-switch {
        width: 100%;
        justify-content: stretch;
      }

      .mode-button {
        flex: 1 1 50%;
      }

      .topic > summary {
        padding: 16px;
        align-items: flex-start;
      }

      .topic-meta {
        font-size: 0.88rem;
      }

      .topic-body {
        padding: 0 12px 12px;
      }

      .question-card {
        padding: 15px;
      }

      .option {
        padding: 13px 14px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="topbar">
      <div class="topbar-inner">
        <div>
          <p class="eyebrow">Study View</p>
          <h1 class="title">Clinical Microbiology</h1>
          <p class="meta">63 questions across 25 topics</p>
        </div>
        <div class="controls">
          <div class="topic-actions" aria-label="Topic visibility controls">
            <button class="utility-button" type="button" data-topic-action="expand">Expand all</button>
            <button class="utility-button" type="button" data-topic-action="collapse">Collapse all</button>
          </div>
          <div class="mode-switch" role="tablist" aria-label="Question mode">
            <button class="mode-button active" type="button" data-mode-button="solve" aria-pressed="true">Solve</button>
            <button class="mode-button" type="button" data-mode-button="review" aria-pressed="false">Review</button>
          </div>
        </div>
      </div>
    </section>

    <section id="app"></section>
  </main>

  <script id="quiz-data" type="application/json">{"title": "Clinical Microbiology", "topics": [{"name": "Acute tonsillitis", "questions": [{"number": 1, "topic": "Acute tonsillitis", "stem_html": "A 4 year old child presents with a 4-5 day history of feeling generally unwell and also of having a sore throat. On examination, there is marked cervical lymphadenopathy, the oropharynx is covered with a thick grey membrane which bleeds following attempted removal. What is the most likely diagnosis?", "options": [{"label_html": "Acute streptococcal pharyngitis", "is_correct": false}, {"label_html": "Infection with Epstein Barr virus", "is_correct": false}, {"label_html": "Diptheria", "is_correct": true}, {"label_html": "Ludwigs angina", "is_correct": false}, {"label_html": "Ingestion of caustic soda", "is_correct": false}], "correct_index": 2, "explanation_html": "Infection with diphtheria classically causes a systemic illness that lasts several days. The tonsils or pharynx can be covered in a thick grey membrane which bleeds on attempted removal. There is often quite marked cervical adenopathy and some individuals can have a bulls neck appearance. Death can occur through airway compromise, which is why the often described attempted removal of the pseudomembrane so beloved of examiners, is, in practice rather a foolish thing to attempt in a young child!"}, {"number": 2, "topic": "Acute tonsillitis", "stem_html": "A 14 year old boy presents with enlarged tonsils that meet in the midline. Oropharyngeal examination confirms this finding and you also notice petechial haemorrhages affecting the oropharynx. On systemic examination he is noted to have splenomegaly. What is the most likely cause?", "options": [{"label_html": "Oral candidiasis", "is_correct": false}, {"label_html": "Infection with Streptococcus pyogenes", "is_correct": false}, {"label_html": "Infection with Rickettsia rickettsii", "is_correct": false}, {"label_html": "Infection with Epstein Barr virus", "is_correct": true}, {"label_html": "Infection with Staphylococcus aureus", "is_correct": false}], "correct_index": 3, "explanation_html": "A combination of pharyngitis and tonsillitis is often seen in glandular fever. Antibiotics containing penicillin may produce a rash when given in this situation, leading to a mistaken label of allergy. Infection with candidiasis can occur in individuals with systemic illness of which splenomegaly may be a feature. However, its unlikely to only affect the tonsils."}, {"number": 3, "topic": "Acute tonsillitis", "stem_html": "A 29 year old man has had a sore throat for the past 5 days. Over the past 24 hours he has noticed increasingly severe throbbing pain in the region of his right tonsil. He is pyrexial and on examination he is noted to have a swelling of this area. What is the most likely cause?", "options": [{"label_html": "Tonsillar cancer", "is_correct": false}, {"label_html": "Lymphoma", "is_correct": false}, {"label_html": "Quinsy", "is_correct": true}, {"label_html": "Glandular fever", "is_correct": false}, {"label_html": "Common cold", "is_correct": false}], "correct_index": 2, "explanation_html": "Unilateral swelling and fever is usually indicative of quinsy. Surgical drainage usually produces prompt resolution of symptoms."}, {"number": 4, "topic": "Acute tonsillitis", "stem_html": "A 22 year old man presents with a 5 day history of sore throat, malaise and fatigue. On examination, he has a large peritonsillar abscess. What is the most likely underlying infective organism?", "options": [{"label_html": "<i>Epstein Barr<\/i> Virus", "is_correct": false}, {"label_html": "<i>Streptococcus pyogenes<\/i>", "is_correct": true}, {"label_html": "Cytomegalovirus", "is_correct": false}, {"label_html": "<i>Moraxella catarrhalis<\/i>", "is_correct": false}, {"label_html": "<i>Streptococcus viridans<\/i>", "is_correct": false}], "correct_index": 1, "explanation_html": "Quinsy usually occurs as a result of bacterial tonsillitis and the most common cause of bacterial tonsillitis is streptococcal organisms."}], "note_html": "<ul><li>Characterised by pharyngitis, fever, malaise and lymphadenopathy.<\/li><li>Over half of all cases are bacterial with <i>Streptococcus pyogenes<\/i> the most common organism<\/li><li>The tonsils are typically oedematous and yellow or white pustules may be present<\/li><li>Infectious mononucleosis may mimic the condition.<\/li><li>Treatment with penicillin type antibiotics is indicated for bacterial tonsillitis.<\/li><li>Bacterial tonsillitis may result in local abscess formation (quinsy)<\/li><\/ul><br><i>Acute streptococcal tonsillitis<\/i><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb089b.jpg\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb089.jpg\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Tonsillitis\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb089b.jpg\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}, {"name": "Antibiotics: mechanism of action", "questions": [{"number": 5, "topic": "Antibiotics: mechanism of action", "stem_html": "What is the mechanism of action of macrolides?", "options": [{"label_html": "Causes misreading of mRNA", "is_correct": false}, {"label_html": "Interferes with cell wall formation", "is_correct": false}, {"label_html": "Inhibits DNA synthesis", "is_correct": false}, {"label_html": "Inhibits RNA synthesis", "is_correct": false}, {"label_html": "Inhibits protein synthesis", "is_correct": true}], "correct_index": 4, "explanation_html": "Macrolides act by inhibiting bacterial protein synthesis. If pushed to give an answer they are bacteriostatic in nature, but in reality this depends on the dose and type of organism being treated.  Erythromycin was the first macrolide used clinically. Newer examples include clarithromycin and azithromycin.<br><br>Adverse effects of erythromycin<br><ul><li>gastrointestinal side-effects are common<\/li><li>cholestatic jaundice: risk may be reduced if erythromycin stearate is used<\/li><li>P450 inhibitor<\/li><\/ul>"}, {"number": 6, "topic": "Antibiotics: mechanism of action", "stem_html": "What is the mechanism of action of ciprofloxacin?", "options": [{"label_html": "Inhibition of DNA gyrase", "is_correct": true}, {"label_html": "Direct injury to the bacterial cell wall", "is_correct": false}, {"label_html": "Osmotic damage to the cell", "is_correct": false}, {"label_html": "Inhibition of reverse transcriptase", "is_correct": false}, {"label_html": "Destruction of bacterial aquaporin proteins", "is_correct": false}], "correct_index": 0, "explanation_html": "<p>No explanation provided.<\/p>"}, {"number": 7, "topic": "Antibiotics: mechanism of action", "stem_html": "A 28 year old man undergoes a laparotomy for perforated duodenal ulcer and broad spectrum antibiotics are administered. Post operatively he has hearing impairment. Which of the following agents is the most likely underlying culprit?", "options": [{"label_html": "Gentamicin", "is_correct": true}, {"label_html": "Ciprofloxacin", "is_correct": false}, {"label_html": "Metronidazole", "is_correct": false}, {"label_html": "Ampicillin", "is_correct": false}, {"label_html": "Co-trimoxazole", "is_correct": false}], "correct_index": 0, "explanation_html": "Ototoxicity is a recognised adverse reaction with the aminoglycoside antibiotics."}], "note_html": "The lists below summarise the site of action of the commonly used antibiotics<br><br>Inhibit cell wall formation<br><ul><li>penicillins<\/li><li>cephalosporins<\/li><\/ul><br>Inhibit protein synthesis<br><ul><li>aminoglycosides (cause misreading of mRNA)<\/li><li>chloramphenicol<\/li><li>macrolides (e.g. erythromycin)<\/li><li>tetracyclines<\/li><li>fusidic acid<\/li><\/ul><br>Inhibit DNA synthesis<br><ul><li>quinolones (e.g. ciprofloxacin)<\/li><li>metronidazole <\/li><li>sulphonamides<\/li><li>trimethoprim<\/li><\/ul><br>Inhibit RNA synthesis<br><ul><li>rifampicin<\/li><\/ul>"}, {"name": "Bacterial Gastroenteritis", "questions": [{"number": 8, "topic": "Bacterial Gastroenteritis", "stem_html": "A 28 year old chef presents to the medical team with profuse bloody diarrhoea. On further questioning he describes tenesmus. They arrange a sigmoidoscopy which reveals necrosis and ulceration of the descending colon mucosa. What is the most likely cause?", "options": [{"label_html": "Ischaemic colitis", "is_correct": false}, {"label_html": "Infection with <i>Yersinia pestis<\/i>", "is_correct": false}, {"label_html": "Infection with entero invasive E Coli", "is_correct": true}, {"label_html": "Infection with campylobacter", "is_correct": false}, {"label_html": "Infection with vibrio cholera", "is_correct": false}], "correct_index": 2, "explanation_html": "Necrosis and ulcers of the large bowel are a feature of enteroinvasive E.coli. It presents with a dysentery type illness similar to shigellosis."}, {"number": 9, "topic": "Bacterial Gastroenteritis", "stem_html": "A 22 year old Chef presents with abdominal pain in the right iliac fossa. There is an associated temperature and diarrhoea. The CT1 takes the patient to theatre for an appendicectomy, but the appendix appears normal. The terminal ileum appears thickened and engorged. Infection with which of the following is most likely?", "options": [{"label_html": "Yersinia enterocolitica", "is_correct": true}, {"label_html": "Yersinia pestis", "is_correct": false}, {"label_html": "Salmonella", "is_correct": false}, {"label_html": "Vibrio cholera", "is_correct": false}, {"label_html": "Entero invasive E Coli", "is_correct": false}], "correct_index": 0, "explanation_html": "Yersinia can be mistaken for acute appendicitis due to mesenteric lymphadenitis and ileitis. Yersinia infection of the terminal ileum typically produces more marked clinical changes of this segment of bowel than infection with campylobacter. Yersinia pestis causes plague."}, {"number": 10, "topic": "Bacterial Gastroenteritis", "stem_html": "A 30 year old aid worker becomes unwell whilst helping at the scene of a recent earthquake. He develops vomiting and soon afterwards a diarrhoea that is loose and extremely watery. What is the most likely infective organism?", "options": [{"label_html": "Campylobacter jejuni", "is_correct": false}, {"label_html": "Vibrio cholera", "is_correct": true}, {"label_html": "Enterohaemorragic E Coli", "is_correct": false}, {"label_html": "Clostridium perfringens", "is_correct": false}, {"label_html": "Clostridium boltulinum", "is_correct": false}], "correct_index": 1, "explanation_html": "The passage of very loose and watery stools distinguishes cholera. Most gastroenteric infections do not produce such watery motions."}, {"number": 11, "topic": "Bacterial Gastroenteritis", "stem_html": "Which of the following is not a feature of <i><i>Campylobacter<\/i> jejuni<\/i> infection?", "options": [{"label_html": "Infection may present in a similar manner to acute appendicitis", "is_correct": false}, {"label_html": "Pyrexia is unusual", "is_correct": true}, {"label_html": "They are gram negative organisms", "is_correct": false}, {"label_html": "Infection accounts for 26% case of Guillain-Barre syndrome", "is_correct": false}, {"label_html": "It is the commonest cause of infective diarrhoea arising from non viral causes", "is_correct": false}], "correct_index": 1, "explanation_html": "A prodromal period of fever and generalised malaise precedes abdominal pain (which may mimic appendicitis) and diarrhoea."}, {"number": 12, "topic": "Bacterial Gastroenteritis", "stem_html": "A young woman is admitted to hospital with E-coli 0157 after visiting Germany during an outbreak. Which of the following is not true of the condition?", "options": [{"label_html": "It may be complicated by micro-angiopathic haemolytic anaemia.", "is_correct": false}, {"label_html": "Adults typically develop haemolytic uraemic syndome.", "is_correct": true}, {"label_html": "It is most commonly transmitted by consumption of contaminated food.", "is_correct": false}, {"label_html": "Plasmids typically confer antibiotic resistance.", "is_correct": false}, {"label_html": "E-Coli is a gram negative organism.", "is_correct": false}], "correct_index": 1, "explanation_html": "Children typically develop this complication."}, {"number": 13, "topic": "Bacterial Gastroenteritis", "stem_html": "A young woman is admitted to hospital with E-coli 0157 after visiting Germany during an outbreak. Which of the following is not true of the condition?", "options": [{"label_html": "It may be complicated by micro-angiopathic haemolytic anaemia.", "is_correct": false}, {"label_html": "Adults typically develop haemolytic uraemic syndome.", "is_correct": true}, {"label_html": "It is most commonly transmitted by consumption of contaminated food.", "is_correct": false}, {"label_html": "Plasmids typically confer antibiotic resistance.", "is_correct": false}, {"label_html": "E-Coli is a gram negative organism.", "is_correct": false}], "correct_index": 1, "explanation_html": "Children typically develop this complication."}, {"number": 14, "topic": "Bacterial Gastroenteritis", "stem_html": "A 48 year old lady is admitted with crampy abdominal pain and diarrhoea. She has been unwell for the past 12 hours. In the history she complains that her milk bottles have been pecked repeatedly by birds, she otherwise has had no dietary changes. Which of the following is the most likely causative organism?", "options": [{"label_html": "<i>Staphylococcus aureus<\/i>", "is_correct": false}, {"label_html": "<i>Campylobacter jejuni<\/i>", "is_correct": true}, {"label_html": "<i>Clostridium difficile<\/i>", "is_correct": false}, {"label_html": "Norovirus", "is_correct": false}, {"label_html": "<i>Clostridium botulinum<\/i>", "is_correct": false}], "correct_index": 1, "explanation_html": "Birds are a recognised reservoir of campylobacter."}], "note_html": "<div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th>Causative organisms<\/th><th>Features<\/th><\/tr><\/thead><tbody><tr><td><b><i><i>Campylobacter<\/i> jejuni<\/i><\/b><\/td><td><ul><li>Most common cause of acute infective diarrhoea<\/li><li>Spiral, gram negative rods<\/li><li>Usually infects caecum and terminal ileum. Local lymphadenopathy is common<\/li><li>May mimic appendicitis as it has marked right iliac fossa pain<\/li><li>Reactive arthritis is seen in 1-2% of cases<\/li><\/ul><\/td><\/tr><tr><td><b><i>Shigella<\/i> spp.<\/b><\/td><td><ul><li>Members of the enterobacteriaceae<\/li><li>Gram negative bacilli<\/li><li>Clinically causes dysentery<\/li><li><i>Shigella<\/i> soneii is the commonest infective organism (mild illness)<\/li><li>Usually self limiting, ciprofloxacin may be required if individual is in a high risk group<\/li><\/ul><\/td><\/tr><tr><td><b><i>Salmonella<\/i> spp<\/b><\/td><td><ul><li>Facultatively anaerobic, gram negative, enterobacteriaceae<\/li><li>Infective dose varies according to subtype<\/li><li>Salmonellosis: usually transmitted by infected meat (especially poultry) and eggs<\/li><\/ul><\/td><\/tr><tr><td><b><i>E. coli<\/i><\/b><\/td><td><ul><li>Enteropathogenic<\/li><li>Enteroinvasive: dysentery, large bowel necrosis/ulcers<\/li><li>Enterotoxigenic: small intestine, travelers diarrhoea<\/li><li>Enterohaemorrhagic: 0157, cause a haemorrhagic colitis, haemolytic uraemic syndrome and thrombotic thrombocytopaenic purpura<\/li><\/ul><\/td><\/tr><tr><td><b><i>Yersinia enterocolitica<\/i><\/b><\/td><td><ul><li>Gram negative, coccobacilli<\/li><li>Typically produces a protracted terminal ileitis that may mimic Crohns disease<\/li><li>Differential diagnosis acute appendicitis<\/li><li>May progress to septicaemia in susceptible individuals<\/li><li>Usually sensitive to quinolone or tetracyclines<\/li><\/ul><\/td><\/tr><tr><td><b>Vibrio cholera<\/b><\/td><td><ul><li>Short, gram negative rods<\/li><li>Transmitted by contaminated water, seafood<\/li><li>Symptoms include sudden onset of effortless vomiting and profuse watery diarrhoea<\/li><li>Correction of fluid and electrolyte losses are the mainstay of treatment<\/li><li>Most cases will resolve, antibiotics are not generally indicated<\/li><\/ul><\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Cholangitis", "questions": [{"number": 15, "topic": "Cholangitis", "stem_html": "A 48 year old lady undergoes an ERCP for jaundice. 36 hours following the procedure she develops a fever and rigors. A blood culture is taken, which of the following organisms is most likely to be cultured?", "options": [{"label_html": "<i><i>Pseudomonas<\/i> aeruginosa<\/i>", "is_correct": false}, {"label_html": "<i>Streptococcus<\/i>", "is_correct": false}, {"label_html": "Enterobacter", "is_correct": false}, {"label_html": "<i>Staphylococcus<\/i>", "is_correct": false}, {"label_html": "<i>Escherichia coli<\/i>", "is_correct": true}], "correct_index": 4, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Charcots triad = Surgical emergency.<br>Patients need: Biliary decompression and broad spectrum antibiotics.<\/div><i>E Coli<\/i> is the most common organism implicated in cholangitis infections. Whilst enterobacter is occasionally cultured it is not the most common organism."}], "note_html": "- Combination of bacterial infection and biliary obstruction<br><ul><li>Most common organisms are: (most frequent at top of list)<\/li><\/ul>                                                <i>Escherichia coli<\/i> <br>                                                Klebsiella species <br>                                                Enterococcus species<br>                                                <i>Streptococcus<\/i> species <br>                                                <br><br><b>Clinical features<\/b><br>Charcot's triad:<br>Fever (90% cases)<br>Right upper quadrant pain<br>Jaundice<br><br>Reynolds pentad: Above plus confusion and hypotension<br><br><b>Investigations<\/b><br>USS 1st line<br>CT scan<br>ERCP: may be 1st line if high clinical suspicion and suitable for treatment<br><br><b>Treatment<\/b><br>ERCP -usually after 72 hours of antibiotics<br>Percutaneous transhepatic cholangiogram and biliary drain"}, {"name": "Clostridium difficile", "questions": [{"number": 16, "topic": "Clostridium difficile", "stem_html": "A 54-year-old female is admitted one week following a cholecystectomy with profuse diarrhoea. Apart from a minor intra-operative bile spillage incurred during removal of the gallbladder, the procedure was uncomplicated. What is the most likely diagnosis?", "options": [{"label_html": "Campylobacter infection", "is_correct": false}, {"label_html": "E. coli infection", "is_correct": false}, {"label_html": "Clostridium difficile infection", "is_correct": true}, {"label_html": "Salmonella infection", "is_correct": false}, {"label_html": "Pelvic abscess", "is_correct": false}], "correct_index": 2, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">This is a complex question, read the explanation below carefully. It tests two domains, firstly that bile spill is an indication for broad spectrum intravenous antibiotics and that this is a risk factor for clostridium difficile (which explains the diarrhea post antibiotic administration)<\/div>Antibiotics are not routinely administered during an uncomplicated cholecystectomy. Indications for administration of broad spectrum antibiotics include intraoperative bile spillage. Delayed pelvic abscesses following bile spills are extremely rare since most surgeons will manage these intra-operatively."}], "note_html": "Clostridium difficile is a Gram positive rod often encountered in hospital practice. In the UK it can be found in  3% of normal adults and up to 66% of babies. It produces an exotoxin which causes intestinal damage leading to a syndrome called pseudomembranous colitis. <br><br><b>Risk factors<\/b><br><ul><li>Broad spectrum antibiotics<\/li><li>Use of proton pump inhibitors<\/li><li>Contacted with persons infected with c.difficile<\/li><\/ul><br><b>Features<\/b><br><ul><li>Diarrhoea<\/li><li>Abdominal pain<\/li><li>A raised white blood cell count is characteristic<\/li><li>If severe, toxic megacolon may develop<\/li><\/ul><br>Diagnosis is made by detecting Clostridium difficile toxin (CDT) in the stool<br><br><b>Management<\/b><br><ul><li>Consider stopping proton pump inhibitor treatment<\/li><li>First-line therapy is now oral vancomycin 125mg orally 4 times daily for 10 days<\/li><li>Patients who do not respond to vancomycin may respond to oral fidaxomicin<\/li><li>Patients with severe and unremitting colitis should be considered for combination therapy of oral vancomycin and metronidazole. Some cases may require emergency colectomy<\/li><\/ul><br><b>Further reading<\/b><br>NICE guidance NG199 published 2021."}, {"name": "Diarrhoea", "questions": [{"number": 17, "topic": "Diarrhoea", "stem_html": "A 23 year old lady has suffered from diarrhoea for 8 months, she has also lost 2 Kg in weight. At colonoscopy, appearances of melanosis coli are identified and confirmed on biopsy. What is the most likely cause?", "options": [{"label_html": "Ischaemic colitis", "is_correct": false}, {"label_html": "<i>Salmonella<\/i> gastroenteritis infection", "is_correct": false}, {"label_html": "Laxative abuse", "is_correct": true}, {"label_html": "Irritable bowel syndrome", "is_correct": false}, {"label_html": "<i>Clostridium difficile<\/i> infection", "is_correct": false}], "correct_index": 2, "explanation_html": "This may occur as a result of laxative abuse and consists of lipofuschin laden macrophages that appear brown."}, {"number": 18, "topic": "Diarrhoea", "stem_html": "A 23 year old man is admitted to hospital with diarrhoea and severe abdominal pain. He was previously well and his illness has lasted 18 hours. What is the likely cause?", "options": [{"label_html": "Laxative abuse", "is_correct": false}, {"label_html": "<i>Clostridium difficile<\/i> infection", "is_correct": false}, {"label_html": "<i>Salmonella<\/i> gastroenteritis infection", "is_correct": false}, {"label_html": "<i>Campylobacter jejuni<\/i> infection", "is_correct": true}, {"label_html": "Ulcerative colitis", "is_correct": false}], "correct_index": 3, "explanation_html": "Severe abdominal pain tends to favour Campylobacter infection."}, {"number": 19, "topic": "Diarrhoea", "stem_html": "A 35 year old woman who is a heavy smoker has long standing stool frequency and crampy abdominal pain. A colonoscopy is performed (which is macroscopically normal) and pan colonic biopsies are taken. Histological analysis of the biopsies demonstrates a thickened sub apical collagen layer together with an increase in lymphocytes in the lamina propria. What is the most likely diagnosis?", "options": [{"label_html": "Microscopic colitis", "is_correct": true}, {"label_html": "Crohns disease", "is_correct": false}, {"label_html": "Ulcerative colitis", "is_correct": false}, {"label_html": "Pseudomembranous colitis", "is_correct": false}, {"label_html": "Irritable bowel syndrome", "is_correct": false}], "correct_index": 0, "explanation_html": "Microscopic colitis is a common condition characterised by <i>normal<\/i> endoscopic appearances, microscopic features of colonic inflammation and thickening of the sub epithelial collagen layer. Features such as granulomas are <i>absent<\/i>. It is the normal endoscopic appearance that makes the other options less likely. IBS is a diagnosis of exclusion and the features of inflammation activity would favor a different diagnosis. Severe cases can be treated with steroids. Other agents such as cholestyramine may be beneficial. It is important to exclude infection with a stool culture if this has not been done, not least because the precipitant of many cases of microscopic colitis is an episode of infective diarrhoea."}, {"number": 20, "topic": "Diarrhoea", "stem_html": "A 22 year old man presents with crampy abdominal pain diarrhoea and bloating. He has just returned from a holiday in Egypt. He had been swimming in the local pool a few weeks ago.  He reports that he is opening his bowels 5 times a day.  The stool floats in the toilet water, but there is no blood. What is the most likely cause?", "options": [{"label_html": "Cryptosporidium", "is_correct": false}, {"label_html": "<i>Salmonella<\/i> sp", "is_correct": false}, {"label_html": "E.coli sp", "is_correct": false}, {"label_html": "Chronic pancreatitis", "is_correct": false}, {"label_html": "<i>Giardia lamblia<\/i>", "is_correct": true}], "correct_index": 4, "explanation_html": "Giardia causes fat malabsorption, therefore greasy stool can occur.  It is resistant to chlorination, hence risk of transfer in swimming pools."}], "note_html": "<b>World Health Organisation definitions<\/b><br>Diarrhoea: &gt; 3 loose or watery stool per day<br>Acute diarrhoea &lt; 14 days<br>Chronic diarrhoea &gt; 14 days<br><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th>Acute Diarrhoea<\/th><th><\/th><\/tr><\/thead><tbody><tr><td><b>Gastroenteritis<\/b><\/td><td>May be accompanied by abdominal pain or nausea/vomiting<\/td><\/tr><tr><td><b>Diverticulitis<\/b><\/td><td>Classically causes left lower quadrant pain, diarrhoea and fever<\/td><\/tr><tr><td><b>Antibiotic therapy<\/b><\/td><td>More common with broad spectrum antibiotics<br><i><i>Clostridium<\/i> difficile<\/i> is also seen with antibiotic use<\/td><\/tr><tr><td><b>Constipation causing overflow<\/b><\/td><td>A history of alternating diarrhoea and constipation may be given<br>May lead to faecal incontinence in the elderly<\/td><\/tr><\/tbody><\/table><\/div><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid2\"><thead><tr><th>Chronic Diarrhoea<\/th><th><\/th><\/tr><\/thead><tbody><tr><td><b>Irritable bowel syndrome<\/b><\/td><td>Extremely common. The most consistent features are abdominal pain, bloating and change in bowel habit. Patients may be divided into those with diarrhoea predominant IBS and those with constipation predominant IBS.<br>Features such as lethargy, nausea, backache and bladder symptoms may also be present<\/td><\/tr><tr><td><b>Ulcerative colitis<\/b><\/td><td>Bloody diarrhoea may be seen. Crampy abdominal pain and weight loss are also common. Faecal urgency and tenesmus may occur<\/td><\/tr><tr><td><b>Crohn's disease<\/b><\/td><td>Crampy abdominal pains and diarrhoea. Bloody diarrhoea less common than in ulcerative colitis. Other features include malabsorption, mouth ulcers perianal disease and intestinal obstruction<\/td><\/tr><tr><td><b>Colorectal cancer<\/b><\/td><td>Symptoms depend on the site of the lesion but include diarrhoea, rectal bleeding, anaemia and constitutional symptoms e.g. Weight loss and anorexia<\/td><\/tr><tr><td><b>Coeliac disease<\/b><\/td><td><ul><li>In children may present with failure to thrive, diarrhoea and abdominal distension<\/li><li>In adults lethargy, anaemia, diarrhoea and weight loss are seen. Other autoimmune conditions may coexist<\/li><\/ul><\/td><\/tr><\/tbody><\/table><\/div><br>Other conditions associated with diarrhoea include:<br><ul><li>Thyrotoxicosis<\/li><li>Laxative abuse<\/li><li>Appendicitis with pelvic abscess or pelvic appendix<\/li><li>Radiation enteritis<\/li><\/ul><br><b>Diagnosis<\/b><br>Stool culture<br>Abdominal and digital rectal examination<br>Consider colonoscopy (radiological studies unhelpful)<br>Thyroid function tests, serum calcium, anti endomysial antibodies, glucose"}, {"name": "Discitis in children", "questions": [{"number": 21, "topic": "Discitis in children", "stem_html": "A 2 month old baby is unwell and suspected to have discitis. Infection with which of these organisms is more likely?", "options": [{"label_html": "Staphylococcus aureus", "is_correct": true}, {"label_html": "Brucella", "is_correct": false}, {"label_html": "Mycobacterium tuberculosis", "is_correct": false}, {"label_html": "Kigella kingae", "is_correct": false}, {"label_html": "Candida spp", "is_correct": false}], "correct_index": 0, "explanation_html": "At 2 months of age, s aureus is most likely. In children aged 6 months to 4 years, Kigella is the most likely infecting organism."}, {"number": 22, "topic": "Discitis in children", "stem_html": "A 4 year old boy is admitted to hospital with night sweats and is found to be generally unwell. As part of his investigations, a spinal MRI scan is performed and discitis is suspected. Which of these infectious agents represents the most likely underlying pathogen?", "options": [{"label_html": "Staphylococcus aureus", "is_correct": false}, {"label_html": "Brucella", "is_correct": false}, {"label_html": "Mycobacterium tuberculosis", "is_correct": false}, {"label_html": "Kigella kingae", "is_correct": true}, {"label_html": "Candida spp", "is_correct": false}], "correct_index": 3, "explanation_html": "In children aged 6 months to 4 years, Kigella is the most likely infecting organism. S Aureus affects smaller babies."}], "note_html": "In children, infectious discitis (D) and infectious spondylodiscitis (SD) are rare diseases that can cause significant clinical problems, including spinal deformities and segmental instabilities. Moreover, when the infection spreads into the spinal channel, D and SD can cause devastating neurologic complications. Early diagnosis and treatment may reduce these risks. Several different bacterial pathogens can cause D and SD, and, in some cases, particularly those due to Staphylococcus aureus, Kingella kingae, Mycobacterium tuberculosis, Brucella spp., the appropriate choice of drug is critical to achieve cure. In most cases the infections spreads to the site haematogenously from a separate site. Less commonly, it arises as a result of direct inoculation. A triphasic age distribution is described; the first peak incidence is in children aged only a few weeks or months old, the second in those between 6 months and the end of the preschool period, and the third in school-aged children.<br>Initial treatment is with broad spectrum intravenous antibiotics that cover s aureus, children aged 4 months to 6 years need cover for Kigella. More tailored therapy can be added later depending on progress and culture results."}, {"name": "Epididymo-orchitis", "questions": [{"number": 23, "topic": "Epididymo-orchitis", "stem_html": "A 25 year old man presents with scrotal pain and discomfort. Following clinical evaluation, epididymo-orchitis is suspected as the most likely diagnosis? What is the most likely underlying cause?", "options": [{"label_html": "Infection with E-Coli", "is_correct": false}, {"label_html": "Infection with Chlamydia", "is_correct": true}, {"label_html": "Infection with mycobacterium", "is_correct": false}, {"label_html": "Administration of amiodarone", "is_correct": false}, {"label_html": "Instrumentation of the urethra", "is_correct": false}], "correct_index": 1, "explanation_html": "In a young previously healthy male, sexually transmitted infection is the commonest cause of epididymo-orchitis."}, {"number": 24, "topic": "Epididymo-orchitis", "stem_html": "A 25 year old man presents with scrotal pain and discomfort. Following clinical evaluation, epididymo-orchitis is suspected as the most likely diagnosis? What is the most likely underlying cause?", "options": [{"label_html": "Infection with E-Coli", "is_correct": false}, {"label_html": "Infection with Chlamydia", "is_correct": true}, {"label_html": "Infection with mycobacterium", "is_correct": false}, {"label_html": "Administration of amiodarone", "is_correct": false}, {"label_html": "Instrumentation of the urethra", "is_correct": false}], "correct_index": 1, "explanation_html": "In a young previously healthy male, sexually transmitted infection is the commonest cause of epididymo-orchitis."}, {"number": 25, "topic": "Epididymo-orchitis", "stem_html": "A 7 year old male presents with recurrent episodes of epididymo-orchitis. What is the most likely underlying cause?", "options": [{"label_html": "Infection with Chlamydia", "is_correct": false}, {"label_html": "Infection with Gonorrhoea", "is_correct": false}, {"label_html": "Infection with mycobacterium", "is_correct": false}, {"label_html": "Posterior urethral valves", "is_correct": true}, {"label_html": "Prostatic hypertrophy", "is_correct": false}], "correct_index": 3, "explanation_html": "In young children, structural anomalies of the urinary tract may cause epididymo-orchitis and should be evaluated with radiological contrast studies."}], "note_html": "Acute epididymitis mostly occurs in young males. Organisms may reach the epididymis by retrograde spread from the prostatic urethra and seminal vesicles or less commonly, through the blood stream.<br><br>Predisposing factors include urinary tract infection, urethral instrumentation and sexually transmitted infection. E. coli and Chlamydia in patients with a history of urethral discharge are the organisms most frequently cultured<br><br>Bacterial infections are the most common aetiology for epididymitis<br><br>In men less than 35 years of age, ascending infection from the urethra by sexually transmittable pathogens, namely Chlamydia trachomatis and Neisseria gonorrhoeae, are aetiologically responsible<br><br>In older men with a history of bladder outlet disturbances<br>Enterobacteriaceae, particularly Escherichia coli, represent the dominant pathogens<br><br>Tuberculous epididymitis caused by mycobacteria must be considered as a differential diagnosis<br><br>Clinically, epididymitis may be indistinguishable from testicular torsion. Epididymo-orchitis denotes secondary involvement of the testis.<br><br>Possible complications include testicular atrophy and fibrotic obstruction of epididymal tubes leading to impaired fertility<br><br>Important facts:<br>Usually due to Gram-negative enteric bacteria in men over 35 years with low risk of STI<br>If under 35 years or STI risk, refer to sexual health clinics<br><br>Notes:<br>Noninfectious pathogenetic factors include:<br>systemic diseases like Behcet's disease<br>urethral manipulation<br>drug-induced sequelae (amiodarone),<br>blow-out injury of the epididymal duct following vasectomy and the reflux of sterile urine into the epididymes"}, {"name": "Gastro intestinal parasitic infections", "questions": [{"number": 26, "topic": "Gastro intestinal parasitic infections", "stem_html": "A 6 year old boy presents with symptoms of recurrent pruritus ani. On examination, there is evidence of a small worm like structure protruding from the anus. What is the most likely infective organism?", "options": [{"label_html": "<i>Echinococcus granulosus<\/i>", "is_correct": false}, {"label_html": "<i>Enterobius vermicularis<\/i>", "is_correct": true}, {"label_html": "<i>Ascaris lumbricoides<\/i>", "is_correct": false}, {"label_html": "<i>Ancylostoma duodenale<\/i>", "is_correct": false}, {"label_html": "<i>Clonorchis sinensis<\/i>", "is_correct": false}], "correct_index": 1, "explanation_html": "Infection with <i>enterobius<\/i> is extremely common. Pruritus is the main symptom, as there is a lack of tissue invasion it is rare for individuals to have any signs of systemic sepsis."}, {"number": 27, "topic": "Gastro intestinal parasitic infections", "stem_html": "A 58 year old man is reviewed in the clinic following a successful cadaveric renal transplant the previous year. He has been able to return to work as a swimming instructor. Over the past week he reports that he has been suffering from recurrent episodes of diarrhoea. It has made him feel lethargic and exhausted. Stool microscopy shows evidence of cysts. What is the most likely source of infection?", "options": [{"label_html": "Enterobius vermicularis", "is_correct": false}, {"label_html": "Clonorchis sinensis", "is_correct": false}, {"label_html": "Giardia", "is_correct": false}, {"label_html": "Ascaris lumbricoides", "is_correct": false}, {"label_html": "Cryptosporidium", "is_correct": true}], "correct_index": 4, "explanation_html": "Cryptosporidium is associated with infection, particularly in those who are immunocompromised. Diarrhoea is the main disease. The cysts are typically identified on stool microscopy."}, {"number": 28, "topic": "Gastro intestinal parasitic infections", "stem_html": "A 25 year old man returns from a backpacking holiday in India. He presents with symptoms of coughing and also of episodic abdominal discomfort. Peri anal examination is normal. Stool microscopy demonstrates both worms and eggs within the faeces. What is the most likely infective organism?", "options": [{"label_html": "<i>Cryptosporidium<\/i>", "is_correct": false}, {"label_html": "<i>Ancylostoma duodenale<\/i>", "is_correct": false}, {"label_html": "<i>Clonorchis sinensis<\/i>", "is_correct": false}, {"label_html": "<i>Ascaris lumbricoides<\/i>", "is_correct": true}, {"label_html": "<i>Enterobius vermicularis<\/i>", "is_correct": false}], "correct_index": 3, "explanation_html": "Infection with Ascaris lumbricoides usually occurs after individuals have visited places like sub Saharan Africa or the far east. Unlike ancylostoma duodenale infection there is usually evidence of both worms and eggs in the stool. The absence of pruritus makes enterobius less likely. The presence of coughing may be due to the migration of the larva through the lungs."}], "note_html": "<b>Common infections<\/b><br><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Enterobiasis<\/b><\/td><td><ul><li>Due to organism <i>Enterobius vermicularis<\/i> <\/li><li>Common cause of pruritus ani<\/li><li>Diagnosis usually made by placing scotch tape at the anus, this will trap eggs that can then be viewed microscopically<\/li><li>Treatment is with mebendazole<\/li><\/ul><\/td><\/tr><tr><td><b>Ancylostoma duodenale<\/b><\/td><td><ul><li>Hookworms that anchor in proximal small bowel<\/li><li>Most infections are asymptomatic although may cause iron deficiency anaemia<\/li><li>Larvae may be found in stools left at ambient temperature, otherwise infection is difficult to diagnose<\/li><li>Infection occurs as a result of cutaneous penetration, migrates to lungs, coughed up and then swallowed<\/li><li>Treatment is with mebendazole<\/li><\/ul><\/td><\/tr><tr><td><b>Ascariasis<\/b><\/td><td><ul><li>Due to infection with roundworm <i>Ascaris lumbricoides<\/i><\/li><li>Infections begin in gut following ingestion, then penetrate duodenal wall to migrate to lungs, coughed up and swallowed, cycle begins again<\/li><li>Diagnosis is made by identification of worm or eggs within faeces<\/li><li>Treatment is with mebendazole<\/li><\/ul><\/td><\/tr><tr><td><b>Strongyloidiasis<\/b><\/td><td><ul><li>Due to infection with <i>Strongyloides stercoralis<\/i><\/li><li>Rare in west<\/li><li>Organism is a nematode living in duodenum of host<\/li><li>Initial infection is via skin penetration. They then migrate to lungs and are coughed up and swallowed. Then mature in small bowel are excreted and cycle begins again<\/li><li>An auto infective cycle is also recognised where larvae will penetrate colonic wall<\/li><li>Individuals may be asymptomatic, although they may also have respiratory disease and skin lesions<\/li><li>Diagnosis is usually made by stool microscopy<\/li><li>In the UK mebendazole is used for treatment<\/li><\/ul><\/td><\/tr><tr><td><b>Cryptosporidium<\/b><\/td><td><ul><li>Protozoal infection<\/li><li>Organisms produce cysts which are excreted and thereby cause new infections<\/li><li>Symptoms consist of diarrhoea and cramping abdominal pains. Symptoms are worse in immunosuppressed people<\/li><li>Cysts may be identified in stools<\/li><li>Treatment is with metronidazole<\/li><\/ul><\/td><\/tr><tr><td><b>Giardiasis<\/b><\/td><td><ul><li>Diarrhoeal infection caused by <i>Giardia lamblia<\/i> (protozoan)<\/li><li>Infections occur as a result of ingestion of cysts<\/li><li>Symptoms are usually gastrointestinal with abdominal pain, bloating and passage of soft or loose stools<\/li><li>Diagnosis is by serology or stool microscopy<\/li><li>First line treatment is with metronidazole<\/li><\/ul><\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Hepatitis B", "questions": [{"number": 29, "topic": "Hepatitis B", "stem_html": "A surgical trainee is incising a groin 'abscess' in an intravenous drug abuser. Unfortunately the 'abscess' is a false aneurysm and torrential bleeding ensues. In the panic of the situation the doctor then stabs himself in the finger. It transpires that the patient is a Hepatitis B carrier and the doctor is not immunised! What type of virus is Hepatitis B?", "options": [{"label_html": "Double stranded DNA virus", "is_correct": true}, {"label_html": "Single stranded DNA virus", "is_correct": false}, {"label_html": "Double stranded RNA virus", "is_correct": false}, {"label_html": "Single stranded RNA virus", "is_correct": false}, {"label_html": "Retrovirus", "is_correct": false}], "correct_index": 0, "explanation_html": "<p>No explanation provided.<\/p>"}], "note_html": "Hepatitis B is a double-stranded DNA virus and is spread through exposure to infected blood or body fluids, including vertical transmission from mother to child. The incubation period is 6-20 weeks.<br> <br>Immunisation against hepatitis B <br><ul><li>Contains HBsAg absorbed onto aluminium hydroxide adjuvant and is prepared from yeast cells using recombinant DNA technology<\/li><li>Most schedules give 3 doses of the vaccine with a recommendation for a one-off booster 5 years following the initial primary vaccination<\/li><li>At risk groups who should be vaccinated include: healthcare workers, intravenous drug users, sex workers, close family contacts of an individual with hepatitis B, individuals receiving blood transfusions regularly, chronic kidney disease patients who may soon require renal replacement therapy, prisoners, chronic liver disease patients<\/li><li>Around 10-15% of adults fail to respond or respond poorly to 3 doses of the vaccine. Risk factors include age over 40 years, obesity, smoking, alcohol excess and immunosuppression<\/li><li>Testing for anti-HBs is only recommended for those at risk of occupational exposure (i.e. Healthcare workers) and patients with chronic kidney disease. In these patients anti-HBs levels should be checked 1-4 months after primary immunisation<\/li><li>The table below shows how to interpret anti-HBs levels:<\/li><\/ul><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Anti-HBs level (mIU/ml)<\/b><\/td><td><b>Response<\/b><\/td><\/tr><tr><td>&gt; 100<\/td><td>Indicates adequate response, no further testing required. Should still receive booster at 5 years<\/td><\/tr><tr><td>10 - 100<\/td><td>Suboptimal response - one additional vaccine dose should be given. If immunocompetent no further testing is required<\/td><\/tr><tr><td>&lt; 10<\/td><td>Non-responder. Test for current or past infection. Give further vaccine course (i.e. 3 doses again) with testing following. If still fails to respond then HBIG would be required for protection if exposed to the virus<\/td><\/tr><\/tbody><\/table><\/div><br>Complications of hepatitis B infection<br><ul><li>Chronic hepatitis (5-10%)<\/li><li>Fulminant liver failure (1%)<\/li><li>Hepatocellular carcinoma<\/li><li>Glomerulonephritis<\/li><li>Polyarteritis nodosa<\/li><li>Cryoglobulinaemia<\/li><\/ul><br>Management of hepatitis B<br><ul><li>Pegylated interferon-alpha used to be the only treatment available. It reduces viral replication in up to 30% of chronic carriers. A better response is predicted by being female, &lt; 50 years old, low HBV DNA levels, non-Asian, HIV negative, high degree of inflammation on liver biopsy<\/li><li>However, due to the side-effects of pegylated interferon it is now used less commonly in clinical practice. Oral antiviral medication is increasingly used with an aim to suppress viral replication (not in dissimilar way to treating HIV patients)<\/li><li>Examples include lamivudine, tenofovir and entecavir<\/li><\/ul>"}, {"name": "HIV testing", "questions": [{"number": 30, "topic": "HIV testing", "stem_html": "A 27-year-old male presents to urology for investigation of pyelonephritis.  He reports malaise, pyrexia, lymphadenopathy and a maculopapular rash. The Monospot test is negative. Given a history of recent high-risk sexual behaviour you are asked to exclude a HIV seroconversion illness. What is the most appropriate investigation?", "options": [{"label_html": "Antibodies to HIV-2", "is_correct": false}, {"label_html": "gp120 polymerase chain reaction", "is_correct": false}, {"label_html": "p24 antigen test", "is_correct": true}, {"label_html": "CCR5 polymerase chain reaction", "is_correct": false}, {"label_html": "Antibodies to HIV-1", "is_correct": false}], "correct_index": 2, "explanation_html": "<p>No explanation provided.<\/p>"}], "note_html": "HIV seroconversion is symptomatic in 60-80% of patients and typically presents as a glandular fever type illness. Increased symptomatic severity is associated with poorer long term prognosis. It typically occurs 3-12 weeks after infection<br><br>Features<br><ul><li>sore throat<\/li><li>lymphadenopathy<\/li><li>malaise, myalgia, arthralgia<\/li><li>diarrhoea<\/li><li>maculopapular rash<\/li><li>mouth ulcers<\/li><li>rarely meningoencephalitis<\/li><\/ul><br>Diagnosis<br><ul><li>antibodies to HIV may not be present<\/li><li>HIV PCR and p24 antigen tests can confirm diagnosis<\/li><\/ul><br><i>HIV antibody test<\/i><br><ul><li>most common and accurate test<\/li><li>usually consists of both a screening ELISA (Enzyme Linked Immuno-Sorbent Assay) test and a confirmatory Western Blot Assay<\/li><li>most people develop antibodies to HIV at 4-6 weeks but 99% do by 3 months <\/li><\/ul><br><i>p24 antigen test<\/i><br><ul><li> usually positive from about 1 week to 3 - 4 weeks after infection with HIV<\/li><li>sometimes used as an additional screening test in blood banks<\/li><\/ul>"}, {"name": "Ludwigs angina", "questions": [{"number": 31, "topic": "Ludwigs angina", "stem_html": "A 53 year old man presents with drooling and facial pain and swelling. Ludwigs angina is suspected. Which of these tissue spaces is predominantly affected by this process?", "options": [{"label_html": "Submandibular", "is_correct": true}, {"label_html": "Retropharyngeal", "is_correct": false}, {"label_html": "Buccal", "is_correct": false}, {"label_html": "Pre tracheal", "is_correct": false}, {"label_html": "Parapharyngeal", "is_correct": false}], "correct_index": 0, "explanation_html": "In most cases the submandibular space is involved. Incision and drainage of this space is often undertaken."}], "note_html": "This is a severe form of infection which affects the floor of mouth and surrounding tissues. The underlying cause in many cases is dental caries affecting the third molar tooth. The floor of the mouth and neck usually becomes very swollen and drooling is often seen. The presence of immunosuppression or conditions like diabetes or HIV increases the risks. Staphylococcal organisms and streptococcal organisms account for many cases. <br><br>Management comprises careful attention to maintaining airway, prompt administration of antibiotics and surgical drainage of any discrete collections. The underlying cause should also be identified and addressed."}, {"name": "Malignant otitis externa", "questions": [{"number": 32, "topic": "Malignant otitis externa", "stem_html": "A 68 year old man with poorly controlled diabetes presents with severe otalgia and headaches. On examination, there is granulation tissue within the external auditory meatus. What is the most likely underlying infective agent?", "options": [{"label_html": "Pseudomonas aeruginosa", "is_correct": true}, {"label_html": "Streptococcus pyogenes", "is_correct": false}, {"label_html": "Staphylococcus aureus", "is_correct": false}, {"label_html": "Actinomyces", "is_correct": false}, {"label_html": "Bacteroides fragilis", "is_correct": false}], "correct_index": 0, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Malignant otitis externa is caused by Pseudomonas aeruginosa<\/div>Severe pain, headaches and granulation tissue within the external auditory meatus are key features of malignant otitis externa. Diabetes mellitus is one of the commonest risk factors."}], "note_html": "- Uncommon type of otitis externa that is found in immunocompromised individuals (90% cases found in diabetics) <br><ul><li>Infective organism is usually <i>Pseudomonas aeruginosa<\/i><\/li><li>Infection commences in the soft tissues of the external auditory meatus, then progresses to involve the soft tissues and into the bony ear canal<\/li><li>Progresses to temporal bone osteomyelitis<\/li><\/ul><br><b>Key features in history<\/b><br><div class=\"alert alert-warning\">    Diabetes (90%) or immunosuppression (illness or treatment related)<br>    Severe, unrelenting, deep-seated otalgia<br>    Temporal headaches<br>    Purulent otorrhea<br>    Possibly dysphagia, hoarseness, and/or facial nerve dysfunction<br><\/div><br><b>Treatment<\/b><br>Anti pseudomonal antimicrobial agents<br>Topical agents<br>Hyperbaric oxygen is sometimes used in refractory cases"}, {"name": "Mastitis", "questions": [{"number": 33, "topic": "Mastitis", "stem_html": "A 22 year old lady is breastfeeding her first child. One week post partum she presents with a tender indurated mass in the right breast. Infection with which of the following is most likely?", "options": [{"label_html": "Staphylococcus aureus", "is_correct": true}, {"label_html": "Streptococcus pyogenes", "is_correct": false}, {"label_html": "Streptococcus bovis", "is_correct": false}, {"label_html": "Klebsiella", "is_correct": false}, {"label_html": "Streptococcus viridans", "is_correct": false}], "correct_index": 0, "explanation_html": "Staphylococcus aureus is the commonest cause of lactational mastitis."}], "note_html": "Mastitis refers to infection within the breast, the commonest variant, lactational mastitis is related to breast feeding and occurs as a result of inoculation of the breast tissue (which may have breaks in epithelial integrity) with staphylococcus aureus that is carried in the infants oropharynx. The result is a tender erythematous breast. Fever is common. Treatment is usually with encouraging breast drainage (e.g. breast pumps) and antibiotics. Imaging with USS will demonstrate any underlying abscess. The preferred treatment for this complication is percutaneous aspiration where this is possible. Where the overlying epithelium is non viable, debridement may be needed, there is a risk that this may be complicated by the development of a subsequent mammary duct fistula."}, {"name": "Meleney's Gangrene and Necrotising Fasciitis", "questions": [{"number": 34, "topic": "Meleney's Gangrene and Necrotising Fasciitis", "stem_html": "A 68 year old man with diabetes presents with an area of necrosis of the perineum at the base of the scrotum, there is some surrounding erythema. He is systemically unwell and hypotensive. Which of the following organisms is likely to be accountable?", "options": [{"label_html": "Clostridium tetani", "is_correct": false}, {"label_html": "Staphylococcus epidermidis and streptococcus viridans", "is_correct": false}, {"label_html": "Bacteroides and staphylococcus saprophyticus", "is_correct": false}, {"label_html": "Streptococcus viridans and bacteroides", "is_correct": false}, {"label_html": "E-coli and bacteroides", "is_correct": true}], "correct_index": 4, "explanation_html": "This is likely to be Fournier's Gangrene. A number of agents are implicated. E-coli and bacteroides are the most commonly isolated organisms. The key point is that both aerobic and anaerobic organisms must be present."}, {"number": 35, "topic": "Meleney's Gangrene and Necrotising Fasciitis", "stem_html": "Which of the following statements related to necrotising fasciitis is false?", "options": [{"label_html": "Mainly polymicrobial", "is_correct": false}, {"label_html": "A feature may include 'dirty dishwater fluid' in the wound", "is_correct": false}, {"label_html": "The presence of crepitus is needed to make the diagnosis", "is_correct": true}, {"label_html": "Further surgery is mandatory 24-48h after initial surgery to review extension of infection", "is_correct": false}, {"label_html": "The muscles are relatively spared", "is_correct": false}], "correct_index": 2, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Never attempt primary closure after the initial debridement of necrotising fasciitis.<\/div>Crepitus may be present in only 35% of cases, therefore its absence should not exclude a diagnosis of necrotising fasciitis."}, {"number": 36, "topic": "Meleney's Gangrene and Necrotising Fasciitis", "stem_html": "Which of the following statements relating to gas gangrene is untrue?", "options": [{"label_html": "There is necrosis with putrefaction", "is_correct": false}, {"label_html": "The causative pathogens may be detected on normal perineal skin", "is_correct": false}, {"label_html": "Treatment with low dose penicillin is indicated", "is_correct": true}, {"label_html": "Hyperbaric oxygen may be beneficial", "is_correct": false}, {"label_html": "Clostridium perfringens is a recognised cause", "is_correct": false}], "correct_index": 2, "explanation_html": "Rapid surgery and high dose antibiotics are indicated in the treatment of gas gangrene."}], "note_html": "<b>Necrotising fasciitis<\/b><br><ul><li>Advancing soft tissue infection associated with fascial necrosis  <\/li><li>Uncommon, but can be fatal<\/li><li>In many cases there is underlying background immunosuppression e.g. Diabetes<\/li><li>Caused by polymicrobial flora (aerobic and anaerobic) and MRSA is seen increasingly in cases of necrotising fasciitis<\/li><li><i>Streptococcus<\/i> is the commonest organism in isolated pathogen infection (15%)<\/li><\/ul><br><b>Meleneys gangrene<\/b><br><ul><li>Meleneys is a similar principle but the infection is more superficially sited than necrotising fasciitis and often confined to the trunk<\/li><\/ul><br><b>Fournier gangrene<\/b><br><ul><li>Necrotising fasciitis affecting the perineum<\/li><li>Polymicrobial with E-coli and Bacteroides acting in synergy<\/li><\/ul><br><b>Clinical features<\/b><br>Fever<br>Pain<br>Cellulitis<br>Oedema<br>Induration<br>Numbness<br><br>Late findings<br><br>Purple/black skin discolouration<br>Blistering<br>Haemorrhagic bullae<br>Crepitus<br>Dirty Dishwater fluid discharge<br>Septic shock<br><br><i>A typical case of gas gangrene presenting late demonstrating some of the features described above<\/i><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb059b.jpg\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb059.jpg\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Gas&lt;/td&gt;&lt;td&gt;gangrene\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb059b.jpg\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>Diagnosis is mainly clinical<br><br><b>Management<\/b><br><ul><li>Radical surgical debridement forms the cornerstone of management<\/li><li>Sterile dressing is used to dress the wound<\/li><li>Reconstructive surgery is considered once the infection is completely treated<\/li><\/ul><br><b>Reference<\/b><br><br>Hasham S, Matteucci P, Stanley PR, Hart NB. Necrotising fasciitis.  <i>BMJ<\/i> 2005;330:830-833."}, {"name": "MRSA", "questions": [{"number": 37, "topic": "MRSA", "stem_html": "A 77-year-old female presents with a non-healing ulcer on her right foot. Blood cultures grow MRSA. Which antibiotic would you consider in addition to vancomycin to cover this?", "options": [{"label_html": "Flucloxacillin", "is_correct": false}, {"label_html": "Ceftazidime", "is_correct": false}, {"label_html": "Ciprofloxacin", "is_correct": false}, {"label_html": "Metronidazole", "is_correct": false}, {"label_html": "Rifampicin", "is_correct": true}], "correct_index": 4, "explanation_html": "The MRSA would or may be resistant to Other antibiotics. Rifampicin is normally given in combination with another antibiotic."}], "note_html": "Methicillin-resistant Staphylococcus aureus (MRSA) was one of the first organisms which highlighted the dangers of hospital-acquired infections.<br><br>Who should be screened for MRSA?<br><ul><li>all patients awaiting elective admissions (exceptions include day patients having terminations of pregnancy and ophthalmic surgery. Patients admitted to mental health trusts are also excluded)<\/li><li>in the UK all emergency admissions are currently screened<\/li><\/ul><br>How should a patient be screened for MRSA?<br><ul><li>nasal swab and skin lesions or wounds<\/li><li>the swab should be wiped around the inside rim of a patient's nose for 5 seconds<\/li><li>the microbiology form must be labelled 'MRSA screen'<\/li><\/ul><br>Suppression of MRSA from a carrier once identified<br><ul><li>nose: mupirocin 2% in white soft paraffin, tds for 5 days<\/li><li>skin: chlorhexidine gluconate, od for 5 days. Apply all over but particularly to the axilla, groin and perineum<\/li><\/ul><br>The following antibiotics are commonly used in the treatment of MRSA infections:<br><ul><li>vancomycin<\/li><li>teicoplanin<\/li><\/ul><br>Some strains may be sensitive to the antibiotics listed below but they should not generally be used alone because resistance may develop:<br><ul><li>rifampicin<\/li><li>macrolides<\/li><li>tetracyclines<\/li><li>aminoglycosides<\/li><li>clindamycin<\/li><\/ul><br>Relatively new antibiotics such as linezolid, quinupristin/dalfopristin combinations and tigecycline have activity against MRSA but should be reserved for resistant cases"}, {"name": "Osteomyelitis", "questions": [{"number": 38, "topic": "Osteomyelitis", "stem_html": "A 70 year old man undergoes a revision total hip replacement. 30 days post operatively the hip dislocates and pus is discharging from the wound. He is systemically unwell with a temperature of 38.5 and WCC 19. What is the most appropriate course of action?", "options": [{"label_html": "Lay open wound and apply a VAC dressing", "is_correct": false}, {"label_html": "Hindquater amputation", "is_correct": false}, {"label_html": "Revision arthroplasty", "is_correct": false}, {"label_html": "Removal of metalwork and bone grafting", "is_correct": false}, {"label_html": "Removal of metalwork and implantation of local antibiotics", "is_correct": true}], "correct_index": 4, "explanation_html": "Removal of metal work implantation of gentamicin beads and delayed revision is the mainstay of managing this complication after 4 weeks. In earlier infections, linear exchanges covered by prolonged courses of antibiotics can be used."}, {"number": 39, "topic": "Osteomyelitis", "stem_html": "A 65 year old type 2 diabetic with poor glycaemic control is admitted with forefoot cellulitis. X-ray of the foot shows some evidence of osteomyelitis affecting the 2nd ray but overlying skin is healthy. What is the best treatment initially?", "options": [{"label_html": "Intravenous antibiotics", "is_correct": true}, {"label_html": "Below knee amputation", "is_correct": false}, {"label_html": "Transfemoral amputation", "is_correct": false}, {"label_html": "Midfoot amputation", "is_correct": false}, {"label_html": "Ray amputation", "is_correct": false}], "correct_index": 0, "explanation_html": "It is worth attempting to try and resolve this situation with antibiotics at first presentation. A primary amputation will not heal well and may result in progressive surgery."}, {"number": 40, "topic": "Osteomyelitis", "stem_html": "Which of the following statements relating to osteomyelitis is false?", "options": [{"label_html": "Is the result of haematogenous spread in most cases", "is_correct": false}, {"label_html": "Is due to <i><i>Staphylococcus<\/i> aureus<\/i> in 50% cases", "is_correct": false}, {"label_html": "Should be treated by aggressive surgical debridement initially", "is_correct": true}, {"label_html": "Plain radiographs may be normal in the early stages", "is_correct": false}, {"label_html": "The presence of associated septic joint involvement will significantly alter management", "is_correct": false}], "correct_index": 2, "explanation_html": "It is managed medically in the first instance (with an antistaphylococcal antibiotic). This differs from the situation in septic joints where early joint washout is mandatory."}], "note_html": "Infection of the bone<br><br><b>Causes<\/b><br><ul><li>S aureus and occasionally Enterobacter or <i>Streptococcus<\/i> species<\/li><li>In sickle cell: <i>Salmonella<\/i> species<\/li><\/ul><br><b>Clinical features<\/b><br><ul><li>Erythema<\/li><li>Pain<\/li><li>Fever<\/li><\/ul><br><b>Investigation<\/b><br><ul><li>X-ray: lytic centre with a ring of sclerosis<\/li><li>Bone biopsy and culture<\/li><\/ul><br><b>Treatment<\/b><br><ul><li>Prolonged antibiotics<\/li><li>Sequestra may need surgical removal<\/li><\/ul>"}, {"name": "Salmonella", "questions": [{"number": 41, "topic": "Salmonella", "stem_html": "Which of the following is true regarding the Salmonella species?", "options": [{"label_html": "Rose spots appear in all patients with typhoid", "is_correct": false}, {"label_html": "They are normally present in the gut as commensals", "is_correct": false}, {"label_html": "Subsequent chronic biliary infection occurs in 75% of cases", "is_correct": false}, {"label_html": "A relative bradycardia is often seen in typhoid fever", "is_correct": true}, {"label_html": "Salmonella typhi can be categorised into type A, B and C", "is_correct": false}], "correct_index": 3, "explanation_html": "<p>No explanation provided.<\/p>"}], "note_html": "The Salmonella group contains many members, most of which cause diarrhoeal diseases. They are facultative anaerobes, Gram negative rods which are not normally present as commensals in the gut. <br><br>Typhoid and paratyphoid are caused by Salmonella typhi and Salmonella paratyphi (types A, B  &amp; C) respectively. They are often termed enteric fevers, producing systemic symptoms such as headache, fever, arthralgia<br><br>Features<br><ul><li>initially systemic upset as above<\/li><li>relative bradycardia<\/li><li>abdominal pain, distension<\/li><li>constipation: although Salmonella is a recognised cause of diarrhoea, constipation is more common in typhoid<\/li><li>rose spots: present on the trunk in 40% of patients, and are more common in paratyphoid<\/li><\/ul><br>Possible complications include<br><ul><li>osteomyelitis (especially in sickle cell disease where Salmonella is one of the most common pathogens)<\/li><li>GI bleed/perforation<\/li><li>meningitis<\/li><li>cholecystitis<\/li><li>chronic carriage (1%, more likely if adult females)<\/li><\/ul>"}, {"name": "Schistosomiasis", "questions": [{"number": 42, "topic": "Schistosomiasis", "stem_html": "A 34-year-old man from Zimbabwe is admitted  with abdominal pain to the Emergency Department. An abdominal x-ray reveals urinary bladder calcification. What is the most likely cause?", "options": [{"label_html": "Schistosoma mansoni", "is_correct": false}, {"label_html": "Sarcoidosis", "is_correct": false}, {"label_html": "Leishmaniasis", "is_correct": false}, {"label_html": "Tuberculosis", "is_correct": false}, {"label_html": "Schistosoma haematobium", "is_correct": true}], "correct_index": 4, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Schistosoma <b>haem<\/b>atobium causes <b>haem<\/b>aturia<\/div>Schistosomiasis is the most common cause of bladder calcification worldwide. Schistosoma mansoni typically resided in the colon from where it is excreted."}], "note_html": "Schistosomiasis, or bilharzia, is a parasitic flatworm infection. The following types of schistosomiasis are recognised:<br><ul><li>Schistosoma mansoni and Schistosoma intercalatum: intestinal schistosomiasis<\/li><li>Schistosoma haematobium: urinary schistosomiasis<\/li><\/ul><br><b>Schistosoma haematobium<\/b><br>This typically presents as a 'swimmer's itch' in patients who have recently returned from Africa. Schistosoma haematobium is a risk factor for squamous cell bladder cancer<br><br>Features<br><ul><li>Frequency<\/li><li>Haematuria<\/li><li>Bladder calcification<\/li><\/ul><br>Management<br><ul><li>Single oral dose of praziquantel<\/li><\/ul>"}, {"name": "Septic arthritis", "questions": [{"number": 43, "topic": "Septic arthritis", "stem_html": "A 50-year-old female with a history of rheumatoid presents with a suspected septic knee joint. A diagnostic aspiration is performed and sent to microbiology. Which of the organisms below is most likely to be responsible?", "options": [{"label_html": "Staphylococcus aureus", "is_correct": true}, {"label_html": "Staphylococcus epidermidis", "is_correct": false}, {"label_html": "Escherichia coli", "is_correct": false}, {"label_html": "Neisseria gonorrhoeae", "is_correct": false}, {"label_html": "Streptococcus pneumoniae", "is_correct": false}], "correct_index": 0, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Septic arthritis - most common organism: Staphylococcus aureus<\/div>"}], "note_html": "Overview<br><ul><li>Most common organism overall is Staphylococcus aureus<\/li><li>In young adults who are sexually active Neisseria gonorrhoeae should also be considered<\/li><\/ul><br>Management<br><ul><li>Synovial fluid should be obtained before starting treatment<\/li><li>Intravenous antibiotics which cover Gram-positive cocci are indicated. The BNF currently recommends flucloxacillin or clindamycin if penicillin allergic<\/li><li>Antibiotic treatment is normally be given for several weeks (BNF states 6-12 weeks)<\/li><li>Needle aspiration should be used to decompress the joint<\/li><li>Arthroscopic lavage may be required<\/li><\/ul>"}, {"name": "Streptococci", "questions": [{"number": 44, "topic": "Streptococci", "stem_html": "To which of the antibiotics listed below is streptococcus pyogenes still largely susceptible to?", "options": [{"label_html": "Ciprofloxacin", "is_correct": false}, {"label_html": "Tetracycline", "is_correct": false}, {"label_html": "Sulphonamide", "is_correct": false}, {"label_html": "Penicillin", "is_correct": true}, {"label_html": "Metronidazole", "is_correct": false}], "correct_index": 3, "explanation_html": "Penicillin is the antibiotic of choice for group A streptococcal infections. They are less susceptible to the other antibiotic types and the quinolones show variable responses"}], "note_html": "Streptococci may be divided into alpha and beta haemolytic types<br><br><b>Alpha haemolytic streptococci<\/b><br><br>The most important alpha haemolytic streptococcus is Streptococcus pneumoniae (pneumococcus). Pneumococcus is a common cause of pneu
