monia, meningitis and otitis media. Another clinical example is Streptococcus viridans<br><br><b>Beta haemolytic streptococci<\/b><br><br>These can be subdivided into group A and B<br><br>Group A<br><ul><li>most important organism is Streptococcus pyogenes<\/li><li>responsible for erysipelas, impetigo, cellulitis, type 2 necrotizing fasciitis and pharyngitis/tonsillitis<\/li><li>immunological reactions can cause rheumatic fever or post-streptococcal glomerulonephritis<\/li><li>erythrogenic toxins cause scarlet fever <\/li><\/ul><br>Group B<br><ul><li>Streptococcus agalactiae may lead to neonatal meningitis and septicaemia<\/li><\/ul>"}, {"name": "Surgical Microbiology", "questions": [{"number": 45, "topic": "Surgical Microbiology", "stem_html": "A 58 year old man undergoes a difficult colonoscopy for assessment of a caecal cancer. 48 hours after the procedure he is admitted with septicaemia. His abdomen is soft and non tender. Blood cultures grow gram positive cocci. What is the most likely underlying organism?", "options": [{"label_html": "Staphylococcus epidermidis", "is_correct": false}, {"label_html": "Streptococcus pyogenes", "is_correct": false}, {"label_html": "Streptococcus bovis", "is_correct": true}, {"label_html": "Clostridium difficle", "is_correct": false}, {"label_html": "Bacteroides fragilis", "is_correct": false}], "correct_index": 2, "explanation_html": "Streptococcus bovis septicaemia is associated with carcinoma of the colon. It can also cause endocarditis. Streptococcus bovis is a gram positive organism. In most cases, its portal of entry is via the GI tract and for that reason its typically associated with large bowel malignancy."}, {"number": 46, "topic": "Surgical Microbiology", "stem_html": "A 58 year old man undergoes a difficult colonoscopy for assessment of a caecal cancer. 48 hours after the procedure he is admitted with septicaemia. His abdomen is soft and non tender. Blood cultures grow gram positive cocci. What is the most likely underlying organism?", "options": [{"label_html": "Staphylococcus epidermidis", "is_correct": false}, {"label_html": "Streptococcus pyogenes", "is_correct": false}, {"label_html": "Streptococcus bovis", "is_correct": true}, {"label_html": "Clostridium difficle", "is_correct": false}, {"label_html": "Bacteroides fragilis", "is_correct": false}], "correct_index": 2, "explanation_html": "Streptococcus bovis septicaemia is associated with carcinoma of the colon. It can also cause endocarditis. Streptococcus bovis is a gram positive organism. In most cases, its portal of entry is via the GI tract and for that reason its typically associated with large bowel malignancy."}, {"number": 47, "topic": "Surgical Microbiology", "stem_html": "A 58 year old man undergoes a difficult colonoscopy for assessment of a caecal cancer. 48 hours after the procedure he is admitted with septicaemia. His abdomen is soft and non tender. Blood cultures grow gram positive cocci. What is the most likely underlying organism?", "options": [{"label_html": "Staphylococcus epidermidis", "is_correct": false}, {"label_html": "Streptococcus pyogenes", "is_correct": false}, {"label_html": "Streptococcus bovis", "is_correct": true}, {"label_html": "Clostridium difficle", "is_correct": false}, {"label_html": "Bacteroides fragilis", "is_correct": false}], "correct_index": 2, "explanation_html": "Streptococcus bovis septicaemia is associated with carcinoma of the colon. It can also cause endocarditis. Streptococcus bovis is a gram positive organism. In most cases, its portal of entry is via the GI tract and for that reason its typically associated with large bowel malignancy."}, {"number": 48, "topic": "Surgical Microbiology", "stem_html": "A 23 year old woman is admitted with sepsis and right loin pain. She has a history of a UTI that was treated by the GP with a course of trimethoprim that was commenced 24 hours previously. Which of the organisms listed below is the most likely cause?", "options": [{"label_html": "Bacteroides fragilis", "is_correct": false}, {"label_html": "E-Coli", "is_correct": true}, {"label_html": "Clostridium difficile", "is_correct": false}, {"label_html": "Candida albicans", "is_correct": false}, {"label_html": "Mycobacterium tuberculosis", "is_correct": false}], "correct_index": 1, "explanation_html": "Ascending infection of the genitourinary tract is most commonly caused by E-Coli. Other organisms may be accountable, however, these are less common"}, {"number": 49, "topic": "Surgical Microbiology", "stem_html": "A 34 year old male is admitted with diarrhoea of 3 months duration. He is found to be HIV positive with a CD4 count &lt;50. Which of the organisms listed below is most likely to be responsible?", "options": [{"label_html": "Cryptosporidium", "is_correct": true}, {"label_html": "Adenovirus", "is_correct": false}, {"label_html": "Norovirus", "is_correct": false}, {"label_html": "Vibrio cholera", "is_correct": false}, {"label_html": "Clostridium difficle", "is_correct": false}], "correct_index": 0, "explanation_html": "Although a self limiting diarrhoea is the norm, this is not the case in immunocompromised individuals who can develop severe illness. Other organisms may include Salmonella, Shigella, and Campylobacter."}, {"number": 50, "topic": "Surgical Microbiology", "stem_html": "A 23 year old man is readmitted following a difficult appendicectomy. His wound is erythematous and, on incision, foul smelling pus is drained. Which of the organisms listed below is responsible?", "options": [{"label_html": "Steptococcus bovis", "is_correct": false}, {"label_html": "Bacteroides fragilis", "is_correct": true}, {"label_html": "Staphylococcus aureus", "is_correct": false}, {"label_html": "Streptococcus pyogenes", "is_correct": false}, {"label_html": "Clostridium perfringens", "is_correct": false}], "correct_index": 1, "explanation_html": "Bacteroides is commonly present in severe peritoneal infections and as it is facultatively anaerobic may be present in pus. It has a pungent aroma."}, {"number": 51, "topic": "Surgical Microbiology", "stem_html": "A 62 year old lady is unwell following a difficult acute cholecystectomy for acute cholecystitis. Her gallbladder spilled stones intraoperatively and she has been on ciprofloxacin intravenously for this for the past 4 days. She now has colicky abdominal pain and profuse, foul smelling diarrhoea. Which of the organisms below is likely to account for this illness?", "options": [{"label_html": "E-Coli", "is_correct": false}, {"label_html": "Clostridium difficile", "is_correct": true}, {"label_html": "Clostridium perfringens", "is_correct": false}, {"label_html": "Clostridium tetani", "is_correct": false}, {"label_html": "Campylobacter", "is_correct": false}], "correct_index": 1, "explanation_html": "C. difficile may complicate administration of broad spectrum antibiotics."}, {"number": 52, "topic": "Surgical Microbiology", "stem_html": "A 72 year old man with peripheral vascular disease develops a gangrenous toe. This becomes infected and there is evidence of infection in the surrounding tissues. On clinical palpation there is crepitus present within the tissues. What is the most likely infective organism?", "options": [{"label_html": "Staphylococcus aureus", "is_correct": false}, {"label_html": "Streptococcus pyogenes", "is_correct": false}, {"label_html": "Clostridium difficile", "is_correct": false}, {"label_html": "Clostridium perfringens", "is_correct": true}, {"label_html": "Clostridium botulinum", "is_correct": false}], "correct_index": 3, "explanation_html": "Clostridium perfringens is the most likely pathogen to be associated with gangrene."}, {"number": 53, "topic": "Surgical Microbiology", "stem_html": "A 45 year old man is recovering in hospital following a total hip replacement. He develops a profuse and watery diarrhoea. Several other patients have been suffering from similar symptoms. Infection with which of the following is the most likely underlying cause?", "options": [{"label_html": "Clostridium perfringens", "is_correct": false}, {"label_html": "Clostridium botulinim", "is_correct": false}, {"label_html": "Clostridium difficile", "is_correct": true}, {"label_html": "Clostridium welchi", "is_correct": false}, {"label_html": "Clostridium tetani", "is_correct": false}], "correct_index": 2, "explanation_html": "Clostridium difficile can spread rapidly on surgical wards. The use of broad spectrum prophylactic antibiotics during arthroplasty surgery can increase the risk."}, {"number": 54, "topic": "Surgical Microbiology", "stem_html": "Which statement relating to actinomycosis is false?", "options": [{"label_html": "They are gram positive bacilli", "is_correct": false}, {"label_html": "They are strict aerobes", "is_correct": true}, {"label_html": "It may be a cause of chronic multiple abscesses", "is_correct": false}, {"label_html": "Abdominal cases may develop in the appendix", "is_correct": false}, {"label_html": "Open biopsy of the lesions is the best diagnostic test", "is_correct": false}], "correct_index": 1, "explanation_html": "They are facultative anaerobes and may be difficult to culture. Direct visualisation of organisms and sulphur granules from lesions themselves is the easiest way to make a diagnosis. It remains a differential of conditions such as hydradenitis supprativa, particularly if it is occurring in odd locations and with deeper abscesses than usual."}, {"number": 55, "topic": "Surgical Microbiology", "stem_html": "A group of consultant surgeons are meeting at a symposium. The chef preparing the canapes has an infection on his finger. Approximately 40 minutes after eating the canapes the group are struck down with severe vomiting. What is the most likely underlying explanation for this process?", "options": [{"label_html": "Presence of enterotoxin from <i>Staphylococcus aureus<\/i> in the food", "is_correct": true}, {"label_html": "Presence of enterotoxin from <i>Streptococcus pyogenes<\/i> in the food", "is_correct": false}, {"label_html": "Infection with <i>Campylobacter jejuni<\/i>", "is_correct": false}, {"label_html": "Presence of enterotoxin from <i>Clostridium perfringens<\/i> in the food", "is_correct": false}, {"label_html": "Infection with <i>Shigella soneii<\/i>", "is_correct": false}], "correct_index": 0, "explanation_html": "<i>Staphylococcus aureus<\/i> may release an enterotoxin, this is preformed and thus will typically result in rapid onset of symptoms in affected individuals."}], "note_html": "An extensive topic so an overview is given here.   Organisms causing common surgical infections are reasonable topics in the examination. However, microbiology is less rigorously tested than anatomy, for example. <br><br><b>Common organisms<\/b><br><br><b><i><i>Staphylococcus<\/i> aureus<\/i><\/b><br><ul><li>Facultative anaerobe<\/li><li>Gram positive coccus<\/li><li>Haemolysis on blood agar plates<\/li><li>Catalase positive<\/li><li>20% population are long term carriers<\/li><li>Exo and entero toxin may result in toxic shock syndrome and gastroenteritis respectively<\/li><li>Ideally treated with penicillin although many strains now resistant through beta Lactamase production. In the UK less than 5% of isolates are sensitive to penicillin.<\/li><li>Resistance to methicillin (and other antibiotics) is mediated by the mec operon , essentially penicillin binding protein is altered and resistance to this class of antibiotics ensues<\/li><li>Common cause of cutaneous infections and abscesses<\/li><\/ul><br><b><i><i>Streptococcus<\/i> pyogenes<\/i><\/b><br><ul><li>Gram positive, forms chain like colonies, Lancefield Group A <i>Streptococcus<\/i><\/li><li>Produces beta haemolysis on blood agar plates<\/li><li>Rarely part of normal skin microflora<\/li><li>Catalase negative<\/li><li>Releases a number of proteins/ virulence factors into host including hyaluronidase, streptokinase which allow rapid tissue destruction<\/li><li>Releases superantigens such as pyogenic exotoxin A which results in scarlet fever<\/li><li>Remains sensitive to penicillin, macrolides may be used as an alternative.<\/li><\/ul><br><b><i>Escherichia coli<\/i><\/b><br><ul><li>Gram negative rod <\/li><li>Facultative anaerobe, non sporing<\/li><li>Wide range of subtypes and some are normal gut commensals<\/li><li>Some subtypes such as 0157 may produce lethal toxins resulting in haemolytic-uraemic syndrome<\/li><li><b>Enterotoxigenic E-Coli<\/b> produces an enterotoxin (ST enterotoxin) that results in large volume fluid secretion into the gut lumen (Via cGMP activation)<\/li><li><b>Enteropathogenic E-Coli<\/b> binds to intestinal cells and cause structural damage, this coupled with a moderate (or in case of enteroinvasive E-Coli significant) invasive component produces enteritis and large volume diarrhoea together with fever.<\/li><li>They are resistant to many antibiotics used to treat gram positive infections and acquire resistance rapidly and are recognised as producing beta lactamases<\/li><\/ul><br><b><i><i>Campylobacter<\/i> jejuni<\/i><\/b><br><ul><li>Curved, gram negative, non sporulating bacteria<\/li><li>One of the commonest causes of diarrhoea worldwide<\/li><li>Produces enteritis which is often diffuse and blood may be passed<\/li><li>Remains a differential for right iliac fossa pain with diarrhoea<\/li><li>Self limiting infection so antibiotics are not usually advised. However, the quinolones are often rapidly effective.<\/li><\/ul><br><b><i><i>Helicobacter<\/i> pylori<\/i><\/b><br><ul><li>Gram negative, helix shaped rod, microaerophillic<\/li><li>Produces hydrogenase that can derive energy from hydrogen released by intestinal bacteria<\/li><li>Flagellated and mobile<\/li><li>Those carrying the cag A gene may cause ulcers<\/li><li>It secretes urease that breaks down gastric urea&gt; Carbon dioxide and ammonia&gt; ammonium&gt;bicarbonate (simplified!) The bicarbonate can neutralise the gastric acid.<\/li><li>Usually colonises the gastric antrum and irritates resulting in increased gastrin release and higher levels of gastric acid. These patients will develop duodenal ulcers.  In those with more diffuse H-Pylori infection gastric acid levels are lower and ulcers develop by local tissue damage from H-Pylori- these patients get gastric ulcers.<\/li><li>Diagnosis may be made by serology (approx. 75% sensitive). Biopsy urease test during endoscopy probably the most sensitive. <\/li><li>In patients who are colonised 10-20% risk of peptic ulcer, 1-2% risk gastric cancer, &lt;1% risk MALT lymphoma.<\/li><\/ul>"}, {"name": "Surgical site infection", "questions": [{"number": 56, "topic": "Surgical site infection", "stem_html": "A 29 year old female undergoes a sub total thyroidectomy. Five days post operatively the wound becomes erythematous and discharges pus. What is the most likely causative organism?", "options": [{"label_html": "<i>Streptococcus pyogenes<\/i>", "is_correct": false}, {"label_html": "<i>Haemophilus influenzae<\/i>", "is_correct": false}, {"label_html": "Pseudomonas aeruginosa", "is_correct": false}, {"label_html": "<i>Staphylococcus aureus<\/i>", "is_correct": true}, {"label_html": "Proteus mirabilis", "is_correct": false}], "correct_index": 3, "explanation_html": "In this setting <i>Staphylococcus aureus<\/i> Infection is the most likely cause. In the UK between 2010 and 2011 the commonest cause of wound infection was enterobacter infections (usually following cardiac or colonic surgery). 23% of infections were due to Staph aureus, which fits the scenario above. Infection with the other organisms including strep pyogenes was much rarer."}, {"number": 57, "topic": "Surgical site infection", "stem_html": "What is the likely risk of surgical wound infection in a 23 year old male undergoing an elective inguinal hernia repair?", "options": [{"label_html": "Between 5 and 10%", "is_correct": false}, {"label_html": "Less than 5%", "is_correct": true}, {"label_html": "Between 10 and 15%", "is_correct": false}, {"label_html": "More than 25%", "is_correct": false}, {"label_html": "Between 15 and 20%", "is_correct": false}], "correct_index": 1, "explanation_html": "This is a clean procedure and carries the lowest risk of SSI. That is why it is safe to use meshes in these settings."}, {"number": 58, "topic": "Surgical site infection", "stem_html": "What is the risk of wound infection occurring in a 43 year old woman who is undergoing a laparoscopic cholecystectomy for uncomplicated biliary colic?", "options": [{"label_html": "1%", "is_correct": false}, {"label_html": "4%", "is_correct": true}, {"label_html": "15%", "is_correct": false}, {"label_html": "20%", "is_correct": false}, {"label_html": "30%", "is_correct": false}], "correct_index": 1, "explanation_html": "In straightforward uncomplicated laparoscopic cholecystectomy the wound infection rates are around 3-5% (Pasquali et al and Matsui et al). The use of antibiotics in this group is therefore unnecessary.  Complex procedures, bile spills and acute cholecystectomy have higher infection rates and antibiotics should be administered to these patients.<br><br><b>References:<\/b><br><br>S Pasquali , M Boal , E A Griffiths , D Alderson , R S Vohra, CholeS Study Group; West Midlands Research Collaborative. Meta-analysis of perioperative antibiotics in patients undergoing laparoscopic cholecystectomy.  <i>Br J Surg<\/i>. 2016 Jan;103(1):27-34<br><br>Yoichi Matsui, Sohei Satoi, Satoshi Hirooka, Hisashi Kosaka, Takayuki Kawaura, and Tomoki Kitawaki. <br>Reappraisal of previously reported meta-analyses on antibiotic prophylaxis for low-risk laparoscopic cholecystectomy: an overview of systematic reviews. <i>BMJ<\/i> Open. 2018; 8(3): e016666."}, {"number": 59, "topic": "Surgical site infection", "stem_html": "What is the risk of a wound infection in a male undergoing a Hartmanns procedure for perforated sigmoid diverticular disease?", "options": [{"label_html": "35%", "is_correct": true}, {"label_html": "15%", "is_correct": false}, {"label_html": "10%", "is_correct": false}, {"label_html": "20%", "is_correct": false}, {"label_html": "80%", "is_correct": false}], "correct_index": 0, "explanation_html": "These infected cases carry a high risk of wound infection. In really heavily contaminated cases, some surgeons do not close the skin at all. Even if antibiotics are given in this case, the infection rate will still be very high."}, {"number": 60, "topic": "Surgical site infection", "stem_html": "A 22 year old man has undergone an inguinal hernia repair. Seven days later he presents with an erythematous and tender wound that is discharging a purulent material. What is the most likely cause?", "options": [{"label_html": "Infection with <i>Staphylococcus aureus<\/i>", "is_correct": true}, {"label_html": "Discharging haematoma", "is_correct": false}, {"label_html": "Infection with <i>Pseudomonas<\/i>", "is_correct": false}, {"label_html": "Infection with <i>Streptococcus pyogenes<\/i>", "is_correct": false}, {"label_html": "Infection with <i>Bacteroides<\/i>", "is_correct": false}], "correct_index": 0, "explanation_html": "In this setting <i>Staphylococcus aureus<\/i> Infection is the most likely cause. In the UK between 2010 and 2011 the commonest cause of wound infection was enterobacter infections (usually following cardiac or colonic surgery). 23% of infections were due to Staph aureus, which fits the scenario above. Infection with the other organisms including strep pyogenes was much rarer."}, {"number": 61, "topic": "Surgical site infection", "stem_html": "In a 72 year old man undergoing a sigmoid colectomy for diverticular disease, which of the following interventions is most likely to reduce his risk of developing a post operative wound infection?", "options": [{"label_html": "Using a plain clear incise type drape to cover the operative field", "is_correct": false}, {"label_html": "Administering mechanical bowel preparation pre operatively", "is_correct": false}, {"label_html": "Shaving his abdominal wall one day prior to surgery", "is_correct": false}, {"label_html": "Administration of single dose of broad spectrum antibiotics prior to the procedure", "is_correct": true}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 3, "explanation_html": "Administration of prophylactic antibiotics will reduce the risk of wound infection. Plain incise drapes increase the risk of wound infections and should not be used. Iodophor impregnated drapes have been demonstrated to reduce the risk of wound infection. Shaving one day prior to surgery will increase the risk."}], "note_html": "- Surgical site infections may occur following a breach in tissue surfaces and allow normal commensals and other pathogens to initiate infection. They are a major cause of morbidity and mortality.<br><ul><li>Surgical site infections (SSI) comprise up to 20% of all healthcare associated infections and at least 5% of patients undergoing surgery will develop an SSI as a result.<\/li><li>In many cases the organisms are derived from the patient's own body. Measures that may increase the risk of SSI include:<\/li><li>Shaving the wound using a razor (disposable clipper preferred)<\/li><li>Using a non iodine impregnated incise drape if one is deemed to be necessary<\/li><li>Tissue hypoxia<\/li><li>Delayed administration of prophylactic antibiotics in tourniquet surgery<\/li><\/ul><br><b>Preoperatively<\/b><br><ul><li>Don't remove body hair routinely<\/li><li>If hair needs removal, use electrical clippers with single use head (razors increase infection risk)<\/li><li>Antibiotic prophylaxis if:<\/li><\/ul>- placement of prosthesis or valve<br>- clean-contaminated surgery<br>- contaminated surgery<br><ul><li>Use local formulary<\/li><li>Aim to give single dose IV antibiotic on anaesthesia<\/li><li>If a tourniquet is to be used, give prophylactic antibiotics earlier<\/li><\/ul><br><b>Intraoperatively<\/b><br><ul><li>Prepare the skin with alcoholic chlorhexidine (Lowest incidence of SSI)<\/li><li>Cover surgical site with dressing<\/li><li>A recent meta analysis has confirmed that administration of supplementary oxygen does not reduce the risk of wound infection. In contrast to previous individual RCT's(1)<\/li><li>Wound edge protectors do not appear to confer benefit (2)<\/li><\/ul><br><b>Post operatively<\/b><br>Tissue viability advice for management of surgical wounds healing by secondary intention<br><br><b>Use of diathermy for skin incisions<\/b><br>In the NICE guidelines the use of diathermy for skin incisions is not advocated(3). Several randomised controlled trials have been undertaken and demonstrated no increase in risk of SSI when diathermy is used(4). <br><br><b>References<\/b><br>1. Alverdy JC, Hyman N, Gilbert J. Re-examining causes of surgical site infections following elective surgery in the era of asepsis. Lancet Infect Dis. 2020 Mar;20(3):e38-e43. doi: 10.1016/S1473-3099(19)30756-X. Epub 2020 Jan 29. PMID: 32006469; PMCID: PMC8019154.<br>2. Pinkney T <i> et al<\/i>. Impact of wound edge protection devices on surgical site infection after laparotomy: impact of a multicentre randomised controlled trial (ROSSINI Trial). <i>BMJ<\/i> 2013 (347):10.<br>3. http://www.nice.org.uk/CG74<br>4. Ahmad N and Ahmed A. Meta-analysis of the effectiveness of surgical scalpel or diathermy in making abdominal skin incisions. <i>Ann Surg<\/i> 2011, 253(1):8-13."}, {"name": "Syphilis", "questions": [{"number": 62, "topic": "Syphilis", "stem_html": "A 22 year old man presents with a painless penile ulcer and marked inguinal lymphadenopathy. Some of the exudate from the lesion is sent for microscopy. What organism is most likely to be visualized?", "options": [{"label_html": "Treponema pallidum", "is_correct": true}, {"label_html": "Nocardia asteroides", "is_correct": false}, {"label_html": "Mycobacterium tuberculosis", "is_correct": false}, {"label_html": "Mycobacterium leprae", "is_correct": false}, {"label_html": "Neisseria gonorrhoea", "is_correct": false}], "correct_index": 0, "explanation_html": "A hard painless ulcer affecting the genital area of a young male is likely to be the primary lesion of syphilis and that is caused by treponema pallidum. It would be unusual for actinomycosis to affect this area."}], "note_html": "<ul><li>Venereal syphilis is a cause by the spirochete <i>Treponema Pallidum<\/i><\/li><li>Most cases are transmitted sexually, congenital infection is also recognized<\/li><li>The typical lesion of primary syphilis is the chancre which appears after 10-90 days. It is an indurated papule that breaks down to form an ulcer. It is typically hard and painless. The appearances of a hard ulcer with enlarged regional lymph nodes can mimic carcinoma.<\/li><li>The histological appearances on biopsy are non specific and include dense inflammatory infiltrates.<\/li><li>Diagnosis can be made demonstrating spirochetes from the chancre by dark ground illumination microscopy. Serological testing for anti treponemal antibodies are also used.<\/li><li>Secondary syphilis usually develops around 6 weeks following exposure to the disease. It often comprises a widespread roseolar eruption. <\/li><li>Treatment can precipitate a Jarisch- Herxheimer reaction with fever and malaise occurring after treatment has been started and is due to the release of antigens as the organisms die.<\/li><li>Individuals who are not treated can eventually develop tertiary syphilis, this is characterized by the development of gummas or diffuse inflammatory lesions. Syphilic lesions characteristically affect the proximal aspect of the aorta and can result in atypical aneurysms. <\/li><\/ul>"}, {"name": "Tetanus", "questions": [{"number": 63, "topic": "Tetanus", "stem_html": "A 34 year old construction worker sustains a significant lower limb laceration whilst digging on a building site. The wound is contaminated with soil. He had a completed course of tetanus vaccination as a child and young adult. What is the most appropriate course of action?", "options": [{"label_html": "Debridement of the wound and administration of antibiotics", "is_correct": false}, {"label_html": "Debridement of the wound, administration of tetanus immunoglobulin and antibiotics", "is_correct": false}, {"label_html": "Debridement of the wound, administration of tetanus toxoid and antibiotics", "is_correct": false}, {"label_html": "Debridement of the wound, administration of tetanus toxoid, tetanus immunoglobulin and antibiotics", "is_correct": true}, {"label_html": "Debridement of wound alone", "is_correct": false}], "correct_index": 3, "explanation_html": "Unless one is very certain of the regime and dates, it is safest in this high risk situation to provide full cover."}], "note_html": "Tetanus is an acute and often fatal disease which is relatively rare in the Western world because of immunisation programmes and ready access to healthcare. It is caused by the organism Clostridium tetani which is commonly found in soil and animal faeces. The tetanus bacillus is a straight slender gram positive rod. A fully developed terminal spore gives the organism its classical drumstick appearance. It is an obligate anaerobe, the spores are highly resistant to adverse conditions. Clostridium tetani produces a number of toxins. However, the organisms neurotoxin (tetanospasmin) is the main pathogenic product. The toxin diffuses to the relevant level of the spinal cord to produce local tetanus and then affects the entire CNS. Infection to the key aspects of the CNS is via retrograde axonal transport. Once the entire toxin molecule is internalised into the presynaptic cells it affects the membrane of the synaptic vesicles and prevents the release of the neurotransmitter γ aminobutyric acid. Motor neurones are thus left under no inhibitory control and undergo sustained excitatory discharge causing the classical motor spasms of tetanus. The incubation period is usually 4-14 days. Management of established tetanus consists of providing full supportive care in the ITU as autonomic disturbance and cardiac arrhythmias are common. Penicillin, metronidazole and human tetanus immunoglobulin should be administered. Any wounds should be debrided. <br><br>Tetanus immunisation programme <br>The standard active immunisation programme consists of 3 IM doses of 0.5ml of tetanus toxoid given at monthly intervals from 2 months of age. Booster doses are given at 4 and 14 years of age. Immunisation following injury depends upon the immunisation status of the patient. <br><br>The following features render a wound at high risk of tetanus: <br>Heavy contamination with soil or faeces <br>Devitalised tissue Infection or old neglected wounds <br>Puncture wounds <br><br>DOH guidance <br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Immunisation status<\/b><\/th><th><b> Clean wound<\/b><\/th><th><b>Tetanus prone wound<\/b><\/th><\/tr><\/thead><tbody><tr><td>Full course and less than 10 years<\/td><td>Nil<\/td><td>No booster needed<\/td><\/tr><tr><td>Full course but more than 10 years ago<\/td><td>Give tetanus toxoid booster (may be omitted if full five doses given at correct intervals)<\/td><td>Give tetanus toxoid booster and human (may be omitted if full five doses given at correct intervals) anti tetanus immunoglobulin<\/td><\/tr><tr><td>Not immunised or unknown<\/td><td>Start tetanus toxoid course<\/td><td>Start tetanus toxoid course and give human anti tetanus immunoglobulin<\/td><\/tr><\/tbody><\/table><\/div>"}]}</script>
  <script>
    const quizData = JSON.parse(document.getElementById("quiz-data").textContent);
    const app = document.getElementById("app");
    const modeButtons = Array.from(document.querySelectorAll("[data-mode-button]"));
    const topicActionButtons = Array.from(document.querySelectorAll("[data-topic-action]"));

    const state = {
      mode: "solve",
      answers: new Map(),
      questionRefs: [],
    };

    function buildTopic(topic, questionOffset) {
      const details = document.createElement("details");
      details.className = "topic";
      details.open = true;

      const summary = document.createElement("summary");
      summary.innerHTML = `
        <div>
          <h2 class="topic-title">${topic.name}</h2>
        </div>
        <div class="topic-meta">
          <span>${topic.questions.length} questions</span>
          <span class="chevron" aria-hidden="true">></span>
        </div>
      `;

      const body = document.createElement("div");
      body.className = "topic-body";

      if (topic.note_html) {
        const notes = document.createElement("details");
        notes.className = "topic-notes";

        const notesSummary = document.createElement("summary");
        notesSummary.innerHTML = `
          <span class="topic-notes-title">Notes</span>
          <span class="chevron" aria-hidden="true">></span>
        `;

        const notesBody = document.createElement("div");
        notesBody.className = "topic-notes-body rich-text";
        notesBody.innerHTML = topic.note_html;

        notes.appendChild(notesSummary);
        notes.appendChild(notesBody);
        body.appendChild(notes);
      }

      topic.questions.forEach((question, indexInTopic) => {
        const globalIndex = questionOffset + indexInTopic;
        body.appendChild(buildQuestionCard(question, globalIndex));
      });

      details.appendChild(summary);
      details.appendChild(body);
      return details;
    }

    function buildQuestionCard(question, questionIndex) {
      const card = document.createElement("article");
      card.className = "question-card is-hidden";
      card.dataset.questionIndex = String(questionIndex);

      const label = document.createElement("p");
      label.className = "question-label";
      label.textContent = `Question ${question.number}`;

      const stem = document.createElement("div");
      stem.className = "stem rich-text";
      stem.innerHTML = question.stem_html;

      const options = document.createElement("div");
      options.className = "options";

      const optionButtons = question.options.map((option, optionIndex) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "option";
        button.dataset.optionIndex = String(optionIndex);
        button.innerHTML = option.label_html;
        button.addEventListener("click", () => {
          if (state.mode !== "solve") {
            return;
          }
          state.answers.set(questionIndex, optionIndex);
          applyQuestionState(questionIndex);
        });
        options.appendChild(button);
        return button;
      });

      const explanation = document.createElement("div");
      explanation.className = "explanation rich-text";
      explanation.innerHTML = `<span class="explanation-label">Explanation</span>${question.explanation_html}`;

      card.appendChild(label);
      card.appendChild(stem);
      card.appendChild(options);
      card.appendChild(explanation);

      state.questionRefs[questionIndex] = {
        card,
        explanation,
        optionButtons,
        question,
      };

      applyQuestionState(questionIndex);
      return card;
    }

    function applyQuestionState(questionIndex) {
      const ref = state.questionRefs[questionIndex];
      if (!ref) {
        return;
      }

      const { card, optionButtons, question } = ref;
      const selectedIndex = state.answers.get(questionIndex);
      const hasSelection = selectedIndex !== undefined;
      const isReview = state.mode === "review";
      const showExplanation = isReview || hasSelection;

      card.classList.toggle("is-hidden", !showExplanation);

      optionButtons.forEach((button, optionIndex) => {
        button.classList.remove("correct", "incorrect", "neutral-revealed");

        if (isReview) {
          button.disabled = true;
          if (optionIndex === question.correct_index) {
            button.classList.add("correct");
          } else {
            button.classList.add("neutral-revealed");
          }
          return;
        }

        button.disabled = false;
        if (!hasSelection) {
          return;
        }

        if (optionIndex === question.correct_index) {
          button.classList.add("correct");
        } else if (optionIndex === selectedIndex) {
          button.classList.add("incorrect");
        } else {
          button.classList.add("neutral-revealed");
        }
      });
    }

    function renderApp() {
      if (!quizData.topics.length) {
        const empty = document.createElement("div");
        empty.className = "empty-state";
        empty.textContent = "No questions were found in this JSON file.";
        app.replaceChildren(empty);
        return;
      }

      const wrapper = document.createElement("div");
      wrapper.className = "topic-list";

      let questionOffset = 0;
      quizData.topics.forEach((topic) => {
        wrapper.appendChild(buildTopic(topic, questionOffset));
        questionOffset += topic.questions.length;
      });

      app.replaceChildren(wrapper);
    }

    function setMode(mode) {
      state.mode = mode;
      modeButtons.forEach((button) => {
        const isActive = button.dataset.modeButton === mode;
        button.classList.toggle("active", isActive);
        button.setAttribute("aria-pressed", String(isActive));
      });

      state.questionRefs.forEach((_, index) => applyQuestionState(index));
    }

    function setAllTopics(open) {
      document.querySelectorAll(".topic").forEach((topic) => {
        topic.open = open;
      });
    }

    modeButtons.forEach((button) => {
      button.addEventListener("click", () => setMode(button.dataset.modeButton));
    });

    topicActionButtons.forEach((button) => {
      button.addEventListener("click", () => {
        setAllTopics(button.dataset.topicAction === "expand");
      });
    });

    renderApp();
    setMode("solve");
  </script>
</body>
</html>
