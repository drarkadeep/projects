is unstable in spite of volume replacement. A laparoscopy is unlikely to demonstrate clear operative views to allow assessment. At laparotomy, there will need to be evacuation of blood (the use of a cell saver can be considered). Damage control principles should be followed in such cases."}], "note_html": "<b>Definition<\/b><br>This is the loss of one blood volume in a 24 hour period or the loss of 50% of the circulating blood volume in 3 hours. A blood loss of 150ml/ minute is also included. The normal adult blood volume is 7% of total adult body weight. The blood volume equates to between 8 and 9% of a child's body weight. <br><br><b>Complications of massive transfusion<\/b><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Complication<\/b><\/th><th><b>Key points<\/b><\/th><\/tr><\/thead><tbody><tr><td>Hypothermia<\/td><td>Blood is refrigerated<br>Hypothermic blood impairs homeostasis <br>Shifts Bohr curve to the left<\/td><\/tr><tr><td>Hypocalcaemia<\/td><td>Both FFP and platelets contain citrate anticoagulant, this may chelate calcium<\/td><\/tr><tr><td>Hyperkalaemia<\/td><td>Plasma of red cells stored for 4-5 weeks contains 5-10 mmol K<sup>+<\/sup><\/td><\/tr><tr><td>Delayed type transfusion reactions<\/td><td>Due to minor incompatibility issues especially if urgent or non cross matched blood used<\/td><\/tr><tr><td>Transfusion related lung injury<\/td><td>Acute onset non cardiogenic pulmonary oedema<br>Leading cause of transfusion related deaths<br>Greatest risk posed with plasma components<br>Occurs as a result of leucocyte antibodies in transfused plasma<br>Aggregation and degranulation of leucocytes in lung tissue accounts for lung injury<\/td><\/tr><tr><td>Coagulopathy<\/td><td>Anticipate once circulating blood volume transfused<br>1 blood volume usually drops platelet count to 100 or less<br>1 blood volume will both dilute and not replace clotting factors<br>Fibrinogen concentration halves per 0.75 blood volume transfused<\/td><\/tr><\/tbody><\/table><\/div><br><b>References<\/b><br>Stanworth S <i> et al<\/i>. Haematological management of major haemorrhage: a British Society for Haematology Guideline <i>British Journal of Haematology<\/i> 2022 (198): 654 to 667."}, {"name": "Midazolam", "questions": [{"number": 45, "topic": "Midazolam", "stem_html": "An 83 year old lady attends the endoscopy department for a flexible sigmoidoscopy. The endoscopist administers 7mg of intravenous midazolam for sedation. Approximately 3 minutes later the patient is noted to be hypoxic and has a respiratory rate of 5 breaths per minute. What is the most useful agent to administer at this point?", "options": [{"label_html": "Intravenous naloxone", "is_correct": false}, {"label_html": "Oral naloxone", "is_correct": false}, {"label_html": "Intravenous flumazenil", "is_correct": true}, {"label_html": "Intravenous doxapram", "is_correct": false}, {"label_html": "Nebulised adrenaline", "is_correct": false}], "correct_index": 2, "explanation_html": "Benzodiazepine overdose with marked suppression of respiratory activity should be managed with IV flumazenil."}], "note_html": "Midazolam is a short acting benzodiazepine. It is usually administered intravenously, when administered orally, dosing is less reliable. It is eliminated via the cytochrome P450 pathway in the liver. It is often used for procedural related sedation purposes. It is generally administered in doses of 2-5mg for this purpose. It is often given in combination with a short acting opiate such as fentanyl for analgesic purposes. One of the main reasons that midazolam is preferred for procedural related sedation is due to a degree of amnesia that can accompany it. If administered in excess, most patients can be managed with simple airway support measures an monitoring. However, if there is significant respiratory compromise, it can be reversed with the agent flumazenil which is a selective GABA receptor antagonist."}, {"name": "Muscle relaxants", "questions": [{"number": 46, "topic": "Muscle relaxants", "stem_html": "Which of the following muscle relaxants will tend to incite neuromuscular excitability following administration?", "options": [{"label_html": "Atracurium", "is_correct": false}, {"label_html": "Suxamethonium", "is_correct": true}, {"label_html": "Vecuronium", "is_correct": false}, {"label_html": "Pancuronium", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 1, "explanation_html": "Suxamethonium may induce generalised muscular contractions following administration. This may raise serum potassium levels."}, {"number": 47, "topic": "Muscle relaxants", "stem_html": "Which of the following muscle relaxants is an agent that is degraded by hydrolysis and may produce histamine release?", "options": [{"label_html": "Atracurium", "is_correct": true}, {"label_html": "Panciuronium", "is_correct": false}, {"label_html": "Curare", "is_correct": false}, {"label_html": "Suxamethonium", "is_correct": false}, {"label_html": "Vecuronium", "is_correct": false}], "correct_index": 0, "explanation_html": "Atracurium is degraded by a process of ester hydrolysis. This uses non specific plasma esterases."}, {"number": 48, "topic": "Muscle relaxants", "stem_html": "Which of the following agents is least suitable for a 23 year old man with burns and bilateral tibial fractures after being trapped in a car accident for 2 hours?", "options": [{"label_html": "Suxamethonium", "is_correct": true}, {"label_html": "Atracurium", "is_correct": false}, {"label_html": "Vecuronium", "is_correct": false}, {"label_html": "Pancuronium", "is_correct": false}, {"label_html": "Propofol", "is_correct": false}], "correct_index": 0, "explanation_html": "Suxamethonium may induce hyperkalaemia as it induces generalised muscular contractions. In patients with likely extensive tissue necrosis this may be sufficient to produce cardiac arrest."}, {"number": 49, "topic": "Muscle relaxants", "stem_html": "Use of which of the following muscle relaxants is least likely to result in histamine release?", "options": [{"label_html": "Atracurium", "is_correct": false}, {"label_html": "Tubocurarine", "is_correct": false}, {"label_html": "Doxacurium", "is_correct": false}, {"label_html": "Mivacurium", "is_correct": false}, {"label_html": "Suxamethonium", "is_correct": true}], "correct_index": 4, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Drugs in the tetrahydroisoquinoline such as atracurium cause histamine release. Vecuronium and suxamethonium do not do this.<\/div>"}, {"number": 50, "topic": "Muscle relaxants", "stem_html": "Which of the drugs listed below confers the greatest risk of malignant hyperthermia?", "options": [{"label_html": "Decamethonium halides", "is_correct": false}, {"label_html": "Suxamethonium", "is_correct": true}, {"label_html": "Benzquinonium", "is_correct": false}, {"label_html": "Gallamine", "is_correct": false}, {"label_html": "Vecuronium", "is_correct": false}], "correct_index": 1, "explanation_html": "Suxamethonium may cause malignant hyperthermia and 1 in 2800 will have abnormal cholinesterase enzyme and prolonged clinical effect."}, {"number": 51, "topic": "Muscle relaxants", "stem_html": "Administration of neostigmine to a patient who has received a non depolarizing muscle relaxant is most likely to result in which of the following?", "options": [{"label_html": "Prolongation of muscle relaxation", "is_correct": false}, {"label_html": "Tachycardia", "is_correct": false}, {"label_html": "Hypertension", "is_correct": false}, {"label_html": "Bradycardia", "is_correct": true}, {"label_html": "Decreased gut peristalsis", "is_correct": false}], "correct_index": 3, "explanation_html": "Neostigmine can cause bradycardia and atropine is often administered concomitantly to counter this effect."}], "note_html": "<div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Suxamethonium<\/b><\/td><td><ul><li>Depolarising neuromuscular blocker<\/li><li>Inhibits action of acetylcholine at the neuromuscular junction<\/li><li>Degraded by plasma cholinesterase and acetylcholinesterase (affected by lack of acetylcholinesterase)<\/li><li>Fastest onset and shortest duration of action of all muscle relaxants<\/li><li>Produces generalised muscular contraction prior to paralysis<\/li><li>Adverse effects include hyperkalaemia, malignant hyperthermia, delayed recovery<\/li><\/ul><\/td><\/tr><tr><td><b>Atracurium<\/b><\/td><td><ul><li>Non depolarising neuromuscular blocking drug<\/li><li>Duration of action usually 30-45 minutes<\/li><li>Generalised histamine release on administration may produce facial flushing, tachycardia and hypotension<\/li><li>Not excreted by liver or kidney, broken down in tissues by hydrolysis<\/li><li>Reversed by neostigmine<\/li><\/ul><\/td><\/tr><tr><td><b>Vecuronium<\/b><\/td><td><ul><li>Non depolarising neuromuscular blocking drug<\/li><li>Duration of action approximately 30 - 40 minutes<\/li><li>Degraded by liver and kidney and effects prolonged in organ dysfunction<\/li><li>Effects may be reversed by neostigmine<\/li><\/ul><\/td><\/tr><tr><td><b>Pancuronium<\/b><\/td><td><ul><li>Non depolarising neuromuscular blocker<\/li><li>Onset of action approximately 2-3 minutes<\/li><li>Duration of action up to 2 hours<\/li><li>Effects may be partially reversed with drugs such as neostigmine<\/li><\/ul><\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Neuromuscular blocking drugs", "questions": [{"number": 52, "topic": "Neuromuscular blocking drugs", "stem_html": "A 45 year old man undergoes a general anaesthetic and a depolarising muscle relaxation agent is used. At the conclusion of the procedure which comprises the removal of a small simple skin lesion, the patient does not resume spontaneous respiration. A deficiency in which of the enzymes listed below is likely to account for this process?", "options": [{"label_html": "P450 cytochrome oxidase", "is_correct": false}, {"label_html": "Lipase", "is_correct": false}, {"label_html": "Catalase", "is_correct": false}, {"label_html": "Glucose-6-phosphate dehydrogenase", "is_correct": false}, {"label_html": "Pseudocholinesterase", "is_correct": true}], "correct_index": 4, "explanation_html": "<p>No explanation provided.<\/p>"}], "note_html": "These drugs work by preventing acetylcholine interacting with the post synaptic (nicotinic) receptors on the motor end plate of skeletal muscle. They are described as being either depolarising or non depolarising according to their mode of action. <br><br><b>Depolarising neuromuscular blocking drugs<\/b><br>Suxamethonium is the only commonly used drug in this category. Following injection there is a brief period of muscular fasciculation as the membrane is depolarised followed by paralysis. Recovery occurs spontaneously as the suxamethonium is hydrolysed by the enzyme plasma pseudocholinesterase. This process typically takes 4-6 minutes. <br>Suxamethonium has a number of important side effects which include malignant hyperpyrexia in susceptible patients, increased intra ocular pressure, prolonged apoea in those with pseudocholinesterase deficiency, a rise in serum potassium (which is most marked in burns and crush injury patients).<br><br><b>Pseudocholinesterase deficiency<\/b><br>Approximately 50 in 1000 will have slightly reduced enzyme activity and the paralysis effects may last for up to 20 minutes. In those with true and complete enzyme deficiency the apnoea can lasts for up to 2 hours, the incidence of this is &lt;1 per 1000. Patients who display an enzyme lack will require prolonged ventillatory support subsequently and should be warned of this. This should then be clearly recorded in patient notes.<br><br><b>Non depolarising neuromuscular blocking drugs<\/b><br>These drugs compete with acetylcholine and block its access at the post synaptic receptor sites on the muscle. They do not cause depolarisation. They have a slower duration of onset and a longer duration of action than suxamethonium. In many cases an anticholinesterase may be administered to hasten recovery. This results in an increase in acetylcholine at the receptor site which then competes with the paralysing drug at the receptor site. Reversal drugs are not administered until there is some evidence of returning neuromuscular function to avoid rebound paralysis following recovery from anaesthesia. An antimuscarinic drug is used concomitantly with reversal agents to avoid the parsympathetic surge that would otherwise accompany a rise in AcH levels at the parasympathetic receptors with associated bradycardia and salivation.  Neostigmine is the reversal agent in common use and it is often administered with atropine or glycopyrrolate to avoid the adverse effects outline above."}, {"name": "Neuropathic pain", "questions": [{"number": 53, "topic": "Neuropathic pain", "stem_html": "A 73 year old man undergoes a right below knee amputation for end stage peripheral vascular disease.  He is reviewed in the clinic 8 weeks post operatively and complains of a persistent, burning discomfort over his amputation site stump.  On examination, his wound has healed and proximal pulses have a biphasic signal on doppler ultrasound.  What is the most appropriate management?", "options": [{"label_html": "Commence amitryptyline", "is_correct": true}, {"label_html": "Commence fentanyl patch", "is_correct": false}, {"label_html": "Arrange duplex scan", "is_correct": false}, {"label_html": "Arrange MRI scan of the stump", "is_correct": false}, {"label_html": "Commence carbamazepine", "is_correct": false}], "correct_index": 0, "explanation_html": "This patient has neuropathic pain.  Amitryptyline is the treatment of choice.  Carbamazepine is mainly used for trigeminal neuralgia."}], "note_html": "Neuropathic pain may be defined as pain which arises following damage or disruption of the nervous system. It is often difficult to treat and responds poorly to standard analgesia.<br><br>Examples include:<br><ul><li>diabetic neuropathy<\/li><li>post-herpetic neuralgia<\/li><li>trigeminal neuralgia<\/li><li>prolapsed intervertebral disc<\/li><\/ul><br>NICE issued guidance in 2010 on the management of neuropathic pain:<br><ul><li>first-line treatment*: oral amitriptyline or pregabalin<\/li><li>if satisfactory pain reduction is obtained with amitriptyline but the person cannot tolerate the adverse effects, consider oral imipramine or nortriptyline as an alternative<\/li><li>second-line treatment: if first-line treatment was with amitriptyline, switch to or combine with pregabalin. If first-line treatment was with pregabalin, switch to or<\/li><\/ul>combine with amitriptyline<br><ul><li>other options: pain management clinic, tramadol (not other strong opioids), topical lidocaine for localised pain if patients unable to take oral medication<\/li><\/ul><br>*please note that for some specific conditions the guidance may vary. For example carbamazepine is used first-line for trigeminal neuralgia, duloxetine for diabetic neuropathy"}, {"name": "Nutrition Monitoring-NICE guidelines", "questions": [{"number": 54, "topic": "Nutrition Monitoring-NICE guidelines", "stem_html": "Which of the following statements relating to use of total parenteral nutrition is untrue?", "options": [{"label_html": "It may cause steatosis and derangement of liver function tests", "is_correct": false}, {"label_html": "Administration via a central line or PICC line is preferable to peripheral administration", "is_correct": false}, {"label_html": "It is highly irritant to vessel walls", "is_correct": false}, {"label_html": "It should be administered when a patient has an albumin less than15", "is_correct": true}, {"label_html": "Administration of TPN for periods of less than 1 week is unlikely to produce noticable benefits", "is_correct": false}], "correct_index": 3, "explanation_html": "Albumin is a poor indicator of overall nutrition and the decision to start TPN should not be based on this parameter alone. Patients should ideally be fed enterally where possible and if this is likely to occur within 5-7 days then starting TPN is unlikely to confer benefit."}, {"number": 55, "topic": "Nutrition Monitoring-NICE guidelines", "stem_html": "Which of the following does not need monitoring during home parenteral nutritional support?", "options": [{"label_html": "Folate levels", "is_correct": false}, {"label_html": "Zinc levels", "is_correct": false}, {"label_html": "Vitamin D", "is_correct": false}, {"label_html": "Thyroid function", "is_correct": true}, {"label_html": "Bone densitometry", "is_correct": false}], "correct_index": 3, "explanation_html": "<p>No explanation provided.<\/p>"}], "note_html": "<ul><li>Weight: daily if fluid balance concerns, otherwise weekly reducing to monthly<\/li><li>BMI: at start of feeding and then monthly<\/li><li>If weight cannot be obtained: monthly mid arm circumference or triceps skin fold thickness<\/li><li>Daily electrolytes until levels stable.  Then once or twice a week.<\/li><li>Weekly glucose, phosphate, magnesium, LFTs, Ca, albumin, FBC, MCV <\/li><\/ul>levels if stable<br><ul><li>2-4 weekly Zn, Folate, B12 and Cu levels if stable<\/li><li>3-6 monthly iron and ferritin levels, manganese (if on home parenteral regime)<\/li><li>6 monthly vitamin D<\/li><li>Bone densitometry initially on starting home parenteral nutrition then every 2 years<\/li><\/ul>"}, {"name": "Nutrition prescriptions", "questions": [{"number": 56, "topic": "Nutrition prescriptions", "stem_html": "A 50 year old male who weighs 70Kg is severely unwell with intestinal failure and cannot receive enteral nutrition. He has become malnourished and the decision is made to commence total parenteral nutrition. What is the most appropriate initial dose of calories which should be administered via this route over 24 hours?", "options": [{"label_html": "700 Kcal", "is_correct": true}, {"label_html": "2000 Kcal", "is_correct": false}, {"label_html": "3000 Kcal", "is_correct": false}, {"label_html": "500 Kcal", "is_correct": false}, {"label_html": "2500 Kcal", "is_correct": false}], "correct_index": 0, "explanation_html": "As this person is severely ill and malnourished, the initial calories administered is reduced by 50% in the first few days."}], "note_html": "<b> National institute of clinical excellence (NICE) guidelines<\/b><br><br><b>For people not severely ill and not at risk of refeeding syndrome aim to give<\/b><br><ul><li>25-35 kcal/kg/day (lower if BMI &gt; 25)<\/li><li>0.8-1.5g protein /kg/day<\/li><li>30-35 ml fluid/kg/day<\/li><li>Adequate electrolytes, minerals, vitamins<\/li><li>Severely ill patients aim to give &lt; 50% of the energy and protein levels over the first 24-48h.<\/li><\/ul><br><b>For people at high risk of refeeding syndrome:<\/b><br><ul><li>Start at up to 10 kcal/kg/day increasing to full needs over 4-7 days<\/li><li>Start immediately before and during feeding:  oral thiamine 200-300mg/day, vitamin B co strong 1 tds and supplements<\/li><li>Give K<sup>+<\/sup> (2-4 mmol/kg/day), phosphate (0.3-0.6 mmol/kg/day), magnesium (0.2-0.4 mmol/kg/day)<\/li><\/ul>"}, {"name": "Oral Nutrition", "questions": [{"number": 57, "topic": "Oral Nutrition", "stem_html": "A 52 year old man is recovering following an elective right hemicolectomy for carcinoma of the caecum. His surgery is uncomplicated, when should oral intake resume?", "options": [{"label_html": "Only once bowels have been opened to stool", "is_correct": false}, {"label_html": "Only once the patient has passed flatus", "is_correct": false}, {"label_html": "Between 24 and 48 hours of surgery", "is_correct": false}, {"label_html": "More than 48 hours after surgery", "is_correct": false}, {"label_html": "Within 24 hours of surgery", "is_correct": true}], "correct_index": 4, "explanation_html": "As part of the enhanced recovery principles oral intake in this setting should resume soon after surgery. Administration of liquid and even light diet does not increase the risk of anastomotic leak."}], "note_html": "<b>Oral nutrition: a summary of NICE guidelines<\/b><br><ul><li>Identify patients who are or at risk of being malnourished  (see below for definitions)<\/li><li>Check for dysphagia<\/li><li>If safe swallow, provide food and fluid in adequate quantity and quality<\/li><li>Give a balanced diet<\/li><li>Offer multivitamins and minerals<\/li><\/ul><br>Surgical patients: <br><ul><li>If malnourished and safe swallow and post op caesarean, gynaecological or abdominal surgery, aim for oral intake within 24h<\/li><\/ul><br>Patients identified as being malnourished:<br><ul><li>BMI &lt; 18.5 kg/m<sup>2<\/sup><\/li><li>unintentional weight loss of &gt; 10% over 3-6/12<\/li><li>BMI &lt; 20 kg/m<sup>2<\/sup> and unintentional weight loss of &gt; 5% over 3-6/12<\/li><\/ul><br>AT RISK of malnutrition:<br><ul><li>eaten nothing or little &gt; 5 days, who are likely to eat little for a further 5 days<\/li><li>poor absorptive capacity<\/li><li>high nutrient losses<\/li><li>high metabolism<\/li><\/ul>"}, {"name": "Parenteral feeding-NICE guidelines", "questions": [{"number": 58, "topic": "Parenteral feeding-NICE guidelines", "stem_html": "A 28 year old man with Crohn's disease has undergone a number of resections. His BMI is currently 18 and his albumin is 18. He feels well but does have a small localised perforation of his small bowel. The gastroenterologists are giving azathioprine. What is the most appropriate advice regarding feeding?", "options": [{"label_html": "Nil by mouth", "is_correct": false}, {"label_html": "Nil by mouth and continuous intra venous fluids until surgery", "is_correct": false}, {"label_html": "Enteral feeding", "is_correct": false}, {"label_html": "Parenteral feeding", "is_correct": true}, {"label_html": "Nutritional supplements", "is_correct": false}], "correct_index": 3, "explanation_html": "This man is malnourished, although he is likely to require surgery it is best for him to be nutritionally optimised first. As he may have reduced surface area for absorption and has a localised perforation TPN is likely to be the best feeding modality."}, {"number": 59, "topic": "Parenteral feeding-NICE guidelines", "stem_html": "A 28 year old man with poorly controlled Crohns disease is nutritionally compromised. The decision is made to start TPN, via which of the following routes should it be best administered?", "options": [{"label_html": "Internal jugular vein via a central venous catheter", "is_correct": true}, {"label_html": "Internal carotid artery", "is_correct": false}, {"label_html": "Cephalic vein via peripheral cannula", "is_correct": false}, {"label_html": "Basilic vein via peripheral cannula", "is_correct": false}, {"label_html": "Common femoral vein via a central venous catheter", "is_correct": false}], "correct_index": 0, "explanation_html": "Since TPN solutions are irritant to veins they are best administered via a central line. The femoral route has a higher incidence of line associated sepsis and is thus best avoided in this setting."}], "note_html": "<b>Parenteral nutrition: NICE guidelines summary<\/b><br><br><b>Identify patients as malnourished or at risk<\/b><br><br>Patients identified as being malnourished-<br><ul><li>BMI &lt; 18.5 kg/m<sup>2<\/sup><\/li><li>unintentional weight loss of &gt; 10% over 3-6/12<\/li><li>BMI &lt; 20 kg/m<sup>2<\/sup> and unintentional weight loss of &gt; 5% over 3-6/12<\/li><\/ul><br>AT RISK of malnutrition-<br><ul><li>eaten nothing or little &gt; 5 days, who are likely to eat little for a further 5 days<\/li><li>poor absorptive capacity<\/li><li>high nutrient losses<\/li><li>high metabolism<\/li><\/ul><br><b>Identify unsafe/inadequate oral intake OR a non functional GI tract/perforation/inaccessible<\/b><br><br><b>Consider parenteral nutrition:<\/b><br><ul><li>for feeding &lt; 14 days consider feeding via a peripheral venous catheter<\/li><li>for feeding &gt; 30 days use a tunneled subclavian line<\/li><li>continuous administration in severely unwell patients<\/li><li>if feed needed &gt; 2 weeks consider changing from continuous to cyclical feeding<\/li><li>don't give &gt; 50% of daily regime to unwell patients in first 24-48 hours<\/li><\/ul><br>Surgical patients:  if malnourished with unsafe swallow OR a non functional GI tract/perforation/inaccessible then consider peri operative parenteral feeding."}, {"name": "Post operative fluid management", "questions": [{"number": 60, "topic": "Post operative fluid management", "stem_html": "A 24 year old man is recovering from a right hemicolectomy for Crohns disease. He is oliguric and dehydrated owing to a high output ileostomy. His electrolytes are normal. Which of the following intravenous fluids should be administered?", "options": [{"label_html": "0.9% sodium chloride", "is_correct": false}, {"label_html": "Hartmanns solution", "is_correct": true}, {"label_html": "0.45% sodium chloride", "is_correct": false}, {"label_html": "5% dextrose", "is_correct": false}, {"label_html": "10% dextrose", "is_correct": false}], "correct_index": 1, "explanation_html": "Of the solutions given Hartmans is the most suitable. Consideration should also be given to potassium supplementation."}, {"number": 61, "topic": "Post operative fluid management", "stem_html": "A 23 year old man is recovering from an appendicectomy. The operation was complicated by the presence of perforation. He is now recovering on the ward. However, his urine output is falling and he has been vomiting. Which of the following intravenous fluids should be initially administered, pending analysis of his urea and electrolyte levels?", "options": [{"label_html": "Hartmans solution", "is_correct": true}, {"label_html": "Dextran 70", "is_correct": false}, {"label_html": "Pentastarch", "is_correct": false}, {"label_html": "Gelofusin", "is_correct": false}, {"label_html": "5% Dextrose", "is_correct": false}], "correct_index": 0, "explanation_html": "He will have sequestration of electrolyte rich fluids in the abdomen and gut lumen. These are best replaced by use of Hartmans solution in the first instance."}, {"number": 62, "topic": "Post operative fluid management", "stem_html": "A 17 year old man undergoes an elective right hemicolectomy. Post operatively he receives a total of 6 litres of 0.9% sodium chloride solution, over 24 hours. Which of the following complications may ensue?", "options": [{"label_html": "Hyperchloraemic acidosis", "is_correct": true}, {"label_html": "Hypochloraemic alkalosis", "is_correct": false}, {"label_html": "Hyperchloraemic alkalosis", "is_correct": false}, {"label_html": "Acute renal failure", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 0, "explanation_html": "Normal saline has a higher chloride content (154 mEq/L) compared to plasma. The administration of large volumes of saline can result in specific metabolic disturbances: Hyperchloremic acidosis: This is a common complication associated with the infusion of large volumes of normal saline. The excess chloride disrupts the normal balance between sodium and chloride ions, which can reduce the strong ion difference and lead to a non-anion gap metabolic acidosis. This condition is characterized by a normal anion gap (difference between the concentrations of serum sodium and the sum of chloride and bicarbonate) but decreased serum bicarbonate due to the dilution and relative increase in chloride. Hypochloremic alkalosis: This condition would generally be seen in scenarios involving excessive loss of chloride, such as through gastric suctioning or chronic vomiting, not from saline infusion which actually increases chloride levels. Hyperchloremic alkalosis: This term is contradictory in terms, as hyperchloremia typically leads to acidosis, not alkalosis, because of the reasons explained above regarding the impact of chloride on acid-base balance. Acute renal failure: While not directly caused by hyperchloremic acidosis, excessive infusion of fluids, especially in the context of other underlying conditions or surgical complications, could contribute to fluid overload. However, acute renal failure wouldn’t be a direct consequence of hyperchloremia alone unless other factors such as hypotension, nephrotoxic agents, or sepsis were also present. Given these options and the clinical context, the most likely complication from receiving a total of 6 liters of 0.9% sodium chloride solution over 24 hours is Hyperchloremic acidosis. This condition arises due to the high chloride content relative to sodium in normal saline, leading to acid-base balance disruptions as described."}, {"number": 63, "topic": "Post operative fluid management", "stem_html": "A 34 year old man is suffering from septic shock and receives an infusion of Dextran 70. Which of the following complications may potentially ensue?", "options": [{"label_html": "Anaphylaxis", "is_correct": true}, {"label_html": "Vomiting", "is_correct": false}, {"label_html": "Acute hepatic failure", "is_correct": false}, {"label_html": "Digital necrosis", "is_correct": false}, {"label_html": "Deep vein thrombosis", "is_correct": false}], "correct_index": 0, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Dextran 40 and 70 have higher incidence of anaphylaxis than either gelatins or starches.<\/div>Dextrans are branched polysaccharide molecules. Dextran 40 and 70 are available. The higher molecular weight dextran 70 may persist for up to 8 hours. They inhibit platelet aggregation and leucocyte plugging in the microcirculation. Thereby improving flow through the microcirculation, primarily of use in sepsis.<br>Unlike many other intravenous fluids Dextrans are a recognised cause of anaphylaxis."}], "note_html": "<b>Composition of commonly used intravenous fluids mmol<sup>-1<\/sup><\/b><br><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><\/td><td><b>Na<\/b><\/td><td><b>K<\/b><\/td><td><b>Cl<\/b><\/td><td><b>Bicarbonate<\/b><\/td><td><b>Lactate<\/b><\/td><\/tr><tr><td>Plasma<\/td><td>137-147<\/td><td>4-5.5<\/td><td>95-105<\/td><td>22-25<\/td><td>-<\/td><\/tr><tr><td>0.9% Saline<\/td><td>153<\/td><td>-<\/td><td>153<\/td><td>-<\/td><td>-<\/td><\/tr><tr><td>Dextrose / saline<\/td><td>30.6<\/td><td>-<\/td><td>30.6<\/td><td>-<\/td><td>-<\/td><\/tr><tr><td>Hartmans<\/td><td>130<\/td><td>4<\/td><td>110<\/td><td>-<\/td><td>28<\/td><\/tr><\/tbody><\/table><\/div><br><br><b>Post operative fluid management<\/b><br>In the UK the GIFTASUP and NICE (CG174 2017) guidelines (see reference below) were devised to try and provide some consensus guidance as to how intravenous fluids should be administered. Some time ago it was a commonly held belief that little harm would occur as a result of excessive administration of normal saline and many oliguric post operative patients received enormous quantities of IV fluids. As a result they developed hyperchloraemic acidosis. With greater understanding of this potential complication, the use of electrolyte balanced solutions (Ringers lactate/ Hartmans) is now favored over normal saline. <br>The other guidance includes:<br><ul><li>Fluids given should be documented clearly and easily available<\/li><li>Assess the patient's fluid status when they leave theatre<\/li><li>If a patient is haemodynamically stable and euvolaemic, aim to restart oral fluid intake as soon as possible<\/li><li>Review patients whose urinary sodium is  &lt; 20<\/li><li>If a patient is oedematous, hypovolaemia if present should be treated first.  This should then be followed by a negative balance of sodium and water, monitored using urine Na excretion levels<\/li><li>Solutions such as Dextran 70 should be used in caution in patients with sepsis as there is a risk of developing acute renal injury<\/li><\/ul><br><b>References<\/b><br>NICE guidance CG174. Intravenous fluid therapy in adults. May 2017.<br>NICE guidance NG29. Intravenous fluid therapy in children and young people in hospital (2020)<br>British Consensus Guidelines on Intravenous Fluid Therapy for Adult Surgical Patients. GIFTASUP (2009)"}, {"name": "Postoperative cognitive dysfunction management", "questions": [{"number": 64, "topic": "Postoperative cognitive dysfunction management", "stem_html": "Which statement regarding post operative cognitive impairment is true?", "options": [{"label_html": "Use of Benzodiazepines preoperatively (in those already taking them long term) reduces post operative cognitive dysfunction", "is_correct": true}, {"label_html": "Pain does not cause delirium", "is_correct": false}, {"label_html": "Delirium has no impact on length of hospital stay", "is_correct": false}, {"label_html": "A regional anaesthetic rather than a general anaesthetic is more likely to contribute to post operative cognitive impairment", "is_correct": false}, {"label_html": "Visual hallucinations are not a feature of delirium", "is_correct": false}], "correct_index": 0, "explanation_html": "Anaesthetic technique and Post operative cognitive impairment (POCD):<br>Use of benzodiazepines preoperatively reduces long-term POCD (9.9% vs. 5%) <br>Do not stop drugs for cognitive function<br>Regional techniques reduce POCD in first week, but no difference at 3 months<br><i>References<\/i><br>Fines DP &amp; Severn A.  Anaesthesia and cognitive disturbance in the elderly Continuing Education in Anaesthesia, Critical Care &amp; Pain 2006 6(1):37-40"}], "note_html": "<b>Definition<\/b><br><ul><li>Deterioration in performance in a battery of neuropsychological tests that would be expected in &lt; 3.5% of controls<\/li><\/ul>Or<br><ul><li>Long term, possibly permanent disabling deterioration in cognitive function following surgery<\/li><\/ul><br><b>Early POCD<\/b><br><ul><li>Increasing age<\/li><li>GA rather than regional<\/li><li>Duration of anaesthesia<\/li><li>Reoperation<\/li><li>Postoperative infection<\/li><\/ul><br><b>Late POCD<\/b><br><ul><li>Increasing age<\/li><li>Emboli<\/li><li>Biochemical disturbances<\/li><\/ul>"}, {"name": "Pulmonary artery occlusion pressure monitoring", "questions": [{"number": 65, "topic": "Pulmonary artery occlusion pressure monitoring", "stem_html": "A 45 year old man is admitted to the intensive care unit following a laparotomy. He has a central line, pulmonary artery catheter and arterial lines inserted. The following results are obtained:<br><div class=\"table-responsive\"><table class=\"tb\"><tbody><tr><td><b>Pulmonary artery occlusion pressure<\/b><\/td><td><b>Cardiac output<\/b><\/td><td><b>Systemic vascular resistance<\/b><\/td><\/tr><tr><td>Low<\/td><td>Low<\/td><td>High<\/td><\/tr><\/tbody><\/table><\/div>What is the most likely interpretation of this?", "options": [{"label_html": "Normal", "is_correct": false}, {"label_html": "Cardiogenic shock", "is_correct": false}, {"label_html": "Septic shock", "is_correct": false}, {"label_html": "Fluid overload", "is_correct": false}, {"label_html": "Hypovolaemia", "is_correct": true}], "correct_index": 4, "explanation_html": "Cardiac output is lowered in hypovolaemia due to decreased preload."}, {"number": 66, "topic": "Pulmonary artery occlusion pressure monitoring", "stem_html": "A 75 year old man is admitted to the intensive care unit following a laparotomy. He has a central line, pulmonary artery catheter and arterial lines inserted. The following results are obtained:<br><div class=\"table-responsive\"><table class=\"tb\"><tbody><tr><td><b>Pulmonary artery occlusion pressure<\/b><\/td><td><b>Cardiac output<\/b><\/td><td><b>Systemic vascular resistance<\/b><\/td><\/tr><tr><td>High<\/td><td>Low<\/td><td>High<\/td><\/tr><\/tbody><\/table><\/div>How may these findings be best interpreted?", "options": [{"label_html": "Hypovolaemia", "is_correct": false}, {"label_html": "Normal", "is_correct": false}, {"label_html": "Neurogenic shock", "is_correct": false}, {"label_html": "Septic shock", "is_correct": false}, {"label_html": "Cardiogenic shock", "is_correct": true}], "correct_index": 4, "explanation_html": "In cardiogenic shock pulmonary pressures are often high. This is the basis for the use of venodilators in the treatment of pulmonary oedema."}, {"number": 67, "topic": "Pulmonary artery occlusion pressure monitoring", "stem_html": "A 22 year old lady is admitted to the intensive care unit following a laparotomy. She has a central line, pulmonary artery catheter and arterial lines inserted. The following results are obtained:<br><div class=\"table-responsive\"><table class=\"tb\"><tbody><tr><td><b>Pulmonary artery occlusion pressure<\/b><\/td><td><b>Cardiac output<\/b><\/td><td><b>Systemic vascular resistance<\/b><\/td><\/tr><tr><td>Low<\/td><td>High<\/td><td>Low<\/td><\/tr><\/tbody><\/table><\/div>How may these findings be best interpreted?", "options": [{"label_html": "Hypovolaemia", "is_correct": false}, {"label_html": "Septic shock", "is_correct": true}, {"label_html": "Normal", "is_correct": false}, {"label_html": "Fluid overload", "is_correct": false}, {"label_html": "Cardiogenic shock", "is_correct": false}], "correct_index": 1, "explanation_html": "Decreased SVR is a major feature of sepsis. A hyperdynamic circulation is often present. This is the reason for the use of vasoconstrictors."}], "note_html": "The pulmonary artery occlusion pressure  is an indirect measure of left atrial pressure, and thus filling pressure of the left heart. The low resistance within the pulmonary venous system allows this useful measurement to be made. The most accurate trace is made by inflating the balloon at the catheter tip and 'floating' it so that it occludes the vessel. If it is not possible to occlude the vessel in this way then the measurement gained will be the pulmonary artery end diastolic pressure.<br><br><b>Interpretation of PAOP<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>PAOP<\/b><\/td><td><b>mmHg<\/b><\/td><td><b>Scenario<\/b><\/td><\/tr><tr><td>Normal<\/td><td>8-12<\/td><td><\/td><\/tr><tr><td>Low<\/td><td>&lt;5<\/td><td>Hypovolaemia<\/td><\/tr><tr><td>Low with pulmonary oedema<\/td><td>&lt;5<\/td><td>ARDS<\/td><\/tr><tr><td>High<\/td><td>&gt;18<\/td><td>Overload<\/td><\/tr><\/tbody><\/table><\/div><br>When combined with measurements of systemic vascular resistance and cardiac output it is possible to accurately classify patients.<br><br><b>Systemic vascular resistance<\/b><br>Derived from aortic pressure, right atrial pressure and cardiac output.<br><br>SVR=80(mean aortic pressure-mean right atrial pressure)/cardiac output"}, {"name": "Pulmonary embolism: investigation", "questions": [{"number": 68, "topic": "Pulmonary embolism: investigation", "stem_html": "A 54-year-old man is admitted for an elective hip replacement. Three days post operatively you suspect he has had a pulmonary embolism. He has no past medical history of note. Blood pressure is 120/80 mmHg with a pulse of 90/min. The chest x-ray is normal. Following treatment with low-molecular weight heparin, what is the most appropriate initial lung imaging investigation to perform?", "options": [{"label_html": "Pulmonary angiography", "is_correct": false}, {"label_html": "Echocardiogram", "is_correct": false}, {"label_html": "MRI thorax", "is_correct": false}, {"label_html": "Ventilation-perfusion scan", "is_correct": false}, {"label_html": "Computed tomographic pulmonary angiography", "is_correct": true}], "correct_index": 4, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">CTPA is the first line investigation for PE according to current BTS guidelines<\/div>Current UK NICE guidance supports CTPA as first line investigation now. Pulmonary angiography is of course the 'gold standard' but this is not what the question asks for"}], "note_html": "UK 2020 NICE guidance endorses CTPA is most cases of suspected PE.<br><br>Key points from the guidelines include:<br><ul><li>computed tomographic pulmonary angiography (CTPA) is now the recommended initial lung-imaging modality for non-massive PE. Advantages compared to V/Q scans include speed, easier to perform out-of-hours, a reduced need for further imaging and the possibility of providing an alternative diagnosis if PE is excluded <\/li><li>if the CTPA is negative then patients do not need further investigations or treatment for PE<\/li><li>ventilation-perfusion scanning may be used initially if appropriate facilities exist, the chest x-ray is normal, and there is no significant symptomatic concurrent cardiopulmonary disease<\/li><\/ul><br><b>Some other points<\/b><br>Clinical probability scores based on risk factors and history and now widely used to help decide on further investigation/management<br><br>D-dimers<br><ul><li>sensitivity = 95-98%, but poor specificity<\/li><\/ul><br>V/Q scan<br><ul><li>sensitivity = 98%; specificity = 40% - high negative predictive value, i.e. if normal virtually excludes PE<\/li><li>other causes of mismatch in V/Q include old pulmonary embolisms, AV malformations, vasculitis, previous radiotherapy<\/li><li>COPD gives matched defects<\/li><\/ul><br>CTPA<br><ul><li>peripheral emboli affecting subsegmental arteries may be missed<\/li><\/ul><br>Pulmonary angiography<br><ul><li>the gold standard<\/li><li>significant complication rate compared to other investigations<\/li><\/ul>"}, {"name": "Pulmonary function tests", "questions": [{"number": 69, "topic": "Pulmonary function tests", "stem_html": "You are the cardiothoracic surgical registrar reviewing a patient referred for an aortic valve replacement.  The 40-year-old man is being investigated for progressive breathlessness in a previous respiratory clinic. The notes show he has smoked for the past 25 years. Pulmonary function tests reveal the following:<br><br><div class=\"table-responsive\"><table class=\"tb\"><tbody><tr><td>FEV1<\/td><td>1.4 L<\/td><\/tr><tr><td>FVC<\/td><td>1.7 L<\/td><\/tr><tr><td>FEV1/FVC<\/td><td>82%<\/td><\/tr><\/tbody><\/table><\/div><br>What is the most likely explanation?", "options": [{"label_html": "Asthma", "is_correct": false}, {"label_html": "Bronchiectasis", "is_correct": false}, {"label_html": "Kyphoscoliosis", "is_correct": true}, {"label_html": "Chronic obstructive pulmonary disease", "is_correct": false}, {"label_html": "Laryngeal malignancy", "is_correct": false}], "correct_index": 2, "explanation_html": "These results show a restrictive picture, which may result from a number of conditions including kyphoscoliosis. The other answers cause an obstructive picture.<br><br>We note that most people have chosen COPD as the answer.  In COPD the FEV1/FVC would show an obstructive picture with the FEV1/FVC value being low (approximately less than 70%).  In restrictive conditions the FEV1/FVC is normal or increased (greater than 70%).  With the FEV1/FVC being over 70% the most likely answer is kyphoscoliosis."}], "note_html": "Pulmonary function tests can be used to determine whether a respiratory disease is obstructive or restrictive. The table below summarises the main findings and gives some example conditions:<br><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Obstructive lung disease<\/b><\/td><td><b>Restrictive lung disease<\/b><\/td><\/tr><tr><td>FEV1 - significantly reduced<br>FVC - reduced or normal <br>FEV1% (FEV1/FVC) - reduced (less than approx. 70%)<\/td><td>FEV1 - reduced<br>FVC - significantly reduced<br>FEV1% (FEV1/FVC) - normal or increased (over approx. 70%)<\/td><\/tr><tr><td>Asthma<br>COPD<br>Bronchiectasis<br>Bronchiolitis obliterans<\/td><td>Pulmonary fibrosis<br>Asbestosis<br>Sarcoidosis<br>Acute respiratory distress syndrome<br>Infant respiratory distress syndrome<br>Kyphoscoliosis<br>Neuromuscular disorders<\/td><\/tr><\/tbody><\/table><\/div><br>If you would like to read more about pulmonary function tests, here is a link that may be useful:<br><br><i>Interpreting pulmonary function tests: Recognize the pattern, and the diagnosis will follow<\/i> http://www.ccjm.org/content/70/10/866.full.pdf"}, {"name": "Severe infections", "questions": [{"number": 70, "topic": "Severe infections", "stem_html": "Which of the variables listed below is not considered in the sequential organ failure assessment (SOFA) tool?", "options": [{"label_html": "Bilirubin", "is_correct": false}, {"label_html": "Urea", "is_correct": true}, {"label_html": "Mean arterial pressure", "is_correct": false}, {"label_html": "Platelet count", "is_correct": false}, {"label_html": "Creatinine", "is_correct": false}], "correct_index": 1, "explanation_html": "Urea is not one of the variables considered."}], "note_html": "Sepsis is a multifaceted syndrome which arises as a result of an infective process. Historically, the main focus was on the pro-inflammatory nature of the process, accordingly, 2 of the 4 SIRS criteria were related solely to inflammatory excesses. More modern systems take into account the fact that some of the effects of sepsis are suppressive from an immunological perspective and effects on organ function can be widespread. Sepsis is now defined as life-threatening organ dysfunction caused by a dysregulated host response to infection. This new definition emphasizes the primacy of the non homeostatic host response to infection, the potential lethality that is considerably in excess of a straightforward infection, and the need for urgent recognition. To help identify and categorise patients the Sequential (Sepsis-Related) Organ Failure Assessment Score (SOFA) is increasingly used. The score grades abnormality by organ system and accounts for clinical interventions. However, laboratory variables, namely, PaO<sub>2<\/sub>, platelet count, creatinine level, and bilirubin level, are needed for full computation.<br><br><b>SOFA Score<\/b><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>System<\/b><\/th><th><b>Score 0<\/b><\/th><th><b>Score 1<\/b><\/th><th><b>Score 2<\/b><\/th><th><b>Score 3<\/b><\/th><th><b>Score 4<\/b><\/th><\/tr><\/thead><tbody><tr><td>PaO<sub>2<\/sub> /FI O<sub>2<\/sub><\/td><td>&gt;400<\/td><td>&lt;400<\/td><td>&lt;300<\/td><td>&lt;200<\/td><td>&lt;100<\/td><\/tr><tr><td>Platelets x10<sup>3<\/sup> microlitres<\/td><td>&gt;150<\/td><td>&lt;150<\/td><td>&lt;100<\/td><td>&lt;50<\/td><td>&lt;20<\/td><\/tr><tr><td>Bilirubin micro Mol/L<\/td><td>20<\/td><td>20-32<\/td><td>33-101<\/td><td>102-204<\/td><td>&gt;204<\/td><\/tr><tr><td>Cardiovascular<\/td><td>MAP &gt;70mmHg<\/td><td>MAP 70mmHg<\/td><td>Dopamine &lt;5 or dobutamine (any dose)<\/td><td>Dopamine 5.1-15<br>or epinephrine 0.1<br>or norepinephrine 0.1<\/td><td>Dopamine &gt;15 or<br>epinephrine &gt;0.1<br>or norepinephrine &gt;0.1<\/td><\/tr><tr><td>GCS<\/td><td>15<\/td><td>13-14<\/td><td>10-12<\/td><td>6-9<\/td><td>&lt;6<\/td><\/tr><tr><td>Creatinine micro mol/L<\/td><td>&lt;110<\/td><td>110-170<\/td><td>171-299<\/td><td>300-440<\/td><td>&gt;440<\/td><\/tr><tr><td>Urine output ml/day<\/td><td>&gt;500<\/td><td>&gt;500<\/td><td>&gt;500<\/td><td>&lt;500<\/td><td>&lt;200<\/td><\/tr><\/tbody><\/table><\/div><br>A SOFA score of 2 or more reflects an overall mortality risk of approximately 10% in a general hospital population with suspected infection. Even patients presenting with modest dysfunction can deteriorate further, emphasizing the seriousness of this condition and the need for prompt and appropriate intervention, if not already being instituted.<br><br>The qSOFA score (also known as quickSOFA) is a bedside prompt that may identify patients with suspected infection who are at greater risk for a poor outcome outside the intensive care unit (ICU). It uses three criteria, assigning one point for low blood pressure (SBP&lt;100 mmHg), high respiratory rate (&gt;22 breaths per min), or altered mentation (Glasgow coma scale&lt;15).<br><br><div class=\"alert alert-warning\"><b>qSOFA score<\/b><br>Respiratory rate 22/min<br>Altered mentation<br>Systolic blood pressure 100 mm Hg<br><\/div><br>Patients with septic shock can be identified with a clinical construct of sepsis with persisting hypotension requiring vasopressors to maintain MAP 65 mm Hg and having a serum lactate level &gt;2 mmol/L (18mg/dL) despite adequate volume resuscitation. With these criteria, hospital mortality is in excess of 40%.<br><br><b>Resuscitation goals<\/b><br><ul><li>CVP 8-12mmHg<\/li><li>MAP &gt;65mmHg<\/li><li>Urine output &gt;0.5ml/kg per hour<\/li><li>Superior vena cava oxygen saturation &gt;70%<\/li><li>Normal lactate<\/li><\/ul><br><b>References<\/b><br>Singer M, Deutschman C, Seymour C et al. The third international consensus definitions for sepsis and septic shock (Sepsis 3). JAMA 2016; 315(8):801-810."}, {"name": "Total parenteral nutrition", "questions": [{"number": 71, "topic": "Total parenteral nutrition", "stem_html": "A 51 year old man is shot in the abdomen and sustains a significant intra abdominal injury. A laparotomy, bowel resection and end colostomy are performed. An associated vascular injury necessitates a 6 unit blood transfusion. He has a prolonged recovery and is paralysed and ventilated for 2 weeks on intensive care. He receives total parenteral nutrition and is eventually weaned from the ventilator and transferred to the ward. On reviewing his routine blood tests the following results are noted:<br><br>Full blood count<br><div class=\"table-responsive\"><table class=\"tb\"><tbody><tr><td>Hb<\/td><td>11.3  g/dl<\/td><\/tr><tr><td>Platelets<\/td><td>267 x 10<sup>9<\/sup>/l<\/td><\/tr><tr><td>WBC<\/td><td>10.1 x10<sup>9<\/sup>/l<\/td><\/tr><\/tbody><\/table><\/div><br>Urea and electrolytes<br><div class=\"table-responsive\"><table class=\"tb\"><tbody><tr><td>Na<sup>+<\/sup><\/td><td>131 mmol/l<\/td><\/tr><tr><td>K<sup>+<\/sup><\/td><td>4.6 mmol/l<\/td><\/tr><tr><td>Urea<\/td><td>2.3 mmol/l<\/td><\/tr><tr><td>Creatinine<\/td><td>78 µmol/l<\/td><\/tr><\/tbody><\/table><\/div><br>Liver function tests<br><div class=\"table-responsive\"><table class=\"tb\"><tbody><tr><td>Bilirubin<\/td><td>25 µmol/l<\/td><\/tr><tr><td>ALP<\/td><td>445 u/l<\/td><\/tr><tr><td>ALT<\/td><td>89 u/l<\/td><\/tr><tr><td>γGT<\/td><td>103  u/l<\/td><\/tr><\/tbody><\/table><\/div><br>What is the most likely underlying cause for the abnormalities noted?", "options": [{"label_html": "Delayed type blood transfusion reaction", "is_correct": false}, {"label_html": "Bile leak", "is_correct": false}, {"label_html": "Anastomotic leak", "is_correct": false}, {"label_html": "Total parenteral nutrition", "is_correct": true}, {"label_html": "Gallstones", "is_correct": false}], "correct_index": 3, "explanation_html": "TPN is known to result in derangement of liver function tests. Although, cholestasis may result from TPN, it would be very unusual for gallstones to form and result in the picture above. Blood transfusion reactions typically present earlier and with changes in the haemoglobin and although they may cause hepatitis this is rare nowadays."}, {"number": 72, "topic": "Total parenteral nutrition", "stem_html": "Which of the following is not typically included in total parenteral nutritional solutions?", "options": [{"label_html": "Fibre", "is_correct": true}, {"label_html": "Lipid", "is_correct": false}, {"label_html": "Potassium", "is_correct": false}, {"label_html": "Glucose", "is_correct": false}, {"label_html": "Magnesium", "is_correct": false}], "correct_index": 0, "explanation_html": "There is no indication for inclusion of fibre in solutions of TPN, nor would it be safe to do so."}], "note_html": "<ul><li>Commonly used in nutritionally compromised surgical patients.<\/li><li>Bags contain combinations of glucose, lipids and essential electrolytes, the exact composition is determined by the patients nutritional requirements.<\/li><li>Although it may be infused peripherally, this may result in thrombophlebitis. <\/li><li>Longer term infusions should be administered into a central vein (preferably via a PICC line).<\/li><li>Complications are related to sepsis, re-feeding syndromes and hepatic dysfunction.<\/li><\/ul>"}]}</script>
  <script>
    const quizData = JSON.parse(document.getElementById("quiz-data").textContent);
    const app = document.getElementById("app");
    const modeButtons = Array.from(document.querySelectorAll("[data-mode-button]"));
    const topicActionButtons = Array.from(document.querySelectorAll("[data-topic-action]"));

    const state = {
      mode: "solve",
      answers: new Map(),
      questionRefs: [],
    };

    function buildTopic(topic, questionOffset) {
      const details = document.createElement("details");
      details.className = "topic";
      details.open = true;

      const summary = document.createElement("summary");
      summary.innerHTML = `
        <div>
          <h2 class="topic-title">${topic.name}</h2>
        </div>
        <div class="topic-meta">
          <span>${topic.questions.length} questions</span>
          <span class="chevron" aria-hidden="true">></span>
        </div>
      `;

      const body = document.createElement("div");
      body.className = "topic-body";

      if (topic.note_html) {
        const notes = document.createElement("details");
        notes.className = "topic-notes";

        const notesSummary = document.createElement("summary");
        notesSummary.innerHTML = `
          <span class="topic-notes-title">Notes</span>
          <span class="chevron" aria-hidden="true">></span>
        `;

        const notesBody = document.createElement("div");
        notesBody.className = "topic-notes-body rich-text";
        notesBody.innerHTML = topic.note_html;

        notes.appendChild(notesSummary);
        notes.appendChild(notesBody);
        body.appendChild(notes);
      }

      topic.questions.forEach((question, indexInTopic) => {
        const globalIndex = questionOffset + indexInTopic;
        body.appendChild(buildQuestionCard(question, globalIndex));
      });

      details.appendChild(summary);
      details.appendChild(body);
      return details;
    }

    function buildQuestionCard(question, questionIndex) {
      const card = document.createElement("article");
      card.className = "question-card is-hidden";
      card.dataset.questionIndex = String(questionIndex);

      const label = document.createElement("p");
      label.className = "question-label";
      label.textContent = `Question ${question.number}`;

      const stem = document.createElement("div");
      stem.className = "stem rich-text";
      stem.innerHTML = question.stem_html;

      const options = document.createElement("div");
      options.className = "options";

      const optionButtons = question.options.map((option, optionIndex) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "option";
        button.dataset.optionIndex = String(optionIndex);
        button.innerHTML = option.label_html;
        button.addEventListener("click", () => {
          if (state.mode !== "solve") {
            return;
          }
          state.answers.set(questionIndex, optionIndex);
          applyQuestionState(questionIndex);
        });
        options.appendChild(button);
        return button;
      });

      const explanation = document.createElement("div");
      explanation.className = "explanation rich-text";
      explanation.innerHTML = `<span class="explanation-label">Explanation</span>${question.explanation_html}`;

      card.appendChild(label);
      card.appendChild(stem);
      card.appendChild(options);
      card.appendChild(explanation);

      state.questionRefs[questionIndex] = {
        card,
        explanation,
        optionButtons,
        question,
      };

      applyQuestionState(questionIndex);
      return card;
    }

    function applyQuestionState(questionIndex) {
      const ref = state.questionRefs[questionIndex];
      if (!ref) {
        return;
      }

      const { card, optionButtons, question } = ref;
      const selectedIndex = state.answers.get(questionIndex);
      const hasSelection = selectedIndex !== undefined;
      const isReview = state.mode === "review";
      const showExplanation = isReview || hasSelection;

      card.classList.toggle("is-hidden", !showExplanation);

      optionButtons.forEach((button, optionIndex) => {
        button.classList.remove("correct", "incorrect", "neutral-revealed");

        if (isReview) {
          button.disabled = true;
          if (optionIndex === question.correct_index) {
            button.classList.add("correct");
          } else {
            button.classList.add("neutral-revealed");
          }
          return;
        }

        button.disabled = false;
        if (!hasSelection) {
          return;
        }

        if (optionIndex === question.correct_index) {
          button.classList.add("correct");
        } else if (optionIndex === selectedIndex) {
          button.classList.add("incorrect");
        } else {
          button.classList.add("neutral-revealed");
        }
      });
    }

    function renderApp() {
      if (!quizData.topics.length) {
        const empty = document.createElement("div");
        empty.className = "empty-state";
        empty.textContent = "No questions were found in this JSON file.";
        app.replaceChildren(empty);
        return;
      }

      const wrapper = document.createElement("div");
      wrapper.className = "topic-list";

      let questionOffset = 0;
      quizData.topics.forEach((topic) => {
        wrapper.appendChild(buildTopic(topic, questionOffset));
        questionOffset += topic.questions.length;
      });

      app.replaceChildren(wrapper);
    }

    function setMode(mode) {
      state.mode = mode;
      modeButtons.forEach((button) => {
        const isActive = button.dataset.modeButton === mode;
        button.classList.toggle("active", isActive);
        button.setAttribute("aria-pressed", String(isActive));
      });

      state.questionRefs.forEach((_, index) => applyQuestionState(index));
    }

    function setAllTopics(open) {
      document.querySelectorAll(".topic").forEach((topic) => {
        topic.open = open;
      });
    }

    modeButtons.forEach((button) => {
      button.addEventListener("click", () => setMode(button.dataset.modeButton));
    });

    topicActionButtons.forEach((button) => {
      button.addEventListener("click", () => {
        setAllTopics(button.dataset.topicAction === "expand");
      });
    });

    renderApp();
    setMode("solve");
  </script>
</body>
</html>
