prevent the development of a seroma. What is the most appropriate device to use?", "options": [{"label_html": "A closed suction drainage system made of polypropylene", "is_correct": true}, {"label_html": "A closed suction drainage system made of latex", "is_correct": false}, {"label_html": "A passive drainage system made of polypropylene", "is_correct": false}, {"label_html": "Insertion of a penrose drain", "is_correct": false}, {"label_html": "Use of a VAC wound closure system", "is_correct": false}], "correct_index": 0, "explanation_html": "Following breast surgery, it is standard practice to use a Redivac type system that is made of polypropylene."}, {"number": 49, "topic": "Surgical drains", "stem_html": "A 75 year old man undergoes a Hartman's procedure for sigmoid diverticular disease with pericolic abscess and colovesical fistula. What type of drain should be inserted following this procedure?", "options": [{"label_html": "T Tube drain", "is_correct": false}, {"label_html": "Wallace Robinson drain (non suction)", "is_correct": true}, {"label_html": "Redivac drain", "is_correct": false}, {"label_html": "Corrugated drain", "is_correct": false}, {"label_html": "No drain", "is_correct": false}], "correct_index": 1, "explanation_html": "A non suction drain is the preferred option here."}], "note_html": "<ul><li>Drains are inserted in many surgical procedures and are of many types. <\/li><li>As a broad rule they can be divided into those using suction and those which do not. <\/li><li>The diameter of the drain will depend upon the substance being drained, for example smaller lumen drain for pneumothoraces vs haemothorax. <\/li><li>Drains can be associated with complications and these begin with insertion when there may be iatrogenic damage.  When in situ they serve as a route for infections. In some specific situations they may cause other complications, for example suction drains left in contact with bowel for long periods may carry a risk of inducing fistulation.<\/li><li>Drains should be inserted for a defined purpose and removed once the need has passed.<\/li><\/ul><br><b>A brief overview of types of drain and sites is given below<\/b><br><br><b>CNS<\/b><br><ul><li>Low suction drain or free drainage systems may be used for situations such as drainage of sub dural haematomas.<\/li><\/ul><br><b>CVS<\/b><br><ul><li> Following cardiothoracic procedures of thoracic trauma underwater seal drains are often placed. These should be carefully secured. When an air leak is present they may be placed on suction whilst the air leak settles<\/li><\/ul><br><b>Orthopaedics and trauma<\/b><br><ul><li>In this setting drains are usually used to prevent haematoma formation (with associated risk of infection). Some orthopaedic drains may also be specially adapted to allow the drained blood to be auto transfused.<\/li><\/ul><br><b>Gastro-intestinal surgery<\/b><br><ul><li>Surgeons often place abdominal drains either to prevent or drain abscesses, or to turn an anticipated complication into one that can be easily controlled such as a bile leak following cholecystectomy. The type of drain used will depend upon the indication.<\/li><\/ul><br><b>Drain types<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Type of drain<\/b><\/td><td><b>Features<\/b><\/td><\/tr><tr><td>Redivac<\/td><td><ul><li>Suction type of drain<\/li><li>Closed drainage system<\/li><li>High pressure vacuum system<\/li><\/ul><\/td><\/tr><tr><td>Low pressure drainage systems<\/td><td><ul><li>Consist of small systems such as the lantern style drain that may be used for short term drainage of small wounds and cavities<\/li><li>Larger systems are sometimes used following abdominal surgery, they have a lower pressure than the redivac system, which decreases the risks of fistulation<\/li><li>May be emptied and re-pressurised<\/li><\/ul><\/td><\/tr><tr><td>Latex tube drains<\/td><td><ul><li>May be shaped (e.g. T Tube) or straight<\/li><li>Usually used in non pressurised systems and act as sump drains<\/li><li>Most often used when it is desirable to generate fibrosis along the drain track (e.g. following exploration of the CBD)<\/li><\/ul><\/td><\/tr><tr><td>Chest drains<\/td><td><ul><li>May be large or small diameter (depending on the indication)<\/li><li>Connected to underwater seal system to ensure one way flow of air<\/li><\/ul><\/td><\/tr><tr><td>Corrugated drain<\/td><td><ul><li>Thin, wide sheet of plastic, usually soft<\/li><li>Contains corrugations, along which fluids can track<\/li><\/ul><\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Surgical site infection", "questions": [{"number": 50, "topic": "Surgical site infection", "stem_html": "Which of the following infection control modalities would be standard practice for a 53 year old male undergoing a Mayo repair of a paraumbilical hernia?", "options": [{"label_html": "Sodium hypochlorite solution applied to the skin", "is_correct": false}, {"label_html": "Administration of clindamycin", "is_correct": false}, {"label_html": "Alcoholic chlorhexidine applied to the skin", "is_correct": true}, {"label_html": "Administration of gentamicin", "is_correct": false}, {"label_html": "Pre operative shaving", "is_correct": false}], "correct_index": 2, "explanation_html": "The patient will require skin preparation. However, use of glutaraldehyde or sodium hypochlorite would be an inappropriate choice. As the Mayo repair does not involve implantation of prosthetic mesh the use of antibiotics is not appropriate."}, {"number": 51, "topic": "Surgical site infection", "stem_html": "A 63 year old man with end stage osteoarthritis of the hip is due to undergo a total hip replacement. The skin has been prepared and antibiotics given. What is the single most important modality to reduce the risks of infection?", "options": [{"label_html": "Laminar flow theatre", "is_correct": true}, {"label_html": "Exhaust suits", "is_correct": false}, {"label_html": "Skin shaving on the ward", "is_correct": false}, {"label_html": "Total body scrubbing of the surgical team", "is_correct": false}, {"label_html": "Extended antibiotic chemoprophylaxis as routine", "is_correct": false}], "correct_index": 0, "explanation_html": "A laminar flow is the single most important intervention, many units will also use exhaust suits but these are less essential. Shaving skin on the ward increases infection rates. Extended chemoprophylaxis increases risks of antibiotic associated diarrhea."}, {"number": 52, "topic": "Surgical site infection", "stem_html": "A 28 year old man is undergoing an appendicectomy for perforated appendicitis. What is the single most important modality for reducing the risks of post operative wound infection?", "options": [{"label_html": "Peri- operative administration of antibiotics", "is_correct": true}, {"label_html": "Use of suction drains in the abdominal wall", "is_correct": false}, {"label_html": "Use of passive drains in the abdomen", "is_correct": false}, {"label_html": "Use of skin clips for closure", "is_correct": false}, {"label_html": "Use of incise drapes", "is_correct": false}], "correct_index": 0, "explanation_html": "Antibiotics are the single most important factor. Clips make infections easier to manage but do not reduce the risks. Drains have no effect on the skin wounds in these cases."}, {"number": 53, "topic": "Surgical site infection", "stem_html": "Which of the following is least likely to reduce the risk of post operative wound infection?", "options": [{"label_html": "Electrical clippers to remove body hair", "is_correct": false}, {"label_html": "Use of poviodone impregnated drapes", "is_correct": false}, {"label_html": "Antibiotic prophylaxis for prosthesis placement", "is_correct": false}, {"label_html": "Routine use of mechanical bowel preparation", "is_correct": true}, {"label_html": "Chlorhexidine to prepare the skin", "is_correct": false}], "correct_index": 3, "explanation_html": "The routine use of mechanical bowel preparation is not recommended. There is some recent evidence to support the use of selective gut decontamination. However, this is not in mainstream practice at present."}], "note_html": "- Surgical site infections may occur following a breach in tissue surfaces and allow normal commensals and other pathogens to initiate infection. They are a major cause of morbidity and mortality.<br><ul><li>Surgical site infections (SSI) comprise up to 20% of all healthcare associated infections and at least 5% of patients undergoing surgery will develop an SSI as a result.<\/li><li>In many cases the organisms are derived from the patient's own body. Measures that may increase the risk of SSI include:<\/li><li>Shaving the wound using a razor (disposable clipper preferred)<\/li><li>Using a non iodine impregnated incise drape if one is deemed to be necessary<\/li><li>Tissue hypoxia<\/li><li>Delayed administration of prophylactic antibiotics in tourniquet surgery<\/li><\/ul><br><b>Preoperatively<\/b><br><ul><li>Don't remove body hair routinely<\/li><li>If hair needs removal, use electrical clippers with single use head (razors increase infection risk)<\/li><li>Antibiotic prophylaxis if:<\/li><\/ul>- placement of prosthesis or valve<br>- clean-contaminated surgery<br>- contaminated surgery<br><ul><li>Use local formulary<\/li><li>Aim to give single dose IV antibiotic on anaesthesia<\/li><li>If a tourniquet is to be used, give prophylactic antibiotics earlier<\/li><\/ul><br><b>Intraoperatively<\/b><br><ul><li>Prepare the skin with alcoholic chlorhexidine (Lowest incidence of SSI)<\/li><li>Cover surgical site with dressing<\/li><li>A recent meta analysis has confirmed that administration of supplementary oxygen does not reduce the risk of wound infection. In contrast to previous individual RCT's(1)<\/li><li>Wound edge protectors do not appear to confer benefit (2)<\/li><\/ul><br><b>Post operatively<\/b><br>Tissue viability advice for management of surgical wounds healing by secondary intention<br><br><b>Use of diathermy for skin incisions<\/b><br>In the NICE guidelines the use of diathermy for skin incisions is not advocated(3). Several randomised controlled trials have been undertaken and demonstrated no increase in risk of SSI when diathermy is used(4). <br><br><b>References<\/b><br>1. Alverdy JC, Hyman N, Gilbert J. Re-examining causes of surgical site infections following elective surgery in the era of asepsis. Lancet Infect Dis. 2020 Mar;20(3):e38-e43. doi: 10.1016/S1473-3099(19)30756-X. Epub 2020 Jan 29. PMID: 32006469; PMCID: PMC8019154.<br>2. Pinkney T <i> et al<\/i>. Impact of wound edge protection devices on surgical site infection after laparotomy: impact of a multicentre randomised controlled trial (ROSSINI Trial). <i>BMJ<\/i> 2013 (347):10.<br>3. http://www.nice.org.uk/CG74<br>4. Ahmad N and Ahmed A. Meta-analysis of the effectiveness of surgical scalpel or diathermy in making abdominal skin incisions. <i>Ann Surg<\/i> 2011, 253(1):8-13."}, {"name": "Suture material", "questions": [{"number": 54, "topic": "Suture material", "stem_html": "Which of the sutures listed below would be most suitable for suturing the femoral artery following an embolectomy?", "options": [{"label_html": "5/0 polyglactin", "is_correct": false}, {"label_html": "5/0 polypropylene", "is_correct": true}, {"label_html": "5/0 silk", "is_correct": false}, {"label_html": "5/0 polyglyconate", "is_correct": false}, {"label_html": "5/0 polyester", "is_correct": false}], "correct_index": 1, "explanation_html": "Vascular sutures should be monofilament and non absorbable. Of the material listed, only polypropylene fulfills this criteria."}, {"number": 55, "topic": "Suture material", "stem_html": "Which of the sutures listed below would be most suitable for the sub cuticular closure of an inguinal hernia repair wound?", "options": [{"label_html": "2/0 polyglactin", "is_correct": false}, {"label_html": "2/0 silk", "is_correct": false}, {"label_html": "6/0 polydiaxone", "is_correct": false}, {"label_html": "3/0 polydiaxone", "is_correct": true}, {"label_html": "1 polydiaxone", "is_correct": false}], "correct_index": 3, "explanation_html": "A 6/0 suture would lack sufficient tensile strength, the other sutures are too thick or otherwise unsuitable."}, {"number": 56, "topic": "Suture material", "stem_html": "Which of the following sutures is most suitable for the mass closure of an abdominal wall following a laparotomy?", "options": [{"label_html": "1 polydiaxone", "is_correct": true}, {"label_html": "1/0 polydiaxone", "is_correct": false}, {"label_html": "2/0 polydiaxone", "is_correct": false}, {"label_html": "1/0 silk", "is_correct": false}, {"label_html": "1/0 polglactin", "is_correct": false}], "correct_index": 0, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Suture sizes are assessed on the French gauge scale. 1/0 is thicker than 6/0. <br>Note though that 1 is thicker than 1/0 and 5 is thicker than 1. When the /0 is removed they become thicker with ascending numerical value<\/div>Only 1 polydiaxone would have sufficient tensile strength."}, {"number": 57, "topic": "Suture material", "stem_html": "Which of the following sutures is most suitable for the mass closure of an abdominal wall following a laparotomy?", "options": [{"label_html": "1 polydiaxone", "is_correct": true}, {"label_html": "1/0 polydiaxone", "is_correct": false}, {"label_html": "2/0 polydiaxone", "is_correct": false}, {"label_html": "1/0 silk", "is_correct": false}, {"label_html": "1/0 polglactin", "is_correct": false}], "correct_index": 0, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Suture sizes are assessed on the French gauge scale. 1/0 is thicker than 6/0. <br>Note though that 1 is thicker than 1/0 and 5 is thicker than 1. When the /0 is removed they become thicker with ascending numerical value<\/div>Only 1 polydiaxone would have sufficient tensile strength."}, {"number": 58, "topic": "Suture material", "stem_html": "Which of the following sutures would be most appropriate for securing a chest drain following a thoracotomy?", "options": [{"label_html": "2/0 silk", "is_correct": true}, {"label_html": "4/0 silk", "is_correct": false}, {"label_html": "1 polypropylene", "is_correct": false}, {"label_html": "1/0 polypropylene", "is_correct": false}, {"label_html": "3/0 vicryl rapide", "is_correct": false}], "correct_index": 0, "explanation_html": "Silk is popular for securing drains as it knots reliably and is easy to handle."}, {"number": 59, "topic": "Suture material", "stem_html": "Which of the following is not an absorbable suture material?", "options": [{"label_html": "Chromic catgut", "is_correct": false}, {"label_html": "Nylon", "is_correct": true}, {"label_html": "Vicryl", "is_correct": false}, {"label_html": "Dexon", "is_correct": false}, {"label_html": "Poly diaxone (PDS).", "is_correct": false}], "correct_index": 1, "explanation_html": "<p>No explanation provided.<\/p>"}, {"number": 60, "topic": "Suture material", "stem_html": "Which of the following is a permanent suture material best suited for interrupted mattress dermal closure?", "options": [{"label_html": "2/0 Polydiaxone", "is_correct": false}, {"label_html": "3/0 Polydiaxone", "is_correct": false}, {"label_html": "4/0 Polyglycolic acid", "is_correct": false}, {"label_html": "1/0 Dexon", "is_correct": false}, {"label_html": "3/0 Polypropylene", "is_correct": true}], "correct_index": 4, "explanation_html": "Of the sutures listed only prolene is a permanent suture material. It is a good agent for skin closure as it does not incite an inflammatory response and thus provides good cosmesis."}], "note_html": "<b>Suture materials<\/b><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Agent<\/b><\/th><th><b>Classification<\/b><\/th><th><b>Durability<\/b><\/th><th><b>Uses<\/b><\/th><th><b>Special points<\/b><\/th><\/tr><\/thead><tbody><tr><td>Silk<\/td><td>Braided <br>Biological<\/td><td>Theoretically permanent although strength not preserved<\/td><td>Anchoring devices, skin closure<\/td><td>Knots easily, poor cosmesis<\/td><\/tr><tr><td>Catgut<\/td><td>Braided<br>Biological<\/td><td>5-7 days<\/td><td>Short term wound approximation<\/td><td>Poor cosmesis<br>Degrades rapidly<br>Not available in UK<\/td><\/tr><tr><td>Chromic catgut<\/td><td>Braided<br>Biological<\/td><td>Up to 12 weeks<\/td><td>Apposition of deeply sited tissues<\/td><td>Unpredictable degradation pattern<br>Not in use in UK<\/td><\/tr><tr><td>Polydiaxanone (PDS)<\/td><td>Synthetic <br>Monofilament<\/td><td>Up to 3 months (longer with thicker sutures)<\/td><td>Widespread surgical applications including visceral anastomoses, dermal closure, mass closure of abdominal wall<\/td><td>Used in most surgical specialties (avoid dyed form in dermal closure)<\/td><\/tr><tr><td>Polyglycolic acid (Vicryl, Dexon)<\/td><td>Braided <br>Synthetic<\/td><td>Up to 6 weeks<\/td><td>Most tissues can be apposed using polyglycolic acid<\/td><td>It has good handling properties, the dyed form of this suture should not be used for skin closure<\/td><\/tr><tr><td>Polypropylene (Prolene)<\/td><td>Synthetic <br>Monofilament<\/td><td>Permanent<\/td><td>Widely used, agent of choice for vascular anastomoses<\/td><td>Poor handling properties<\/td><\/tr><tr><td>Polyester (Ethibond)<\/td><td>Synthetic <br>Braided<\/td><td>Permanent<\/td><td>Its combination of permanency and braiding makes it useful for laparoscopic surgery<\/td><td>It is more expensive and has considerable tissue drag<\/td><\/tr><\/tbody><\/table><\/div><br><b>Absorbable vs Non absorbable<\/b><br><ul><li>Time taken to degrade absorbable materials varies<\/li><li>Usually by macrophages hydrolysing material<\/li><li>Consider absorbable sutures in situations where long term tissue apposition is not required. In cardiac and vascular surgery non absorbable sutures are usually used.<\/li><\/ul><br><b>Suture size<\/b><br><ul><li>The higher the index number the smaller the suture i.e. : 6/0 prolene is finer than 1/0 prolene.<\/li><li>Finer sutures have less tensile strength. For example 6/0 prolene would not be a suture suitable for abdominal mass closure but would be ideal for small calibre distal arterial anastomoses.<\/li><\/ul> <br><b>Braided vs monofilament<\/b><br>Generally speaking braided sutures have better handling characteristics than non braided. However, they are associated with higher bacterial counts. Braided materials are unsuitable for use in vascular surgery as they are potentially thrombogenic."}, {"name": "Suture sizes", "questions": [{"number": 61, "topic": "Suture sizes", "stem_html": "Which of the following sutures has the largest diameter?", "options": [{"label_html": "6/0 Polypropylene", "is_correct": false}, {"label_html": "5/0 Silk", "is_correct": false}, {"label_html": "3/0 Nylon", "is_correct": false}, {"label_html": "1 Polypropylene", "is_correct": true}, {"label_html": "0 Polydiaxone", "is_correct": false}], "correct_index": 3, "explanation_html": "The sizes of suture material are not related to the composition of the suture material."}], "note_html": "<b>USP Suture size and corresponding suture diameter<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>USP Size<\/b><\/td><td><b>Diameter in mm<\/b><\/td><\/tr><tr><td>11-0<\/td><td>0.01<\/td><\/tr><tr><td>10-0<\/td><td>0.02<\/td><\/tr><tr><td>6-0<\/td><td>0.07<\/td><\/tr><tr><td>3-0<\/td><td>0.2<\/td><\/tr><tr><td>0<\/td><td>0.35<\/td><\/tr><tr><td>1<\/td><td>0.4<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Tissue reconstruction", "questions": [{"number": 62, "topic": "Tissue reconstruction", "stem_html": "A 34 year old man has a tissue defect measuring 3 cm by 1 cm following an excision of a lipoma from the scapula. What is the best option for managing the wound?", "options": [{"label_html": "Direct primary closure", "is_correct": true}, {"label_html": "Delayed primary closure", "is_correct": false}, {"label_html": "Pedicled skin graft", "is_correct": false}, {"label_html": "Free flap", "is_correct": false}, {"label_html": "Rotational flap", "is_correct": false}], "correct_index": 0, "explanation_html": "This wound should be amenable to primary closure. There is minimal associated tissue loss and the surgery is minor and uncontaminated."}, {"number": 63, "topic": "Tissue reconstruction", "stem_html": "A 5 year old suffers 20% burns to the torso. On examination, there is fixed pigmentation and the affected area has a white and dry appearance. Which of the following options represents the best management plan?", "options": [{"label_html": "Rotational myocutaneous flap", "is_correct": false}, {"label_html": "Full thickness skin graft", "is_correct": false}, {"label_html": "Excision and delayed primary closure", "is_correct": false}, {"label_html": "Debridement and split thickness skin graft", "is_correct": true}, {"label_html": "Excision and direct primary closure", "is_correct": false}], "correct_index": 3, "explanation_html": "This is a full thickness burn and will require split thickness skin grafting. Meshing the graft may increase the donor site yield. However, this is at the expense of cosmesis. The burn itself must be debrided first to ensure an adequate wound bed."}, {"number": 64, "topic": "Tissue reconstruction", "stem_html": "A 68 year old lady has a 3cm basal cell carcinoma excised from her right cheek. There is a rhomboid defect measuring 4cm by 4cm. What is the best option for managing the wound?", "options": [{"label_html": "Delayed primary closure", "is_correct": false}, {"label_html": "Direct primary closure", "is_correct": false}, {"label_html": "Local rotational flap", "is_correct": true}, {"label_html": "Split thickness skin graft", "is_correct": false}, {"label_html": "Pedicled myocutaneous flap", "is_correct": false}], "correct_index": 2, "explanation_html": "A local rotational flap or full thickness graft would both be acceptable options here."}], "note_html": "<b>Skin Grafts and Flaps<\/b><br>Skin flaps or grafts may be required where primary wound closure cannot be achieved or would entail either significant cosmetic defect or considerable functional disturbance as a result of wound contraction.<br><br><b>Reconstructive ladder<\/b><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Method<\/b><\/th><th><b>Types<\/b><\/th><\/tr><\/thead><tbody><tr><td>Direct closure<\/td><td>The simplest option where possible<\/td><\/tr><tr><td>Grafting techniques<\/td><td><ul><li>Split thickness<\/li><li>Full thickness<\/li><li>Skin Substitute<\/li><li>Composite<\/li><\/ul><\/td><\/tr><tr><td>Flap technique<\/td><td>Local:<br><ul><li>Transposition<\/li><li>Pivot<\/li><li>Alphabetoplasty (e.g. Z-Y)<\/li><\/ul>Regional:<br><ul><li>Myocutaneous<\/li><li>Fasciocutaneous<\/li><li>Neurocutaneous<\/li><\/ul>Distant:<br><ul><li>Free tissue transfer<\/li><\/ul><\/td><\/tr><tr><td>Prelamination techniques<\/td><td>Allows creation of specialised flaps e.g. buccal mucosa<\/td><\/tr><tr><td>Tissue expansion<\/td><td>Involves placement of tissue expanders to increase amount of tissue at donor sites<\/td><\/tr><\/tbody><\/table><\/div><br><b>Skin Grafts Vs. Flaps<\/b><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid2\"><thead><tr><th><b>Skin Grafts<\/b><\/th><th><b>Flaps<\/b><\/th><\/tr><\/thead><tbody><tr><td>No size limit (Split)/ Relative size limit (full thickness)<\/td><td>Size limited by territory of blood supply<\/td><\/tr><tr><td>Rely on wound bed for blood supply<\/td><td>Tissue has its own blood supply<\/td><\/tr><tr><td>Take better on clean well vascularised wound beds<\/td><td>Will survive independent of the wound bed<\/td><\/tr><tr><td>Split skin graft donor site typically heals in 12 days<\/td><td>Direct closure of donor site or secondary skin graft<\/td><\/tr><tr><td>Donor site may be reused<\/td><td>Donor site cannot be reused<\/td><\/tr><\/tbody><\/table><\/div><br><b>Split thickness skin grafts<\/b><br><ul><li>Available in range of thicknesses. <\/li><li>Thigh is the commonest donor site<\/li><li>Size may be increased by meshing the graft. However this comes with compromise on cosmesis. <\/li><li>Donor sites, especially if thin grafts are taken can be reused following re-epithelialisation<\/li><\/ul><br><b>Full thickness grafts<\/b><br><ul><li>Most commonly used for facial reconstruction<\/li><li>Include dermal appendages<\/li><li>Provide superior cosmetic result<\/li><\/ul><br><b>Composite grafts<\/b><br>These are grafts containing more than one tissue type, such as skin and fat. They are usually used to cover small defects in cosmetically important areas.<br><br><b>Flaps<\/b><br><ul><li>Flaps have their own blood supply and may be pedicled or free. <\/li><li>May have multiple components e.g. skin, skin + fat, skin + fat + muscle. <\/li><li>They will have the ability to take regardless of the underlying tissue bed. <\/li><li>The type of intrinsic blood supply is important. For example in breast surgery pedicled latissimus dorsi flaps will be less prone to failure than microsvascular anastomosed free Diep flaps.<\/li><\/ul>"}]}</script>
  <script>
    const quizData = JSON.parse(document.getElementById("quiz-data").textContent);
    const app = document.getElementById("app");
    const modeButtons = Array.from(document.querySelectorAll("[data-mode-button]"));
    const topicActionButtons = Array.from(document.querySelectorAll("[data-topic-action]"));

    const state = {
      mode: "solve",
      answers: new Map(),
      questionRefs: [],
    };

    function buildTopic(topic, questionOffset) {
      const details = document.createElement("details");
      details.className = "topic";
      details.open = true;

      const summary = document.createElement("summary");
      summary.innerHTML = `
        <div>
          <h2 class="topic-title">${topic.name}</h2>
        </div>
        <div class="topic-meta">
          <span>${topic.questions.length} questions</span>
          <span class="chevron" aria-hidden="true">></span>
        </div>
      `;

      const body = document.createElement("div");
      body.className = "topic-body";

      if (topic.note_html) {
        const notes = document.createElement("details");
        notes.className = "topic-notes";

        const notesSummary = document.createElement("summary");
        notesSummary.innerHTML = `
          <span class="topic-notes-title">Notes</span>
          <span class="chevron" aria-hidden="true">></span>
        `;

        const notesBody = document.createElement("div");
        notesBody.className = "topic-notes-body rich-text";
        notesBody.innerHTML = topic.note_html;

        notes.appendChild(notesSummary);
        notes.appendChild(notesBody);
        body.appendChild(notes);
      }

      topic.questions.forEach((question, indexInTopic) => {
        const globalIndex = questionOffset + indexInTopic;
        body.appendChild(buildQuestionCard(question, globalIndex));
      });

      details.appendChild(summary);
      details.appendChild(body);
      return details;
    }

    function buildQuestionCard(question, questionIndex) {
      const card = document.createElement("article");
      card.className = "question-card is-hidden";
      card.dataset.questionIndex = String(questionIndex);

      const label = document.createElement("p");
      label.className = "question-label";
      label.textContent = `Question ${question.number}`;

      const stem = document.createElement("div");
      stem.className = "stem rich-text";
      stem.innerHTML = question.stem_html;

      const options = document.createElement("div");
      options.className = "options";

      const optionButtons = question.options.map((option, optionIndex) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "option";
        button.dataset.optionIndex = String(optionIndex);
        button.innerHTML = option.label_html;
        button.addEventListener("click", () => {
          if (state.mode !== "solve") {
            return;
          }
          state.answers.set(questionIndex, optionIndex);
          applyQuestionState(questionIndex);
        });
        options.appendChild(button);
        return button;
      });

      const explanation = document.createElement("div");
      explanation.className = "explanation rich-text";
      explanation.innerHTML = `<span class="explanation-label">Explanation</span>${question.explanation_html}`;

      card.appendChild(label);
      card.appendChild(stem);
      card.appendChild(options);
      card.appendChild(explanation);

      state.questionRefs[questionIndex] = {
        card,
        explanation,
        optionButtons,
        question,
      };

      applyQuestionState(questionIndex);
      return card;
    }

    function applyQuestionState(questionIndex) {
      const ref = state.questionRefs[questionIndex];
      if (!ref) {
        return;
      }

      const { card, optionButtons, question } = ref;
      const selectedIndex = state.answers.get(questionIndex);
      const hasSelection = selectedIndex !== undefined;
      const isReview = state.mode === "review";
      const showExplanation = isReview || hasSelection;

      card.classList.toggle("is-hidden", !showExplanation);

      optionButtons.forEach((button, optionIndex) => {
        button.classList.remove("correct", "incorrect", "neutral-revealed");

        if (isReview) {
          button.disabled = true;
          if (optionIndex === question.correct_index) {
            button.classList.add("correct");
          } else {
            button.classList.add("neutral-revealed");
          }
          return;
        }

        button.disabled = false;
        if (!hasSelection) {
          return;
        }

        if (optionIndex === question.correct_index) {
          button.classList.add("correct");
        } else if (optionIndex === selectedIndex) {
          button.classList.add("incorrect");
        } else {
          button.classList.add("neutral-revealed");
        }
      });
    }

    function renderApp() {
      if (!quizData.topics.length) {
        const empty = document.createElement("div");
        empty.className = "empty-state";
        empty.textContent = "No questions were found in this JSON file.";
        app.replaceChildren(empty);
        return;
      }

      const wrapper = document.createElement("div");
      wrapper.className = "topic-list";

      let questionOffset = 0;
      quizData.topics.forEach((topic) => {
        wrapper.appendChild(buildTopic(topic, questionOffset));
        questionOffset += topic.questions.length;
      });

      app.replaceChildren(wrapper);
    }

    function setMode(mode) {
      state.mode = mode;
      modeButtons.forEach((button) => {
        const isActive = button.dataset.modeButton === mode;
        button.classList.toggle("active", isActive);
        button.setAttribute("aria-pressed", String(isActive));
      });

      state.questionRefs.forEach((_, index) => applyQuestionState(index));
    }

    function setAllTopics(open) {
      document.querySelectorAll(".topic").forEach((topic) => {
        topic.open = open;
      });
    }

    modeButtons.forEach((button) => {
      button.addEventListener("click", () => setMode(button.dataset.modeButton));
    });

    topicActionButtons.forEach((button) => {
      button.addEventListener("click", () => {
        setAllTopics(button.dataset.topicAction === "expand");
      });
    });

    renderApp();
    setMode("solve");
  </script>
</body>
