<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Surgical Technique And Technology</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f1e8;
      --bg-accent: #ebe4d4;
      --surface: rgba(255, 252, 246, 0.92);
      --surface-strong: #fffdf7;
      --border: #d9cfbd;
      --text: #23313a;
      --text-soft: #5f6c73;
      --accent: #496a58;
      --accent-strong: #2f5341;
      --correct-bg: #e0f3e6;
      --correct-border: #77b487;
      --wrong-bg: #fbe0df;
      --wrong-border: #dc7a73;
      --note-bg: #f3eee2;
      --shadow: 0 18px 40px rgba(76, 59, 37, 0.08);
      --radius-lg: 22px;
      --radius-md: 16px;
      --radius-sm: 12px;
      --page-width: 960px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: "Avenir Next", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.72), transparent 32%),
        linear-gradient(180deg, #f8f4eb 0%, #f3ede0 100%);
      line-height: 1.65;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.14), transparent 18%, transparent 82%, rgba(255, 255, 255, 0.14)),
        repeating-linear-gradient(
          180deg,
          rgba(73, 106, 88, 0.015) 0,
          rgba(73, 106, 88, 0.015) 1px,
          transparent 1px,
          transparent 18px
        );
    }

    a {
      color: var(--accent-strong);
    }

    img {
      max-width: 100%;
      height: auto;
      border-radius: 14px;
    }

    .score-badge,
    .badge.rounded-pill.bg-danger {
      display: none !important;
    }

    .page {
      width: min(100% - 24px, var(--page-width));
      margin: 0 auto;
      padding: 18px 0 48px;
    }

    .topbar {
      margin-bottom: 18px;
      padding: 18px;
      background: rgba(255, 252, 246, 0.9);
      border: 1px solid rgba(217, 207, 189, 0.86);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .topbar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .eyebrow {
      margin: 0 0 4px;
      font-size: 0.76rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-soft);
    }

    .title {
      margin: 0;
      font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
      font-size: clamp(1.5rem, 2vw + 1rem, 2.35rem);
      line-height: 1.08;
      font-weight: 700;
    }

    .meta {
      margin: 8px 0 0;
      color: var(--text-soft);
      font-size: 0.96rem;
    }

    .mode-switch {
      display: inline-flex;
      padding: 6px;
      border-radius: 999px;
      background: var(--bg-accent);
      border: 1px solid var(--border);
      gap: 6px;
      flex-shrink: 0;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
      flex-wrap: wrap;
    }

    .topic-actions {
      display: inline-flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .utility-button {
      appearance: none;
      border: 1px solid var(--border);
      background: var(--surface-strong);
      color: var(--text);
      font: inherit;
      font-weight: 700;
      border-radius: 999px;
      padding: 10px 14px;
      cursor: pointer;
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .utility-button:hover {
      transform: translateY(-1px);
      border-color: #c7bba9;
      box-shadow: 0 8px 18px rgba(70, 54, 34, 0.07);
    }

    .utility-button:focus-visible {
      outline: 3px solid rgba(73, 106, 88, 0.22);
      outline-offset: 2px;
    }

    .mode-button {
      appearance: none;
      border: 0;
      background: transparent;
      color: var(--text-soft);
      font: inherit;
      font-weight: 700;
      border-radius: 999px;
      padding: 10px 16px;
      min-width: 92px;
      cursor: pointer;
      transition: transform 0.18s ease, background 0.18s ease, color 0.18s ease, box-shadow 0.18s ease;
    }

    .mode-button:hover {
      transform: translateY(-1px);
      color: var(--text);
    }

    .mode-button.active {
      background: var(--surface-strong);
      color: var(--accent-strong);
      box-shadow: 0 8px 18px rgba(73, 106, 88, 0.14);
    }

    .topic-list {
      display: grid;
      gap: 18px;
    }

    .topic {
      background: rgba(255, 252, 246, 0.78);
      border: 1px solid rgba(217, 207, 189, 0.9);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .topic[open] {
      background: rgba(255, 252, 246, 0.9);
    }

    .topic > summary {
      list-style: none;
      cursor: pointer;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      user-select: none;
    }

    .topic > summary::-webkit-details-marker {
      display: none;
    }

    .topic-title {
      margin: 0;
      font-size: 1.08rem;
      font-weight: 800;
      letter-spacing: 0.01em;
    }

    .topic-meta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--text-soft);
      font-size: 0.94rem;
    }

    .chevron {
      display: inline-block;
      transition: transform 0.2s ease;
      color: var(--accent);
      font-weight: 700;
    }

    .topic[open] > summary .chevron {
      transform: rotate(90deg);
    }

    .topic-notes {
      background: rgba(243, 238, 226, 0.62);
      border: 1px solid #e3d9c8;
      border-radius: var(--radius-md);
      overflow: hidden;
    }

    .topic-notes > summary {
      list-style: none;
      cursor: pointer;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      user-select: none;
    }

    .topic-notes > summary::-webkit-details-marker {
      display: none;
    }

    .topic-notes-title {
      font-size: 0.95rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-soft);
    }

    .topic-notes[open] > summary .chevron {
      transform: rotate(90deg);
    }

    .topic-notes-body {
      padding: 0 16px 16px;
      color: var(--text);
    }

    .topic-body {
      padding: 0 16px 16px;
      display: grid;
      gap: 14px;
    }

    .question-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 18px;
      box-shadow: 0 10px 24px rgba(70, 54, 34, 0.05);
    }

    .question-label {
      margin: 0 0 10px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-soft);
      font-size: 0.88rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 800;
    }

    .stem {
      font-size: 1rem;
    }

    .stem > *:first-child,
    .explanation > *:first-child {
      margin-top: 0;
    }

    .stem > *:last-child,
    .explanation > *:last-child {
      margin-bottom: 0;
    }

    .options {
      margin-top: 16px;
      display: grid;
      gap: 10px;
    }

    .option {
      width: 100%;
      text-align: left;
      border: 1px solid #d8d0c2;
      background: #fffdf8;
      color: var(--text);
      border-radius: var(--radius-sm);
      padding: 14px 15px;
      font: inherit;
      line-height: 1.45;
      cursor: pointer;
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
    }

    .option:hover {
      transform: translateY(-1px);
      border-color: #c7bba9;
      box-shadow: 0 8px 18px rgba(70, 54, 34, 0.07);
    }

    .option:focus-visible {
      outline: 3px solid rgba(73, 106, 88, 0.22);
      outline-offset: 2px;
    }

    .option.correct {
      background: var(--correct-bg);
      border-color: var(--correct-border);
      box-shadow: inset 0 0 0 1px rgba(119, 180, 135, 0.2);
    }

    .option.incorrect {
      background: var(--wrong-bg);
      border-color: var(--wrong-border);
      box-shadow: inset 0 0 0 1px rgba(220, 122, 115, 0.2);
    }

    .option.neutral-revealed {
      background: #faf6ee;
      border-color: #d8d0c2;
      color: #5f676a;
    }

    .option[disabled] {
      cursor: default;
      opacity: 1;
    }

    .explanation {
      margin-top: 14px;
      padding: 14px 16px;
      background: var(--note-bg);
      border: 1px solid #e3d9c8;
      border-radius: 14px;
      color: var(--text);
    }

    .question-card.is-hidden .explanation {
      display: none;
    }

    .explanation-label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-soft);
      font-weight: 800;
    }

    .empty-state {
      padding: 28px 22px;
      background: var(--surface);
      border: 1px dashed var(--border);
      border-radius: var(--radius-lg);
      color: var(--text-soft);
    }

    .rich-text table {
      width: 100%;
      border-collapse: collapse;
      margin: 12px 0;
      overflow: hidden;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.68);
    }

    .rich-text td,
    .rich-text th {
      border: 1px solid #ddd2bf;
      padding: 10px 12px;
      vertical-align: top;
    }

    .rich-text ul,
    .rich-text ol {
      padding-left: 20px;
      margin: 10px 0;
    }

    .rich-text center {
      display: block;
      text-align: center;
    }

    .rich-text .table-responsive {
      overflow-x: auto;
    }

    @media (max-width: 720px) {
      .page {
        width: min(100% - 16px, var(--page-width));
        padding-top: 10px;
      }

      .topbar {
        padding: 14px;
        border-radius: 18px;
      }

      .topbar-inner {
        flex-direction: column;
        align-items: stretch;
      }

      .controls {
        justify-content: stretch;
      }

      .topic-actions {
        width: 100%;
      }

      .utility-button {
        flex: 1 1 0;
      }

      .mode-switch {
        width: 100%;
        justify-content: stretch;
      }

      .mode-button {
        flex: 1 1 50%;
      }

      .topic > summary {
        padding: 16px;
        align-items: flex-start;
      }

      .topic-meta {
        font-size: 0.88rem;
      }

      .topic-body {
        padding: 0 12px 12px;
      }

      .question-card {
        padding: 15px;
      }

      .option {
        padding: 13px 14px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="topbar">
      <div class="topbar-inner">
        <div>
          <p class="eyebrow">Study View</p>
          <h1 class="title">Surgical Technique And Technology</h1>
          <p class="meta">64 questions across 18 topics</p>
        </div>
        <div class="controls">
          <div class="topic-actions" aria-label="Topic visibility controls">
            <button class="utility-button" type="button" data-topic-action="expand">Expand all</button>
            <button class="utility-button" type="button" data-topic-action="collapse">Collapse all</button>
          </div>
          <div class="mode-switch" role="tablist" aria-label="Question mode">
            <button class="mode-button active" type="button" data-mode-button="solve" aria-pressed="true">Solve</button>
            <button class="mode-button" type="button" data-mode-button="review" aria-pressed="false">Review</button>
          </div>
        </div>
      </div>
    </section>

    <section id="app"></section>
  </main>

  <script id="quiz-data" type="application/json">{"title": "Surgical Technique And Technology", "topics": [{"name": "Abdominal stomas", "questions": [{"number": 1, "topic": "Abdominal stomas", "stem_html": "A 34 year old man undergoes a sub total colectomy to treat fulminant ulcerative colitis. What type of stoma is most likely to be fashioned?", "options": [{"label_html": "End colostomy", "is_correct": false}, {"label_html": "Loop colostomy", "is_correct": false}, {"label_html": "End ileostomy", "is_correct": true}, {"label_html": "Loop ileostomy", "is_correct": false}, {"label_html": "End jejunostomy", "is_correct": false}], "correct_index": 2, "explanation_html": "A sub total colectomy involves the removal of the entire right, transverse, left and part of the sigmoid colon. The rectal stump is closed and an end ileostomy fashioned in the right iliac fossa."}, {"number": 2, "topic": "Abdominal stomas", "stem_html": "What type of stoma should be considered in a patient undergoing emergency operative intervention for large bowel obstruction as a result of a carcinoma 5cm from the anal verge?", "options": [{"label_html": "End colostomy", "is_correct": false}, {"label_html": "Loop colostomy", "is_correct": true}, {"label_html": "End ileostomy", "is_correct": false}, {"label_html": "Loop jejunostomy", "is_correct": false}, {"label_html": "Loop ileostomy", "is_correct": false}], "correct_index": 1, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Don't confuse loop ileostomy and loop colostomy. A loop colostomy is the only safe option for an obstructing rectal cancer. Loop ileostomy in the context of rectal cancer is performed to mitigate the effects of anastomotic leak following a low anterior resection. <\/div>Large bowel obstruction resulting from carcinoma should be resected, stented or defunctioned. The first two options typically apply to tumours above the peritoneal reflection. Lower tumours should be defunctioned with a loop colostomy and then formal staging undertaken prior to definitive surgery. An emergency attempted rectal resection carries a high risk of involvement of the circumferential resection margin and is not recommended."}, {"number": 3, "topic": "Abdominal stomas", "stem_html": "What type of stoma is most likely to be encountered in a 56 year old man undergoing a low anterior resection for carcinoma of the rectum with a colorectal anastomosis?", "options": [{"label_html": "Loop colostomy", "is_correct": false}, {"label_html": "End colostomy", "is_correct": false}, {"label_html": "End ileostomy", "is_correct": false}, {"label_html": "Loop ileostomy", "is_correct": true}, {"label_html": "Caecostomy", "is_correct": false}], "correct_index": 3, "explanation_html": "Colonic resections with an anastomosis below the peritoneal reflection may have an anastomotic leak rate (both clinical and radiological) of up to 15%. Therefore most surgeons will defunction such an anastomosis to reduce the clinical severity of an anastomotic leak. A loop ileostomy will achieve this end point and is relatively easy to reverse. Loop colostomy is less popular in this setting as reversal can compromise the blood supply to the anastomosis."}, {"number": 4, "topic": "Abdominal stomas", "stem_html": "In which of the following scenarios is a mucous fistula most likely to be encountered?", "options": [{"label_html": "Following an elective right hemicolectomy and ileo-colic anastomosis", "is_correct": false}, {"label_html": "Following an Ivor Lewis oesophagectomy", "is_correct": false}, {"label_html": "Following an emergency sub total colectomy for severe colitis", "is_correct": true}, {"label_html": "Following an abdomino perineal excision of the colon and rectum for rectal cancer", "is_correct": false}, {"label_html": "Following a small bowel resection and primary anastomosis for incarcerated femoral hernia", "is_correct": false}], "correct_index": 2, "explanation_html": "A mucous fistula is a conduit between the skin and a redundant segment of bowel. They are typically constructed because the section of bowel that is exteriorized is at very high risk of breakdown. They are not the same as an end stoma, by definition they are usually seen in patients who have an end stoma. They are typically seen following a sub total colectomy where the distal sigmoid colon is deemed too friable to close and it then brought onto the skin as a mucous fistula."}], "note_html": "Stomas may be sited during a range of abdominal procedures and involve bringing the lumen or visceral contents onto the skin. In most cases this applies to the bowel. However, other organs or their contents may be diverted in case of need. <br><br>With bowel stomas the type method of construction and to a lesser extent the site will be determined by the contents of the bowel. In practice, small bowel stomas should be spouted so that their irritant contents are not in contact with the skin. Colonic stomas do not need to be spouted as their contents are less irritant. <br><br>In the ideal situation the site of the stoma should be marked with the patient prior to surgery. Stoma siting is important as it will ultimately influence the ability of the patient to manage their stoma and also reduce the risk of leakage. Leakage of stoma contents and subsequent maceration of the surrounding skin can rapidly progress into a spiraling loss of control of stoma contents. <br><br><b>Types of stomas<\/b><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Name of stoma<\/b><\/th><th><b>Use<\/b><\/th><th><b>Common sites<\/b><\/th><\/tr><\/thead><tbody><tr><td>Gastrostomy<\/td><td><ul><li>Gastric decompression or fixation<\/li><li>Feeding<\/li><\/ul><\/td><td>Epigastrium<\/td><\/tr><tr><td>Loop jejunostomy<\/td><td><ul><li>Seldom used as very high output<\/li><li>May be used following emergency laparotomy with planned early closure<\/li><\/ul><\/td><td>Any location according to need<\/td><\/tr><tr><td>Percutaneous jejunostomy<\/td><td><ul><li>Usually performed for feeding purposes and site in the proximal bowel<\/li><\/ul><\/td><td>Usually left upper quadrant<\/td><\/tr><tr><td>Loop ileostomy<\/td><td><ul><li>Defunctioning of colon e.g. following rectal cancer surgery<\/li><li>Does not decompress colon (if ileocaecal valve competent)<\/li><\/ul><\/td><td>Usually right iliac fossa<\/td><\/tr><tr><td>End ileostomy<\/td><td><ul><li>Usually following complete excision of colon or where ileo-colic anastomosis is not planned<\/li><li>May be used to defunction colon, but reversal is more difficult<\/li><\/ul><\/td><td>Usually right iliac fossa<\/td><\/tr><tr><td>End colostomy<\/td><td>Where a colon is diverted or resected and anastomosis is not primarily achievable or desirable<\/td><td>Either left or right iliac fossa<\/td><\/tr><tr><td>Loop colostomy<\/td><td><ul><li>To defunction a distal segment of colon<\/li><li>Since both lumens are present the distal lumen acts as a vent<\/li><\/ul><\/td><td>May be located in any region of the abdomen, depending upon colonic segment used<\/td><\/tr><tr><td>Caecostomy<\/td><td>Stoma of last resort where loop colostomy is not possible<\/td><td>Right iliac fossa<\/td><\/tr><tr><td>Mucous fistula<\/td><td><ul><li>To decompress a distal segment of bowel following colonic division or resection<\/li><li>Where closure of a distal resection margin is not safe or achievable<\/li><\/ul><\/td><td>May be located in any region of the abdomen according to clinical need<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Abdominal wound dehiscence", "questions": [{"number": 5, "topic": "Abdominal wound dehiscence", "stem_html": "A 73 year old man undergoes a laparotomy for mesenteric infarction. An extensive small bowel resection is undertaken. A planned re-look laparotomy is scheduled to occur in 24 hours time. What is the most appropriate closure strategy in this situation?", "options": [{"label_html": "Mass closure of the abdomen obeying Jenkins rule using 2 PDS", "is_correct": false}, {"label_html": "Application of a Bogota bag", "is_correct": true}, {"label_html": "Mass closure of the abdomen obeying Jenkins rule using 2/0 PDS", "is_correct": false}, {"label_html": "Mass closure of the abdomen obeying Jenkins rule using 2 nylon", "is_correct": false}, {"label_html": "Mass closure of the abdomen obeying Jenkins rule using 2/0 nylon", "is_correct": false}], "correct_index": 1, "explanation_html": "Where there are definite plans for early re-look surgery and it is desirable to visualize the viscera (as it would be in this case), application of a Bogota bag will provide the best closure option."}, {"number": 6, "topic": "Abdominal wound dehiscence", "stem_html": "A 53 year old lady undergoes a low anterior resection for rectal cancer. The procedure is performed as open surgery, what is the most appropriate method for closure of the abdominal wall?", "options": [{"label_html": "Mass closure of the abdomen obeying Jenkins rule using 1 PDS", "is_correct": true}, {"label_html": "Mass closure of the abdomen obeying Jenkins rule using 2/0 PDS", "is_correct": false}, {"label_html": "Mass closure of the abdomen obeying Jenkins rule using 1/0 nylon", "is_correct": false}, {"label_html": "Mass closure of the abdomen obeying Jenkins rule using 0 polygalactan", "is_correct": false}, {"label_html": "Use of deep tension sutures closure method using 5 polyester sutures", "is_correct": false}], "correct_index": 0, "explanation_html": "The standard closure technique for most laparotomy incisions is to use a mass closure method obeying Jenkins rule using 1 or 2 PDS or nylon. Few surgeons would use a narrower gauge suture such as 1/0 or 2/0 for abdominal wall closure."}, {"number": 7, "topic": "Abdominal wound dehiscence", "stem_html": "You have just completed a laparotomy for peritonitis due to a perforated peptic ulcer. What is the best surgical strategy for avoidance of a complete abdominal wound dehisence?", "options": [{"label_html": "Use of skin clips to close the skin rather than sub cuticular sutures", "is_correct": false}, {"label_html": "Careful approximation of the peritonum with non absorbable sutures", "is_correct": false}, {"label_html": "Mass closure of the midline wound using a 1 polydiaxone suture", "is_correct": true}, {"label_html": "Direct apposition of the rectus muscle rather than linea alba aponeurosis", "is_correct": false}, {"label_html": "Mass closure of the midline wound using a 3/0 polypropylene suture", "is_correct": false}], "correct_index": 2, "explanation_html": "The incidence of post operative wound dehisence is minimise by following Jenkins rule which advocates mass closure of the midline wound. However, the suture strength is an important consideration and 3/0 sutures do not have sufficient tensile strength. Both polydiaxone (PDS) and polypropylene (Prolene) or nylon (Ethilon) are all equally suitable. Although separate closure of the peritoneum was practised it has no bearing on the incidence of abdominal wound dehisence."}, {"number": 8, "topic": "Abdominal wound dehiscence", "stem_html": "A 52 year old man undergoes a laparotomy for perforated bowel after a colonoscopy.  2 days after surgery the nursing staff report there is pink, serous fluid discharging from the wound.  What is the next most appropriate management step?", "options": [{"label_html": "IV antibiotics for wound infection", "is_correct": false}, {"label_html": "No further management", "is_correct": false}, {"label_html": "Examine the wound for separation of the rectus fascia", "is_correct": true}, {"label_html": "Insert a drain into the wound", "is_correct": false}, {"label_html": "CT abdomen", "is_correct": false}], "correct_index": 2, "explanation_html": "The seepage of pink serosanguineous fluid through a closed abdominal wound is an early sign of abdominal wound dehiscence with possible evisceration. If this occurs, you should remove one or two sutures in the skin and explore the wound manually, using a sterile glove. If there is separation of the rectus fascia, the patient should be taken to the operating room for primary closure."}, {"number": 9, "topic": "Abdominal wound dehiscence", "stem_html": "Which of the following statements relating to a burst abdomen is false?", "options": [{"label_html": "Is seen in 1-2% of modern laparotomies", "is_correct": false}, {"label_html": "Is more common in faecal peritonitis", "is_correct": false}, {"label_html": "Is less common when a 'mass closure' technique is used", "is_correct": false}, {"label_html": "When it does occur is most common at 15 days", "is_correct": true}, {"label_html": "Is similar in incidence regardless of whether 1/0 polydiaxone or 1/0 polypropylene are used", "is_correct": false}], "correct_index": 3, "explanation_html": "When it does occur, a burst abdomen is most common at 6 days and is usually the result of technical error when Jenkins rule is not followed and sutures are placed in the zone of collagenolysis. The choice of materials given above does not influence dehisence rates."}, {"number": 10, "topic": "Abdominal wound dehiscence", "stem_html": "Which of these factors does not increase the risk of abdominal wound dehiscence following laparotomy?", "options": [{"label_html": "Jaundice", "is_correct": false}, {"label_html": "Abdominal compartment syndrome", "is_correct": false}, {"label_html": "Poorly controlled diabetes mellitus", "is_correct": false}, {"label_html": "Administration of intravenous steroids", "is_correct": false}, {"label_html": "Use of Ketamine as an anaesthetic agent", "is_correct": true}], "correct_index": 4, "explanation_html": "Ketamine does not affect healing. All the other situations in the list carry a strong association with poor healing and risk of dehisence."}], "note_html": "- This is a significant problem facing all surgeons who undertake abdominal surgery on a regular basis. Traditionally, it is said to occur when all layers of an abdominal mass closure fail and the viscera protrude externally (associated with 30% mortality). <br><ul><li>It can be subdivided into <b>superficial<\/b>, in which the skin wound alone fails and <b>complete<\/b>, implying failure of all layers.<\/li><\/ul><br>Factors which increase the risk are:<br>* Malnutrition<br>* Vitamin deficiencies <br>* Jaundice <br>* Steroid use <br>* Major wound contamination (e.g. faecal peritonitis)<br>* Poor surgical technique (Mass closure technique is the preferred method-Jenkins Rule)<br><br>When sudden full dehiscence occurs the management is as follows:<br>* Analgesia<br>* Intravenous fluids<br>* Intravenous broad spectrum antibiotics<br>* Coverage of the wound with saline impregnated gauze (on the ward)<br>* Arrangements made for a return to theatre<br><br><b>Surgical strategy<\/b><br><ul><li>Correct the underlying cause (e.g. TPN or NG feed if malnourished)<\/li><li>Determine the most appropriate strategy for managing the wound<\/li><\/ul><br><b>Options<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td>Resuturing of the wound<\/td><td>This may be an option if the wound edges are healthy and there is enough tissue for sufficient coverage. Deep tension sutures are traditionally used for this purpose.<\/td><\/tr><tr><td>Application of a wound manager<\/td><td>This is a clear dressing with removable front. Particularly suitable when some granulation tissue is present over the viscera or where there is a high output bowel fistula present in the dehisced wound.<\/td><\/tr><tr><td>Application of a 'Bogota bag'<\/td><td>This is a clear plastic bag that is cut and sutured to the wound edges and is only a temporary measure to be adopted when the wound cannot be closed and will necessitate a return to theatre for definitive management.<\/td><\/tr><tr><td>Application of a VAC dressing system<\/td><td>These can be safely used BUT ONLY if the correct layer is interposed between the suction device and the bowel. Failure to adhere to this absolute rule will almost invariably result in the development of multiple bowel fistulae and create an extremely difficult management problem.<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Anastomoses", "questions": [{"number": 11, "topic": "Anastomoses", "stem_html": "A 53 year old man undergoes an elective right hemicolectomy. A stapled ileo-colic anastomosis is constructed. Eight hours later he becomes tachycardic and passes approximately 600ml of dark red blood per rectum. Which of the following processes is the most likely explanation for this occurrence?", "options": [{"label_html": "Anastomotic leak", "is_correct": false}, {"label_html": "Discharging mesenteric haematoma", "is_correct": false}, {"label_html": "Bleeding peptic ulcer", "is_correct": false}, {"label_html": "Anastomotic staple line bleeding", "is_correct": true}, {"label_html": "Mesenteric infarct", "is_correct": false}], "correct_index": 3, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Safe visceral anastamosis requires:<br><ul><li>Mucosal to mucosal apposition<\/li><li>Adequate vascularity<\/li><li>Minimal tension<\/li><\/ul><\/div>Stapled anastomoses are associated with staple line bleeding and this may typically occur in the early post operative phase. They should be managed conservatively as most will settle.<br>Stapled anastomoses are quicker to perform. Ironically, although they may appear easy they can carry considerably more potential pitfalls than their hand sewn equivalent and should be used with caution by the inexperienced, this is especially true if the bowel is very thick walled."}, {"number": 12, "topic": "Anastomoses", "stem_html": "A 73 year old man with rest pain and ulceration of the foot undergoes a femoro-distal bypass graft with a PTFE graft. At the end of the procedure there are good distal foot pulses and a warm pink foot. Over the ensuing 60 days the foot becomes progressively cooler and the pulses diminish. What is the most likely underlying explanation for this process?", "options": [{"label_html": "Embolus", "is_correct": false}, {"label_html": "Neo-intimal flap", "is_correct": false}, {"label_html": "Neo-intimal hyperplasia", "is_correct": true}, {"label_html": "Polyarteritis", "is_correct": false}, {"label_html": "Steal syndrome", "is_correct": false}], "correct_index": 2, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Neo-intimal hyperplasia in distal arterial anastamoses may be reduced by use of a Miller Cuff when PTFE is the bypass conduit.<\/div>PTFE may induce neo-intimal hyperplasia with subsequent occlusion of the distal anastomosis. In more proximal arterial bypass surgery the process of neo-intimal hyperplasia is not sufficient to cause anastomotic occlusion. However, distal bypasses are at greater risk and if vein cannot be used as a conduit then the distal end of the PTFE should anastomosed to a vein cuff to minimise the risk of neo-intimal hyperplasia."}, {"number": 13, "topic": "Anastomoses", "stem_html": "A 73 year old man with rest pain and ulceration of the foot undergoes a femoro-distal bypass graft with a PTFE graft. At the end of the procedure there are good distal foot pulses and a warm pink foot. Over the ensuing 60 days the foot becomes progressively cooler and the pulses diminish. What is the most likely underlying explanation for this process?", "options": [{"label_html": "Embolus", "is_correct": false}, {"label_html": "Neo-intimal flap", "is_correct": false}, {"label_html": "Neo-intimal hyperplasia", "is_correct": true}, {"label_html": "Polyarteritis", "is_correct": false}, {"label_html": "Steal syndrome", "is_correct": false}], "correct_index": 2, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Neo-intimal hyperplasia in distal arterial anastamoses may be reduced by use of a Miller Cuff when PTFE is the bypass conduit.<\/div>PTFE may induce neo-intimal hyperplasia with subsequent occlusion of the distal anastomosis. In more proximal arterial bypass surgery the process of neo-intimal hyperplasia is not sufficient to cause anastomotic occlusion. However, distal bypasses are at greater risk and if vein cannot be used as a conduit then the distal end of the PTFE should anastomosed to a vein cuff to minimise the risk of neo-intimal hyperplasia."}, {"number": 15, "topic": "Anastomoses", "stem_html": "Which of the following visceral anastomoses has the lowest risk of anastomotic leak? You may assume that all are constructed in ideal circumstances.", "options": [{"label_html": "Stapled ileocolic anastomosis", "is_correct": false}, {"label_html": "Hand sewn anastomosis of the proximal ileum", "is_correct": true}, {"label_html": "Stapled colorectal anastomosis defunctioned with loop ileostomy", "is_correct": false}, {"label_html": "Stapled colorectal anastomosis defunctioned with loop colostomy", "is_correct": false}, {"label_html": "Hand sewn oesophagojejunal anastomosis", "is_correct": false}], "correct_index": 1, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">For a visceral anastomosis to heal, three factors need to be satisfied:<br>1.\tMucosal- mucosal apposition<br>2.\tA good blood supply<br>3.\tNo tension<br>The more these are compromised, the higher the leak rate. <br><\/div>Rectal and oesophageal surgery have some of the highest rates of anastomotic leakage. Following anterior resection leaks are quoted to occur in up to 10% of cases. Small bowel anastomoses are the most technically forgiving. Factors increasing the risk of anastamotic leakage include previous irradiation, sepsis, malnutrition, poor blood supply and poor technique.<br>The defunctioning of rectal anastomoses may reduce the clinical impact of anastomotic leak and make it amenable to percutaneous drainage, but does not necessarily reduce the incidence of leaks themselves."}], "note_html": "- A wide variety of anastomoses are constructed in surgical practice. Essentially the term refers to the restoration of luminal continuity. As such they are a feature of both abdominal and vascular surgery.<br><br><b>Visceral anastomoses<\/b><br><br>For an anastomosis to heal three criteria need to be fulfilled:<br><br><ul><li>Adequate blood supply<\/li><li>Mucosal apposition<\/li><li>Minimal tension<\/li><\/ul><br>When these are compromised the anastomosis may break down. Even in the best surgical hands some anastomoses are more prone to dehiscence than others. Oesophageal and rectal anastomoses are more prone to leakage and reported leak rates following oesophageal and rectal surgery can be as high as 20%. This figure includes radiological leaks and those with a clinically significant leak will be of a lower order of magnitude. As a rule small bowel anastomoses heal most reliably. <br><br>The decision as to how best to achieve mucosal apposition is one for each surgeon. Some will prefer the use of stapling devices as they are quicker to use, others will prefer to perform a sutured anastomosis. The attention to surgical technique is more important than the method chosen and a poorly constructed stapled anastomosis in thickened tissue is far more prone to leakage than a hand sewn anastomosis in the same circumstances. <br><br>If an anastomosis looks unsafe then it may be best not to construct one at all. In colonic surgery this is relatively clear cut and most surgeons would bring out an end colostomy. In situations such as oesophageal surgery this is far more problematic and colonic interposition may be required in this situation.<br><br><b>Vascular anastomoses<\/b><br><br>Most arterial surgery involving bypasses or aneurysm repairs will require construction of an arterial anastomosis. Technique is important and for small diameter distal arterial surgery the intimal hyperplasia resulting from a badly constructed anastomosis may render the whole operation futile before the patient leaves hospital.<br><br>Some key points about vascular anastomoses:<br><br><ul><li>Always use non absorbable monofilament suture (e.g. Polypropylene).<\/li><li>Round bodied needle.<\/li><li>Correct size for anastamosis ( i.e. 6/0 prolene for bottom end of a femoro-distal bypass).<\/li><li>Suture should be continuous and from inside to outside of artery to avoid raising an intimal flap.<\/li><\/ul>"}, {"name": "Descriptive statistics", "questions": [{"number": 14, "topic": "Descriptive statistics", "stem_html": "Which of the following is not utilised as a descriptive statistic?", "options": [{"label_html": "Mean", "is_correct": false}, {"label_html": "Median", "is_correct": false}, {"label_html": "Mode", "is_correct": false}, {"label_html": "Z score", "is_correct": true}, {"label_html": "Standard deviation", "is_correct": false}], "correct_index": 3, "explanation_html": "The z score is determined using the normal distribution and is not a descriptive statistic."}], "note_html": "Descriptive statistics include a point estimate of the measured variable as well as a measure of the variability of the data around that point estimate. Typical examples of point estimates include; mean, median and mode. The two most commonly employed measurements of variability include standard deviation and the inter quartile range. The standard deviation is usually considered in association with the mean, while the inter quartile range is used alongside the median. Other measures of data variability include the standard error of the mean and confidence interval. The standard error of the mean represents the measure of variation around the point estimate of the mean of a group of sample means, as such it should only be used when describing the characteristics of more than one sample."}, {"name": "Electrosurgery", "questions": [{"number": 16, "topic": "Electrosurgery", "stem_html": "In which electrosurgical mode is the electrode held away from the tissue, where the current utilises a low amplitude and high voltage?", "options": [{"label_html": "Desiccation", "is_correct": false}, {"label_html": "Fulguration", "is_correct": true}, {"label_html": "Blended current", "is_correct": false}, {"label_html": "Cutting current", "is_correct": false}, {"label_html": "Coagulation current", "is_correct": false}], "correct_index": 1, "explanation_html": "Fulguration typically avoids contact between the electrode and the tissue with the current configured to favor arc formation."}, {"number": 17, "topic": "Electrosurgery", "stem_html": "In which electrosurgical modality does a sinusoidal, non modulated waveform result in vaporization of the tissues?", "options": [{"label_html": "Coagulation current", "is_correct": false}, {"label_html": "Cutting current", "is_correct": true}, {"label_html": "Blended current", "is_correct": false}, {"label_html": "Fulguration", "is_correct": false}, {"label_html": "Desiccation", "is_correct": false}], "correct_index": 1, "explanation_html": "The high energy levels result in tissue vaporisation and cleavage of tissues."}], "note_html": "Electrosurgery utilises the heat generated by the passage of high frequency alternating electrical current through living tissues. The application of a voltage across human tissue results in the formation of an electrical circuit between the voltage source and the tissue. The tissue acts as a resistor and the level of resistance is determined by the water content of the tissue. It is this resistance that results in the formation of heat. <br><br>An alternating current constantly changes the direction in which the current flows, the speed with which this occurs is measured in Hertz. Most diathermy units operate at a frequency of between 200,000 kHZ to 5MHz. This means that tissue such as nerves and muscles will not depolarise (since this seldom occurs at frequencies above 10,000Hz). The current waveform can be adjusted to deliver three main therapeutic modalities; cutting, coagulation and blend. <br><br><b>Types of current<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Cutting<\/b><\/td><td><ul><li>Sinusoidal and non modulated waveform<\/li><li>High average power and current density<\/li><li>Precise cutting without thermal damage<\/li><\/ul><\/td><\/tr><tr><td><b>Coagulation<\/b><\/td><td><ul><li>Modulated current with intermittent dampened sine waves of high peak voltage<\/li><li>Evaporation, rather than vaporisation of intracellular fluid occurs<\/li><li>Results in formation of coagulum<\/li><\/ul><\/td><\/tr><tr><td><b>Desication<\/b><\/td><td><ul><li>Active electrode in direct contact with tissue<\/li><li>Low current and high voltage system<\/li><li>Results in loss of cellular water but no protein damage<\/li><\/ul><\/td><\/tr><tr><td><b>Fulguration<\/b><\/td><td><ul><li>Electrode probe is held away from tissue<\/li><li>Produces spray effect with local, superficial tissue destruction<\/li><li>Low amplitude and high voltage system<\/li><\/ul><\/td><\/tr><tr><td><b>Blend<\/b><\/td><td><ul><li>Alternating cutting and coagulation modes<\/li><li>Total average power is less than with cutting<\/li><\/ul><\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Gases for laparoscopic surgery", "questions": [{"number": 18, "topic": "Gases for laparoscopic surgery", "stem_html": "A 43 year old lady is due to undergo a diagnostic laparoscopy. Which of the agents listed below should be used for inducing pneumoperitoneum?", "options": [{"label_html": "Argon", "is_correct": false}, {"label_html": "Helium", "is_correct": false}, {"label_html": "Air", "is_correct": false}, {"label_html": "Carbon dioxide", "is_correct": true}, {"label_html": "Nitrogen", "is_correct": false}], "correct_index": 3, "explanation_html": "Carbon dioxide is the agent of choice. It is rapidly re-absorbed, does not support combustion and is cheap. It is rapidly cleared from the lungs and so effects on pH are unusual."}, {"number": 19, "topic": "Gases for laparoscopic surgery", "stem_html": "A 34 year old lady is due to undergo a laparoscopic cholecystectomy. Which of the following intrabdominal pressures should typically be set on the gas insufflation system?", "options": [{"label_html": "4mm Hg", "is_correct": false}, {"label_html": "10mm Hg", "is_correct": true}, {"label_html": "20mm Hg", "is_correct": false}, {"label_html": "40mm Hg", "is_correct": false}, {"label_html": "60mm Hg", "is_correct": false}], "correct_index": 1, "explanation_html": "Pressures lower than 7mm Hg are not usually compatible with satisfactory views. Pressures &gt;15mm Hg are usually associated with decreased venous return and hypotension."}], "note_html": "Laparoscopic surgery may be performed in a number of body cavities. In some areas irrigation solutions are preferred. In the abdomen insufflation with carbon dioxide gas is commonly used. The amount of gas delivered is adjusted to maintain a constant intra-abdominal pressure of between 12 and 15 mmHg. Excessive intra-abdominal pressure may reduce venous return and lead to hypotension. Too little insufflation will risk obscuring the surgical view."}, {"name": "Helicobacter Pylori", "questions": [{"number": 20, "topic": "Helicobacter Pylori", "stem_html": "A 52 year old man with dyspepsia is found to have a duodenal ulcer. A CLO test is taken and is positive. Which statement relating to the likely causative organism is false?", "options": [{"label_html": "It is a gram negative organism", "is_correct": false}, {"label_html": "It preferentially colonises gastric type mucosa", "is_correct": false}, {"label_html": "It may occupy areas of ectopic gastric metaplasia", "is_correct": false}, {"label_html": "In patients who are colonised there is commonly evidence of fundal gastritis on endoscopy", "is_correct": true}, {"label_html": "It produces a powerful urease that forms the basis of the Clo test", "is_correct": false}], "correct_index": 3, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Helicobacter pylori accounts for &gt;75% cases of duodenal ulceration. It may be diagnosed with either serology, microbiology, histology or CLO testing.<\/div><i><i>Helicobacter<\/i> pylori<\/i> rarely produces any typical features on endoscopy. Where infection is suspected the easiest course of action is to take an antral biopsy for Clo testing in the endoscopy suite."}, {"number": 21, "topic": "Helicobacter Pylori", "stem_html": "A 43 year old man presents with dyspepsia and undergoes an upper GI endoscopy. During the procedure diffuse gastric and duodenal ulcers are identified. A Clo test confirms the presence of <i>Helicobacter pylori<\/i> infection. What is the most likely explanation for the ulcers?", "options": [{"label_html": "Decreased gastric motility", "is_correct": false}, {"label_html": "Increased urease activity", "is_correct": false}, {"label_html": "Decreased release of mucous and bicarbonate", "is_correct": false}, {"label_html": "Decreased gastrin levels", "is_correct": false}, {"label_html": "Increased acid production", "is_correct": true}], "correct_index": 4, "explanation_html": "H-Pylori has a number of pathological effects. In this question the main issue is by what mechanism the organism is able to induce both gastric and duodenal ulceration. Without modestly elevated acid levels, the duodenum would not undergo gastric metaplasia. H-Pylori cannot colonise duodenal mucosa and therefore the development of ulcers at this site can only occur in those who have undergone metaplastic transformation (mediated by increased acidity)."}], "note_html": "Infection with Helicobacter Pylori is implicated in many cases of duodenal ulceration and up to 60% of patients with gastric ulceration. <br><br>It is a gram negative, helical shaped rod with microaerophillic requirements. It has the ability to produce a urease enzyme that will hydrolyse urea resulting in the production of ammonia. The effect of ammonia on antral G cells is to cause release of gastrin via a negative feedback loop. <br><br>Once infection is established the organism releases enzymes that disrupt the gastric mucous layer. Certain subtypes release cytotoxins  cag A and vac A gene products. The organism incites a classical chronic inflammatory process of the gastric epithelium. This accounts for the development of gastric ulcers. The mildly increased acidity may induce a process of duodenal gastric metaplasia. Whilst duodenal mucosa cannot be colonised by H-Pylori, mucosa that has undergone metaplastic change to the gastric epithelial type may be colonised by H- Pylori with subsequent inflammation and development of duodenitis and ulcers.<br><br>In patients who are colonized, there is a 10-20% risk of peptic ulcer, 1-2% risk gastric cancer and &lt;1% risk MALT lymphoma."}, {"name": "Inguinal hernia surgery", "questions": [{"number": 22, "topic": "Inguinal hernia surgery", "stem_html": "A 12 month old child is brought to the clinic with a history of a right groin swelling. The parents have a photograph on their mobile phone which looks very much like an inguinal hernia. What is the best course of action?", "options": [{"label_html": "Arrange an MRI scan", "is_correct": false}, {"label_html": "Undertake an open inguinal hernia repair with mesh", "is_correct": false}, {"label_html": "Undertake an open inguinal herniotomy", "is_correct": true}, {"label_html": "Undertake a laparoscopic hernia repair with mesh", "is_correct": false}, {"label_html": "Arrange a herniogram", "is_correct": false}], "correct_index": 2, "explanation_html": "Where the history is strongly suggestive and the parents have a clear image or even description, most surgeons would proceed without confirmatory imaging. Herniograms and MRI would require a GA in a child of this age and are not routine. Herniotomy is the usual procedure and no mesh is used."}, {"number": 23, "topic": "Inguinal hernia surgery", "stem_html": "A 25 year old builder presents with a reducible swelling in the right groin, it is becoming larger and has not been operated on previously. What is the best course of action?", "options": [{"label_html": "Open inguinal herniotomy", "is_correct": false}, {"label_html": "Laparoscopic inguinal herniotomy", "is_correct": false}, {"label_html": "Open Bassini repair", "is_correct": false}, {"label_html": "Laparoscopic Bassini repair", "is_correct": false}, {"label_html": "Open Lichtenstein repair", "is_correct": true}], "correct_index": 4, "explanation_html": "The hernia can be repaired by either open or laparoscopic techniques. However, herniotomy is not performed as an isolated procedure in adults. The Bassini darn repair has a high recurrence rate. An open Lichtenstein repair using mesh is appropriate. There is a 0.77% recurrence rate with this technique. A Shouldice repair is an acceptable alternative if the surgeon is experienced"}, {"number": 24, "topic": "Inguinal hernia surgery", "stem_html": "A 25 year old builder presents with a reducible swelling in the right groin, it is becoming larger and has not been operated on previously. What is the best course of action?", "options": [{"label_html": "Open inguinal herniotomy", "is_correct": false}, {"label_html": "Laparoscopic inguinal herniotomy", "is_correct": false}, {"label_html": "Open Bassini repair", "is_correct": false}, {"label_html": "Laparoscopic Bassini repair", "is_correct": false}, {"label_html": "Open Lichtenstein repair", "is_correct": true}], "correct_index": 4, "explanation_html": "The hernia can be repaired by either open or laparoscopic techniques. However, herniotomy is not performed as an isolated procedure in adults. The Bassini darn repair has a high recurrence rate. An open Lichtenstein repair using mesh is appropriate. There is a 0.77% recurrence rate with this technique. A Shouldice repair is an acceptable alternative if the surgeon is experienced"}, {"number": 25, "topic": "Inguinal hernia surgery", "stem_html": "A 28 year old man presents with a recurrent inguinal hernia on the left side of his abdomen and a newly diagnosed inguinal hernia on the right side. What is the best course of action?", "options": [{"label_html": "Bilateral open Litchenstein repair", "is_correct": false}, {"label_html": "Bilateral open inguinal herniotomy", "is_correct": false}, {"label_html": "Bilateral laparoscopic inguinal herniotomy", "is_correct": false}, {"label_html": "Bilateral laparoscopic TEP repair", "is_correct": true}, {"label_html": "Bilateral open Shouldice repair", "is_correct": false}], "correct_index": 3, "explanation_html": "Laparoscopic hernia repairs are specifically indicated where there are bilateral hernias or recurrence of a previous open repair."}, {"number": 26, "topic": "Inguinal hernia surgery", "stem_html": "A 40 year old man presents with a long standing inguinal hernia. On examination he has a small, direct inguinal hernia. He inquires as to the risk of strangulation over the next twelve months should he decide not to undergo surgery. Which of the following most closely matches the likely risk of strangulation over the next 12 months?", "options": [{"label_html": "50%", "is_correct": false}, {"label_html": "40%", "is_correct": false}, {"label_html": "25%", "is_correct": false}, {"label_html": "15%", "is_correct": false}, {"label_html": "&lt;5%", "is_correct": true}], "correct_index": 4, "explanation_html": "The annual probability of strangulation is up to 3% and is more common in indirect hernias. Elective repair poses few risks. However, emergency repair is associated with increased mortality, particularly in the elderly."}], "note_html": "Inguinal hernias occur when the abdominal viscera protrude through the anterior abdominal wall into the inguinal canal. They may be classified as being either direct or indirect. The distinction between these two rests on their relation to Hesselbach's triangle. <br><br><b>Boundaries of Hesselbach's Triangle<\/b> <br><ul><li>Medial: Rectus abdominis<\/li><li>Lateral: Inferior epigastric vessels<\/li><li>Inferior:  Inguinal ligament <\/li><\/ul><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb074b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb074.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Inguinal triangle\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb074b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center><br>Hernias occurring within the triangle tend to be direct and those outside - indirect. <br><br><b>Diagnosis<\/b><br>Most cases are diagnosed clinically, a reducible swelling may be located at the level of the inguinal canal. Large hernia's may extend down into the male scrotum, these will not trans-illuminate and it is not possible to 'get above' the swelling. <br>Cases that are unclear on examination, but suspected from the history, may be further investigated using ultrasound or by performing a herniogram.<br><br><b>Treatment<\/b><br>Hernias associated with few symptoms may be managed conservatively. Symptomatic hernias or those which are at risk of developing complications are usually treated surgically. <br>First time hernias may be treated by performing an open inguinal hernia repair; the inguinal canal is opened, the hernia reduced and the defect repaired. A prosthetic mesh may be placed posterior to the cord structures to re-enforce the repair and reduce the risk of recurrence.<br>Recurrent hernias and those which are bilateral are generally managed with a laparoscopic approach. This may be via an intra or extra peritoneal route. As in open surgery a mesh is deployed. However, it will typically lie posterior to the deep ring. <br><br><b>Inguinal hernia in children<\/b><br>Inguinal hernias in children are almost always of an indirect type and therefore are usually dealt with by herniotomy, rather than herniorraphy. Neonatal hernias especially in those children born prematurely are at highest risk of strangulation and should be repaired urgently. Other hernias may be repaired on an elective basis.<br><br><b>References<\/b><br>The UK Based National Institute of Clinical Excellence has published guidelines relating to the choice between open and laparoscopic inguinal hernia repair. Which users may find interesting:<br><br>http://guidance.nice.org.uk/TA83/Guidance/pdf/English"}, {"name": "Levels of evidence", "questions": [{"number": 27, "topic": "Levels of evidence", "stem_html": "An orthopaedic surgeon makes a modification to an operative approach for total knee arthroplasty. After he has completed 25 cases, he stops and reviews his patient outcomes. He publishes the data. What level of evidence is supplied by this type of data?", "options": [{"label_html": "II", "is_correct": false}, {"label_html": "IV", "is_correct": true}, {"label_html": "III", "is_correct": false}, {"label_html": "V", "is_correct": false}, {"label_html": "I", "is_correct": false}], "correct_index": 1, "explanation_html": "Case series that are non randomised and lack concurrent controls at best supply level IV evidence only. To qualify for level I and II evidence a prospective randomised controlled trial with appropriate blinding, control matching and power calculations is needed."}, {"number": 28, "topic": "Levels of evidence", "stem_html": "One of the senior surgeons in the hospital advises as to the best management of Merkel cell tumours of the skin in which she has a special interest. What level of evidence is this?", "options": [{"label_html": "I", "is_correct": false}, {"label_html": "II", "is_correct": false}, {"label_html": "III", "is_correct": false}, {"label_html": "IV", "is_correct": false}, {"label_html": "V", "is_correct": true}], "correct_index": 4, "explanation_html": "Personal expert opinion qualifies for level V evidence."}, {"number": 29, "topic": "Levels of evidence", "stem_html": "A group of surgeons review a meta-analysis of a series of randomised controlled trials on the Cochrane database and decide that one type of hip replacement is superior to another. What level of evidence is this?", "options": [{"label_html": "II", "is_correct": false}, {"label_html": "III", "is_correct": false}, {"label_html": "I", "is_correct": true}, {"label_html": "V", "is_correct": false}, {"label_html": "IV", "is_correct": false}], "correct_index": 2, "explanation_html": "A meta- analysis of more than one well designed trials will typically represent level I evidence. It does, of course, depend on how well the trials were conducted and reported."}, {"number": 30, "topic": "Levels of evidence", "stem_html": "A group of surgeons are trying to decide which type of mesh to use for incisional hernia repair. Their assimilated evidence includes two case series and one randomised controlled trial. What level of evidence is this?", "options": [{"label_html": "III", "is_correct": false}, {"label_html": "I", "is_correct": false}, {"label_html": "IV", "is_correct": false}, {"label_html": "II", "is_correct": true}, {"label_html": "V", "is_correct": false}], "correct_index": 3, "explanation_html": "Data which includes at least one RCT will usually qualify for level II evidence."}], "note_html": "The level of evidence refers to the study design used by investigators to minimise bias.<br><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Level of evidence<\/b><\/td><td><b>Source<\/b><\/td><\/tr><tr><td>I<\/td><td>Evidence obtained from systematic review of all relevant randomised controlled trials<\/td><\/tr><tr><td>II<\/td><td>Evidence derived from at least one properly designed randomised controlled trial<\/td><\/tr><tr><td>III<\/td><td>Evidence derived from well designed pseudo-randomised controlled trials (e.g. alternate allocation) or historical controls<\/td><\/tr><tr><td>IV<\/td><td>Evidence derived from case series or case reports<\/td><\/tr><tr><td>V<\/td><td>Panel or expert opinion<\/td><\/tr><\/tbody><\/table><\/div><br>Many of the categories contain sub groups, detailed knowledge of these are not required for MRCS Part A.<br><br><b>References<\/b><br>Interested users will find further information at www.cebm.net"}, {"name": "Management of bleeding", "questions": [{"number": 31, "topic": "Management of bleeding", "stem_html": "During a pelvic lymphadenectomy, the common iliac vein is injured and there is profuse bleeding. What is the best course of action?", "options": [{"label_html": "Clamp the vessel to gain a better view and then ligate it", "is_correct": false}, {"label_html": "Occlude the bleeding point with digital pressure and consider direct sutured repair with 5/0 polypropylene", "is_correct": true}, {"label_html": "Use diathermy at high coagulation current to stem the bleeding", "is_correct": false}, {"label_html": "Apply surgicell to the site and wait for bleeding to cease", "is_correct": false}, {"label_html": "Apply digital pressure to the vessel and suture the vessel with 2/0 polypropylene", "is_correct": false}], "correct_index": 1, "explanation_html": "The use of digital pressure and careful sutured repair is the preferred option."}, {"number": 32, "topic": "Management of bleeding", "stem_html": "A 23 year old man is undergoing an open appendicectomy. The surgeons extend the incision medially and suddenly encounter troublesome bleeding. What is the best course of action?", "options": [{"label_html": "Apply topical haemostatic agents to the vessel", "is_correct": false}, {"label_html": "Ligate the bleeding vessel", "is_correct": true}, {"label_html": "Apply bipolar diathermy to the vessel", "is_correct": false}, {"label_html": "Use monopolar diathermy on blend setting to seal the vessel", "is_correct": false}, {"label_html": "Inject the area with dilute adrenaline", "is_correct": false}], "correct_index": 1, "explanation_html": "Medial extension of an appendicectomy incision carries the risk of injury to the inferior epigastric artery. This can bleed briskly and is best managed by ligation."}, {"number": 33, "topic": "Management of bleeding", "stem_html": "During an open Watsons Fundoplication, the inferior pole of the spleen is injured causing troublesome bleeding. What is the best course of action?", "options": [{"label_html": "Removal of the entire spleen", "is_correct": false}, {"label_html": "Partial splenectomy", "is_correct": false}, {"label_html": "Use of argon plasma coagulation system", "is_correct": true}, {"label_html": "Sutured splenorrhaphy", "is_correct": false}, {"label_html": "Sutured ligation of the splenic hilar vessels", "is_correct": false}], "correct_index": 2, "explanation_html": "The argon plasma coagulation system is very good for managing splenic bleeding. Alternatives include topical haemostatic agents. Its not necessary to ligate the hilar vessels, if this is required, a splenectomy is the usual outcome."}], "note_html": "Bleeding is a process that is encountered in all branches of surgery. The decision as to how best to manage bleeding depends upon the site, vessel and circumstances.<br><br><b>Management of superficial dermal bleeding<\/b><br>This will usually cease spontaneously. If it is troublesome then direct use of monopolar or bipolar cautery devices will usually control the situation. Scalp wounds are a notable exception and the bleeding from these may be brisk. In this situation the use of mattress sutures as a wound closure method will usually address the problem.<br><br><b>Superficial arterial bleeding<\/b><br>If the vessel can be safely identified then the easiest method is to apply a haemostatic clip and ligate the vessel. <br><br><b>Major arterial bleeding<\/b><br>If the vessel can be clearly identified and is accessible then it may be possible to apply a clip and ligate the vessel. If the vessel is located in a pool of blood then blind application of haemostatic clips is highly dangerous and may result in collateral injury. In this situation evacuating the clot and packing the area is often safer. The pack can then be carefully removed when the required instruments are available. Some vessels may retract and bleeding may then be controlled by dissection of surrounding structures or under-running the bleeding point.<br><br><b>Major venous bleeding<\/b><br>The safest initial course of action is to apply digital pressure to the bleeding point. To control the bleeding the surgeon will need a working suction device. Divided veins may require ligation. Incomplete lacerations of major veins (e.g. IVC) are best repaired. In order to do this it is safest to apply a Satinsky type vascular clamp and repair the defect with 5/0 prolene.<br><br><b>Bleeding from raw surfaces<\/b><br>This may be mixed bleeding and can be troublesome. Spray diathermy and argon plasma coagulation are both useful agents. Certain topical haemostatic agents such as surgicell are useful in encouraging clot formation and may be used in conjunction with, or instead of, the above agents."}, {"name": "Methods of wound closure", "questions": [{"number": 34, "topic": "Methods of wound closure", "stem_html": "A 59 year old lady undergoes a breast reconstruction following a mastectomy. A breast implant is placed anterior to pectoralis major. What is the most appropriate method of wound closure?", "options": [{"label_html": "Use of a full thickness skin  graft", "is_correct": false}, {"label_html": "Use of a split thickness skin graft", "is_correct": false}, {"label_html": "Use of a pedicled myocutaneous flap", "is_correct": true}, {"label_html": "Use of a free myocutaneous flap", "is_correct": false}, {"label_html": "Use of a microvascular free flap", "is_correct": false}], "correct_index": 2, "explanation_html": "The use of a pedicled latissimus dorsi flap is a common method of providing breast reconstruction over an implant. Free flaps do not heal as reliably as pedicled ones and these would therefore be used in preference in this particular setting."}, {"number": 35, "topic": "Methods of wound closure", "stem_html": "A 59 year old lady undergoes a breast reconstruction following a mastectomy. A breast implant is placed anterior to pectoralis major. What is the most appropriate method of wound closure?", "options": [{"label_html": "Use of a full thickness skin  graft", "is_correct": false}, {"label_html": "Use of a split thickness skin graft", "is_correct": false}, {"label_html": "Use of a pedicled myocutaneous flap", "is_correct": true}, {"label_html": "Use of a free myocutaneous flap", "is_correct": false}, {"label_html": "Use of a microvascular free flap", "is_correct": false}], "correct_index": 2, "explanation_html": "The use of a pedicled latissimus dorsi flap is a common method of providing breast reconstruction over an implant. Free flaps do not heal as reliably as pedicled ones and these would therefore be used in preference in this particular setting."}, {"number": 36, "topic": "Methods of wound closure", "stem_html": "A 63 year old man undergoes a salvage abdominoperineal excision of the anus and rectum for recurrent anal cancer. He has previously been treated with radical chemoradiotherapy. At the conclusion of the procedure, there is a 10cm x 10cm perineal skin defect. What is the most appropriate option for providing closure?", "options": [{"label_html": "Use of a VAC wound management system", "is_correct": false}, {"label_html": "Rotational skin flap", "is_correct": false}, {"label_html": "Deep tension sutures and primary closure", "is_correct": false}, {"label_html": "Pedicled myocutaneous flap", "is_correct": true}, {"label_html": "Delayed primary closure", "is_correct": false}], "correct_index": 3, "explanation_html": "The use of previous radiotherapy means that the wound will not heal well. A myocutaneous flap will mean that non irradiated tissue is interposed into the wound bed. Rotational skin flaps will comprise irradiated tissue and won't heal."}, {"number": 37, "topic": "Methods of wound closure", "stem_html": "A 63 year old male is gardening when he trips and lands on a scythe. He sustains a deep laceration of his lateral thigh, it measures 3cm depth by 7cm length, it penetrates down to the bone, but no fracture is evident on imaging or examination. His co- morbidities include type II diabetes mellitus (diet controlled) and polymyalgia rheumatica (takes regular low dose prednisolone). Which of the options below is the safest way of managing the wound?", "options": [{"label_html": "Primary closure using deep tension sutures", "is_correct": false}, {"label_html": "Primary closure in layers", "is_correct": false}, {"label_html": "Delayed primary closure", "is_correct": true}, {"label_html": "Full thickness skin graft", "is_correct": false}, {"label_html": "Split thickness skin graft", "is_correct": false}], "correct_index": 2, "explanation_html": "Wounds which are contaminated or have the potential to become so are unsafe for immediate primary closure. The combination of diabetes and steroids makes wound complications more likely. Despite his high risk a primary skin graft or flap is unlikely to be a safer option. Either may be used at a later date in the event that delayed primary closure is unsuccessful."}, {"number": 38, "topic": "Methods of wound closure", "stem_html": "A 73 year old lady presents with an ulcer overlying her medial malleolus. It is painless and has been present for 4 months. She has oedema of the lower limbs and her ABPI measures 0.9. What is the best management option?", "options": [{"label_html": "Compression bandages", "is_correct": true}, {"label_html": "Non compression bandaging", "is_correct": false}, {"label_html": "Split thickness skin grafting", "is_correct": false}, {"label_html": "Full thickness skin grafting", "is_correct": false}, {"label_html": "Angioplasty and non compression bandages", "is_correct": false}], "correct_index": 0, "explanation_html": "This is likely to be a venous leg ulcer. These are typically managed using compression bandages. Contra indications to this technique include peripheral vascular disease (not present here)."}, {"number": 39, "topic": "Methods of wound closure", "stem_html": "A 72 year old man has discharge from a healed abdomino-perineal resection wound. On examination, it has almost completely healed but there is prominent granulation tissue at the apex of the wound. There is no evidence of an underlying collection and he is otherwise well. What is the best course of action?", "options": [{"label_html": "Excision of the area", "is_correct": false}, {"label_html": "Cryotherapy", "is_correct": false}, {"label_html": "Application of topical silver nitrate", "is_correct": true}, {"label_html": "Compression dressings", "is_correct": false}, {"label_html": "Application of alginate dressings", "is_correct": false}], "correct_index": 2, "explanation_html": "Silver nitrate will cauterise the exuberant granulation tissue and promote healing."}, {"number": 40, "topic": "Methods of wound closure", "stem_html": "A 28 year old man undergoes an incision and drainage of an axillary abscess. How should the wound be managed?", "options": [{"label_html": "Primary closure", "is_correct": false}, {"label_html": "Delayed primary closure", "is_correct": false}, {"label_html": "Packing with alginate dressing", "is_correct": true}, {"label_html": "Packing with gauze", "is_correct": false}, {"label_html": "Skin grafts", "is_correct": false}], "correct_index": 2, "explanation_html": "Use of gauze is inappropriate and will be painful to redress. Abscess wounds should not be closed."}, {"number": 41, "topic": "Methods of wound closure", "stem_html": "A 68 year old man undergoes a wide local excision of a squamous cell carcinoma from the lateral aspect of his nose. At the completion of the operation the alar cartilage is visible. What is the best method of closing the wound?", "options": [{"label_html": "Interrupted 3/0 silk", "is_correct": false}, {"label_html": "Local rotational flap", "is_correct": true}, {"label_html": "Split thickness skin graft", "is_correct": false}, {"label_html": "Vacuum assisted closure system", "is_correct": false}, {"label_html": "Full thickness skin graft", "is_correct": false}], "correct_index": 1, "explanation_html": "This type of wound should be managed with a local rotational flap."}, {"number": 42, "topic": "Methods of wound closure", "stem_html": "A 68 year old man has undergone excision of a seborrhoiec wart on his left cheek this is removed by use of curretage leaving a superficial defect approximately 1cm in diameter. What is the best course of action?", "options": [{"label_html": "Application of simple dressing", "is_correct": true}, {"label_html": "Split thickness skin graft", "is_correct": false}, {"label_html": "Full thickness skin graft", "is_correct": false}, {"label_html": "Suturing of the wound with 2/0 nylon", "is_correct": false}, {"label_html": "Rotational local flap", "is_correct": false}], "correct_index": 0, "explanation_html": "This type of superficial wound will re-epithelialise satisfactorily without grafting."}, {"number": 43, "topic": "Methods of wound closure", "stem_html": "A 72 year old man undergoes a ray amputation of the foot for an infection complicating long standing diabetes. What is the best method for healing the resultant wound?", "options": [{"label_html": "Compression bandaging", "is_correct": false}, {"label_html": "Vacuum assisted closure system", "is_correct": true}, {"label_html": "Split thickness graft", "is_correct": false}, {"label_html": "Primary closure with 2/0 polypropylene", "is_correct": false}, {"label_html": "Full thickness skin graft", "is_correct": false}], "correct_index": 1, "explanation_html": "Ray amputations for diabetic foot infections do not heal well and should never be primarily closed. The use of vacuum assisted closure devices has been shown to improve healing rates."}], "note_html": "<div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Method of closure<\/b><\/th><th><b>Indication<\/b><\/th><\/tr><\/thead><tbody><tr><td>Primary closure<\/td><td><ul><li>Clean wound, usually surgically created or following minor trauma<\/li><li>Standard suturing methods will usually suffice<\/li><li>Wound heals by primary intention<\/li><\/ul><\/td><\/tr><tr><td>Delayed primary closure<\/td><td><ul><li>Similar methods of actual closure to primary closure<\/li><li>May be used in situations where primary closure is either not achievable or not advisable e.g. infection<\/li><\/ul><\/td><\/tr><tr><td>Vacuum assisted closure<\/td><td><ul><li>Uses negative pressure therapy to facilitate wound closure<\/li><li>Sponge is inserted into wound cavity and then negative pressure applied<\/li><li>Advantages include removal of exudate and versatility<\/li><li>Disadvantages include cost and risk of fistulation if used incorrectly on sites such as bowel<\/li><\/ul><\/td><\/tr><tr><td>Split thickness skin grafts<\/td><td><ul><li>Superficial dermis removed with Watson knife or dermatome (commonly from thigh)<\/li><li>Remaining epithelium regenerates from dermal appendages<\/li><li>Coverage may be increased by meshing<\/li><\/ul><\/td><\/tr><tr><td>Full thickness skin grafts<\/td><td><ul><li>Whole dermal thickness is removed<\/li><li>Sub dermal fat is then removed and graft placed over donor site<\/li><li>Better cosmesis and flexibility at recipient site<\/li><li>Donor site morbidity<\/li><\/ul><\/td><\/tr><tr><td>Flaps<\/td><td><ul><li>Viable tissue with a blood supply<\/li><li>May be pedicled or free<\/li><li>Pedicled flaps are more reliable, but limited in range<\/li><li>Free flaps have greater range but carry greater risk of breakdown as they require vascular anastomosis<\/li><\/ul><\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Randomised controlled trials", "questions": [{"number": 44, "topic": "Randomised controlled trials", "stem_html": "A surgeon wishes to determine whether different methods of perioperative shaving have an effect on post operative wound infection rates. Which of the following is the best method for assessing whether one method is better than the other?", "options": [{"label_html": "Cohort study", "is_correct": false}, {"label_html": "Retrospective study", "is_correct": false}, {"label_html": "Case controlled study", "is_correct": false}, {"label_html": "Cross over study", "is_correct": false}, {"label_html": "Randomised controlled study", "is_correct": true}], "correct_index": 4, "explanation_html": "A randomised controlled study is the best method for assessing this relationship. It is important to analyse data from RCT's on an intention to treat basis."}], "note_html": "Randomised controlled trials are an established method of comparing two variables. These may consist of comparison of treatments or treatment versus placebo. Ideally the trials should be blinded, usually to the patient and those treating them. <br>In most cases a power calculation should be performed to determine the sample size required to detect a difference."}, {"name": "Sterilisation", "questions": [{"number": 45, "topic": "Sterilisation", "stem_html": "Which of the following substances is commonly used to sterilize endoscopic equipment?", "options": [{"label_html": "Aqueous phenol", "is_correct": false}, {"label_html": "80% phenol", "is_correct": false}, {"label_html": "Absolute alcohol", "is_correct": false}, {"label_html": "Glutaraldehyde", "is_correct": true}, {"label_html": "Gamma irradiation", "is_correct": false}], "correct_index": 3, "explanation_html": "Most endoscopic processors use glutaraldehyde which is an effective antimicrobial agent. It is widely recognized as being a cause of hypersensitivity reactions and is thus used in closed systems."}, {"number": 46, "topic": "Sterilisation", "stem_html": "Which of the following substances is commonly used to sterilize endoscopic equipment?", "options": [{"label_html": "Aqueous phenol", "is_correct": false}, {"label_html": "80% phenol", "is_correct": false}, {"label_html": "Absolute alcohol", "is_correct": false}, {"label_html": "Glutaraldehyde", "is_correct": true}, {"label_html": "Gamma irradiation", "is_correct": false}], "correct_index": 3, "explanation_html": "Most endoscopic processors use glutaraldehyde which is an effective antimicrobial agent. It is widely recognized as being a cause of hypersensitivity reactions and is thus used in closed systems."}, {"number": 47, "topic": "Sterilisation", "stem_html": "Which of the following methods is most effective at destroying spores of the tubercle bacilli?", "options": [{"label_html": "Immersion in 0.5% chlorhexidine in alcohol", "is_correct": false}, {"label_html": "Immersion in aqueous iodine", "is_correct": false}, {"label_html": "Heating in a hot air oven", "is_correct": false}, {"label_html": "Immersion in 0.1% sodium hypochlorite", "is_correct": false}, {"label_html": "Autoclaving", "is_correct": true}], "correct_index": 4, "explanation_html": "The tubercle bacilli has a waxy outer membrane that renders it more resistant to sterilisation and cleaning methods. Whilst 0.1% sodium hypochlorite will destroy many microbes it is less reliable in destroying tubercle bacilli. Hot air ovens provide less reliable pathogen destruction than autoclaving, but may be indicated in situations where the equipment is sensitive to the autoclaving process. From the list of options above, autoclaving will most reliably destroy tubercle bacilli."}], "note_html": "Surgical equipment has to be cleaned and sterilised prior to use. The extent to which these processes will be required varies according to the type of equipment and the purpose for which it will be used. In general, the three processes are relevant; cleaning, disinfection and sterilisation.<br><ul><li>Cleaning refers to removal of physical debris.<\/li><li>Disinfection refers to reduction in numbers of viable organisms.<\/li><li>Sterilisation is removal of all organisms and spores.<\/li><\/ul><br><b>Methods<\/b><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Method<\/b><\/th><th><b>Details<\/b><\/th><th><b>Indication<\/b><\/th><\/tr><\/thead><tbody><tr><td>Autoclaving<\/td><td>Air removed and high pressure steam used (usually 134 <sup>o<\/sup>C for 3 minutes)<\/td><td>Most reusable surgical equipment, must be physically cleaned prior to autoclaving, unsuitable for fragile items<\/td><\/tr><tr><td>Glutaraldehyde solution (2%)<\/td><td>Colourless oily liquid, directly cytocidal and virucidal even at low temperatures<\/td><td>Specifically used for endoscopes and some laparoscopic items, staff can rapidly develop allergy to this substance which has limited its more widespread use<\/td><\/tr><tr><td>Ethylene oxide<\/td><td>3% mixture of gas with carbon dioxide used<\/td><td>Used for packaged materials that cannot be heated, the gas is explosive and environmentally toxic, it is used mainly in the industrial setting<\/td><\/tr><tr><td>Gamma irradiation<\/td><td>Gamma rays emitted from radioactive substance such as cobalt 60 or caesium 137<\/td><td>Suitable for batch treatment of relatively thermostable items, typically an industrial process<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Surgical drains", "questions": [{"number": 48, "topic": "Surgical drains", "stem_html": "A 67 year old lady undergoes a mastectomy and axillary node clearance for breast cancer. The surgeon decides to insert a drain to
