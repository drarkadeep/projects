<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Abdomen</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f1e8;
      --bg-accent: #ebe4d4;
      --surface: rgba(255, 252, 246, 0.92);
      --surface-strong: #fffdf7;
      --border: #d9cfbd;
      --text: #23313a;
      --text-soft: #5f6c73;
      --accent: #496a58;
      --accent-strong: #2f5341;
      --correct-bg: #e0f3e6;
      --correct-border: #77b487;
      --wrong-bg: #fbe0df;
      --wrong-border: #dc7a73;
      --note-bg: #f3eee2;
      --shadow: 0 18px 40px rgba(76, 59, 37, 0.08);
      --radius-lg: 22px;
      --radius-md: 16px;
      --radius-sm: 12px;
      --page-width: 960px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: "Avenir Next", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.72), transparent 32%),
        linear-gradient(180deg, #f8f4eb 0%, #f3ede0 100%);
      line-height: 1.65;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.14), transparent 18%, transparent 82%, rgba(255, 255, 255, 0.14)),
        repeating-linear-gradient(
          180deg,
          rgba(73, 106, 88, 0.015) 0,
          rgba(73, 106, 88, 0.015) 1px,
          transparent 1px,
          transparent 18px
        );
    }

    a {
      color: var(--accent-strong);
    }

    img {
      max-width: 100%;
      height: auto;
      border-radius: 14px;
    }

    .score-badge,
    .badge.rounded-pill.bg-danger {
      display: none !important;
    }

    .page {
      width: min(100% - 24px, var(--page-width));
      margin: 0 auto;
      padding: 18px 0 48px;
    }

    .topbar {
      margin-bottom: 18px;
      padding: 18px;
      background: rgba(255, 252, 246, 0.9);
      border: 1px solid rgba(217, 207, 189, 0.86);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .topbar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .eyebrow {
      margin: 0 0 4px;
      font-size: 0.76rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-soft);
    }

    .title {
      margin: 0;
      font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
      font-size: clamp(1.5rem, 2vw + 1rem, 2.35rem);
      line-height: 1.08;
      font-weight: 700;
    }

    .meta {
      margin: 8px 0 0;
      color: var(--text-soft);
      font-size: 0.96rem;
    }

    .mode-switch {
      display: inline-flex;
      padding: 6px;
      border-radius: 999px;
      background: var(--bg-accent);
      border: 1px solid var(--border);
      gap: 6px;
      flex-shrink: 0;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
      flex-wrap: wrap;
    }

    .topic-actions {
      display: inline-flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .utility-button {
      appearance: none;
      border: 1px solid var(--border);
      background: var(--surface-strong);
      color: var(--text);
      font: inherit;
      font-weight: 700;
      border-radius: 999px;
      padding: 10px 14px;
      cursor: pointer;
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .utility-button:hover {
      transform: translateY(-1px);
      border-color: #c7bba9;
      box-shadow: 0 8px 18px rgba(70, 54, 34, 0.07);
    }

    .utility-button:focus-visible {
      outline: 3px solid rgba(73, 106, 88, 0.22);
      outline-offset: 2px;
    }

    .mode-button {
      appearance: none;
      border: 0;
      background: transparent;
      color: var(--text-soft);
      font: inherit;
      font-weight: 700;
      border-radius: 999px;
      padding: 10px 16px;
      min-width: 92px;
      cursor: pointer;
      transition: transform 0.18s ease, background 0.18s ease, color 0.18s ease, box-shadow 0.18s ease;
    }

    .mode-button:hover {
      transform: translateY(-1px);
      color: var(--text);
    }

    .mode-button.active {
      background: var(--surface-strong);
      color: var(--accent-strong);
      box-shadow: 0 8px 18px rgba(73, 106, 88, 0.14);
    }

    .topic-list {
      display: grid;
      gap: 18px;
    }

    .topic {
      background: rgba(255, 252, 246, 0.78);
      border: 1px solid rgba(217, 207, 189, 0.9);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .topic[open] {
      background: rgba(255, 252, 246, 0.9);
    }

    .topic > summary {
      list-style: none;
      cursor: pointer;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      user-select: none;
    }

    .topic > summary::-webkit-details-marker {
      display: none;
    }

    .topic-title {
      margin: 0;
      font-size: 1.08rem;
      font-weight: 800;
      letter-spacing: 0.01em;
    }

    .topic-meta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--text-soft);
      font-size: 0.94rem;
    }

    .chevron {
      display: inline-block;
      transition: transform 0.2s ease;
      color: var(--accent);
      font-weight: 700;
    }

    .topic[open] > summary .chevron {
      transform: rotate(90deg);
    }

    .topic-notes {
      background: rgba(243, 238, 226, 0.62);
      border: 1px solid #e3d9c8;
      border-radius: var(--radius-md);
      overflow: hidden;
    }

    .topic-notes > summary {
      list-style: none;
      cursor: pointer;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      user-select: none;
    }

    .topic-notes > summary::-webkit-details-marker {
      display: none;
    }

    .topic-notes-title {
      font-size: 0.95rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-soft);
    }

    .topic-notes[open] > summary .chevron {
      transform: rotate(90deg);
    }

    .topic-notes-body {
      padding: 0 16px 16px;
      color: var(--text);
    }

    .topic-body {
      padding: 0 16px 16px;
      display: grid;
      gap: 14px;
    }

    .question-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 18px;
      box-shadow: 0 10px 24px rgba(70, 54, 34, 0.05);
    }

    .question-label {
      margin: 0 0 10px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-soft);
      font-size: 0.88rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 800;
    }

    .stem {
      font-size: 1rem;
    }

    .stem > *:first-child,
    .explanation > *:first-child {
      margin-top: 0;
    }

    .stem > *:last-child,
    .explanation > *:last-child {
      margin-bottom: 0;
    }

    .options {
      margin-top: 16px;
      display: grid;
      gap: 10px;
    }

    .option {
      width: 100%;
      text-align: left;
      border: 1px solid #d8d0c2;
      background: #fffdf8;
      color: var(--text);
      border-radius: var(--radius-sm);
      padding: 14px 15px;
      font: inherit;
      line-height: 1.45;
      cursor: pointer;
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
    }

    .option:hover {
      transform: translateY(-1px);
      border-color: #c7bba9;
      box-shadow: 0 8px 18px rgba(70, 54, 34, 0.07);
    }

    .option:focus-visible {
      outline: 3px solid rgba(73, 106, 88, 0.22);
      outline-offset: 2px;
    }

    .option.correct {
      background: var(--correct-bg);
      border-color: var(--correct-border);
      box-shadow: inset 0 0 0 1px rgba(119, 180, 135, 0.2);
    }

    .option.incorrect {
      background: var(--wrong-bg);
      border-color: var(--wrong-border);
      box-shadow: inset 0 0 0 1px rgba(220, 122, 115, 0.2);
    }

    .option.neutral-revealed {
      background: #faf6ee;
      border-color: #d8d0c2;
      color: #5f676a;
    }

    .option[disabled] {
      cursor: default;
      opacity: 1;
    }

    .explanation {
      margin-top: 14px;
      padding: 14px 16px;
      background: var(--note-bg);
      border: 1px solid #e3d9c8;
      border-radius: 14px;
      color: var(--text);
    }

    .question-card.is-hidden .explanation {
      display: none;
    }

    .explanation-label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-soft);
      font-weight: 800;
    }

    .empty-state {
      padding: 28px 22px;
      background: var(--surface);
      border: 1px dashed var(--border);
      border-radius: var(--radius-lg);
      color: var(--text-soft);
    }

    .rich-text table {
      width: 100%;
      border-collapse: collapse;
      margin: 12px 0;
      overflow: hidden;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.68);
    }

    .rich-text td,
    .rich-text th {
      border: 1px solid #ddd2bf;
      padding: 10px 12px;
      vertical-align: top;
    }

    .rich-text ul,
    .rich-text ol {
      padding-left: 20px;
      margin: 10px 0;
    }

    .rich-text center {
      display: block;
      text-align: center;
    }

    .rich-text .table-responsive {
      overflow-x: auto;
    }

    @media (max-width: 720px) {
      .page {
        width: min(100% - 16px, var(--page-width));
        padding-top: 10px;
      }

      .topbar {
        padding: 14px;
        border-radius: 18px;
      }

      .topbar-inner {
        flex-direction: column;
        align-items: stretch;
      }

      .controls {
        justify-content: stretch;
      }

      .topic-actions {
        width: 100%;
      }

      .utility-button {
        flex: 1 1 0;
      }

      .mode-switch {
        width: 100%;
        justify-content: stretch;
      }

      .mode-button {
        flex: 1 1 50%;
      }

      .topic > summary {
        padding: 16px;
        align-items: flex-start;
      }

      .topic-meta {
        font-size: 0.88rem;
      }

      .topic-body {
        padding: 0 12px 12px;
      }

      .question-card {
        padding: 15px;
      }

      .option {
        padding: 13px 14px;
      }
    }
  </style>
</head>

      </div>
    </section>

    <section id="app"></section>

  <script id="quiz-data" type="application/json">{"title": "The Abdomen", "topics": [{"name": "Abdominal compartment syndrome", "questions": [{"number": 1, "topic": "Abdominal compartment syndrome", "stem_html": "A 72 year old obese man undergoes an emergency repair of a ruptured abdominal aortic aneurysm. The wound is closed with an onlay prolene mesh to augment the closure. Post operatively he is taken to the intensive care unit. Over the following twenty four hours his nasogastric aspirates increase, his urine output falls and he has a metabolic acidosis. What is the most likely underlying cause?", "options": [{"label_html": "Colonic ischaemia", "is_correct": false}, {"label_html": "Abdominal compartment syndrome", "is_correct": true}, {"label_html": "Peritonitis", "is_correct": false}, {"label_html": "Reactionary haemorrhage", "is_correct": false}, {"label_html": "Aorto-duodenal fistula", "is_correct": false}], "correct_index": 1, "explanation_html": "Obese patients with ileus following major abdominal surgery are at increased risk of intra abdominal compartment syndrome.The risk is increased by the use of prosthetic meshes, which some surgeons favor following a major vascular case as they may reduce the incidence of incisional hernia. They prevent abdominal distension and may increase the risk of intra abdominal hypertension in the short term. Although colonic ischaemia may occur following major aortic surgery it would not typically present in this way."}], "note_html": "<b>Background<\/b><br>Intra-abdominal pressure is the steady state pressure concealed within the abdominal cavity.<br><ul><li>In critically ill adults the normal intra abdominal pressure = 5-7mmHg<\/li><li>Intra abdominal hypertension has pressures of 12-25mmHg<\/li><li>Changes &gt;15mmHg are associated with microvascular hypoperfusion<\/li><li>Abdominal compartment syndrome is defined as <b>sustained intra abdominal pressure &gt;20mmHg coupled with new organ dysfunction / failure<\/b><\/li><li>It may occur either primarily without previous surgical intervention e.g. Following intestinal ischaemia or secondarily following a surgical procedure<\/li><li>Diagnosis is typically made by transvesical pressure measurements coupled with an index of clinical suspicion. <\/li><\/ul><br><b>Management<\/b><br>Once the diagnosis is made non operative measures should be instituted including:<br><ul><li>Gastric decompression<\/li><li>Improve abdominal wall compliance e.g. muscle relaxants/ sedation<\/li><li>Drain abdominal fluid collections.<\/li><li>Consider fluid restriction/ diuretics if clinically indicated.<\/li><\/ul><br>In those whom non operative treatment is failing; the correct treatment is laparotomy and laparostomy. Options for laparostomy are many although the Bogota bag or VAC techniques are the most widely practised. Re-look laparotomy and attempts at delayed closure will follow in due course."}, {"name": "Abdominal imaging in pregnancy", "questions": [{"number": 2, "topic": "Abdominal imaging in pregnancy", "stem_html": "A 33 year old lady is 32 weeks pregnant and it is suspected that there may be a perforated abdominal viscus. What is the most appropriate course of action?", "options": [{"label_html": "Arrange an abdominal CT scan", "is_correct": true}, {"label_html": "Arrange an abdominal MRI scan", "is_correct": false}, {"label_html": "Undertake a laparotomy", "is_correct": false}, {"label_html": "Undertake a laparoscopy", "is_correct": false}, {"label_html": "Undertake diagnostic peritoneal lavage", "is_correct": false}], "correct_index": 0, "explanation_html": "The keyword here is suspected. That being the case the investigation is CT. Although it is known that ionising radiation exposure can lead to cell death, mutation of germ cells, and carcinogenesis, there is no common modern radiographic procedure that results in radiation exposure to a level that threatens embryo or fetal well-being.Radiation exposure of &lt;5 rads (a computed tomographic abdomen/pelvis study carries an exposure of 3.5 rads) has not been associated with fetal defects or loss. Careful shielding of the patient can also minimise exposure. Importantly, the use of ultrasound for diagnosis is clearly safe in pregnancy, although it should be used to evaluate and answer a defined clinical problem. A negative laparoscopy/ laparotomy poses signifcant foetal risks and at either procedure the enlarged uterus can result in missed pathology."}], "note_html": "Pregnant patients will often present with abdominal pain and the co-existing physiological leucocytosis can make laboratory assessment less reliable. In the non pregnant patient there is a low threshold for cross sectional imaging with CT scanning. The main foetal risks from cross sectional imaging in pregnancy are delayed rather than immediate. That being the case, where CT is likely to facilitate accurate diagnosis that improves short term foetal outcomes or saves foetal life, it is justified. <br>At all times, alternatives to CT need to be considered and utilised where possible. MRI is often used though for complex sequences movement artifact can limit the quality of views obtained. The use of shields can also limit radiation exposure to the foetus."}, {"name": "Abdominal radiology", "questions": [{"number": 3, "topic": "Abdominal radiology", "stem_html": "A 56 year old lady is admitted with colicky abdominal pain. A plain x-ray is performed. Which of the following should not show fluid levels on a plain abdominal film?", "options": [{"label_html": "Stomach", "is_correct": false}, {"label_html": "Jejunum", "is_correct": false}, {"label_html": "Ileum", "is_correct": false}, {"label_html": "Caecum", "is_correct": false}, {"label_html": "Descending colon", "is_correct": true}], "correct_index": 4, "explanation_html": "Fluid levels in the distal colon are nearly always pathological. In general contents of the left colon transit quickly and are seldom held in situ for long periods, the content is also more solid."}, {"number": 4, "topic": "Abdominal radiology", "stem_html": "A 56 year old lady presents with a large bowel obstruction and abdominal distension. Which of the following confirmatory tests should be performed prior to surgery?", "options": [{"label_html": "Abdominal ultrasound scan", "is_correct": false}, {"label_html": "Barium enema", "is_correct": false}, {"label_html": "Rectal MRI Scan", "is_correct": false}, {"label_html": "Endoanal ultrasound scan", "is_correct": false}, {"label_html": "Abdominal CT scan", "is_correct": true}], "correct_index": 4, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Patients with suspected large bowel obstruction due to tumour should have this confirmed with gastrograffin enema, sigmoidoscopy or CT scanning prior to surgery.<\/div>Patients with clinical evidence of large bowel obstruction, should have the presence or absence of an obstructing lesion confirmed prior to surgery. This is because colonic pseudo-obstruction may produce a similar radiological picture. A gastrograffin enema is the traditional test, as barium is too toxic if it spills into the abdominal cavity. The increased availability of CT scanning has changed this to cross sectional alternatives."}], "note_html": "Plain abdominal x-rays are often used as a first line investigation in patients with acute abdominal pain. A plain abdominal film may demonstrate free air, evidence of bowel obstruction and possibly other causes of pain (e.g. renal or gallbladder stones). <br>Investigation of potential visceral perforation is usually best performed by obtaining an erect chest x-ray, as this is a more sensitive investigation for suspected visceral perforation than recumbent films.<br><br><b>Features which are usually abnormal<\/b><br><ul><li>Large amounts of free air (colonic perforation), smaller volumes seen with more proximal perforations.<\/li><li>A positive Riglers sign (gas on both sides of the bowel wall).<\/li><li>Caecal diameter of &gt;8cm<\/li><li>Fluid levels in the colon<\/li><li>Ground glass appearance to film (usually due to large amounts of free fluid).<\/li><li>Sentinel loop in patients with inflammation of other organs (e.g. pancreatitis).<\/li><\/ul><br><b>Features which should be expected/ or occur without pathology<\/b> <br><ul><li>In Chiladitis sign, a loop of bowel may be interposed between the liver and diaphragm, giving the mistaken impression that free air is present.<\/li><li>Following ERCP (and sphincterotomy) air may be identified in the biliary tree.<\/li><li>Free intra abdominal air following laparoscopy / laparotomy, although usually dissipates after 48-72 hours.<\/li><\/ul>"}, {"name": "Abdominal signs", "questions": [{"number": 5, "topic": "Abdominal signs", "stem_html": "Which of the following signs is seen in patients who have a significant retroperitoneal haemorrhage?", "options": [{"label_html": "Boas' sign", "is_correct": false}, {"label_html": "Pembertons sign", "is_correct": false}, {"label_html": "Grey Turners sign", "is_correct": true}, {"label_html": "Cullens sign", "is_correct": false}, {"label_html": "Rovsing's sign", "is_correct": false}], "correct_index": 2, "explanation_html": "Bruising of the flank is described as Grey Turners sign"}, {"number": 6, "topic": "Abdominal signs", "stem_html": "With which of the conditions listed below is Boas' sign classically associated?", "options": [{"label_html": "Perforation of the thoracic oesophagus", "is_correct": false}, {"label_html": "Acute cholecystitis", "is_correct": true}, {"label_html": "Hepatocellular carcinoma", "is_correct": false}, {"label_html": "Closed loop small bowel obstruction", "is_correct": false}, {"label_html": "Acute diverticulitis", "is_correct": false}], "correct_index": 1, "explanation_html": "Boas' sign refers to hyperaesthesia of the tip of the right scapula and is seen classically in association with acute cholecystitis."}, {"number": 7, "topic": "Abdominal signs", "stem_html": "In which of the conditions listed below is Cullens sign most likely to be seen?", "options": [{"label_html": "Ruptured ectopic pregnancy", "is_correct": true}, {"label_html": "Appendicitis", "is_correct": false}, {"label_html": "Intestinal malrotation", "is_correct": false}, {"label_html": "Perforated peptic ulcer", "is_correct": false}, {"label_html": "Incarcerared femoral hernia", "is_correct": false}], "correct_index": 0, "explanation_html": "Cullens sign is seen with significant intra peritoneal haemorrhage."}, {"number": 8, "topic": "Abdominal signs", "stem_html": "In which of the conditions described below is Rovsing's sign most likely to be absent?", "options": [{"label_html": "Locally advanced caecal cancer", "is_correct": false}, {"label_html": "Para ileal appendicitis", "is_correct": false}, {"label_html": "Right sided colonic diverticulitis", "is_correct": false}, {"label_html": "Retrocaecal appendicitis", "is_correct": true}, {"label_html": "Severe terminal ileal Crohns disease", "is_correct": false}], "correct_index": 3, "explanation_html": "Any advanced right iliac fossa pathology can result in a positive Rovsings sign. However, in retrocaecal appendicitis, it may be absent and this fact can contribute to a delayed diagnosis if undue weight is placed on the presence of the sign in making the diagnosis."}, {"number": 9, "topic": "Abdominal signs", "stem_html": "Which abdominal sign is described as being present when a patient with cholecystitis experiences pain on palpation of the right upper quadrant most marked on inspiration?", "options": [{"label_html": "Murphy's sign", "is_correct": true}, {"label_html": "Boas' sign", "is_correct": false}, {"label_html": "Rovsing's sign", "is_correct": false}, {"label_html": "Cullens sign", "is_correct": false}, {"label_html": "Grey Turners sign", "is_correct": false}], "correct_index": 0, "explanation_html": "<p>No explanation provided.<\/p>"}], "note_html": "A number of eponymous abdominal signs are noted. These include:<br><ul><li>Rovsings sign- appendicitis<\/li><li>Boas sign -cholecystitis<\/li><li>Murphys sign- cholecystitis<\/li><li>Cullens sign- pancreatitis (other intraabdominal haemorrhage)<\/li><li>Grey-Turners sign- pancreatitis (or other retroperitoneal haemorrhage)<\/li><\/ul><br>In clinical practice haemorrhagic pancreatitis is thankfully rare. The signs are important and thus shown below:<br><br><b>Cullen's sign<\/b><br><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb001b.jpg\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb001.jpg\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Cullen%27s sign\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb001b.jpg\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center><br><b>Grey Turner's sign<\/b><br><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb002b.jpg\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb002.jpg\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Grey Turner%27s sign\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb002b.jpg\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}, {"name": "Acute abdominal pain", "questions": [{"number": 10, "topic": "Acute abdominal pain", "stem_html": "Which of the following is commonest cause of acute abdominal pain in acute unselected surgical 'take'?", "options": [{"label_html": "Non specific abdominal pain", "is_correct": true}, {"label_html": "Biliary colic", "is_correct": false}, {"label_html": "Acute appendicitis", "is_correct": false}, {"label_html": "Ureteric colic", "is_correct": false}, {"label_html": "Pancreatitis", "is_correct": false}], "correct_index": 0, "explanation_html": "Non specific abdominal pain is a commonly recorded diagnosis for patients presenting with acute abdominal pain. Following careful diagnostic work up, a proportion of patients may be identified with disorders such as coeliac disease and the diagnosis of non specific abdominal pain should not be used lightly."}], "note_html": "Acute abdominal pain is a common cause of admission to hospital. The relative proportions of conditions presenting with abdominal pain is given below:<br><ul><li>Non specific abdominal pain (35%)<\/li><li>Appendicitis (17%)<\/li><li>Intestinal obstruction (15%)<\/li><li>Urological disease (6%)<\/li><li>Gallstone disease (5%)<\/li><li>Colonic diverticular disease (4%)<\/li><li>Abdominal trauma (3%)<\/li><li>Perforated peptic ulcer (3%)<\/li><li>Pancreatitis (2%)<\/li><\/ul>(Data derived from Irvin T. Br. J. Surg 1989 76:1121-1125)<br><br>Non specific abdominal pain should really be a diagnosis of exclusion and if care is taken in excluding organic disease the proportion of cases labeled such should decline. It should also be appreciated that a proportion of patients may have an underlying medical cause for their symptoms such as pneumonia or diabetic ketoacidosis.<br><br><b>Key points in management<\/b><br><ul><li>Early administration of adequate analgesia (including opiates).<\/li><li>Abdominal ultrasound is safe, non invasive and cheap and yields significantly more information than plain radiology. However, plain radiology is still the main test for suspected perforated viscus, especially out of hours.<\/li><li>In up to 50% cases with perforated peptic ulcer, the plain x-rays may show no evidence of free air. If clinical signs suggest otherwise, then a CT scan may be a more accurate investigation, if plain films are normal.<\/li><li>Plain film radiology usually cannot detect &lt;1mm free air, and is 33% sensitive for detection of 1-13mm pockets of free air (Stoker <i> et al<\/i>. Radiology <b>2009<\/b> 253: 31-46).<\/li><li>Think of strangulated intestine when there is fever, raised white cell count, tachycardia and peritonism. <\/li><li>In suspected large bowel obstruction a key investigation is either a water soluble contrast enema or CT scan. <\/li><li>Where need for surgery is difficult to define and imaging is inconclusive the use of laparoscopy as a definitive diagnostic test is both safe and sensible.<\/li><\/ul>"}, {"name": "Acute abdominal pain-diagnoses", "questions": [{"number": 11, "topic": "Acute abdominal pain-diagnoses", "stem_html": "A 28 year old female has suffered from diffuse abdominal pain for the past 2 weeks since she was started on the contraceptive pill. The pain has increased significantly over the past 10 hours and has been associated with vomiting. A pregnancy test is negative. What is the most likely diagnosis?", "options": [{"label_html": "Mesenteric venous thrombosis", "is_correct": true}, {"label_html": "Acute mesenteric embolus", "is_correct": false}, {"label_html": "Chronic mesenteric ischaemia", "is_correct": false}, {"label_html": "Ruptured ectopic pregnancy", "is_correct": false}, {"label_html": "Inflammatory bowel disease", "is_correct": false}], "correct_index": 0, "explanation_html": "Mesenteric venous thrombosis is the likely underlying cause and an angiogram is the sensible step as it will also facilitate the identification of areas of infarcted bowel , similar to that which may occur in the leg when massive DVT is present."}, {"number": 12, "topic": "Acute abdominal pain-diagnoses", "stem_html": "A 75 year old man is admitted with sudden onset severe generalised abdominal pain, vomiting and a single episode of bloody diarrhoea. On examination, he looks unwell and is in uncontrolled atrial fibrillation. Although diffusely tender his abdomen is soft. What is the most likely diagnosis?", "options": [{"label_html": "Pancreatitis", "is_correct": false}, {"label_html": "Infective diarrhoea", "is_correct": false}, {"label_html": "Ischaemic colitis", "is_correct": false}, {"label_html": "Crohns disease", "is_correct": false}, {"label_html": "Mesenteric infarction", "is_correct": true}], "correct_index": 4, "explanation_html": "Pain out of proportion to physical signs, AF and generalized abdominal pain suggest widespread infarction."}, {"number": 13, "topic": "Acute abdominal pain-diagnoses", "stem_html": "A 75 year old man is admitted with sudden onset severe generalised abdominal pain, vomiting and a single episode of bloody diarrhoea. On examination, he looks unwell and is in uncontrolled atrial fibrillation. Although diffusely tender his abdomen is soft. What is the most likely diagnosis?", "options": [{"label_html": "Pancreatitis", "is_correct": false}, {"label_html": "Infective diarrhoea", "is_correct": false}, {"label_html": "Ischaemic colitis", "is_correct": false}, {"label_html": "Crohns disease", "is_correct": false}, {"label_html": "Mesenteric infarction", "is_correct": true}], "correct_index": 4, "explanation_html": "Pain out of proportion to physical signs, AF and generalized abdominal pain suggest widespread infarction."}, {"number": 14, "topic": "Acute abdominal pain-diagnoses", "stem_html": "A 78 year old man is walking to the bus stop when he suddenly develops severe back pain and collapses. On examination he has a blood pressure of 90/40 and pulse rate of 110. His abdomen is distended and he is obese. Though tender his abdomen itself is soft. What is the most likely diagnosis?", "options": [{"label_html": "Ruptured abdominal aortic aneurysm", "is_correct": true}, {"label_html": "Perforated peptic ulcer", "is_correct": false}, {"label_html": "Appendicitis", "is_correct": false}, {"label_html": "Mesenteric infarction", "is_correct": false}, {"label_html": "Perforated diverticulitis", "is_correct": false}], "correct_index": 0, "explanation_html": "This will be a retroperitoneal rupture (anterior ones generally don't survive to hospital). The debate regarding CT varies, it is the authors opinion that a systolic BP of &lt;100mmHg at presentation mandates immediate laparotomy."}, {"number": 15, "topic": "Acute abdominal pain-diagnoses", "stem_html": "A 19 year old lady is admitted with lower abdominal pain. On examination, she is diffusely tender. A laparoscopy is performed and at operation multiple fine adhesions are noted between the liver and abdominal wall. Her appendix is normal. What is the most likely diagnosis?", "options": [{"label_html": "Mesenteric infarct", "is_correct": false}, {"label_html": "Fitz Hugh Curtis Syndrome", "is_correct": true}, {"label_html": "Perforated peptic ulcer", "is_correct": false}, {"label_html": "Appendicitis", "is_correct": false}, {"label_html": "Pancreatitis", "is_correct": false}], "correct_index": 1, "explanation_html": "This is Fitz Hugh Curtis syndrome in which pelvic inflammatory disease (usually Chlamydia) causes the formation of fine peri hepatic adhesions."}, {"number": 16, "topic": "Acute abdominal pain-diagnoses", "stem_html": "An 8 year-old boy of Caribbean descent presents with periumbilical abdominal pain. He has vomited twice and is refusing fluids. His temperature is 38.1<sup>o<\/sup>C and blood tests are as follows: Haemoglobin 8 g/dl, WCC 13 x 10<sup>9<\/sup>/l, with a neutrophilia. What is the most likely diagnosis?", "options": [{"label_html": "Pancreatitis", "is_correct": false}, {"label_html": "Sickle cell crisis", "is_correct": true}, {"label_html": "Appendicitis", "is_correct": false}, {"label_html": "Intussusception", "is_correct": false}, {"label_html": "Spontaneous bacterial peritonitis", "is_correct": false}], "correct_index": 1, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Anaemia is seldom seen in appendicitis and if present should prompt a search for an alternative underlying diagnosis.<\/div>Sickle cell anaemia is characterised by severe chronic haemolytic anaemia resulting from poorly formed erythrocytes. Painful crises result from vaso-occlusive episodes, which may occur spontaneously or may be precipitated by infection. Consider this diagnosis in all children of appropriate ethnic background."}, {"number": 17, "topic": "Acute abdominal pain-diagnoses", "stem_html": "A 15-month-old girl presents with a three day history of periorbital oedema. She is brought to hospital. On examination she has facial oedema and a tender distended abdomen. Her temperature is 39<sup>o<\/sup>C and her blood pressure is 90/45 mmHg. There is clinical evidence of poor peripheral perfusion. What is the most likely diagnosis?", "options": [{"label_html": "Sickle cell crisis", "is_correct": false}, {"label_html": "Intussusception", "is_correct": false}, {"label_html": "Spontaneous bacterial peritonitis", "is_correct": true}, {"label_html": "Henoch Schonlein purpura", "is_correct": false}, {"label_html": "Appendicitis", "is_correct": false}], "correct_index": 2, "explanation_html": "The 15-month-old girl is a patient with nephrotic syndrome. Patients with this condition are at risk of septicaemia and peritonitis from <i>Streptococcus pneumonia<\/i>, due to the loss of immunoglobulins and opsonins in the urine."}], "note_html": "<b>Conditions presenting with acute abdominal pain<\/b><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Condition<\/b><\/th><th><b>Features<\/b><\/th><th><b>Investigations<\/b><\/th><th><b>Management<\/b><\/th><\/tr><\/thead><tbody><tr><td>Appendicitis<\/td><td>History of migratory pain.<br>Fever.<br>Anorexia.<br>Evidence of right iliac fossa tenderness.<br>Mild pyrexia.<\/td><td>Differential white cell count<br>Pregnancy test<br>C-Reactive protein<br>Amylase<br>Urine dipstick testing<\/td><td>Appendicectomy<\/td><\/tr><tr><td>Mesenteric adenitis<\/td><td>Usually recent upper respiratory tract infection.<br>High fever.<br>Generalised abdominal discomfort- true localised pain and signs are rare.<\/td><td>Full blood count- may show slightly raised white cell count<br>Urine dipstick often normal<br>Abdominal ultrasound scan - usually no free fluid<\/td><td>Conservative management- appendicectomy if diagnostic doubt<\/td><\/tr><tr><td>Mittelschmerz<\/td><td>Only seen in females<br>Mid cycle pain<br>Usually occurs two weeks after last menstrual period<br>Pain usually has a supra-pubic location<br>Usually subsides over a 24-48 hour period.<\/td><td>Full blood count- normal<br>Urine dipstick- normal<br>Abdominal and pelvic ultrasound- may show a trace of pelvic free fluid<\/td><td>Manage conservatively if doubt or symptoms fail to settle then laparoscopy<\/td><\/tr><tr><td>Fitz-Hugh Curtis syndrome<\/td><td>Disseminated infection with Chlamydia.<br>Usually seen in females.<br>Consists of evidence of pelvic inflammatory disease together with peri-hepatic inflammation and subsequent adhesion formation.<\/td><td>Abdominal ultrasound scan- may show free fluid<br>High vaginal swabs - may show evidence of sexually transmitted infections<\/td><td>Usually medically managed- doxycycline or azithromycin<\/td><\/tr><tr><td>Abdominal aortic aneurysm (ruptured)<\/td><td>Sudden onset of abdominal pain radiating to the back in older adults (look for risk factors).<br>Collapse.<br>May be moribund on arrival in casualty, more stable if contained haematoma.<br>Careful clinical assessment may reveal pulsatile mass.<\/td><td>Patients who are haemodynamically stable should have a CT scan<\/td><td>Unstable patients should undergo immediate surgery (unless it is not in their best interests).<br>Those with evidence of contained leak on CT should undergo immediate surgery<br>Increasing unruptured aneurysmal size is an indication for urgent surgical intervention (that can wait until the next working day)<\/td><\/tr><tr><td>Perforated peptic ulcer<\/td><td>Sudden onset of pain (usually epigastric).<br>Often preceding history of upper abdominal pain.<br>Soon develop generalised abdominal pain.<br>On examination may have clinical evidence of peritonitis.<\/td><td>Erect CXR may show free air. A CT scan may be indicated where there is diagnostic doubt<\/td><td>Laparotomy (laparoscopic surgery for perforated peptic ulcers is both safe and feasible in experienced hands)<\/td><\/tr><tr><td>Intestinal obstruction<\/td><td>Colicky abdominal pain and vomiting (the nature of which depends on the level of the obstruction).<br>Abdominal distension and constipation (again depending upon site of obstruction).<br>Features of peritonism may occur where local necrosis of bowel loops is occurring.<\/td><td>A plain abdominal film may help with making the diagnosis. A CT scan may be useful where diagnostic uncertainty exists<\/td><td>In those with a virgin abdomen a lower and earlier threshold for laparotomy should exist than in those who may have adhesional obstruction<\/td><\/tr><tr><td>Mesenteric infarction<\/td><td>Embolic events present with sudden pain and forceful evacuation.<br>Acute on chronic events usually have a longer history and previous weight loss.<br>On examination the pain is typically greater than the physical signs would suggest.<\/td><td>Arterial pH and lactate<br>Arterial phase CT scanning is the most sensitive test<\/td><td>Immediate laparotomy and resection of affected segments, in acute embolic events SMA embolectomy may be needed.<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Acute incisional hernia", "questions": [{"number": 18, "topic": "Acute incisional hernia", "stem_html": "A 53 year old man undergoes a reversal of a loop colostomy. He recovers well and is discharged home. He is readmitted 10 days later with symptoms of vomiting and colicky abdominal pain. On examination, he has a swelling of the loop colostomy site and it is tender. What is the most likely underlying diagnosis?", "options": [{"label_html": "Haematoma", "is_correct": false}, {"label_html": "Intra abdominal adhesions", "is_correct": false}, {"label_html": "Anastomotic leak", "is_correct": false}, {"label_html": "Anastomotic stricture", "is_correct": false}, {"label_html": "Obstructed incisional hernia", "is_correct": true}], "correct_index": 4, "explanation_html": "In this scenario the most likely diagnosis would be obstructed incisional hernia. The tender swelling coupled with symptoms of obstruction point to this diagnosis. Prompt surgical exploration is warranted. Loop colostomy reversals are at high risk of this complication as the operative site is at increased risk of the development of post operative wound infections."}], "note_html": "<ul><li>Any surgical procedure involving entry into a cavity containing viscera may be complicated by post operative hernia<\/li><li>The abdomen is the commonest site<\/li><li>The deep layer of the wound has usually broken down, allowing internal viscera to protrude through<\/li><li>Management is dictated by the patients clinical status and the timing of the hernia in relation to recent surgery<\/li><li>Bowel obstruction or tenderness at the hernia site both mandate early surgical intervention to reduce the risk of bowel necrosis<\/li><li>Mature incisional hernias with a wide neck, and no symptoms, may be either left or listed for elective repair<\/li><li>Risk factors for the development of post operative incisional hernias include; post operative wound infections, long term steroid use, obesity and chronic cough<\/li><\/ul>"}, {"name": "Femoral canal", "questions": [{"number": 19, "topic": "Femoral canal", "stem_html": "A 78 year old lady presents with a tender swelling in her right groin. On examination, there is a tender swelling that lies below and lateral to the pubic tubercle. It has a cough impulse. What is the most likely underlying diagnosis?", "options": [{"label_html": "Thrombophlebitis of the great saphenous vein", "is_correct": false}, {"label_html": "Femoral hernia", "is_correct": true}, {"label_html": "Thrombophlebitis of saphena varix", "is_correct": false}, {"label_html": "Inguinal hernia", "is_correct": false}, {"label_html": "Obturator hernia", "is_correct": false}], "correct_index": 1, "explanation_html": "Whilst a thrombophlebitis of a saphena varix may cause a tender swelling at this site, this is a far less likely differential given that varicose veins are not mentioned."}, {"number": 20, "topic": "Femoral canal", "stem_html": "An 83 year old lady presents with a femoral hernia and undergoes a femoral hernia repair. Which of the following forms the posterior wall of the femoral canal?", "options": [{"label_html": "Pectineal ligament", "is_correct": true}, {"label_html": "Lacunar ligament", "is_correct": false}, {"label_html": "Inguinal ligament", "is_correct": false}, {"label_html": "Adductor longus", "is_correct": false}, {"label_html": "Sartorius", "is_correct": false}], "correct_index": 0, "explanation_html": "<p>No explanation provided.<\/p>"}, {"number": 21, "topic": "Femoral canal", "stem_html": "Which of the following forms the medial wall of the femoral canal?", "options": [{"label_html": "Pectineal ligament", "is_correct": false}, {"label_html": "Adductor longus", "is_correct": false}, {"label_html": "Sartorius", "is_correct": false}, {"label_html": "Lacunar ligament", "is_correct": true}, {"label_html": "Inguinal ligament", "is_correct": false}], "correct_index": 3, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">The femoral canal and the femoral triangle are distinct anatomical structures. Do not confuse them, especially in the time pressured exam situation.<\/div>"}, {"number": 22, "topic": "Femoral canal", "stem_html": "A 73 year old lady presents with a femoral hernia. Which of the following structures forms the lateral wall of the femoral canal?", "options": [{"label_html": "Pubic tubercle", "is_correct": false}, {"label_html": "Femoral vein", "is_correct": true}, {"label_html": "Femoral artery", "is_correct": false}, {"label_html": "Conjoint tendon", "is_correct": false}, {"label_html": "Femoral nerve", "is_correct": false}], "correct_index": 1, "explanation_html": "The canal exists to allow for the physiological expansion of the femoral vein, which lies lateral to it."}, {"number": 23, "topic": "Femoral canal", "stem_html": "A 72 year old lady is suspected of having a femoral hernia. At which of the following sites is it most likely to be identifiable clinically?", "options": [{"label_html": "Mid inguinal point", "is_correct": false}, {"label_html": "Above and medial to the pubic tubercle", "is_correct": false}, {"label_html": "Below and lateral to the pubic tubercle", "is_correct": true}, {"label_html": "Mid point of the inguinal ligament", "is_correct": false}, {"label_html": "3 cm superomedially to the superficial inguinal ring", "is_correct": false}], "correct_index": 2, "explanation_html": "Femoral hernias exit the femoral canal below and lateral to the pubic tubercle. Femoral hernia occur mainly in women due to their difference in pelvic anatomy.  They are at high risk of strangulation and therefore should be repaired."}, {"number": 24, "topic": "Femoral canal", "stem_html": "A 72 year old lady is suspected of having a femoral hernia. At which of the following sites is it most likely to be identifiable clinically?", "options": [{"label_html": "Mid inguinal point", "is_correct": false}, {"label_html": "Above and medial to the pubic tubercle", "is_correct": false}, {"label_html": "Below and lateral to the pubic tubercle", "is_correct": true}, {"label_html": "Mid point of the inguinal ligament", "is_correct": false}, {"label_html": "3 cm superomedially to the superficial inguinal ring", "is_correct": false}], "correct_index": 2, "explanation_html": "Femoral hernias exit the femoral canal below and lateral to the pubic tubercle. Femoral hernia occur mainly in women due to their difference in pelvic anatomy.  They are at high risk of strangulation and therefore should be repaired."}, {"number": 25, "topic": "Femoral canal", "stem_html": "A 78 year old lady presents with colicky abdominal pain and a tender mass in her groin. On examination; there is a small firm mass below and lateral to the pubic tubercle. Which of the following is the most likely underlying diagnosis?", "options": [{"label_html": "Incarcerated inguinal hernia", "is_correct": false}, {"label_html": "Thrombophlebitis of a saphena varix", "is_correct": false}, {"label_html": "Incarcerated femoral hernia", "is_correct": true}, {"label_html": "Incarcerated obturator hernia", "is_correct": false}, {"label_html": "Deep vein thrombosis", "is_correct": false}], "correct_index": 2, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Femoral hernia = High risk of strangulation (repair urgently)<\/div>Femoral herniae account for &lt;10% of all groin hernias. In the scenario the combination of symptoms of intestinal compromise with a mass in the region of the femoral canal points to femoral hernia as the most likely cause."}], "note_html": "The femoral canal lies at the medial aspect of the femoral sheath. The femoral sheath is a fascial tunnel containing both the femoral artery laterally and femoral vein medially. The canal lies medial to the vein.<br><br><b>Borders of the femoral canal<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Laterally<\/b><\/td><td>Femoral vein<\/td><\/tr><tr><td><b>Medially<\/b><\/td><td>Lacunar ligament<\/td><\/tr><tr><td><b>Anteriorly<\/b><\/td><td>Inguinal ligament<\/td><\/tr><tr><td><b>Posteriorly<\/b><\/td><td>Pectineal ligament<\/td><\/tr><\/tbody><\/table><\/div><br><i>Image showing dissection of femoral canal<\/i><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb036b.jpg\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb036.jpg\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Femoral canal\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb036b.jpg\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center><br><b>Contents<\/b><br><ul><li>Lymphatic vessels<\/li><li>Cloquet's lymph node<\/li><\/ul><br><b>Physiological significance<\/b><br>Allows the femoral vein to expand to allow for increased venous return from the lower limbs.<br><br><b>Pathological significance<\/b><br>As a potential space, it is the site of femoral hernias. The relatively tight neck places these at high risk of strangulation."}, {"name": "Groin masses clinical", "questions": [{"number": 26, "topic": "Groin masses clinical", "stem_html": "A 32 year old male is noted to have a tender mass in the right groin area. There are also red streaks on the thigh, extending from a small abrasion. What is the most likely explanation?", "options": [{"label_html": "Lymphadenitis", "is_correct": true}, {"label_html": "Saphena varix", "is_correct": false}, {"label_html": "Femoral artery aneurysm", "is_correct": false}, {"label_html": "Abscess", "is_correct": false}, {"label_html": "Incarcerated hernia", "is_correct": false}], "correct_index": 0, "explanation_html": "The red streaks are along the line of the lymphatics, indicating infection of the lymphatic vessels. Lymphadenitis is infection of the local lymph nodes."}, {"number": 27, "topic": "Groin masses clinical", "stem_html": "A 52 year old obese lady reports a painless grape sized mass in her groin area. She has no medical conditions apart from some varicose veins. There is a cough impulse and the mass disappears on lying down. What is the most likely cause?", "options": [{"label_html": "Femoral hernia", "is_correct": false}, {"label_html": "Inguinal hernia", "is_correct": false}, {"label_html": "Saphena varix", "is_correct": true}, {"label_html": "False aneurysm of the femoral artery", "is_correct": false}, {"label_html": "Arteriovenous malformation", "is_correct": false}], "correct_index": 2, "explanation_html": "The history of varicose veins should indicate a more likely diagnosis of a varix. The varix can enlarge during coughing/sneezing. A blue discolouration may be noted."}, {"number": 28, "topic": "Groin masses clinical", "stem_html": "A 52 year old thin lady reports a painless mass in the groin area. A mass is noted on coughing. It is below and lateral to the pubic tubercle. What is the most likely cause?", "options": [{"label_html": "Direct inguinal hernia", "is_correct": false}, {"label_html": "Indirect inguinal hernia", "is_correct": false}, {"label_html": "Femoral hernia", "is_correct": true}, {"label_html": "Obturator hernia", "is_correct": false}, {"label_html": "Lipoma", "is_correct": false}], "correct_index": 2, "explanation_html": "A mass below and lateral to the pubic tubercle is indicative of a femoral hernia."}, {"number": 29, "topic": "Groin masses clinical", "stem_html": "A 21 year old man is admitted with a tender mass in the right groin, fevers and sweats. He is on multiple medical therapy for HIV infection. On examination, he has a swelling in his right groin, hip extension exacerbates the pain. What is the most likely cause?", "options": [{"label_html": "Septic arthritis", "is_correct": false}, {"label_html": "Psoas abscess", "is_correct": true}, {"label_html": "Infected lymph node", "is_correct": false}, {"label_html": "HIV related lymphadenopathy", "is_correct": false}, {"label_html": "Femoral hernia", "is_correct": false}], "correct_index": 1, "explanation_html": "Psoas abscesses may be either primary or secondary. Primary cases often occur in the immunosuppressed and may occur as a result of haematogenous spread. Secondary cases may complicated intra abdominal diseases such as Crohns. Patients usually present with low back pain and if the abscess is extensive a mass that may be localised to the inguinal region or femoral triangle . Smaller collections may be percutaneously drained. If the collection is larger, or the percutaneous route fails, then surgery (via a retroperitoneal approach) should be performed."}], "note_html": "Groin masses are common and include:<br><ul><li>Herniae<\/li><li>Lipomas<\/li><li>Lymph nodes<\/li><li>Undescended testis<\/li><li>Femoral aneurysm<\/li><li>Saphena varix (more a swelling than a mass!)<\/li><\/ul> <br>In the history, features relating to systemic illness and tempo of onset will often give a clue as to the most likely underlying diagnosis.<br><br><b>Groin lumps- some key questions<\/b><br><ul><li>Is there a cough impulse<\/li><li>Is it pulsatile AND is it expansile (to distinguish between false and true aneurysm)<\/li><li>Are both testes intra scrotal<\/li><li>Any lesions in the legs such as malignancy or infections (?lymph nodes)<\/li><li>Examine the ano rectum as anal cancer may metastasise to the groin<\/li><li>Is the lump soft, small and very superficial (?lipoma)<\/li><\/ul><br><b>Scrotal lumps - some key questions<\/b><br><ul><li>Is the lump entirely intra scrotal<\/li><li>Does it transilluminate (?hydrocele)<\/li><li>Is there a cough impulse (?hernia)<\/li><\/ul><br>In most cases a diagnosis can be made clinically. Where it is not clear an ultrasound scan is often the most convenient next investigation."}, {"name": "Gynaecological causes of abdominal pain", "questions": [{"number": 30, "topic": "Gynaecological causes of abdominal pain", "stem_html": "A 25 year-old lady presents to her GP complaining of a two day history of right upper quadrant pain, fever and a white vaginal discharge. She has seen the GP twice in 12 weeks complaining of pelvic pain and dyspareunia. What is the most likely cause?", "options": [{"label_html": "Appendicitis", "is_correct": false}, {"label_html": "Adnexial torsion", "is_correct": false}, {"label_html": "Endometriosis", "is_correct": false}, {"label_html": "Pelvic inflammatory disease", "is_correct": true}, {"label_html": "Ruptured ectopic pregnancy", "is_correct": false}], "correct_index": 3, "explanation_html": "The most likely diagnosis is pelvic inflammatory disease. Right upper quadrant pain occurs as part of the Fitz Hugh Curtis syndrome in which peri hepatic inflammation occurs."}, {"number": 31, "topic": "Gynaecological causes of abdominal pain", "stem_html": "A 16 year old female presents to the emergency department with a 12 hour history of pelvic discomfort. She is otherwise well and her last normal menstrual period was 2 weeks ago. On examination, she has a soft abdomen with some mild supra pubic discomfort. What is the most likely underlying cause?", "options": [{"label_html": "Ruptured ectopic pregnancy", "is_correct": false}, {"label_html": "Degenerating fibroid", "is_correct": false}, {"label_html": "Pelvic inflammatory disease", "is_correct": false}, {"label_html": "Appendicitis", "is_correct": false}, {"label_html": "Mittelschmerz", "is_correct": true}], "correct_index": 4, "explanation_html": "Mid cycle pain is very common and is due to the small amount of fluid released during ovulation. Inflammatory markers are usually normal and the pain typically subsides over the next 24-48 hours."}, {"number": 32, "topic": "Gynaecological causes of abdominal pain", "stem_html": "An 18 year-old female presents to the Emergency Department with sudden onset sharp, tearing pelvic pain associated with a small amount of vaginal bleeding. She also complains of shoulder tip pain. On examination, she is hypotensive, tachycardic and has marked cervical excitation. What is the most likely explanation?", "options": [{"label_html": "Degenerating fibroid", "is_correct": false}, {"label_html": "Adnexial torsion", "is_correct": false}, {"label_html": "Ruptured ectopic pregnancy", "is_correct": true}, {"label_html": "Ruptured appendicitis", "is_correct": false}, {"label_html": "Endometriosis", "is_correct": false}], "correct_index": 2, "explanation_html": "The history of tearing pain and haemodynamic compromise in a women of child bearing years should prompt a diagnosis of ectopic pregnancy."}], "note_html": "A number of women will present with abdominal pain and subsequently be diagnosed with a gynaecological disorder. In addition to routine diagnostic work up of abdominal pain, all female patients should also undergo a bimanual vaginal examination, urine pregnancy test and consideration given to abdominal and pelvic ultrasound scanning. <br>When diagnostic doubt persists a laparoscopy provides a reliable method of assessing suspected tubulo-ovarian pathology.<br><br><b>Differential diagnoses of abdominal pain in females<\/b><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Diagnosis<\/b><\/th><th><b>Features<\/b><\/th><th><b>Investigation<\/b><\/th><th><b>Treatment<\/b><\/th><\/tr><\/thead><tbody><tr><td>Mittelschmerz<\/td><td>Usually mid cycle pain.<br>Often sharp onset.<br>Little systemic disturbance.<br>May have recurrent episodes.<br>Usually settles over 24-48 hours.<\/td><td>Full blood count- usually normal<br>Ultrasound- may show small quantity of free fluid<\/td><td>Conservative<\/td><\/tr><tr><td>Endometriosis<\/td><td>25% asymptomatic, in a further 25% associated with other pelvic organ pathology. <br>Remaining 50% may have menstrual irregularity, infertility, pain and deep dyspareunia.<br>Complex disease may result in pelvic adhesional formation with episodes of intermittent small bowel obstruction.<br>Intra-abdominal bleeding may produce localised peritoneal inflammation.<br>Recurrent episodes are common.<\/td><td>Ultrasound- may show free fluid<br>Laparoscopy will usually show lesions<\/td><td>Usually managed medically, complex disease will often require surgery and some patients will even require formal colonic and rectal resections if these areas are involved<\/td><\/tr><tr><td>Ovarian torsion<\/td><td>Usually sudden onset of deep seated colicky abdominal pain.<br>Associated with vomiting and distress.<br>Vaginal examination may reveal adnexial tenderness.<\/td><td>Ultrasound may show free fluid<br>Laparoscopy is usually both diagnostic and therapeutic<\/td><td>Laparoscopy<\/td><\/tr><tr><td>Ectopic gestation<\/td><td>Symptoms of pregnancy without evidence of intra uterine gestation.<br>Present as an emergency with evidence of rupture or impending rupture.<br>Open tubular ruptures may have sudden onset of abdominal pain and circulatory collapse, in other the symptoms may be more prolonged and less marked.<br>Small amount of vaginal discharge is common.<br>There is usually adnexial tenderness.<\/td><td>Ultrasound showing no intra uterine pregnancy and beta HCG that is elevated<br>May show intra abdominal free fluid<\/td><td>Laparoscopy or laparotomy is haemodynamically unstable. A salphingectomy is usually performed.<\/td><\/tr><tr><td>Pelvic inflammatory disease<\/td><td>Bilateral lower abdominal pain associated with vaginal discharge.<br>Dysuria may also be present.<br>Peri-hepatic inflammation secondary to Chlamydia (Fitz Hugh Curtis Syndrome) may produce right upper quadrant discomfort.<br>Fever &gt;38<sup>o<\/sup><\/td><td>Full blood count- Leucocytosis<br>Pregnancy test negative (Although infection and pregnancy may co-exist)<br>Amylase - usually normal or slightly raised<br>High vaginal and urethral swabs<\/td><td>Usually medical management<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Hernia", "questions": [{"number": 33, "topic": "Hernia", "stem_html": "A 73 year old lady presents with peritonitis and tenderness of the left groin. At operation, she has a left femoral hernia with perforation of the anti mesenteric border of ileum associated with the hernia. What type of hernia is this?", "options": [{"label_html": "Richters hernia", "is_correct": true}, {"label_html": "Littres hernia", "is_correct": false}, {"label_html": "Morgagni hernia", "is_correct": false}, {"label_html": "Spigelian hernia", "is_correct": false}, {"label_html": "Bochdalek hernia", "is_correct": false}], "correct_index": 0, "explanation_html": "When part of the bowel wall is trapped in a hernia such as this it is termed a Richters hernia and may complicate any hernia although femoral and obturator hernias are most typically implicated."}, {"number": 34, "topic": "Hernia", "stem_html": "A 22 year old man is operated on for a left inguinal hernia, at operation the sac is opened to reveal a large Meckels diverticulum. What type of hernia is this?", "options": [{"label_html": "Richters hernia", "is_correct": false}, {"label_html": "Morgagni hernia", "is_correct": false}, {"label_html": "Littres hernia", "is_correct": true}, {"label_html": "Spigelian hernia", "is_correct": false}, {"label_html": "Bochdalek hernia", "is_correct": false}], "correct_index": 2, "explanation_html": "Hernia containing Meckels diverticulum is termed a Littres hernia."}, {"number": 35, "topic": "Hernia", "stem_html": "A 22 year old man is operated on for a left inguinal hernia, at operation the sac is opened to reveal a large Meckels diverticulum. What type of hernia is this?", "options": [{"label_html": "Richters hernia", "is_correct": false}, {"label_html": "Morgagni hernia", "is_correct": false}, {"label_html": "Littres hernia", "is_correct": true}, {"label_html": "Spigelian hernia", "is_correct": false}, {"label_html": "Bochdalek hernia", "is_correct": false}], "correct_index": 2, "explanation_html": "Hernia containing Meckels diverticulum is termed a Littres hernia."}, {"number": 36, "topic": "Hernia", "stem_html": "A 45 year old man has recurrent colicky abdominal pain. As part of a series of investigations he undergoes a CT scan and this demonstrates a hernia lateral to the rectus muscle at the level of the arcuate line. What type of hernia is this?", "options": [{"label_html": "Littres", "is_correct": false}, {"label_html": "Richters", "is_correct": false}, {"label_html": "Spigelian", "is_correct": true}, {"label_html": "Morgagni", "is_correct": false}, {"label_html": "Incisional", "is_correct": false}], "correct_index": 2, "explanation_html": "This is the site for a spigelian hernia."}, {"number": 37, "topic": "Hernia", "stem_html": "A 2 month old infant is troubled by recurrent colicky abdominal pain and intermittent intestinal obstruction. On imaging, the transverse colon is herniated into the thoracic cavity, through a mid line defect. What is the most likely defect?", "options": [{"label_html": "Bochdalek hernia", "is_correct": false}, {"label_html": "Morgagni hernia", "is_correct": true}, {"label_html": "Littres hernia", "is_correct": false}, {"label_html": "Paraoesophageal hernia", "is_correct": false}, {"label_html": "Hiatus hernia", "is_correct": false}], "correct_index": 1, "explanation_html": "Morgagni hernia may contain the transverse colon. Unless there is substantial herniation, pulmonary hypoplasia is uncommon. As a result, major respiratory compromise is often absent. Para oesophageal and hiatus hernias are very rare in children."}, {"number": 38, "topic": "Hernia", "stem_html": "A 78 year old lady is admitted with small bowel obstruction. On examination, she has a distended abdomen and the leg is held semi flexed. She has some groin pain radiating to the ipsilateral knee. What is the most likely diagnosis", "options": [{"label_html": "Inguinal hernia", "is_correct": false}, {"label_html": "Obturator hernia", "is_correct": true}, {"label_html": "Lumbar hernia", "is_correct": false}, {"label_html": "Spigelian hernia", "is_correct": false}, {"label_html": "Incisional hernia", "is_correct": false}], "correct_index": 1, "explanation_html": "The groin swelling in obturator hernia is subtle and hard to elicit clinically. There may be pain in the region of sensory distribution of the obturator nerve. The defect is usually repaired from within the abdomen."}], "note_html": "Hernias occur when a viscus or part of it protrudes from within its normal anatomical cavity. Specific hernias are covered under their designated titles the remainder are addressed here.<br><br><b>Spigelian hernia<\/b><br><ul><li>Interparietal hernia occurring at the level of the arcuate line<\/li><li>Rare<\/li><li>May lie beneath internal oblique muscle. Usually between internal and external oblique<\/li><li>Equal sex distribution<\/li><li>Position is lateral to rectus abdominis<\/li><li>Both open and laparoscopic repair are possible, the former in cases of strangulation<\/li><\/ul><br><b>Lumbar hernia<\/b><br>The lumbar triangle (through which these may occur) is bounded by: <br>Crest of ilium (inferiorly)<br>External oblique (laterally)<br>Latissimus dorsi (medially)<br><ul><li>Primary lumbar herniae are rare, most are incisional hernias following renal surgery<\/li><\/ul>    - Direct anatomical repair with or without mesh re-enforcement is the procedure of choice<br><br><b>Obturator hernia<\/b><br><ul><li>Herniation through the obturator canal<\/li><li>Commoner in females<\/li><li>Usually lies behind pectineus muscle<\/li><li>Elective diagnosis is unusual most will present acutely with obstruction<\/li><li>When presenting acutely most cases with require laparotomy or laparoscopy (and small bowel resection if indicated)<\/li><\/ul><br><b>Richters hernia<\/b><br><ul><li>Condition in which part of the wall of the small bowel (usually the anti mesenteric border) is strangulated within a hernia (of any type)<\/li><li>They do not present with typical features of intestinal obstruction as lumenal patency is preserved<\/li><li>Where vomiting is prominent it usually occurs as a result of paralytic ileus from peritonitis (as these hernias may perforate)<\/li><\/ul><br><b>Incisional hernia<\/b><br><ul><li>Occur through sites of surgical access into the abdominal cavity<\/li><li>Most common following surgical wound infection<\/li><li>To minimise following midline laparotomy <b>Jenkins Rule<\/b> should be followed and this necessitates a suture length 4x length of incision with bites taken at 1cm intervals, 1 cm from the wound edge<\/li><li>Repair may be performed either at open surgery or laparoscopically and a wide variety of techniques are described<\/li><\/ul><br><b>Bochdalek hernia<\/b><br><ul><li>Typically congenital diaphragmatic hernia<\/li><li>85% cases are located in the left hemi diaphragm<\/li><li>Associated with lung hypoplasia on the affected side<\/li><li>More common in males<\/li><li>Associated with other birth defects<\/li><li>May contain stomach<\/li><li>May be treated by direct anatomical apposition or placement of mesh. In infants that have severe respiratory compromise mechanical ventilation may be needed and mortality rate is high<\/li><\/ul><br><b>Morgagni Hernia<\/b><br><ul><li>Rare type of diaphragmatic hernia (approx 2% cases)<\/li><li>Herniation through foramen of Morgagni<\/li><li>Usually located on the right and tend to be less symptomatic<\/li><li>More advanced cases may contain transverse colon<\/li><li>As defects are small pulmonary hypoplasia is less common<\/li><li>Direct anatomical repair is performed<\/li><\/ul><br><b>Umbilical hernia<\/b><br><ul><li>Hernia through weak umbilicus<\/li><li>Usually presents in childhood<\/li><li>Often symptomatic<\/li><li>Equal sex incidence<\/li><li>95% will resolve by the age of 2 years<\/li><li>Surgery performed after the third birthday<\/li><\/ul><br><b>Paraumbilical hernia<\/b><br><ul><li>Usually a condition of adulthood<\/li><li>Defect is in the linea alba <\/li><li>More common in females<\/li><li>Multiparity and obesity are risk factors<\/li><li>Traditionally repaired using Mayos technique - overlapping repair, mesh may be used though not if small bowel resection is required owing to acute strangulation<\/li><\/ul><br><b>Littres hernia<\/b><br><ul><li>Hernia containing Meckels diverticulum<\/li><li>Resection of the diverticulum is usually required and this will preclude a mesh repair<\/li><\/ul>"}, {"name": "Intussusception- Paediatric", "questions": [{"number": 39, "topic": "Intussusception- Paediatric", "stem_html": "A 6 year old child presents with colicky abdominal pain, vomiting and the passage of red current jelly stool per rectum. On examination, the child has a tender abdomen and a palpable mass in the right upper quadrant. Imaging shows an intussusception. Which of the conditions below is least recognised as a precipitant?", "options": [{"label_html": "Inflammation of Peyers patches", "is_correct": false}, {"label_html": "Cystic fibrosis", "is_correct": false}, {"label_html": "Meckels diverticulum", "is_correct": false}, {"label_html": "Mesenteric cyst", "is_correct": true}, {"label_html": "Mucosal polyps", "is_correct": false}], "correct_index": 3, "explanation_html": "Mesenteric cysts may be associated with intra abdominal catastrophes where these occur they are typically either intestinal volvulus or intestinal infarction. They seldom cause intussusception. Cystic fibrosis may lead to the formation of meconium ileus equivalent and plugs may occasionally serve as the lead points for an intussusception."}, {"number": 40, "topic": "Intussusception- Paediatric", "stem_html": "A 14 month old child is admitted with colicky abdominal pain and on investigation is found to have an ileo-ileal intussusception. What is the best course of action?", "options": [{"label_html": "Attempt hydrostatic reduction with barium enema", "is_correct": false}, {"label_html": "Attempt pneumatic reduction with air insufflation", "is_correct": false}, {"label_html": "Undertake a laparotomy", "is_correct": true}, {"label_html": "Undertake a colonoscopy", "is_correct": false}, {"label_html": "Undertake a flexible sigmoidoscopy", "is_correct": false}], "correct_index": 2, "explanation_html": "Ileo-ileal intussusception are far less common than the ileo-colic variant. However, where they occur, they require surgery and are not amenable to pneumatic reduction."}, {"number": 41, "topic": "Intussusception- Paediatric", "stem_html": "A 7 month old girl presents with vomiting and diarrhoea. She is crying and drawing her legs up. There is a a sausage shaped mass in the abdomen. What is the most likely diagnosis?", "options": [{"label_html": "Mesenteric cyst", "is_correct": false}, {"label_html": "Intussusception", "is_correct": true}, {"label_html": "Colonic cancer", "is_correct": false}, {"label_html": "Small bowel tumour", "is_correct": false}, {"label_html": "Internal hernia", "is_correct": false}], "correct_index": 1, "explanation_html": "In a child of this age the history of colicky pain and the presence of a sausage shaped mass are strongly suggestive of an ileo-colic intussusception."}, {"number": 42, "topic": "Intussusception- Paediatric", "stem_html": "A 1 year old child has been unwell with a sore throat and fever for several days. He progresses to develop periumbilical abdominal discomfort and passes diarrhoea. The paediatricians call you because the ultrasound has shown a 'target sign' on the right side of the abdomen. What is the best initial course of action?", "options": [{"label_html": "Obtain intravenous access, administer fluids and antibiotics", "is_correct": true}, {"label_html": "Undertake urgent fluoroscopic reduction", "is_correct": false}, {"label_html": "Undertake urgent hydrostatic reduction", "is_correct": false}, {"label_html": "Undertake a colonoscopy", "is_correct": false}, {"label_html": "Undertake a laparotomy", "is_correct": false}], "correct_index": 0, "explanation_html": "Always ensure that children with intussusception are resuscitated first. Administration of antibiotics is also important. This should precede any intervention."}], "note_html": "Intussusception typically presents with colicky abdominal pain and vomiting. The telescoping of the bowel produces mucosal ischaemia and bleeding may occur resulting in the passage of red current jelly stools. Recognised causes include lumenal pathologies such as polyps, lymphadenopathy and diseases such as cystic fibrosis. Idiopathic intussceception of the ileocaecal valve and terminal ileum is the most common variant and typically affects young children and toddlers. <br><br>The diagnosis is usually made by abdominal ultrasound investigation. The decision as to the optimal treatment is dictated by the patients physiological status and abdominal signs. In general, children who are unstable with localising peritoneal signs should undergo laparotomy, as should those in whom attempted radiological reduction has failed. <br><br>In relatively well children, without localising signs, attempted pneumatic reduction under fluroscopic guidance is the usual treatment. This is not done where there are concerns about impending perforation or if there is a small bowel intussusception."}, {"name": "Irritable bowel syndrome", "questions": [{"number": 43, "topic": "Irritable bowel syndrome", "stem_html": "A 19 year old female presents with colicky abdominal pain, bloating and alternating constipation/diarrhoea. Her grandmother died from colon cancer at the age of 87 years. A digital rectal examination and general physical examination are normal. What is the best course of action?", "options": [{"label_html": "Measurement of faecal calprotectin", "is_correct": true}, {"label_html": "Arrange a barium enema", "is_correct": false}, {"label_html": "Undertake a colonoscopy", "is_correct": false}, {"label_html": "Undertake a proctoscopy", "is_correct": false}, {"label_html": "Undertake a rigid sigmoidoscopy", "is_correct": false}], "correct_index": 0, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">The family history is irrelevant, an 87 year old developing colorectal cancer is sporadic chance. The patients risk of cancer is thus population baseline and at age 20 this is very low indeed. The main differential would be inflammatory bowel disease and a faecal calprotectin is a very sensitive screening test for this.<\/div>This patient fulfills the Rome criteria for irritable bowel syndrome. Examination is normal, therefore it's likely that this patient will have IBS. However, its prudent to exclude IBD and since endoscopy is poorly tolerated in patients with IBS, measurement of faecal calprotectin is a reasonable alternative."}, {"number": 44, "topic": "Irritable bowel syndrome", "stem_html": "Which of the following is not a typical feature of irritable bowel syndrome?", "options": [{"label_html": "A change in the consistency of stools", "is_correct": false}, {"label_html": "Abdominal pain relieved with defecation", "is_correct": false}, {"label_html": "A change in frequency of defecation", "is_correct": false}, {"label_html": "Abdominal bloating", "is_correct": false}, {"label_html": "Pain at a single fixed site", "is_correct": true}], "correct_index": 4, "explanation_html": "The pain or discomfort of IBS is typically migratory and variable in intensity. Pain at a fixed site is suggestive of malignancy.<br>Abdominal bloating is an extremely common feature."}], "note_html": "The diagnosis of irritable bowel syndrome is made according to the ROME IV diagnostic criteria which state:<br><br><b>Recurrent abdominal pain or discomfort weekly for the past 3 months associated with two or more of the following:<\/b><br><ul><li>Improvement with defecation.<\/li><li>Onset associated with a change in the frequency of stool.<\/li><li>Onset associated with a change in the form of the stool.<\/li><\/ul><br>Features such as lethargy, nausea, backache and bladder symptoms may also support the diagnosis<br><br>Red flag features should be inquired about:<br><br><ul><li>Rectal bleeding<\/li><li>Unexplained/unintentional weight loss<\/li><li>Family history of bowel or ovarian cancer<\/li><li>Onset after 60 years of age<\/li><\/ul><br>Suggested investigations are:<br><br><ul><li>Full blood count<\/li><li>ESR/CRP<\/li><li>Coeliac disease screen (tissue transglutaminase antibodies)<\/li><li>Colonoscopy (if worrying symptoms, positive family history)<\/li><li>Thyroid function tests<\/li><li>Glucose (ensure not diabetic)<\/li><\/ul><br>The NICE criteria state that blood tests alone will suffice in people fulfilling the diagnostic criteria. We would point out that luminal colonic studies should be considered early in patients with altered bowel habit referred to hospital and a diagnosis of IBS should still be largely one of exclusion.<br><br><b>Treatment<\/b><br><ul><li>Usually reduce fibre intake.<\/li><li>Tailored prescriptions of laxatives or loperamide according to clinical picture.<\/li><li>Dietary modification (caffeine avoidance, less carbonated drinks).<\/li><li>Consider low dose tricyclic antidepressants if pain is a dominant symptom.<\/li><li>Biofeedback may help.<\/li><\/ul>"}, {"name": "Malabsorption", "questions": [{"number": 45, "topic": "Malabsorption", "stem_html": "Which one of the following is least likely to cause malabsorption?", "options": [{"label_html": "Primary biliary cirrhosis", "is_correct": false}, {"label_html": "Ileo-colic bypass", "is_correct": false}, {"label_html": "Chronic pancreatitis", "is_correct": false}, {"label_html": "Whipples disease", "is_correct": false}, {"label_html": "Hartmans procedure", "is_correct": true}], "correct_index": 4, "explanation_html": "In a Hartmans procedure the sigmoid colon is removed and an end colostomy is fashioned.  The bowel remains in continuity and no absorptive ability is lost.<br>An ileo-colic bypass leaves a redundant loop of small bowel in continuity, where the contents will stagnate and bacterial overgrowth will occur.  Therefore this is recognised cause of malabsorption."}, {"number": 46, "topic": "Malabsorption", "stem_html": "Which one of the following is least likely to cause malabsorption?", "options": [{"label_html": "Primary biliary cirrhosis", "is_correct": false}, {"label_html": "Ileo-colic bypass", "is_correct": false}, {"label_html": "Chronic pancreatitis", "is_correct": false}, {"label_html": "Whipples disease", "is_correct": false}, {"label_html": "Hartmans procedure", "is_correct": true}], "correct_index": 4, "explanation_html": "In a Hartmans procedure the sigmoid colon is removed and an end colostomy is fashioned.  The bowel remains in continuity and no absorptive ability is lost.<br>An ileo-colic bypass leaves a redundant loop of small bowel in continuity, where the contents will stagnate and bacterial overgrowth will occur.  Therefore this is recognised cause of malabsorption."}], "note_html": "Malabsorption is characterised by diarrhoea, steatorrhoea and weight loss. Causes may be broadly divided into intestinal (e.g. villous atrophy), pancreatic (deficiency of pancreatic enzyme production or secretion) and biliary (deficiency of bile-salts needed for emulsification of fats)<br><br>Intestinal causes of malabsorption<br><ul><li>coeliac disease<\/li><li>Crohn's disease<\/li><li>tropical sprue<\/li><li>Whipple's disease<\/li><li>Giardiasis<\/li><li>brush border enzyme deficiencies (e.g. lactase insufficiency)<\/li><\/ul><br>Pancreatic causes of malabsorption<br><ul><li>chronic pancreatitis<\/li><li>cystic fibrosis<\/li><li>pancreatic cancer<\/
