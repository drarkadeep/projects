li><\/ul><br>Biliary causes of malabsorption<br><ul><li>biliary obstruction<\/li><li>primary biliary cirrhosis<\/li><\/ul><br>Other causes<br><ul><li>bacterial overgrowth (e.g. systemic sclerosis, diverticulae, blind loop)<\/li><li>short bowel syndrome<\/li><li>lymphoma<\/li><\/ul>"}, {"name": "Meckel's diverticulum", "questions": [{"number": 47, "topic": "Meckel's diverticulum", "stem_html": "An 18 month old boy is brought to the emergency room by his parents. He was found in bed with a nappy filled with dark red blood. He is haemodynamically unstable and requires a blood transfusion. Prior to this episode he was well with no prior medical history. What is the most likely cause?", "options": [{"label_html": "Necrotising enterocolitis", "is_correct": false}, {"label_html": "Anal fissure", "is_correct": false}, {"label_html": "Oesophageal varices", "is_correct": false}, {"label_html": "Meckels diverticulum", "is_correct": true}, {"label_html": "Crohns disease", "is_correct": false}], "correct_index": 3, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Meckels diverticulum is the number one cause of painless massive GI bleeding requiring a transfusion in children between the ages of 1 and 2 years.<\/div>Other causes of GI bleeding include:<br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Site<\/b><\/th><th><b>Newborn<\/b><\/th><th><b>1 month to 1 year<\/b><\/th><th><b>1 to 2 years<\/b><\/th><th><b>Older than 2 years<\/b><\/th><\/tr><\/thead><tbody><tr><td>Upper GI tract<\/td><td>Haemorrhagic disease, swallowed maternal blood<\/td><td>Oesophagitis/ gastritis<\/td><td>Peptic ulcer disease<\/td><td>Varices<\/td><\/tr><tr><td>Lower GI tract<\/td><td>Anal fissure/ NEC<\/td><td>Anal fissure/ Intussusception<\/td><td>Polyps / Meckels diverticulum<\/td><td>IBD/ Polyps/ Intussusception<\/td><\/tr><\/tbody><\/table><\/div>"}, {"number": 48, "topic": "Meckel's diverticulum", "stem_html": "A 20 year old man is suspected of having an inflamed Meckels diverticulum. At which of the following locations is it most likely to be found?", "options": [{"label_html": "Approximately 60 cm distal to the ileo-caecal valve", "is_correct": false}, {"label_html": "Approximately 60 cm proximal to the ileocaecal valve", "is_correct": true}, {"label_html": "Approximately 200cm distal to the ileocaecal valve", "is_correct": false}, {"label_html": "Approximately 200cm proximal to the ileocaecal valve", "is_correct": false}, {"label_html": "50cm distal to the DJ flexure", "is_correct": false}], "correct_index": 1, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\"><b>Rule of 2's<\/b><br><br>2% of population<br>2 inches (5cm) long<br>2 feet (60 cm) from the ileocaecal valve<br>2 x's more common in men<br>2 tissue types involved<\/div>They are typically found 2 feet proximal to the ileocaecal valve (or approximately 60cm)."}, {"number": 49, "topic": "Meckel's diverticulum", "stem_html": "A 17 year old man is identified as having a Meckels diverticulum. From which of the following embryological structures is it derived?", "options": [{"label_html": "Foregut", "is_correct": false}, {"label_html": "Hindgut", "is_correct": false}, {"label_html": "Urachus", "is_correct": false}, {"label_html": "Cloaca", "is_correct": false}, {"label_html": "Vitello-intestinal duct", "is_correct": true}], "correct_index": 4, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\"><b>Rule of 2's<\/b><br><br>2% of population<br>2 inches (5cm) long<br>2 feet (60 cm) from the ileocaecal valve<br>2 x's more common in men<br>2 tissue types involved<\/div>The Meckels diverticulum is a persistence of the vitello-intestinal duct."}, {"number": 50, "topic": "Meckel's diverticulum", "stem_html": "A 30 year old man is suspected of having appendicitis. At operation an inflamed Meckels diverticulum is found. Which of the following vessels is responsible for the blood supply to a Meckels diverticulum?", "options": [{"label_html": "Right colic artery", "is_correct": false}, {"label_html": "Vitelline artery", "is_correct": true}, {"label_html": "Appendicular artery", "is_correct": false}, {"label_html": "Internal iliac artery", "is_correct": false}, {"label_html": "External iliac artery", "is_correct": false}], "correct_index": 1, "explanation_html": "The vitelline arteries supply a Meckels these are usually derived from the ileal arcades."}], "note_html": "- Congenital abnormality resulting in incomplete obliteration of the vitello-intestinal duct<br><ul><li>Normally, in the foetus, there is an attachment between the vitello-intestinal duct and the yolk sac.This disappears at 6 weeks gestation.<\/li><li>The tip is free in majority of cases.<\/li><li>Associated with enterocystomas, umbilical sinuses, and omphaloileal fistulas.<\/li><li>Arterial supply: omphalomesenteric artery. <\/li><li>2% of population, 2 inches long, 2 feet from the ileocaecal valve.<\/li><li>Typically lined by ileal mucosa but ectopic gastric mucosa can occur, with the risk of peptic ulceration.  Pancreatic and jejunal mucosa can also occur.<\/li><\/ul><br><b>Clinical<\/b><br><ul><li>Normally asymptomatic and an incidental finding.<\/li><li>Complications are the result of obstruction, ectopic tissue, or inflammation.<\/li><li>Removal if narrow neck or symptomatic. Options are between wedge excision or formal small bowel resection and anastomosis.<\/li><\/ul>"}, {"name": "Right iliac fossa pain", "questions": [{"number": 51, "topic": "Right iliac fossa pain", "stem_html": "An 8 year old boy is examined by his doctor as part of a routine clinical examination. The doctor notices a smooth swelling in the right iliac fossa. It is mobile and he is otherwise well. What is the most likely underlying cause?", "options": [{"label_html": "Meckels diverticulum", "is_correct": false}, {"label_html": "Spigelian hernia", "is_correct": false}, {"label_html": "Mesenteric cyst", "is_correct": true}, {"label_html": "Appendix mass", "is_correct": false}, {"label_html": "Liposarcoma", "is_correct": false}], "correct_index": 2, "explanation_html": "Mesenteric cysts are often smooth. Imaging with ultrasound and CT is usually sufficient. Although rare, they most often occur in young children (up to 30% present before the age of 15). Many are asymptomatic and discovered incidentally. Acute presentations are recognised and may occur following cyst torsion, infarction or rupture. Most cysts will be surgically resected. <br>Spigelian hernias are very rare in children, liposarcomas are not smooth swellings. An appendix mass will usually produce systemic illness."}, {"number": 52, "topic": "Right iliac fossa pain", "stem_html": "A 7 year old boy presents with a three day history of right iliac fossa pain and fever. On examination, he has a temperature of 39.9 <sup>0<\/sup>C. His abdomen is soft and mildly tender in the right iliac fossa. What is the likely underlying diagnosis?", "options": [{"label_html": "Appendicitis", "is_correct": false}, {"label_html": "Crohns disease", "is_correct": false}, {"label_html": "Mesenteric adenitis", "is_correct": true}, {"label_html": "Irritable bowel syndrome", "is_correct": false}, {"label_html": "Threadworm infection", "is_correct": false}], "correct_index": 2, "explanation_html": "High fever and mild abdominal signs in a younger child should raise suspicion for mesenteric adenitis. The condition may mimic appendicitis and many may require surgery. Appendicitis is likely to produce more localizing signs in a child aged 7 and seldom presents with such a high fever. The history is too short to be consistent with Crohns disease. Whilst threadworm infection is a recognized cause of right iliac fossa pain, its unusual for it to be associated with a fever such as the one described."}, {"number": 53, "topic": "Right iliac fossa pain", "stem_html": "A 17 year old male is admitted with lower abdominal discomfort. He has been suffering from intermittent right iliac fossa pain for the past few months. His past medical history includes a negative colonoscopy and gastroscopy undertaken as investigation for iron deficiency anaemia. The pain is worse after meals. Inflammatory markers are normal. What is the most likely cause?", "options": [{"label_html": "Appendicitis", "is_correct": false}, {"label_html": "Crohns disease", "is_correct": false}, {"label_html": "Peptic ulcer disease", "is_correct": false}, {"label_html": "Meckels diverticulum", "is_correct": true}, {"label_html": "Irritable bowel syndrome", "is_correct": false}], "correct_index": 3, "explanation_html": "This scenario should raise suspicion for Meckels as these may contain ectopic gastric mucosa which may secrete acid with subsequent bleeding and ulceration. The iron deficiency anaemia makes a Meckels more likely than IBS."}, {"number": 54, "topic": "Right iliac fossa pain", "stem_html": "A 14 year old female is admitted with sudden onset right iliac fossa pain. She is otherwise well and on examination has some right iliac fossa tenderness but no guarding. She is afebrile. Urinary dipstick is normal. Her previous menstrual period two weeks ago was normal and pregnancy test is negative. What is the most likely underlying diagnosis?", "options": [{"label_html": "Mittelschmerz", "is_correct": true}, {"label_html": "Endometriosis", "is_correct": false}, {"label_html": "Appendicitis", "is_correct": false}, {"label_html": "Crohns disease", "is_correct": false}, {"label_html": "Pelvic abscess", "is_correct": false}], "correct_index": 0, "explanation_html": "The timing of the pain and the fact that it is mid cycle makes Mittelschmerz the most likely cause. When follicular cysts rupture, there is sometimes associated bleeding of small volume. The cyst contents and blood if present can be very irritant and pain can sometimes mimic appendicitis or pelvic inflammatory disease. However, normal inflammatory markers makes the former less likely and unless the 14 year old was sexually active, PID is also relatively rare in this group. Crohns disease and pelvic abscesses would typically present with a more protracted history and raised inflammatory markers and fever."}, {"number": 55, "topic": "Right iliac fossa pain", "stem_html": "A 21 year old male is admitted with a 3 month history of intermittent right iliac fossa pain. He suffers from episodic diarrhoea and has lost 2 kilos in weight. On examination, he has some right iliac fossa tenderness and is febrile. What is the most likely cause?", "options": [{"label_html": "Appendicitis", "is_correct": false}, {"label_html": "Irritable bowel syndrome", "is_correct": false}, {"label_html": "Inflammatory bowel disease", "is_correct": true}, {"label_html": "Infective gastroenteritis", "is_correct": false}, {"label_html": "Meckels diverticulum", "is_correct": false}], "correct_index": 2, "explanation_html": "The history of weight loss and intermittent diarrhea makes inflammatory bowel disease the most likely diagnosis. Conditions such as appendicitis and infections have a much shorter history. Although Meckels can bleed and cause inflammation, they seldom cause marked weight loss."}, {"number": 56, "topic": "Right iliac fossa pain", "stem_html": "A 21 year old woman is admitted with a 48 hour history of worsening right iliac fossa pain. She has been nauseated and vomited twice. On examination, she is markedly tender in the right iliac fossa with localised guarding. Vaginal examination is unremarkable. Urine dipstick (including beta HCG) is negative. Blood tests show a WCC of 13.5 and CRP 70. What is the most appropriate course of action?", "options": [{"label_html": "Open appendicectomy", "is_correct": false}, {"label_html": "Laparotomy", "is_correct": false}, {"label_html": "Abdominal ultrasound", "is_correct": false}, {"label_html": "Laparoscopic appendicectomy", "is_correct": true}, {"label_html": "Abdominal CT scan", "is_correct": false}], "correct_index": 3, "explanation_html": "The most likely diagnosis is appendicitis. The negative vaginal examination (and therefore by definition the absence of cervical excitation) makes pelvic inflammatory disease unlikely. Given the raised inflammatory markers, the correct course of action is to proceed with surgery. In females, there are considerable advantages of undertaking this laparoscopically as it allows evaluation of the pelvic viscera. Imaging with USS is unlikely to alter management as it has a false negative rate and given the context of the clinical findings, surgery is likely to occur in any case. Whilst a CT scan would allow for an accurate pre-operative diagnosis, it carries a significant radiation dose, and again, is unlikely to alter management."}, {"number": 57, "topic": "Right iliac fossa pain", "stem_html": "A 21 year old woman is admitted with a 48 hour history of worsening right iliac fossa pain. She has been nauseated and vomited twice. On examination, she is markedly tender in the right iliac fossa with localised guarding. Vaginal examination is unremarkable. Urine dipstick (including beta HCG) is negative. Blood tests show a WCC of 13.5 and CRP 70. What is the most appropriate course of action?", "options": [{"label_html": "Open appendicectomy", "is_correct": false}, {"label_html": "Laparotomy", "is_correct": false}, {"label_html": "Abdominal ultrasound", "is_correct": false}, {"label_html": "Laparoscopic appendicectomy", "is_correct": true}, {"label_html": "Abdominal CT scan", "is_correct": false}], "correct_index": 3, "explanation_html": "The most likely diagnosis is appendicitis. The negative vaginal examination (and therefore by definition the absence of cervical excitation) makes pelvic inflammatory disease unlikely. Given the raised inflammatory markers, the correct course of action is to proceed with surgery. In females, there are considerable advantages of undertaking this laparoscopically as it allows evaluation of the pelvic viscera. Imaging with USS is unlikely to alter management as it has a false negative rate and given the context of the clinical findings, surgery is likely to occur in any case. Whilst a CT scan would allow for an accurate pre-operative diagnosis, it carries a significant radiation dose, and again, is unlikely to alter management."}, {"number": 58, "topic": "Right iliac fossa pain", "stem_html": "An 8 year old boy presents with a 4 hour history of right iliac fossa pain with nausea and vomiting. He has been back at school for two days after being kept home with a flu like illness. On examination, he is tender in the right iliac fossa, although his abdomen is soft. Temperature is 39.3<sup>o<\/sup>C. Blood tests show a CRP of 40 and a WCC of 8.1. What is the most appropriate course of action?", "options": [{"label_html": "Abdominal MRI scan", "is_correct": false}, {"label_html": "Abdominal CT scan", "is_correct": false}, {"label_html": "Diagnostic laparoscopy", "is_correct": false}, {"label_html": "Active observation", "is_correct": true}, {"label_html": "Colonoscopy", "is_correct": false}], "correct_index": 3, "explanation_html": "The key point in the history is the preceding flu like illness and absence of abdominal signs. These make mesenteric adenitis the most likely diagnosis. The patient should have a period of active observation, if this were to represent early appendicitis, then the clinical picture may change and this would be detected with serial examination."}, {"number": 59, "topic": "Right iliac fossa pain", "stem_html": "A 21 year old woman presents with right iliac fossa pain. She reports some bloodstained vaginal discharge. On examination, she is afebrile and has a pulse rate of 97 bpm, normal blood pressure. She has diffuse lower abdominal tenderness. What is the most appropriate course of action?", "options": [{"label_html": "Laparotomy", "is_correct": false}, {"label_html": "Laparoscopy", "is_correct": false}, {"label_html": "Abdominal and pelvic MRI scan", "is_correct": false}, {"label_html": "Abdominal and pelvic CT scan", "is_correct": false}, {"label_html": "Abdominal and pelvic USS", "is_correct": true}], "correct_index": 4, "explanation_html": "The history of blood stained discharge and tenderness makes an ectopic pregnancy a strong possibility, a USS should be performed and a pregnancy test undertaken. If the beta HCG is high then an intra uterine pregnancy should be found. If it is not, then an ectopic pregnancy is likely and surgery should be considered."}], "note_html": "<b>Differential diagnosis<\/b><br><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Appendicitis<\/b><\/td><td><ul><li>Pain radiating to right iliac fossa<\/li><li>Anorexia (very common)<\/li><li>Short history<\/li><li>Diarrhoea and profuse vomiting rare<\/li><\/ul><\/td><\/tr><tr><td><b>Crohn's disease<\/b><\/td><td><ul><li>Often long history<\/li><li>Signs of malnutrition<\/li><li>Change in bowel habit, especially diarrhoea<\/li><\/ul><\/td><\/tr><tr><td><b>Mesenteric adenitis<\/b><\/td><td><ul><li>Mainly affects children<\/li><li>Causes include Adenoviruses, Epstein Barr Virus, beta-haemolytic <i>Streptococcus<\/i>, <i>Staphylococcus<\/i> spp., <i>Escherichia coli<\/i>, <i><i>Streptococcus<\/i> viridans<\/i> and Yersinia spp.<\/li><li>Patients have a higher temperature than those with appendicitis<\/li><li>If laparotomy is performed, enlarged mesenteric lymph nodes will be present<\/li><\/ul><\/td><\/tr><tr><td><b>Diverticulitis<\/b><\/td><td><ul><li>Both left and right sided disease may present with right iliac fossa pain<\/li><li>Clinical history may be similar, although some change in bowel habit is usual<\/li><li>When suspected, a CT scan may help in refining the diagnosis<\/li><\/ul><\/td><\/tr><tr><td><b>Meckel's diverticulitis<\/b><\/td><td><ul><li>A Meckel's diverticulum is a congenital abnormality that is present in about 2% of the population<\/li><li>Typically 2 feet proximal to the ileocaecal valve<\/li><li>May be lined by ectopic gastric mucosal tissue and produce bleeding<\/li><\/ul><\/td><\/tr><tr><td><b>Perforated peptic ulcer<\/b><\/td><td><ul><li>This usually produces upper quadrant pain but pain may be lower<\/li><li>Perforations typically have a sharp sudden onset of pain in the history<\/li><\/ul><\/td><\/tr><tr><td><b>Incarcerated right inguinal or femoral hernia<\/b><\/td><td><ul><li>Usually only right iliac fossa pain if right sided or bowel obstruction.<\/li><\/ul><\/td><\/tr><tr><td><b>Bowel perforation secondary to caecal or colon carcinoma<\/b><\/td><td><ul><li>Seldom localised to right iliac fossa, although complete large bowel obstruction with caecal distension may cause pain prior to perforation.<\/li><\/ul><\/td><\/tr><tr><td><b>Gynaecological causes<\/b><\/td><td><ul><li>Pelvic inflammatory disease/salpingitis/pelvic abscess/Ectopic pregnancy/Ovarian torsion/Threatened or complete abortion/Mittelschmerz<\/li><\/ul><\/td><\/tr><tr><td><b>Urological causes<\/b><\/td><td><ul><li>Ureteric colic/UTI/Testicular torsion<\/li><\/ul><\/td><\/tr><tr><td><b>Other causes<\/b><\/td><td><ul><li>TB/Typhoid/Herpes Zoster/AAA/Situs inversus<\/li><\/ul><\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Surgical complications", "questions": [{"number": 60, "topic": "Surgical complications", "stem_html": "A 5 year old boy develops a persistent fever following an open appendicectomy for gangrenous appendicitis. On examination, he has erythema of the wound and some abdominal distension. What is the most appropriate course of action?", "options": [{"label_html": "Diagnostic laparoscopy", "is_correct": false}, {"label_html": "Open the wound", "is_correct": false}, {"label_html": "Arrange an abdominal ultrasound scan", "is_correct": true}, {"label_html": "Arrange an abdominal CT scan", "is_correct": false}, {"label_html": "Arrange an abdominal X-ray", "is_correct": false}], "correct_index": 2, "explanation_html": "This patient has risk factors for a wound infection which is not in itself an indication for scanning. However, he also had abdominal distension and this, together with the history of distension would generally attract a recommendation for imaging. A USS will show an abdominal wall collection and more importantly any phrenic or pelvic collections. Unlike adult practice, CT scanning is rarely performed in children."}, {"number": 61, "topic": "Surgical complications", "stem_html": "A 56 year old man is 8 days following a left hemicolectomy. He has developed a swinging pyrexia over the past 48 hours and has an ileus clinically. What is the most appropriate investigation?", "options": [{"label_html": "Abdominal CT scan with IV contrast", "is_correct": true}, {"label_html": "Abdominal MRI scan", "is_correct": false}, {"label_html": "Abdominal ultrasound scan", "is_correct": false}, {"label_html": "PET CT scan", "is_correct": false}, {"label_html": "Erect chest x-ray", "is_correct": false}], "correct_index": 0, "explanation_html": "This would most likely be the result of an anastomotic leak with abscess formation. Detailed imaging is required to allow accurate diagnosis and planning of management."}, {"number": 62, "topic": "Surgical complications", "stem_html": "A 43 year old lady underwent an acute cholecystectomy for cholecystitis. A drain is left during the procedure. Over the next 5 days the drain has been accumulating between 100-200ml of bile per 24 hour period. What is the most appropriate course of action?", "options": [{"label_html": "Undertake a laparotomy", "is_correct": false}, {"label_html": "Arrange an abdominal CT scan", "is_correct": false}, {"label_html": "Arrange an ERCP", "is_correct": true}, {"label_html": "Arrange an abdominal USS", "is_correct": false}, {"label_html": "Order an erect CXR", "is_correct": false}], "correct_index": 2, "explanation_html": "The most likely cause of a bile leak in this scenario would be a dislodged clip from the cystic duct. Whilst it may be tempting to try and plan to manage this surgically the anatomy is often unfavorable and the duct very difficult to identify. An ERCP has the advantage of demonstrating the cause of the leak and allowing placement of a stent. This will usually allow the resolution of most leaks without the need for surgery."}, {"number": 63, "topic": "Surgical complications", "stem_html": "A 67 year old female undergoes an oesophagogastrectomy for carcinoma of the distal oesophagus. She complains of chest pain. The following day there is brisk bubbling into the chest drain when suction is applied. What is the most likely cause?", "options": [{"label_html": "Anastomotic leak", "is_correct": false}, {"label_html": "Air leak from lung", "is_correct": true}, {"label_html": "Chyle leak", "is_correct": false}, {"label_html": "Bile leak", "is_correct": false}, {"label_html": "Cutaneous wound breakdown", "is_correct": false}], "correct_index": 1, "explanation_html": "Damage to the lung substance may produce an air leak. Air leaks will manifest themselves as a persistent pneumothorax that fails to settle despite chest drainage. When suction is applied to the chest drainage system, active and persistent bubbling may be seen. Although an anastomotic leak may produce a small pneumothorax, a large volume air leak is more indicative of lung injury."}, {"number": 64, "topic": "Surgical complications", "stem_html": "A 63 year old man undergoes an Ivor - Lewis oesophagogastrectomy for carcinoma of the distal oesophagus. The following day a pale opalescent liquid is noted to be draining from the right chest drain. What is the most likely explanation?", "options": [{"label_html": "Lung injury", "is_correct": false}, {"label_html": "Chyle leak", "is_correct": true}, {"label_html": "Anastomotic leak", "is_correct": false}, {"label_html": "Infection", "is_correct": false}, {"label_html": "Seroma", "is_correct": false}], "correct_index": 1, "explanation_html": "Damage to the lymphatic duct may occur during this procedure and some surgeons administer a lipid rich material immediately prior to surgery to facilitate its identification in the event of iatrogenic damage."}, {"number": 65, "topic": "Surgical complications", "stem_html": "A 22 year old lady undergoes a total thyroidectomy for Graves disease. 6 hours post operatively she develops respiratory stridor and develops a small haematoma in the neck. What is the most appropriate course of action?", "options": [{"label_html": "Perform a cricothyroidotomy", "is_correct": false}, {"label_html": "Re-open the neck wound", "is_correct": true}, {"label_html": "Perform a percutaneous tracheostomy", "is_correct": false}, {"label_html": "Reassure the patient and prescribe an anxiolytic", "is_correct": false}, {"label_html": "Insert a nasopharyngeal airway", "is_correct": false}], "correct_index": 1, "explanation_html": "This is true emergency and evacuation and release of pressure must be performed immediately, in this case by removal of skin clips on the ward. Attempts to access the airway surgically will delay this and can result in death."}, {"number": 66, "topic": "Surgical complications", "stem_html": "Which of the following interventions is most likely to reduce the incidence of intra abdominal adhesions?", "options": [{"label_html": "Peritoneal lavage with cetrimide following elective right hemicolectomy", "is_correct": false}, {"label_html": "Use of a laparoscopic approach over open surgery", "is_correct": true}, {"label_html": "Use of talc to coat surgical gloves", "is_correct": false}, {"label_html": "Performing a Nobles plication of the small bowel", "is_correct": false}, {"label_html": "Using stapled rather than a hand sewn anastamosis", "is_correct": false}], "correct_index": 1, "explanation_html": "Laparoscopy results in fewer adhesions. When talc was used to coat surgical gloves it was a major cause of adhesion formation and withdrawn for that reason. A Nobles plication is an old fashioned operation which has no place in the prevention of adhesion formation. Use of an anastamotic stapling device will not influence the development of adhesions per se although clearly an anastamotic leak will result in more adhesion formation"}], "note_html": "Complications occur in all branches of surgery and require vigilance in their detection. In many cases anticipating the likely complications and appropriate avoidance will minimise their occurrence. For the purposes of the MRCS the important principles to appreciate are:<br><br><ul><li>The anatomical principles that underpin complications<\/li><li>The physiological and biochemical derangements that occur<\/li><li>The most appropriate diagnostic modalities to utilise<\/li><li>The principles which underpin their management<\/li><\/ul><br>This is clearly a very broad area and impossible to cover comprehensively. There is considerable overlap with other topic areas within the website.<br><br><b>Avoiding complications<\/b><br><br>Some points to hopefully avert complications:<br><br><ul><li>World Health Organisation checklist- now mandatory prior to all operations<\/li><li>Prophylactic antibiotics - right dose, right drug, right time.<\/li><li>Assess DVT/ PE risk and ensure adequate prophylaxis<\/li><li><b>MARK<\/b> site of surgery<\/li><li>Use tourniquets with caution and with respect for underlying structures<\/li><li>Remember the danger of end arteries and in situations where they occur avoid using adrenaline containing solutions and monopolar diathermy.<\/li><li>Handle tissues with care- devitalised tissue serves as a nidus for infection<\/li><li>Be very wary of the potential for coupling injuries when using diathermy during laparoscopic surgery<\/li><li>The inferior epigastric artery is a favorite target for laparoscopic ports and surgical drains!<\/li><\/ul><br><br><b>Anatomical principles<\/b><br>Understanding the anatomy of a surgical field will allow appreciation of local and systemic complications that may occur. For example, nerve injuries may occur following surgery in specific regions. The table below lists some of the more important nerves to consider and mechanisms of injury<br><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Nerve<\/b><\/th><th>\t<b>Mechanism<\/b><\/th><\/tr><\/thead><tbody><tr><td>Accessory<\/td><td>\tPosterior triangle lymph node biopsy<\/td><\/tr><tr><td>Sciatic<\/td><td>\tPosterior approach to hip<\/td><\/tr><tr><td>Common peroneal\t<\/td><td>Legs in Lloyd Davies position<\/td><\/tr><tr><td>Long thoracic<\/td><td>\tAxillary node clearance<\/td><\/tr><tr><td>Pelvic autonomic nerves\t<\/td><td>Pelvic cancer surgery<\/td><\/tr><tr><td>Recurrent laryngeal nerves<\/td><td>\tDuring thyroid surgery<\/td><\/tr><tr><td>Hypoglossal nerve<\/td><td>\tDuring carotid endarterectomy<\/td><\/tr><tr><td>Ulnar and median nerves\t<\/td><td>During upper limb fracture repairs<\/td><\/tr><\/tbody><\/table><\/div><br>These are just a few. The detailed functional sequelae are particularly important and will often be tested. In addition to nerve injuries certain procedures carry risks of visceral or structural injury.  Again some particular favorites are given below:<br><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid2\"><thead><tr><th><b>Structure<\/b>\t<\/th><th><b>Mechanism<\/b><\/th><\/tr><\/thead><tbody><tr><td>Thoracic duct\t\t<\/td><td>During thoracic surgery e.g. Pneumonectomy, oesphagectomy<\/td><\/tr><tr><td>Parathyroid glands\t\t<\/td><td>During difficult thyroid surgery<\/td><\/tr><tr><td>Ureters\t\t<\/td><td>During colonic resections/ gynaecological surgery<\/td><\/tr><tr><td>Bowel perforation\t\t<\/td><td>Use of Verres Needle to establish pneumoperitoneum<\/td><\/tr><tr><td>Bile duct injury\t\t<\/td><td>Failure to delineate Calots triangle carefully and careless use of diathermy<\/td><\/tr><tr><td>Facial nerve\t\t<\/td><td>Always at risk during Parotidectomy<\/td><\/tr><tr><td>Tail of pancreas\t<\/td><td>\tWhen ligating splenic hilum<\/td><\/tr><tr><td>Testicular vessels\t<\/td><td>\tDuring re-do open hernia surgery<\/td><\/tr><tr><td>Hepatic veins\t<\/td><td>\tDuring liver mobilisation<\/td><\/tr><\/tbody><\/table><\/div><br>Again many could be predicted from the anatomy of the procedure. <br><br><br><b>Physiological derangements<\/b><br>A very common complication is bleeding and this is covered under the section of haemorrhagic shock.  Another variant is infection either superficial or deep seated. The organisms are covered under microbiology and the features of sepsis covered under shock. Do not forget that immunocompromised and elderly patients may present will atypical physiological parameters. <br><br>Selected physiological and biochemical issues are given below:<br><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid3\"><thead><tr><th><b>Complication<\/b>\t<\/th><th><b>Physiological/ Biochemical Problem<\/b><\/th><\/tr><\/thead><tbody><tr><td>Arrhythmias following cardiac surgery\t<\/td><td>Susceptibility to hypokalaemia (K<sup>+<\/sup> &lt;4.0 in cardiac patients)<\/td><\/tr><tr><td>Neurosurgical electrolyte disturbance\t<\/td><td>SIADH following cranial surgery causing hyponatraemia<\/td><\/tr><tr><td>Ileus following gastrointestinal surgery\t<\/td><td>Fluid sequestration and loss of electrolytes<\/td><\/tr><tr><td>Pulmonary oedema following pneumonectomy\t<\/td><td>Loss of lung volume makes these patients very sensitive to fluid overload<\/td><\/tr><tr><td>Anastamotic leak\t<\/td><td>Generalised sepsis causing mediastinitis or peritonitis depending on site of leak<\/td><\/tr><tr><td>Myocardial infarct<\/td><td>May follow any type of surgery and in addition to direct cardiac effects the decreased cardiac output may well compromise grafts etc.<\/td><\/tr><\/tbody><\/table><\/div><br><br>Try making a short list of problems and causes specific to your own clinical area.<br><br><b>Diagnostic modalities<\/b><br>Depends largely on the suspected complication. In the acutely unwell surgical patient the following baseline investigations are often helpful:<br><ul><li>Full blood count, urea and electrolytes, C- reactive protein (trend rather than absolute value), serum calcium, liver function tests, clotting (don't forget to repeat if on-going bleeding)<\/li><li>Arterial blood gases<\/li><li>ECG (+cardiac enzymes if MI suspected)<\/li><li>Chest x-ray to identify collapse/ consolidation <\/li><li>Urine analysis for UTI<\/li><\/ul><br>These will often identify the most common complications. <br><br><b>Special tests<\/b><br><ul><li>CT scanning for identification of intra-abdominal abscesses<\/li><li>Doppler USS of leg veins- for identification of DVT<\/li><li>CTPA for PE<\/li><li>Sending peritoneal fluid for U+E (if ureteric injury suspected) or amylase (if pancreatic injury suspected)<\/li><li>Echocardiogram if pericardial effusion suspected post cardiac surgery and no pleural window made.<\/li><\/ul><br><b>Management of complications<\/b><br>The guiding principal should be safe and timely intervention. Patients should be stabilised and if an operation needs to occur in tandem with resuscitation then generally this should be of a damage limitation type procedure rather than definitive surgery (which can be more safely undertaken in a stable patient the following day). <br><br>Remember that recent surgery is a contra indication to thrombolysis and that in some patients IV heparin may be preferable to a low molecular weight heparin (easier to reverse).<br><br>As a general rule laparotomies for bleeding should follow the core principle of quadrant packing and then subsequent pack removal rather than plunging large clamps into pools of blood. The latter approach invariable worsens the situation is often accompanied by significant visceral injury particularly when done by the inexperienced. If packing controls a situation it is entirely acceptable practice to leave packs in situ and return the patient to ITU for pack removal the subsequent day."}]}</script>
  <script>
    const quizData = JSON.parse(document.getElementById("quiz-data").textContent);
    const app = document.getElementById("app");
    const modeButtons = Array.from(document.querySelectorAll("[data-mode-button]"));
    const topicActionButtons = Array.from(document.querySelectorAll("[data-topic-action]"));

    const state = {
      mode: "solve",
      answers: new Map(),
      questionRefs: [],
    };

    function buildTopic(topic, questionOffset) {
      const details = document.createElement("details");
      details.className = "topic";
      details.open = true;

      const summary = document.createElement("summary");
      summary.innerHTML = `
        <div>
          <h2 class="topic-title">${topic.name}</h2>
        </div>
        <div class="topic-meta">
          <span>${topic.questions.length} questions</span>
          <span class="chevron" aria-hidden="true">></span>
        </div>
      `;

      const body = document.createElement("div");
      body.className = "topic-body";

      if (topic.note_html) {
        const notes = document.createElement("details");
        notes.className = "topic-notes";

        const notesSummary = document.createElement("summary");
        notesSummary.innerHTML = `
          <span class="topic-notes-title">Notes</span>
          <span class="chevron" aria-hidden="true">></span>
        `;

        const notesBody = document.createElement("div");
        notesBody.className = "topic-notes-body rich-text";
        notesBody.innerHTML = topic.note_html;

        notes.appendChild(notesSummary);
        notes.appendChild(notesBody);
        body.appendChild(notes);
      }

      topic.questions.forEach((question, indexInTopic) => {
        const globalIndex = questionOffset + indexInTopic;
        body.appendChild(buildQuestionCard(question, globalIndex));
      });

      details.appendChild(summary);
      details.appendChild(body);
      return details;
    }

    function buildQuestionCard(question, questionIndex) {
      const card = document.createElement("article");
      card.className = "question-card is-hidden";
      card.dataset.questionIndex = String(questionIndex);

      const label = document.createElement("p");
      label.className = "question-label";
      label.textContent = `Question ${question.number}`;

      const stem = document.createElement("div");
      stem.className = "stem rich-text";
      stem.innerHTML = question.stem_html;

      const options = document.createElement("div");
      options.className = "options";

      const optionButtons = question.options.map((option, optionIndex) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "option";
        button.dataset.optionIndex = String(optionIndex);
        button.innerHTML = option.label_html;
        button.addEventListener("click", () => {
          if (state.mode !== "solve") {
            return;
          }
          state.answers.set(questionIndex, optionIndex);
          applyQuestionState(questionIndex);
        });
        options.appendChild(button);
        return button;
      });

      const explanation = document.createElement("div");
      explanation.className = "explanation rich-text";
      explanation.innerHTML = `<span class="explanation-label">Explanation</span>${question.explanation_html}`;

      card.appendChild(label);
      card.appendChild(stem);
      card.appendChild(options);
      card.appendChild(explanation);

      state.questionRefs[questionIndex] = {
        card,
        explanation,
        optionButtons,
        question,
      };

      applyQuestionState(questionIndex);
      return card;
    }

    function applyQuestionState(questionIndex) {
      const ref = state.questionRefs[questionIndex];
      if (!ref) {
        return;
      }

      const { card, optionButtons, question } = ref;
      const selectedIndex = state.answers.get(questionIndex);
      const hasSelection = selectedIndex !== undefined;
      const isReview = state.mode === "review";
      const showExplanation = isReview || hasSelection;

      card.classList.toggle("is-hidden", !showExplanation);

      optionButtons.forEach((button, optionIndex) => {
        button.classList.remove("correct", "incorrect", "neutral-revealed");

        if (isReview) {
          button.disabled = true;
          if (optionIndex === question.correct_index) {
            button.classList.add("correct");
          } else {
            button.classList.add("neutral-revealed");
          }
          return;
        }

        button.disabled = false;
        if (!hasSelection) {
          return;
        }

        if (optionIndex === question.correct_index) {
          button.classList.add("correct");
        } else if (optionIndex === selectedIndex) {
          button.classList.add("incorrect");
        } else {
          button.classList.add("neutral-revealed");
        }
      });
    }

    function renderApp() {
      if (!quizData.topics.length) {
        const empty = document.createElement("div");
        empty.className = "empty-state";
        empty.textContent = "No questions were found in this JSON file.";
        app.replaceChildren(empty);
        return;
      }

      const wrapper = document.createElement("div");
      wrapper.className = "topic-list";

      let questionOffset = 0;
      quizData.topics.forEach((topic) => {
        wrapper.appendChild(buildTopic(topic, questionOffset));
        questionOffset += topic.questions.length;
      });

      app.replaceChildren(wrapper);
    }

    function setMode(mode) {
      state.mode = mode;
      modeButtons.forEach((button) => {
        const isActive = button.dataset.modeButton === mode;
        button.classList.toggle("active", isActive);
        button.setAttribute("aria-pressed", String(isActive));
      });

      state.questionRefs.forEach((_, index) => applyQuestionState(index));
    }

    function setAllTopics(open) {
      document.querySelectorAll(".topic").forEach((topic) => {
        topic.open = open;
      });
    }

    modeButtons.forEach((button) => {
      button.addEventListener("click", () => setMode(button.dataset.modeButton));
    });

    topicActionButtons.forEach((button) => {
      button.addEventListener("click", () => {
        setAllTopics(button.dataset.topicAction === "expand");
      });
    });

    renderApp();
    setMode("solve");
  </script>
</body>
