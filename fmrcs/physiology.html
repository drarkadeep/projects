teronism, haemolysis<br>I - Intake - Excessive<br>N - Nephrons, renal failure<br>E - Excretion - Impaired<\/div>Familial periodic paralysis has subtypes associated with hyper and  hypokalaemia."}, {"number": 97, "topic": "Hyperkalaemia", "stem_html": "Which of the following drugs causes hyperkalaemia?", "options": [{"label_html": "Heparin", "is_correct": true}, {"label_html": "Ciprofloxacin", "is_correct": false}, {"label_html": "Salbutamol", "is_correct": false}, {"label_html": "Levothyroxine", "is_correct": false}, {"label_html": "Codeine phosphate", "is_correct": false}], "correct_index": 0, "explanation_html": "Both unfractionated and low-molecular weight heparin can cause hyperkalaemia. This is thought to be caused by inhibition of aldosterone secretion. Salbutamol is a recognised treatment for hyperkalaemia."}, {"number": 98, "topic": "Hyperkalaemia", "stem_html": "A 24 year old man is involved in a road traffic accident. His right leg is trapped for 6 hours whilst he is moved. On examination his foot is insensate and a dorsalis pedis pulse is only weakly felt. Which of the biochemical abnormalities listed below is most likely to be present?", "options": [{"label_html": "Alkalosis", "is_correct": false}, {"label_html": "Hypercalcaemia", "is_correct": false}, {"label_html": "Hypocalcaemia", "is_correct": false}, {"label_html": "Hyperkalaemia", "is_correct": true}, {"label_html": "Hyponatraemia", "is_correct": false}], "correct_index": 3, "explanation_html": "In this scenario the patient will have a compartment syndrome, delayed diagnosis and muscle death. The effect of muscle death will result in the release of potassium. It is also highly likely that there will be a degree of renal impairment, the result of which is that the serum potassium is likely to be high."}], "note_html": "- Plasma potassium levels are regulated by a number of factors including aldosterone, acid-base balance and insulin levels. <br><ul><li>Metabolic acidosis is associated with hyperkalaemia as hydrogen and potassium ions compete with each other for exchange with sodium ions across cell membranes and in the distal tubule. <\/li><li>ECG changes seen in hyperkalaemia include tall-tented T waves, small P waves, widened QRS leading to a sinusoidal pattern and asystole<\/li><\/ul><br><b>Causes of hyperkalaemia<\/b><br><ul><li>Acute renal failure<\/li><li>Drugs*: potassium sparing diuretics, ACE inhibitors, angiotensin 2 receptor blockers, spironolactone, ciclosporin, heparin**<\/li><li>Metabolic acidosis<\/li><li>Addison's<\/li><li>Tissue necrosis/rhabdomyolysis: burns, trauma<\/li><li>Massive blood transfusion<\/li><\/ul><br><b>Foods that are high in potassium<\/b><br><ul><li>Salt substitutes (i.e. Contain potassium rather than sodium)<\/li><li>Bananas, oranges, kiwi fruit, avocado, spinach, tomatoes<\/li><\/ul><br>*beta-blockers interfere with potassium transport into cells and can potentially cause hyperkalaemia in renal failure patients - remember beta-agonists, e.g. Salbutamol, are sometimes used as emergency treatment<br><br>**both unfractionated and low-molecular weight heparin can cause hyperkalaemia. This is thought to be caused by inhibition of aldosterone secretion"}, {"name": "Hyperuricaemia", "questions": [{"number": 99, "topic": "Hyperuricaemia", "stem_html": "Which is the least likely to cause hyperuricaemia?", "options": [{"label_html": "Severe psoriasis", "is_correct": false}, {"label_html": "Lesch-Nyhan syndrome", "is_correct": false}, {"label_html": "Amiodarone", "is_correct": true}, {"label_html": "Diabetic ketoacidosis", "is_correct": false}, {"label_html": "Alcohol", "is_correct": false}], "correct_index": 2, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Mnemonic of the drugs causing hyperuricaemia as a result of reduced excretion of urate<br><br>'Can't leap'<br><br><b>C<\/b> iclosporin<br><b>A<\/b> lcohol<br><b>N<\/b> icotinic acid<br><b>T<\/b> hiazides<br><br><b>L<\/b> oop diuretics<br><b>E<\/b> thambutol<br><b>A<\/b> spirin<br><b>P<\/b> yrazinamide<\/div>Decreased tubular secretion of urate occurs in patients with acidosis (eg, diabetic ketoacidosis, ethanol or salicylate intoxication, starvation ketosis). The organic acids that accumulate in these conditions compete with urate for tubular secretion."}], "note_html": "<ul><li>Increased levels of uric acid may be seen secondary to either increased cell turnover or reduced renal excretion of uric acid. Hyperuricaemia may be found in asymptomatic patients who have not experienced attacks of gout<\/li><\/ul><br><ul><li>Hyperuricaemia may be associated with hyperlipidaemia and hypertension. It may also be seen in conjunction with the metabolic syndrome<\/li><\/ul><br><b>Increased synthesis<\/b><br><ul><li>Lesch-Nyhan disease<\/li><li>Myeloproliferative disorders<\/li><li>Diet rich in purines<\/li><li>Exercise<\/li><li>Psoriasis<\/li><li>Cytotoxics<\/li><\/ul>   <br><b>Decreased excretion<\/b><br><ul><li>Drugs: low-dose aspirin, diuretics, pyrazinamide<\/li><li>Pre-eclampsia<\/li><li>Alcohol<\/li><li>Renal failure<\/li><li>Lead<\/li><\/ul>"}, {"name": "Hypokalaemia", "questions": [{"number": 100, "topic": "Hypokalaemia", "stem_html": "Which of the following statements are not typically true in hypokalaemia?", "options": [{"label_html": "It may occur as a result of mechanical bowel preparation", "is_correct": false}, {"label_html": "Chronic vomiting may increase renal potassium losses", "is_correct": false}, {"label_html": "It may be associated with aciduria", "is_correct": false}, {"label_html": "It may cause hyponatraemia", "is_correct": false}, {"label_html": "It often accompanies acidosis", "is_correct": true}], "correct_index": 4, "explanation_html": "Potassium depletion occurs either through the gastrointestinal tract or the kidney. Chronic vomiting in itself is less prone to induce potassium loss than diarrhoea as gastric secretions contain less potassium than those in the lower GI tract. If vomiting produces a metabolic alkalosis then renal potassium wasting may occur as potassium is excreted in preference to hydrogen ions. The converse may occur in potassium depletion resulting in acid urine.<br><br>Hypokalemia is very commonly associated with metabolic alkalosis. This is due to 2 factors: 1) the common causes of metabolic alkalosis (vomiting, diuretics) directly induce H+ and K loss (via aldosterone) and thus also cause hypokalemia and 2) hypokalemia is a very important cause of metabolic alkalosis by three mechanisms. The initial effect is by causing a transcellular shift in which K leaves and H+ enters the cells, thereby raising the extracellular pH. The second effect is by causing a transcellular shift in the cells of the proximal tubules resulting in an intracellular acidosis, which promotes ammonium production and excretion. Thirdly, in the presence of hypokalemia, hydrogen secretion in the proximal and distal tubules increases. This leads to further reabsorption of HCO3-. The net effect is an increase in the net acid excretion."}, {"number": 101, "topic": "Hypokalaemia", "stem_html": "What is the most likely electrolyte abnormality in a patient with diarrhoea and a soft mass felt on digital rectal examination?", "options": [{"label_html": "Hyperkalaemia", "is_correct": false}, {"label_html": "Hypokalaemia", "is_correct": true}, {"label_html": "Hyponatraemia", "is_correct": false}, {"label_html": "Hypernatraemia", "is_correct": false}, {"label_html": "Hypocalcaemia", "is_correct": false}], "correct_index": 1, "explanation_html": "Large villous adenomas of the rectum may have marked secretory activity and result in the development of hypokalaemia as rectal secretions are rich in potassium."}], "note_html": "Potassium and hydrogen can be thought of as competitors. Hyperkalaemia tends to be associated with acidosis because as potassium levels rise fewer hydrogen ions can enter the cells<br><br>Hypokalaemia with alkalosis<br><ul><li>Vomiting<\/li><li>Diuretics<\/li><li>Cushing's syndrome<\/li><li>Conn's syndrome (primary hyperaldosteronism)<\/li><\/ul><br>Hypokalaemia with acidosis<br><ul><li>Diarrhoea<\/li><li>Renal tubular acidosis<\/li><li>Acetazolamide<\/li><li>Partially treated diabetic ketoacidosis<\/li><\/ul>"}, {"name": "Hypomagnasaemia", "questions": [{"number": 102, "topic": "Hypomagnasaemia", "stem_html": "A 54-year-old woman is admitted to the Surgical Admissions Unit with abdominal pain. Blood tests taken on admission show the following:<br><br><div class=\"table-responsive\"><table class=\"tb\"><tbody><tr><td>Magnesium<\/td><td>0.40 mmol/l (normal value 0.7-1.0 mmol/l)<\/td><\/tr><\/tbody><\/table><\/div><br>Which one of the following factors is most likely to be responsible for this result?", "options": [{"label_html": "Excessive resuscitation with intravenous saline", "is_correct": false}, {"label_html": "Digoxin therapy", "is_correct": false}, {"label_html": "Diarrhoea", "is_correct": true}, {"label_html": "Hypothermia", "is_correct": false}, {"label_html": "Rhabdomyolysis", "is_correct": false}], "correct_index": 2, "explanation_html": "<p>No explanation provided.<\/p>"}], "note_html": "Cause of low magnesium<br><ul><li>Diuretics<\/li><li>Total parenteral nutrition<\/li><li>Diarrhoea<\/li><li>Alcohol<\/li><li>Hypokalaemia, hypocalcaemia<\/li><\/ul><br>Features<br><ul><li>Paraesthesia<\/li><li>Tetany<\/li><li>Seizures<\/li><li>Arrhythmias<\/li><li>Decreased PTH secretion → hypocalcaemia<\/li><li>ECG features similar to those of hypokalaemia<\/li><li>Exacerbates digoxin toxicity<\/li><\/ul>"}, {"name": "Hyponatraemia", "questions": [{"number": 103, "topic": "Hyponatraemia", "stem_html": "A 77 year old man presents to pre operative clinic for a total knee replacement. He is on furosemide for hypertension. He is known to have multiple myeloma. He is found to have the following test results:<br><div class=\"table-responsive\"><table class=\"tb\"><tbody><tr><td>Na<\/td><td>120<\/td><\/tr><tr><td>Serum osmolality<\/td><td>280 (normal)<\/td><\/tr><tr><td>Urine osmolality<\/td><td>normal<\/td><\/tr><tr><td>Urine Na<\/td><td>normal<\/td><\/tr><\/tbody><\/table><\/div>What is the most likely cause?", "options": [{"label_html": "Pseudohyponatraemia", "is_correct": true}, {"label_html": "Syndrome of inappropriate ADH secretion (SIADH)", "is_correct": false}, {"label_html": "Hypotonic hypovolaemic hyponatraemia", "is_correct": false}, {"label_html": "Psychogenic polydipsia", "is_correct": false}, {"label_html": "Hypertonic hypovolaemic hyponatraemia", "is_correct": false}], "correct_index": 0, "explanation_html": "Hyperlipidaemia and multiple myeloma are known to cause a pseudohyponatraemia, this is due to raised protein."}, {"number": 104, "topic": "Hyponatraemia", "stem_html": "Which of the following drugs is least likely to cause syndrome of inappropriate anti diuretic hormone release?", "options": [{"label_html": "Haloperidol", "is_correct": false}, {"label_html": "Carbamazepine", "is_correct": false}, {"label_html": "Amitriptylline", "is_correct": false}, {"label_html": "Cyclophosphamide", "is_correct": false}, {"label_html": "5 Flurouracil", "is_correct": true}], "correct_index": 4, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Drugs causing SIADH:  ABCD <br><br>A nalgesics: opioids, NSAIDs <br>B arbiturates <br>C yclophosphamide/ Chlorpromazine/ Carbamazepine <br>D iuretic (thiazides)<\/div>"}], "note_html": "This is commonly tested in the MRCS (despite most surgeons automatically seeking medical advice if this occurs!).  The most common cause in surgery is the over administration of 5% dextrose.<br><br>Hyponatraemia may be caused by water excess or sodium depletion. Causes of pseudohyponatraemia include hyperlipidaemia (increase in serum volume) or a taking blood from a drip arm. Urinary sodium and osmolarity levels aid making a diagnosis.  <br><br> <br><b>Classification<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Urinary sodium &gt; 20 mmol/l<\/b><\/td><td>Sodium depletion, renal loss <br><ul><li>Patient often hypovolaemic<\/li><li>Diuretics (thiazides)<\/li><li>Addison's<\/li><li>Diuretic stage of renal failure<\/li><li>SIADH (serum osmolality low, urine osmolality high, urine Na high)<\/li><li>Patient often euvolaemic<\/li><\/ul><\/td><td><b>Mnemonic: Syndrome of INAPPropriate Anti-Diuretic Hormone:<\/b><br>In creased <br>Na (sodium)<br>PP (urine)<\/td><\/tr><tr><td><b>Urinary sodium &lt; 20 mmol/l<\/b><\/td><td>Sodium depletion, extra-renal loss<br><ul><li>Diarrhoea, vomiting, sweating<\/li><li>Burns, adenoma of rectum (if villous lesion and large)<\/li><\/ul><\/td><\/tr><tr><td><b>Water excess (patient often hypervolaemic and oedematous)<\/b><\/td><td><ul><li>Secondary hyperaldosteronism: CCF, cirrhosis<\/li><li>Reduced GFR: renal failure<\/li><li>IV dextrose, psychogenic polydipsia<\/li><\/ul><\/td><\/tr><\/tbody><\/table><\/div><br><b>Management<\/b><br><br>Symptomatic Hyponatremia : <br><br>Acute hyponatraemia with Na &lt;120: immediate therapy. Central Pontine Myelinolisis, may occur from overly rapid correction of serum sodium. Aim to correct until the Na is &gt; 125 at a rate of 1 mEq/h.  Normal saline with frusemide is an alternative method.<br><br>The sodium requirement can be calculated as follows : <br><br>(125 - serum sodium) x 0.6 x body weight = required mEq of sodium"}, {"name": "Ileum", "questions": [{"number": 105, "topic": "Ileum", "stem_html": "A 28 year old man undergoes an ileocaecal resection to treat terminal ileal Crohns disease. Post operatively he attends the clinic and complains of diarrhoea. His CRP is within normal limits and small bowel enteroclysis shows no focal changes. Which of the following interventions is most likely to be beneficial?", "options": [{"label_html": "5 ASA drugs", "is_correct": false}, {"label_html": "Azathioprine", "is_correct": false}, {"label_html": "Pulsed methylprednisolone", "is_correct": false}, {"label_html": "Infliximab", "is_correct": false}, {"label_html": "Oral cholestyramine", "is_correct": true}], "correct_index": 4, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">The question is about high output diarrhoea following terminal ileal resection and the most likely cause is malabsorption of bile salts. The administration of cholestyramine (bile salt binding agent) will counter this and thats why its the correct answer. <\/div>Malabsorption of bile salts is a common cause of diarrhoea following ileal resection. A normal small bowel study and CRP effectively excludes active Crohns disease and therefore immunomodulator drugs are not appropriate."}], "note_html": "<b>Anatomical overview<\/b><br>The terminal ileum comprises 20% of the ileum and has a diameter that is smaller than that of the jejunum (typically 2cm at the ileocaecal valve). The ileum is attached to the abdominal wall by a mesentery that contains more fat than that of the jejunum. The blood supply of the ileum is derived from branches of the superior mesenteric artery, the vascular arcades of the ileum are more densely packed than those of the jejunum. The wall of the ileum contains Peyers patches which are aggregations of lymphoid tissue. <br><br><b>Function<\/b><br>The main function of the terminal ileum is absorption of vitamin B12 and bile salts. The neuroendocrine cells in the wall of the ileum may secrete hormones. In surgical patients, resection of the terminal ileum is a common procedure for conditions such as terminal ileal Crohns disease. Where a significant proportion of the ileum is removed, patients are at increased risk of bile salt malabsorption with the development of bile salt diarrhoea and increased risk of gallstones. The lack of vitamin B12 may pre-dispose to macrocytic anaemia."}, {"name": "Inotropes and cardiovascular receptors", "questions": [{"number": 106, "topic": "Inotropes and cardiovascular receptors", "stem_html": "A patient with tachycardia and hypotension is to receive vasopressors. Which of the following conditions are most likely to be treated with vasopressors?", "options": [{"label_html": "Hypovolaemic shock", "is_correct": false}, {"label_html": "Septic shock", "is_correct": true}, {"label_html": "Neurogenic shock", "is_correct": false}, {"label_html": "Cardiogenic shock", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 1, "explanation_html": "The term septic shock has a precise meaning and refers to refractory systemic arterial hypotension in spite of fluid resuscitation. Patients will therefore usually require vasopressors. Individuals suffering from neurogenic shock will usually receive intravenous fluids to achieve a mean arterial pressure of 90mmHg. If this target cannot be achieved then these patients will receive inotropes. Hypovolaemic shock requires fluids and the management of cardiogenic shock is multifactorial and includes inotropes, vasodilators and intra-aortic balloon pumps."}, {"number": 107, "topic": "Inotropes and cardiovascular receptors", "stem_html": "Which main group of receptors does dobutamine bind to?", "options": [{"label_html": "α-1", "is_correct": false}, {"label_html": "α-2", "is_correct": false}, {"label_html": "B-1", "is_correct": true}, {"label_html": "B-2", "is_correct": false}, {"label_html": "D-1", "is_correct": false}], "correct_index": 2, "explanation_html": "Dobutamine is a sympathomimetic with both alpha- and beta-agonist properties; it displays a considerable selectivity for beta1-cardiac receptors."}, {"number": 108, "topic": "Inotropes and cardiovascular receptors", "stem_html": "Which receptor does noradrenaline mainly bind to?", "options": [{"label_html": "α 1 receptors", "is_correct": true}, {"label_html": "α 2 receptors", "is_correct": false}, {"label_html": "β 1 receptors", "is_correct": false}, {"label_html": "β 2 receptors", "is_correct": false}, {"label_html": "G receptors", "is_correct": false}], "correct_index": 0, "explanation_html": "Noradrenaline is the precursor of adrenaline. It is a powerful α 1 stimulant (although it will increase myocardial contractility). Infusions will produce vasoconstriction and an increase in total peripheral resistance. It is the inotrope of choice in septic shock."}, {"number": 109, "topic": "Inotropes and cardiovascular receptors", "stem_html": "Which of the following drugs is not positively inotropic?", "options": [{"label_html": "Dopamine", "is_correct": false}, {"label_html": "Glucagon", "is_correct": false}, {"label_html": "Theophylline", "is_correct": false}, {"label_html": "Sodium thiopentone", "is_correct": true}, {"label_html": "Dobutamine", "is_correct": false}], "correct_index": 3, "explanation_html": "Inotropes are a class of drugs that increase the force or cardiac contractility. This may improve cardiac output. Increased blood pressure may have direct beneficial effects for the heart in that it improves myocardial perfusion pressure. Dopamine and dobutamine are both commonly used inotropes, they should be administered via a central line and in a monitored setting. Glucagon and theophylline are also positive inotropes (although not commonly used for this purpose). In contrast sodium thiopentone causes marked myocardial depression."}], "note_html": "Inotropes are a class of drugs which work primarily by increasing cardiac output. They should be distinguished from vasoconstrictor drugs which are used specifically when the primary problem is peripheral vasodilatation. <br><br>Catecholamine type agents are commonly used and work by increasing cAMP levels by adenylate cyclase stimulation. This in turn increases intracellular calcium ion mobilisation and thus the force of contraction. Adrenaline works as a beta adrenergic receptor agonist at lower doses and an alpha receptor agonist at higher doses. Dopamine causes dopamine receptor mediated renal and mesenteric vascular dilatation and beta 1 receptor agonism at higher doses. This results in increased cardiac output. Since both heart rate and blood pressure are raised, there is less overall myocardial ischaemia. Dobutamine is a predominantly beta 1 receptor agonist with weak beta 2 and alpha receptor agonist properties. Noradrenaline is a catecholamine type agent and predominantly acts as an alpha receptor agonist and serves as a peripheral vasoconstrictor.<br><br>Phosphodiesterase inhibitors such as milrinone act specifically on the cardiac phosphodiesterase and increase cardiac output. <br><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Inotrope<\/b><\/td><td><b>\tCardiovascular receptor action<\/b><\/td><\/tr><tr><td>Adrenaline<\/td><td>\tα-1, α-2, β-1, β-2<\/td><\/tr><tr><td>Noradrenaline\t<\/td><td>α-1,( α-2), (β-1), (β-2)<\/td><\/tr><tr><td>Dobutamine<\/td><td>\tβ-1, (β 2)<\/td><\/tr><tr><td>Dopamine\t<\/td><td>(α-1), (α-2), (β-1), D-1,D-2<\/td><\/tr><\/tbody><\/table><\/div><i>Minor receptor effects in brackets<\/i><br><br><b>Effects of receptor binding<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td>α-1, α-2<\/td><td>vasoconstriction<\/td><\/tr><tr><td>β-1<\/td><td>increased cardiac contractility and HR<\/td><\/tr><tr><td>β-2<\/td><td>vasodilatation<\/td><\/tr><tr><td>D-1<\/td><td>renal and spleen vasodilatation<\/td><\/tr><tr><td>D-2<\/td><td>inhibits release of noradrenaline<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Insulin", "questions": [{"number": 110, "topic": "Insulin", "stem_html": "Which of the following does not stimulate insulin release?", "options": [{"label_html": "Gastrin", "is_correct": false}, {"label_html": "Atenolol", "is_correct": true}, {"label_html": "Protein", "is_correct": false}, {"label_html": "Secretin", "is_correct": false}, {"label_html": "Vagal cholinergic action", "is_correct": false}], "correct_index": 1, "explanation_html": "Beta blockers inhibit the release of insulin.<br><br>Stimulation of insulin release:<br><br><ul><li>Glucose<\/li><li>Amino acid<\/li><li>Vagal cholinergic<\/li><li>Secretin/Gastrin/CCK<\/li><li>Fatty acids<\/li><li>Beta adrenergic drugs<\/li><\/ul>"}, {"number": 111, "topic": "Insulin", "stem_html": "Which of the following inhibits the secretion of insulin?", "options": [{"label_html": "Adrenaline", "is_correct": true}, {"label_html": "Lipids", "is_correct": false}, {"label_html": "Gastrin", "is_correct": false}, {"label_html": "Arginine", "is_correct": false}, {"label_html": "Vagal cholinergic activity", "is_correct": false}], "correct_index": 0, "explanation_html": "Inhibition of insulin release:<br><br><ul><li>Alpha adrenergic drugs<\/li><li>Beta blockers<\/li><li>Sympathetic nerves<\/li><\/ul>"}, {"number": 112, "topic": "Insulin", "stem_html": "What is the half life of insulin in the circulation of a normal healthy adult?", "options": [{"label_html": "Less than 30 minutes", "is_correct": true}, {"label_html": "Between 1 and 2 hours", "is_correct": false}, {"label_html": "Between 2 and 3 hours", "is_correct": false}, {"label_html": "Between 4 and 5 hours", "is_correct": false}, {"label_html": "Over 6 hours", "is_correct": false}], "correct_index": 0, "explanation_html": "Insulin is degraded by enzymes in the circulation. It typically has a half life of less than 30 minutes. Abnormalities of the clearance of insulin may occur in type 2 diabetes."}], "note_html": "Insulin is a peptide hormone, produced by beta cells of the pancreas, and is central to regulating carbohydrate and fat metabolism in the body. Insulin causes cells in the liver, skeletal muscles, and fat tissue to absorb glucose from the blood. In the liver and skeletal muscles, glucose is stored as glycogen, and in fat cells (adipocytes) it is stored as triglycerides.  <br><br><b>Structure<\/b><br>The human insulin protein is composed of 51 amino acids, and has a molecular weight of 5808 Da. It is a dimer of an A-chain and a B-chain, which are linked together by disulfide bonds.<br><br><b>Synthesis<\/b><br>Pro-insulin is formed by the rough endoplasmic reticulum in pancreatic beta cells.  Then pro-insulin is cleaved to form insulin and C-peptide. Insulin is stored in secretory granules and released in response to Ca<sup>2+<\/sup>.  <br><br><b>Function<\/b> <br><ul><li>Secreted in response to hyperglycaemia <\/li><li>Glucose utilisation and glycogen synthesis<\/li><li>Inhibits lipolysis<\/li><li>Reduces muscle protein loss<\/li><\/ul>"}, {"name": "Iron metabolism", "questions": [{"number": 113, "topic": "Iron metabolism", "stem_html": "Where is the majority of iron found in the body?", "options": [{"label_html": "Bone", "is_correct": false}, {"label_html": "Haemoglobin", "is_correct": true}, {"label_html": "Ferritin and haemosiderin", "is_correct": false}, {"label_html": "Myoglobin", "is_correct": false}, {"label_html": "Plasma iron", "is_correct": false}], "correct_index": 1, "explanation_html": "Approximately 70% of body iron is found bound to haemoglobin."}, {"number": 114, "topic": "Iron metabolism", "stem_html": "A 63 year old female is referred to the surgical clinic with an iron deficiency anaemia. Her past medical history includes a left hemi colectomy but no other co-morbidities. At what site is most dietary iron absorbed?", "options": [{"label_html": "Stomach", "is_correct": false}, {"label_html": "Duodenum", "is_correct": true}, {"label_html": "Proximal ileum", "is_correct": false}, {"label_html": "Distal ileum", "is_correct": false}, {"label_html": "Colon", "is_correct": false}], "correct_index": 1, "explanation_html": "Iron is best absorbed from the proximal small bowel (duodenum and jejunum) in the Fe <sup>2+<\/sup>  state. Iron is transported across the small bowel mucosa by a divalent membrane transporter protein (hence the improved absorption of Fe <sup>2+<\/sup>). The intestinal cells typically store the bound iron as ferritin. Cells requiring iron will typically then absorb the complex as needed."}], "note_html": "<div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Absorption<\/b><\/td><td><ul><li>Duodenum and upper jejunum<\/li><li>About 10% of dietary iron absorbed<\/li><li>Fe<sup>2+<\/sup> (ferrous iron) much better absorbed than Fe<sup>3+<\/sup> (ferric iron)<\/li><li>Ferrous iron is oxidized to form ferric iron, which is combined with apoferritin to form ferritin<\/li><li>Absorption is regulated according to body's need<\/li><li>Increased by vitamin C, gastric acid<\/li><li>Decreased by proton pump inhibitors, tetracycline, gastric achlorhydria, tannin (found in tea)<\/li><\/ul><\/td><\/tr><tr><td><b>Transport<\/b><\/td><td>In plasma as Fe<sup>3+<\/sup> bound to transferrin<\/td><\/tr><tr><td><b>Storage<\/b><\/td><td>Ferritin (or haemosiderin) in bone marrow<\/td><\/tr><tr><td><b>Excretion<\/b><\/td><td>Lost via intestinal tract following desquamation<\/td><\/tr><\/tbody><\/table><\/div><br><b>Distribution in body<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Total body iron<\/b><\/td><td>4g<\/td><\/tr><tr><td><b>Haemoglobin<\/b><\/td><td>70%<\/td><\/tr><tr><td><b>Ferritin and haemosiderin<\/b><\/td><td>25%<\/td><\/tr><tr><td><b>Myoglobin<\/b><\/td><td>4%<\/td><\/tr><tr><td><b>Plasma iron<\/b><\/td><td>0.1%<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Jugular venous pressure", "questions": [{"number": 115, "topic": "Jugular venous pressure", "stem_html": "Which part of the jugular venous waveform is associated with the closure of the tricuspid valve?", "options": [{"label_html": "a wave", "is_correct": false}, {"label_html": "c wave", "is_correct": true}, {"label_html": "x descent", "is_correct": false}, {"label_html": "y descent", "is_correct": false}, {"label_html": "v wave", "is_correct": false}], "correct_index": 1, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">JVP: <b>C<\/b> wave - <b>c<\/b>losure of the tricuspid valve<\/div>The c wave of the jugular venous waveform is associated with the closure of the tricuspid valve."}, {"number": 116, "topic": "Jugular venous pressure", "stem_html": "A 65 year old man is admitted  for a below knee amputation.  He is taking digoxin.  Clinically the patient has an irregularly irregular pulse.  What would you expect to see when you examine the jugular venous pressure?", "options": [{"label_html": "Absent y waves", "is_correct": false}, {"label_html": "Slow y descent", "is_correct": false}, {"label_html": "Cannon waves", "is_correct": false}, {"label_html": "Steep y descent", "is_correct": false}, {"label_html": "Absent a waves", "is_correct": true}], "correct_index": 4, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Jugular venous pressure<br><br>Absent a waves = Atrial fibrillation<br>Large a waves = Any cause of right ventricular hypertrophy, tricuspid stenosis<br>Cannon waves (extra large a waves) = Complete heart block<br>Prominent v waves = Tricuspid regurgitation<br>Slow y descent = Tricuspid stenosis, right atrial myxoma<br>Steep y descent = Right ventricular failure, constrictive pericarditis, tricuspid regurgitation<\/div>This patient has atrial fibrillation and is most likely to have absent a waves."}], "note_html": "As well as providing information on right atrial pressure, the jugular vein waveform may provide clues to underlying valvular disease. A non-pulsatile JVP is seen in superior vena caval obstruction. Kussmaul's sign describes a paradoxical rise in JVP during inspiration seen in constrictive pericarditis<br><br>'a' wave = atrial contraction<br><ul><li>large if atrial pressure e.g. tricuspid stenosis, pulmonary stenosis, pulmonary hypertension<\/li><li>absent if in atrial fibrillation<\/li><\/ul><br>Cannon 'a' waves<br><ul><li>caused by atrial contractions against a closed tricuspid valve<\/li><li>are seen in complete heart block, ventricular tachycardia/ectopics, nodal rhythm, single chamber ventricular pacing<\/li><\/ul><br>'c' wave<br><ul><li>closure of tricuspid valve<\/li><li>not normally visible<\/li><\/ul><br>'v' wave<br><ul><li>due to passive filling of blood into the atrium against a closed tricuspid valve<\/li><li>giant v waves in tricuspid regurgitation<\/li><\/ul><br>'x' descent = fall in atrial pressure during ventricular systole<br><br>'y' descent = opening of tricuspid valve<br><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb145b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb145.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"https://en.wikipedia.org/wiki/Main_Page\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb145b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}, {"name": "Liver proteins", "questions": [{"number": 117, "topic": "Liver proteins", "stem_html": "Which of the proteins listed below is not synthesized within the liver?", "options": [{"label_html": "Albumin", "is_correct": false}, {"label_html": "C Reactive protein", "is_correct": false}, {"label_html": "Factor II", "is_correct": false}, {"label_html": "von Willebrand factor", "is_correct": true}, {"label_html": "Transferrin", "is_correct": false}], "correct_index": 3, "explanation_html": "von Willebrand factor is synthesised in vascular endothelial cells."}], "note_html": "The liver is the principal source of plasma proteins including albumin, globins and multiple transport proteins including transferrin, haptoglobin, ferritin and ceuruloplasmin. Eleven proteins involved in haemostasis originate in the liver including fibrinogen (factor I), the vitamin K dependent factors (II, VII, IX and X), and procoagulation factors except for von Willebrand factor (which is synthesised in the endothelium). The short half life of factor VII is useful in determining liver failure."}, {"name": "Lung volumes", "questions": [{"number": 118, "topic": "Lung volumes", "stem_html": "A 25 year old man is undergoing respiratory spirometry. He takes a maximal inspiration and maximally exhales. Which of the following measurements will best illustrate this process?", "options": [{"label_html": "Functional residual capacity", "is_correct": false}, {"label_html": "Vital capacity", "is_correct": true}, {"label_html": "Inspiratory capacity", "is_correct": false}, {"label_html": "Maximum voluntary ventilation", "is_correct": false}, {"label_html": "Tidal volume", "is_correct": false}], "correct_index": 1, "explanation_html": "The maximum voluntary ventilation is the maximal ventilation over the course of 1 minute."}, {"number": 119, "topic": "Lung volumes", "stem_html": "Which of the following does not decrease the functional residual capacity?", "options": [{"label_html": "Obesity", "is_correct": false}, {"label_html": "Pulmonary fibrosis", "is_correct": false}, {"label_html": "Muscle relaxants", "is_correct": false}, {"label_html": "Laparoscopic surgery", "is_correct": false}, {"label_html": "Upright position", "is_correct": true}], "correct_index": 4, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Increased FRC:<br><ul><li>Erect position<\/li><li>Emphysema<\/li><li>Asthma<\/li><\/ul><br>Decreased FRC:<br><ul><li>Pulmonary fibrosis<\/li><li>Laparoscopic surgery<\/li><li>Obesity<\/li><li>Abdominal swelling<\/li><li>Muscle relaxants<\/li><\/ul><\/div>When the patient is upright the diaphragm and abdominal organs put less pressure on the lung bases, allowing for an increase in the functional residual capacity (FRC).  Other causes of increased FRC include:<br><ul><li>Emphysema<\/li><li>Asthma<\/li><\/ul><br>In addition to those listed above, causes of reduced FRC include:<br><ul><li>Abdominal swelling<\/li><li>Pulmonary oedema<\/li><li>Reduced muscle tone of the diaphragm<\/li><li>Age<\/li><\/ul>"}, {"number": 120, "topic": "Lung volumes", "stem_html": "Adult lung volumes. Which statement is false?", "options": [{"label_html": "In restrictive lung disease the FEV1/FVC ratio is normal", "is_correct": false}, {"label_html": "Residual volume is increased in emphysema", "is_correct": false}, {"label_html": "Functional residual capacity is measured by helium dilution test", "is_correct": false}, {"label_html": "The tidal volume is approximately 340mls in females", "is_correct": false}, {"label_html": "The vital capacity is increased in Guillain Barre syndrome", "is_correct": true}], "correct_index": 4, "explanation_html": "FEV1/FVC is normal or &gt;80% in restrictive lung disease such as pulmonary fibrosis.  The ratio is reduced in obstructive airways disease.<br><br>The functional residual capacity, residual volume and the total lung capacity cannot be measured with spirometry.  They can only be  measured by helium dilution.<br>The vital capacity is reduced in:<br>1.\tPulmonary fibrosis/infiltration/oedema/effusions<br>2.\tWeak respiratory muscles e.g. MG, GBS, myopathies<br>3.\tSkeletal abnormalities e.g. chest wall abnormalities"}], "note_html": "<b>The diagram demonstrates lung volumes and capacities<\/b><br><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb048b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb048.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Lung volumes\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb048b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center><br><b>Definitions<\/b><br><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Tidal volume (TV)<\/b><\/td><td><ul><li>Is the volume of air inspired and expired during each ventilatory cycle at rest.<\/li><li>It is normally 500mls in males and 340mls in females.<\/li><\/ul><\/td><\/tr><tr><td><b>Inspiratory reserve volume (IRV)<\/b><\/td><td><ul><li>Is the maximum volume of air that can be forcibly inhaled following a normal inspiration. 3000mls.<\/li><\/ul><\/td><\/tr><tr><td><b>Expiratory reserve volume (ERV)<\/b><\/td><td><ul><li>Is the maximum volume of air that can be forcibly exhaled following a normal expiration.  1000mls.<\/li><\/ul><\/td><\/tr><tr><td><b>Residual volume (RV)<\/b><\/td><td><ul><li>Is that volume of air remaining in the lungs after a maximal expiration.<\/li><li>RV = FRC - ERV. 1500mls.<\/li><\/ul><\/td><\/tr><tr><td><b>Functional residual capacity (FRC)<\/b><\/td><td><ul><li>Is the volume of air remaining in the lungs at the end of a normal expiration.<\/li><li>FRC = RV + ERV. 2500mls.<\/li><\/ul><\/td><\/tr><tr><td><b>Vital capacity (VC)<\/b><\/td><td><ul><li>Is the maximal volume of air that can be forcibly exhaled after a maximal inspiration.<\/li><li>VC = TV + IRV + ERV.  4500mls in males, 3500mls in females.<\/li><\/ul><\/td><\/tr><tr><td><b>Total lung capacity (TLC)<\/b><\/td><td><ul><li>Is the volume of air in the lungs at the end of a maximal inspiration.<\/li><li>TLC = FRC + TV + IRV = VC + RV. 5500-6000mls.<\/li><\/ul><\/td><\/tr><tr><td><b>Forced vital capacity (FVC)<\/b><\/td><td><ul><li>The volume of air that can be maximally forcefully exhaled.<\/li><\/ul><\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Management of hypercalcaemia", "questions": [{"number": 121, "topic": "Management of hypercalcaemia", "stem_html": "A 56 year old male presents to the acute surgical take with severe abdominal pain.  He is normally fit and well.  He has no malignancy.  The biochemistry laboratory contacts the ward urgently, his corrected calcium result is 3.6 mmol/l.  What is the medication of choice to treat this abnormality?", "options": [{"label_html": "IV Pamidronate", "is_correct": true}, {"label_html": "Oral Alendronate", "is_correct": false}, {"label_html": "Dexamethasone", "is_correct": false}, {"label_html": "Vitamin D", "is_correct": false}, {"label_html": "Resonium salts", "is_correct": false}], "correct_index": 0, "explanation_html": "IV Pamidronate is the drug of choice as it most effective and has long lasting effects.  Calcitonin would need to be given with another agent, to ensure that the hypercalcaemia is treated once its short term effects wear off.  IV zoledronate is preferred in scenarios associated with malignancy."}, {"number": 122, "topic": "Management of hypercalcaemia", "stem_html": "A 38 year old lady presents with abdominal pain. On investigation, her serum calcium is found to be 3.5mmol/L. What is the most appropriate initial management?", "options": [{"label_html": "Intravenous bisphosphonates", "is_correct": false}, {"label_html": "Oral bisphosphonates", "is_correct": false}, {"label_html": "Intravenous calcitonin", "is_correct": false}, {"label_html": "Intravenous 0.9% sodium chloride", "is_correct": true}, {"label_html": "Intravenous frusemide", "is_correct": false}], "correct_index": 3, "explanation_html": "The immediate treatment of hypercalcaemia involves intravenous fluid resuscitation. This may be complemented with the use of bisphosphonates and sometimes diuretics. However, fluids are administered first and because this question asks what the most appropriate initial treatment is, intravenous fluids are the most appropriate answer. Normal saline is usually preferred for this over dextrose containing solutions."}], "note_html": "<ul><li>Free Ca is affected by pH (increased in acidosis) and plasma albumin concentration<\/li><li>ECG changes include: Shortening of QTc interval<\/li><li>Urgent management is indicated if:<\/li><\/ul><br><div class=\"table-responsive\"><table class=\"tb\"><tbody><tr><td>Calcium &gt; 3.5 mmol/l<\/td><\/tr><tr><td>Reduced consciousness<\/td><\/tr><tr><td>Severe abdominal pain<\/td><\/tr><tr><td>Pre renal failure<\/td><\/tr><\/tbody><\/table><\/div><br><b>Management:<\/b><br><ul><li>Airway Breathing Circulation<\/li><li>Intravenous fluid resuscitation with 3-6L of 0.9% Normal saline in 24 hours<\/li><li>Concurrent administration of calcitonin will also help lower calcium levels<\/li><li>Medical therapy (usually if Corrected calcium &gt;3.0mmol/l)<\/li><\/ul><br><b>Bisphosphonates<\/b><br><ul><li>Analogues of pryrophosphate<\/li><li>Prevent osteoclast attachment to bone matrix and interfere with osteoclast activity     <\/li><li>Inhibit bone resorption.<\/li><\/ul><br>Agents <br><br><div class=\"table-responsive\"><table class=\"tb\"><tbody><tr><td>Drug<\/td><td>Side effects<\/td><td>Notes<\/td><td><\/td><\/tr><tr><td>IV Pamidronate<\/td><td>pyrexia, leucopaenia<\/td><td>Most potent agent<\/td><td><\/td><\/tr><tr><td>IV Zoledronate<\/td><td>response lasts 30 days<\/td><td>Used for malignancy associated hypercalcaemia<\/td><td><\/td><\/tr><\/tbody><\/table><\/div><br><b>Calcitonin<\/b><br><ul><li>Quickest onset of action however short duration (tachyphylaxis) therefore only given with a second agent.<\/li><\/ul><br><b>Prednisolone<\/b><br><ul><li>May be given in hypercalcaemia related to sarcoidosis, myeloma or vitamin D intoxication.<\/li><\/ul>"}, {"name": "Morphine", "questions": [{"number": 123, "topic": "Morphine", "stem_html": "A 22 year old lady receives intravenous morphine for acute abdominal pain. Which of the following best accounts for its analgesic properties?", "options": [{"label_html": "Binding to δ opioid receptors in the brainstem", "is_correct": false}, {"label_html": "Binding to δ opioid receptors at peripheral nerve sites", "is_correct": false}, {"label_html": "Binding to β opioid receptors within the CNS", "is_correct": false}, {"label_html": "Binding to α opioid receptors within the CNS", "is_correct": false}, {"label_html": "Binding to µ opioid receptors within the CNS", "is_correct": true}], "correct_index": 4, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">4 Types of opioid receptor:<br><ul><li>δ (located in CNS)- Accounts for analgesic and antidepressant effects<\/li><li>k (mainly CNS)- analgesic and dissociative effects<\/li><li>Âµ (central and peripheral) - causes analgesia, miosis, decreased gut motility<\/li><li>Nociceptin receptor (CNS)- Affect of appetite and tolerance to Âµ agonists.<\/li><\/ul><\/div>"}, {"number": 124, "topic": "Morphine", "stem_html": "A 34 year old man receives morphine following an appendicectomy. He develops constipation as a result. Which of the following best accounts for this process?", "options": [{"label_html": "Stimulation of DOPA receptors", "is_correct": false}, {"label_html": "Inhibition of DOPA receptors", "is_correct": false}, {"label_html": "Stimulation of Mu receptors", "is_correct": true}, {"label_html": "Stimulation of serotonin release", "is_correct": false}, {"label_html": "Inhibition of serotonin release", "is_correct": false}], "correct_index": 2, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">4 Types of opioid receptor:<br><ul><li>δ (located in CNS)- Accounts for analgesic and antidepressant effects<\/li><li>k (mainly CNS)- analgesic and dissociative effects<\/li><li>Âµ (central and peripheral) - causes analgesia, miosis, decreased gut motility<\/li><li>Nociceptin receptor (CNS)- Affect of appetite and tolerance to Âµ agonists.<\/li><\/ul><\/div>Constipation is a common side effect of morphine treatment and stimulation of Mu receptors accounts for this process."}], "note_html": "Strong opiate analgesic. It is a pro- type narcotic drug and its effects mediated via the 4 types of opioid receptor. Its clinical effects stem from binding to these receptor sites within the CNS and gastrointestinal tract. Unwanted side effects include nausea, constipation, respiratory depression and, if used long term, addiction . <br>It may be administered orally or intravenously. It can be reversed with naloxone."}, {"name": "Nutrition - Refeeding syndrome", "questions": [{"number": 125, "topic": "Nutrition - Refeeding syndrome", "stem_html": "A homeless 42 year old male had an emergency inguinal hernia repair 24 hours previously.  He has a BMI of 15.  He has been put on a nasogastric feeding regime of 35 kcal/kg/day with no additional medications.  The nursing staff contact you as he has become confused and unsteady.  On examination the patient is disorientated to place, has diplopia and nystagmus.  What is the most likely diagnosis?", "options": [{"label_html": "Cerebellar stroke", "is_correct": false}, {"label_html": "Acute dystonic reaction", "is_correct": false}, {"label_html": "Cerebrovascular accident", "is_correct": false}, {"label_html": "Parkinsonism", "is_correct": false}, {"label_html": "Wernickes encephalopathy", "is_correct": true}], "correct_index": 4, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Triad of Wernicke encephalopathy:<br><ul><li>Acute confusion<\/li><li>Ataxia<\/li><li>Ophthalmoplegia<\/li><\/ul><\/div>This patient has received a carbohydrate rich diet without any thiamine or vitamin B co strong replacement.  This has led to Wernickes encephalopathy, which classically presents with confusion, ataxia and ophthalmoplegia.  Characteristically it is associated with chronic alcoholism, however it is also known to occur post bariatric surgery."}, {"number": 126, "topic": "Nutrition - Refeeding syndrome", "stem_html": "Which of the following features does not put a patient at risk of refeeding syndrome?", "options": [{"label_html": "BMI &lt; 16 kg/m<sup>2<\/sup>", "is_correct": false}, {"label_html": "Alcohol abuse", "is_correct": false}, {"label_html": "Thyrotoxicosis", "is_correct": true}, {"label_html": "Chemotherapy", "is_correct": false}, {"label_html": "Diuretics", "is_correct": false}], "correct_index": 2, "explanation_html": "Diuretics increase the risk of re-feeding syndrome through a process of increasing the risk of depletion of key electrolytes."}, {"number": 127, "topic": "Nutrition - Refeeding syndrome", "stem_html": "A homeless 42 year old male had an emergency inguinal hernia repair 24 hours previously.  He has a BMI of 15. His electrolytes are normal.  What is the best initial feeding regime?", "options": [{"label_html": "Give 10 kcal/kg/day initially, oral thiamine 200-300mg/day, vitamin B co strong1 tds and supplements.", "is_correct": true}, {"label_html": "Give 35 kcal/kg/day initially, oral thiamine 200-300mg/day, vitamin B co strong 1 tds and supplements.", "is_correct": false}, {"label_html": "No change to diet needed", "is_correct": false}, {"label_html": "Oral thiamine 200-300mg/day, vitamin B co strong1 tds and supplements.", "is_correct": false}, {"label_html": "Give 35 kcal/kg/day initially", "is_correct": false}], "correct_index": 0, "explanation_html": "This patient is at high risk of refeeding syndrome."}, {"number": 128, "topic": "Nutrition - Refeeding syndrome", "stem_html": "A man is admitted after a period of prolonged self, induced starvation. Naso gastric feeding is planned. Which of the following is least likely to occur?", "options": [{"label_html": "Hypokalaemia", "is_correct": false}, {"label_html": "Increased risk of cardiac arrhythmias", "is_correct": false}, {"label_html": "His haemoglobin will have decreased affinity for oxygen", "is_correct": true}, {"label_html": "Hypophosphataemia", "is_correct": false}, {"label_html": "Hypoalbuminaemia", "is_correct": false}], "correct_index": 2, "explanation_html": "The process of starvation may lower DPG levels, in practice this is unlikely to occur early as it is generated during glycolysis. Altered metabolism in starvation may be more acidotic and this would also tend to impair oxygen carriage."}], "note_html": "Refeeding syndrome describes the metabolic abnormalities which occur on feeding a person following a period of starvation. The metabolic consequences include:<br><ul><li>Hypophosphataemia<\/li><li>Hypokalaemia<\/li><li>Hypomagnesaemia<\/li><li>Abnormal fluid balance<\/li><\/ul>These abnormalities can lead to organ failure.<br><br><b>Re-feeding problems<\/b><br>If patient not eaten for &gt; 5 days, aim to re-feed at &lt; 50% energy and protein levels<br><br><b>High risk for re-feeding problems<\/b><br>If one or more of the following:<br><ul><li>BMI &lt; 16 kg/m<sup>2<\/sup><\/li><li>Unintentional weight loss &gt;15% over 3-6 months<\/li><li>Little nutritional intake &gt; 10 days<\/li><li>Hypokalaemia, Hypophosphataemia or hypomagnesaemia prior to feeding (unless high)<\/li><\/ul><br>If two or more of the following:<br><ul><li>BMI &lt; 18.5 kg/m<sup>2<\/sup><\/li><li>Unintentional weight loss &gt; 10% over 3-6 months<\/li><li>Little nutritional intake &gt; 5 days<\/li><li>History of: alcohol abuse, drug therapy including insulin, chemotherapy, diuretics and  antacids<\/li><\/ul><br><br><b>Prescription<\/b><br><ul><li>Start at up to 10 kcal/kg/day increasing to full needs over 4-7 days<\/li><li>Start immediately before and during feeding:  oral thiamine 200-300mg/day, vitamin B co strong 1 tds and supplements<\/li><li>Give K<sup>+<\/sup> (2-4 mmol/kg/day), phosphate (0.3-0.6 mmol/kg/day), magnesium (0.2-0.4 mmol/kg/day)<\/li><\/ul>"}, {"name": "Obesity: physiology", "questions": [{"number": 129, "topic": "Obesity: physiology", "stem_html": "A 25-year-old man who has been morbidly obese for the past five years is reviewed in the surgical bariatric clinic. In this patient, release of which of the following hormones would increase appetite?", "options": [{"label_html": "Leptin", "is_correct": false}, {"label_html": "Thyroxine", "is_correct": false}, {"label_html": "Adiponectin", "is_correct": false}, {"label_html": "Ghrelin", "is_correct": true}, {"label_html": "Serotonin", "is_correct": false}], "correct_index": 3, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Obesity hormones<br><ul><li>leptin decreases appetite<\/li><li>ghrelin increases appetite<\/li><\/ul><\/div>Whilst thyroxine can increase appetite it does not fit with the clinical picture being described."}], "note_html": "<b>Leptin<\/b><br>Leptin is thought to play a key role in the regulation of body weight. It is produced by adipose tissue and acts on satiety centres in the hypothalamus and decreases appetite. More adipose tissue (e.g. in obesity) results in high leptin levels.<br><br>Leptin stimulates the release of melanocyte-stimulating hormone (MSH) and corticotrophin-releasing hormone (CRH). Low levels of leptin stimulates the release of neuropeptide Y (NPY)<br><br><b>Ghrelin<\/b><br>Where as leptin induces satiety, ghrelin stimulates hunger. It is produced mainly by the fundus of the stomach and the pancreas. Ghrelin levels increase before meals and decrease after meals"}, {"name": "Opioids", "questions": [{"number": 130, "topic": "Opioids", "stem_html": "Which opioid receptor does morphine attach to?", "options": [{"label_html": "mu", "is_correct": true}, {"label_html": "alpha", "is_correct": false}, {"label_html": "sigma", "is_correct": false}, {"label_html": "beta", "is_correct": false}, {"label_html": "kappa", "is_correct": false}], "correct_index": 0, "explanation_html": "Pethidine and other conventional opioids attach to this receptor."}], "note_html": "-  Combine to specific opiate receptors in the CNS (periaqueductal grey matter, limbic system, substantia gelatinosa)<br><br>- Morphine attaches to mu1 receptors"}, {"name": "Oxygen Transport", "questions": [{"number": 131, "topic": "Oxygen Transport", "stem_html": "The oxygen-haemoglobin dissociation curve is shifted to the left  in:", "options": [{"label_html": "With decreased  2,3-DPG in transfused red cells", "is_correct": true}, {"label_html": "Respiratory acidosis", "is_correct": false}, {"label_html": "Sudden move to high altitude", "is_correct": false}, {"label_html": "Pyrexia", "is_correct": false}, {"label_html": "Haemolytic anaemia", "is_correct": false}], "correct_index": 0, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">S shaped curve<\/div>The curve is shifted to the left when there is a decreased oxygen requirement by the tissue.  This includes:<br>1.\tHypothermia<br>2.\tAlkalosis<br>3.\tReduced levels of  DPG:<br><ul><li>\tDPG is found in erythrocytes and is reduced in non exercising muscles, i.e. when there is reduced glycolysis. <\/li><\/ul>4.\t Polycythaemia"}, {"number": 132, "topic": "Oxygen Transport", "stem_html": "The oxygen-haemoglobin dissociation curve is shifted to the right in which of the following scenarios?", "options": [{"label_html": "Hypothermia", "is_correct": false}, {"label_html": "Respiratory alkalosis", "is_correct": false}, {"label_html": "Low altitude", "is_correct": false}, {"label_html": "Decreased 2,3-DPG in transfused red cells", "is_correct": false}, {"label_html": "Chronic iron deficiency anaemia", "is_correct": true}], "correct_index": 4, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Mnemonic to remember causes of right shift of the oxygen dissociation curve:<br><br>CADET face RIGHT<br><br>C O2<br>A cidosis<br>2,3-DPG<br>E xercise<br>T emperature<\/div>The curve is shifted to the right when there is an increased oxygen requirement by the tissue.  This includes:<br><ul><li>Increased temperature<\/li><li>Acidosis<\/li><li>Increased DPG:<\/li><\/ul>DPG is found in erythrocytes and is increased during glycolysis. It binds to the Hb molecule, thereby releasing oxygen to tissues.  DPG is increased in conditions associated with poor oxygen delivery to tissues, such as anaemia and high altitude."}, {"number": 133, "topic": "Oxygen Transport", "stem_html": "A 44 year old man receives a large volume transfusion of whole blood. The whole blood is two weeks old. Which of the following best describes its handling of oxygen?", "options": [{"label_html": "It will have a low affinity for oxygen", "is_correct": false}, {"label_html": "Its affinity for oxygen is unchanged", "is_correct": false}, {"label_html": "It will more readily release oxygen in metabolically active tissues than fresh blood", "is_correct": false}, {"label_html": "The release of oxygen in metabolically active tissues will be the same as fresh blood", "is_correct": false}, {"label_html": "It will have an increased affinity for oxygen", "is_correct": true}], "correct_index": 4, "explanation_html": "Stored blood has less 2,3 DPG and therefore has a higher affinity for oxygen, this reduces its ability to release it at metabolising tissues."}], "note_html": "<b>Oxygen transport<\/b><br>Almost all oxygen is transported within erythrocytes. It has limited solubility and only 1% is carried as solution. Therefore the amount of oxygen transported will depend upon haemoglobin concentration and its degree of saturation.<br><br><b>Haemoglobin<\/b><br>Globular protein composed of 4 subunits. Haem consists of a protoporphyrin ring surrounding an iron atom in its ferrous state. The iron can form two additional bonds; one with oxygen and the other with a polypeptide chain. There are two alpha and two beta subunits to this polypeptide chain in an adult and together these form globin. Globin cannot bind oxygen but is able to bind to carbon dioxide and hydrogen ions, the beta chains are able to bind to 2,3 diphosphoglycerate. The oxygenation of haemoglobin is a reversible reaction. The molecular shape of haemoglobin is such that binding of one oxygen molecule facilitates the binding of subsequent molecules. <br><br><br><b>Oxygen dissociation curve<\/b><br><ul><li>The oxygen dissociation curve describes the relationship between the percentage of saturated haemoglobin and partial pressure of oxygen in the blood. It is not affected by haemoglobin concentration.<\/li><li>Chronic anaemia causes 2, 3 DPG levels to increase, hence shifting the curve to the right<\/li><\/ul><br><b>Haldane effect<\/b><br><ul><li>Shifts to left = for given oxygen tension there is increased saturation of Hb with oxygen i.e. Decreased oxygen delivery to tissues<\/li><\/ul><br><b>Bohr effect<\/b><br><ul><li>Shifts to right = for given oxygen tension there is reduced saturation of Hb with oxygen i.e. Enhanced oxygen delivery to tissues<\/li><\/ul><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb038b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb038.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Oxygen%E2%80%93haemoglobin dissociation curve\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb038b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Shifts to Left = Lower oxygen delivery<\/b><br><ul><li>HbF, methaemoglobin, carboxyhaemoglobin<\/li><li>low [H+] (alkali)<\/li><li>low pCO<sub>2<\/sub><\/li><li>low 2,3-DPG<\/li><li>low temperature<\/li><\/ul><\/td><td><b>Shifts to Right = Raised oxygen delivery<\/b><br><ul><li>raised [H+] (acidic)<\/li><li>raised pCO<sub>2<\/sub><\/li><li>raised 2,3-DPG*<\/li><li>raised temperature<\/li><\/ul><\/td><\/tr><\/tbody><\/table><\/div><br>*2,3-diphosphoglycerate"}, {"name": "Pain - neuronal transmission", "questions": [{"number": 134, "topic": "Pain - neuronal transmission", "stem_html": "A 23 year old man is undergoing an inguinal hernia repair under local anaesthesia. The surgeon encounters a bleeding site which he manages with diathermy. About a minute or so later the patient complains that he is able to feel the burning pain of the heat at the operative site. Which of the following nerve fibres is responsible for the transmission of this signal?", "options": [{"label_html": "A α fibres", "is_correct": false}, {"label_html": "A β fibres", "is_correct": false}, {"label_html": "B fibres", "is_correct": false}, {"label_html": "C fibres", "is_correct": true}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 3, "explanation_html": "Slow transmission of mechanothermal stimuli is transmitted via C fibres. <br>A γ fibres transmit information relating to motor proprioception, A β fibres transmit touch and pressure and B fibres are autonomic fibres."}], "note_html": "<b>Somatic pain<\/b><br><ul><li>Peripheral nociceptors are innervated by either small myelinated fibres (A-delta) fibres or by unmyelinated C fibres.<\/li><li>The A gamma fibres register high intensity mechanical stimuli. The C fibres usually register high intensity mechanothermal stimuli. <\/li><\/ul>"}, {"name": "Pancreas endocrine physiology", "questions": [{"number": 135, "topic": "Pancreas endocrine physiology", "stem_html": "Which of these substances is not released from the islets of Langerhans?", "options": [{"label_html": "Pancreatic polypeptide", "is_correct": false}, {"label_html": "Glucagon", "is_correct": false}, {"label_html": "Secretin", "is_correct": true}, {"label_html": "Somatostatin", "is_correct": false}, {"label_html": "Insulin", "is_correct": false}], "correct_index": 2, "explanation_html": "Secretin is released from mucosal cells in the duodenum and jejunum."}], "note_html": "<b>Hormones released from the islets of Langerhans<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Beta cells<\/b><\/td><td>Insulin (70% of total secretions)<\/td><\/tr><tr><td><b>Alpha cells<\/b><\/td><td>Glucagon<\/td><\/tr><tr><td><b>Delta cells<\/b><\/td><td>Somatostatin<\/td><\/tr><tr><td><b>F cells<\/b><\/td><td>Pancreatic polypeptide<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Pancreas exocrine physiology", "questions": [{"number": 136, "topic": "Pancreas exocrine physiology", "stem_html": "What is the approximate volume of pancreatic secretions in a 24 hour period?", "options": [{"label_html": "100ml", "is_correct": false}, {"label_html": "200ml", "is_correct": false}, {"label_html": "500ml", "is_correct": false}, {"label_html": "1500ml", "is_correct": true}, {"label_html": "3000ml", "is_correct": false}], "correct_index": 3, "explanation_html": "Typically the pancreas secretes between 1000 and 1500ml per day."}, {"number": 137, "topic": "Pancreas exocrine physiology", "stem_html": "Which of the following hormonal agents will increase secretions of water and electrolytes in pancreatic juice?", "options": [{"label_html": "Secretin", "is_correct": true}, {"label_html": "Aldosterone", "is_correct": false}, {"label_html": "Somatostatin", "is_correct": false}, {"label_html": "Cholecystokinin", "is_correct": false}, {"label_html": "Adrenaline", "is_correct": false}], "correct_index": 0, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Secretin causes secretion of water and electrolytes<br>Cholecystokinin causes enzyme secretion<\/div>While secretin will typically increase electrolyte and water volume of secretions, the enzyme content is increased by cholecystokinin. Somatostatin will decrease the volume of secretions. Aldosterone will tend to conserve electrolytes."}, {"number": 138, "topic": "Pancreas exocrine physiology", "stem_html": "Which of the following will increase the volume of pancreatic exocrine secretions?", "options": [{"label_html": "Octreotide", "is_correct": false}, {"label_html": "Cholecystokinin", "is_correct": true}, {"label_html": "Aldosterone", "is_correct": false}, {"label_html": "Adrenaline", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 1, "explanation_html": "Cholecystokinin will often increase the volume of pancreatic secretions."}, {"number": 139, "topic": "Pancreas exocrine physiology", "stem_html": "A 56 year old man has long standing chronic pancreatitis and develops pancreatic insufficiency. Which of the following will be absorbed normally?", "options": [{"label_html": "Fat", "is_correct": false}, {"label_html": "Protein", "is_correct": false}, {"label_html": "Folic acid", "is_correct": true}, {"label_html": "Vitamin B12", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 2, "explanation_html": "Pancreatic lipase is required for digestion of fat, Proteases facilitate protein and B12 absorption. Folate digestion is independent of the pancreas."}], "note_html": "<b>Composition of pancreatic secretions<\/b><br>Pancreatic secretions are usually 1000-1500ml per 24 hours and have a pH of 8.<br><div class=\"table-responsive\"><table class=\"tb\"><tbody><tr><td><b>Secretion<\/b><\/td><td><b>Source<\/b><\/td><td><b>Substances secreted<\/b><\/td><\/tr><tr><td>Enzymic<\/td><td>Acinar cells<\/td><td>Trypsinogen<br>Procarboxylase<br>Amylase<br>Elastase<\/td><\/tr><tr><td>Aqueous<\/td><td>Ductal and Centroacinar cells<\/td><td>Sodium<br>Bicarbonate<br>Water<br>Potassium<br>Chloride<br>NB: Sodium and potassium reflect their plasma levels; chloride and bicarbonate vary with flow rate<\/td><\/tr><\/tbody><\/table><\/div><br><b>Regulation<\/b><br>The cephalic and gastric phases (neuronal and physical) are less important in regulating the pancreatic secretions. The effect of digested material in the small bowel stimulates CCK release and ACh which stimulate acinar and ductal cells. Of these CCK is the most potent stimulus. In the case of the ductal cells these are potently stimulated by secretin which is released by the S cells of the duodenum. This results in an increase in bicarbonate. <br><br><b>Enzyme activation<\/b><br>Trypsinogen is converted via enterokinase to active trypsin in the duodenum. Trypsin then activates the other inactive enzymes"}, {"name": "Parathyroid hormone", "questions": [{"number": 140, "topic": "Parathyroid hormone", "stem_html": "Which of the following best accounts for the action of PTH in increasing serum calcium levels?", "options": [{"label_html": "Activation of vitamin D to increase absorption of calcium from the small intestine.", "is_correct": true}, {"label_html": "Direct stimulation of osteoclasts to absorb bone with release of calcium.", "is_correct": false}, {"label_html": "Stimulation of phosphate absorption at the distal convoluted tubule of the kidney.", "is_correct": false}, {"label_html": "Decreased porosity of the vessels at Bowmans capsule to calcium.", "is_correct": false}, {"label_html": "Vasospasm of the afferent renal arteriole thereby reducing GFR and calcium urinary loss.", "is_correct": false}], "correct_index": 0, "explanation_html": "PTH increases the activity of 1-α-hydroxylase enzyme, which converts 25-hydroxycholecalciferol to 1,25-dihydroxycholecalciferol, the active form of vitamin D.<br>Osteoclasts do not have a PTH receptor and effects are mediated via osteoblasts."}], "note_html": "Parathyroid hormone is secreted by the chief cells of the parathyroid glands. It acts to increase serum calcium concentration by stimulation of the PTH receptors in the kidney and bone. PTH has a plasma half life of 4 minutes. <br><br><b>Effects of PTH<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Bone<\/b><\/td><td>Binds to osteoblasts which signal to osteoclasts to cause resorption of bone and release calcium.<\/td><\/tr><tr><td><b>Kidney<\/b><\/td><td>Active reabsorption of calcium and magnesium from the distal convoluted tubule. Decreases reabsorption of phosphate.<\/td><\/tr><tr><td><b>Intestine via kidney<\/b><\/td><td>Increases intestinal calcium absorption by increasing activated vitamin D. Activated vitamin D increases calcium absorption.<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Parotid gland secretions", "questions": [{"number": 141, "topic": "Parotid gland secretions", "stem_html": "A person is diagnosed with Conns syndrome. If the parotid gland secretions were assayed, what change (if any) will be noted?", "options": [{"label_html": "Decreased potassium", "is_correct": false}, {"label_html": "Decreased sodium", "is_correct": true}, {"label_html": "Increased sodium", "is_correct": false}, {"label_html": "Potassium levels unchanged, sodium levels increased", "is_correct": false}, {"label_html": "Potassium levels raised sodium levels unchanged", "is_correct": false}], "correct_index": 1, "explanation_html": "Aldosterone affects the parotid gland secretions and has the effect of conserving sodium (so salivary sodium reduced) and potassium secretion increased."}, {"number": 142, "topic": "Parotid gland secretions", "stem_html": "A man develops xerostomia. What proportion of salivary gland secretions is contributed by the parotid gland?", "options": [{"label_html": "25%", "is_correct": true}, {"label_html": "50%", "is_correct": false}, {"label_html": "75%", "is_correct": false}, {"label_html": "80%", "is_correct": false}, {"label_html": "5%", "is_correct": false}], "correct_index": 0, "explanation_html": "Parotid gland secretions account for around 25% of saliva. Most comes from the submandibular gland."}], "note_html": "- Parotid gland secretions account for around 25% of salivary secretions<br><ul><li>Levels of sodium and chloride are lower than plasma, potassium and bicarbonate levels are higher<\/li><li>Parotid secretions are watery and have high enzyme concentrations<\/li><li>Parasympathetic stimulation produces a water rich, serous saliva. Sympathetic stimulation leads to the production of a low volume, enzyme-rich saliva.<\/li><li>Fluid that is secreted within the acini is isotonic with plasma and undergoes modification within the ducts via process of ion exchange<\/li><li>The ducts are affected by aldosterone and so will retain sodium and secrete potassium when aldosterone levels are elevated<\/li><\/ul>"}, {"name": "Peristalsis", "questions": [{"number": 143, "topic": "Peristalsis", "stem_html": "Which statement about peristalsis is true?", "options": [{"label_html": "Longitudinal smooth muscle propels the food bolus through the oesophagus", "is_correct": true}, {"label_html": "Secondary peristalsis occurs when there is no food bolus in the oesophagus", "is_correct": false}, {"label_html": "Food transfer from the oesophagus to the stomach is 4 seconds", "is_correct": false}, {"label_html": "Circular smooth muscle is not involved in peristalsis", "is_correct": false}, {"label_html": "Peristalsis only occurs in the oesophagus", "is_correct": false}], "correct_index": 0, "explanation_html": "<p>No explanation provided.<\/p>"}, {"number": 144, "topic": "Peristalsis", "stem_html": "Which of the following does not lead to relaxation of the lower oesophageal sphincter?", "options": [{"label_html": "Metoclopramide", "is_correct": true}, {"label_html": "Botulinum toxin type A", "is_correct": false}, {"label_html": "Nicotine", "is_correct": false}, {"label_html": "Alcohol", "is_correct": false}, {"label_html": "Theophylline", "is_correct": false}], "correct_index": 0, "explanation_html": "Metoclopramide acts directly on the smooth muscle of the LOS to cause it to contract.<br>Theophylline is a phosphodiesterase inhibitor (mimics action of prostaglandin E1) which causes relaxation of the LOS."}], "note_html": "<ul><li>Circular smooth muscle contracts behind the food bolus and longitudinal smooth muscle propels the food through the oesophagus<\/li><li>Primary peristalsis spontaneously moves the food from the oesophagus into the stomach (9 seconds)<\/li><li>Secondary peristalsis occurs when food, which doesn't enter the stomach, stimulates stretch receptors to cause peristalsis<\/li><li>In the small intestine each peristalsis waves slows to a few seconds and causes mixture of chyme<\/li><li>In the colon three main types of peristaltic activity are recognised (see below)<\/li><\/ul><br><b>Colonic peristalsis<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Segmentation contractions<\/b><\/td><td>Localised contractions in which the bolus is subjected to local forces to maximise mucosal absorption<\/td><\/tr><tr><td><b>Antiperistaltic contractions towards ileum<\/b><\/td><td>Localised reverse peristaltic waves to slow entry into colon and maximise absorption<\/td><\/tr><tr><td><b>Mass movements<\/b><\/td><td>Waves migratory peristaltic waves along the entire colon to empty the organ prior to the next ingestion of food bolus<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Phases of wound healing", "questions": [{"number": 145, "topic": "Phases of wound healing", "stem_html": "Which of the following cell types is least likely to be found in a wound 1 week following injury?", "options": [{"label_html": "Macrophages", "is_correct": false}, {"label_html": "Fibroblasts", "is_correct": false}, {"label_html": "Myofibroblasts", "is_correct": true}, {"label_html": "Endothelial cells", "is_correct": false}, {"label_html": "Neutrophils", "is_correct": false}], "correct_index": 2, "explanation_html": "Myofibroblasts are differentiated fibroblasts, in which the cytoskeleton contains actin filaments. These cell types facilitate wound contracture and are the hallmark of a mature wound. They are almost never found in wounds less than 1 month old. <br>Remember the question asks about the cell type asks about which cells are <i>least<\/i> likely to be found."}, {"number": 146, "topic": "Phases of wound healing", "stem_html": "What is the main event involved in the neovascularization of the immature wound bed following surgery?", "options": [{"label_html": "Endothelial cell proliferation", "is_correct": true}, {"label_html": "Fibroblast proliferation", "is_correct": false}, {"label_html": "Macrophage migration", "is_correct": false}, {"label_html": "Neutrophil accumulation", "is_correct": false}, {"label_html": "Granulocyte degradation", "is_correct": false}], "correct_index": 0, "explanation_html": "Angiogenesis is a key event in wound healing and occurs as a result of endothelial cell proliferation."}, {"number": 147, "topic": "Phases of wound healing", "stem_html": "What is the most significant event to contribute to wound healing immediately following injury?", "options": [{"label_html": "Neutrophil activation", "is_correct": false}, {"label_html": "Platelet degranulation", "is_correct": true}, {"label_html": "Endothelial cell proliferation", "is_correct": false}, {"label_html": "Migration of tissue macrophages", "is_correct": false}, {"label_html": "Proliferation of wound bed fibroblasts", "is_correct": false}], "correct_index": 1, "explanation_html": "Many of these events contribute to healing. However, platelet degranulation is the earliest phase and results in haemostasis, the main event is then allowing the release of cytokines to attract other cells types to the wound and co-ordinate healing."}], "note_html": "<div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Phase<\/b><\/td><td><b>Key features<\/b><\/td><td><b>Cells<\/b><\/td><td><b>Timeframe<\/b><\/td><\/tr><tr><td><b>Haemostasis<\/b><\/td><td><ul><li>Vasospasm in adjacent vessels<\/li><li>Platelet plug formation and generation of fibrin rich clot<\/li><\/ul><\/td><td>Erythrocytes and platelets<\/td><td>Seconds/ Minutes<\/td><\/tr><tr><td><b>Inflammation<\/b><\/td><td><ul><li>Neutrophils migrate into wound (function impaired in diabetes).<\/li><li>Growth factors released, including basic fibroblast growth factor and vascular endothelial growth factor.<\/li><li>Fibroblasts replicate within the adjacent matrix and migrate into wound.<\/li><li>Macrophages and fibroblasts couple matrix regeneration and clot substitution.<\/li><\/ul><\/td><td>Neutrophils, fibroblasts and macrophages<\/td><td>Days<\/td><\/tr><tr><td><b>Regeneration<\/b><\/td><td><ul><li>Platelet derived growth factor and transformation growth factors stimulate fibroblasts and epithelial cells.<\/li><li>Fibroblasts produce a collagen network.<\/li><li>Angiogenesis occurs and wound resembles granulation tissue.<\/li><\/ul><\/td><td>Fibroblasts, endothelial cells, macrophages<\/td><td>Weeks<\/td><\/tr><tr><td><b>Remodelling<\/b><\/td><td><ul><li>Longest phase of the healing process and may last up to one year (or longer). <\/li><li>During this phase fibroblasts become differentiated (myofibroblasts) and these facilitate wound contraction.<\/li><li>Collagen fibres are remodelled.<\/li><li>Microvessels regress leaving a pale scar.<\/li><\/ul><\/td><td>Myofibroblasts<\/td><td>6 weeks to 1 year<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Pleural pressure", "questions": [{"number": 148, "topic": "Pleural pressure", "stem_html": "The pressure within the pleural space is negative with respect to atmospheric pressure, except for which of the following?", "options": [{"label_html": "At the end of inspiration", "is_correct": false}, {"label_html": "When taking a deep breath", "is_correct": false}, {"label_html": "If the patient is intubated with an endotracheal tube", "is_correct": false}, {"label_html": "During a Valsalva manoeuvre", "is_correct": true}, {"label_html": "At the end of expiration", "is_correct": false}], "correct_index": 3, "explanation_html": "During a Valsalva manoeuvre, the intra pleural pressure rises owing to extrinsic compression."}], "note_html": "Pleural pressure is the pressure surrounding the lung, within the pleural space. During quiet breathing, the pleural pressure is negative; that is, it is below atmospheric pressure. <br><br>The pleura is a thin membrane which invests the lungs and lines the walls of the thoracic cavity. During development the lungs grow into the pleural sacs until they are completely surrounded by them. The side of the pleura that covers the lung is referred to as the visceral pleura and the side of the pleura which covers the chest wall is called the parietal pleura. These two sides are continuous and meet at the hilum of the lung. The two faces of the pleural membranes are directly opposed to one another, and the entire potential space within the pleura contains only a few milliliters of serous pleural fluid. <br><br>The size of the lung is determined by the difference between the alveolar pressure and the pleural pressure, or the transpulmonary pressure. The bigger the difference, the bigger the lung. As a result of gravity, in an upright individual the pleural pressure at the base of the lung base is greater (less negative) than at its apex; when the individual lies on his back, the pleural pressure becomes greatest along his back. Since alveolar pressure is uniform throughout the lung, the top of the lung generally experiences a greater transpulmonary pressure and is therefore more expanded and less compliant than the bottom of the lung. <br><br>During active expiration, the abdominal muscles are contracted to force up the diaphragm and the resulting pleural pressure can become positive. Positive pleural pressure may temporarily collapse the bronchi and cause limitation of air flow."}, {"name": "Potassium secretion -GI tract", "questions": [{"number": 149, "topic": "Potassium secretion -GI tract", "stem_html": "Secretions from which of the following will contain the highest levels of potassium?", "options": [{"label_html": "Rectum", "is_correct": true}, {"label_html": "Ileum", "is_correct": false}, {"label_html": "Gallbladder", "is_correct": false}, {"label_html": "Pancreas", "is_correct": false}, {"label_html": "Stomach", "is_correct": false}], "correct_index": 0, "explanation_html": "The rectum has the potential to generate secretions rich in potassium. This is the rationale behind administration of resins for hyperkalaemia and the development of hypokalaemia in patients with villous adenoma of the rectum."}], "note_html": "<b>Potassium secretions<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td>Salivary glands<\/td><td>Variable may be up to 60mmol/L<\/td><\/tr><tr><td>Stomach<\/td><td>10 mmol/L<\/td><\/tr><tr><td>Bile<\/td><td>5 mmol/L<\/td><\/tr><tr><td>Pancreas<\/td><td>4-5 mmol/L<\/td><\/tr><tr><td>Small bowel<\/td><td>10 mmol/L<\/td><\/tr><tr><td>Rectum<\/td><td>30 mmol/L<\/td><\/tr><\/tbody><\/table><\/div><br>The above table provides average figures only and the exact composition varies depending upon the existence of disease, serum aldosterone levels and serum pH.<br><br>A key point to remember for the exam is that gastric potassium secretions are low. Hypokalaemia may occur in vomiting, usually as a result of renal wasting of potassium, not because of potassium loss in vomit."}, {"name": "Potassium sparing diuretics", "questions": [{"number": 150, "topic": "Potassium sparing diuretics", "stem_html": "Where does spironolactone act in the kidney?", "options": [{"label_html": "Glomerulus", "is_correct": false}, {"label_html": "Proximal convoluted tubule", "is_correct": false}, {"label_html": "Descending limb of the loop of Henle", "is_correct": false}, {"label_html": "Ascending limb of the loop of Henle", "is_correct": false}, {"label_html": "Distal convoluted tubule", "is_correct": true}], "correct_index": 4, "explanation_html": "<p>No explanation provided.<\/p>"}], "note_html": "Potassium-sparing diuretics may be d
