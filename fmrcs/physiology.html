e}, {"label_html": "It may normally contain up to 5 red blood cells per mm<sup>3<\/sup>.", "is_correct": true}, {"label_html": "It may normally contain up to 3 white blood cells per mm<sup>3<\/sup>.", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 2, "explanation_html": "It should not contain red blood cells."}, {"number": 45, "topic": "Cerebrospinal fluid", "stem_html": "The blood - brain barrier is not highly permeable to which of the following?", "options": [{"label_html": "Carbon dioxide", "is_correct": false}, {"label_html": "Barbituates", "is_correct": false}, {"label_html": "Glucose", "is_correct": false}, {"label_html": "Oxygen", "is_correct": false}, {"label_html": "Hydrogen ions", "is_correct": true}], "correct_index": 4, "explanation_html": "The blood brain barrier is relatively impermeable to highly dissociated compounds."}, {"number": 46, "topic": "Cerebrospinal fluid", "stem_html": "A 5 year old boy presents with recurrent headaches. As part of his assessment he undergoes an MRI scan of his brain. This demonstrates enlargement of the lateral and third ventricles. Where is the most likely site of obstruction?", "options": [{"label_html": "Foramen of Luschka", "is_correct": false}, {"label_html": "Foramen of Magendie", "is_correct": false}, {"label_html": "Foramen of Munro", "is_correct": false}, {"label_html": "Aqueduct of Sylvius", "is_correct": true}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 3, "explanation_html": "The CSF flows from the 3rd to the 4th ventricle via the Aqueduct of Sylvius."}, {"number": 47, "topic": "Cerebrospinal fluid", "stem_html": "Which of the following statements relating to cerebrospinal fluid is untrue?", "options": [{"label_html": "The choroid plexus is only present in the lateral ventricles", "is_correct": true}, {"label_html": "Total CSF volume is 100-150ml", "is_correct": false}, {"label_html": "CSF pressure is usually 10-15mmHg", "is_correct": false}, {"label_html": "The cerebral aqueduct connects the third and fourth ventricle", "is_correct": false}, {"label_html": "The foramen of Luschka are paired and lie laterally in the fourth ventricle", "is_correct": false}], "correct_index": 0, "explanation_html": "The choroid plexus lies in all ventricles."}], "note_html": "The CSF fills the space between the arachnoid mater and pia mater (covering surface of the brain). The total volume of CSF in the brain is approximately 150ml. Approximately 500 ml is produced by the ependymal cells in the choroid plexus (70%), or blood vessels (30%). It is reabsorbed via the arachnoid granulations which project into the venous sinuses. <br>  <br><b>Circulation<\/b><br>1. Lateral ventricles (via foramen of Munro)<br>2. 3rd ventricle<br>3. Cerebral aqueduct (aqueduct of Sylvius)<br>4. 4th ventricle<br>5. Subarachnoid space (via foramina of Magendie and Luschka)<br>6. Reabsorbed into the venous system via arachnoid granulations into superior sagittal sinus<br><br><b>Composition<\/b><br><ul><li>Glucose: 50-80mg/dl<\/li><li>Protein: 15-40 mg/dl<\/li><li>Red blood cells: Nil<\/li><li>White blood cells: 0-3 cells/ mm<sup>3<\/sup><\/li><\/ul>"}, {"name": "Coagulation cascade", "questions": [{"number": 48, "topic": "Coagulation cascade", "stem_html": "Which of the following statements related to the coagulation cascade is true?", "options": [{"label_html": "The intrinsic pathway is the main pathway in coagulation", "is_correct": false}, {"label_html": "Heparin inhibits the activation of Factor 8", "is_correct": false}, {"label_html": "The activation of factor 8 is the point when the intrinsic and the extrinsic pathways meet", "is_correct": false}, {"label_html": "Tissue factor released by damaged tissue initiates the extrinsic pathway", "is_correct": true}, {"label_html": "Thrombin converts plasminogen to plasmin", "is_correct": false}], "correct_index": 3, "explanation_html": "The extrinsic pathway is the main path of coagulation. Heparin inhibits the activation of factors 2,9,10,11.   The activation of factor 10 is when both pathways meet.  Thrombin converts fibrinogen to fibrin.  During fibrinolysis plasminogen is converted to plasmin to break down fibrin."}], "note_html": "Two pathways lead to fibrin formation<br><br><b>Intrinsic pathway<\/b> (components already present in the blood)<br><ul><li>Minor role in clotting<\/li><li>Subendothelial damage e.g. collagen<\/li><li>Formation of the primary complex on collagen by high-molecular-weight kininogen (HMWK), prekallikrein, and Factor 12<\/li><li>Prekallikrein is converted to kallikrein and Factor 12 becomes activated <\/li><li>Factor 12 activates Factor 11 <\/li><li>Factor 11 activates Factor 9, which with its co-factor Factor 8a form the tenase complex which activates Factor 10<\/li><\/ul>  <br><b>Extrinsic pathway<\/b> (needs tissue factor released by damaged tissue)<br><ul><li>Tissue damage<\/li><li>Factor 7 binds to Tissue factor<\/li><li>This complex activates Factor 9 <\/li><li>Activated Factor 9 works with Factor 8 to activate Factor 10<\/li><\/ul>   <br><b>Common pathway<\/b><br><ul><li>Activated Factor 10 causes the conversion of prothrombin to thrombin<\/li><li>Thrombin hydrolyses fibrinogen peptide bonds to form fibrin and also activates factor 13 to form links between fibrin molecules<\/li><\/ul><br><b>Fibrinolysis<\/b><br>Plasminogen is converted to plasmin to facilitate clot resorption<br><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb030b.jpg\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb030.jpg\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Coagulation\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb030b.jpg\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Clotting pathway<\/b><\/th><th><b>Clotting parameters affected<\/b><\/th><th><b>Factors affected<\/b><\/th><\/tr><\/thead><tbody><tr><td><b>Intrinsic pathway<\/b><\/td><td>Increased APTT<\/td><td>Factors 8,9,11,12<\/td><\/tr><tr><td><b>Extrinsic pathway<\/b><\/td><td>Increased PT<\/td><td>Factor 7<\/td><\/tr><tr><td><b>Common pathway<\/b><\/td><td>Increased APTT &amp; PT<\/td><td>Factors 2,5,10<\/td><\/tr><tr><td><b>Vitamin K dependent<\/b><\/td><td><\/td><td>Factors 2,7,9,10<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Combined deficiency of magnesium and calcium", "questions": [{"number": 49, "topic": "Combined deficiency of magnesium and calcium", "stem_html": "An elderly lady who presented with weight loss and malabsorption was found to have amyloid of the small bowel. On presentation she was found to have osteomalacia and was hypocalcaemic. Over the past seven days she has received total parenteral nutrition with adequate calcium replacement. Despite this she remained hypocalcaemic. Deficiency of which of the following electrolytes is most likely to account for this process?", "options": [{"label_html": "Magnesium", "is_correct": true}, {"label_html": "Potassium", "is_correct": false}, {"label_html": "Sodium", "is_correct": false}, {"label_html": "Phosphate", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 0, "explanation_html": "Patients with malabsorption may develop magnesium deficiency, although her TPN feeds may have contained magnesium it may not have been sufficient to correct her losses. Sodium, phosphate and potassium would not have this effect on serum calcium."}], "note_html": "Magnesium is required for both PTH secretion and its action on target tissues. Hypomagnesaemia may both cause hypocalcaemia and render patients unresponsive to treatment with calcium and vitamin D supplementation. <br><br>Magnesium is the fourth most abundant cation in the body. The body contains 1000mmol, with half contained in bone and the remainder in muscle, soft tissues and extracellular fluid. There is no one specific hormonal control of magnesium and various hormones including PTH and aldosterone affect the renal handling of magnesium. <br><br>Magnesium and calcium interact at a cellular level also and as a result decreased magnesium will tend to affect the permeability of cellular membranes to calcium, resulting in hyperexcitability."}, {"name": "Complement system", "questions": [{"number": 50, "topic": "Complement system", "stem_html": "A 36 year old man develops cellulitis of the hand. This condition will involve the complement immunological system. Which of the cells types listed below provides the greatest contribution to complement protein and glycoprotein production?", "options": [{"label_html": "T Cells", "is_correct": false}, {"label_html": "B Cells", "is_correct": false}, {"label_html": "Hepatocytes", "is_correct": true}, {"label_html": "Endothelial cells", "is_correct": false}, {"label_html": "Polymorphonucleocytes", "is_correct": false}], "correct_index": 2, "explanation_html": "Whilst all the cell types listed can produce complement proteins, the greatest contribution is made from the hepatocytes. Indeed, most soluble proteins are synthesized by the liver."}], "note_html": "The complement system plays a crucial role in the innate defense against common pathogens. Activation of complement leads to robust and efficient proteolytic cascades, which terminate in opsonization and lysis of the pathogen as well as in the generation of the classical inflammatory response through the production of potent proinflammatory molecules.<br><br>Proteolytic cascades include: potent proinflammatory mediators (anaphylatoxins), opsonization (coating) of the pathogenic surface through various complement opsonins (e.g., C3b), and targeted lysis of the pathogenic surface through the assembly of membrane-penetrating pores known as the membrane attack complex (MAC). <br><br>Complement is activated via one of three major pathways; classical, lectin and alternative. <br>The final output of the system is inflammation, lysis or opsonization."}, {"name": "Coning", "questions": [{"number": 51, "topic": "Coning", "stem_html": "Which of the following is not classically seen in coning resulting from raised intra cranial pressure?", "options": [{"label_html": "Coma", "is_correct": false}, {"label_html": "Hypotension", "is_correct": true}, {"label_html": "Unreactive mid sized pupils", "is_correct": false}, {"label_html": "Cheyne Stokes style respiratory efforts", "is_correct": false}, {"label_html": "Bradycardia", "is_correct": false}], "correct_index": 1, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Cushings triad<br><ul><li>Widening of the pulse pressure<\/li><li>Respiratory changes<\/li><li>Bradycardia<\/li><\/ul><\/div>Due to raised ICP systemic hypertension is usually seen. Compression of the respiratory centre will typically result in Cheyne Stokes style respiration."}], "note_html": "<ul><li>The cranial vault is a confined cavity apart from infants with a non fused fontanelle.<\/li><li>Rises in ICP may be accommodated by shifts of CSF.<\/li><li>Once the CSF shifting has reached its capacity ICP will start to rise briskly.<\/li><li>The brain autoregulates its blood supply, as ICP rises the systemic circulation will display changes to try and meet the perfusion needs of the brain. Usually this will involve hypertension.<\/li><li>As ICP rises further, the brain will be compressed, cranial nerve palsies may be seen and compression of essential centres in the brain stem will occur. When the cardiac centre is involved bradycardia will often develop. <\/li><\/ul>"}, {"name": "Control of ventilation", "questions": [{"number": 52, "topic": "Control of ventilation", "stem_html": "Control of ventilation. Which statement is false?", "options": [{"label_html": "Peripheral chemoreceptors are located in the bifurcation of the carotid arteries and arch of the aorta", "is_correct": false}, {"label_html": "Central chemoreceptors respond to changes in O<sub>2<\/sub>", "is_correct": true}, {"label_html": "The respiratory centres control the rate and depth of respiration", "is_correct": false}, {"label_html": "Involuntary control of respiration is from the medulla and pons", "is_correct": false}, {"label_html": "Irritant receptors cause bronchospasm", "is_correct": false}], "correct_index": 1, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">    - \tCentral chemoreceptors: Respond to increased H+ in BRAIN INTERSTITIAL FLUID to increase ventilation.<\/div>"}, {"number": 53, "topic": "Control of ventilation", "stem_html": "A 23 year old man has taken an opiate overdose. Of the following structures, which will be most affected by opiates to produce a reduction in respiratory rate?", "options": [{"label_html": "Carotid chemoreceptors", "is_correct": false}, {"label_html": "Central chemoreceptors", "is_correct": false}, {"label_html": "Medullary respiratory centre", "is_correct": true}, {"label_html": "Pneumotaxic centre", "is_correct": false}, {"label_html": "Juxtacapillary (J) receptors", "is_correct": false}], "correct_index": 2, "explanation_html": "Opiates typically affect the medullary respiratory centre to depress respiratory activity."}], "note_html": "- Control of ventilation is coordinated by the respiratory centres, chemoreceptors, lung receptors and muscles.<br><ul><li>Automatic, involuntary control of respiration occurs from the medulla.  <\/li><li>The respiratory centres control the respiratory rate and the depth of respiration.  <\/li><\/ul><br><b>Respiratory centres<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Medullary respiratory centre<\/b><\/td><td>Inspiratory and expiratory neurones.  Has ventral group which controls forced voluntary expiration and the dorsal group controls inspiration.  Depressed by opiates.<\/td><\/tr><tr><td><b>Apneustic centre<\/b><\/td><td>Lower pons<br>Stimulates inspiration - activates and prolongs inhalation <br>Overridden by pneumotaxic control to end inspiration<\/td><\/tr><tr><td><b>Pneumotaxic centre<\/b><\/td><td>Upper pons, inhibits inspiration at a certain point. Fine tunes the respiratory rate.<\/td><\/tr><\/tbody><\/table><\/div><br><b>Ventillatory variables<\/b><br><ul><li>\tLevels of pCO<sub>2<\/sub> most important in ventilation control\t\t\t\t\t<\/li><li>Levels of O<sub>2<\/sub> are less important.<\/li><li>Peripheral chemoreceptors: located in the bifurcation of carotid arteries and arch of the aorta. They respond to changes in reduced pO<sub>2<\/sub>, increased H<sup>+<\/sup> and increased pCO<sub>2<\/sub> in ARTERIAL BLOOD.<\/li><li>Central chemoreceptors: located in the medulla. Respond to increased H<sup>+<\/sup> in BRAIN INTERSTITIAL FLUID to increase ventilation.  NB the central receptors are NOT influenced by O<sub>2<\/sub> levels.<\/li><\/ul><br>Lung receptors include:<br><ul><li>\tStretch receptors: respond to lung stretching causing a reduced respiratory rate<\/li><li>\tIrritant receptors: respond to smoke etc causing bronchospasm<\/li><li>\tJ (juxtacapillary) receptors<\/li><\/ul>"}, {"name": "Corticosteroids", "questions": [{"number": 54, "topic": "Corticosteroids", "stem_html": "Which of the following best accounts for the mechanism of action of glucocorticoids?", "options": [{"label_html": "Binding of cell wall receptors and intracellular tyrosine kinase activation", "is_correct": false}, {"label_html": "Binding of intracellular receptors that migrate to the nucleus to then affect gene transcription", "is_correct": true}, {"label_html": "Activation of transmembrane tyrosine kinase systems to affect intranuclear gene transcription", "is_correct": false}, {"label_html": "Induces post translational modification of intracellular proteins", "is_correct": false}, {"label_html": "Direct binding of inflammatory cells inducing apoptosis", "is_correct": false}], "correct_index": 1, "explanation_html": "Glucocorticoids exert their effects by binding intracellular receptors that are then transported to the nucleus where they affect gene transcription. There are some questions in the MRCS now that seem to test common pharmacology and so we have decided to include this. A detailed knowledge of the mechanisms by which these effects occur is not needed."}], "note_html": "<ul><li>Synthesised from cholesterol within the adrenal cortex<\/li><li>Bind to specific intracellular glucocorticoid receptors located on the nucleus<\/li><\/ul><br><b>Effects of glucocorticoids<\/b><br><b>Metabolic<\/b><br>Decreased uptake and utilisation of glucose, increased gluconeogenesis and hyperglycaemia<br>Increased protein catabolism<br>Permissive effect on lipolytic hormones<br><br><b>Regulatory actions<\/b><br>Has a negative feedback action on the hypothalamus causing reduced release of endogenous glucocorticoids<br>Within the CVS they cause decreased vasodilation and decreased fluid exudation<br>They decrease osteoblastic activity and increase osteoclastic activity<br>Decrease acute and chronic inflammation (decrease in influx and activity of leukocytes), decreased clonal expansion of B and T lymphocytes."}, {"name": "Cortisol", "questions": [{"number": 55, "topic": "Cortisol", "stem_html": "Which of the following drugs does not interfere with the laboratory analysis of serum cortisol levels?", "options": [{"label_html": "Dexamethasone", "is_correct": true}, {"label_html": "Prednisolone", "is_correct": false}, {"label_html": "Hydrocortisone IV", "is_correct": false}, {"label_html": "Hydrocortisone PO", "is_correct": false}, {"label_html": "Hydrocortisone IM", "is_correct": false}], "correct_index": 0, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Prednisolone and it's metabolites can chemically mimic cortisol in radio-immunoassay techniques of laboratory analysis.<\/div>Dexamethasone can be given as glucorticoid replacement during testing for addisons or adrenal insufficiency as it does not interfere with cortisol levels.  For example, if you have a patient with polymyalgia rheumatica and they are on long term prednisolone, you can replace the prednisolone with dexamethasone to undertake a short synacthen test."}, {"number": 56, "topic": "Cortisol", "stem_html": "Cortisol is predominantly produced by which of the following?", "options": [{"label_html": "Zona fasciculata of the adrenal", "is_correct": true}, {"label_html": "Zona glomerulosa of the adrenal", "is_correct": false}, {"label_html": "Zona reticularis of the adrenal", "is_correct": false}, {"label_html": "Adrenal medulla", "is_correct": false}, {"label_html": "Posterior lobe of the pituitary", "is_correct": false}], "correct_index": 0, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Relative Glucocorticoid activity:<br><br>Hydrocortisone = 1<br>Prednisolone = 4<br>Dexamethasone = 25<\/div>Cortisol is produced by the zona fasciculata of the adrenal gland."}, {"number": 57, "topic": "Cortisol", "stem_html": "Which of the following is not linked to excess glucocorticoids?", "options": [{"label_html": "Osteonecrosis", "is_correct": false}, {"label_html": "Osteoporosis", "is_correct": false}, {"label_html": "Hypokalaemia", "is_correct": false}, {"label_html": "Hyponatraemia", "is_correct": true}, {"label_html": "Growth retardation in children", "is_correct": false}], "correct_index": 3, "explanation_html": "There are many adverse effects associated with excess glucocorticoids. Thinning of the skin, osteonecrosis and osteoporosis are all common. Steroids are associated with retention of sodium and water. Potassium loss may occur and hypokalaemic alkalosis has been reported."}], "note_html": "<ul><li>Glucocorticoid<\/li><li>Released by zona fasiculata of the adrenal gland<\/li><li>90% protein bound; 10% active<\/li><li>Circadian rhythm: High in the mornings<\/li><li>Negative feedback via ACTH<\/li><\/ul><br><b>Actions<\/b><br><ul><li>Glycogenolysis<\/li><li>Gluconeogenesis<\/li><li>Protein catabolism<\/li><li>Lipolysis<\/li><li>Stress response<\/li><li>Anti-inflammatory<\/li><li>Decrease protein in bones<\/li><li>Increase gastric acid<\/li><li>Increases neutrophils/platelets/red blood cells<\/li><li>Inhibits fibroblastic activity<\/li><\/ul>"}, {"name": "Cushing reflex", "questions": [{"number": 58, "topic": "Cushing reflex", "stem_html": "A 20 year old man is admitted to the intensive care unit with an isolated severe head injury. A CT scan shows multiple intracerebral bleeds but no midline shift. He is intubated and ventilated. His pupils are dilated and react sluggishly to light. His heart rate is 50 beats/minute blood pressure 170/110 mmHg and his respiratory rate is set at 10 breaths/minute. The rising blood pressure is likely to be caused by:", "options": [{"label_html": "Aortic and carotid baroreceptor stimulation", "is_correct": false}, {"label_html": "Cortisol stimulation", "is_correct": false}, {"label_html": "Renin angiotensin stimulation", "is_correct": false}, {"label_html": "Sympathetic stimulation related to blood loss", "is_correct": false}, {"label_html": "Sympathetic stimulation related to increased intra cranial pressure", "is_correct": true}], "correct_index": 4, "explanation_html": "The changes seen are the result of raised ICP, its rare for head injuries to cause sufficient blood loss to affect the circulating volume."}], "note_html": "When intra cranial pressure exceeds mean arterial pressure, compression of cerebral arterioles occurs. This results in cerebral ischaemia.<br>Increases in ICP results in stepwise activation of the sympathetic nervous system initially. This raises peripheral vascular resistance and results in hypertension. Cardiac output is also increased. These haemodynamic changes are detected by aortic arch baroreceptors and this results in activation of the parasympathetic nervous system. These parasympathetic effects comprise the second stage of the Cushing reflex. The Cushing reflex is a serious development that indicates imminent coning or other terminal events if not resolved quickly."}, {"name": "Disorders of acid - base balance", "questions": [{"number": 59, "topic": "Disorders of acid - base balance", "stem_html": "A patient has an arterial blood gas sample taken and the following result is obtained:<br><div class=\"table-responsive\"><table class=\"tb\"><tbody><tr><td>pH<\/td><td>7.48<\/td><\/tr><tr><td>pO<sub>2<\/sub><\/td><td>10.1<\/td><\/tr><tr><td>Bicarbonate<\/td><td>30<\/td><\/tr><tr><td>pCO<sub>2<\/sub><\/td><td>4.5<\/td><\/tr><tr><td>Chloride<\/td><td>10meq<\/td><\/tr><\/tbody><\/table><\/div>What is the most likely cause?", "options": [{"label_html": "Respiratory alkalosis", "is_correct": false}, {"label_html": "Metabolic alkalosis", "is_correct": true}, {"label_html": "Type 1 respiratory failure", "is_correct": false}, {"label_html": "Metabolic acidosis with normal anion gap", "is_correct": false}, {"label_html": "Metabolic acidosis with increased anion gap", "is_correct": false}], "correct_index": 1, "explanation_html": "This would be a typical result of prolonged vomiting."}, {"number": 60, "topic": "Disorders of acid - base balance", "stem_html": "Which of the conditions listed below is most likely to account for the following arterial blood gas result:<br><div class=\"table-responsive\"><table class=\"tb\"><tbody><tr><td>pH<\/td><td>7.49<\/td><\/tr><tr><td>pO<sub>2<\/sub><\/td><td>8.5<\/td><\/tr><tr><td>Bicarbonate<\/td><td>22<\/td><\/tr><tr><td>pCO<sub>2<\/sub><\/td><td>2.4<\/td><\/tr><tr><td>Chloride<\/td><td>12meq<\/td><\/tr><\/tbody><\/table><\/div>", "options": [{"label_html": "Respiratory alkalosis", "is_correct": true}, {"label_html": "Metabolic alkalosis", "is_correct": false}, {"label_html": "Metabolic acidosis", "is_correct": false}, {"label_html": "Type II respiratory failure", "is_correct": false}, {"label_html": "Metabolic acidosis with increased anion gap", "is_correct": false}], "correct_index": 0, "explanation_html": "The hyperventilation results in decreased carbon dioxide levels, causing a respiratory alkalosis (non compensated)."}, {"number": 61, "topic": "Disorders of acid - base balance", "stem_html": "A patient has an arterial blood gas sample which provides the following result:<br><div class=\"table-responsive\"><table class=\"tb\"><tbody><tr><td>pH<\/td><td>7.20<\/td><\/tr><tr><td>pO<sub>2<\/sub><\/td><td>7.5<\/td><\/tr><tr><td>Bicarbonate<\/td><td>22<\/td><\/tr><tr><td>pCO<sub>2<\/sub><\/td><td>8.1<\/td><\/tr><tr><td>Chloride<\/td><td>10meq<\/td><\/tr><\/tbody><\/table><\/div>What is the most likely cause?", "options": [{"label_html": "Type II respiratory failure", "is_correct": true}, {"label_html": "Metabolic acidosis with increased anion gap", "is_correct": false}, {"label_html": "Metabolic alkalosis", "is_correct": false}, {"label_html": "Type I respiratory failure", "is_correct": false}, {"label_html": "Respiratory alkalosis", "is_correct": false}], "correct_index": 0, "explanation_html": "This is a sign of acute type 2 respiratory failure (non compensated). This is the result of carbon dioxide retention."}, {"number": 62, "topic": "Disorders of acid - base balance", "stem_html": "Which of the following does not cause an increased anion gap acidosis?", "options": [{"label_html": "Uraemia", "is_correct": false}, {"label_html": "Paraldehyde", "is_correct": false}, {"label_html": "Diabetic ketoacidosis", "is_correct": false}, {"label_html": "Ethylene glycol", "is_correct": false}, {"label_html": "Acetazolamide", "is_correct": true}], "correct_index": 4, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Causes of increased anion acidosis: MUDPILES <br><br>M - Methanol <br>U - Uraemia <br>D - DKA/AKA <br>P - Paraldehyde/phenformin <br>I - Iron/INH <br>L - Lactic acidosis <br>E - Ethylene glycol <br>S - Salicylates<\/div>Uraemia, paraldehyde, diabetic ketoacidosis, and ethylene glycol are all known to cause increased anion gap acidosis. Uraemia is a condition in which there is a buildup of urea and other nitrogenous wastes in the blood, leading to the production of acidic metabolites. Paraldehyde is a medication used to treat alcohol withdrawal, but it can cause metabolic acidosis due to the accumulation of acetaldehyde. Diabetic ketoacidosis is a complication of diabetes in which there is an accumulation of ketone bodies in the blood, leading to metabolic acidosis. Ethylene glycol, which is found in antifreeze, can be metabolized into acidic metabolites that can cause metabolic acidosis. Acetazolamide, on the other hand, is a medication that works by inhibiting carbonic anhydrase, an enzyme that is involved in the production of bicarbonate in the body. As a result, acetazolamide can cause a non-anion gap metabolic acidosis due to the loss of bicarbonate, but it does not cause an increased anion gap acidosis."}, {"number": 63, "topic": "Disorders of acid - base balance", "stem_html": "Which of the following does not cause a normal anion gap acidosis?", "options": [{"label_html": "Pancreatic fistula", "is_correct": false}, {"label_html": "Acetazolamide", "is_correct": false}, {"label_html": "Uraemia", "is_correct": true}, {"label_html": "Ureteric diversion", "is_correct": false}, {"label_html": "Renal tubular acidosis", "is_correct": false}], "correct_index": 2, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Normal Gap Acidosis: HARDUP<br><br>H - Hyperalimentation/hyperventilation <br>A - Acetazolamide <br>R - Renal tubular acidosis <br>D - Diarrhoea <br>U - Ureteral diversion <br>P - Pancreatic fistula/parenteral saline<\/div>Uraemia will typically cause a high anion gap acidosis. It is one of the unmeasured anions."}, {"number": 64, "topic": "Disorders of acid - base balance", "stem_html": "Which of the arterial blood gas analyses shown below would most likely be seen with a patient who has a pulmonary embolus?", "options": [{"label_html": "pH 7.64, pO<sub>2<\/sub> 10.0 kPa pCO<sub>2<\/sub> 2.8 kPa, HCO<sub>3<\/sub> 20", "is_correct": false}, {"label_html": "pH 7.25, pO<sub>2<\/sub> 8.9, pCO<sub>2<\/sub> 3.2, HCO<sub>3<\/sub> 10", "is_correct": false}, {"label_html": "pH 7.20, pO<sub>2<\/sub> 6.2, pCO<sub>2<\/sub> 8.2, HCO<sub>3<\/sub> 27", "is_correct": false}, {"label_html": "pH 7.60, pO<sub>2<\/sub> 8.2, pCO<sub>2<\/sub> 5.8, HCO<sub>3<\/sub> 40", "is_correct": false}, {"label_html": "pH 7.50, pO<sub>2<\/sub> 7.2, pCO<sub>2<\/sub> 2.5, HCO<sub>3<\/sub> 24", "is_correct": true}], "correct_index": 4, "explanation_html": "A combination of hypoxia and respiratory alkalosis should suggest a pulmonary embolus. The respiratory alkalosis is due to hyperventilation associated with the pulmonary embolism."}, {"number": 65, "topic": "Disorders of acid - base balance", "stem_html": "Which of the arterial blood gas analyses would most likely be seen in a patient with a high output ureterosigmoidostomy?", "options": [{"label_html": "pH 7.64, pO<sub>2<\/sub> 10.0 kPa pCO<sub>2<\/sub> 2.8 kPa, HCO<sub>3<\/sub> 20", "is_correct": false}, {"label_html": "pH 7.25, pO<sub>2<\/sub> 8.9, pCO<sub>2<\/sub> 3.2, HCO<sub>3<\/sub> 10", "is_correct": true}, {"label_html": "pH 7.20, pO<sub>2<\/sub> 6.2, pCO<sub>2<\/sub> 8.2, HCO<sub>3<\/sub> 27", "is_correct": false}, {"label_html": "pH 7.60, pO<sub>2<\/sub> 8.2, pCO<sub>2<\/sub> 5.8, HCO<sub>3<\/sub> 40", "is_correct": false}, {"label_html": "pH 7.45, pO<sub>2<\/sub> 7.2, pCO<sub>2<\/sub> 2.5, HCO<sub>3<\/sub> 24", "is_correct": false}], "correct_index": 1, "explanation_html": "There is acidosis. To compensate the patient will attempt to raise the pH level in the blood by hyperventilating, hence the low CO<sub>2<\/sub> level ."}, {"number": 66, "topic": "Disorders of acid - base balance", "stem_html": "Which arterial blood gas sample best represents widespread mesenteric infarction?", "options": [{"label_html": "pH 7.64, pO<sub>2<\/sub> 10.0 kPa pCO<sub>2<\/sub> 2.8 kPa, HCO<sub>3<\/sub> 20", "is_correct": false}, {"label_html": "pH 7.25, pO<sub>2<\/sub> 8.9, pCO<sub>2<\/sub> 3.2, HCO<sub>3<\/sub> 10", "is_correct": true}, {"label_html": "pH 7.20, pO<sub>2<\/sub> 6.2, pCO<sub>2<\/sub> 8.2, HCO<sub>3<\/sub> 27", "is_correct": false}, {"label_html": "pH 7.60, pO<sub>2<\/sub> 8.2, pCO<sub>2<\/sub> 5.8, HCO<sub>3<\/sub> 40", "is_correct": false}, {"label_html": "pH 7.45, pO<sub>2<\/sub> 7.2, pCO<sub>2<\/sub> 2.5, HCO<sub>3<\/sub> 24", "is_correct": false}], "correct_index": 1, "explanation_html": "This is usually associated with acidosis, hyperventillation and reduction in bicarbonate."}, {"number": 67, "topic": "Disorders of acid - base balance", "stem_html": "Which of the following conditions is most likely to be associated with these arterial blood gas sample results:<br><div class=\"table-responsive\"><table class=\"tb\"><tbody><tr><td>pH<\/td><td>7.48<\/td><\/tr><tr><td>pO<sub>2<\/sub><\/td><td>10.1<\/td><\/tr><tr><td>HCO<sub>3<\/sub><\/td><td>30<\/td><\/tr><tr><td>pCO<sub>2<\/sub><\/td><td>4.5<\/td><\/tr><tr><td>Cl<sup>-<\/sup><\/td><td>96mEq<\/td><\/tr><\/tbody><\/table><\/div>", "options": [{"label_html": "Respiratory alkalosis", "is_correct": false}, {"label_html": "Metabolic acidosis with normal anion gap", "is_correct": false}, {"label_html": "Metabolic alkalosis", "is_correct": true}, {"label_html": "Metabolic acidosis with increased anion gap", "is_correct": false}, {"label_html": "Type 2 respiratory failure", "is_correct": false}], "correct_index": 2, "explanation_html": "These arterial blood gas results are classically seen in situations where there is metabolic alkalosis such as may occur following prolonged vomiting."}, {"number": 68, "topic": "Disorders of acid - base balance", "stem_html": "A 53 year old man has an arterial blood gas sample taken and the following results are obtained, he is breathing room air.<br><div class=\"table-responsive\"><table class=\"tb\"><tbody><tr><td>pH<\/td><td>7.49<\/td><\/tr><tr><td>pO<sub>2<\/sub><\/td><td>8.5<\/td><\/tr><tr><td>HCO<sub>3<\/sub><\/td><td>22<\/td><\/tr><tr><td>pCO<sub>2<\/sub><\/td><td>2.4<\/td><\/tr><tr><td>Cl<sup>-<\/sup><\/td><td>&lt;10meq<\/td><\/tr><\/tbody><\/table><\/div>Which of the conditions listed below is most likely to account for these findings?", "options": [{"label_html": "Respiratory alkalosis", "is_correct": true}, {"label_html": "Type 2 respiratory failure", "is_correct": false}, {"label_html": "Metabolic acidosis with increased anion gap", "is_correct": false}, {"label_html": "Metabolic alkalosis", "is_correct": false}, {"label_html": "Metabolic acidosis with normal anion gap", "is_correct": false}], "correct_index": 0, "explanation_html": "The hyperventilation results in decreased carbon dioxide levels, causing a respiratory alkalosis (non compensated)."}, {"number": 69, "topic": "Disorders of acid - base balance", "stem_html": "A 50 year old man has an arterial blood gas sample taken and the following results are obtained, he is breathing room air.<br><div class=\"table-responsive\"><table class=\"tb\"><tbody><tr><td>pH<\/td><td>7.20<\/td><\/tr><tr><td>pO<sub>2<\/sub><\/td><td>7.5<\/td><\/tr><tr><td>HCO<sub>3<\/sub><\/td><td>22<\/td><\/tr><tr><td>pCO<sub>2<\/sub><\/td><td>8.1<\/td><\/tr><tr><td>Cl<sup>-<\/sup><\/td><td>10meq<\/td><\/tr><\/tbody><\/table><\/div>Which of the conditions listed below is most likely to account for these findings?", "options": [{"label_html": "Type 1 respiratory failure", "is_correct": false}, {"label_html": "Metabolic alkalosis", "is_correct": false}, {"label_html": "Metabolic acidosis with normal anion gap", "is_correct": false}, {"label_html": "Metabolic acidosis with increased anion gap", "is_correct": false}, {"label_html": "Type 2 respiratory failure", "is_correct": true}], "correct_index": 4, "explanation_html": "This is a sign of acute type 2 respiratory failure (non compensated). This is the result of carbon dioxide retention."}, {"number": 70, "topic": "Disorders of acid - base balance", "stem_html": "A 53 year old man is on the intensive care unit following an emergency abdominal aortic aneurysm repair. He develops abdominal pain and diarrhoea and is profoundly unwell. His abdomen has no features of peritonism. Which of the following arterial blood gas pictures is most likely to be present?", "options": [{"label_html": "pH 7.45, pO<sub>2<\/sub> 10.1, pCO<sub>2<\/sub> 3.2, Base excess 0, Lactate 0", "is_correct": false}, {"label_html": "pH 7.35, pO<sub>2<\/sub> 8.0, pCO<sub>2<\/sub> 5.2, Base excess 2, Lactate 1", "is_correct": false}, {"label_html": "pH 7.20, pO<sub>2<\/sub> 9.0, pCO<sub>2<\/sub> 3.5, Base excess -10, Lactate 8", "is_correct": true}, {"label_html": "pH 7.29, pO<sub>2<\/sub> 8.9, pCO<sub>2<\/sub> 5.9, Base excess -4, Lactate 3", "is_correct": false}, {"label_html": "pH 7.30, pO<sub>2<\/sub> 9.2 pCO<sub>2<\/sub> 4.8, Base excess -2, lactate 1", "is_correct": false}], "correct_index": 2, "explanation_html": "This man is likely to have a metabolic acidosis secondary to a mesenteric infarct."}], "note_html": "Disorders of acid- base balance are often covered in the MRCS part A.<br><br><i>The acid-base normogram below shows how the various disorders may be categorised<\/i><br><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb072b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb072.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Acid-base homeostasis\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb072b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center><br><b>Metabolic acidosis<\/b><br><ul><li>This is the most common surgical acid - base disorder.<\/li><li>Reduction in plasma bicarbonate levels.<\/li><li>Two mechanisms:<\/li><\/ul>1. Gain of strong acid (e.g. diabetic ketoacidosis)<br>2. Loss of base (e.g. from bowel in diarrhoea)<br>  - Classified according to the anion gap, this can be calculated by: <br>(Na<sup>+<\/sup> + K<sup>+<\/sup>) - (Cl<sup>-<\/sup> + HCO<sub>3<\/sub><sup>-<\/sup>). <br>  - If a question supplies the chloride level then this is often a clue that the anion gap should be calculated. The normal range = 10-18 mmol/L<br><br><b>Normal anion gap ( = hyperchloraemic metabolic acidosis)<\/b><br><ul><li>Gastrointestinal bicarbonate loss: diarrhoea, ureterosigmoidostomy, fistula<\/li><li>Renal tubular acidosis<\/li><li>Drugs: e.g. acetazolamide<\/li><li>Ammonium chloride injection<\/li><li>Addison's disease<\/li><\/ul><br><b>Raised anion gap<\/b><br><ul><li>Lactate: shock, hypoxia<\/li><li>Ketones: diabetic ketoacidosis, alcohol<\/li><li>Urate: renal failure<\/li><li>Acid poisoning: salicylates, methanol<\/li><\/ul><br> Metabolic acidosis secondary to high lactate levels may be subdivided into two types:<br><ul><li>Lactic acidosis type A: (Perfusion disorders e.g.shock, hypoxia, burns)<\/li><li>Lactic acidosis type B: (Metabolic e.g. metformin toxicity)<\/li><\/ul><br> <br><b>Metabolic alkalosis<\/b><br><ul><li>Usually caused by a rise in plasma bicarbonate levels.<\/li><li>Rise of bicarbonate above 24 mmol/L will typically result in renal excretion of excess bicarbonate.<\/li><li>Caused by a loss of hydrogen ions or a gain of bicarbonate. It is due mainly to problems of the kidney or gastrointestinal tract<\/li><\/ul><br> <br><b>Causes<\/b><br><ul><li>Vomiting / aspiration (e.g. Peptic ulcer leading to pyloric stenosis, nasogastric suction)<\/li><li>Diuretics<\/li><li>Liquorice, carbenoxolone<\/li><li>Hypokalaemia<\/li><li>Primary hyperaldosteronism<\/li><li>Cushing's syndrome<\/li><li>Bartter's syndrome<\/li><li>Congenital adrenal hyperplasia<\/li><\/ul><br><br><b>Mechanism of metabolic alkalosis<\/b><br><ul><li>Activation of renin-angiotensin II-aldosterone (RAA) system is a key factor<\/li><li>Aldosterone causes reabsorption of Na<sup>+<\/sup> in exchange for H<sup>+<\/sup> in the distal convoluted tubule<\/li><li>ECF depletion (vomiting, diuretics) → Na<sup>+<\/sup> and Cl<sup>-<\/sup> loss → activation of RAA system → raised aldosterone levels<\/li><li>In hypokalaemia, K<sup>+<\/sup> shift from cells → ECF, alkalosis is caused by shift of H<sup>+<\/sup> into cells to maintain neutrality<\/li><\/ul><br><b>Respiratory acidosis<\/b><br><ul><li>Rise in carbon dioxide levels usually as a result of alveolar hypoventilation<\/li><li>Renal compensation may occur leading to <i>Compensated respiratory acidosis<\/i><\/li><\/ul><br><b>Causes<\/b><br><ul><li>COPD<\/li><li>Decompensation in other respiratory conditions e.g. Life-threatening asthma / pulmonary oedema<\/li><li>Sedative drugs: benzodiazepines, opiate overdose<\/li><\/ul><br><b>Respiratory alkalosis<\/b><br><ul><li>Hyperventilation resulting in excess loss of carbon dioxide<\/li><li>This will result in increasing pH<\/li><\/ul><br><b>Causes<\/b><br><ul><li>Psychogenic: anxiety leading to hyperventilation<\/li><li>Hypoxia causing a subsequent hyperventilation: pulmonary embolism, high altitude<\/li><li>Early salicylate poisoning*<\/li><li>CNS stimulation: stroke, subarachnoid haemorrhage, encephalitis<\/li><li>Pregnancy<\/li><\/ul>  <br> *Salicylate overdose leads to a mixed respiratory alkalosis and metabolic acidosis. Early stimulation of the respiratory centre leads to a respiratory alkalosis whilst later the direct acid effects of salicylates (combined with acute renal failure) may lead to an acidosis"}, {"name": "Diuretic agents", "questions": [{"number": 71, "topic": "Diuretic agents", "stem_html": "A 73 year old lady is admitted for a laparoscopic cholecystectomy. During her pre-operative assessment it is noted that she is receiving furosemide for the treatment of hypertension. Approximately what proportion of the sodium that is filtered at the glomerulus will be subsequently excreted?", "options": [{"label_html": "Up to 25%", "is_correct": true}, {"label_html": "Up to 75%", "is_correct": false}, {"label_html": "Between 3 and 5%", "is_correct": false}, {"label_html": "&lt;2%", "is_correct": false}, {"label_html": "Between 1 and 2%", "is_correct": false}], "correct_index": 0, "explanation_html": "The loop diuretics can lead to marked increases in the amount of sodium excreted. They act in the medullary and cortical aspects of the thick ascending limb of the loop of Henle. This results in a decreased medullary concentration gradient and increases free water excretion (as well as loss of sodium). Because loop diuretics result in the loss of both sodium and water they are less frequently associated with hyponatraemia than thiazide diuretics (these latter agents act in the cortex and do not affect urine concentrating ability)."}, {"number": 72, "topic": "Diuretic agents", "stem_html": "A 73 year old lady is admitted for a laparoscopic cholecystectomy. During her pre-operative assessment it is noted that she is receiving furosemide for the treatment of hypertension.  Where is the site of action of this diuretic?", "options": [{"label_html": "Proximal convoluted tubule", "is_correct": false}, {"label_html": "Descending limb of the loop of Henle", "is_correct": false}, {"label_html": "Ascending limb of the loop of Henle", "is_correct": true}, {"label_html": "Distal convoluted tubule", "is_correct": false}, {"label_html": "Collecting ducts", "is_correct": false}], "correct_index": 2, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Action of furosemide = ascending limb of the loop of Henle<\/div>Furosemide and bumetanide are loop diuretics that act by inhibiting the Na-K-Cl cotransporter in the thick ascending limb of the loop of Henle, reducing the absorption of NaCl."}], "note_html": "The diuretic drugs are divided into three major classes, which are distinguished according to the site at which they impair sodium reabsorption: loop diuretics in the thick ascending loop of Henle, thiazide type diuretics in the distal tubule and connecting segment; and potassium sparing diuretics in the aldosterone - sensitive principal cells in the cortical collecting tubule.<br>In the kidney, sodium is reabsorbed through Na<sup>+<\/sup>/ K<sup>+<\/sup> ATPase pumps located on the basolateral membrane. These pumps return reabsorbed sodium to the circulation and maintain low intracellular sodium levels. This latter effect ensures a constant concentration gradient. <br><br><b>Physiological effects of commonly used diuretics<\/b><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Site of action<\/b><\/th><th><b>Diuretic<\/b><\/th><th><b>Carrier or channel inhibited<\/b><\/th><th><b>Percentage of filtered sodium excreted<\/b><\/th><\/tr><\/thead><tbody><tr><td>Ascending limb of loop of Henle<\/td><td>Frusemide<\/td><td>Na<sup>+<\/sup>/K<sup>+<\/sup> 2Cl <sup>-<\/sup> carrier<\/td><td>Up to 25%<\/td><\/tr><tr><td>Distal tubule and connecting segment<\/td><td>Thiazides<\/td><td>Na<sup>+<\/sup>Cl<sup>-<\/sup> carrier<\/td><td>Between 3 and 5%<\/td><\/tr><tr><td>Cortical collecting tubule<\/td><td>Spironolactone<\/td><td>Na<sup>+<\/sup>/K<sup>+<\/sup> ATP ase pump<\/td><td>Between 1 and 2%<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "ECG features in hypokalemia", "questions": [{"number": 73, "topic": "ECG features in hypokalemia", "stem_html": "A 72-year-old woman is admitted to the acute surgical unit with profuse vomiting. Admission bloods show the following:<br><br><div class=\"table-responsive\"><table class=\"tb\"><tbody><tr><td>Na+<\/td><td>131 mmol/l<\/td><\/tr><tr><td>K+<\/td><td>2.2 mmol/l<\/td><\/tr><tr><td>Urea<\/td><td>3.1 mmol/l<\/td><\/tr><tr><td>Creatinine<\/td><td>56  micro mol/l<\/td><\/tr><tr><td>Glucose<\/td><td>4.3 mmol/l<\/td><\/tr><\/tbody><\/table><\/div><br>Which one of the following ECG features is most likely to be seen?", "options": [{"label_html": "Short PR interval", "is_correct": false}, {"label_html": "Short QT interval", "is_correct": false}, {"label_html": "Flattened P waves", "is_correct": false}, {"label_html": "J waves", "is_correct": false}, {"label_html": "U waves", "is_correct": true}], "correct_index": 4, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Hypokalaemia - U waves on ECG<\/div>J waves are seen in hypothermia whilst delta waves are associated with Wolff Parkinson White syndrome."}], "note_html": "<ul><li>U waves<\/li><li>Small or absent T waves (occasionally inversion)<\/li><li>Prolonged PR interval<\/li><li>ST depression<\/li><li>Long QT interval<\/li><\/ul><br>One registered user suggests the following rhyme!<br><ul><li>In Hypokalaemia, U have no Pot and no T, but a long PR and a long QT!<\/li><\/ul>"}, {"name": "Electrical activity of the heart", "questions": [{"number": 74, "topic": "Electrical activity of the heart", "stem_html": "Which of the following is responsible for the rapid depolarisation phase of the myocardial action potential?", "options": [{"label_html": "Rapid sodium influx", "is_correct": true}, {"label_html": "Rapid sodium efflux", "is_correct": false}, {"label_html": "Slow efflux of calcium", "is_correct": false}, {"label_html": "Efflux of potassium", "is_correct": false}, {"label_html": "Rapid calcium influx", "is_correct": false}], "correct_index": 0, "explanation_html": "<p>No explanation provided.<\/p>"}], "note_html": "<b>Myocardial action potential<\/b><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Phase<\/b><\/th><th><b>Description<\/b><\/th><th><b>Mechanism<\/b><\/th><\/tr><\/thead><tbody><tr><td>0<\/td><td>Rapid depolarisation<\/td><td>Rapid sodium influx<br>These channels automatically deactivate after a few ms<\/td><\/tr><tr><td>1<\/td><td>Early repolarisation<\/td><td>Efflux of potassium<\/td><\/tr><tr><td>2<\/td><td>Plateau<\/td><td>Slow influx of calcium<\/td><\/tr><tr><td>3<\/td><td>Final repolarisation<\/td><td>Efflux of potassium<\/td><\/tr><tr><td>4<\/td><td>Restoration of ionic concentrations<\/td><td>Resting potential is restored by Na<sup>+<\/sup>/K<sup>+<\/sup> ATPase<br>There is slow entry of Na<sup>+<\/sup> into the cell decreasing the potential difference until the threshold potential is reached, triggering a new action potential<\/td><\/tr><\/tbody><\/table><\/div><br>NB cardiac muscle remains contracted 10-15 times longer than skeletal muscle<br><br><b>Conduction velocity<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td>Atrial conduction<\/td><td>Spreads along ordinary atrial myocardial fibres at 1 m/sec<\/td><\/tr><tr><td>AV node conduction<\/td><td>0.05 m/sec<\/td><\/tr><tr><td>Ventricular conduction<\/td><td>Purkinje fibres are of large diameter and achieve velocities of 2-4 m/sec (this allows a rapid and coordinated contraction of the ventricles<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Ferritin", "questions": [{"number": 75, "topic": "Ferritin", "stem_html": "A 73 year old female is referred to the surgical clinic with an iron deficiency anaemia. As part of the diagnostic work up the doctor requests a serum ferritin level. Which of the conditions listed is most likely to lead to a falsely elevated result?", "options": [{"label_html": "Locally perforated sigmoid colonic adenocarcinoma", "is_correct": true}, {"label_html": "Colonic angiodysplasia", "is_correct": false}, {"label_html": "Dieulafoy lesion of the stomach", "is_correct": false}, {"label_html": "Transitional cell carcinoma of the bladder", "is_correct": false}, {"label_html": "Endometrial adenocarcinoma", "is_correct": false}], "correct_index": 0, "explanation_html": "A locally perforated colonic tumour will typically cause an intense inflammatory response and if peritonitis is not present clinically then at the very least a localised abscess. This inflammatory process is the most likely (from the list) to falsely raise the serum ferritin level. Angiodysplasia and dieulafoy lesions are mucosal arteriovenous malformations and unlikely to result in considerable inflammatory activity."}], "note_html": "Ferritin is an intracellular protein that binds iron and stores it to be released in a controlled fashion at sites where iron is required. Because iron and ferritin are bound the total body ferritin levels may be decreased in cases of iron deficiency anaemia. Measurement of serum ferritin levels can be useful in determining whether an apparently low haemoglobin and microcytosis is truly caused by an iron deficiency state.<br>Ferritin is an acute phase protein and may be synthesised in increased quantities in situations where inflammatory activity is ongoing. Falsely elevated results may therefore be encountered clinically and need to be taken in context of the clinical picture and full blood count results."}, {"name": "Flow volume loop", "questions": [{"number": 76, "topic": "Flow volume loop", "stem_html": "A 74-year-old woman with thyroid cancer is admitted due to shortness of breath. What is the best investigation to assess for possible compression of the upper airways?", "options": [{"label_html": "Arterial blood gases", "is_correct": false}, {"label_html": "Forced vital capacity", "is_correct": false}, {"label_html": "Transfer factor", "is_correct": false}, {"label_html": "Peak expiratory flow rate", "is_correct": false}, {"label_html": "Flow volume loop", "is_correct": true}], "correct_index": 4, "explanation_html": "Flow volume loop is the best investigation to assess for possible compression of the upper airways. It is a graphical representation of the rate and volume of air flow during inhalation and exhalation, which can reveal any obstruction or narrowing of the airways. In the case of upper airway compression, the flow volume loop will show a flattened expiratory curve and decreased peak expiratory flow rate. Arterial blood gases, forced vital capacity, and transfer factor are not useful in assessing upper airway compression."}], "note_html": "A normal flow volume loop is often described as a 'triangle on top of a semi circle'<br><br>Flow volume loops are the most suitable way of assessing compression of the upper airway"}, {"name": "Fluid compartment physiology", "questions": [{"number": 77, "topic": "Fluid compartment physiology", "stem_html": "In a 70 Kg male, what proportion of total body fluid will be contributed by plasma?", "options": [{"label_html": "50%", "is_correct": false}, {"label_html": "5%", "is_correct": true}, {"label_html": "35%", "is_correct": false}, {"label_html": "65%", "is_correct": false}, {"label_html": "25%", "is_correct": false}], "correct_index": 1, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">70 Kg male = 42 L water (60% of total body weight)<\/div>"}, {"number": 78, "topic": "Fluid compartment physiology", "stem_html": "Which of the following statements relating the fluid physiology of a physiologically normal 70 Kg adult male is false?", "options": [{"label_html": "He will have more water per unit of body weight than a female of similar weight", "is_correct": false}, {"label_html": "Plasma will comprise 25% of his body weight", "is_correct": true}, {"label_html": "Interstitial fluid will account for up to 24% of body water", "is_correct": false}, {"label_html": "Approximately 65% of total body water is intracellular", "is_correct": false}, {"label_html": "60% of his body weight is composed of water", "is_correct": false}], "correct_index": 1, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">The 60-40-20 rule:<br>60% total body weight is water<br>40% of total body weight is intracellular fluids<br>20% of body weight is extracellular fluids<\/div>Plasma typically accounts for 4-6% of body weight in healthy individuals.<br>Males typically have more water per unit weight than females, as females have a higher fat content."}], "note_html": "Body fluid compartments comprise intracellular and extracellular compartments. The latter includes interstitial fluid, plasma and transcellular fluid. <br>Typical figures are based on the 70 Kg male. <br><br><b>Body fluid volumes<\/b><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Compartment<\/b><\/th><th><b>Volume in litres<\/b><\/th><th><b>Percentage of total volume<\/b><\/th><\/tr><\/thead><tbody><tr><td>Intracellular<\/td><td>28 L<\/td><td>60-65%<\/td><\/tr><tr><td>Extracellular<\/td><td>14 L<\/td><td>35-40%<\/td><\/tr><tr><td><i>Plasma<\/i><\/td><td>3 L<\/td><td>5%<\/td><\/tr><tr><td><i>Interstitial<\/i><\/td><td>10 L<\/td><td>24%<\/td><\/tr><tr><td><i>Transcellular<\/i><\/td><td>1 L<\/td><td>3%<\/td><\/tr><\/tbody><\/table><\/div><i>Figures are approximate<\/i>"}, {"name": "Gastric secretions", "questions": [{"number": 79, "topic": "Gastric secretions", "stem_html": "A 34 year old man presents with a peptic ulcer. Which of the following is responsible for the release of gastric acid?", "options": [{"label_html": "Chief cells", "is_correct": false}, {"label_html": "Parietal cells", "is_correct": true}, {"label_html": "Brunners Glands", "is_correct": false}, {"label_html": "G Cells", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 1, "explanation_html": "Parietal cells are responsible for the release of gastric acid. Brunners glands are found in the duodenum."}, {"number": 80, "topic": "Gastric secretions", "stem_html": "Which of the following is not secreted by the parietal cells?", "options": [{"label_html": "Hydrochloric acid", "is_correct": false}, {"label_html": "Mucus", "is_correct": true}, {"label_html": "Magnesium", "is_correct": false}, {"label_html": "Intrinsic factor", "is_correct": false}, {"label_html": "Calcium", "is_correct": false}], "correct_index": 1, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Chief of Pepsi cola = Chief cells secrete PEPSInogen<\/div>Parietal cells: secrete HCl, Ca, Na, Mg and intrinsic factor<br>Chief cells: secrete pepsinogen<br>Surface mucosal cells: secrete mucus and bicarbonate"}, {"number": 81, "topic": "Gastric secretions", "stem_html": "Which of the following inhibits gastric acid secretion?", "options": [{"label_html": "Histamine", "is_correct": false}, {"label_html": "Nausea", "is_correct": true}, {"label_html": "Calcium", "is_correct": false}, {"label_html": "Parasympathetic vagal stimulation", "is_correct": false}, {"label_html": "Gastrin", "is_correct": false}], "correct_index": 1, "explanation_html": "Nausea inhibits gastric secretion via higher cerebral activity and sympathetic innervation."}, {"number": 82, "topic": "Gastric secretions", "stem_html": "A 43 year old man has a nasogastric tube inserted. The nurse takes a small aspirate of the fluid from the stomach and tests the pH of the aspirate. What is the normal intragastric pH?", "options": [{"label_html": "0.5", "is_correct": false}, {"label_html": "2", "is_correct": true}, {"label_html": "4", "is_correct": false}, {"label_html": "5", "is_correct": false}, {"label_html": "6", "is_correct": false}], "correct_index": 1, "explanation_html": "The intragastric pH is usually 2. Administration of proton pump inhibitors can result in almost complete abolition of acidity"}, {"number": 83, "topic": "Gastric secretions", "stem_html": "Which of the following is not an effect of cholecystokinin?", "options": [{"label_html": "It causes gallbladder contraction", "is_correct": false}, {"label_html": "It increases the rate of gastric emptying", "is_correct": true}, {"label_html": "It relaxes the sphincter of oddi", "is_correct": false}, {"label_html": "It stimulates pancreatic acinar cells", "is_correct": false}, {"label_html": "It has a trophic effect on pancreatic acinar cells", "is_correct": false}], "correct_index": 1, "explanation_html": "It decreases the rate of gastric emptying."}, {"number": 84, "topic": "Gastric secretions", "stem_html": "Which of the following is not an effect of somatostatin?", "options": [{"label_html": "It stimulates pancreatic acinar cells to release lipase", "is_correct": true}, {"label_html": "It decreases gastric acid secretion", "is_correct": false}, {"label_html": "It decreases gastrin release", "is_correct": false}, {"label_html": "It decreases pepsin secretion", "is_correct": false}, {"label_html": "It decreases glucagon release", "is_correct": false}], "correct_index": 0, "explanation_html": "It inhibits pancreatic enzyme secretion."}, {"number": 85, "topic": "Gastric secretions", "stem_html": "Which of the following statements relating to gastric acid secretions are untrue?", "options": [{"label_html": "In parietal cells carbonic anhydrase generates hydrogen ions which are then actively secreted", "is_correct": false}, {"label_html": "The  cephalic phase is abolished following truncal vagotomy", "is_correct": false}, {"label_html": "The intestinal phase accounts for 60% of gastric acid produced", "is_correct": true}, {"label_html": "Histamine acts in a paracrine manner on H<sub>2<\/sub> receptors", "is_correct": false}, {"label_html": "H<sub>2<\/sub> receptor antagonists will not completely abolish gastric acid production", "is_correct": false}], "correct_index": 2, "explanation_html": "The intestinal phase of gastric acid secretion accounts for only 10% of gastric acid produced."}], "note_html": "A working knowledge of gastric secretions is important for surgery because peptic ulcers are common, surgeons frequently prescribe anti secretory drugs and because there are still patients around who will have undergone acid lowering procedures (Vagotomy) in the past.<br><br><b>Gastric acid<\/b><br><ul><li>Is produced by the parietal cells in the stomach<\/li><li>pH of gastric acid is around 2 with acidity being maintained by the H<sup>+<\/sup>/K<sup>+<\/sup> ATP ase pump. As part of the process bicarbonate ions will be secreted into the surrounding vessels. <\/li><li>Sodium and chloride ions are actively secreted from the parietal cell into the canaliculus. This sets up a negative potential across the membrane and as a result sodium and potassium ions diffuse across into the canaliculus.<\/li><li>Carbonic anhydrase forms carbonic acid which dissociates and the hydrogen ions formed by dissociation leave the cell via the H<sup>+<\/sup>/K<sup>+<\/sup> antiporter pump. At the same time sodium ions are actively absorbed. This leaves hydrogen and chloride ions in the canaliculus these mix and are secreted into the lumen of the oxyntic gland.<\/li><\/ul><br>This is illustrated diagrammatically below:<br><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb028b.jpg\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb028.jpg\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Gastric acid\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb028b.jpg\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center><br><b>Phases of gastric acid secretion<\/b><br>There are 3 phases of gastric secretion:<br>  <br>1. Cephalic phase (smell / taste of food)<br><ul><li>30% acid produced<\/li><li>Vagal cholinergic stimulation causing secretion of HCL and gastrin release from G cells<\/li><\/ul><br>2. Gastric phase (distension of stomach )<br><ul><li>60%  acid produced<\/li><li>Stomach distension/low H<sup>+<\/sup>/peptides causes Gastrin release<\/li><\/ul><br>3. Intestinal phase (food in duodenum)<br><ul><li>10% acid produced<\/li><li>High acidity/distension/hypertonic solutions in the duodenum inhibits gastric acid secretion via enterogastrones (CCK, secretin) and neural reflexes.<\/li><\/ul><br><b>Regulation of gastric acid production<\/b><br>Factors increasing production include:<br><ul><li>Vagal nerve stimulation<\/li><li>Gastrin release<\/li><li>Histamine release (indirectly following gastrin release) from enterchromaffin like cells<\/li><\/ul><br>Factors decreasing production include:<br><ul><li>Somatostatin (inhibits histamine release)<\/li><li>Cholecystokinin<\/li><li>Secretin<\/li><\/ul><br>The diagram below illustrates some of the factors involved in regulating gastric acid secretion and the relevant associated pharmacology<br><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb029b.jpg\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb029.jpg\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Gastric acid\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb029b.jpg\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center><br><br>Below is a brief summary of the major hormones involved in food digestion:<br><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><\/th><th><b>Source<\/b><\/th><th><b>Stimulus<\/b><\/th><th><b>Actions<\/b><\/th><\/tr><\/thead><tbody><tr><td><b>Gastrin<\/b><br><\/td><td>G cells in antrum of the stomach<br><\/td><td>Distension of stomach, extrinsic nerves<br>Inhibited by: low antral pH, somatostatin<br><\/td><td>Increase HCL, pepsinogen and IF secretion, increases gastric motility, trophic effect on gastric mucosa<\/td><\/tr><tr><td><b>CCK<\/b><br><\/td><td>I cells in upper small intestine<br><\/td><td>Partially digested proteins and triglycerides<br><\/td><td>Increases secretion of enzyme-rich fluid from pancreas, contraction of gallbladder and relaxation of sphincter of Oddi, decreases gastric emptying, trophic effect on pancreatic acinar cells, induces satiety<\/td><\/tr><tr><td><b>Secretin<\/b><br><\/td><td>S cells in upper small intestine<br><\/td><td>Acidic chyme, fatty acids<br><\/td><td>Increases secretion of bicarbonate-rich fluid from pancreas and hepatic duct cells, decreases gastric acid secretion, trophic effect on pancreatic acinar cells<\/td><\/tr><tr><td><b>VIP<\/b><br><\/td><td>Small intestine, pancreas<br><\/td><td>Neural<br><\/td><td>Stimulates secretion by pancreas and intestines, inhibits acid and pepsinogen secretion<\/td><\/tr><tr><td><b>Somatostatin<\/b><br><\/td><td>D cells in the pancreas and stomach<br><\/td><td>Fat, bile salts and glucose in the intestinal lumen<br><\/td><td>Decreases acid and pepsin secretion, decreases gastrin secretion, decreases pancreatic enzyme secretion, decreases insulin and glucagon secretion<br>inhibits trophic effects of gastrin, stimulates gastric mucous production<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Gastrointestinal secretions", "questions": [{"number": 86, "topic": "Gastrointestinal secretions", "stem_html": "A 63 year old man receives an infusion of octreotide. Secretions from which of the structures listed below will be reduced most as a result?", "options": [{"label_html": "Parotid gland", "is_correct": false}, {"label_html": "Submandibular gland", "is_correct": false}, {"label_html": "Jejunum", "is_correct": false}, {"label_html": "Ileum", "is_correct": false}, {"label_html": "Pancreas", "is_correct": true}], "correct_index": 4, "explanation_html": "Pancreatic secretions are under the control of somatostatin and octreotide can be used therapeutically to modulate these in selected cases."}, {"number": 87, "topic": "Gastrointestinal secretions", "stem_html": "Osmolality of the lumenal contents has the greatest effect on secretions from which of the structures listed below?", "options": [{"label_html": "Pancreas", "is_correct": false}, {"label_html": "Gallbladder", "is_correct": false}, {"label_html": "Jejunum", "is_correct": true}, {"label_html": "Parotid gland", "is_correct": false}, {"label_html": "Sub lingual gland", "is_correct": false}], "correct_index": 2, "explanation_html": "The secretions of the proximal small bowel are hugely and directly affected by lumenal content osmolality. This can contribute to some of the symptoms of dumping syndrome that can be seen following gastric surgery."}, {"number": 88, "topic": "Gastrointestinal secretions", "stem_html": "In a biopsy taken from the gastro intestinal tract, where is a Paneth cell most likely to be identified?", "options": [{"label_html": "Intestinal villi", "is_correct": false}, {"label_html": "Crypt of Lieberkuhn", "is_correct": true}, {"label_html": "Gastric antrum", "is_correct": false}, {"label_html": "Lamina propria", "is_correct": false}, {"label_html": "Gastric fundus", "is_correct": false}], "correct_index": 1, "explanation_html": "Paneth cells are secretory cells located in the crypts of Lieberkuhn. They are an important contributor to the gut microbiome and have roles in host defence and immunity."}], "note_html": "Up to 7 litres of gastrointestinal secretions enter the lumen of the GI tract in a 24 hour period. The absorptive function of the small bowel is such that by the time a formed stool is created, it will contain, on average 200ml water.<br>The common secretions together with their approximate volumes are demonstrated below:<br><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Origin of secretion<\/b><\/th><th><b>Volume in ml / 24 hour period<\/b><\/th><th><b>Na <sup>+<\/sup> mmol/L<\/b><\/th><th><b>K<sup>+<\/sup> mmol/L<\/b><\/th><th><b>Cl<sup>-<\/sup>mmol/L<\/b><\/th><th><b>HCO<sub>3<\/sub><\/b><\/th><\/tr><\/thead><tbody><tr><td>Salivary glands<\/td><td>1500<\/td><td>10<\/td><td>26<\/td><td>10<\/td><td>30<\/td><\/tr><tr><td>Stomach<\/td><td>1500<\/td><td>60<\/td><td>10<\/td><td>130<\/td><td><\/td><\/tr><tr><td>Duodenum<\/td><td>100-2000<\/td><td>140<\/td><td>80<\/td><td>80<\/td><td><\/td><\/tr><tr><td>Pancreas<\/td><td>1000<\/td><td>140<\/td><td>5<\/td><td>70<\/td><td>115<\/td><\/tr><tr><td>Bile<\/td><td>50-800<\/td><td>145<\/td><td>5<\/td><td>100<\/td><td>35<\/td><\/tr><tr><td>Jejunum/ileum<\/td><td>3000<\/td><td>140<\/td><td>10<\/td><td>104<\/td><td>30<\/td><\/tr><tr><td>Colon<\/td><td>100<\/td><td>60<\/td><td>30<\/td><td>40<\/td><td><\/td><\/tr><\/tbody><\/table><\/div><br>The regulation of these secretions is dependent upon location. In the salivary glands a complex interaction of flow rate governed by the autonomic nervous system. The exact composition of sodium and potassium is regulated by aldosterone. In the stomach hormones such as gastrin play a role and feedback is both endocrine and neurologically mediated (vagus). In the duodenum CCK is released in response to duodenal distension and this causes contraction of the gallbladder and release of bile. <br><br>Pancreatic secretions are affected by somatostatin. The secretions in the small bowel are affected by the osmolality of the lumenal contents. This is in part due to the tightness of cellular junctions and in this regard the jejunum is more permeable than the ileum. The practical implication of this is that if an individual has an extensive intestinal resection and a high output, proximally sited stoma then administration of hypotonic rather than isotonic solutions will result in worsening of electrolyte disturbances as electrolyte rich secretions will enter the jejunum. <br><br>In some individuals a colectomy or similar procedure results in formation of an end or loop ileostomy. Ileostomies typically lose between 500 and 1000ml over a 24 hour period and patients with high output ileostomies can rapidly become dehydrated. Ileostomy effluent typically contains 126mmol/L of sodium and 22mmol/L of potassium. Knowledge of this fluid composition should guide fluid prescribing in replacing losses."}, {"name": "Glucagon", "questions": [{"number": 89, "topic": "Glucagon", "stem_html": "Which of the following statements is true of glucagon?", "options": [{"label_html": "Glucagon is produced in response to hyperglycaemia", "is_correct": false}, {"label_html": "Released by beta cells", "is_correct": false}, {"label_html": "Inhibits gluconeogenesis", "is_correct": false}, {"label_html": "Produced in response to an increase of amino acids", "is_correct": true}, {"label_html": "Composed of 2 alpha polypeptide chains linked by hydrogen bonds", "is_correct": false}], "correct_index": 3, "explanation_html": "Glucagon is a protein comprised of a single polypeptide chain.<br>Produced by alpha cells of pancreatic islets of Langerhans in response to hypoglycaemia and amino acids.<br>It increases plasma glucose and ketones."}], "note_html": "Glucagon, the hormonal antagonist to insulin, is released from the alpha cells of the Islets of Langerhans in the pancreas. It will result in an increased plasma glucose level.<br><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Stimulation<\/b><\/td><td><b>Inhibition<\/b><\/td><\/tr><tr><td>Decreased plasma glucose<\/td><td>Somatostatin<\/td><\/tr><tr><td>Increased catecholamines<\/td><td>Insulin<\/td><\/tr><tr><td>Increased plasma amino acids<\/td><td>Increased free fatty acids and keto acids<\/td><\/tr><tr><td>Sympathetic nervous system<\/td><td>Increased urea<\/td><\/tr><tr><td>Acetylcholine<\/td><\/tr><tr><td>Cholecystokinin<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Hormonal control of gastric acid secretion", "questions": [{"number": 90, "topic": "Hormonal control of gastric acid secretion", "stem_html": "Which of the following stimulates gastric acid secretion?", "options": [{"label_html": "Cholecystokinin", "is_correct": false}, {"label_html": "Gastric inhibitory peptide", "is_correct": false}, {"label_html": "Secretin", "is_correct": false}, {"label_html": "Histamine", "is_correct": true}, {"label_html": "Somatostatin", "is_correct": false}], "correct_index": 3, "explanation_html": "<b>Gastrin<\/b>: From G cells: stimulates gastric acid production<br><br><b>Pepsin<\/b>: Digestion of protein, secretion occurs simultaneously with gastrin <br><br><b>Secretin<\/b>: From mucosal cells in the duodenum and jejunum: inhibits gastric acid, stimulates bile and pancreatic juice production<br><br><b>Gastric inhibitory peptide<\/b>:  (produced in response to fatty acids) inhibits gastrin release and acid secretion from parietal cells<br><br><b>Cholecystokinin<\/b>: From mucosal cells in the duodenum and jejunum (produced in response to fatty acids) inhibits acid secretion from parietal cells, causes gallbladder contraction and relaxation of sphincter of Oddi<br><br><b>Somatostatin<\/b>: From D cells<br><br>Histamine released from enterochromaffin like cells then stimulates the acid-making cells (parietal cells) in a paracrine manner to increase gastric acid production."}, {"number": 91, "topic": "Hormonal control of gastric acid secretion", "stem_html": "A 63 year old man undergoes a distal gastrectomy. Which of the hormones listed below will be released in decreased quantities following surgery?", "options": [{"label_html": "Gastrin", "is_correct": true}, {"label_html": "Cholecystokinin", "is_correct": false}, {"label_html": "Secretin", "is_correct": false}, {"label_html": "Vasoactive intestinal peptide", "is_correct": false}, {"label_html": "Somatostatin", "is_correct": false}], "correct_index": 0, "explanation_html": "Gastrin is released from the gastric antrum and therefore, if this is removed (as it is in a distal gastrectomy), gastrin levels decline. All the other substances listed are released either from the small bowel, pancreas or both."}, {"number": 92, "topic": "Hormonal control of gastric acid secretion", "stem_html": "A 56 year old man underwent a truncal vagotomy operation many years ago. The direct release of which of these hormones will be most affected as a result?", "options": [{"label_html": "Cholecystokinin", "is_correct": false}, {"label_html": "Secretin", "is_correct": false}, {"label_html": "Motilin", "is_correct": false}, {"label_html": "Glucose-dependent insulinotropic peptide", "is_correct": false}, {"label_html": "Gastrin", "is_correct": true}], "correct_index": 4, "explanation_html": "Motilin is released by the small bowel in response to alkaline contents in the duodenum/ jejunum and increases the migrating motor complexes in the small bowel<br>Cholecystokinin, secretin and GIP are all released in response to changes in the luminal contents. Gastrin is released from G cells and whilst the luminal contents affect its release, it is also directly released in response to vagal stimuli."}], "note_html": "<div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><\/td><td><b>Source<\/b><\/td><td><b>Stimulus<\/b><\/td><td><b>Actions<\/b><\/td><\/tr><tr><td><b>Gastrin<\/b><br><\/td><td>G cells in antrum of the stomach<br><\/td><td>Distension of stomach, extrinsic nerves<br>Inhibited by: low antral pH, somatostatin<br><\/td><td>Increase HCL, pepsinogen and IF secretion, increases gastric motility, trophic effect on gastric mucosa<\/td><\/tr><tr><td><b>CCK<\/b><br><\/td><td>I cells in upper small intestine<br><\/td><td>Partially digested proteins and triglycerides<br><\/td><td>Increases secretion of enzyme-rich fluid from pancreas, contraction of gallbladder and relaxation of sphincter of Oddi, decreases gastric emptying, trophic effect on pancreatic acinar cells, induces satiety<\/td><\/tr><tr><td><b>Secretin<\/b><br><\/td><td>S cells in upper small intestine<br><\/td><td>Acidic chyme, fatty acids<br><\/td><td>Increases secretion of bicarbonate-rich fluid from pancreas and hepatic duct cells, decreases gastric acid secretion, trophic effect on pancreatic acinar cells<\/td><\/tr><tr><td><b>VIP<\/b><br><\/td><td>Small intestine, pancreas<br><\/td><td>Neural<br><\/td><td>Stimulates secretion by pancreas and intestines, inhibits acid and pepsinogen secretion<\/td><\/tr><tr><td><b>Somatostatin<\/b><br><\/td><td>D cells in the pancreas and stomach<br><\/td><td>Fat, bile salts and glucose in the intestinal lumen<br><\/td><td>Decreases acid and pepsin secretion, decreases gastrin secretion, decreases pancreatic enzyme secretion, decreases insulin and glucagon secretion<br>inhibits trophic effects of gastrin, stimulates gastric mucous production<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Hypercalcaemia", "questions": [{"number": 93, "topic": "Hypercalcaemia", "stem_html": "What is the most common cause of hypercalcaemia in the UK in hospitalised patients?", "options": [{"label_html": "Thiazide use", "is_correct": false}, {"label_html": "Metastatic malignancy", "is_correct": true}, {"label_html": "Primary hyperparathyroidism", "is_correct": false}, {"label_html": "Osteogenic sarcoma", "is_correct": false}, {"label_html": "Sarcoidosis", "is_correct": false}], "correct_index": 1, "explanation_html": "Metastatic cancer accounts for most cases of hypercalcaemia in hospitalised patients. In the community primary hyperparathyroidism is the commonest cause."}, {"number": 94, "topic": "Hypercalcaemia", "stem_html": "A 70 year old lady with metastatic breast cancer is admitted to hospital confused and acutely unwell, with nausea and vomiting. Her vital signs are within normal limits. What abnormality is most likely to contribute to her clinical condition?", "options": [{"label_html": "Hyponatraemia", "is_correct": false}, {"label_html": "Hypernatraemia", "is_correct": false}, {"label_html": "Hypocalcaemia", "is_correct": false}, {"label_html": "Hypercalcaemia", "is_correct": true}, {"label_html": "Hyperkalaemia", "is_correct": false}], "correct_index": 3, "explanation_html": "The commonest site of metastatic breast cancer is to a bony site (often the axial skeleton) and so hypercalcaemia is often present in those with metastatic disease who are acutely unwell."}, {"number": 95, "topic": "Hypercalcaemia", "stem_html": "Which of the following is least likely to be associated with hypercalcaemia?", "options": [{"label_html": "Thiazides", "is_correct": false}, {"label_html": "Antacids", "is_correct": false}, {"label_html": "Coeliac disease", "is_correct": true}, {"label_html": "Sarcoidosis", "is_correct": false}, {"label_html": "Zolinger-Ellison syndrome", "is_correct": false}], "correct_index": 2, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Mnemonic for the causes of hypercalcaemia:<br><br><b>CHIMPANZEES<\/b><br><br><b>C<\/b> alcium supplementation<br><b>H<\/b> yperparathyroidism<br><b>I<\/b> atrogentic (Drugs: Thiazides)<br><b>M<\/b> ilk Alkali syndrome<br><b>P<\/b> aget disease of the bone<br><b>A<\/b> cromegaly and Addison's Disease<br><b>N<\/b> eoplasia <br><b>Z<\/b> olinger-Ellison Syndrome (MEN Type I)<br><b>E<\/b> xcessive Vitamin D<br><b>E<\/b> xcessive Vitamin A<br><b>S<\/b> arcoidosis<\/div>Patients with coeliac disease tend to develop hypocalcaemia due to malabsorption of calcium by the bowel."}], "note_html": "<b>Main causes<\/b><br><ul><li>Malignancy (most common cause in hospital in-patients)<\/li><li>Primary hyperparathyroidism (commonest cause in non hospitalised patients)<\/li><\/ul><br><b>Less common<\/b><br><ul><li>Sarcoidosis (extrarenal synthesis of calcitriol )<\/li><li>Thiazides, lithium<\/li><li>Immobilisation<\/li><li>Pagets disease<\/li><li>Vitamin A/D toxicity<\/li><li>Thyrotoxicosis<\/li><li>MEN<\/li><li>Milk alkali syndrome<\/li><\/ul><br><b>Clinical features<\/b><br><i>Stones, bones, abdominal groans, and psychic moans<\/i><br>High serum calcium levels result in decreased neuronal excitability. Therefore sluggish reflexes, muscle weakness and constipation may occur."}, {"name": "Hyperkalaemia", "questions": [{"number": 96, "topic": "Hyperkalaemia", "stem_html": "Which of the following does not cause hyperkalaemia?", "options": [{"label_html": "Haemolysis", "is_correct": false}, {"label_html": "Burns", "is_correct": false}, {"label_html": "Familial periodic paralysis", "is_correct": false}, {"label_html": "Type 4 renal tubular acidosis", "is_correct": false}, {"label_html": "Severe malnutrition", "is_correct": true}], "correct_index": 4, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\"> 'Machine' - Causes of Increased Serum K<sup>+<\/sup><br><br>M - Medications - ACE inhibitors, NSAIDS<br>A - Acidosis - Metabolic and respiratory<br>C - Cellular destruction - Burns, traumatic injury<br>H - Hypoaldos
