ivided into the epithelial sodium channel blockers (amiloride and triamterene) and aldosterone antagonists (spironolactone and eplerenone).<br><br><b>Amiloride<\/b> is a weak diuretic which blocks the epithelial sodium channel in the distal convoluted tubule.<br><br>Usually given with thiazides or loop diuretics as an alternative to potassium supplementation.<br><br><b>Spironolactone<\/b> is an aldosterone antagonist which acts at in the distal convoluted tubule.<br><br>Indications<br><ul><li>ascites: patients with cirrhosis develop a secondary hyperaldosteronism. Relatively large doses such as 100 or 200mg are often used<\/li><li>heart failure<\/li><li>nephrotic syndrome<\/li><li>Conn's syndrome<\/li><\/ul>"}, {"name": "Prolactin", "questions": [{"number": 151, "topic": "Prolactin", "stem_html": "Which of the following stimulates prolactin release or action?", "options": [{"label_html": "Leutinising hormone", "is_correct": false}, {"label_html": "Dopamine", "is_correct": false}, {"label_html": "Thyrotropin releasing hormone", "is_correct": true}, {"label_html": "Oestrogen", "is_correct": false}, {"label_html": "Follicle stimulating hormone", "is_correct": false}], "correct_index": 2, "explanation_html": "TRH stimulates prolactin release. Dopamine suppresses the release of prolactin."}], "note_html": "Prolactin is a peptide hormone released from the anterior pituitary. It is under tonic dopamine inhibition, thyrotropin releasing hormone has a stimulatory effect on release. Prolactin release stimulates milk production but also reduces gonadal activity. It decreases GnRH pulsatility at the hypothalamic level and to a lesser extent, blocks the action of LH on the ovary or testis."}, {"name": "Renal Physiology", "questions": [{"number": 152, "topic": "Renal Physiology", "stem_html": "A 32 year old man has a glomerular filtration rate of 110ml / minute at a systolic blood pressure of 120/80. If his blood pressure were to fall to 100/70 what would glomerular filtration rate be?", "options": [{"label_html": "110ml / minute", "is_correct": true}, {"label_html": "100ml/ minute", "is_correct": false}, {"label_html": "55ml/ minute", "is_correct": false}, {"label_html": "25ml/ minute", "is_correct": false}, {"label_html": "75ml/ minute", "is_correct": false}], "correct_index": 0, "explanation_html": "The proposed drop in blood pressure falls within the range within which the kidney autoregulates its blood supply. GFR will therefore remain unchanged."}, {"number": 153, "topic": "Renal Physiology", "stem_html": "A 23 year old is stabbed in the groin and develops hypovolaemic shock. What is the most likely finding on analysis of his urine?", "options": [{"label_html": "Decreased specific gravity", "is_correct": false}, {"label_html": "Increased specific gravity", "is_correct": true}, {"label_html": "Increased urinary glucose", "is_correct": false}, {"label_html": "Increased urinary protein", "is_correct": false}, {"label_html": "Increased red blood cells in the urine", "is_correct": false}], "correct_index": 1, "explanation_html": "Hypovolaemic shock is likely to compromise renal blood flow especially if blood pressure falls below the range at which the kidney is able to autoregulate its blood flow. The result of this will be an increase of the specific gravity as water retention occurs in an attempt to maintain circulating volume."}, {"number": 154, "topic": "Renal Physiology", "stem_html": "A 63 year old man is recovering from an elective laparoscopic splenectomy. In the past 24 hours, he has received a total of 3 litres of intravenous 5% dextrose. What will be the most likely observation?", "options": [{"label_html": "Hypotension", "is_correct": false}, {"label_html": "Oliguria", "is_correct": false}, {"label_html": "Raised jugular venous pressure", "is_correct": false}, {"label_html": "Elevated urine osmolality", "is_correct": false}, {"label_html": "Reduced urine osmolality", "is_correct": true}], "correct_index": 4, "explanation_html": "As 5% dextrose is the physiological equivalence of administering water, excessive administration results in reduced urinary osmolality."}, {"number": 155, "topic": "Renal Physiology", "stem_html": "What is the most important urinary acid base buffer?", "options": [{"label_html": "Albumin", "is_correct": false}, {"label_html": "Phosphate", "is_correct": true}, {"label_html": "Nitrate", "is_correct": false}, {"label_html": "Bicarbonate", "is_correct": false}, {"label_html": "Aspartime", "is_correct": false}], "correct_index": 1, "explanation_html": "Phosphate is the most important urinary buffer. Its concentration is raised relative to that of plasma. While phosphate is a minor extracellular buffer, under ordinary circumstances it is the single most important urinary buffer. Since, pH of urine is commonly close to the pK of the phosphate buffer pair, it functions as an ideal urinary buffer. Proteins cannot act as urinary buffers as they are not filtered."}, {"number": 156, "topic": "Renal Physiology", "stem_html": "Which substance can be used to achieve the most accurate measurement of the glomerular filtration rate?", "options": [{"label_html": "Glucose", "is_correct": false}, {"label_html": "Protein", "is_correct": false}, {"label_html": "Inulin", "is_correct": true}, {"label_html": "Creatinine", "is_correct": false}, {"label_html": "Para-amino hippuric acid", "is_correct": false}], "correct_index": 2, "explanation_html": "Creatinine declines with age due to decline in renal function and muscle mass.  Glucose, protein (amino acids) and PAH are reabsorbed by the kidney."}, {"number": 157, "topic": "Renal Physiology", "stem_html": "What is measured to obtain renal plasma flow?", "options": [{"label_html": "Creatinine", "is_correct": false}, {"label_html": "Para-amino hippuric acid (PAH)", "is_correct": true}, {"label_html": "Inulin", "is_correct": false}, {"label_html": "Glucose", "is_correct": false}, {"label_html": "Protein", "is_correct": false}], "correct_index": 1, "explanation_html": "Renal plasma flow = (amount of PAH in urine per unit time) / (difference in  PAH concentration in the renal artery or vein)<br><br>Normal value = 660ml/min"}, {"number": 158, "topic": "Renal Physiology", "stem_html": "Which of the following statements relating to the regulation of renal blood flow is untrue?", "options": [{"label_html": "In a healthy 70Kg male, the glomerular filtration rate will be the same at a systolic blood pressure of 120mmHg as a systolic blood pressure of 95 mmHg", "is_correct": false}, {"label_html": "Over 90% of the blood supply to the kidney is distributed to the cortex", "is_correct": false}, {"label_html": "Both kidneys receives approximately 25% of the total cardiac output at rest", "is_correct": false}, {"label_html": "A decrease in renal perfusion pressure will cause the juxtaglomerular cells to secrete renin", "is_correct": false}, {"label_html": "Systolic blood pressures of less than 65mmHg will cause the mesangial cells to secrete aldosterone", "is_correct": true}], "correct_index": 4, "explanation_html": "The kidney autoregulates its blood supply over a range of systolic blood pressures. Drop in arterial pressure is sensed by the juxtaglomerular cells and renin is released leading to the activation of the renin-angiontensin system. Mesangial cells are contractile cells that are located in the tubule and have no direct endocrine function."}, {"number": 159, "topic": "Renal Physiology", "stem_html": "Which of the following is not a characteristic of the proximal convoluted tubule in the kidney?", "options": [{"label_html": "Up to 95% of filtered amino acids will be reabsorbed at this site", "is_correct": false}, {"label_html": "It is a risk of damage in a patient with compartment syndrome due to a tibial fracture", "is_correct": false}, {"label_html": "It is responsible for absorbing more than 50% of filtered water", "is_correct": false}, {"label_html": "Its secretory function is most effective at low systolic blood pressures (typically less than 100mmHg)", "is_correct": true}, {"label_html": "Glucose is reabsorbed by combined active and passive (facilitated diffusion processes)", "is_correct": false}], "correct_index": 3, "explanation_html": "The proximal convoluted tubule may undergo necrosis in situations such as compartment syndrome. It is responsible for reabsorbing up to two thirds of filtered water. Low systolic blood pressures (below the renal autoregulatory range) are a risk factor for acute tubular necrosis. Within the autoregulatory range the absolute value of systolic BP has little effect. The process of facilitated diffusion of glucose refers to its co-transport with sodium."}, {"number": 160, "topic": "Renal Physiology", "stem_html": "What are the most likely effects of the release of vasopressin from the pituitary?", "options": [{"label_html": "Vasoconstriction of the afferent glomerular arteriole", "is_correct": false}, {"label_html": "Increased permeability of the mesangial cells to glucose", "is_correct": false}, {"label_html": "Reduced permeability of the inner medullary portion of the collecting duct to urea", "is_correct": false}, {"label_html": "Increased secretion of aldosterone from the macula densa", "is_correct": false}, {"label_html": "Increased water permeability of the distal tubule cells of the kidney", "is_correct": true}], "correct_index": 4, "explanation_html": "ADH (vasopressin) results in the insertion of aquaporin channels in apical membrane of the distal tubule and collecting ducts."}], "note_html": "<b>Overview<\/b><br><ul><li>Each nephron is supplied with blood from an afferent arteriole that opens onto the glomerular capillary bed. <\/li><li>Blood then flows to an efferent arteriole, supplying the peritubular capillaries and medullary vasa recta. <\/li><li>The kidney receives up to 25% of resting cardiac output.<\/li><\/ul><br><b>Control of blood flow<\/b><br><ul><li>The kidney is able to autoregulate its blood flow between systolic pressures of 80- 180mmHg so there is little variation in renal blood flow. <\/li><li>This is achieved by myogenic control of arteriolar tone, both sympathetic input and hormonal signals (e.g. renin) are responsible.<\/li><\/ul><br><b>Glomerular structure and function<\/b><br><ul><li>Blood inside the glomerulus has considerable hydrostatic pressure. <\/li><li>The basement membrane has pores that will allow free diffusion of smaller solutes, larger negatively charged molecules such as albumin are unable to cross. <\/li><li>The glomerular filtration rate (GFR) is equal to the concentration of a solute in the urine, times the volume of urine produced per minute, divided by the plasma concentration (assuming that the solute is freely diffused e.g. inulin). <\/li><li>In clinical practice creatinine is used because it is subjected to very little proximal tubular secretion. <\/li><li>Although subject to variability, the typical GFR is 125ml per minute.<\/li><li>Glomerular filtration rate = Total volume of plasma per unit time leaving the capillaries and entering the bowman's capsule<\/li><li>Renal clearance = volume plasma from which a substance is removed per minute by the kidneys<\/li><\/ul><br><b>Substances used to measure GFR have the following features<\/b>:<br>1. Inert<br>2. Free filtration from the plasma at the glomerulus (not protein bound)<br>3. Not absorbed or secreted at the tubules<br>4. Plasma concentration constant during urine collection<br><br>Examples: inulin, creatinine<br><br>GFR = urine concentration (mmol/l) x urine volume (ml/min)<br>           --------------------------------------------------------------------------<br>                              plasma concentration (mmol/l)<br><br><ul><li>The clearance of a substance is dependent not only on its diffusivity across the basement membrane but also subsequent tubular secretion and / or reabsorption. <\/li><li>So glucose which is freely filtered across the basement membrane is usually reabsorbed from tubules giving a clearance of zero.<\/li><\/ul><br><b>Tubular function<\/b><br><ul><li>Reabsorption and secretion of substances occurs in the tubules. <\/li><li>In the proximal tubule substrates such as glucose, amino acids and phosphate are co-transported with sodium across the semi permeable membrane. <\/li><li>Glucose is reabsorbed by both active and passive processes. The former uses sodium-glucose co-transporters (SGLTs) in the proximal convoluted tubule. The latter achieved through facilitated and passive process through GLUT transporters.<\/li><li>Up to two thirds of filtered water is reabsorbed in the proximal tubules. <\/li><li>This will lead to increase in urea concentration in the distal tubule allowing for its increased diffusion. <\/li><li>Substances to be secreted into the tubules are taken up from the peritubular blood by tubular cells. <\/li><li>Solutes such as paraaminohippuric acid are cleared with a single passage through the kidneys and this is why it is used to measure renal plasma flow. Ions such as calcium and phosphate will have a tubular reabsorption that is influenced by plasma PTH levels. <\/li><li>Potassium may be both secreted and re-absorbed and is co-exchanged with sodium.<\/li><\/ul><br><b>Loop of Henle<\/b><br><ul><li>Approximately 60 litres of water containing 9000mmol sodium enters the descending limb of the loop of Henle in 24 hours. <\/li><li>Loops from the juxtamedullary nephrons run deep into the medulla. <\/li><li>The osmolarity of fluid changes and is greatest at the tip of the papilla. <\/li><li>The thick ascending limb is impermeable to water, but highly permeable to sodium and chloride ions. <\/li><li>This loss means that at the beginning of the thick ascending limb the fluid is hypo osmotic compared with adjacent interstitial fluid. <\/li><li>In the thick ascending limb the reabsorption of sodium and chloride ions occurs by both facilitated and passive diffusion pathways. <\/li><li>The loops of Henle are co-located with vasa recta, these will have similar solute compositions to the surrounding extracellular fluid so preventing the diffusion and subsequent removal of this hypertonic fluid. <\/li><li>The energy dependent reabsorption of sodium and chloride in the thick ascending limb helps to maintain this osmotic gradient.<\/li><\/ul>"}, {"name": "Renin", "questions": [{"number": 161, "topic": "Renin", "stem_html": "Which one of the following reduces the secretion of renin?", "options": [{"label_html": "Erect posture", "is_correct": false}, {"label_html": "Adrenaline", "is_correct": false}, {"label_html": "Hyponatraemia", "is_correct": false}, {"label_html": "Hypotension", "is_correct": false}, {"label_html": "Beta-blockers", "is_correct": true}], "correct_index": 4, "explanation_html": "<p>No explanation provided.<\/p>"}, {"number": 162, "topic": "Renin", "stem_html": "What is the substrate of renin?", "options": [{"label_html": "Aldosterone", "is_correct": false}, {"label_html": "Angiotensinogen", "is_correct": true}, {"label_html": "Angiotensin converting enzyme", "is_correct": false}, {"label_html": "Angiotensin I", "is_correct": false}, {"label_html": "Angiotensin II", "is_correct": false}], "correct_index": 1, "explanation_html": "Renin hydrolyses angiotensinogen to form angiotensin I.<br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb160b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb160.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"https://en.wikipedia.org/wiki/Main_Page\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb160b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}, {"number": 163, "topic": "Renin", "stem_html": "A 66 year old man is undergoing a difficult laparotomy and there is bleeding. His blood pressure is controlled by administration of blood products and fluids. An adrenaline infusion is started. What will be the effects of this on renin?", "options": [{"label_html": "It will stimulate its release from the juxtaglomerular cells", "is_correct": true}, {"label_html": "It will inhibit its release from the juxtaglomerular cells", "is_correct": false}, {"label_html": "It will inhibit its interaction with angiotensinogen I", "is_correct": false}, {"label_html": "It renders it biologically inactive", "is_correct": false}, {"label_html": "It accelerates its cellular breakdown", "is_correct": false}], "correct_index": 0, "explanation_html": "The sympathetic nervous system stimulates renin release from juxtaglomerular cells via the beta adrenoreceptor cAMP pathway"}], "note_html": "Renin is secreted by juxtaglomerular cells and hydrolyses angiotensinogen to produce angiotensin I<br><br>Factors stimulating renin secretion<br><ul><li>Hypotension causing reduced renal perfusion<\/li><li>Hyponatraemia<\/li><li>Sympathetic nerve stimulation<\/li><li>Catecholamines<\/li><li>Erect posture<\/li><\/ul><br>Factors reducing renin secretion<br><ul><li>Drugs: beta-blockers, NSAIDs<\/li><\/ul>"}, {"name": "Renin-angiotensin-aldosterone system", "questions": [{"number": 164, "topic": "Renin-angiotensin-aldosterone system", "stem_html": "Which of the following is the main site of dehydroepiandrosterone release?", "options": [{"label_html": "Posterior pituitary", "is_correct": false}, {"label_html": "Zona reticularis of the adrenal gland", "is_correct": true}, {"label_html": "Zona glomerulosa of the adrenal gland", "is_correct": false}, {"label_html": "Juxtaglomerular apparatus of the kidney", "is_correct": false}, {"label_html": "Zona fasciculata of the adrenal gland", "is_correct": false}], "correct_index": 1, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Adrenal cortex mnemonic: GFR - ACD<\/div>DHEA possesses some androgenic activity and is almost exclusively released from the adrenal gland."}], "note_html": "Adrenal cortex (mnemonic <b>GFR - ACD<\/b>)<br><ul><li>Zona <b>g<\/b>lomerulosa (on outside): mineralocorticoids, mainly <b>a<\/b>ldosterone<\/li><li>Zona <b>f<\/b>asciculata (middle): glucocorticoids, mainly <b>c<\/b>ortisol<\/li><li>Zona <b>r<\/b>eticularis  (on inside): androgens, mainly <b>d<\/b>ehydroepiandrosterone (DHEA)<\/li><\/ul><br><b>Renin<\/b><br><ul><li>Released by JGA cells in kidney in response to reduced renal perfusion, low sodium<\/li><li>Hydrolyses angiotensinogen to form angiotensin I<\/li><\/ul><br><b>Factors stimulating renin secretion<\/b><br><ul><li>Low BP<\/li><li>Hyponatraemia<\/li><li>Sympathetic nerve stimulation<\/li><li>Catecholamines<\/li><li>Erect posture<\/li><\/ul><br><b>Angiotensin<\/b><br><ul><li>ACE in lung converts angiotensin I → angiotensin II<\/li><li>Vasoconstriction leads to raised BP<\/li><li>Stimulates thirst<\/li><li>Stimulates aldosterone and ADH release<\/li><\/ul><br><b>Aldosterone<\/b><br><ul><li>Released by the zona glomerulosa in response to raised angiotensin II, potassium, and ACTH levels<\/li><li>Causes retention of Na<sup>+<\/sup> in exchange for K<sup>+<\/sup>/H<sup>+<\/sup> in distal tubule<\/li><\/ul><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb138b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb138.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Renin%E2%80%93angiotensin system\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb138b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}, {"name": "Respiratory physiology: lung compliance", "questions": [{"number": 165, "topic": "Respiratory physiology: lung compliance", "stem_html": "Which one of the following is associated with increased lung compliance?", "options": [{"label_html": "Kyphosis", "is_correct": false}, {"label_html": "Pulmonary oedema", "is_correct": false}, {"label_html": "Emphysema", "is_correct": true}, {"label_html": "Pulmonary fibrosis", "is_correct": false}, {"label_html": "Pneumonectomy", "is_correct": false}], "correct_index": 2, "explanation_html": "<p>No explanation provided.<\/p>"}], "note_html": "Lung compliance is defined as change in lung volume per unit change in airway pressure<br><br>Causes of increased compliance<br><ul><li>age<\/li><li>emphysema - this is due to loss of alveolar walls and associated elastic tissue<\/li><\/ul><br>Causes of decreased compliance<br><ul><li>pulmonary oedema<\/li><li>pulmonary fibrosis<\/li><li>pneumonectomy<\/li><li>kyphosis<\/li><\/ul>"}, {"name": "Response to surgery", "questions": [{"number": 166, "topic": "Response to surgery", "stem_html": "A 63 year old man undergoes a laparotomy and small bowel resection. Twelve hours post operatively he is noted to have a decreased urine output. Which of the hormones listed below is most likely to be responsible?", "options": [{"label_html": "Cortisol", "is_correct": false}, {"label_html": "Atrial natriuretic hormone", "is_correct": false}, {"label_html": "Vasopressin", "is_correct": true}, {"label_html": "Insulin", "is_correct": false}, {"label_html": "Glucagon", "is_correct": false}], "correct_index": 2, "explanation_html": "Vasopressin is released in increased quantities following most operative procedures and will tend to cause water retention. For this reason, excessive administration of intravenous fluids in an attempt to force a diuresis may cause fluid overload in post operative patients."}, {"number": 167, "topic": "Response to surgery", "stem_html": "A 48 year old man undergoes a right hemicolectomy for a large caecal polyp. In the immediate post operative period which of the physiological processes described below is least likely to occur?", "options": [{"label_html": "Glycogenolysis", "is_correct": false}, {"label_html": "Increased production of acute phase proteins", "is_correct": false}, {"label_html": "Increased cortisol production", "is_correct": false}, {"label_html": "Bronchoconstriction", "is_correct": true}, {"label_html": "Release of nitric oxide by vessels", "is_correct": false}], "correct_index": 3, "explanation_html": "<p>No explanation provided.<\/p>"}], "note_html": "<b>Sympathetic nervous system<\/b> <br><ul><li>Noradrenaline from sympathetic nerves and adrenaline from adrenal medulla<\/li><li>Blood diverted from skin and visceral organs; bronchodilatation, reduced intestinal motility, increased glucagon and glycogenolysis, insulin reduced <\/li><li>Heart rate and myocardial contractility are increased <\/li><\/ul><br><b>Acute phase response<\/b><br><ul><li>TNF-α, IL-1, IL-2, IL-6, interferon and prostaglandins are released<\/li><li>Excess cytokines may cause SIRS<\/li><li>Cytokines increase the release of acute phase proteins<\/li><\/ul><br><b>Endocrine response<\/b><br><ul><li>Hypothalamus, pituitary, adrenal axis <\/li><li>Increases ACTH and cortisol production:<\/li><\/ul>increases protein breakdown <br>increases blood glucose levels <br><ul><li>Aldosterone increases sodium re-absorption <\/li><li>Vasopressin increases water re-absorption and causes vasoconstriction <\/li><\/ul><br><b>Vascular endothelium<\/b><br><ul><li>Nitric oxide produces vasodilatation <\/li><li>Platelet activating factor enhances the cytokine response <\/li><li>Prostaglandins produce vasodilatation and induce platelet aggregation<\/li><\/ul>"}, {"name": "Shock", "questions": [{"number": 168, "topic": "Shock", "stem_html": "A 23 year old woman is admitted with a severe pyelonephritis and an associated perinephric abscess. During attempted percutaneous drainage, she develops hypotension and tachycardia. Of the physiological changes described below, which is not typically associated with such an event?", "options": [{"label_html": "Increased cardiac output", "is_correct": false}, {"label_html": "Increased systemic vascular resistance", "is_correct": true}, {"label_html": "Oliguria may occur", "is_correct": false}, {"label_html": "Systemic cytokine release", "is_correct": false}, {"label_html": "Tachycardia", "is_correct": false}], "correct_index": 1, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Cardiogenic Shock: <br>e.g. MI, valve abnormality<br><br>increased SVR (vasoconstriction in response to low BP)<br>increased HR (sympathetic response)<br>decreased cardiac output<br>decreased blood pressure<br><br>Hypovolaemic shock: <br>blood volume depletion <br>e.g. haemorrhage, vomiting, diarrhoea, dehydration, third-space losses during major operations <br><br>increased SVR<br>increased HR<br>decreased cardiac output<br>decreased blood pressure<br><br>Septic shock:<br>occurs when the peripheral vascular dilatation causes a fall in SVR <br>similar response may occur in anaphylactic shock, neurogenic shock<br><br>reduced SVR<br>increased HR<br>normal/increased cardiac output<br>decreased blood pressure<\/div>The SVR is reduced in sepsis and for this reason a vasopressor such as noradrenaline may be used if hypotension and oliguria remain a concern despite administration of adequate amounts of intravenous fluids."}, {"number": 169, "topic": "Shock", "stem_html": "During a pneumonectomy for carcinoma of the bronchus, there is an injury to the pulmonary vein with blood loss of approximately 1750mls. Of the physiological changes described below, which is not in keeping with this event?", "options": [{"label_html": "Decreased cardiac output", "is_correct": false}, {"label_html": "Increased heart rate", "is_correct": false}, {"label_html": "Reduced left ventricle filling pressures", "is_correct": false}, {"label_html": "Reduced blood pressure", "is_correct": false}, {"label_html": "Reduced systemic vascular resistance", "is_correct": true}], "correct_index": 4, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Cardiogenic Shock: <br>e.g. MI, valve abnormality<br><br>increased SVR (vasoconstriction in response to low BP)<br>increased HR (sympathetic response)<br>decreased cardiac output<br>decreased blood pressure<br><br>Hypovolaemic shock: <br>blood volume depletion <br>e.g. haemorrhage, vomiting, diarrhoea, dehydration, third-space losses during major operations <br><br>increased SVR<br>increased HR<br>decreased cardiac output<br>decreased blood pressure<br><br>Septic shock:<br>occurs when the peripheral vascular dilatation causes a fall in SVR <br>similar response may occur in anaphylactic shock, neurogenic shock<br><br>reduced SVR<br>increased HR<br>normal/increased cardiac output<br>decreased blood pressure<\/div>SVR will typically increase in haemorrhagic shock."}, {"number": 170, "topic": "Shock", "stem_html": "A 53 year old man is recovering from a right lung lobectomy to treat a malignant pulmonary nodule. A chest drain is in situ and is swinging and it is suddenly noticed that there has been an output of approximately 1600ml of fresh blood into the drain. Of the parameters listed below, which is unlikely to decrease in such circumstances?", "options": [{"label_html": "Cardiac output", "is_correct": false}, {"label_html": "Renin secretion", "is_correct": true}, {"label_html": "Firing of carotid baroreceptors", "is_correct": false}, {"label_html": "Firing of aortic baroreceptors", "is_correct": false}, {"label_html": "Blood pressure", "is_correct": false}], "correct_index": 1, "explanation_html": "Renin secretion will increase as systemic hypotension will cause impairment of renal blood flow. Although the kidney can autoregulate its own blood flow over a range of systemic blood pressures a loss of 1.6 L will usually produce an increase in renin secretion."}, {"number": 171, "topic": "Shock", "stem_html": "A 39 year old lady undergoes a laparoscopic cholecystectomy as a daycase. The operation is more difficult than anticipated and the surgeon places a drain to the liver bed. In recovery 1.5 litres of blood is seen to enter the drain. Which of the following substances is the first to be released in this situation?", "options": [{"label_html": "Angiotensinogen", "is_correct": false}, {"label_html": "Renin", "is_correct": true}, {"label_html": "Angiotensin I", "is_correct": false}, {"label_html": "Angiotensin II", "is_correct": false}, {"label_html": "Aldosterone", "is_correct": false}], "correct_index": 1, "explanation_html": "The decrease in blood pressure will be sensed by the juxtaglomerular cells in the kidney. This will cause renin secretion."}, {"number": 172, "topic": "Shock", "stem_html": "A 28 year old man is shot in the abdomen and haemorrhages. Which of the following substances will produce vasoconstriction in response to this process?", "options": [{"label_html": "Renin", "is_correct": false}, {"label_html": "Angiotensin I", "is_correct": false}, {"label_html": "Angiotensin II", "is_correct": true}, {"label_html": "Aldosterone", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 2, "explanation_html": "Renin does not cause vasoconstriction. Angiotensin I is biologically inactive. Aldosterone will increase blood pressure but does not have direct vasospastic effects."}], "note_html": "- Shock occurs when there is insufficient tissue perfusion. <br><ul><li>The pathophysiology of shock is an important surgical topic and may be divided into the following aetiological groups:<\/li><li>Septic<\/li><li>Haemorrhagic<\/li><li>Neurogenic<\/li><li>Cardiogenic<\/li><li>Anaphylactic<\/li><\/ul><br><b>Septic shock<\/b><br>Septic shock is a major problem and those patients with severe sepsis have a mortality rate in excess of 40%. In those who are admitted to intensive care mortality ranges from 6% with no organ failure to 65% in those with 4 organ failure.<br><br>Sepsis is <b>defined as an infection that triggers a particular Systemic Inflammatory Response Syndrome (SIRS).<\/b> In 2016, the European Society of Intensive Care Medicine and the Society of Critical Care Medicine (SCCM) created a task force that proposed Sepsis-3, a new definition for sepsis. The new definition excluded the establishment of SIRS criteria to define sepsis and made it more nonspecific as any life-threatening organ dysfunction caused by the dysregulated host response to infection. The task force claimed that sequential organ failure assessment (SOFA) has a better predictive validity for sepsis than SIRS criteria. It has better prognostic accuracy and the ability to predict in-hospital mortality. To reduce the complexity of calculating the SOFA, they introduced q SOFA<br><br>Q SOFA<br><br>3 component assessment system with:<br><br>Systolic blood pressure below 100 mm Hg<br><br>Highest respiratory rate exceeding 21<br><br>Lowest Glasgow coma score is under 15<br><br>Although the validity of q SOFA is limited in an ICU setting, it has consistently outperformed SIRS criteria in predicting organ dysfunction in a non-ICU and ER setting. The use of vasopressors, mechanical ventilation, and aggressive therapeutic interventions in ICU limit the efficacy of q SOFA.<br><br>During the septic process there is marked activation of the immune system with <b>extensive cytokine release<\/b>. This may be coupled with or triggered by systemic circulation of bacterial toxins. These all cause endothelial cell damage and neutrophil adhesion. The overall hallmarks are thus those of <b>excessive inflammation, coagulation and fibrinolytic suppression<\/b>.<br><br>The main management issues with severe infections resulting in organ dysfunction are as follows:<br><ul><li>Prompt administration of antibiotics to cover all likely pathogens coupled with a rigorous search for the source of infection.<\/li><li>Haemodynamic stabilisation. Many patients are hypovolaemic and require aggressive fluid administration. Aim for CVP 8-12 cm H<sub>2<\/sub>O, MAP &gt;65mmHg.<\/li><li>Modulation of the septic response. This includes manoeuvres to counteract the changes and includes measures such as tight glycaemic control. The routine use of steroids is not advised.<\/li><\/ul><br>In surgical patients, the main groups with septic shock include those with anastomotic leaks, abscesses and extensive superficial infections such as necrotising fasciitis. When performing surgery the aim should be to undertake the minimum necessary to restore physiology. These patients do not fare well with prolonged surgery. Definitive surgery can be more safely undertaken when physiology is restored and clotting in particular has been normalised.<br><br><br><b>Haemorrhagic shock<\/b><br>The average adult blood volume comprises 7% of body weight. Thus in the 70 Kg adult this will equate to 5 litres. This changes in children (8-9% body weight) and is slightly lower in the elderly. <br><br>The table below outlines the 4 major classes of haemorrhagic shock and their associated physiological sequelae:<br><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Parameter\t<\/b><\/th><th><b>Class I<\/b><\/th><th><b>\tClass II<\/b><\/th><th><b>\tClass III<\/b><\/th><th><b>\tClass IV<\/b><\/th><\/tr><\/thead><tbody><tr><td>Blood loss ml<\/td><td>&lt;750ml\t<\/td><td>750-1500ml\t<\/td><td>1500-2000ml<\/td><td>\t&gt;2000ml<\/td><\/tr><tr><td>Blood loss %\t<\/td><td>&lt;15%<\/td><td>15-30%<\/td><td>\t30-40%<\/td><td>\t&gt;40%<\/td><\/tr><tr><td>Pulse rate<\/td><td>\t&lt;100\t<\/td><td>&gt;100\t<\/td><td>&gt;120\t<\/td><td>&gt;140<\/td><\/tr><tr><td>Blood pressure\t<\/td><td>Normal\t<\/td><td>Normal\t<\/td><td>Decreased\t<\/td><td>Decreased<\/td><\/tr><tr><td>Respiratory rate\t<\/td><td>14-20\t<\/td><td>20-30\t<\/td><td>30-40<\/td><td>&gt;35<\/td><\/tr><tr><td>Urine output<\/td><td>\t&gt;30ml\t<\/td><td>20-30ml\t<\/td><td>5-15ml\t<\/td><td>&lt;5ml<\/td><\/tr><tr><td>Symptoms\t<\/td><td>Normal<\/td><td>\tAnxious<\/td><td>\tConfused<\/td><td>\tLethargic<\/td><\/tr><\/tbody><\/table><\/div><br>Decreasing blood pressure during haemorrhagic shock causes organ hypoperfusion and relative myocardial ischaemia. The cardiac index gives a numerical value for tissue oxygen delivery and is given by the equation: <b>Cardiac index= Cardiac output/ body surface area<\/b>. Where Hb is haemoglobin concentration in blood and SaO<sub>2<\/sub> the saturation and PaO<sub>2<\/sub> the partial pressure of oxygen. Detailed knowledge of this equation is required for the MRCS Viva but not for part A, although you should understand the principle.<br><br>In patients suffering from trauma the most likely cause of shock is haemorrhage.  However, the following may also be the cause or occur concomitantly:<br><br><ul><li>Tension pneumothorax<\/li><li>Spinal cord injury<\/li><li>Myocardial contusion<\/li><li>Cardiac tamponade<\/li><\/ul><br>When assessing trauma patients it is worth remembering that in order to generate a palpable femoral pulse an arterial pressure of &gt;65mmHg is required. <br><br>Once bleeding is controlled and circulating volume normalised the levels of transfusion should be to maintain a Hb of 7-8 in those with no risk factors for tissue hypoxia and Hb 10 for those who have such risk factors.<br><br><b>Neurogenic shock<\/b><br>This occurs most often following a <b>spinal cord transection<\/b>, usually at a high level. There is resultant interruption of the autonomic nervous system. The result is either <b>decreased sympathetic tone or increased parasympathetic tone<\/b>, the effect of which is a decrease in peripheral vascular resistance mediated by marked vasodilation. <br><br>This results in decreased preload and thus decreased cardiac output (Starlings law). There is decreased peripheral tissue perfusion and shock is thus produced. In contrast with many other types of shock peripheral vasoconstrictors are used to return vascular tone to normal. <br><br><b>Cardiogenic shock<\/b><br>In medical patients the main cause is <b>ischaemic heart disease<\/b>. In the traumatic setting direct myocardial trauma or contusion is more likely. Evidence of ECG changes and overlying sternal fractures or contusions should raise the suspicion of injury. Treatment is largely supportive and transthoracic echocardiography should be used to determine evidence of pericardial fluid or direct myocardial injury. The measurement of troponin levels in trauma patients may be undertaken but they are less useful in delineating the extent of myocardial trauma than following MI.<br><br>When cardiac injury is of a blunt nature and is associated with cardiogenic shock the right side of the heart is the most likely site of injury with chamber and or valve rupture. These patients require surgery to repair these defects and will require cardiopulmonary bypass to achieve this. Some may require intra aortic balloon pump as a bridge to surgery.<br><br><b>Anaphylactic shock<\/b><br>Anaphylaxis may be defined as a severe, life-threatening, generalised or systemic<br>hypersensitivity reaction.<br><br>Anaphylaxis is one of the few times when you would not have time to look up the dose of a medication. The Resuscitation Council guidelines on anaphylaxis have recently been updated. Adrenaline is by far the most important drug in anaphylaxis and should be given as soon as possible. The recommended doses for adrenaline, hydrocortisone and chlorpheniramine (if one wishes to use them) are as follows:<br><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><\/td><td><b>Adrenaline<\/b><\/td><td><b>Hydrocortisone<\/b><\/td><td><b>Chlorpheniramine<\/b><\/td><\/tr><tr><td><b>&lt; 6 months<\/b><\/td><td>150 mcg (0.15ml 1 in 1,000)<\/td><td>25 mg<\/td><td>250 mcg/kg<\/td><\/tr><tr><td><b>6 months - 6 years<\/b><\/td><td>150 mcg (0.15ml 1 in 1,000)<\/td><td>50 mg<\/td><td>2.5 mg<\/td><\/tr><tr><td><b>6-12 years<\/b><\/td><td>300 mcg (0.3ml 1 in 1,000)<\/td><td>100 mg<\/td><td>5 mg<\/td><\/tr><tr><td><b>Adult and child<\/b> 12 years<\/td><td>500 mcg (0.5ml 1 in 1,000)<\/td><td>200 mg<\/td><td>10 mg<\/td><\/tr><\/tbody><\/table><\/div><br>Adrenaline can be repeated every 5 minutes if necessary. The best site for IM injection is the anterolateral aspect of the middle third of the thigh.<br><br>Common identified causes of anaphylaxis<br><ul><li>food (e.g. Nuts) - the most common cause in children<\/li><li>drugs<\/li><li>venom (e.g. Wasp sting)<\/li><\/ul>"}, {"name": "Somatostatin", "questions": [{"number": 173, "topic": "Somatostatin", "stem_html": "Release of somatostatin from the pancreas will result in which of the following?", "options": [{"label_html": "Decrease in pancreatic exocrine secretions", "is_correct": true}, {"label_html": "Contraction of the gallbladder", "is_correct": false}, {"label_html": "Increase in the rate of gastric emptying", "is_correct": false}, {"label_html": "Increased synthesis of growth hormone", "is_correct": false}, {"label_html": "Increased insulin release", "is_correct": false}], "correct_index": 0, "explanation_html": "Octreotide reduces exocrine pancreatic secretions so is used to treat high output pancreatic fistulae (though parenteral feeding is most effective). Other uses include variceal bleeding and treatment of acromegaly.<br>Inhibits growth hormone and insulin release (when released from pancreas).<br>Somatostatin is also released by the hypothalamus causing a negative feedback response on growth hormone."}], "note_html": "Somatostatin is produced in the D cells of the pancreatic islets. It is also produced in the gut (enterochromaffin cells) and is found in brain tissue. Those substances that stimulate insulin release will also induce somatostatin secretion. It is an inhibitor of growth hormone, it also delays gastric emptying and reduces gastrin secretion. <br>It reduces pancreatic exocrine secretions and may be used therapeutically to treat pancreatic fistulae. <br><br>Somatostatinomas are rare pancreatic endocrine tumours and will result in the clinical manifestations of diabetes mellitus, gallstones and steatorrhoea."}, {"name": "Spleen- function", "questions": [{"number": 174, "topic": "Spleen- function", "stem_html": "Where are the reticulo-endothelial cells concentrated within the spleen?", "options": [{"label_html": "Within the capsule", "is_correct": false}, {"label_html": "Within the red pulp", "is_correct": false}, {"label_html": "Within the trabeculae", "is_correct": false}, {"label_html": "Within the white pulp", "is_correct": true}, {"label_html": "Within the splenic cords", "is_correct": false}], "correct_index": 3, "explanation_html": "The reticuloendothelial cells are concerned with the immune functions of the spleen and these are therefore concentrated in the white pulp."}], "note_html": "The spleen is a reticuloendothelial organ, it develops in the dorsal mesogastrium at around 5 weeks gestation. At this stage it has an irregular surface and migrates to the left upper quadrant over the following weeks. In most cases the irregular hillocks on the spleen surface unify, when they fail to do so, accessory spleens may develop and are found in around 20% of people.  The spleen is composed of both red and white pulp. In the red pulp, blood filled venous sinuses are found. In the white pulp, reticuloendothelial cords and white lymphoid follicles are present. Blood flows into the spleen at a rate of 150ml per  minute. As blood passes through the spleen, the erythrocytes have to pass through fine endothelial fenestrations, older and less deformable erythrocytes are trapped during this process and destroyed. Red cell inclusion bodies such as parasites or residual nuclear components are split off during this process which is termed pitting. <br><br><div class=\"alert alert-warning\"><b>Functions of spleen<\/b><br>Maintenance of the quality of erythrocytes in the red pulp by removal of senescent and dysfunctional cells<br>Antibody production in the white pulp<br>Removal of antibody coated bacteria and blood cells from the circulation<br><\/div><br>Because of these important functions, the spleen is seldom removed. Indications for splenectomy include major trauma and uncontrollable haemorrhage and the treatment of haemolytic anaemia. <br><br>The absence of a spleen has minimal long term effects on the haematologic profile. In the immediate post operative period, both leucocytosis and thrombocytosis are seen. In the longer term, the main manifestations are visible on the blood film and include visible nuclear remnants (Howell Jolly bodies), denatured haemoglobin (Heinz bodies), basophilic stippling and occasional nucleated erythrocytes. <br>The main risk following splenectomy is overwhelming sepsis with encapsulated organisms. Patients should receive the pneumococcal vaccine and long term antibiotic prophylaxis."}, {"name": "Starlings forces", "questions": [{"number": 175, "topic": "Starlings forces", "stem_html": "A 28 year old man is involved in a house fire and sustains severe burns to his torso. Whilst on the burns unit, he is noted to develop significant generalised oedema. What is the most likely explanation for this event?", "options": [{"label_html": "Raised pressure of fluid within the capillary bed", "is_correct": false}, {"label_html": "Decreased interstitial fluid pressure", "is_correct": false}, {"label_html": "Increased plasma oncotic pressure", "is_correct": false}, {"label_html": "Increased interstitial fluid pressure", "is_correct": false}, {"label_html": "Reduction in capillary oncotic pressure", "is_correct": true}], "correct_index": 4, "explanation_html": "The significant burns will result in generalised loss of high molecular weight proteins thereby reducing the capillary oncotic pressure. As a result, the fluid is likely to remain in the interstitium and thereby cause oedema."}], "note_html": "About one sixth of the body consists of spaces between cells. The fluid within these spaces is termed interstitial fluid. This fluid is formed by filtration and diffusion from capillaries. It contains almost the same constituents as plasma with the exception of proteins as these are not filtered due to their high relative molecular mass. The pressure in the capillaries tends to force fluid and its dissolved substances through capillary pores and into this space. In contrast the osmotic pressure exerted by plasma proteins (colloid osmotic pressure) tends to favor movement from the interstitial spaces back into the vascular compartments (capillaries) themselves. The lymphatic system returns back to the circulation the small amounts of protein that do leak into the interstitium. <br>There are four primary forces that determine fluid movement through a capillary membrane (Starlings forces):<br><ul><li>Capillary pressure - forces fluid out of the capillary <\/li><li>Interstitial fluid pressure- which tends to force fluid inwards through the capillary membrane (when it is positive) <\/li><li>Plasma colloid osmotic pressure- favors influx into the capillary <\/li><li>Interstitial fluid osmotic pressure- favors efflux from the capillary into the interstitium<\/li><\/ul>"}, {"name": "Stress response: Endocrine and metabolic changes", "questions": [{"number": 176, "topic": "Stress response: Endocrine and metabolic changes", "stem_html": "A 49 year old man undergoes a distal gastrectomy to treat peptic ulcer disease. Whilst he is recovering from surgery on the ward, which of the effects listed below is most likely to be encountered?", "options": [{"label_html": "Decreased cardiac output", "is_correct": false}, {"label_html": "Bradycardia", "is_correct": false}, {"label_html": "Relaxation of the smooth muscle of the GI tract", "is_correct": true}, {"label_html": "Vasodilatation", "is_correct": false}, {"label_html": "Reduction in angiotensin II levels", "is_correct": false}], "correct_index": 2, "explanation_html": "The stress response to surgery is multimodal and encompasses a number of physiological responses. However, cardiac output is usually increased (sympathetic nervous system induces hypertension and tachycardia). Its also results in GI tract smooth muscle relaxation. The renin angiotensin system is activated resulting in vasoconstriction and increased angiotensin II levels."}, {"number": 177, "topic": "Stress response: Endocrine and metabolic changes", "stem_html": "There is decreased secretion of which one of the following hormones in response to major surgery:", "options": [{"label_html": "Insulin", "is_correct": true}, {"label_html": "Cortisol", "is_correct": false}, {"label_html": "Renin", "is_correct": false}, {"label_html": "Anti diuretic hormone", "is_correct": false}, {"label_html": "Prolactin", "is_correct": false}], "correct_index": 0, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Endocrine parameters reduced in stress response:<br><ul><li>Insulin<\/li><li>Testosterone<\/li><li>Oestrogen<\/li><\/ul><\/div>Insulin is often released in decreased quantities following surgery."}, {"number": 178, "topic": "Stress response: Endocrine and metabolic changes", "stem_html": "Which of the following is not caused by cortisol in the stress response?", "options": [{"label_html": "Anti-inflammatory effects", "is_correct": false}, {"label_html": "Hypoglycaemia", "is_correct": true}, {"label_html": "Skeletal muscle protein breakdown", "is_correct": false}, {"label_html": "Stimulation of lipolysis", "is_correct": false}, {"label_html": "Mineralocorticoid effects", "is_correct": false}], "correct_index": 1, "explanation_html": "An 'anti insulin' effect occurs leading to hyperglycaemia."}, {"number": 179, "topic": "Stress response: Endocrine and metabolic changes", "stem_html": "A 55 year old man undergoes a laparotomy and repair of incisional hernia. Which of the following hormones is least likely to be released in increased quantities following the procedure?", "options": [{"label_html": "Insulin", "is_correct": true}, {"label_html": "ACTH", "is_correct": false}, {"label_html": "Glucocorticoids", "is_correct": false}, {"label_html": "Aldosterone", "is_correct": false}, {"label_html": "Growth hormone", "is_correct": false}], "correct_index": 0, "explanation_html": "Insulin and thyroxine often have reduced levels of secretion in the post operative period. This, coupled with increased glucocorticoid release may cause difficulty in management of diabetes in individuals with insulin resistance."}], "note_html": "- Surgery precipitates hormonal and metabolic changes causing the  stress response.<br><ul><li>Stress response is associated with: substrate mobilization, muscle protein loss, sodium and water retention, suppression of anabolic hormone secretion, activation of the sympathetic nervous system, immunological and haematological changes. <\/li><li>The hypothalamic-pituitary axis and the sympathetic nervous systems are activated and there is a failure of the normal feedback mechanisms of control of hormone secretion. <\/li><\/ul><br><br>A summary of the hormonal changes associated with the stress response:<br><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Increased<\/b><\/th><th><b>Decreased<\/b><\/th><th><b>No Change<\/b><\/th><\/tr><\/thead><tbody><tr><td>Growth hormone<\/td><td>Insulin<\/td><td>Thyroid stimulating hormone<\/td><\/tr><tr><td>Cortisol<\/td><td>Testosterone<\/td><td>Luteinizing hormone<\/td><\/tr><tr><td>Renin<\/td><td>Oestrogen<\/td><td>Follicle stimulating hormone<\/td><\/tr><tr><td>Adrenocorticotrophic hormone (ACTH)<\/td><td><\/td><td><\/td><\/tr><tr><td>Aldosterone<\/td><td><\/td><td><\/td><\/tr><tr><td>Prolactin<\/td><td><\/td><td><\/td><\/tr><tr><td>Antidiuretic hormone<\/td><td><\/td><td><\/td><\/tr><tr><td>Glucagon<\/td><td><\/td><td><\/td><\/tr><\/tbody><\/table><\/div>   <br>    <br><br><b>Sympathetic nervous system<\/b><br><ul><li>Stimulates catecholamine release<\/li><li>Causes tachycardia and hypertension<\/li><\/ul>  <br><b>Pituitary gland<\/b><br><ul><li>ACTH and growth hormone (GH) is stimulated by hypothalamic releasing factors, corticotrophin releasing factor (CRF) and somatotrophin (or growth hormone releasing factor)<\/li><li>Perioperative increased prolactin secretion occurs by release of inhibitory control<\/li><li>Secretion of thyroid stimulating hormone (TSH), luteinizing hormone (LH) and follicle stimulating hormone (FSH) does not change significantly<\/li><li>ACTH stimulates cortisol production within a few minutes of the start of surgery.  More ACTH is produced than needed to produce a maximum adrenocortical response. <\/li><\/ul><br><b>Cortisol<\/b><br><ul><li>Significant increases within 4-6 hours of surgery (&gt;1000 nmol litre<sup>-1<\/sup>).<\/li><li>The usual negative feedback mechanism fails and concentrations of ACTH and cortisol remain persistently increased.<\/li><li>The magnitude and duration of the increase correlate with the severity of stress and the response is not abolished by the administration of corticosteroids. <\/li><li>The metabolic effects of cortisol are enhanced:<\/li><\/ul><br>Skeletal muscle protein breakdown to provide gluconeogenic precursors and amino acids for protein synthesis in the liver<br>Stimulation of lipolysis<br>'Anti-insulin effect'<br>Mineralocorticoid effects <br>Anti-inflammatory effects <br><br><br><b>Growth hormone<\/b><br><ul><li>Increased secretion after surgery has a minor role<\/li><li>Most important for preventing muscle protein breakdown and promote tissue repair by insulin growth factors<\/li><\/ul><br><b>Alpha Endorphin<\/b><br><ul><li>Increased <\/li><\/ul><br><b>Antidiuretic hormone<\/b><br><ul><li>An important vasopressor and enhances haemostasis<\/li><li>Renin is released causing the conversion of angiotensinogen to angiotensin I       <\/li><li>Angiotensin II formed by ACE on angiotensin 1, which causes the secretion of aldosterone from the adrenal cortex.  This increases sodium reabsorption at the distal convoluted tubule<\/li><\/ul><br><b>Insulin<\/b> <br><ul><li>Release inhibited by stress<\/li><li>Occurs via the inhibition of the beta cells in the pancreas by the α2-adrenergic inhibitory effects of catecholamines<\/li><li>Insulin resistance by target cells occurs later <\/li><li>The perioperative period is characterized by a state of functional insulin deficiency<\/li><\/ul>   <br><b>Thyroxine (T4) and tri-iodothyronine (T3)<\/b><br><ul><li>Circulating concentrations are inversely correlated with sympathetic activity and after surgery there is a reduction in thyroid hormone production, which normalises over a few days. <\/li><\/ul><br><b>Metabolic effect of endocrine response<\/b><br><br><i>Carbohydrate metabolism<\/i><br><ul><li>Hyperglycaemia is a main feature of the metabolic response to surgery<\/li><li>Due to increase in glucose production and a reduction in glucose utilization<\/li><li>Catecholamines and cortisol promote glycogenolysis and gluconeogenesis<\/li><li>Initial failure of insulin secretion followed by insulin resistance affects the normal responses<\/li><li>The proportion of the hyperglycaemic response reflects the severity of surgery <\/li><li>Hyperglycaemia impairs wound healing and increase infection rates<\/li><\/ul><br><i>Protein metabolism<\/i>  <br><ul><li>Initially there is inhibition of protein anabolism, followed later, if the stress response is severe, by enhanced catabolism <\/li><li>The amount of protein degradation is influenced by the type of surgery and also by the nutritional status of the patient<\/li><li>Mainly skeletal muscle protein is affected <\/li><li>The amino acids released form acute phase proteins (fibrinogen, C reactive protein, complement proteins, a2-macroglobulin, amyloid A and ceruloplasmin) and are used for gluconeogenesis<\/li><li>Nutritional support has little effect on preventing catabolism<\/li><\/ul><br><i>Lipid metabolism<\/i><br>Increased catecholamine, cortisol and glucagon secretion, and insulin deficiency, promotes lipolysis and ketone body production. <br><br><i>Salt and water metabolism<\/i><br><ul><li>ADH causes water retention, concentrated urine, and potassium loss and may continue for 3 to 5 days after surgery<\/li><li>Renin causes sodium and water retention<\/li><\/ul> <br><i>Cytokines<\/i><br><ul><li>Glycoproteins<\/li><li>Interleukins (IL) 1 to 17, interferons, and tumour necrosis factor<\/li><li>Synthesized by activated macrophages, fibroblasts, endothelial and glial cells in response to tissue injury from surgery or trauma<\/li><li>IL-6 main cytokine associated with surgery.  Peak 12 to 24 h after surgery and increase by the degree of tissue damage  Other effects of cytokines include fever, granulocytosis, haemostasis, tissue damage limitation and promotion of healing. <\/li><\/ul><br><br><b>Modifying the response<\/b><br><ul><li>Opioids suppress hypothalamic and pituitary hormone secretion<\/li><li>At high doses the hormonal response to pelvic and abdominal surgery is abolished. However, such doses prolong recovery and increase the need for postoperative ventilatory support<\/li><li>Spinal anaesthesia can reduce the glucose, ACTH, cortisol, GH and epinephrine changes, although cytokine responses are unaltered<\/li><li>Cytokine release is reduced in less invasive surgery <\/li><li>Nutrition prevents the adverse effects of the stress response. Enteral feeding improves recovery<\/li><li>Growth hormone and anabolic steroids may improve outcome<\/li><li>Normothermia decreases the metabolic response<\/li><\/ul><br><b>References<\/b><br>Vasiliki Manou-Stathopoulou et al. Redefining the perioperative stress response: a narrative review. Br J Anaesth. 2019 Nov;123(5):570-583.<br><br>Deborah Burton, Grainne Nicholson, and George Hall <br>Endocrine and metabolic response to surgery .<br><br>Contin Educ Anaesth Crit Care Pain (2004) 4(5): 144-147 doi:10.1093/bjaceaccp/mkh040"}, {"name": "Stroke volume-Cardiac physiology", "questions": [{"number": 180, "topic": "Stroke volume-Cardiac physiology", "stem_html": "What is the typical stroke volume in a resting 70 Kg man?", "options": [{"label_html": "10ml", "is_correct": false}, {"label_html": "150ml", "is_correct": false}, {"label_html": "125ml", "is_correct": false}, {"label_html": "45ml", "is_correct": false}, {"label_html": "70ml", "is_correct": true}], "correct_index": 4, "explanation_html": "Stroke volumes range from 55-100ml."}], "note_html": "The stroke volume equates to the volume of blood ejected from the ventricle during each cycle of cardiac contraction. The volumes for both ventricles are typically equal and equate roughly to 70ml for a 70Kg man. It is calculated by subtracting the end systolic volume from the end diastolic volume. <br><br><b>Factors affecting stroke volume<\/b><br><ul><li>Cardiac size<\/li><li>Contractility<\/li><li>Preload<\/li><li>Afterload<\/li><\/ul>"}, {"name": "syndrome of inappropriate antidiuretic hormone (SIADH): causes", "questions": [{"number": 181, "topic": "syndrome of inappropriate antidiuretic hormone (SIADH): causes", "stem_html": "A 55-year-old man with a history of type 2 diabetes mellitus, bipolar disorder and chronic obstructive pulmonary disease has bloods taken during a pre operative assessment of an inguinal hernia repair:<br><br><div class=\"table-responsive\"><table class=\"tb\"><tbody><tr><td>Na+<\/td><td>125 mmol/l<\/td><\/tr><tr><td>K+<\/td><td>3.8 mmol/l<\/td><\/tr><tr><td>Bicarbonate<\/td><td>24 mmol/l<\/td><\/tr><tr><td>Urea<\/td><td>3.7 mmol/l<\/td><\/tr><tr><td>Creatinine<\/td><td>92 µmol/l<\/td><\/tr><\/tbody><\/table><\/div><br>Due to his smoking history a chest x-ray is ordered which is reported as normal. The Consultant asks you what is the most likely cause for the hyponatraemia?", "options": [{"label_html": "Metformin", "is_correct": false}, {"label_html": "Lithium", "is_correct": false}, {"label_html": "Carbamazepine", "is_correct": true}, {"label_html": "Sodium valproate", "is_correct": false}, {"label_html": "Pioglitazone", "is_correct": false}], "correct_index": 2, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">SIADH - drug causes: carbamazepine, sulfonylureas, SSRIs, tricyclics<\/div>Lithium can cause diabetes insipidus but this is generally associated with a high sodium. Lithium only tends to cause raised antidiuretic hormone levels following a severe overdosage."}], "note_html": "Malignancy<br><ul><li>especially small cell lung cancer<\/li><li>also: pancreas, prostate<\/li><\/ul><br>Neurological<br><ul><li>stroke<\/li><li>subarachnoid haemorrhage<\/li><li>subdural haemorrhage<\/li><li>meningitis/encephalitis/abscess<\/li><\/ul><br>Infections<br><ul><li>tuberculosis<\/li><li>pneumonia<\/li><\/ul><br>Drugs<br><ul><li>sulfonylureas<\/li><li>SSRIs, tricyclics<\/li><li>carbamazepine<\/li><li>vincristine<\/li><li>cyclophosphamide<\/li><\/ul><br>Other causes<br><ul><li>positive end-expiratory pressure (PEEP)<\/li><li>porphyrias<\/li><\/ul>"}, {"name": "The normal ECG", "questions": [{"number": 182, "topic": "The normal ECG", "stem_html": "An over enthusiastic medical student decides to ask you questions about ECGs.  Rather than admitting your dwindling knowledge on this topic, you bravely attempt to answer her questions!  One question is what component of the ECG represents ventricular repolarization?", "options": [{"label_html": "QRS complex", "is_correct": false}, {"label_html": "Q-T interval", "is_correct": false}, {"label_html": "P wave", "is_correct": false}, {"label_html": "T wave", "is_correct": true}, {"label_html": "S-T segment", "is_correct": false}], "correct_index": 3, "explanation_html": "The T wave represents ventricular repolarization.  The common sense approach to remembering this, is to acknowledge that ventricular repolarization is the last phase of cardiac contraction and should therefore correspond the the last part of the QRS complex."}, {"number": 183, "topic": "The normal ECG", "stem_html": "A 23 year old man has a routine ECG performed. Which part of the tracing obtained represents atrial repolarisation?", "options": [{"label_html": "P wave", "is_correct": false}, {"label_html": "T wave", "is_correct": false}, {"label_html": "Q-T Interval", "is_correct": false}, {"label_html": "P-R interval", "is_correct": false}, {"label_html": "None of the above", "is_correct": true}], "correct_index": 4, "explanation_html": "The process of atrial repolarisation is generally not visible on the ECG strip. It occurs during the QRS complex."}, {"number": 184, "topic": "The normal ECG", "stem_html": "Which part of the ECG represents atrial depolarization?", "options": [{"label_html": "P wave", "is_correct": true}, {"label_html": "Q wave", "is_correct": false}, {"label_html": "T wave", "is_correct": false}, {"label_html": "QRS complex", "is_correct": false}, {"label_html": "P-R interval", "is_correct": false}], "correct_index": 0, "explanation_html": "The P wave represents atrial depolarization. Note that atrial repolarization is obscured within the QRS complex."}], "note_html": "<center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb110b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb110.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/ECG\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb110b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center><br><b>P wave<\/b><br><ul><li>Represents the wave of depolarization that spreads from the SA node throughout the atria<\/li><li>Lasts 0.08 to 0.1 seconds (80-100 ms) <\/li><li>The isoelectric period after the P wave represents the time in which the impulse is traveling within the AV node <\/li><\/ul><br><b>P-R interval<\/b><br><ul><li>Time from the onset of the P wave to the beginning of the QRS complex <\/li><li>Ranges from 0.12 to 0.20 seconds in duration<\/li><li>Represents the time between the onset of atrial depolarization and the onset of ventricular depolarization<\/li><\/ul><br><b>QRS complex<\/b><br><ul><li>Represents ventricular depolarization<\/li><li>Duration of the QRS complex is normally 0.06 to 0.1 seconds<\/li><\/ul><br><b>ST segment<\/b><br><ul><li>Isoelectric period following the QRS<\/li><li>Represents period which the entire ventricle is depolarized and roughly corresponds to the plateau phase of the ventricular action potential<\/li><\/ul><br><b>T wave<\/b><br><ul><li>Represents ventricular repolarization and is longer in duration than depolarization <\/li><li>A small positive U wave may follow the T wave which represents the last remnants of ventricular repolarization. <\/li><\/ul><br><b>Q-T interval<\/b><br><ul><li>Represents the time for both ventricular depolarization and repolarization to occur, and therefore roughly estimates the duration of an average ventricular action potential.  <\/li><li>Interval ranges from 0.2 to 0.4 seconds depending upon heart rate.  <\/li><li>At high heart rates, ventricular action potentials shorten in duration, which decreases the Q-T interval.  Therefore the Q-T interval is expressed as a 'corrected Q-T (QTc)' by taking the Q-T interval and dividing it by the square root of the R-R interval (interval between ventricular depolarizations).  This allows an assessment of the Q-T interval that is independent of heart rate.  <\/li><li>Normal corrected Q-Tc interval is less than 0.44 seconds.<\/li><\/ul>"}, {"name": "Thermoregulation", "questions": [{"number": 185, "topic": "Thermoregulation", "stem_html": "Which of the following areas is predominantly concerned with thermoregulation?", "options": [{"label_html": "Hypothalamus", "is_correct": true}, {"label_html": "Anterior pituitary", "is_correct": false}, {"label_html": "Cerebellum", "is_correct": false}, {"label_html": "Brain stem", "is_correct": false}, {"label_html": "Temporal lobe", "is_correct": false}], "correct_index": 0, "explanation_html": "The hypothalamus is primarily concerned with thermoregulation. It may relay to the cerebral cortex to induce behavioural adaptation to facilitate the thermoregulatory process."}], "note_html": "<ul><li>The hypothalamus is the main centre for thermoregulation. Peripheral and central thermoreceptors relay to this region.<\/li><li>Central thermoreceptors play the main role in maintenance of core temperature.<\/li><li>Hypothalamus may initiate involuntary motor responses to raise body temperature (e.g.shivering). It will also stimulate the sympathetic nervous system to produce peripheral vasoconstriction and release of adrenaline from the adrenal medulla.<\/li><li>Heat loss is governed by behavioural responses and by autonomic responses including peripheral vasodilation.<\/li><li>Heat loss can be maintained within the thermoneutral zone (25 to 30 degrees) although the absolute value depends upon atmospheric humidity.<\/li><li>Sepsis results in the release of cytokines that reset the thermoregulatory centre resulting in fever.<\/li><\/ul>"}, {"name": "Thyroid hormones", "questions": [{"number": 186, "topic": "Thyroid hormones", "stem_html": "Which of the following substances related to thyroid function has its effects mediated by a nuclear receptor?", "options": [{"label_html": "Triiodothyronine", "is_correct": true}, {"label_html": "Thyroxine", "is_correct": false}, {"label_html": "Thyroglobulin", "is_correct": false}, {"label_html": "Thyroid stimulating hormone", "is_correct": false}, {"label_html": "Thyroxin binding globulin", "is_correct": false}], "correct_index": 0, "explanation_html": "T3 binds to a receptor on chromatin to induce protein synthesis."}, {"number": 187, "topic": "Thyroid hormones", "stem_html": "Which of these substances related to thyroid function has its secretion inhibited by increased plasma T3 and T4?", "options": [{"label_html": "T3", "is_correct": false}, {"label_html": "T4", "is_correct": false}, {"label_html": "Thyroglobulin", "is_correct": false}, {"label_html": "Thyroxin binding globulin", "is_correct": false}, {"label_html": "Thyroid stimulating hormone", "is_correct": true}], "correct_index": 4, "explanation_html": "TSH release is inhibited by negative feedback."}, {"number": 188, "topic": "Thyroid hormones", "stem_html": "What is the main component of colloid in the thyroid gland?", "options": [{"label_html": "T3", "is_correct": false}, {"label_html": "Thyroglobulin", "is_correct": true}, {"label_html": "T4", "is_correct": false}, {"label_html": "Thyroxin binding globulin", "is_correct": false}, {"label_html": "TSH", "is_correct": false}], "correct_index": 1, "explanation_html": "It is a high molecular weight protein that acts as a storage form of thyroid hormones."}, {"number": 189, "topic": "Thyroid hormones", "stem_html": "A 28 year old lady  with hyperthyroidism is started on carbimazole to treat the condition. What is the main mechanism of action?", "options": [{"label_html": "Inhibition of thyroid stimulating hormone release", "is_correct": false}, {"label_html": "Increased degradation of T4 within the thyroid colloid", "is_correct": false}, {"label_html": "Increased degradation of T3 within the thyroid colloid", "is_correct": false}, {"label_html": "Inhibits release of T3 and T4 into the circulation", "is_correct": false}, {"label_html": "Inhibition of thyroid peroxidase enzyme", "is_correct": true}], "correct_index": 4, "explanation_html": "Carbimazole is used to treat hyperthyroidism. Carbimazole is a pro-drug as after absorption it is converted to the active form, methimazole. Methimazole prevents thyroid peroxidase enzyme from iodinating and coupling the tyrosine residues on thyroglobulin, hence reducing the production of the thyroid hormones T3 and T4. Clinical effects take some months to occur as thyroid globulin stores remain for some time after treatment commences."}, {"number": 190, "topic": "Thyroid hormones", "stem_html": "A 22 year old lady presents with symptoms and signs of hyperthyroidism. Her diagnostic work up results in a diagnosis of Graves disease. Which of these statements best describes the pathophysiology of the condition?", "options": [{"label_html": "Formation of IgG antibodies to the TSH receptors on the thyroid gland", "is_correct": true}, {"label_html": "Formation of IgG antibodies to the TRH receptors on the anterior pituitary", "is_correct": false}, {"label_html": "Formation of IgM antibodies to the TSH receptors on the thyroid gland", "is_correct": false}, {"label_html": "Formation of IgA antibodies to the TSH receptors on the thyroid gland", "is_correct": false}, {"label_html": "Formation of IgM antibodies to the TRH receptors on the anterior pituitary", "is_correct": false}], "correct_index": 0, "explanation_html": "Usually IgG antibodies are formed against the TSH receptors on the thyroid gland. Which is why the TSH level is often very low in Graves disease."}], "note_html": "<b>Hormones of the thyroid gland<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Triiodothyronine T3<\/b><\/td><td>Major hormone active in target cells<\/td><\/tr><tr><td><b>Thyroxine T4<\/b><\/td><td>Most prevalent form in plasma, less biologically active than T3<\/td><\/tr><tr><td><b>Calcitonin<\/b><\/td><td>Lowers plasma calcium<\/td><\/tr><\/tbody><\/table><\/div><br><b>Synthesis and secretion of thyroid hormones<\/b><br><ul><li>Thyroid actively concentrates iodide to twenty five times the plasma concentration. <\/li><li>Iodide is oxidised by peroxidase in the follicular cells to atomic iodine which then iodinates tyrosine residues contained in thyroglobulin.<\/li><li>Iodinated tyrosine residues in thyroglobulin undergo coupling to either T3 or T4.<\/li><li>Process is stimulated by TSH, which stimulates secretion of thyroid hormones.<\/li><li>The normal thyroid has approximately 3 month reserves of thyroid hormones.<\/li><\/ul><br><b>LATS and Graves disease<\/b><br>In Graves disease, patients develop IgG antibodies to the TSH receptors on the thyroid gland. This results in chronic and long term stimulation of the gland with release of thyroid hormones. The typically situation is raised thyroid hormones and low TSH. Thyroid receptor autoantibodies should be checked in individuals presenting with hyperthyroidism as they are present in up to 85% cases."}, {"name": "Tranexamic acid", "questions": [{"number": 191, "topic": "Tranexamic acid", "stem_html": "A 23 year old man presents with blunt abdominal trauma and a splenic bleed is suspected. He is commenced on an infusion of tranexamic acid. Which of the following best describes its mechanism of action?", "options": [{"label_html": "Inhibition of plasmin", "is_correct": true}, {"label_html": "Inhibition of thrombin", "is_correct": false}, {"label_html": "Inhibition of factor II", "is_correct": false}, {"label_html": "Inhibition of factor Xa", "is_correct": false}, {"label_html": "Activation of factor VIII", "is_correct": false}], "correct_index": 0, "explanation_html": "Tranexamic acid inhibits plasmin and this prevents fibrin degradation."}], "note_html": "Tranexamic acid is a synthetic derivative of lysine. Its primary mode of action is as an anti fibrinolytic that competitively inhibits the conversion of plasminogen to plasmin. Plasmin degrades fibrin and therefore rendering plasmin inactive slows this process. <br>The role of tranexamic acid in trauma was investigated in the CRASH 2 trial and has been shown to be of benefit in bleeding trauma when administered in the first 3 hours."}, {"name": "Transfer factor", "questions": [{"number": 192, "topic": "Transfer factor", "stem_html": "Which one of the following would cause a rise in the carbon monoxide transfer factor (TLCO)?", "options": [{"label_html": "Emphysema", "is_correct": false}, {"label_html": "Pulmonary embolism", "is_correct": false}, {"label_html": "Pulmonary haemorrhage", "is_correct": true}, {"label_html": "Pneumonia", "is_correct": false}, {"label_html": "Pulmonary fibrosis", "is_correct": false}], "correct_index": 2, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Transfer factor<br><ul><li>raised: asthma, haemorrhage, left-to-right shunts, polycythaemia<\/li><li>low: everything else<\/li><\/ul><\/div>Where alveolar haemorrhage occurs the TLCO tends to increase due to the enhanced uptake of carbon monoxide by intra-alveolar haemoglobin."}], "note_html": "The transfer factor describes the rate at which a gas will diffuse from alveoli into blood. Carbon monoxide is used to test the rate of diffusion. Results may be given as the total gas transfer (TLCO) or that corrected for lung volume (transfer coefficient, KCO)<br><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Causes of a raised TLCO<\/b><br><ul><li>asthma<\/li><li>pulmonary haemorrhage (Wegener's, Goodpasture's)<\/li><li>left-to-right cardiac shunts<\/li><li>polycythaemia<\/li><li>hyperkinetic states<\/li><li>male gender, exercise<\/li><\/ul><\/td><td><b>Causes of a lower TLCO<\/b><br><ul><li>pulmonary fibrosis<\/li><li>pneumonia<\/li><li>pulmonary emboli<\/li><li>pulmonary oedema<\/li><li>emphysema<\/li><li>anaemia<\/li><li>low cardiac output<\/li><\/ul><\/td><\/tr><\/tbody><\/table><\/div><br>KCO also tends to increase with age. Some conditions may cause an increased KCO with a normal or reduced TLCO<br><ul><li>pneumonectomy/lobectomy<\/li><li>scoliosis/kyphosis<\/li><li>neuromuscular weakness<\/li><li>ankylosis of costovertebral joints e.g. ankylosing spondylitis<\/li><\/ul>"}, {"name": "Tumour necrosis factor", "questions": [{"number": 193, "topic": "Tumour necrosis factor", "stem_html": "Which one of the following cells secretes the majority of tumour necrosis factor in humans?", "options": [{"label_html": "Neutrophils", "is_correct": false}, {"label_html": "Macrophages", "is_correct": true}, {"label_html": "Natural killer cells", "is_correct": false}, {"label_html": "Killer-T cells", "is_correct": false}, {"label_html": "Helper-T cells", "is_correct": false}], "correct_index": 1, "explanation_html": "<p>No explanation provided.<\/p>"}], "note_html": "Tumour necrosis factor (TNF) is a pro-inflammatory cytokine with multiple roles in the immune system<br><br>TNF is secreted mainly by macrophages and has a number of effects on the immune system, acting mainly in a paracrine fashion:<br><ul><li>activates macrophages and neutrophils<\/li><li>acts as costimulator for T cell activation<\/li><li>key mediator of body's response to Gram negative septicaemia<\/li><li>similar properties to IL-1<\/li><li>anti-tumour effect (e.g. phospholipase activation)<\/li><\/ul><br>TNF-alpha binds to both the p55 and p75 receptor. These receptors can induce apoptosis. It also cause activation of NFkB<br><br>Endothelial effects include increase expression of selectins and increased production of platelet activating factor, IL-1 and prostaglandins<br><br>TNF promotes the proliferation of fibroblasts and their production of protease and collagenase. It is thought fragments of receptors act as binding points in serum<br><br>Systemic effects include pyrexia, increased acute phase proteins and disordered metabolism leading to cachexia<br><br>TNF is important in the pathogenesis of rheumatoid arthritis - TNF blockers (e.g. infliximab, etanercept) are now licensed for treatment of severe rheumatoid"}, {"name": "Urinary incontinence", "questions": [{"number": 194, "topic": "Urinary incontinence", "stem_html": "A 75 year old lady reports urinary incontinence when coughing and sneezing. She has had 2 children with no complications. She has no significant past medical history and is on no medications. What is the most appropriate initial management?", "options": [{"label_html": "Trial of sacral neuromodulation", "is_correct": false}, {"label_html": "Urodynamic studies", "is_correct": false}, {"label_html": "Pelvic floor exercises for 3 months", "is_correct": true}, {"label_html": "Bladder drill training for 6 weeks", "is_correct": false}, {"label_html": "Administration of oxybutinin", "is_correct": false}], "correct_index": 2, "explanation_html": "A diagnosis of stress incontinence is obvious from the history, therefore there is no need for a bladder diary or urodynamic studies. Pelvic floor exercises would be the first line management."}, {"number": 195, "topic": "Urinary incontinence", "stem_html": "Which of the following treatments is not utilized in the treatment of overactive bladder syndrome?", "options": [{"label_html": "Sacral neuromodulation", "is_correct": false}, {"label_html": "Botulinum toxin injections", "is_correct": false}, {"label_html": "Bladder drill", "is_correct": false}, {"label_html": "Oxybutinin", "is_correct": false}, {"label_html": "Colposuspension", "is_correct": true}], "correct_index": 4, "explanation_html": "Overactive bladder syndrome is very common and first line management includes the use of anticholinergics and bladder drill whereby voiding is deferred. Refractory cases can be treated with SNS or botulinum toxin injections. A Burch Colposuspension is used to treat stress urinary incontinence."}, {"number": 196, "topic": "Urinary incontinence", "stem_html": "A 56 year old lady reports incontinence mainly when walking the dog. A bladder diary is inconclusive. What is the most appropriate investigation?", "options": [{"label_html": "Intravenous urography", "is_correct": false}, {"label_html": "Urodynamic studies", "is_correct": true}, {"label_html": "Flexible cystoscopy", "is_correct": false}, {"label_html": "Micturating cystourethrogram", "is_correct": false}, {"label_html": "Rigid cystoscopy", "is_correct": false}], "correct_index": 1, "explanation_html": "Urodynamic studies are indicated when there is diagnostic uncertainty or plans for surgery."}, {"number": 197, "topic": "Urinary incontinence", "stem_html": "A 43 year old lady presents with urinary incontinence. At which of the following locations is Onufs nucleus likely to be found?", "options": [{"label_html": "Medulla oblongata", "is_correct": false}, {"label_html": "Anterior horn of L5 nerve roots", "is_correct": false}, {"label_html": "Micturition centre in the Pons", "is_correct": false}, {"label_html": "Anterior horn of S2 nerve roots", "is_correct": true}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 3, "explanation_html": "Onufs nucleus is located in the anterior horn of S2 and is the origin of neurones to the external urethral sphincter."}], "note_html": "Involuntary passage of urine. Most cases are female (80%). It has a prevalence of 11% in those aged greater than 65 years.  The commonest variants include:<br><ul><li>Stress urinary incontinence (50%)<\/li><li>Urge incontinence (15%)<\/li><li>Mixed (35%)<\/li><\/ul><br><b>Males<\/b><br>Males may also suffer from incontinence although it is a much rarer condition in men. A number of anatomic
