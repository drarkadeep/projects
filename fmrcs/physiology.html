al factors contribute to this. Males have 2 powerful sphincters; one at the bladder neck and the other in the urethra. Damage to the bladder neck mechanism is a factor in causing retrograde ejaculation following prostatectomy. The short segment of urethra passing through the urogenital diaphragm consists of striated muscle fibres (the external urethral sphincter) and smooth muscle capable of more sustained contraction.  It is the latter mechanism that maintains continence following prostatectomy.<br><br><b>Females<\/b><br>The sphincter complex at the level of bladder neck is poorly developed in females. As a result the external sphincter complex is functionally more important, its composition being similar to that of males. Innervation is via the pudendal nerve and the neuropathy that may accompany obstetric events may compromise this and lead to stress urinary incontinence. <br><br><b>Innervation<\/b><br>Somatic innervation to the bladder is via the pudendal, hypogastric and pelvic nerves. Autonomic nerves travel in these nerve fibres too. Bladder filling leads to detrusor relaxation (sympathetic) coupled with sphincter contraction. The parasympathetic system causes detrusor contraction and sphincter relaxation. Overall control of micturition is centrally mediated via centres in the Pons. <br><br><b>Stress urinary incontinence<\/b><br><ul><li>50% of cases, especially in females. <\/li><li>Damage (often obstetric) to the supporting structures surrounding the bladder may lead to urethral hypermobility. <\/li><li>Other cases due to sphincter dysfunction, usually from neurological disorders (e.g. Pudendal neuropathy, multiple sclerosis).<\/li><\/ul><br>Urethral mobility:<br>Pressure not transmitted appropriately to the urethra resulting in involuntary passage of urine during episodes of raised intra-abdominal pressure. <br><br>Sphincter dysfunction:<br>Sphincter fails to adapt to compress urethra resulting in involuntary passage of urine. When the sphincter completely fails there is often to continuous passage of urine.<br><br><b>Urge incontinence<\/b><br>In these patients there is sense of urgency followed by incontinence. The detrusor muscle in these patients is unstable and urodynamic investigation will demonstrate overactivity of the detrusor muscle at inappropriate times (e.g. Bladder filling). Urgency may be seen in patients with overt neurological disorders and those without. The pathophysiology is not well understood but poor central and peripheral co-ordination of the events surrounding bladder filling are the main processes. <br><br><b>Assessment<\/b><br>Careful history and examination including vaginal examination for cystocele.<br>Bladder diary for at least 3 days<br>Consider flow cystometry if unclear symptomatology or surgery considered and diagnosis is unclear.<br>Exclusion of other organic disease (e.g. Stones, UTI, Cancer)<br><br><b>Management<\/b><br>Conservative measures should be tried first; Stress urinary incontinence or mixed symptoms should undergo 3 months of pelvic floor exercise. Over active bladder should have 6 weeks of bladder retraining.<br>Drug therapy for women with overactive bladder should be offered oxybutynin (or solifenacin if elderly) if conservative measures fail.<br>In women with detrusor instability who fail non operative therapy a trial of sacral neuromodulation may be considered, with conversion to permanent implant if good response. Augmentation cystoplasty is an alternative but will involve long term intermittent self catheterisation.<br>In women with stress urinary incontinence a urethral sling type procedure may be undertaken. Where cystocele is present in association with incontinence it should be repaired particularly if it lies at the introitus. <br><br><b>NICE guidelines<\/b><br><ul><li>Initial assessment urinary incontinence should be classified as stress/urge/mixed.<\/li><li>\tAt least 3/7 bladder diary if unable to classify easily.<\/li><li>Start conservative treatment before urodynamic studies if a diagnosis is obvious from the history<\/li><li>Urodynamic studies if plans for surgery.<\/li><li>Stress incontinence:  Pelvic floor exercises 3/12, if fails consider surgery.<\/li><li>Urge incontinence:  Bladder training &gt;6/52, if fails for oxybutynin (antimuscarinic drugs) then sacral nerve stimulation.<\/li><li>Pelvic floor exercises offered to all women in their 1st pregnancy.<\/li><\/ul>"}, {"name": "Vitamin B12 deficiency", "questions": [{"number": 198, "topic": "Vitamin B12 deficiency", "stem_html": "A 52-year-old woman with a history of gastrectomy reports lethargy and a sore tongue. Blood tests are reported as follows:<br><br><div class=\"table-responsive\"><table class=\"tb\"><tbody><tr><td>Hb<\/td><td>10.7 g/dl<\/td><\/tr><tr><td>MCV<\/td><td>121 fl<\/td><\/tr><tr><td>Plt<\/td><td>177 * 10^9/l<\/td><\/tr><tr><td>WBC<\/td><td>5.4 * 10^9/l<\/td><\/tr><\/tbody><\/table><\/div><br>What is the most likely cause?", "options": [{"label_html": "Vitamin B12 deficiency", "is_correct": true}, {"label_html": "Vitamin C deficiency", "is_correct": false}, {"label_html": "Iron deficiency anaemia", "is_correct": false}, {"label_html": "Anaemia of chronic disease", "is_correct": false}, {"label_html": "Vitamin E deficiency", "is_correct": false}], "correct_index": 0, "explanation_html": "A history of gastrectomy and a macrocytic anaemia should indicate a diagnosis of B12 deficiency."}], "note_html": "Vitamin B12 is mainly used in the body for red blood cell development and also maintenance of the nervous system. It is absorbed after binding to intrinsic factor (secreted from parietal cells in the stomach) and is actively absorbed in the terminal ileum. A small amount of vitamin B12 is passively absorbed without being bound to intrinsic factor.<br><br>Causes of vitamin B12 deficiency<br><ul><li>pernicious anaemia<\/li><li>post gastrectomy<\/li><li>poor diet<\/li><li>disorders of terminal ileum (site of absorption): Crohn's, blind-loop etc<\/li><\/ul><br>Features of vitamin B12 deficiency<br><ul><li>macrocytic anaemia<\/li><li>sore tongue and mouth<\/li><li>neurological symptoms: e.g. Ataxia<\/li><li>neuropsychiatric symptoms: e.g. Mood disturbances<\/li><\/ul><br>Management<br><ul><li>if no neurological involvement 1 mg of IM hydroxocobalamin 3 times each week for 2 weeks, then once every 3 months<\/li><li>if a patient is also deficient in folic acid then it is important to treat the B12 deficiency first to avoid precipitating subacute combined degeneration of the cord<\/li><\/ul>"}, {"name": "Vitamin deficiency", "questions": [{"number": 199, "topic": "Vitamin deficiency", "stem_html": "Deficiency of which vitamin is most likely to explain the presentation of a 3 year old child with Rickets?", "options": [{"label_html": "Vitamin C", "is_correct": false}, {"label_html": "Vitamin B3", "is_correct": false}, {"label_html": "Vitamin D", "is_correct": true}, {"label_html": "Vitamin A", "is_correct": false}, {"label_html": "Vitamin E", "is_correct": false}], "correct_index": 2, "explanation_html": "Vitamin D is needed to help mineralise bone. When this is deficient, mineralisation is inadequate and deformities may result."}, {"number": 200, "topic": "Vitamin deficiency", "stem_html": "A 44 year old lady presents with jaundice. Following a minor ward based surgical procedure she develops troublesome and persistent bleeding. Deficiency of which of the vitamins listed below is responsible?", "options": [{"label_html": "Vitamin C", "is_correct": false}, {"label_html": "Vitamin K", "is_correct": true}, {"label_html": "Vitamin D", "is_correct": false}, {"label_html": "Vitamin B", "is_correct": false}, {"label_html": "Vitamin A", "is_correct": false}], "correct_index": 1, "explanation_html": "Patients who are jaundiced usually have impaired absorption of vitamin K. This can result in loss of the vitamin K dependent clotting factors and troublesome bleeding."}, {"number": 201, "topic": "Vitamin deficiency", "stem_html": "A 69 year old man has been living in sheltered accommodation for many months, with inadequate nutrition notices that his night vision is becoming impaired. Deficiency of which vitamin is responsible?", "options": [{"label_html": "Vitamin B3", "is_correct": false}, {"label_html": "Vitamin A", "is_correct": true}, {"label_html": "Vitamin C", "is_correct": false}, {"label_html": "Vitamin B12", "is_correct": false}, {"label_html": "Vitamin E", "is_correct": false}], "correct_index": 1, "explanation_html": "Loss of vitamin A will result in impair rhodopsin synthesis and results in  poor night vision."}], "note_html": "<div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Vitamin<\/b><\/td><td><b>Effect of deficiency<\/b><\/td><\/tr><tr><td>A<\/td><td>Night blindness<br>Epithelial atrophy<br>Infections<\/td><\/tr><tr><td>B1<\/td><td>Beriberi<\/td><\/tr><tr><td>B2<\/td><td>Dermatitis and photosensitivity<\/td><\/tr><tr><td>B3<\/td><td>Pellagra<\/td><\/tr><tr><td>B12<\/td><td>Pernicious anaemia<\/td><\/tr><tr><td>C<\/td><td>Poor wound healing<br>Impaired collagen synthesis<\/td><\/tr><tr><td>D<\/td><td>Rickets (Children)<br>Osteomalacia (Adults)<\/td><\/tr><tr><td>K<\/td><td>Clotting disorders<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Vomiting", "questions": [{"number": 202, "topic": "Vomiting", "stem_html": "Where is the vomiting centre located?", "options": [{"label_html": "Medulla oblongata", "is_correct": true}, {"label_html": "Substantia nigra", "is_correct": false}, {"label_html": "Antrum of stomach", "is_correct": false}, {"label_html": "Pons", "is_correct": false}, {"label_html": "Midbrain", "is_correct": false}], "correct_index": 0, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">ABC's of Non- GI causes of vomiting <br><br>Acute renal failure <br>Brain (Increased ICP) <br>Cardiac (Inferior MI) <br>DKA <br>Ears (labyrinthitis) <br>Foreign substances (Tylenol, theo, etc) <br>Glaucoma <br>Hyperemesis Gravidarum <br>Infections (pyelonephritis, meningitis)<\/div>"}, {"number": 203, "topic": "Vomiting", "stem_html": "Which of the following agents increases the rate of emptying of the vagotomised stomach?", "options": [{"label_html": "Metoclopramide", "is_correct": false}, {"label_html": "Ondansetron", "is_correct": false}, {"label_html": "Cyclizine", "is_correct": false}, {"label_html": "Erythromycin", "is_correct": true}, {"label_html": "Ciprofloxacin", "is_correct": false}], "correct_index": 3, "explanation_html": "Erythromycin increases the rate of gastric emptying and decreases GI transit times in general. This accounts for its side effect profile (diarrhea). It can be a useful agent in diabetic gastropathy."}, {"number": 204, "topic": "Vomiting", "stem_html": "A 23 year old lady is persistently vomiting following a laparoscopic appendicectomy for a perforated gangrenous appendicitis. Imaging shows some dilated small bowel loops. What is the most appropriate course of action?", "options": [{"label_html": "Insertion of wide bore nasogastric tube", "is_correct": true}, {"label_html": "Insertion of narrow bore nasogastric tube", "is_correct": false}, {"label_html": "Administration of intravenous cyclizine", "is_correct": false}, {"label_html": "Administration of metoclopramide", "is_correct": false}, {"label_html": "Arrange a laparotomy", "is_correct": false}], "correct_index": 0, "explanation_html": "This patient is likely to have a paralytic ileus and the administration of anti emetic drugs in this situation achieves very little. It's important to decompress the stomach and this can be achieved with a wide bore nasogastric tube."}, {"number": 205, "topic": "Vomiting", "stem_html": "Which of the following anti emetic drugs targets the 5HT3 chemoreceptor trigger zone of the area postrema?", "options": [{"label_html": "Metoclopramide", "is_correct": false}, {"label_html": "Ondansetron", "is_correct": true}, {"label_html": "Cisapride", "is_correct": false}, {"label_html": "Cyclizine", "is_correct": false}, {"label_html": "Domperidone", "is_correct": false}], "correct_index": 1, "explanation_html": "5 HT3 blockers are most effective for many types of nausea for this reason."}], "note_html": "Reflex oral expulsion of gastric (and sometimes intestinal) contents - reverse peristalsis and abdominal contraction <br><br>The vomiting centre is in part of the medulla oblongata and is triggered by receptors in several locations: <br><br><ul><li>Labyrinthine receptors of ear (motion sickness) <\/li><li>Over distention receptors of duodenum and stomach<\/li><li>Trigger zone of CNS - many drugs (e.g., opiates) act here <\/li><li>Touch receptors in throat<\/li><\/ul>"}, {"name": "von Willebrands disease", "questions": [{"number": 206, "topic": "von Willebrands disease", "stem_html": "A 33 year old female is admitted for varicose vein surgery. She is fit and well. After the procedure she is persistently bleeding. She is known to have menorrhagia. Investigations show a prolonged bleeding time and increased APTT. She has a normal PT and platelet count. What is the most likely cause?", "options": [{"label_html": "Anti phospholipid syndrome", "is_correct": false}, {"label_html": "Haemophilia", "is_correct": false}, {"label_html": "Factor V Leiden deficiency", "is_correct": false}, {"label_html": "von Willebrands disease", "is_correct": true}, {"label_html": "Protein C and S deficiency", "is_correct": false}], "correct_index": 3, "explanation_html": "Bleeding post operatively, epistaxis and menorrhagia may indicate a diagnosis of vWD. Haemoarthroses are rare. The bleeding time is usually normal in haemophilia (X-linked) and vitamin K deficiency."}, {"number": 207, "topic": "von Willebrands disease", "stem_html": "A 28 year old lady with known von Willebrands disease is bleeding following the excision of a sebaceous cyst. Administration of which of the following agents is most likely to be beneficial?", "options": [{"label_html": "Desmopressin", "is_correct": true}, {"label_html": "Factor IX concentrate", "is_correct": false}, {"label_html": "Factor VII concentrate", "is_correct": false}, {"label_html": "Factor X concentrate", "is_correct": false}, {"label_html": "Vasopressin", "is_correct": false}], "correct_index": 0, "explanation_html": "Desmopressin is useful in managing the bleeding from the commonest type of vWD. Vasopressin is less likely to be disease specific and at most would have a vasoconstrictor approach which is likely to be of brief duration."}, {"number": 208, "topic": "von Willebrands disease", "stem_html": "von Willebrand factor is involved in the stabilization of which of the clotting factors listed below?", "options": [{"label_html": "Factor VII", "is_correct": false}, {"label_html": "Factor VIII", "is_correct": true}, {"label_html": "Factor V", "is_correct": false}, {"label_html": "Anti thrombin III", "is_correct": false}, {"label_html": "Factor Xa", "is_correct": false}], "correct_index": 1, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">vWF stabilizes factor VIII<\/div>If you answered this incorrectly check you did not select factor VII by mistake!"}], "note_html": "- Most common inherited bleeding disorder<br><ul><li>All vWD is caused by mutations in the gene for von Willebrand factor. von Willebrand factor is an adhesive glycoprotein that is secreted by endothelium and megakaryocytes<\/li><li>von Willebrand factor promotes platelet adhesion to damaged endothelium and other platelets. It is also involved in the transport and stabilization of factor VIII<\/li><li>There are 7 subtypes of von Willebrand disease. The commonest is type I (autosomal dominant)  which accounts for 80% of cases, type 2vWD (autosomal dominant or recessive) accounts for 15% of cases<\/li><li>There is a significant spectrum of severity ranging from spontaneous bleeding and epistaxis through to troublesome excessive bleeding following minor procedures<\/li><li>The test that is most commonly used are von willebrand factor assays<\/li><li>Treatments include administration of tranexamic acid for minor cases undergoing minor procedures. More significant bleeding or more significant procedures respond well to DDAVP. This is most effective in type I, less effective in type 2 and contraindicated in type 2B. Patients with type 3 disease do not respond to DDAVP as they lack the ability to secrete vWF<\/li><li>Individuals who cannot have DDAVP or in whom it is contra indicated usually receive factor VIII concentrates containing vWF<\/li><\/ul>"}, {"name": "Warfarin", "questions": [{"number": 209, "topic": "Warfarin", "stem_html": "Which of the following is not directly affected by warfarin?", "options": [{"label_html": "Protein C", "is_correct": false}, {"label_html": "Factor II", "is_correct": false}, {"label_html": "Factor VII", "is_correct": false}, {"label_html": "Factor IX", "is_correct": false}, {"label_html": "Factor VIII", "is_correct": true}], "correct_index": 4, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Warfarin affects synthesis of factors II, VII, IX, X and protein C.<\/div>"}, {"number": 210, "topic": "Warfarin", "stem_html": "Which of the following statements relating to the pharmacology of warfarin is untrue?", "options": [{"label_html": "Interferes with clotting factors 2,7,9 and 10", "is_correct": false}, {"label_html": "It may not be clinically effective for up to 72 hours", "is_correct": false}, {"label_html": "The half life of warfarin is 40 hours", "is_correct": false}, {"label_html": "Warfarin has a large volume of distribution", "is_correct": true}, {"label_html": "It is metabolized in the liver", "is_correct": false}], "correct_index": 3, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Factors 2,7,9,10 affected<\/div>Warfarin interferes with fibrin formation by affecting carboxylation of glutamic acid residues in factors 2,7,9 and 10.  Factor 2 has the longest half life of approximately 60 hours, therefore it can take up to 3 days for warfarin to be fully effective.  Warfarin has a small volume of distribution as it is protein bound."}], "note_html": "Warfarin is an oral anticoagulant which inhibits the reduction of vitamin K to its active hydroquinone form, which in turn acts as a cofactor in the formation of clotting factor II, VII, IX and X (<b>mnemonic = 1972<\/b>) and protein C <br><br>Factors that may potentiate warfarin<br><ul><li>Liver disease<\/li><li>P450 enzyme inhibitors, e.g.: amiodarone, ciprofloxacin<\/li><li>Cranberry juice<\/li><li>Drugs which displace warfarin from plasma albumin, e.g. NSAIDs<\/li><li>Inhibit platelet function: NSAIDs<\/li><\/ul><br>Side-effects<br><ul><li>Haemorrhage<\/li><li>Teratogenic<\/li><li>Skin necrosis: when warfarin is first started biosynthesis of protein C is reduced. This results in a temporary procoagulant state after initially starting warfarin, normally avoided by concurrent heparin administration. Thrombosis may occur in venules leading to skin necrosis.<\/li><\/ul>"}, {"name": "Water absorption", "questions": [{"number": 211, "topic": "Water absorption", "stem_html": "At which of the following sites is the most water absorbed?", "options": [{"label_html": "Right colon", "is_correct": false}, {"label_html": "Left colon", "is_correct": false}, {"label_html": "Stomach", "is_correct": false}, {"label_html": "Jejunum", "is_correct": true}, {"label_html": "Duodenum", "is_correct": false}], "correct_index": 3, "explanation_html": "Water absorption in the gastrointestinal tract predominantly occurs in the small bowel (jejunum and ileum). The colon is an important site of water absorption, however, its overall contribution is relatively small. The importance of the colonic component to water absorption may increase following extensive small bowel resections."}], "note_html": "During a 24 hours period the average person will ingest up to 2000ml of liquid orally. In addition a further 8000ml of fluid will enter the small bowel as gastrointestinal secretions. Intestinal water absorption is a passive process and is related to solute load. In the jejunum the active absorption of glucose and amino acids will create a concentration gradient that water will flow across. In the ileum most water is absorbed by a process of facilitated diffusion (with sodium).<br>Approximately 150ml of water enters the colon daily, most is absorbed, the colon can adapt to, and increase this amount following resection."}]}</script>
  <script>
    const quizData = JSON.parse(document.getElementById("quiz-data").textContent);
    const app = document.getElementById("app");
    const modeButtons = Array.from(document.querySelectorAll("[data-mode-button]"));
    const topicActionButtons = Array.from(document.querySelectorAll("[data-topic-action]"));

    const state = {
      mode: "solve",
      answers: new Map(),
      questionRefs: [],
    };

    function buildTopic(topic, questionOffset) {
      const details = document.createElement("details");
      details.className = "topic";
      details.open = true;

      const summary = document.createElement("summary");
      summary.innerHTML = `
        <div>
          <h2 class="topic-title">${topic.name}</h2>
        </div>
        <div class="topic-meta">
          <span>${topic.questions.length} questions</span>
          <span class="chevron" aria-hidden="true">></span>
        </div>
      `;

      const body = document.createElement("div");
      body.className = "topic-body";

      if (topic.note_html) {
        const notes = document.createElement("details");
        notes.className = "topic-notes";

        const notesSummary = document.createElement("summary");
        notesSummary.innerHTML = `
          <span class="topic-notes-title">Notes</span>
          <span class="chevron" aria-hidden="true">></span>
        `;

        const notesBody = document.createElement("div");
        notesBody.className = "topic-notes-body rich-text";
        notesBody.innerHTML = topic.note_html;

        notes.appendChild(notesSummary);
        notes.appendChild(notesBody);
        body.appendChild(notes);
      }

      topic.questions.forEach((question, indexInTopic) => {
        const globalIndex = questionOffset + indexInTopic;
        body.appendChild(buildQuestionCard(question, globalIndex));
      });

      details.appendChild(summary);
      details.appendChild(body);
      return details;
    }

    function buildQuestionCard(question, questionIndex) {
      const card = document.createElement("article");
      card.className = "question-card is-hidden";
      card.dataset.questionIndex = String(questionIndex);

      const label = document.createElement("p");
      label.className = "question-label";
      label.textContent = `Question ${question.number}`;

      const stem = document.createElement("div");
      stem.className = "stem rich-text";
      stem.innerHTML = question.stem_html;

      const options = document.createElement("div");
      options.className = "options";

      const optionButtons = question.options.map((option, optionIndex) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "option";
        button.dataset.optionIndex = String(optionIndex);
        button.innerHTML = option.label_html;
        button.addEventListener("click", () => {
          if (state.mode !== "solve") {
            return;
          }
          state.answers.set(questionIndex, optionIndex);
          applyQuestionState(questionIndex);
        });
        options.appendChild(button);
        return button;
      });

      const explanation = document.createElement("div");
      explanation.className = "explanation rich-text";
      explanation.innerHTML = `<span class="explanation-label">Explanation</span>${question.explanation_html}`;

      card.appendChild(label);
      card.appendChild(stem);
      card.appendChild(options);
      card.appendChild(explanation);

      state.questionRefs[questionIndex] = {
        card,
        explanation,
        optionButtons,
        question,
      };

      applyQuestionState(questionIndex);
      return card;
    }

    function applyQuestionState(questionIndex) {
      const ref = state.questionRefs[questionIndex];
      if (!ref) {
        return;
      }

      const { card, optionButtons, question } = ref;
      const selectedIndex = state.answers.get(questionIndex);
      const hasSelection = selectedIndex !== undefined;
      const isReview = state.mode === "review";
      const showExplanation = isReview || hasSelection;

      card.classList.toggle("is-hidden", !showExplanation);

      optionButtons.forEach((button, optionIndex) => {
        button.classList.remove("correct", "incorrect", "neutral-revealed");

        if (isReview) {
          button.disabled = true;
          if (optionIndex === question.correct_index) {
            button.classList.add("correct");
          } else {
            button.classList.add("neutral-revealed");
          }
          return;
        }

        button.disabled = false;
        if (!hasSelection) {
          return;
        }

        if (optionIndex === question.correct_index) {
          button.classList.add("correct");
        } else if (optionIndex === selectedIndex) {
          button.classList.add("incorrect");
        } else {
          button.classList.add("neutral-revealed");
        }
      });
    }

    function renderApp() {
      if (!quizData.topics.length) {
        const empty = document.createElement("div");
        empty.className = "empty-state";
        empty.textContent = "No questions were found in this JSON file.";
        app.replaceChildren(empty);
        return;
      }

      const wrapper = document.createElement("div");
      wrapper.className = "topic-list";

      let questionOffset = 0;
      quizData.topics.forEach((topic) => {
        wrapper.appendChild(buildTopic(topic, questionOffset));
        questionOffset += topic.questions.length;
      });

      app.replaceChildren(wrapper);
    }

    function setMode(mode) {
      state.mode = mode;
      modeButtons.forEach((button) => {
        const isActive = button.dataset.modeButton === mode;
        button.classList.toggle("active", isActive);
        button.setAttribute("aria-pressed", String(isActive));
      });

      state.questionRefs.forEach((_, index) => applyQuestionState(index));
    }

    function setAllTopics(open) {
      document.querySelectorAll(".topic").forEach((topic) => {
        topic.open = open;
      });
    }

    modeButtons.forEach((button) => {
      button.addEventListener("click", () => setMode(button.dataset.modeButton));
    });

    topicActionButtons.forEach((button) => {
      button.addEventListener("click", () => {
        setAllTopics(button.dataset.topicAction === "expand");
      });
    });

    renderApp();
    setMode("solve");
  </script>
</body>
</html>
