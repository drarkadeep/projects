<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Physiology</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f1e8;
      --bg-accent: #ebe4d4;
      --surface: rgba(255, 252, 246, 0.92);
      --surface-strong: #fffdf7;
      --border: #d9cfbd;
      --text: #23313a;
      --text-soft: #5f6c73;
      --accent: #496a58;
      --accent-strong: #2f5341;
      --correct-bg: #e0f3e6;
      --correct-border: #77b487;
      --wrong-bg: #fbe0df;
      --wrong-border: #dc7a73;
      --note-bg: #f3eee2;
      --shadow: 0 18px 40px rgba(76, 59, 37, 0.08);
      --radius-lg: 22px;
      --radius-md: 16px;
      --radius-sm: 12px;
      --page-width: 960px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: "Avenir Next", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.72), transparent 32%),
        linear-gradient(180deg, #f8f4eb 0%, #f3ede0 100%);
      line-height: 1.65;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.14), transparent 18%, transparent 82%, rgba(255, 255, 255, 0.14)),
        repeating-linear-gradient(
          180deg,
          rgba(73, 106, 88, 0.015) 0,
          rgba(73, 106, 88, 0.015) 1px,
          transparent 1px,
          transparent 18px
        );
    }

    a {
      color: var(--accent-strong);
    }

    img {
      max-width: 100%;
      height: auto;
      border-radius: 14px;
    }

    .score-badge,
    .badge.rounded-pill.bg-danger {
      display: none !important;
    }

    .page {
      width: min(100% - 24px, var(--page-width));
      margin: 0 auto;
      padding: 18px 0 48px;
    }

    .topbar {
      margin-bottom: 18px;
      padding: 18px;
      background: rgba(255, 252, 246, 0.9);
      border: 1px solid rgba(217, 207, 189, 0.86);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .topbar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .eyebrow {
      margin: 0 0 4px;
      font-size: 0.76rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-soft);
    }

    .title {
      margin: 0;
      font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
      font-size: clamp(1.5rem, 2vw + 1rem, 2.35rem);
      line-height: 1.08;
      font-weight: 700;
    }

    .meta {
      margin: 8px 0 0;
      color: var(--text-soft);
      font-size: 0.96rem;
    }

    .mode-switch {
      display: inline-flex;
      padding: 6px;
      border-radius: 999px;
      background: var(--bg-accent);
      border: 1px solid var(--border);
      gap: 6px;
      flex-shrink: 0;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
      flex-wrap: wrap;
    }

    .topic-actions {
      display: inline-flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .utility-button {
      appearance: none;
      border: 1px solid var(--border);
      background: var(--surface-strong);
      color: var(--text);
      font: inherit;
      font-weight: 700;
      border-radius: 999px;
      padding: 10px 14px;
      cursor: pointer;
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .utility-button:hover {
      transform: translateY(-1px);
      border-color: #c7bba9;
      box-shadow: 0 8px 18px rgba(70, 54, 34, 0.07);
    }

    .utility-button:focus-visible {
      outline: 3px solid rgba(73, 106, 88, 0.22);
      outline-offset: 2px;
    }

    .mode-button {
      appearance: none;
      border: 0;
      background: transparent;
      color: var(--text-soft);
      font: inherit;
      font-weight: 700;
      border-radius: 999px;
      padding: 10px 16px;
      min-width: 92px;
      cursor: pointer;
      transition: transform 0.18s ease, background 0.18s ease, color 0.18s ease, box-shadow 0.18s ease;
    }

    .mode-button:hover {
      transform: translateY(-1px);
      color: var(--text);
    }

    .mode-button.active {
      background: var(--surface-strong);
      color: var(--accent-strong);
      box-shadow: 0 8px 18px rgba(73, 106, 88, 0.14);
    }

    .topic-list {
      display: grid;
      gap: 18px;
    }

    .topic {
      background: rgba(255, 252, 246, 0.78);
      border: 1px solid rgba(217, 207, 189, 0.9);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .topic[open] {
      background: rgba(255, 252, 246, 0.9);
    }

    .topic > summary {
      list-style: none;
      cursor: pointer;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      user-select: none;
    }

    .topic > summary::-webkit-details-marker {
      display: none;
    }

    .topic-title {
      margin: 0;
      font-size: 1.08rem;
      font-weight: 800;
      letter-spacing: 0.01em;
    }

    .topic-meta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--text-soft);
      font-size: 0.94rem;
    }

    .chevron {
      display: inline-block;
      transition: transform 0.2s ease;
      color: var(--accent);
      font-weight: 700;
    }

    .topic[open] > summary .chevron {
      transform: rotate(90deg);
    }

    .topic-notes {
      background: rgba(243, 238, 226, 0.62);
      border: 1px solid #e3d9c8;
      border-radius: var(--radius-md);
      overflow: hidden;
    }

    .topic-notes > summary {
      list-style: none;
      cursor: pointer;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      user-select: none;
    }

    .topic-notes > summary::-webkit-details-marker {
      display: none;
    }

    .topic-notes-title {
      font-size: 0.95rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-soft);
    }

    .topic-notes[open] > summary .chevron {
      transform: rotate(90deg);
    }

    .topic-notes-body {
      padding: 0 16px 16px;
      color: var(--text);
    }

    .topic-body {
      padding: 0 16px 16px;
      display: grid;
      gap: 14px;
    }

    .question-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 18px;
      box-shadow: 0 10px 24px rgba(70, 54, 34, 0.05);
    }

    .question-label {
      margin: 0 0 10px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-soft);
      font-size: 0.88rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 800;
    }

    .stem {
      font-size: 1rem;
    }

    .stem > *:first-child,
    .explanation > *:first-child {
      margin-top: 0;
    }

    .stem > *:last-child,
    .explanation > *:last-child {
      margin-bottom: 0;
    }

    .options {
      margin-top: 16px;
      display: grid;
      gap: 10px;
    }

    .option {
      width: 100%;
      text-align: left;
      border: 1px solid #d8d0c2;
      background: #fffdf8;
      color: var(--text);
      border-radius: var(--radius-sm);
      padding: 14px 15px;
      font: inherit;
      line-height: 1.45;
      cursor: pointer;
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
    }

    .option:hover {
      transform: translateY(-1px);
      border-color: #c7bba9;
      box-shadow: 0 8px 18px rgba(70, 54, 34, 0.07);
    }

    .option:focus-visible {
      outline: 3px solid rgba(73, 106, 88, 0.22);
      outline-offset: 2px;
    }

    .option.correct {
      background: var(--correct-bg);
      border-color: var(--correct-border);
      box-shadow: inset 0 0 0 1px rgba(119, 180, 135, 0.2);
    }

    .option.incorrect {
      background: var(--wrong-bg);
      border-color: var(--wrong-border);
      box-shadow: inset 0 0 0 1px rgba(220, 122, 115, 0.2);
    }

    .option.neutral-revealed {
      background: #faf6ee;
      border-color: #d8d0c2;
      color: #5f676a;
    }

    .option[disabled] {
      cursor: default;
      opacity: 1;
    }

    .explanation {
      margin-top: 14px;
      padding: 14px 16px;
      background: var(--note-bg);
      border: 1px solid #e3d9c8;
      border-radius: 14px;
      color: var(--text);
    }

    .question-card.is-hidden .explanation {
      display: none;
    }

    .explanation-label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-soft);
      font-weight: 800;
    }

    .empty-state {
      padding: 28px 22px;
      background: var(--surface);
      border: 1px dashed var(--border);
      border-radius: var(--radius-lg);
      color: var(--text-soft);
    }

    .rich-text table {
      width: 100%;
      border-collapse: collapse;
      margin: 12px 0;
      overflow: hidden;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.68);
    }

    .rich-text td,
    .rich-text th {
      border: 1px solid #ddd2bf;
      padding: 10px 12px;
      vertical-align: top;
    }

    .rich-text ul,
    .rich-text ol {
      padding-left: 20px;
      margin: 10px 0;
    }

    .rich-text center {
      display: block;
      text-align: center;
    }

    .rich-text .table-responsive {
      overflow-x: auto;
    }

    @media (max-width: 720px) {
      .page {
        width: min(100% - 16px, var(--page-width));
        padding-top: 10px;
      }

      .topbar {
        padding: 14px;
        border-radius: 18px;
      }

      .topbar-inner {
        flex-direction: column;
        align-items: stretch;
      }

      .controls {
        justify-content: stretch;
      }

      .topic-actions {
        width: 100%;
      }

      .utility-button {
        flex: 1 1 0;
      }

      .mode-switch {
        width: 100%;
        justify-content: stretch;
      }

      .mode-button {
        flex: 1 1 50%;
      }

      .topic > summary {
        padding: 16px;
        align-items: flex-start;
      }

      .topic-meta {
        font-size: 0.88rem;
      }

      .topic-body {
        padding: 0 12px 12px;
      }

      .question-card {
        padding: 15px;
      }

      .option {
        padding: 13px 14px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="topbar">
      <div class="topbar-inner">
        <div>
          <p class="eyebrow">Study View</p>
          <h1 class="title">Physiology</h1>
          <p class="meta">211 questions across 92 topics</p>
        </div>
        <div class="controls">
          <div class="topic-actions" aria-label="Topic visibility controls">
            <button class="utility-button" type="button" data-topic-action="expand">Expand all</button>
            <button class="utility-button" type="button" data-topic-action="collapse">Collapse all</button>
          </div>
          <div class="mode-switch" role="tablist" aria-label="Question mode">
            <button class="mode-button active" type="button" data-mode-button="solve" aria-pressed="true">Solve</button>
            <button class="mode-button" type="button" data-mode-button="review" aria-pressed="false">Review</button>
          </div>
        </div>
      </div>
    </section>

    <section id="app"></section>
  </main>

  <script id="quiz-data" type="application/json">{"title": "Physiology", "topics": [{"name": "Acute phase proteins", "questions": [{"number": 1, "topic": "Acute phase proteins", "stem_html": "Which one of the following serum proteins is most likely to increase in a patient with severe sepsis?", "options": [{"label_html": "Transferrin", "is_correct": false}, {"label_html": "Transthyretin", "is_correct": false}, {"label_html": "Ferritin", "is_correct": true}, {"label_html": "Albumin", "is_correct": false}, {"label_html": "Cortisol binding protein", "is_correct": false}], "correct_index": 2, "explanation_html": "Ferritin can be markedly increased during acute illness.  The other parameters tend to decrease during an acute phase response."}], "note_html": "Acute phase proteins<br><ul><li>CRP<\/li><li>procalcitonin<\/li><li>ferritin<\/li><li>fibrinogen<\/li><li>alpha-1 antitrypsin<\/li><li>caeruloplasmin<\/li><li>serum amyloid A<\/li><li>haptoglobin<\/li><li>complement<\/li><\/ul><br>During the acute phase response the liver decreases the production of other proteins (sometimes referred to as negative acute phase proteins). Examples include:<br><ul><li>albumin<\/li><li>transthyretin (formerly known as prealbumin)<\/li><li>transferrin<\/li><li>retinol binding protein<\/li><li>cortisol binding protein<\/li><\/ul><br>Levels of CRP are commonly measured in acutely unwell patients. CRP is a protein synthesised in the liver and binds to phosphocholine in bacterial cells and on those cells undergoing apoptosis. In binding to these cells it is then able to activate the complement system. CRP levels are known to rise in patients following surgery. However, levels of greater than 150 at 48 hours post operatively are suggestive of evolving complications."}, {"name": "Acute renal failure: Pre renal failure vs. acute tubular necrosis", "questions": [{"number": 2, "topic": "Acute renal failure: Pre renal failure vs. acute tubular necrosis", "stem_html": "A 24 year old man is injured in a road traffic accident. He becomes oliguric and his renal function deteriorates. Which of the options below would favor acute tubular necrosis over pre renal uraemia?", "options": [{"label_html": "No response to intravenous fluids", "is_correct": true}, {"label_html": "Urinary sodium &lt; 20mmol/L", "is_correct": false}, {"label_html": "Bland coloured urinary sediment", "is_correct": false}, {"label_html": "Increased urine specific gravity", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 0, "explanation_html": "In acute tubular necrosis there is no response to intravenous fluids because the damage occurs from within the renal system rather than as a result of volume depletion."}], "note_html": "Prerenal uraemia - kidneys retain sodium to preserve volume<br><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th>             <\/th><th><b>Pre-renal uraemia<\/b><\/th><th><b>Acute tubular necrosis<\/b><\/th><\/tr><\/thead><tbody><tr><td>Urine sodium<\/td><td>       &lt; 20 mmol/L<\/td><td>&gt; 30 mmol/L<\/td><\/tr><tr><td>Fractional sodium excretion*<\/td><td>&lt; 1%     <\/td><td>&gt; 1%<\/td><\/tr><tr><td>Fractional urea excretion**<\/td><td>&lt; 35% <\/td><td>&gt;35%<\/td><\/tr><tr><td>Urine:plasma osmolality<\/td><td>&gt; 1.5    <\/td><td>&lt; 1.1<\/td><\/tr><tr><td>Urine:plasma urea<\/td><td>&gt; 10:1 <\/td><td>&lt; 8:1<\/td><\/tr><tr><td>Specific gravity<\/td><td>&gt; 1020<\/td><td>&lt; 1010<\/td><\/tr><tr><td>Urine      <\/td><td>'bland' sediment<\/td><td>brown granular casts<\/td><\/tr><tr><td>Response to fluid challenge<\/td><td>Yes<\/td><td> No<\/td><\/tr><\/tbody><\/table><\/div><br>*fractional sodium excretion = (urine sodium/plasma sodium) / (urine creatinine/plasma creatinine) x 100<br><br>**fractional urea excretion = (urine urea /blood urea ) / (urine creatinine/plasma creatinine) x 100"}, {"name": "Adrenal physiology", "questions": [{"number": 3, "topic": "Adrenal physiology", "stem_html": "A 47 year old lady is diagnosed as suffering from a phaeochromocytoma. From which of the following amino acids are catecholamines primarily derived?", "options": [{"label_html": "Aspartime", "is_correct": false}, {"label_html": "Glutamine", "is_correct": false}, {"label_html": "Arginine", "is_correct": false}, {"label_html": "Tyrosine", "is_correct": true}, {"label_html": "Alanine", "is_correct": false}], "correct_index": 3, "explanation_html": "Catecholamine hormones are derived from tyrosine, it is modified by a DOPA decarboxylase enzyme to become dopamine and thereafter via two further enzymic modifications to noradrenaline and finally adrenaline."}, {"number": 4, "topic": "Adrenal physiology", "stem_html": "Which of the following substances is released from the sympathetic nervous system to stimulate the adrenal medulla?", "options": [{"label_html": "Noradrenaline", "is_correct": false}, {"label_html": "Acetyl choline", "is_correct": true}, {"label_html": "Substance P", "is_correct": false}, {"label_html": "Tyrosine", "is_correct": false}, {"label_html": "Arginine", "is_correct": false}], "correct_index": 1, "explanation_html": "In the autonomic nervous system, noradrenaline is the commonly used neurotransmitter. However, in the adrenal medulla, Acetylcholine is released to stimulate adrenaline release."}, {"number": 5, "topic": "Adrenal physiology", "stem_html": "Which of the substances below is derived primarily from the zona reticularis of the adrenal gland?", "options": [{"label_html": "Mineralocorticoid hormones", "is_correct": false}, {"label_html": "Glucocorticoid hormones", "is_correct": false}, {"label_html": "Sex hormones", "is_correct": true}, {"label_html": "FSH", "is_correct": false}, {"label_html": "Vasopressin", "is_correct": false}], "correct_index": 2, "explanation_html": "<p>No explanation provided.<\/p>"}], "note_html": "<b>Adrenal medulla<\/b> <br>The chromaffin cells of the adrenal medulla secrete the catecholamines noradrenaline and adrenaline. The medulla is innervated by the splanchnic nerves; the preganglionic sympathetic fibres secrete acetylcholine causing the chromaffin cells to secrete their contents by exocytosis. <br>Phaeochromocytomas are derived from these cells and will secrete both adrenaline and nor adrenaline. <br><br><b>Adrenal cortex<\/b><br>Three histologically distinct zones are recognised:<br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb215b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb215.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"https://en.wikipedia.org/wiki/Main_Page\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb215b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Zone<\/b><\/td><td><b>Location<\/b><\/td><td><b>Hormone Secreted<\/b><\/td><\/tr><tr><td>Zona glomerulosa<\/td><td>Outer zone<\/td><td>Aldosterone<\/td><\/tr><tr><td>Zona fasiculata<\/td><td>Middle zone<\/td><td>Glucocorticoids<\/td><\/tr><tr><td>Zona reticularis<\/td><td>Inner zone<\/td><td>Androgens<\/td><\/tr><\/tbody><\/table><\/div><br>The glucocorticoids and aldosterone are mostly bound to plasma proteins in the circulation. Glucocorticoids are inactivated and excreted by the liver."}, {"name": "Adrenaline", "questions": [{"number": 6, "topic": "Adrenaline", "stem_html": "Which of the following mechanisms best accounts for the release of adrenaline?", "options": [{"label_html": "Release from the adrenal medulla in response to increased angiotensin 1 levels", "is_correct": false}, {"label_html": "Release from the zona fasiculata from the adrenal gland in response to increased sympathetic discharge", "is_correct": false}, {"label_html": "Release from the adrenal medulla in response to increased noradrenaline levels", "is_correct": false}, {"label_html": "Release from the adrenal medulla in response to sympathetic stimulation from the splanchnic nerves", "is_correct": true}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 3, "explanation_html": "The adrenal gland releases adrenaline in response to increased sympathetic discharge from preganglionic sympathetic fibres of the splanchnic nerves. These cause the chromafin cells of the medulla to release adrenaline (which is preformed) by exocytosis."}, {"number": 7, "topic": "Adrenaline", "stem_html": "A 52 year old man develops septic shock following a Hartmans procedure for perforated diverticular disease. He is started on an adrenaline infusion. Which of the following is least likely to occur?", "options": [{"label_html": "Peripheral vasoconstriction", "is_correct": false}, {"label_html": "Coronary artery vasospasm", "is_correct": true}, {"label_html": "Gluconeogenesis", "is_correct": false}, {"label_html": "Lipolysis", "is_correct": false}, {"label_html": "Tachycardia", "is_correct": false}], "correct_index": 1, "explanation_html": "It's cardiac effects are mediated via β 1 receptors. The coronary arteries which have β 2 receptors are unaffected."}], "note_html": "<ul><li><b>Fight or Flight<\/b> response <\/li><\/ul>  - Catecholamine (phenylalanine and tyrosine)<br>  - Neurotransmitter and hormone<br>  - Released by the adrenal glands<br>  - Effects on α 1 and 2, β 1 and 2 receptors<br>  - Effect on β 2 receptors in skeletal muscle vessels-causing vasodilation<br>  - Increase cardiac output and total peripheral resistance<br>  - Vasoconstriction in the skin and kidneys causing a <b>narrow pulse pressure<\/b><br>  <br><b>Actions<\/b><br>α adrenergic receptors: <br><ul><li>Inhibits insulin secretion by the pancreas<\/li><li>Stimulates glycogenolysis in the liver and muscle<\/li><li>Stimulates glycolysis in muscle<\/li><\/ul><br>β adrenergic receptors:<br><ul><li>Stimulates glucagon secretion in the pancreas<\/li><li>Stimulates ACTH<\/li><li>Stimulates lipolysis by adipose tissue<\/li><\/ul>"}, {"name": "Aldosterone", "questions": [{"number": 8, "topic": "Aldosterone", "stem_html": "A 73 year old lady is diagnosed with hyperaldosteronism. From which of the following structures is aldosterone released?", "options": [{"label_html": "Zona fasciculata of the adrenal gland", "is_correct": false}, {"label_html": "Juxtaglomerular apparatus of the kidney", "is_correct": false}, {"label_html": "Zona reticularis of the adrenal gland", "is_correct": false}, {"label_html": "Adrenal medulla", "is_correct": false}, {"label_html": "Zona glomerulosa of the adrenal cortex", "is_correct": true}], "correct_index": 4, "explanation_html": "Aldosterone serves to conserve sodium and water. It is produced in the zona glomerulosa of the adrenal cortex."}], "note_html": "Aldosterone is secreted by the zona glomerulosa of the adrenal cortex. It is a mineralocorticoid hormone. Secretion is regulated by the renin- angiotensin system, and by plasma levels of sodium and potassium. Aldosterone conserves sodium by stimulating the reabsorption of sodium in the distal nephron in exchange for potassium. Lack of aldosterone release will result in hyperkalaemia and hyponatraemia."}, {"name": "Alveolar ventilation", "questions": [{"number": 9, "topic": "Alveolar ventilation", "stem_html": "A 73 year old lady is recovering from recent surgery and is resting. Whilst she is resting, which of these muscles will be the major contributor to ventilatory activity?", "options": [{"label_html": "Innermost intercostal", "is_correct": false}, {"label_html": "Diaphragm", "is_correct": true}, {"label_html": "Internal intercostal", "is_correct": false}, {"label_html": "Sternocleidomastoid", "is_correct": false}, {"label_html": "Scalene", "is_correct": false}], "correct_index": 1, "explanation_html": "The diaphragm is the major muscle involved in this process and it is for this reason that diminished activity following major abdominal surgery (note surgery type not specified here) can result in atelectasis."}, {"number": 10, "topic": "Alveolar ventilation", "stem_html": "Which of the following statements relating to alveolar ventilation is untrue?", "options": [{"label_html": "Anatomical dead space is measured by helium dilution", "is_correct": true}, {"label_html": "Physiological dead space is increased in PE", "is_correct": false}, {"label_html": "Alveolar ventilation is defined as the volume of fresh air entering the alveoli per minute", "is_correct": false}, {"label_html": "Anatomical dead space is increased by adrenaline", "is_correct": false}, {"label_html": "Type 2 pneumocytes in the alveoli secrete surfactant", "is_correct": false}], "correct_index": 0, "explanation_html": "Anatomical dead space is measured by Fowlers method.  <br><br>A patient inhales 100% oxygen to empty the conducting zone gases of nitrogen and then exhales through a mouthpiece which analyses the nitrogen concentration at the mouth.  Initially the exhaled gases contain no nitrogen as this is dead space gas; the nitrogen concentration will increase as the alveolar gases are exhaled. Nitrogen which is measured following the breath of 100% oxygen must then have come only from gas exchanging areas of the lung and not dead space."}], "note_html": "- <b>Minute ventilation<\/b> is the total volume of gas ventilated per minute.  <br><br>MV (ml/min)= tidal volume x Respiratory rate (resps/min).  <br><br><ul><li><b>Dead space ventilation<\/b> describes the volume of gas not involved in exchange in the blood. <\/li><\/ul><br>There are 2 types:<br><br>1. Anatomical dead space:  150mls<br><ul><li>Volume of gas in the respiratory tree not involved in gaseous exchange: mouth, pharynx, trachea, bronchi up to terminal bronchioles<\/li><li>\tMeasured by Fowlers method<\/li><li>Increased by:<\/li><li>\tStanding, increased size of person, increased lung volume and drugs causing bronchodilatation e.g. Adrenaline<\/li><\/ul><br>2. Physiological dead space: normal 150 mls, increases in ventilation/perfusion mismatch e.g. PE, COPD, hypotension<br><ul><li>Volume of gas in the alveoli and anatomical dead space not involved in gaseous exchange.  <\/li><\/ul><br><ul><li><b>Alveolar ventilation<\/b> is the volume of fresh air entering the alveoli per minute.  <\/li><\/ul><br>Alveolar ventilation = minute ventilation - Dead space volume"}, {"name": "Anion gap", "questions": [{"number": 11, "topic": "Anion gap", "stem_html": "A patient is seen in clinic complaining of abdominal pain. Routine bloods show:<br><br><div class=\"table-responsive\"><table class=\"tb\"><tbody><tr><td>Na+<\/td><td>142 mmol/l<\/td><\/tr><tr><td>K+<\/td><td>4.0 mmol/l<\/td><\/tr><tr><td>Chloride<\/td><td>104 mmol/l<\/td><\/tr><tr><td>Bicarbonate<\/td><td>19 mmol/l<\/td><\/tr><tr><td>Urea<\/td><td>7.0 mmol/l<\/td><\/tr><tr><td>Creatinine<\/td><td>112 µmol/l<\/td><\/tr><\/tbody><\/table><\/div><br>What is the anion gap?", "options": [{"label_html": "4 mmol/L", "is_correct": false}, {"label_html": "14 mmol/L", "is_correct": false}, {"label_html": "20 mmol/L", "is_correct": false}, {"label_html": "21 mmol/L", "is_correct": false}, {"label_html": "23 mmol/L", "is_correct": true}], "correct_index": 4, "explanation_html": "The anion gap may be calculated by using (sodium + potassium) - (bicarbonate + chloride)<br><br>= (142 + 4.0) - (104 + 19) = 23 mmol/L"}], "note_html": "The anion gap is calculated by:<br><br>(sodium + potassium) - (bicarbonate + chloride)<br><br>A normal anion gap is 8-14 mmol/L<br><br>It is useful to consider in patients with a metabolic acidosis:<br><br>Causes of a normal anion gap or hyperchloraemic metabolic acidosis<br><ul><li>gastrointestinal bicarbonate loss: diarrhoea, ureterosigmoidostomy, fistula<\/li><li>renal tubular acidosis<\/li><li>drugs: e.g. acetazolamide<\/li><li>ammonium chloride injection<\/li><li>Addison's disease<\/li><\/ul><br>Causes of a raised anion gap metabolic acidosis<br><ul><li>lactate: shock, hypoxia<\/li><li>ketones: diabetic ketoacidosis, alcohol<\/li><li>urate: renal failure<\/li><li>acid poisoning: salicylates, methanol<\/li><\/ul>"}, {"name": "Applied neurophysiology", "questions": [{"number": 12, "topic": "Applied neurophysiology", "stem_html": "Intra cranial pressure is governed by the principles of the Monroe-Kellie doctrine. To which of the following does this concept not apply?", "options": [{"label_html": "A 2 month old child", "is_correct": true}, {"label_html": "A 2 year old child", "is_correct": false}, {"label_html": "A 5 year old child", "is_correct": false}, {"label_html": "A 10 year old child", "is_correct": false}, {"label_html": "An adult", "is_correct": false}], "correct_index": 0, "explanation_html": "The Monroe-Kelly Doctrine assumes that the cranial cavity is a rigid box. In children with non fused fontanells this is not the case."}, {"number": 13, "topic": "Applied neurophysiology", "stem_html": "A 45 year old man sustains a closed head injury. He is initially alert, however, his level of consciousness deteriorates on arrival at hospital. An intra cranial pressure monitor is inserted. What is the normal intracranial pressure?", "options": [{"label_html": "35 - 45mm Hg", "is_correct": false}, {"label_html": "45 - 55mm Hg", "is_correct": false}, {"label_html": "&lt;15mm Hg", "is_correct": true}, {"label_html": "25 - 35mm Hg", "is_correct": false}, {"label_html": "25 - 30 mm Hg", "is_correct": false}], "correct_index": 2, "explanation_html": "The normal intracranial pressure is between 7 and 15 mm Hg. The brain can accommodate increases up to 24 mm Hg, thereafter clinical features will become evident."}, {"number": 14, "topic": "Applied neurophysiology", "stem_html": "A 48 year old woman suffers blunt trauma to the head and develops respiratory compromise. As a result she develops hypercapnia. Which of the following effects is most likely to ensue?", "options": [{"label_html": "Cerebral vasoconstriction", "is_correct": false}, {"label_html": "Cerebral vasodilation", "is_correct": true}, {"label_html": "Cerebral blood flow will remain unchanged", "is_correct": false}, {"label_html": "Shunting of blood to peripheral tissues will occur in preference to CNS perfusion", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 1, "explanation_html": "Hypercapnia will tend to produce cerebral vasodilation. This is of considerable importance in patients with cranial trauma as it may increase intracranial pressure."}], "note_html": "<ul><li>Pressure within the cranium is governed by the Monroe-Kelly doctrine. This considers the skull as a closed box. Increases in mass can be accommodated by loss of CSF. Once a critical point is reached (usually 100- 120ml of CSF lost) there can be no further compensation and ICP rises sharply. The next step is that pressure will begin to equate with MAP and neuronal death will occur. Herniation will also accompany this process.<\/li><li>The CNS can autoregulate its own blood supply. Vaso constriction and dilatation of the cerebral blood vessels is the primary method by which this occurs. Extremes of blood pressure can exceed this capacity resulting in risk of stroke. Other metabolic factors such as hypercapnia will also cause vasodilation, which is of importance in ventilating head injured patients.<\/li><li>The brain can only metabolise glucose, when glucose levels fall, consciousness will be impaired. <\/li><\/ul>"}, {"name": "Arterial blood gas interpretation", "questions": [{"number": 15, "topic": "Arterial blood gas interpretation", "stem_html": "A 67 year old male is admitted to the surgical unit with acute abdominal pain.  He is found to have a right sided pneumonia.  The nursing staff put him onto 15L O<sub>2<\/sub> via a non rebreathe mask.  After 30 minutes the patient is found moribund, sweaty and agitated by the nursing staff.  An arterial blood gas reveals:<br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th>pH<\/th><th>7.15<\/th><\/tr><\/thead><tbody><tr><td>pCO<sub>2<\/sub><\/td><td>10.2<\/td><\/tr><tr><td>pO<sub>2<\/sub><\/td><td>8<\/td><\/tr><tr><td>Bicarbonate<\/td><td>32<\/td><\/tr><tr><td>Base excess<\/td><td>- 5.2<\/td><\/tr><\/tbody><\/table><\/div><br>What is the most likely cause for this patients deterioration?", "options": [{"label_html": "Acute respiratory alkalosis secondary to hyperventilation", "is_correct": false}, {"label_html": "Over administration of oxygen in a COPD patient", "is_correct": true}, {"label_html": "Metabolic acidosis secondary to severe pancreatitis", "is_correct": false}, {"label_html": "Metabolic alkalosis secondary to hypokalaemia", "is_correct": false}, {"label_html": "Acute respiratory acidosis secondary to pneumonia", "is_correct": false}], "correct_index": 1, "explanation_html": "This patient has an acute respiratory acidosis, however this is on a background of chronic respiratory acidosis (due to COPD) with a compensatory metabolic alkalosis (the elevated bicarbonate is the main clue to the chronic nature of the respiratory acidosis).  This blood gas picture is typical in a COPD patient who has received too much oxygen; these patients lose their hypoxic drive for respiration, therefore retain CO<sub>2<\/sub> and subsequently hypoventilate leading to respiratory arrest.  If the bicarbonate was normal, then the answer would be acute respiratory acidosis secondary to pneumonia."}, {"number": 16, "topic": "Arterial blood gas interpretation", "stem_html": "Which of the blood gas results listed below is most likely to fit with a patient who has acute respiratory acidosis?", "options": [{"label_html": "pH 7.57, PaCO<sub>2<\/sub> 3.5, Pa O<sub>2<\/sub> 24.5 (FiO<sub>2<\/sub> 85%), Bicarbonate 23.5, Base excess +1.8 mmol", "is_correct": false}, {"label_html": "pH 7.19, pCO<sub>2<\/sub> 10.2, pO<sub>2<\/sub> 16 (FiO<sub>2<\/sub> 85%), Bicarbonate 23.8, Base excess -2.2 mmol", "is_correct": true}, {"label_html": "pH 7.14, PaCO<sub>2<\/sub> 7.4, PaO<sub>2<\/sub> 8.9 (FiO<sub>2<\/sub> 40%), Bicarbonate 14 mmol, Base excess -10.6", "is_correct": false}, {"label_html": "pH 7.36, PaCO<sub>2<\/sub> 7.3, PO<sub>2<\/sub> 8.9 (FiO<sub>2<\/sub> 40%), Bicarbonate 30.2, Base excess 5.3", "is_correct": false}, {"label_html": "pH 7.32, PCO<sub>2<\/sub> 3.8, PaO<sub>2<\/sub> 22.2 (FiO<sub>2<\/sub> 40%), Bicarbonate 19.1, Base excess -7.9", "is_correct": false}], "correct_index": 1, "explanation_html": "<p>No explanation provided.<\/p>"}, {"number": 17, "topic": "Arterial blood gas interpretation", "stem_html": "Which of the following blood gas results would fit with metabolic acidosis with a compensatory respiratory alkalosis?", "options": [{"label_html": "pH 7.36, PaCO<sub>2<\/sub> 7.3, PO<sub>2<\/sub> 8.9 (FiO<sub>2<\/sub> 40%), Bicarbonate 30.2, Base excess +5.3", "is_correct": false}, {"label_html": "pH 7.14, PaCO<sub>2<\/sub> 7.4, PaO<sub>2<\/sub> 8.9 (FiO<sub>2<\/sub> 40%), Bicarbonate 14 mmol, Base excess -10.6", "is_correct": false}, {"label_html": "pH 7.57, PaCO<sub>2<\/sub> 3.5, Pa O<sub>2<\/sub> 24.5 (FiO<sub>2<\/sub> 85%), Bicarbonate 23.5, Base excess +1.8 mmol", "is_correct": false}, {"label_html": "pH 7.32, PCO<sub>2<\/sub> 3.8, PaO<sub>2<\/sub> 22.2 (FiO<sub>2<\/sub> 40%), Bicarbonate 19.1, Base excess -7.9", "is_correct": true}, {"label_html": "pH 7.19, pCO<sub>2<\/sub> 10.2, pO<sub>2<\/sub> 16 (FiO<sub>2<\/sub> 85%), Bicarbonate 23.8, Base excess -2.2 mmol", "is_correct": false}], "correct_index": 3, "explanation_html": "<p>No explanation provided.<\/p>"}, {"number": 18, "topic": "Arterial blood gas interpretation", "stem_html": "Which of the following arterial blood gas results would fit with chronic respiratory acidosis with a compensatory metabolic alkalosis?", "options": [{"label_html": "pH 7.36, PaCO<sub>2<\/sub> 7.3, PO<sub>2<\/sub> 8.9 (FiO<sub>2<\/sub> 40%), Bicarbonate 30.2, Base excess +5.3", "is_correct": true}, {"label_html": "pH 7.32, PCO<sub>2<\/sub> 3.8, PaO<sub>2<\/sub> 22.2 (FiO<sub>2<\/sub> 40%), Bicarbonate 19.1, Base excess -7.9", "is_correct": false}, {"label_html": "pH 7.14, PaCO<sub>2<\/sub> 7.4, PaO<sub>2<\/sub> 8.9 (FiO<sub>2<\/sub> 40%), Bicarbonate 14 mmol, Base excess -10.6", "is_correct": false}, {"label_html": "pH 7.57, PaCO<sub>2<\/sub> 3.5, Pa O<sub>2<\/sub> 24.5 (FiO<sub>2<\/sub> 85%), Bicarbonate 23.5, Base excess +1.8 mmol", "is_correct": false}, {"label_html": "pH 7.19, pCO<sub>2<\/sub> 10.2, pO<sub>2<\/sub> 16 (FiO<sub>2<\/sub> 85%), Bicarbonate 23.8, Base excess -2.2 mmol", "is_correct": false}], "correct_index": 0, "explanation_html": "<p>No explanation provided.<\/p>"}], "note_html": "In advanced life support training, a 5 step approach to arterial blood gas interpretation is advocated.<br><br>1. How is the patient?<br><br>2. Is the patient hypoxaemic?<br>The Pa0<sub>2<\/sub> on air should be 10.0-13.0 kPa<br><br>3. Is the patient acidaemic (pH &lt;7.35) or alkalaemic (pH &gt;7.45)<br><br>4. What has happened to the PaCO<sub>2<\/sub>?<br>If there is acidaemia, an elevated PaCO<sub>2<\/sub> will account for this<br><br>5. What is the bicarbonate level or base excess?<br>A metabolic acidosis will have a low bicarbonate level and a low base excess (&lt; -2 mmol)<br>A metabolic alkalosis will have a high bicarbonate and a high base excess (&gt; +2 mmol)"}, {"name": "Bile", "questions": [{"number": 19, "topic": "Bile", "stem_html": "A 39 year old lady has recurrent attacks of biliary colic. What is the approximate volume of bile to enter the duodenum per 24 hours?", "options": [{"label_html": "500 mL", "is_correct": true}, {"label_html": "50 mL", "is_correct": false}, {"label_html": "100 mL", "is_correct": false}, {"label_html": "2000 mL", "is_correct": false}, {"label_html": "150 mL", "is_correct": false}], "correct_index": 0, "explanation_html": "Between 500 mL and 1.5 L of bile enters the small bowel daily. Most bile salts are recycled by the enterohepatic circulation. When the gallbladder contracts the lumenal pressure is approximately 25cm water, which is why biliary colic may be so painful."}], "note_html": "Bile is produced at a rate of between 500ml and 1500mL per day. Bile is composed of bile salts, bicarbonate, cholesterol, steroids and water. There are three main factors regulating bile flow; hepatic secretion, gall bladder contraction and sphincter of oddi resistance. Bile salts are absorbed in the terminal ileum (and recycled to the liver). Over 90% of all bile salts are recycled in this way, such that the total pool of bile salts is recycled up to six times a day. <br><br><b>Primary bile salts<\/b><br>Cholate and chenodeoxycholate.<br><br><b>Secondary bile salts<\/b><br>Formed by bacterial action on primary bile salts. These are deoxycholate and lithocholate. Of these deoxycholate is reabsorbed, whilst lithocholate is insoluble and excreted. <br><br><b>Pathophysiology of gallstones<\/b><br>Bile salts have a detergent action. They aggregate to form micelles and these have a lipid centre in which fats may be transported. Excessive quantities of cholesterol cannot be transported in this way and will tend to precipitate, resulting in the formation of cholesterol rich gallstones."}, {"name": "Bleeding", "questions": [{"number": 20, "topic": "Bleeding", "stem_html": "An otherwise fit 30 year old male donates 500ml of blood. Which of the processes outlined below is most likely to occur?", "options": [{"label_html": "Oliguria", "is_correct": false}, {"label_html": "Activation of the renin angiotensin system", "is_correct": true}, {"label_html": "Sweating", "is_correct": false}, {"label_html": "Fall in mean arterial pressure", "is_correct": false}, {"label_html": "Tachypnoea", "is_correct": false}], "correct_index": 1, "explanation_html": "The loss of 500ml (assuming a 70 Kg male) will usually be sufficient to activate the renin angiotensin system. It is unlikely that it would cause any other physiological disturbance."}, {"number": 21, "topic": "Bleeding", "stem_html": "A 69 year old man is recovering on the ward following a challenging anti reflux operation. The nursing staff are concerned about the patient and he is reviewed by the medical team. His vital signs are as follows:<br>GCS 13<br>Respiratory rate: 33<br>Pulse rate 125<br>Blood pressure: 95/63<br>Urine output over past hour: 10mls<br>There are concerns about blood loss, what is the most likely volume deficit?", "options": [{"label_html": "500mls", "is_correct": false}, {"label_html": "1000mls", "is_correct": false}, {"label_html": "1850mls", "is_correct": true}, {"label_html": "2250mls", "is_correct": false}, {"label_html": "2500mls", "is_correct": false}], "correct_index": 2, "explanation_html": "The haemodynamic changes described would equate to class III shock. In the context of fundoplication surgery, splenic injury would be the cause."}], "note_html": "The initial response to bleeding, even if of relatively small volume is generalised splanchnic vasoconstriction mediated by activation of the sympathetic nervous system. This process of vasoconstriction is usually sufficient to maintain renal perfusion and cardiac output if the volume of blood lost is small. Over the following hours the circulating fluid volume is restored and normal haemodynamics resume. Loss of greater volumes of blood will typically result in activation in the renin angiotensin system (see diagram below).<br><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb138b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb138.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Renin%E2%80%93angiotensin system\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb138b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center><br>Where the source of bleeding ceases these physiological measures will restore circulating volume. Ongoing bleeding will result in haemorrhagic shock.<br>Blood loss is typically quantified by the degree of shock produced as outlined below:<br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Parameter\t<\/b><\/th><th><b>Class I<\/b><\/th><th><b>\tClass II<\/b><\/th><th><b>\tClass III<\/b><\/th><th><b>\tClass IV<\/b><\/th><\/tr><\/thead><tbody><tr><td>Blood loss ml<\/td><td>&lt;750ml\t<\/td><td>750-1500ml\t<\/td><td>1500-2000ml<\/td><td>\t&gt;2000ml<\/td><\/tr><tr><td>Blood loss %\t<\/td><td>&lt;15%<\/td><td>15-30%<\/td><td>\t30-40%<\/td><td>\t&gt;40%<\/td><\/tr><tr><td>Pulse rate<\/td><td>\t&lt;100\t<\/td><td>&gt;100\t<\/td><td>&gt;120\t<\/td><td>&gt;140<\/td><\/tr><tr><td>Blood pressure\t<\/td><td>Normal\t<\/td><td>Normal\t<\/td><td>Decreased\t<\/td><td>Decreased<\/td><\/tr><tr><td>Respiratory rate\t<\/td><td>14-20\t<\/td><td>20-30\t<\/td><td>30-40<\/td><td>&gt;35<\/td><\/tr><tr><td>Urine output<\/td><td>\t&gt;30ml\t<\/td><td>20-30ml\t<\/td><td>5-15ml\t<\/td><td>&lt;5ml<\/td><\/tr><tr><td>Symptoms\t<\/td><td>Normal<\/td><td>\tAnxious<\/td><td>\tConfused<\/td><td>\tLethargic<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Blood products", "questions": [{"number": 22, "topic": "Blood products", "stem_html": "A 34 year old male donates a unit of blood. It is stored at 4 <sup>o<\/sup>C. After 72 hours which of the following clotting factors will be most affected?", "options": [{"label_html": "Factor IV", "is_correct": false}, {"label_html": "Factor II", "is_correct": false}, {"label_html": "Factor VIII", "is_correct": true}, {"label_html": "Factor IX", "is_correct": false}, {"label_html": "Factor XI", "is_correct": false}], "correct_index": 2, "explanation_html": "Factors V and VIII are sensitive to temperature which is the reason why FFP is frozen soon after collection."}, {"number": 23, "topic": "Blood products", "stem_html": "With which of the following blood products is iatrogenic septicaemia with a gram positive organism most likely?", "options": [{"label_html": "Cryoprecipitate", "is_correct": false}, {"label_html": "Platelets", "is_correct": true}, {"label_html": "Packed red cells", "is_correct": false}, {"label_html": "Factor VIII concentrate", "is_correct": false}, {"label_html": "Factor IX concentrate", "is_correct": false}], "correct_index": 1, "explanation_html": "Platelets are stored at room temperature and must be used soon after collection. This places them at increased risk of culturing gram positive organisms. Iatrogenic infection with gram negative organisms is more likely with packed red cells as these are stored at 4 degrees. <br>Infections with blood products of this nature are both rare."}, {"number": 24, "topic": "Blood products", "stem_html": "In which of the following operations would the use of a cell salvage device be permitted?", "options": [{"label_html": "Ivor - Lewis oesophagectomy", "is_correct": false}, {"label_html": "Revision arthroplasty of the hip for recurrent dislocation", "is_correct": true}, {"label_html": "Revision abdominal aortic aneurysm surgery for graft infection", "is_correct": false}, {"label_html": "Mastectomy and latissimus dorsi flap for invasive ductal carcinoma", "is_correct": false}, {"label_html": "Excision of osteogenic sarcoma from the femur", "is_correct": false}], "correct_index": 1, "explanation_html": "Infection and malignancy are contra indications to use of cell saver devices."}, {"number": 25, "topic": "Blood products", "stem_html": "A 74 year old male with colon cancer sustains an iatrogenic splenic injury during surgery. He is bleeding profusely. What is the most appropriate course of action?", "options": [{"label_html": "Infusion of human prothrombin complex", "is_correct": false}, {"label_html": "Infusion of packed red cells", "is_correct": true}, {"label_html": "Infusion of blood from the cell saver salvaged during surgery", "is_correct": false}, {"label_html": "Infusion of factor VIII concentrate", "is_correct": false}, {"label_html": "Infusion of gelofusine", "is_correct": false}], "correct_index": 1, "explanation_html": "The cell saver is inappropriate because the cells will be contaminated with malignant cells and faecal matter from the open bowel."}, {"number": 26, "topic": "Blood products", "stem_html": "A 53 year old cleaner is admitted with a fall. She is haemodynamically stable and a CT has shown a massive retroperitoneal haematoma. She is on warfarin. What is the most appropriate course of action?", "options": [{"label_html": "Infusion of factor VIII concentrate", "is_correct": false}, {"label_html": "Infusion of vitamin K alone", "is_correct": false}, {"label_html": "Infusion of human prothrombin complex and vitamin K", "is_correct": true}, {"label_html": "Infusion of human prothrombin complex alone", "is_correct": false}, {"label_html": "Infusion of packed red cells", "is_correct": false}], "correct_index": 2, "explanation_html": "Each hospital has different protocols and would recommend discussion with a haematologist. However Human Prothrombin Complex with vitamin K is indicated in this situation, as the condition is life threatening."}, {"number": 27, "topic": "Blood products", "stem_html": "Which of the following statements relating to blood transfusions in surgical patients is false?", "options": [{"label_html": "Packed red cells typically have a haematocrit of between 55 and 75%", "is_correct": false}, {"label_html": "Clotting factor activity in whole blood decreases in samples stored for longer than 7 days", "is_correct": false}, {"label_html": "After 3 weeks of storage blood has a pH of 6.9", "is_correct": false}, {"label_html": "Gamma irradiated blood products are not required routinely", "is_correct": false}, {"label_html": "Patients should be transfused to achieve a target haemoglobin of 10 g/dl and a haematocrit of 30%", "is_correct": true}], "correct_index": 4, "explanation_html": "Patients can generally be managed without transfusion as long as the Hb is 7 or greater. The exact level depends upon patient factors such as co-morbidities. Old blood functions less effectively and should not be used during massive transfusions."}], "note_html": "<b>Whole blood fractions<\/b><br><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Fraction<\/b><\/td><td><b>Key points<\/b><\/td><\/tr><tr><td>Packed red cells<\/td><td>Used for transfusion in chronic anaemia and cases where infusion of large volumes of fluid may result in cardiovascular compromise. Product obtained by centrifugation of whole blood.<\/td><\/tr><tr><td>Platelet rich plasma<\/td><td>Usually administered to patients who are thrombocytopaenic and are bleeding or require surgery. It is obtained by low speed centrifugation.<\/td><\/tr><tr><td>Platelet concentrate<\/td><td>Prepared by high speed centrifugation and administered to patients with thrombocytopaenia.<\/td><\/tr><tr><td>Fresh frozen plasma<\/td><td><ul><li>Prepared from single units of blood.<\/li><li>Contains clotting factors, albumin and immunoglobulin.<\/li><li>Unit is usually 200 to 250ml.<\/li><li>Usually used in correcting clotting deficiencies in patients with hepatic synthetic failure who are due to undergo surgery.<\/li><li>Usual dose is 12-15ml/Kg<sup>-1<\/sup>.<\/li><li>It should not be used as first line therapy for hypovolaemia.<\/li><\/ul><\/td><\/tr><tr><td>Cryoprecipitate<\/td><td><ul><li>Formed from supernatant of FFP.<\/li><li>Rich source of Factor VIII and fibrinogen.<\/li><li>Allows large concentration of factor VIII to be administered in small volume.<\/li><\/ul><\/td><\/tr><tr><td>SAG-Mannitol Blood<\/td><td>Removal of all plasma from a blood unit and substitution with:<br><ul><li>Sodium chloride <\/li><li>Adenine<\/li><li>Anhydrous glucose<\/li><li>Mannitol<\/li><\/ul>Up to 4 units of SAG M Blood may be administered. Thereafter whole blood is preferred. After 8 units, clotting factors and platelets should be considered.<\/td><\/tr><\/tbody><\/table><\/div><br><b>Cell saver devices<\/b><br>These collect patients own blood lost during surgery and then re-infuse it. There are two main types:<br><ul><li>Those which wash the blood cells prior to re-infusion. These are more expensive to purchase and more complicated to operate. However, they reduce the risk of re-infusing contaminated blood back into the patient.<\/li><li>Those which do not wash the blood prior to re-infusion. <\/li><\/ul>Their main advantage is that they avoid the use of infusion of blood from donors into patients and this may reduce risk of blood borne infection. It may be acceptable to Jehovah's witnesses. It is contraindicated in malignant disease for risk of facilitating disease dissemination.<br><br><b>Blood products used in warfarin reversal<\/b><br>In some surgical patients the use of warfarin can pose specific problems and may require the use of specialised blood products<br><br>Immediate or urgent surgery in patients taking warfarin(1) (2):<br><br>1. Stop warfarin<br><br>2. Vitamin K (reversal within 4-24 hours)<br>-IV takes 4-6h to work (at least 5mg)<br>-Oral can take 24 hours to be clinically effective<br><br>3. Fresh frozen plasma<br><i>Used less commonly now as 1st line warfarin reversal<\/i><br>-30ml/kg<sup>-1<\/sup><br>-Need to give at least 1L fluid in 70kg person (therefore not appropriate in fluid overload)<br>-Need blood group<br>-Only use if human prothrombin complex is not available<br><br>4. Human Prothrombin Complex (reversal within 1 hour)<br>-Bereplex 50 u/kg<br>-Rapid action but factor 6 short half life, therefore give with vitamin K<br><br><b>References<\/b><br>1. Dentali, F., C. Marchesi, et al. (2011). 'Safety of prothrombin complex concentrates for rapid anticoagulation reversal of vitamin K antagonists. A meta-analysis.' Thromb Haemost 106(3): 429-438.<br><br>2. http://www.transfusionguidelines.org/docs/pdfs/bbt-03warfarin-reversal-flowchart-2006.pdf"}, {"name": "Calcium homeostasis", "questions": [{"number": 28, "topic": "Calcium homeostasis", "stem_html": "A 43 year old lady is diagnosed with primary hyperparathyroidism. Her serum PTH levels are elevated. An endocrine surgeon performs a parathyroidectomy. How long will it take for the serum PTH levels to fall if the functioning adenoma has been successfully removed?", "options": [{"label_html": "6 hours", "is_correct": false}, {"label_html": "24 hours", "is_correct": false}, {"label_html": "2 hours", "is_correct": false}, {"label_html": "1 hour", "is_correct": false}, {"label_html": "10 minutes", "is_correct": true}], "correct_index": 4, "explanation_html": "PTH has a very short half life usually less than 10 minutes. Therefore a demonstrable drop in serum PTH should be identified within 10 minutes of removing the adenoma. This is useful clinically since it is possible to check the serum PTH intraoperatively prior to skin closure and explore the other glands if levels fail to fall."}, {"number": 29, "topic": "Calcium homeostasis", "stem_html": "A 34 year old lady has just undergone a parathyroidectomy for primary hyperparathyroidism. The operation is difficult and all 4 glands were explored. The wound was clean and dry at the conclusion of the procedure and a suction drain inserted. On the ward she becomes irritable and develops stridor. On examination, her neck is soft and the drain empty. Which of the following treatments should be tried initially?", "options": [{"label_html": "Administration of intravenous calcium gluconate", "is_correct": true}, {"label_html": "Administration of intravenous lorazepam", "is_correct": false}, {"label_html": "Removal of the skin closure on the ward", "is_correct": false}, {"label_html": "Direct laryngoscopy", "is_correct": false}, {"label_html": "Administration of calcichew D3 orally", "is_correct": false}], "correct_index": 0, "explanation_html": "Exploration of the parathyroid glands may result in impairment of the blood supply. Serum PTH levels can fall quickly and features of hypocalcaemia may ensue, these include neuromuscular irritability and laryngospasm. Prompt administration of intravenous calcium gluconate can be lifesaving. The absence of any neck swelling and no blood in the drain would go against a contained haematoma in the neck (which should be managed by removal of skin closure)."}, {"number": 30, "topic": "Calcium homeostasis", "stem_html": "A 54 year old lady has her serum calcium measured. Assuming her renal function is normal, what proportion of calcium filtered at the glomerulus will be reabsorbed by the renal tubules?", "options": [{"label_html": "5%", "is_correct": false}, {"label_html": "15%", "is_correct": false}, {"label_html": "25%", "is_correct": false}, {"label_html": "50%", "is_correct": false}, {"label_html": "95%", "is_correct": true}], "correct_index": 4, "explanation_html": "Most filtered calcium is reabsorbed (95%) a rare disorder of familial hypocalciuric hypercalcemia may affect this proportion."}, {"number": 31, "topic": "Calcium homeostasis", "stem_html": "A 22 year old man is undergoing a daycase excision of a sebaceous cyst. He is needle phobic and as the surgeon approaches with the needle the patient begins to hyperventilate. He soon develops circumoral parasthesia and muscular twitching. Which of the following is the most likely explanation for this event?", "options": [{"label_html": "Temporal lobe epilepsy", "is_correct": false}, {"label_html": "Reduction in ionised calcium levels", "is_correct": true}, {"label_html": "Increase in ionised calcium levels", "is_correct": false}, {"label_html": "Fall in serum PTH levels", "is_correct": false}, {"label_html": "Rise in serum PTH levels", "is_correct": false}], "correct_index": 1, "explanation_html": "50% of plasma calcium is ionised. Hyperventilation will induce a state of alkalosis which will lower ionised plasma calcium levels."}, {"number": 32, "topic": "Calcium homeostasis", "stem_html": "Which of the following surgical procedures will have the greatest long term impact on a patients calcium metabolism?", "options": [{"label_html": "Distal gastrectomy", "is_correct": false}, {"label_html": "Cholecystectomy", "is_correct": false}, {"label_html": "Extensive small bowel resection", "is_correct": true}, {"label_html": "Sub total colectomy", "is_correct": false}, {"label_html": "Gastric banding for obesity", "is_correct": false}], "correct_index": 2, "explanation_html": "Calcium is mainly absorbed from the small bowel and this will have a direct long term impact on calcium metabolism and increase the risk of osteoporosis. Gastric banding and distal gastrectomy may affect a patients dietary choices but any potential deleterious nutritional intake may be counteracted by administration of calcium supplements orally. Only 10% of calcium is absorbed from the colon so that a sub total colectomy will only have a negligible effect."}, {"number": 33, "topic": "Calcium homeostasis", "stem_html": "Which of the following is responsible for the release and synthesis of calcitonin?", "options": [{"label_html": "Parathyroid glands", "is_correct": false}, {"label_html": "Anterior pituitary", "is_correct": false}, {"label_html": "Thyroid gland", "is_correct": true}, {"label_html": "Posterior pituitary", "is_correct": false}, {"label_html": "Adrenal glands", "is_correct": false}], "correct_index": 2, "explanation_html": "Calcitonin has the opposite effect of PTH and is released from the thyroid gland."}], "note_html": "Calcium ions are linked to a wide range of physiological processes. The largest store of bodily calcium is contained within the skeleton. Calcium levels are primarily controlled by parathyroid hormone, vitamin D and calcitonin. <br><br><b>Hormonal regulation of calcium<\/b><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Hormone<\/b><\/th><th><b>Actions<\/b><\/th><\/tr><\/thead><tbody><tr><td><b>Parathyroid hormone (PTH)<\/b><\/td><td><ul><li>Increase calcium levels and decrease phosphate levels<\/li><li>Increases bone resorption<\/li><li>Immediate action on osteoblasts to increase ca<sup>2+<\/sup> in extracellular fluid<\/li><li>Osteoblasts produce a protein signaling molecule that activate osteoclasts which cause bone resorption<\/li><li>Increases renal tubular reabsorption of calcium<\/li><li>Increases synthesis of 1,25(OH)2D (active form of vitamin D) in the kidney which increases bowel absorption of Ca<sup>2+<\/sup><\/li><li>Decreases renal phosphate reabsorption<\/li><\/ul><\/td><\/tr><tr><td><b>1,25-dihydroxycholecalciferol (the active form of vitamin D)<\/b><\/td><td><ul><li>Increases plasma calcium and plasma phosphate<\/li><li>Increases renal tubular reabsorption and gut absorption of calcium<\/li><li>Increases osteoclastic activity at high levels and osteoblasts at low levels<\/li><li>Increases renal phosphate reabsorption<\/li><\/ul><\/td><\/tr><tr><td><b>Calcitonin<\/b><\/td><td><ul><li>Secreted by C cells of thyroid<\/li><li>Inhibits intestinal calcium absorption<\/li><li>Inhibits osteoclast activity<\/li><li>Inhibits renal tubular absorption of calcium<\/li><\/ul><\/td><\/tr><\/tbody><\/table><\/div><br>Both growth hormone and thyroxine also play a small role in calcium metabolism."}, {"name": "Cardiac physiology", "questions": [{"number": 34, "topic": "Cardiac physiology", "stem_html": "A 43 year old lady is recovering on the intensive care unit following a Whipples procedure. She has a central venous line in situ. Which of the following will lead to the y descent on the waveform trace ?", "options": [{"label_html": "Ventricular contraction", "is_correct": false}, {"label_html": "Emptying of the right atrium", "is_correct": true}, {"label_html": "Emptying of the right ventricle", "is_correct": false}, {"label_html": "Opening of the pulmonary valve", "is_correct": false}, {"label_html": "Cardiac tamponade", "is_correct": false}], "correct_index": 1, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">JVP<br>3 Upward deflections and 2 downward deflections<br><br><b>Upward deflections<\/b><br><ul><li>a wave = atrial contraction<\/li><li>c wave = ventricular contraction<\/li><li>v wave = atrial venous filling<\/li><\/ul><br><b>Downward deflections<\/b><br><ul><li>x wave = atrium relaxes and tricuspid valve moves down<\/li><li>y wave = ventricular filling<\/li><\/ul><\/div>The y descent represents the emptying of the atrium and the filling of the right ventricle."}, {"number": 35, "topic": "Cardiac physiology", "stem_html": "Which of the following is the equivalent of cardiac preload?", "options": [{"label_html": "End diastolic volume", "is_correct": true}, {"label_html": "Stroke volume", "is_correct": false}, {"label_html": "Systemic vascular resistance", "is_correct": false}, {"label_html": "Mean arterial pressure", "is_correct": false}, {"label_html": "Peak systolic arterial pressure", "is_correct": false}], "correct_index": 0, "explanation_html": "Preload is the same as end diastolic volume. When it is increased slightly there is an associated increase in cardiac output (Frank Starling principle). When it is markedly increased e.g. over 250ml then cardiac output falls."}, {"number": 36, "topic": "Cardiac physiology", "stem_html": "Where are the arterial baroreceptors located?", "options": [{"label_html": "Carotid sinus and aortic arch", "is_correct": true}, {"label_html": "Carotid sinus only", "is_correct": false}, {"label_html": "Superior vena cava", "is_correct": false}, {"label_html": "External carotid artery", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 0, "explanation_html": "They lie in the carotid sinus and aortic arch."}, {"number": 37, "topic": "Cardiac physiology", "stem_html": "A 43 year old lady undergoes a day case laparoscopic cholecystectomy. The operation is more difficult than anticipated and a drain is placed to the operative site. Whilst in recovery, the patient loses 1800ml of frank blood into the drain. Which of the following will not occur?", "options": [{"label_html": "Release of aldosterone via the Bainbridge reflex", "is_correct": true}, {"label_html": "Reduced urinary sodium excretion", "is_correct": false}, {"label_html": "Increase in sympathetic discharge to ventricular muscle", "is_correct": false}, {"label_html": "Fall in parasympathetic discharge to the sino atrial node", "is_correct": false}, {"label_html": "Decreased stimulation from atrial pressure receptors", "is_correct": false}], "correct_index": 0, "explanation_html": "The Bainbridge reflex is the increase in heart rate mediated via atrial stretch receptors that occurs following a rapid infusion of blood. Note the question asks which will not occur and that is why it is A and not the other options."}], "note_html": "- The heart has four chambers ejecting blood into both low pressure and high pressure systems. <br><ul><li>The pumps generate pressures of between 0-25mmHg on the right side and 0-120 mmHg on the left. <\/li><li>At rest diastole comprises 2/3 of the cardiac cycle. <\/li><li>The product of the frequency of heart rate and stroke volume combine to give the cardiac output which is typically 5-6L per minute. <\/li><\/ul><br>Detailed descriptions of the various waveforms are often not a feature of MRCS A (although they are on the syllabus). However, they are a very popular topic for surgical physiology in the MRCS B exam.<br><br><b>Electrical properties<\/b><br><ul><li>Intrinsic myogenic rhythm within cardiac myocytes means that even the denervated heart is capable of contraction. <\/li><li>In the normal situation the cardiac impulse is generated in the sino atrial node in the right atrium and conveyed to the ventricles via the atrioventricular node. <\/li><li>The sino atrial node is also capable of spontaneous discharge and in the absence of background vagal tone will typically discharge around 100x per minute. Hence the higher resting heart rate found in cardiac transplant cases. In the SA and AV nodes the resting membrane potential is lower than in surrounding cardiac cells and will slowly depolarise from -70mV to around -50mV at which point an action potential is generated. <\/li><li>Differences in the depolarisation slopes between SA and AV nodes help to explain why the SA node will depolarise first. The cells have a refractory period during which they cannot be re-stimulated and this period allows for adequate ventricular filling. In pathological tachycardic states this time period is overridden and inadequate ventricular filling may then occur, cardiac output falls and syncope may ensue. <\/li><\/ul><br>Parasympathetic fibres project to the heart via the vagus and will release acetylcholine. Sympathetic fibres release nor adrenaline and circulating adrenaline comes from the adrenal medulla. Noradrenaline binds to β 1 receptors in the SA node and increases the rate of pacemaker potential depolarisation. <br><br><b>Cardiac cycle<\/b><br><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb034b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb034.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Cardiac cycle\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb034b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center><br><ul><li><b>Mid diastole<\/b>: AV valves open. Ventricles hold 80% of final volume. Outflow valves shut. Aortic pressure is high. <\/li><\/ul><br><ul><li><b>Late diastole<\/b>: Atria contract. Ventricles receive 20% to complete filling. Typical end diastolic volume 130-160ml.<\/li><\/ul><br><ul><li><b>Early systole<\/b>: AV valves shut. Ventricular pressure rises. Isovolumetric ventricular contraction. AV Valves bulge into atria (c-wave). Aortic and pulmonary pressure exceeded- blood is ejected. Shortening of ventricles pulls atria downwards and drops intra atrial pressure (x-descent).<\/li><\/ul><br><ul><li><b>Late systole<\/b>: Ventricular muscles relax and ventricular pressures drop. Although ventricular pressure drops the aortic pressure remains constant owing to peripheral vascular resistance and elastic property of the aorta. Brief period of retrograde flow that occurs in aortic recoil shuts the aortic valve. Ventricles will contain 60ml end systolic volume. The average stroke volume is 70ml (i.e. Volume ejected). <\/li><\/ul><br><ul><li><b>Early diastole<\/b>: All valves are closed. Isovolumetric ventricular relaxation occurs. Pressure wave associated with closure of the aortic valve increases aortic pressure. The pressure dip before this rise can be seen on arterial waveforms and is called the incisura. During systole the atrial pressure increases such that it is now above zero (v- wave). Eventually atrial pressure exceed ventricular pressure and AV valves open - atria empty passively into ventricles and atrial pressure falls (y -descent )<\/li><\/ul><br>The negative atrial pressures are of clinical importance as they can allow air embolization to occur if the neck veins are exposed to air. This patient positioning is important in head and neck surgery to avoid this occurrence if veins are inadvertently cut, or during CVP line insertion. <br><br><b>Mechanical properties<\/b><br><ul><li>Preload = end diastolic volume<\/li><li>Afterload = aortic pressure<\/li><\/ul><br>It is important to understand the principles of <b>Laplace's law<\/b> in surgery. <br><ul><li>It states that for hollow organs with a circular cross section, the total circumferential wall tension depends upon the circumference of the wall, multiplied by the thickness of the wall and on the wall tension. <\/li><li>The total luminal pressure depends upon the cross sectional area of the lumen and the transmural pressure. Transmural pressure is the internal pressure minus external pressure and at equilibrium the total pressure must counterbalance each other. <\/li><li>In terms of cardiac physiology the law explains that the rise in ventricular pressure that occurs during the ejection phase is due to physical change in heart size. It also explains why a dilated diseased heart will have impaired systolic function. <\/li><\/ul><br><b>Starlings law<\/b><br><ul><li>Increase in end diastolic volume will produce larger stroke volume. <\/li><li>This occurs up to a point beyond which cardiac fibres are excessively stretched and stroke volume will fall once more. It is important for the regulation of cardiac output in cardiac transplant patients who need to increase their cardiac output. <\/li><\/ul><br><b>Baroreceptor reflexes<\/b><br><ul><li>Baroreceptors located in aortic arch and carotid sinus.<\/li><li>Aortic baroreceptor impulses travel via the vagus and from the carotid via the glossopharyngeal nerve.<\/li><li>They are stimulated by arterial stretch.<\/li><li>Even at normal blood pressures they are tonically active.<\/li><li>Increase in baroreceptor discharge causes:<\/li><\/ul><br>*Increased parasympathetic discharge to the SA node.<br>*Decreased sympathetic discharge to ventricular muscle causing decreased contractility and fall in stroke volume.<br>*Decreased sympathetic discharge to venous system causing increased compliance. <br>*Decreased peripheral arterial vascular resistance<br><br><b>Atrial stretch receptors<\/b><br><ul><li>Located in atria at junction between pulmonary veins and vena cava.<\/li><li>Stimulated by atrial stretch and are thus low pressure sensors.<\/li><li>Increased blood volume will cause increased parasympathetic activity.<\/li><li>Very rapid infusion of blood will result in increase in heart rate mediated via atrial receptors: the <b>Bainbridge reflex<\/b>.<\/li><li>Decreases in receptor stimulation results in increased sympathetic activity this will decrease renal blood flow-decreases GFR-decreases urinary sodium excretion-renin secretion by juxtaglomerular apparatus-Increase in angiotensin II.<\/li><li>Increased atrial stretch will also result in increased release of atrial natriuretic peptide.<\/li><\/ul>"}, {"name": "Cellular metabolism", "questions": [{"number": 38, "topic": "Cellular metabolism", "stem_html": "The Cori cycle is important in lactate metabolism in the septic surgical patient. It is used to describe a pathway in which glucose is metabolised anaerobically to lactate in one tissue and the lactate is converted back to glucose in another. Which one of the following relies on this cycle to meet all of its energy needs?", "options": [{"label_html": "Hepatocyte", "is_correct": false}, {"label_html": "Leucocyte", "is_correct": false}, {"label_html": "Erythrocyte", "is_correct": true}, {"label_html": "Pneumocyte", "is_correct": false}, {"label_html": "Goblet cells", "is_correct": false}], "correct_index": 2, "explanation_html": "Erythrocytes lack a mitochondria and therefore they generate energy via glycolytic pathways only. All the other cell types have mitochondria and will therefore use the Krebs cycle unless true anaerobic conditions prevail."}], "note_html": "- Circulating glucose enters the cell, subsequently a glycolytic process results in the generation of ATP and pyruvate<br><ul><li>In the presence of oxygen, the pyruvate from the glycolytic process then enters the Krebs cycle<\/li><li>When oxygen is limited or absent, pyruvate enters an anaerobic pathway. In these reactions, pyruvate can be converted into lactic acid. In addition to generating an additional ATP, this pathway serves to keep the pyruvate concentration low so glycolysis continues, and it oxidizes NADH into the NAD+ needed by glycolysis. In this reaction, lactic acid replaces oxygen as the final electron acceptor. Anaerobic respiration occurs in most cells of the body when oxygen is limited or mitochondria are absent or nonfunctional. For example, because erythrocytes (red blood cells) lack mitochondria, they must produce their ATP from anaerobic respiration. This is an effective pathway of ATP production for short periods of time, ranging from seconds to a few minutes. The lactic acid produced diffuses into the plasma and is carried to the liver, where it is converted back into pyruvate or glucose via the Cori cycle<\/li><li>In the presence of oxygen, pyruvate can enter the Krebs cycle where additional energy is extracted as electrons are transferred from the pyruvate to the receptors NAD+, GDP, and FAD, with carbon dioxide being a by product. The NADH and FADH2 pass electrons on to the electron transport chain, which uses the transferred energy to produce ATP. As the terminal step in the electron transport chain, oxygen is the terminal electron acceptor and creates water inside the mitochondria. <\/li><li>The oxidative pathways eventually yield a total of 36 ATP molecules and are therefore far better at generating energy than anaerobic pathways.<\/li><\/ul>"}, {"name": "Cerebral blood flow", "questions": [{"number": 39, "topic": "Cerebral blood flow", "stem_html": "A 22 year old man suffers a blunt head injury. He is drowsy and has a GCS of 7 on admission. Which of the following is the major determinant of cerebral blood flow in this situation?", "options": [{"label_html": "Systemic blood pressure", "is_correct": false}, {"label_html": "Mean arterial pressure", "is_correct": false}, {"label_html": "Intra cranial pressure", "is_correct": true}, {"label_html": "Hypoxaemia", "is_correct": false}, {"label_html": "Acidosis", "is_correct": false}], "correct_index": 2, "explanation_html": "Hypoxaemia and acidosis may both affect cerebral blood flow. However, in the traumatic situation increases in intracranial pressure are far more likely to occur especially when GCS is low. This will adversely affect cerebral blood flow."}], "note_html": "- CNS autoregulates its own blood supply<br><ul><li>Factors affecting the cerebral pressure include; systemic carbon dioxide levels, CNS metabolism, CNS trauma, CNS pressure<\/li><li>The PaCO<sub>2<\/sub> is the most potent mediator<\/li><li>Acidosis and hypoxaemia will increase cerebral blood flow but to a lesser degree<\/li><li>Intra cranial pressure may increase in patients with head injuries and this can result in impaired blood flow<\/li><li>Intra cerebral pressure is governed by Monroe-Kelly Doctrine which considers skull as closed box, changes in pressure are offset by loss of CSF. When this is no longer possible ICP rises<\/li><\/ul>"}, {"name": "Cerebral perfusion pressure", "questions": [{"number": 40, "topic": "Cerebral perfusion pressure", "stem_html": "A healthy man has a blood pressure of 120/80 mmHg and an intra cranial pressure of 17 mmHg. What is the approximate cerebral perfusion pressure?", "options": [{"label_html": "103 mmHg", "is_correct": false}, {"label_html": "63 mmHg", "is_correct": false}, {"label_html": "83 mmHg", "is_correct": false}, {"label_html": "91 mmHg", "is_correct": false}, {"label_html": "76 mmHg", "is_correct": true}], "correct_index": 4, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Cerebral perfusion pressure= Mean arterial pressure - intra cranial pressure<\/div>The mean arterial pressure can be calculated as:<br>MAP= Diastolic pressure+ 0.333(Systolic pressure- Diastolic pressure)<br>In this situation the MAP = 93.<br>The ICP is subtracted from this value; 93 - 17 = 76"}], "note_html": "The cerebral perfusion pressure (CPP) is defined as being the net pressure gradient causing blood flow to the brain. The CPP is tightly autoregulated to maximise cerebral perfusion. A sharp rise in CPP may result in a rising ICP, a fall in CPP may result in cerebral ischaemia. It may be calculated by the following equation:<br><br>CPP= Mean arterial pressure - Intra cranial pressure<br><br>Following trauma, the CPP has to be carefully controlled and the may require invasive monitoring of the ICP and MAP."}, {"name": "Cerebrospinal fluid", "questions": [{"number": 41, "topic": "Cerebrospinal fluid", "stem_html": "A 23 year old woman presents with severe headache, photophobia and neck stiffness. A lumbar puncture is undertaken and cerebrospinal fluid is sent for microscopy and culture. Culture shows a growth of Neisseria meningitidis. What is likely to be the predominant cell type in the cerebrospinal fluid?", "options": [{"label_html": "Eosinophils", "is_correct": false}, {"label_html": "Basophils", "is_correct": false}, {"label_html": "Macrophages", "is_correct": false}, {"label_html": "Lymphocytes", "is_correct": false}, {"label_html": "Neutrophils", "is_correct": true}], "correct_index": 4, "explanation_html": "In bacterial meningitis, neutrophils are typically present in the CSF. In viral meningitis, a lymphocytosis is said to predominate. Clinically, there can be overlap with a neutrophilia occurring in some cases of viral meningitis. In bacterial meningitis, the neutrophilia can be attenuated by the administration of antibiotics."}, {"number": 42, "topic": "Cerebrospinal fluid", "stem_html": "Via which structure does cerebrospinal fluid enter the subarachnoid space?", "options": [{"label_html": "Cisterna magna", "is_correct": false}, {"label_html": "Cerebral aqueduct", "is_correct": false}, {"label_html": "Foramen of Luschka", "is_correct": true}, {"label_html": "Cisterna chyli", "is_correct": false}, {"label_html": "Arachnoid granulations", "is_correct": false}], "correct_index": 2, "explanation_html": "CSF leaves the 4th ventricle via the laterally placed foramen of Luschka and also via the midline foramen of Magendie."}, {"number": 43, "topic": "Cerebrospinal fluid", "stem_html": "In which space is a lumbar puncture performed?", "options": [{"label_html": "Subdural space", "is_correct": false}, {"label_html": "Epidural space", "is_correct": false}, {"label_html": "Subarachnoid space", "is_correct": true}, {"label_html": "Extradural space", "is_correct": false}, {"label_html": "Intraventricular space", "is_correct": false}], "correct_index": 2, "explanation_html": "Samples of CSF are normally obtained by inserting a needle between the third and fourth lumbar vertebrae. The tip of the needle lies in the sub arachnoid space, the spinal cord terminates at L1 and is not at risk of injury. Clinical evidence of raised intracranial pressure is a contraindication to lumbar puncture."}, {"number": 44, "topic": "Cerebrospinal fluid", "stem_html": "Which of the following is not a feature of normal cerebrospinal fluid?", "options": [{"label_html": "It has a pressure of between 10 and 15 mmHg.", "is_correct": false}, {"label_html": "It usually contains a small amount of glucose.", "is_correct": fals
