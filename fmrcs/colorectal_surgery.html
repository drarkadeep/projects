y. <\/li><li>It is more common in Caucasians related to their  hair type and growth patterns.  <\/li><li>The opening of the sinus is lined by squamous epithelium, but most of its wall consists of granulation tissue.  Up to 50 cases of squamous cell carcinoma have been described in patients with chronic pilonidal sinus disease.  <\/li><li>Hairs become trapped within the sinus. <\/li><li>Clinically the sinus presents when acute inflammation occurs, leading to an abscess.  Patients may describe cycles of being asymptomatic and periods of pain and discharge from the sinus.  <\/li><li>Treatment is difficult and opinions differ. Definitive treatment should never be undertaken when acute infection or abscess is present as this will result in failure. <\/li><li>Definitive treatments include the Bascom procedure with excision of the pits and obliteration of the underlying cavity. The Karydakis procedure involves wide excision of the natal cleft such that the surface is recontoured once the wound is closed. This avoids the shearing forces that break off the hairs and has reasonable results.<\/li><\/ul><br><i>Pilonidal sinuses are most commonly located in the midline of the natal cleft, as illustrated below<\/i><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb073b.jpg\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb073.jpg\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Pilonidal cyst\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb073b.jpg\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}, {"name": "Rectal bleeding", "questions": [{"number": 84, "topic": "Rectal bleeding", "stem_html": "What is the most likely diagnosis in a 17 year old man who presents with painful bright red ano- rectal bleeding that has been noticed to occur in past 2 weeks?", "options": [{"label_html": "Fistula in ano", "is_correct": false}, {"label_html": "Fissure in ano", "is_correct": true}, {"label_html": "External haemorrhoids", "is_correct": false}, {"label_html": "Internal haemorrhoids", "is_correct": false}, {"label_html": "Ulcerative colitis", "is_correct": false}], "correct_index": 1, "explanation_html": "Painful rectal bleeding is typically seen with fissure in ano (most will be posterior). The initial history is often short (as in this case). A fistula is more likely to present with discharge than just blood. Haemorrhoidal disease bleeding is usually painless. Although thrombosed haemorrhoids may be painful, they typically occur in patients with a longer history."}, {"number": 85, "topic": "Rectal bleeding", "stem_html": "A 24 year old woman presents with a long history of obstructed defecation and chronic constipation. She often strains to open her bowels for long periods and occasionally notices that she has passed a small amount of blood. On examination, she has an indurated area located anteriorly approximately 3cm proximal to the anal verge. What is the most likely diagnosis?", "options": [{"label_html": "Haemorrhoids", "is_correct": false}, {"label_html": "Rectal cancer", "is_correct": false}, {"label_html": "Ulcerative colitis", "is_correct": false}, {"label_html": "Solitary rectal ulcer syndrome", "is_correct": true}, {"label_html": "Fissure in ano", "is_correct": false}], "correct_index": 3, "explanation_html": "Solitary rectal ulcers are associated with chronic constipation and straining. It will need to be biopsied to exclude malignancy (the histological appearances are characteristic). Diagnostic work up should include endoscopy and probably defecating proctogram and ano-rectal manometry studies."}, {"number": 86, "topic": "Rectal bleeding", "stem_html": "A previously well 21 year old man is admitted with 2 week history of diarrhoea and passage of blood and mucous rectally. He has previously undergone an ileocaecal resection in the past for an inflammatory bowel disorder and takes mesalazine. What is the most likely underlying cause?", "options": [{"label_html": "Ulcerative colitis", "is_correct": false}, {"label_html": "Diversion proctitis", "is_correct": false}, {"label_html": "Crohns proctitis", "is_correct": true}, {"label_html": "Diverticular associated bleed", "is_correct": false}, {"label_html": "Irritable bowel syndrome", "is_correct": false}], "correct_index": 2, "explanation_html": "The history of a right sided resection and the patients young age are all strongly suggestive of an existing diagnosis of Crohns disease (segmental resections are not undertaken for UC). Since the bowel has remained in continuity, a diversion colitis is not possible."}, {"number": 87, "topic": "Rectal bleeding", "stem_html": "What is the most likely explanation for a 63 year old male to complain of a painless blood stained mucous rectal discharge 6 months following a Hartmann's procedure?", "options": [{"label_html": "Pelvic abscess", "is_correct": false}, {"label_html": "Crohns disease", "is_correct": false}, {"label_html": "Dysplasia of the rectal stump", "is_correct": false}, {"label_html": "Diversion proctitis", "is_correct": true}, {"label_html": "Fissure in ano", "is_correct": false}], "correct_index": 3, "explanation_html": "Once the bowel has been disconnected, a degree of inflammation is commonly seen in the quiescent bowel. This is typically referred to as diversion colitis. Dysplasia is not usually seen in this context as a Hartmanns procedure is not usually a treatment modality used for IBD (which is the main risk factor for dysplasia)."}, {"number": 88, "topic": "Rectal bleeding", "stem_html": "An 83 year old man is admitted on the acute surgical take. His presenting symptom is of painless, profuse rectal bleeding of dark blood. His medical history comprises a previous TIA for which he takes clopidogrel and a statin. What is the most likely underlying cause?", "options": [{"label_html": "Meckels diverticulum", "is_correct": false}, {"label_html": "Colonic cancer", "is_correct": false}, {"label_html": "Diverticular bleed", "is_correct": true}, {"label_html": "Ischaemic colitis", "is_correct": false}, {"label_html": "Diverticulitis", "is_correct": false}], "correct_index": 2, "explanation_html": "The majority of patients with colonic bleeding will be found to have bleeding secondary to diverticular disease. Of note, inflammation (i.e. diverticulitis) is not seen in such cases. Around 70% will stop bleeding spontaneously. Anti platelet and anti coagulants are sometimes complicating factors and may make bleeding less likely to cease spontaneously. Ischaemic colitis often has more dominant colitis symptoms."}, {"number": 89, "topic": "Rectal bleeding", "stem_html": "A 19 year old man presents with diarrhoea and rectal bleeding that has been present for the past two weeks. In addition, he has noticed that he has had faecal incontinence at night. What is the most likely cause?", "options": [{"label_html": "Viral gastroenteritis", "is_correct": false}, {"label_html": "Inflammatory bowel disease", "is_correct": true}, {"label_html": "Intersphincteric abscess", "is_correct": false}, {"label_html": "Irritable bowel syndrome and haemorrhoids", "is_correct": false}, {"label_html": "Irritable bowel syndrome and a fissure in ano", "is_correct": false}], "correct_index": 1, "explanation_html": "Nocturnal diarrhea and incontinence is a key feature in the history and is strongly suggestive of a diagnosis of IBD. More benign IBS presentations seldom have nocturnal events or a short history."}, {"number": 90, "topic": "Rectal bleeding", "stem_html": "A 56 year old man presents with episodes of pruritus ani and bright red rectal bleeding. On examination there is a mass in the ano rectal region and biopsies confirm squamous cell cancer. What is the most likely cause?", "options": [{"label_html": "Anal cancer", "is_correct": true}, {"label_html": "Rectal cancer", "is_correct": false}, {"label_html": "Soft tissue sarcoma", "is_correct": false}, {"label_html": "Retro-rectal cyst", "is_correct": false}, {"label_html": "Pilonidal sinus disease", "is_correct": false}], "correct_index": 0, "explanation_html": "These are features of anal cancer. Anal cancers arise from the cutaneous epithelium and are therefore typically squamous cell. They are usually sensitive to chemoradiotherapy."}, {"number": 91, "topic": "Rectal bleeding", "stem_html": "A 56 year old man presents with episodes of pruritus ani and bright red rectal bleeding. On examination there is a mass in the ano rectal region and biopsies confirm squamous cell cancer. What is the most likely cause?", "options": [{"label_html": "Anal cancer", "is_correct": true}, {"label_html": "Rectal cancer", "is_correct": false}, {"label_html": "Soft tissue sarcoma", "is_correct": false}, {"label_html": "Retro-rectal cyst", "is_correct": false}, {"label_html": "Pilonidal sinus disease", "is_correct": false}], "correct_index": 0, "explanation_html": "These are features of anal cancer. Anal cancers arise from the cutaneous epithelium and are therefore typically squamous cell. They are usually sensitive to chemoradiotherapy."}, {"number": 92, "topic": "Rectal bleeding", "stem_html": "A 23 year old lady presents with a posteriorly sited fissure in ano. Treatment with stool softeners and topical GTN has failed to improve matters. Which of the following would be the most appropriate next management step?", "options": [{"label_html": "Lords procedure", "is_correct": false}, {"label_html": "Injection of botulinum toxin", "is_correct": true}, {"label_html": "Lateral internal sphincterotomy", "is_correct": false}, {"label_html": "Endoanal advancement flap", "is_correct": false}, {"label_html": "Surgical division of the external anal sphincter", "is_correct": false}], "correct_index": 1, "explanation_html": "The next most appropriate management option when GTN or other topical nitrates has failed is to consider botulinum toxin injection. In males a lateral internal sphincterotomy would be an acceptable alternative. In a female who has yet to conceive this may predispose to delayed increased risk of sphincter dysfunction. Division of the external sphincter will result in faecal incontinence and is not a justified treatment for fissure."}], "note_html": "Rectal bleeding is a common cause for patients to be referred to the surgical clinic. In the clinical history it is useful to try and localise the anatomical source of the blood. Bright red blood is usually of rectal anal canal origin, whilst dark red blood is more suggestive of a proximally sited bleeding source. Blood which has entered the GI tract from a gastro-duodenal source will typically resemble malaena due to the effects of the digestive enzymes on the blood itself. <br><br>In the table below we give some typical bleeding scenarios together with physical examination findings and causation.<br><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Cause<\/b><\/td><td><b>Type of bleeding<\/b><\/td><td><b>Features in history<\/b><\/td><td><b>Examination findings<\/b><\/td><\/tr><tr><td>Fissure in ano<\/td><td>Bright red rectal bleeding<\/td><td>Painful bleeding that occurs post defecation in small volumes. Usually antecedent features of constipation<\/td><td>Muco-epithelial defect usually in the midline posteriorly (anterior fissures more likely to be due to underlying disease)<\/td><\/tr><tr><td>Haemorroids<\/td><td>Bright red rectal bleeding<\/td><td>Post defecation bleeding noted both on toilet paper and drips into pan. May be alteration of bowel habit and history of straining. No blood mixed with stool. No local pain.<\/td><td>Normal colon and rectum. Proctoscopy may show internal haemorrhoids. Internal haemorrhoids are usually impalpable.<\/td><\/tr><tr><td>Crohns disease<\/td><td>Bright red or mixed blood<\/td><td>Bleeding that is accompanied by other symptoms such as altered bowel habit, malaise, history of fissures (especially anterior) and abscesses.<\/td><td>Perineal inspection may show fissures or fistulae. Proctoscopy may demonstrate indurated mucosa and possibly strictures. Skip lesions may be noted at colonoscopy.<\/td><\/tr><tr><td>Ulcerative colitis<\/td><td>Bright red bleeding often mixed with stool<\/td><td>Diarrhoea, weight loss, nocturnal incontinence,  passage of mucous PR.<\/td><td>Proctitis is the most marked finding. Peri anal disease is usually absent. Colonoscopy will show continuous mucosal lesion.<\/td><\/tr><tr><td>Rectal cancer<\/td><td>Bright red blood mixed volumes<\/td><td>Alteration of bowel habit. Tenesmus may be present. Symptoms of metastatic disease.<\/td><td>Usually obvious mucosal abnormality. Lesion may be fixed or mobile depending upon disease extent. Surrounding mucosa often normal, although polyps may be present.<\/td><\/tr><\/tbody><\/table><\/div><br><br>Image showing a fissure in ano. Typically these are located posteriorly and in the midline. Fissures at other sites may be associated with underlying disease.<br><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb054b.jpg\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb054.jpg\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Anal fissure\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb054b.jpg\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center><br>Colonoscopic image of internal haemorroids. Note these may often be impalpable.<br><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb055b.jpg\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb055.jpg\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Haemorrhoids\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb055b.jpg\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center><br><br><b>Investigation<\/b><br><ul><li>All patients presenting with rectal bleeding require digital rectal examination  and procto-sigmoidoscopy as a minimal baseline. <\/li><li>Remember that haemorrhoids are typically impalpable and to attribute bleeding to these in the absence of accurate internal inspection is unsatisfactory. <\/li><li>In young patients with no other concerning features in the history a carefully performed sigmoidoscopy that demonstrates clear haemorrhoidal disease may be sufficient. If clear views cannot be obtained then patients require bowel preparation with an enema and a flexible sigmoidscopy performed.  <\/li><li>In those presenting with features of altered bowel habit or suspicion of inflammatory bowel disease a colonoscopy is the best test. <\/li><li>Patients with excessive pain who are suspected of having a fissure may require an examination under general or local anaesthesia. <\/li><li>In young patients with external stigmata of fissure and a compatible history it is acceptable to treat medically and defer internal examination until the fissure is healed. If the fissure fails to heal then internal examination becomes necessary along the lines suggested above to exclude internal disease. <\/li><\/ul><br><br><b>Special tests<\/b><br><ul><li>In patients with a malignancy of the rectum the staging investigations comprise an MRI of the rectum to identify circumferential resection margin compromise and to identify mesorectal nodal disease. In addition to this CT scanning of the chest abdomen and pelvis is necessary to stage for more distant disease. Some centres will still stage the mesorectum with endo rectal ultrasound but this is becoming far less common.<\/li><\/ul><br><ul><li>Patients with fissure in ano who are being considered for surgical sphincterotomy and are females who have an obstetric history should probably have ano rectal manometry testing performed together with endo anal ultrasound. As this service is not universally available it is not mandatory but in the absence of such information there are continence issues that may arise following sphincterotomy. <\/li><\/ul><br><b>Management<\/b><br><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Disease<\/b><\/td><td><b>Management<\/b><\/td><\/tr><tr><td>Fissure in ano<\/td><td>GTN ointment 0.2% or diltiazem cream applied topically is the usual first line treatment. Botulinum toxin for those who fail to respond. Internal sphincterotomy for those who fail with botox, can be considered earlier in males.<\/td><\/tr><tr><td>Haemorroids<\/td><td>Lifestyle advice, for small internal haemorrhoids can consider injection sclerotherapy or rubber band ligation. For external haemorrhoids consider haemorrhoidectomy. Modern options include HALO procedure and stapled haemorrhoidectomy.<\/td><\/tr><tr><td>Inflammatory bowel disease<\/td><td>Medical management- although surgery may be needed for fistulating Crohns (setons).<\/td><\/tr><tr><td>Rectal cancer<\/td><td>Anterior resection or abdomino-perineal excision of the colon and rectum. Total mesorectal excision is now standard of care. Most resections below the peritoneal reflection will require defunctioning ileostomy. Most patients will require preoperative radiotherapy.<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Surgery for inflammatory bowel disease", "questions": [{"number": 93, "topic": "Surgery for inflammatory bowel disease", "stem_html": "A 22 year old man has a long history of ulcerative colitis. His symptoms are well controlled with steroids. However, attempts at steroid weaning and use of steroid sparing drugs have repeatedly failed. He wishes to avoid a permanent stoma. Which of the following is the best operative option?", "options": [{"label_html": "Pan proctocolectomy and end ileostomy", "is_correct": false}, {"label_html": "Abdomino perineal excision of the colon and rectum and end colostomy", "is_correct": false}, {"label_html": "Abdomino perineal excision of the colon and rectum and construction of an ileo anal pouch", "is_correct": false}, {"label_html": "Pan proctocolectomy and construction of an ileo anal pouch", "is_correct": true}, {"label_html": "Sub total colectomy and construction of an ileo anal pouch", "is_correct": false}], "correct_index": 3, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Don't confuse AP resection and proctectomy. The former is a cancer related procedure. <\/div>In patients with UC where medical management is not successful, surgical resection may offer a chance of cure. Those patients wishing to avoid a permanent stoma may be considered for an ileoanal pouch. However, this procedure is only offered in the elective setting."}, {"number": 94, "topic": "Surgery for inflammatory bowel disease", "stem_html": "A 22 year old lady has a long history of severe perianal Crohns disease with multiple fistulae. She is keen to avoid a stoma. However, she has progressive disease and multiple episodes of rectal bleeding. A colonoscopy shows rectal disease only and a small bowel study shows no involvement with Crohns. What is the best operative strategy?", "options": [{"label_html": "Abdomino perineal excision of the colon and rectum", "is_correct": false}, {"label_html": "Proctectomy and end stoma", "is_correct": true}, {"label_html": "Pan proctocolectomy and ileoanal pouch", "is_correct": false}, {"label_html": "Loop colostomy alone", "is_correct": false}, {"label_html": "Sub total colectomy", "is_correct": false}], "correct_index": 1, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Crohns disease is a contra indication to having an ileo-anal pouch as its associated with very poor pouch function and significant complications.<\/div>Whilst the patient wishes to avoid a stoma, that's inevitable here."}], "note_html": "Patients with inflammatory bowel disease (UC and Crohns) frequently present in surgical practice. Ulcerative colitis may be cured by surgical resection (Proctocolectomy), this is not the case in Crohns disease which may recur and affect other areas of the gastrointestinal tract. <br><br><b>Ulcerative colitis<\/b><br><ul><li>Elective indications for surgery include disease that is requiring maximal therapy, or prolonged courses of steroids.<\/li><li>Longstanding UC is associated with a risk of malignant transformation. Dysplastic transformation of the colonic epithelium with associated mass lesions is an absolute indication for a proctocolectomy.<\/li><li>Emergency presentations of poorly controlled colitis that fails to respond to medical therapy should usually be managed with a sub total colectomy. Excision of the rectum is a procedure with a higher morbidity and is not generally performed in the emergency setting. An end ileostomy is usually created and the rectum either stapled off and left in situ, or, if the bowel is very oedematous, may be brought to the surface as a mucous fistula.<\/li><li>Patients with IBD have a high incidence of DVT and appropriate thromboprophylaxis is mandatory.<\/li><li>Restorative options in UC include an ileoanal pouch. This procedure can only be performed whilst the rectum is in situ and cannot usually be undertaken as a delayed procedure following proctectomy. <\/li><li>Ileoanal pouch complications include, anastomotic dehiscence, pouchitis and poor physiological function with seepage and soiling.<\/li><\/ul><br><b>Crohns disease<\/b><br><ul><li>Surgical resection of Crohns disease does not equate with cure, but may produce substantial symptomatic improvement.<\/li><li>Indications for surgery include complications such as fistulae, abscess formation and strictures.<\/li><li>Extensive small bowel resections may result in short bowel syndrome and localised stricturoplasty may allow preservation of intestinal length.<\/li><li>Staging of Crohns will usually involve colonoscopy and a small bowel study (e.g. MRI enteroclysis).<\/li><li>Complex perianal fistulae are best managed with long term draining seton sutures, complex attempts at fistula closure e.g. advancement flaps, may be complicated by non healing and fistula recurrence. <\/li><li>Severe perianal and / or rectal Crohns may require proctectomy. Ileoanal pouch reconstruction in Crohns carries a high risk of fistula formation and pouch failure and is not recommended.<\/li><li>Terminal ileal Crohns remains the commonest disease site and these patients may be treated with limited ileocaecal resections. <\/li><li>Terminal ileal Crohns may affect enterohepatic bile salt recycling and increase the risk of gallstones.<\/li><\/ul>"}, {"name": "Ulcerative colitis", "questions": [{"number": 95, "topic": "Ulcerative colitis", "stem_html": "A 23 year old man presents with diarrhoea and passage of mucous. He is suspected of having ulcerative colitis. Which of the following is least likely to be associated with this condition?", "options": [{"label_html": "Superficial mucosal inflammation in the colon", "is_correct": false}, {"label_html": "Significant risk of dysplasia in long standing disease", "is_correct": false}, {"label_html": "Episodes of large bowel obstruction during acute attacks", "is_correct": true}, {"label_html": "Haemorrhage", "is_correct": false}, {"label_html": "Disease sparing the anal canal", "is_correct": false}], "correct_index": 2, "explanation_html": "Large bowel obstruction is not a feature of UC, patients may develop megacolon. However, this is a different entity both diagnostically and clinically. Ulcerative colitis does not affect the anal canal and the anal transitional zone.  Inflammation is superficial.  Dysplasia can occur in 2% overall, but increases significantly if disease has been present over 20 years duration.  Granulomas are features of crohn's disease.<br><br><br>Other features:<br><ul><li>Disease maximal in the rectum and may spread proximally<\/li><li>Contact bleeding<\/li><li>Longstanding UC crypt atrophy and metaplasia/dysplasia<\/li><\/ul>"}, {"number": 96, "topic": "Ulcerative colitis", "stem_html": "Which of the following hepatobiliary disorders are most classically associated with ulcerative colitis?", "options": [{"label_html": "Gallstones", "is_correct": false}, {"label_html": "Primary sclerosing cholangitis", "is_correct": true}, {"label_html": "Bile duct stones", "is_correct": false}, {"label_html": "Liver hamartomas", "is_correct": false}, {"label_html": "Hepatocellular carcinoma", "is_correct": false}], "correct_index": 1, "explanation_html": "Primary sclerosing cholangitis is an idiopathic inflammation of the bile ducts. It may result in episodes of cholestasis and cholangitis and ultimately result in the need for liver transplantation. It carries a 10% risk of malignant transformation. Crohns disease is associated with gallstones due to impaired entero-hepatic circulation. Apart from PSC, ulcerative colitis does not increase the risk of other liver lesions."}, {"number": 97, "topic": "Ulcerative colitis", "stem_html": "A 24 year old male was admitted with bloody diarrhea, cramping abdominal pain and weight loss. Colonoscopy revealed a friable, diffusely red mucosa involving the rectum and sigmoid colon. The mucosa was normal proximal to this. The disease progressed with time to involve most of the entire colon, but not the ileum. Many years later, a colonic biopsy shows high grade epithelial dysplasia. What is the most likely initial diagnosis?", "options": [{"label_html": "Colonic tuberculosis", "is_correct": false}, {"label_html": "Collagenous colitis", "is_correct": false}, {"label_html": "Ulcerative colitis", "is_correct": true}, {"label_html": "Crohns disease", "is_correct": false}, {"label_html": "Ischaemic colitis", "is_correct": false}], "correct_index": 2, "explanation_html": "Ulcerative colitis spreads in a progressive distal to proximal manner. Over time a dysplastic transformation is recognised. Such endoscopic findings mandate a minimum of close endoscopic surveillance and if they occur in association with a colonic mass then usually a panproctocolectomy."}], "note_html": "Ulcerative colitis is a form of inflammatory bowel disease. Inflammation always starts at rectum, does not spread beyond ileocaecal valve (although backwash ileitis may occur) and is continuous. The peak incidence of ulcerative colitis is in people aged 15-25 years and in those aged 55-65 years.  It is less common in smokers.<br><br>The initial presentation is usually following insidious and intermittent symptoms. Features include:<br><ul><li>bloody diarrhoea<\/li><li>urgency<\/li><li>tenesmus<\/li><li>abdominal pain, particularly in the left lower quadrant<\/li><li>extra-intestinal features (see below)<\/li><\/ul><br>Questions regarding the 'extra-intestinal' features of inflammatory bowel disease are common.  Extra-intestinal features include sclerosing cholangitis, iritis and ankylosing spondylitis.<br><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><\/td><td><b>Common to both Crohn's disease (CD) and Ulcerative colitis (UC)<\/b><\/td><td><b>Notes<\/b><\/td><\/tr><tr><td><b>Related to disease activity<\/b><\/td><td>Arthritis: pauciarticular, asymmetric<br> Erythema nodosum<br> Episcleritis<br> Osteoporosis<\/td><td>Arthritis is the most common extra-intestinal feature in both CD and UC<br> Episcleritis is more common in Crohns disease<\/td><\/tr><tr><td><b>Unrelated to disease activity<\/b><\/td><td>Arthritis: polyarticular, symmetric<br> Uveitis<br> Pyoderma gangrenosum<br> Clubbing<br> Primary sclerosing cholangitis<\/td><td>Primary sclerosing cholangitis is much more common in UC<br> Uveitis is more common in UC<\/td><\/tr><\/tbody><\/table><\/div><br>Pathology<br><ul><li>Red, raw mucosa, bleeds easily<\/li><li>No inflammation beyond submucosa (unless fulminant disease)<\/li><li>Widespread superficial ulceration with preservation of adjacent mucosa which has the appearance of polyps ('pseudopolyps')<\/li><li>Inflammatory cell infiltrate in lamina propria<\/li><li>Neutrophils migrate through the walls of glands to form crypt abscesses<\/li><li>Depletion of goblet cells and mucin from gland epithelium<\/li><li>Granulomas are infrequent<\/li><\/ul><br>Barium enema<br><ul><li>Loss of haustrations<\/li><li>Superficial ulceration, 'pseudopolyps'<\/li><li>Long standing disease: colon is narrow and short -'drainpipe colon'<\/li><\/ul><br>Endoscopy<br><ul><li>Superficial inflammation of the colonic and rectal mucosa<\/li><li>Continuous disease from rectum proximally<\/li><li>Superficial ulceration, mucosal islands, loss of vascular definition and continuous ulceration pattern.<\/li><\/ul><br>Management<br><ul><li>Patients with long term disease are at increased risk of development of malignancy<\/li><li>Acute exacerbations are generally managed with steroids, in chronic patients agents such as azathioprine and infliximab may be used<\/li><li>Individuals with medically unresponsive disease usually require surgery- in the acute phase a sub total colectomy and end ileostomy. In the longer term a proctectomy will be required. An ileoanal pouch is an option for selected patients<\/li><\/ul><br><b>References<\/b><br>Ford A <i> et al<\/i>. Ulcerative colitis. <i>BMJ<\/i> 2013 (346):29-34."}]}</script>
  <script>
    const quizData = JSON.parse(document.getElementById("quiz-data").textContent);
    const app = document.getElementById("app");
    const modeButtons = Array.from(document.querySelectorAll("[data-mode-button]"));
    const topicActionButtons = Array.from(document.querySelectorAll("[data-topic-action]"));

    const state = {
      mode: "solve",
      answers: new Map(),
      questionRefs: [],
    };

    function buildTopic(topic, questionOffset) {
      const details = document.createElement("details");
      details.className = "topic";
      details.open = true;

      const summary = document.createElement("summary");
      summary.innerHTML = `
        <div>
          <h2 class="topic-title">${topic.name}</h2>
        </div>
        <div class="topic-meta">
          <span>${topic.questions.length} questions</span>
          <span class="chevron" aria-hidden="true">></span>
        </div>
      `;

      const body = document.createElement("div");
      body.className = "topic-body";

      if (topic.note_html) {
        const notes = document.createElement("details");
        notes.className = "topic-notes";

        const notesSummary = document.createElement("summary");
        notesSummary.innerHTML = `
          <span class="topic-notes-title">Notes</span>
          <span class="chevron" aria-hidden="true">></span>
        `;

        const notesBody = document.createElement("div");
        notesBody.className = "topic-notes-body rich-text";
        notesBody.innerHTML = topic.note_html;

        notes.appendChild(notesSummary);
        notes.appendChild(notesBody);
        body.appendChild(notes);
      }

      topic.questions.forEach((question, indexInTopic) => {
        const globalIndex = questionOffset + indexInTopic;
        body.appendChild(buildQuestionCard(question, globalIndex));
      });

      details.appendChild(summary);
      details.appendChild(body);
      return details;
    }

    function buildQuestionCard(question, questionIndex) {
      const card = document.createElement("article");
      card.className = "question-card is-hidden";
      card.dataset.questionIndex = String(questionIndex);

      const label = document.createElement("p");
      label.className = "question-label";
      label.textContent = `Question ${question.number}`;

      const stem = document.createElement("div");
      stem.className = "stem rich-text";
      stem.innerHTML = question.stem_html;

      const options = document.createElement("div");
      options.className = "options";

      const optionButtons = question.options.map((option, optionIndex) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "option";
        button.dataset.optionIndex = String(optionIndex);
        button.innerHTML = option.label_html;
        button.addEventListener("click", () => {
          if (state.mode !== "solve") {
            return;
          }
          state.answers.set(questionIndex, optionIndex);
          applyQuestionState(questionIndex);
        });
        options.appendChild(button);
        return button;
      });

      const explanation = document.createElement("div");
      explanation.className = "explanation rich-text";
      explanation.innerHTML = `<span class="explanation-label">Explanation</span>${question.explanation_html}`;

      card.appendChild(label);
      card.appendChild(stem);
      card.appendChild(options);
      card.appendChild(explanation);

      state.questionRefs[questionIndex] = {
        card,
        explanation,
        optionButtons,
        question,
      };

      applyQuestionState(questionIndex);
      return card;
    }

    function applyQuestionState(questionIndex) {
      const ref = state.questionRefs[questionIndex];
      if (!ref) {
        return;
      }

      const { card, optionButtons, question } = ref;
      const selectedIndex = state.answers.get(questionIndex);
      const hasSelection = selectedIndex !== undefined;
      const isReview = state.mode === "review";
      const showExplanation = isReview || hasSelection;

      card.classList.toggle("is-hidden", !showExplanation);

      optionButtons.forEach((button, optionIndex) => {
        button.classList.remove("correct", "incorrect", "neutral-revealed");

        if (isReview) {
          button.disabled = true;
          if (optionIndex === question.correct_index) {
            button.classList.add("correct");
          } else {
            button.classList.add("neutral-revealed");
          }
          return;
        }

        button.disabled = false;
        if (!hasSelection) {
          return;
        }

        if (optionIndex === question.correct_index) {
          button.classList.add("correct");
        } else if (optionIndex === selectedIndex) {
          button.classList.add("incorrect");
        } else {
          button.classList.add("neutral-revealed");
        }
      });
    }

    function renderApp() {
      if (!quizData.topics.length) {
        const empty = document.createElement("div");
        empty.className = "empty-state";
        empty.textContent = "No questions were found in this JSON file.";
        app.replaceChildren(empty);
        return;
      }

      const wrapper = document.createElement("div");
      wrapper.className = "topic-list";

      let questionOffset = 0;
      quizData.topics.forEach((topic) => {
        wrapper.appendChild(buildTopic(topic, questionOffset));
        questionOffset += topic.questions.length;
      });

      app.replaceChildren(wrapper);
    }

    function setMode(mode) {
      state.mode = mode;
      modeButtons.forEach((button) => {
        const isActive = button.dataset.modeButton === mode;
        button.classList.toggle("active", isActive);
        button.setAttribute("aria-pressed", String(isActive));
      });

      state.questionRefs.forEach((_, index) => applyQuestionState(index));
    }

    function setAllTopics(open) {
      document.querySelectorAll(".topic").forEach((topic) => {
        topic.open = open;
      });
    }

    modeButtons.forEach((button) => {
      button.addEventListener("click", () => setMode(button.dataset.modeButton));
    });

    topicActionButtons.forEach((button) => {
      button.addEventListener("click", () => {
        setAllTopics(button.dataset.topicAction === "expand");
      });
    });

    renderApp();
    setMode("solve");
  </script>
</body>
</html>
