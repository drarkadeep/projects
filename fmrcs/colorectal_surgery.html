c-yes<br>bcl-2"}, {"number": 39, "topic": "Colorectal cancer", "stem_html": "An 82 year old lady presents with a carcinoma of the caecum. Approximately what proportion of patients presenting with this diagnosis will have synchronous cancer?", "options": [{"label_html": "&lt;1%", "is_correct": false}, {"label_html": "60%", "is_correct": false}, {"label_html": "50%", "is_correct": false}, {"label_html": "20%", "is_correct": false}, {"label_html": "5%", "is_correct": true}], "correct_index": 4, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Synchronous colonic tumours are seen in 5% cases and all patients having a flexible sigmoidoscopy should have completion colonoscopy if tumours or polyps are found<\/div>Synchronous lesions may occur in up to 5% of patients with colorectal cancer. A full and complete lumenal study with either colonoscopy, CT cologram or barium enema is mandatory in all patients being considered for surgery."}], "note_html": "<ul><li>Annually, about 150,000 new cases are diagnosed and 50,000 deaths from the disease<\/li><li>About 75% will have sporadic disease and 25% will have a family history <\/li><li>Colorectal tumours comprise a spectrum of disease ranging from adenomas through to polyp cancers and frank malignancy. <\/li><li>Polyps may be categorised into: neoplastic polyps, adenomatous polyps and non neoplastic polyps. <\/li><li>The majority of adenomas are polypoidal lesions, although flat lesions do occur and may prove to be dysplastic. <\/li><li>Non-neoplastic polyps include hyperplastic, juvenile, hamartomatous, inflammatory, and lymphoid polyps, which have not generally been thought of as precursors of cancer. <\/li><li>Three characteristics of adenomas that correlate with malignant potential have been characterised. These include increased size, villous architecture and dysplasia. For this reason most polyps identified at colonoscopy should be removed. <\/li><li>The transformation from polyp to cancer is described by the adenoma - carcinoma sequence and its principles should be appreciated. Essentially genetic changes accompany the transition from adenoma to carcinoma; key changes include APC, c-myc, K RAS mutations and p53 deletions.<\/li><\/ul>"}, {"name": "Colorectal cancer treatment", "questions": [{"number": 40, "topic": "Colorectal cancer treatment", "stem_html": "A 74 year old gentleman presents with an obstructing carcinoma of the splenic flexure. Attempts at placement of a colonic stent have failed. Which of the operative options listed below offers the best solution to this problem?", "options": [{"label_html": "Sub total colectomy", "is_correct": false}, {"label_html": "Extended right hemicolectomy", "is_correct": true}, {"label_html": "Standard right hemicolectomy", "is_correct": false}, {"label_html": "Standard left hemicolectomy", "is_correct": false}, {"label_html": "Transverse colectomy", "is_correct": false}], "correct_index": 1, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Standard right hemicolectomy involves colonic division to the right of the middle colic vessels<br>Extended right hemicolectomy involves division of the middle colic vessels and usually resection of the splenic flexure as well.<\/div>The question always causes confusion and to understand it the information needs to be carefully read. Firstly, the tumour is definitely at the splenic flexure and the second point is that the operation is definitely an <b>extended<\/b> right hemicolectomy. A left hemicolectomy or even the older operation of a transverse colectomy could be considered if the patient was not obstructed. However, when obstruction is present, an extended right hemicolectomy (which involves an ileocolic anastomosis) is relatively safe even in the obstructed setting."}, {"number": 41, "topic": "Colorectal cancer treatment", "stem_html": "A 73 year old lady presents with large bowel obstruction. On examination, she has a rectal cancer 6cm from the anal verge which has occluded the colonic lumen. An abdominal x-ray shows a caecal diameter of 7cm. Which of the management strategies outlined below is the most appropriate?", "options": [{"label_html": "Construction of a loop ileostomy", "is_correct": false}, {"label_html": "Construction of a loop colostomy", "is_correct": true}, {"label_html": "Construction of a venting caecostomy", "is_correct": false}, {"label_html": "Abdomino-perineal resection of the colon and rectum", "is_correct": false}, {"label_html": "Low anterior resection and loop ileostomy", "is_correct": false}], "correct_index": 1, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Bowel obstruction due to RECTAL cancer should be treated by loop colostomy.<br>Bowel obstruction due to obstructing left sided COLON cancer is usually treated by resection of the primary lesion and formation of colostomy.<\/div>This patient should be defunctioned, definitive surgery should wait until staging is completed. A loop ileostomy will not satisfactorily decompress an acutely obstructed colon. Low rectal cancers that are obstructed should not usually be primarily resected. The obstructed colon that would be used for anastomosis would carry a high risk of anastomotic dehiscence. In addition, as this is an emergency presentation, staging may not be completed, an attempted resection may therefore compromise the circumferential resection margin, with an associated risk of local recurrence."}, {"number": 42, "topic": "Colorectal cancer treatment", "stem_html": "A 45 year old female is diagnosed as having a carcinoma of the caecum. She undergoes a CT scan which shows a tumour invading the muscularis propria with some regional lymphadenopathy. What is the most appropriate initial treatment?", "options": [{"label_html": "Right hemicolectomy", "is_correct": true}, {"label_html": "External beam radiotherapy", "is_correct": false}, {"label_html": "Chemotherapy", "is_correct": false}, {"label_html": "Combined long course chemo radiotherapy", "is_correct": false}, {"label_html": "Referral for palliative care", "is_correct": false}], "correct_index": 0, "explanation_html": "Right sided colonic cancers should proceed straight to surgery. Radiotherapy to this area is poorly tolerated and almost never offered as first line treatment. The decision as to whether or not chemotherapy is given is dependent upon the final histology."}, {"number": 43, "topic": "Colorectal cancer treatment", "stem_html": "A 55 year old man presents with tenesmus and rectal bleeding. On examination he has a large bulky rectal cancer at 5cm from the anal verge with tethering to the prostate gland. Imaging shows no distant disease. What is the most appropriate initial treatment modality?", "options": [{"label_html": "Abdomino-perineral resection of the colon and rectum", "is_correct": false}, {"label_html": "Pelvic exenteration", "is_correct": false}, {"label_html": "Abdomino-perineal excision of the colon and rectum with prostatectomy", "is_correct": false}, {"label_html": "Long course chemoradiotherapy", "is_correct": true}, {"label_html": "Short course radiotherapy", "is_correct": false}], "correct_index": 3, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Rectal cancers with threatened resection margins are managed with radiotherapy and chemotherapy initially. This is not the case with colonic cancers which are usually primarily resected.<\/div>T4 rectal cancers are managed with long course chemoradiotherapy. A dramatic response is not uncommon. To embark on attempted resection at this stage is to court failure."}, {"number": 44, "topic": "Colorectal cancer treatment", "stem_html": "A 43 year old woman undergoes a sigmoid colectomy for carcinoma. The histology report shows pT3, pN1, systemic staging is M0. She is otherwise well. What is the most appropriate course of action?", "options": [{"label_html": "Active surveillance with CT scans at 6 and 12 months and monthly CEA measurement", "is_correct": false}, {"label_html": "Referral for chemotherapy", "is_correct": true}, {"label_html": "Radiotherapy to the resection site", "is_correct": false}, {"label_html": "Active surveillance with colonoscopy at 12 months and CT scan at 6 months and 3 monthly CEA measurement", "is_correct": false}, {"label_html": "Discharge", "is_correct": false}], "correct_index": 1, "explanation_html": "Chemotherapy for colonic cancer is offered when patients have nodal disease."}, {"number": 45, "topic": "Colorectal cancer treatment", "stem_html": "A 62 year old man is identified as having a rectal cancer. Following diagnostic work up no metastatic disease is identified. The tumour is 2cm from the anal verge. On MRI, lesion is T2, N0.  Which of the following represents the correct course of action?", "options": [{"label_html": "Proceed to abdomino-perineal excision of the colon and rectum (ELAPE)", "is_correct": true}, {"label_html": "Undertake a low anterior resection and loop ileostomy", "is_correct": false}, {"label_html": "Undertake a Hartmanns procedure", "is_correct": false}, {"label_html": "Offer radical external beam radiotherapy followed by abdomino-perineal excision of the colon and rectum (ELAPE)", "is_correct": false}, {"label_html": "Offer radical radiotherapy followed by low anterior resection and loop ileostomy", "is_correct": false}], "correct_index": 0, "explanation_html": "The tumour is too low for restorative surgery to be considered with an acceptable functional outcome. The tumour will therefore require an ELAPE style abdomino perineal resection. Since the lesion is T2 there is no prognostic benefit from adding radiotherapy which will confer additional morbidity."}], "note_html": "Patients diagnosed as having colorectal cancer should be completely staged using CT of the chest/ abdomen and pelvis. Their entire colon should have been evaluated with colonoscopy or CT colonography. Patients whose tumours lie below the peritoneal reflection should have their mesorectum evaluated with MRI. <br><br>Once their staging is complete patients should be discussed within a dedicated colorectal MDT meeting and a treatment plan formulated.<br><br><b>Treatment of colonic cancer<\/b><br>Cancer of the colon is nearly always treated with surgery. Stents, surgical bypass and diversion stomas may all be used as palliative adjuncts. Resectional surgery is the only option for cure in patients with colon cancer. The procedure is tailored to the patient and the tumour location. The lymphatic drainage of the colon follows the arterial supply and therefore most resections are tailored around the resection of particular lymphatic chains (e.g. ileo-colic pedicle for right sided tumours). Some patients may have confounding factors that will govern the choice of procedure, for example a tumour in a patient from a HNPCC family may be better served with a panproctocolectomy rather than segmental resection. Following resection the decision has to be made regarding restoration of continuity. For an anastomosis to heal the key technical factors include; adequate blood supply, mucosal apposition and no tissue tension. Surrounding sepsis, unstable patients and inexperienced surgeons may compromise these key principles and in such circumstances it may be safer to construct an end stoma rather than attempting an anastomosis. <br>When a colonic cancer presents with an obstructing lesion; the options are to either stent it or resect. In modern practice it is unusual to simply defunction a colonic tumour with a proximal loop stoma. This differs from the situation in the rectum (see below). <br>Following resection patients with risk factors for disease recurrence are usually offered chemotherapy, a combination of 5FU and oxaliplatin is common.<br><br><b>Rectal cancer<\/b><br>The management of rectal cancer is slightly different to that of colonic cancer. This reflects the rectum's anatomical location and the challenges posed as a result. Tumours located in the rectum can be surgically resected with either an anterior resection or an abdomino - perineal resection. The technical aspects governing the choice between these two procedures can be complex to appreciate and the main point to appreciate for the MRCS is that involvement of the sphincter complex or very low tumours require APER. In the rectum a 2cm distal clearance margin is required and this may also impact on the procedure chosen. In addition to excision of the rectal tube an integral part of the procedure is a meticulous dissection of the mesorectal fat and lymph nodes (total mesorectal excision/ TME). In rectal cancer surgery invovlement of the cirumferential resection margin carries a high risk of disease recurrence. Because the rectum is an extraperitoneal structure (until you remove it that is!) it is possible to irradiate it, something which cannot be offered for colonic tumours. This has a major impact in rectal cancer treatment and many patients will be offered neoadjuvent radiotherapy (both long and short course) prior to resectional surgery. Patients with T1, 2 and 3 /N0 disease on imaging do not require irradiation and should proceed straight to surgery. Patients with T4 disease will typically have long course chemo radiotherapy. Patients presenting with large bowel obstruction from rectal cancer should not undergo resectional surgery without staging as primary treatment (very different from colonic cancer). This is because rectal surgery is more technically demanding, the anastomotic leak rate is higher and the danger of a positive resection margin in an unstaged patient is high. Therefore patients with obstructing rectal cancer should have a defunctioning loop colostomy.<br><br><b>Summary of procedures<\/b><br>The operations for cancer are segmental resections based on blood supply and lymphatic drainage. These commonly performed procedures are core knowledge for the MRCS and should be understood.<br><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Site of cancer<\/b><\/th><th><b>\tType of resection<\/b><\/th><th><b>\tAnastomosis<\/b><\/th><th>\t<b>Risk of leak<\/b><\/th><\/tr><\/thead><tbody><tr><td>Right colon<\/td><td>\t Right hemicolectomy<\/td><td>\t \tIleo-colic<\/td><td>\t Low &lt;5%<\/td><\/tr><tr><td>Transverse\t<\/td><td>Extended right hemicolectomy\t<\/td><td>\t Ileo-colic<\/td><td>\t \tLow &lt;5%<\/td><\/tr><tr><td>Splenic flexure\t<\/td><td>\t Extended right hemicolectomy\t<\/td><td>\t Ileo-colic\t<\/td><td>\t Low &lt;5%<\/td><\/tr><tr><td>Splenic flexure<\/td><td>\t \tLeft hemicolectomy<\/td><td>\t \tColo-colon<\/td><td>\t \t2-5%<\/td><\/tr><tr><td>Left colon \t<\/td><td>\t Left hemicolectomy\t<\/td><td>\t Colo-colon\t<\/td><td>\t 2-5%<\/td><\/tr><tr><td>Sigmoid colon\t<\/td><td>\t High anterior resection\t<\/td><td>\t Colo-rectal\t<\/td><td>\t 5%<\/td><\/tr><tr><td>Upper rectum\t<\/td><td>\t Anterior resection (TME)\t<\/td><td>\t Colo-rectal\t<\/td><td>\t 5%<\/td><\/tr><tr><td>Low rectum\t<\/td><td>\t Anterior resection (Low TME)\t<\/td><td>\t Colo-rectal<br>(+/- Defunctioning stoma)<\/td><td>\t \t10%<\/td><\/tr><tr><td>Anal verge\t<\/td><td>\t Abdomino-perineal excision of colon and rectum\t<\/td><td>\t None\t<\/td><td>\t n/a<\/td><\/tr><\/tbody><\/table><\/div><br>In the emergency setting, where the bowel has perforated, the risk of an anastomotic breakdown is much greater, particularly when the anastomosis is colon-colon. In this situation, an end colostomy is often safer and can be reversed later. When resection of the sigmoid colon is performed and an end colostomy is fashioned the operation is referred to as a Hartmans procedure. Whilst left sided resections are more risky, ileo-colic anastomoses are relatively safe even in the emergency setting and do not need to be defunctioned.<br><br><b>References<\/b><br>A review of the diagnosis and management of colorectal cancer and a summary of the UK National Institute of Clinical Excellence guidelines is provided in:<br>NICE Guideline NG151. Last updated in 2020."}, {"name": "Crohns disease", "questions": [{"number": 46, "topic": "Crohns disease", "stem_html": "Which of the following is seen more commonly with Crohns disease rather than ulcerative colitis?", "options": [{"label_html": "Mucosal islands at endoscopy", "is_correct": false}, {"label_html": "Goblet cell depletion on biopsy", "is_correct": false}, {"label_html": "Fat wrapping of the terminal ileum", "is_correct": true}, {"label_html": "Attenuated symptoms in smokers", "is_correct": false}, {"label_html": "Toxic megacolon", "is_correct": false}], "correct_index": 2, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Crohns disease is worse in smokers and smoking is an independent risk factor for disease recurrence following resection.<\/div>Fat wrapping of the terminal ileum is commonly seen in patients with ileal disease (the commonest disease site). The mesenteric fat in patients with IBD is often dense, hard and prone to considerable haemorrhage during surgery. At endoscopy, the mucosa in patients with Crohns disease is said to resemble cobblestones, mucosal islands (pseudopolyps) are seen in ulcerative colitis."}, {"number": 47, "topic": "Crohns disease", "stem_html": "Which of the following is seen more commonly with Crohns disease rather than ulcerative colitis?", "options": [{"label_html": "Mucosal islands at endoscopy", "is_correct": false}, {"label_html": "Goblet cell depletion on biopsy", "is_correct": false}, {"label_html": "Fat wrapping of the terminal ileum", "is_correct": true}, {"label_html": "Attenuated symptoms in smokers", "is_correct": false}, {"label_html": "Toxic megacolon", "is_correct": false}], "correct_index": 2, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Crohns disease is worse in smokers and smoking is an independent risk factor for disease recurrence following resection.<\/div>Fat wrapping of the terminal ileum is commonly seen in patients with ileal disease (the commonest disease site). The mesenteric fat in patients with IBD is often dense, hard and prone to considerable haemorrhage during surgery. At endoscopy, the mucosa in patients with Crohns disease is said to resemble cobblestones, mucosal islands (pseudopolyps) are seen in ulcerative colitis."}, {"number": 48, "topic": "Crohns disease", "stem_html": "Which of the following is not an extraintestinal feature of Crohns disease?", "options": [{"label_html": "Iritis", "is_correct": false}, {"label_html": "Clubbing", "is_correct": false}, {"label_html": "Aphthous ulcers", "is_correct": false}, {"label_html": "Erythema multiforme", "is_correct": true}, {"label_html": "Pyoderma gangrenosum", "is_correct": false}], "correct_index": 3, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Extraintestinal manifestation of inflammatory bowel disease: A PIE SAC<br><br>Aphthous ulcers<br>Pyoderma gangrenosum<br>Iritis <br>Erythema nodosum <br>Sclerosing cholangitis<br>Arthritis<br>Clubbing<\/div>"}, {"number": 49, "topic": "Crohns disease", "stem_html": "A 39 year old man has suffered from terminal ileal Crohns disease for the past 20 years. Which condition is he least likely to develop?", "options": [{"label_html": "Gallstones", "is_correct": false}, {"label_html": "Malabsorption", "is_correct": false}, {"label_html": "Pyoderma gangrenosum", "is_correct": false}, {"label_html": "Amyloidosis", "is_correct": false}, {"label_html": "Feltys syndrome", "is_correct": true}], "correct_index": 4, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Feltys syndrome:<br><ul><li>Rheumatoid disease<\/li><li>Splenomegaly<\/li><li>Neutropenia<\/li><\/ul><\/div>Feltys syndrome is associated with rheumatoid disease. Individuals with long standing Crohns disease are at risk of gallstones because of impairment of the enterohepatic recycling of bile salts. Formation of entero-enteric fistulation may produce malabsorption. Amyloidosis may complicate chronic inflammatory states."}], "note_html": "Crohns disease is a chronic transmural inflammation of a segment(s) of the gastrointestinal tract and may be associated with extra intestinal manifestations. Frequent disease patterns observed include ileal, ileocolic and colonic disease. Peri-anal disease may occur in association with any of these. The disease is often discontinuous in its distribution. Inflammation may cause ulceration, fissures, fistulas and fibrosis with stricturing. Histology reveals a chronic inflammatory infiltrate that is usually patchy and transmural. <br><br><b>Ulcerative colitis Vs Crohns<\/b><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><\/th><th><b>Crohn's disease<\/b><\/th><th><b>Ulcerative colitis<\/b><\/th><\/tr><\/thead><tbody><tr><td>Distribution<\/td><td>Mouth to anus<\/td><td>Rectum and colon<\/td><\/tr><tr><td>Macroscopic changes<\/td><td>Cobblestone appearance, apthoid ulceration<\/td><td>Contact bleeding<\/td><\/tr><tr><td>Depth of disease<\/td><td>Transmural inflammation<\/td><td>Superficial inflammation<\/td><\/tr><tr><td>Distribution pattern<\/td><td>Patchy<\/td><td>Continuous<\/td><\/tr><tr><td>Histological features<\/td><td>Granulomas (non caseating epithelioid cell aggregates with Langhans' giant cells)<\/td><td>Crypt abscesses, Inflammatory cells in the lamina propria<\/td><\/tr><\/tbody><\/table><\/div><br><b>Extraintestinal manifestations of Crohns<\/b><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid2\"><thead><tr><th><b>Related to disease extent<\/b><\/th><th><b>Unrelated to disease extent<\/b><\/th><\/tr><\/thead><tbody><tr><td>Aphthous ulcers (10%)<\/td><td>Sacroiliiitis (10-15%)<\/td><\/tr><tr><td>Erythema nodosum (5-10%)<\/td><td>Ankylosing spondylitis (1-2%)<\/td><\/tr><tr><td>Pyoderma gangrenosum (0.5%)<\/td><td>Primary sclerosing cholangitis (Rare)<\/td><\/tr><tr><td>Acute arthropathy (6-12%)<\/td><td>Gallstones (up to 30%)<\/td><\/tr><tr><td>Ocular complications (up to 10%)<\/td><td>Renal calculi (up to 10%)<\/td><\/tr><\/tbody><\/table><\/div><br><b>Diarrhoea in Crohns<\/b><br>Diarrhoea in Crohns may be multifactorial since actual inflammation of the colon is not common. Causes therefore include the following:<br><ul><li>Bile salt diarrhoea secondary to terminal ileal disease<\/li><li>Entero-colic fistula<\/li><li>Short bowel due to multiple resections<\/li><li>Bacterial overgrowth<\/li><\/ul><br><b>Surgical interventions in Crohns disease<\/b><br>The commonest disease pattern in Crohns is stricturing terminal ileal disease and this often culminates in an ileocaecal resection. Other procedures performed include segmental small bowel resections and stricturoplasty. Colonic involvement in patients with Crohns is not common and, where found, distribution is often segmental. However, despite this distribution segmental resections of the colon in patients with Crohns disease are generally not advocated because the recurrence rate in the remaining colon is extremely high. As a result, the standard options of colonic surgery in Crohns patients are generally; sub total colectomy, panproctocolectomy and staged sub total colectomy and proctectomy. Restorative procedures such as ileoanal pouch have no role in therapy.<br>Crohns disease is notorious for the developmental of intestinal fistulae; these may form between the rectum and skin (peri anal) or the small bowel and skin. Fistulation between loops of bowel may also occur and result in bacterial overgrowth and malabsorption. Management of enterocutaneous fistulae involves controlling sepsis, optimising nutrition, imaging the disease and planning definitive surgical management."}, {"name": "Diverticular disease", "questions": [{"number": 50, "topic": "Diverticular disease", "stem_html": "A 70 year old female is admitted with a history of passing brown coloured urine and abdominal distension. Clinically she has features of large bowel obstruction with central abdominal tenderness. She is maximally tender in the left iliac fossa. There is no evidence of haemodynamic instability. What is the most appropriate investigation?", "options": [{"label_html": "Cystogram", "is_correct": false}, {"label_html": "Abdominal X-ray of the kidney, ureters and bladder", "is_correct": false}, {"label_html": "Computerised tomogram of the abdomen and pelvis", "is_correct": true}, {"label_html": "Flexible sigmoidoscopy", "is_correct": false}, {"label_html": "Barium enema", "is_correct": false}], "correct_index": 2, "explanation_html": "This lady is most likely to have a colovesical fistula complicating diverticular disease of the sigmoid colon. In addition she may also have developed a diverticular stricture resulting in large bowel obstruction. A locally advanced tumour of the sigmoid colon may produce a similar clinical picture. The best investigation of this acute surgical patient is an abdominal CT scan, this will demonstrate the site of the disease and also supply regional information such as organ involvement and other local complications such as a pericolic abscess. A barium enema would require formal bowel preparation and this is contra indicated where large bowel obstruction is suspected. A flexible sigmoidoscopy is unlikely to be helpful and the air insufflated at the time of endoscopy may make the colonic distension worse. A cystogram would provide only very limited information."}, {"number": 51, "topic": "Diverticular disease", "stem_html": "At which of the following sites is the development of diverticulosis least likely?", "options": [{"label_html": "Caecum", "is_correct": false}, {"label_html": "Ascending colon", "is_correct": false}, {"label_html": "Transverse colon", "is_correct": false}, {"label_html": "Sigmoid colon", "is_correct": false}, {"label_html": "Rectum", "is_correct": true}], "correct_index": 4, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Rectal involvement with diverticular disease almost never occurs.<\/div>Because the rectum has a longitudinal muscle coat (blending of the tenia marks the recto-sigmoid junction), diverticular disease almost never occurs here. Right sided colonic diverticular disease is well recognised (though less common than left sided)."}, {"number": 52, "topic": "Diverticular disease", "stem_html": "A 75 year old man is admitted with large bowel obstruction and on investigation is found to have a significant sigmoid diverticular stricture as the underlying cause. What is the most appropriate treatment?", "options": [{"label_html": "Colonoscopy and pneumatic dilatation of the stricture", "is_correct": false}, {"label_html": "Laparotomy and Hartmanns procedure", "is_correct": true}, {"label_html": "Colonoscopy and insertion of self expanding metallic stent", "is_correct": false}, {"label_html": "Loop ileostomy", "is_correct": false}, {"label_html": "Laparotomy, sigmoid colectomy and colorectal anastomosis", "is_correct": false}], "correct_index": 1, "explanation_html": "Diverticular strictures have a high complication rate with stent insertion. Where patients present with large bowel obstruction, the best option is to resect the affected area. Given the fact that there is underlying colonic obstruction, a primary anastomosis would be unwise. Diverticular strictures should not be dilated."}, {"number": 53, "topic": "Diverticular disease", "stem_html": "A 78 year old lady is admitted with a lower GI bleed and on investigation with a CT angiogram is found to have bleeding sigmoid diverticular disease. She is otherwise well and apart from tachycardia, she is stable. What is the most appropriate course of action?", "options": [{"label_html": "Laparotomy and Hartmanns procedure", "is_correct": false}, {"label_html": "Laparotomy, sigmoid colectomy and colorectal anastomosis", "is_correct": false}, {"label_html": "Colonoscopy and application of endoscopic clips to the area", "is_correct": false}, {"label_html": "Conservative management with close observation", "is_correct": true}, {"label_html": "Laparotomy and sub total colectomy", "is_correct": false}], "correct_index": 3, "explanation_html": "Most lower GI bleeds occur secondary to diverticular disease and will settle with conservative management. Attempts at endoscopic haemostasis are usually unsuccessful."}, {"number": 54, "topic": "Diverticular disease", "stem_html": "A 56 year old man presents with his first attack of diverticulitis. Which of these complications is least likely to ensue?", "options": [{"label_html": "Formation of colonic strictures", "is_correct": false}, {"label_html": "Malignant transformation", "is_correct": true}, {"label_html": "Development of colovesical fistula", "is_correct": false}, {"label_html": "Formation of a pericolic abscess", "is_correct": false}, {"label_html": "Formation of a phlegmon", "is_correct": false}], "correct_index": 1, "explanation_html": "Diverticulitis may result in a number of complications. However, whilst malignant disease may coincide with diverticulitis it is not, in itself, a risk factor for colonic cancer."}, {"number": 55, "topic": "Diverticular disease", "stem_html": "A 59 year old man presents with recurrent episodes of urinary sepsis. In his history he mentions that he has suffered from recurrent attacks of left iliac fossa pain over the past few months. He has also notices bubbles in his urine. He undergoes a CT scan which shows a large inflammatory mass in the left iliac fossa. No other abnormality is detected. The most likely diagnosis is:", "options": [{"label_html": "Ulcerative colitis", "is_correct": false}, {"label_html": "Crohns disease", "is_correct": false}, {"label_html": "Mesenteric ischaemia", "is_correct": false}, {"label_html": "Diverticular disease", "is_correct": true}, {"label_html": "Rectal cancer", "is_correct": false}], "correct_index": 3, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Diverticular disease is one of the commonest causes of colovesical fistula<\/div>Recurrent attacks of diverticulitis may cause the development of local abscesses which may erode into the bladder resulting in urinary sepsis and pneumaturia. This would be an unusual presentation from Crohns disease and rectal cancer would be more distally sited and generally evidence of extra colonic disease would be present if the case were malignant and this advanced."}], "note_html": "Diverticular disease is a common surgical problem. It consists of herniation of colonic mucosa through the muscular wall of the colon. The usual site is between the taenia coli where vessels pierce the muscle to supply the mucosa. For this reason, the rectum, which lacks taenia, is often spared.<br><br><b>Symptoms<\/b><br><ul><li>Altered bowel habit<\/li><li>Bleeding<\/li><li>Abdominal pain<\/li><\/ul><br><b>Complications<\/b><br><ul><li>Diverticulitis<\/li><li>Haemorrhage<\/li><li>Development of fistula<\/li><li>Perforation and faecal peritonitis<\/li><li>Perforation and development of abscess<\/li><li>Development of diverticular phlegmon<\/li><\/ul><br><b>Diagnosis<\/b><br>Patients presenting in clinic will typically undergo either a colonoscopy, CT cologram or barium enema as part of their diagnostic work up. All tests can identify diverticular disease. It can be far more difficult to confidently exclude cancer, particularly in diverticular strictures. <br><br>Acutely unwell surgical patients should be investigated in a systematic way. Plain abdominal films and an erect chest x-ray will identify perforation. An abdominal CT scan (not a CT cologram) with oral and intravenous contrast will help to identify whether acute inflammation is present but also the presence of local complications such as abscess formation.<br><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th>Severity Classification- Hinchey<\/th><th><\/th><\/tr><\/thead><tbody><tr><td>I<\/td><td>Para-colonic abscess<\/td><\/tr><tr><td>II<\/td><td>Pelvic abscess<\/td><\/tr><tr><td>III<\/td><td>Purulent peritonitis<\/td><\/tr><tr><td>IV<\/td><td>Faecal peritonitis<\/td><\/tr><\/tbody><\/table><\/div><br><b>Treatment<\/b><br><ul><li>Increase dietary fibre intake.<\/li><li>Mild attacks of diverticulitis may be managed conservatively with antibiotics.<\/li><li>Peri colonic abscesses should be drained either surgically or radiologically.<\/li><li>Recurrent episodes of acute diverticulitis requiring hospitalisation are a relative indication for a segmental resection.<\/li><li>Hinchey IV perforations (generalised faecal peritonitis) will require a resection and usually a stoma. This group have a very high risk of post operative complications and usually require HDU admission.<\/li><\/ul>"}, {"name": "Fistulas", "questions": [{"number": 56, "topic": "Fistulas", "stem_html": "A 45 year old man develops a colocutaneous fistula following reversal of a loop colostomy fashioned for the defunctioning of an anterior resection. Pre-operative gastrograffin enema showed no distal obstruction or anastomotic stricture. What is the best course of action?", "options": [{"label_html": "Make the patient nil by mouth and commence total parenteral nutrition", "is_correct": false}, {"label_html": "Provide local wound care and await spontaneous resolution", "is_correct": true}, {"label_html": "Undertake a laparotomy and resect the fistula", "is_correct": false}, {"label_html": "Construct a loop ileostomy", "is_correct": false}, {"label_html": "Re-construct the loop colostomy", "is_correct": false}], "correct_index": 1, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Fistulas are more likely to heal in the absence of distal luminal obstruction<\/div>Colocutaneous fistulae may occur as a result of anastomotic leakage following loop colostomy reversal. In the absence of abdominal signs a laparotomy is not necessarily required. Signs of wound sepsis may require antibiotics. Because there is not any distal obstruction (note normal pre-operative gastrograffin enema) these fistulae will usually close spontaneously."}, {"number": 57, "topic": "Fistulas", "stem_html": "A 43 year old man has suffered from small bowel Crohns disease for 15 years. Following a recent stricturoplasty he develops an enterocutaneous fistula which is high output. Small bowel follow through shows it to be 15 cm from the DJ flexure. His overlying skin is becoming excoriated. What is the best course of action?", "options": [{"label_html": "Undertake a further laparotomy and construct a proximal diverting stoma", "is_correct": false}, {"label_html": "Commence high dose steroids", "is_correct": false}, {"label_html": "Commence TPN and octreotide", "is_correct": true}, {"label_html": "Undertake a laparotomy and resect the affected segment", "is_correct": false}, {"label_html": "Perform a small bowel bypass procedure", "is_correct": false}], "correct_index": 2, "explanation_html": "This man has a high output and anatomically high fistula. Drying up the fistula with octreotide will not suffice, his nutrition is compromised and TPN will help."}, {"number": 58, "topic": "Fistulas", "stem_html": "A 43 year old man has suffered from small bowel Crohns disease for 15 years. Following a recent stricturoplasty he develops an enterocutaneous fistula which is high output. Small bowel follow through shows it to be 15 cm from the DJ flexure. His overlying skin is becoming excoriated. What is the best course of action?", "options": [{"label_html": "Undertake a further laparotomy and construct a proximal diverting stoma", "is_correct": false}, {"label_html": "Commence high dose steroids", "is_correct": false}, {"label_html": "Commence TPN and octreotide", "is_correct": true}, {"label_html": "Undertake a laparotomy and resect the affected segment", "is_correct": false}, {"label_html": "Perform a small bowel bypass procedure", "is_correct": false}], "correct_index": 2, "explanation_html": "This man has a high output and anatomically high fistula. Drying up the fistula with octreotide will not suffice, his nutrition is compromised and TPN will help."}, {"number": 59, "topic": "Fistulas", "stem_html": "A 33 year old lady presented with jaundice secondary to common bile duct stones. A cholecystectomy and common bile duct exploration is performed and the bile duct closed over a T tube. Six weeks post operatively a T tube cholangiogram is performed and shows no residual stones. The T tube is removed and five hours after removal a small amount of bile is noted to be draining from the T tube site. What is the best course of action?", "options": [{"label_html": "Await spontaneous resolution", "is_correct": true}, {"label_html": "Arrange an MRCP", "is_correct": false}, {"label_html": "Arrange an ERCP", "is_correct": false}, {"label_html": "Return to theatre for CBD exploration", "is_correct": false}, {"label_html": "Re-insert the T tube", "is_correct": false}], "correct_index": 0, "explanation_html": "When the bile duct is closed over a T Tube the latex in the T tube encourages tract fibrosis. This actually encourages a fistula to develop. The result is that when the tube is removed any bile which leaks will usually drain through the tract. Provided that there are no residual stones in the duct the fistula will slowly close. Persistent high volume drainage may be managed with ERCP and sphincterotomy."}, {"number": 60, "topic": "Fistulas", "stem_html": "You are the specialist trainee asked to review a 39 year old man post gastrectomy for bleeding duodenal ulcers. He is hypotensive and tachycardic. His drain has increased output, contains pus and has bubbles. There is excoriated skin around the drain site. What is the explanation for this presentation?", "options": [{"label_html": "Distal enterocutaneous fistula", "is_correct": false}, {"label_html": "Superficial wound infection", "is_correct": false}, {"label_html": "Proximal enterocutaneous fistula", "is_correct": true}, {"label_html": "Entero-enteric fistula", "is_correct": false}, {"label_html": "Colocutaneous fistula", "is_correct": false}], "correct_index": 2, "explanation_html": "Suspect an enterocutaneous fistula if there is excessive drainage and bubbles. Pus may confuse surgeons, leading them to make a diagnosis of wound infection. If there is any uncertainty, methylene blue can be given. If methylene blue is found in the drain, this confirms a fistula."}, {"number": 61, "topic": "Fistulas", "stem_html": "Which of the following statements in relation to fistula in ano is untrue?", "options": [{"label_html": "High fistulae are safest treated with a seton insertion", "is_correct": false}, {"label_html": "Low fistulae may be laid open", "is_correct": false}, {"label_html": "They are typically probed with Lockhart Mummery probes", "is_correct": false}, {"label_html": "When discovered during incision and drainage of peri anal abscess; should always be probed to locate the internal opening", "is_correct": true}, {"label_html": "When complicating Crohns disease, may respond to infliximab", "is_correct": false}], "correct_index": 3, "explanation_html": "Probing fistulae during acute sepsis is associated with a high complication rate and should not be undertaken routinely."}, {"number": 62, "topic": "Fistulas", "stem_html": "A 34 year old man presents with symptoms attributable to a fistula in ano. He is examined in the lithotomy position and the external opening of the fistula is identified in the 7 o'clock position. At which of the following locations is the internal opening most likely to be identified?", "options": [{"label_html": "7 o'clock", "is_correct": false}, {"label_html": "12 o'clock", "is_correct": false}, {"label_html": "9 o'clock", "is_correct": false}, {"label_html": "3 o'clock", "is_correct": false}, {"label_html": "6 o'clock", "is_correct": true}], "correct_index": 4, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Goodsals rule:<br>Anterior fistulae will tend to have an internal opening opposite the external opening.<br>Posterior fistulae will tend to have a curved track that passes towards the midline.<\/div>According to Goodsalls rule the track of a posteriorly sited fistula will track to the posterior midline (i.e. 6 o'clock)"}, {"number": 63, "topic": "Fistulas", "stem_html": "A 56 year old man undergoes a difficult splenectomy and is left with a pancreatic fistula. There are ongoing problems with very high fistula output. Which of the following agents may be administered to reduce the fistula output?", "options": [{"label_html": "Metoclopramide", "is_correct": false}, {"label_html": "Erthyromycin", "is_correct": false}, {"label_html": "Octreotide", "is_correct": true}, {"label_html": "Loperamide", "is_correct": false}, {"label_html": "Omeprazole", "is_correct": false}], "correct_index": 2, "explanation_html": "Octreotide is a useful agent in reducing the output from pancreatic fistulae. Prokinetic agents will increase fistula output and should be avoided."}, {"number": 64, "topic": "Fistulas", "stem_html": "Which of the following cell types is most likely to be identified in the wall of a fistula in ano?", "options": [{"label_html": "Squamous cells", "is_correct": true}, {"label_html": "Goblet cells", "is_correct": false}, {"label_html": "Columnar cells", "is_correct": false}, {"label_html": "Ciliated columnar cells", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 0, "explanation_html": "A fistula is an abnormal connection between two epithelial lined surfaces, in the case of a fistula in ano it will be lined by squamous cells."}], "note_html": "<ul><li>A fistula is defined as an abnormal connection between two epithelial surfaces.<\/li><li>There are many types ranging from Branchial fistulae in the neck to entero-cutaneous fistulae abdominally.<\/li><li>In general surgical practice the abdominal cavity generates the majority and most of these arise from diverticular disease and Crohn's. <\/li><li>As a general rule all fistulae will resolve spontaneously as long as there is no distal obstruction. This is particularly true of intestinal fistulae.<\/li><\/ul><br>The four types of fistulae are:<br><br><b>Enterocutaneous<\/b><br>These link the intestine to the skin. They may be high (&gt;500ml) or low output (&lt;250ml) depending upon source. Duodenal /jejunal fistulae will tend to produce high volume, electrolyte rich secretions which can lead to severe excoriation of the skin.  Colo-cutaneous fistulae will tend to leak faeculent material. Both fistulae may result from the spontaneous rupture of an abscess cavity onto the skin (such as following perianal abscess drainage) or may occur as a result of iatrogenic input. In some cases it may even be surgically desirable e.g. mucous fistula following sub total colectomy for colitis.<br><br>Suspect if there is excess fluid in the drain.<br><br><b>Enteroenteric or Enterocolic<\/b><br>This is a fistula that involves the large or small intestine. They may originate in a similar manner to enterocutaneous fistulae. A particular problem with this fistula type is that bacterial overgrowth may precipitate malabsorption syndromes. This may be particularly serious in inflammatory bowel disease.<br><br><b>Enterovaginal<\/b><br>Aetiology as above.<br><br><b>Enterovesical<\/b><br>This type of fistula goes to the bladder. These fistulas may result in frequent urinary tract infections, or the passage of gas from the urethra during urination.<br><br><b>Management<\/b><br>Some rules relating to fistula management:<br><ul><li>They will heal provided there is no underlying inflammatory bowel disease and no distal obstruction, so conservative measures may be the best option<\/li><li>Where there is skin involvement, protect the overlying skin, often using a well fitted stoma bag- skin damage is difficult to treat<\/li><li>A high output fistula may be rendered more easily managed by the use of octreotide, this will tend to reduce the volume of pancreatic secretions.<\/li><li>Nutritional complications are common especially with high fistula (e.g. high jejunal or duodenal) these may necessitate the use of TPN to provide nutritional support together with the concomitant use of octreotide to reduce volume and protect skin.<\/li><li>When managing perianal fistulae surgeons should avoid probing the fistula where acute inflammation is present, this almost always worsens outcomes.<\/li><li>When perianal fistulae occur secondary to Crohn's disease the best management option is often to drain acute sepsis and maintain that drainage through the judicious use of setons whilst medical management is implemented.<\/li><li>Always attempt to delineate the fistula anatomy, for abscesses and fistulae that have an intra abdominal source the use of barium and CT studies should show a track. For perianal fistulae surgeons should recall Goodsall's rule in relation to internal and external openings.<\/li><\/ul>"}, {"name": "IBD", "questions": [{"number": 65, "topic": "IBD", "stem_html": "A 20 year old man is admitted with bloody diarrhoea. He has been passing 10 stools per day, Hb-8.0, albumin-20. Stool culture negative. Evidence of colitis on endoscopy. He has been on intravenous steroids for 5 days and has now developed megacolon. His haemoglobin is falling and inflammatory markers are static. What is the most appropriate course of action?", "options": [{"label_html": "Double the steroid dose", "is_correct": false}, {"label_html": "Undertake a loop ileostomy", "is_correct": false}, {"label_html": "Undertake a sub total colectomy and end ileostomy", "is_correct": true}, {"label_html": "Undertake a sub total colectomy and ileo-rectal anastomosis", "is_correct": false}, {"label_html": "Undertake a pan proctocolectomy", "is_correct": false}], "correct_index": 2, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Pan proctocolectomy should not be performed in acute unwell patients<br>Loop ileostomy is not conventional management of UC<\/div>This man requires a sub total colectomy. Conservative management has failed. Patients with ulcerative colitis should undergo colectomy if there is no significant improvement in 5-7 days after initiating medical therapy if they have a severe attack of the disease. To undertake a pan proctocolectomy in an acutely unwell patient is very high risk and most unwise. Management of the rectum is generally left until the patient is more stable."}, {"number": 66, "topic": "IBD", "stem_html": "A 28 year old man is reviewed in the clinic. He has suffered from Crohns disease for many years, he has recently undergone a sub total colectomy. However, he has residual Crohns in his rectum and this is the cause of ongoing symptoms. Medical therapy is proving ineffective. What is the best course of action?", "options": [{"label_html": "Abdomino perineal excision of the colon and rectum", "is_correct": false}, {"label_html": "Proctectomy", "is_correct": true}, {"label_html": "Hartmanns procedure", "is_correct": false}, {"label_html": "Ileo-rectal anastomosis", "is_correct": false}, {"label_html": "Formation of ileo-anal pouch", "is_correct": false}], "correct_index": 1, "explanation_html": "An abdomino-perineal excision of the colon and rectum is a cancer procedure and not appropriate in the context of inflammatory bowel disease. The only appropriate surgical option here is a proctectomy to remove the rectal stump and anal canal."}], "note_html": "<b>Ulcerative colitis Vs Crohns<\/b><br><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><\/th><th><b>Crohn's disease<\/b><\/th><th><b>Ulcerative colitis<\/b><\/th><\/tr><\/thead><tbody><tr><td>Distribution<\/td><td>Mouth to anus<\/td><td>Rectum and colon<\/td><\/tr><tr><td>Macroscopic changes<\/td><td>Cobblestone appearance, apthoid ulceration<\/td><td>Contact bleeding<\/td><\/tr><tr><td>Depth of disease<\/td><td>Transmural inflammation<\/td><td>Superficial inflammation<\/td><\/tr><tr><td>Distribution pattern<\/td><td>Patchy<\/td><td>Continuous<\/td><\/tr><tr><td>Histological features<\/td><td>Granulomas (non caseating epithelioid cell aggregates with Langerhans' giant cells)<\/td><td>Crypt abscesses, Inflammatory cells in the lamina propria<\/td><\/tr><\/tbody><\/table><\/div>  <br><b>Surgical treatment<\/b><br><br><b>Ulcerative colitis<\/b><br>In UC the main place for surgery is when medical treatment has failed, in the emergency setting this will be a sub total colectomy, end ileostomy and a mucous fistula. Electively it will be a pan proctocolectomy, an ileoanal pouch may be a selected option for some. Remember that longstanding UC increases colorectal cancer risk. <br><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb042b.jpg\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb042.jpg\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Ulcerative colitis\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb042b.jpg\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center><br><br><b>Crohn's disease<\/b><br>Unlike UC Crohn's patients need to avoid surgeons, minimal resections are the rule. They should not have ileoanal pouches as they will do poorly with them. Management of Crohn's ano rectal sepsis is with a minimal approach, simply drain sepsis and use setons to facilitate drainage. Definitive fistula surgery should be avoided.<br><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb043b.jpg\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb043.jpg\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Crohn\" s=\"\" disease'=\"\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb043b.jpg\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}, {"name": "Ileostomy", "questions": [{"number": 67, "topic": "Ileostomy", "stem_html": "What is the earliest complication that can occur following construction of an ileostomy?", "options": [{"label_html": "Prolapse", "is_correct": false}, {"label_html": "Retraction", "is_correct": false}, {"label_html": "Necrosis", "is_correct": true}, {"label_html": "Parastomal hernia", "is_correct": false}, {"label_html": "Dermatitis", "is_correct": false}], "correct_index": 2, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Read the question very carefully here. We did not ask for the most common complication, rather, we asked for the earliest one. Dermatitis is the most common, but its not the earliest. The earliest complications are vascular ones and these usually occurs as a result of either inadvertent mesenteric division or as a result of a stoma thats too tight.<\/div>Construction of a stoma may be complicated by several factors. Necrosis may occur because of technical errors in mesenteric division, excessive tension or failure to construct a fascial defect of adequate size to permit safe passage of the mesentery and the bowel."}], "note_html": "Ileostomies are generally fashioned in the right iliac fossa in a triangle between the anterior superior iliac spine, symphysis pubis and umbilicus. They should lie one-third of the distance between the umbilicus and anterior superior iliac spine. A 2cm skin incision is made and dissection continued through the rectus muscle. A cruciate incision should be made, and generally dilated to admit two fingers. The ileum is brought through the incisions and should generally be spouted to a final length of 2.5cm. Ileostomies that are too short may cause problems with appliance fixation and those which are too long may cause problems with tension and subsequent ulceration or prolapse.<br><br>Complications following ileostomy construction include dermatitis (most common), bowel obstruction (usually adhesional) and prolapse.<br><br>Ileostomy output is roughly in the range of 5-10ml/Kg/  24 hours. Output in excess of 20ml/Kg/24 hours usually requires supplementary intravenous fluids. Excessive fluid losses are generally managed by administration of oral loperamide (up to 4mg QDS) to try and slow the output. Foods containing gelatine may also thicken output. Early high output is not uncommon and most patients (50%) will respond to conservative management."}, {"name": "Large bowel obstruction", "questions": [{"number": 68, "topic": "Large bowel obstruction", "stem_html": "A 65 year old lady is admitted with large bowel obstruction. On investigation with CT, she is found to have a tumour of the mid rectum with no evidence of metastatic disease. What is the most appropriate course of action?", "options": [{"label_html": "Formation of a loop colostomy", "is_correct": true}, {"label_html": "Laparotomy and Hartmanns procedure", "is_correct": false}, {"label_html": "Pan proctocolectomy and end ileostomy", "is_correct": false}, {"label_html": "Low anterior resection and covering loop ileostomy", "is_correct": false}, {"label_html": "Low anterior resection and end colostomy", "is_correct": false}], "correct_index": 0, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Avoid emergency resections in large bowel obstruction due to rectal cancer<\/div>This patient has presented with large bowel obstruction. However, in the case of rectal cancer, she is incompletely staged as ability to completely resect the lesion can only be determined with MRI scanning and this information is not provided. Even if the lesion were resectable, in the emergency setting, it is often safer to undertake a simple procedure such as a loop colostomy and then complete surgery at a later date. A low anterior resection and loop ileostomy in this situation would almost certainly leak (and for the reasons outlined above, may be incomplete)."}, {"number": 69, "topic": "Large bowel obstruction", "stem_html": "A 65 year old lady is admitted with large bowel obstruction. On investigation with CT, she is found to have a tumour of the mid rectum with no evidence of metastatic disease. What is the most appropriate course of action?", "options": [{"label_html": "Formation of a loop colostomy", "is_correct": true}, {"label_html": "Laparotomy and Hartmanns procedure", "is_correct": false}, {"label_html": "Pan proctocolectomy and end ileostomy", "is_correct": false}, {"label_html": "Low anterior resection and covering loop ileostomy", "is_correct": false}, {"label_html": "Low anterior resection and end colostomy", "is_correct": false}], "correct_index": 0, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Avoid emergency resections in large bowel obstruction due to rectal cancer<\/div>This patient has presented with large bowel obstruction. However, in the case of rectal cancer, she is incompletely staged as ability to completely resect the lesion can only be determined with MRI scanning and this information is not provided. Even if the lesion were resectable, in the emergency setting, it is often safer to undertake a simple procedure such as a loop colostomy and then complete surgery at a later date. A low anterior resection and loop ileostomy in this situation would almost certainly leak (and for the reasons outlined above, may be incomplete)."}, {"number": 70, "topic": "Large bowel obstruction", "stem_html": "A 75 year old lady is admitted with large bowel obstruction. She was previously well. She is investigated with an abdominal CT scan and this shows an obstructing carcinoma of the ascending colon. What is the best course of action?", "options": [{"label_html": "Laparotomy, right hemicolectomy and ileo-colic anastomosis", "is_correct": true}, {"label_html": "Laparotomy and ileo-colic bypass", "is_correct": false}, {"label_html": "Laparotomy and loop ileostomy alone", "is_correct": false}, {"label_html": "Insertion of self expanding metallic stent", "is_correct": false}, {"label_html": "Laparotomy and sub total colectomy", "is_correct": false}], "correct_index": 0, "explanation_html": "Obstructing right sided cancers can be safely resected by right hemicolectomy. An abdominal CT scan will provide sufficient information to allow operative planning. Even if distant disease were present, immediate treatment is still warranted unless the patient is in the terminal phase of illness. In many cases, a primary anastomosis can be undertaken. Insertion of colonic stents for right sided obstructing lesions is not generally undertaken."}, {"number": 71, "topic": "Large bowel obstruction", "stem_html": "A 77 year old man is admitted with large bowel obstruction and on investigation with an abdominal CT scan is found to have an obstructing cancer of the sigmoid colon. What is the most appropriate course of action?", "options": [{"label_html": "Laparotomy, sigmoid colectomy and formation of end colostomy", "is_correct": true}, {"label_html": "Laparotomy and loop colostomy", "is_correct": false}, {"label_html": "Laparotomy and loop ileostomy", "is_correct": false}, {"label_html": "Laparotomy, high anterior resection and colo-rectal anastomosis", "is_correct": false}, {"label_html": "Palliation", "is_correct": false}], "correct_index": 0, "explanation_html": "Obstructing sigmoid cancers can be resected or stented. If stented, then the patient may need definitive surgery later. If resected, then a resection and end colostomy (Hartmann's ) procedure is usually undertaken because of the risks of anastomotic leak in the setting of anastomosing obstructed colon to rectum."}], "note_html": "Colonic obstruction remains a common surgical problem. It is most commonly due to malignancy (60%) and diverticular disease (20%). Volvulus affecting the colon accounts for 5% of cases. Acute colonic pseudo-obstruction remains a potential differential diagnosis in all cases. Intussusception affecting the colon (most often due to tumours in the adult population) remains a rare but recognised cause. <br>The typical patient will present with gradual onset of progressive abdominal distension, colicky abdominal pain and either obstipation or absolute constipation. <br>On examination abdominal distension is present, the presence of caecal tenderness (assuming no overt evidence of peritonitis) is a useful sign to elicit. A digital rectal examination and rigid sigmoidoscopy should be performed.<br>A plain abdominal x-ray is the usual first line test and; the caecal diameter and ileocaecal valve competency should be assessed on this film. <br><br><b>Imaging modalities<\/b><br>Debate long surrounds the use of CT versus gastrograffin enemas. The latter investigation has always been the traditional method of determining whether a structural lesion is indeed present. However, in the UK the use of this technique has declined and in most units a CT scan will be offered as the first line investigation by the majority of radiologists (and is advocated by the ACPGBI). In most cases this will provide sufficient detail to allow operative planning, and since malignancy accounts for most presentations may also stage the disease. In the event that the radiologist cannot provide a clear statement of lesion site, the surgeon should have no hesitation in requesting a contrast enema. <br><br><b>Surgical options<\/b><br>The decision as to when to operate or not is determined firstly by the patients physiological status. Unstable patients require resuscitation prior to surgery and admission to a critical care unit for invasive monitoring and potential inotropic support may be needed. In patients who are otherwise stable the decision then rests on the radiological and clinical findings. As a general rule the old adage that the sun should not rise and set on unrelieved large bowel obstruction still holds true. A caecal diameter of 12cm or more in the presence of complete obstruction with a competent ileocaecal valve and caecal tenderness is a sign of impending perforation and a relative indication for prompt surgery. <br><br><b>Right sided and transverse lesions<\/b><br>Right sided lesions producing large bowel obstruction should generally be treated by right hemicolectomy or its extended variant if the lesion lies in the distal transverse colon or splenic flexure. In these cases an ileocolic anastomosis may be easily constructed and even in the emergency setting has a low risk of anastomotic leak.<br><br><b>Left sided lesions<\/b><br>The options here lie between sub total colectomy and anastomosis, left hemicolectomy with on table lavage and primary anastomosis, left hemicolectomy and end colostomy formation and finally colonic stent insertion. <br>The usefulness of colonic stents was the subject of a Cochrane review in 2011. The authors concluded that on the basis of the data that they reviewed, there was no benefit from the use of colonic stents over conventional surgical resection with a tendency to better outcomes seen in the surgical group (1). A more recently conducted meta analysis met with the same conclusion (2). However, the recently concluded CREST trial has suggested that self expanding metallic stents can improve outcomes and avoids a stoma.<br><br><b>Rectosigmoid lesions<\/b><br>Lesions below the peritoneal reflection that are causing obstruction should generally be treated with a loop colostomy. Primary resection of unstaged rectal cancer would most likely carry a high CRM positivity rate and cannot be condoned. Where the lesion occupies the distal sigmoid colon the usual practice would be to perform a high anterior resection. The decision surrounding restoration of intestinal continuity would lie with the operating surgeon. <br><br><b>References<\/b><br>1. Sagar J. Colorectal stents for the management of malignant colonic obstructions. Cochrane Database of Systematic Reviews 2011, Issue 11. Art. No.: CD007378. DOI: 10.1002/14651858.CD007378.pub2.<br>2. Cirrochi <i> et al<\/i> Safety and efficacy of endoscopic colonic stenting as a bridge to surgery in the management of intestinal obstruction due to left colon and rectal cancer: A systematic review and meta-analysis. <i>Surg Oncol<\/i>. 2013 Mar;22(1):14-21.<br>3. Johnson W and Hawkins A. Large bowel obstruction. Clin Colon Rectal Surg. 2021 Jul;34(4):233-241. doi: 10.1055/s-0041-1729927."}, {"name": "Laxatives", "questions": [{"number": 72, "topic": "Laxatives", "stem_html": "A 73 year old lady presents with constipation and no organic disease is identified on investigation. Which of the following types of laxatives works by direct bowel stimulation?", "options": [{"label_html": "Magnesium sulphate", "is_correct": false}, {"label_html": "Lactulose", "is_correct": false}, {"label_html": "Potassium sodium tartrate", "is_correct": false}, {"label_html": "Methylcellulose", "is_correct": false}, {"label_html": "Senna", "is_correct": true}], "correct_index": 4, "explanation_html": "Senna contains glycosides. It passes unchanged into the colon where bacteria hydrolyse the glycosidic bond, releasing the anthracene derivatives. These stimulate the myenteric plexus."}], "note_html": "<div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Bulk forming laxatives<\/b><\/td><\/tr><tr><td>Bran<br>Psyllium<br>Methylcellulose<\/td><\/tr><tr><td><b>Osmotic laxatives<\/b><\/td><\/tr><tr><td>Magnesium sulphate<br>Magnesium citrate<br>Sodium phosphate<br>Sodium sulphate<br>Potassium sodium tatrate<br>Polyethylene glycol<br>Docusate<\/td><\/tr><tr><td><b>Stimulant laxatives<\/b><\/td><\/tr><tr><td>Bisacodyl<br>Sodium picosulphate<br>Senna<br>Ricinoleic acid<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Lower Gastrointestinal bleeding", "questions": [{"number": 73, "topic": "Lower Gastrointestinal bleeding", "stem_html": "A 78 year old lady is admitted with a 3 hour history of passage of dark red blood per rectum. Prior to this event, she was otherwise well with no major medical co-morbidities. On examination, she has a mild tachycardia but other vital signs are normal, abdomen is soft and non tender. Digital rectal exam reveals dark blood but no other findings. What is the most likely underlying cause?", "options": [{"label_html": "Diverticular disease", "is_correct": true}, {"label_html": "Meckels diverticulum", "is_correct": false}, {"label_html": "Jejunal diverticulosis", "is_correct": false}, {"label_html": "Angiodysplasia of the colon", "is_correct": false}, {"label_html": "Colonic cancer", "is_correct": false}], "correct_index": 0, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Diverticular disease is the commonest cause of lower GI bleeding in adults.<\/div>Diverticular associated bleeding is the commonest cause of lower GI bleeding in older adults and it is important to note that it is not associated with diverticulitis which seldom bleeds. Most cases will stop bleeding spontaneously."}, {"number": 74, "topic": "Lower Gastrointestinal bleeding", "stem_html": "A 73 year old lady is admitted with a brisk rectal bleed. She is otherwise well and the bleed settles. On examination, her abdomen is soft and non tender. Elective colonoscopy shows a small erythematous lesion in the right colon, but no other abnormality. What is the likely cause?", "options": [{"label_html": "Diverticular bleed", "is_correct": false}, {"label_html": "Angiodysplasia", "is_correct": true}, {"label_html": "Colonic cancer", "is_correct": false}, {"label_html": "Ischaemia", "is_correct": false}, {"label_html": "Infective colitis", "is_correct": false}], "correct_index": 1, "explanation_html": "Angiodysplasia can be difficult to identify and treat. The colonoscopic stigmata are easily missed by poor bowel preparation."}, {"number": 75, "topic": "Lower Gastrointestinal bleeding", "stem_html": "A 25 year old man complains of passing painless bright red blood rectally. It has been occurring over the past week and tends to occur post defecation. He also suffers from pruritus ani. The underlying cause is likely to be amenable by treatment from which of the following modalities?", "options": [{"label_html": "Topical GTN", "is_correct": false}, {"label_html": "Topical diltiazem", "is_correct": false}, {"label_html": "Rubber band ligation", "is_correct": true}, {"label_html": "Injection sclerotherapy", "is_correct": false}, {"label_html": "Lateral internal sphincterotomy", "is_correct": false}], "correct_index": 2, "explanation_html": "The history of one of the haemorrhoidal bleeding. The recent HUBLE trial showed equivalence of banding vs HALO for haemorrhoids. Rubber band ligation has a 30% failure rate but is generally easy and well tolerated. Painful PR bleeding is more suggestive of a fissure which is treated with nitrates or surgery."}, {"number": 76, "topic": "Lower Gastrointestinal bleeding", "stem_html": "A 63 year old man presents with episodic rectal bleeding the blood tends to be dark in colour and may be mixed with stool. His bowel habit has been erratic since an abdominal aortic aneurysm repair 6 weeks previously. What is the most likely cause?", "options": [{"label_html": "Ischaemic colitis", "is_correct": true}, {"label_html": "Diverticulitis", "is_correct": false}, {"label_html": "Angiodysplasia", "is_correct": false}, {"label_html": "Cancer", "is_correct": false}, {"label_html": "Ulcerative colitis", "is_correct": false}], "correct_index": 0, "explanation_html": "The inferior mesenteric artery may have been ligated and being an arteriopath collateral flow through the marginal may be imperfect."}, {"number": 77, "topic": "Lower Gastrointestinal bleeding", "stem_html": "A 66 year old man is admitted as an emergency with torrential rectal bleeding. Following resuscitation, an upper GI endoscopy is undertaken and it is normal. However, he continues to bleed. What is the most appropriate course of action?", "options": [{"label_html": "Arrange a CT angiogram", "is_correct": true}, {"label_html": "Arrange a laparotomy and sub total colectomy", "is_correct": false}, {"label_html": "Undertake a colonoscopy", "is_correct": false}, {"label_html": "Perform a laparoscopy and on table colonoscopy", "is_correct": false}, {"label_html": "Arrange a capsule endoscopy", "is_correct": false}], "correct_index": 0, "explanation_html": "Heavy lower GI bleeding should be investigated with an angiogram. It is best to avoid emergency surgery as the bleeding site is very difficult to find. Unlike upper GI endoscopy, colonoscopy in patients who are acutely bleeding is often difficult and seldom helpful. If it is to be done, a therapeutic scope with twin working channels is useful."}, {"number": 78, "topic": "Lower Gastrointestinal bleeding", "stem_html": "A 56 year old man is admitted with passage of a large volume of blood per rectum. On examination, he is tachycardic, his abdomen is soft, although he has marked dilated veins on his abdominal wall. Proctoscopy reveals large dilated veins with stigmata of recent haemorrhage. What is the most appropriate treatment?", "options": [{"label_html": "IV terlipressin", "is_correct": true}, {"label_html": "Excisional haemorrhoidectomy", "is_correct": false}, {"label_html": "Injection sclerotherapy", "is_correct": false}, {"label_html": "Proctectomy", "is_correct": false}, {"label_html": "Rectal pack insertion", "is_correct": false}], "correct_index": 0, "explanation_html": "Rectal varices are a recognised complication of portal hypertension. In the first instance they can be managed with medical therapy to lower pressure in the portal venous system. TIPSS may be considered. Whilst band ligation is an option, attempting to inject these in same way as haemorroids would carry a high risk of precipitating further haemorrhage."}, {"number": 79, "topic": "Lower Gastrointestinal bleeding", "stem_html": "A 68 year old man presents with iron deficiency anaemia. Which of these sites is most likely to require a biopsy in order to identify the underlying cause?", "options": [{"label_html": "Duodenum", "is_correct": false}, {"label_html": "Ileum", "is_correct": false}, {"label_html": "Antrum", "is_correct": false}, {"label_html": "Jejunum", "is_correct": false}, {"label_html": "Right colon", "is_correct": true}], "correct_index": 4, "explanation_html": "In older adults, colorectal cancer is a major cause of iron deficiency anaemia and the right colon is the major site of occult blood loss. For this reason, colonic imaging is the first line investigation in such cases."}, {"number": 80, "topic": "Lower Gastrointestinal bleeding", "stem_html": "A 68 year old man presents with iron deficiency anaemia. Which of these sites is most likely to require a biopsy in order to identify the underlying cause?", "options": [{"label_html": "Duodenum", "is_correct": false}, {"label_html": "Ileum", "is_correct": false}, {"label_html": "Antrum", "is_correct": false}, {"label_html": "Jejunum", "is_correct": false}, {"label_html": "Right colon", "is_correct": true}], "correct_index": 4, "explanation_html": "In older adults, colorectal cancer is a major cause of iron deficiency anaemia and the right colon is the major site of occult blood loss. For this reason, colonic imaging is the first line investigation in such cases."}, {"number": 81, "topic": "Lower Gastrointestinal bleeding", "stem_html": "A 65 year old lady presents with fatigue and is found to have an iron deficiency anaemia. Which of these investigations should be undertaken first?", "options": [{"label_html": "Colonoscopy", "is_correct": true}, {"label_html": "Gastroscopy", "is_correct": false}, {"label_html": "Capsule endoscopy", "is_correct": false}, {"label_html": "Small bowel MRI scan", "is_correct": false}, {"label_html": "Mesenteric CT angiogram", "is_correct": false}], "correct_index": 0, "explanation_html": "Colorectal cancer is a major cause of iron deficiency anaemia and the colon is therefore investigated first before other differentials are considered."}], "note_html": "<b>Colonic bleeding<\/b><br>This typically presents as bright red or dark red blood per rectum. Colonic bleeding rarely presents as malaena type stool, this is because blood in the colon has a powerful laxative effect and is rarely retained long enough for transformation to occur and because the digestive enzymes present in the small bowel are not present in the colon. Up to 15% of patients presenting with haemochezia will have an upper gastrointestinal source of haemorrhage.<br><br>As a general rule right sided bleeds tend to present with darker coloured blood than left sided bleeds. Haemorrhoidal bleeding typically presents as bright red rectal bleeding that occurs post defecation either onto toilet paper or into the toilet pan. It is very unusual for haemorrhoids alone to cause any degree of haemodynamic compromise. <br><br><b>Causes<\/b><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Cause<\/b><\/th><th><b> \tPresenting features<\/b><\/th><\/tr><\/thead><tbody><tr><td>Colitis\t<\/td><td>Bleeding may be brisk in advanced cases, diarrhoea is commonly present. Abdominal x-ray may show featureless colon.<\/td><\/tr><tr><td>Diverticular disease\t<\/td><td>Acute diverticulitis often is not complicated by major bleeding and diverticular bleeds often occur sporadically. 75% all will cease spontaneously within 24-48 hours. Bleeding is often dark and of large volume.<\/td><\/tr><tr><td>Cancer\t<\/td><td>Colonic cancers often bleed and for many patients this may be the first sign of the disease. Major bleeding from early lesions is uncommon<\/td><\/tr><tr><td>Haemorrhoidal bleeding\t<\/td><td>Typically bright red bleeding occurring post defecation. Although patients may give graphic descriptions bleeding of sufficient volume to cause haemodynamic compromise is rare.<\/td><\/tr><tr><td>Angiodysplasia\t<\/td><td>Apart from bleeding, which may be massive, these arteriovenous lesions cause little in the way of symptoms. The right side of the colon is more commonly affected.<\/td><\/tr><\/tbody><\/table><\/div><br><b>Management<\/b><br><ul><li>Prompt correction of any haemodynamic compromise is required. Unlike upper gastrointestinal bleeding the first line management is usually supportive. This is because in the acute setting endoscopy is rarely helpful. <\/li><li>When haemorrhoidal bleeding is suspected a proctosigmoidoscopy is reasonable as attempts at full colonoscopy are usually time consuming and often futile. <\/li><li>In the unstable patient the usual procedure would be an angiogram (either CT or percutaneous), when these are performed during a period of haemodynamic instability they may show a bleeding point and may be the only way of identifying a patch of angiodysplasia. <\/li><li>In others who are more stable the standard procedure would be a colonoscopy in the elective setting. In patients undergoing angiography attempts can be made to address the lesion in question such as coiling. Otherwise surgery will be necessary.<\/li><li>In patients with ulcerative colitis who have significant haemorrhage the standard approach would be a sub total colectomy, particularly if medical management has already been tried and is not effective.<\/li><\/ul><br><br><b>Indications for surgery<\/b><br>Patients &gt; 60 years<br>Continued bleeding despite endoscopic intervention <br>Recurrent bleeding <br>Known cardiovascular disease with poor response to hypotension <br><br><b>Surgery<\/b><br>Selective mesenteric embolisation if life threatening bleeding. This is most helpful if conducted during a period of relative haemodynamic instability. If all haemodynamic parameters are normal then the bleeding is most likely to have stopped and any angiography normal in appearance. In many units a CT angiogram will replace selective angiography but the same caveats will apply. <br><br>If the source of colonic bleeding is unclear; perform a laparotomy, on table colonic lavage and following this attempt a resection. A blind sub total colectomy is most unwise, for example bleeding from an small bowel arterio-venous malformation will not be treated by this manoeuvre.<br><br><b>Summary of Acute Lower GI bleeding recommendations<\/b><br>Consider admission if:<br>* Over 60 years<br>* Haemodynamically unstable/profuse PR bleeding<br>* On aspirin or NSAID<br>* Significant co morbidity<br><br>Management<br><ul><li>All patients should have a history and examination, PR and proctoscopy<\/li><li>Colonoscopic haemostasis aimed for in post polypectomy or diverticular bleeding<\/li><\/ul><br><b>References<\/b><br>http://www.sign.ac.uk/guidelines/fulltext/105/index.html"}, {"name": "Pilonidal sinus", "questions": [{"number": 82, "topic": "Pilonidal sinus", "stem_html": "A 28 year old male presents with a discharging sinus in his natal cleft.  He is found to have a pilonidal sinus. Which statement is false?", "options": [{"label_html": "Can occur in webs of fingers and the axilla", "is_correct": false}, {"label_html": "After drainage pilonidal abscesses should not be primarily closed", "is_correct": false}, {"label_html": "A rare complication is squamous cell carcinoma", "is_correct": false}, {"label_html": "In a patient with an acute abscess the Bascoms procedure is the treatment of choice.", "is_correct": true}, {"label_html": "Treatment involves excising or laying open the sinus tract.", "is_correct": false}], "correct_index": 3, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">When performing incision and drainage for pilonidal abscess try to avoid making the incision in the midline of the natal cleft.<\/div>Acute pilonidal abscesses should receive simple incision and drainage. Definitive treatments such as a Bascoms procedure should not be undertaken when acute sepsis is present."}, {"number": 83, "topic": "Pilonidal sinus", "stem_html": "A 22 year old man presents with a discharging area on his lower back. On examination there is an epithelial defect located 6cm proximal to the tip of his coccyx and located in the midline. There are two further defects located about 2cm superiorly in the same position. He is extremely hirsute. What is the most likely diagnosis?", "options": [{"label_html": "Pre sacral tumour", "is_correct": false}, {"label_html": "Sacrococcygeal teratoma", "is_correct": false}, {"label_html": "Pilonidal sinus", "is_correct": true}, {"label_html": "Fistula in ano", "is_correct": false}, {"label_html": "Occult spina bifida", "is_correct": false}], "correct_index": 2, "explanation_html": "Pilonidal sinuses are extremely common in hirsute individuals and typically present as midline sinuses in the natal cleft."}], "note_html": "<ul><li>Occur as a result of hair debris creating sinuses in the skin (Bascom theory).<\/li><li>Usually in the natal cleft of male patients after pubert
