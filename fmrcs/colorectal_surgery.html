<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Colorectal Surgery</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f1e8;
      --bg-accent: #ebe4d4;
      --surface: rgba(255, 252, 246, 0.92);
      --surface-strong: #fffdf7;
      --border: #d9cfbd;
      --text: #23313a;
      --text-soft: #5f6c73;
      --accent: #496a58;
      --accent-strong: #2f5341;
      --correct-bg: #e0f3e6;
      --correct-border: #77b487;
      --wrong-bg: #fbe0df;
      --wrong-border: #dc7a73;
      --note-bg: #f3eee2;
      --shadow: 0 18px 40px rgba(76, 59, 37, 0.08);
      --radius-lg: 22px;
      --radius-md: 16px;
      --radius-sm: 12px;
      --page-width: 960px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: "Avenir Next", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.72), transparent 32%),
        linear-gradient(180deg, #f8f4eb 0%, #f3ede0 100%);
      line-height: 1.65;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.14), transparent 18%, transparent 82%, rgba(255, 255, 255, 0.14)),
        repeating-linear-gradient(
          180deg,
          rgba(73, 106, 88, 0.015) 0,
          rgba(73, 106, 88, 0.015) 1px,
          transparent 1px,
          transparent 18px
        );
    }

    a {
      color: var(--accent-strong);
    }

    img {
      max-width: 100%;
      height: auto;
      border-radius: 14px;
    }

    .score-badge,
    .badge.rounded-pill.bg-danger {
      display: none !important;
    }

    .page {
      width: min(100% - 24px, var(--page-width));
      margin: 0 auto;
      padding: 18px 0 48px;
    }

    .topbar {
      margin-bottom: 18px;
      padding: 18px;
      background: rgba(255, 252, 246, 0.9);
      border: 1px solid rgba(217, 207, 189, 0.86);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .topbar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .eyebrow {
      margin: 0 0 4px;
      font-size: 0.76rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-soft);
    }

    .title {
      margin: 0;
      font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
      font-size: clamp(1.5rem, 2vw + 1rem, 2.35rem);
      line-height: 1.08;
      font-weight: 700;
    }

    .meta {
      margin: 8px 0 0;
      color: var(--text-soft);
      font-size: 0.96rem;
    }

    .mode-switch {
      display: inline-flex;
      padding: 6px;
      border-radius: 999px;
      background: var(--bg-accent);
      border: 1px solid var(--border);
      gap: 6px;
      flex-shrink: 0;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
      flex-wrap: wrap;
    }

    .topic-actions {
      display: inline-flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .utility-button {
      appearance: none;
      border: 1px solid var(--border);
      background: var(--surface-strong);
      color: var(--text);
      font: inherit;
      font-weight: 700;
      border-radius: 999px;
      padding: 10px 14px;
      cursor: pointer;
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .utility-button:hover {
      transform: translateY(-1px);
      border-color: #c7bba9;
      box-shadow: 0 8px 18px rgba(70, 54, 34, 0.07);
    }

    .utility-button:focus-visible {
      outline: 3px solid rgba(73, 106, 88, 0.22);
      outline-offset: 2px;
    }

    .mode-button {
      appearance: none;
      border: 0;
      background: transparent;
      color: var(--text-soft);
      font: inherit;
      font-weight: 700;
      border-radius: 999px;
      padding: 10px 16px;
      min-width: 92px;
      cursor: pointer;
      transition: transform 0.18s ease, background 0.18s ease, color 0.18s ease, box-shadow 0.18s ease;
    }

    .mode-button:hover {
      transform: translateY(-1px);
      color: var(--text);
    }

    .mode-button.active {
      background: var(--surface-strong);
      color: var(--accent-strong);
      box-shadow: 0 8px 18px rgba(73, 106, 88, 0.14);
    }

    .topic-list {
      display: grid;
      gap: 18px;
    }

    .topic {
      background: rgba(255, 252, 246, 0.78);
      border: 1px solid rgba(217, 207, 189, 0.9);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .topic[open] {
      background: rgba(255, 252, 246, 0.9);
    }

    .topic > summary {
      list-style: none;
      cursor: pointer;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      user-select: none;
    }

    .topic > summary::-webkit-details-marker {
      display: none;
    }

    .topic-title {
      margin: 0;
      font-size: 1.08rem;
      font-weight: 800;
      letter-spacing: 0.01em;
    }

    .topic-meta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--text-soft);
      font-size: 0.94rem;
    }

    .chevron {
      display: inline-block;
      transition: transform 0.2s ease;
      color: var(--accent);
      font-weight: 700;
    }

    .topic[open] > summary .chevron {
      transform: rotate(90deg);
    }

    .topic-notes {
      background: rgba(243, 238, 226, 0.62);
      border: 1px solid #e3d9c8;
      border-radius: var(--radius-md);
      overflow: hidden;
    }

    .topic-notes > summary {
      list-style: none;
      cursor: pointer;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      user-select: none;
    }

    .topic-notes > summary::-webkit-details-marker {
      display: none;
    }

    .topic-notes-title {
      font-size: 0.95rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-soft);
    }

    .topic-notes[open] > summary .chevron {
      transform: rotate(90deg);
    }

    .topic-notes-body {
      padding: 0 16px 16px;
      color: var(--text);
    }

    .topic-body {
      padding: 0 16px 16px;
      display: grid;
      gap: 14px;
    }

    .question-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 18px;
      box-shadow: 0 10px 24px rgba(70, 54, 34, 0.05);
    }

    .question-label {
      margin: 0 0 10px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-soft);
      font-size: 0.88rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 800;
    }

    .stem {
      font-size: 1rem;
    }

    .stem > *:first-child,
    .explanation > *:first-child {
      margin-top: 0;
    }

    .stem > *:last-child,
    .explanation > *:last-child {
      margin-bottom: 0;
    }

    .options {
      margin-top: 16px;
      display: grid;
      gap: 10px;
    }

    .option {
      width: 100%;
      text-align: left;
      border: 1px solid #d8d0c2;
      background: #fffdf8;
      color: var(--text);
      border-radius: var(--radius-sm);
      padding: 14px 15px;
      font: inherit;
      line-height: 1.45;
      cursor: pointer;
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
    }

    .option:hover {
      transform: translateY(-1px);
      border-color: #c7bba9;
      box-shadow: 0 8px 18px rgba(70, 54, 34, 0.07);
    }

    .option:focus-visible {
      outline: 3px solid rgba(73, 106, 88, 0.22);
      outline-offset: 2px;
    }

    .option.correct {
      background: var(--correct-bg);
      border-color: var(--correct-border);
      box-shadow: inset 0 0 0 1px rgba(119, 180, 135, 0.2);
    }

    .option.incorrect {
      background: var(--wrong-bg);
      border-color: var(--wrong-border);
      box-shadow: inset 0 0 0 1px rgba(220, 122, 115, 0.2);
    }

    .option.neutral-revealed {
      background: #faf6ee;
      border-color: #d8d0c2;
      color: #5f676a;
    }

    .option[disabled] {
      cursor: default;
      opacity: 1;
    }

    .explanation {
      margin-top: 14px;
      padding: 14px 16px;
      background: var(--note-bg);
      border: 1px solid #e3d9c8;
      border-radius: 14px;
      color: var(--text);
    }

    .question-card.is-hidden .explanation {
      display: none;
    }

    .explanation-label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-soft);
      font-weight: 800;
    }

    .empty-state {
      padding: 28px 22px;
      background: var(--surface);
      border: 1px dashed var(--border);
      border-radius: var(--radius-lg);
      color: var(--text-soft);
    }

    .rich-text table {
      width: 100%;
      border-collapse: collapse;
      margin: 12px 0;
      overflow: hidden;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.68);
    }

    .rich-text td,
    .rich-text th {
      border: 1px solid #ddd2bf;
      padding: 10px 12px;
      vertical-align: top;
    }

    .rich-text ul,
    .rich-text ol {
      padding-left: 20px;
      margin: 10px 0;
    }

    .rich-text center {
      display: block;
      text-align: center;
    }

    .rich-text .table-responsive {
      overflow-x: auto;
    }

    @media (max-width: 720px) {
      .page {
        width: min(100% - 16px, var(--page-width));
        padding-top: 10px;
      }

      .topbar {
        padding: 14px;
        border-radius: 18px;
      }

      .topbar-inner {
        flex-direction: column;
        align-items: stretch;
      }

      .controls {
        justify-content: stretch;
      }

      .topic-actions {
        width: 100%;
      }

      .utility-button {
        flex: 1 1 0;
      }

      .mode-switch {
        width: 100%;
        justify-content: stretch;
      }

      .mode-button {
        flex: 1 1 50%;
      }

      .topic > summary {
        padding: 16px;
        align-items: flex-start;
      }

      .topic-meta {
        font-size: 0.88rem;
      }

      .topic-body {
        padding: 0 12px 12px;
      }

      .question-card {
        padding: 15px;
      }

      .option {
        padding: 13px 14px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="topbar">
      <div class="topbar-inner">
        <div>
          <p class="eyebrow">Study View</p>
          <h1 class="title">Colorectal Surgery</h1>
          <p class="meta">97 questions across 23 topics</p>
        </div>
        <div class="controls">
          <div class="topic-actions" aria-label="Topic visibility controls">
            <button class="utility-button" type="button" data-topic-action="expand">Expand all</button>

          <div class="mode-switch" role="tablist" aria-label="Question mode">
            <button class="mode-button active" type="button" data-mode-button="solve" aria-pressed="true">Solve</button>
            <button class="mode-button" type="button" data-mode-button="review" aria-pressed="false">Review</button>
          </div>
        </div>
      </div>
    </section>

    <section id="app"></section>
  </main>

  <script id="quiz-data" type="application/json">{"title": "Colorectal Surgery", "topics": [{"name": "Anal cancer", "questions": [{"number": 1, "topic": "Anal cancer", "stem_html": "What is the main risk factor for the development of anal cancer?", "options": [{"label_html": "Smoking", "is_correct": false}, {"label_html": "Ano-receptive intercourse", "is_correct": false}, {"label_html": "Immunosuppression", "is_correct": false}, {"label_html": "Infection with Epstein Barr virus", "is_correct": false}, {"label_html": "Infection with Human Papilloma virus", "is_correct": true}], "correct_index": 4, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Anal cancer is strongly associated with HPV infection<\/div>"}, {"number": 2, "topic": "Anal cancer", "stem_html": "A 55 year old man is found to have an anal cancer. His staging investigations show a T2 lesion with no metastatic disease. What is the most appropriate treatment?", "options": [{"label_html": "Radical abdominoperineal excision of the anus and rectum", "is_correct": false}, {"label_html": "Radical chemoradiotherapy", "is_correct": true}, {"label_html": "Excision proctectomy", "is_correct": false}, {"label_html": "External beam irradiation alone", "is_correct": false}, {"label_html": "Chemotherapy alone", "is_correct": false}], "correct_index": 1, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Combined chemoradiotherapy is the standard treatment for anal cancer<\/div>First line treatment for anal cancer (which is very different from rectal cancer) is radical chemoradiotherapy."}, {"number": 3, "topic": "Anal cancer", "stem_html": "What is the commonest malignant tumour of the anal canal?", "options": [{"label_html": "Lymphoma", "is_correct": false}, {"label_html": "Melanoma", "is_correct": false}, {"label_html": "Squamous cell carcinoma", "is_correct": true}, {"label_html": "Adenocarcinoma", "is_correct": false}, {"label_html": "Sarcoma", "is_correct": false}], "correct_index": 2, "explanation_html": "Anal cancers are usually squamous cell carcinomas"}], "note_html": "- Cancers arising from the squamous epithelium of the anal canal<br><ul><li>Arise inferior to the dentate line<\/li><li>Strongly linked to HPV type 16 infection<\/li><li>Other risk factors include ano-receptive intercourse, smoking and immunosuppression<\/li><li>Presenting symptoms include anal discomfort, discharge or pruritus <\/li><li>Lymphatic spread typically occurs to the inguinal nodes<\/li><li>Diagnosis is made by EUA and biopsies<\/li><li>Staging is with CT scanning of the chest, abdomen and pelvis<\/li><li>First line treatment is typically with chemoradiotherapy<\/li><li>Second line treatment for non metastatic disease is with salvage radical abdominoperineal excision of the anus and rectum<\/li><\/ul>"}, {"name": "Anal fissure", "questions": [{"number": 4, "topic": "Anal fissure", "stem_html": "A 28 year old male presents with painful, bright red, rectal bleeding. On examination he is found to have a posteriorly sited, midline, fissure in ano. What is the most appropriate treatment?", "options": [{"label_html": "Topical GTN paste", "is_correct": true}, {"label_html": "Sub lingual GTN paste", "is_correct": false}, {"label_html": "Anal stretch", "is_correct": false}, {"label_html": "Advancement flap", "is_correct": false}, {"label_html": "Tailored division of the external anal sphincter", "is_correct": false}], "correct_index": 0, "explanation_html": "Topical vasodilator therapy is the most commonly utilised treatment for fissure in ano. Surgical division of the internal anal sphincter is a reasonable treatment option in a young male. Division of the external sphincter will almost certainly result in incontinence and is not performed. Anal stretches were associated with a high rate of external sphincter injuries and have been discontinued for this reason."}, {"number": 5, "topic": "Anal fissure", "stem_html": "A 34 year old male presents with painful rectal bleeding and a fissure in ano is suspected. On examination he has an epithelial defect at the mucocutaenous junction that is located anteriorly. Approximately what proportion of patients with fissure in ano will present with this pattern of disease?", "options": [{"label_html": "90%", "is_correct": false}, {"label_html": "10%", "is_correct": true}, {"label_html": "50%", "is_correct": false}, {"label_html": "25%", "is_correct": false}, {"label_html": "100%", "is_correct": false}], "correct_index": 1, "explanation_html": "Only a minority of patients with fissure in ano will have an anteriorly sited fissure. They are particularly rare in males and an anterior fissure in a man should prompt a search for an underlying cause."}, {"number": 6, "topic": "Anal fissure", "stem_html": "A 21 year old man presents with a 5 week history of painful bright red bleeding that typically occurs post defecation and is noted on the toilet paper. External inspection of the anal canal shows a small skin tag at the six o'clock position. The patient declines internal palpation. What is the most likely underlying diagnosis?", "options": [{"label_html": "Fissure in ano", "is_correct": true}, {"label_html": "Fistula in ano", "is_correct": false}, {"label_html": "Haemorrhoidal disease", "is_correct": false}, {"label_html": "Solitary rectal ulcer", "is_correct": false}, {"label_html": "Internal rectal prolapse", "is_correct": false}], "correct_index": 0, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Painful bright red rectal bleeding is usually due to a fissure<\/div>The presence of pain and the sentinel tag suggests a posterior fissure in ano."}], "note_html": "Anal fissures are a common cause of painful, bright red, rectal bleeding. <br>Most fissures are idiopathic and present as a painful mucocutaneous defect in the posterior midline (90% cases). Fissures are more likely to be anteriorly located in females, particularly if they are multiparous. Multiple fissures and those which are located at other sites are more likely to be due to an underlying cause. <br>Diseases associated with fissure in ano include:<br><ul><li>Crohns disease<\/li><li>Tuberculosis <\/li><li>Internal rectal prolapse<\/li><\/ul><br><b>Diagnosis<\/b><br>In most cases the defect can be visualised as a posterior midline epithelial defect. Where symptoms are highly suggestive of the condition and examination findings are unclear an examination under anaesthesia may be helpful. Atypical disease presentation should be investigated with colonoscopy and EUA with biopsies of the area. <br><br><b>Treatment<\/b><br>Stool softeners are important as the hard stools may tear the epithelium and result in recurrent symptoms. The most effective first line agents are topically applied GTN (0.2%) or Diltiazem (2%) paste. Side effects of diltiazem are better tolerated. <br>Resistant cases may benefit from injection of botulinum toxin or lateral internal sphincterotomy (beware in females). Advancement flaps may be used to treat resistant cases.<br>Sphincterotomy produces the best healing rates. It is associated with incontinence to flatus in up to 10% of patients in the long term."}, {"name": "Anal fistula", "questions": [{"number": 7, "topic": "Anal fistula", "stem_html": "What is the commonest type of fistula in ano?", "options": [{"label_html": "Trans-sphincteric", "is_correct": false}, {"label_html": "Supra levator", "is_correct": false}, {"label_html": "Complex supra levator", "is_correct": false}, {"label_html": "Intersphincteric", "is_correct": true}, {"label_html": "Suprasphincteric", "is_correct": false}], "correct_index": 3, "explanation_html": "Intersphincteric fistulas are the commonest type and the external opening may be internal or external. These are the classical type of fistula and will have an internal opening near the anal verge and obey Goodsalls rule. Primary fistulotomy in this situation usually poses little risk to continence."}, {"number": 8, "topic": "Anal fistula", "stem_html": "A 21 year old lady presents with a 6 month history of an offensive discharge from the anus. She is otherwise well, but is increasingly annoyed at the need to wear pads. On examination, she has a small epithelial defect in the 5 o'clock position, approximately 3cm from the anal verge. What is the most likely cause?", "options": [{"label_html": "Fissure in ano", "is_correct": false}, {"label_html": "Fistula in ano", "is_correct": true}, {"label_html": "External haemorrhoid", "is_correct": false}, {"label_html": "Squamous cell carcinoma of the anus", "is_correct": false}, {"label_html": "Proctalgia fugax", "is_correct": false}], "correct_index": 1, "explanation_html": "Fistulas usually occur following previous ano-rectal sepsis. The discharge may be foul smelling and troublesome. Patients should be listed for examination under anaesthesia. Fistulas which are low and have little or no sphincter involvement are usually laid open."}, {"number": 9, "topic": "Anal fistula", "stem_html": "A 33 year old lady is admitted with recurrent discharging fistula in ano. She is also known to have ano rectal Crohns disease. On examination, she is found to have a low anal fistula with involvement of a very small amount of the external anal sphincter muscle. What is the most appropriate course of action?", "options": [{"label_html": "Insertion of a loose seton", "is_correct": true}, {"label_html": "Fistulotomy", "is_correct": false}, {"label_html": "Core fistulectomy", "is_correct": false}, {"label_html": "Core fistulectomy and advancement flap", "is_correct": false}, {"label_html": "Insertion of a cutting seton", "is_correct": false}], "correct_index": 0, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Fistula in ano in patients with Crohns disease should be managed with insertion of seton. <\/div>In patients with IBD, management of fistula should be minimalistic and complex procedures best avoided. Laying open fistulas in this situation is likely to result in a chronic and non healing wound."}], "note_html": "Fistula in ano is the most common form of ano rectal sepsis. Fistulae will have both an internal opening and external opening, these will be connected by tract(s). Complexity arises because of the potential for multiple entry and exit sites, together with multiple tracts. Fistulae are classified into four main groups according to anatomical location and the degree of sphincter involvement. Simple uncomplicated fistulae are low and do not involve more than 30% of the external sphincter. Complex fistulae involve the sphincter, have multiple branches or are non cryptoglandular in origin[1]<br><br><b>Assessment<\/b><br>Examination of the perineum for signs of trauma, external openings or the stigmata of IBD is important. Digital rectal examination may reveal the cord linking the internal and external openings. At the same time the integrity of the sphincter mechanism can be assessed. Low, uncomplicated fistulas may not require any further assessment, other groups will usually require more detailed investigation. For the fistula, the use of endo-anal USS with instillation of hydrogen peroxide into the fistula tract may be helpful. Ano-rectal MRI scanning is also a useful tool, it is sensitive and specific for the identification of fistula anatomy, branching tracts and identifying occult sphincter involvement[2]. <br><br><b>Identification of the internal opening<\/b><br>Fistulas with an external opening less than 3cm from the anal verge will typically obey Goodsalls rule (see below).<br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb142b.png\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb142.png\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Goodsall\" srule'=\"\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb142b.png\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center><b>Therapies<\/b><br><b>Seton suture<\/b><br>A seton is a piece of material that is passed through the fistula between the internal and external openings that allows the drainage of sepsis. This is important as undrained septic foci may drain along the path of least resistance, which may result in the development of accessory tracts and openings. Their main use is in treating complex fistula. Two types of seton are recognised, simple and cutting. Simple setons lie within the fistula tract and encourage both drainage and fibrosis. A cutting seton is inserted and the skin incised. The suture is tightened and re-tightened at regular intervals. This may convert a high fistula to a low fistula. Since the tissue will scar surrounding the fistula it is hoped that this technique will minimise incontinence[3]. Unfortunately, a  large retrospective review of the literature related to the use of cutting setons has found that they are associated with a 12% long term incontinence rate [4]<br><br><b>Fistulotomy<\/b><br>Low fistulas, that are simple should be treated by fistulotomy once the acute sepsis has been controlled. Fistulotomy (where safe) provides the highest healing rates [5]. Because fistulotomy is regarded as having a high cure rate, there are some who prefer to use this technique with more extensive sphincter involvement. In these patients the fistulotomy is performed as for a low fistula. However, the muscle that is encountered is then divided and reconstructed with an overlapping sphincter repair. A price is paid in terms of incontinence with this technique and up to 12.5% of patients who were continent pre-operatively will have issues relating to continence post procedure[6]. The same group also randomised between fistulotomy and sphincter reconstruction  and ano-rectal advancement flaps for the treatment of complex cryptoglandular fistulas and reported similar outcomes in terms of recurrence (&gt;90%) and disturbances to continence (20%)[7].<br>Other authors have found adverse outcomes following fistulotomy in patients  who have undergone previous surgery, are of female gender or who have high internal openings [8], in these patients careful assessment of pre-operative sphincter function should be considered mandatory prior to fistulotomy.<br><br><b>Anal fistula plugs and fibrin glue<\/b><br>The desire to avoid injury to the sphincter complex has led to surgeons using both fibrin glue and plugs to try and improve fistula healing. Meticulous preparation of the tract and prior use of a draining seton is likely to improve chances of success.<br>The use of anal fistula plugs in high transphincteric fistula of cryptoglandular origin is to be discouraged because of the high incidence of non response in patients treated with such devices [9]In most patients septic complications are the reasons for failure [10]. Fibrin glue is a popular option for the treatment of fistula. There is variability of reported healing rates In some cases initial success rates of up to 50% healing at six  months are reported (in patients with complex cryptogenic fistula). Of these successes 25% suffer a long term recurrence of fistula [11].  There are, however, no obvious cases of damage to the sphincter complex and the use of the devices does not appear to adversely impact on subsequent surgical options.<br><br><b>Ano-rectal advancement flaps<\/b><br>This procedure is primarily directed at high fistulae, and is considered attractive as a sphincter saving operation. The procedure is performed either with the patient in the prone jack knife position or in lithotomy (depending upon the site of the fistula). The dissection is commenced in the sub mucosal plane (which may be infiltrated with dilute adrenaline solution to ease dissection). The dissection is continued into healthy proximal tissue. This is brought down and sutured over the defect. <br>Follow up of patients with cryptoglandular fistulas treated with advancement flaps shows a success in up to 80% patients[12-14]. With most recurrences occurring in the first 6 months following surgery[12]. Continence was affected in some patients, with up to 10% describing major continence issues post operatively.<br><br><b>Ligation of the intersphincteric tract procedure<\/b><br>In this procedure an incision is made in the intersphincteric groove and the fistula tract dissected out in this plane and divided. A greater than 90% cure rate within 4 weeks was initially reported[15].  Others have subsequently performed similar studies on larger numbers of patients with similar success rates. <br><br><b>Fistulotomy at the time of abscess drainage?<\/b><br>A Cochrane review conducted in 2010 suggests that primary fistulotomy for low, uncomplicated fistula in ano may be safe and associated with better outcomes in relation to long term chronic sepsis[16]. However, there is a danger that such surgery performed by non specialists may result in a higher complication rate and therefore the traditional teaching is that primary treatment of acute sepsis is incision and drainage only. All agree that high/ complex fistulae should never be subject to primary fistulotomy in the acute setting.<br><br><b>References<\/b><br>1.\tParks, A.G., P.H. Gordon, and J.D. Hardcastle, A classification of fistula-in-ano. Br J Surg, 1976. 63(1): p. 1-12.<br>2.\tLunniss, P.J., et al., Magnetic resonance imaging of fistula-in-ano. Dis Colon Rectum, 1994. 37(7): p. 708-18.<br>3.\tMisra, M.C. and B.M. Kapur, A new non-operative approach to fistula in ano. Br J Surg, 1988. 75(11): p. 1093-4.<br>4.\tRitchie, R.D., J.M. Sackier, and J.P. Hodde, Incontinence rates after cutting seton treatment for anal fistula. Colorectal Dis, 2009. 11(6): p. 564-71.<br>5.\tTyler, K.M., C.B. Aarons, and S.M. Sentovich, Successful sphincter-sparing surgery for all anal fistulas. Dis Colon Rectum, 2007. 50(10): p. 1535-9.<br>6.\tPerez, F., et al., Prospective clinical and manometric study of fistulotomy with primary sphincter reconstruction in the management of recurrent complex fistula-in-ano. Int J Colorectal Dis, 2006. 21(6): p. 522-6.<br>7.\tPerez, F., et al., Randomized clinical and manometric study of advancement flap versus fistulotomy with sphincter reconstruction in the management of complex fistula-in-ano. Am J Surg, 2006. 192(1): p. 34-40.<br>8.\tGarcia-Aguilar, J., et al., Anal fistula surgery. Factors associated with recurrence and incontinence. Dis Colon Rectum, 1996. 39(7): p. 723-9.<br>9.\tOrtiz, H., et al., Randomized clinical trial of anal fistula plug versus endorectal advancement flap for the treatment of high cryptoglandular fistula in ano. Br J Surg, 2009. 96(6): p. 608-12.<br>10.\tEl-Gazzaz, G., M. Zutshi, and T. Hull, A retrospective review of chronic anal fistulae treated by anal fistulae plug. Colorectal Dis, 2010. 12(5): p. 442-7.<br>11.\tHaim, N., et al., Long-term results of fibrin glue treatment for cryptogenic perianal fistulas: a multicenter study. Dis Colon Rectum, 2011. 54(10): p. 1279-83.<br>12.\tOrtiz, H., et al., Length of follow-up after fistulotomy and fistulectomy associated with endorectal advancement flap repair for fistula in ano. Br J Surg, 2008. 95(4): p. 484-7.<br>13.\tKodner, I.J., et al., Endorectal advancement flap repair of rectovaginal and other complicated anorectal fistulas. Surgery, 1993. 114(4): p. 682-9; discussion 689-90.<br>14.\tAbbas, M.A., R. Lemus-Rangel, and A. Hamadani, Long-term outcome of endorectal advancement flap for complex anorectal fistulae. Am Surg, 2008. 74(10): p. 921-4.<br>15.\tRojanasakul, A., et al., Total anal sphincter saving technique for fistula-in-ano; the ligation of intersphincteric fistula tract. J Med Assoc Thai, 2007. 90(3): p. 581-6.<br>16.\tMalik, A.I., R.L. Nelson, and S. Tou, Incision and drainage of perianal abscess with or without treatment of anal fistula. Cochrane Database Syst Rev, 2010(7): p. CD006827."}, {"name": "Ano rectal disease", "questions": [{"number": 10, "topic": "Ano rectal disease", "stem_html": "A 21 year old female presents with a 24 hour history of increasingly severe ano-rectal pain. On examination, she is febrile and the skin surrounding the anus looks normal. She did not tolerate an attempted digital rectal examination. What is the most likely diagnosis?", "options": [{"label_html": "Fissure in ano", "is_correct": false}, {"label_html": "Haemorrhoidal disease", "is_correct": false}, {"label_html": "Proctalgia fugax", "is_correct": false}, {"label_html": "Solitary rectal ulcer", "is_correct": false}, {"label_html": "Intersphincteric abscess", "is_correct": true}], "correct_index": 4, "explanation_html": "The presence of fever and severe pain makes an abscess more likely than a fissure. Although fissures may be painful they do not, in themselves, cause fever. The usual management for this condition is examination of the ano-rectum under general anaesthesia and drainage of the sepsis."}, {"number": 11, "topic": "Ano rectal disease", "stem_html": "A 31 year old male presents with recurrent episodes of knife like pain within his rectum. On examination, there is no abnormality to find on either proctoscopy or palpation. What is the most likely diagnosis?", "options": [{"label_html": "Proctalgia fugax", "is_correct": true}, {"label_html": "Fissure in ano", "is_correct": false}, {"label_html": "Fistula in ano", "is_correct": false}, {"label_html": "Anal cancer", "is_correct": false}, {"label_html": "Intersphincteric abscess", "is_correct": false}], "correct_index": 0, "explanation_html": "Proctalgia fugax is a functional anorectal disorder characterized by severe, intermittent episodes of rectal pain that are self-limited. The diagnosis of proctalgia fugax requires exclusion of other causes of rectal or anal pain. Diagnostic work up should also include imaging (for example with MRI) to exclude occult pathology."}, {"number": 12, "topic": "Ano rectal disease", "stem_html": "A 23 year old male presents with bright red rectal bleeding that occurs post defecation onto the toilet paper. He has been suffering from severe pain associated with this. On external anal examination there is a skin tag located at the 6 O'clock position. Which of the treatments listed below is most likely to be helpful?", "options": [{"label_html": "Topical GTN", "is_correct": true}, {"label_html": "Rubber band ligation", "is_correct": false}, {"label_html": "Injections of oily phenol", "is_correct": false}, {"label_html": "Milligan Morgan haemorrhoidectomy", "is_correct": false}, {"label_html": "Lords anal dilatation", "is_correct": false}], "correct_index": 0, "explanation_html": "Since the most likely diagnosis is a fissure, the correct treatment is topical nitrates. Haemorrhoidal treatments are not going to be helpful. Whilst a Lords anal dilation was the traditional treatment, there are few surgeons (and even fewer patients!) that would advocate a significant anal stretch these days as there are significant long term continence risks."}, {"number": 13, "topic": "Ano rectal disease", "stem_html": "A 23 year old male presents with bright red rectal bleeding that occurs post defecation onto the toilet paper. He has been suffering from severe pain associated with this. On external anal examination there is a skin tag located at the 6 O'clock position. Which of the treatments listed below is most likely to be helpful?", "options": [{"label_html": "Topical GTN", "is_correct": true}, {"label_html": "Rubber band ligation", "is_correct": false}, {"label_html": "Injections of oily phenol", "is_correct": false}, {"label_html": "Milligan Morgan haemorrhoidectomy", "is_correct": false}, {"label_html": "Lords anal dilatation", "is_correct": false}], "correct_index": 0, "explanation_html": "Since the most likely diagnosis is a fissure, the correct treatment is topical nitrates. Haemorrhoidal treatments are not going to be helpful. Whilst a Lords anal dilation was the traditional treatment, there are few surgeons (and even fewer patients!) that would advocate a significant anal stretch these days as there are significant long term continence risks."}, {"number": 14, "topic": "Ano rectal disease", "stem_html": "A 23 year old male presents with bright red rectal bleeding that occurs post defecation onto the toilet paper. He has been suffering from severe pain associated with this. On external anal examination there is a skin tag located at the 6 O'clock position. Which of the treatments listed below is most likely to be helpful?", "options": [{"label_html": "Topical GTN", "is_correct": true}, {"label_html": "Rubber band ligation", "is_correct": false}, {"label_html": "Injections of oily phenol", "is_correct": false}, {"label_html": "Milligan Morgan haemorrhoidectomy", "is_correct": false}, {"label_html": "Lords anal dilatation", "is_correct": false}], "correct_index": 0, "explanation_html": "Since the most likely diagnosis is a fissure, the correct treatment is topical nitrates. Haemorrhoidal treatments are not going to be helpful. Whilst a Lords anal dilation was the traditional treatment, there are few surgeons (and even fewer patients!) that would advocate a significant anal stretch these days as there are significant long term continence risks."}, {"number": 15, "topic": "Ano rectal disease", "stem_html": "A 19 year old male presents with bright red rectal bleeding that occurs post defecation onto the paper and into the pan. Apart from constipation his bowel habit is normal. Digital rectal examination is normal. What is the most likely cause?", "options": [{"label_html": "Haemorrhoidal disease", "is_correct": true}, {"label_html": "Fissure in ano", "is_correct": false}, {"label_html": "Solitary rectal ulcer", "is_correct": false}, {"label_html": "Rectal cancer", "is_correct": false}, {"label_html": "Crohns disease", "is_correct": false}], "correct_index": 0, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Uncomplicated grade 1 or 2 haemorrhoids are usually impalpable<\/div>This is likely to be haemorrhoidal disease. A sigmoidoscopy should always be performed to exclude more sinister pathology."}, {"number": 16, "topic": "Ano rectal disease", "stem_html": "A 34 year old lady presents to her general practitioner with peri anal discomfort. The general practitioner diagnoses pruritus ani, which of the following is least associated with the condition?", "options": [{"label_html": "Hyperbilirubinaemia", "is_correct": false}, {"label_html": "Anal fissure", "is_correct": false}, {"label_html": "Leukaemia", "is_correct": false}, {"label_html": "Syphilis", "is_correct": false}, {"label_html": "Tuberculosis", "is_correct": true}], "correct_index": 4, "explanation_html": "Causes: <br><br><ul><li><b>Systemic<\/b> (DM, Hyperbilirubinaemia, aplastic anaemia)<\/li><li><b>Mechanical<\/b> (diarrhoea, constipation, anal fissure)<\/li><li><b>Infections<\/b> (STDs)<\/li><li><b>Dermatological<\/b><\/li><li><b>Drugs<\/b> (quinidine, colchicine)<\/li><li><b>Topical agents<\/b><\/li><\/ul>"}], "note_html": "<div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td>  <br><b>Haemorrhoids<\/b><\/td><td>Location: 3, 7, 11 o'clock position<br>   Internal or external<br>   Treatment: Conservative, Rubber band ligation, Haemorrhoidectomy<\/td><\/tr><tr><td><b>Fissure in ano<\/b><\/td><td>Location: midline 6 (posterior midline 90%) and 12 o'clock position. Distal to the dentate line<br>   Chronic fissure &gt; 6/52: triad: Ulcer, sentinel pile, enlarged anal papillae<\/td><\/tr><tr><td><b>Proctitis<\/b><\/td><td>Causes: Crohn's, ulcerative colitis, <i><i>Clostridium<\/i> difficile<\/i><\/td><\/tr><tr><td><b>Ano rectal abscess<\/b><\/td><td>E.coli, staph aureus <br>Positions: Perianal, Ischiorectal, Pelvirectal, Intersphincteric<\/td><\/tr><tr><td><b>Anal fistula<\/b><\/td><td>Usually due to previous ano-rectal abscess<br>Intersphincteric, transsphincteric, suprasphincteric, and extrasphincteric. Goodsalls rule determines location<\/td><\/tr><tr><td><b>Rectal prolapse<\/b><\/td><td>Associated with childbirth and rectal intussceception. May be internal or external<\/td><\/tr><tr><td><b>Pruritus ani<\/b><\/td><td>Systemic and local causes<\/td><\/tr><tr><td><b>Anal neoplasm<\/b><\/td><td>Squamous cell carcinoma commonest unlike adenocarcinoma in rectum<\/td><\/tr><tr><td><b>Solitary rectal ulcer<\/b><\/td><td>Associated with chronic straining and constipation. Histology shows mucosal thickening, lamina propria replaced with collagen and smooth muscle (fibromuscular obliteration)<\/td><\/tr><\/tbody><\/table><\/div><br><b>Rectal prolapse<\/b><br><ul><li>Common especially in multiparous women.<\/li><li>May be internal or external.<\/li><li>Internal rectal prolapse can present insidiously.<\/li><li>External prolapse can ulcerate and in long term impair continence.<\/li><li>Diagnostic work up includes colonoscopy, defecating proctogram, ano rectal manometry studies and if doubt exists an examination under anaesthesia.<\/li><\/ul><br><b>Treatments for prolapse<\/b><br><ul><li>In the acute setting reduce it (covering it with sugar may reduce swelling.<\/li><li>Delormes procedure which excises mucosa and plicates the rectum (high recurrence rates) may be used for external prolapse.<\/li><li>Altmeirs procedure which resects the colon via the perineal route has lower recurrence rates but carries the risk of anastamotic leak.<\/li><li>Rectopexy is an abdominal procedure in which the rectum is elevated and usually supported at the level of the sacral promontory. Post operative constipation may be reduced by limiting the dissection to the anterior plane (laparoscopic ventral mesh rectopexy).<\/li><\/ul><br><b>Pruritus ani<\/b><br><ul><li>Extremely common.<\/li><li>Check not secondary to altered bowel habits (e.g. Diarrhoea)<\/li><li>Associated with underlying diseases such as haemorrhoids.<\/li><li>Examine to look for causes such as worms.<\/li><li>Proctosigmoidoscopy to identify associated haemorrhoids and exclude cancer.<\/li><li>Treatment is largely supportive and patients should avoid using perfumed products around the area.<\/li><\/ul><br><b>Fissure in ano<\/b><br><ul><li>Typically painful PR bleeding (bright red).<\/li><li>Nearly always in the posterior midline.<\/li><li>Usually solitary.<\/li><\/ul><br><b>Treatment<\/b><br><ul><li>Stool softeners.<\/li><li>Topical diltiazem (or GTN).<\/li><li>If topical treatments fail then botulinum toxin should be injected.<\/li><li>If botulinum toxin fails then males should probably undergo lateral internal sphincterotomy.<\/li><li>Females who do not respond to botulinum toxin should undergo ano rectal manometry studies and endo anal USS prior to being offered surgery such as sphincterotomy.<\/li><\/ul>"}, {"name": "Appendicitis", "questions": [{"number": 17, "topic": "Appendicitis", "stem_html": "What is the commonest site in the abdomen for fluid to collect following a perforated appendix?", "options": [{"label_html": "Pelvis", "is_correct": true}, {"label_html": "Hepatorenal pouch", "is_correct": false}, {"label_html": "Between small bowel loops", "is_correct": false}, {"label_html": "Right iliac fossa", "is_correct": false}, {"label_html": "Lesser sac", "is_correct": false}], "correct_index": 0, "explanation_html": "Following perforated appendicitis fluid is most likely to accumulate in the pelvis. Fluid may accumulate in the hepatorenal pouch although this is less common. Gravity favors the pelvis as the site of most collections. The incidence of these is higher with laparoscopic rather than open surgery."}, {"number": 18, "topic": "Appendicitis", "stem_html": "A 4 year old girl is admitted with lethargy and abdominal pain. On examination, she is febrile, temperature 38.1<sup>o<\/sup>C, pulse rate is 150 and blood pressure is 100/60. Her abdomen is soft but there is some right sided peritonism. Her WCC is 14 and urinanalysis is positive for leucocytes but is otherwise normal. What is the best course of action?", "options": [{"label_html": "Manage as urinary tract infection with oral antibiotics", "is_correct": false}, {"label_html": "Manage as urinary tract infection with intravenous antibiotics", "is_correct": false}, {"label_html": "Take to theatre for appendicectomy within 6 hours", "is_correct": true}, {"label_html": "Undertake ultrasound scan", "is_correct": false}, {"label_html": "Admit for serial clinical examination", "is_correct": false}], "correct_index": 2, "explanation_html": "Children with appendicitis do not localize in the same way as adults and often the diagnosis is difficult and all too often made late. The findings of right sided peritonism are ominous and the low grade fever and tachycardia and WCC are strongly suggestive of appendicitis. The findings of an isolated leukocytosis are suggestive of appendicitis over UTI. The diagnosis of appendicitis is clinical and undertaking imaging is not going to change management which should comprise appendicectomy, this should be undertaken promptly."}, {"number": 19, "topic": "Appendicitis", "stem_html": "A 63 year old man presents with a 48 hour history of right iliac fossa pain. On examination he has a low grade pyrexia and is tender with some voluntary guarding in the right iliac fossa. Some of his blood tests are reproduced below:<br><div class=\"table-responsive\"><table class=\"tb\"><tbody><tr><td>Hb<\/td><td>81<\/td><\/tr><tr><td>WCC<\/td><td>13.8<\/td><\/tr><tr><td>Platelets<\/td><td>438<\/td><\/tr><tr><td>Albumin<\/td><td>22<\/td><\/tr><tr><td>CRP<\/td><td>24<\/td><\/tr><\/tbody><\/table><\/div>What is the best course of action?", "options": [{"label_html": "Undertake a laparotomy and right hemicolectomy", "is_correct": false}, {"label_html": "Undertake a laparoscopic appendicectomy", "is_correct": false}, {"label_html": "Arrange a CT scan", "is_correct": true}, {"label_html": "Undertake an open appendicectomy", "is_correct": false}, {"label_html": "Arrange a colonoscopy", "is_correct": false}], "correct_index": 2, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">In the UK Hb units are g/L so the value of 81 is how this would typically be expressed. <\/div>This man's investigations point to a more longstanding disease process (Hb and albumin), right sided colonic cancer being the most likely. For this reason a CT scan is a sensible option as it will adjust the surgical planning."}, {"number": 20, "topic": "Appendicitis", "stem_html": "You embark on a laparoscopic appendicectomy and find an inflammatory appendix mass. There is no free fluid and the patient has no evidence of peritonitis. What is the best course of action?", "options": [{"label_html": "Convert to a midline laparotomy and perform a limited right hemicolectomy and end ileostomy", "is_correct": false}, {"label_html": "Convert to midline laparotomy and perform and appendicectomy after taking down the adhesions", "is_correct": false}, {"label_html": "Place a drain laparoscopically and administer parenteral antibiotics", "is_correct": true}, {"label_html": "Send the patient for CT guided drainage", "is_correct": false}, {"label_html": "Wrap omentum around the area and avoid drainage", "is_correct": false}], "correct_index": 2, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Attempt conservative management for appendix mass without peritonitis.<\/div>Dissection of appendix masses can be associated with a considerable degree of morbidity, the gains of formally dissecting them over simple drainage and antibiotics are minimal. <br>This was initially described as the Ochsner-Sherren regime and was based on the teachings of Albert Ochsner of Chicago and James Sherren of the London hospital. The key facts of both methods (which essentially consisted of non surgical management and careful observation) were combined and published by Hamilton Bailey in 1930 (Bailey H. The Oschner- Sherren treatment of acute appendicitis. <i>BMJ<\/i> 1930 Jan 25; 1(3603): 140143.)"}, {"number": 21, "topic": "Appendicitis", "stem_html": "Which of the following is not a typical feature of acute appendicitis?", "options": [{"label_html": "Neutrophilia", "is_correct": false}, {"label_html": "Profuse vomiting", "is_correct": true}, {"label_html": "Anorexia", "is_correct": false}, {"label_html": "Low grade pyrexia", "is_correct": false}, {"label_html": "Small amounts of protein on urine analysis", "is_correct": false}], "correct_index": 1, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Profuse vomiting and diarrhoea are rare in early appendicitis<\/div>Whilst patients may vomit once or twice, profuse vomiting is unusual, and would fit more with gastroenteritis or an ileus.  A trace of protein is not an uncommon occurrence in acute appendicitis. A free lying pelvic appendix may result in localised bladder irritation, with inflammation occurring as a secondary phenomena. This latter feature may result in patients being incorrectly diagnosed as having a urinary tract infection. A urine dipstick test is useful in differentiating between the two conditions."}], "note_html": "<b>History<\/b><br><ul><li>Peri umbilical abdominal pain (visceral stretching of appendix lumen and appendix is mid gut structure) radiating to the right iliac fossa due to localised parietal peritoneal inflammation.<\/li><li>Vomit once or twice but marked and persistent vomiting is unusual.<\/li><li>Diarrhoea is rare. However, pelvic appendicitis may cause localised rectal irritation and some loose stools. A pelvic abscess may also cause diarrhoea.<\/li><li>Mild pyrexia is common - temperature is usually 37.5 -38<sup>o<\/sup>C. Higher temperatures are more typical of conditions like mesenteric adenitis.<\/li><li>Anorexia is very common. It is very unusual for patients with appendicitis to be hungry.<\/li><\/ul><br><b>Examination<\/b><br><ul><li>Generalised peritonitis if perforation has occurred or localised peritonism.    <\/li><li>Retrocaecal appendicitis may have relatively few signs.<\/li><li>Digital rectal examination may reveal boggy sensation if pelvic abscess is present, or even tenderness with a pelvic appendix.<\/li><\/ul><br><b>Diagnosis<\/b><br><ul><li>Typically raised inflammatory markers coupled with compatible history and examination findings should be enough to justify appendicectomy.<\/li><li>Urine analysis may show mild leucocytosis but no nitrites.<\/li><li>Ultrasound is useful in females where pelvic organ pathology is suspected. Although it is not always possible to visualise the appendix on ultrasound, the presence of free fluid (always pathological in males) should raise suspicion.<\/li><\/ul><br><i>Ultrasound examination may show evidence of luminal obstruction and thickening of the appendiceal wall as shown below<\/i><br><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb061b.jpg\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb061.jpg\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Appendicitis\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb061b.jpg\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center><br><b>Treatment<\/b><br><ul><li>Appendicectomy which can be performed via either an open or laparoscopic approach. <\/li><li>Administration of metronidazole reduces wound infection rates.<\/li><li>Patients with perforated appendicitis require copious abdominal lavage.<\/li><li>Patients without peritonitis who have an appendix mass should receive broad spectrum antibiotics and consideration given to performing an interval appendicectomy.<\/li><li>Be wary in the older patients who may have either an underlying caecal malignancy or perforated sigmoid diverticular disease.<\/li><\/ul><br><i>Laparoscopic appendicectomy is becoming increasing popular as demonstrated below<\/i><br><br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb062b.jpg\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb062.jpg\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Appendicitis\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb062b.jpg\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center>"}, {"name": "Benign proctology", "questions": [{"number": 22, "topic": "Benign proctology", "stem_html": "A 30 year old lady presents with painful bright red bleeding that occurs post defecation. Digital rectal examination is too uncomfortable for the patient, perineal inspection shows a prominent posterior skin tag. What is the best course of action?", "options": [{"label_html": "Arrange for removal of the skin tag", "is_correct": false}, {"label_html": "Arrange a haemorrhoidectomy", "is_correct": false}, {"label_html": "Prescribe topical diltiazem", "is_correct": true}, {"label_html": "Injection of 88% aqueous phenol", "is_correct": false}, {"label_html": "Arrange a sphincterotomy", "is_correct": false}], "correct_index": 2, "explanation_html": "The skin tag will be the sentinel pile of a posterior fissure and removal would be unwise. Fissures should be treated medically in the first instance."}, {"number": 23, "topic": "Benign proctology", "stem_html": "A 43 year old male has been troubled with symptoms of post defecation bleeding for many years. On examination, he has large prolapsed haemorroids, colonoscopy shows no other disease. What is the best course of action?", "options": [{"label_html": "Injection with 20% phenol", "is_correct": false}, {"label_html": "Injection with 80% phenol", "is_correct": false}, {"label_html": "Rubber band ligation", "is_correct": false}, {"label_html": "Excisional haemorrhoidectomy", "is_correct": true}, {"label_html": "Haemorrhoidal artery ligation", "is_correct": false}], "correct_index": 3, "explanation_html": "Prolapsed haemorroids are best managed surgically if symptomatic. Note that phenol injections are usually only used for minor internal haemorroids. Where phenol is used, low concentration phenol in oil is the correct agent, the 80% phenolic solution above is used to ablate the nail bed in toe nail surgery! Either way, phenol does not work for haemorrhoidal disease in general."}, {"number": 24, "topic": "Benign proctology", "stem_html": "A 43 year old male has been troubled with symptoms of post defecation bleeding for many years. On examination, he has large prolapsed haemorroids, colonoscopy shows no other disease. What is the best course of action?", "options": [{"label_html": "Injection with 20% phenol", "is_correct": false}, {"label_html": "Injection with 80% phenol", "is_correct": false}, {"label_html": "Rubber band ligation", "is_correct": false}, {"label_html": "Excisional haemorrhoidectomy", "is_correct": true}, {"label_html": "Haemorrhoidal artery ligation", "is_correct": false}], "correct_index": 3, "explanation_html": "Prolapsed haemorroids are best managed surgically if symptomatic. Note that phenol injections are usually only used for minor internal haemorroids. Where phenol is used, low concentration phenol in oil is the correct agent, the 80% phenolic solution above is used to ablate the nail bed in toe nail surgery! Either way, phenol does not work for haemorrhoidal disease in general."}], "note_html": "<div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Condition<\/b><\/td><td><b>Features<\/b><\/td><td><b>Treatment<\/b><\/td><\/tr><tr><td>Fissure in ano<\/td><td>Painful, bright red rectal bleeding<\/td><td>Stool softeners, topical diltiazem or GTN, botulinum toxin, Sphincterotomy<\/td><\/tr><tr><td>Haemorroids<\/td><td>Painless, bright red rectal bleeding occurs following defecation and bleeds onto the toilet paper and into the toilet pan<\/td><td>Stool softeners, avoid straining, surgery (see below)<\/td><\/tr><tr><td>Fistula in ano<\/td><td>May initially present with an abscess and then persisting discharge onto the perineum, separate from the anus<\/td><td>Lay open if low, no sphincter involvement or IBD, if complex, high or IBD insert seton and consider other options (see below)<\/td><\/tr><tr><td>Peri anal abscess<\/td><td>Peri anal swelling and surrounding erythema<\/td><td>Incision and drainage, leave the cavity open to heal by secondary intention<\/td><\/tr><tr><td>Pruritus ani<\/td><td>Peri anal itching, occasional mild bleeding (if severe skin damage)<\/td><td>Avoid scented products, use wet wipes rather than tissue, avoidance of scratching, ensure no underlying faecal incontinence<\/td><\/tr><\/tbody><\/table><\/div><br><b>Overview of surgical therapies<\/b><br><b>Haemorroidal disease<\/b><br>The treatment of haemorroids is usually conservative. Acutely thrombosed haemorroids may be extremely painful. Treatment of this acute condition is usually conservative and consists of stool softeners, ice compressions and topical GTN or diltiazem to reduce sphincter spasm. Most cases managed with this approach will settle over the next 5-7 days. After this period there may be residual skin tags that merit surgical excision or indeed residual haemorroidal disease that may necessitate haemorroidectomy. <br>Patients with more chronic symptoms are managed according to the stage of their disease, small mild internal haemorroids causing little symptoms are best managed conservatively. More marked symptoms of bleeding and occasional prolapse, where the haemorroidal complex is largely internal may benefit from stapled haemorroidopexy. This procedure excises rectal tissue above the dentate line and disrupts the haemorroidal blood supply. At the same time the excisional component of the procedure means that the haemorroids are less prone to prolapse. Adverse effects of this procedure include urgency, which can affect up to 40% of patients (but settles over 6-12 months) and recurrence. The procedure does not address skin tags and therefore this procedure is unsuitable if this is the dominant symptom. <br>Large haemorroids with a substantial external component may be best managed with a Milligan  Morgan style conventional haemorroidectomy. In this procedure three haemorroidal cushions are excised, together with their vascular pedicle. Excision of excessive volumes of tissue may result in anal stenosis. The procedure is quite painful and most surgeons prescribe metronidazole post operatively as it decreases post operative pain.<br><br><b>Fissure in ano<\/b><br>Probably the most efficient and definitive treatment for fissure in ano is lateral internal sphincterotomy. The treatment is permanent and nearly all patients will recover. Up to 30% will develop incontinence to flatus. There are justifiable concerns about using this procedure in females as pregnancy and pelvic floor damage together with a sphincterotomy may result in faecal incontinence. The usual first line therapy is relaxation of the internal sphincter with either GTN or diltiazem (the latter being better tolerated) applied topically for 6 weeks. Treatment failures with topical therapy will usually go on to have treatment with botulinum toxin. This leads to more permanent changes in the sphincter and this may facilitate healing. <br>Typical fissures usually present in the posterior midline, multiple or unusually located fissures should prompt a search for an underlying cause such as inflammatory bowel disease or internal prolapse. <br>Refractory cases where the above treatments have failed may be considered for advancement flaps. <br><br><b>Fistula in ano<\/b><br>The most effective treatment for fistula is laying it open (fistulotomy). When the fistula is below the sphincter and uncomplicated,  this is a reasonable option. Sphincter involvement and complex underlying disease should be assessed both surgically and ideally with imaging (either MRI or endoanal USS). Surgery is then usually staged, in the first instance a draining seton suture may be inserted. This avoids the development of recurrent sepsis and may allow resolution. In patients with Crohns disease the seton should be left in situ long term and the patient managed medically, as in these cases attempts at complex surgical repair nearly always fail. Fistulas not associated with IBD may be managed by advancement flaps, instillation of plugs and glue is generally unsuccessful. A newer technique of ligation of intersphincteric tract (LIFT procedure) is reported to have good results in selected centres."}, {"name": "Colonic obstruction", "questions": [{"number": 25, "topic": "Colonic obstruction", "stem_html": "A 78 year old lady from a nursing home is admitted with a 24 hour history of absolute constipation and abdominal pain. On examination, she has a distended abdomen with a soft mass in her left iliac fossa. An x-ray is performed which shows a large dilated loop of bowel in the left iliac fossa which contains a fluid level. What is the most likely diagnosis?", "options": [{"label_html": "Caecal volvulus", "is_correct": false}, {"label_html": "Sigmoid volvulus", "is_correct": true}, {"label_html": "Incarcerated femoral hernia", "is_correct": false}, {"label_html": "Diverticular stricture", "is_correct": false}, {"label_html": "Malignant colonic stricture", "is_correct": false}], "correct_index": 1, "explanation_html": "Sigmoid volvulus may present with an asymmetrical mass in an elderly patient. It may contain a fluid level, visible on plain films. It's very rare for femoral hernia to cause large bowel obstruction."}, {"number": 26, "topic": "Colonic obstruction", "stem_html": "A 78 year old man has undergone a hemi-arthroplasty for an intracapsular hip fracture. Post operatively he develops electrolyte derangement and receives intravenous fluids. Over the next 24 hours he develops marked abdominal distension. On examination, he has a tense, tympanic abdomen which is not painful. A contrast enema shows flow of contrast through to the caecum and through the ileocaecal valve. What is the most likely cause?", "options": [{"label_html": "Ogilvies syndrome", "is_correct": true}, {"label_html": "Diverticular stricture", "is_correct": false}, {"label_html": "Malignant stricture", "is_correct": false}, {"label_html": "Volvulus", "is_correct": false}, {"label_html": "Adhesive obstruction", "is_correct": false}], "correct_index": 0, "explanation_html": "Patients with electrolyte disturbance and previous surgery may develop colonic pseudo-obstruction (Ogilvies syndrome). The diagnosis is made using a contrast enema and treatment is usually directed at the underlying cause with colonic decompression if indicated."}], "note_html": "<div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Cause<\/b><\/th><th><b>Features<\/b><\/th><th><b>Treatment<\/b><\/th><\/tr><\/thead><tbody><tr><td>Cancer<\/td><td><ul><li>Usually insidious onset <\/li><li>History of progressive constipation<\/li><li>Systemic features (e.g. anaemia)<\/li><li>Abdominal distension <\/li><li>Absence of bowel gas distal to site of obstruction<\/li><\/ul><\/td><td>Establish diagnosis (e.g. contrast enema/ endoscopy)<br>Laparotomy and resection, stenting, defunctioning colostomy or bypass<\/td><\/tr><tr><td>Diverticular stricture<\/td><td><ul><li>Usually history of previous acute diverticulitis<\/li><li>Long history of altered bowel habit<\/li><li>Evidence of diverticulosis on imaging or endoscopy<\/li><\/ul><\/td><td>Once diagnosis established, usually surgical resection<br>Colonic stenting should not be performed for benign disease<\/td><\/tr><tr><td>Volvulus<\/td><td><ul><li>Twisting of bowel around its mesentery<\/li><li>Sigmoid colon affected in 76% cases<\/li><li>Patients usually present with abdominal pain, bloating and constipation<\/li><li>Examination usually shows asymmetrical distension<\/li><li>Plain X-rays usually show massively dilated sigmoid colon, loss of haustra and  U shape are typical, the loop may contain fluid levels<\/li><\/ul><\/td><td>Initial treatment is to untwist the loop, a flexible sigmoidoscopy may be needed<br>Those with clinical evidence of ischaemia should undergo surgery<br>Patient with recurrent volvulus should undergo resection<\/td><\/tr><tr><td>Acute colonic pseudo-obstruction<\/td><td><ul><li>Symptoms and signs of large bowel obstruction with no lesion<\/li><li>Usually associated with metabolic disorders<\/li><li>Usually a cut off in the left colon (82% cases)<\/li><li>Although abdomen tense and distended, it is usually not painful<\/li><li>All patients should undergo contrast enema (may be therapeutic)<\/li><\/ul><\/td><td>Colonoscopic decompression<br>Correct metabolic disorders<br>IV neostigmine<br>Surgery<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Colonic polyps", "questions": [{"number": 27, "topic": "Colonic polyps", "stem_html": "A 55 year old man undergoes a colonoscopy and a colonic polyp is identified. It has a lobular appearance and is located on a stalk in the sigmoid colon. Which of the processes below best accounts for this finding?", "options": [{"label_html": "Apoptosis", "is_correct": false}, {"label_html": "Metaplasia", "is_correct": false}, {"label_html": "Dysplasia", "is_correct": true}, {"label_html": "Calcification", "is_correct": false}, {"label_html": "Degeneration", "is_correct": false}], "correct_index": 2, "explanation_html": "Most colonic polyps described above are adenomas. These may have associated dysplasia. The more high grade the dysplasia the greater the level of clinical concern."}, {"number": 28, "topic": "Colonic polyps", "stem_html": "During a colonoscopy, a patient is found to have a colonic cancer in the caecum and a 1cm polyp (which looks adenomatous) in the sigmoid colon. What is the correct management of the sigmoid polyp?", "options": [{"label_html": "Undertake a snare polypectomy", "is_correct": false}, {"label_html": "Leave in situ until the cancer has been resected", "is_correct": true}, {"label_html": "Perform a hot biopsy", "is_correct": false}, {"label_html": "Perform a cold biopsy", "is_correct": false}, {"label_html": "Resect the sigmoid at the same time as the cancer resection", "is_correct": false}], "correct_index": 1, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Dysplasia and cancer are not the same disease. All colonic adenomas are dysplastic. Adenomas greater than 2cm may harbor foci of malignancy within them. However, many have dysplastic cells only. These do not require segmental resection.<\/div>When a cancer has been identified during endoscopy, it is safest to avoid undertaking polyp interventions as there is a risk of seeding.<br>In summary, do NOT remove polyps until after the cancer has been resected."}, {"number": 29, "topic": "Colonic polyps", "stem_html": "A 60 year old lady is investigated for abdominal pain. A polyp is identified at the proximal descending colon, three small polyps are also noted in the sigmoid colon. The largest lesion is removed by snare polypectomy and the pathology report states that this polyp is a low grade dysplastic adenoma measuring 3cm in diameter. The remaining lesions are ablated using diathermy. What is the correct management?", "options": [{"label_html": "Repeat endoscopy in 1 year", "is_correct": false}, {"label_html": "No further endoscopic surveillance", "is_correct": false}, {"label_html": "Repeat endoscopy in 5 years", "is_correct": false}, {"label_html": "Segmental colonic resection", "is_correct": false}, {"label_html": "Repeat endoscopy in 3 years", "is_correct": true}], "correct_index": 4, "explanation_html": "She is in the high risk group and according to the 2020 guidelines should undergo endoscopy at 3 years."}, {"number": 30, "topic": "Colonic polyps", "stem_html": "A 56 year old lady is investigated with a colonoscopy for a change in bowel habit. However, due to adhesions from a previous hysterectomy, she experiences pain and requests the procedure be terminated. The endoscopist feels that he reached the splenic flexure. What is the best course of action?", "options": [{"label_html": "Discharge the patient", "is_correct": false}, {"label_html": "Arrange an abdominal CT scan", "is_correct": false}, {"label_html": "Arrange a CT colonography", "is_correct": true}, {"label_html": "Arrange a barium enema", "is_correct": false}, {"label_html": "Arrange a gastrograffin enema", "is_correct": false}], "correct_index": 2, "explanation_html": "Failed colonoscopy should be managed with a CT colonography in the first instance (more accurate than barium studies). If the procedure is needed for therapeutic intervention then GA colonoscopy may be needed."}, {"number": 31, "topic": "Colonic polyps", "stem_html": "A 25 year old male presents with altered bowel habit. He is known to have familial polyposis coli. A colonoscopy shows widespread polyps, with high grade dysplasia in a polyp removed from the rectum. What is the best course of action?", "options": [{"label_html": "Undertake a pan proctocolectomy", "is_correct": true}, {"label_html": "Undertake an abdomino perineal resection of the rectum and sigmoid colon", "is_correct": false}, {"label_html": "Undertake a sub total colectomy", "is_correct": false}, {"label_html": "Undertake a left hemicolectomy", "is_correct": false}, {"label_html": "Perform sequential colonoscopic polypectomies until all polyps are resected", "is_correct": false}], "correct_index": 0, "explanation_html": "Since high grade dysplasia has been found in 1 polyp, the correct course of action is to remove the entire colon, rectum and anus. An ileo-anal pouch could be offered should the patient wish. None of the other procedures listed would be acceptable or safe under any circumstances."}, {"number": 32, "topic": "Colonic polyps", "stem_html": "A 53 year old man has a 1cm polyp identified and completely removed during a colonoscopy. Histology confirms a low grade adenoma. What is the correct follow up?", "options": [{"label_html": "Suggest participation in bowel cancer screening but no further routine endoscopy", "is_correct": true}, {"label_html": "Repeat endoscopy in 5 years.", "is_correct": false}, {"label_html": "Repeat endoscopy in 3 years.", "is_correct": false}, {"label_html": "Segmental resection of the affected area.", "is_correct": false}, {"label_html": "Barium enema at 5 years.", "is_correct": false}], "correct_index": 0, "explanation_html": "In the UK, the guidance has now changed and patients like this are managed expectantly with suggestion that they participate in bowel cancer screening programmes."}, {"number": 33, "topic": "Colonic polyps", "stem_html": "As a busy surgical trainee on the colorectal unit you are given the unenviable task of reviewing the unit's histopathology results for colonic polyps. Which of the polyp types described below has the greatest risk of malignant transformation?", "options": [{"label_html": "Hyperplastic polyp", "is_correct": false}, {"label_html": "Tubular adenoma", "is_correct": false}, {"label_html": "Villous adenoma", "is_correct": true}, {"label_html": "Hamartomatous polyp", "is_correct": false}, {"label_html": "Pseudopolyp", "is_correct": false}], "correct_index": 2, "explanation_html": "Villous adenomas carry the highest risk of malignant transformation. Hyperplastic polyps carry little in the way of increased risk. Although, patients with hamartomatous polyp syndromes may have a high risk of malignancy, the polyps themselves have little malignant potential."}], "note_html": "<b>Colonic Polyps<\/b><br>May occur in isolation, or greater numbers as part of the polyposis syndromes. In FAP greater than 100 polyps are typically present. The risk of malignancy in association with adenomas is related to size, and is the order of 10% in a 1cm adenoma. Isolated adenomas seldom give risk of symptoms (unless large and distal). Distally sited villous lesions may produce mucous and if very large, electrolyte disturbances may occur. <br><br><b>Follow up of colonic polyps<\/b><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Group<\/b><\/th><th><b>Action<\/b><\/th><\/tr><\/thead><tbody><tr><td>Colorectal cancer<\/td><td>Colonoscopy 1 year post resection<\/td><\/tr><tr><td>Large non pedunculated colorectal polyps (LNPCP), R0 resection<\/td><td>One off scope at 3 years<\/td><\/tr><tr><td>Large non pedunculated colorectal polyps (LNPCP) R1 or non en bloc resection<\/td><td>Site check at 2-6 months and then a further scope at 12 months<\/td><\/tr><tr><td>High risk findings at baseline colonoscopy<\/td><td>One off surveillance at 3 years<\/td><\/tr><tr><td>No high risk findings at baseline colonoscopy<\/td><td>No colonoscopic surveillance and invite participation in NHSBCSP programme when due<\/td><\/tr><\/tbody><\/table><\/div><br><div class=\"alert alert-warning\"><b>High risk findings<\/b><br><ul><li>More than 2 premalignant polyps including 1 or more advanced colorectal polyps <\/li><\/ul>OR<br><ul><li>More than 5 pre malignant polyps<\/li><\/ul><\/div><br><i>Exceptions to guidelines<\/i><br>If patient more than 10 years younger than lower screening age and has polyps but no high risk findings, consider colonoscopy at 5 or 10 years.<br><br>Segmental resection or complete colectomy should be considered when:<br><br>1. Incomplete excision of malignant polyp<br>2. Malignant sessile polyp<br>3. Malignant pedunculated polyp with submucosal invasion<br>4. Polyps with poorly differentiated carcinoma<br>5. Familial polyposis coli<br>-Screening from teenager up to 40 years by 2 yearly sigmoidoscopy/colonoscopy<br>-Panproctocolectomy and Ileostomy or Restorative Panproctocolectomy.<br><br>Rectal polypoidal lesions may be amenable to trans anal endoscopic microsurgery.<br><br><b>References<\/b><br>Rutter MD <i>et al<\/i>. British Society of Gastroenterology/Association of Coloproctology of Great Britain and Ireland/Public Health England post- polypectomy and post- colorectal cancer resection surveillance guidelines. Gut 2019;0:123."}, {"name": "Colonic pseudo-obstruction", "questions": [{"number": 34, "topic": "Colonic pseudo-obstruction", "stem_html": "A 55 year old man develops an acute colonic pseudo-obstruction following a laminectomy. Despite correction of his electrolytes and ongoing supportive care he fails to settle. Which of the drugs listed below may improve the situation?", "options": [{"label_html": "Buscopan", "is_correct": false}, {"label_html": "Neostigmine", "is_correct": true}, {"label_html": "Metoclopramide", "is_correct": false}, {"label_html": "Mebevrine", "is_correct": false}, {"label_html": "Sodium picosulphate", "is_correct": false}], "correct_index": 1, "explanation_html": "Neostigmine affects the degradation of acetylcholine and will therefore stimulate both nicotinic and muscarinic receptors. It may produce symptomatic bradycardia and should therefore only be administered in a monitored environment. In colonic pseudo-obstruction it produces generalised colonic contractions and its onset is usually rapid."}], "note_html": "Colonic pseudo-obstruction is characterised by the progressive and painless dilation of the colon. The abdomen may become grossly distended and tympanic. Unless a complication such as impending bowel necrosis or perforation occurs, there is usually little pain.<br>Diagnosis involves excluding a mechanical bowel obstruction with a plain film and contrast enema. The underlying cause is usually electrolyte imbalance and the condition will resolve with correction of this and supportive care. <br>Patients who do not respond to supportive measures should be treated with attempted colonoscopic decompression and/ or the drug neostigmine. In rare cases surgery may be required."}, {"name": "Colorectal cancer", "questions": [{"number": 35, "topic": "Colorectal cancer", "stem_html": "What is the commonest tumour type encountered in the colon?", "options": [{"label_html": "Squamous cell carcinoma", "is_correct": false}, {"label_html": "Adenocarcinoma", "is_correct": true}, {"label_html": "Lymphoma", "is_correct": false}, {"label_html": "Anaplastic carcinoma", "is_correct": false}, {"label_html": "Sarcoma", "is_correct": false}], "correct_index": 1, "explanation_html": "Adenocarcinoma are the most common and typically arise as a result of the adenoma - carcinoma sequence."}, {"number": 36, "topic": "Colorectal cancer", "stem_html": "What is the commonest tumour type encountered in the colon?", "options": [{"label_html": "Squamous cell carcinoma", "is_correct": false}, {"label_html": "Adenocarcinoma", "is_correct": true}, {"label_html": "Lymphoma", "is_correct": false}, {"label_html": "Anaplastic carcinoma", "is_correct": false}, {"label_html": "Sarcoma", "is_correct": false}], "correct_index": 1, "explanation_html": "Adenocarcinoma are the most common and typically arise as a result of the adenoma - carcinoma sequence."}, {"number": 37, "topic": "Colorectal cancer", "stem_html": "A 62 year old man has previously undergone a left hemicolectomy for carcinoma of the descending colon. On follow up imaging he is found to have two deposits of metastatic disease located in the right lobe of his liver. What is the best treatment strategy?", "options": [{"label_html": "Chemotherapy alone", "is_correct": false}, {"label_html": "Chemotherapy followed by surgical resection", "is_correct": true}, {"label_html": "Radiofrequency ablation", "is_correct": false}, {"label_html": "Chemoradiotherapy", "is_correct": false}, {"label_html": "Palliation", "is_correct": false}], "correct_index": 1, "explanation_html": "Liver metastasis from colorectal cancer are still potentially curable. Without resection, survival at 5 years is around 5%. With resection, this figure rises to around 20%. The best outcomes are seen where chemotherapy is given, followed by resection. Radiofrequency ablation is an option for those patients who lack the physiological reserve for surgery. However, there is a higher longer term recurrence rates with all the non resectional strategies. There is no role for radiotherapy."}, {"number": 38, "topic": "Colorectal cancer", "stem_html": "Which of the following genes is not implicated in the adenoma-carcinoma sequence in colorectal cancer?", "options": [{"label_html": "IGF1 gene", "is_correct": true}, {"label_html": "c-myc", "is_correct": false}, {"label_html": "APC", "is_correct": false}, {"label_html": "p53", "is_correct": false}, {"label_html": "K-ras", "is_correct": false}], "correct_index": 0, "explanation_html": "IGF1 gene mutation is implicated in some HNPCC tumours but not in the adenoma- carcinoma sequence.<br><br>Other genes involved are:<br><br>MCC<br>DCC<br>
