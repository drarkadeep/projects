<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Urology</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f1e8;
      --bg-accent: #ebe4d4;
      --surface: rgba(255, 252, 246, 0.92);
      --surface-strong: #fffdf7;
      --border: #d9cfbd;
      --text: #23313a;
      --text-soft: #5f6c73;
      --accent: #496a58;
      --accent-strong: #2f5341;
      --correct-bg: #e0f3e6;
      --correct-border: #77b487;
      --wrong-bg: #fbe0df;
      --wrong-border: #dc7a73;
      --note-bg: #f3eee2;
      --shadow: 0 18px 40px rgba(76, 59, 37, 0.08);
      --radius-lg: 22px;
      --radius-md: 16px;
      --radius-sm: 12px;
      --page-width: 960px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: "Avenir Next", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.72), transparent 32%),
        linear-gradient(180deg, #f8f4eb 0%, #f3ede0 100%);
      line-height: 1.65;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.14), transparent 18%, transparent 82%, rgba(255, 255, 255, 0.14)),
        repeating-linear-gradient(
          180deg,
          rgba(73, 106, 88, 0.015) 0,
          rgba(73, 106, 88, 0.015) 1px,
          transparent 1px,
          transparent 18px
        );
    }

    a {
      color: var(--accent-strong);
    }

    img {
      max-width: 100%;
      height: auto;
      border-radius: 14px;
    }

    .score-badge,
    .badge.rounded-pill.bg-danger {
      display: none !important;
    }

    .page {
      width: min(100% - 24px, var(--page-width));
      margin: 0 auto;
      padding: 18px 0 48px;
    }

    .topbar {
      margin-bottom: 18px;
      padding: 18px;
      background: rgba(255, 252, 246, 0.9);
      border: 1px solid rgba(217, 207, 189, 0.86);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .topbar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .eyebrow {
      margin: 0 0 4px;
      font-size: 0.76rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-soft);
    }

    .title {
      margin: 0;
      font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
      font-size: clamp(1.5rem, 2vw + 1rem, 2.35rem);
      line-height: 1.08;
      font-weight: 700;
    }

    .meta {
      margin: 8px 0 0;
      color: var(--text-soft);
      font-size: 0.96rem;
    }

    .mode-switch {
      display: inline-flex;
      padding: 6px;
      border-radius: 999px;
      background: var(--bg-accent);
      border: 1px solid var(--border);
      gap: 6px;
      flex-shrink: 0;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
      flex-wrap: wrap;
    }

    .topic-actions {
      display: inline-flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .utility-button {
      appearance: none;
      border: 1px solid var(--border);
      background: var(--surface-strong);
      color: var(--text);
      font: inherit;
      font-weight: 700;
      border-radius: 999px;
      padding: 10px 14px;
      cursor: pointer;
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .utility-button:hover {
      transform: translateY(-1px);
      border-color: #c7bba9;
      box-shadow: 0 8px 18px rgba(70, 54, 34, 0.07);
    }

    .utility-button:focus-visible {
      outline: 3px solid rgba(73, 106, 88, 0.22);
      outline-offset: 2px;
    }

    .mode-button {
      appearance: none;
      border: 0;
      background: transparent;
      color: var(--text-soft);
      font: inherit;
      font-weight: 700;
      border-radius: 999px;
      padding: 10px 16px;
      min-width: 92px;
      cursor: pointer;
      transition: transform 0.18s ease, background 0.18s ease, color 0.18s ease, box-shadow 0.18s ease;
    }

    .mode-button:hover {
      transform: translateY(-1px);
      color: var(--text);
    }

    .mode-button.active {
      background: var(--surface-strong);
      color: var(--accent-strong);
      box-shadow: 0 8px 18px rgba(73, 106, 88, 0.14);
    }

    .topic-list {
      display: grid;
      gap: 18px;
    }

    .topic {
      background: rgba(255, 252, 246, 0.78);
      border: 1px solid rgba(217, 207, 189, 0.9);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .topic[open] {
      background: rgba(255, 252, 246, 0.9);
    }

    .topic > summary {
      list-style: none;
      cursor: pointer;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      user-select: none;
    }

    .topic > summary::-webkit-details-marker {
      display: none;
    }

    .topic-title {
      margin: 0;
      font-size: 1.08rem;
      font-weight: 800;
      letter-spacing: 0.01em;
    }

    .topic-meta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--text-soft);
      font-size: 0.94rem;
    }

    .chevron {
      display: inline-block;
      transition: transform 0.2s ease;
      color: var(--accent);
      font-weight: 700;
    }

    .topic[open] > summary .chevron {
      transform: rotate(90deg);
    }

    .topic-notes {
      background: rgba(243, 238, 226, 0.62);
      border: 1px solid #e3d9c8;
      border-radius: var(--radius-md);
      overflow: hidden;
    }

    .topic-notes > summary {
      list-style: none;
      cursor: pointer;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      user-select: none;
    }

    .topic-notes > summary::-webkit-details-marker {
      display: none;
    }

    .topic-notes-title {
      font-size: 0.95rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-soft);
    }

    .topic-notes[open] > summary .chevron {
      transform: rotate(90deg);
    }

    .topic-notes-body {
      padding: 0 16px 16px;
      color: var(--text);
    }

    .topic-body {
      padding: 0 16px 16px;
      display: grid;
      gap: 14px;
    }

    .question-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 18px;
      box-shadow: 0 10px 24px rgba(70, 54, 34, 0.05);
    }

    .question-label {
      margin: 0 0 10px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-soft);
      font-size: 0.88rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 800;
    }

    .stem {
      font-size: 1rem;
    }

    .stem > *:first-child,
    .explanation > *:first-child {
      margin-top: 0;
    }

    .stem > *:last-child,
    .explanation > *:last-child {
      margin-bottom: 0;
    }

    .options {
      margin-top: 16px;
      display: grid;
      gap: 10px;
    }

    .option {
      width: 100%;
      text-align: left;
      border: 1px solid #d8d0c2;
      background: #fffdf8;
      color: var(--text);
      border-radius: var(--radius-sm);
      padding: 14px 15px;
      font: inherit;
      line-height: 1.45;
      cursor: pointer;
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
    }

    .option:hover {
      transform: translateY(-1px);
      border-color: #c7bba9;
      box-shadow: 0 8px 18px rgba(70, 54, 34, 0.07);
    }

    .option:focus-visible {
      outline: 3px solid rgba(73, 106, 88, 0.22);
      outline-offset: 2px;
    }

    .option.correct {
      background: var(--correct-bg);
      border-color: var(--correct-border);
      box-shadow: inset 0 0 0 1px rgba(119, 180, 135, 0.2);
    }

    .option.incorrect {
      background: var(--wrong-bg);
      border-color: var(--wrong-border);
      box-shadow: inset 0 0 0 1px rgba(220, 122, 115, 0.2);
    }

    .option.neutral-revealed {
      background: #faf6ee;
      border-color: #d8d0c2;
      color: #5f676a;
    }

    .option[disabled] {
      cursor: default;
      opacity: 1;
    }

    .explanation {
      margin-top: 14px;
      padding: 14px 16px;
      background: var(--note-bg);
      border: 1px solid #e3d9c8;
      border-radius: 14px;
      color: var(--text);
    }

    .question-card.is-hidden .explanation {
      display: none;
    }

    .explanation-label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-soft);
      font-weight: 800;
    }

    .empty-state {
      padding: 28px 22px;
      background: var(--surface);
      border: 1px dashed var(--border);
      border-radius: var(--radius-lg);
      color: var(--text-soft);
    }

    .rich-text table {
      width: 100%;
      border-collapse: collapse;
      margin: 12px 0;
      overflow: hidden;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.68);
    }

    .rich-text td,
    .rich-text th {
      border: 1px solid #ddd2bf;
      padding: 10px 12px;
      vertical-align: top;
    }

    .rich-text ul,
    .rich-text ol {
      padding-left: 20px;
      margin: 10px 0;
    }

    .rich-text center {
      display: block;
      text-align: center;
    }

    .rich-text .table-responsive {
      overflow-x: auto;
    }

    @media (max-width: 720px) {
      .page {
        width: min(100% - 16px, var(--page-width));
        padding-top: 10px;
      }

      .topbar {
        padding: 14px;
        border-radius: 18px;
      }

      .topbar-inner {
        flex-direction: column;
        align-items: stretch;
      }

      .controls {
        justify-content: stretch;
      }

      .topic-actions {
        width: 100%;
      }

      .utility-button {
        flex: 1 1 0;
      }

      .mode-switch {
        width: 100%;
        justify-content: stretch;
      }

      .mode-button {
        flex: 1 1 50%;
      }

      .topic > summary {
        padding: 16px;
        align-items: flex-start;
      }

      .topic-meta {
        font-size: 0.88rem;
      }

      .topic-body {
        padding: 0 12px 12px;
      }

      .question-card {
        padding: 15px;
      }

      .option {
        padding: 13px 14px;
      }
    }
  </style>
</head>

  <script id="quiz-data" type="application/json">{"title": "Urology", "topics": [{"name": "Adrenal lesions- Incidental", "questions": [{"number": 1, "topic": "Adrenal lesions- Incidental", "stem_html": "A 56 year old man is diagnosed with an abdominal aortic aneurysm and undergoes a CT scan to assess the size of the aorta. During the course of his investigations a lesion of the adrenal gland is identified. It measures 1.5 cm in diameter and the gland is otherwise normal. What is the most likely diagnosis?", "options": [{"label_html": "Adrenal gland metastasis", "is_correct": false}, {"label_html": "Adrenal gland arterio-venous malformation", "is_correct": false}, {"label_html": "Adrenal cyst", "is_correct": false}, {"label_html": "Phaeochromocytoma", "is_correct": false}, {"label_html": "Adrenal cortical adenoma", "is_correct": true}], "correct_index": 4, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">25% of all adrenal lesions &gt;4cm in diameter are malignant<\/div>Incidentalomas of the adrenal gland are common and represent the most likely lesion in this scenario. Clearly the other lesions are all possibilities but are unlikely."}, {"number": 2, "topic": "Adrenal lesions- Incidental", "stem_html": "A 56 year old man is investigated with an abdominal CT scan for a change of bowel habit towards constipation. It shows no colonic lesions. However, a right sided adrenal lesion is noted and measures 2.5cm in diameter. What is the most appropriate course of action?", "options": [{"label_html": "Arrange an MRI of the adrenal gland", "is_correct": false}, {"label_html": "Arrange an adrenal USS", "is_correct": false}, {"label_html": "Arrange an image guided core biopsy", "is_correct": false}, {"label_html": "Undertake an adrenalectomy", "is_correct": false}, {"label_html": "Arrange a hormonal assay", "is_correct": true}], "correct_index": 4, "explanation_html": "The vast majority of small adrenal lesions are incidental, benign and non functioning adenomas. Apart from minimal workup, no further investigation is needed. Of note, if there are concerns about malignancy, the only surgical option is adrenalectomy."}], "note_html": "Incidentaloma of the adrenal glands have become increasingly common as CT scanning of the abdomen is widely undertaken. Prevalences range from 1.5-9% in autopsy studies. Overall, 75% will be non functioning adenomas.  Investigation to exclude a functioning lesion is as below:<br><br><b>Investigation<\/b><br><ul><li>Morning and midnight plasma cortisol measurements<\/li><li>Dexamethasone suppression test<\/li><li>24 hour urinary cortisol excretion<\/li><li>24 hour urinary excretion of catecholamines<\/li><li>Serum potassium, aldosterone and renin levels<\/li><\/ul><br><b>Management<\/b><br>The risk of malignancy is related to the size of the lesion and 25% of all masses greater than 4cm will be malignant. Such lesions should usually be excised. Where a lesion is a suspected metastatic deposit a biopsy may be considered."}, {"name": "Benign prostatic disease", "questions": [{"number": 3, "topic": "Benign prostatic disease", "stem_html": "A 67 year old man presents with recurrent episodes of haematuria, typically at the end of the urinary stream, he has been suffering from occasional fevers and has noticed pus on the urethral meatus on occasion. On examination the prostate has no discernable masses but is tender. What is the most likely cause?", "options": [{"label_html": "Prostatitis", "is_correct": true}, {"label_html": "Cystitis", "is_correct": false}, {"label_html": "BPH", "is_correct": false}, {"label_html": "Prostate cancer", "is_correct": false}, {"label_html": "Nephritis", "is_correct": false}], "correct_index": 0, "explanation_html": "This is most likely prostatitis and the bleeding at the end of micturition suggests a distal problem. Treatment is usually with prolonged courses of antibiotics."}, {"number": 4, "topic": "Benign prostatic disease", "stem_html": "A 78 year old man has a long history of nocturia, urinary frequency and terminal dribbling. He was admitted with urinary retention and was catheterised. On removal of the catheter he has noticed some haematuria. What is the most likely cause?", "options": [{"label_html": "Transitional cell carcinoma of the bladder", "is_correct": false}, {"label_html": "Squamous cell carcinoma of the bladder", "is_correct": false}, {"label_html": "Polycystic kidney disease", "is_correct": false}, {"label_html": "Renal cell carcinoma", "is_correct": false}, {"label_html": "Benign prostatic hyperplasia", "is_correct": true}], "correct_index": 4, "explanation_html": "The symptoms are typical for prostatic disease."}], "note_html": "BPH is increasingly common with advancing age and is present in 50% over the age of 60 and nearly 90% of men by the age of 90. It occurs as a result of hyperplasia of the periurethral glands in the transitional zone of the prostate. Androgens play a role in the development and progression of BPH. Testosterone diffuses into prostatic and stromal cells. Within epithelial cells it binds to the androgen receptor. In prostatic stromal cells, a small proportion binds directly to the androgen receptor, the majority binds to the 5 alpha reductase type II receptor on the nuclear membrane. This is converted to dihyroxytestosterone and then binds to the androgen receptor. Dihydroxytestosterone has even greater affinity for the androgen receptor than testosterone does. The end result is stimulation of these cells and proliferation. <br>This proliferative activity results in varying degrees of obstruction and results in lower urinary tract obstructive symptoms. The clinical diagnosis of BPH thus comprise a degree of lower urinary tract symptoms, palpable prostatic enlargement and evidence of impaired voiding on urodynamic assessment. <br><br><b>Presentation<\/b><br>Some patients have minimal symptoms, yet, on examination, have a palpable bladder and obstructive post renal failure. LUTS can be divided into two main groups; obstructive symptoms with voiding that include hesitancy, poor stream, straining, prolonged micturition and dribbling; others develop irritation symptoms which include pain during bladder filling, frequency, urgency and nocturia. Some present with retention and haematuria. <br><br><b>Diagnosis<\/b><br>Abdominal and rectal examination <br>Symptoms scoring <br>Urodynamic studies ( a post void volume of &gt;100ml is significant)<br><br><b>Management<\/b><br>Conservative<br>Alpha adrenergic antagonists. These block the action of noradrenaline on prostatic smooth muscle causing relaxation and improved bladder emptying.<br>5 alpha reductase inhibitors. Finasteride blocks the enzyme 5 alpha reductase which inhibits the conversion of testosterone to DHT. This in turn reduces intracellular activity and decreases prostatic  volume<br>Surgery- TURP is the gold standard. Occasionally, an open retropubic prostatectomy may be considered for a large gland."}, {"name": "Benign Prostatic Hyperplasia", "questions": [{"number": 5, "topic": "Benign Prostatic Hyperplasia", "stem_html": "A 72 year old man presents with lower urinary tract symptoms. On digital rectal examination, benign prostatic hyperplasia is suspected. Which of the following treatments is associated with a reduction in the risk of urinary retention?", "options": [{"label_html": "Alfuzosin", "is_correct": false}, {"label_html": "Finasteride", "is_correct": true}, {"label_html": "Prazosin", "is_correct": false}, {"label_html": "Tamsulosin", "is_correct": false}, {"label_html": "Terazosin", "is_correct": false}], "correct_index": 1, "explanation_html": "5 alpha reductase inhibitors reduce the risk of urinary retention.<br>In the PLESS study, data show a reduction in the risk of urinary retention although the absolute risk reduction was small.<br>Finasteride is a medication used to treat benign prostatic hyperplasia (BPH) by reducing the size of the prostate gland. It works by inhibiting the conversion of testosterone to dihydrotestosterone (DHT), which is a hormone that contributes to the growth of the prostate gland. Alfuzosin, tamsulosin, and terazosin are medications that belong to a class of drugs called alpha-blockers. These medications work by relaxing the smooth muscle in the prostate gland and bladder neck, which can improve urine flow and decrease urinary symptoms. While alpha-blockers are effective in improving urinary symptoms associated with BPH, they do not reduce the size of the prostate gland and are not associated with a reduction in the risk of urinary retention. Prazosin is an alpha-blocker that is used to treat high blood pressure and post-traumatic stress disorder (PTSD). It is not typically used to treat urinary symptoms associated with BPH<br><b>Reference<\/b><br>McConnell J <i>et al<\/i>. The effect of finasteride on the risk of urinary retention and the need for surgical intervention amongst men with benign prostatic hyperplasia. <i> N Engl J Med<\/i> <b>338<\/b>:557-563"}, {"number": 6, "topic": "Benign Prostatic Hyperplasia", "stem_html": "A 65 year old man presents with significant lower urinary tract symptoms and is diagnosed as having benign prostatic hyperplasia. Which of the following drug treatments will produce the slowest clinical response?", "options": [{"label_html": "Tamsulosin", "is_correct": false}, {"label_html": "Alfuzosin", "is_correct": false}, {"label_html": "Doxazosin", "is_correct": false}, {"label_html": "Finasteride", "is_correct": true}, {"label_html": "Terazosin", "is_correct": false}], "correct_index": 3, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">5 alpha reductase inhibitors have a more favorable side effect profile than α blockers.<\/div>Alpha blockers have a faster onset of action (but lower reduction of complications from BPH) than 5 α reductase inhibitors."}, {"number": 7, "topic": "Benign Prostatic Hyperplasia", "stem_html": "A 72 year old man presents with symptoms and signs of benign prostatic hyperplasia. Which of the following structures is most likely to be enlarged?", "options": [{"label_html": "Posterior lobe of the prostate", "is_correct": false}, {"label_html": "Median lobe of the prostate", "is_correct": true}, {"label_html": "Right lateral lobe of the prostate", "is_correct": false}, {"label_html": "Left lateral lobe of the prostate", "is_correct": false}, {"label_html": "Anterior lobe of the prostate", "is_correct": false}], "correct_index": 1, "explanation_html": "Carcinoma of the prostate typically occurs in the posterior lobe. The median lobe is usually enlarged in BPH. The anterior lobe has little in the way of glandular tissue and is seldom enlarged."}], "note_html": "Benign prostatic hyperplasia occurs via an increase in the epithelial and stromal cell numbers in the peri-urethral zone of the prostate.  BPH is very common and 90% of men aged over 80 will have at least microscopic evidence of benign prostatic hyperplasia. The causes of BPH  are still not well understood, but the importance of androgens remains appreciated even if the exact role by which they induce BPH is elusive. <br><br><b>Presentation<\/b><br>The vast majority of men will present with lower urinary tract symptoms. These will typically be:<br><br><ul><li>Poor flow<\/li><li>Nocturia<\/li><li>Hesitancy<\/li><li>Incomplete and double voiding<\/li><li>Terminal dribbling<\/li><li>Urgency<\/li><li>Incontinence<\/li><\/ul><br><b>Investigation<\/b><br><ul><li>Digital rectal examination to assess prostatic size and morphology.<\/li><li>Urine dipstick for infections and haematuria.<\/li><li>Uroflowmetry (a flow rate of &gt;15ml/second helps to exclude BOO)<\/li><li>Bladder pressure studies may help identify detrusor failure and whilst may not form part of first line investigations should be included in those with atypical symptoms and prior to redo surgery. <\/li><li>Bladder scanning to demonstrate residual volumes.  USS if high pressure chronic retention.<\/li><\/ul><br><b>Management<\/b><br><ul><li>Lifestyle changes such as stopping smoking and altering fluid intake may help those with mild symptoms. <\/li><li>Medical therapy includes alpha blockers and 5 α reductase inhibitors. The former work quickly on receptor zones located at the bladder neck. Cardiovascular side effects are well documented. The latter work on testosterone metabolising enzymes. Although they have a slower onset of action, the 5 α reductase inhibitors may prevent acute urinary retention. <\/li><li>Surgical therapy includes transurethral resection of the prostate and is the treatment of choice in those with severe symptoms and those who fail to respond to medical therapy. More tailored bladder neck incision procedures may be considered in those with small prostates. Retrograde ejaculation may occur following surgery. The change in the type of irrigation solutions used has helped to minimise the TURP syndrome of electrolyte disturbances.<\/li><\/ul>"}, {"name": "Functional renal imaging", "questions": [{"number": 8, "topic": "Functional renal imaging", "stem_html": "What is the most useful test for a 5 year old who has vesicoureteric reflux in whom there are concerns about the potential of renal scarring?", "options": [{"label_html": "Intravenous urogram", "is_correct": false}, {"label_html": "Renal CT scan", "is_correct": false}, {"label_html": "DMSA scan", "is_correct": true}, {"label_html": "Micturating cystourethrogram", "is_correct": false}, {"label_html": "Retrograde ureterogram", "is_correct": false}], "correct_index": 2, "explanation_html": "Although MAG 3 renograms may provide some information relating to the structural integrity of the kidney, many still consider a DMSA scan to be the gold standard for the detection of renal scarring (which is the main concern in PUJ obstruction and infections)."}, {"number": 9, "topic": "Functional renal imaging", "stem_html": "A 43 year old female has undergone a renal transplant 12 months previously. Over the past few weeks there have been concerns about deteriorating renal function. What is the most useful investigation?", "options": [{"label_html": "MAG 3 renogram", "is_correct": true}, {"label_html": "DMSA scan", "is_correct": false}, {"label_html": "Intravenous KUB urogram", "is_correct": false}, {"label_html": "Renal CT scan", "is_correct": false}, {"label_html": "Micturating cystourethrogram", "is_correct": false}], "correct_index": 0, "explanation_html": "Because it is excreted by renal tubular cells a MAG 3 renogram provides excellent imaging of renal function and is often used in investigating failing transplants."}, {"number": 10, "topic": "Functional renal imaging", "stem_html": "A 17 year old man is referred to the urology clinic. As a child he was diagnosed as having a right sided PUJ obstruction. However, he was lost to follow up. Over the past 7 months he has been complaining of recurrent episodes of right loin pain. A CT scan shows considerable renal scarring. What is the most useful investigation?", "options": [{"label_html": "DMSA scan", "is_correct": false}, {"label_html": "MAG 3 renogram", "is_correct": true}, {"label_html": "CT scan of the kidney", "is_correct": false}, {"label_html": "CT KUB", "is_correct": false}, {"label_html": "Renal USS", "is_correct": false}], "correct_index": 1, "explanation_html": "In patients with long standing PUJ obstruction and renal scarring the main diagnostic question is whether the individual has sufficient renal function to consider a pyeloplasty or whether a primary nephrectomy is preferable. Since the CT has demonstrated scarring there is no use in obtaining a DMSA scan. Of the investigations listed both a DMSA and MAG 3 renogram will allow assessment of renal function. However, MAG 3 is superior in the assessment of renal function in damaged kidneys (as it is subjected to tubular secretion)."}], "note_html": "<b>DMSA scan<\/b><br>Dimercaptosuccinic acid (DMSA) scintigraphy<br>DMSA localises to the renal cortex with little accumulation in the renal papilla and medulla. It is useful for the identification of cortical defects and ectopic or aberrant kidneys. It does not provide useful information on the ureter of collecting system.<br><br><b>Diethylene-triamine-penta-acetic acid (DTPA)<\/b><br>This is primarily a glomerular filtration agent. It is most useful for the assessment of renal function. Because it is filtered at the level of the glomerulus it provides useful information about the GFR. Image quality may be degraded in patients with chronic renal impairment and derangement of GFR.<br><br><b>MAG 3 renogram<\/b><br>Mercaptoacetyle triglycine is an is extensively protein bound and is primarily secreted by tubular cells rather than filtered at the glomerulus. This makes it the agent of choice for imaging the kidneys of patients with existing renal impairment (where GFR is impaired). <br><br><b>Micturating cystourethrogram (MCUG scan)<\/b><br>This scan provides information relating to bladder reflux and is obtained by filling the bladder with contrast media (via a catheter) and asking the child to void. Images are taken during this phase and the degree of reflux can be calculated<br><br><b>Intra venous urography<\/b><br>This examination is conducted by the administration of intravenous iodinated contrast media. The agent is filtered by the kidneys and excreted and may provide evidence of renal stones or other structural lesions. A rough approximation of renal function may be obtained using the technique. But it is not primarily a technique to be used for this purpose. With the advent of widespread non contrast CT scan protocols for the detection of urinary tract calculi it is now rarely used.<br><br><b>PET/CT<\/b><br>This may be used to evaluate structurally indeterminate lesions in the staging of malignancy. <br><br><b>References<\/b><br>Davis A <i> et al<\/i>. Investigating urinary tract infections in children. <i>BMJ<\/i> 2013 (346):35-37."}, {"name": "Haematuria", "questions": [{"number": 11, "topic": "Haematuria", "stem_html": "A 50 year old male presents with painless frank haematuria. Clinical examination is unremarkable. Routine blood tests reveal a haemoglobin of 18g/dl but are otherwise normal. What is the most likely underlying diagnosis?", "options": [{"label_html": "Squamous cell carcinoma of the bladder", "is_correct": false}, {"label_html": "Adenocarcinoma of the prostate", "is_correct": false}, {"label_html": "Adenocarcinoma of the kidney", "is_correct": true}, {"label_html": "Wilms tumour", "is_correct": false}, {"label_html": "Transitional cell carcinoma of the renal pelvis", "is_correct": false}], "correct_index": 2, "explanation_html": "Polycythaemia is a recognised feature of renal cell carcinoma. Wilms tumours most commonly occur in children."}, {"number": 12, "topic": "Haematuria", "stem_html": "A 4 year old boy presents with haematuria and on examination is found to have a right sided renal mass. What is the most likely cause?", "options": [{"label_html": "Wilms tumour", "is_correct": true}, {"label_html": "Glomerulonephritis", "is_correct": false}, {"label_html": "Horseshoe kidney", "is_correct": false}, {"label_html": "Renal adenocarcinoma", "is_correct": false}, {"label_html": "Ureteric transitional cell carcinoma", "is_correct": false}], "correct_index": 0, "explanation_html": "Wilms tumours (nephroblastoma) usually present in the first 4 years of life and may cause lung metastases."}, {"number": 13, "topic": "Haematuria", "stem_html": "A 4 year old boy presents with haematuria and on examination is found to have a right sided renal mass. What is the most likely cause?", "options": [{"label_html": "Wilms tumour", "is_correct": true}, {"label_html": "Glomerulonephritis", "is_correct": false}, {"label_html": "Horseshoe kidney", "is_correct": false}, {"label_html": "Renal adenocarcinoma", "is_correct": false}, {"label_html": "Ureteric transitional cell carcinoma", "is_correct": false}], "correct_index": 0, "explanation_html": "Wilms tumours (nephroblastoma) usually present in the first 4 years of life and may cause lung metastases."}, {"number": 14, "topic": "Haematuria", "stem_html": "A 4 year old boy presents with haematuria and on examination is found to have a right sided renal mass. What is the most likely cause?", "options": [{"label_html": "Wilms tumour", "is_correct": true}, {"label_html": "Glomerulonephritis", "is_correct": false}, {"label_html": "Horseshoe kidney", "is_correct": false}, {"label_html": "Renal adenocarcinoma", "is_correct": false}, {"label_html": "Ureteric transitional cell carcinoma", "is_correct": false}], "correct_index": 0, "explanation_html": "Wilms tumours (nephroblastoma) usually present in the first 4 years of life and may cause lung metastases."}, {"number": 15, "topic": "Haematuria", "stem_html": "A 32 year old lady suffers from severe left sided abdominal pain, that radiates to her groin. As part of her evaluation the nurses identify microscopic haematuria on dipstick. What is the explanation?", "options": [{"label_html": "Staghorn calculus", "is_correct": false}, {"label_html": "Ureteric calculus", "is_correct": true}, {"label_html": "Transitional cell carcinoma of the ureter", "is_correct": false}, {"label_html": "Adenocarcinoma of the ureter", "is_correct": false}, {"label_html": "Cystitis", "is_correct": false}], "correct_index": 1, "explanation_html": "Ureteric calculi will often present with loin pain radiating to the groin. It is usually severe. There may be macroscopic or microscopic haematuria. The absence of haematuria on dipstick testing should prompt investigations for alternative diagnoses. The best investigation is a non contrast CT scan. CT changes consistent with stone or recent stone passage include evidence of stone, perinephric stranding, ureteric oedema or hydronephrosis."}, {"number": 16, "topic": "Haematuria", "stem_html": "Why is a 73 year old lady receiving a course of intravesical BCG therapy?", "options": [{"label_html": "Bladder tuberculosis", "is_correct": false}, {"label_html": "Transitional cell carcinoma of the bladder", "is_correct": true}, {"label_html": "Adenocarcinoma of the bladder", "is_correct": false}, {"label_html": "Squamous cell carcinoma of the bladder", "is_correct": false}, {"label_html": "Rhabdomyosarcoma of the bladder", "is_correct": false}], "correct_index": 1, "explanation_html": "Transitional cell carcinoma of the bladder may be treated with intravesical BCG therapy."}, {"number": 17, "topic": "Haematuria", "stem_html": "A 58 year old man has an episode of painless frank haematuria whilst undergoing a 24 urine collection for investigation of hypertension. What is the most likely cause?", "options": [{"label_html": "Renal adenocarcinoma", "is_correct": true}, {"label_html": "Neuroblastoma", "is_correct": false}, {"label_html": "Transitional cell carcinoma of the ureter", "is_correct": false}, {"label_html": "Squamous cell carcinoma of the bladder", "is_correct": false}, {"label_html": "Phaeochromocytoma", "is_correct": false}], "correct_index": 0, "explanation_html": "These tumours may often have paraneoplastic effects such as hypertension."}, {"number": 18, "topic": "Haematuria", "stem_html": "A 40 year old woman is being investigated for haematuria. She was living with her sister who has just died from a sub arachnoid haemorrhage. The haematuria is painless and she has mild renal impairment. What is the most likely cause?", "options": [{"label_html": "Adenocarcinoma of the bladder", "is_correct": false}, {"label_html": "Bladder stones", "is_correct": false}, {"label_html": "Polycystic kidney disease", "is_correct": true}, {"label_html": "Renal cancer", "is_correct": false}, {"label_html": "Pyelonephritis", "is_correct": false}], "correct_index": 2, "explanation_html": "This is likely to be polycystic kidney disease as she has renal failure and family history of sub arachnoid haemorrhage."}, {"number": 19, "topic": "Haematuria", "stem_html": "A 22 year old woman presents with macroscopic haematuria. She is sexually active. She is known to have renal calculi and had a berry aneurysm clipped. What is the most likely cause?", "options": [{"label_html": "Interstitial nephritis", "is_correct": false}, {"label_html": "Membranous glomerulonephritis", "is_correct": false}, {"label_html": "Renal vein thrombosis", "is_correct": false}, {"label_html": "Endometriosis", "is_correct": false}, {"label_html": "Adult polycystic kidney disease", "is_correct": true}], "correct_index": 4, "explanation_html": "APKD is associated with liver cysts (70%), berry aneurysms (25%) and pancreatic cysts (10%). Patients may have a renal mass, hypertension, renal calculi and macroscopic haematuria."}, {"number": 20, "topic": "Haematuria", "stem_html": "A 22 year female who is 24 weeks pregnant presents with brisk frank haematuria. She is sexually active. She has had a previous pregnancy resulting in caesarean section. What is the most likely cause?", "options": [{"label_html": "Renal vein thrombosis", "is_correct": false}, {"label_html": "Placenta percreta", "is_correct": true}, {"label_html": "Placenta praevia", "is_correct": false}, {"label_html": "Membranous glomerulonephritis", "is_correct": false}, {"label_html": "Endometriosis", "is_correct": false}], "correct_index": 1, "explanation_html": "Pregnancy and frank haematuria, especially if there is a history of placenta previa or prior caesarean section, should indicate this diagnosis. There is invasive placental implantation into the myometrium, which can rarely extend into the bladder causing severe bleeding."}, {"number": 21, "topic": "Haematuria", "stem_html": "Which of the following does not cause red urine?", "options": [{"label_html": "Rifampicin", "is_correct": false}, {"label_html": "Phosphaturia", "is_correct": true}, {"label_html": "Beetroot", "is_correct": false}, {"label_html": "Rhubarb", "is_correct": false}, {"label_html": "Blackberries", "is_correct": false}], "correct_index": 1, "explanation_html": "Phosphaturia causes cloudy urine."}, {"number": 22, "topic": "Haematuria", "stem_html": "Which of the following drugs does not cause pseudohaematuria?", "options": [{"label_html": "Rifampicin", "is_correct": false}, {"label_html": "Quinine", "is_correct": false}, {"label_html": "Noradrenaline", "is_correct": true}, {"label_html": "Levodopa", "is_correct": false}, {"label_html": "Phenytoin", "is_correct": false}], "correct_index": 2, "explanation_html": "Rifampicin, phenytoin, levodopa, methyldopa, and quinine all cause pseudohaematuria."}, {"number": 23, "topic": "Haematuria", "stem_html": "From the list below, which drug is known to cause haemorrhagic cystitis?", "options": [{"label_html": "Rifampicin", "is_correct": false}, {"label_html": "Methotrexate", "is_correct": false}, {"label_html": "Dexamethasone", "is_correct": false}, {"label_html": "Leflunomide", "is_correct": false}, {"label_html": "Cyclophosphamide", "is_correct": true}], "correct_index": 4, "explanation_html": "Cyclophosphamide is metabolised into a toxic metabolite acrolein. The effects may be attenuated by administration of large volumes of intravenous fluids and mesna (which neutralises the metabolite). The condition may be managed initially by bladder catheterisation and irrigation."}, {"number": 24, "topic": "Haematuria", "stem_html": "From the list below, which drug is known to cause haemorrhagic cystitis?", "options": [{"label_html": "Rifampicin", "is_correct": false}, {"label_html": "Methotrexate", "is_correct": false}, {"label_html": "Dexamethasone", "is_correct": false}, {"label_html": "Leflunomide", "is_correct": false}, {"label_html": "Cyclophosphamide", "is_correct": true}], "correct_index": 4, "explanation_html": "Cyclophosphamide is metabolised into a toxic metabolite acrolein. The effects may be attenuated by administration of large volumes of intravenous fluids and mesna (which neutralises the metabolite). The condition may be managed initially by bladder catheterisation and irrigation."}], "note_html": "<b>Causes of haematuria<\/b><br><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Trauma<\/b><\/td><td><ul><li>Injury to renal tract<\/li><li>Renal trauma commonly due to blunt injury (others penetrating injuries)<\/li><li>Ureter trauma rare: iatrogenic<\/li><li>Bladder trauma: due to RTA or pelvic fractures<\/li><\/ul><\/td><\/tr><tr><td><b>Infection<\/b><\/td><td><ul><li>Remember TB<\/li><\/ul><\/td><\/tr><tr><td><b>Malignancy<\/b><\/td><td><ul><li>Renal cell carcinoma (remember paraneoplastic syndromes): painful or painless<\/li><li>Urothelial malignancies: 90% are transitional cell carcinoma, can occur anywhere along the urinary tract. Painless haematuria.<\/li><li>Squamous cell carcinoma and adenocarcinoma: rare bladder tumours<\/li><li>Prostate cancer<\/li><li>Penile cancers: SCC<\/li><\/ul><\/td><\/tr><tr><td><b>Renal disease<\/b><\/td><td><ul><li>Glomerulonephritis<\/li><\/ul><\/td><\/tr><tr><td><b>Stones<\/b><\/td><td><ul><li>Microscopic haematuria common<\/li><\/ul><\/td><\/tr><tr><td><b>Structural abnormalities<\/b><\/td><td><ul><li>Benign prostatic hyperplasia (BPH) causes haematuria due to hypervascularity of the prostate gland<\/li><li>Cystic renal lesions e.g. polycystic kidney disease<\/li><li>Vascular malformations<\/li><li>Renal vein thrombosis due to renal cell carcinoma<\/li><\/ul><\/td><\/tr><tr><td><b>Coagulopathy<\/b><\/td><td><ul><li>Causes bleeding of underlying lesions<\/li><\/ul><\/td><\/tr><tr><td><b>Drugs<\/b><\/td><td><ul><li>Cause tubular necrosis or interstitial nephritis: aminoglycosides, chemotherapy<\/li><li>Interstitial nephritis: penicillin, sulphonamides, and NSAIDs<\/li><li>Anticoagulants<\/li><\/ul><\/td><\/tr><tr><td><b>Benign<\/b><\/td><td><ul><li>Exercise<\/li><\/ul><\/td><\/tr><tr><td><b>Gynaecological<\/b><\/td><td><ul><li>Endometriosis: flank pain, dysuria, and haematuria that is cyclical<\/li><\/ul><\/td><\/tr><tr><td><b>Iatrogenic<\/b><\/td><td><ul><li>Catheterisation<\/li><li>Radiotherapy; cystitis, severe haemorrhage, bladder necrosis<\/li><\/ul><\/td><\/tr><tr><td><b>Pseudohaematuria<\/b><\/td><td>For example following consumption of beetroot<\/td><\/tr><\/tbody><\/table><\/div><br><b>References<\/b><br>Http://bestpractice.bmj.com/best-practice/monograph/316/overview/aetiology.html"}, {"name": "Hydronephrosis", "questions": [{"number": 25, "topic": "Hydronephrosis", "stem_html": "A 52 year old male with hypercalcaemia secondary to primary hyperparathyroidism presents with renal colic. USS demonstrates ureteric obstruction due to a stone. Multiple attempts at stone extraction are performed. However, the stone could not be removed. He is now septic with a pyrexia of 39.5 <sup>o<\/sup>c and he has been given antibiotics. What is the best course of action?", "options": [{"label_html": "Cystoscopy and insertion of ureteric stent", "is_correct": false}, {"label_html": "Laparotomy and ureteric exploration", "is_correct": false}, {"label_html": "Insertion of nephrostomy", "is_correct": true}, {"label_html": "Laparoscopic ureteric exploration", "is_correct": false}, {"label_html": "Lithotripsy", "is_correct": false}], "correct_index": 2, "explanation_html": "The likely scenario is that this man has developed a calculus causing ureteric obstruction. The stagnant column of urine can become colonised and infected. An infected obstructed system is one of the few true urological emergencies. A nephrostomy is needed as the stone could not be removed."}, {"number": 26, "topic": "Hydronephrosis", "stem_html": "A 68 year old man has a TCC of the bladder. He has a right hydronephrosis detected on ultrasound and deteriorating renal function. A DMSA scan shows a non functioning left kidney. At cystoscopy the ureteric orifice cannot be readily accessed. What is the best course of action?", "options": [{"label_html": "Insertion of antegrade ureteric stent", "is_correct": true}, {"label_html": "Insertion of retrograde ureteric stent", "is_correct": false}, {"label_html": "Cystectomy and ileal conduit", "is_correct": false}, {"label_html": "Radiotherapy", "is_correct": false}, {"label_html": "Instillation of intravesical BCG", "is_correct": false}], "correct_index": 0, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Antegrade ureteric stents pass from the kidney to the bladder<br>Retrograde stents pass from the bladder to the kidney<\/div>A TCC occluding the ureteric orifice will obscure its identification during surgery, so that passage of a retrograde stent is difficult. Therefore passage of a stent from the renal pelvis is preferable."}], "note_html": "<b>Causes of hydronephrosis<\/b><br><br>Unilateral: <b>PACT<\/b><br><ul><li><b>P<\/b>elvic-ureteric obstruction (congenital or acquired)<\/li><li><b>A<\/b>berrant renal vessels<\/li><li><b>C<\/b>alculi<\/li><li><b>T<\/b>umours of renal pelvis<\/li><\/ul><br>Bilateral: <b>SUPER<\/b><br><ul><li><b>S<\/b>tenosis of the urethra<\/li><li><b>U<\/b>rethral valve<\/li><li><b>P<\/b>rostatic enlargement<\/li><li><b>E<\/b>xtensive bladder tumour<\/li><li><b>R<\/b>etro-peritoneal fibrosis<\/li><\/ul><br><b>Investigation<\/b><br><ul><li>USS- identifies presence of hydronephrosis and can assess the kidneys<\/li><li>IVU- assess the position of the obstruction<\/li><li>Antegrade or retrograde pyelography- allows treatment<\/li><li>If renal colic suspected: non contrast CT scan (majority of stones are detected this way)<\/li><\/ul><br><b>Management<\/b><br><ul><li>Remove the obstruction and drainage of urine<\/li><li>Acute upper urinary tract obstruction: Nephrostomy tube<\/li><li>Chronic upper urinary tract obstruction: Ureteric stent or a pyeloplasty<\/li><\/ul>"}, {"name": "Lower genitourinary tract trauma", "questions": [{"number": 27, "topic": "Lower genitourinary tract trauma", "stem_html": "A 52 year old man falls off his bike. He is found to have a pelvic fracture. On examination, he is found to have perineal oedema and on PR the prostate is not palpable. What is the most likely underlying problem?", "options": [{"label_html": "Bulbar urethral rupture", "is_correct": false}, {"label_html": "Bladder outflow obstruction", "is_correct": false}, {"label_html": "Bladder rupture", "is_correct": false}, {"label_html": "Bladder contusion", "is_correct": false}, {"label_html": "Membranous urethral rupture", "is_correct": true}], "correct_index": 4, "explanation_html": "A pelvic fracture and highly displaced prostate should indicate a diagnosis of membranous urethral rupture."}, {"number": 28, "topic": "Lower genitourinary tract trauma", "stem_html": "A 56 year old man is involved in a road traffic accident. He is found to have a pelvic fracture. He reports that he has some lower abdominal pain. He has peritonism in the lower abdomen. The nursing staff report that he has not passed any urine. A CT scan shows evidence of free fluid. What is the most likely diagnosis?", "options": [{"label_html": "Membranous urethral injury", "is_correct": false}, {"label_html": "Bladder rupture", "is_correct": true}, {"label_html": "Bladder contusion", "is_correct": false}, {"label_html": "Bulbar urethral injury", "is_correct": false}, {"label_html": "Urinary tract infection", "is_correct": false}], "correct_index": 1, "explanation_html": "A pelvic fracture and lower abdominal peritonism should raise suspicions of bladder rupture (especially as this man cannot pass urine)."}, {"number": 29, "topic": "Lower genitourinary tract trauma", "stem_html": "A 22 year old man is involved in a road traffic accident.  He is found to have a pelvic fracture. While on the ward the nursing staff report that he is complaining of lower abdominal pain.  On examination, you find a distended tender bladder. What is the most likely diagnosis?", "options": [{"label_html": "Bladder rupture", "is_correct": false}, {"label_html": "Ureter injury", "is_correct": false}, {"label_html": "Urethral injury", "is_correct": true}, {"label_html": "Clot retention", "is_correct": false}, {"label_html": "Prostate rupture", "is_correct": false}], "correct_index": 2, "explanation_html": "Pelvic fractures may cause laceration of the urethra. Urinary retention, blood at the urethral meatus and a high riding prostate on digital rectal examination are the typical features."}, {"number": 30, "topic": "Lower genitourinary tract trauma", "stem_html": "A 22 year old man is involved in a road traffic accident.  He is found to have a pelvic fracture. While on the ward the nursing staff report that he is complaining of lower abdominal pain.  On examination, you find a distended tender bladder and blood at the urethral meatus. What is the best management?", "options": [{"label_html": "10 Ch foley urethral catheter", "is_correct": false}, {"label_html": "Suprapubic catheter", "is_correct": true}, {"label_html": "16 Ch foley urethral catheter", "is_correct": false}, {"label_html": "18 Ch coude tip urethral catheter", "is_correct": false}, {"label_html": "Pain relief and review in 1 hour", "is_correct": false}], "correct_index": 1, "explanation_html": "This patient has possible urethral injury based on the history.  Urethral catheterisation is contraindicated in this situation."}, {"number": 31, "topic": "Lower genitourinary tract trauma", "stem_html": "A 24 year old man falls and lands astride a manhole cover. He suffers from an injury to the anterior bulbar urethra. Where will the extravasated urine tend to collect?", "options": [{"label_html": "Lesser pelvis", "is_correct": false}, {"label_html": "Connective tissue of the scrotum", "is_correct": true}, {"label_html": "Deep perineal space", "is_correct": false}, {"label_html": "Ischiorectal fossa", "is_correct": false}, {"label_html": "Posterior abdominal wall", "is_correct": false}], "correct_index": 1, "explanation_html": "This portion of the urethra is contained between the perineal membrane and the membranous layer of the superficial fascia. As these are densely adherent to the ischiopubic rami, extravasated urine cannot pass posteriorly because the 2 layers are continuous around the superficial transverse perineal muscles."}], "note_html": "<ul><li>Most bladder injuries occur due to blunt trauma<\/li><li>85% associated with pelvic fractures<\/li><li>Easily overlooked during assessment in trauma<\/li><li>Up to 10% of male pelvic fractures are associated with urethral or bladder injuries<\/li><\/ul><br><b>Types of injury<\/b><br><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Urethral injury<\/b><\/td><td><ul><li>Mainly in males<\/li><li>Blood at the meatus (50% cases)<\/li><li>There are 2 types:<\/li><\/ul>i.Bulbar rupture<br>- most common<br>- straddle type injury e.g. bicycles<br>- triad signs: urinary retention, perineal haematoma, blood at the meatus<br>ii. Membranous rupture<br>- can be extra or intraperitoneal<br>- commonly due to pelvic fracture<br>- Penile or perineal oedema/ hematoma <br>- PR: prostate displaced upwards (beware co-existing retroperitoneal haematomas as they may make examination difficult)<br><br>- Investigation: ascending urethrogram<br>- Management: suprapubic catheter (surgical placement, not percutaneously)<\/td><\/tr><tr><td><b>External genitalia injuries (i.e., the penis and the scrotum)<\/b><\/td><td><ul><li>Secondary to injuries caused by penetration, blunt trauma, continence- or sexual pleasure-enhancing devices, and mutilation<\/li><\/ul><\/td><\/tr><tr><td><b>Bladder injury<\/b><\/td><td><ul><li>rupture is intra or extraperitoneal<\/li><li>presents with haematuria or suprapubic pain<\/li><li>history of pelvic fracture and inability to void: always suspect bladder or urethral injury<\/li><li>inability to retrieve all fluid used to irrigate the bladder through a Foley catheter indicates bladder injury<\/li><li>investigation- IVU or cystogram<\/li><li>management: laparotomy if intraperitoneal, conservative if extraperitoneal<\/li><\/ul><\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Management of renal stones", "questions": [{"number": 32, "topic": "Management of renal stones", "stem_html": "A 23 year old man presents with severe loin to groin pain. Imaging demonstrates a 2mm left sided calculus in the distal ureter, renal function is normal. What is the most appropriate course of action?", "options": [{"label_html": "Arrange for ureteroscopy and stone extraction", "is_correct": false}, {"label_html": "Arrange for open ureterotomy and stone extraction", "is_correct": false}, {"label_html": "Arrange for a percutaneous nephrolithotomy", "is_correct": false}, {"label_html": "Arrange for extracorporeal shock wave lithotripsy", "is_correct": false}, {"label_html": "Arrange to review the patient in 2 weeks with a KUB x-ray", "is_correct": true}], "correct_index": 4, "explanation_html": "<b>Rate of stone passage<\/b><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th>Stone size<\/th><th>Chances of stone passage<\/th><\/tr><\/thead><tbody><tr><td>1mm<\/td><td>85%<\/td><\/tr><tr><td>2-4mm<\/td><td>75%<\/td><\/tr><tr><td>5-7mm<\/td><td>60%<\/td><\/tr><\/tbody><\/table><\/div>Distally sited stones are more likely to pass spontaneously than proximally sited ones."}, {"number": 33, "topic": "Management of renal stones", "stem_html": "A 25 year old man is admitted with left sided loin pain that radiates to his groin. His investigations demonstrate a 9mm left sided calculus within the proximal ureter. His renal function is normal. What is the most appropriate course of action?", "options": [{"label_html": "Arrange a percutaneous nephrolithotomy", "is_correct": false}, {"label_html": "Arrange extra corporeal shock wave lithotripsy", "is_correct": true}, {"label_html": "Review the patient in 4 weeks with KUB x-ray on arrival", "is_correct": false}, {"label_html": "Arrange for ureteroscopy and stent insertion", "is_correct": false}, {"label_html": "Arrange for open ureteric stone extraction", "is_correct": false}], "correct_index": 1, "explanation_html": "For ureteric stones with a maximum diameter of less than 10mm the first-line treatment is extracorporeal shock wave lithotripsy (ESWL). If ESWL fails or if the stone is impacted in the upper ureter then ureteroscopy can be performed."}, {"number": 34, "topic": "Management of renal stones", "stem_html": "A 55 year old man has multiple stones within the renal pelvis, including one measuring 25mm in diameter. What is the most appropriate course of action?", "options": [{"label_html": "Arrange a nephrectomy", "is_correct": false}, {"label_html": "Arrange a percutaneous nephrolithotomy", "is_correct": true}, {"label_html": "Arrange for lithotripsy", "is_correct": false}, {"label_html": "Conservative management", "is_correct": false}, {"label_html": "Arrange for ureteroscopy and stone extraction", "is_correct": false}], "correct_index": 1, "explanation_html": "The intervention of choice for renal pelvis stones greater than 20mm is PCNL. This stone is highly unlikely to pass spontaneously and ureteroscopy for a stone of this size would be extremely time-consuming."}, {"number": 35, "topic": "Management of renal stones", "stem_html": "A 55 year old man has multiple stones within the renal pelvis, including one measuring 25mm in diameter. What is the most appropriate course of action?", "options": [{"label_html": "Arrange a nephrectomy", "is_correct": false}, {"label_html": "Arrange a percutaneous nephrolithotomy", "is_correct": true}, {"label_html": "Arrange for lithotripsy", "is_correct": false}, {"label_html": "Conservative management", "is_correct": false}, {"label_html": "Arrange for ureteroscopy and stone extraction", "is_correct": false}], "correct_index": 1, "explanation_html": "The intervention of choice for renal pelvis stones greater than 20mm is PCNL. This stone is highly unlikely to pass spontaneously and ureteroscopy for a stone of this size would be extremely time-consuming."}], "note_html": "Urolithiasis will affect up to 15% of the worldwide population. The development of sudden onset loin to groin pain which is colicky in nature is a classic feature in the history. It is nearly always associated with haematuria that is either visible or non-visible but detectable on urine dipstick testing. Where the diagnosis is suspected the most sensitive and specific investigation is helical, non-contrast, computerised tomographic (CT) scanning.<br><br><b>Management<\/b><br>Most renal stones measuring less than 5mm in maximum diameter will typically pass within 4 weeks of symptom onset(1)(2). More urgent treatment is indicated in the presence of ureteric obstruction, renal developmental abnormalities such as horseshoe kidney and previous renal transplant. Ureteric obstruction together with infection is a surgical emergency and the system must be decompressed. Options include nephrostomy tube placement or ureteric stent placement via cystoscopy. <br><br>In the non-emergency setting the preferred options for treatment of stone disease include extracorporeal shock wave lithotripsy (ESWL), percutaneous nephrolithotomy (PCNL) and ureteroscopy (URS). These minimally invasive options are the most popular first line treatments. Open surgery remains an option in a few selected cases.<br><br><b>Extracorporeal shock wave lithotripsy<\/b><br>A shock wave is generated external to the patient. Internally, cavitation bubbles and mechanical stress lead to stone fragmentation. The passage of shock waves can occasionally result in the development of solid organ injury. Fragmentation of larger stones may result in the development of ureteric obstruction. The procedure can be uncomfortable for patients and analgesia is often required during the procedure and afterwards. ESWL is contra-indicated in pregnant females and patients with significant vascular calcification. <br><br><b>Ureteroscopy<\/b><br>A ureteroscope is passed retrograde via the urethra and bladder, into the ureter and renal pelvis. Laser or pneumatic fragmentation (lithoclasty) is performed using the ureteroscope and stone fragments are extracted(3). In some cases a stent is left in situ after the procedure. <br><br><b>Percutaneous nephrolithotomy<\/b><br>In this procedure percutaneous access is gained to the renal collecting system. Once access is achieved, endoscopic intra-corporeal lithotripsy, lithoclasty or laser stone fragmentation is performed and stone fragments removed.<br><br><br><b>Therapeutic selection<\/b><br><br><b>Renal stones<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Size<\/b><\/td><td><b>First line option<\/b><\/td><\/tr><tr><td>Less than 5mm and asymptomatic<\/td><td>Watchful waiting<\/td><\/tr><tr><td>Less than 10mm<\/td><td>ESWL<\/td><\/tr><tr><td>10  20mm<\/td><td>ESWL or ureteroscopy<\/td><\/tr><tr><td>Greater than 20mm (including staghorn calculi)<\/td><td>PCNL<\/td><\/tr><\/tbody><\/table><\/div><br><b>Ureteric stones<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Size<\/b><\/td><td><b>First line option<\/b><\/td><\/tr><tr><td>Less than 5mm<\/td><td>Watchful waiting<\/td><\/tr><tr><td>5-10mm<\/td><td>ESWL (if upper ureter)<\/td><\/tr><tr><td>10-20mm<\/td><td>Ureteroscopy<\/td><\/tr><\/tbody><\/table><\/div><br><b>Reference<\/b><br>1. \tBultitude M, Rees J. Management of renal colic. BMJ. 2012;345(7872):18. <br>2. \tShah TT, Gao C, Peters M, Manning T, Cashman S, Nambiar A, et al. Factors associated with spontaneous stone passage in a contemporary cohort of patients presenting with acute ureteric colic: results from the Multi-centre cohort study evaluating the role of Inflammatory Markers In patients presenting with acute ureteric . BJU Int. 2019 Apr.<br>3. \tBAUS. Ureteroscopy (Telescopic surgery for stone removal) (Internet). BAUS patient information leaflet. 2017 (cited 2019 Jun 27). p. 16. Available from: https://www.baus.org.uk/userfiles/pages/files/Patients/Leaflets/Ureteroscopy for stone.pdf<br>4. \tBAUS. Percutaneous nephrolithotomy (keyhole surgery for kidney stones). BAUS patient information leaflet. 2017. p. 16. Available from: https://www.baus.org.uk/userfiles/pages/files/Patients/Leaflets/PCNL.pdf<br>5. \tNICE. Renal and ureteric stones: assessment and management. NICE Guide[NG118]. 2019;(January):112."}, {"name": "Paediatric urology- foreskin disorders", "questions": [{"number": 36, "topic": "Paediatric urology- foreskin disorders", "stem_html": "A 6 year old child develops ballooning of the foreskin on micturition and is brought to the clinic by his anxious mother. On examination, the foreskin is non retractile but otherwise normal. By which age are 95% of all foreskins retractile", "options": [{"label_html": "2 years", "is_correct": false}, {"label_html": "16 years", "is_correct": true}, {"label_html": "8 years", "is_correct": false}, {"label_html": "5 years", "is_correct": false}, {"label_html": "10 years", "is_correct": false}], "correct_index": 1, "explanation_html": "By 16 years of age almost all foreskins should be retractile and if they are not circumcision should be considered at around this time."}], "note_html": "<b>Disorders of the foreskin<\/b><br>At birth and in the neonatal period the normal foreskin is non retractile due to the presence of adhesions between the foreskin and glans. In most cases these will separate spontaneously. By the end of puberty 95% of foreskins can be retracted. In some children the non-retractile foreskin may balloon during micturition. This is a normal variant and requires no specific treatment. <br><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Balanitis<\/b><\/td><td>This is inflammation of the glans penis. It may occur in both circumcised and non-circumcised individuals.<\/td><\/tr><tr><td><b>Posthitis<\/b><\/td><td>This is inflammation of the foreskin. It may occur as a result of infections such as gonorrhoea and other STD's. It may also complicate diabetes. Posthitis may progress to phimosis and as this may make cleaning of the glans difficult and allow progression to balanoposthitis.<\/td><\/tr><tr><td><b>Paraphimosis<\/b><\/td><td>Prolonged retraction of the foreskin proximal to the glans may allow oedema to occur. This may then make foreskin manipulation difficult. It can usually be managed by compression to reduce the oedema and replacement of the foreskin. Where this fails a dorsal slit may be required and this followed by delayed circumcision.<\/td><\/tr><tr><td><b>Phimosis<\/b><\/td><td>This is inability to retract the foreskin and may be partial or complete. It may occur secondary to balanoposthitis or balanitis xerotica obliterans. Depending upon the severity and symptoms treatment with circumcision may be required.<\/td><\/tr><tr><td><b>Balanitis xerotica obliterans<\/b><\/td><td>This is a dermatological condition in which scarring of the foreskin occurs leading to phimosis. It is rare below the age of 5 years. Treatment is usually with circumcision.<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Penile erection", "questions": [{"number": 37, "topic": "Penile erection", "stem_html": "A 49 year old man undergoes a low anterior resection for cancer. He is assessed in the outpatient clinic post operatively. His wounds are well healed. However, he complains of impotence. Which of the following best explains this problem?", "options": [{"label_html": "Sciatic nerve injury", "is_correct": false}, {"label_html": "Damage to the internal iliac artery", "is_correct": false}, {"label_html": "Damage to the nervi erigentes", "is_correct": true}, {"label_html": "Damage to the vas", "is_correct": false}, {"label_html": "Damage to the genitofemoral nerve", "is_correct": false}], "correct_index": 2, "explanation_html": "The penis takes autonomic nerves from the nervi erigentes that lie near the seminal vesicles. These may be compromised by direct surgical trauma (such as use of diathermy in this area) and also by radiotherapy that is used in these patients pre operatively. The result is that up to 50% of patients may develop impotence following rectal cancer surgery."}, {"number": 38, "topic": "Penile erection", "stem_html": "A 43 year old presents to the urology clinic complaining of impotence. Which of the following will occur in response to increased penile parasympathetic stimulation?", "options": [{"label_html": "Detumescence", "is_correct": false}, {"label_html": "Ejaculation", "is_correct": false}, {"label_html": "Erection", "is_correct": true}, {"label_html": "Vasospasm of the penile branches of the pudendal artery", "is_correct": false}, {"label_html": "Contraction of the smooth muscle in the epididymis and vas deferens", "is_correct": false}], "correct_index": 2, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\"><b>Memory aid for erection<\/b><br>p=parasympathetic=points <br>s=sympathetic=shoots<\/div>Parasympathetic stimulation causes erection. Sympathetic stimulation will produce ejaculation, detumescence and vasospasm of the pudendal artery. It will also cause contraction of the smooth muscle in the epididymis and vas to convey the ejaculate."}], "note_html": "<b>Physiology of erection<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Autonomic<\/b><\/td><td><ul><li>Sympathetic nerves originate from T11-L2 and parasympathetic nerves from S2-4 join to form pelvic plexus. <\/li><li>Parasympathetic discharge causes erection, sympathetic discharge causes ejaculation and detumescence.<\/li><\/ul><\/td><\/tr><tr><td><b>Somatic nerves<\/b><\/td><td>Supplied by dorsal penile and pudendal nerves. Efferent signals are relayed from Onufs nucleus (S2-4) to innervate ischiocavernosus and bulbocavernosus muscles.<\/td><\/tr><\/tbody><\/table><\/div><br>Autonomic discharge to the penis will trigger the veno-occlusive mechanism which triggers the flow of arterial blood into the penile sinusoidal spaces. As the inflow increases the increased volume in this space will secondarily lead to compression of the subtunical venous plexus with reduced venous return. During the detumesence phase the arteriolar constriction will reduce arterial inflow and thereby allow venous return to normalise.<br><br><b>Priapism<\/b><br>Prolonged unwanted erection, in the absence of sexual desire, lasting more than 4 hours.<br><br><b>Classification of priapism<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Low flow priapism<\/b><\/td><td>Due to veno-occlusion (high intracavernosal pressures). <br><ul><li>Most common type<\/li><li>Often painful<\/li><li>Often low cavernosal flow<\/li><li>If present for &gt;4 hours requires emergency treatment<\/li><\/ul><\/td><\/tr><tr><td><b>High flow priapism<\/b><\/td><td>Due to unregulated arterial blood flow.<br><ul><li>Usually presents as semi rigid painless erection<\/li><\/ul><\/td><\/tr><tr><td><b>Recurrent priapism<\/b><\/td><td>Typically seen in sickle cell disease, most commonly of high flow type.<\/td><\/tr><\/tbody><\/table><\/div><br><b>Causes<\/b><br><ul><li>Intracavernosal drug therapies (e.g. for erectile dysfunction&gt;<\/li><li>Blood disorders such as leukaemia and sickle cell disease<\/li><li>Neurogenic disorders such as spinal cord transection<\/li><li>Trauma to penis resulting in arterio-venous malformations<\/li><\/ul><br><b>Tests<\/b><br><ul><li>Exclude sickle cell/ leukaemia<\/li><li>Consider blood sampling from cavernosa to determine whether high or low flow (low flow is often hypoxic)<\/li><\/ul><br><b>Management<\/b><br><ul><li>Ice packs/ cold showers<\/li><li>If due to low flow then blood may be aspirated from copora or try intracavernosal alpha adrenergic agonists.<\/li><li>Delayed therapy of low flow priapism may result in erectile dysfunction.<\/li><\/ul>"}, {"name": "Penile fracture", "questions": [{"number": 39, "topic": "Penile fracture", "stem_html": "A 22 year old man is participating in vigorous intercourse and suddenly feels a snap and his penis becomes swollen and painful. The admitting surgeon suspects a penile fracture. Which of the following is the most appropriate initial management?", "options": [{"label_html": "MRI scan of the penis", "is_correct": false}, {"label_html": "Immediate surgical exploration", "is_correct": true}, {"label_html": "CT scan of the penis", "is_correct": false}, {"label_html": "USS of the penis", "is_correct": false}, {"label_html": "Cystogram", "is_correct": false}], "correct_index": 1, "explanation_html": "Suspected penile fractures should be surgically explored and the injury repaired."}], "note_html": "Penile fractures are a rare type of urological trauma that may be encountered. The injury is usually in the proximal part of the penile shaft and may involve the urethra. A classically history of a snapping sensation followed by immediate pain is usually given by the patient (usually during vigorous intercourse). On examination there is usually a tense haematoma and blood may be seen at the meatus if the urethra is injured. <br>When there is a a strong suspicion of the diagnosis the correct management is surgical and a circumferential incision made immediately inferior to the glans. The skin and superficial tissues are stripped back and the penile shaft inspected. Injuries are usually sutured and the urethra repaired over a catheter."}, {"name": "Prostate Cancer", "questions": [{"number": 40, "topic": "Prostate Cancer", "stem_html": "A 73 year old man has previously undergone a prostatectomy to treat prostate cancer. On review, his PSA has risen to 55 and he has developed pain in his lower back. Imaging shows osteosclerotic lesions in L4 and L3. What is the best treatment strategy?", "options": [{"label_html": "Posterior spinal fusion", "is_correct": false}, {"label_html": "Vertebral body reconstruction", "is_correct": false}, {"label_html": "Bisphosphonates and radiotherapy", "is_correct": false}, {"label_html": "Androgen suppression, bisphosphonates and radiotherapy", "is_correct": true}, {"label_html": "Radiotherapy alone", "is_correct": false}], "correct_index": 3, "explanation_html": "In men with metastatic bone lesions from prostate cancer, the best outcomes are achieved with androgen suppression. Radiotherapy can also produced marked palliation. A 2010 Cochrane review has clearly demonstrated added benefit, in terms of symptom control, from the addition of a bisphosphonate."}, {"number": 41, "topic": "Prostate Cancer", "stem_html": "A 49 year old man presents with a single episode of haematuria. Investigations demonstrate adenocarcinoma of the prostate gland. Imaging shows T2 disease and no evidence of metastasis. What is the best treatment option?", "options": [{"label_html": "Chemotherapy alone", "is_correct": false}, {"label_html": "Radical prostatectomy", "is_correct": true}, {"label_html": "Trasvesical prostatectomy", "is_correct": false}, {"label_html": "TURP", "is_correct": false}, {"label_html": "External beam radiotherapy", "is_correct": false}], "correct_index": 1, "explanation_html": "In a young patient with local disease only a radical prostatectomy is the best chance of cure. Radiotherapy may be given instead but has long term sequelae (and inferior survival outcomes). A transvesical prostatectomy is a largely historical operation performed for BPH before TURP was established."}, {"number": 42, "topic": "Prostate Cancer", "stem_html": "A 56 year old man presents with urinary symptoms and on investigation is found to have a 2cm nodule in the left lobe of the prostate. Imaging with whole body MRI and pelvic CT/MRI demonstrates a likely cancer with no distant disease and no nodal metastasis. What is the most appropriate course of action?", "options": [{"label_html": "Robotic prostatectomy", "is_correct": false}, {"label_html": "Open prostatectomy", "is_correct": false}, {"label_html": "Transvesical prostatectomy", "is_correct": false}, {"label_html": "Prostatic biopsy", "is_correct": true}, {"label_html": "Radical pelvic radiotherapy", "is_correct": false}], "correct_index": 3, "explanation_html": "Prostate cancers are typically biopsied prior to treatment."}, {"number": 43, "topic": "Prostate Cancer", "stem_html": "Which of the following would be most consistent with a histologically aggressive form of prostate cancer?", "options": [{"label_html": "FIGO stage 1 disease", "is_correct": false}, {"label_html": "FIGO stage IV disease", "is_correct": false}, {"label_html": "EuroQOL score of 5", "is_correct": false}, {"label_html": "Gleason score of 2", "is_correct": false}, {"label_html": "Gleason score of 10", "is_correct": true}], "correct_index": 4, "explanation_html": "Prostate cancer is histologically graded using the Gleason score (see below). A score of 10 is consistent with a histologically aggressive form of the disease. The FIGO staging system is used to stage gynaecological malignancy. The EuroQOL score is a quality of life measurement tool."}, {"number": 44, "topic": "Prostate Cancer", "stem_html": "A 75 year old man presents with locally advanced carcinoma of the prostate and vertebral body metastasis with impending spinal cord compression. Which of the following agents (if used in isolation) carries the greatest risk of worsening his symptoms in the short term?", "options": [{"label_html": "Surgical orchidectomy", "is_correct": false}, {"label_html": "Cyproterone acetate", "is_correct": false}, {"label_html": "Luteinising hormone releasing hormone analogues", "is_correct": true}, {"label_html": "Flutamide", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 2, "explanation_html": "LHRH analogues may cause flare of metastatic disease and anti androgens should be administered to counter this. Surgical orchidectomy reduces testosterone levels within 8 hours (but fails to reduce adrenal androgen release). Cyproterone and flutamide are androgen blockers that may be considered as add on therapy to reduce the risk of tumour flare when commencing treatment with LH RH analogues."}], "note_html": "<b>Prostate Cancer<\/b><br>This is a common condition and up to 30,000 men are diagnosed with the condition each year. Up to 9,000 will die in in the UK from the condition per year. <br><br><b>Diagnosis<\/b><br>Early prostate cancers have few symptoms. <br>Metastatic disease may present as bone pain.<br>Locally advanced disease may present as pelvic pain or with urinary symptoms.<br>Prostate specific antigen measurement<br>Digital rectal examination <br>Trans rectal USS (+/- biopsy)<br>MRI/ CT and bone scan for staging.<br> <br><b>PSA Test<\/b><br>The normal upper limit for PSA is 4ng/ml. However, in this group will lie patients with benign disease and some with localised prostate cancer. False positives may be due to prostatitis, UTI, BPH, vigorous DRE. <br>The percentage of free: total PSA may help to distinguish benign disease from cancer. Values of &lt;20% are suggestive of cancer and biopsy is advised.<br><br><b>Pathology<\/b><br><ul><li>95% adenocarcinoma<\/li><li>In situ malignancy is sometimes found in areas adjacent to cancer. Multiple biopsies needed to call true in situ disease. <\/li><li>Often multifocal- 70% lie in the peripheral zone.<\/li><li>Graded using the Gleason grading system, two grades awarded 1 for most dominant grade (on scale of 1-5) and 2 for second most dominant grade (scale 1-5). The two added together give the Gleason score. Where 2 is best prognosis and 10 the worst.<\/li><li>Lymphatic spread occurs first to the obturator nodes and local extra prostatic spread to the seminal vesicles is associated with distant disease. <\/li><\/ul><br><b>Treatment<\/b><br><ul><li>Watch and wait- Elderly, multiple co-morbidities, low Gleason score<\/li><li>Radiotherapy (External)- Both potentially curative and palliative therapy possible. However, radiation proctitis and rectal malignancy are late problems. Brachytherapy is a modification allowing internal radiotherapy. <\/li><li>Surgery- Radical prostatectomy. Surgical removal of the prostate is the standard treatment for localised disease. The robot is being used increasingly for this procedure. As well as the prostate the obturator nodes are also removed to complement the staging process. Erectile dysfunction is a common side effect. Survival may be better than with radiotherapy (see references). Functional outcomes are better when a robotic approach is used.<\/li><li>Hormonal therapy- Testosterone stimulates prostate tissue and prostatic cancers usually show some degree of testosterone dependence. 95% of testosterone is derived from the testis and bilateral orchidectomy may be used for this reason.  Pharmacological alternatives include LHRH analogues and anti androgens (which may be given in combination).<\/li><li>In the UK the National Institute for Clinical Excellence (NICE) suggests that active surveillance is the preferred option for low risk men. It is particularly suitable for men with clinical stage T1c, Gleason score 3+3 and PSA density &lt; 0.15 ng/ml/ml who have cancer in less than 50% of their biopsy cores, with &lt; 10 mm of any core involved.<\/li><\/ul>Candidates for active surveillance should:<br><ul><li>have had at least 10 biopsy cores taken<\/li><li>have at least one re-biopsy.<\/li><\/ul>If men on active surveillance show evidence of disease progression, offer radical treatment. Treatment decisions should be made with the man, taking into account co-morbidities and life expectancy.<br><br><b>References<\/b><br>1. Prostate cancer pathway. NICE. NG131 last updated December 2021.<br>2. Sooriakumaran P <i> et al<\/i>. Comparative effectiveness of radical prostatectomy and radiotherapy in prostate cancer: observational study of mortality outcomes. <i>BMJ<\/i> 2014 (348):13. <i>This study shows that in men with localised disease survival was greater in those offered surgery.<\/i>"}, {"name": "Renal lesions", "questions": [{"number": 45, "topic": "Renal lesions", "stem_html": "A 56 year old man has undergone a radical nephrectomy. The pathologist bisects the kidney and identifies a pink fleshy tumour in the renal pelvis. What is the most likely disease?", "options": [{"label_html": "Renal cell carcinoma", "is_correct": false}, {"label_html": "Transitional cell carcinoma", "is_correct": true}, {"label_html": "Angiomyolipoma", "is_correct": false}, {"label_html": "Phaeochromocytoma", "is_correct": false}, {"label_html": "Renal adenoma", "is_correct": false}], "correct_index": 1, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Most renal tumours are yellow or brown in colour. TCC's are one of the few tumours to appear pink.<br><\/div>The finding of a TCC in the renal pelvis mandates a nephroureterectomy."}, {"number": 46, "topic": "Renal lesions", "stem_html": "A 56 year old man has undergone a radical nephrectomy. The pathologist bisects the kidney and identifies a pink fleshy tumour in the renal pelvis. What is the most likely disease?", "options": [{"label_html": "Renal cell carcinoma", "is_correct": false}, {"label_html": "Transitional cell carcinoma", "is_correct": true}, {"label_html": "Angiomyolipoma", "is_correct": false}, {"label_html": "Phaeochromocytoma", "is_correct": false}, {"label_html": "Renal adenoma", "is_correct": false}], "correct_index": 1, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Most renal tumours are yellow or brown in colour. TCC's are one of the few tumours to appear pink.<br><\/div>The finding of a TCC in the renal pelvis mandates a nephroureterectomy."}, {"number": 47, "topic": "Renal lesions", "stem_html": "A 32 year old woman presents with an episode of haemoptysis and is found to have metastatic tumour present within the parenchyma of the lungs. This is biopsied and subsequent histol
