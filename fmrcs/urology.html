ogy shows clear cells. What is the most likely primary site?", "options": [{"label_html": "Kidney", "is_correct": true}, {"label_html": "Breast", "is_correct": false}, {"label_html": "Liver", "is_correct": false}, {"label_html": "Adrenal", "is_correct": false}, {"label_html": "Bone", "is_correct": false}], "correct_index": 0, "explanation_html": "Clear cell tumours are a sub type of renal cell cancer it is associated with specific genetic changes localised to chromosome 3."}, {"number": 48, "topic": "Renal lesions", "stem_html": "A 69 year old male presents with haematuria. He worked in the textile industry. He has a left flank discomfort. A CT IVU shows a lesion of the left renal pelvis. What is the most likely lesion?", "options": [{"label_html": "Adenocarcinoma", "is_correct": false}, {"label_html": "Transitional cell carcinoma", "is_correct": true}, {"label_html": "Nephroblastoma", "is_correct": false}, {"label_html": "Neuroblastoma", "is_correct": false}, {"label_html": "Angiomyolipoma", "is_correct": false}], "correct_index": 1, "explanation_html": "TCC is a rare form of renal cancer, accounting for approximately 7% of all renal tumours. Risk factors include exposure to chemicals in the textile, plastic and rubber industry."}, {"number": 49, "topic": "Renal lesions", "stem_html": "A 35 year old male presents with haematuria. He is found to have bilateral masses in the flanks. He has a history of epilepsy and learning disability. Which of the lesions below is most likely?", "options": [{"label_html": "Angiomyolipoma", "is_correct": true}, {"label_html": "Renal cortical cysts", "is_correct": false}, {"label_html": "Transitional cell cancer", "is_correct": false}, {"label_html": "Nephroblastomas", "is_correct": false}, {"label_html": "Staghorn calculi", "is_correct": false}], "correct_index": 0, "explanation_html": "This patient has tuberous sclerosis. This is associated with angiomyolipoma, which is present in 60-80% patients. It is a benign lesion."}], "note_html": "<div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Lesion<\/b><\/th><th><b>Disease specific features<\/b><\/th><th><b>Treatment<\/b><\/th><\/tr><\/thead><tbody><tr><td>Renal cell carcinoma<\/td><td><ul><li>Most present with haematuria (50%)<\/li><li>Common renal tumour (85% cases)<\/li><li>Paraneoplastic features include hypertension and polycythaemia<\/li><li>Most commonly has haematogenous mestastasis<\/li><\/ul><\/td><td>Usually radical or partial nephrectomy<\/td><\/tr><tr><td>Nephroblastoma<\/td><td><ul><li>Rare childhood tumour<\/li><li>It accounts for 80% of all genitourinary malignancies in those under the age of 15 years<\/li><li>Up to 90% will have a mass<\/li><li>50% will be hypertensive<\/li><li>Diagnostic work up includes ultrasound and CT scanning<\/li><\/ul><\/td><td>Surgical resection combined with chemotherapy (usually vincristine, actinomycin D and doxorubicin)<\/td><\/tr><tr><td>Neuroblastoma<\/td><td><ul><li>Most common extracranial tumour of childhood<\/li><li>80% occur in those under 4 years of age<\/li><li>Tumour of neural crest origin (up to 50% occur in the adrenal gland)<\/li><li>The tumour is usually calcified and may be diagnosed using MIBG scanning<\/li><li>Staging is with CT<\/li><\/ul><\/td><td>Surgical resection, radiotherapy and chemotherapy<\/td><\/tr><tr><td>Transitional cell carcinoma<\/td><td><ul><li>Accounts for 90% of lower <i>urinary tract<\/i> tumours, but only 10% of renal tumours<\/li><li>Males affected 3x more than females<\/li><li>Occupational exposure to industrial dyes and rubber chemicals may increase risk<\/li><li>Up to 80% present with painless haematuria<\/li><li>Diagnosis and staging is with CT IVU<\/li><\/ul><\/td><td>Radical nephroureterectomy<\/td><\/tr><tr><td>Angiomyolipoma<\/td><td><ul><li>80% of these hamartoma type lesions occur sporadically, the remainder are seen in those with tuberous sclerosis<\/li><li>Tumour is composed of blood vessels, smooth muscle and fat<\/li><li>Massive bleeding may occur in 10% of cases<\/li><\/ul><\/td><td>50% of patients with lesions &gt;4cm will have symptoms and will require surgical resection<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Renal stones", "questions": [{"number": 50, "topic": "Renal stones", "stem_html": "A 48 year old woman presents with recurrent loin pain and fevers. Investigation reveals a staghorn calculus of the left kidney. Infection with which of the following organisms is most likely?", "options": [{"label_html": "Staphylococcus saprophyticus", "is_correct": false}, {"label_html": "Proteus mirabilis", "is_correct": true}, {"label_html": "Klebsiella", "is_correct": false}, {"label_html": "E-Coli", "is_correct": false}, {"label_html": "Staphylococcus epidermidis", "is_correct": false}], "correct_index": 1, "explanation_html": "Infection with Proteus mirabilis accounts for 90% of all proteus infections. It has a urease producing enzyme. This will tend to favor urinary alkalinisation which is a relative prerequisite for the formation of staghorn calculi."}, {"number": 51, "topic": "Renal stones", "stem_html": "A 56 year old man is admitted with severe loin to groin pain associated with haematuria. He was well until 1 week ago when he was unwell with diarrhoea and vomiting. What is the most likely cause?", "options": [{"label_html": "Ureteric calculus", "is_correct": true}, {"label_html": "Renal cancer", "is_correct": false}, {"label_html": "Pyelonephritis", "is_correct": false}, {"label_html": "Prostatitis", "is_correct": false}, {"label_html": "Prostate cancer", "is_correct": false}], "correct_index": 0, "explanation_html": "Ureteric stones may develop in a background of dehydration."}, {"number": 52, "topic": "Renal stones", "stem_html": "A 73 year old lady is undergoing chemotherapy for treatment of acute leukaemia. She develops symptoms of renal colic. Her urine tests positive for blood. A KUB x-ray shows no evidence of stones. If a stone were present, what type could it be?", "options": [{"label_html": "Calcium oxalate stone", "is_correct": false}, {"label_html": "Calcium phosphate stone", "is_correct": false}, {"label_html": "Cystine stone", "is_correct": false}, {"label_html": "Struvite", "is_correct": false}, {"label_html": "Uric acid stone", "is_correct": true}], "correct_index": 4, "explanation_html": "Chemotherapy and cell death can increase uric acid levels. In this acute setting the uric acid stones are unlikely to be coated with calcium and will therefore be radiolucent."}, {"number": 53, "topic": "Renal stones", "stem_html": "A 16 year old boy presents with renal colic. His parents both have a similar history of the condition. His urine tests positive for blood. A KUB style x-ray shows a relatively radiodense stone in the region of the mid ureter. What is the most likely composition of the stone?", "options": [{"label_html": "Calcium phosphate stone", "is_correct": false}, {"label_html": "Uric acid stone", "is_correct": false}, {"label_html": "Struvite stone", "is_correct": false}, {"label_html": "Cystine stone", "is_correct": true}, {"label_html": "Calcium oxalate stone", "is_correct": false}], "correct_index": 3, "explanation_html": "Cystine stones are associated with an inherited metabolic disorder."}, {"number": 54, "topic": "Renal stones", "stem_html": "A 43 year old lady with episodes of recurrent urinary tract sepsis presents with a staghorn calculus of the left kidney. Her urinary pH is 7.8. A KUB x-ray shows a faint outline of the calculus. What is the most likely stone composition?", "options": [{"label_html": "Struvite", "is_correct": true}, {"label_html": "Calcium phosphate", "is_correct": false}, {"label_html": "Calcium oxalate", "is_correct": false}, {"label_html": "Uric acid", "is_correct": false}, {"label_html": "Cystine", "is_correct": false}], "correct_index": 0, "explanation_html": "Chronic infection with urease producing enzymes can produce an alkaline urine with formation of struvite stone."}, {"number": 55, "topic": "Renal stones", "stem_html": "Which of the following renal stone types is most radiodense on a plain x-ray?", "options": [{"label_html": "Calcium phosphate", "is_correct": true}, {"label_html": "Calcium oxalate", "is_correct": false}, {"label_html": "Uric acid", "is_correct": false}, {"label_html": "Struvite", "is_correct": false}, {"label_html": "Cystine", "is_correct": false}], "correct_index": 0, "explanation_html": "Calcium phosphate stones are the most radiodense stones, calcium oxalate stones slightly less so. Uric acid stones are radiolucent (unless they have calcium contained within them)."}], "note_html": "<div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Type of stones<\/b><\/th><th><b>Features<\/b><\/th><th><b>Percentage of all calculi<\/b><\/th><\/tr><\/thead><tbody><tr><td>Calcium oxalate<\/td><td>Hypercalciuria is a major risk factor (various causes)<br>Hyperoxaluria may also increase risk<br>Hypocitraturia increases risk because citrate forms complexes with calcium making it more soluble<br>Stones are radio-opaque (though less than calcium phosphate stones)<br>Hyperuricosuria may cause uric acid stones to which calcium oxalate binds<\/td><td>85%<\/td><\/tr><tr><td>Cystine<\/td><td>Inherited recessive disorder of transmembrane cystine transport leading to decreased absorption of cystine from intestine and renal tubule<br>Multiple stones may form<br>Relatively radiodense because they contain sulphur<\/td><td>1%<\/td><\/tr><tr><td>Uric acid<\/td><td>Uric acid is a product of purine metabolism<br>May precipitate when urinary pH low<br>May be caused by diseases with extensive tissue breakdown e.g. malignancy <br>More common in children with inborn errors of metabolism<br>Radiolucent<\/td><td>5-10%<\/td><\/tr><tr><td>Calcium phosphate<\/td><td>May occur in renal tubular acidosis, high urinary pH increases supersaturation of urine with calcium and phosphate<br>Renal tubular acidosis types 1 and 3 increase risk of stone formation (types 2 and 4 do not)<br>Radio-dense stones (composition similar to bone)<\/td><td>10%<\/td><\/tr><tr><td>Struvite<\/td><td>Stones formed from magnesium, ammonium and phosphate<br>Occur as a result of urease producing bacteria (and are thus associated with chronic infections)<br>Under the alkaline conditions produced, the crystals can precipitate<br>Slightly radio-opaque<\/td><td>2-20%<\/td><\/tr><\/tbody><\/table><\/div><br><b>Effect of urinary pH on stone formation<\/b><br>Urine pH will show individual variation (from pH 5-7). Post prandially the pH falls as purine metabolism will produce uric acid. Then the urine becomes more alkaline (alkaline tide). When the stone is not available for analysis the pH of urine may help to determine which stone was present.<br><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid2\"><thead><tr><th><b>Stone type<\/b><\/th><th><b>Urine acidity<\/b><\/th><th><b>Mean urine pH<\/b><\/th><\/tr><\/thead><tbody><tr><td>Calcium phosphate<\/td><td>Normal- alkaline<\/td><td>&gt;5.5<\/td><\/tr><tr><td>Calcium oxalate<\/td><td>Variable<\/td><td>6<\/td><\/tr><tr><td>Uric acid<\/td><td>Acid<\/td><td>5.5<\/td><\/tr><tr><td>Struvite<\/td><td>Alkaline<\/td><td>&gt;7.2<\/td><\/tr><tr><td>Cystine<\/td><td>Normal<\/td><td>6.5<\/td><\/tr><\/tbody><\/table><\/div>"}, {"name": "Renal stones: imaging", "questions": [{"number": 56, "topic": "Renal stones: imaging", "stem_html": "A 47-year-old woman presents with loin pain and haematuria. Urine dipstick demonstrates:<br><br><div class=\"table-responsive\"><table class=\"tb\"><tbody><tr><td>Blood<\/td><td>++++<\/td><\/tr><tr><td>Nitrites<\/td><td>POS<\/td><\/tr><tr><td>Leucocytes<\/td><td>+++<\/td><\/tr><tr><td>Protein<\/td><td>++<\/td><\/tr><\/tbody><\/table><\/div><br>Urine culture shows a Proteus infection. An x-ray demonstrates a stag-horn calculus in the left renal pelvis. What is the most likely composition of the renal stone?", "options": [{"label_html": "Xanthine", "is_correct": false}, {"label_html": "Calcium oxalate", "is_correct": false}, {"label_html": "Struvite", "is_correct": true}, {"label_html": "Cystine", "is_correct": false}, {"label_html": "Urate", "is_correct": false}], "correct_index": 2, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Stag-horn calculi are composed of struvite and form in alkaline urine (ammonia producing bacteria therefore predispose)<br><br>Renal stones on x-ray<br><ul><li>cystine stones: semi-opaque<\/li><li>urate + xanthine stones: radio-lucent<\/li><\/ul><\/div>"}, {"number": 57, "topic": "Renal stones: imaging", "stem_html": "A 47-year-old woman presents with loin pain and haematuria. Urine dipstick demonstrates:<br><br><div class=\"table-responsive\"><table class=\"tb\"><tbody><tr><td>Blood<\/td><td>++++<\/td><\/tr><tr><td>Nitrites<\/td><td>POS<\/td><\/tr><tr><td>Leucocytes<\/td><td>+++<\/td><\/tr><tr><td>Protein<\/td><td>++<\/td><\/tr><\/tbody><\/table><\/div><br>Urine culture shows a Proteus infection. An x-ray demonstrates a stag-horn calculus in the left renal pelvis. What is the most likely composition of the renal stone?", "options": [{"label_html": "Xanthine", "is_correct": false}, {"label_html": "Calcium oxalate", "is_correct": false}, {"label_html": "Struvite", "is_correct": true}, {"label_html": "Cystine", "is_correct": false}, {"label_html": "Urate", "is_correct": false}], "correct_index": 2, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Stag-horn calculi are composed of struvite and form in alkaline urine (ammonia producing bacteria therefore predispose)<br><br>Renal stones on x-ray<br><ul><li>cystine stones: semi-opaque<\/li><li>urate + xanthine stones: radio-lucent<\/li><\/ul><\/div>"}], "note_html": "The table below summarises the appearance of different types of renal stone on x-ray<br><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Type<\/b><\/th><th><b>Frequency<\/b><\/th><th><b>Radiograph appearance<\/b><\/th><\/tr><\/thead><tbody><tr><td>Calcium oxalate<\/td><td>40%<\/td><td>Opaque<\/td><\/tr><tr><td>Mixed calcium oxalate/phosphate stones<\/td><td>25%<\/td><td>Opaque<\/td><\/tr><tr><td>Triple phosphate stones*<\/td><td>10%<\/td><td>Opaque<\/td><\/tr><tr><td>Calcium phosphate<\/td><td>10%<\/td><td>Opaque<\/td><\/tr><tr><td>Urate stones<\/td><td>5-10%<\/td><td>Radio-lucent<\/td><\/tr><tr><td>Cystine stones<\/td><td>1%<\/td><td>Semi-opaque, 'ground-glass' appearance<\/td><\/tr><tr><td>Xanthine stones<\/td><td>&lt;1%<\/td><td>Radio-lucent<\/td><\/tr><\/tbody><\/table><\/div><br>*stag-horn calculi involve the renal pelvis and extend into at least 2 calyces. They develop in alkaline urine and are composed of struvite (ammonium magnesium phosphate, triple phosphate). Ureaplasma urealyticum and Proteus infections predispose to their formation"}, {"name": "Renal tumours", "questions": [{"number": 58, "topic": "Renal tumours", "stem_html": "A 39 year old man notices a swelling in his left hemiscrotum. On examination lying supine, he has a left sided varicocele. The ipsilateral testis is normal on palpation. What is the most appropriate course of action?", "options": [{"label_html": "Scrotal exploration and ligation of the varicocele", "is_correct": false}, {"label_html": "Abdominal ultrasound", "is_correct": true}, {"label_html": "Scrotal ultrasound", "is_correct": false}, {"label_html": "Left orchidectomy", "is_correct": false}, {"label_html": "Discharge", "is_correct": false}], "correct_index": 1, "explanation_html": "A left sided varicocele is a recognised presenting sign of a renal tumour occluding the renal vein (into which the left testicular vein drains). An abdominal ultrasound should be undertaken to exclude this. Surgery for uncomplicated varicocele is usually unnecessary."}, {"number": 59, "topic": "Renal tumours", "stem_html": "An 83 year old man with a long standing staghorn calculus presents with recurrent haematuria and investigation shows a mass of the left renal pelvis. Of the lesions listed below, the diagnosis is:", "options": [{"label_html": "Squamous cell carcinoma", "is_correct": true}, {"label_html": "Adenocarcinoma", "is_correct": false}, {"label_html": "Transitional cell carcinoma", "is_correct": false}, {"label_html": "Sarcoma", "is_correct": false}, {"label_html": "Transitional metaplasia", "is_correct": false}], "correct_index": 0, "explanation_html": "SCC of the kidney usually arises in an area of chronic inflammation such as a staghorn calculus. They are rare."}, {"number": 60, "topic": "Renal tumours", "stem_html": "A 38 year old man is investigated and found to have a left sided renal mass. Imaging demonstrates a 5cm renal tumour invading the left renal vein. There is no evidence of distant disease. What is the most appropriate course of action?", "options": [{"label_html": "Renal biopsy", "is_correct": false}, {"label_html": "Radical nephrectomy", "is_correct": true}, {"label_html": "External beam radiotherapy", "is_correct": false}, {"label_html": "Combined chemoradiotherapy", "is_correct": false}, {"label_html": "Neoadjuvent chemotherapy", "is_correct": false}], "correct_index": 1, "explanation_html": "Renal tumours that are operable are nearly always managed surgically in the first instance. It is not common practice to biopsy prior to surgery. They are not usually radiosensitive."}, {"number": 61, "topic": "Renal tumours", "stem_html": "A 56 year old man presents with lethargy, haematuria and haemoptysis. On examination, he is hypertensive and has a right loin mass. A CT scan shows a lesion affecting the upper pole of the right kidney, it has a small cystic centre. Which of the options below is the most likely diagnosis?", "options": [{"label_html": "Squamous cell carcinoma of the kidney", "is_correct": false}, {"label_html": "Nephroblastoma", "is_correct": false}, {"label_html": "Renal adenocarcinoma", "is_correct": true}, {"label_html": "Transitional cell carcinoma of the kidney", "is_correct": false}, {"label_html": "Polycystic kidney disease", "is_correct": false}], "correct_index": 2, "explanation_html": "Renal adenocarcinoma are the most common renal tumours. These will typically affect the renal parenchyma. Transitional cell carcinoma will usually affect urothelial surfaces. Nephroblastoma would be very rare in this age group. Renal adenocarcinoma may produce cannon ball metastasis in the lung which cause haemoptysis, this is not a feature of PKD."}, {"number": 62, "topic": "Renal tumours", "stem_html": "Which of the following statements is false in relation to renal adenocarcinoma?", "options": [{"label_html": "They account for over 75% cases of renal tumours", "is_correct": false}, {"label_html": "Renal biopsy should be performed in all cases considered for radical nephrectomy", "is_correct": true}, {"label_html": "They typically spread via the haematogenous route", "is_correct": false}, {"label_html": "Patients with completely resected T2 disease should not receive adjuvant chemotherapy", "is_correct": false}, {"label_html": "Partial nephrectomy gives equivalent oncological outcomes in patients with T1 disease", "is_correct": false}], "correct_index": 1, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Routine chemotherapy is not effective in patients with renal adenocarcinoma and should not be used following R0 resections.<\/div>Routine renal biopsy should not be performed in cases for nephrectomy. Most cases of malignancy can be accurately classified on imaging."}, {"number": 63, "topic": "Renal tumours", "stem_html": "A 45 year old man presents with symptoms of urinary colic. In the history he has suffered from recurrent episodes of frank haematuria over the past week or so. On examination, he has a left loin mass and a varicocele. The most likely diagnosis is:", "options": [{"label_html": "Renal adenocarcinoma", "is_correct": true}, {"label_html": "Renal cortical adenoma", "is_correct": false}, {"label_html": "Squamous cell carcinoma of the renal pelvis", "is_correct": false}, {"label_html": "Retroperitoneal fibrosis", "is_correct": false}, {"label_html": "Nephroblastoma", "is_correct": false}], "correct_index": 0, "explanation_html": "<ul><li>Renal adenocarcinoma are the most common renal malignancy and account for 75% cases.<\/li><li>Patients may develop frank haematuria and have episodes of clot colic.<\/li><li>A Grawitz tumour is an eponymous name for Renal Adenocarcinoma.<\/li><li>May metastasise to bone.<\/li><\/ul>"}], "note_html": "<b>Renal cell carcinoma<\/b><br>Renal cell carcinoma is an adenocarcinoma of the renal cortex and is believed to arise from the proximal convoluted tubule. They are usually solid lesions, up to 20% may be multifocal, 20% may be calcified and 20% may have either a cystic component or be wholly cystic. They are often circumscribed by a pseudocapsule of compressed normal renal tissue. Spread may occur either by direct extension into the adrenal gland, renal vein or surrounding fascia. More distant disease usually occurs via the haematogenous route to lung, bone or brain.<br>Renal cell carcinoma comprise up to 85% of all renal malignancies. Males are more commonly affected than females and sporadic tumours typically affect patients in their sixth decade. <br>Patients may present with a variety of symptoms including; haematuria (50%), loin pain (40%), mass (30%) and up to 25% may have symptoms of metastasis.Less than 10% have the classic triad of haematuria, pain and mass. <br><br><b>Investigation<\/b><br>Many cases will present as haematuria and be discovered during diagnostic work up. Benign renal tumours are rare, so renal masses should be investigated with multislice CT scanning. Most tumours are also characterised with an arterial phase CT, particularly if they may be suitable for partial nephrectomy.<br><br>CT scanning of the chest and abdomen to detect distant disease should also be undertaken. <br><br>Routine bone scanning is not indicated in the absence of symptoms.<br><br>Biopsy should not be performed when a nephrectomy is planned but is mandatory before any ablative therapies are undertaken. <br><br>Assessment of the functioning of the contra lateral kidney.<br><br><b>Management<\/b><br>T1 lesions may be managed by partial nephrectomy and this gives equivalent oncological results to total radical nephrectomy. Partial nephrectomy may also be performed when there is inadequate reserve in the remaining kidney. Ablative techniques may also be considered for small T1 lesions in unfit patients. In general, outcomes are less favorable than with surgical resection.<br><br>For T2 lesions and above a radical nephrectomy is standard practice and this may be performed via a laparoscopic or open approach. Preoperative embolisation is not indicated nor is resection of uninvolved adrenal glands. During surgery early venous control is mandatory to avoid shedding of tumour cells into the circulation.<br><br>Patients with <b>completely resected disease do not benefit from adjuvant therapy<\/b> with either chemotherapy or biological agents. These should not be administered outside the setting of clinical trials.<br><br>Patients with transitional cell cancer will require a nephroureterectomy with disconnection of the ureter at the bladder.<br><br><b>References<\/b><br>Capitanio U, Montorsi F. Renal cancer. Lancet. 2016 Feb 27;387(10021):894-906.<br><br>Capitanio U  et al. Epidemiology of Renal Cell Carcinoma. Eur Urol. 2019 Jan;75(1):74-84."}, {"name": "Scrotal swelling", "questions": [{"number": 64, "topic": "Scrotal swelling", "stem_html": "A 32 year old male presents with a swollen right scrotum which has developed over 3 weeks after being kicked in the groin area. There is a non tense swelling of the right scrotum and the underlying testis cannot be easily palpated. A dipstick is positive for nitrates only. What is the most likely diagnosis?", "options": [{"label_html": "Epididymo-orchitis", "is_correct": false}, {"label_html": "Testicular torsion", "is_correct": false}, {"label_html": "Torsion of testicular appendage", "is_correct": false}, {"label_html": "Hydrocele", "is_correct": true}, {"label_html": "Haematocele", "is_correct": false}], "correct_index": 3, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Haematoceles develop over minutes/ hours and occur after the event<\/div>This is a secondary hydrocele which occurs in patients aged 20-40 years. It develops over days/ weeks and there may not be a tense swelling. The underlying testis is NOT palpated therefore indicating a hydrocele. Causes include trauma, infection and tumour."}, {"number": 65, "topic": "Scrotal swelling", "stem_html": "A 32 year old male presents with a swollen, painful right scrotum after being kicked in the groin area 1 hour ago. There is a painful swelling of the right scrotum and the underlying testis cannot be easily palpated. What is the most likely explanation?", "options": [{"label_html": "Hydrocele", "is_correct": false}, {"label_html": "Haematocele", "is_correct": true}, {"label_html": "Epididymo-orchitis", "is_correct": false}, {"label_html": "Orchitis", "is_correct": false}, {"label_html": "Epididymal cyst", "is_correct": false}], "correct_index": 1, "explanation_html": "Acute haematocele: tense, tender and non transilluminating mass post trauma. A chronic haematoma causes a blood clot to surround the testis. The blood clot hardens and contracts causing a hard mass which may be indistinguishable from a tumour. Therefore the testis will need surgical exploration."}, {"number": 66, "topic": "Scrotal swelling", "stem_html": "A 20 year old male notices a mild painful swelling of his right scrotum. He also complains of abdominal pain. Clinically, the patient is found to have a swollen right testicle. Apart from a supraclavicular node, there is no obvious lymphadenopathy. What is the best course of action?", "options": [{"label_html": "Orchidectomy via a scrotal approach", "is_correct": false}, {"label_html": "Tru cut biopsy of the testis", "is_correct": false}, {"label_html": "FNAC of the testis", "is_correct": false}, {"label_html": "Orchidectomy via an inguinal approach", "is_correct": true}, {"label_html": "Administration of antibiotics", "is_correct": false}], "correct_index": 3, "explanation_html": "The patient is likely to have a teratoma which has metastasized to the supraclavicular nodes. There is suspicion of spread to the para-aortic nodes due to the abdominal pain. He will need orchidectomy and combination chemotherapy. There is no role for orchidectomy via scrotal approach in malignancy."}, {"number": 67, "topic": "Scrotal swelling", "stem_html": "A 32 year old male presents with a swollen, painful right scrotum after being kicked in the groin area. There is a painful swelling of the right scrotum and the underlying testis cannot be easily palpated. What is the best course of action?", "options": [{"label_html": "Inguinal orchidectomy", "is_correct": false}, {"label_html": "Scrotal orchidectomy", "is_correct": false}, {"label_html": "Scrotal exploration", "is_correct": true}, {"label_html": "Testicular USS", "is_correct": false}, {"label_html": "Testicular aspiration", "is_correct": false}], "correct_index": 2, "explanation_html": "Acute haematocele: tense, tender and non transilluminating mass. The testis will need surgical exploration to evacuate the blood and repair any damage."}, {"number": 68, "topic": "Scrotal swelling", "stem_html": "A 32 year old male presents with a swollen, painful right scrotum after being kicked in the groin area. There is a painful swelling of the right scrotum and the underlying testis cannot be easily palpated. What is the best course of action?", "options": [{"label_html": "Inguinal orchidectomy", "is_correct": false}, {"label_html": "Scrotal orchidectomy", "is_correct": false}, {"label_html": "Scrotal exploration", "is_correct": true}, {"label_html": "Testicular USS", "is_correct": false}, {"label_html": "Testicular aspiration", "is_correct": false}], "correct_index": 2, "explanation_html": "Acute haematocele: tense, tender and non transilluminating mass. The testis will need surgical exploration to evacuate the blood and repair any damage."}, {"number": 69, "topic": "Scrotal swelling", "stem_html": "A parent brings her 4 year old child to the surgical clinic. She has noticed an intermittent swelling in the right scrotum that is worse in the evening. On examination he has a soft fluctuant swelling in the right scrotum that cannot be separated from the testis. It transilluminates when a pen torch is held against it. What is the best course of action?", "options": [{"label_html": "Ligation of patent processus vaginalis via inguinal approach", "is_correct": true}, {"label_html": "Ligation of patent processus vaginalis via a scrotal approach", "is_correct": false}, {"label_html": "Jaboulay procedure via scrotal approach", "is_correct": false}, {"label_html": "Lords procedure via scrotal approach", "is_correct": false}, {"label_html": "Aspiration", "is_correct": false}], "correct_index": 0, "explanation_html": "In children, a hydrocele is most commonly due to a persistent processus vaginalis. The swelling is intermittent and in most cases that are diagnosed in infancy the hydrocele resolves. Cases that persist beyond two years of age are best managed surgically and the surgical approach is usually made via the inguinal canal where the patent processus is identified and ligated."}, {"number": 70, "topic": "Scrotal swelling", "stem_html": "A 44 year old man is referred to the clinic because of a swelling and discomfort in the right scrotum. This is present most of the time and he is otherwise well with no urinary symptoms. On examination, he has a soft, fluctuant swelling in the right scrotum that transilluminates easily. An ultrasound is performed that confirms that the underlying testicle is structurally normal. What is the best course of action?", "options": [{"label_html": "Ligation of patent processus vaginalis via inguinal approach", "is_correct": false}, {"label_html": "Ligation of patent processus vaginalis via a scrotal approach", "is_correct": false}, {"label_html": "Jaboulay procedure via scrotal approach", "is_correct": true}, {"label_html": "Lords procedure via inguinal approach", "is_correct": false}, {"label_html": "Aspiration and injection of sclerosant", "is_correct": false}], "correct_index": 2, "explanation_html": "Adult hydroceles are less commonly due to the persistence of embryonic remnants and therefore can be managed via a scrotal approach. Both the Lords and Jaboulay procedures are reasonable options. However, only a scrotal approach should be adopted."}], "note_html": "<b>Differential diagnosis<\/b><br><div class=\"table-responsive\"><table class=\"table table-bordered\"><tbody><tr><td><b>Inguinal hernia<\/b><\/td><td>If inguinoscrotal swelling; cannot 'get above it' on examination<br>Cough impulse may be present<br>May be reducible<\/td><\/tr><tr><td><b>Testicular tumours<\/b><\/td><td>Often discrete testicular nodule (may have associated hydrocele)<br>Symptoms of metastatic disease may be present<br>USS scrotum and serum AFP and β HCG required<\/td><\/tr><tr><td><b>Acute epididymo-orchitis<\/b><\/td><td>Often history of dysuria and urethral discharge<br>Swelling may be tender and eased by elevating testis<br>Most cases due to <i>Chlamydia<\/i><br>Infections with other gram negative organisms may be associated with underlying structural abnormality<\/td><\/tr><tr><td><b>Epididymal cysts<\/b><\/td><td>Single or multiple cysts<br>May contain clear or opalescent fluid (spermatoceles)<br>Usually occur over 40 years of age<br>Painless<br>Lie above and behind testis<br>It is usually possible to 'get above the lump' on examination<\/td><\/tr><tr><td><b>Hydrocele<\/b><\/td><td>Non painful, soft fluctuant swelling<br>Often possible to 'get above it' on examination<br>Usually contain clear fluid<br>Will often transilluminate<br>May be presenting feature of testicular cancer in young men<\/td><\/tr><tr><td><b>Testicular torsion<\/b><\/td><td>Severe, sudden onset testicular pain<br>Risk factors include abnormal testicular lie<br>Typically affects adolescents and young males<br>On examination testis is tender and pain not eased by elevation <br>Urgent surgery is indicated, the contra lateral testis should also be fixed<\/td><\/tr><tr><td><b>Varicocele<\/b><\/td><td>Varicosities of the pampiniform plexus<br>Typically occur on left (because testicular vein drains into renal vein)<br>May be presenting feature of renal cell carcinoma<br>Affected testis may be smaller and bilateral varicoceles may affect fertility<\/td><\/tr><\/tbody><\/table><\/div><br><b>Management<\/b><br><ul><li>Testicular malignancy is always treated with orchidectomy via an inguinal approach. This allows high ligation of the testicular vessels and avoids exposure of another lymphatic field to the tumour.<\/li><li>Torsion is commonest in young teenagers and the history in older children can be difficult to elicit. Intermittent torsion is a recognised problem. The treatment is prompt surgical exploration and testicular fixation. This can be achieved using sutures or by placement of the testis in a Dartos pouch. <\/li><li>Varicoceles are usually managed conservatively. If there are concerns about testicular function of infertility then surgery or radiological management can be considered.<\/li><li>Epididymal cysts can be excised using a scrotal approach<\/li><li>Hydroceles are managed differently in children where the underlying pathology is a patent processus vaginalis and therefore an inguinal approach is used in children so that the processus can be ligated. In adults a scrotal approach is preferred and the hydrocele sac excised or plicated.<\/li><\/ul>"}, {"name": "Testicular disorders", "questions": [{"number": 71, "topic": "Testicular disorders", "stem_html": "A 28 year old man presents with pain in the testis and scrotum. It began 10 hours previously and has worsened during that time. On examination, he is pyrexial, the testis is swollen and tender and there is an associated hydrocele. What is the most likely diagnosis?", "options": [{"label_html": "Torsion of testicular hydatid", "is_correct": false}, {"label_html": "Torsion of the testis", "is_correct": false}, {"label_html": "Testicular seminoma", "is_correct": false}, {"label_html": "Acute epididymo-orchitis", "is_correct": true}, {"label_html": "Torsion of the spermatic cord", "is_correct": false}], "correct_index": 3, "explanation_html": "The onset is relatively slow for torsion and the presence of fever favors epididymo-orchitis."}, {"number": 72, "topic": "Testicular disorders", "stem_html": "A 3 month old boy is brought to the clinic by his mother who has noticed a swelling in the right hemiscrotum. On examination, there is a firm mass affecting the right spermatic cord distally, the testis is felt separately from it. What is the most likely diagnosis?", "options": [{"label_html": "Inguino scrotal hernia", "is_correct": false}, {"label_html": "Rhabdomyosarcoma", "is_correct": true}, {"label_html": "Leydig cell tumour", "is_correct": false}, {"label_html": "Torsion of testicular hydatid", "is_correct": false}, {"label_html": "Hydrocele", "is_correct": false}], "correct_index": 1, "explanation_html": "Rhabdomyosarcoma are paratesticular tumours with a bimodal distribution. Because the mass is felt separate to the testis, this is the more likely diagnosis.<br><ul><li>5% of testicular tumors <\/li><li>Most often arises in distal portion of spermatic cord and may invade testis of surrounding tissues <\/li><li>60% occur in the first 2 decades of life <\/li><li>Bimodal age distribution - 3-4 months - 16 years <\/li><li>Arises from mesenchymal tissue - 90% embryonal variant (better prognosis) - 30% - 50% have metastasis (usually lymph node) at diagnosis <\/li><\/ul>"}, {"number": 73, "topic": "Testicular disorders", "stem_html": "A 33 year old man presents with a painless lump in his left testis. USS and blood tests are suspicious for teratoma. What is the most appropriate next step?", "options": [{"label_html": "Orchidectomy via an inguinal approach", "is_correct": true}, {"label_html": "Orchidectomy via a scrotal approach", "is_correct": false}, {"label_html": "Fine needle aspiration cytology of the lesion", "is_correct": false}, {"label_html": "Core biopsy of the lesion", "is_correct": false}, {"label_html": "Incisional biopsy of the lesion", "is_correct": false}], "correct_index": 0, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Do not biopsy suspected testicular cancer<\/div>Oncological orchidectomy is routinely performed via an inguinal approach to avoid contamination of another lymphatic field."}, {"number": 74, "topic": "Testicular disorders", "stem_html": "A 4 year old boy is brought to the clinic by his mother. He has a swelling in his right hemiscrotum. On examination, it transilluminates brilliantly. What is the best course of action?", "options": [{"label_html": "Undertake a Lords procedure via a scrotal approach", "is_correct": false}, {"label_html": "Ligation of the patent processus vaginalis via an inguinal approach", "is_correct": true}, {"label_html": "Undertake a Jaboulays procedure via a scrotal appraoch", "is_correct": false}, {"label_html": "Undertake a Lords procedure via an inguinal approach", "is_correct": false}, {"label_html": "Division of the patent processus vaginalis via a scrotal approach", "is_correct": false}], "correct_index": 1, "explanation_html": "Ligation of the patent processus vaginalis is performed via an inguinal approach. There is no indication for scrotal surgery for hydrocele in young children."}, {"number": 75, "topic": "Testicular disorders", "stem_html": "A 22 year old man presents with an aching pain and discomfort in his right testicle. He has felt systemically unwell for the preceding 48 hours. On examination, there is tenderness of the right testicle. He has an exaggerated cremasteric reflex. What is the correct course of action?", "options": [{"label_html": "Scrotal exploration via a scrotal approach", "is_correct": false}, {"label_html": "Testicular inspection via an inguinal approach", "is_correct": false}, {"label_html": "Administration of antibiotics", "is_correct": true}, {"label_html": "Fine needle aspiration cytology", "is_correct": false}, {"label_html": "Reassure and discharge", "is_correct": false}], "correct_index": 2, "explanation_html": "This is likely to represent epididymo-orchitis, this is usually due to infection with gonorrhoea or chlamydia in this age group. In addition to treatment with antibiotics contact tracing and appropriate swabs should also be performed."}, {"number": 76, "topic": "Testicular disorders", "stem_html": "A 30 year old male presents with a painless swelling of the testis.  Histologically the stroma has a lymphocytic infiltrate.  The most likely diagnosis is :", "options": [{"label_html": "Differentiated teratoma", "is_correct": false}, {"label_html": "Malignant undifferentiated teratoma", "is_correct": false}, {"label_html": "Classical seminoma", "is_correct": true}, {"label_html": "Spermatocytic  seminoma", "is_correct": false}, {"label_html": "Anaplastic seminoma", "is_correct": false}], "correct_index": 2, "explanation_html": "Seminoma is the commonest type of testicular tumour and is more common in males aged between 30-40 years.  Classical seminoma is the commonest subtype and histology shows lymphocytic stromal infiltrate.  Other subtypes include:<br>1.\tSpermatocytic: tumour cells resemble spermatocytes. Excellent prognosis.<br>2.\tAnaplastic<br>3.\tSyncytiotrophoblast giant cells: β HCG present in cells<br>A teratoma is more common in males aged 20-30 years."}, {"number": 77, "topic": "Testicular disorders", "stem_html": "A 30 year old male presents with gynaecomastia.  Clinically, he is noted to have a nodule in the left  testis.  What is the most likely diagnosis?", "options": [{"label_html": "Oestrogen abuse", "is_correct": false}, {"label_html": "Seminoma with syncytiotrophoblast giant cells", "is_correct": false}, {"label_html": "Teratoma", "is_correct": false}, {"label_html": "Sarcoma", "is_correct": false}, {"label_html": "Leydig cell tumour", "is_correct": true}], "correct_index": 4, "explanation_html": "Leydig cell tumours are rare testicular sex cord stromal tumours (which also include sertoli cell tumours) which are associated with hormonal activity. <br><ul><li> Patients with Leydig cell tumours may present with gynaecomastia before they notice testicular enlargement.<\/li><li>\tMajority are benign<\/li><li>\tHistology: eosinophilic cells in columns<\/li><\/ul>"}, {"number": 78, "topic": "Testicular disorders", "stem_html": "Which of the following procedures represents the optimal operative procedure for testicular cancer?", "options": [{"label_html": "Lords procedure", "is_correct": false}, {"label_html": "Orchidectomy via a scrotal approach", "is_correct": false}, {"label_html": "Orchidectomy via inguinal approach", "is_correct": true}, {"label_html": "Orchidectomy via a combined inguino-scrotal approach", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 2, "explanation_html": "Testicular tumours metastasise to Para aortic nodes and thus an inguinal rather than scrotal approach should be used. There are two main operations that are termed Lords procedure; one is for fissure in ano and the other is a procedure for hydrocele."}, {"number": 79, "topic": "Testicular disorders", "stem_html": "Which of the following procedures represents the optimal operative procedure for testicular cancer?", "options": [{"label_html": "Lords procedure", "is_correct": false}, {"label_html": "Orchidectomy via a scrotal approach", "is_correct": false}, {"label_html": "Orchidectomy via inguinal approach", "is_correct": true}, {"label_html": "Orchidectomy via a combined inguino-scrotal approach", "is_correct": false}, {"label_html": "None of the above", "is_correct": false}], "correct_index": 2, "explanation_html": "Testicular tumours metastasise to Para aortic nodes and thus an inguinal rather than scrotal approach should be used. There are two main operations that are termed Lords procedure; one is for fissure in ano and the other is a procedure for hydrocele."}, {"number": 80, "topic": "Testicular disorders", "stem_html": "A 42 year old man presents with a painless lump in the left testicle that he noticed on self examination. Clinically there is a firm nodule in the left testicle, ultrasound appearances show an irregular mass lesion. His serum AFP and HCG levels are both within normal limits. What is the most likely diagnosis?", "options": [{"label_html": "Yolk sack tumour", "is_correct": false}, {"label_html": "Seminoma", "is_correct": true}, {"label_html": "Testicular teratoma", "is_correct": false}, {"label_html": "Epididymo-orchitis", "is_correct": false}, {"label_html": "Adenomatoid tumour", "is_correct": false}], "correct_index": 1, "explanation_html": "<div class=\"alert alert-success\" role=\"alert\">Seminomas typically have normal AFP and HCG. These are usually raised in teratomas and yolk sac tumours<\/div>This man's age, presenting symptoms and normal tumour markers make a seminoma the <i>most likely <\/i> diagnosis. Epididymo-orchitis does not produce irregular mass lesions which are painless."}], "note_html": "<b>Testicular cancer<\/b><br>Testicular cancer is the most common malignancy in men aged 20-30 years. Around 95% of cases of testicular cancer are germ-cell tumours. Germ cell tumours may essentially be divided into:<br><br><div class=\"table-responsive\"><table class=\"tlarge table table-striped table-bordered\" data-role=\"table\" id=\"tableid1\"><thead><tr><th><b>Tumour type<\/b><\/th><th><b>Key features<\/b><\/th><th><b>Tumour markers<\/b><\/th><th><b>Pathology<\/b><\/th><\/tr><\/thead><tbody><tr><td>Seminoma<\/td><td><ul><li>Commonest subtype (50%)<\/li><li>Average age at diagnosis = 40<\/li><li>Even advanced disease associated with 5 year survival of 73%<\/li><\/ul><\/td><td><li>AFP usually normal<\/li><li>HCG elevated in 10% seminomas<\/li><li>Lactate dehydrogenase; elevated in 10-20% seminomas (but also in many other conditions)<\/li><\/td><td>Sheet like lobular patterns of cells with substantial fibrous component. Fibrous septa contain lymphocytic inclusions and granulomas may be seen.<\/td><\/tr><tr><td>Non seminomatous germ cell tumours (42%)<br><ul><li>Teratoma<\/li><li>Yolk sac tumour<\/li><li>Choriocarcinoma<\/li><li>Mixed germ cell tumours (10%)<\/li><\/ul><\/td><td><li>Younger age at presentation =20-30 years<\/li><li>Advanced disease carries worse prognosis (48% at 5 years)<\/li><li>Retroperitoneal lymph node dissection may be needed for residual disease after chemotherapy<\/li><\/td><td><li>AFP elevated in up to 70% of cases<\/li><li>HCG elevated in up to 40% of cases<\/li><li>Other markers rarely helpful<\/li><\/td><td>Heterogenous texture with occasional ectopic tissue such as hair<\/td><\/tr><\/tbody><\/table><\/div><br><i>Image demonstrating a classical seminoma, these tumours are typically more uniform than teratomas<\/i> <br><center><table><tbody><tr><td align=\"left\" colspan=\"2\"><a data-fancybox=\"\" class=\"fancybox\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb090b.jpg\"><img class=\"ajaximage\" src=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb090.jpg\"><\/a><\/td><\/tr><tr><td valign=\"top\" align=\"left\"> <span style=\"font-size:11px; color:LightGray;\">Image sourced from <\/span><a href=\"http://en.wikipedia.org/wiki/Seminoma\" target=\"_blank\" style=\"font-size:11px; color:LightGray;\">Wikipedia<\/a><\/td><td align=\"right\"><a data-fancybox=\"\" class=\"fancybox lbmagglasslink\" rel=\"group\" href=\"https://d2zgo9qer4wjf4.cloudfront.net/images_eMRCS/swb090b.jpg\"><img src=\"https://d2zgo9qer4wjf4.cloudfront.net/css/images/mag_glass.png\"><\/a><\/td><\/tr><\/tbody><\/table><\/center><br><b>Risk factors for testicular cancer<\/b><br><ul><li>Cryptorchidism<\/li><li>Infertility<\/li><li>Family history<\/li><li>Klinefelter's syndrome<\/li><li>Mumps orchitis<\/li><\/ul><br><b>Features<\/b><br><ul><li>A painless lump is the most common presenting symptom<\/li><li>Pain may also be present in a minority of men<\/li><li>Other possible features include hydrocele, gynaecomastia<\/li><\/ul><br><b>Diagnosis<\/b><br><ul><li>Ultrasound is first-line<\/li><li>CT scanning of the chest/ abdomen and pelvis is used for staging<\/li><li>Tumour markers (see above) should be measured<\/li><\/ul><br><b>Management<\/b><br><ul><li>Orchidectomy (Inguinal approach)<\/li><li>Chemotherapy and radiotherapy may be given depending on staging<\/li><li>Abdominal lesions &gt;1cm following chemotherapy may require retroperitoneal lymph node dissection.<\/li><\/ul><br>Prognosis is generally excellent<br><ul><li>5 year survival for seminomas is around 95% if Stage I<\/li><li>5 year survival for teratomas is around 85% if Stage I<\/li><\/ul><br><b>Benign disease<\/b><br><br><b>Epididymo-orchitis<\/b><br>Acute epididymitis is an acute inflammation of the epididymis, often involving the testis and usually caused by bacterial infection. <br><ul><li>Infection spreads from the urethra or bladder. In men &lt;35 years, gonorrhoea or chlamydia are the usual infections.<\/li><li>Amiodarone is a recognised non infective cause of epididymitis, which resolves on stopping the drug.<\/li><li>Tenderness is usually confined to the epididymis, which may facilitate differentiating it from torsion where pain usually affects the entire testis.<\/li><\/ul><br><b>Testicular torsion<\/b><br><ul><li>Twist of the spermatic cord resulting in testicular ischaemia and necrosis.<\/li><li>Most common in males aged between 10 and 30 (peak incidence 13-15 years)<\/li><li>Pain is usually severe and of sudden onset.<\/li><li>Cremasteric reflex is lost and elevation of the testis does not ease the pain.<\/li><li>Treatment is with surgical exploration. If a torted testis is identified then both testis should be fixed as the condition of bell clapper testis is often bilateral.<\/li><\/ul><br><b>Hydrocele<\/b><br><ul><li>Presents as a mass that transilluminates, usually possible to 'get above' it on examination.<\/li><li>In younger men it should be investigated with USS to exclude tumour.<\/li><li>In children it may occur as a result of a patent processus vaginalis.<\/li><li>Treatment in adults is with a Lords or Jabouley procedure.<\/li><li>Treatment in children is with trans inguinal ligation of PPV.<\/li><\/ul>"}, {"name": "Urethral valves", "questions": [{"number": 81, "topic": "Urethral valves", "stem_html": "An 18 month old boy presents with recurrent urinary tract infections. As part of the diagnostic work-up he is noted to have abnormal renal function. An ultrasound scan is performed and shows bilateral hydronephrosis and hydroureter. What is the most likely underlying diagnosis?", "options": [{"label_html": "Posterior urethral valves", "is_correct": true}, {"label_html": "Meatal stenosis", "is_correct": false}, {"label_html": "Hydronephrosis", "is_correct": false}, {"label_html": "Pelvico-ureteric junction obstruction", "is_correct": false}, {"label_html": "Benign prostatic hyperplasia", "is_correct": false}], "correct_index": 0, "explanation_html": "A posterior urethral valve is an obstructive, developmental uropathy that usually affects male infants (incidence 1 in 8000). Diagnostic features include bladder wall hypertrophy, hydronephrosis and bladder diverticula."}], "note_html": "Posterior urethral valves are the commonest cause of infravesical outflow obstruction in males. They may be diagnosed on ante natal ultrasonography. Because the bladder has to develop high emptying pressures in utero, the child may develop renal parenchymal damage. This translates to renal impairment noted in 70% of boys at presentation. Treatment is with bladder catheterisation. Endoscopic valvotomy is the definitive treatment of choice with cystoscopic and renal follow up."}, {"name": "Vasectomy", "questions": [{"number": 82, "topic": "Vasectomy", "stem_html": "A 42 year old man underwent a vasectomy at the surgical clinic. He is reviewed at the request of his general practitioner. On examination he has a small rounded nodule adjacent to the vas. What is the most likely underlying diagnosis?", "options": [{"label_html": "Haematoma", "is_correct": false}, {"label_html": "Sperm granuloma", "is_correct": true}, {"label_html": "Varicocele", "is_correct": false}, {"label_html": "Hydrocele", "is_correct": false}, {"label_html": "Epididymal cyst", "is_correct": false}], "correct_index": 1, "explanation_html": "Sperm granulomas are a common sequelae of vasectomy and are smooth round lumps adherant to the vas. They may be safely left alone."}], "note_html": "Vasectomy is a commonly performed technique for achieving permanent sterilisation. It has a failure rate of 1 in 2000 and is conveniently performed under local anaesthesia. <br>Reversal success rates are approximately 55% if performed within 10 years of the procedure. For the purposes of counseling the procedure should be deemed permanent. <br><br><b>Procedure<\/b><br>Small bilateral incisions and formal dissection of the vas is the standard technique. A technique involving the use of haemostats for skin puncture is used in the 'no scalpel' <br>technique. It is not necessary to routinely send the vas for histology. <br><br><b>Controversies<\/b><br>Be wary of performing the procedure in childless, single men under age 30. <br><br><b>Risks<\/b><br>Following the procedure between 12 and 52% of men reported chronic scrotal pain. Of which 5.2% sought help. Haematomas and sperm granulomas may also occur.<br><br><b>Follow up<\/b><br>Viable sperm may persist following surgery. Clearance should not be granted until a negative sperm sample is available. This is usually taken after 12-16 weeks post procedure (and preferably after 24 ejaculates). Recanalisation may occur in 0.04% of cases.In a small minority of men, non-motile sperm persist after vasectomy. In such cases, 'special clearance' to stop contraception may be given when less than 10,000 non-motile sperm/mL are found in a fresh specimen examined at least 7 months after vasectomy.<br>The risks of STI's are unchanged."}]}</script>
  <script>
    const quizData = JSON.parse(document.getElementById("quiz-data").textContent);
    const app = document.getElementById("app");
    const modeButtons = Array.from(document.querySelectorAll("[data-mode-button]"));
    const topicActionButtons = Array.from(document.querySelectorAll("[data-topic-action]"));

    const state = {
      mode: "solve",
      answers: new Map(),
      questionRefs: [],
    };

    function buildTopic(topic, questionOffset) {
      const details = document.createElement("details");
      details.className = "topic";
      details.open = true;

      const summary = document.createElement("summary");
      summary.innerHTML = `
        <div>
          <h2 class="topic-title">${topic.name}</h2>
        </div>
        <div class="topic-meta">
          <span>${topic.questions.length} questions</span>
          <span class="chevron" aria-hidden="true">></span>
        </div>
      `;

      const body = document.createElement("div");
      body.className = "topic-body";

      if (topic.note_html) {
        const notes = document.createElement("details");
        notes.className = "topic-notes";

        const notesSummary = document.createElement("summary");
        notesSummary.innerHTML = `
          <span class="topic-notes-title">Notes</span>
          <span class="chevron" aria-hidden="true">></span>
        `;

        const notesBody = document.createElement("div");
        notesBody.className = "topic-notes-body rich-text";
        notesBody.innerHTML = topic.note_html;

        notes.appendChild(notesSummary);
        notes.appendChild(notesBody);
        body.appendChild(notes);
      }

      topic.questions.forEach((question, indexInTopic) => {
        const globalIndex = questionOffset + indexInTopic;
        body.appendChild(buildQuestionCard(question, globalIndex));
      });

      details.appendChild(summary);
      details.appendChild(body);
      return details;
    }

    function buildQuestionCard(question, questionIndex) {
      const card = document.createElement("article");
      card.className = "question-card is-hidden";
      card.dataset.questionIndex = String(questionIndex);

      const label = document.createElement("p");
      label.className = "question-label";
      label.textContent = `Question ${question.number}`;

      const stem = document.createElement("div");
      stem.className = "stem rich-text";
      stem.innerHTML = question.stem_html;

      const options = document.createElement("div");
      options.className = "options";

      const optionButtons = question.options.map((option, optionIndex) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "option";
        button.dataset.optionIndex = String(optionIndex);
        button.innerHTML = option.label_html;
        button.addEventListener("click", () => {
          if (state.mode !== "solve") {
            return;
          }
          state.answers.set(questionIndex, optionIndex);
          applyQuestionState(questionIndex);
        });
        options.appendChild(button);
        return button;
      });

      const explanation = document.createElement("div");
      explanation.className = "explanation rich-text";
      explanation.innerHTML = `<span class="explanation-label">Explanation</span>${question.explanation_html}`;

      card.appendChild(label);
      card.appendChild(stem);
      card.appendChild(options);
      card.appendChild(explanation);

      state.questionRefs[questionIndex] = {
        card,
        explanation,
        optionButtons,
        question,
      };

      applyQuestionState(questionIndex);
      return card;
    }

    function applyQuestionState(questionIndex) {
      const ref = state.questionRefs[questionIndex];
      if (!ref) {
        return;
      }

      const { card, optionButtons, question } = ref;
      const selectedIndex = state.answers.get(questionIndex);
      const hasSelection = selectedIndex !== undefined;
      const isReview = state.mode === "review";
      const showExplanation = isReview || hasSelection;

      card.classList.toggle("is-hidden", !showExplanation);

      optionButtons.forEach((button, optionIndex) => {
        button.classList.remove("correct", "incorrect", "neutral-revealed");

        if (isReview) {
          button.disabled = true;
          if (optionIndex === question.correct_index) {
            button.classList.add("correct");
          } else {
            button.classList.add("neutral-revealed");
          }
          return;
        }

        button.disabled = false;
        if (!hasSelection) {
          return;
        }

        if (optionIndex === question.correct_index) {
          button.classList.add("correct");
        } else if (optionIndex === selectedIndex) {
          button.classList.add("incorrect");
        } else {
          button.classList.add("neutral-revealed");
        }
      });
    }

    function renderApp() {
      if (!quizData.topics.length) {
        const empty = document.createElement("div");
        empty.className = "empty-state";
        empty.textContent = "No questions were found in this JSON file.";
        app.replaceChildren(empty);
        return;
      }

      const wrapper = document.createElement("div");
      wrapper.className = "topic-list";

      let questionOffset = 0;
      quizData.topics.forEach((topic) => {
        wrapper.appendChild(buildTopic(topic, questionOffset));
        questionOffset += topic.questions.length;
      });

      app.replaceChildren(wrapper);
    }

    function setMode(mode) {
      state.mode = mode;
      modeButtons.forEach((button) => {
        const isActive = button.dataset.modeButton === mode;
        button.classList.toggle("active", isActive);
        button.setAttribute("aria-pressed", String(isActive));
      });

      state.questionRefs.forEach((_, index) => applyQuestionState(index));
    }

    function setAllTopics(open) {
      document.querySelectorAll(".topic").forEach((topic) => {
        topic.open = open;
      });
    }

    modeButtons.forEach((button) => {
      button.addEventListener("click", () => setMode(button.dataset.modeButton));
    });

    topicActionButtons.forEach((button) => {
      button.addEventListener("click", () => {
        setAllTopics(button.dataset.topicAction === "expand");
      });
    });

    renderApp();
    setMode("solve");
  </script>
</body>
</html>
